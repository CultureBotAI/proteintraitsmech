identifier: InterPro:IPR011577
label: Cytochrome b561, bacterial/Ni-hydrogenase
definition: >-
  Cytochrome b561 is an integral membrane and electron transport protein, that binds two haem groups non-covalently. This domain is also found in a number of nickel-dependent hydrogenase subunits which are also B-type cytochromes that interact with quinones and anchor the hydrogenase to the membrane. This domain is found in prokaryotes. Members of the 'eukaryotic cytochrome b561' family can be found in .
