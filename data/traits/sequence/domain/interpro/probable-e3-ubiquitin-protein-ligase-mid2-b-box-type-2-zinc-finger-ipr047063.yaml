identifier: InterPro:IPR047063
label: "Probable E3 ubiquitin-protein ligase MID2, B-box-type 2 zinc finger"
definition: >-
  This entry represents the B-box-type 2 zinc finger of MID2, which is characterised by a CHC3H2 zinc-binding consensus motif. MID2 shares high structural and functional similarities with MID1, an ubiquitin E3 ligase that regulates the turnover of microtubular protein phosphatase 2Ac. MID2 interacts with Astrin (a microtubule-organizing protein) and regulates Astrin levels to promote cell division. MID1 and MID2 may play roles in regulating tissue remodelling in early development. Mutations in the MID2 gene lead to human X-linked intellectual disability (XLID).
