identifier: InterPro:IPR041293
label: "Serine-tRNA ligase type 2, tRNA-binding domain"
definition: >-
  This is the N-terminal domain found in archeal type-2 serine-tRNA ligase (SerRS) ( ). The SerRS N-terminal domain interacts with the extra-arm stem and the outer corner of tRNA specific to Selenocysteine (tRNA-Sec).
