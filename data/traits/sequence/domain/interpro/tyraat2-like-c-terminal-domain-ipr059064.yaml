identifier: InterPro:IPR059064
label: "TYRAAT2-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of Arogenate dehydrogenase 2 (TYRAAT2) and in two copies in Arogenate dehydrogenase 1 (TYRAAT1), both chloroplastic from Arabidopsis thaliana, as well as in similar plant proteins. This region is predicted to adopt an α helical structure. TYRAAT1, which is involved in the biosynthesis of tyrosine, consists of two highly similar and catalytically active peptide domains that do not undergo proteolytic cleavage. TyrAAT1 is four times more efficient in catalysing the arogenate dehydrogenase reaction than TyrAAT2 Arogenate dehydrogenase 2, TYRAAT2, is involved in the biosynthesis of tyrosine and has a weak prephenate dehydrogenase activity which is not present in TYRAAT1.
