identifier: InterPro:IPR019243
label: "Domain of unknown function DUF2202"
definition: >-
  This domain is found in Uncharacterized protein MJ0754 from Methanocaldococcus jannaschii and similar proteins from bacteria and archaea. MJ0754 adopts a dimeric assembly, with each monomer consisting of six α-helices. It is a member of a broad superfamily of ferritin-like diiron-carboxylate proteins whose function is unknown. The conserved residues of a diiron centre are present within the putative active site.
