identifier: InterPro:IPR020843
label: Enoylreductase domain
definition: >-
  This entry represents the enoylreductase domain (ER), which can be found in several types of enzymes, including polyketides synthase enzymes (PKSs), In PKSs, the ER domain catalyses the reduction of enzyme-bound 2-enoyl intermediates during polyketide biosynthesis. It can also be found in mammalian fatty acid synthases (FAS) where they perform a similar function to PKS ER domains in fatty acid biosynthesis. The ER domain can also be present in mitochondrial fatty acid synthesis enzymes such as enoyl-[acyl-carrier-protein] reductase (MECR). Finally it can also be found in some dehydrogenases, particulary those in the medium-chain dehydrogenase/reductase (MDR) superfamily and dehydrogenase/reductase (SDR) superfamily.
