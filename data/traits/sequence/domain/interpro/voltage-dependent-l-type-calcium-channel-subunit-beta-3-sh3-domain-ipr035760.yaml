identifier: InterPro:IPR035760
label: "Voltage-dependent L-type calcium channel subunit beta-3, SH3 domain"
definition: >-
  The beta4 subunit of voltage-dependent calcium channels (Ca(V)s) is one of four beta subunits present in vertebrates. It is highly expressed in the brain, predominantly in the cerebellum. This entry represents the SH3 domain of the subunit beta-3.
