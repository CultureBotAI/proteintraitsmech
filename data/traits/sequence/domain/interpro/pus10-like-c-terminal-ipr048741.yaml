identifier: InterPro:IPR048741
label: "Pus10-like, C-terminal"
definition: >-
  This entry represents the C-terminal catalytic domain of tRNA pseudouridine synthase Pus10, conserved in archaea and eukaryotes. In archaea it catalyses the formation of the pseudouridine at positions 54 and 55 in tRNA, while human Pus10 has different functions depending on its subcellular location: it is involved in miRNA processing in the nucleus and acts as a tRNA pseudouridylate synthase in the cytoplasm.
