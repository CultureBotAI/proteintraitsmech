identifier: InterPro:IPR054151
label: "TR61B, FKBP-like domain"
definition: >-
  This is the FKBP-like domain found towards the N-terminal of TR61B (tRNA (adenine(58)-N(1))-methyltransferase) from human and similar proteins. This mitochondrion-specific protein catalyses the formation of N1-methyladenine at position 58 (m1A58) in various tRNAs and the formation of 1-methyladenosine at position 947 of mitochondrial 16S ribosomal RNA which is most likely important for mitoribosomal structure and function. TR61B is most similar to bacterial TrmI than to eukaryotic Trmt61A, according to phylogenetic tree analysis. The function of this domain is not clear but it may be necessary for overall folding and full enzymatic activity.
