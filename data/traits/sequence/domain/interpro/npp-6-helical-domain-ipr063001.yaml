identifier: InterPro:IPR063001
label: "NPP-6, helical domain"
definition: >-
  This entry represents the helical domain present in NPP-6 ( ) found in Caenorhabditis elegans and related nematode proteins. These proteins are components of the Nuclear Pore Complex (NPC). NPP-6 and NUP133 are part of the cytoplasmic and nucleoplasmic rings, while NUP155 is part of the inner ring. The NPC plays a role in the export of mRNA from the nucleus and the import of transcription factors and other proteins.
