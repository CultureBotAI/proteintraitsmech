identifier: InterPro:IPR021098
label: "Bacteriophage P22, Gp10, DNA-stabilising"
definition: >-
  This entry represents the β-propeller domain found in Bacteriophage P22, Gp10, DNA-stabilising protein. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. Members of this entry are phage proteins involved with stabilising the head assembly unit and condensed DNA within the capsid.
