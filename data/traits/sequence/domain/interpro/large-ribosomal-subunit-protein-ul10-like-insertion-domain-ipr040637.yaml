label: "Large ribosomal subunit protein uL10-like, insertion domain"
definition: >-
  This is an insertion domain found in archaeal and eukaryotic large ribosomal subunit protein uL10 (previously known as P0 homologue (L10E) and in ribosome assembly factor MRT4, a nuclear paralogue of these proteins.
