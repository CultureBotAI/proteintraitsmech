identifier: InterPro:IPR058444
label: "Domain of unknown function DUF8131"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The domain is predominantly found in the class Halobacteria, which includes species from families such as Natrialbaceae and Haloferacaceae. The proteins containing this domain are typically around 60-70 amino acids in length. The domain contains two transmembrane helices.
