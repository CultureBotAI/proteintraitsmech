identifier: InterPro:IPR041726
label: "Acyl-CoA dehydrogenase family member 10/11, N-terminal"
definition: >-
  This entry represents the N-terminal domains of vertebrate ACAD10 and ACAD11, and similar uncharacterised bacterial and eukaryotic proteins. ACADs are a family of flavoproteins that are involved in the beta-oxidation of fatty acyl-CoA derivatives. ACAD deficiency can cause metabolic disorders including muscle fatigue, hypoglycemia, and hepatic lipidosis. There are at least 11 distinct ACADs, some of which show distinct substrate specificities to either straight-chain or branched-chain fatty acids. ACAD10 is widely expressed in human tissues and highly expressed in liver, kidney, pancreas, and spleen. ACAD10 and ACAD11 are both significantly expressed in human brain tissues. They contain a long N-terminal domain with similarity to phosphotransferases with a Protein Kinase fold, which is absent in other ACADs. They may exhibit multiple functions in acyl-CoA oxidation pathways. ACAD11 utilises substrates with carbon chain lengths of 20 to 26, with optimal activity towards C22CoA. ACAD10 may be associated with an increased risk in type II diabetes.
