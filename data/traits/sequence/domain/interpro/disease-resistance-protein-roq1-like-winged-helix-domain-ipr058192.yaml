identifier: InterPro:IPR058192
label: "Disease resistance protein Roq1-like, winged-helix domain"
definition: >-
  This entry represents the winged-helix domain (WHD) of Disease resistance protein Roq1 from Nicotiana benthamiana and related plant proteins. Roq1 specifically recognises the Xanthomonas and Pseudomonas effector proteins XopQ and HopQ1, and triggers cell death.
