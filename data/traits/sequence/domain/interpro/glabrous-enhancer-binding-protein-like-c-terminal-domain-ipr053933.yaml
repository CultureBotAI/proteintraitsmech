identifier: InterPro:IPR053933
label: "Glabrous enhancer-binding protein-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain present in GLABROUS1 enhancer-binding protein (GeBP) and GeBP-like proteins, such as storekeeper and storekeeper-like (STKL) transcription factors. GeBP and GeBP-like proteins play a redundant role in cytokinin hormone pathway regulation. Storekeeper was identified as a B-box motif binding factor that regulates expression of patatin, a storage protein in potato. Storekeeper-like transcription factors STKL1 and STKL2 function as transcription factors in the glucose signalling pathway.
