identifier: InterPro:IPR049416
label: "Malonyl-CoA-[acyl-carrier-protein] transacylase, small domain"
definition: >-
  This family includes Malonyl-CoA-[acyl-carrier-protein] transacylase from Streptomyces halstedii (VinK, ) and similar sequences predominantly found in actinomycetes. VinK transfers a dipeptide group between two ACPs, VinL and VinP1LdACP, in vicenistatin biosynthesis. VinK is composed of two α/β domains. This entry represents the small domain. The two conserved catalytic residues of VinK are located at the interface between the large domain and small domain.
