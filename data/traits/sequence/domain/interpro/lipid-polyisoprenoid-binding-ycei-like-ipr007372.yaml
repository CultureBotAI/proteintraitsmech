identifier: InterPro:IPR007372
label: "Lipid/polyisoprenoid-binding, YceI-like"
definition: >-
  This entry represents the lipid-binding protein YceI from Escherichia coli and the polyisoprenoid-binding protein TTHA0802 from Thermus thermophilus. Both these proteins share a common domain with an 8-stranded β-barrel fold, which resembles the lipocalin fold, although no sequence homology exists with lipocalins. In TTHA0802, the protein binds the polyisoprenoid chain within the pore of the barrel via hydrophobic interactions. Sequence homologues of this core structure are present in a wide range of bacteria and archaea. The crystal structures of Yce1 and TTHA0802 suggest that this family of proteins plays an important role in isoprenoid quinone metabolism and/or transport and/or storage.
