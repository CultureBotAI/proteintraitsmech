label: "Domain of unknown function DUF8473"
definition: >-
  This entry represents two tandem domains found at the N-terminal of described as TraN and related sequences. TraN is encoded by transfer region genes of conjugative transposons of Bacteroides. These tandem domains may have a Ig-like fold.
