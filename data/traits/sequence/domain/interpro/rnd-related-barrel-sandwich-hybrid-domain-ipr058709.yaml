identifier: InterPro:IPR058709
label: "RND related, barrel-sandwich hybrid domain"
definition: >-
  This domain is found in proteins from firmicutes that are related to RND (resistance-nodulation-division) efflux pump components. It is interrupted by an α-helical insertion ( ) which split the domain into two sequentially separated parts.
