identifier: InterPro:IPR059237
label: "Geminin coiled-coil domain-containing protein 1, central coiled-coil domain"
definition: >-
  This entry represents the central coiled-coil domain of Geminin coiled-coil domain-containing protein 1 (GemC1), which, together with McIdas (also called Idas or multicilin) and geminin, controls both the cell cycle and differentiation decisions in cells. This entry is specific to vertebrates. GemC1 binds to geminin and is implicated in DNA replication control. It also functions as an early regulator of multiciliogenesis. GemC1 and Idas specify the multiciliate cell fate by forming complexes with the E2F4/5 transcription factors, resulting in centriole amplification and cilia formation. GemC1 belongs to the geminin family of proteins that also includes geminin and McIdas. They share a homologous central coiled-coil domain that mediates homo- and heterodimerisation with other family members; this ability is likely to be important for modulating their function in cycling and differentiating cells.
