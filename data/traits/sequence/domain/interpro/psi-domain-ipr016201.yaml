identifier: InterPro:IPR016201
label: "PSI domain"
definition: >-
  This domain is found in several different extracellular receptors, including plexins, which are involved in the development of neural and epithelial tissues; in semaphorins, which regulate axon guidance, immune function and angiogenesis; in integrins, which are important Metazoan adhesion receptors that transmit conformational change bidirectionally across the membrane (integrin alpha and beta subunits form a head and two long legs in the ectodomain and span the membrane); and in hepatocyte growth factor receptor, which plays important roles in normal development and in tumour growth and metastasis.
