identifier: InterPro:IPR007751
label: "Domain of unknown function DUF676, lipase-like"
definition: >-
  This domain, whose function is unknown, is found within a group of putative lipases. Proteins containing this domain include YOR059C (Lpl1) from budding yeasts. Lpl1 has been identified as a phospholipase B.
