identifier: InterPro:IPR049497
label: "Formin C, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Formin-C from Dictyostelium discoideum (ForC) and similar proteins predominantly found in amoebas. ForC is involved in the regulation of local actin cytoskeleton reorganisation. It contains a N-terminal putative GTPase-binding domain (GBD, this entry), an FH3, and an FH2 domain. This domain adopts an ubiquitin-like fold with an unusually long loop between the first and second β-strands.
