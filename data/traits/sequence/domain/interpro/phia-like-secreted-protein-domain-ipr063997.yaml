identifier: InterPro:IPR063997
label: "PhiA-like secreted protein domain"
definition: >-
  This entry represents a domain covering most of the protein length in small secreted proteins found in filamentous fungi of the phylum Ascomycota. Some members contain a signal peptide and are secreted extracellularly and predicted to be N-glycosylated. The protein from Arthroderma benhamiae (ARB_07637) was identified in the secreted proteome during extracellular proteolysis at acidic pH. Members also include Cell wall protein phiA which plays a role as a general stress protectant produced by the fungus in competition with antagonistic bacteria. It is also involved in development of asexual structures such as phialide and conidium development and thus required for spore formation. This domain can also be found N-terminal in some fungal proteins.
