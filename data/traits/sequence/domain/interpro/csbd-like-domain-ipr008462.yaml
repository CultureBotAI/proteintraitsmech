identifier: InterPro:IPR008462
label: "CsbD-like domain"
definition: >-
  CsbD is a bacterial general stress response protein. Its expression is mediated by sigma-B, an alternative sigma factor. The exact role of CsbD in stress response is unclear. This entry represents CsbD, and related proteins.
