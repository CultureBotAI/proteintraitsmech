identifier: InterPro:IPR060206
label: "BEAN1, helical region"
definition: >-
  This entry represents the single transmembrane helix found in BEAN1 proteins. The function of BEAN1 (brain expressed, associated with Nedd4) is not clear. Mutations in the BEAN1 gene cause spinocerebellar ataxia type 31 (SCA31), an autosomal-dominant cerebellar ataxia showing a Purkinje cell (PC)-predominant neurodegeneration in humans.
