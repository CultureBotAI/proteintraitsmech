identifier: InterPro:IPR007854
label: "Pre-mRNA polyadenylation factor Fip1 domain"
definition: >-
  This short motif is about 40 amino acids in length and is found in the Fip1 protein that is a component of a Saccharomyces cerevisiae pre-mRNA polyadenylation factor that directly interacts with poly(A) polymerase. This region of Fip1 is needed for the interaction with the Yth1 subunit of the complex and for specific polyadenylation of the cleaved mRNA precursor.
