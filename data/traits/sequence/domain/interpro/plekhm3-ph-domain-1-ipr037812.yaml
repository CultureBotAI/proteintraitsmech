identifier: InterPro:IPR037812
label: "PLEKHM3, PH domain 1"
definition: >-
  PLEKHM3 (also called differentiation associated protein/DAPR) exists as three alternatively spliced isoforms that participate in metal ion binding. It contains 2 PH domains and 1 phorbol-ester/DAG-type zinc finger domain. PLEKHM3 is involved in skeletal muscle differentiation. This entry represents the first PH domain of PLEKHM3.
