identifier: InterPro:IPR054421
label: "McpB, second HAMP domain"
definition: >-
  This entry represents the second HAMP domain found in Methyl-accepting chemotaxis protein McpB from Pseudomonas aeruginosa and similar sequences from proteobacteria. McpB, also known as Aerotaxis transducer Aer2, is a chemoreceptor that plays a critical role in the virulence and pathogenesis of the bacteria. This domain folds into a unique four-helix bundle that comparatively differs from the first and third HAMP domains of the same protein.
