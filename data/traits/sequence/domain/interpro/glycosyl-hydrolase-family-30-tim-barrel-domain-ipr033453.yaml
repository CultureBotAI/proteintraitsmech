identifier: InterPro:IPR033453
label: "Glycosyl hydrolase family 30, TIM-barrel domain"
definition: >-
  This entry represents a TIM-barrel domain found in the glycosyl hydrolase family 30 members. Glycoside hydrolase family 30 comprises enzymes with only one known activity; glucosylceramidase ( ). Family 30 encompasses the mammalian glucosylceramidases. Human acid beta-glucosidase (D-glucosyl-N-acylsphingosine glucohydrolase), cleaves the glucosidic bonds of glucosylceramide and synthetic beta-glucosides. Any one of over 50 different mutations in the gene of glucocerebrosidase have been found to affect activity of this hydrolase, producing variants of Gaucher disease, the most prevalent lysosomal storage disease.
