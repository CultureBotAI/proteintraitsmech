identifier: InterPro:IPR041846
label: "Early nodulin-like protein domain"
definition: >-
  This entry represents a domain found early nodulin-like proteins such as ENODL1 from Arabidopsis thaliana and Oryza sativa (AtENOLD1 and OsENOLD1, respectively). These proteins may play an important role in the transport of nutrients, solutes, amino acids or hormones. These proteins belong to the phytocyanin family of blue copper proteins, a ubiquitous family of plant cupredoxins. Phytocyanin is involved in electron transfer reactions with the Cu centre transitioning between the oxidized Cu(II) form and the reduced Cu(I) form. OsENODL1 expression occurs specifically at the late developmental stage of the seeds. Members of this subgroup appear to have lost the T1 copper binding site.
