identifier: InterPro:IPR041416
label: "IL-1Ra-like, immunoglobulin domain"
definition: >-
  This is an immunoglobulin domain which can be found in Interleukin-1 receptors and Interleukin 1 receptor accessory proteins (IL-1RAcP). IL-1RAcP is a member of the Ig superfamily and has a limited homology throughout the protein to both Type I and Type II IL-1 receptors. IL-1RAcP is a transmembrane protein required for IL-1 signal transduction. It increases the binding affinity of the recombinant Type I IL-1R for IL-1 beta when the two receptor proteins are co-expressed. It has been suggested to play a role in the formation of the active receptor complex.
