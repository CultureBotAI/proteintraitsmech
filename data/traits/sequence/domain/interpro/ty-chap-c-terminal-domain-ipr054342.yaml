identifier: InterPro:IPR054342
label: "TY-Chap, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of a group of T3SS (YopN, CesT) and YbjN peptide-binding chaperone 1 (TY-Chap) proteins from actinomycetes. Members are observed in host systems and predicted to counteract the action of viral ribosylating toxins. It is found C-terminal to the N-terminal ( ) and central ( ) domains.
