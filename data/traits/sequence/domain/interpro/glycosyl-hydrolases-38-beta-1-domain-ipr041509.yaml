identifier: InterPro:IPR041509
label: "Glycosyl hydrolases 38, beta-1 domain"
definition: >-
  The enzymatic hydrolysis of alpha-mannosides is catalyzed by glycoside hydrolases (GH), termed alpha-mannosidases. Streptococcal (Sp) GH38 alpha-mannosidase active on N-glycans and possibly O-glycans. SpGH38 structure can be considered as five domains: an N-terminal α/β-domain, a three-helix bundle and three predominantly β-sheet domains. This is the first of the three β-sheet domains found in GH38, termed Beta-1. Structural analysis indicate that the beta-1 domain bows outward from the protein core, is involved in dimer interactions whilst also forming a lid 'above' and somewhat into the active centre of its dimer.
