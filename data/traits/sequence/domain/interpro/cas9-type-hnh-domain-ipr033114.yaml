identifier: InterPro:IPR033114
label: "Cas9-type HNH domain"
definition: >-
  The CRISPR (clustered regularly interspaced short palindromic repeat)-Cas (CRISPR associated) system is a naturally occuring, adaptative microbial immune system for defense against invading phages and other mobile genetic elements. Type II CRISPR-Cas systems use an RNA-guided DNA endonuclease, Cas9, to generate double strand breaks in invasive DNA during an adaptative bacterial immune response. Cas9 proteins are abundant across the bacterial kingdom, but vary widely in both sequence and size. All known Cas9 enzymes contain an HNH domain that cleaves the DNA strand complementary to the guide RNA sequence (target strand), and a RuvC nuclease domain required for cleaving the noncomplementary strand (non-target strand), yielding double strand DNA breaks (DSBs). The Cas9-type HNH nuclease domain contains a two-stranded antiparallel β sheet flanked by two α-helices on each side. This entry covers the entire Cas9-type HNH domain.
