identifier: InterPro:IPR049524
label: "ZBTB47, BTB/POZ domain"
definition: >-
  ZBTB47 (Zinc finger and BTB domain-containing protein 47), also called zinc finger protein 651 (ZNF651), is a paralog of ZNF652, a zinc-finger transcriptional repressor. It interacts with CBFA2T3 via its carboxy-terminal proline-rich region. CBFA2T3-ZNF651 functions as a transcriptional co-repressor complex. De novo missense variants in ZBTB47 have been associated with developmental delay. ZBTB47 contains a BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain (this entry), a common protein-protein interaction motif of about 100 amino acids.
