identifier: InterPro:IPR024953
label: "Polyphosphate kinase middle domain"
definition: >-
  Polyphosphate kinase (Ppk) catalyses the formation of polyphosphate from ATP, with chain lengths of up to a thousand or more orthophosphate molecules. This entry represents the Ppk middle domain.
