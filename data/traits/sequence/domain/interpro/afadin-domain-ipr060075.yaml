identifier: InterPro:IPR060075
label: "Afadin domain"
definition: >-
  This domain is found in human Afadin (AFDN), a nectin- and actin-filament-binding protein that connects nectin to the actin cytoskeleton and is essential for the organisation of adherens junctions. This domain is predicted to adopt an all-α configuration.
