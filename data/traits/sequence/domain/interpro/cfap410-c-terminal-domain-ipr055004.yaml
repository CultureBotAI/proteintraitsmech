identifier: InterPro:IPR055004
label: "CFAP410, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Trypanosoma brucei cilia and flagella associated protein 410 (CFAP410) and related proteins. This domain is involved in oligomerisation and self-associates to form a tetrameric helical bundle composed of a dimer of two interlocking dimers.
