identifier: InterPro:IPR013153
label: "PrkA, AAA domain"
definition: >-
  This entry represents the N-terminal AAA domain in PrkA proteins. ATP-dependent protease PrkA proteins are bacterial and archaeal serine kinases, approximately 630 residues in length. They possesses the A-motif of nucleotide-binding proteins and exhibit distant homology to eukaryotic protein kinases.
