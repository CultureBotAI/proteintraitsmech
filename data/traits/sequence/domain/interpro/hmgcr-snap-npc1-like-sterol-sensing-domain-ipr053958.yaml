identifier: InterPro:IPR053958
label: "HMGCR/SNAP/NPC1-like, sterol-sensing domain"
definition: >-
  This entry represents the sterol-sensing domain found in a group of proteins related to cholesterol metabolism and transport, such as HMG-CoA reductase (HMGCR), Sterol regulatory element-binding protein cleavage-activating protein (SCAP), NPC1, patched and related proteins, which are membrane-bound transcription factors that promote lipid synthesis in animal cells. They are embedded in the membranes of the endoplasmic reticulum (ER) in a helical hairpin orientation and are released from the ER by a two-step proteolytic process. SCAP is a key player in the sterol regulatory element-binding protein (SREBP) pathway that controls the cellular homeostasis of sterol, HMGCR catalyses the rate-limiting step of cholesterol synthesis, and NPC1 is essential for cholesterol egress from the lysosomes and late endosomes to other cellular compartments. The sterol-sensing domain plays a regulatory role and belongs to a larger transmembrane region that traverses the membrane eight times.
