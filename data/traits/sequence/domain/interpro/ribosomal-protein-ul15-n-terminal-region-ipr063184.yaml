identifier: InterPro:IPR063184
label: "Ribosomal protein uL15, N-terminal region"
definition: >-
  This entry represents the N-terminal region of the large ribosomal subunit protein uL15 (also known as 50S ribosomal protein L15 or rplO). This region is found upstream of the main ribosomal L27A domain ( ). The full-length protein uL15 is a component of the 50S ribosomal subunit in bacteria and binds to 23S rRNA.
