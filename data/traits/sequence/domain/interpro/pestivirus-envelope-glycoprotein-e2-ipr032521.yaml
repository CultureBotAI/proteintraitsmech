identifier: InterPro:IPR032521
label: "Pestivirus envelope glycoprotein E2"
definition: >-
  Pestiviruses have an outer lipid envelope bearing two glycoproteins, E1 and E2, required for cell entry. This entry represent the E2 protein, which consists of two Ig-like domains followed by an elongated β-stranded domain with a new fold.
