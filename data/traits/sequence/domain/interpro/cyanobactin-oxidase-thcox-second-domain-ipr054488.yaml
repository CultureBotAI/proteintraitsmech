identifier: InterPro:IPR054488
label: "Cyanobactin oxidase ThcOx, second domain"
definition: >-
  Thus entry represents the second peptide-clamp domain described in cianobactin oxidase ThcOx from Cyanothece sp.. The first one is represented in and at the C-terminal it contains a nitroreductase domain ( ). In this domain, the binding site is buried by an interaction with the other clamp domain and thus it is unlikely to be active.
