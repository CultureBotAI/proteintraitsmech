identifier: InterPro:IPR013866
label: "Sphingolipid delta4-desaturase, N-terminal"
definition: >-
  This small domain appears to be specific to sphingolipid delta 4-desaturase. Sphingolipids are important membrane signalling molecules involved in many different cellular functions in eukaryotes. Sphingolipid delta 4-desaturase catalyses the formation of (E)-sphing-4-enine. Some proteins with this domain have bifunctional delta 4-desaturase/C-4-hydroxylase activity. Delta 4-desaturated sphingolipids may play a role in early signalling required for entry into meiotic and spermatid differentiation pathways during Drosophila spermatogenesis.
