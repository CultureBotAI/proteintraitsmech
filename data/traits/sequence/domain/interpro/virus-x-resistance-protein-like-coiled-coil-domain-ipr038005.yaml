identifier: InterPro:IPR038005
label: "Virus X resistance protein-like, coiled-coil domain"
definition: >-
  The potato virus X resistance protein (RX) confers resistance against potato virus X. It is a member of a family of resistance proteins with a domain architecture that includes an N-terminal coiled-coil domain (modeled here), a nucleotide-binding domain, and leucine-rich repeats (CC-NB-LRR). These intracellular resistance proteins recognize pathogen effector proteins and will subsequently trigger a response that may be as severe as localized cell death. The N-terminal coiled-coil domain of RX has been shown to interact with RanGAP2, which is a necessary co-factor in the resistance response.
