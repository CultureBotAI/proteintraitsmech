identifier: InterPro:IPR000904
label: Sec7 domain
definition: >-
  Protein containing this domain are highly divergent in their overall sequence, however, they share a common region of roughly 200 amino acids known as the SEC7 domain. The 3D structure of the domain displays several α-helices. It was found to be associated with other domains involved in guanine nucleotide exchange (e.g., CDC25, Dbl) in mammalian guanine-nucleotide-exchange factors. SEC7 domain containing proteins are guanine nucleotide exchange factors (GEFs) specific for the ADP-rybosylation factors (ARF), a Ras-like GTPases which is important for vesicular protein trafficking. These proteins can be divided into five families, based on domain organisation and conservation of primary amino acid sequence: GBF/BIG, cytohesins,eFA6, BRAGs, and F-box. They are found in all eukaryotes, and are involved in membrane remodelling processes throughout the cell.
