identifier: InterPro:IPR015241
label: "Transcription regulator MotA, C-terminal"
definition: >-
  Transcription factor MotA is required for the activation of middle promoters in Bacteriophage T4, in addition to phage T4 co-activator AsiA, and sigma-70-containing Escherichia coli RNA polymerase. Phage T4 middle promoters have the sigma70 -10 DNA element, but not the -35 element; instead, they have a MotA box at -30 to which the transcription factor MotA binds. MotA and AsiA interact with the C-terminal of sigma70 (region 4), which normally binds the -35 element and the β-flap, thereby diverting sigma70 away from host promoters that require -35 element-binding to phage T4 middle promoters.
