identifier: InterPro:IPR063732
label: "PRP6, TPR-like domain"
definition: >-
  This entry represents a TPR repeat domain found in human pre-mRNA splicing factor 6 (PRP6), Crooked neck-like protein 1 from Danio rerio and similar proteins found in eukaryotes. PRP6 is involved in pre-mRNA splicing as component of the U4/U6-U5 tri-snRNP complex, one of the building blocks of the spliceosome. It enhances dihydrotestosterone-induced transactivation activity of AR, as well as dexamethasone-induced transactivation activity of NR3C1, but does not affect estrogen-induced transactivation.
