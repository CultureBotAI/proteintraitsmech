identifier: InterPro:IPR035681
label: "ComA-like, MBL domain"
definition: >-
  This domain is found in proteins required for natural transformation competence including Neisseria gonorrhoeae ComA, Pseudomonas stutzeri ComA, Bacillus subtilis ComEC (also known as ComE operon protein 3) and Haemophilus influenza ORF2 encoded by the rec-2 gene, as well as Escherichia coli YcaI which does not mediate spontaneous plasmid transformation on nutrient-containing agar plates. It also includes the phosphorylcholine esterase (Pce) domain of choline-binding protein e from streptococcus pneumonia. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions.
