identifier: InterPro:IPR049756
label: "Phospholipase C-like domain"
definition: >-
  This entry represents a domain that covers the whole protein in phospholipase C from Legionella pneumophila (PlcA, ) and Pseudomonas fluorescens (PlcC, ), and similar sequences mainly from bacteria and fungi. PlcA and PlcC are secreted phosphatidylcholine-hydrolysing phospholipases. PlcC is involved in the hemolytic activity of P. fluorescens. Its preferred substrates are 1-palmitoyl-2-arachidonoyl-phosphatidylcholine and dipalmitoyl-phosphatidylcholine. The active enzyme is a monomer that requires calcium and zinc ions for activity. This domain is also found associated with in some uncharacterised proteins and with in others.
