identifier: InterPro:IPR060933
label: "Exosortase U, C-terminal region"
definition: >-
  This entry represents a distinctive C-terminal region found in the XrtU family of exosortases. Because members of the archaeosortase and exosortase family perform cleavage of target proteins, in pathways thought to lead to new covalent attachment at the C terminus and surface anchoring, this domain may indicate the presence of a novel anchoring chemistry.
