identifier: InterPro:IPR056595
label: "FACT complex subunit SPT16, PH-like domain"
definition: >-
  This domain is found in FACT complex subunit SPT16 and related eukaryotic proteins. It shows similarity to known PH domains. SPT16 is a component of the FACT (facilitator of chromatin transcription) complex, a general chromatin factor that acts to reorganise nucleosomes. In budding yeasts, the N-terminal domain (NTD) of SPT16 includes a smaller N-terminal lobe (residues 1-175) and a larger C-terminal lobe (residues 176-447).
