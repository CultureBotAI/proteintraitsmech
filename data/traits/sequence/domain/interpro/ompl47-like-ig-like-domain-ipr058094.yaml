identifier: InterPro:IPR058094
label: "OmpL47-like, Ig-like domain"
definition: >-
  This entry represents an Ig-like domain in Leptospira surface-exposed protein OmpL47 and related proteins, usually annotated as Ig-like domain-containing proteins or as carbohydrate-active enzymes. This domain can be found as tandem copies from 3 to 12 repetitions.
