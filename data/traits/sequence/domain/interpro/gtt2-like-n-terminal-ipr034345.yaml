identifier: InterPro:IPR034345
label: "Gtt2-like, N-terminal"
definition: >-
  This entry represents the N-terminal GST-like TRX-fold domain found in the budding yeast Gtt2 protein. Gtt2 is a glutathione S-transferase involved in the glutaredoxin-mediated antioxidant activity. Proteins containing this domain also include some bacterial GST-like proteins.
