identifier: InterPro:IPR028392
label: "1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase eta-1, catalytic domain"
definition: >-
  Phosphoinositide-specific phospholipase C (PI-PLC), also known as 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase, plays a role in the inositol phospholipid signaling by hydrolysing phosphatidylinositol-4,5-bisphosphate to produce the second messengers inositol 1,4,5-trisphosphate (IP3) and diacylglycerol (DAG). These cause the increase of intracellular calcium concentration and the activation of protein kinase C (PKC), respectively. The PLC family in murine or human species is comprised of multiple subtypes. On the basis of their structure, they have been divided into five classes, beta (beta-1, 2, 3 and 4), gamma (gamma-1 and 2), delta (delta-1, 3 and 4), epsilon, zeta, and eta types. The PLC-eta gene is transcribed to several splicing variants. This entry represents PLC-eta-1, which may have an important role in the brain. This entry represents the catalytic domain of PLC-eta1, a TIM barrel with two highly conserved regions (X, , and Y, ) split by a highly degenerate linker sequence.
