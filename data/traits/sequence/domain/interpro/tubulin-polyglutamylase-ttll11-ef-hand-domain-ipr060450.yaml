identifier: InterPro:IPR060450
label: "Tubulin polyglutamylase TTLL11, EF-hand domain"
definition: >-
  This EF-hand domain is found at the C-terminal of human Tubulin polyglutamylase TTLL11, which is required for CCSAP localisation to both spindle and cilia microtubules. Members of this group are found in animals.
