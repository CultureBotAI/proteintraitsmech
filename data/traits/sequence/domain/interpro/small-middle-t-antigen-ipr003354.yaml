identifier: InterPro:IPR003354
label: "Small/middle T-antigen"
definition: >-
  This domain represents a conserved region in papovavirus small and middle T-antigens. It is found as the N-terminal domain in the small T-antigen, and is centrally located in the middle T-antigen.
