identifier: InterPro:IPR049285
label: "DUF4931, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of bacterial proteins and is around 270 residues in length. Proteins containing this domain are mainly found in firmicutes, including a di/tripeptide transporter from Lactobacillus helveticus. In BCE0241 protein from Bacillus cereus, which is structurally but not functionally characterised, this domain adopts an α/β structure that is similar to HIT-like domains. It is also similar to the N-terminal domain that also adopts HIT-like structure. This domain is found at the C-terminal domain in Di-/tripeptide transporter (dtpT). DtpT is a proton-dependent uptake of di- or tri-peptides.
