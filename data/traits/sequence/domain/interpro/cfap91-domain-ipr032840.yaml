identifier: InterPro:IPR032840
label: "CFAP91 domain"
definition: >-
  This entry represents a domain found in the CFAP91 protein. CFAP91 (also known as AMY-1-associating protein expressed in testis 1 or AAT-1) is a component of a spoke-associated complex, regulates flagellar dynein activity by mediating regulatory signals between the radial spokes and dynein arms. It binds to AMY1 and may play a role in spermatogenesis.
