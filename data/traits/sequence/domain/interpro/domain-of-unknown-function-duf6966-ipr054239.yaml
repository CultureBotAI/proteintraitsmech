label: "Domain of unknown function DUF6966"
definition: >-
  This is a domain found in uncharacterised bacterial proteins that is predicted to be helical. It contains a nearly invariant tryptophan towards the N-terminal and a highly conserved motif [F/Y]GGMGSx(2)D towards the C-terminal.
