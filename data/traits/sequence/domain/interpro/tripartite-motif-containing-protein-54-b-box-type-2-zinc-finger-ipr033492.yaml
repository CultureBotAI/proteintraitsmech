identifier: InterPro:IPR033492
label: "Tripartite motif-containing protein 54, B-box-type 2 zinc finger"
definition: >-
  This entry represents the B-box-type 2 zinc finger of Trim54, which is characterised by a CHC3H2 zinc-binding consensus motif. Tripartite motif-containing protein 54 (Trim54, also known as MuRF-3) is involved in the muscle growth and development. It serves as a regulator of the microtubule network of striated muscle cells. It can function as a E3 ubiquitin ligase in ubiquitin-mediated muscle protein turnover.
