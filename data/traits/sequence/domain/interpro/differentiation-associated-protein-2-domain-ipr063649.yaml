identifier: InterPro:IPR063649
label: "Differentiation-associated protein 2 domain"
definition: >-
  This entry represents a domain found in differentiation-associated protein 2 (DIA2) from Dictyostelium discoideum, a protein with an essential role in the initiation of differentiation in Dictyostelium discoideum. This entry also includes related proteins which are also involved in the transduction of cAMP signalling pathways. DIA2 is also required for cAMP signalling. The protein is localised to the endoplasmic reticulum and vacuole, changing location from endoplasmic reticulum to pre-spore-specific vacuoles during late development. DIA2 accumulates in differentiating cells starved just before the PS point, with no detectable expression in vegetatively growing cells.
