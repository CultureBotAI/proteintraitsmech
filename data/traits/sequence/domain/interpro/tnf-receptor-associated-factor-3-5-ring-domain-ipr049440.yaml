identifier: InterPro:IPR049440
label: "TNF receptor-associated factor 3/5, RING domain"
definition: >-
  This is the RING domain of TNF receptor-associated factors 3 and 5 (TRAF3/5). The RING domain is common among ubiquitin E3 ligases and it is found at the N-terminal of TRAFs, followed by a series of zinc fingers and a C-terminal MATH/TRAF domain. This domain, together with the zinc fingers, is required for ligase activity.
