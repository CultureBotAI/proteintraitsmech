identifier: InterPro:IPR055668
label: "Domain of unknown function DUF7244"
definition: >-
  This entry represents an uncharacterised protein found in various bacteriophages that infect bacteria in the family Enterobacteriaceae, including phages of Escherichia, Shigella and Citrobacter. The protein is approximately 55-60 amino acids in length. An AlphaFold model shows this domain adopts a small β barrel structure. This domain is possibly related to the KOW motif.
