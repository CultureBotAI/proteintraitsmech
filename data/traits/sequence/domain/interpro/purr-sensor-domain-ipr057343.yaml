identifier: InterPro:IPR057343
label: "PurR, sensor domain"
definition: >-
  This entry represents the sensor domain found at the C-terminal in members of the PurR family. Dimerisation sites are present in the C-terminal domain, and binding of corepressors is cooperative. This domain is also present in ribose operon repressor proteins. The purR gene encodes a transcriptional repressor of the HTH-type, which is responsible for controlling the syntehsis of enzymes involved in purine biosynthesis. PurR is dimeric and consists of an N-terminal domain for DNA binding and a C-terminal domain that is responsible for corepressor (hypoxanthine and guanine) binding. The LacI/GalR family, which includes the LacL superfamily, represents one of the largest and most diverse groups of bacterial transcriptional regulators. These proteins play crucial roles in regulating various aspects of bacterial metabolism, particularly carbohydrate utilisation. Characterised by a conserved N-terminal helix-turn-helix (HTH) DNA-binding motif and a C-terminal regulatory domain that binds effector molecules , members of this family can function as both repressors and activators, though most act as repressors. They typically respond to specific effector molecules, often sugars or metabolites, which modulate their DNA-binding affinity and consequently their regulatory activity. This allows bacteria to fine-tune gene expression in response to environmental conditions and available carbon sources. Some well-characterised members of this family include: LacI (lactose operon repressor) in Escherichia coli GalR (galactose operon repressor) in Escherichia coli PurR (purine biosynthesis repressor) in various bacteria CcpA (catabolite control protein A) in Gram-positive bacteria FruR (fructose repressor) in Enterobacteriaceae
