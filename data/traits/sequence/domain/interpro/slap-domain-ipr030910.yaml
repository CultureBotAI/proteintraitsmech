identifier: InterPro:IPR030910
label: "SLAP domain"
definition: >-
  This domain is duplicated in SlaP (S-layer assembly protein), a partner of SecA2 in the Bacillus anthracis type of accessory Sec system. The domain is found, either once or twice, in additional Firmicutes species.
