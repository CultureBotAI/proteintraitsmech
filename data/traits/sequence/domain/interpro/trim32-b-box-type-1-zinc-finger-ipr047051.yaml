identifier: InterPro:IPR047051
label: "TRIM32, B-box type 1 zinc finger"
definition: >-
  TRIM32 (also known as 72 kDa Tat-interacting protein, or zinc finger protein HT2A, or BBS11) is an E3 ubiquitin-protein ligase that promotes degradation of several targets, including actin, PIASgamma, Abl interactor 2, dysbindin, X-linked inhibitor of apoptosis (XIAP), p73 transcription factor, among others. It plays important roles in neuronal differentiation of neural progenitor cells, as well as in controlling cell fate in skeletal muscle progenitor cells. It reduces PI3K-Akt-FoxO signalling in muscle atrophy by promoting plakoglobin-PI3K dissociation. It also functions as a pluripotency-reprogramming roadblock that facilitates cellular transition towards differentiation via modulating the levels of Oct4 and cMyc. Moreover, TRIM32 is an intrinsic influenza A virus (IAV) restriction factor which senses and targets the polymerase basic protein 1 (PB1) for ubiquitination and protein degradation. It also plays a significant role in mediating the biological activity of the HIV-1 Tat protein in vivo, binding specifically to the activation domain of HIV-1 Tat; it and can also interact with the HIV-2 and EIAV Tat proteins. TRIM32 also regulates myoblast proliferation by controlling turnover of NDRG2 (N-myc downstream-regulated gene) and it negatively regulates tumour suppressor p53 to promote tumorigenesis. It also facilitates degradation of MYCN on spindle poles and induces asymmetric cell division in human neuroblastoma cells. In addition, TRIM32 plays important roles in regulation of hyperactivities and positively regulates the development of anxiety and depression disorders induced by chronic stress. It also plays a role in regeneration by affecting satellite cell cycle progression via modulation of the SUMO ligase PIASy (PIAS4). Defects in TRIM32 lead to limb-girdle mu…
