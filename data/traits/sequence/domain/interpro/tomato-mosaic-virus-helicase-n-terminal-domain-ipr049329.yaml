identifier: InterPro:IPR049329
label: "Tomato mosaic virus helicase, N-terminal domain"
definition: >-
  Tomato mosaic virus (ToMV) generates two large replication proteins in the host cell. The smaller one contains the methyltransferase domain and the helicase domain (Hel). This core helicase domain consists of two RecA domains and an N-terminal accessory domain, represented in this entry, containing a flexible loop, a long α-helix and an antiparallel, six-stranded β-sheet. This N-terminal domain plays a role in the binding of the host factors TOM1 and ARL8 required for viral replication. It is also found in proteins from related viruses.
