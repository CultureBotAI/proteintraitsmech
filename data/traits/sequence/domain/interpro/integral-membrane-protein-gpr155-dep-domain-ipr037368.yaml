identifier: InterPro:IPR037368
label: "Integral membrane protein GPR155, DEP domain"
definition: >-
  GRP155-like proteins, also known as PGR22, contain an N-terminal permease domain, a central transmembrane region and a C-terminal DEP domain. They are orphan receptors of the class B G protein-coupled receptors. Their function is unknown.
