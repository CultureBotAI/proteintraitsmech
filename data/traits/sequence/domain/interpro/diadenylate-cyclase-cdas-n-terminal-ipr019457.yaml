identifier: InterPro:IPR019457
label: "Diadenylate cyclase CdaS, N-terminal"
definition: >-
  This entry represents an α-hairpin found at the N terminus of bacterial diadenylate cyclase CdaS. These proteins often contain towards the C terminus. CdaS is one of 3 paralogous diadenylate cyclases (DAC) in Bacillus subtilis and B. thuringiensis, catalysing the condensation of 2 ATP molecules into cyclic di-AMP (c-di-AMP). It has slow DAC activity with ADP as a substrate and may have weak ADPase activity. CdaS is required for efficient spore formation in B. thuringiensis, whereas in B.subtilis, it is required for efficient spore germination. It is produced under the control of different sigma factors in the two bacteria. It is also required for parasporal crystal formation.
