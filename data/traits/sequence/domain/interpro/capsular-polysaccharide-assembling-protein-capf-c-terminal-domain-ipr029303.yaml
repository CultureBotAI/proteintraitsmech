identifier: InterPro:IPR029303
label: "Capsular polysaccharide assembling protein CapF, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of proteins homologous to Staphylococcus aureus CapF (also known as WbjC in Pseudomonas aeruginosa and FnlB in Escherichia coli). CapF is a bifunctional metalloenzyme produced by certain pathogenic bacteria and is essential in the biosynthetic path of capsular polysaccharide (CP), a mucous layer on the surface of bacterium that facilitates immune evasion and infection. CapF is an antibacterial/therapeutic target. In S. aureus, enzymes CapE, CapF and CapG catalyse the sequential transformation of UDP-D-GlcNAc in the CP precursor UDP-L-FucNAc via the intermediate compound UDP-N-acetyl-L-talosamine (UDP-L-TalNAc). CapF consists of two domains; the C-terminal cupin-like domain catalyses the epimerisation of the compound produced by the upstream enzyme CapE, and the N-terminal short-chain dehydrogenase/reductase (SDR) domain catalyses the reduction of the compound afforded by the cupin domain, requiring one equivalent of NADPH. The cupin domain is crucial for catalysing the first chemical reaction, and also important for the stability of the enzyme. Similarly, in P. aeruginosa, WbjC, WbjB and WbjD enzymes synthesise UDP-N-acetyl-L-reexamine, a precursor of the lipopolysacharide component L-fucosamine. The N-terminal domain adopts a Rossmann fold and the cupin domain contains a typical "jelly roll-like" β-barrel fold.
