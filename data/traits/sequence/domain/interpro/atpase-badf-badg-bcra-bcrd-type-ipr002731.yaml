identifier: InterPro:IPR002731
label: "ATPase, BadF/BadG/BcrA/BcrD type"
definition: >-
  This domain is found in the BadF and BadG proteins that are two subunits of Benzoyl-CoA reductase, that may be involved in ATP hydrolysis. The family also includes an activase subunit from the enzyme 2-hydroxyglutaryl-CoA dehydratase. The hypothetical protein AQ_278 from Aquifex aeolicus contains two copies of this region suggesting that the family may structurally dimerise.
