identifier: InterPro:IPR049303
label: "Glycosyl hydrolase 109, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the group of bacterial glycosyl hydrolases 109, including Alpha-N-acetylgalactosaminidase from Elizabethkingia meningoseptica. This domain shows a large open-faced, seven-stranded, anti-parallel β-sheet, adjacent to nine α-helices and an α-helical bundle covering the dinucleotide-binding tunnel.
