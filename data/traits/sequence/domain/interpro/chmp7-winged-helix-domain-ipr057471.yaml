identifier: InterPro:IPR057471
label: "CHMP7, winged helix domain"
definition: >-
  This entry represents the winged helix domain in CHMP7 and similar animal proteins. Charged multivesicular body protein 7 (CHMP7) is an endosomal sorting complex required for transport (ESCRT)-III-like protein required to recruit the ESCRT-III complex to the nuclear envelope during late anaphase. It plays a role in the endosomal sorting pathway.
