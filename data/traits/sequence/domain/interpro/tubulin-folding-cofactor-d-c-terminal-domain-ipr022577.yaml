identifier: InterPro:IPR022577
label: "Tubulin-folding cofactor D, C-terminal domain"
definition: >-
  This region is found in TBCD and its paralogues in eukaryotes. It is typically between 182 and 199 amino acids in length. There is a single completely conserved residue R that may be functionally important. Tubulin-folding cofactor D (TBCD) can interact with beta tubulin, which is regulated via its interaction with ARL2 (ADP ribosylation factor-like protein 2), a small monomeric G protein. ARL2 inhibits the beta-tubulin GTPase activating protein (GAP) activity of TBCD, and its interaction with native tubulin dimers. TBCD does not co-polymerise with microtubules either in vivo or in vitro, but instead modulates microtubule dynamics by sequestering beta-tubulin from GTP-bound alpha/beta-heterodimers in microtubules. The tubulin heterodimer consists of one alpha- and one beta-tubulin polypeptide. In humans, five tubulin-specific chaperones termed TBCA/B/C/D/E are essential for bring the alpha- and beta-tubulin subunits together into a tightly associated heterodimer. Following the generation of quasi-native beta- and alpha-tubulin polypeptides (via multiple rounds of ATP-dependent interaction with the cytosolic chaperonin), TBCA and TBCB bind to and stabilise newly synthesised beta- and alpha-tubulin, respectively. The exchange of beta-tubulin between TBCA and TBCD, and of alpha-tubulin between TBCB and TBCE, resulting in the formation of TBCD/beta and TBCE/alpha. These two complexes then interact with each other and form a supercomplex (TBCE/alpha/TBCD/beta). Interaction of the supercomplex with TBCC causes the disassembly of the supercomplex and the release of E-site GDP-bound alpha/beta tubulin heterodimer, which becomes polymerization competent following spontaneous exchange with GTP.
