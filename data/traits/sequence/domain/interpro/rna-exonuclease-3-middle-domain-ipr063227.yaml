identifier: InterPro:IPR063227
label: "RNA exonuclease 3, middle domain"
definition: >-
  This entry represents a conserved domain found in the middle region of RNA exonuclease 3 (REX3/REXO3) proteins. This domain is located between the N-terminal region and the C-terminal RNase_T domain in fungal RNA exonuclease 3 proteins. RNA exonuclease 3 is a 3' to 5' exoribonuclease required for proper 3' end maturation of MRP RNA and U5L snRNA. The proteins are localised to both the cytoplasm and nucleus and belong to the REXO1/REXO3 family. The specific function of this middle domain remains to be determined.
