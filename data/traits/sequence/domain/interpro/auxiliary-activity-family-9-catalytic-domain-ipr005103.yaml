identifier: InterPro:IPR005103
label: "Auxiliary Activity family 9, catalytic domain"
definition: >-
  This entry represents the lytic polysaccharide monooxygenase (LPMO) domain of AA9. Although weak endoglucanase activity has been demonstrated in several members of this family, they lack the clustered conserved catalytic acidic amino acids present in most glycoside hydrolases. Many members of this family lack measurable cellulase activity on their own, but enhance the activity of other cellulolytic enzymes. They are therefore unlikely to be true glycoside hydrolases. The substrate-binding surface of this family is a flat Ig-like fold. This family of enzymes were originally classified as glycoside hydrolases (GH61) and they have been reclassified as the Auxiliary Activity Family 9 ( ,) of CAZy.
