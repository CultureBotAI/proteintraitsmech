identifier: InterPro:IPR034781
label: "Scaffold attachment factor B1/2, RNA binding domain"
definition: >-
  This entry represents the RNA binding domain (RBD) of SAFB1 and SAFB2. Scaffold attachment factor B (SAFB) family members include SAFB1, SAFB2 and SAFB-like transcriptional modulator, SLTM. They contain an N-terminal DNA-binding (SAF-A/B, Acinus and PIAS, SAP) domain, an RNA-binding domain (RBD) and an C-terminal arginine/glycine motif RGG/RG domain. Their RGG/RG domain, which partially overlaps with a putative coiled-coil domain, is most conserved and is likely to be involved in protein-protein interactions. SAFB1 belongs to the scaffold attachment factor B (SAFB) family. It has many functions such as transcriptional repression and RNA splicing. It may also have a role in chromatin organisation. It is involved in in numerous cellular processes including cell growth, stress response, and apoptosis. It plays an important role in cancer, particularly in breast tumourigenesis. SAFB2 is a homologue of SAFB1 that function as an estrogen receptor corepressor and can also inhibit cell proliferation.
