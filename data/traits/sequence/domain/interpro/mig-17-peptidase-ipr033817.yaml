identifier: InterPro:IPR033817
label: MIG-17 peptidase
definition: >-
  The adamalysin-like or ADAM family of metalloproteases (peptidase subfamily M12B) contains proteolytic domains from snake venoms, proteases from the mammalian reproductive tract, and the tumor necrosis factor alpha convertase, TACE. ADAMs (A Disintegrin And Metalloprotease) are glycoproteins, which play roles in cell signaling, cell fusion, and cell-cell interactions. Some ADAM proteins contain thrombospondin repeats and are known as ADAMTS proteins. This entry contains the MIG-17 peptidase (MEROPS identifier M12.019) found in nematodes. MIG-17 is an ADAMTS and is important for the directed migration of gonadal dorsal tip cells. It is secreted from the body wall muscle cells and localizes to the gonadal basement membrane via its prodomain, where it autoactivates.
