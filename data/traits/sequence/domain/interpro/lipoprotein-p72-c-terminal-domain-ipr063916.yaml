identifier: InterPro:IPR063916
label: "Lipoprotein p72, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of lipoprotein p72, found in Mycoplasmatota. The full-length protein is an immunodominant lipoprotein that belongs to the mycoplasma p72 lipoprotein family ( ) and may play a role in virulence. The specific function of this domain remains to be determined.
