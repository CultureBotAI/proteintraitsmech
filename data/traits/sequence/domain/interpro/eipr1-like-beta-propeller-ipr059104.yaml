identifier: InterPro:IPR059104
label: "EIPR1-like, beta-propeller"
definition: >-
  This entry represents the β-propeller domain found at the N-terminal end in EARP and GARP complex-interacting protein 1 (EIPR1) and similar eukaryotic proteins. EIPR1 is a component of the endosomal retrieval machinery, binding to both the Endosome-Associated Recycling Protein (EARP) and Golgi-Associated Retrograde Protein (GARP) tethering complexes. GARP and EARP participate in SNARE-dependent fusion of endosome-derived carriers with the trans-Golgi network and recycling endosomes, respectively. EIPR1 is required for the stability of the EARP complex subunits and for the localisation of EARP and its association with membranes, but does not affect localisation or function of the related GARP complex. WD repeat-containing protein (DWA2) from Arabidopsis thaliana is also a member of this family. DWA2 is a component of an E3 ubiquitin-protein ligase complex that acts as negative regulator in abscisic acid signalling.
