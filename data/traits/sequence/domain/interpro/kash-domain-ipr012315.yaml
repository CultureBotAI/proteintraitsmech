identifier: InterPro:IPR012315
label: KASH domain
definition: >-
  The KASH (Klarsicht/ANC-1/Syne-1 homology), or KLS domain is a highly hydrophobic nuclear envelope localization domain of approximately 60 amino acids comprising a 20-amino-acid transmembrane region and a 30-35-residue C-terminal region that lies between the inner and the outer nuclear membranes. The KASH domain is found in association with other domains, such as spectrin repeats and CH, at the C terminus of proteins tethered to the nuclear membrane in diverse cell types. Some proteins known to contain a KASH domain are listed below: Caenorhabditis elegans nuclear anchorage protein 1 (ANC-1). Drosophila Klarsicht (Klar), a protein associated with nuclei and required for a subset of nuclear migrations. Drosophila MSP-300. Vertebrate nesprin-1, -2, -3 and -4 (also known as Syne1-4). They are components of the linker of the nucleoskeleton and cytoskeleton (LINC) complex, which plays critical roles in nuclear positioning, cell polarisation and cellular stiffness.
