identifier: InterPro:IPR029141
label: "Major fimbrial subunit protein, N-terminal"
definition: >-
  This entry represents the N-terminal of the major fimbrial subunit protein (FimA). FimA is the structural subunit of the fimbriae, which are filamentous appendages on the cell surface. Fimbriae of P.gingivalis are recognied as a major virulence factor as they mediate cell adhesion and play an important role in invasion of periodontal tissues. FimA proteins have been classified into five types, types I to V, based on nucleotide sequences. It has been found that type II FimA can bind to epithelial cells most efficiently through specific host receptors.
