identifier: InterPro:IPR031850
label: "Fungal kinase associated-1 domain"
definition: >-
  This domain is found at the C terminus of yeast septin-associated kinases (Kcc4, Gin4 and Hsl1). It is a membrane association domain that binds acidic phospholipids. The structure of this domain has been revealed.
