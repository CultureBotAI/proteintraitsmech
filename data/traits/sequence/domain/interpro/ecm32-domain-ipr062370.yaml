identifier: InterPro:IPR062370
label: "ECM32 domain"
definition: >-
  This domain is found in the putative ATP-dependent RNA helicase ECM32 from Saccharomyces cerevisiae, which may be involved in modulation of the translation termination process. This domain is predicted to adopt a mostly β structure.
