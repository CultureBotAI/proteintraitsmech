identifier: InterPro:IPR060164
label: "Maintenance of telomere capping protein 4, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of maintenance of telomere capping protein 4 (MTC4). MTC4 is a 694 amino acid protein found primarily in fungi, particularly in the Ascomycota phylum. The full-length MTC4 protein is involved in telomere maintenance and capping functions in Saccharomyces cerevisiae. This N-terminal domain is conserved across fungal species. The specific function of this N-terminal domain remains to be determined.
