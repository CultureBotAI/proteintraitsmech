identifier: InterPro:IPR024554
label: "PX domain-containing protein LEC1-like, C-terminal"
definition: >-
  The function of this domain is not known, and it is found in fungal proteins, including LEC1/YPR097W from budding yeast and C663.15c/C1450.12 from fission yeast. They contain this domain, known as DUF3818 and PXA domains. LEC1 is a phosphoinositide-binding protein that plays a role in regulation of ergosterol distribution in the cell. It facilitates ergosterol transport between plasma membrane and lipid droplets.
