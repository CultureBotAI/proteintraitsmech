identifier: InterPro:IPR058952
label: "CFAP47-like, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like (Ig-like) domain is found towards the C-terminal end of human Cilia- and flagella-associated protein 47 (CFAP47), which plays a role in flagellar formation and sperm motility. Members of this group are mainly found in animals.
