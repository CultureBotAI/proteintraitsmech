identifier: InterPro:IPR057576
label: "NUCB1-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of rat Nucb1/2 and similar animal proteins predicted to also have an EF-hand domain. This domain is predicted to adopt an all-α configuration. Nucb2 is a calcium-binding protein that may have a role in calcium homeostasis. It can be cleaved into an isoform named nesfatin-1, which is an anorexigenic peptide that seems to play an important role in hypothalamic pathways regulating food intake and energy homeostasis, acting in a leptin-independent manner. Nucb1 is a major calcium-binding protein of the Golgi, which may have a role in calcium homeostasis. Nucb1/2 act as non-receptor guanine nucleotide exchange factors which bind to and activate alpha subunits of guanine nucleotide-binding proteins (G proteins). Nucb1 is expressed in pancreatic islets and other endocrine tissues and may have a role in in Ca(2+) handling/sensing in secretory cells. Nucleobindin-1 encodes a nesfatin-1-like peptide that stimulates insulin secretion.
