identifier: InterPro:IPR058777
label: "TXNDC11, thioredoxin-like domain"
definition: >-
  This domain is found in the human Thioredoxin domain-containing protein 11 (TXNDC11) and related proteins from vertebrates. TXNDC11 is overexpressed in glioma and its high expression levels are usually associated with a poor clinical prognosis. TXNDC11 acts as a redox regulator involved in protein folding of thyroid oxidase. TXNDC11 is a multidomain protein and contains several thioredoxin-like domains . This entry represents the second of them.
