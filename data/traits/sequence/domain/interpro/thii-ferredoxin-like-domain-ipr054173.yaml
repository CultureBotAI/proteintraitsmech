identifier: InterPro:IPR054173
label: "ThiI, ferredoxin-like domain"
definition: >-
  This entry represents the ferredoxin-like domain found at the N-terminal of ThiI proteins (NFLD). ThiI is responsible for the formation of the modified base S(4)U (4-thiouridine) found at position 8 in some prokaryotic tRNA. This domain connects the C-terminal catalytic PP-loop pyrophosphatase domain with the THUMP ( ). NFLD and the THUMP domains jointly form the tRNA-binding surface shaped like a channe which may be of particular importance in ThiI for the correct orientation and distance between residues involved in RNA binding and the active site of the enzyme.
