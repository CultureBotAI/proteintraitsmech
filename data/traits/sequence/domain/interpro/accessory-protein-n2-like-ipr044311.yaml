identifier: InterPro:IPR044311
label: "Accessory protein N2-like"
definition: >-
  This entry includes protein I (also known as accessory protein N2) from bovine enteritic coronavirus-F15 strain (BECV-F15) and related Embecoviruses (A lineage) including murine hepatitis virus. The gene encoding protein I is included in the N gene as an alternative ORF. Protein I appears to have no homologous proteins in Sarbecovirus lineage B, which includes Severe acute respiratory syndrome (SARS) coronavirus (SARS-CoV) and SARS-CoV-2 (2019 novel coronavirus, 2019-nCoV). BECV-F15 protein I is not essential for viral replication. It is related to the ORF8b accessory protein of Middle East respiratory syndrome-related coronavirus (MERS-CoV) and other related merbecoviruses (C lineage); the gene encoding ORF8b is an internal ORF that is overlapped by the N (nucleocapsid) protein gene (ORF8a).
