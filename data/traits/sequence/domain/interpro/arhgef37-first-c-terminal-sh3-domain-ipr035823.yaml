identifier: InterPro:IPR035823
label: "ARHGEF37, first C-terminal SH3 domain"
definition: >-
  ARHGEF37 contains a RhoGEF (or Dbl homology, DH) domain followed by a Bin/Amphiphysin/Rvs (BAR) domain, and two C-terminal SH3 domains. Its specific function is unknown. Its domain architecture is similar to the C-terminal half of DNMBP or Tuba, a cdc42-specific GEF that provides a functional link between dynamin, Rho GTPase signaling, and actin dynamics, and plays an important role in regulating cell junction configuration. GEFs activate small GTPases by exchanging bound GDP for free GTP. This entry represents the firs C-terminal SH3 domain of ARHGEF37.
