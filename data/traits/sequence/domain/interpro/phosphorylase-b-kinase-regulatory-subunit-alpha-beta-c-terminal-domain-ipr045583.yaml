identifier: InterPro:IPR045583
label: "Phosphorylase b kinase regulatory subunit alpha/beta, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of KPBA/B, that has been proposed as the second calcineurin B-like (CBL-2) containing a gamma subunit-binding site. Phosphorylase kinase (PHK) is a hexadecameric enzyme complex consisting of four copies each of four different subunits: alpha, beta, delta and gamma that plays a role in glycogen metabolism. During activation of glycogenolysis, this protein complex phosphorylates and activates glycogen phosphorylase (GP). The gamma subunit is the catalytic protein kinase, while alpha, beta and delta subunits control its activity. This entry represents several phosphorylase kinase regulatory alpha and beta subunits (KPBA/B), which interact directly with GP. Mutations in the gene encoding the alpha subunit of PHK (PHKA2) have been shown to be responsible for X-linked liver glycogenosis (XLG). XLG, a frequent type of glycogen storage disease, is characterised by hepatomegaly and growth retardation.
