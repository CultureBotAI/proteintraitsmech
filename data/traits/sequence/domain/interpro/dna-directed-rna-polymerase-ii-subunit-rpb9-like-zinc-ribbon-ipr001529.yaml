identifier: InterPro:IPR001529
label: DNA-directed RNA polymerase II subunit RPB9-like, zinc ribbon
definition: >-
  This entry represents a zinc ribbon domain found at the terminal of DNA-directed RNA polymerase II subunit RPB9, DNA-directed RNA polymerase III subunit RPC10, archaeal Transcription factor S and similar sequences. RPB9 is the core component of RNA polymerase II, the central component of the basal RNA polymerase II transcription machinery. POLR2I/RPB9 is part of the upper jaw surrounding the central large cleft and thought to grab the incoming DNA template. DNA-directed RNA polymerase III subunit RPC10 is a core component of RNA polymerase III (Pol III) which synthesises small non-coding RNAs using the four ribonucleoside triphosphates as substrates. Proteins containing this domain also include transcription factor S (TFS), a protein related in size and sequence to DNA-directed RNA polymerase subunit M, and in sequence and function to the much larger eukaryotic transcription factor IIS (TFIIS). Although originally suggested to be a subunit of the archaeal RNA polymerase (known as archaeal DNA-directed RNA polymerase subunit M), it elutes separately from active polymerase in gel filtration experiments and acts, like TFIIs, as an induction factor for RNA cleavage by RNA polymerase. In archaebacteria, there is generally a single form of RNA polymerase which also consist of an oligomeric assemblage of 10 to 13 polypeptides. It has recently been shown that small subunits of about 15kDa, found in polymerase types I and II, are highly conserved. These proteins contain a probable zinc finger in their N-terminal region and a C-terminal zinc ribbon domain (see ) DNA-directed RNA polymerases (also known as DNA-dependent RNA polymerases) are responsible for the polymerisation of ribonucleotides into a sequence complementary to the template DNA. In eukaryotes, there are three diffe…
