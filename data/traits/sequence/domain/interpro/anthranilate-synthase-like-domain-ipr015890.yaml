identifier: InterPro:IPR015890
label: "Anthranilate synthase-like domain"
definition: >-
  This entry represents the catalytic regions of the chorismate binding enzymes anthranilate synthase, aminodeoxychorismate synthase and salicylate synthase. Anthranilate synthase is involved in the catalysis of the the two-step biosynthesis of anthranilate. It catalyses the reaction: chorismate + l-glutamine = anthranilate + pyruvate + l-glutamate. The enzyme is a tetramer comprising 2 I and 2 II components: this entry is restricted to component I that catalyses the formation of anthranilate using ammonia rather than glutamine, while component II provides glutamine amidotransferase activity. Aminodeoxychorismate synthase catalyses the two-step biosynthesis of 4-amino-4-deoxychorismate (ADC).
