identifier: InterPro:IPR048419
label: "TOPLESS, zinc finger domain"
definition: >-
  This is the zinc finger domain of TOPLESS and TOPLESS-related proteins. TOPLESS are tetrameric plant transcriptional co-repressors that belong to the conserved Tup1/Groucho/TLE (transducin-like enhancer of split) family. The function of this zinc finger is unclear.
