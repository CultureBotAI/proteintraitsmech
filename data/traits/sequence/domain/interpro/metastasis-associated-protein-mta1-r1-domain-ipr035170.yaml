identifier: InterPro:IPR035170
label: "Metastasis-associated protein MTA1, R1 domain"
definition: >-
  The R1 domain is found in the MTA1 protein and its homologues. The domain is composed of 4 α helices. It has been shown to bind to the RBBP4 protein. The MTA proteins contain a second partial copy of this domain called R2. The R2 domain is matched by this model for some proteins.
