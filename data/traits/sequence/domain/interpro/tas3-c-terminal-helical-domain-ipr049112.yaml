identifier: InterPro:IPR049112
label: "Tas3, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal α-helical domain which self-associates into a helical polymer and is required for cis spreading of RITS in centromeric DNA regions. RNA-induced transcriptional silencing complex protein tas3 (Tas3) ( ) plays a role in the RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. It is part of the RNA-induced transcriptional silencing (RITS) complex which provides a physical tether between the RNAi and heterochromatin assembly pathways.
