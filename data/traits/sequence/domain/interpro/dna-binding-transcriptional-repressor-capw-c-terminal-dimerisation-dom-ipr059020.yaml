identifier: InterPro:IPR059020
label: "DNA-binding transcriptional repressor CapW, C-terminal dimerisation domain"
definition: >-
  This entry represents the C-terminal dimerization domain of BrxR family of transcriptional regulators including CapW and BrxR. BrxR is a three-domain protein that regulates phage defense systems. The C-terminal domain (residues 200-295 in the prototypical BrxR from Escherichia fergusonii) is responsible for dimerization. BrxR functions as a transcriptional repressor that controls expression of diverse phage defense systems such as BREX and Type IV restriction enzymes. The BrxR protein typically consists of an N-terminal winged helix-turn-helix domain , a central WYL domain , and this C-terminal dimerisation domain .
