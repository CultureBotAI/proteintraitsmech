identifier: InterPro:IPR032136
label: "Neutrophil cytosol factor 1, PBR/AIR"
definition: >-
  This entry represents the polybasic or autoinhibitory region (PBR/AIR, an arginine/lysine rich region) found after the second SH3 domain in neutrophil cytosol factor 1 (NCF1/p47phox). NCF1 is one of the cytosolic regulatory components of NADPH oxidase and consists of a PX domain at the N-terminal, two tandem SH3 domains, a PBR/AIR and a proline-rich region at the C-terminal. In the resting state, the SH3 domains of NCF1 are masked by an intramolecular interaction with the PBR/AIR, which maintains the enzyme in an inactive form.
