identifier: InterPro:IPR004910
label: Yippee/Mis18/Cereblon
definition: >-
  This domain is found in both Yippee-type proteins and Mis18 kinetochore proteins. Yippee are putative zinc-binding/DNA-binding proteins. Mis18 are proteins involved in the priming of centromeres for recruiting CENP-A. Mis18-alpha and beta form part of a small complex with Mis18-binding protein. Mis18-alpha is found to interact with DNA de-methylases through a Leu-rich region located at its carboxyl terminus. This domain includes the CULT domain from proteins such as Cereblon. Pro-Apoptotic protein MOH1 from S.cerevisiae is involved in mitochondria-dependent apoptosis induced by DNA damage.
