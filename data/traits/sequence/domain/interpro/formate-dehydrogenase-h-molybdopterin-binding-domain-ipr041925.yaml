identifier: InterPro:IPR041925
label: "Formate dehydrogenase H, molybdopterin-binding domain"
definition: >-
  Formate dehydrogenase H (Formate-Dh-H) catalyzes the reversible oxidation of formate to CO2 with the release of a proton and two electrons. It is a component of the anaerobic formate hydrogen lyase complex. The E. coli formate dehydrogenase H (Fdh-H) is a monomer composed of a single polypeptide chain with a Mo active site region and a [4Fe-4S] centre. This entry represents the conserved molybdopterin-binding C-terminal domain. This domain is also found at the C-terminal of F420-dependent formate dehydrogenase subunit alpha from Methanobacterium formicicum, which catalyses the oxidation of formate to carbon dioxide, with coenzyme F420 as the electron acceptor.
