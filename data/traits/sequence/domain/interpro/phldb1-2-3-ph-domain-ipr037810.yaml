identifier: InterPro:IPR037810
label: "PHLDB1/2/3, PH domain"
definition: >-
  PHLDB1, -2, and -3 (or LL5alpha, -beta, and -gamma) belong to the LL5 protein family. They contain a C-terminal PH domain. PHLDB3 is shorter and has no similarities with PHLDB1 and PHLDB2 in other regions, including the CLASP-binding region.
