identifier: InterPro:IPR060293
label: "Trehalose phosphorylase-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain in putative Trehalose phosphorylase (TreT) proteins mostly found in fungi. This domain adopts a RNase-like fold. The core architecture typically features a central five-stranded β-sheet flanked by several α-helices.
