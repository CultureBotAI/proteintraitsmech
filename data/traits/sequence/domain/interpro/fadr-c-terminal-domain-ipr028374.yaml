identifier: InterPro:IPR028374
label: FadR, C-terminal domain
definition: >-
  Bacteria regulate membrane fluidity by manipulating the relative levels of saturated and unsaturated fatty acids within the phospholipids of their membrane bilayers. In Escherichia coli, the transcription factor, FadR, functions as a switch that co-ordinately regulates the machinery required for fatty acid beta-oxidation and the expression of a key enzyme in fatty acid biosynthesis. This single repressor controls the transcription of the whole fad regulon. Binding of fadR is specifically inhibited by long chain fatty acyl-CoA compounds. The crystal structure of FadR reveals a two domain dimeric molecule where the N-terminal winged-helix domain binds DNA ( ), and the C-terminal domain binds acyl-CoA. The binding of acyl-CoA to the C-terminal domain results in a conformational change that affects the DNA binding affinity of the N-terminal domain. FadR is a member of the GntR family of bacterial transcription regulators. The DNA-binding domain is well conserved for this family, whereas the C-terminal effector-binding domain ( ) is more variable, and is consequently used to define the GntR subfamilies. The FadR group is the largest subgroup, and is characterised by an all-helical C-terminal domain composed of 6 to 7 α helices. This entry represents the C-terminal domain of FadR.
