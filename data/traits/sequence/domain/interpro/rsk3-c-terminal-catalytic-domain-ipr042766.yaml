identifier: InterPro:IPR042766
label: RSK3, C-terminal catalytic domain
definition: >-
  STKs (serine/threonine-protein kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. RSK3 (also known as RPS6KA2) is one of four RSK isoforms (RSK1-4) from distinct genes present in vertebrates. RSK3 binds muscle A-kinase anchoring protein (mAKAP)-b directly and regulates concentric cardiac myocyte growth. The RSK3 gene, RPS6KA2, is a putative tumour suppressor gene in sporadic epithelial ovarian cancer and variations to the gene may be associated with rectal cancer risk. RSKs (90kDa ribosomal S6 kinases) contain an N-terminal kinase domain (NTD) from the AGC family and a C-terminal kinase domain (CTD) from the CAMK family. They are activated by signalling inputs from extracellular regulated kinase (ERK) and phosphoinositide dependent kinase 1 (PDK1). ERK phosphorylates and activates the CTD of RSK, serving as a docking site for PDK1, which phosphorylates and activates the NTD, which in turn phosphorylates all known RSK substrates. RSKs act as downstream effectors of mitogen-activated protein kinase (MAPK) and play key roles in mitogen-activated cell growth, differentiation, and survival.
