identifier: InterPro:IPR054217
label: "Domain of unknown function DUF6937"
definition: >-
  This domain is found N-terminal in a family of uncharacterised proteins. This domain has a significant sequence similarity to the N-terminal domains of a number of proteins members of UDP-Glycosyltransferase/glycogen phosphorylase superfamily. It is predicted to adopt the same α/β structure.
