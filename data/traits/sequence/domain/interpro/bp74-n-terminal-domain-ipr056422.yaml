identifier: InterPro:IPR056422
label: "BP74, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of the Cyclic AMP-inducible protein BP74 from Dictyostelium discoideum and related proteins. The BP74 gene is a cyclic AMP-regulated and expressed during the Dictyostelium development. This domain is predicted to fold into an open β-barrel capped with two α-helices.
