identifier: InterPro:IPR037319
label: Rrp40, S1 domain
definition: >-
  Rrp40 is a non-catalytic component of the RNA exosome complex which has 3'->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. In Saccharomyces cerevisiae, the exosome includes nine core components, six of which are homologous to bacterial RNase PH. These form a hexameric ring structure. The other three subunits (RrP4, Rrp40, and Csl4) contain an S1 RNA binding domain and are part of the "S1 pore structure". This entry represents the S1 domain of Rrp40. The S1-like RNA-binding domain has been found in a wide variety of RNA-associated proteins.
