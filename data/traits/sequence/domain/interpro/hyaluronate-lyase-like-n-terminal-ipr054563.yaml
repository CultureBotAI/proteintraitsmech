identifier: InterPro:IPR054563
label: "Hyaluronate lyase-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of hyaluronate lyases (HylB) mainly found in Lactobacillales. These enzymes degrade hyaluronan and certain chondroitin sulfates at beta-1,4 glycosidic linkages and constitutes a virulence factor in Streptococcus agalactiae. This domain is also found in accessory protein BppA and related proteins. Given the structural similarity to carbohydrate binding domains, it is likely that this domain is a carbohydrate binding module. BppA is a virion baseplate component. The precise role of this protein in absorption is elusive but the presence of a carbohydrate binding domain with an extended saccharide binding site suggests that this protein probably participates in receptor binding together with the bona fide receptor binding proteins.
