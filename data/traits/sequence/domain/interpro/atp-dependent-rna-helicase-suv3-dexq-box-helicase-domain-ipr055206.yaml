identifier: InterPro:IPR055206
label: "ATP-dependent RNA helicase SUV3, DEXQ-box helicase domain"
definition: >-
  This entry represents the DEXQ-box helicase domain found in ATP-dependent RNA helicase SUPV3L1 (Suv3) and similar sequences from eukaryotes and bacteria. SUV3 is a major helicase player in mitochondrial RNA metabolism. It is a component of the mitochondrial degradosome (mtEXO) complex, that degrades 3' overhang double-stranded RNA with a 3'-to-5' directionality in an ATP-dependent manner. It is also involved in the degradation of non-coding mitochondrial transcripts and tRNA-like molecules.
