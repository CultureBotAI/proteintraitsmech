identifier: InterPro:IPR055218
label: "Amylosucrase, C-terminal domain"
definition: >-
  This entry represents a domain found C-terminal in Amylosucrase from Neisseria polysaccharea (Ams) and similar bacterial proteins. Ams catalyses the synthesis of alpha-glucan from sucrose. This domain follows the catalytic β/α barrel domain ( ). It folds into a β-sandwich with a greek-key topology.
