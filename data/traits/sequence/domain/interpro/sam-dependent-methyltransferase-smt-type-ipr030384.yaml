identifier: InterPro:IPR030384
label: SAM-dependent methyltransferase SMT-type
definition: >-
  Sterol 24-C-methyltransferase Erg6 from fission yeast catalyses the methyl transfer from S-adenosyl-methionine (SAM) to the C-24 of zymosterol to form fecosterol. It is involved in the biosynthesis of ergosterol, which is important for plasma membrane structure and function. Arabidopsis contains three sterol methyltransferases (SMT1, SMT2, and SMT3) homologous to yeast Erg6. This entry represents a domain found in the Erg6/SMT (S-adenosyl-L-methionine (SAM):C-24 sterol methyl transferase) proteins.
