identifier: InterPro:IPR035477
label: "SH3PXD2B, SH3 domain 1"
definition: >-
  This entry represents the first SH3 domain of SH3PXD2B. SH3 and PX domain-containing protein 2B (SH3PXD2B, also known as Fad49 or Tks4) is an adaptor protein required for functional podosome formation. It binds matrix metalloproteinases (ADAMs), NADPH oxidases (NOXs) and phosphoinositides. It regulates epidermal growth factor-dependent cell migration and has been linked to cancer. Mutations in the SH3PXD2B gene cause Frank-ter Haar syndrome, a rare disease characterised by abnormalities that affect bone, heart, and eye development. It contains an N-terminal Phox homology (PX) domain and four SH3 domains.
