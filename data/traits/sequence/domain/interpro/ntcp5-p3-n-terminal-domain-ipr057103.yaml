identifier: InterPro:IPR057103
label: "NTCP5/P3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Sodium/bile acid cotransporter 5 (NTCP5) and protein P3 from animals, which may have bile acid:sodium symporter activity. This domain is predicted to adopt a β-sandwich fold.
