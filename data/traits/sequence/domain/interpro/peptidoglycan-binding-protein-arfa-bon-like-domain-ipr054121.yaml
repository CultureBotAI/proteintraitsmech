identifier: InterPro:IPR054121
label: "Peptidoglycan-binding protein ArfA, BON-like domain"
definition: >-
  This entry represents BON-like domain found in Peptidoglycan-binding protein ArfA from Mycobacterium tuberculosis, which appears to lack the first α-helix of the classical BON domain structure. ArfA is thought to play a role in ammonia secretion, although it does not play a direct role in ammonia transport. This domain precedes the BON domain and shows an α-β configuration.
