identifier: InterPro:IPR033836
label: Maspin, serpin domain
definition: >-
  Maspin (mammary serine proteinase inhibitor; Serpin B5; MEROPS identifier I04.980) is a non-inhibitory member of the serpin superfamily (clade B), with a multitude of effects on cells and tissues at an assortment of developmental stages. Maspin has tumor suppressing activity against breast and prostate cancer. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones.
