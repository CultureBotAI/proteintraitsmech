identifier: InterPro:IPR047515
label: "Forkhead box protein L2, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXL2 and similar sequences from animals. The FH domain is a winged helix DNA-binding domain. Forkhead box protein L2 (FOXL2) is a transcriptional regulator that is essential for ovary differentiation and maintenance, and repression of the genetic program for somatic testis determination. Mutations in the FOXL2 gene cause blepharophimosis-ptosis-epicanthus inversus syndrome (BPES) types I and II, a rare genetic disorder. In BPES type I, a complex eyelid malformation is associated with premature ovarian failure (POF), whereas in BPES type II, the eyelid defect occurs as an isolated entity. This group of proteins also includes the homologue Forkhead transcription factor fkh-6 from Caenorhabditis elegans, which is involved in male germ-line sex determination and male gonad development.
