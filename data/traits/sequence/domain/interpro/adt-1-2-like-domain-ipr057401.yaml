identifier: InterPro:IPR057401
label: "Adt-1/2-like domain"
definition: >-
  This domain is found in A disintegrin and metalloproteinase with thrombospondin motifs adt-1/2 from Caenorhabditis elegans and similar proteins. This domain is predicted to mostly acquire a β-structure. This domain is usually found in association with . It is also found in putative ADAM metallopeptidase and other uncharacterised animal proteins. Adt-1 plays a role in ray morphogenesis in the male tail, probably by remodelling the extracellular matrix (ECM) in the cuticle. Its orthologue in Rattus norvegicus is known as ADAM metallopeptidase with thrombospondin type 1 motif, 16.
