identifier: InterPro:IPR032337
label: "RPRD1A/B, C-terminal domain"
definition: >-
  Regulation of nuclear pre-mRNA domain-containing protein 1A/B (RPRD1A/B, RPRD1B is also known as CREPT, cell-cycle alteration and expression-elevated protein in tumour) belong to a family of eukaryotic transcriptional regulators that promote the binding of RNA-polymerase to the CYCLIN D1, CCDN1, promoter and other genes involved in the cell-cycle. It promotes the formation of a chromatin loop in the CYCLIN D1 gene, and is preferentially expressed in a range of different human tumours. This entry represents the C-terminal coiled-coil domain which mediates the formation of homo and heterodimers.
