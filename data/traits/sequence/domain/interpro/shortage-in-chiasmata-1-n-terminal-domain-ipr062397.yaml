identifier: InterPro:IPR062397
label: "SHORTAGE IN CHIASMATA 1, N-terminal domain"
definition: >-
  This entry represents a small domain at the N-terminal region in SHOC1 (SHORTAGE IN CHIASMATA 1) found in plant proteins involved in meiotic crossover formation. The domain is found in proteins that are essential for normal crossover formation during meiosis. SHOC1 proteins are essential components for class I meiotic crossover formation and interact with other meiotic proteins such as PTD and ZIP4 to regulate crossover formation. The domain is found in plant proteins that localise to punctate foci on meiotic chromosomes from leptotene to early pachytene. The specific function of this domain remains to be determined.
