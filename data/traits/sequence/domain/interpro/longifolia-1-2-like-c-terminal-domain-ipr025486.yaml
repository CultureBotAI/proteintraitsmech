identifier: InterPro:IPR025486
label: "LONGIFOLIA 1/2-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in Centrosome-associated protein 350 (Cep350), Protein TRM32 and Protein LONGIFOLIA 1/2 found in eukaryotes. This domain contains a helical fold. Cep350 plays an essential role in centriole growth by stabilising a procentriolar seed composed of at least, SASS6 and CPAP. Required for anchoring microtubules to the centrosomes and for the integrity of the microtubule network. Recruits PPARA to discrete subcellular compartments and thereby modulates PPARA activity. LNG2 in association with LNG1, regulates leaf morphology by promoting longitudinal polar cell elongation independently of ROT3. It associates with microtubules and recruits TON1A and TON1B to the cytoskeleton through its C-terminal.
