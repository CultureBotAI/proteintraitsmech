label: "CENTG/AGAP-like, GTPase domain"
definition: >-
  This entry represents a GTPase domain found in the Arf-GAP with GTPase, ANK repeat and PH domain-containing protein (AGAP) and Centaurin-gamma (CENTG). The ADP-ribosylation factor (Arf) family of small GTPases, which belong to the larger Ras superfamily, are involved in many cellular events such as membrane trafficking, actin cytoskeleton dynamics and neurite outgrowth, as well as cell adhesion and cell migration. The function of Arfs depends on the cycle of GTP binding and hydrolysis, which are driven by guanine nucleotide-exchange factors (Arf GEFs) and Arf GTPase-activating proteins (Arf GAPs), respectively. The centaurins (alpha, beta, gamma, and delta) are large, multi-domain proteins that all contain an ArfGAP domain and ankyrin repeats, and in some cases, numerous additional domains. Centaurin gamma contains an additional GTPase domain near its N terminus. The specific function of this GTPase domain has not been well characterised. Centaurin gamma 1 is also called PIKE (phosphatidyl inositol (PI) 3-kinase enhancer) and centaurin gamma 2 is also known as AGAP (ArfGAP protein with a GTPase-like domain, ankyrin repeats and a Pleckstrin homology domain) or GGAP. Three isoforms of PIKE have been identified. PIKE-S (short) and PIKE-L (long) are brain-specific isoforms, with PIKE-S restricted to the nucleus and PIKE-L found in multiple cellular compartments. A third isoform, PIKE-A was identified in human glioblastoma brain cancers and has been found in various tissues. GGAP has been shown to have high GTPase activity due to a direct intramolecular interaction between the N-terminal GTPase domain and the C-terminal ArfGAP domain. In human tissue, AGAP mRNA was detected in skeletal muscle, kidney, placenta, brain, heart, colon, and lung. Reduced expression levels were a…
