identifier: InterPro:IPR044446
label: DHX9, second double-stranded RNA binding domain
definition: >-
  DHX9 (also known as RNA helicase A) is a multifunctional ATP-dependent nucleic acid helicase that unwinds DNA and RNA in a 3' to 5' direction and plays important roles in many processes, such as DNA replication, transcriptional activation, post-transcriptional RNA regulation, mRNA translation, and RNA-mediated gene silencing. It contains two double-stranded RNA binding motifs (DSRMs) at the N-terminal region and a DEXH-box helicase domain. Dosage compensation regulator mle from Drosophila is the DHX9 orthologue, it is the RNA helicase component of the male-specific lethal (MSL) histone acetyltransferase complex, a multiprotein complex essential for elevating transcription of the single X chromosome in the male (X chromosome dosage compensation). Within the MSL complex, the helicase activity of mle remodels roX non-coding RNA (roX1 and roX2)s to promote assembly of the MSL complex. This entry represents the second DSRM motif of DHX9.
