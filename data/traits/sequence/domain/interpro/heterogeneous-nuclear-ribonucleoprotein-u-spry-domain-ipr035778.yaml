identifier: InterPro:IPR035778
label: "Heterogeneous nuclear ribonucleoprotein U, SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of heterogeneous nuclear ribonucleoprotein U (hnRNP U) and hnRNP U-like proteins 1 and 2. hnRNP U contains three conserved domains: a SAF-Box that binds to AT-rich chromosomal region known as a scaffold- or matrix-attachment region (S/MAR), SPRY (Spla and Ryanodine receptor) domain of unknown function, and RGG (arginine-glycine-glycine) RNA-binding domain. hnRNP U is involved in transcription, alternative splicing and inactivation one of the two female X chromosomes. hnRNP U-like proteins 1 and 2 play key roles in cellular responses to double-strand breaks (DSBs).
