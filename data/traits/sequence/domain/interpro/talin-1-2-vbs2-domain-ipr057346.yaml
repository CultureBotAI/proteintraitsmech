identifier: InterPro:IPR057346
label: "Talin-1/2, VBS2 domain"
definition: >-
  This entry represents the Talin VBS2 domain. Talin is an adaptor protein that activates integrin family of cell adhesion molecules and couples them to the actin cytoskeleton. The integrin activation is known to involve binding of the talin FERM domain to membrane proximal sequences in the cytoplasmic domain of the integrin beta-subunit. The domain represented by this entry folds into a four-helical up-and-down bundle and contains the VBS2 vinculin binding site. This domain interacts with the vinculin head and this interaction involves a major structural change in the talin fragment, including unfolding of one of its helices, making the VBS accessible to vinculin.
