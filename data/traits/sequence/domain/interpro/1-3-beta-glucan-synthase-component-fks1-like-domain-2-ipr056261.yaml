identifier: InterPro:IPR056261
label: "1,3-beta-glucan synthase component FKS1-like, domain-2"
definition: >-
  This domain is found in 1,3-beta-glucan synthase component FKS1 from Saccharomyces cerevisiae and similar fungal proteins. FKS1 is involved in cell wall synthesis, maintenance and remodelling. This domain is predicted to adopt an all-α structure. This domain is often found between and .
