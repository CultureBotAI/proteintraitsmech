identifier: InterPro:IPR035594
label: "BAR/IMD domain-containing adapter protein 2, SH3 domain"
definition: >-
  This entry represents the SH3 domain of BAIP2 which has been shown to bind the proline-rich C terminus of EspFu (E. coli secreted protein F-like from prophage U). IRSp53, also known as IRS-58 or BAR/IMD domain-containing adapter protein 2 (BAIP2 or BAIAP2 for brain-specific angiogenesis inhibitor 1-associated protein 2), is an I-BAR (Bin/amphipysin/Rvs) domain containing protein. BAR domain forms an anti-parallel all-helical dimer, with a curved (banana-like) shape, that promotes membrane tubulation. BAR domain proteins can be classified into three types: BAR, F-BAR and I-BAR. BAR and F-BAR proteins generate positive membrane curvature, while I-BAR proteins induce negative curvature. IRSp53 is an adaptor protein that acts at the membrane-actin interface, coupling membrane deformation with F-actin polymerisation. It is involved in the formation of filopodia and lamellipodia in cultured mesenchymal cells and contributes to assembly/maintenance of tight junctions in cultured epithelial cells. IRSp53 contains an N-terminal I-BAR domain, followed by a partial CRIB domain and a SH3 domain. It binds to small GTPase Cdc42, Rac1 and WAVE1. IRSp53 binds Rac through its I-BAR domain and to WAVE through its SH3 domain, and thus contributes to membrane ruffling. Its SH3 domain also interacts with other regulators of actin dynamics, such as WAVE2, Mena, mDia1, Dynamin1, Eps8 and N-WASP. This protein has been associated with human breast cancer and Gilles de la Tourette syndrome.
