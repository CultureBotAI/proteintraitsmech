identifier: InterPro:IPR054605
label: "S-layer protein, spectrin-like repeat"
definition: >-
  This entry represents a Spectrin-like domain present in the bacterial S-layer protein from Geobacillus stearothermophilus (SbsA,) and similar sequences from bacillales. This domain shows structural similarity to the Spectrin domain.
