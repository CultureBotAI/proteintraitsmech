identifier: InterPro:IPR008766
label: Replication gene A protein-like
definition: >-
  Replication gene A proteins (also known as GpA) are found in bacteriophages and in bacteria as part of a suspected prophage. These proteins function as endonucleases during DNA replication. This entry represents a domain found at the centre of these sequences, which may be a DNA-binding domain.
