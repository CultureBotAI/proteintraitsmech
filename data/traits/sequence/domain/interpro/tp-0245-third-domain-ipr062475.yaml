identifier: InterPro:IPR062475
label: "TP_0245, third domain"
definition: >-
  This entry represents the third domain of the TP_0245 protein found in large proteins mainly from Bacillota and Spirochaetes, including TP_0245 from Treponema pallidum (the syphilis spirochaete). The function of this domain remains to be determined.
