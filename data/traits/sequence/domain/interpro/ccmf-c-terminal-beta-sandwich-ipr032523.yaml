identifier: InterPro:IPR032523
label: "CcmF, C-terminal beta-sandwich"
definition: >-
  This entry represents the C-terminal periplasmic β-sandwich domain of CcmF, one of the cytochrome c-type biogenesis proteins. This domain is also found in the cytochrome c-type biogenesis protein NrfE. This β-sandwich is associated with Cytochrome_C_asm family . This domain shows a significant flexibility in a line with the conformational changes during the CcmF functional cycle. The periplasmic face of CcmF with its extended flexible loop regions likely plays an integral role in guiding the nascent apocytochrome chain and scanning it for the CXnCH signature motifs.
