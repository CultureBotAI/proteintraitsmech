identifier: InterPro:IPR056562
label: "LYK3/4/5, second LysM domain"
definition: >-
  This entry represents the second LysM domain found in proteins from plants, including LYK3 from Medicago truncatula, CERK1 and LYK4/5 from Arabidopsis thaliana. The LysM domain adopt a β-α-α-β fold. Arabidopsis thaliana has retained the root developmental response to chitin-derived signals, utilising a widely conserved pathway involving CERK1. Medicago truncatula LYK3 has an active intracellular kinase domain. LYK4 is a chitin-binding protein and contributes to chitin-triggered immunity. LYK5 has been identified as a receptor with a very high affinity to chitooligosaccharides. Receptors recognising Nod factors and chitin have a very similar structure but contain two diverging motifs in the LysM1 domain that are necessary for discriminating between immunity and symbiotic functions.
