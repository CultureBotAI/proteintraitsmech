identifier: InterPro:IPR064163
label: "Sialic acid-binding adhesin AsaA, N-terminal"
definition: >-
  Members of this family of streptococcal adhesins contain an N-terminal YSIRK-type signal peptide, then a non-repetitive sialic acid-binding domain (this entry), then a large and variable number of tandem DUF1542 domains forming a stalk, and lastly, an LPXTG motif-containing C-terminal sorting signal that mediates sortase-dependent anchoring to the cell wall. Lengths over 3000 amino acids are typical
