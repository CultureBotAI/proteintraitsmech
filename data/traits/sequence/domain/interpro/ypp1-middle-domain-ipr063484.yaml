identifier: InterPro:IPR063484
label: "YPP1, middle domain"
definition: >-
  This entry represents the middle tetratricopeptide repeat (TPR) domain found in YPP1 cargo-transport proteins from fungal species. YPP1 is involved in endocytosis and protein targeting to the vacuole. The protein interacts with ribosomes and localises to cytoplasmic granules and the cell membrane. The TPR domain is characterised by multiple α-helical repeats that typically mediate protein-protein interactions. YPP1 belongs to a distinct protein family and this TPR domain is found in fungal proteins.
