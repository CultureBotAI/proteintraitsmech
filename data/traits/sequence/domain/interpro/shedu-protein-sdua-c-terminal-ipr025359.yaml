identifier: InterPro:IPR025359
label: "Shedu protein SduA, C-terminal"
definition: >-
  This entry represents the C-terminal domain of SduA, the only component of antiviral defense system Shedu. Expression of Shedu in B.subtilis (strain BEST7003) confers resistance to phages phi105, phi29, rho14 and to a lesser extent to SPP1. This domain may have endonuclease activity.
