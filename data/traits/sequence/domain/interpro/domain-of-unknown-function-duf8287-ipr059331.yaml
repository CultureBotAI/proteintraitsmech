label: "Domain of unknown function DUF8287"
definition: >-
  This domain is found in uncharacterised archaeal proteins. It contains three cysteine and a histidine residues that are highly conserved. It is predicted to fold into a structure that resembles a circularly permuted zinc-ribbon domains.
