identifier: InterPro:IPR063542
label: "CTF13, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in centromere DNA-binding protein complex CBF3 subunit C, also known as CTF13 (chromosome transmission fidelity protein 13) found in Saccharomycetales. CTF13 acts as a central component of the CBF3 complex, which is essential for chromosome segregation and movement of centromeres along microtubules. The CBF3 complex is required for the recruitment of other kinetochore complexes to centromeric DNA and binds selectively to the highly conserved CDEIII DNA sequence found in centromeres. The association of CBF3C with CBF3D and SGT1 is required for CBF3C activation and CBF3 assembly. CTF13 contains leucine-rich repeat domains and is localised to the nucleus and centromere.
