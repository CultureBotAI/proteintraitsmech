identifier: InterPro:IPR044424
label: KMT5B , SET domain
definition: >-
  Post-translational modification of the core histones H2A, H2B, H3 and H4 play an important part in chromatin biology. Histone H4 lysine 20 methylation (H4K20me) is critical for the biological processes that ensure genome integrity, such as DNA damage repair, DNA replication and chromatin compaction. Suv4-20 family members are a group of histone H4K20 methyltransferases that play an important role in epigenetic regulation. Lower eukaryotes have a single Suv4-20, while mammals have two closely related Suv4-20 paralogs, SUV420H1 and SUV420H2. In mammals H4K20me2 is generated primarily by SUV420H1/KMT5B (which can also produce H4K20me3), while H4K20me3 is mostly generated by SUV420H2/KMT5C. This entry represents the SET domain found in KMT5B (also known as SUV420H1). Suv420h1 knockout mice die perinatally and show overall growth retardation. In humans KMT5B may affect neurodevelopment and has been linked to Mental retardation, autosomal dominant 51.
