identifier: InterPro:IPR039386
label: "Homoaconitase, swivel domain"
definition: >-
  This entry represents the swivel domain found in homoaconitase and other uncharacterised proteins of the aconitase family. Homoaconitase is part of an unusual lysine biosynthesis pathway found only in filamentous fungi, in which lysine is synthesized via the alpha-aminoadipate pathway. In this pathway, homoaconitase catalyses the conversion of cis-homoaconitic acid into homoisocitric acid. The reaction mechanism is believed to be similar to that of other aconitases. The swivel domain is believed to undergo swivelling conformational change in the enzyme mechanism.
