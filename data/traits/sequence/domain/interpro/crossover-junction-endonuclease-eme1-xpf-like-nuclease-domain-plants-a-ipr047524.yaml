identifier: InterPro:IPR047524
label: "Crossover junction endonuclease EME1, XPF-like nuclease domain, plants/arthropods"
definition: >-
  This entry represents the XPF-like nuclease domain of crossover junction endonuclease EME1 and similar proteins from plants and arthropods. This domain is a nuclease-like domain which is involved in targeting the MUS81-EME1 heterodimer complex to DNA. The Mus81-EME1 complex is a structure-selective endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Typical substrates include 3'-flap structures, D-loops, replication forks, nicked Holliday junctions and also intact Holliday junctions with a reduced efficiency. It may be required in mitosis for the processing of stalled or collapsed replication fork intermediates. It plays a role in DNA repair and in genotoxic stress-induced homologous recombination (HR) in somatic cells and mediates a subset of meiotic recombination events that are insensitive to crossover interference.
