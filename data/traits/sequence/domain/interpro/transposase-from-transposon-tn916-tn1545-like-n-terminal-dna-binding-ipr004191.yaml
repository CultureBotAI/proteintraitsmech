identifier: InterPro:IPR004191
label: Transposase from transposon Tn916/Tn1545-like, N-terminal DNA binding
definition: >-
  This entry represents the transposase from transposons Tn1545 and Tn916, members of the integrase family of site-specific recombinases, which catalyse a diverse array of DNA rearrangements in archaebacteria, eubacteria and yeast. The structure of the DNA-binding domain of the Tn916 integrase protein has been determined by NMR spectroscopy, revealing that the N-terminal domain is structurally similar to the double-stranded RNA-binding domain (dsRBD). The integrase protein interacts with DNA using residues located on the face of its three-stranded β-sheet.
