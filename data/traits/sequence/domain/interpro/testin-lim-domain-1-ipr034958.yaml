identifier: InterPro:IPR034958
label: "Testin, LIM domain 1"
definition: >-
  Testin contains three C-terminal LIM domains and a PET protein-protein interaction domain at the N terminus. Testin is a cytoskeleton associated focal adhesion protein that localizes along actin stress fibres, at cell-cell-contact areas, and at focal adhesion plaques. Testin interacts with a variety of cytoskeletal proteins, including zyxin, mena, VASP, talin, and actin and it is involved in cell motility and adhesion events. Knockout mice experiments reveal the tumour repressor function of Testin. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. This is the first LIM domain of Testin.
