identifier: InterPro:IPR063324
label: "NELL, C-terminal VWC-associated domain"
definition: >-
  This entry represents a C-terminal domain of approximately 60 residues found in NELL1 and NELL2 (NEL-like proteins) in vertebrates. This domain is located after the VWC domains ( ) and multiple EGF-like domains ( ). NELL proteins are secreted glycoproteins that form homotrimers and function as PKC-binding proteins. NELL1 promotes osteoblast differentiation while NELL2 functions in axon guidance through binding to ROBO3 receptor.
