label: "Intercellular adhesion molecule, N-terminal"
definition: >-
  Intercellular adhesion molecules (ICAMs) and vascular cell adhesion molecule-1 (VCAM-1) are part of the immunoglobulin superfamily. They are important in inflammation, immune responses and in intracellular signalling events. The ICAM family consists of five members, designated ICAM-1 to ICAM-5. They are known to bind to leucocyte integrins CD11/CD18 during inflammation and in immune responses. In addition, ICAMs may exist in soluble forms in human plasma, due to activation and proteolysis mechanisms at cell surfaces. ICAM-1 (CD54) contains five Ig-like domains. It is expressed on leucocytes, endothelial and epithelial cells, and is upregulated in response to bacterial invasion. The protein is a ligand for lymphocyte-function associated (LFA) antigens and also a receptor for CD11a,b/CD18, fibrinogen, human rhinovirus and Plasmodium falciparum-infected erythrocytes. ICAM-1 binding sites for CD11a/CD18 and its other binding partners are located in the first domain and are overlapping. ICAM-1 domain 2 seems to play an important role in maintaining the conformation of domain 1 and particularly the structural integrity of the LFA-1 ligand-binding site. The 3-dimensional atomic structure of the tandem N-terminal Ig-like domains (D1 and D2) of ICAM-1 has been determined to 2.2A resolution and fitted into a cryoelectron microscopy reconstruction of a rhinovirus-ICAM-1 complex. Extensive charge interactions between ICAM-1 and human rhinovirusesare largely conserved in major and minor receptor groups of rhinoviruses. The interaction of ICAMs with LFA-1 is mediated by a divalent cation bound to the insertion (I)-domain on the alpha chain of LFA-1 and the carboxyl group of a conserved glutamic acid residue on ICAMs. ICAM-2 (CD102) has two Ig-like domains. It is expressed on endothe…
