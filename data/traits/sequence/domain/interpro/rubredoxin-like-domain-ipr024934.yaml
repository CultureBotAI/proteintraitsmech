identifier: InterPro:IPR024934
label: Rubredoxin-like domain
definition: >-
  Rubredoxin is a low molecular weight iron-containing bacterial protein involved in electron transfer, sometimes replacing ferredoxin as an electron carrier. Rubredoxins possess a 45- to 55-residue domain containing one iron atom tetrahedrally coordinated to four cysteinyl residues. Structural analysis of the domains have shown them to be folded into a short three-stranded antiparallel β-sheet and a number of loops. This entry represents rubredoxin-like domains, which are found in rubredoxins and related proteins, including rubrerythrins, flavorubredoxins and nigerythrins.
