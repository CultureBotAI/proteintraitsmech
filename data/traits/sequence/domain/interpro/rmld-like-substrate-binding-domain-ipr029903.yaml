identifier: InterPro:IPR029903
label: "RmlD-like, substrate binding domain"
definition: >-
  This entry represents the RmlD substrate binding domain, which is responsible for binding a sugar nucleotide. dTDP-4-dehydrorhamnose reductase or RmlD ( ) catalyses the reduction of dTDP-6-deoxy-L-lyxo-4-hexulose to yield dTDP-L-rhamnose, which is the final step in the conversion of dTDP-D-glucose to dTDP-L-rhamnose. dTDP-rhamnose is essential for growth of mycobacteria. dTDP-L-rhamnose is the precursor of L-Rhamnose (L-Rha), a component of the lipopolysaccharide (LPS) core and several O antigen polysaccharides of Pseudomonas.
