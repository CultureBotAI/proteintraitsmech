identifier: InterPro:IPR021028
label: "Homotrimeric ring hydroxylase, catalytic domain"
definition: >-
  This entry represents the catalytic domain from a family of homotrimeric enzymes that hydroxylate aromatic compounds, including carbazole 1,9a-dioxygenase from Janthinobacterium. The catalytic domain is found C-termnial to the iron-sulphur-binding Rieske domain and is composed of antiparallel β sheets and α helices. It is part of a much larger superfamily of lipid binding domains which form a common fold that works as a versatile scaffold for binding bulky ligands.
