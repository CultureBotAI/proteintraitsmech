identifier: InterPro:IPR025816
label: "RrmJ-type ribose 2-O-methyltransferase domain"
definition: >-
  This domain is found in cap-specific mRNA (nucleoside-2-O-)-methyltransferase 1, which is a S-adenosyl-L-methionine-dependent methyltransferase that mediates mRNA cap1 2'-O-ribose methylation to the 5'-cap structure of mRNAs. It methylates the ribose of the first nucleotide of a m7GpppG-capped mRNA to produce m7GpppNmp (cap1). Cap1 modification is linked to higher levels of translation. It may be involved in the interferon response pathway. This group also includes , which is thought to be inactive as it lacks the conserved Lys active site in position 367.
