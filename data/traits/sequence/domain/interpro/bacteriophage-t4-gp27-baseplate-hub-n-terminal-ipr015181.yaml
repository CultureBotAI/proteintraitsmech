identifier: InterPro:IPR015181
label: "Bacteriophage T4, Gp27, baseplate hub, N-terminal"
definition: >-
  This domain adopts a β barrel structure with a Greek key topology, which is topologically similar to the FMN-binding split barrel. It is found at the N terminus of the Gp27 protein; a structural component of the viral baseplate.
