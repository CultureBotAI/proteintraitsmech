label: "Glutathione S-transferase, C-terminal domain"
definition: >-
  Leishmania major and Trypanosoma cruzi glutathione-S-transferase (GST) has undergone gene duplication, diversification, and gene fusion leading to an four domain enzyme which contains two repeats of a GST N-terminal domain followed by a GST C-terminal domain.
