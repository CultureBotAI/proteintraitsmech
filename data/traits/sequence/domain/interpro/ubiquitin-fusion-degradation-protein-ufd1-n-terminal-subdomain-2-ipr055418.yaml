identifier: InterPro:IPR055418
label: "Ubiquitin fusion degradation protein UFD1, N-terminal subdomain 2"
definition: >-
  This entry corresponds to the second subdomain of UFD1 UT3 which has a mixed α/β roll structure. Ufd1 is a 40kDa protein involved in the ubiquitin fusion degradation (UFD) pathway, which recognises post-translational ubiquitin-protein conjugates for degradation, and is essential for vegetative cell viability. Structurally, Ufd1 comprises an N-terminal conserved region (UT3) and a C-terminal disordered region (UT6). The N-terminal domain contains the ubiquitin-binding site and has a similar structure to p97, consisting of two subdomains, while the C-terminal region contains binding sites for both Npl4 and Cdc48. Ufd1 forms a complex with Npl4 that functions as the substrate-recruiting cofactor for Cdc48 segregase. The Cdc48-Ufd1-Npl4 complex is involved in degradation of misfolded ER proteins and recruits Cdc48 to ubiquitylated CMG (Cdc45-MCM-GINS) helicase at the end of chromosome replication, driving helicase disassembly. In humans, the Npl4-Ufd1 complex also facilitates proteasomal degradation of RIG-I (a viral RNA sensor), thereby reducing antiviral innate immune responses. The human UFD1 gene is highly expressed during embryogenesis, particularly in the eyes and inner ear primordia, and is thought to be important in determining ectoderm-derived structures, including neural crest cells. UFD1 is deleted in CATCH-22 syndrome (cardiac defects, abnormal facies, thymic hypoplasia, cleft palate and hypocalcaemia), which is associated with microdeletions on chromosome 22q11.2. Related developmental defects include DiGeorge syndrome () and velo-cardio-facial syndrome (), both thought to involve defective neural crest cell differentiation.Claude is AI and can make mistakes. Please double-check responses. Opus 4.5
