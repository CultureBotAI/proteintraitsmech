identifier: InterPro:IPR034286
label: Cytosolic carboxypeptidase-like protein 5 catalytic domain
definition: >-
  This entry contains the M14 carboxypeptidase-like domain of cytosolic carboxypeptidase-like protein 5 (CCP5, ATP/GTP binding protein-like 5 or AGBL-5; MEROPS identifier M14.025), and related proteins. CCP5 is part of the cytosolic carboxypeptidase (CCP) family, which also includes enzymes CCP1/Nna1, CCP4, and CCP6, and belongs to subfamily M14B of peptidase family M14. CCP5 removes alpha- and gamma-linked glutamates from tubulin.
