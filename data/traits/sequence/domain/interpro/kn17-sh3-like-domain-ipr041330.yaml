identifier: InterPro:IPR041330
label: "KN17, SH3-like domain"
definition: >-
  This domain can be found at the C terminus of the human KIN17 protein and its homologues. In human cells, over-expression of KIN17 modifies the nuclear morphology and inhibits S-phase progression, thus blocking cell growth as part of the response to genotoxics. The C-terminal domain exhibits an all-β structure consisting of two tightly packed SH3-like subdomains, the first one represented in this entry. This domain has structural similarity with various SH3-like domains, although it lacks similarities in both primary sequence and charge distribution.
