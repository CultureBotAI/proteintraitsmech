identifier: InterPro:IPR049110
label: "Influenza RNA polymerase PB2, second domain"
definition: >-
  This entry represents the domain of the Flu PB protein that follows the N-terminal extended region. Influenza virus encodes a large, multidomain RNA-dependent RNA polymerase that can both transcribe and replicate the viral RNA genome. In influenza virus, the polymerase is composed of three polypeptides: PB1, PB2 and PA/P3. PB1 houses the polymerase active site, whereas PB2 and PA/P3 contain, respectively, cap-binding and endonuclease domains required for transcription initiation by cap-snatching.
