identifier: InterPro:IPR031186
label: "Syntaxin-3, SNARE motif"
definition: >-
  Syntaxin-3 (STX3) belongs to the syntaxin family, whose members are involved in docking of synaptic vesicles at presynaptic active zones. It interacts with the SNARE regulator Munc18-2 and plays a role in mast cells degranulation. It plays an important role in trafficking pathways of cytokines in neutrophil granulocytes. Mutations have been implicated in human microvillus inclusion disease (MVID), a disorder of the differentiation of intestinal epithelium. This entry represents the SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) motif of SYN3, which consist of coiled-coil helices.
