identifier: InterPro:IPR061952
label: "Arrestin-related trafficking adapter 10, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of arrestin-related trafficking adapter 10 (ART10). This protein regulates endocytosis by recruiting RSP5 ubiquitin ligase activity to specific plasma membrane proteins in response to extracellular stimuli. ART10 interacts with RSP5 and is itself ubiquitinated by RSP5. The protein localises to the cytoplasm and is found in fungi, particularly in the Saccharomycetaceae family. This domain shares structural similarity with arrestin domains. The specific function of this domain remains to be determined.
