identifier: InterPro:IPR013718
label: "COQ9, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of the globular domain of COQ9 and similar sequences from bacteria and eukaryotes. This domain shows structural homology with the small molecule binding domain members of the TFR family of bacterial transcriptional regulators, adopting an α-helical configuration. It appears solvent exposed in the crystal structure, is very sensitive to mutations and is thought to be an important functional area of COQ9. Ubiquinone biosynthesis protein COQ9 is an protein that is required for the biosynthesis of coenzyme Q, which functions in the respiratory electron transport chain and serves as a lipophilic antioxidant. In Saccharomyces cerevisiae (Baker's yeast), Q biosynthesis requires nine Coq proteins (Coq1-Coq9), with the COQ9 product acting subsequent to the prenylation of 4-hydroxybenzoic acid. COQ9 consists of an α-helical globular domain and an amphipathic C-terminal 10th α-helix responsible for membrane association.
