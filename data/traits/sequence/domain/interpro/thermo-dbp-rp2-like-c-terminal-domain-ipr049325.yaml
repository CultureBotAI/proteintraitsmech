identifier: InterPro:IPR049325
label: "Thermo-DBP-RP2-like, C-terminal domain"
definition: >-
  This domain is found in proteins from archaea, including ThermoDBP-related protein (ThermoDBP-RP) 2 ( ) from hyperthermophilic crenarchaea. This protein shows great affinity in vitro for single-stranded DNA and consists of two globular domains. The C-terminal domain, represented in this entry, is composed of a five-stranded, antiparallel β-sheet sandwiched between two α-helices.
