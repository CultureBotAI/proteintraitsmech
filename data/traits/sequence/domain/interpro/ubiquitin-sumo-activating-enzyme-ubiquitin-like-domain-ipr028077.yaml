identifier: InterPro:IPR028077
label: "Ubiquitin/SUMO-activating enzyme ubiquitin-like domain"
definition: >-
  This is the C-terminal domain of ubiquitin-activating enzyme and SUMO-activating enzyme 2. It is structurally similar to ubiquitin. This domain is involved in E1-SUMO-thioester transfer to the SUMO E2 conjugating protein.
