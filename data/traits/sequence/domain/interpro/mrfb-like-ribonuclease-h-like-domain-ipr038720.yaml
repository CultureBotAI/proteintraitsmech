identifier: InterPro:IPR038720
label: "MrfB-like, ribonuclease H-like domain"
definition: >-
  This entry represents the ribonuclease H-like domain found in Mitomycin repair factor B (MrfB) and Uncharacterized protein MJ0365. MrfB is a component of a nucleotide excision repair pathway specific for mitomycin C (MMC), functioning separately from the classical UvrABC excision repair pathway. It is thought to act on DNA monoadducts or intra-strand cross-links induced by MMC. MrfB functions as a metal-dependent exonuclease that acts on linear double-stranded (ds)DNA, exhibiting weak activity on nicked plasmid. Furthermore, MrfB displays 3'-5' exonuclease activity on single-stranded (ss)DNA, as well as on blunt, nicked, and gapped linear dsDNA and dsDNA with a 3'-overhang.
