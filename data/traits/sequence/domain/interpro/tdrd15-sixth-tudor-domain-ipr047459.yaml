identifier: InterPro:IPR047459
label: "TDRD15, sixth Tudor domain"
definition: >-
  This entry represents the sixth Tudor domain of human TDRD15 and similar sequences from vertebrates. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. TDRD15 is an uncharacterised Tudor domain-containing protein that contains seven Tudor domains.
