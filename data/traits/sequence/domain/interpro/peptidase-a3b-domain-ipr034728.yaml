identifier: InterPro:IPR034728
label: "Peptidase A3B domain"
definition: >-
  This entry includes the aspartic peptidase domain from the P3 polyprotein of Pararetroviruses (such as rico tngro bacilliform virus), a member of the family Caulimoviridae. P3 contains a putative movement protein (MP), the capsid protein (CP), the aspartate protease (PR) and the reverse transcriptase (RT) with a ribonuclease H activity. PR proteolytically processes P3. The sequence DSGS is believed to be the RTBV protease active site. The RTBV PR domain forms peptidase family A3 subfamily B.
