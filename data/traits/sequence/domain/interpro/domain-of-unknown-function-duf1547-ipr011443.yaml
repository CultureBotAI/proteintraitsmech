identifier: InterPro:IPR011443
label: "Domain of unknown function DUF1547"
definition: >-
  This domain appears to be found only in a small family of Chlamydia species. It is usually found repeated. This domain can be found in translocated actin-recruiting phosphoprotein (Tarp) from Chlamydia trachomatis serovar L2. Tarp appears to initiate or participate in signalling events that regulate the actin recruitment, which ultimately leads to internalization.
