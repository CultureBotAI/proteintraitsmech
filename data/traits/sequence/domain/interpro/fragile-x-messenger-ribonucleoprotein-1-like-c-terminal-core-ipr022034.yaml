identifier: InterPro:IPR022034
label: Fragile X messenger ribonucleoprotein 1-like, C-terminal core
definition: >-
  This entry represents the core C-terminal region of the fragile X messenger ribonucleoprotein 1 (FMR1) and its paralogues fragile X-related proteins 1/2 (FXR1/2). These proteins have different regions at their very C terminus. The Glutamine-arginine rich region facilitates protein interactions. Proteins containing this domain contain two blocks of RGG repeats that bind to G-quartet sequences in a wide variety of mRNAs. Fragile X messenger ribonucleoprotein 1 (FMR1), fragile X-related 1 protein (FXR1) and fragile X-related 2 protein (FXR2) are members of a small family of RNA-binding proteins that are involved the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs, playing a crucial role in neuronal development and synaptic plasticity. The proteins contain two KH domains and a RGG box that are characteristic motifs in RNA-binding proteins as well as nuclear localization and export signals.
