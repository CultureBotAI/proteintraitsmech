identifier: InterPro:IPR006786
label: "Pinin/SDK/MemA protein"
definition: >-
  This conserved region is located adjacent and C-terminal to a N-terminal pinin/SKD domain . Members of this family have very varied localisations within the eukaryotic cell. Pinin is known to localise at the desmosomes and is implicated in anchoring intermediate filaments to the desmosomal plaque. SDK2/3 is a dynamically localised nuclear protein thought to be involved in modulation of alternative pre-mRNA splicing. MemA is a tumour marker preferentially expressed in human melanoma cell lines. A common feature of the members of this family is that they may all participate in regulating protein-protein interactions.
