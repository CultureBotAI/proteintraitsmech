identifier: InterPro:IPR062347
label: "HyfR-like sigma-54 activator, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 125 residues found in HyfR and related sigma-54 dependent transcriptional activators in Enterobacterales. This domain is located N-terminal to the GAF domain ( ). The full-length HyfR protein activates transcription of the hyf operon encoding hydrogenase-4. The function of this N-terminal domain remains to be determined.
