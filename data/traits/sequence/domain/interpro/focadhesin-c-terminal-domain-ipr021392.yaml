identifier: InterPro:IPR021392
label: "Focadhesin, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of human Focadhesin and similar animal proteins. This domain is predicted to have an all-α configuration. Focadhesin (FOCAD) is focal adhesion protein with potential tumour suppressor function in gliomas.
