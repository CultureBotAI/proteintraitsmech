identifier: InterPro:IPR063117
label: "Nup54, alpha/beta domain"
definition: >-
  This domain is found in the Nuclear pore complex protein Nup54 which is a component of the nuclear pore complex. This domain folds into a ferredoxin-like structure consisting of a four stranded β-sheet and two α-helices. It is unique to metazoans and might relate to their open mitosis.
