identifier: InterPro:IPR054484
label: "ComC, supersandwich domain"
definition: >-
  This domain is found in ComC from Dictyostelium discoideum and related proteins from Amoebozoa species. It adopts a supersandwich fold with a greater similarity to GLMP luminal domain. ComC mediates a cell adhesion pathway via regulation of the expression of the other intercellular communication genes lagC, and lagD during Dictyostelium development.
