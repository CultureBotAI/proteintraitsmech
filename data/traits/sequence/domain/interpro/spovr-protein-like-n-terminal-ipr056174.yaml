identifier: InterPro:IPR056174
label: "SpoVR protein-like, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of the stage V sporulation protein R, YcgB from E.coli and related proteins. Stage V sporulation protein R is involved in spore cortex formation. Little is known about cortex biosynthesis, except that it depends on several sigma E controlled genes, including spoVR. YcgB has been suggested to be part of a conserved signalling pathway with YeaH and YeaG. This pathway may be involved in nitrogen metabolism (see Supplementary note 5 in).
