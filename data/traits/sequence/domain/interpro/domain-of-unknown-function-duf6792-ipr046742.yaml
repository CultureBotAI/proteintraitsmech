identifier: InterPro:IPR046742
label: "Domain of unknown function DUF6792"
definition: >-
  This presumed domain is functionally uncharacterised. This domain is found in bacteria, and is around 250 amino acids in length. There is a conserved sequence motif GHSLGG. It may have an α/β hydrolase fold suggesting a catalytic role.
