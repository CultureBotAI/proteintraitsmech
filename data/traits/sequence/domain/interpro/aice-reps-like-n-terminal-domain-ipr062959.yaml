identifier: InterPro:IPR062959
label: "AICE Reps-like, N-terminal domain"
definition: >-
  This entry represents an N-terminal α/β domain found in ATP-binding replication proteins encoded by AICEs (Actinomycete Integrative and Conjugative Elements) in Streptomycetaceae. One of these is the SCO4617 protein found in Streptomyces integrated/autonomous plasmid SLP1. These proteins are involved in autonomous replication of integrated elements. They globally resemble Rep1 and the C-terminal region of PriRep5, the so-called self-loading helicases called Reps. The domain represented by this entry precedes the ATPase domain.
