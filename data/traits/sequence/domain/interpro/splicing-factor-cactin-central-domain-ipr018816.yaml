identifier: InterPro:IPR018816
label: "Splicing factor cactin, central domain"
definition: >-
  This entry represents the conserved central domain of the splicing factor cactin. It contains two of three predicted coiled-coil motifs. Most proteins containing this domain also have at the C-terminal end. Upstream of this domain in Drosophila proteins are a serine-rich region, some non-typical RD motifs and three predicted bipartite nuclear localisation signals, none of which are well-conserved. Cactin associates with IkappaB-cactus as one of the intracellular members of the Rel (NF-kappaB) pathway which is conserved in invertebrates and vertebrates. In mammals, this pathway controls the activities of the immune and inflammatory response genes as well as viral genes, and is critical for cell growth and survival. In Drosophila, the Rel pathway functions in the innate cellular and humoral immune response, in muscle development, and in the establishment of dorsal-ventral polarity in the early embryo.
