identifier: InterPro:IPR057602
label: "PARP12-like, CCCH zinc finger tandem"
definition: >-
  This domain containing tandem CCCH zinc fingers is found in human Protein mono-ADP-ribosyltransferase PARP12, and related proteins mainly found in vertebrates, including Zinc finger CCCH-type antiviral protein 1 (ZAP) and Zinc finger CCCH-type antiviral protein 1-like. PARP12 is a mono-ADP-ribosyltransferase that mediates mono-ADP-ribosylation of target proteins. ZAP is an Antiviral protein which inhibits the replication of viruses by recruiting the cellular RNA degradation machineries to degrade the viral mRNAs.
