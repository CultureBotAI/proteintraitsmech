identifier: InterPro:IPR032171
label: "C-terminal of Roc, COR-A domain"
definition: >-
  This entry corresponds to COR-A, located at the N-terminal of COR. It interacts with the Roc domain stabilising the GTPase activity of LRRK2. COR-A consists of multiple α-helices and a short three-stranded antiparallel sheet. The C-terminal of Roc domain, COR, along with Roc functions as the putative regulator of kinase activity. It functions as a proper GTP-binding protein with a low GTPase activity somehow stimulating the kinase activity. COR is divided in two subdomains: COR-A and COR-B. The Roc-COR tandem is found in Roco-containing proteins from bacterias and eukaryotes. Its most prominent member is the leucine-rich repeat kinase 2 LRRK2. It also contains Leucine-rich repeat kinase 1 LRKK1, Death-associated protein kinase 1 DAPK1 and Malignant fibrous histiocytoma amplified sequence 1 MFHAS1.
