label: "ATPase MORC2, chromo domain-like"
definition: >-
  This domain is found in human ATPase MORC2 and similar sequences predominantly found in vertebrates. MORC2 is essential for epigenetic silencing by the HUSH (human silencing hub) complex. This domain, which is predicted to adopt an α-β configuration, is often found associated with , and .
