identifier: InterPro:IPR041323
label: "HEPN-like integron domain"
definition: >-
  This is a domain found in HEPN-like nucleases. It is part of mobile integron element. The integron cassettes are known to be activated by stress conditions, thereby allowing swapping of genetic material that might be of adaptive value. Hence it is hypothesized that the HEPN domains present in some integron cassettes contribute to the stress response by functioning as RNases that induce dormancy by probably inhibiting translation and thus enabling survival of harsh conditions.
