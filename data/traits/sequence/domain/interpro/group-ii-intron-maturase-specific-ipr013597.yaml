identifier: InterPro:IPR013597
label: "Group II intron, maturase-specific"
definition: >-
  This region is found mainly in various bacterial and archaeal species, but a few members of this family are expressed by fungal and chlamydomonal species. It has been implicated in the binding of intron RNA during reverse transcription and splicing.
