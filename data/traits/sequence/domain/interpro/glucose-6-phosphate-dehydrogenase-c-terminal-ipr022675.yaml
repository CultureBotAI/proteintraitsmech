identifier: InterPro:IPR022675
label: Glucose-6-phosphate dehydrogenase, C-terminal
definition: >-
  Glucose-6-phosphate dehydrogenase ( ) (G6PDH) is a ubiquitous protein, present in bacteria and all eukaryotic cell types. The enzyme catalyses the the first step in the pentose pathway, i.e. the conversion of glucose-6-phosphate to gluconolactone 6-phosphate in the presence of NADP, producing NADPH. The ubiquitous expression of the enzyme gives it a major role in the production of NADPH for the many NADPH-mediated reductive processes in all cells, and is critical for NADPH homeostasis and redox regulation. Deficiency of G6PDH is a common genetic abnormality affecting millions of people worldwide. Many sequence variants, most caused by single point mutations, are known, exhibiting a wide variety of phenotypes with the distinctive one being chronic and drug- or food-induced hemolytic anemia, attributed to the inability to produce NADPH and withstand harmful oxidants in erythrocyte cells. This entry represents the C-terminal domain of glucose-6-phosphate dehydrogenase.
