identifier: InterPro:IPR061372
label: "PavB adhesin, N-terminal"
definition: >-
  This entry describes the region of PavB from Streptococcus pneumoniae, and closely related proteins from Streptococcus mitis and Streptococcus pseudopneumoniae, N-terminal to the repetitive region with variable numbers of SSURE (Streptococcal Surface REpeats) regions (see PF11966), which bind fibronectin. The PavB region is notable, in part, for its rare variant, WSIRR, of the YSIRK motif signal peptide. Full-length versions of proteins from this family have a C-terminal LPXTG-containing region for sortase-mediated anchoring to the cell wall.
