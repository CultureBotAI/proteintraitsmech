identifier: InterPro:IPR025969
label: "Abscisic acid G-protein coupled receptor-like domain"
definition: >-
  This domain is found in eukaryotes, and is typically between 177 and 216 amino acids in length. It is found in the abscisic acid (ABA) G-protein coupled receptor. ABA is a stress hormone in plants. It is also found proteins identified as Golgi pH regulators.
