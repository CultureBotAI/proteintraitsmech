identifier: InterPro:IPR061987
label: "Fimbria adhesin EcpD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of approximately 194 amino acids found in Fimbria adhesin EcpD from Escherichia coli and related sequences mainly found in Enterobacteriales. EcpD is part of the ecpRABCDE operon which encodes the E. coli common pilus (ECP). EcpD is a tip pilus adhesin required for assembly of EcpA into fibres and plays a role in biofilm formation and host cell recognition.
