identifier: InterPro:IPR048019
label: "Ribosomal RNA small subunit methyltransferase B-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal RNA binding domain of the rRNA-specific 5-methylcytidine transferase Sun, also known as RrmB or Fmu, shares the RNA-binding non-catalytic domain with the transcription termination factor NusB. The precise biological role of this domain in Sun is unknown, although it is likely to be involved in sequence-specific RNA binding. The C-terminal methyltransferase domain (represented in ) of Sun has been shown to catalyze formation of m5C at position 967 of 16S rRNA in Escherichia coli.
