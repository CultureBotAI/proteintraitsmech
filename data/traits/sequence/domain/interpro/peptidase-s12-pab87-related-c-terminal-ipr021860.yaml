identifier: InterPro:IPR021860
label: "Peptidase S12, Pab87-related, C-terminal"
definition: >-
  This entry represents the C-terminal domain of a family of peptidases which belong to MEROPS peptidase family S12, clan SE. The structure of the Pyrococcus abyssi Pab87 peptidase has been determined at 2.2 A resolution. Pab87 is a self-compartmentalizing proteases that orchestrates protein turnover through an original architecture characterised by a central catalytic chamber. Also containing this domain are the unguisins hydrolases (UngD). UngD catalyzes the hydrolysis (between the D-tryptophan and GABA residues) of the cyclic heptapeptides known as unguisins, yielding linear peptides
