identifier: InterPro:IPR058813
label: "ScoMcrA-like, DNA sulfur-binding domain"
definition: >-
  This entry represents the DNA sulfur-binding domain (SBD) found in the endonuclease ScoMcrA and related type IV restriction enzymes. This domain recognises the sulfur atom in phosphorothioated DNA (PT-DNA). The recognition of the PT-DNA by SBD is phosphorothioate-dependent and also DNA sequence-specific. Residues involved in sulfur recognition are highly conserved across homologues. This domain adopts an α/β fold consisting of a small three-stranded β-sheet elaborated with α-helices.
