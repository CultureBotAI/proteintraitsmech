identifier: InterPro:IPR005094
label: "MobA/VirD2-like, nuclease domain"
definition: >-
  Relaxases/mobilisation proteins are required for the horizontal transfer of genetic information contained on plasmids that occurs during bacterial conjugation. The relaxase, in conjunction with several auxiliary proteins, forms the relaxation complex or relaxosome. Relaxases nick duplex DNA in a specific manner by catalysing trans-esterification. The VirD2 protein is a T-DNA border endonuclease from Rhizobium radiobacter that is important for the transfer and integration of a defined segment (T-DNA) of Ti plasmid DNA into the plant nuclear genome leading to tumour formation. VirD2 cleaves at a unique site within both 24 bp direct repeats flanking the T-DNA. This entry represents the nuclease domain of VirD2 and related proteins such as Rlx, TraI, cryptic plasmid protein C, relaxase LtrB and MbeA.
