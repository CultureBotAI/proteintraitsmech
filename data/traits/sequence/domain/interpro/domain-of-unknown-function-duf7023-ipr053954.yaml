identifier: InterPro:IPR053954
label: "Domain of unknown function DUF7023"
definition: >-
  This domain is found in human Protein dispatched homolog 3 (DISP3) and related proteins mainly from vertebrates. DISP3 (PTCHD2), a sterol-sensing domain- containing protein, is highly expressed in neural tissue, promotes cell proliferation and alters expression of genes that are involved in tumorigenesis. The function of this domain is unknown.
