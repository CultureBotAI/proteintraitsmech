identifier: InterPro:IPR055442
label: "EML-like, second beta-propeller domain"
definition: >-
  This entry represents β-propeller domains of echinoderm microtubule-associated protein (EMAP)-like (EML) proteins. This model completes the second β-propeller of the TAPE pair in EMLs. In some members, such as EML5 and EML6, there are three TAPE pairs. The first β-propeller of the pair is represented in . This entry also includes Superkiller complex protein 8 from Xenopus laevis, LST8 homologue from Drosophila melanogaster, Cilia- and flagella-associated protein 57 (CFA57) from animals, among others. In CFA57, this entry covers the second β-propeller domain, a protein that associates with components of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility, and might act as an inner dynein arm (IDA) hub or linkage. This entry also includes will decrease acetylation (wda) in Drosophila melanogaster. EML proteins contribute to the formation of the mitotic spindle and interphase microtubule network. In these proteins, the β-propellers are intimately associated as a pair, which was defined as a tandem atypical propeller in EMLs (TAPE) domain. There is a hydrophobic core between the propellers, which corresponds to the HELP motif that contributes blades 1 and 14 buried at the interface and joins them.
