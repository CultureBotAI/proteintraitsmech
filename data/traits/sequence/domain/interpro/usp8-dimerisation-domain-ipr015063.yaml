identifier: InterPro:IPR015063
label: "USP8 dimerisation domain"
definition: >-
  This domain is found in the amino terminal region of Ubiquitin carboxyl-terminal hydrolase 8 (USP8). It forms a five helical bundle that dimerises. It is also found in other proteins, including AMSH-like protease and STAM-binding protein.
