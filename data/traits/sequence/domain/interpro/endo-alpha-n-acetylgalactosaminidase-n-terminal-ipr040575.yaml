identifier: InterPro:IPR040575
label: "Endo-alpha-N-acetylgalactosaminidase, N-terminal"
definition: >-
  This is the N-terminal domain found in Streptococcus pneumoniae endo-alpha-N-acetylgalactosaminidase ( ) , a cell surface-anchored glycoside hydrolase from family GH101 involved in the breakdown of mucin type O-linked glycans. This is a twisted β-sandwich domain composed of two sheets of six and seven antiparallel β-strands. The domain appears to be missing the extended metal and carbohydrate-binding loops.
