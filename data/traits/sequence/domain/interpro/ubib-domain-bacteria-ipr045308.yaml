identifier: InterPro:IPR045308
label: UbiB domain, bacteria
definition: >-
  UbiB kinases are present in archaea, bacteria and eukaryotes. The founding member of the UbiB family, UbiB from Escherichia coli, is required for the aerobic biosynthesis of coenzyme Q (CoQ). In eukaryotes, UbiB homologues are found exclusively in mitochondria and plastids. This entry represents the UbiB domain found in bacteria.
