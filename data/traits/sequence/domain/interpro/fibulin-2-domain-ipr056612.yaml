identifier: InterPro:IPR056612
label: "Fibulin-2 domain"
definition: >-
  This domain is found at the N-terminal region of Fibulin-2 (FIBL-2) and similar proteins from vertebrates. FIBL-2 binds to fibronectin and some other ligands in a calcium dependent manner. It may act as an adapter that mediates the interaction between FBN1 and ELN.
