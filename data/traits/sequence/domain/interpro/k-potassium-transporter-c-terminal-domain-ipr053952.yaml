label: "K+ potassium transporter, C-terminal domain"
definition: >-
  This is a family of K+ potassium transporters that are conserved across phyla, including bacterial (KUP), yeast (HAK), and plant (AtKT). This entry represents the C-terminal non-membrane domain.
