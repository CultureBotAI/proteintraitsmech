identifier: InterPro:IPR039381
label: "Endopeptidase La, PDZ domain"
definition: >-
  This entry represents the PDZ domain of ATP-dependent LON (also known as La) serine proteases (peptidase family S16). Most PDZ domains bind C-terminal polypeptides, though binding to internal (non-C-terminal) polypeptides and even to lipids has been demonstrated. In this bacterial subfamily of protease-associated PDZ domains a C-terminal β-strand is thought to form the peptide-binding groove base, a circular permutation with respect to PDZ domains found in Eumetazoan signaling proteins.
