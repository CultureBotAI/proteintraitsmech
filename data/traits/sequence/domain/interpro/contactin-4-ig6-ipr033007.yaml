identifier: InterPro:IPR033007
label: "Contactin-4, Ig6"
definition: >-
  Contactins are cell adhesion molecules that belong to the immunoglobulin superfamily and are involved in neural development. They usually consist of six N-terminal Ig domains, four fibronectin type III domains, and a C-terminal glycophosphatidylinositol (GPI)-anchor to the extracellular part of the cell membrane. Contactin-4 (CNTN4/BIG-2) mediates cell surface interactions during nervous system development. It functions as an axon guidance molecule in olfactory sensory neurons and in the accessory optic system. This protein plays a role in the response of neuroblastoma cells to differentiating agents, such as retinoids. It is associated with developmental delay in 3p syndrome and cerebellar degeneration in spinocerebellar ataxia type 16. This entry represents the sixth immunoglobulin (Ig) domain of contactin-4.
