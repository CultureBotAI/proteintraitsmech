identifier: InterPro:IPR053869
label: "C5a peptidase, third Fn3 domain"
definition: >-
  This is the third Fn3 domain found at C5a peptidase from Streptococcus pyogenes (ScpA) and similar sequences from firmicutes. ScpA is a multidomain cell-envelope subtilase that cleaves complement component C5a. This protein consists of a catalytic domain with an inserted PA domain and and three tandemly arranged fibronectin type III domains (Fn1-Fn3).
