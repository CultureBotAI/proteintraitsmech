identifier: InterPro:IPR025731
label: "YecR-like lipoprotein"
definition: >-
  This entry represents YecR-like lipoproteins including the YecR protein from Escherichia coli ( ). These proteins are found in bacteria and viruses and are functionally uncharacterised. These proteins are approximately 110 amino acids in length.
