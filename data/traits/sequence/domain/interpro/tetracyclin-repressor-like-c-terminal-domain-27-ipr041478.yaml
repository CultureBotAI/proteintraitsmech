identifier: InterPro:IPR041478
label: "Tetracyclin repressor-like, C-terminal domain 27"
definition: >-
  This is a C-terminal domain present in putative TetR transcriptional regulators. It is part of a clan that features transcriptional regulators for multidrug efflux pumps, which belong to the TetR superfamily. They are induced by the presence of a variety of factors, such as antibiotics or organic solvents. The C-terminal region featured in these families is thought to contain the inducer-binding site; the divergent sequences in this region allow for the binding of a variety of different inducers.
