identifier: InterPro:IPR030122
label: "F-BAR domain only protein 2, F-BAR domain"
definition: >-
  F-BAR domain only protein 2 (FCHo2) belongs to the F-BAR family, whose members have been implicated in cell membrane processes such as membrane invagination, tubulation and endocytosis. FCHo2 organises clathrin-coated structures and interacts with adaptor Disabled-2 for low-density lipoprotein receptor endocytosis. The structure of the FCHo2 F-BAR domain has been solved. This entry represents the N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCHo2. This domain form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. These dimers can induce membrane deformation in the form of long tubules.
