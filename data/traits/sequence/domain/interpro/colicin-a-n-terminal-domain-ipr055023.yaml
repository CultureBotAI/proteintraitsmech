identifier: InterPro:IPR055023
label: "Colicin-A, N-terminal domain"
definition: >-
  This entry represents the N-terminal translocation domain of colicin A, an endonuclease active on both single- and double-stranded DNA but with undefined specificity. This domain interacts directly with TolAIII (C-terminal domain of TolA) which facilitates translocation through the cell envelope to reach their cytotoxic site of action. This group is specific to enterobacterales.
