identifier: InterPro:IPR033730
label: "Prokaryote proline-tRNA ligase core domain"
definition: >-
  Prolyl-tRNA synthetase (ProRS) is responsible for the attachment of proline to the 3' OH group of ribose of the appropriate tRNA. ProRS is a homodimer. There are two structurally distinct classes of aminoacyl-tRNA synthetases; ProRS has been assigned to class II based upon its structure and the presence of three characteristic sequence motifs in the core domain. The core domain is primarily responsible for ATP-dependent formation of the enzyme bound aminoacyl-adenylate. This entry contains the core domain of ProRS from prokaryotes and from the mitochondria of eukaryotes.
