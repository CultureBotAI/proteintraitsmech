identifier: InterPro:IPR048575
label: "Roquin 1/2-like, ROQ domain"
definition: >-
  This domain is found in Roquin-1/2 from humans and in other eukaryotic RING-E3 ubiquitin ligases and transferases. These paralogous proteins Roquin-1/2 recruit the deadenylation and decapping machineries to initiate mRNA degradation. They play a central role in repressing autoimmunity. The ROQ domain, highly conserved, is required for RNA binding and shows a mostly helical structure with a small three-stranded β-sheet. It bears a winged helix-turn-helix motif, which is involved in the binding of constitutive decay elements-containing stem-loop mRNAs.
