identifier: InterPro:IPR041974
label: "Ubiquitin carrier protein 27, UBA domain"
definition: >-
  Ubiquitin carrier protein 27 (UBC27), functions as a class II ubiquitin-conjugating (UBC) enzyme (E2). E2, together with E1 (ubiquitin-activating enzyme UBA) and E3 (ubiquitin ligase), is required in the multi-step reaction of ubiquitin conjugation. Unlike other Arabidopsis UBCs, in addition to an N-terminal ubiquitin-conjugating enzyme E2 catalytic domain (UBCc), UBC27 has an additional C-terminal ubiquitin-associated domain (UBA). This entry represents the UBA domain.
