identifier: InterPro:IPR041395
label: "McpB, third HAMP domain"
definition: >-
  This entry represents the third of five HAMP domains of Methyl-accepting chemotaxis protein McpB from Pseudomonas aeruginosa and similar sequences mainly from gammaproteobacteria. McpB, also known as Aerotaxis transducer Aer2, is a chemoreceptor that plays a critical role in the virulence and pathogenesis of the bacteria in a variety of hosts. This domain adopts a conformation resembling Af1503, with only minor differences in helical tilt and orientation. The basic construction of each HAMP domain consists of a monomeric unit of two parallel α-helices (AS1 and AS2) joined by an elongated connector of 12-14 residues form a parallel four-helix bundle.
