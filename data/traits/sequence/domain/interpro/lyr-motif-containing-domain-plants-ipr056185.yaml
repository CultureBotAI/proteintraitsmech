identifier: InterPro:IPR056185
label: "LYR motif containing domain, plants"
definition: >-
  This domain is found in uncharacterised plant proteins. It is predicted to fold into a three helical up-and-down bundle. It shares sequence similarity to LYR motif containing domains and has the motif conserved.
