identifier: InterPro:IPR048396
label: "Shedu protein SduA, N-terminal"
definition: >-
  This domain is found at the N terminus of Shedu protein SduA ( ), the only component of antiviral defence system Shedu. Expression of Shedu in B.subtilis (strain BEST7003) confers resistance to phages phi105, phi29, rho14 and to a lesser extent to SPP1.
