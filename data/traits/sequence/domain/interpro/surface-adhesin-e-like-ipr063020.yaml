identifier: InterPro:IPR063020
label: "Surface adhesin-E-like"
definition: >-
  This entry represents a conserved domain found in a small proteins of approximately 100 residues found in Cyanobacteriota, predominantly in Prochlorococcus. These proteins are related to the surface adhesin-E family. The function of this entry remains to be determined.
