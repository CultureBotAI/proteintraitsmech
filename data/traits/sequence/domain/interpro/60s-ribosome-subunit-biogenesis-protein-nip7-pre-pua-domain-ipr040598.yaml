identifier: InterPro:IPR040598
label: "60S ribosome subunit biogenesis protein NIP7, pre-PUA domain"
definition: >-
  Human 60S ribosome subunit biogenesis protein NIP7 homologue (also known as KD93) is essential in the accurate processing of pre-rRNA. The overall fold of KD93 consists of two interlinked α/β domains. The C-terminal domain resembles the PUA domain of some RNA modification enzymes, especially that of archaeosine tRNA-ribosyltransferase (ArcTGT), suggesting a possible molecular function related to RNA binding. This entry represents the N-terminal, pre-PUA domain of NIP7 and its homologues from eukaryotes, and UPF0113 proteins from archaea, whose function is unknown.
