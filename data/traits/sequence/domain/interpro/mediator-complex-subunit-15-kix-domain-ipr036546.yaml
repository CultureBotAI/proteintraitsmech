identifier: InterPro:IPR036546
label: "Mediator complex subunit 15, KIX domain"
definition: >-
  GAL11 is a component of the Mediator complex, a co-activator that plays critical roles in transcriptional activation. The GAL11/MED15 subunit has an N-terminal KIX domain, which is an activator-binding domain. This domain contains a docking site for the activation domain of yeast drug resistance protein Pdr1, therefore is thought to be involved in antifungal/xenobiotic-dependent regulation of multidrug resistance.
