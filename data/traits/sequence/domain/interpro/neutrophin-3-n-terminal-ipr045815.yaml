identifier: InterPro:IPR045815
label: "Neutrophin-3, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Neutrophin-3 (NTF3). It contains two precursor homology regions located upstream of the mature NTF3 sequence. These regions play important and specific roles in the folding, processing and transport of neurotrophic factors.
