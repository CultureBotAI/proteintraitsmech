identifier: InterPro:IPR044866
label: "HNF-1, dimerization domain"
definition: >-
  The homeodomain proteins hepatocyte nuclear factor (HNF)-1alpha and HNF-1beta comprise a functionally important family in which dimerization is essential for DNA binding. HNF-1alpha and HNF-1beta regulate tissue-specific genes in liver, kidney, intestine, and pancreas. These proteins form homo- and heterodimers through an autonomously folded domain encompassing the 32 N-terminal amino acids (HNF-p1). The dimerization domain also binds the transcriptional coactivator DCoH, which stimulates HNF-1alpha activity. The HNF-p1 dimer folds into an X-type, antiparallel, four-helix bundle (4HB). Each monomer consists of two helices: a longer N-terminal helix and a shorter C-terminal helix, connected by a tight turn unrelated to classical β- or γ-turn families. The dimer contains a rigid element, the N-terminal anti-parallel mini-zipper comprising α-helices 1 and 1', and a plastic element, the C-terminal coiled-coil comprising α-helices 2 and 2'.
