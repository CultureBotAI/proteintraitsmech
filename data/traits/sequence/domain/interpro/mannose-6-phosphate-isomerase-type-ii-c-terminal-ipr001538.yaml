identifier: InterPro:IPR001538
label: Mannose-6-phosphate isomerase, type II, C-terminal
definition: >-
  The type II phosphomannose isomerases are bifunctional enzymes . This entry covers the isomerase region of the protein. The guanosine diphospho-D-mannose pyrophosphorylase region is described in another InterPro entry (see ). Mannose-6-phosphate isomerase or phosphomannose isomerase ( ) (PMI) is the enzyme that catalyses the interconversion of mannose-6-phosphate and fructose-6-phosphate. In eukaryotes PMI is involved in the synthesis of GDP-mannose, a constituent of N-and O-linked glycans and GPI anchors and in prokaryotes it participates in a variety of pathways, including capsular polysaccharide biosynthesis and D-mannose metabolism. PMI's belong to the cupin superfamily whose functions range from isomerase and epimerase activities involved in the modification of cell wall carbohydrates in bacteria and plants, to non-enzymatic storage proteins in plant seeds, and transcription factors linked to congenital baldness in mammals. Three classes of PMI have been defined.
