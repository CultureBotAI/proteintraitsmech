identifier: InterPro:IPR040451
label: "Glycosyl hydrolase family 81, N-terminal"
definition: >-
  The glycosyl hydrolase family 81 comprises beta-1,3-glucanases which includes Eng1/Eng2 from fission yeast. Proteins in this entry hydrolyse linear beta-1,3-glucan chains. Eng1 is required for the degradation of the primary septum after completion of cytokinesis. Eng2 plays a role in coupling the endocytic coat to the actin cytoskeleton and, independently of this activity, it is required to establish bipolar cell growth by promoting localization of the scaffold protein scd2 to cell poles and thereby, the activation of cdc42. The endo-beta-1,3-glucanase activity is essential for efficient spore release. This entry represents the N-terminal β-sandwich domain.
