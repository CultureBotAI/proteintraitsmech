identifier: InterPro:IPR004474
label: "Cell envelope-related transcriptional attenuator domain"
definition: >-
  This entry describes a domain (known as LCP domain) that is found in the predicted extracellular domain of a number of proteins involved in cell wall biosynthesis. One of these is protein Psr, described as a penicillin binding protein 5 (PDP-5) synthesis repressor. Another is Bacillus subtilis LytR, described as a transcriptional attenuator of itself and the LytABC operon, where LytC is N-acetylmuramoyl-L-alanine amidase. A third is CpsA, a putative regulatory protein involved in exocellular polysaccharide biosynthesis. These proteins share the property of having a short putative N-terminal cytoplasmic domain and transmembrane domain forming a signal-anchor. Studies in Corynebacterium glutamicum revealed that this domain contains conserved aspartate and arginine residues and mutations in this domain are detrimental for the bacterium growth.
