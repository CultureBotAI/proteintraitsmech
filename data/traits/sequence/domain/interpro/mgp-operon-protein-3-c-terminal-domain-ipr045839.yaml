identifier: InterPro:IPR045839
label: "Mgp-operon protein 3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the Mycoplasma genitalium p110 adhesin protein (also known as Mgp-operon protein 3). This domain has a compact Ig fold and is adjacent to the membrane. It contains a bound potassium ion.
