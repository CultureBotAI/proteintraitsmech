identifier: InterPro:IPR055098
label: "NUP210, Ig-like domain 3"
definition: >-
  This domain is found in human Nuclear pore membrane glycoprotein 210 (NUP210) and its homologues. The domain represented by this entry is one of these constituent Ig-like domains and has a significant structural similarity to cadherin domains. NUP210 is essential for nuclear pore assembly and fusion, nuclear pore spacing, as well as for its structural integrity. NUP210 is composed of multiple immunoglobulin-like (Ig-like) domains and forms a ring around the NPC within the NE lumen. There are eight copies of NUP210 per spoke. NUP210 is the only NUP that primarily resides in the NE lumen. This protein is not required for faithful NPC assembly.
