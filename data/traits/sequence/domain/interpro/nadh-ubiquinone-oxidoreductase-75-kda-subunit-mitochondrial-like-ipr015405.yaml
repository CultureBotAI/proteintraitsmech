identifier: InterPro:IPR015405
label: NADH-ubiquinone oxidoreductase 75 kDa subunit, mitochondrial-like
definition: >-
  This entry represents a domain found at the C-terminal end of various NADH dehydrogenases from bacteria and eukaryotes, including NADH-quinone oxidoreductase subunit G from Rickettsia typhi (NuoG) and NADH-ubiquinone oxidoreductase 75 kDa subunit, mitochondrial from humans (NDUFS1, also known as Complex I-75kD, CI-75kD). NuoG shuttles electrons from NADH, via FMN and iron-sulfur (Fe-S) centers, to quinones in the respiratory chain. NDUFS1 is a core subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I) which catalyses electron transfer from NADH through the respiratory chain, using ubiquinone as an electron acceptor. This protein is associated with mitochondrial disorders leading to a group of highly heterogeneous conditions ranging from lethal neonatal disease to adult-onset neurodegenerative disorders.
