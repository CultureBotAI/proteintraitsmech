identifier: InterPro:IPR056981
label: "Serine/threonine-protein kinase ULK4/RUNKEL, HEAT repeats"
definition: >-
  This region of HEAT repeats is found in human Serine/threonine-protein kinase ULK4, Serine/threonine-protein kinase RUNKEL from Arabidopsis thaliana and similar sequences mainly found in animals and plants. ULK4 may be involved in the remodelling of cytoskeletal components and in the regulation of neurite branching and elongation, as well as cell motility. In humans, ULK4 gene has been proposed to be a rare susceptibility risk factor for a range of psychiatric diseases including schizophrenia. RUNKEL is an essential protein that regulates phragmoplast microtubule organisation during cell plate expansion in cytokinesis during cell division, both somatic and syncytial. It may not have kinase activity.
