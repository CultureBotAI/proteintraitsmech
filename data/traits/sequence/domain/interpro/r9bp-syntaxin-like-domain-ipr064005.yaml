identifier: InterPro:IPR064005
label: "R9BP, syntaxin-like domain"
definition: >-
  This domain is found in the Regulator of G-protein signaling 9-binding protein and related proteins. RGS9BP mediates targeting of RGS9-1 to photoreceptor outer segments and enhances GTPase activity during phototransduction. This domain shares significant similarity to Syntaxin-like domains.
