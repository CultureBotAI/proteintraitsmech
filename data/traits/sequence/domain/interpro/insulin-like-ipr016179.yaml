identifier: InterPro:IPR016179
label: Insulin-like
definition: >-
  This entry represents a disulphide-rich α-helical domain found in insulin, as well as in related proteins, such as insulin-like growth factor, relaxin and bombyxin. Insulin is found in many animals, and is involved in the regulation of normal glucose homeostasis. It also has other specific physiological effects, such as increasing the permeability of cells to monosaccharides, amino acids and fatty acids, and accelerating glycolysis and glycogen synthesis in the liver. Insulin exerts its effects by interaction with a cell-surface receptor, which may also result in the promotion of cell growth. The insulin/IGF/relaxin superfamily is an ancient family of functionally diverse proteins. The 3D structures of a number of family members have been determined. The fold comprises two polypeptide chains (A and B) linked by two disulphide bonds: all share a conserved arrangement of four cysteines in their A chain, the first of which is linked by a disulfide bond to the third, while the second and fourth are linked by interchain disulfide bonds to cysteines in the B chain. This family includes: Insulin and insulin-like proteins Relaxin and prorelaxin Insect prothoracicotropic hormone (bombyxin) Insulin-like growth factors (IGF1 and IGF2) Mammalian Leydig cell-specific insulin-like peptide (gene INSL3) Invertebrates insulin-related peptides (IRPs)
