identifier: InterPro:IPR048812
label: "Baseplate wedge protein gp7, domain VI"
definition: >-
  This domain is found in Baseplate wedge protein gp7 from Bacteriophage T4 and similar proteins from tailed bacteriophages. Gp7 provides the primary control of the conformational changes of the viral baseplate during assembly and infection. This protein is organised into six domains connected by flexible linkers. This entry represents Domain VI, which forms a ribbon-like structure that interacts with N-terminal region of the protein Gp10.
