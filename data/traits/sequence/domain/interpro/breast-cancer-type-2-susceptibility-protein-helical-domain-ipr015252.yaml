identifier: InterPro:IPR015252
label: "Breast cancer type 2 susceptibility protein, helical domain"
definition: >-
  This entry represents a domain found in BRCA2 proteins. This domain adopts a helical structure, consisting of a four-helix cluster core (α1, α8, α9, α10) and two successive β-hairpins (β1 to β4). An approximately 50-amino acid segment that contains four short helices (α2 to α4), meanders around the surface of the core structure. In BRCA2, the α9 and α10 helices pack with BRCA-2_OB1 ( ) through van der Waals contacts involving hydrophobic and aromatic residues, and also through side-chain and backbone hydrogen bonds. This domain binds the 70-amino acid DSS1 (deleted in split-hand/split foot syndrome) protein, which was originally identified as one of three genes that map to a 1.5-Mb locus deleted in an inherited developmental malformation syndrome.
