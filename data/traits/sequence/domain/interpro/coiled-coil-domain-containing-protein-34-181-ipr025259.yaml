identifier: InterPro:IPR025259
label: "Coiled-coil domain-containing protein 34/181"
definition: >-
  This domain can be found in animal CCDC34 and CCDC181 proteins. CCDC34 promotes cell proliferation and invasive properties in human cancer. CCDC181 is a microtubule-binding protein that may play a role in mediating ciliary motility.
