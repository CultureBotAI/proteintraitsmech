identifier: InterPro:IPR055344
label: "Protein-export membrane protein SecD/SecF, C-terminal, bacterial"
definition: >-
  This entry represents the C-terminal domain of various prokaryotic SecD and SecF protein export membrane proteins. These SecD and SecF proteins are part of the multimeric protein export complex comprising SecA, D, E, F, G, Y, and YajC. SecD and SecF are required to maintain a proton motive force.
