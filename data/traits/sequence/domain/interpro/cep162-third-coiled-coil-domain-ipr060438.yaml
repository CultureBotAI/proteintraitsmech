identifier: InterPro:IPR060438
label: "CEP162, third coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found near the C-terminal of CEP162 (centrosomal protein of 162 kDa) and similar animal proteins. CEP162 is required to promote assembly of the transition zone in primary cilia by specifically recognising and binding the axonemal microtubule. The protein localises to the distal ends of centrioles before ciliogenesis and directly binds to axonemal microtubule, thereby promoting and restricting transition zone formation specifically at the cilia base. CEP162 contains multiple coiled coil regions and interacts with CEP290, alpha-tubulin and CPNE4. CEP162 is required to mediate CEP290 association with microtubules. It contains multiple coiled- coil regions, with this domain being one of the major structural elements.
