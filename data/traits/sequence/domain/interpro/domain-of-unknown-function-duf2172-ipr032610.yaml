identifier: InterPro:IPR032610
label: "Domain of unknown function DUF2172"
definition: >-
  This domain, found in various hypothetical prokaryotic proteins, has no known function. It is an inserted (nested domain) within an amino-peptidase domain. The relevance of the amino-peptidase domain has not been established yet and the function of this small domain is not known.
