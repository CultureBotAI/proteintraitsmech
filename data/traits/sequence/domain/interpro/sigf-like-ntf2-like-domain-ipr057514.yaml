identifier: InterPro:IPR057514
label: "SigF-like, NTF2-like domain"
definition: >-
  This domain is found in the SrfA-induced gene F protein (SigF) from Dictyostelium discoideum and related proteins mainly found in fungi. SigF was identified amongst genes whose expression is dependent on the MADS box transcription factor SrfA and are induced late in development. This domain has a detectable similarity to NTF2 domains and it is predicted to adopt a similar structure.
