identifier: InterPro:IPR063840
label: "Sperm transmembrane protein 9, second EGF-like domain"
definition: >-
  This entry represents the second EGF-like domain of the sperm transmembrane protein SPE-9 from Caenorhabditis elegans. SPE-9 is required for fertilisation and contains five EGF-like domains in total. Mutation of the central cysteine residue to tyrosine in this protein completely abolishes fertilisation function, indicating the critical importance of proper disulphide bond formation. The protein is expressed in spermatids and localised to the sperm cell surface.
