identifier: InterPro:IPR006067
label: Nitrite/sulphite reductase 4Fe-4S domain
definition: >-
  Sulphite reductases (SiRs) and related nitrite reductases (NiRs) catalyse the six-electron reduction reactions of sulphite to sulphide, and nitrite to ammonia, respectively. The Escherichia coli SiR enzyme is a complex composed of two proteins, a flavoprotein alpha-component (SiR-FP) and a hemoprotein beta-component (SiR-HP) ( ), and has an α(8)β(4) quaternary structure. SiR-FP contains both FAD and FMN, while SiR-HP contains a Fe(4)S(4) cluster coupled to a siroheme through a cysteine bridge. Electrons are transferred from NADPH to FAD, and on to FMN in SiR-FP, from which they are transferred to the metal centre of SiR-HP, where they reduce the siroheme-bound sulphite. SiR-HP has a two-fold symmetry, which generates a distinctive three-domain α/β fold that controls assembly and reactivity. In the E. coli SiR-HP enzyme ( ), the iron is bound to cysteine residues at positions 433, 439, 478 and 482, the latter also forming the siroheme ligand.
