identifier: InterPro:IPR060526
label: "Centromere protein C, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of centromere protein C (CENP-C) from plants. This C-terminal region contains the MIF2 homology domain II, which targets centromeres and binds centromeric DNA. The specific function of this C-terminal domain is centromeric DNA binding and centromere targeting. CENP-C is a component of the CENPA-NAC complex that plays a central role in kinetochore assembly, mitotic progression and chromosome segregation. The protein is localised to the centromeric regions, particularly the kinetochore domain, throughout the cell cycle.
