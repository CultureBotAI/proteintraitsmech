label: "Zinc finger protein 292/Rlf, C2H2-type zinc finger"
definition: >-
  This is the C2H2-type zinc finger of human Zinc finger protein 292 (ZNF292), Rlf and similar proteins from vertebrates. Members of this group may be involved in transcriptional regulation.
