identifier: InterPro:IPR041353
label: "Flax-rust effector AvrM, N-terminal domain"
definition: >-
  This is the N-terminal domain found in AvrM present in Melampsora lini. AvrM is a secreted effector protein that can internalize into plant cells in the absence of pathogens, binds to phosphoinositides and results in effector-triggered immunity. This domain is related to the WY domain core in oomycete effectors.
