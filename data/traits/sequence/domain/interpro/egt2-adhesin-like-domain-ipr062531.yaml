identifier: InterPro:IPR062531
label: "EGT2, adhesin-like domain"
definition: >-
  This entry represents an adhesin-like domain found in EGT2 and related proteins from yeasts. EGT2 is a GPI-anchored cell wall protein involved in cell separation after cytokinesis. The protein localises to the septum of dividing cells and is involved in the correct timing of daughter cell separation. EGT2 contains multiple tandem repeats and extensive N-linked glycosylation sites. The protein is expressed exclusively between the end of mitosis and early G1 phase. The function of this adhesin-like domain remains to be determined.
