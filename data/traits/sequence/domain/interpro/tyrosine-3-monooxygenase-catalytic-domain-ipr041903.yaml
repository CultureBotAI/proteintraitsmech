identifier: InterPro:IPR041903
label: "Tyrosine 3-monooxygenase, catalytic domain"
definition: >-
  Tyrosine 3-monooxygenase (TH) or eukaryotic tyrosine hydroxylase (TyrOH) is a member of the biopterin-dependent aromatic amino acid hydroxylase family of non-heme, iron(II)-dependent enzymes that also includes prokaryotic and eukaryotic phenylalanine-4-hydroxylase (PheOH) and eukaryotic tryptophan hydroxylase (TrpOH). TyrOH catalyzes the conversion of tyrosine to L-dihydroxyphenylalanine (L-DOPA), the rate-limiting step in the biosynthesis of the catecholamines dopamine, noradrenaline, and adrenaline. All three of the aromatic amino acid hydroxylases from eukaryotic sources share a three domain structure. There is an N-terminal regulatory domain of 100-170 residues, followed by the catalytic domain and a C-terminal 40 residues tetramerization domain.
