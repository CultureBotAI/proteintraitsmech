identifier: InterPro:IPR060297
label: "VSTM5, C-terminal region"
definition: >-
  This entry represents the C-terminal helical region of V-set and transmembrane domain-containing protein 5 (VSTM5), found in mammals. This domain spans the transmembrane region and cytoplasmic tail of VSTM5. While the full-length protein has established roles in neuronal development, the specific function of this C-terminal coiled-coil domain remains to be determined. VSTM5 protein is a cell adhesion membrane protein that regulates neuronal morphology and migration in the central nervous system. VSTM5 modulates dendritic spine formation, synaptogenesis, and neuronal migration during cortical development. The cytoplasmic region contains a region important for CDC42-dependent filopodia induction.
