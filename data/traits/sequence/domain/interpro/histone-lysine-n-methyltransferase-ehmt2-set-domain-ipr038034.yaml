identifier: InterPro:IPR038034
label: Histone-lysine N-methyltransferase EHMT2, SET domain
definition: >-
  Histone-lysine N-methyltransferase EHMT2 ( ) mono- and dimethylates 'Lys-9' of histone H3 (H3K9me1 and H3K9me2, respectively) in euchromatin. H3K9me is a specific tag for repression of epigenetic transcription, recruiting HP1 proteins to methylated histones. EHMT2 also monomethylates 'Lys-56' of histone H3 (H3K56me1) during the G1 phase of the cell cycle, and methylates 'Lys-27' of histone H3 (H3K27me). EHMT2 also dimethylates other proteins, including 'Lys-373' of p53. EHMT2 forms a heterodimer with EHMT1, and is a component of the E2F6.com-1 complex in G0 phase. EHMT2 contains seven ankyrin repeats which bind the monomethylated RELA subunit of NF-kappa-B, a SET domain which interacts with WIZ, and a pre-SET domain that binds three zinc ions via cysteine residues. This entry covers the the pre-SET and SET domains.
