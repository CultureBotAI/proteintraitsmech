identifier: InterPro:IPR015275
label: "Actin-fragmin kinase, catalytic domain"
definition: >-
  This domain assumes a secondary structure consisting of eight β strands and 11 α-helices, organised in two lobes. It is predominantly found in actin-fragmin kinase. It is the catalytic domain that mediates the phosphorylation of actin. An atypical actin-fragmin kinase domain is also found at the N terminus of dual-specificity phosphatases such as propyzamide-hypersensitive 1 (PHS1).
