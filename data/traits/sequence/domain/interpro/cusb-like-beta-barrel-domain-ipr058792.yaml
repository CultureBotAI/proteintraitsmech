identifier: InterPro:IPR058792
label: "CusB-like, beta-barrel domain"
definition: >-
  This domain is found in the periplasmic membrane fusion proteins (MFPs) that are components of the RND tripartite drug efflux pumps. MFPs bridge the outer membrane factor and an inner membrane transporter. One characterised smember is the Cation efflux system protein CusB which is an essential component of the CusCBA tripartite efflux system from Escherichia coli. This protein plays an essential role in bridging the inner membrane efflux pump CusA and the outer membrane channel CusC to mediate resistance to Cu+ and Ag+ ions. CusB is a multidomain protein and assembles into homohexamer that forms a narrow channel defined by an α-helical domain and a barrel-sandwich hybrid domain in which it is inserted. The remaining two domains, one of which is represented by this entry, form a cap-like structure that engages in interactions with the CusA trimer. The domain represented in this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel. This model does not include the N-terminal strand.
