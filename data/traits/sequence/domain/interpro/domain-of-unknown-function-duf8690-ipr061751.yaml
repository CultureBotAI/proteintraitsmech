label: "Domain of unknown function DUF8690"
definition: >-
  This entry represents an N-terminal domain of approximately 95 residues found in bacterial AAA ATPases. This small family of 16 proteins is restricted to Planctomycetota and Chloroflexota. The function of this domain remains to be determined.
