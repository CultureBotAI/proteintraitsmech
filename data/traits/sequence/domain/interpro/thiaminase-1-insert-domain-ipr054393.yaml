identifier: InterPro:IPR054393
label: "Thiaminase-1, insert domain"
definition: >-
  This domain is found in Thiaminase-1 from Paenibacillus thiaminolyticus and similar bacterial sequences. This enzyme degrades thiamine by replacing its thiazole moiety with a wide range of nucleophiles. This entry represents one of its two α/β-type domains, which is inserted into the other ( ).
