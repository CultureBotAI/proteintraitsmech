identifier: InterPro:IPR033703
label: "Picornavirus/Calicivirus coat protein"
definition: >-
  This domain occurs in the capsid proteins of picornaviruses and caliciviruses. They are non-enveloped plus-strand ssRNA animal viruses. The Picornaviridae family includes rhinovirus (common cold), poliovirus, hepatitis A virus, foot-and-mouth disease virus and encephalomyocarditis virus. The capsid coat protein composition of picornaviruses consists of multiple structural proteins arranged to form an icosahedral capsid. Each capsid is made up of 60 protomers, and every protomer generally contains three or four structural proteins; most commonly VP1, VP2, VP3, and VP4. The core structural domain of each of the major capsid proteins (VP1, VP2, and VP3) contains an 8-stranded antiparallel β-barrel (jelly-roll fold).
