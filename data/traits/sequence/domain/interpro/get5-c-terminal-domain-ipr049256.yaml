identifier: InterPro:IPR049256
label: "Get5, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Get5 from A. fumigatus and related proteins found primarily in Ascomycetes. This domain folds into helical hairpin that dimerises to form a four helical bundle. This entry does not include proteins from Saccharomycetes. The domain found in these species is represented by . Tail-anchored trans-membrane proteins are targeted to membranes post-translationally. The proteins Get4 and Get5 form an obligate complex that catalyses the transfer of tail-anchored proteins destined to the endoplasmic reticulum from Sgt2 to the cytosolic targeting factor Get3.
