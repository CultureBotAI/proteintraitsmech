identifier: InterPro:IPR024397
label: "Poxvirus poly(A) polymerase, catalytic subunit, C-terminal"
definition: >-
  Poly(A) polymerase ( ) catalyses template-independent extension of the 3'-end of a DNA or RNA strand by one nucleotide at a time. The Poxvirus enzyme creates the 3'(poly)A tail of mRNAs, and is a heterodimer of a catalytic and a regulatory subunit. The Poxvirus enzyme creates the 3'(poly)A tail of mRNAs, and is a heterodimer composed of a catalytic (VP55, also known as PAP-L) and a regulatory subunit (VP39). VP55 comprises three domains: the N-terminal or N domain, the central or catalytic domain, and the C-terminal or C domain, all three domains having distinct topologies. The core comprises a mixed nine-stranded twisted β sheet, with the first seven strands being folded from one long (118 residue) polypeptide segment that follows the N domain and the last two strands originating from the extreme C-terminal-most 15 residues of the entire polypeptide chain. Of the four α-helices in the catalytic domain, the two longest (J and L) near the surface pack against one side of the β-sheet in a nearly parallel orientation to the β-strands. This domain is found at the C terminus of the pox virus PolyA polymerase protein VP55.
