identifier: InterPro:IPR058882
label: "Alkaline phosphatase-like protein PglZ, C-terminal domain"
definition: >-
  This entry represents the C-terminal α-helical domain of Alkaline phosphatase-like protein PglZ from Streptomyces coelicolor and similar sequences from actinomycetes and some species from proteobacteria and planctomycetes. PglZ is part of the BREX (bacteriophage exclusion) system that provides immunity against bacteriophages. Experimental evidence shows that this C-terminal domain is dispensable for both phage resistance and the antitoxin activity of PglZ against its cognate toxin PglX. Deletion of this domain still allows PglZ to confer the Pgl+ phenotype (phage resistance) and maintain its function in the toxin-antitoxin system. While not essential for the known functions of PglZ, this domain may play accessory roles in protein-protein interactions or in fine-tuning the activity of the BREX system in different contexts. This domain is found associated with and .
