identifier: InterPro:IPR032674
label: "LRR-containing bacterial E3 ligase, N-terminal"
definition: >-
  This domain is found in the N terminus of a group of bacterium-specific E3 enzymes that function as type three secretion system (T3SS) effectors in Salmonella, Shigella, and other Gram-negative bacteria. It is approximately 50 amino acids in length. There are two completely conserved residues (Y and W) that may be functionally important. Proteins containing this domain include SspH1 from Salmonella typhimurium and IpaH9.8 from Shigella flexneri. The structure of the Shigella IpaH and Salmonella SspH1 has been solved.
