identifier: InterPro:IPR062963
label: "DciA, C-terminal zinc-binding domain"
definition: >-
  This entry represents a small C-terminal domain of approximately 45 residues found in cyanobacterial DciA proteins. These proteins contain an N-terminal DciA domain ( ) followed by this C-terminal domain. DciA proteins are involved in DNA replication initiation in bacteria. The small size and conserved cysteine residues suggest this domain may coordinate a zinc ion. Some family members are annotated as RNA-binding proteins. The family is found exclusively in cyanobacteria. The function of this domain remains to be determined.
