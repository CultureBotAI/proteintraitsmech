identifier: InterPro:IPR057075
label: "Iron-related transcription factor 3, bHLH domain"
definition: >-
  This entry represents the bHLH domain of iron-related transcription factor 3 from Oryza sativa and similar plant proteins. This transcription factor acts as a negative regulator of the iron deficiency response and plays an important role for iron homeostasis in rice. This domain is also found in a number of plant transcription factors, such as bHLH11, bHLH47, BHLH062 and bHLH121.
