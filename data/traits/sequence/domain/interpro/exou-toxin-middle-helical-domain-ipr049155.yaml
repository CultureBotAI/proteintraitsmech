identifier: InterPro:IPR049155
label: "ExoU toxin, middle helical domain"
definition: >-
  Many pathogenic Gram-negative bacteria use type III secretion systems (T3SS) to deliver effector proteins into the host cell cytosol and facilitate the infectious process. The effector protein ExoU from Pseudomonas aeruginosa, one of the most aggressive toxins injected by a T3SS, has four distinct domains. The chaperone-binding domain consists of two separate regions, a N-terminal region and a middle subdomain (this entry). The latter shows a mostly α-helical structure.
