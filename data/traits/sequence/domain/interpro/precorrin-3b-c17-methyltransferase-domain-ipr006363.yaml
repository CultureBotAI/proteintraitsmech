identifier: InterPro:IPR006363
label: Precorrin-3B C17-methyltransferase domain
definition: >-
  This entry represents a domain found in CobJ and CbiH precorrin-3B C(17)-methyltransferase ( ). In the aerobic pathway, once CobG has generated precorrin-3b, CobJ catalyses the methylation of precorrin-3b at C-17 to form precorrin-4 (the extruded methylated C-20 fragment is left attached as an acyl group at C-1). In the corresponding anaerobic pathway, CbiH carries out this ring contraction, using cobalt-precorrin-3b as a substrate to generate a tetramethylated delta-lactone. In Mycobacterium this domain fuses with the P precorrin-2 C(20)-methyltransferase domain ( ) into a bifunctional enzyme known as cobIJ. Cobalamin (vitamin B12) is a structurally complex cofactor, consisting of a modified tetrapyrrole with a centrally chelated cobalt. Cobalamin is usually found in one of two biologically active forms: methylcobalamin and adocobalamin. Most prokaryotes, as well as animals, have cobalamin-dependent enzymes, whereas plants and fungi do not appear to use it. In bacteria and archaea, these include methionine synthase, ribonucleotide reductase, glutamate and methylmalonyl-CoA mutases, ethanolamine ammonia lyase, and diol dehydratase. In mammals, cobalamin is obtained through the diet, and is required for methionine synthase and methylmalonyl-CoA mutase.
