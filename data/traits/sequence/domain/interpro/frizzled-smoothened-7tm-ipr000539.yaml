identifier: InterPro:IPR000539
label: Frizzled/Smoothened, 7TM
definition: >-
  This domain is the membrane spanning region of frizzled and smoothened receptors. This membrane region is predicted to contain seven transmembrane α-helices. Proteins related to Drosophila frizzled ( ) are receptors for Wnt (mediating the beta-catenin signalling pathway), but also the planar cell polarity (PCP) pathway and the Wnt/calcium pathway. The predominantly α-helical Cys-rich ligand-binding region (CRD) of Frizzled is both necessary and sufficient for Wnt binding. The smoothened receptor mediates hedgehog signalling.
