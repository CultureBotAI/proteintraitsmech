identifier: InterPro:IPR010839
label: "Acyclic terpene utilisation, N-terminal"
definition: >-
  This entry consists of several bacterial and plant proteins of around 400 residues in length. It represents a domain found either as a standalone or at the N terminus of these proteins and combined with distinct domains. One member of this family has been characterised in Pseudomonas citronellolis as AtuA, a member of a gene cluster that is essential for the acyclic terpene utilisation (Atu) pathway.
