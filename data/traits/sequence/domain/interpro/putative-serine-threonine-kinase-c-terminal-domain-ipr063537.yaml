identifier: InterPro:IPR063537
label: "Putative serine/threonine kinase, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 145 residues found in putative serine/threonine protein kinases found mainly in Actinomycetes. These proteins also contain the PK_Tyr_Ser-Thr kinase domain. Structural comparison suggests this domain has a PsbP-like fold.
