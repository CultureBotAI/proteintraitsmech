identifier: InterPro:IPR005939
label: Beta-lactamase hydrolase-like protein, phosphatase-like domain
definition: >-
  This domain is found N-terminal to a beta-lactamase domain, and it may have phosphatase activity. This domain is found in Beta-lactamase hydrolase-like protein from Agrobacterium fabrum, which may play a role in cell adherence or biofilm development.
