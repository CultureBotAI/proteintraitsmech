identifier: InterPro:IPR055256
label: "KHDC4/BBP-like, KH-domain type I"
definition: >-
  This entry represents an eukaryotic type I KH domain found in a group of proteins involved in pre-mRNA splicing, such as KH domain-containing BBP from fungi, KH homology domain-containing protein 4 (KHDC4, also known as BLOM7) and Splicing factor 1 from animals, animal quaking proteins such as human QKI, and homologues from plants, including RIK. BBP/SF1 family members include the branchpoint binding proteins (BBP) from yeast and their mammalian homologue, splicing factor 1 (SF1). They are required for pre-spliceosome formation, which is the first step of pre-mRNA splicing. BBP binds the conserved RNA sequence UACUAAC, called the branchpoint motif, found near the 3' end of yeast introns. Besides its function in pre-mRNA splicing, BBP is also involved in nuclear retention of pre-mRNA. Mammalian SF1, also known as ZFM1, may act as transcription repressor. KHDC4 interacts with the PRP19C/Prp19 complex/NTC/Nineteen complex which is part of the spliceosome. It binds preferentially RNA with A/C rich sequences and poly-C stretches. KHDC4 contains two type I K homology (KH) RNA-binding domains. RIK1 interacts with rough sheath2 (RS2), which is a myb domain protein required to repress knox genes during leaf development. Human QKI is involved in various cellular processes, such as mRNA storage into stress granules, apoptosis, lipid deposition, interferon response, glial cell fate and development. The core KH domain is accompanied by additional α-helix and β-sheet motifs at the C terminus.
