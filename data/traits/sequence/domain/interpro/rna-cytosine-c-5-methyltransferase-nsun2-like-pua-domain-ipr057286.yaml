identifier: InterPro:IPR057286
label: "RNA cytosine-C(5)-methyltransferase NSUN2-like, PUA domain"
definition: >-
  This domain is found in RNA cytosine C(5)-methyltransferase NSUN2 from animals, multisite-specific tRNA:(cytosine-C(5))- methyltransferase (Trm4) from yeast and related eukaryotic proteins. NSUN2 is an RNA cytosine C5-methyltransferase that methylates cytosine to 5-methylcytosine in various RNAs, such as tRNAs, mRNAs and some long non-coding RNAs. Trm4 is capable of methylating cytosine to m5C at several positions in different yeast tRNAs and pre-tRNAs containing intron. This domain has a detectable similarity to known PUA domains and it is predicted to adopt similar structure.
