identifier: InterPro:IPR026490
label: mRNA cap 0/1 methyltransferase
definition: >-
  This entry represents the mRNA cap 0/1 methyltransferase domain found at the N-terminal of non-structural protein 5 (NS5). NS5 is one of the fourteen chains of genome poplyprotein from Flavivirus. NS5 has three activities: The N-terminal domain catalyses both guanine N-7 and ribose 2'-OH methylations during viral cap formation, and the C-terminal functions as a RNA-directed RNA polymerase.
