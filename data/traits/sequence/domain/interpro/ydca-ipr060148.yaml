identifier: InterPro:IPR060148
label: YdcA
definition: >-
  This entry represents a conserved domain found in YdcA proteins from Enterobacteriaceae. These proteins are approximately 57 amino acids in length and contain a signal peptide at the N-terminal region. YdcA proteins are found in species such as Escherichia coli and Shigella flexneri. The function of these proteins remains to be determined.
