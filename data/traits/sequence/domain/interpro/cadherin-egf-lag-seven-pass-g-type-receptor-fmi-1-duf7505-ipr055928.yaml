identifier: InterPro:IPR055928
label: "Cadherin EGF LAG seven-pass G-type receptor fmi-1, DUF7505"
definition: >-
  This domain of unknown function is found ant the N-terminal of Cadherin EGF LAG seven-pass G-type receptor fmi-1 from Caenorhabditis elegans and in similar uncharacterised proteins from nematodes. Fmi-1 is required for axon fasciculation and navigation during ventral cord development, mediating both pioneer and follower axon extension, guidance and track formation. This domain contain a semi-conserved PPChHPGQ motif (where h is a hydrophobic residue) and is predicted to fold into a incomplete β-sandwich.
