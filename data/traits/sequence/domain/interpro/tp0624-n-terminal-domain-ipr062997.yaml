identifier: InterPro:IPR062997
label: "Tp0624, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Treponema pallidum Tp0624 ( ). The domain is composed of a four-stranded antiparallel β-sheet with an extended helix that packs diagonally against one face, supplemented by three short helices at the base. Structural analysis shows moderate similarity to the ribosome binding domain of Escherichia coli trigger factor , although the ends are divergent and appear to be functionally repurposed. This domain is found in combination with the second domain ( ) in some bacterial proteins from various species. However, the combination of all three Tp0624 domains together is found exclusively in treponemes, primarily in pathogenic species. The first and second domains function as an integrated structural unit, with the third helix forming a substantial portion of the interface with the second domain. The specific function of this domain remains to be determined.
