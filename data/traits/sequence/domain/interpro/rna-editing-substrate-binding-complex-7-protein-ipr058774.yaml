identifier: InterPro:IPR058774
label: "RNA-editing substrate-binding complex 7 protein"
definition: >-
  This domain is found in the RNA-editing substrate-binding complex 7 protein (RESC7) from Trypanosoma brucei, a component of RESC which together with RECC forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfills gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogenous assembly of ~18 proteins that enclose gRNAs and mRNAs. RESC7 is RESC-B-specific and it is involved with pre-edited mRNA binding.
