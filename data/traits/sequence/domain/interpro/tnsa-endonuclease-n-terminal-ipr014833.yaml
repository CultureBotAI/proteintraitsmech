identifier: InterPro:IPR014833
label: "TnsA endonuclease, N-terminal"
definition: >-
  The Tn7 transposase is composed of proteins TnsA and TnsB. DNA breakage at the 5' end of the transposon is carried out by TnsA, and breakage and joining at the 3' end is carried out by TnsB. The N-terminal domain of TnsA is catalytic. This domain is also found in Bacteriophage T4 gp4-like head completion protein (also known as Gp50) whose nuclease activity is required for packaging. This domain contains the catalytic triad of one basic and two acidic residues that form a restriction endonuclease-like active site and conserved between TnsA with gp4 proteins.
