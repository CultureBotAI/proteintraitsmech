identifier: InterPro:IPR033397
label: "Metallo-carboxypeptidase, C-terminal domain"
definition: >-
  This domain represents the C-terminal immunoglobulin-like domain of metallo-carboxypeptidase Csd4, an helical cell shape-determining peptidoglycan hydrolase including . The structural elements of this domain form a Ca2+ binding-channel, the Ca2+ being co-ordinated by six ligand-atoms.
