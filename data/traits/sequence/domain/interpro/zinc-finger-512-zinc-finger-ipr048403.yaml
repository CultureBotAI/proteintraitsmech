identifier: InterPro:IPR048403
label: Zinc finger 512, zinc finger
definition: >-
  This C2H2-type zinc finger is found in human Zinc finger protein 512 (ZNF512) and related proteins primarily from chordates. The human ZNF512 contains six zinc fingers, of which three are classical type C2H2 zinc fingers and three are variant C2HC. The structure of the first pair of C2H2-C2HC zinc fingers was determined by NMR. The function of these domains is unknown. C2H2-type (classical) zinc fingers (Znf) were the first class to be characterised. They contain a short β-hairpin and an α-helix (β/β/α structure), where a single zinc atom is held in place by Cys(2)His(2) (C2H2) residues in a tetrahedral array. C2H2 Znf's can be divided into three groups based on the number and pattern of fingers: triple-C2H2 (binds single ligand), multiple-adjacent-C2H2 (binds multiple ligands), and separated paired-C2H2. C2H2 Znf's are the most common DNA-binding motifs found in eukaryotic transcription factors, and have also been identified in prokaryotes. Transcription factors usually contain several Znf's (each with a conserved β/β/α structure) capable of making multiple contacts along the DNA, where the C2H2 Znf motifs recognise DNA sequences by binding to the major groove of DNA via a short α-helix in the Znf, the Znf spanning 3-4 bases of the DNA. C2H2 zinc fingers can also bind to RNA and protein targets.
