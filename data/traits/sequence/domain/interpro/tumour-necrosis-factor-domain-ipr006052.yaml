identifier: InterPro:IPR006052
label: Tumour necrosis factor domain
definition: >-
  The following cytokines can be grouped into a family on the basis of sequence, functional, and structural similarities: Tumor Necrosis Factor (TNF) (also known as cachectin or TNF-alpha) is a cytokine which has a wide variety of functions. It can cause cytolysis of certain tumor cell lines; it is involved in the induction of cachexia; it is a potent pyrogen, causing fever by direct action or by stimulation of interleukin-1 secretion; finally, it can stimulate cell proliferation and induce cell differentiation under certain conditions. Lymphotoxin-alpha (LT-alpha) and lymphotoxin-beta (LT-beta), two related cytokines produced by lymphocytes and which are cytotoxic for a wide range of tumor cells in vitro and in vivo. T cell antigen gp39 (CD40L), a cytokine which seems to be important in B-cell development and activation. CD27L, a cytokine which plays a role in T-cell activation. It induces the proliferation of costimulated T cells and enhances the generation of cytolytic T cells. CD30L, a cytokine which induces proliferation of T cells. FASL, a cytokine involved in cell death. 4-1BBL, a inducible T cell surface molecule that contributes to T-cell stimulation. OX40L, a cytokine that co-stimulates T cell proliferation and cytokine production. TNF-related apoptosis inducing ligand (TRAIL), a cytokine that induces apoptosis. TNF-alpha is synthesised as a type II membrane protein which then undergoes post-translational cleavage liberating the extracellular domain. CD27L, CD30L, CD40L, FASL, LT-beta, 4-1BBL and TRAIL also appear to be type II membrane proteins. LT-alpha is a secreted protein. All these cytokines seem to form homotrimeric (or heterotrimeric in the case of LT-alpha/beta) complexes that are recognised by their specific receptors. Cytokines can be grouped into a…
