identifier: InterPro:IPR060452
label: "RP005-like, N-terminal alpha-helical domain"
definition: >-
  This entry represents the N-terminal α-helical domain of RP005, an uncharacterised protein from Rickettsia prowazekii. The protein belongs to the COG0493 functional category. The specific function of this N-terminal domain is unknown.
