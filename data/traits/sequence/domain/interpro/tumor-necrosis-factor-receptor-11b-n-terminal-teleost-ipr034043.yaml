identifier: InterPro:IPR034043
label: "Tumor necrosis factor receptor 11B, N-terminal, teleost"
definition: >-
  This entry represents the N-terminal domain of TNFRSF11B form teleost. TNF-receptors are modular proteins. The N-terminal extracellular part contains a cysteine-rich region responsible for ligand-binding. This region is composed of small modules of about 40 residues containing 6 conserved cysteines; the number and type of modules can vary in different members of the family. Tumor necrosis factor receptor superfamily member 11B (TNFRSF11B), also known as Osteoprotegerin, OPG, TR1, or OCIF, is found in teleosts. It is a secreted glycoprotein that regulates bone resorption. It binds to two ligands, RANKL (receptor activator of nuclear factor kappaB ligand, also known as osteoprotegerin ligand, OPGL, TRANCE, TNF-related activation induced cytokine), a critical cytokine for osteoclast differentiation, and TRAIL (TNF-related apoptosis-inducing ligand), involved in immune surveillance. Therefore, acting as a decoy receptor for RANKL and TRAIL, OPG inhibits the regulatory effects of nuclear factor-kappaB on inflammation, skeletal, and vascular systems, and prevents TRAIL-induced apoptosis. Studies in mice counterparts suggest that this protein and its ligand also play a role in lymph-node organogenesis and vascular calcification. Circulating OPG levels have emerged as independent biomarkers of cardiovascular disease in patients with acute or chronic heart disease. OPG has also been implicated in various inflammations and linked to diabetes and poor glycemic control. Genetic analysis of the Japanese rice fish medaka (Oryzias latipes) has shown that entire networks for bone formation are conserved between teleosts and mammals, enabling medaka to be used as a genetic model to monitor bone homeostasis in vivo.
