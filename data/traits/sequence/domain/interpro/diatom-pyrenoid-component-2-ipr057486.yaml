identifier: InterPro:IPR057486
label: "Diatom pyrenoid component 2"
definition: >-
  This entry represents a conserved motif within DPC2 and its homologues. DCP2 localises to the pyrenoid matrix in diatoms and interacts with Rubisco. It is relatively abundant, suggesting a potential role in matrix assembly/organisation. The region defined here contains multiple HxxYLDxxH motifs, where H means hydrophobic residues.
