identifier: InterPro:IPR059229
label: "TM7SF3-like, N-terminal immunoglobulin-like domain"
definition: >-
  This domain is found at the N-terminal end of human Transmembrane 7 superfamily member 3 (TM7SF3) and similar animal proteins. TM7SF3 is involved in the inhibition of cytokine-induced death of pancreatic beta cells and in the promotion of insulin secretion. It acts as a pro-survival homeostatic factor that attenuates the development of cellular stress. This domain is predicted to adopt a mainly β configuration with an immunoglobulin-like (Ig-like) fold.
