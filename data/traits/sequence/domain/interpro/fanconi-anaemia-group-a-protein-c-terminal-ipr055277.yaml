identifier: InterPro:IPR055277
label: "Fanconi anaemia group A protein, C-terminal"
definition: >-
  This domain is found towards the C-terminal of human Fanconi anaemia group A protein (FANCA) and related proteins. It contains ARM repeats. Fanconi anemia (FA) is a human disorder characterised by cancer susceptibility and cellular sensitivity to DNA crosslinks and other damages. The FA complex repairs the interstrand cross-linking (ICL) lesions and coordinates activities of the downstream DNA repair pathway including nucleotide excision repair, translesion synthesis, and homologous recombination. It is required for the monoubiquitylation of FANCD2 and FANCI heterodimer. The FA core complex consists of FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL, FANCM, FANCT (UBET2), FAAP100 and FAAP24.
