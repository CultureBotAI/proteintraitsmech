identifier: InterPro:IPR047390
label: "Tudor domain-containing protein 12, first Tudor domain"
definition: >-
  This entry represents the first Tudor domain of Tudor domain-containing protein 12 and similar proteins from chordates. Tudor domain-containing protein 12 (TDRD12), also called ES cell-associated transcript 8 protein (ECAT8), is a putative ATP-dependent DEAD-like RNA helicase that is essential for germ cell development and maintenance. It acts as a unique piRNA biogenesis factor essential for secondary PIWI interacting RNA (piRNA) biogenesis. TDRD12 contains two Tudor domains, one at the N-terminal and the other at the C-terminal end.
