identifier: InterPro:IPR063968
label: "FAR1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of FAR1 and related cyclin-dependent kinase inhibitors found in Saccharomycotina yeasts. FAR1 functions as an inhibitor of the CDC28-CLN cyclin-dependent kinase complex and is essential for G1 cell cycle arrest during the mating response. The C-terminal region of FAR1 is required for oriented cell polarisation in response to mating pheromones. The specific role of this domain remains to be determined. This domain contains a zinc finger RING-type fold.
