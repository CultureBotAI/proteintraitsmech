identifier: InterPro:IPR018289
label: "MULE transposase domain"
definition: >-
  This entry represents a domain found in Mutator-like elements (MULE)-encoded tranposases, some of which also contain a zinc-finger motif. This domain is also found in a transposase for the insertion sequence element IS256 in transposon Tn4001.
