identifier: InterPro:IPR027833
label: "MGT5A-like, N-terminal"
definition: >-
  This domain is found at the N-terminal end of human Alpha-1,6-mannosylglycoprotein 6-beta-N-acetylglucosaminyltransferase A (MGT5A) and similar sequences mainly found in vertebrates. MGT5A, also known as GNT-V, is a glycosyltransferase family 18 enzyme that catalyses the addition of N-acetylglucosamine (GlcNAc) in beta 1-6 linkage to the alpha-linked mannose of biantennary N-linked oligosaccharides. This protein consists of a short N-terminal cytosolic region, a transmembrane (TM) domain, a stem region, the N domain and a large C-terminal catalytic region ( ). This entry covers the three N-terminal short domains. The activity of the signal-peptide peptidase-like-3 (SPPL3), responsible for the secretion of the protein, depends on the helical stability of the TM domain. The N domain has been reported to play a critical role in the recognition of glycoprotein substrates. This region shows an all-α configuration. This domain is also found covering the whole length of the protein in human Coiled-coil domain-containing protein 126 (CC126) and related proteins.
