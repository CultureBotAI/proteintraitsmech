identifier: InterPro:IPR047588
label: Eukaryotic elongation factor 2 kinase, alpha-kinase domain
definition: >-
  This entry represents the alpha-kinase catalytic domain of eukaryotic elongation factor-2 kinase (eEF2K) and similar sequences, mainly found in animals. Eukaryotic elongation factor-2 kinase (eEF2K) is also called calcium/calmodulin (CaM)-dependent eEF2K. It phosphorylates eukaryotic elongation factor-2 (EEF2) at a single site, leading to its inactivation and inability to bind ribosomes, and slowing down the elongation stage of protein synthesis. It has been linked to many human diseases including cardiovascular conditions (atherosclerosis) and pulmonary arterial hypertension, as well as solid tumours and neurological disorders. eEF2K is an atypical protein kinase containing a CaM binding region, an alpha-kinase catalytic domain, and TPR-like Sel1 repeats at the C-terminal. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. These proteins target both protein sequences that adopt an α-helical conformation and residues in non-helical regions.
