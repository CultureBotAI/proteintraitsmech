identifier: InterPro:IPR002591
label: "Type I phosphodiesterase/nucleotide pyrophosphatase/phosphate transferase domain"
definition: >-
  This entry represents a domain found ina family of phosphodiesterases, including human plasma-cell membrane glycoprotein PC-1/alkaline phosphodiesterase I/nucleotide pyrophosphatase (nppase). These enzymes catalyze the cleavage of phosphodiester and phosphosulphate bonds in NAD, deoxynucleotides and nucleotide sugars. Another member of this family is ATX an autotaxin, tumor cell motility-stimulating protein which exhibits type I phosphodiesterases activity. The alignment encompasses the active site. Also present within this family is 60kDa Ca2-ATPase from Myroides odoratus. This entry also hits a number of ethanolamine phosphate transferase involved in glycosylphosphatidylinositol-anchor biosynthesis. N-acetylglucosamine-6-O-sulfatase is another member of this family that catalyses the hydrolysis of the 6-sulfate groups of the N-acetyl-D-glucosamine 6-sulfate units and plays a key role in the persistence of the major human gut symbiont B.thetaiotaomicron in the gastrointestinal tract.
