identifier: InterPro:IPR045663
label: "Origin recognition complex subunit 3, insertion domain"
definition: >-
  This is the insertion domain of ORC subunit 3 (ORC3) predominantly found in chodates, arthropodes and vertebrates, located between the N-terminal AAA+-like subunit and the C-terminal winged-helix (WH) DNA-binding domain. ORC3 is a component of the origin recognition complex (ORC) that binds origins of replication, required to assemble the pre-replication complex necessary to initiate DNA replication. This insertion domain forms a bi-lobed α-helical protuberance that engages a short α-helix formed at the ORC6 C-terminal, allowing its binding to ORC1-5 subunits, which constitute the ORC core.
