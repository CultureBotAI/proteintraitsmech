identifier: InterPro:IPR049261
label: "RecA-like, C-terminal"
definition: >-
  This entry represents a small domain located at the C-terminal of RecA. This domain adopts a structure composed of a β-hairpin and three α-helices. It has been shown to bind to dsDNA. The recA gene product is a multifunctional enzyme that plays a role in homologous recombination, DNA repair and induction of the SOS response. In homologous recombination, the protein functions as a DNA-dependent ATPase, promoting synapsis, heteroduplex formation and strand exchange between homologous DNAs. RecA also acts as a protease cofactor that promotes autodigestion of the lexA product and phage repressors. The proteolytic inactivation of the lexA repressor by an activated form of recA may cause a derepression of the 20 or so genes involved in the SOS response, which regulates DNA repair, induced mutagenesis, delayed cell division and prophage induction in response to DNA damage. RecA is a protein of about 350 amino-acid residues. Its sequence is very well conserved among eubacterial species. It is also found in the chloroplast of plants. RecA-like proteins are found in archaea and diverse eukaryotic organisms, like fission yeast, mouse or human. In the filament visualised by X-ray crystallography, β-strand 3, the loop C-terminal to β-strand 2, and α-helix D of the core domain form one surface that packs against α-helix A and β-strand 0 (the N-terminal domain) of an adjacent monomer during polymerisation. The core ATP-binding site domain is well conserved, with 14 invariant residues. It contains the nucleotide binding loop between β-strand 1 and α-helix C. The Escherichia coli sequence GPESSGKT matches the consensus sequence of amino acids (G/A)XXXXGK(T/S) for the Walker A box (also referred to as the P-loop) found in a number of nucleoside triphosphate (NTP)-binding proteins. Anoth…
