identifier: InterPro:IPR032008
label: "E3 ubiquitin-protein ligase APD1-4, N-terminal"
definition: >-
  This domain is functionally uncharacterised, found towards the N-terminal of APD1-4 and in uncharacterised sequences, mainly found in plants and arthropods. This entry includes E3 ubiquitin-protein ligase APD1 to 4 from Arabidopsis. They are involved in pollen mitosis II (PMII) regulation during male gametogenesis.
