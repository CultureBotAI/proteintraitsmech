identifier: InterPro:IPR032805
label: "Wax synthase domain"
definition: >-
  This domain is found in membrane bound O-acyltransferases, including long-chain-alcohol O-fatty-acyltransferase (wax synthases) from plants and fungi and acyl-CoA sterol acyl transferase 1 from Arabidopsis.
