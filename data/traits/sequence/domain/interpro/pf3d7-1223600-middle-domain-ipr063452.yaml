identifier: InterPro:IPR063452
label: "PF3D7_1223600, middle domain"
definition: >-
  This entry represents the middle domain of uncharacterised protein PF3D7_1223600 and related proteins in Plasmodium species. The protein is a multi-pass membrane protein expressed on the cell surface of host erythrocytes during the asexual cell cycle. The protein has been identified as a possible candidate for malaria vaccine development. The family is found across Plasmodium species including both P. falciparum and P. vivax subgenera.
