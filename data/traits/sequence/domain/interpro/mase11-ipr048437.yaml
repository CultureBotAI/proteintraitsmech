identifier: InterPro:IPR048437
label: MASE11
definition: >-
  This entry represents the membrane-associated sensor domain 11 (MASE11), a predicted transmembrane domain that has been found in association with HD-GYP, PAS, GAF, GGDEF and EAL domains. It is also present in sensor histidine kinases with various domain architectures.
