identifier: InterPro:IPR034135
label: "Renin-like domain"
definition: >-
  This entry represents a domain found in renin, a member of the aspartic peptidase A1 family. Aspartyl proteases (APs), also known as acid proteases, ([ec:3.4.23.-]) are a widely distributed family of proteolytic enzymes known to exist in vertebrates, fungi, plants, retroviruses and some plant viruses. APs use an Asp dyad to hydrolyze peptide bonds. Renin, also known as angiotensinogenase (MEROPS identifier A01.007), is a circulating enzyme that participates in the renin-angiotensin system that mediates extracellular volume, arterial vasoconstriction, and consequently mean arterial blood pressure. The enzyme is secreted by the kidneys from specialized juxtaglomerular cells in response to decreases in glomerular filtration rate (a consequence of low blood volume), diminished filtered sodium chloride and sympathetic nervous system innervation. The enzyme circulates in the blood stream and hydrolyzes angiotensinogen secreted from the liver into the peptide angiotensin I. Angiotensin I is further cleaved in the lungs by endothelial bound angiotensin converting enzyme (ACE) into angiotensin II, the final active peptide. The enzyme is a member of peptidase family A1. Mice have an additional renin secreted by the submandibular salivary gland and known as renin-2 (MEROPS identifier A01.008).
