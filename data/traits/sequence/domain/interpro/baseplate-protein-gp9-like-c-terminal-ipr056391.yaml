identifier: InterPro:IPR056391
label: "Baseplate protein gp9-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Baseplate protein gp9 from Bacteriophage T4, a component of the viral baseplate. Gp9 connects the long tail fibers of the virus to the baseplate and triggers tail contraction after viral attachment to a host cell. The protein is active as a trimer, with each monomer being composed of three domains. The C-terminal domain is thought to be essential for trimerisation and is organised into an eight-stranded antiparallel β-barrel, which was found to resemble the 'jelly roll' fold found in many viral capsid proteins. Together with gp11, gp10 initiates the assembly of wedges that then go on to associate with a hub to form the viral baseplate. This domain is also found in the Baseplate wedge protein gp10 which connects the short tail fibres to the baseplate.
