identifier: InterPro:IPR062193
label: "Cytochrome B pre-mRNA-processing protein, middle domain"
definition: >-
  This entry represents the middle domain of cytochrome B pre-mRNA- processing protein 1 (CBP1) found in fungi. CBP1 is responsible for conferring a stable 5'-end on cytochrome b mRNA and is localised to mitochondria. The protein is involved in mRNA processing and binds mRNA. CBP1 contains multiple domains including this middle domain which may adopt a TPR-like fold. The specific function of this middle domain remains to be determined.
