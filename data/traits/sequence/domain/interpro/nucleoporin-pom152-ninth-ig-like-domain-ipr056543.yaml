identifier: InterPro:IPR056543
label: "Nucleoporin POM152, ninth Ig-like domain"
definition: >-
  This domain is found in Nucleoporin POM152 from yeast and similar fungal proteins. This domain is predicted to adopt an immunoglobulin-like structure and it is the ninth in the tandem. POM152 functions as a component of the nuclear pore complex (NPC). This protein consists of an N-terminal transmembrane domain (TMD) and an extended C-terminal domain (CTD) with tandem repeats of Ig-like domains.
