identifier: InterPro:IPR008841
label: "Siphovirus-type tail component, RIFT-related domain"
definition: >-
  This entry consists of several phage tail component proteins, including bacteriophage SPP1 distal tail protein Dit (also known as Gp19.1 or Gp19), as well as some bacterial proteins of unknown function. This entry represents the N-terminal domain.
