identifier: InterPro:IPR007525
label: "Coenzyme F420 hydrogenase/dehydrogenase beta subunit, C-terminal"
definition: >-
  Coenzyme F420 hydrogenase ( ) reduces the low-potential two-electron acceptor coenzyme F420. This family contains the C-termini of F420 hydrogenase and dehydrogenase beta subunits. The C terminus of Methanobacterium formicicum formate dehydrogenase beta chain ( , ) is also represented in this entry. This region is often found in association with the 4Fe-4S binding domain ( ), and the N terminus .
