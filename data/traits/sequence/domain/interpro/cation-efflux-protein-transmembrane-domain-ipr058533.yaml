identifier: InterPro:IPR058533
label: "Cation efflux protein, transmembrane domain"
definition: >-
  This entry represents the transmembrane domain at the N-terminal in Cattion efflux proteins. Cation Diffusion Facilitator (CDF) transporter proteins, including SLC30A, which is involved in zinc transport, and FieF, which is associated with metal detoxification are involved in the transport of divalent metal cations across cellular membranes. They facilitate the efflux or sequestration of metals such as zinc, cadmium, iron, manganese, and cobalt, contributing to metal homeostasis and detoxification. These proteins often function as antiporters, coupling the transport of metal ions with protons or other ions. They play crucial roles in various biological processes, including maintaining cellular metal ion balance, protecting cells from metal toxicity, and regulating metal ion concentrations in specific cellular compartments.
