identifier: InterPro:IPR010627
label: "Prepilin peptidase A24, N-terminal"
definition: >-
  This domain is found at the N terminus of the prepilin peptidases. Members included in this entry have been characterised as bifunctional, and this domain may contain the N-methylation activity ([ec:2.1.1.-]). It consists of an intracellular region between a pair of transmembrane sections. This region contains an invariant proline and four almost fully conserved cysteine residues which bind Zn, as described for PilD from Pseudomonas aeruginosa ( ). These cysteines have been shown to be essential to the overall function of the enzyme.
