identifier: InterPro:IPR025972
label: "Beta-galactosidase, domain 3"
definition: >-
  This is the third domain of the five-domain beta-galactosidase enzyme that altogether catalyses the hydrolysis of beta(1-3) and beta(1-4) galactosyl bonds in oligosaccharides, as well as the inverse reaction of enzymatic condensation and trans-glycosylation. This domain has an Ig-like fold.
