identifier: InterPro:IPR058453
label: "Primase-associated, N-terminal domain"
definition: >-
  This entry represents a pair of domains found at the N-terminal end in a family of uncharacterised proteins from halobacteria that are found adjacent to a DNA primase-like protein. This pair of protein domains are one nested within the loop of the other. The proteins are typically around 500 amino acids in length. Many of these proteins are encoded on plasmids, suggesting a potential role in plasmid-associated functions.
