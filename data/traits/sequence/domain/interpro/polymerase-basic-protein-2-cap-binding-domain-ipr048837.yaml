identifier: InterPro:IPR048837
label: "Polymerase basic protein 2, cap-binding domain"
definition: >-
  This entry represents the cap-binding domain and includes PB2 from Thogotovirus, which is similar to IAV. Polymerase basic protein 2 (PB2) is a subunit of the RNA-dependent RNA polymerase of Orthomyxovirus Influenza A virus (IAV) which performs transcription of viral mRNAs by cap-snatching, a processes that generated capped primers by host pre-mRNA binding, mediated by PB2.
