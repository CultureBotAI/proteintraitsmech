identifier: InterPro:IPR032300
label: "Cell surface antigen, C-terminal"
definition: >-
  This repeated domain is found at the C terminus of cell surface antigens. In the Streptococcus mutans antigen I/II there are three repeats of this domain, a cleft between the first two of these forms a binding site for the human salivary agglutinin (SAG).
