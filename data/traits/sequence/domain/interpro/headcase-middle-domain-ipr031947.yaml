identifier: InterPro:IPR031947
label: "Headcase, middle domain"
definition: >-
  This domain is found in Drosophila headcase protein and the human headcase protein homologue. Drosophila headcase protein is involved in dendrite pruning and is a branching inhibitor during tracheal development. It also promotes cell survival and niche maintenance in the Drosophila testis. Human headcase protein may play an important role in human carcinogenesis.
