label: "Putative sulfatase AslA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of putative sulfatase AslA, found in bacteria. Sulfatases catalyse the hydrolysis of sulfate esters and are involved in sulphur metabolism.
