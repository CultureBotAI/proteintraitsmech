identifier: InterPro:IPR057989
label: "RPAP1/MINIYO-like, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found in human RNA polymerase II-associated protein 1 (RPAP1), Transcriptional elongation regulator MINIYO from Arabidopsis thaliana and similar eukaryotic proteins. RPAP1 is required for interaction of the RNA polymerase II complex with acetylated histone H3. MINIYO is a positive regulator of transcriptional elongation that is essential for cells to initiate differentiation. It interacts with RNA polymerase II and the Elongator complex and is required to sustain global levels of transcriptional elongation activity, specifically in differentiating tissues.
