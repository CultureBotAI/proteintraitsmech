identifier: InterPro:IPR059811
label: "Inner membrane assembly complex subunit 17, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of fungal INA17 proteins. INA17 (Inner membrane assembly complex subunit 17) is a component of the inner membrane assembly complex that promotes the biogenesis of mitochondrial F1F0-ATP synthase. The protein facilitates assembly of the peripheral stalk and promotes assembly of the catalytic F1-domain with the membrane-embedded F0-domain. INA17 localises to the mitochondrial inner membrane as a single-pass membrane protein. This domain encompasses the transmembrane region and part of the mitochondrial intermembrane space-facing region. Its specific function remains to be determined.
