identifier: InterPro:IPR034523
label: "PSP1, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of paraspeckle component 1 (PSP1). PSP1 (also known as PSPC1) is a novel nucleolar factor that accumulates within a new nucleoplasmic compartment, termed paraspeckles, and diffusely distributes in the nucleoplasm. PSP1 belongs to the DBHS (Drosophila behavior human splicing) family. It is ubiquitously expressed and highly conserved in vertebrates. Its cellular function remains unknown currently; however, PSPC1 forms a novel heterodimer with the nuclear protein p54nrb, also known as non-POU domain-containing octamer-binding protein (NonO), which localizes to paraspeckles in an RNA-dependent manner. PSPC1 contains two conserved RNA recognition motifs (RRMs) at the N terminus. DBHS (Drosophila behavior human splicing) family are characterised by a core domain arrangement consisting of tandem RNA recognition motifs (RRMs), a ~100 amino acid coiled-coil domain, and a conserved intervening sequence referred to as a NONA/ParaSpeckle (NOPS) domain. Its members include p54nrb (also known as NONO), PTB-associated splicing factor/splicing factor proline-glutamine rich (PSF or SFPQ) and PSPC1 (paraspeckle protein component 1). They are found in the nucleoplasm and can be triggered by binding to local high concentrations of various nucleic acids to form microscopically visible nuclear bodies, paraspeckles or large complexes such as DNA repair foci. They may also function cytoplasmically and on the cell surface in defined cell types. All three DBHS proteins are conserved throughout vertebrate species, while flies, worms, and yeast express a single DBHS protein.
