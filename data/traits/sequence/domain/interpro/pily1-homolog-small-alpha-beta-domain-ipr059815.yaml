identifier: InterPro:IPR059815
label: "PilY1 homolog, small alpha/beta domain"
definition: >-
  This small α/β domain is found in the paralogous Type IV pilus biogenesis factor PilY1 homolog PD_1611, PD_0502, PD_0023 from Xylella fastidiosa and related proteins. This domain is specific only for this group of proteins and is not found in the Type IV pilus biogenesis factor PilY1 protein from Pseudomonas aeruginosa. It contains conserved GYF[DN]x(3)CY sequence motif which may be important for function.
