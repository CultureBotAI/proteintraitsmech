identifier: InterPro:IPR041904
label: "Tryptophan 5-hydroxylase, catalytic domain"
definition: >-
  Tryptophan 5-hydroxylase (TPH) or eukaryotic tryptophan hydroxylase (TrpOH) is a member of the biopterin-dependent aromatic amino acid hydroxylase family of non-heme, iron(II)-dependent enzymes that also includes prokaryotic and eukaryotic phenylalanine-4-hydroxylase (PheOH) and eukaryotic tyrosine hydroxylase (TyrOH). The catalytic domains of all three enzymes have a very similar fold with a mixture of α and β structures. TPH oxidizes L-tryptophan to 5-hydroxy-L-tryptophan, the rate-limiting step in the biosynthesis of serotonin (5-hydroxytryptamine), a widely distributed hormone and neurotransmitter. Two forms of TPH have been identified in mammals: TPH1, expressed highly in the gastrointestinal tract and the pineal gland, and TPH2, expressed in neuronal cells and the myenteric plexus of the gut and responsible for the vast majority of 5-HT synthesis in the central nervous system.
