identifier: InterPro:IPR049975
label: "SAV_915-like domain"
definition: >-
  This entry represents a domain found in uncharacterised proteins from Actinomycetes, including SAV_915 from the paulomycin biosynthetic gene cluster (BGC) of Streptomyces paulus. Some members of this group have two separated copies of the domain.
