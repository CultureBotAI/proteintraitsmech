identifier: InterPro:IPR059830
label: "ATP-dependent DNA helicase Q-like 1, UBA domain"
definition: >-
  This ubiquitin-associated (UBA) domain is found at the N-terminal end of ATP-dependent DNA helicase Q-like 1 from Arabidopsis thaliana (RECQL1) and similar proteins. RECQL1 is thought to be a 3'-5' DNA helicase that may play a role in the repair of DNA. UBA domains are often involved in ubiquitin binding.
