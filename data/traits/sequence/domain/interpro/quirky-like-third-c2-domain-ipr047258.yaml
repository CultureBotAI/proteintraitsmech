identifier: InterPro:IPR047258
label: "QUIRKY-like, third C2 domain"
definition: >-
  This entry represents the third C2 domain, referred to as C2C, from QUIRKY and related proteins. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. This entry includes a group of plant proteins, such as QUIRKY and FTIP1/3/4/7 from Arabidopsis. These are Multiple C2 domain and Transmembrane region Proteins (MCTPs) which are involved in Ca2 signalling at the membrane. Plant-MCTPs are composed of a variable N-terminal sequence, four C2 domains, two transmembrane regions (TMRs), and a short C-terminal sequence. It is one of four protein classes that are anchored to membranes via a transmembrane region; the others being synaptotagmins, extended synaptotagmins, and ferlins. MCTPs are the only membrane-bound C2 domain proteins that contain two functional TMRs. MCTPs are unique in that they bind Ca2 but not phospholipids. QUIRKY may contribute to plant organ organogenesis mediated by the receptor-like kinase STRUBBELIG and may play a role in Ca2-dependent signaling and membrane trafficking. It has been shown to be required for the appropriate spatial expression of several epidermal cell fate regulators. FTIP1 is involved in the export of FT from the phloem companion cells to the sieve elements through the plasmodesmata. It regulates flowering time under long days. FTIP3/4 play an essential role in mediating proliferation and differentiation of shoot stem cells. FTIP7 promotes nuclear translocation of the transcription factor OSH1 and reduces auxin levels at late stage of anther development, after meiosis of microspore mother cells. It is necessary for normal anther dehiscence and seed setting.
