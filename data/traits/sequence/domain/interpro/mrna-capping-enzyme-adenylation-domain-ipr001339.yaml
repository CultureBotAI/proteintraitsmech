identifier: InterPro:IPR001339
label: mRNA capping enzyme, adenylation domain
definition: >-
  This entry represents the adenylation domain of the mRNA capping enzyme. The mRNA-capping enzyme is composed of two separate chains alpha and beta, respectively a mRNA guanylyltransferase and an RNA 5'-triphosphatase. Binding of the enzyme to nucleotides is specific to the GMP moiety of GTP. The viral mRNA capping enzyme is a monomer that transfers a GMP cap onto the end of mRNA that terminates with a 5'-diphosphate tail. It contains a catalytic core composed of an adenylation domain and a C-terminal OB-fold domain containing conserved sequence motifs. The adenylation domain binds ATP and contains many active site residues.
