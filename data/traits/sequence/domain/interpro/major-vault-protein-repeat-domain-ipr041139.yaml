identifier: InterPro:IPR041139
label: "Major vault protein repeat domain"
definition: >-
  The vault is a ubiquitous and highly conserved ribonucleoprotein particle of approximately 13 mDa of unknown function. This entry corresponds to a repeated domain found in the amino terminal half of the major vault protein.
