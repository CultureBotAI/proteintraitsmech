identifier: InterPro:IPR002847
label: "Coenzyme F420:L-glutamate ligase-like domain"
definition: >-
  This entry represents a domain found in the coenzyme F420:L-glutamate ligase (also known as F420-0:gamma-glutamyl ligase) and related proteins. Coenzyme F420:L-glutamate ligase catalyses the GTP-dependent successive addition of multiple gamma-linked L-glutamates to the L-lactyl phosphodiester of 7,8-didemethyl-8-hydroxy-5-deazariboflavin (F420-0) to form polyglutamated F420 derivatives.
