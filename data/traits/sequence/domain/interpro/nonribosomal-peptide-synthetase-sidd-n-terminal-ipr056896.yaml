label: "Nonribosomal peptide synthetase sidD, N-terminal"
definition: >-
  This entry represents the N-terminal domain of SIDD (Nonribosomal peptide synthetase sidD) from Aspergillus fumigatus and related fungal sequences. SIDD is part of the siderophore biosynthetic pathway.
