identifier: InterPro:IPR039508
label: "Protein KASH5, EF-hand-like domain"
definition: >-
  This entry represents the EF-hand-like domain found in protein KASH5. KASH5 is a component of the LINC (LInker of Nucleoskeleton and Cytoskeleton) complex, involved in the connection between the nuclear lamina and the cytoskeleton. It interacts (via the last 22 AA) with SUN1; this interaction mediates telomere localisation.
