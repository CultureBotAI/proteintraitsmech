identifier: InterPro:IPR056611
label: "Ecto-NOX disulfide-thiol exchanger 1/2 domain"
definition: >-
  This domain is found in human Ecto-NOX disulfide-thiol exchanger 1/2 (ENOX1/2) and similar sequences mainly found in animals. This domain is predicted to form a long α-helix. ENOX1/2 probably act as terminal oxidases of plasma electron transport from cytosolic NAD(P)H via hydroquinones to acceptors at the cell surface, playing a role in control of the ultradian cellular biological clock. The activities oscillate with a period length of 24 minutes and play a role in control of the ultradian cellular biological clock.
