identifier: InterPro:IPR055552
label: "Domain of unknown function DUF7128"
definition: >-
  This domain is found in a group of small proteins mainly from Halobacteria. It contains highly conserved cysteine and histidine residues arranged in two CxxC and HxxC motifs that likely coordinate zinc. This domain is predicted to adopt a fold similar to the classical C2H2 and variant C2HC zinc fingers containing β-hairpin and an α helix. In addition, it is predicted to contain an extra N-terminal strand that contributes to the formation of a three-stranded antiparallel β-sheet. This domain also has a number of highly conserved negatively charged residues.
