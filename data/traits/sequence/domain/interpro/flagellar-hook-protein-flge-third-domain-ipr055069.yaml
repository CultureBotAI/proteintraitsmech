identifier: InterPro:IPR055069
label: "Flagellar hook protein FlgE, third domain"
definition: >-
  This domain is found in Flagellar hook protein FlgE from Caulobacter vibrioides and similar sequences from Caulobacter. Multiple copies of FlgE form part of the hook, a highly flexible universal joint that connects the filament to the motor of flagella. This protein consists of an N-terminal domain , followed by , then a third domain which is represented in this entry, and a C-terminal domain . This domain shows β-strands organised like a rugby ball, that is completed with some long loops.
