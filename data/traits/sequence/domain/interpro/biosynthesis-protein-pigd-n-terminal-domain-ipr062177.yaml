identifier: InterPro:IPR062177
label: "Biosynthesis protein PigD, N-terminal domain"
definition: >-
  This entry represents the first domain of biosynthesis protein PigD and related multi-domain proteins. Members are found in Streptomyces and other Actinomycetes, as well as various Gammaproteobacteria and Betaproteobacteria. The domain spans approximately 219 amino acids and is the N-terminal region of multi-domain proteins involved in secondary metabolite biosynthesis. PigD is a thiamine diphosphate-dependent enzyme catalysing steps in prodigiosin biosynthesis. The specific function of this first domain remains to be determined.
