identifier: InterPro:IPR060554
label: "Asteroid, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in animal Asteroid proteins, including single-strand DNA endonuclease ASTE1. ASTE1 is a structure-specific DNA endonuclease that cleaves single-stranded DNA and 3' overhang DNA, contributing to DNA double-strand break repair by promoting non-homologous end-joining and inhibiting homologous recombination.
