identifier: InterPro:IPR005154
label: Alpha glucuronidase, N-terminal
definition: >-
  O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. This represents a family of alpha-glucuronidases. Deletion mutants have indicated that the central region is responsible for the catalytic activity. Within this central domain, the invariant Glu and Asp (residues 391 and 364 respectively from Bacillus stearothermophilus (Geobacillus stearothermophilus)) are thought to from the the catalytic centre.
