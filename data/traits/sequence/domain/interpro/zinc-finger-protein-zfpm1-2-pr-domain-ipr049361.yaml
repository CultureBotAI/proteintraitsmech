identifier: InterPro:IPR049361
label: "Zinc finger protein ZFPM1/2, PR domain"
definition: >-
  This entry represents a domain found in Zinc finger protein ZFPM1/2 from humans and similar proteins from vertebrates. ZFPM1, also known as FOG1, is a transcriptional regulator involved in the coordination of the differentiation of platelets and erythrocytes. ZFPM2 plays a central role in heart morphogenesis and development of coronary vessels from epicardium, by regulating genes that are essential during cardiogenesis. This domain shares close structural similarity with SET domains, showing substantial β-sheet secondary structure. Its specific function remains unknown.
