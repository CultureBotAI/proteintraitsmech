identifier: InterPro:IPR033769
label: "Transcription termination factor FttA, KH domain"
definition: >-
  This entry represents the KH domain found at the N-terminal of transcription termination factor FttA and similar archaeal proteins. FttA is a single-stranded endoribonuclease (endoRNase) that mediates cleavage at the RNA exit channel of RNA polymerase (RNAP); the 5'-3' exonuclease activity of this protein degrades the nascent RNA released from RNAP. It terminates transcription on the whole genome, a process that is linked to FttA-mediated RNA cleavage and does not require NTP hydrolysis. It also has weak activity 5'-3' exodeoxyribonuclease activity on ssDNA.
