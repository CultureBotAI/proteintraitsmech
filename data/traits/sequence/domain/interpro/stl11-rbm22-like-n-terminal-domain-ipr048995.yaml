identifier: InterPro:IPR048995
label: "STL11/RBM22-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of STL11 from yeast and its homologues, such as RBM22 from human. This domain comprises a FYVE/PHD-type zinc finger. Members of this entry are involved in pre-mRNA splicing.
