identifier: InterPro:IPR062922
label: "Domain of unknown function (DUF3723), N-terminal domain"
definition: >-
  This entry represents the N-terminal β barrel domain found in DUF3723 proteins found mainly in fungi. This domain is frequently encoded within Starship elements, which are large transposable elements that mobilise accessory genes in fungal genomes. This domain shows structural similarity to bacterial proteins involved in chromosome stabilisation such as ParB. This suggests this domain may bind to CTP. The function of this domain remains to be determined.
