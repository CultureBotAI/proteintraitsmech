identifier: InterPro:IPR012440
label: "Helical membrane plugin domain"
definition: >-
  This entry, previously known as DUF1641, represents the helical membrane plugin (HMP) domain found in Formate dehydrogenase essential subunit FdhD and in uncharacterised prokaryotic proteins, including the [NiFe]-hydrogenase Huc from Mycobacterium smegmatis. It is involved in the construction of oxidoreductases in prokaryotes, which allows quinone channelling between the membrane and various redox catalytic subunits. FdhD is the non-catalytic subunit of the ForCE2 formate dehydrogenase complex composed of FdhE and FdhD which catalyses the oxidation of formate to CO2 using menaquinone-7, the major quinone present in Bacillus subtilis membranes, as the electron acceptor.
