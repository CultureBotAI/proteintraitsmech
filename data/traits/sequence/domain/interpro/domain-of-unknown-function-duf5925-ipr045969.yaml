identifier: InterPro:IPR045969
label: "Domain of unknown function DUF5925"
definition: >-
  This domain is functionally uncharacterised and is approximately 180 amino acids in length. In bacteria, this domain is found at the N-terminal of AAA domain-containing proteins. There are three conserved sequence motifs: GWT, ELA and MGFW.
