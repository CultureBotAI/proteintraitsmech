identifier: InterPro:IPR047715
label: "EboA domain"
definition: >-
  This entry represents the bacterial EboA (eustigmatophyte/bacterial operon A) domain, which belongs to a broadly distributed system of six proteins. The ebo system in general appears to be involved in trafficking of certain natural product precursors whose biosynthesis requires export at least as far as the periplasm. Scytonemin is an example of one natural product whose biosynthesis requires an Ebo system.
