identifier: InterPro:IPR063991
label: "IQGAP, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of the IQGAP family members, including human IQGAP1/2/3, and their fungal homologues Iqg1 from S. cerevisiae and S. pombe Rng2. Some members function in cytoskeletal remodelling. Human IQGAP1 is a scaffolding protein that can assemble multi-protein complexes involved in cell-cell interaction, cell adherence, and movement via actin/tubulin-based cytoskeletal reorganisation. IQGAP1 is also a regulator of the MAPK and Wnt/beta-catenin signalling pathways. Iqg1 and Rng2 are required for actomyosin ring construction during cytokinesis. This domain may adopt a fold consisting of seven β-strands and four short helices.
