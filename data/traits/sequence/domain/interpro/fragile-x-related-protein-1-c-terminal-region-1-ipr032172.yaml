identifier: InterPro:IPR032172
label: "Fragile X-related protein 1, C-terminal region 1"
definition: >-
  This is a small highly conserved region of the C terminus of Fragile X-related proteins 1 and 2, FRX1, FRX2. The domain is immediately C-terminal to the core C- terminal region, , and contains at least one block of RGG repeats that bind to G-quartet sequences in a wide variety of mRNAs.
