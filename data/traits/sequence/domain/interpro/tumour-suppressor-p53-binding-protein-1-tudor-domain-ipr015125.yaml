identifier: InterPro:IPR015125
label: "Tumour suppressor p53-binding protein-1, Tudor domain"
definition: >-
  This domain consist of two tandem tudor folds with a deep pocket at their interface. The domain is essential for the recruitment of proteins to double stranded breaks in DNA, which is mediated by interaction with methylated Lys 79 of histone H3.
