identifier: InterPro:IPR058899
label: "TGFBR3/Endoglin-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human Transforming growth factor beta receptor type 3 (TGFBR3), Endoglin (ENG) and similar proteins mainly found in animals. TGFBR3 is a cell surface receptor that regulates diverse cellular processes including cell proliferation, differentiation, migration, and apoptosis. It plays a role in the inhibition of directed and random cell migration in epithelial cells by altering the actin cytoskeletal organisation. ENG is a vascular endothelium glycoprotein that plays an important role in the regulation of angiogenesis. It is required for normal structure and integrity of adult vasculature and acts as a TGF-beta coreceptor and is involved in the TGF-beta/BMP signalling cascade that ultimately leads to the activation of SMAD transcription factors.
