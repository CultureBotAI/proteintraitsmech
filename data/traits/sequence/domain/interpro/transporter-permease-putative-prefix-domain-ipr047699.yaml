identifier: InterPro:IPR047699
label: "Transporter permease, putative, prefix domain"
definition: >-
  This entry represents a domain found at the N-terminal end of a group of bacterial putative permeases resembling ABC transporter permeases. In some permease families, this domain may be replaced by a different, seemingly unrelated domain. This domain is predicted to fold into an α-helical hairpin.
