identifier: InterPro:IPR021970
label: "Sequence-variable mosaic (SVM), signal sequence"
definition: >-
  This domain is presumed to be a signal peptide sequence found in Sequence-variable mosaic (SVM) proteins. It is found in phytoplasmas. This presumed signal sequence is about 30 amino acids in length.
