identifier: InterPro:IPR054723
label: "Alpha-mannosidase Ams1-like, N-terminal"
definition: >-
  This domain is found at the N-terminal of Alpha-mannosidase from Schizosaccharomyces pombe (Ams1) and its orthologues from eukaryotes including alpha-mannosidase 2C1 from vertebrates and alpha-mannosidase G from Dictyostelium discoideum. Ams1 hydrolyses terminal alpha-linked mannoses in free oligosaccharides released from misfolded glycoproteins or lipid-linked oligosaccharide donors. This entry represents the jelly-roll domain. This entry also includes domains from a number of uncharacterised bacterial proteins that share very similar domain composition with the aforementioned proteins.
