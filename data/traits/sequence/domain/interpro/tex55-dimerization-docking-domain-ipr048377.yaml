identifier: InterPro:IPR048377
label: "TEX55, dimerization/docking domain"
definition: >-
  TEX55, also called testis-specific conserved cAMP-dependent type II PK-anchoring protein (TSCPA), is a putative A-kinase anchoring protein (AKAP) that is dispensable for male fertility. It contains a C-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1.
