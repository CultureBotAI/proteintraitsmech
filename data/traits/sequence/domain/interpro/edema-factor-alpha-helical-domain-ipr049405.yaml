identifier: InterPro:IPR049405
label: "Edema factor, alpha-helical domain"
definition: >-
  This domain is found in Edema factor (EF, also known as Calmodulin-sensitive adenylate cyclase), the exotoxin with adenylyl cyclase activity produced by Bacillus anthracis to increase the concentration of cyclic AMP in infected host cells and disrupt intracellular signalling pathways. EF consists of four domains: a PA-binding domain (PABD), two adenylate cyclase domains (ACD) and a helical domain (HD, this entry). HD moves and forms a large clamp that almost completely encircles EF's activator calmodulin (CaM), naturally present in host cells, stabilising a disordered loop and leading to enzyme activation.
