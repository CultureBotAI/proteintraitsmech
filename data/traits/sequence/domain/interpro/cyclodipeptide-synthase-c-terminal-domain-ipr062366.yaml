identifier: InterPro:IPR062366
label: "Cyclodipeptide synthase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of cyclodipeptide synthase (CDPS) proteins. These enzymes are part of secondary metabolite biosynthesis pathways, including the pulcherrimin biosynthesis cluster found in fungi. Pulcherrimin is a red iron-containing pigment that acts as a siderophore, chelating iron outside the cell for subsequent uptake. The cyclodipeptide synthase catalyses the cyclisation of two amino acid molecules to form diketopiperazines, which are then further modified to produce bioactive compounds. The specific function of this domain remains to be determined.
