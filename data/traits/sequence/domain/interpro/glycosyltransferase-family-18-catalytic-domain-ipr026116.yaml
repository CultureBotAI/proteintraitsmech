identifier: InterPro:IPR026116
label: Glycosyltransferase family 18, catalytic domain
definition: >-
  This entry represents the catalytic domain of glycosyltransferase family 18 enzymes. The glycosyltransferase family 18 consists of alpha-1,6-mannosylglycoprotein 6-beta-N-acetylglucosaminyltransferases. This enzyme catalyses the addition of N-acetylglucosamine in beta 1-6 linkage to the alpha-linked mannose of biantennary N-linked oligosaccharides. It is one of the most important enzymes involved in the regulation of the biosynthesis of glycoprotein oligosaccharides. In humans, two homologues have been described, Gnt-V(A) and Gnt-VB (GnT-IX). Gnt-VB is predominantly expressed in brain and catalyses the transfer of N-acetylglucosamine (GlcNAc) to the beta 1-6 linkage of the mannose residue of GlcNAcbeta1,2-Manalpha on both the alpha1,3- and alpha1,6-linked mannose arms in the core structure of N-glycan. Gnt-VB could be responsible for the synthesis of a unique oligosaccharide structure in the brain. It plays an active role in modulating integrin and laminin-dependent adhesion and migration of neuronal cells via its activity in the O-mannosyl glycan pathway. Caenorhabditis elegans has only one homologue.
