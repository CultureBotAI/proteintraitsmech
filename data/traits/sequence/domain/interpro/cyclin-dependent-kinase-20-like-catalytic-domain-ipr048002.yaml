identifier: InterPro:IPR048002
label: "Cyclin-dependent kinase 20-like, catalytic domain"
definition: >-
  This entry represents the catalytic domain of CDK20/CCRK, which is also found in the putative cyclin-dependent kinase F-2, a poorly characterised protein from rice. Cyclin-dependent kinases (CDKs) are the catalytic subunits of a large family of serine/threonine protein kinases (STKs). Cyclin-dependent kinase 20 (CDK20), also known as Cell cycle-related kinase (CCRK), was previously called p42. Cyclin-Dependent Kinase (CDK)-Activating Kinase (CAK) is a key regulator of cell cycle checkpoints controlling cell proliferation/growth, which is essential for the activation of CDK2. It is indispensable for cell growth and has been implicated in the development of multiple cancers, such as in the progression of glioblastoma multiforme. In the heart, a splice variant of CCRK with a different C-terminal half is expressed; this variant promotes cardiac cell growth and survival and is significantly down-regulated during the development of heart failure. CDK20 also plays an essential role in promoting cell survival independent of the cell cycle, particularly in those cells with a limited capability of proliferation, such as cardiomyocytes.
