identifier: InterPro:IPR002878
label: "ChsH2, C-terminal OB-fold domain"
definition: >-
  This domain is found at the C-terminal end of the probable enoyl-CoA hydratase alpha subunit from Thermomonospora curvata (ChsH2) and similar archaeal and bacterial proteins. ChsH2 is likely to be involved in bile acid degradation. The C-terminal region of this protein is organised into two domains: an N-terminal zinc finger domain with a three-stranded antiparallel β-sheet and an N-terminal α-helix ( ), and a C-terminal domain (this entry) with an oligonucleotide/oligosaccharide binding (OB)-fold that consists of a five-stranded β-barrel. OB-folds are frequently found to bind nucleic acids suggesting this domain might bind to DNA or RNA. This domain is also found at the C terminus of 3-oxo-4,17-pregnadiene-20-carboxyl-CoA hydratase alpha subunit from M. tuberculosis, which is involved in cholesterol side chain degradation. This enzyme catalyses the hydration of 3-oxo-4,17-pregnadiene-20-carboxyl-CoA (3-OPDC-CoA) to form 17-hydroxy-3-oxo-4-pregnene-20-carboxyl-CoA (17-HOPC-CoA), in the modified beta-oxidation pathway for cholesterol side chain degradation. Other members of this group of proteins are Geobacter metallireducens Benzoylsuccinyl-CoA thiolase subunit BbsA, a component of the BbsAB thiolase complex, which catalyses the thiolytic cleavage of (S)-2-benzoylsuccinyl-CoA to succinyl-CoA and benzoyl-CoA, the final step of anaerobic toluene metabolism, and Methanothermococcus thermolithotrophicus HMGCS, an enzyme complex comprising the thiolase and 3-hydroxy-3-methylglutaryl (HMG)-CoA synthase, that catalyses the second reaction in the mevalonate pathway-the exergonic condensation of acetoacetyl-CoA and acetyl-CoA to HMG-CoA.
