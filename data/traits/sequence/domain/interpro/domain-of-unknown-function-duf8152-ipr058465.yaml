identifier: InterPro:IPR058465
label: "Domain of unknown function DUF8152"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins containing this domain are predominantly found in the class Halobacteria, which includes families such as Haloferacaceae, Natrialbaceae, and Haloarculaceae. The domain is typically found in proteins ranging from 87 to 167 amino acids in length. This domain adopts a four helical bundle structure.
