identifier: InterPro:IPR048714
label: "Transcriptional regulatory protein DpiA-like, helix-turn-helix domain"
definition: >-
  This entry represents a DNA-binding helix-turn-helix domain found at the C-terminal of the DpiA transcriptional regulator protein and similar bacterial sequences. DpiA is a member of the two-component regulatory system DpiA/DpiB, which is essential for expression of citrate-specific fermentation genes and genes involved in plasmid inheritance.
