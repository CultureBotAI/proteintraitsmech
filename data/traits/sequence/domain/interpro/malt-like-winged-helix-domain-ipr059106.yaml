identifier: InterPro:IPR059106
label: "MalT-like, winged helix domain"
definition: >-
  This entry represents the winged helix-turn-helix (wHTH) domain found in the MalT transcriptional regulator, in Serine/threonine-protein kinase PknK and HTH-type transcriptional regulator AlkS from bacteria. MalT contains one HTH LuxR-type DNA-binding domain. MalT activates the maltose regulon, a set of operons involved in the uptake and catabolism of maltose and maltodextrins, by binding to the MalT box DNA motif (5'-GGA[TG]GA-3'). In solution MalT is monomeric, but it oligomerises into its active form in the presence of ATP and maltotriose. Its activity is negatively regulated by MalY, MalK, and Aes, which antagonise maltotriose binding. MalT functions as part of a broader regulatory network that also involves the catabolite activator protein (CAP). The winged helix-turn-helix (wHTH) domain is a DNA-binding motif and a variant of the classical helix-turn-helix domain. It consists of a core of three α-helices bundled together, with a three- or four-stranded β-sheet (the wings) positioned on one side. In the canonical binding mode, the third helix (recognition helix) inserts into the major groove of the DNA, making sequence-specific contacts with the bases, while the wings interact with the DNA backbone to stabilise the interaction. wHTH domains are found in numerous transcription factors across all kingdoms of life and play critical roles in various cellular processes, including development, metabolism, and stress response. They often function as part of larger multi-domain proteins, where they provide sequence-specific DNA recognition while other domains mediate protein-protein interactions or respond to specific cellular signals.
