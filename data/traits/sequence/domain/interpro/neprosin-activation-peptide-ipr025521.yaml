identifier: InterPro:IPR025521
label: "Neprosin activation peptide"
definition: >-
  Pitcher plants are insectivorous and secrete a digestive fluid into the pitcher. This fluid contains a mixture of enzymes, including peptidases. One of these is neprosin, characterised by the pitcher plant Nepenthes ventrata. Neprosin is a glutamic endopeptidase that preferentially cleaves peptide bonds on the C-terminal side of proline residues. In contrast to most proline-cleaving enzymes, it effectively degrades proteins of any size. The peptidase is secreted and is presumed to possess an N-terminal activation peptide which is represented in this entry.
