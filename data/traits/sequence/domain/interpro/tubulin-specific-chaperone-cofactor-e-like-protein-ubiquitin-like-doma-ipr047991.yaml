identifier: InterPro:IPR047991
label: "Tubulin-specific chaperone cofactor E-like protein, ubiquitin-like domain"
definition: >-
  This entry represents a ubiquitin-like domain present in Tubulin-specific chaperone cofactor E-like protein (TBCEL) and similar animal proteins. TBCEL, also termed leucine-rich repeat-containing protein 35 (LRRC35), or E-like (EL), is a regulator of tubulin stability, suggesting a link between tubulin turnover and vesicle transport. TBCEL is abundantly expressed in testis, but is also present in several tissues at a much lower level. It is required for the synchronous movement of the investment cones and is important for normal male fertility. This protein shows high sequence similarity to tubulin-specific chaperone cofactor E (TBCE), a component of the multimolecular complex required for tubulin heterodimer formation in all eukaryotic cells. It contains a leucine-rich repeat protein-protein interaction domain and a C-terminal ubiquitin-like (Ubl) domain, but does not harbour the cytoskeleton-associated protein with glycine-rich segment (CAP-Gly) domain found in TBCE.
