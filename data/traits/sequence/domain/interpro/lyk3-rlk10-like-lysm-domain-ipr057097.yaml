identifier: InterPro:IPR057097
label: "LYK3/RLK10-like, LysM domain"
definition: >-
  This entry represents a set of LysM domains found in LysM domain receptor-like kinase family LYRK3, RLK10 and similar receptors. Plant receptor-like kinases and receptor-like proteins (RLKs or LYRK) are involved in innate immunity and symbiotic interactions in plants. Members of this family function as cell surface receptors that recognise specific molecular patterns associated with microbial activity, such as chitin oligosaccharides and peptidoglycans. These receptors play crucial roles in plant defence by detecting pathogen-associated molecular patterns (PAMPs) and microbe-associated molecular patterns (MAMPs), leading to the activation of defence genes. They are also involved in symbiotic relationships, such as the nitrogen-fixing root nodule symbiosis with rhizobia, by recognising Nod factor signals such as LYK3/4 which contains two LysM domains in the extracellular region. The family includes kinases such as CERK1 (Chitin elicitor receptor kinase 1) that phosphorylate downstream partners in response to elicitation, mediating signal transduction from the extracellular to intracellular spaces and contributing to resistance against pathogenic fungi and bacteria.
