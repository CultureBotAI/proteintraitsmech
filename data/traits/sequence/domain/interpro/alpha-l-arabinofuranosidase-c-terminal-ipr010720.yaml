identifier: InterPro:IPR010720
label: Alpha-L-arabinofuranosidase, C-terminal
definition: >-
  This entry represents the C terminus (approximately 200 residues) of bacterial and eukaryotic alpha-L-arabinofuranosidase ( ). This catalyses the hydrolysis of non-reducing terminal alpha-L-arabinofuranosidic linkages in L-arabinose-containing polysaccharides.
