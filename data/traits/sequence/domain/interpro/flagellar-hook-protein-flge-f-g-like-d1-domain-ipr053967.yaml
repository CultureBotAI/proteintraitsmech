identifier: InterPro:IPR053967
label: "Flagellar hook protein FlgE/F/G-like, D1 domain"
definition: >-
  This entry represents the D1 domain found in three closely related flagellar proteins, usually denoted FlgE, FlgF and FlgG and related proteins. In FlgE, there is an additional domain D2 ( ) outside D1. The flagellar hook is a short, highly curved tubular structure that connects the flagellar motor to the long filament acting as a helical propeller.
