identifier: InterPro:IPR037314
label: "Post-transcriptional regulator MKT1, H3TH domain"
definition: >-
  Mkt1 interacts with the Poly(A)-binding protein associated factor, Pbp1, and is present at the 3' end of RNA transcripts during translation. The Mkt1-Pbp1 complex is involved in the post-transcriptional regulation of HO endonuclease expression.
