identifier: InterPro:IPR060364
label: "NuzM, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the fungal-specific NuzM subunit (also known as NUO2) of the mitochondrial membrane respiratory chain NADH-ubiquinone oxidoreductase (Complex I). This domain comprises a short helix with loops at the N-terminal region of the protein. The specific function of this domain remains to be determined. NuzM unctions in electron transfer from NADH to the respiratory chain, with ubiquinone as the immediate electron acceptor. In Candida albicans, NUO2 plays roles in cell wall integrity, osmotic and oxidative resistance, yeast to hypha transition, and virulence.
