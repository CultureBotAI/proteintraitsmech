identifier: InterPro:IPR063478
label: "ZIP2 domain"
definition: >-
  This entry represents a domain found near the C-terminal of ZIP2 (zipping up meiotic chromosomes protein 2), from fungi, particularly within the Saccharomycetaceae family. ZIP2 is a meiosis-specific protein required for initiation of chromosome synapsis and synaptonemal complex formation. The protein localises to chromosomes during meiotic prophase and is essential for proper homologue pairing and recombination. ZIP2 interacts with other meiotic proteins including ZIP3 and ZIP4 to regulate crossover distribution and chromosome segregation.
