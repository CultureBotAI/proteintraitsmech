identifier: InterPro:IPR048664
label: "SWI/SNF Subunit INI1, DNA binding domain"
definition: >-
  This entry represents the N-terminal winged helix DNA binding domain of the INI1/hSNF5/SMARCB1 subunit and similar sequences from animals. SWI/SNF complexes use the energy of ATP hydrolysis to remodel chromatin. In mammals they play a central role in regulating gene expression during differentiation and proliferation.
