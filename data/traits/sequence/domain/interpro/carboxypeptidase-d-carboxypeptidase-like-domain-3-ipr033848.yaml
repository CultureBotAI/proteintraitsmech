identifier: InterPro:IPR033848
label: "Carboxypeptidase D, carboxypeptidase-like domain 3"
definition: >-
  This entry represents the third carboxypeptidase (CP)-like domain of Carboxypeptidase D (CPD; MEROPS identifier XM14.001; EC 3.4.17.22)(MEROPS identifier M14.950). Carboxypeptidase D (CPD) differs from all other metallocarboxypeptidases in that it contains multiple CP-like domains. CPD belongs to the N/E-like subfamily (subfamily M14B) of the M14 family of metallocarboxypeptidases (MCPs). CPD is a single-chain protein containing a signal peptide, three tandem repeats of CP-like domains separated by short bridge regions, followed by a transmembrane domain, and a C-terminal cytosolic tail. The first two CP-like domains of CPD contain all of the essential active site and substrate-binding residues, while the third CP-like domain lacks critical residues necessary for enzymatic activity and is inactive towards standard CP substrates. Domain I is optimally active at pH 6.3-7.5 and prefers substrates with C-terminal Arg, whereas domain II is active at pH 5.0-6.5 and prefers substrates with C-terminal Lys. CPD functions in the processing of proteins that transit the secretory pathway, and is present in all vertebrates as well as Drosophila. It is broadly distributed in all tissue types. Within cells, CPD is present in the trans-Golgi network and immature secretory vesicles, but is excluded from mature vesicles. It is thought to play a role in the processing of proteins that are initially processed by furin or related endopeptidases present in the trans-Golgi network, such as growth factors and receptors. CPD is implicated in the pathogenesis of lupus erythematosus (LE), it is regulated by TGF-beta in various cell types of murine and human origin and is significantly down-regulated in CD14 positive cells isolated from patients with LE. As down-regulation of CPD leads to down-mo…
