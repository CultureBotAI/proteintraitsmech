identifier: InterPro:IPR025304
label: ALIX V-shaped domain
definition: >-
  The binding of the LYPxL motif of late HIV p6Gag and EIAV p9Gag to this domain is necessary for viral budding. In ALIX, a component of the ESCRT pathway, this domain is central between an N-terminal Bro1 domain and a C-terminal proline-rich domain. The ALIX central domain is formed by two three-helix bundles disposed in a V shape. Retroviruses thus used this domain to hijack the ESCRT system of the cell.
