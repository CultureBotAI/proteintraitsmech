identifier: InterPro:IPR021940
label: "Very-long-chain aldehyde decarbonylase CER1-like, C-terminal"
definition: >-
  Very-long-chain aldehyde decarbonylase CER1 is an aldehyde decarbonylase involved in the conversion of aldehydes to alkanes. It is the core component of a very-long-chain alkane synthesis complex and it is involved in epicuticular wax biosynthesis and pollen fertility. CER1 is also linked to responses to biotic and abiotic stresses. This is the C-terminal domain of CER1 from Arabidopsis and GL1 1-7 from rice. This domain has a conserved LEGW sequence motif. It is about 170 amino acids in length. This domain is found associated with . It shares similarity to short chain dehydrogenases.
