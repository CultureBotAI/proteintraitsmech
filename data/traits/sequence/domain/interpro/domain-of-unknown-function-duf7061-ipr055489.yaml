identifier: InterPro:IPR055489
label: "Domain of unknown function DUF7061"
definition: >-
  This entry represents a domain found towards the N-terminal of a group of proteins from nematodes such as Trichuris suis and Trichinella britovi, members of the BPI/LBP/Plunc family of proteins which share homology with cholesterol ester transfer protein (CETP) and phospholipid transfer protein (PLTP). The exact function of these proteins is unknown, however, according to their structure predictions and homology to CEPT/PLTP, they may be involved in lipid binding.
