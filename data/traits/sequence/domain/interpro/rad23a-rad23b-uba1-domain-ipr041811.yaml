identifier: InterPro:IPR041811
label: "RAD23A/RAD23B, UBA1 domain"
definition: >-
  Proteins containing this domain include mammalian orthologues of yeast nucleotide excision repair (NER) proteins Rad23 (in Saccharomyces cerevisiae) and Rhp23 (in Schizosaccharomyces pombe). Rad23 proteins play dual roles in DNA repair as well as in proteosomal degradation. They have affinity for both the proteasome and ubiquitinylated proteins and participate in translocating polyubiquitinated proteins to the proteasome. Rad23 proteins carry a ubiquitin-like (UBL) and two ubiquitin-associated (UBA) domains, as well as a xeroderma pigmentosum group C (XPC) protein-binding domain. The UBL domain is responsible for binding to proteasome. Both the UBL domain and the XPC-binding domain are necessary for efficient NER function of Rad23 proteins.
