identifier: InterPro:IPR060947
label: "TRP47-like tandem repeat effector, N-terminal domain"
definition: >-
  This entry represents a conserved N-terminal domain of a family of proteins found, so far, only in Ehrlichia species. This repeat region is followed by a long repeat region with a large content of acidic and serine residues, but other than in composition, the repeats themselves may be unrelated from one lineage to another. Characterised examples, such as TRP47 from Ehrlichia chaffeensis, are glycoproteins and are immunodominant antigens.
