identifier: InterPro:IPR006657
label: Molybdopterin dinucleotide-binding domain
definition: >-
  This domain is found in various molybdopterin-containing oxidoreductases, such as Molybdenum-containing formylmethanofuran dehydrogenase 1 subunit C (FmdC). The formylmethanofuran dehydrogenase catalyses the first step in methane formation from CO2 in methanogenic archaea and has a molybdopterin dinucleotide cofactor. This domain corresponds to the C-terminal domain IV in dimethyl sulfoxide (DMSO) reductase which interacts with the 2-amino pyrimidone ring of both molybdopterin guanine dinucleotide molecules.
