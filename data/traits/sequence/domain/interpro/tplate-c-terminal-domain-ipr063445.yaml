identifier: InterPro:IPR063445
label: "TPLATE, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TPLATE proteins found in plants. The domain adopts a fold similar to the TATA-binding protein. TPLATE proteins function in vesicle-trafficking events required for site-specific cell wall modifications during pollen germination and for anchoring of the cell plate to the mother wall at the correct cortical position. The proteins localise to the forming cell plate and the cortical division zone during cytokinesis and interact with clathrin components CLC2 and CHC2. The specific function of this C-terminal domain remains to be determined.
