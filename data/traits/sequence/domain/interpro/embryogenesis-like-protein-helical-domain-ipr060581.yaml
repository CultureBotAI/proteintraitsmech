identifier: InterPro:IPR060581
label: "Embryogenesis-like protein, helical domain"
definition: >-
  This entry represents a helical bundle domain found in the embryogenesis-like protein (EML) from Arabidopsis thaliana and similar eukaryotic proteins. EML is a nuclear transcriptional activator that recruits HAG1/GCN5 and triggers histone H3 acetylation of target gene promoters. The protein is expressed in flowers, leaves, stems and siliques, and is induced by cold and salt stress. This helical bundle domain corresponds to a predicted coiled-coil region and may facilitate protein-protein interactions necessary for transcriptional activation.
