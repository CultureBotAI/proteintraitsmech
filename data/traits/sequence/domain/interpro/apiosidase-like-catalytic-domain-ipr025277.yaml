identifier: InterPro:IPR025277
label: "Apiosidase-like, catalytic domain"
definition: >-
  This entry represents the catalytic domain of endo-apiosidase (GH140, ) and related proteins some of which form part of the rhamnogalacturonan-II (RG-II) degradome. This domain adopts an (α/β)8-barrel that harbours the aspartate and glutamate residues essential for the catalytic activity.
