identifier: InterPro:IPR040840
label: "Tc toxin complex TcA, C-terminal TcB-binding domain"
definition: >-
  This domain is found in the C-terminal region of the Tc toxin TcA, present in Photorhabdus luminescens. Tc Toxin complexes bind to the cell surface, are endocytosed and perforate the host endosomal membrane by forming channels that translocate toxic enzymes into the host. This domain is responsible for binding to toxin TcB. Binding of TcA to TcB/TcC opens the β-propeller gate.
