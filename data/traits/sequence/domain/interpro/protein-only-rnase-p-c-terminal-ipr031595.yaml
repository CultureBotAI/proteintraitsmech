identifier: InterPro:IPR031595
label: "Protein-only RNase P, C-terminal"
definition: >-
  This entry represents a domain found in protein-only RNase P (PRORP), an enzyme that processes precursor tRNAs in human mitochondria and in all tRNA-using compartments of Arabidopsis thaliana. PRORP catalyses the maturation of the 5' ends of tRNA precursors.
