identifier: InterPro:IPR047392
label: "Forkhead box protein D3, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXD3 and similar sequences predominantly found in vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein D3 (FOXD3) acts as a transcriptional repressor that binds to the consensus sequence 5'-A[AT]]T[AG]]TTTGTTT-3'. It also acts as a transcriptional activator. It promotes development of neural crest cells from neural tube progenitors and restricts neural progenitor cells to the neural crest lineage while suppressing interneuron differentiation. FOXD3 is required for maintenance of pluripotent cells in the pre-implantation and peri-implantation stages of embryogenesis.
