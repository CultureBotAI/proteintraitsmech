identifier: InterPro:IPR046851
label: "Neurobeachin, beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain found at the C-terminal of neurobeachin-like proteins mainly from animals and plants. Neurobeachin from mouse appears to have a role in membrane trafficking.
