identifier: InterPro:IPR041413
label: "MmyB-like transcription regulator ligand binding"
definition: >-
  This entry represents the ligand binding domain found in the C-terminal portion of a family of actinobacterial transcription factors. Studies of the crystal structure indicate that the domain has fold similar to the Per-Arnt-Sim (PAS) domain.
