identifier: InterPro:IPR053925
label: "RecX, third three-helical domain"
definition: >-
  This entry represents the third three-helical domain (HTH-like) found in RecX family of proteins. RecX functions as a regulator of DNA recombination and repair pathways in bacterial cells. RecX protein is known to inhibit the activity of RecA protein in DNA recombination. It contains three HTH-like domains, first represented by this entry, second ( ) and third ( ).
