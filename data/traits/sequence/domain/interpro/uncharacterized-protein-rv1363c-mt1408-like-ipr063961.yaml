identifier: InterPro:IPR063961
label: "Uncharacterized protein Rv1363c/MT1408-like"
definition: >-
  This entry represents a conserved domain found in a number of uncharacterised proteins from Mycobacterium tuberculosis such as Rv1363c and MT1408 and related proteins from Actinomycetes. The proteins contain a region predicted as transmembrane and a domain which is structurally similar to domain members of the NTF2-like superfamily . This entry represents the NTF2-like domain and an extended N-terminal helix projecting from this domain.
