identifier: InterPro:IPR006549
label: "HAD-superfamily hydrolase,subfamily IIIA"
definition: >-
  This group of proteins is a part of the haloacid dehalogenase (HAD) superfamily of aspartate-nucleophile hydrolases. The Class III subfamilies are characterised by the lack of any domains located either between the first and second conserved catalytic motifs (as in the Class I subfamilies) or between the second and third conserved catalytic motifs (as in the Class II subfamilies) of the superfamily domain. The IIIA subfamily contains five major clades: histidinol-phosphatase, histidinol-phosphatase-related protein, DNA 3-phosphatase and sequences related to YqeG and YrbI. In the case of histidinol phosphatase and PNK-3'-phosphatase, this entry represents a domain of a bifunctional system. In the histidinol phosphatase HisB, a C-terminal domain is an imidazoleglycerol-phosphate dehydratase which catalyses a related step in histidine biosynthesis. In PNK-3'-phosphatase, N- and C-terminal domains constitute the polynucleotide kinase and DNA-binding components of the enzyme.
