identifier: InterPro:IPR060372
label: "Lymphocyte antigen 6 complex locus protein G6f, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in human Lymphocyte antigen 6 complex locus protein G6f (LY6G6F) and related proteins. LY6G6F may play a role in the downstream signal transduction pathways involving GRB2 and GRB7.
