identifier: InterPro:IPR060485
label: "Effector TSP1"
definition: >-
  This entry represents a meander β-barrel domain found in TSP1 effector proteins and related small secreted cysteine-rich proteins. The domain is found in fungi, particularly within the Hypocreales. The structure consists of alternating stacked layers of tryptophan and arginine residues from respective strands, stabilised by multiple disulphide bonds across the domain. TSP1 functions as a secreted effector that stimulates salicylic acid signalling in plant roots. The protein forms homodimers and is induced during fungal growth on plant roots. The function of this domain is unknown.
