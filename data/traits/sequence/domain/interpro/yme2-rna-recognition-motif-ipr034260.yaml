identifier: InterPro:IPR034260
label: "Yme2, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Yme2 (Mitochondrial escape protein 2), which is an inner mitochondrial membrane protein that plays a critical role in mitochondrial DNA transactions. In Saccharomyces cerevisiae, it may serve as a mediator of nucleoid structure and number in mitochondria. Yme2 contains an exonuclease domain and an RNA recognition motif (RRM).
