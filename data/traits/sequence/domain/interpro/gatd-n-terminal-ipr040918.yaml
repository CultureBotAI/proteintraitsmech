identifier: InterPro:IPR040918
label: "GatD, N-terminal"
definition: >-
  This is the N-terminal domain of GatD protein present in Pyrococcus abyssi. Two GatD and two GatE associate to form a tetramer complex. The tetramer complex is able to mature Glutamic acid-tRNA Glutamine into Glutamine-tRNA Glutamine, a necessary step in the translation of proteins. The N-terminal domain is involved in anchoring GatD to GatE in order to form the tetramer.
