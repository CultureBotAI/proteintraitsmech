identifier: InterPro:IPR041753
label: "PP5, C-terminal metallophosphatase domain"
definition: >-
  Serine/threonine protein phosphatase-5 (PP5) is a member of the PPP gene family of protein phosphatases that is highly conserved among eukaryotes and widely expressed in mammalian tissues. PP5 has a C-terminal phosphatase domain and an extended N-terminal TPR (tetratricopeptide repeat) domain containing three TPR motifs. This entry represents the C-terminal phosphatase domain. Proteins containing this domain also include yeast Ppt1, which is a serine/threonine phosphatase that regulates Hsp90 chaperone by affecting its ATPase and cochaperone binding activitie.
