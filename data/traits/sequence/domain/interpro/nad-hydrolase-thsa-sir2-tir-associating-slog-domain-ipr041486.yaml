identifier: InterPro:IPR041486
label: "NAD(+) hydrolase ThsA, Sir2/TIR-associating SLOG domain"
definition: >-
  This is the SLOG-like domain of ThsA proteins, which is part of the SLOG superfamily. This domain is found at the C-terminal of ThsA proteins binds NAD+ derivatives, such as ADPR molecules produced by ThsB, which drives an oligomeric state change in ThsA and activates the NADase activity. Thoeris is a bacterial antiphage defense system, which consists of two genes, thsA and thsB, via NAD degradation. ThsA has robust NAD cleavage activity and and a two-domain architecture containing a N-terminal NAD-binding domain (denoted as sirtuin-like or Macro) and C-terminal SLOG-like domain. In some instances, such as in B. amyloliquefaciens, ThsA has an N-terminal transmembrane domain. ThsB (also referred to as TIR1 and TIR2) is structurally similar to TIR domain proteins but without enzymatic activity.
