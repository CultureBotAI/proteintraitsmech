identifier: InterPro:IPR034859
label: "RBM26, RNA recognition motif 1"
definition: >-
  This subgroup corresponds to the RNA recognition motif 1 (RRM1) of RBM26, also known as cutaneous T-cell lymphoma (CTCL) tumor antigen se70-2, which represents a cutaneous lymphoma (CL)-associated antigen. It contains two RNA recognition motifs (RRMs). The RRMs may play some functional roles in RNA-binding or protein-protein interactions.
