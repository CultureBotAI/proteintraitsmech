identifier: InterPro:IPR037953
label: "SbnI-like, N-terminal"
definition: >-
  Siderophore staphylobactin biosynthesis protein SbnI of Staphylococcus aureus is a ParB/Spo0J like protein required for the expression of genes in the sbn operon, which is responsible for staphyloferrin B (SB) biosynthesis. SnbI forms dimers and binds DNA upstream of sdnD. SbnI binds heme, which inhibits DNA binding of SbnI, leading to a suppression of sbn operon expression. SbnI is a free serine kinase that generates O -phospho-l-serine for staphyloferrin B biosynthesis in Staphylococcus aureus.
