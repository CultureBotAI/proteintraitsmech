identifier: InterPro:IPR034376
label: G3BP2, RNA recognition motif
definition: >-
  This entry represents the RNA recognition motif (RRM) of G3BP2, a cytoplasmic protein that interacts with both IkappaBalpha and IkappaBalpha/NF-kappaB complexes, indicating that G3BP2 may play a role in the control of nucleocytoplasmic distribution of IkappaBalpha and cytoplasmic anchoring of the IkappaBalpha/NF-kappaB complex. It also contributes to stress granule formation.
