identifier: InterPro:IPR031655
label: "FokI, D3 domain"
definition: >-
  This entry represents the subdomain D3 of FokI. D1 and D2 make almost all of the base-specific contacts with the DNA. D3 is most similar to CAP and related proteins such as histone H5, HNF-3gamma and the biotin operon repressor (BirA). Despite this similarity, D3 barely touches the DNA. Type IIS restriction endonuclease FokI is a member of an unusual class of bipartite restriction enzymes that recognises the double-stranded DNA sequence 5'-GGATG-3' and cleave DNA phosphodiester groups 9 base pairs away on this strand and 13 base pairs away on the complementary strand. FokI contains amino- and carboxy-terminal domains corresponding to the DNA-recognition and cleavage functions, respectively. The recognition domain is made of three smaller subdomains (D1, D2 and D3) which are evolutionarily related to the helix-turn-helix-containing DNA-binding domain of the catabolite gene activator protein CAP.
