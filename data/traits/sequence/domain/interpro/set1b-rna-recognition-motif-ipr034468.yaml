identifier: InterPro:IPR034468
label: "Set1B, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Setd1B (also known as Set1B), a ubiquitously expressed vertebrates histone methyltransferase that exhibits high homology to yeast Set1. Set1B is localised to euchromatic nuclear speckles and associates with a complex containing six human homologues of the yeast Set1/COMPASS complex, including CXXC finger protein 1 (CFP1; homologous to yeast Spp1), Rbbp5 (homologous to yeast Swd1), Ash2 (homologous to yeast Bre2), Wdr5 (homologous to yeast Swd3), and Wdr82 (homologous to yeast Swd2). Set1B complex is a histone methyltransferase that produces trimethylated histone H3 at Lys4.
