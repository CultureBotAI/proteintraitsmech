identifier: InterPro:IPR058706
label: "AHC1-like, C2H2 zinc-finger domain"
definition: >-
  This entry describes the zinc finger domain in AHC1 proteins found in fungi. AHC1 proteins are involved in chromatin interaction and potential signal transduction processes. They are part of ADA histone acetyltransferase complex involved in repair of replication-born double-strand DNA breaks. AHC1 lacks orthologues in other eukaryotic organisms. This domain adopts a β-β-α fold.
