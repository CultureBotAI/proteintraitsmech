identifier: InterPro:IPR019380
label: "Casein kinase substrate, phosphoprotein PP28"
definition: >-
  This domain is a region of 70 residues conserved in proteins from plants to humans and contains a serine/arginine rich motif. In rats the full protein is a casein kinase substrate, and this region contains phosphorylation sites for both cAMP-dependent protein kinase and casein kinase II.
