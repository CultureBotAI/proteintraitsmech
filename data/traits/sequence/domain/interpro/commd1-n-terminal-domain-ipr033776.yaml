identifier: InterPro:IPR033776
label: "COMMD1 N-terminal domain"
definition: >-
  COMM (copper metabolism gene MURR1) domain proteins constitute a family initially identified as interacting partners of COMMD1 (previously known as MURR1), the prototype member of this protein family. COMMD1 is a multifunctional protein that has been shown to participate in two apparently distinct activities, regulation of the transcription factor NF-kappa-B and control of copper metabolism. The family is defined by the presence of a C-terminal motif termed COMM domain, which functions as an interface for protein-protein interactions. The proteins designated as COMMD or COMM domain containing 1-10 are extensively conserved in multicellular eukaryotic organisms. This helical domain is found at the N terminus of COMMD1. This domain adopts an α-helical structure unlike any other helical protein.
