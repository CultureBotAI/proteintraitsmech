identifier: InterPro:IPR048287
label: "Thrombospondin-like, N-terminal domain"
definition: >-
  This entry represents the heparin-binding and cell adhesion domain of thrombospondin and related proteins such as protein kinase C-binding protein NELL1 and NELL2, and collagen alpha. Thrombospondins (TSPs) are secreted, calcium-binding glycoproteins that play an essential role in regulating cell-cell and cell-matrix interactions. They are divided into trimeric subgroup A (TSP-1 and TSP-2) and pentameric subgroup B (TSP-3-5). The actions of TSPs depend on their binding partners in a given environment. The N-terminal domain of TSPs plays an integral role in the interaction of TSPs with other secreted and transmembrane proteins, and proteoglycans. This domain folds into a β-sandwich typical for concanavalin A-like lectins/glucanases superfamily.
