identifier: InterPro:IPR033307
label: Ted1, metallophosphatase domain
definition: >-
  Ted1 remodels the anchor of newly synthesized GPI-anchored proteins and acts together with Emp24 and Erv25 in cargo exit from the endoplasmic reticulum. This entry also includes an uncharacterised yeast protein C23A1.02c. This entry represents the metallophosphatase domain of Ted1. This domain is thought to allow for productive metal coordination.
