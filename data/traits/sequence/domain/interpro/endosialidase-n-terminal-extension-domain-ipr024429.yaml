identifier: InterPro:IPR024429
label: "Endosialidase, N-terminal extension domain"
definition: >-
  This entry represents the N-terminal extension domain of endosialidases which is approximately 70 amino acids in length. The two N-terminal domains (this domain and the β propeller) assemble in the compact 'cap' whereas the C-terminal domain forms an extended tail-like structure. The very N-terminal part of the 'cap' region (residues 246 to 312) holds the only α-helix of the protein and is presumably the residual part of the deleted N-terminal head-binding domain.
