identifier: InterPro:IPR062788
label: "AF_0408, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein AF_0408 from Archaeoglobus fulgidus. The function of this domain remains to be determined. According to AlphaFold 3 modelling, this domain is likely to form a homodimer.
