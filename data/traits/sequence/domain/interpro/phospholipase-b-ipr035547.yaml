identifier: InterPro:IPR035547
label: "Phospholipase B"
definition: >-
  Membrane-associated phospholipase B/lipase (PLB/LIP) consists of four tandem homologous domains (repeats 1 to 4), and repeat 2 is the catalytic domain that catalyzes phospholipase A2, lysophospholipase, and lipase activities.
