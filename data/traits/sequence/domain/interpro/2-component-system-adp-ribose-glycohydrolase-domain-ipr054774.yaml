identifier: InterPro:IPR054774
label: "2-Component system ADP-ribose glycohydrolase domain"
definition: >-
  This entry represents the 2CompARG domain, which coupled with its partner 2CompART (represented by ), forms a two-domain T-A-like association in the duplex-forming systems likely functioning as the principal effector of these systems in bacteroidetes. One is likely to function as the antitoxin, regulating the toxin activity of the other.
