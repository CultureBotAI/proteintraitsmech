identifier: InterPro:IPR024744
label: "Putative cyclic diguanylate phosphodiesterase, CSS motif-containing domain"
definition: >-
  This domain, with its characteristic highly conserved CSS sequence motif, is found N-terminal to the EAL domain ( ), found in many putative cyclic diguanylate phosphodiesterases, such as PdeB/C/D/G/N from E. coli K-12. It has two highly conserved cysteine residues with potential disulfide bonds formation which might control the enzymatic activity of the cytoplasmic C-terminal EAL domain.
