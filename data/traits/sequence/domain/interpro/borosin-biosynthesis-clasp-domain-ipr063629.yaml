identifier: InterPro:IPR063629
label: "Borosin biosynthesis, clasp domain"
definition: >-
  This entry represents the clasp domain found in borosin biosynthesis proteins from basidiomycete fungi and related fungal sequences. The domain comprises extended strands and a C-terminal helical bundle. Borosins are ribosomally synthesised and post-translationally modified peptides (RiPPs) with backbone alpha-N-methylations that confer nematodicidal activity. The clasp domain is found C-terminal to the methyltransferase domain ( ) in fusion proteins that also contain the borosin core peptide precursor. The functional enzyme is a homodimer with a catenane-like arrangement in which the clasp domain of one monomer wraps around the methyltransferase domain of the other monomer, creating two interlocked rings. This positions the core peptide into the adjacent subunit's active site for iterative intermolecular methylation.
