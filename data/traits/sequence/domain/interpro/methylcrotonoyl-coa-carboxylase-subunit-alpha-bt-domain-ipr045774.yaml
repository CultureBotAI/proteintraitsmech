identifier: InterPro:IPR045774
label: "Methylcrotonoyl-CoA carboxylase subunit alpha, BT domain"
definition: >-
  This entry represents the BT domain from plant Methylcrotonoyl-CoA carboxylase subunit alpha (MCCA), located between the biotin carboxylase (BC) and biotin carboxyl carrier protein (BCCP) domains. This domain mediates crucial interactions between the BC domain in the the alpha subunit and the carboxyltransferase (CT) domain in the beta subunit of this enzyme which are based on ion-pair, hydrogen-bonding and hydrophobic interactions. This domain has a backbone fold with a long helix surrounded by an eight-stranded anti-parallel β barrel. There is a hook comprising the C-terminal part of the helix and the loop connecting it to the first strand of the β barrel, which appears to have a central role in alpha and beta subunits interactions. In Arabidopsis, methylcrotonoyl-CoA carboxylase is involved in the catabolism of leucine, associated with reproductive growth. It may also participate in the catabolism of isoprenoids.
