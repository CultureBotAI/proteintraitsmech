identifier: InterPro:IPR056307
label: "CFAP74, third Ig-like domain"
definition: >-
  This entry represents the third Ig-like domain of CFAP74, a protein that is part of the central apparatus of the cilium axoneme and may play a role in cilium movement. It may play an important role in sperm architecture and function. Members of this entry are found in eukaryotes.
