identifier: InterPro:IPR011508
label: "RSD-2, N-terminal"
definition: >-
  This domain is found in three copies at the N terminus of the Caenorhabditis elegans RSD-2 protein. RSD-2 (RNAi spreading defective) is involved in systemic RNAi. Mutations in the rsd-2 gene do not affect somatic genes but only germline expressed genes.
