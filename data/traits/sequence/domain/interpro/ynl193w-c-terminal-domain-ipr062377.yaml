identifier: InterPro:IPR062377
label: "YNL193W, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YNL193W and similar fungal proteins. YNL193W is an uncharacterised protein from Saccharomyces cerevisiae that is 558 amino acids. The function of this protein and the specific role of this domain remain to be determined. This domain contains a TPR-like fold.
