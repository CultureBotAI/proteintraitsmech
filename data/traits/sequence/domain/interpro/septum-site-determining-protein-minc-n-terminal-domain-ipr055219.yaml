identifier: InterPro:IPR055219
label: "Septum site-determining protein MinC, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Septum site-determining protein MinC and related proteins mainly found in firmicutes. MinC is a cell division inhibitor that blocks the formation of polar Z ring septums. It consists of two domains. The N-terminal domain interacts with FtsZ and inhibits FtsZ polymerisation, while the C-terminal interacts with MinD and inhibits the bundling of FtsZ filaments.
