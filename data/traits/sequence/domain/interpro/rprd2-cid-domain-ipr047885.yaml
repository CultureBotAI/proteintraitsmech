identifier: InterPro:IPR047885
label: RPRD2, CID domain
definition: >-
  Regulation of nuclear pre-mRNA domain-containing protein 2 (RPRD2) is a CID (CTD-Interacting Domain) domain containing protein that co-purifies with RNA polymerase (Pol) II (RNAP II) and three other RNAP II-associated proteins, RPAP2, GRINL1A and RECQL5, but not with the Mediator complex. The function of this proteins is not yet clear. CID binds tightly to the carboxy-terminal domain (CTD) of RNAP II. During transcription, RNAP II synthesises eukaryotic messenger RNA. Transcription is coupled to RNA processing through the CTD. This entry represents the CID domain of RPRD2.
