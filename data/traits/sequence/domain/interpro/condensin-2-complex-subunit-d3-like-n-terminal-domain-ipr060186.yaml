identifier: InterPro:IPR060186
label: "Condensin-2 complex subunit D3-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of human Condensin-2 complex subunit D3 (NCAPD3) and similar proteins, including Condensin-2 complex subunit hcp-6 from Caenorhabditis elegans. NCAPD3 is a regulatory subunit of the condensin-2 complex, a complex which establishes mitotic chromosome architecture and is involved in physical rigidity of the chromatid axis. This domain is predicted to adopt an all-α configuration.
