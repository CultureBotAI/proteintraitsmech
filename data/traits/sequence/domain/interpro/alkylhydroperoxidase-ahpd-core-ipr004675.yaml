identifier: InterPro:IPR004675
label: "Alkylhydroperoxidase AhpD core"
definition: >-
  This entry represents the core region of homology among a group of related proteins, including Alkyl hydroperoxide reductase AhpD and Alkyl hydroperoxide reductase Rv2159c Mycobacterium tuberculosis. Most members in this entry contain the motif Exxxxxx[SA]xxxxC[VIL]xCxxxH. AhpD from Streptococcus pneumoniae contributes to pneumococcal virulence and oxidative stress responses. It exhibits weak thiol-dependent peroxidase activity and, unlike the Mycobacterium tuberculosis AhpC/D system, SpAhpD does not mediate electron transfer to SpAhpC. Therefore, SpAhpD cysteine oxidation may act as a redox switch or mediate electron transfer with other thiol proteins. This entry also includes Lpg0406 ( ) from Legionela pneumophila which contains the conserved thioredoxin-like active site CXXC motif and a proton relay system similar to that of alkylhydroperoxidase from Mycobacterium tuberculosis, suggesting that Lpg0406 might function as an enzyme with peroxidase activity and involved in antioxidant defense, with a different substrate preference than AphD.
