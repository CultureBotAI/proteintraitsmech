identifier: InterPro:IPR054169
label: "1,4-alpha-glucan branching enzyme GlgB, N-terminal domain"
definition: >-
  This is the N-terminal β-sandwich domain of 1,4-alpha-glucan branching enzyme GlgB and related proteins. This domain has a differential preference in substrate recognition and binding during amylase activity, when amylose is used as a substrate.
