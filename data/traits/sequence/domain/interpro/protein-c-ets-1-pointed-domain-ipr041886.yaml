identifier: InterPro:IPR041886
label: "Protein C-ets-1, pointed domain"
definition: >-
  This entry represents the SAM pointed domain of protein C-ets-1 (also known as ETS-1), which is an ETS transcriptional activator. The SAM pointed domain is a protein-protein interaction domain. The ETS-1 activator is regulated by phosphorylation. It contains a docking site for the ERK2 MAP (Mitogen Activated Protein) kinase, while the ERK2 phosphorylation site is located in the N-terminal disordered region upstream of the SAM Pointed domain. Mutations of the kinase docking site residues inhibit phosphorylation. ETS-1 activators play a role in a number of different physiological processes, and they are expressed during embryonic development, including blood vessel formation, hematopoietic, lymphoid, neuronal and osteogenic differentiation. The Ets-1 gene is a proto-oncogene involved in progression of different tumors (including breast cancer, meningioma, and prostate cancer). ETS-1 is a potential molecular target for selective cancer therapy.
