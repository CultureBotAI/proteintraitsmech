identifier: InterPro:IPR046969
label: "1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase beta-2, EF-hand domain"
definition: >-
  Phosphoinositide-specific phospholipase C (PI-PLC), also known as 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase, plays a role in the inositol phospholipid signaling by hydrolysing phosphatidylinositol-4,5-bisphosphate to produce the second messengers inositol 1,4,5-trisphosphate (IP3) and diacylglycerol (DAG). These cause the increase of intracellular calcium concentration and the activation of protein kinase C (PKC), respectively. The PLC family in murine or human species is comprised of multiple subtypes. On the basis of their structure, they have been divided into five classes, beta (beta-1, 2, 3 and 4), gamma (gamma-1 and 2), delta (delta-1, 3 and 4), epsilon, zeta, and eta types. PLC-beta-2 may be involved in the transduction of bitter taste stimuli. This entry represents the region of this enzyme that contains several EF hands, which appears C-terminal to the PH domain.
