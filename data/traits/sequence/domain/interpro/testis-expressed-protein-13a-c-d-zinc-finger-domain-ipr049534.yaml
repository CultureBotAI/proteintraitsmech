label: "Testis-expressed protein 13A/C/D, zinc finger domain"
definition: >-
  This entry represents the RANBP2-type zinc finger domain found at the C-terminal of human Testis-expressed protein 13A/C/D (TEX13A/C/D). These proteins have been related to male fertility in mammals.
