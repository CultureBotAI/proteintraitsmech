identifier: InterPro:IPR039566
label: "Conserved virulence factor B, first S1 domain"
definition: >-
  This entry represents the first S1 domain found at the N-terminal of conserved virulence factor B proteins. The S1 domain has an OB-fold structure and is involved in nucleic acid binding. Conserved virulence factor B proteins contribute to the expression of virulence factors and to pathogenicity via both agr-dependent and agr-independent pathways.
