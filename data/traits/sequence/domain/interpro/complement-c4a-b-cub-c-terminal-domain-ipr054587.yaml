identifier: InterPro:IPR054587
label: "Complement C4A/B, CUB C-terminal domain"
definition: >-
  Complement C4 is organised in 12 structural domains, with eight macroglobulin (MG) domains forming the core of the molecule. They have a thioester domain (TED, ), a large α-helical domain inserted in the CUB (complement C1r/C1s, Uegf, Bmp1) domain which consists of two antiparallel β-sheets. This entry covers a fraction of the CUB domain corresponding to the C-terminal part (residues 1323-1389 in human C4A/B) as this domain is made up of residues located apart in these sequences. Members of this entry are specific to vertebrates.
