identifier: InterPro:IPR027598
label: "Amphi-Trp domain"
definition: >-
  This domain usually comprises most of the span of bacterial or archaeal proteins with a length of about 90 amino acids. Some members, however, are extended by one or two copies of domain in the C-terminal region. No residue in this domain is invariant. A striking feature of this domain is a C-terminal region that alternates strongly charged with strongly hydrophobic residues and usually ends with a Trp residue, e.g. LEIEIEW or FEIKVRW, suggesting an amphipathic β-strand structure, therefore, the suggested the name for this domain is amphi-Trp. The function is unknown.
