identifier: InterPro:IPR055258
label: "Reticulophagy regulator 3, N-terminal reticulon-homology domain"
definition: >-
  This entry represents the N-terminal reticulon-homology domain (RHD) of RETREG3/FAM134C, which shows sequence similarity to ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), an endoplasmic reticulum protein that has an important role in cell conduction and material transport. The RHD may function in inducing membrane curvature. Members of this group are specific to vertebrates. Reticulophagy regulator 3 (RETREG3), also called FAM134C (family with sequence similarity 134, member C), mediates NRF1-enhanced neurite outgrowth. It interacts with ATG8 family modifier proteins MAP1LC3A, MAP1LC3B, GABARAP, and GABARAPL1.
