identifier: InterPro:IPR013955
label: "Replication factor A, C-terminal"
definition: >-
  Replication factor A (RP-A) binds and subsequently stabilises single-stranded DNA intermediates and thus prevents complementary DNA from reannealing. It also plays an essential role in several cellular processes in DNA metabolism including replication, recombination and repair of DNA. Replication factor-A protein is also known as Replication protein A 70kDa DNA-binding subunit. This entry is found at the C terminus of Replication factor A and similar proteins found and eukaryotes and archaea.
