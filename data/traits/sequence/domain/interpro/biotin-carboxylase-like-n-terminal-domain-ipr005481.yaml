identifier: InterPro:IPR005481
label: "Biotin carboxylase-like, N-terminal domain"
definition: >-
  This domain is structurally related to the PreATP-grasp domain. It is found at the N terminus of biotin carboxylase enzymes, and propionyl-CoA carboxylase A chain.
