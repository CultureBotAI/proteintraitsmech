identifier: InterPro:IPR053948
label: "SBE2/SBE22, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of SBE2 and its paralogue, SBE22 from budding yeast. These proteins are involved in bud growth and yeast cell wall formation. They may be also involved in the transport of cell wall components from the Golgi apparatus to the cell surface periphery.
