identifier: InterPro:IPR025754
label: "TRC8-like, N-terminal domain"
definition: >-
  This region is found at the N terminus of the TRC8 protein ( ). TRC8 is an E3 ubiquitin-protein ligase also known as RNF139. This region contains 12 transmembrane domains and has been suggested to contain a sterol sensing domain. It has been found that TRC8 protein levels are sterol responsive and that it binds and stimulates ubiquitylation of the endoplasmic reticulum anchor protein INSIG.
