identifier: InterPro:IPR034828
label: "Peroxidasin, Ig-like domain 4"
definition: >-
  Peroxidasin is a secreted heme peroxidase which is involved in hydrogen peroxide metabolism and peroxidative reactions in the cardiovascular system. It is a multidomain peroxidase that contain a signal peptide, several (e.g., five in Drosophila or one in Homo sapiens) leucine-rich regions, followed by four immunoglobulin-like domains, a linking region, the peroxidase domain, and a carboxy terminal Willebrand type C protein-protein interaction domain. This entry represents the fourth immunoglobulin (Ig)-like domain of vertebrate peroxidasin.
