identifier: InterPro:IPR013608
label: "VWA N-terminal"
definition: >-
  This domain is found at the N terminus of proteins containing von Willebrand factor type A (VWA, ) and Cache domains. It has been found in vertebrates, Drosophila melanogaster (Fruit fly) and Caenorhabditis elegans but has not yet been identified in other eukaryotes. It is probably involved in the function of some voltage-dependent calcium channel subunits.
