identifier: InterPro:IPR055908
label: "Domain of unknown function DUF7485"
definition: >-
  This entry includes uncharacterised sequences mainly from actinobacteria. According to structure predictions, they may form a β-propeller-like fold consisting of four repeated units containing three (in one of them) and four (on the other three units) β-strands. There is an additional unit which is slightly different that resembles a seven stranded β-sandwich.
