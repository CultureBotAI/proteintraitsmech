identifier: InterPro:IPR054603
label: "Plant cysteine-rich protein domain"
definition: >-
  This domain is found in a group of plant cysteine-rich proteins, including cysteine-rich receptor-like protein kinases 6/8/10 and cysteine-rich repeat secretory protein 1 from Arabidopsis thaliana. This domain is usually found C-terminal to two copies of . It is predicted to adopt an α-helical structure.
