identifier: InterPro:IPR023849
label: "TQXA domain"
definition: >-
  This entry describes a domain of about 40 residues with an invariant TQ dipeptide in an almost invariant TQxA[VI]W motif. This domain occurs in surface-expressed proteins of Gram-positive bacteria, many of which are anchored by LPXTG-containing sortase target domains. Proteins in this entry may also have the Cna protein B-type domain and fibronectin-binding protein signal sequence. The Q in the motif becomes part of an unusual Cys-Gln thioester crosslink.
