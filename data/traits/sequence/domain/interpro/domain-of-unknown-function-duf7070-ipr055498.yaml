identifier: InterPro:IPR055498
label: "Domain of unknown function DUF7070"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from actinopterygians that are distantly related and share overall similar domain organisation to the human NEDD4-binding protein 1 (N4BP1). This domain shares a weak sequence similarity to known UBA domains and it is predicted to fold into a typical three helical bundle.
