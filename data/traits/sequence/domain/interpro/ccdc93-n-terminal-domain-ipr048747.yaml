identifier: InterPro:IPR048747
label: "CCDC93, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical domain from the CCDC93 protein. This protein is part of the complex termed the CCC complex that is composed of CCDC22, CCDC93 and various COMMD proteins.
