definition: >-
  This domain is found in uncharacterised protein YnaC and related bacterial proteins. It is usually associated with ( ). This domain is a winged helix (WH) domain decorated at the C terminus with a small three stranded β-sheet that packs on the WH domain to form a single globular structure.
