identifier: InterPro:IPR060303
label: "HAUS3, C-terminal"
definition: >-
  This entry represents the C-terminal domain in HAUS3 proteins. HAUS3 is involved in critical cellular processes such as mitotic spindle assembly, centrosome integrity maintenance, and cytokinesis completion. As a component of the HAUS augmin-like complex, it plays a pivotal role in interacting with the gamma-tubulin ring complex, which is essential for spindle assembly during cell division. This interaction ensures proper chromosome segregation and cell division, contributing to the overall stability and function of the mitotic spindle apparatus. This entry also includes the AUGMIN protein, a homologue found in plants.
