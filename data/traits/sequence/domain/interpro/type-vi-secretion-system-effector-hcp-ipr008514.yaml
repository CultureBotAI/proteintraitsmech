identifier: InterPro:IPR008514
label: "Type VI secretion system effector Hcp"
definition: >-
  This entry consists of Hcp-like proteins. Hcp is part of the type VI secretion system of Gram-negative bacteria. Hcp is not only a secreted effector protein, but also might act as machine component. Several bacterial pathogens mediate interactions with their hosts through protein secretion, often involving Hcp-like virulence loci, which are widely distributed among pathogenic bacteria. Homologues of Hcp are found in various bacteria of which most, but not all, are known pathogens. Many bacteria have two copies of hcp genes. In Pseudomonas syringae, Hcp1 is a virulence protein, while Hcp2 seems to be required for survival in competition with enterobacteria and yeasts, and its function is associated with the suppression of the growth of these competitors. Hcp1 monomers form a hexameric ring with a large internal diameter. Assembly of this particle is likely to occur following secretion, and could have a role in building a channel for the transport of other macromolecules. This entry also includes Major exported protein. The type VI secretion system (T6SS), also known as CIS contractile injection system, is a supra-molecular bacterial complex that resembles phage tails. It is a toxin delivery systems which fires toxins into target cells upon contraction of its TssBC sheath. Thirteen essential core proteins are conserved in all T6SSs: the membrane associated complex TssJ-TssL-TssM, the baseplate proteins TssE, TssF, TssG, and TssK, the bacteriophage-related puncturing complex composed of the tube (Hcp), the tip/puncturing device VgrG, and the contractile sheath structure (TssB and TssC). Finally, the starfish-shaped dodecameric protein, TssA, limits contractile sheath polymerization at its distal part when TagA captures TssA.
