identifier: InterPro:IPR058771
label: "CCDC43, PWI-like domain"
definition: >-
  This domain is found in the human Coiled-Coil Domain-Containing protein 43 (CCDC43) and related proteins. The domain represented by this entry has a detectable similarity to known PWI domains and is predicted to adopt similar structure. CCDC43 is associated with cancer progression, particularly in gastric cancer and hepatocellular carcinoma. Overexpression of CCDC43 in gastric cancer enhances cell proliferation, invasion, and metastasis, correlating with poor prognosis.
