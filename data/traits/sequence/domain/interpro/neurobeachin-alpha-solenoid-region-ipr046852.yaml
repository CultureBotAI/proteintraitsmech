identifier: InterPro:IPR046852
label: "Neurobeachin, alpha-solenoid region"
definition: >-
  This entry represents a domain found at the N-terminal of neurobeachin and its homologues from animals and plants. Neurobeachin from mouse appears to have a role in membrane trafficking. It forms an extended α-solenoid structure.
