identifier: InterPro:IPR019547
label: "Lipid desaturase domain"
definition: >-
  This entry represents lipid desaturase domains. The TMEM189 protein is a plasmanylethanolamine desaturase enzyme. It was previously described as the B domain or probable localisation domain of the transmembrane protein TMEM189 which in some mammals is fused with Kua ubiquitin-conjugation E2 enzyme proteins. The domain is also found on fatty acid saturase FAD4 in Arabidopsis.
