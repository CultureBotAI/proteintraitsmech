identifier: InterPro:IPR048344
label: "Centromere/kinetochore protein zw10, middle domain"
definition: >-
  This entry represents the middle domain of Zw10, which, from AlphaFold prediction, consists of four β-strands and four α-helices. Zw10 protein, in the context of the conserved Rod-Zwilch-Zw10 (RZZ) complex, is required for correct metaphase check-pointing during mitosis and it is also important in vesicle transport between Golgi and ER as part of a second complex together with the conserved conserved RINT1/Tip20p and NAG/Sec39p proteins. Zw10 is the metazoan homologue of yeast Dsl1, both included in the complexes associated with tethering containing helical rods (CATCHR) family, sharing structural features.
