label: "Herpesvirus Glycoprotein B, PH-like domain 1"
definition: >-
  This entry represents first PH-like fold domain found in Herpesvirus glycoprotein B. Glycoprotein B is an envelope glycoprotein that plays a role in host cell entry, cell to-cell virus transmission, and fusion of infected cells.
