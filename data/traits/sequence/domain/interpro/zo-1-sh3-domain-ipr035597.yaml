identifier: InterPro:IPR035597
label: "ZO-1, SH3 domain"
definition: >-
  This entry represents the SH3 domain of ZO-1. The zona occuldens proteins (ZO-1, ZO-2 and ZO-3) are a family of tight junction associated proteins that function as cross-linkers, anchoring the TJ strand proteins to the actin-based cytoskeleton. Each protein contains three PDZ (postsynaptic density, disc-large, ZO-1) domains, a single SH3 (Src Homology-3) domain and a catalytically inactive GK (guanylate kinase) domain, the presence of which identifies them as members of the membrane-associated guanylate kinase (MAGUK) protein family. The signature PDZ-SH3-GuK tandem of MAGUKs may form a structural supramodule with three domains interacting with each other to assemble into an integral structural unit.
