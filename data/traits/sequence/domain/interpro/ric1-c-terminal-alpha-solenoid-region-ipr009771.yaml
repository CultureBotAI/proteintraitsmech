identifier: InterPro:IPR009771
label: "RIC1, C-terminal alpha solenoid region"
definition: >-
  This entry represents the C-terminal α-helical solenoid region of RIC1. This entry represents RIC1 (Ribosomal control protein1) and has been identified in yeast as a Golgi protein involved in retrograde transport to the cis-Golgi network. It forms a heterodimer with Rgp1 and functions as a guanyl-nucleotide exchange factor which activates YPT6 by exchanging bound GDP for free GTP. RIC1 is thereby required for efficient fusion of endosome-derived vesicles with the Golgi. The RIC1-RGP1 complex participates in the recycling of SNC1, presumably by mediating fusion of endosomal vesicles with the Golgi compartment and may also be indirectly involved in the transcription of both ribosomal protein genes and ribosomal RNA.
