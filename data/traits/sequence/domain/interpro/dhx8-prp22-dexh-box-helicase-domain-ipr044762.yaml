identifier: InterPro:IPR044762
label: DHX8/ Prp22, DEXH-box helicase domain
definition: >-
  This entry represents the ATP-binding domain found in DHX8 from animals and Prp22 from yeasts. DHX8 and its homologue, Prp22, act late in the splicing of pre-mRNA and mediates the release of the spliced mRNA from spliceosomes. They belong to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding.
