identifier: InterPro:IPR063413
label: "CNOT11, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CCR4-NOT transcription complex subunit 11 (CNOT11), found in eukaryotes. CNOT11 is a component of the CCR4-NOT complex which is one of the major cellular mRNA deadenylases linked to various cellular processes including bulk mRNA degradation, miRNA-mediated repression, and general transcription regulation. CNOT10 and CNOT11 form a subcomplex that docks onto the CNOT1 scaffold. CNOT11 is required for the association of CNOT10 with the CCR4-NOT complex but seems not to be required for complex deadenylase function. The specific function of this N-terminal domain remains to be determined.
