identifier: InterPro:IPR055706
label: "Cell surface glycoprotein 1/2, DUF7282"
definition: >-
  This domain of unknown function is found in Cell surface glycoprotein 1/2 from Haloarcula hispanica (Slg1/2) and similar uncharacterised bacterial and archaeal proteins. Slg1/2 are S-layer proteins. The S-layer is a paracrystalline mono-layered assembly of proteins which coat the surface of the cell. This domain is predicted to adopt a β-sandwich with an Ig-like topology, similar to domains members of . Some proteins contain multiple copies of this domain.
