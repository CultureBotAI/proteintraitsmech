identifier: InterPro:IPR055130
label: "Presequence protease, mitochondrial-type, C-terminal domain"
definition: >-
  Human presequence protease, mitochondrial (PreP) is a protease that degrades targeting peptides as well as other unstructured peptides in mitochondria. This entry represents the C-terminal domain of PreP and similar proteins from eukaryotes and bacteria.
