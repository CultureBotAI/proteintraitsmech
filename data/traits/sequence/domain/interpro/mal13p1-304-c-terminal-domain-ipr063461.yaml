identifier: InterPro:IPR063461
label: "MAL13P1.304, C-terminal domain"
definition: >-
  This entry represents a C-terminal helical domain found in uncharacterised proteins from Plasmodium and related apicomplexan parasites. The domain is located towards the C-terminal region of large proteins and contains α-helical coiled coil motifs. A peptide from this region (residues 284-312) has been identified as a possible malaria vaccine candidate due to epitope response in sera. The protein is found in the merozoite stage and localises to the nucleus. The specific function of this domain remains to be determined.
