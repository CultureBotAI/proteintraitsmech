identifier: InterPro:IPR026875
label: "Phosphohydrolase-associated domain"
definition: >-
  This entry represents the phosphohydrolase-associated domain, which is found on bacterial and archaeal deoxyguanosinetriphosphate triphosphohydrolases, which preferentially hydrolyse dGTP over the other canonical NTPs.
