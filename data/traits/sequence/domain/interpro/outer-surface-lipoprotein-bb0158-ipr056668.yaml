identifier: InterPro:IPR056668
label: "Outer surface lipoprotein BB0158"
definition: >-
  This domain, previously known as DUF7766, is found in Outer surface lipoprotein BB0158 from Borrelia burgdorferi and related proteins mainly from Spirochaetales. It folds into a double β-barrel structure capped with α-helices . This domain forms a swapped dimer in which the N-terminal β-strand from one monomer is replaced the N-terminal β-strand from the other monomer. BB0158 is part of a family of paralogous proteins found in B. burgdorferi, known as paralogous gene family 44 (PFam44). This protein potentially plays a role in the pathogenesis of Lyme disease.
