identifier: InterPro:IPR037369
label: "Pleckstrin-2, DEP domain"
definition: >-
  Pleckstrin 2 is found in a wide variety of cell types, which suggest a more general role in signaling than pleckstrin 1. Pleckstrin-like proteins contain a central DEP domain, flanked by 2 PH (pleckstrin homology) domains.
