identifier: InterPro:IPR046876
label: "Prokaryotic STING domain"
definition: >-
  This entry represents a STING (STimulator of INterferon Gene) sensor domain found in certain prokaryotic nucleotide-activated effector conflict systems, like the CBASS (cyclic oligonucleotide-based antiphage signaling system) which provides immunity against bacteriophage. Binding to a nucleotide activates fused effector proteins in conflict response against invasive elements. This domain is found in CD-NTase-associated protein 12 and 13, which bind c-di-GMP and 3'-3'-cGAMP, cyclic nucleotides synthesized by the CD-NTase protein in response to infection that serve as specific second messenger signals to activate a diverse range of effectors, leading to bacterial cell death and thus abortive phage infection. Certain versions in prokaryotes may additionally regulate bacterial ion channels. This domain has been transferred to eukaryotes on multiple occasions, and representatives observed are in animal-choanoflagellate, haptophyte/stramenopile, and fungal lineages. The crystal structure of this domain in from Prevotella corporis shows an α/β fold with a central five-stranded β-sheet surrounded by five α-helices and a β-ribbon.
