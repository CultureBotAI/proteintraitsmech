identifier: InterPro:IPR019510
label: "A-kinase anchor protein 7-like, phosphoesterase domain"
definition: >-
  This entry represents the phosphoesterase domain found in the cyclic AMP-dependent protein kinase A (PKA) anchor protein, AKAP7 (also known as AKAP18). This domain belongs to the 2H RNA-phosphoesterase family and contains two conserved His-x-Thr motifs which, from structural studies, it has been suggested to bind AMP and CMP. It may act as a phosphoesterase, although its substrate has not been yet identified, or as an AMP sensor with the potential to couple intracellular AMP levels to PKA signalling events. This protein anchors PKA for its role in regulating PKA-mediated gene transcription in both somatic cells and oocytes, through its C-terminal RI-RII subunit-binding domain. AKAP7 also carries a nuclear localisation signal (NLS) KKRKK, that indicates the cellular destiny of this anchor protein. The domain is also found in ASCC1 (activating signal cointegrator 1 complex subunit 1), referred to as the C-terminal RNA ligase-like domain closely related to that in AKAP7, and in leukocyte receptor cluster member 9 whose function is unclear. This domain lacks residues critical for ligase activity, and in ASCC1 plays an important role in the regulation of the ASCC complex localization upon alkylation damage.
