identifier: InterPro:IPR012931
label: "TraG, N-terminal, Proteobacteria"
definition: >-
  This domain is found in the N-terminal region of the TraG protein from Escherichia coli. This is a membrane-spanning protein, with three predicted transmembrane segments and two periplasmic regions. The TraG protein is known to be essential for DNA transfer in the process of conjugation, with the N-terminal portion being required for F pilus assembly. The protein is thought to interact with the periplasmic domain of TraN to stabilise mating-cell interactions.
