identifier: InterPro:IPR033650
label: "Large ribosomal subunit protein mL46, NUDIX domain"
definition: >-
  Mitochondrial ribosomal protein mL46 (also known as MRPL46) is a component of the large subunit (39S) of the mammalian mitochondrial ribosome and a member of the Nudix hydrolase superfamily. MRPs are thought to be involved in the maintenance of the mitochondrial DNA. In general, members of the Nudix superfamily require a divalent cation, such as Mg2+ or Mn2+, for activity and contain the Nudix motif, a highly conserved 23-residue block (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. MRP L46 appears to contain a modified NUDIX motif. This entry represents the NUDIX motif-containing domain of mL46 from vertebrates.
