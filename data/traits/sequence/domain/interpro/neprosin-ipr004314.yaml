identifier: InterPro:IPR004314
label: Neprosin
definition: >-
  Pitcher plants are insectivorous and secrete a digestive fluid into the pitcher. This fluid contains a mixture of enzymes including peptidases. One of these is Neprosin, characterised from the pitcher plant Nepenthes ventrata. This is a glutamic endopeptidase that preferentially cleaves peptide bonds on the C-terminal side of proline residues. It also cleaves peptide bonds on the C-terminal side of alanine residues but with less efficiency. The peptidase is secreted and is presumed to possess an N-terminal activation peptide. The Neprosin domain corresponds to the mature peptidase.
