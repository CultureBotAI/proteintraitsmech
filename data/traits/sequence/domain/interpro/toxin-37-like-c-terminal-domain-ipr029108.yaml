identifier: InterPro:IPR029108
label: "Toxin 37-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of predicted RNase toxins mainly found in bacterial polymorphic toxin systems. It is predicted to show an all-β fold and has a conserved glutamate residue, and [KR] and Hx[DH] motifs. This domain is also found in a group of uncharacterised proteins from some species of orbiliomycetes. Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. In bacterial polymorphic toxin systems, the toxin is exported by the type 2 or type 7 secretion system.
