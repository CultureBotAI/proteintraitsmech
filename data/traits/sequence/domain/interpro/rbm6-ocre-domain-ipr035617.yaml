identifier: InterPro:IPR035617
label: "RBM6, OCRE domain"
definition: >-
  RNA-binding protein 6 (RBM6) contains two RNA-binding motifs and shares protein sequence similarity with RBM5. RBM6 is targeted to the splicing speckles and nascent transcripts. It may act mainly as a splicing activator. The elevated expression of RBM6 has been linked to certain tumours. A RBM6-CSF1R fusion has been found in acute megakaryoblastic leukemia. RBM6 contains two RNA recognition motifs (RRMs), an OCtamer REpeat (OCRE) domain, two C2H2-type zinc fingers, a nuclear localization signal, and a G-patch/D111 domain. In contrast to RBM5, RBM6 has an additional unique domain, the POZ (poxvirus and zinc finger) domain, which may be involved in protein-protein interactions and inhibit binding of target sequences by zinc fingers. This entry represents the OCRE domain. The OCRE (OCtamer REpeat) domain contains five repeats of an 8-residue motif, which were shown to form β-strands. Based on the architectures of proteins containing OCRE domains, a role in RNA metabolism and/or signalling has been proposed.
