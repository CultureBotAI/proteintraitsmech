identifier: InterPro:IPR031317
label: "Tom37, C-terminal domain"
definition: >-
  The TOM37 protein is one of the outer membrane proteins that make up the TOM complex for guiding cytosolic mitochondrial β-barrel proteins from the cytosol across the outer mitochondrial membrane into the intramembrane space. In conjunction with TOM70 it guides peptides without an MTS into TOM40, the protein that forms the passage through the outer membrane. It has homology with Metaxin-1, also part of the outer mitochondrial membrane β-barrel protein transport complex. TOM37 is also known as Sorting assembly machinery 37 kDa subunit (SAM37)
