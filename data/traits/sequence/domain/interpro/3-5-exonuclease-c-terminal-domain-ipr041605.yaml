identifier: InterPro:IPR041605
label: "3'-5' exonuclease C-terminal domain"
definition: >-
  This domain is found just after the C-terminal region of the HRDC domain in 3'-5' exonuclease proteins. The domain is carried by species such as Streptomyces griseoaurantiacus and Streptomyces albulus.
