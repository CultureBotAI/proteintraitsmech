identifier: InterPro:IPR057533
label: "Plexin-B, PSI domain"
definition: >-
  This entry represents a PSI domain found in Plexin B proteins. These are SEMA4 and SEMA5 receptors that play a role in axon guidance, invasive growth and cell migration. They play important roles in cell-cell signalling, glutamatergic (Plexin-B2) and GABAergic (Plexin-B1) synapse development and RHOA activation and subsequent changes of the actin cytoskeleton.
