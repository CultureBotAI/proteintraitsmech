identifier: InterPro:IPR047683
label: "Benzoate 1,2-dioxygenase reductase, FAD/NAD binding domain"
definition: >-
  This entry represents the FAD/NAD binding domain of Benzoate 1,2-dioxygenase electron transfer component (BenC) and similar sequences from prokaryotes and actinobacteria. In this dioxygenase, the FAD/NAD(P) binding domain (the reductase) is involved in transfer of electrons from NAD(P)H to the oxygenase component which insert into an aromatic substrate, that constitutes the initial step in microbial aerobic degradation of aromatic rings. This signature spans two structural domains, the FAD-binding β-barrel domain and the NAD-binding domain that has an α/β structure consisting of a five-stranded β-sheet with two helices positioned on each side of the sheet. Oxygenases oxidise hydrocarbons using dioxygen as the oxidant. As a Class I bacterial dioxygenases, benzoate dioxygenase like proteins combine an [2Fe-2S] cluster containing N-terminal ferredoxin at the end fused to an FAD/NADP(P) domain. Flavin oxidoreductases use flavins as substrates, unlike flavoenzymes which have a flavin prosthetic group.
