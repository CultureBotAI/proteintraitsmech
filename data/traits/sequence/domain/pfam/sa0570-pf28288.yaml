identifier: Pfam:PF28288
label: SA0570-like
definition: >-
  The founding member of this mainly staphylococcal protein family, SA0570 Staphylococcus aureus, was listed as part of the core secretome of Staphylococcus aureus, that is, as a secreted protein found in more than 80% of strains. Being both secreted and well-conserved suggests SA0570 proteins may be virulence proteins.
