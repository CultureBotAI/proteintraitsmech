identifier: Pfam:PF00532
label: Periplasmic binding proteins and sugar binding domain of LacI family
definition: >-
  This entry represents periplasmic binding proteins, and the LacI family of transcriptional regulators sugar binding domain. The periplasmic binding proteins are the primary receptors for chemotaxis and transport of many sugar based solutes. The LacI family of proteins consist of transcriptional regulators related to the lac repressor. In this case, generally the sugar binding domain binds a sugar which changes the DNA binding activity of the repressor domain (lacI).
