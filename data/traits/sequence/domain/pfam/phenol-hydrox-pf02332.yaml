identifier: Pfam:PF02332
label: Methane/Phenol/Alkene Hydroxylase
definition: >-
  This entry includes several components of multicomponent enzyme systems predominantly found in Proteobacteria and Actinobacteria. Propane 2-monooxygenase multicomponent enzyme system is involved in the degradation of propane via the O2-dependent hydroxylation of propane. Propane 2-monooxygenase, hydroxylase component large and small subunit are also included in this entry. Phenol hydroxylase is a multicomponent enzyme that catabolises phenol and some of its methylated derivatives. This family includes Phenol 2-monooxygenase, oxygenase component DmpL/DmpN, part of the oxygenase component of the complex in Pseudomonas sp.. Methane monooxygenase component A is responsible for the initial oxygenation of methane to methanol in methanotrophs. It also catalyses the monohydroxylation of a variety of unactivated alkenes, alicyclic, aromatic and heterocyclic compounds. This family contains the alpha and beta chain of Methane monooxygenase component A. Toluene-4-monooxygenase system, hydroxylase component subunits alpha and beta are also included in this family. These proteins hydroxylate toluene to form P-cresol in Pseudomonas mendocina. Alkene monooxygenase system from Xanthobacter autotrophicus catalyses the O2 and NADH-dependent epoxidation of short chain (C2 to C6) alkenes to their corresponding epoxides. Oxygenase component subunits alpha and beta also belong to this group of proteins.
