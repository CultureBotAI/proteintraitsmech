identifier: Pfam:PF09750
label: 'Alternative splicing regulator  '
definition: >-
  This entry represents the conserved N-terminal region of SWAP (suppressor-of-white-apricot protein) splice factor proteins. This region contains two highly conserved motifs, viz: DRY and EERY, which appear to be the sites for alternative splicing of exons 2 and 3 of the SWAP mRNA. These proteins are thus thought to be involved in auto-regulation of pre-mRNA splicing.
