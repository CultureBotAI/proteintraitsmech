identifier: Pfam:PF29741
label: R1 retrotransposon ORF1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of ORF1 from the R1 retrotransposable element found in Drosophila melanogaster. The full-length ORF1 protein contains CCHC-type zinc fingers and a Gag-like cysteine motif, with predicted nucleic acid binding activity. R1 elements are type I retrotransposable elements that insert into ribosomal DNA and show similarity to corresponding elements in Bombyx mori. The specific function of this N-terminal domain remains to be determined.
