identifier: Pfam:PF26051
label: ABCF3, PWI-like helical bundle domain
definition: >-
  This domain is found in the human ATP-binding cassette sub-family F member 3 (ABCF3) and related proteins. ABCF3 enhances OAS1B-mediated flavivirus resistance by localising to the virus-remodelled endoplasmic reticulum and reducing viral RNA synthesis. In humans, ABCF3 promotes cell proliferation through interactions with tumour protein D52 family members. The domain represented by this entry, located at the N-terminal has detectable similarity to known PWI domains, and it is predicted to adopt a similar structure composed of four α-helical up-and-down bundle.
