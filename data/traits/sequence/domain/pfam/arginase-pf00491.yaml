identifier: Pfam:PF00491
label: Arginase family
definition: >-
  The ureohydrolase superfamily includes arginase ( ), agmatinase ( ), formiminoglutamase ( ) and proclavaminate amidinohydrolase ( ). These enzymes show trimeric or hexameric structures and share a 3-layer α-β-α structure, playing important roles in arginine/agmatine metabolism, the urea cycle, histidine degradation, and other pathways. Arginase, which catalyses the conversion of arginine to urea and ornithine, is one of the five members of the urea cycle enzymes that convert ammonia to urea as the principal product of nitrogen excretion. There are several arginase isozymes that differ in catalytic, molecular and immunological properties. Deficiency in the liver isozyme leads to argininemia, which is usually associated with hyperammonemia. Agmatinase hydrolyses agmatine to putrescine, the precursor for the biosynthesis of higher polyamines, spermidine and spermine. In addition, agmatine may play an important regulatory role in mammals.
