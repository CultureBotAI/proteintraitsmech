identifier: Pfam:PF13911
label: AhpC/TSA antioxidant enzyme
definition: >-
  This family consists of proteins from the peroxiredoxin-like family, including PRXL2A, PXL2B (also known as prostamide/prostaglandin F synthase) and PXL2C (also known as AAED1). PRXL2A is a secreted redox regulatory protein with potent anti-inflammatory properties. PXL2C regulates proliferation and glycolysis in gastric cancer. Selenocystine-containing homologues of these proteins have been identified in fish and birds, called Selenoprotein U implying their ancestral state.
