identifier: Pfam:PF22690
label: Fatty acid synthase central AT domain
definition: >-
  This entry includes a domain found in the central region of the acyltransferase domain (AT) from fungal type I fatty acid synthase (FAS) mainly from myco and bifidobacteria, which have secondary-structure elements and sequence homology. Mycobacterial fatty acid synthase (FAS) complex is an homohexameric multifunctional enzyme that catalyses the synthesis of fatty acid precursors of mycolic acids, the major components of the cell wall in Mycobacteria and play an important role in pathogenicity.
