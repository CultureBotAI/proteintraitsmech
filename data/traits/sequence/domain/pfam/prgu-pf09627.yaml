identifier: Pfam:PF09627
label: PrgU-like protein
definition: >-
  PrgU is a protein of plasmid in origin expressed mainly in Enterococcus bacteria. It forms a six β-strand barrel with three accompanying α helices and is probably a homo-dimer in the cell. PrgU probably acts as a RNA-binding regulator that mitigates toxicity accompanying overproduction of PrgB-like adhesins, which are involved in conjugative transfer.
