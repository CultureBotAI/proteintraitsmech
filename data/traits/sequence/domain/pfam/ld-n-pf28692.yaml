identifier: Pfam:PF28692
label: LUMINIDEPENDENS N-terminal domain
definition: >-
  This entry represents the N-terminal helix of LUMINIDEPENDENS (LD), a nuclear protein found in plants. LD is a homeobox-containing protein that regulates flowering time in the autonomous flowering pathway. The full-length protein contains a homeobox DNA-binding domain and interacts with SUF4 to repress FLOWERING LOCUS C expression. This N-terminal domain precedes the homeobox domain. The protein is expressed in regions of cell proliferation including shoot apex, root apex, leaf primordia and floral buds. This entry is found in plants, particularly within the eudicotyledons and monocotyledons.
