identifier: Pfam:PF23006
label: Tyrosine-protein kinase receptor torso, first FN3 domain
definition: >-
  This domain is found in the Tyrosine-protein kinase receptor torso from Bombyx mori (Tor), which is involved in the initiation of metamorphosis during postembryonic development. This protein is organised into three consecutive fibronectin type III (FN3) domains and a C-terminal kinase domain. This entry represents the first FN3 domain. This domain has an N-terminal α-helical extension.
