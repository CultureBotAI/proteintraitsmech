identifier: Pfam:PF12655
label: Spore surface protein CDIF630_02480
definition: >-
  This family of proteins, previously known as DUF3787, represents the spore surface protein CDIF630_02480 from Clostridioides difficile and related proteins found in Clostridia. CDIF630_02480 contribute to maintain proper thickness of the spore coat and exosporium layers. Members of this family contain a conserved TAAW sequence motif that may be functionally important.
