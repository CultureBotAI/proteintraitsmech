identifier: Pfam:PF29304
label: ECU07_1090, N-terminal domain
definition: >-
  This entry represents the N-terminal domain with a trefoil fold of uncharacterised protein ECU07_1090 from Encephalitozoon cuniculi and in other predicted ricin B lectin domain-containing proteins in microsporidia. In E. cuniculi, the protein containing this domain is expressed during late sporogonial stages, contains a signal peptide and may be glycosylated. The domain is found in various microsporidian species including Nosema and Vairimorpha. The specific function of this domain remains to be determined.
