identifier: Pfam:PF22588
label: Histidine kinase sensor domain
definition: >-
  This entry represents a sensor domain found in a group of predicted histidine kinases and diguanylate cyclases mainly from proteobacteria, including from Shewanella oneidensis. It folds into an α/β structure consisting of a curved β-sheet and an α-helix packed on the concave side of it.
