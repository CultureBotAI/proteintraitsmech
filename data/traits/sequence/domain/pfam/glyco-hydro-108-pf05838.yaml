identifier: Pfam:PF05838
label: Glycosyl hydrolase 108
definition: >-
  This entry represents a domain that is frequently found at the N terminus of proteins containing a C-terminal domain, predominantly in bacteria and virus, including Glycoside hydrolase family 108 protein from Salmonella typhi (TtsA, ). TtsA is a specific muramidase that facilitates toxin transport through the peptidoglycan layer. The N-terminal domain, which contains the lysozyme-like catalytic triad (Glu14, Asp19, Thr28), shows three short helices forming a defined globular domain.
