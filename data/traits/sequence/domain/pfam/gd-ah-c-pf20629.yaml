identifier: Pfam:PF20629
label: D-galactarate/Altronate dehydratase, C-terminal
definition: >-
  This entry represents the C-terminal domain of Galactarate dehydratase (GarD). GarD catalyses the dehydration of galactarate to 5-dehydro-4-deoxy-D-galactarate. In the crystal structure, GarD forms dimers and each monomer consists of three domains: the N-terminal SAF domain ( ) connected to the second domain ( ) through a long linker and the C-terminal domain which represents the core of the protein. This domain adopts a variant of a Rossmann fold with an unusual crossover, consisting of seven-stranded parallel β-sheets surrounded by nine α-helices. This domain may contain a catalytic metal binding site.
