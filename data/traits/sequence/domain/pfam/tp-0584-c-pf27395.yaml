label: TP_0584 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of TP_0584 proteins. The domain is found predominantly in Spirochaetota, with representatives in Treponema and Spirochaeta genera within Spirochaetales order. The function of this domain remains to be determined.
