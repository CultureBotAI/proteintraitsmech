identifier: Pfam:PF20605
label: Antitoxin-like ribbon-helix-helix
definition: >-
  This presumed domain is found in bacteria, and is approximately 60 amino acids in length. Structure prediction suggests that it has a ribbon-helix-helix motif, a DNA-binding motif commonly found in antitoxin families. Members containing this domain may be related to CopG antitoxin family.
