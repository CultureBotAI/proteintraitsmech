identifier: Pfam:PF18307
label: Transcription factor Tfb2 (p52) C-terminal domain
definition: >-
  This is the C-terminal domain of transcription factor Tfb2 present in Saccharomyces cerevisiae. Tfb2 is known as p52 in humans. The interaction between p8-Tfb5 and p52-Tfb2 has a key role in the maintenance of the transcription factor TFIIH architecture and TFIIHs function in nucleotide-excision repair (NER) pathway. The C-terminal domain of Tfb2 is thought to have a crucial role in DNA repair.
