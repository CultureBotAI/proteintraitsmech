identifier: Pfam:PF29862
label: ZTF-17 middle domain
definition: >-
  This entry represents a middle domain found in ZTF-17 and related zinc finger transcription factors from nematodes. The function of this domain remains to be determined. ZTF-17 is a probable transcription factor that positively modulates expression of homeobox protein lin-39 in the vulval lineage of Caenorhabditis elegans. The protein contains C2H2-type zinc fingers and is expressed in pharyngeal muscle cells and other tissues. ZTF-17 functions in gene regulation, with RNAi-mediated knockdown reducing lin-39 expression in vulval precursor cells.
