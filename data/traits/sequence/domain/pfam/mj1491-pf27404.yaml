identifier: Pfam:PF27404
label: MJ1491 transmembrane domain
definition: >-
  This entry represents the MJ1491 transmembrane domain found in uncharacterised membrane proteins in archaea and bacteria. This domain is found predominantly in methanogenic archaea including Methanocaldococcaceae and Methanococcales, with some bacterial members. The domain contains three predicted transmembrane helices and forms an integral membrane domain. The full-length proteins are approximately 127 amino acids in length. The function of this transmembrane domain remains to be determined.
