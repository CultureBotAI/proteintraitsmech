identifier: Pfam:PF24767
label: At5g58720 UBA-like domain
definition: >-
  This domain is found towards the N-terminal of SMR domain-containing protein At5g58720, Putative nuclear RNA export factor SDE5 from Arabidopsis thaliana and similar plant proteins. SDE5 is involved in sense transgene post-transcriptional gene silencing. This domain has detectable similarity to UBA domains, particularly to CUE domain. It is predicted to be composed of an α-helical bundle.
