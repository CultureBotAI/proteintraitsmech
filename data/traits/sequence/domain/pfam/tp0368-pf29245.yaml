identifier: Pfam:PF29245
label: Treponema TP0368-like protein
definition: >-
  This entry represents the Treponema pallidum protein TP0368 and related proteins from spirochaetales. The family is approximately 60 residues long and is found at the C terminus of small membrane proteins with an N-terminal transmembrane helix. TP0368 has been identified as an antigen that elicits antibody responses during infection. The function of this family remains to be determined.
