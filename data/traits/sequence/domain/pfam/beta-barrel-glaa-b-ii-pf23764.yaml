identifier: Pfam:PF23764
label: GLAA-B beta-barrel domain II
definition: >-
  This entry represents the second β-barrel domain found in Alpha-1,3-galactosidase A-B (GLAA-B) from bacteria. This proteins share a domain architecture consisting of a core β-helix surrounded by two small β-barrel domains (domains I and II), which are involved in protein dimerisation. The α-helix of domain II folds over and along the wall of the active site of the adjacent monomer, with several residues protruding into the cleft that contains the active site pocket. Proteins GLAA-B are alpha-galactosidases grouped in the GH110 subfamily by its narrow subtract specificity. These proteins remove branched alpha-1,3-linked galactose residues present in blood group B antigens.
