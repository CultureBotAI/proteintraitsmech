identifier: Pfam:PF28840
label: BamG
definition: >-
  This entry represents BamG ( ), a subunit of the β-barrel assembly machinery known as BAM. BamG and BamH subunits are involved in forming the extracellular canopy and are required for BAM function. BamG subunit is a transmembrane outer membrane protein which binds the rear of the core subunit BamA. BamG is composed of a transmembrane barrel with a characteristic lateral opening and a long N-terminal tail that threads through the barrel pore to reach the extracellular side of the membrane.
