identifier: Pfam:PF21982
label: RecX, first three-helix domain
definition: >-
  This entry represents the first three-helix domain (HTH-like) found in RecX family of proteins. RecX functions as a regulator of DNA recombination and repair pathways in bacterial cells. RecX protein is known to inhibit the activity of RecA protein in DNA recombination. It contains three HTH-like domains, first represented by this entry, second ( ) and third ( ).
