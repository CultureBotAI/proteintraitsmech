identifier: Pfam:PF08775
label: ParB family
definition: >-
  This entry represents the C-terminal domain in Virulence regulon transcriptional activator VirB and Plasmid Partition par B protein. ParB is a component of the par system which mediates accurate DNA partition during cell division. It recognises A-box and B-box DNA motifs. ParB forms an asymmetric dimer with 2 extended helix-turn-helix (HTH) motifs that bind to A-boxes. The HTH motifs emanate from a β sheet coiled coil DNA binding module. Both DNA binding elements are free to rotate around a flexible linker, this enables them to bind to complex arrays of A- and B-box elements on adjacent DNA arms of the looped partition site. VirB is a transcription activator for the invasion antigens IpaB, IpaC and IpaD. VirB is itself regulated by VirF.
