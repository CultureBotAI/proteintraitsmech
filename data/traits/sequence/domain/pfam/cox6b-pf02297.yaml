identifier: Pfam:PF02297
label: Cytochrome oxidase c subunit VIb
definition: >-
  This family represents cytochrome c oxidase heme-binding subunit IVb, a component of the last enzyme in the mitochondrial electron transport chain which drives oxidative phosphorylation. Cytochrome c oxidase assembly factor 6 (COA6) from yeast and its homologues are also included in this entry, which are involved in the maturation of the mitochondrial respiratory chain complex IV subunit MT-CO2/COX2, therefore, it may regulate early steps of complex IV assembly. This entry also includes CHCHD7, a putative substrate of the mitochondrial Mia40-dependent import machinery. This protein folds into three α-helices stabilised by two disulfide bonds. Cytochrome c oxidase ( ) is an oligomeric enzymatic complex that is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex, there are a variable number of small polypeptide subunits. One of these subunits is the potentially haem-binding subunit, VIb, which is encoded in the nucleus. Subunit VIb is one of three mammalian subunits that lacks a transmembrane region. It is located on the cytosolic side of the membrane and helps form the dimer interface with the corresponding subunit on the other monomer complex.
