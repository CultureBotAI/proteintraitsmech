identifier: Pfam:PF18032
label: Photoprotection regulator fluorescence recovery protein
definition: >-
  This entry represents the fluorescence recovery protein (FRP), the structure of which has been solved for the cyanobacteria Synechocystis ( ). Cyanobacteria contain antenna complexes called phycobilisomes, which are quenched by orange carotenoid protein (OCP) under high light conditions. FRP causes the dissociation of OCP from the phycobilisomes by interacting with the C-terminal domain of OCP, accelerating the conversion of the active red OCP (OCPr) to the inactive orange form (OCPo). A patch of residues (W50, D54, H53, and R60) contributed by both chains of the FRP dimer cause the acceleration of the OCPr to OCPo conversion. Mutation of the absolutely conserved amino acid (R60) affects the activity of FRP.
