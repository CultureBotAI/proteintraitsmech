identifier: Pfam:PF31137
label: Domain of unknown function (DUF8822)
definition: >-
  This entry represents a domain of approximately 101 residues found in uncharacterised proteins in plants (Viridiplantae) and cyanobacteria. In plants, it is found predominantly in eudicotyledons and monocots. These are small single-domain proteins whose function is unknown.
