identifier: Pfam:PF18697
label: Murine leukemia virus (MLV) integrase (IN) C-terminal domain
definition: >-
  This is the C-terminal domain (CTD) which can be found in murine leukemia virus (MLV) integrase (IN) proteins. This domain interacts with the bromo and extraterminal (BET) proteins through the ET domain. This interaction provides a structural basis for global in vivo integration-site preferences and disruption of this interaction through truncation mutations affects the global targeting profile of MLV. This domain consists of an SH3 fold followed by a long unstructured tail.
