identifier: Pfam:PF13201
label: Putative carbohydrate metabolism domain
definition: >-
  This domain has been suggested to participate in carbohydrate metabolism. Structural evidence indicates that it might be a carbohydrate binding domain, with or without enzymatic activity. In particular, it has been hypothesised that it might act as a glycoside hydrolase. This domain can be found associated with .
