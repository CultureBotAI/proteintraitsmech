identifier: Pfam:PF23845
label: Non-contractile tail sheath protein TIM barrel
definition: >-
  This entry represents the TIM-barrel domain found in the non-contractile tail sheath protein of Bacteriophage N4 (BPN4). This protein is essential for BPN4 infectivity and it is hypothesized that it mediates binding with target cell receptors. The function of this domain is unknown. This entry also includes sequences from bacteria, predominantly from Sphingomonadales.
