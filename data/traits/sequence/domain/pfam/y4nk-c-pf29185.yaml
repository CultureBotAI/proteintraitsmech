identifier: Pfam:PF29185
label: Y4nK C-terminal Rossmann-like domain
definition: >-
  This entry represents a C-terminal Rossmann-like domain found in the Y4nK multi-pass membrane proteins, predominantly from Alphaproteobacteria. The domain is located at the C-terminal following approximately 16 transmembrane helices. Some proteins containing this domain are annotated as glycosyltransferase RgtA/RgtB family members. The specific function of this C-terminal domain remains to be determined.
