identifier: Pfam:PF22993
label: Ephrin receptor 1 SAM domain-like
definition: >-
  This entry represents the SAM-like domain found in the Ephrin receptor 1 from nematodes. The Ephrin receptor 1 family comprises tyrosine kinase receptors that interact with ephrins and major sperm proteins (MSPs). They play a crucial role in various biological processes including the inhibition of oocyte meiotic maturation and ovulation in the absence of sperm, regulation of somatic cell contraction rates, and modulation of insulin-like signaling pathways through phosphorylation and subsequent degradation of daf-18/PTEN. Additionally, they are involved in morphogenetic events such as head epidermis development, gastrulation, ventral epidermis closure, spermatheca morphogenesis, and axon guidance during neurogenesis.
