identifier: Pfam:PF20824
label: CRISPR RNA silencing complex Cmr2 subunit, second helical domain
definition: >-
  The prokaryotic CRISPR RNA-Cas protein (Cmr) complex provides protection against mobile genetic elements by cleaving foreign RNA. Its largest subunit is Cmr2. This protein shows a N-terminal HD (histidine-aspartate) domain, two RRM domains resembling adenylate cyclase and two α-helical domains. This entry represents the second α-helical domain, found at its N-terminal. It is similar to the small subunit Cmr5, which contains six α-helices and two helical insertions that fold into a single globular structure. This domain is also found in Cas10 proteins from bacteria.
