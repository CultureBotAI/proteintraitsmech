identifier: Pfam:PF18675
label: Heparinase II C-terminal domain
definition: >-
  Heparinase II (HepII) is an 85kDa dimeric enzyme that depolymerizes both heparin and heparan sulfate glycosaminoglycans. The protein is composed of three domains: an N-terminal α-helical domain, a central two-layered β-sheet domain, and a C-terminal domain forming a two-layered β-sheet. The C-terminal domain contains nine β-strands packed together in a manner resembling a β-barrel.
