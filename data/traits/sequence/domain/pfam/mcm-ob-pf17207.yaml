identifier: Pfam:PF17207
label: MCM OB domain
definition: >-
  This OB-fold domain is found within MCM (mini-chromosome maintenance) proteins, which are components if the MCM complex involved in chromosome replication. This domain, found at the N terminus, contains an insertion at the zinc binding motif.
