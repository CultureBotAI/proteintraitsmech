identifier: Pfam:PF18663
label: Pallilysin beta barrel domain
definition: >-
  The Treponema pallidum protein, Tp0751 (also known as pallilysin), possesses adhesive properties and has been previously reported to mediate attachment to the host extracellular matrix components laminin, fibronectin, and fibrinogen. Tp0751 adopts an eight-stranded β-barrel with a profile of short conserved regions consistent with a non-canonical lipocalin fold. Lipocalins, along with fatty acid-binding proteins and avidins, are members of the calycin superfamily, which is defined by the distinct features of a central β-barrel and a key structural signature consisting of three short conserved regions (SCR1, SCR2, and SCR3). However, Tp0751 does not contain all three conserved regions; hence, it is considered an outlier to canonical lipocalins. In SCR1, there is a GxW motif. This entry also includes Uncharacterized protein BB_0038 from Borreliella burgdorferi.
