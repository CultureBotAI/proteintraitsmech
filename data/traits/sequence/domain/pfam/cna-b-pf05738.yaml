identifier: Pfam:PF05738
label: Cna protein B-type domain
definition: >-
  This entry represents a repeated B region domain found in the collagen-binding surface protein Cna in Staphylococcus aureus, as well as other related domains. Cna has a non-repetitive, collagen-binding A region , followed by instances of this B region repetitive unit. The B region has one to four 23kDa repeat units (B1-B4) each with a prealbumin-like β-sandwich fold of seven strands in two sheets with a Greek key topology. Each B repeat unit has two highly similar domains (D1 and D2) placed side-by-side; both D1 and D2 are included in this entry. The domain appears to form a stalk that presents the ligand binding domain away from the bacterial cell surface. Cna is a collagen-binding MSCRAMM (Microbial Surface Component Recognizing Adhesive Matrix Molecules), and is necessary and sufficient for S. aureus cells to adhere to cartilage.
