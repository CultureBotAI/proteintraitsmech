identifier: Pfam:PF18196
label: Chromodomain helicase DNA-binding domain 1
definition: >-
  This domain can be found in chromodomain helicase DNA-binding protein 1 (Chd1) present in Saccharomyces cerevisiae. Cdh1 proteins have been associated with the efficient assembly and spacing of nucleosomes. Chd1 consists of a double chromodomain, an Snf2-related ATPase domain and a C-terminal DNA binding domain. This domain comprises the first four helices of the Chd1 DNA binding domain, which can be divided into regions SANT, HL1 and the β-linker. The HL1 region comprises of some 40 residues specific to budding yeast that are unlikely to form such a prominent feature or perform a conserved function in other species. Basic residues on the α1 helix are thought to be important for DNA interaction. This domain is also found in the Hrp3 protein, another member of the Cdh1 family in Schizosaccharomyces pombe. Like Cdh1, Hrp3 also comprises two chromo-domains, SNF2-like ATPase/7 helicase domains, and a C-terminal DNA binding domain.
