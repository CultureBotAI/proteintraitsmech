identifier: Pfam:PF01638
label: HxlR-like helix-turn-helix
definition: >-
  The hxlR-type HTH domain is a domain of ~90-100 amino acids present in putative transcription regulators with a winged helix-turn-helix (wHTH) structure. The domain is named after Bacillus subtilis hxlR, a transcription activator of the hxlAB operon involved in the detoxification of formaldehyde. The hxlR-type domain forms the core of putative transcription regulators and of hypothetical proteins occurring in eubacteria as well as in archaea. The sequence and structure of hxlR-type proteins show similarities with the marR-type wHTH.
