identifier: Pfam:PF29534
label: Salivary glue protein
definition: >-
  This entry represents salivary glue proteins from Drosophila and related dipteran insects. These proteins are secreted by the salivary glands and have bioadhesive activity involved in puparial adhesion. The proteins are produced by third-instar larvae and expressed specifically in the salivary gland. During larval development, protein levels dramatically increase during puff stage 1 and remain abundant in late larvae. Some members are O-glycosylated by Pgnat9 in salivary glands. These proteins form part of the 68C glue gene cluster in Drosophila melanogaster and show modular protein evolution.
