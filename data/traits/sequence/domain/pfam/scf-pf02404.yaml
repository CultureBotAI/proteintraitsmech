identifier: Pfam:PF02404
label: Stem cell factor
definition: >-
  Stem cell factor (SCF) is a homodimer involved in hematopoiesis. SCF binds to and activates KIT, a receptor tyrosine kinase. SCF stimulates the proliferation of mast cells and is able to augment the proliferation of both myeloid and lymphoid hematopoietic progenitors in bone marrow culture. It also mediates cell-cell adhesion and acts synergistically with other cytokines. SCF is a type I membrane protein, but is also found in a secretable, soluble form. The crystal structure of human SCF has been resolved and a potential receptor-binding site identified.
