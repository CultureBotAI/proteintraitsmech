identifier: Pfam:PF21181
label: SsfX3, N-terminal domain
definition: >-
  This domain is found at the N-terminal of SsfX3 ( ) from Streptomyces sp. and in similar bacterial proteins. SsfX3 is an acyltransferase involved in the biosynthesis of the anticancer natural product SF2575. This protein is organised into two distinct domains ( ): an N-terminal β-sandwich, represented in this entry, and a C-terminal catalytic domain ( ). The N-terminal domain resembles the β-sandwich of the carbohydrate-binding module (CBM) and is critical for substrate binding.
