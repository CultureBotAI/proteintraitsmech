identifier: Pfam:PF26965
label: MimR, N-terminal domain
definition: >-
  This domain is found at the N-terminal of Propane 2-monooxygenase operon transcriptional activator MimR from Mycolicibacterium smegmatis and related proteins, including Acetoin dehydrogenase operon transcriptional activator AcoR and Signal-transduction and transcriptional-control protein. This domain is predicted to show an α-β configuration with similarity with GAF domains. MimR acts as a transcriptional activator of the mimABCD operon encoding the propane 2-monooxygenase complex. Acetoin dehydrogenase operon transcriptional activator AcoR acts as a transcriptional activator of the acoABCL operon encoding the acetoin dehydrogenase complex.
