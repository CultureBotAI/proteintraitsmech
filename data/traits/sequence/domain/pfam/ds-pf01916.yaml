identifier: Pfam:PF01916
label: Deoxyhypusine synthase
definition: >-
  Eukaryotic initiation factor 5A (eIF-5A), now considered to be an elongation factor (see ), contains an unusual amino acid, hypusine [N epsilon-(4-aminobutyl-2-hydroxy)lysine]. The first step in the post-translational formation of hypusine is catalysed by the enzyme deoxyhypusine synthase (DS, ). The enzyme catalyses the following reaction: Spermidine + [eIF-5A]-lysine = 1,3-diaminopropane + [eIF-5A]-deoxyhypusine The modified version of eIF-5A, and DS, are required for eukaryotic cell proliferation. The structure is known for this enzyme in complex with its NAD + cofactor.
