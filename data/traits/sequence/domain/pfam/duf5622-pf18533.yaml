identifier: Pfam:PF18533
label: Domain of unknown function (DUF5622)
definition: >-
  This entry represents Large ribosomal subunit protein aL46 from Saccharolobus solfataricus (RL46) and similar archaea-specific ribosomal proteins. RL46 is a component of the large ribosomal subunit, which is involved in the synthesis of proteins in the cell. RL46 is suggested to directly bind to rRNA in the ribosome.
