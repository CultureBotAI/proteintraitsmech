identifier: Pfam:PF13987
label: Bacterial lipocalin LPS transport optimiser YedD
definition: >-
  This entry represents the bacterial lipocalin YedD, an outer membrane lipoprotein found in Enterobacterales. YedD forms a stable 1:1:1 ternary complex with the LptDE translocon, which is responsible for inserting lipopolysaccharide (LPS) into the outer leaflet of the outer membrane. Structural analysis reveals that YedD binds to the critical hinge region between the β-barrel and periplasmic beta-taco domains of LptD, with the short N-terminal α helix of LptD inserting into YedD's hydrophobic cavity. Although not essential under laboratory conditions, YedD becomes indispensable for cell viability when the Lpt bridge is destabilised or when the LptDE translocon is functionally compromised. YedD thus functions as an optimiser of LPS transport, stabilising the Lpt bridge and ensuring efficient outer membrane biogenesis. YedD adopts the characteristic lipocalin fold, consisting of an eight-stranded antiparallel β-barrel with a hydrophobic cavity, connected to a short N-terminal 3-10 helix and a C-terminal α helix stabilised by a disulphide bond. The protein is expressed under stress conditions including starvation and high osmolarity. YedD is highly conserved within Enterobacterales, including pathogenic species such as Klebsiella pneumoniae and Enterobacter species.
