identifier: Pfam:PF27102
label: Nodulation factor export protein NodI, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of NodI (Nod factor export ATP-binding protein I) proteins, which are ATP-binding components of ABC transporter complexes involved in the export of nodulation factors (Nod factors). This domain is found C-terminal to the ABC transporter domain ( ). Nodulation ABC transporter, NodI is required for normal nodulation by nitrogen-fixing root nodule bacteria such as Rhizobium loti (Mesorhizobium loti). It is a member of the family of ABC transporter ATP binding proteins and works with NodJ to export a variety of modified carbohydrate molecules as signals to plant hosts to establish root nodules.
