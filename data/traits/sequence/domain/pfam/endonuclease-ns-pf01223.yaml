identifier: Pfam:PF01223
label: DNA/RNA non-specific endonuclease
definition: >-
  This entry represents a domain found in a group of DNA/RNA non-specific endonucleases ( ) and nucleotide pyrophosphatase/phosphodiesterases from eukaryotes and bacteria, including human Endonuclease G, mitochondrial and Ectonucleotide pyrophosphatase/phosphodiesterase family member 1. A family of bacterial and eukaryotic endonucleases share the following characteristics: they act on both DNA and RNA, cleave double-stranded and single-stranded nucleic acids and require a divalent ion such as magnesium for their activity. A histidine has been shown to be essential for the activity of the Serratia marcescens nuclease. This residue is located in a conserved region which also contains an aspartic acid residue that could be implicated in the binding of the divalent ion. This entry also includes Salivary proteins Tsal1 and Tsal2A, both high affinity nucleic acid binding proteins with residual nuclease activity and with a preference for dsDNA in a broad pH range.
