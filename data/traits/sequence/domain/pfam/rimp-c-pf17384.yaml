identifier: Pfam:PF17384
label: RimP C-terminal Sm-like domain
definition: >-
  The RimP protein (also known as YlxS in Bacillus subtilis) facilitates maturation of the 30S ribosomal subunit, and is required for the efficient production of translationally competent ribosomes. This entry represents the C-terminal SH3-type barrel domain of RimP.
