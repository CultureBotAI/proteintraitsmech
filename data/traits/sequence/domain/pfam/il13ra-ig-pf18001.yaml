identifier: Pfam:PF18001
label: Interleukin-13 receptor subunit alpha Ig-like domain
definition: >-
  This is the N-terminal Ig-like domain found in interleukin-13 receptor subunit alpha-1 (IL13RA1). IL13RA1 contains an extra N-terminal Ig-like domain not found in other receptors of the the common gamma-chain subfamily. The extra N-terminal Ig-like domain contacts the dorsal surfaces of both IL-4 and IL-13. The deletion of this domain has been shown to affect the binding of IL-13 to IL-13Ralpha1.
