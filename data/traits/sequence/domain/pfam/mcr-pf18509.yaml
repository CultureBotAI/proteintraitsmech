identifier: Pfam:PF18509
label: Magnetochrome domain
definition: >-
  Magnetotactic bacteria (MTB) align along the Earth's magnetic field using an organelle called the magnetosome. The magnetosome-associated protein MamP is conserved in all MTB and has a PDZ domain, a small c-type cytochrome domain (the first magnetochrome domain, MCR1), a 17-residue linker and a second magnetochrome domain (MCR2). This entry describes the two tandem magnetochrome domains carrying c-type cytochrome motifs CX2CH.
