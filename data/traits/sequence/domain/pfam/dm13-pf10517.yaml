identifier: Pfam:PF10517
label: Electron transfer DM13
definition: >-
  The DM13 domain has been identified in animal proteins containing a DOMON domain likely to function as cytochromes involved in as yet unidentified redox reactions potentially related to protein hydroxylation or oxidative cross-linking. However, it is also found in bacteria. The DM13 domain contains a nearly absolutely conserved cysteine, which can be potentially involved in a redox reaction either as a nacked thiol group or by binding a prosthetic group like heme. The DM13 domain is predicted to have a β-strand-rich fold.
