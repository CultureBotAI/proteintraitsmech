identifier: Pfam:PF06544
label: Small nuclear ribonucleoprotein Prp3, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of U4/U6 and U4/U5/U6-small nuclear ribonucleoprotein Prp3, part of the tri-RNA complex that form the spliceosome. Prp3 plays a key role in the recognition of the snRNA duplex. Defects in PRPF3 are the cause of retinitis pigmentosa type 18 (RP18). RP leads to degeneration of retinal photoreceptor cells. In Arabidposis thaliana, protein RDM16 acts as a pre-mRNA splicing factor and functions in RNA-directed DNA methylation by influencing Pol V transcript levels. This binding domain, highly conserved among eukaryotes, interacts with the 3' end of U6 snRNA. It adopts a ferredoxin-like fold, showing a five-stranded mixed β-sheet with three α-helices, two of them running parallel to the β-strands on one side of the sheet and one on the other. This fold is extended with a long β-hairpin, an extra β-strand, a helix and a final loop at the C terminus.
