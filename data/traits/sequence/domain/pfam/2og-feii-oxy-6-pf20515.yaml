identifier: Pfam:PF20515
label: Tet-like 2OG-Fe(II) oxygenase superfamily
definition: >-
  This entry represents an uncharacterised family of fungal proteins. The AlphaFold prediction for an example protein shows that it is most closely related to Tet-like dioxygenases. This strongly suggests that this family of proteins are DNA modification enzymes.
