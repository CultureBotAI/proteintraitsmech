identifier: Pfam:PF20851
label: SidM, Rab1-activation domain
definition: >-
  This domain is found in the type IV virulence effector SidM/DrrA from Legionella pneumophila and similar sequences from Legionella sp. This protein has dual GEF and GDF activity specifically toward Rab1, a key regulator for endoplasmic reticulum (ER)-to-Golgi vesicle trafficking. SidM consists of an N-terminal helical domain ( ), a Rab1-activation domain, and a C-terminal phosphatidylinositol 4-phosphate-binding (P4M) domain ( ). This is the Rab1-activation domain, which strongly interacts with Rab1 switch regions leading to substantial conformational changes on SidM binding. This domain is organised into two layers of α-helices.
