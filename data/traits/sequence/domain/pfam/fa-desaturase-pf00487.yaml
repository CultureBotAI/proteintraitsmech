identifier: Pfam:PF00487
label: Fatty acid desaturase
definition: >-
  Fatty acid desaturases are enzymes that catalyse the insertion of a double bond at the delta position of fatty acids. There seem to be two distinct families of fatty acid desaturases which do not seem to be evolutionary related. Family 1 is composed of: Stearoyl-CoA desaturase (SCD) ( ). Family 2 is composed of: Bacterial fatty acid desaturases. Plant stearoyl-acyl-carrier-protein desaturase ( ), this enzyme catalyzes the introduction of a double bond at the delta(9) position of steraoyl-ACP to produce oleoyl-ACP. This enzyme is responsible for the conversion of saturated fatty acids to unsaturated fatty acids in the synthesis of vegetable oils. Cyanobacterial DesA, an enzyme that can introduce a second cis double bond at the delta(12) position of fatty acid bound to membranes glycerolipids. DesA is involved in chilling tolerance; the phase transition temperature of lipids of cellular membranes being dependent on the degree of unsaturation of fatty acids of the membrane lipids. Members of this entry are endoplasmic reticulum (ER) integral membrane proteins that share the same mushroom-like shape fold consisting of four transmembrane helices (TM1-TM4) which anchor them to the membrane, capped by a cytosolic domain containing a unique 9-10 histidine-coordinating di metal (di-iron) catalytic centre. The structure of mouse stearoyl-CoA desaturase (SDC) revealed that TM2 and TM4 are longer than TM1 and TM3 and protrude into the cytosolic domain, providing three of the nine histidine residues that coordinate the two metal ions, while the other histidine residues are provided by the soluble domain in this enzyme.
