label: Msx2-interacting protein, nuclear receptor-interacting domain
definition: >-
  This entry represents the nuclear receptor-interacting domain (RID) from Msx2-interacting protein (MINT), a widely expressed transcription repressor that regulates key transcription effectors in several signalling pathways, including MSX2, RBP-J, and nuclear receptors. This entry covers the C-terminal end of the RID domain described in.
