identifier: Pfam:PF26053
label: Scytalone dehydratase-like protein Arp1, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Scytalone dehydratase-like protein Arp1 from Metarhizium brunneum and similar fungal proteins. Arp1 is part of the Pks2 gene cluster that encode for proteins that mediate the formation of infectious structures (appressoria), enabling these fungi to kill insects faster. This domain is predicted to fold into a partly open β-barrel capped with two helices on one side.
