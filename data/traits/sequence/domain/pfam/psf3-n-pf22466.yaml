identifier: Pfam:PF22466
label: PSF3 N-terminal domain
definition: >-
  This entry represents the GINS/PriA/YqbF domain, which is found in the N-terminal region of the GINS complex protein PSF3. The GINS complex is crucial for the establishment of DNA replication forks and replisome progression in eukaryotes. The crystal structure of the human GINS complex reveals a heterotetrameric assembly with a pseudo symmetrical layered structure. The complex consists of two heterodimers that create four subunit-subunit interfaces. The subunit structures of the heterodimers consist of two alternating domains, an α-helix-rich (A) domain and a β-strand-rich (B) domain (this entry).
