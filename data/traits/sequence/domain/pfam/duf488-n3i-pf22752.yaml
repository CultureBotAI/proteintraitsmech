identifier: Pfam:PF22752
label: Inactive DUF488-N3 subclade
definition: >-
  This entry represents a subclade of DUF488 domains lacking the catalytic residues common to the rhodanese-phosphatase superfamily. The C-terminal core strand is degenerate in this subclade. Members of this family are uncharacterised proteins such as the E. coli YeaO protein and the Mycobacterium tuberculosis Rv3073c protein. They are conserved across different bacterial species, suggesting a potentially important biological role.
