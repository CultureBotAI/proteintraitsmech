identifier: Pfam:PF23441
label: SDR-like rossmann domain
definition: >-
  Short-chain dehydrogenase/reductase (SDR) MalC and PhqE (its homologue from the paraherquamide pathway) are bifunctional enzymes that function as both a reductase and an intramolecular [4+2] Diels-Alderase in the paraherquamide biosynthetic pathway. MalC and PhqE contain a classical SDR fold with a nucleotide-binding subdomain that includes the invariant "TGX3GXG" motif (P-loop), and a C-terminal substrate binding region that is less conserved and largely hydrophobic. Unlike typical SDRs, MalC and PhqE lack the characteristic Tyr and Lys catalytic amino acids, with the SDR catalytic Tyr and Lys replaced by shorter, non-polar residues (Ile and Cys). A distinctive "PDPGW" motif positions the essential Asp166 closer to the substrate compared to canonical SDRs.
