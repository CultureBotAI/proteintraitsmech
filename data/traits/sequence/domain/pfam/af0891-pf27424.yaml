identifier: Pfam:PF27424
label: AF0891-like three-helix membrane protein
definition: >-
  This entry represents AF0891-like small membrane proteins found in methanogenic and sulfate-reducing archaea. These proteins are composed of three α-helical transmembrane segments that form a small membrane-embedded domain of approximately 90 amino acids. The family is found in Archaeoglobi, including Archaeoglobus, Geoglobus, and Ferroglobus species, as well as methanogenic archaea such as Methanoregula and ANME-2 cluster organisms. The proteins are predicted to localise to the cell membrane. The function of this three-helix membrane domain remains to be determined.
