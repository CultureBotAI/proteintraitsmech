identifier: Pfam:PF30168
label: Uncharacterised protein TP_0579
definition: >-
  This entry represents the uncharacterised protein TP_0579 from Treponema pallidum. The full-length protein is 258 amino acids long. This domain is found in Spirochaetales and Bacteroidota bacteria. The function of this domain remains to be determined. The protein shows structural similarity to YD repeats found in Rhs proteins.
