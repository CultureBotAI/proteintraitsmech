identifier: Pfam:PF08676
label: MutL C terminal dimerisation domain
definition: >-
  MutL and MutS are key components of the DNA repair machinery that corrects replication errors. MutS recognises mispaired or unpaired bases in a DNA duplex and in the presence of ATP, recruits MutL to form a DNA signalling complex for repair. The N-terminal region of MutL contains the ATPase domain and the C-terminal is involved in dimerisation.
