identifier: Pfam:PF26612
label: Domain of unknown function (DUF8192)
definition: >-
  This domain is found in uncharacterised proteins mainly form gram-negative bacteria. It is predicted to fold into an unique α/β structure composed of a central mixed β-sheet and α-helices packed on it. Homologues contains several highly conserved positively charged residues.
