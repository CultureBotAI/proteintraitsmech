identifier: Pfam:PF25531
label: Histone-lysine N-methyltransferase ATXR3, GYF domain
definition: >-
  This entry represents the presumed GYF domain in ATXR3 from Arabidopsis thaliana. This domain, which is usually associated with and , is predicted to adopt an α-β configuration. Histone-lysine N-methyltransferase (ATXR3), also known as SET DOMAIN GROUP 2 (SDG2), is involved in the trimethylation of lysine 4 on histone H3 (H3K4me3), a critical post-translational modification that regulates chromatin structure and gene expression. It is essential for both sporophyte and gametophyte development,. Acting as a diurnal 'writer', it counteracts the nocturnal demethylase activity of JMJ14, thus orchestrating the circadian rhythm of histone modifications like H3K4me3 and modulating the rhythmic expression of target genes that follow a diurnal cycle. This process relies on the circadian clock oscillators CCA1 and LHY to maintain the proper timing of these modifications.
