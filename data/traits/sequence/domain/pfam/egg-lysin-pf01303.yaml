identifier: Pfam:PF01303
label: Egg lysin (Sperm-lysin)
definition: >-
  This entry represents Egg-lysin from Haliotis rufescens and similar proteins from molluscs. This protein, also known as Sperm-lysin, binds to the egg vitelline envelope (VE) via the VE receptor for lysin (VERL) following its release from sperm. It then dissolves the VE non-enzymatically to create a hole, thereby allowing the sperm to pass through the envelope and fuse with the egg. Structurally, this protein consists of a bundle of helices and show species-specific binding to their egg receptor, possibly through differences in charged surface residues.
