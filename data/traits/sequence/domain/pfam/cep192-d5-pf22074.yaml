identifier: Pfam:PF22074
label: Cep192 domain 5
definition: >-
  Cep192 is a centrosomal protein with key roles in centriole duplication and pericentriolar material recruitment, organisation and regulation. Most of the metazoan Cep192 homologues consist of eight ASH/PapD-like domains. These are located at the C-terminal part of the proteins and are likely arranged in a beads-on-string fashion. This entry represents the fifth domain of the metazoan Cep192 homologues. This domain along with domain 4 constitutes the so-called Spd2 domain that is the most conserved region amongst metazoa.
