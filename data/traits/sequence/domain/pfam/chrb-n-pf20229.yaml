identifier: Pfam:PF20229
label: Protein ChrB, N-terminal
definition: >-
  This entry represents the N-terminal domain found in protein ChrB from Cupriavidus metallidurans, a protein involved in the reduction of chromate accumulation and essential for chromate resistance. This domain may be involved in DNA binding and contains two highly conserved arginine residues important for its function.
