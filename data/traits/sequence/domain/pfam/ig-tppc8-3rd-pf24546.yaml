identifier: Pfam:PF24546
label: TPPC8 third Ig-like domain
definition: >-
  This entry represents the third Ig-like domain found in the middle region of TPPC8. TPPC8 plays a role in endoplasmic reticulum to Golgi apparatus trafficking at a very early stage. Together with TBC1D14, it maintains the cycling pool of ATG9 required for initiation of autophagy. It is one of the TRAPPIII complex specific subunits.
