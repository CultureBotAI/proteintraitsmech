identifier: Pfam:PF27243
label: MoxZ
definition: >-
  This entry represents MoxZ proteins involved in methanol metabolism found in Paracoccus denitrificans and related proteobacterial species. MoxZ is a 154 amino acid protein that contains a prokaryotic lipoprotein domain. The protein is part of a two-component regulatory system controlling methanol dehydrogenase synthesis. The function of this protein remains to be determined.
