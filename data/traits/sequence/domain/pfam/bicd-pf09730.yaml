identifier: Pfam:PF09730
label: Microtubule-associated protein Bicaudal-D
definition: >-
  Bicaudal-D (BicD) is a family of motor adaptor proteins consist of three coiled-coiled domains. BicD plays an essential for the correct localization of maternal mRNAs in Drosophila's oocyte and functions as a regulator of the Golgi to ER retrograde transport in mammalian cells. BicD was suggested to be a linker bridging cargo and dynein and have roles in the regulation of cargo motility. It also functions as a novel regulator of neurotrophin (NT) signaling.
