identifier: Pfam:PF21558
label: Bacteroidetes, Peptidase, S41 family, N-terminal domain
definition: >-
  This is the PDZ-like domain found in the middle region of a group of proteins from bacteroidetes that belong to the peptidase S41 family, such as Bacteroides uniformis (BACUNI_00178, ). It is found associated with {interpro:IPR028204] at the N-terminal and the peptidase S41 domain at the C-terminal ( ).
