identifier: Pfam:PF21975
label: ASNSD1 upstream open reading frame protein
definition: >-
  This family includes human ASNSD1 upstream open reading frame protein (ASNSD1-SEP, for small/short open reading frame -encoded polypeptide) and similar sequences predominantly found in vertebrates. ASNSD1-SEP is a subunit of the prefoldin-like (PFDL) module of the PAQosome, an 11-subunit chaperone involved in the biogenesis of several human protein complexes. It shows great structural homology to β-prefoldin.
