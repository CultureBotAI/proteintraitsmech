identifier: Pfam:PF31002
label: Increased DNA methylation protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of IDM2 and IDM3 (Increased DNA methylation 2 and 3) proteins found in plants. IDM2 and IDM3 are anti-silencing factors that prevent DNA hypermethylation and transcriptional gene silencing. These proteins contain a C-terminal alpha-crystallin/sHSP domain. IDM2 interacts with IDM1, regulating its H3K18 acetylation activity, and forms part of a complex with MBD7, IDM1, IDM3 and ROS1. While the C-terminal sHSP domain is involved in oligomer formation, the specific function of this N-terminal domain remains to be determined.
