identifier: Pfam:PF29416
label: OSM-8 osmotic stress response protein
definition: >-
  This entry represents the OSM-8 family of secreted proteins found in nematodes. OSM-8 from Caenorhabditis elegans is a mucin-like protein that acts as a negative regulator of the osmotic stress response. OSM-8 functions via the transmembrane protein PTR-23 and is expressed in the hypodermal syncitium during larval development. The protein is secreted and contains a predicted signal peptide. Disruption of OSM-8 results in constitutive activation of osmotic stress responses and resistance to hypertonic stress.
