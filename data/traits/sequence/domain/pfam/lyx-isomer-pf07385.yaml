identifier: Pfam:PF07385
label: D-lyxose isomerase
definition: >-
  Members of this family of sugar isomerases belong to the cupin superfamily. The enzyme from Cohnella laevoribosii has been shown to be specific for D-lyxose, L-ribose, and D-mannose. E. coli sugar isomerase (EcSI) has been structurally and functionally characterised and shows a preference for D-lyxose and D-mannose.
