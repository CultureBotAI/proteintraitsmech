identifier: Pfam:PF29054
label: HMO1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in HMO1 and related high mobility group proteins from fungi. This domain precedes the characteristic HMG box domain ( ) in these transcriptional regulators. HMO1 proteins are involved in ribosomal DNA transcription and chromatin organisation. In Saccharomyces cerevisiae, HMO1 acts synergistically with RNA polymerase I subunit RPA49 during rDNA transcription and localises to the nucleolus. The specific function of this N-terminal domain remains to be determined.
