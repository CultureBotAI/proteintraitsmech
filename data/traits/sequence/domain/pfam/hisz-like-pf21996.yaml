identifier: Pfam:PF21996
label: 'Histidyl-tRNA synthetase HisZ, C-terminal domain   '
definition: >-
  This entry represents the C-terminal domain of HisZ mainly found in Bacillales. This is the anticodon binding domain, which consists of three-stranded parallel β-sheet flanked on each side with α-helices. HisZ is a regulatory subunit of the heteromeric ATP phosphoribosyl transferase that regulates reactions initiating histidine biosynthesis. HisZ is composed of two domains for the catalytic reaction and for anticodon binding. In contrast to other class-II aminoacyl-tRNA synthetases, it lacks the essential editing domain.
