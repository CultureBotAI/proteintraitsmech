identifier: Pfam:PF21270
label: Glycoside phosphorylase C-terminal domain
definition: >-
  Glycoside phosphorylases catalyze the phosphorolysis of oligosaccharides into sugar phosphates. This domain is the C-terminal domain found in the L. phytofermentans SOGP (sophoro-oligosaccharide beta-1,2-gluco-phosphorylase) ( ) and similar bacterial proteins.
