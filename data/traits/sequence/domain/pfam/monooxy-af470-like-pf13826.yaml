identifier: Pfam:PF13826
label: Monooxygenase af470-like
definition: >-
  This family consists of proteins from bacteria and fungi. It includes monooxygenase af470 from Aspergillus fumigatus, which is part of the fma gene cluster that mediates the biosynthesis of fumagillin, a meroterpenoid with numerous biological activities. It has been suggested that af470 mediates the oxidative cleavage of the terminal alkene of the dodecapentaenoate side chain into the carboxylic acid present in fumagillin.
