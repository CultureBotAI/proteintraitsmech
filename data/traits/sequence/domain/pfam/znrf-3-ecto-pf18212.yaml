identifier: Pfam:PF18212
label: ZNRF-3 Ectodomain
definition: >-
  This domain is found in ZNRF-3 protein present in Danio rerio. ZNRF-3 is a transmembrane E3 ubiquitin ligase that antagonizes Wnt signalling, the signalling system used to mediate Rspo protein actions. ZNFR3 and RNF43, alongside the Rspo proteins, have emerged as a system with therapeutic potential for a number of pathological processes. This domain is known as the ectodomain.
