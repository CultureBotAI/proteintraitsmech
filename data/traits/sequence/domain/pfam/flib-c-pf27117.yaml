identifier: Pfam:PF27117
label: FliB lysine N-methylase C-terminal domain
definition: >-
  This entry represents the C-terminal α-helical domain of FliB lysine N-methylase from Salmonella and related bacteria, including Flagellar biosynthetic protein FliV. FliB post-translationally modifies flagellin by methylation of the epsilon amino group of surface-exposed lysine residues. The full-length FliB protein functions as a lysine N-methyltransferase. While the N-terminal region likely contains the methyltransferase catalytic domain, the specific function of this C-terminal α-helical domain is unknown. It may be involved in substrate recognition or protein-protein interactions during flagellin modification.
