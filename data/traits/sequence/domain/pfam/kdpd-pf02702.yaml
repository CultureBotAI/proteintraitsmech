identifier: Pfam:PF02702
label: Osmosensitive K+ channel His kinase sensor domain
definition: >-
  Signal transducing histidine kinases are the key elements in two-component signal transduction systems, which control complex processes such as the initiation of development in microorganisms. Examples of histidine kinases are EnvZ, which plays a central role in osmoregulation, and CheA, which plays a central role in the chemotaxis system. Histidine kinases usually have an N-terminal ligand-binding domain and a C-terminal kinase domain, but other domains may also be present. The kinase domain is responsible for the autophosphorylation of the histidine with ATP, the phosphotransfer from the kinase to an aspartate of the response regulator, and (with bifunctional enzymes) the phosphotransfer from aspartyl phosphate back to ADP or to water. The kinase core has a unique fold, distinct from that of the Ser/Thr/Tyr kinase superfamily. This entry represents the N-terminal domain found in KdpD sensor kinase proteins, which regulate the kdpFABC operon responsible for potassium transport. The N-terminal domain forms part of the cytoplasmic region of the protein, which functions as the sensor domain responsible for sensing turgor pressure. It recognises K+ and C-di_AMP (Matilla et.al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043).
