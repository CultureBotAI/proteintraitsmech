identifier: Pfam:PF24608
label: Phage putative PDDEXK endonuclease
definition: >-
  This entry represents a family of phage proteins that are structurally related to the PD-(D/E)XK nuclease superfamily, including Protein D14 from Escherichia phage T5. The highest structural similarity is to Holliday junction resolvase Hjc proteins. The exact function of this protein family is unknown.
