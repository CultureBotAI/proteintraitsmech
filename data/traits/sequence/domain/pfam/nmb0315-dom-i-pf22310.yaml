label: NMB0315-like, domain I
definition: >-
  This entry represents the N-terminal domain I of DD-carboxypeptidase/endopeptidase Mpg (NMB0315), an outer membrane protein of Neisseria meningitidis serogroup B and a potential candidate for a broad-spectrum vaccine against meningococcal disease. This domain tightly associates with domain III, which blocks the active site and the substrate binding groove. It is usually found associated with ).
