identifier: Pfam:PF27490
label: Rem
definition: >-
  This entry represents Rem, an uncharacterised protein from Escherichia coli. The protein is 83 amino acids in length. Rem is found predominantly in Gammaproteobacteria, particularly within Enterobacterales including Enterobacteriaceae. The function of this protein remains to be determined.
