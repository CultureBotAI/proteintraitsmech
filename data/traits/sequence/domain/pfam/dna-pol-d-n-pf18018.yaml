identifier: Pfam:PF18018
label: DNA polymerase delta subunit OB-fold domain
definition: >-
  The eukaryotic DNA polymerase delta (Pol delta) participates in genome replication, homologous recombination, DNA repair and damage tolerance. Human Pol delta consists of four subunits: p125, p50, p66 and p12. The first three subunits correspond to the three subunits of S. cerevisiae Pol delta. p50 serves as a scaffold for the assembly of Pol delta by interacting simultaneously with all of the other three subunits. This entry corresponds to the OB fold domain found in the p50 subunit.
