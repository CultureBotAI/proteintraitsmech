label: Filamentation induced by cAMP protein Fic-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Filamentation induced by cAMP protein Fic ( ) from Oleidesulfovibrio alaskensis and similar bacterial sequences. This domain adopts a winged helix structure ( ). It is often found associated with . This domain is also found in some archaeal sequences.
