identifier: Pfam:PF25702
label: Phage tail ring protein 2
definition: >-
  This entry represents the Ring 1 (R2) protein, also known as gp40, which is part of the tail assembly in crassviruses. The R2 protein forms one of five stacked dodecameric rings that make up the tail barrel. These proteins share a conserved fold consisting of two domains: an α-helical domain and a β-sandwich domain. The extended tail barrel formed by these ring proteins is a distinctive feature of crassviruses. It may assist the tail muzzle in reaching the outer cell membrane through the compact capsular polysaccharide layer of the host bacteria.
