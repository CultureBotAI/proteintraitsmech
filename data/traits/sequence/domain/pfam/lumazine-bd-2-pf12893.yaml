identifier: Pfam:PF12893
label: Putative lumazine-binding
definition: >-
  This protein family includes Aldolase FrzH from the fungi Cladobotryum sp., bacterial lumazine-binding proteins and similar sequences from cellular organisms. FrzH is involved in the biosynthesis of the alkaloid (-)-FR901483, a potent immunosuppressant that shows efficacy in animal models and a probable inhibitor of purine nucleotide biosynthesis. Members of this entry show a six-stranded β-sheet with three α-helices on one side ( ) and belong to the NTF2-like superfamily of various enzymes. Some proteins in this family are putative dehydrogenases.
