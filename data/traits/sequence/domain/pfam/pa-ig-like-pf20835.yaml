identifier: Pfam:PF20835
label: Anthrax protective antigen, immunoglobulin-like domain
definition: >-
  Anthrax protective antigen (PA) is one of the three proteins forming the anthrax toxin. It is involved in the first step of toxin entry into host cells, enabling lethal factor (LF) and oedema factor (EF) to cross to the cytosol. PA undergoes cleavage by Furin to generate PA20 and PA63. The latter, which adopts a ring-shaped heptameric assembly, shows four distinct domains. The fourth domain, a carboxy- terminal receptor-binding domain, shows an initial hairpin and helix, followed by a β-sandwich with an immunoglobulin-like fold (this entry).
