identifier: Pfam:PF23818
label: Bacteriophage Tail Tube Terminator Protein
definition: >-
  The Tail Tube Terminator Protein family is involved in the assembly of bacteriophage tail structures. Members of this family, such as the Tail Tube Terminator Protein p142, are responsible for capping the tail tube during its polymerisation, ensuring that it reaches the correct length. This capping function is crucial for the proper formation of the phage tail, which is essential for the phage's ability to infect host bacteria by facilitating the injection of genetic material.
