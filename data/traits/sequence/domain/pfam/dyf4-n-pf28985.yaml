identifier: Pfam:PF28985
label: Protein dyf-4 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of protein dyf-4 and related proteins found in nematodes. Dyf-4 from Caenorhabditis elegans is a secreted glycoprotein that contains an N-terminal signal peptide and is required for the localisation of daf-6 to the socket glial channel and sheath lumen. Dyf-4 is expressed in sheath and socket glial cells in amphid and phasmid ciliated sensory neurons, where it plays a role in dendrite extension and ciliogenesis to ensure proper formation of glial channels. The protein is secreted into the sensory compartment region and interacts with daf-6. The specific function of this N-terminal domain remains to be determined.
