identifier: Pfam:PF22375
label: Glucosyltransferase Lgt1, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Glucosyltransferase Lgt1 from Legionella pneumophila, which has been suggested to be involved in pathogenesis. This domain adopts a completely α-helical configuration. Members of this group are specific to Legionella species.
