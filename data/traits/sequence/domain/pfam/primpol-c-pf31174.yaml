identifier: Pfam:PF31174
label: Probable primase/polymerase C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 75 residues found in probable DNA primase/polymerase bifunctional proteins in Streptomyces and other Actinomycetota. This domain is located C-terminal to the Prim-Pol domain ( ). These proteins are associated with actinomycete integrative and conjugative elements (AICEs) and may function in replication of these mobile genetic elements. The domain represented by this entry is predicted to fold into a four-helical up-and-down bundle.
