identifier: Pfam:PF18551
label: Thaumarchaeal output domain 1
definition: >-
  TackOD1 (Thaumarchaeal output domain 1) is a predicted metal-binding domain found in archaea and in some bacteria. It contains 11 highly conserved Cys residues, which form 5 CxxC motifs and an HxxC motif. In several instances, it is found in combination with the receiver domain ( ).
