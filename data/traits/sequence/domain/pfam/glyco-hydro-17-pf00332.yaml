identifier: Pfam:PF00332
label: Glycosyl hydrolases family 17
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 17 comprises enzymes with several known activities; endo-1,3-beta-glucosidase ( ); lichenase ( ); exo-1,3-glucanase ( ). These enzymes can be found in bacteria, plants and fungi.
