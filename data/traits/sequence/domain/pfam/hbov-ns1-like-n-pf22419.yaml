identifier: Pfam:PF22419
label: Human bocavirus Nonstructural protein 1-like, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the Human bocavirus 1 (HBoV1) nonstructural protein 1 (NS1) and similar sequences specific to bocavirus. HBoV-NS1 is a member of the histidine-hydrophobic-histidine (HUH) superfamily of endonucleases.
