identifier: Pfam:PF20676
label: Herpesvirus envelope glycoprotein gp350, N-terminal B domain
definition: >-
  This entry represents domain B of the N-terminal region of GP350. This entry includes Envelope glycoprotein GP350 from Epstein-Barr virus (also known as BLLF1 viral late glycoprotein), the most abundantly expressed glycoprotein in the viral envelope of Herpesviruses and is the major antigen responsible for stimulating the production of neutralising antibodies in vivo. It is a 907 residues long gp350 polypeptide containing an 18-residue peptide at the C terminus that is located inside the viral membrane, a membrane-spanning domain and a large N-terminal segment (860 residues) predicted to extend outside the viral membrane. The extreme N-terminal region (1-470) is sufficient to bind receptor CR2 (also known as CD21) and fold into three distinct domains (denoted as A ( ), B ( ) and C ( )) that organise into an "L-shape" structure. The binding of the viral major glycoprotein BLLF1 to the CD21 cellular receptor is responsible for viral attachment to the cell surface during infection of B lymphocytes by the Epstein-Barr virus (strain GD1) (HHV-4) (Human herpesvirus 4).
