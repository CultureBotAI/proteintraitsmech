identifier: Pfam:PF03741
label: Integral membrane protein TerC family
definition: >-
  This entry represents highly hydrophobic proteins that are commonly preceded by a structured RNA element called the yybP-ykoY leader or SraF, which may serve as a riboswitch. From the larger group of TerC homologues ( ), this entry contains protein YjbE from Bacillus subtilis. A transport function is proposed.
