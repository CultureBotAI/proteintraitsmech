identifier: Pfam:PF08033
label: Sec23/Sec24 beta-sandwich domain
definition: >-
  COPII (coat protein complex II)-coated vesicles carry proteins from the endoplasmic reticulum (ER) to the Golgi complex. COPII-coated vesicles form on the ER by the stepwise recruitment of three cytosolic components: Sar1-GTP to initiate coat formation, Sec23/24 heterodimer to select SNARE and cargo molecules, and Sec13/31 to induce coat polymerisation and membrane deformation. Sec23 p and Sec24p are structurally related, folding into five distinct domains: a β-barrel, a zinc-finger ( ), an α/β trunk domain ( ), an all-helical region ( ), and a C-terminal gelsolin-like domain ( ). This entry describes part of the Sec23/24 β-barrel domain, which is formed from approximately 180 residues from three segments of the polypeptide. The strands of the barrel are oriented roughly parallel to the membrane such that one end of the barrel forms part of the inner surface of the coat and the other end part of the membrane-distal surface. The barrel is constructed from two opposed sheets: a six-stranded β-sheet facing partly towards the zinc finger domain and partly towards the solvent, and a five-stranded β-sheet facing the helical domain.
