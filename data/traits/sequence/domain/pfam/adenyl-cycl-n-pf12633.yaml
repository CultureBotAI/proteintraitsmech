identifier: Pfam:PF12633
label: Adenylate cyclase NT domain
definition: >-
  This entry represents the N-terminal domain of class-I adenylate cyclases. Adenylate cyclase is the enzyme responsible for the synthesis of cAMP from ATP. On the basis of sequence similarity, it has been proposed that there are three different classes of adenylate cyclases. Class I cyclases are found in enterobacteria and related Gram-negative bacteria.
