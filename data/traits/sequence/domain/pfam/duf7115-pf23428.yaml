identifier: Pfam:PF23428
label: Domain of unknown function (DUF7115)
definition: >-
  This domain is found at the N-terminal of HVO_2519 from Haloferax volcanii ( ) and similar proteins mainly from halobacteria. It has several conserved motifs RTxxYR, Y/FxHxxxR an RRK. It is predicted to show an α-β configuration.
