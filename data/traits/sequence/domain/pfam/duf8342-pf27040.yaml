label: Domain of unknown function (DUF8342)
definition: >-
  This entry represents a domain of unknown function at the N-terminal in uncharacterised eukaryotic proteins mainly from Trypanosoma. This domain contains a RNase-like fold. The core architecture typically features a central five-stranded β-sheet flanked by several α-helices. This domain can be found associated with .
