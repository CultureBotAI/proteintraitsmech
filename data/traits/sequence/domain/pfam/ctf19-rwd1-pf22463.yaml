identifier: Pfam:PF22463
label: Ctf19, first RWD domain
definition: >-
  This entry represents the first occurrence of the RWD domain within the Ctf19 subunit of the inner kinetochore in Kluyveromyces lactis. Ctf19 is a component of the constitutive centromere-associated network (CCAN), which forms the structural basis of the kinetochore. The CCAN governs the timing of kinetochore assembly, establishes its position through interaction with a specialised nucleosome containing the histone H3 variant Cse4/CENP-A, and determines the arrangement of the microtubule attachment machinery. In this way, eukaryotic kinetochores establish a connection between spindle microtubules and chromosomal centromeres. KlCTF19 contains two RWD domains ( and ), also known as a double-RWD domain, DRWD, which is involved in interactions with other kinetochore proteins.
