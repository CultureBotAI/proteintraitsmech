identifier: Pfam:PF12929
label: Stretch-activated Ca2+-permeable channel component
definition: >-
  In Saccharomyces cerevisiae, Mid1 is a yeast plasma membrane protein required for Ca2+ influx induced by the mating pheromone alpha-factor during the mating process. The protein is composed of 548-amino-acid residues, contains four hydrophobic regions (H1, H2, H3 and H4) and two cysteine-rich regions (C1 and C2) at the C terminus. H1 appears to be a signal sequence necessary for the alpha-factor-induced delivery to the plasma membrane. The region from H1 to H3 is required for the localisation of Mid1 in the plasma and ER membranes. C1 and C2 are thought to be involved in oligomerisation via the formation of disulphide bonds. Trafficking of Mid1-GFP to the plasma membrane is dependent on the N-glycosylation of Mid1 and the transporter protein Sec12. This suggests that the trafficking of Mid1-GFP to the plasma membrane requires a Sec12-dependent pathway from the ER to the Golgi, and that Mid1 is recruited via a Sec6- and Sec7-independent pathway from the Golgi to the plasma membrane. This entry also includes Yam8/Ehs1 from Schizosaccharomyces pombe. Ehs1 is required for Ca2+ influx and for vitality of cells in a late, pheromone-induced event of the mating process requiring calcium-induced signalling.
