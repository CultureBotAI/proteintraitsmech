identifier: Pfam:PF02214
label: BTB/POZ domain
definition: >-
  This domain can be found at the N-terminal of voltage-gated potassium channel protein. It represents a cytoplasmic tetramerisation domain (T1) involved in assembly of alpha-subunits into functional tetrameric channels. This domain can also be found in proteins that are not potassium channels, like KCTD1 (potassium channel tetramerisation domain-containing protein 1). KCTD1 is thought to be a nuclear protein that functions as a transcriptional repressor. In KCTD1, the T1-type BTB domain mediates homomeric protein-protein interactions.
