identifier: Pfam:PF21639
label: ORC5, lid domain
definition: >-
  ORC5 is a component of the origin recognition complex (ORC) that binds origins of replication. ORC is required to assemble the pre-replication complex necessary to initiate DNA replication. This entry represents the lid domain, which with the N-terminal RecA-fold domain, constitutes the well-known AAA domain.
