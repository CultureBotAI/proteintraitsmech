identifier: Pfam:PF26323
label: Staphylococcus aureus type VII secretion system substrate EsxC
definition: >-
  This entry represents Type VII secretion system extracellular protein C (EsxC), a secreted substrate of the Staphylococcus aureus Type VII Secretion System (T7SS). EsxC plays an important role in bacterial membrane integrity and modulates membrane fluidity. Deletion of esxC increases bacterial sensitivity to membrane-acting antimicrobial drugs such as daptomycin, gramicidin, and bithionol, but not to drugs targeting cell wall or DNA replication. Mutants lacking EsxC display decreased membrane fluidity, altered cell membrane protein localisation, and distinct cell surface morphologies, suggesting that EsxC is critical to cell envelope function in S. aureus. Members of this family are found in bacilli.
