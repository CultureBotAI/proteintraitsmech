identifier: Pfam:PF23058
label: ZCCHC3, second RNA-binding domain
definition: >-
  This entry represents the second RNA-binding domain (RBD) found in vertebrate Zinc finger CCHC domain-containing protein 3 (ZCCHC3). This domain is preceded by the first RBD ( ). Zinc finger CCHC domain-containing protein 3 from humans (ZCCHC3) is a zinc-finger protein that acts as a co-sensor of cGAS in innate immune response to cytosolic dsDNA and DNA virus. It has been shown to bind DNA and RNA in the cytoplasm and acts by promoting recognition of viral nucleic acids by virus sensors, such as DDX58/RIG-I, IFIH1/MDA5 and CGAS. Members of this family are found in eukaryotes.
