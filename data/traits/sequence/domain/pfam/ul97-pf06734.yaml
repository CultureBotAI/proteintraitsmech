identifier: Pfam:PF06734
label: UL97
definition: >-
  The gene product form the gene UL97 is a serine/threonine kinase. Although it can phosphorylates the antiviral drug ganciclovir, its biological function is the phosphorylation of its natural viral and cellular protein substrates which affect viral replication at many levels.
