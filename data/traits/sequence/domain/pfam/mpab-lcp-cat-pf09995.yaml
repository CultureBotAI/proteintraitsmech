identifier: Pfam:PF09995
label: ER-bound oxygenase mpaB/B'/Rubber oxygenase, catalytic domain
definition: >-
  This entry represents the catalytic domain found in the endoplasmic reticulum (ER)-bound oxygenases mpaB' (MPAB2) and mpaB (MPAB) from Penicillium brevicompactum and Penicillium roqueforti and in the rubber oxygenase (Lcp) from Streptomyces sp., which contains highly conserved arginine and histidine residues. Structural analysis from Lcp revealed that Arg164, Thr168 and His198 are crucial active site residues. The ER-bound oxygenases mpaB and mpaB' are part of the gene cluster that mediates the biosynthesis of mycophenolic acid (MPA) and mediates the oxidative cleavage the C19-C20 double bond in farnesyl-DHMP (FDHMP) to yield FDHMP-3C via a mycophenolic aldehyde intermediate. Rubber oxygenase Lcp (Latex clearing proteins) is a rubber oxygenase that catalyses the extracellular cleavage of poly (cis-1,4-isoprene) by Gram-positive rubber degrading bacteria such as Streptomyces sp. K30. This domain is also present in uncharacterised proteins from Mycobacterium sp. and hypothetical proteins, mainly from bacteria and fungi.
