identifier: Pfam:PF03931
label: Skp1 family, tetramerisation domain
definition: >-
  SKP1 (together with SKP2) was identified as an essential component of the cyclin A-CDK2 S phase kinase complex. It was found to bind several F-box containing proteins (e.g., Cdc4, Skp2, cyclin F) and to be involved in the ubiquitin protein degradation pathway. A yeast homologue of SKP1 (P52286) was identified in the centromere bound kinetochore complex and is also involved in the ubiquitin pathway. In Dictyostelium discoideum (Slime mold) FP21 was shown to be glycosylated in the cytosol and has homology to SKP1. This entry represents a POZ domain with a core structure consisting of β(2)/α(2)/β(2)/α(2) in two layers, α/β. This domain is found at the N-terminal of SKP1 proteins as well as in subunit D of the centromere DNA-binding protein complex Cbf3.
