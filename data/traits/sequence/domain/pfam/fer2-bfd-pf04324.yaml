identifier: Pfam:PF04324
label: BFD-like [2Fe-2S] binding domain
definition: >-
  The two Fe ions are each coordinated by two conserved cysteine residues. This domain occurs alone in small proteins such as bacterioferritin-associated ferredoxin (BFD, ). The function of BFD is not known, but it may be a general redox and/or regulatory component involved in the iron storage or mobilisation functions of bacterioferritin in bacteria. This domain is also found in nitrate reductase proteins in association with the nitrite and sulphite reductase 4Fe-4S domain ( ), nitrite/sulphite reductase ferredoxin-like half domain ( ). It is also found in NifU nitrogen fixation proteins, in association with NifU-like N-terminal domain ( ) and C-terminal domain ( ).
