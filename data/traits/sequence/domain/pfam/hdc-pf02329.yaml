identifier: Pfam:PF02329
label: Histidine carboxylase PI chain
definition: >-
  Histidine decarboxylase ( ) catalyses the formation of histamine from histidine. It requires a pyruvoyl group for its activity. Cleavage of the proenzyme PI chain yields two subunits, alpha and beta, which arrange as a hexamer (alpha beta) 6 by nonhydrolytic self-catalysis. In Lactobacillus cells, pyruvoyl-dependent histidine decarboxylase functions to counter the effects of acidic fermentation products, thus modifying extracellular pH. Cells take up histidine and decarboxylate it using histidine decarboxylase to consume a proton and produce histamine, which the cells excrete. These proteins are all dependent on the pyruvoyl cofactor, which is part of the active site and is located at the amino terminus of the alpha-chain (corresponding to residue 82 of the proenzyme in Lactobacillus sp. 30a), at the break between the beta and alpha chains. This pyruvoyl cofactor facilitates decarboxylation via a Schiff base mechanism resembling that of the more common PLP-dependent decarboxylases. This covalent intermediate allows for resonance stabilisation, facillitaing the decarboxylation step. The mechanism for this enzyme can be found in MACiE entry M0049.
