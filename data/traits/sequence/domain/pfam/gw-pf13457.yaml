identifier: Pfam:PF13457
label: GW (Gly-Tryp) dipeptide domain
definition: >-
  The GW domain or cell wall targeting (CWT) signal is a module of about 80-90 amino acids named for a conserved Gly-Trp (GW) dipeptide. GW domains have only been identified in Gram-positive bacteria and form a small protein family. They are divergent members of the SH3 family. However, GW domains are unlikely to mimic SH3 domains functionally, as their potential peptide-binding sites are destroyed or blocked. GW domains constitute a motif for cell-surface anchoring in Listeria and other Gram-positive bacteria. The GW domains bind polyanions, including lipoteichoic acid (LTA), on the bacterial surface and heparan sulfate of host cell surface heparan sulfate proteoglycans (HSPGs); binding to the latter enhances human receptor tyrosine kinase MET activation through the internalin domain. The GW domain is composed of seven β-strands, five of which are organized into an open barrel conformation like the SH3 domains one. The eponymous GW dipeptide, located in the fourth β-strand, is more conserved in GW domains than in SH3 domains. Both the glycine and tryptophan are buried in GW proteins, while the equivalent residues in SH3 proteins are surface accessible, perhaps explaining the greater conservation in GW proteins.
