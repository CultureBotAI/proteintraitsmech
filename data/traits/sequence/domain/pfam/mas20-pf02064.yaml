identifier: Pfam:PF02064
label: MAS20 protein import receptor
definition: >-
  Virtually all mitochondrial precursors are imported via the same mechanism: precursors first bind to receptors on the mitochondrial surface, then insert into the translocation channel in the outer membrane. Many outer-membrane proteins participate in the early stages of import, four of which (MAS20, MAS22, MAS37 and MAS70) are components of the receptor. MAS20, which forms a subcomplex with MAS22, seems to interact with most or all mitochondrial precursors, suggesting that the protein binds directly to mitochondrial targeting sequences. The MAS37 and MAS70 components also form a subcomplex, the two subcomplexes possibly binding via their trans- membrane (TM) regions - the TM region of MAS70 promotes oligomerisation of attached protein domains and shares sequence similarity with the TM region of MAS20. MAS20 is also known as TOM20.
