identifier: Pfam:PF23503
label: Apicomplexa small protein domain
definition: >-
  This domain is found in a group of uncharacterised small proteins from apicomplexa, including SmORF ( ) from the parasite Babesia bovis, which is encoded by an small open reading frame (smORF). This domain, predicted to adopt an α-helical structure, is found twice in some longer members.
