identifier: Pfam:PF21027
label: Cellulose-binding protein Sde0182, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Cellulose-binding protein Sde0182 from Saccharophagus degradans , which seems to have capacity to bind plant carbohydrates. This region shows a β-sandwich fold that consists of two β-sheets with seven β-strands in total. It has structural similarity to a polycystic kidney domain (PKD, ) and lacks the solvent exposed aromatic residues typically associated with an ability to bind carbohydrates. This domain is also found in other uncharacterised bacterial and fungal proteins.
