identifier: Pfam:PF23128
label: C2CD5, C-terminal domain
definition: >-
  This entry represents the YbjQ-like domain at the C-terminal in C2 domain-containing protein 5 (C2CD5). C2CD5 is involved in insulin-stimulated glucose transport and the translocation of the glucose transporter SLC2A4/GLUT4 from intracellular glucose storage vesicles to the plasma membrane in adipocytes. This process is crucial for glucose uptake in response to insulin. C2CD5 binds phospholipid membranes in a calcium-dependent manner, which is essential for optimal membrane fusion between the glucose storage vesicles and the plasma membrane. This function is well established in humans, mice, and orangutans, while in Xenopus tropicalis, the role is suggested but not confirmed.
