identifier: Pfam:PF17092
label: Penicillin-binding protein OB-like domain
definition: >-
  This entry represents the OB (oligonucleotide/oligosaccharide binding)-fold domain found in penicillin-binding proteins (PBPs). A. baumannii PBP is the first example of a multimodular PBP containing the OB-fold domain. Structure-based sequence alignment suggests that this OB-fold domain may also exist in high molecular mass PBPs of subclass A1 from other Gram-negative bacteria including the respective PBP1a proteins of P. aeruginosa and K. pneumoniae.
