identifier: Pfam:PF26796
label: Domain of unknown function (DUF8266)
definition: >-
  This domain is found in uncharacterised proteins from Halobacteria. It is predicted to fold into an α/β structure composed of a small four stranded antiparallel β-sheet and α-helices packed on one side of it. It contains two conserved sequence motifs IPLH and RxRFW which may have functional importance. This domain is frequently found in combination with domains members of AAA superfamily.
