identifier: Pfam:PF07987
label: Domain of unknown function (DUF1775)
definition: >-
  The ycnKJI operon is responsible for regulating copper levels in the Gram-positive bacterium Bacillus subtilis. This operon encodes three Cu-related proteins: a copper-dependent transcriptional repressor (YcnK), a putative copper importer (YcnJ), and a copper-binding protein of unknown function (YcnI). YcnI's extracellular Domain of Unknown Function 1775, represented by this entry, uses a monohistidine brace consisting of an N-terminal histidine residue (H27), a glutamate side chain (E50), and a tryptophan residue (W137). This domain can be found associated with at the N-terminal.
