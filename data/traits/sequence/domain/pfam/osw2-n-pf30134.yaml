identifier: Pfam:PF30134
label: OSW2 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of OSW2 (outer spore wall protein 2), which is involved in spore wall assembly in fungi. OSW2 localises to the cytoplasm and prospore membrane during meiosis. The protein is involved in a late step of spore wall assembly and is localised around the prospore membrane during meiosis II.
