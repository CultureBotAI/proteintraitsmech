identifier: Pfam:PF27294
label: HfaA
definition: >-
  This entry represents the HfaA domain found in holdfast attachment proteins from bacteria. This domain is composed of three short β-sheets. Members are approximately 147 amino acids in length. HfaA is involved in the attachment of the holdfast to the cell. The holdfast is a structure that allows the bacteria to firmly adhere to surfaces. The holdfast biosynthesis and secretion machinery are encoded by two major loci, hfsEFGH and hfsDABC. The hfsDAB genes encode a secretion protein complex believed to span the inner and outer membranes of the cell envelope. Deletion of any of the components of this complex results in holdfast shedding and decreased adherence and biofilm formation.
