identifier: Pfam:PF22145
label: GtfA extended beta-sheet domain
definition: >-
  This entry represents the extended β-sheet meander domain (EBD) of UDP-N-acetylglucosamine--peptide N-acetylglucosaminyltransferase GtfA subunit and similar proteins mainly from firmicutes. GtfA is the core enzyme of the OGT complex, which also includes the co-activator GtfB, to glycosylate the serine-rich repeat (SRR) of adhesin PsrP in Streptococcus pneumoniae, a protein involved in the infection and pathogenesis. The function of this domain is not clear.
