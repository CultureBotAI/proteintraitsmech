identifier: Pfam:PF21081
label: Virus-capping methyltransferase, C-terminal
definition: >-
  This entry represents the C-terminal domain of the Mononegavirales single-stranded RNA viral RNA polymerase enzymes. This region, together with the connector domain (CD, ), flanks the methyltransferase domain (MT) and is likely involved in the structural rearrangements that appear to coordinate the enzymatic activities during transcription and replication.
