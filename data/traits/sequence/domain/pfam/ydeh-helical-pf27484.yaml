identifier: Pfam:PF27484
label: YdeH helical domain
definition: >-
  This entry represents YdeH, an uncharacterised membrane protein from Bacillus subtilis. YdeH is a 148 amino acid multi-pass membrane protein with four predicted transmembrane helices localised to the cell membrane. This entry is found predominantly in Bacillati, particularly within the Bacillales order including Bacillaceae and Staphylococcaceae families.
