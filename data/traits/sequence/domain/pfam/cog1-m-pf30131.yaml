identifier: Pfam:PF30131
label: COG1 middle domain
definition: >-
  This entry represents the middle domain of COG1, a subunit of the conserved oligomeric Golgi (COG) complex. COG1 is found in eukaryotes and forms part of a multiprotein complex involved in vesicular trafficking within the Golgi apparatus. The COG complex facilitates retrograde transport and vesicle tethering at the Golgi.
