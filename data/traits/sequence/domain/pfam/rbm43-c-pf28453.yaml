identifier: Pfam:PF28453
label: RBM43 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of RBM43 (RNA-binding protein 43) found in mammals. RBM43 is an RNA-binding protein that contains an N-terminal RRM domain. The full-length protein has RNA-binding activity and interacts with proteins such as DAZAP2 and IKZF1. This C-terminal domain may contribute to protein-protein interactions.
