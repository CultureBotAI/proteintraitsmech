identifier: Pfam:PF21328
label: Sliding-clamp-loader large subunit, AAA+ ATPase lid domain
definition: >-
  This entry represents the AAA ATPase lid domain of Gp44 and similar sequences from tailed bacteriophages and bacterial prophages. Sliding-clamp-loader large subunit (also known as Gp44) from Bacteriophage T4 forms the sliding-clamp-loader together with the small subunit. These are members of the AAA superfamily of ATPases which form pentameric complexes that load sliding DNA clamps onto the DNA, key for processive chromosomal replication.
