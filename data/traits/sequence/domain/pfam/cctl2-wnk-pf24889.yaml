identifier: Pfam:PF24889
label: WNK CCTL2 domain
definition: >-
  This is the CCT-like domain 2 (CCTL2) from animal WNK proteins (WNK1-4), which are serine/threonine-protein kinase components of the WNK-SPAK/OSR1 kinase cascade, which plays an important role in the regulation of electrolyte homeostasis, cell signalling survival, and proliferation. The exact function of this domain is not clear, it has been suggested that it may play a regulatory function.
