identifier: Pfam:PF27221
label: Uncharacterized protein PM0498 family
definition: >-
  This entry represents the PM0498 protein family, an uncharacterized PM0498 from Pasteurella multocida and similar proteins found in bacteria. The protein is 158 amino acids in length with a molecular weight of approximately 18.6 kDa. The function of this protein family remains to be determined.
