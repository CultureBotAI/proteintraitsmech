identifier: Pfam:PF13524
label: Glycosyl transferase-like
definition: >-
  This entry represents a glycosyl transferase-like domain found in spore protein YkvP and protein CgeB from Bacillus subtilis. YkvP is a spore protein that contains a motif conserved among cell wall binding proteins. Its expression is dependent on both SigK and GerE transcription factors. YkvP is intrinsic to mature spores. The conserved motif in YkvP is thought to function as a kind of signal sequence involved in protein assembly to forespores during sporulation. CgeB is a putative glycosyltransferase involved in the glycosylation of the Bacillus subtilis endospore crust. It is co-expressed with CgeA and CgeD, which are also implicated in crust glycosylation. The crust polysaccharide layer, which CgeB likely contributes to, consists of rhamnose- and galactose-related variants and may contain rare sugars. This glycosylation could protect the crust against biological degradation and scavenging.
