identifier: Pfam:PF29714
label: 15 kDa excretory/secretory protein
definition: >-
  This entry represents a domain found in 15 kDa excretory/secretory proteins, predominantly in nematodes, including the 15 kDa excretory/secretory protein from Haemonchus contortus. These proteins contain an N-terminal signal peptide and are localised to the extracellular region. The specific function of this domain remains to be determined. This domain covers the whole length of the protein in many members and can be found repeated in related proteins.
