identifier: Pfam:PF29063
label: ACL4 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ACL4 (Assembly chaperone of RPL4). ACL4 acts as a chaperone for the L4 ribosomal subunit encoded by RPL4A and RPL4B, required for hierarchical ribosome assembly. The protein shields ribosomal protein L4 until timely release and insertion into the pre-ribosome is possible, once ribosomal protein L18 is present. The full-length protein contains N-terminal TPR repeats and is distributed throughout the cell but enriched in the nucleus. The specific function of this C-terminal domain remains to be determined.
