identifier: Pfam:PF27386
label: YonJ N-terminal domain
definition: >-
  This entry represents the N-terminal domain of uncharacterised YonJ proteins of approximately 405 amino acids found in bacteria and viruses. The full-length proteins are distributed across both Bacillati and viruses, including members from Paenibacillus species and Spbetavirus. Members include YonJ from Bacillus subtilis, which is derived from the SPbeta prophage. The full-length proteins contain a predicted coiled-coil region. The function of this N-terminal domain remains to be determined.
