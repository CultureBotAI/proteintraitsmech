identifier: Pfam:PF21053
label: Biogenesis factor required for ATP synthase 1, C-terminal domain
definition: >-
  This domain is predominantly found at the C-terminal end of proteins from cyanobacteria and plants, including Biogenesis factor required for ATP synthase 1 (BFA1, ) from Arabidopsis thaliana. BFA1 promotes the assembly of the CF1 subcomplex of the chloroplast ATP synthase by specifically interacting with the gamma and beta subunits. This domain consists of ten β-sheets and one α-helix forming a typical β-barrel, which locates perpendicularly to.
