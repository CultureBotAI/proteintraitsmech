identifier: Pfam:PF24435
label: NFXL1 RRM-like domain
definition: >-
  This domain is found in NF-X1-type zinc finger protein NFXL1 from Arabidopsis thaliana and related plant proteins. AtNFXL1, a homologue of the human transcription repressor NF-X1, plays an important role in the trichothecene response, as well as the general defence response in Arabidopsis. This domain has a detectable sequence similarity to known RRM domains and it is predicted to adopt similar structure.
