identifier: Pfam:PF30350
label: COG1 C-terminal domain
definition: >-
  This entry represents the C-terminal region in COG1, a subunit of the conserved oligomeric Golgi (COG) complex. COG1 is found in eukaryotes and forms part of a multiprotein complex involved in vesicular trafficking within the Golgi apparatus. The COG complex facilitates retrograde transport and vesicle tethering at the Golgi.
