identifier: Pfam:PF30300
label: TRS130, first Ig-like domain
definition: >-
  This entry represents the first Ig-like domain of TRS130 from yeast and similar proteins. TRS130 plays a role in the YPT GEF activity of TRAPP II in concert with the two other TRAPP II-specific subunits TRS65 and TRS120.
