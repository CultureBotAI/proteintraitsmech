identifier: Pfam:PF30907
label: IPGA1 coiled-coil
definition: >-
  This entry represents a coiled-coil found in the N-terminal region of IPGA1 (increased petal growth anisotropy 1) and related proteins from plants. IPGA1 is a microtubule- associated protein and the N-terminal region containing this domain mediates association with cortical microtubules. IPGA1 is involved in the regulation of anisotropic petal growth by affecting cortical microtubule organisation. Proteins represented by this entry also have a C-terminal IPGAL1_C domain.
