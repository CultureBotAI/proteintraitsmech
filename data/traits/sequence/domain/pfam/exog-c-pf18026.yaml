identifier: Pfam:PF18026
label: Endo/exonuclease (EXOG) C-terminal domain
definition: >-
  This is the C-terminal domain found in EndoG-like mitochondrial endo/exonuclease (EXOG) proteins in higher eukaryotes. Evolutionary conserved mitochondrial nucleases are involved in programmed cell death and normal cell proliferation in lower and higher eukaryotes. It has been proposed that during metazoan evolution duplication of an ancestral nuclease gene could have generated the paralogous EndoG-and EXOG-protein subfamilies in higher eukaryotes, thereby maintaining the full endo/exonuclease activity found in mitochondria of lower eukaryotes.
