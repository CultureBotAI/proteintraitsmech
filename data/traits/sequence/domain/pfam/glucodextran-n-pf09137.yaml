identifier: Pfam:PF09137
label: Glucodextranase, domain N
definition: >-
  This domain is found in bacterial and archaeal glucoamylases and glucodextranases, and adopts a structure consisting of 17 antiparallel β-strands. These β-strands are divided into two β-sheets, and one of the β-sheets is wrapped by an extended polypeptide, which appears to stabilise the domain. This domain, together with glycoside hydrolase domain A ( ), is mainly involved with catalytic activity, hydrolysing alpha-1,6-glucosidic linkages of dextran to release beta-D-glucose from the non-reducing end via an inverting reaction mechanism.
