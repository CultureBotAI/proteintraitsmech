identifier: Pfam:PF26788
label: Domain of unknown function (DUF8260)
definition: >-
  This domain is found in uncharacterised bacterial proteins. It contains a two pair of highly conserved cysteine residues that may be involved in metal coordination. It is predicted to fold into a structure typical for zinc beta ribbon domains. Some proteins contain multiple copies of this domain.
