identifier: Pfam:PF30312
label: YoqC prophage protein
definition: >-
  This entry represents YoqC, a 135 amino acid protein from the SPbeta prophage of Bacillus subtilis. The protein is found in proteins across SPbeta phage, Kirovvirus and Haetaevirus phages, and Bacillus subtilis. YoqC is annotated as a nucleotide-binding protein in some databases. The specific function of this protein remains to be determined.
