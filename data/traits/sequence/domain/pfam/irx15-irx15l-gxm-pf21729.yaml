identifier: Pfam:PF21729
label: IRX15/IRX15L/GXM
definition: >-
  This entry includes IRREGULAR XYLEM IRX15/IRX15L, glucuronoxylan 4-O-methyltransferases 1(GXM1), 2(GXM2) and 3(GXM3) from plants. GXMs and IRX15/15L are all expressed in secondary wall-forming cells and they are all involved in xylan biosynthesis. However, they have different functions. GXM1/GXM2/GXM3 are methyltransferases catalysing 4-O-methylation of GlcA side chains on xylan. IRX15/IRX15L are required for xylan biosynthesis and/or xylan deposition, although their precise enzymatic activity is unknown. This entry also includes arabinogalactan O-methyltransferase 1 AGM1 (also known as probable methyltransferase At1g27930) and arabinogalactan O-methyltransferase 2 AGM2 (At1g67330) which are required for 4-O-methylation of glucuronic acid of arabinogalactan proteins, a different plant cell wall component.
