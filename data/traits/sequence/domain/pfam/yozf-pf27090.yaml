identifier: Pfam:PF27090
label: YozF-like secreted protein
definition: >-
  This entry represents a family of uncharacterised bacterial proteins with predicted signal peptides, including YozF from Bacillus subtilis. YozF is a 165 amino acid protein containing an N-terminal signal peptide, suggesting it is secreted or localised to the cell envelope. The mature protein after signal peptide cleavage is approximately 140 amino acids. The function of this protein family remains unknown. The protein is composed of a single Ig-like domain that shows some structural similarity to .
