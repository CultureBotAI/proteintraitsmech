identifier: Pfam:PF22823
label: MrpR, C-terminal catalytic domain
definition: >-
  This family includes the MrpR protein from Bacillus subtilis (also known as SPbeta prophage-derived protein YopR), the master repressor of the lytic cycle of the temperate phage SPbeta. MrpR, a DNA-binding protein that has lost its recombinase function, shows a tyrosine recombinase fold with an N-terminal all-α domain and a C-terminal catalytic domain (this entry).
