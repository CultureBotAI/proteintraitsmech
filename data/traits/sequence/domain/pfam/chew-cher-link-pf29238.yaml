identifier: Pfam:PF29238
label: CheW-CheR linker domain
definition: >-
  This entry represents the linker domain connecting the CheW and CheR-like domains in spirochete chemotaxis proteins. The domain is approximately 28-60 residues long and is predicted to be largely helical. It is found in the CheW-CheRlike fusion protein (referred to as CheWS), which functions as an S-adenosylmethionine sensor in the chemotaxis signalling pathway. The linker domain is essential for maintaining the structural integrity of chemotaxis arrays in spirochetes. These proteins are exclusive to the Spirochaetia class, where they play critical roles in chemotaxis, biofilm formation, and cellular morphology transitions.
