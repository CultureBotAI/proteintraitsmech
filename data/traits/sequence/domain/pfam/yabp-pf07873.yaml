identifier: Pfam:PF07873
label: YabP family
definition: >-
  Members of this protein family are the YabP and YqfC proteins of the bacterial sporulation program, as found in Bacillus subtilis, Clostridium tetani, and other spore-forming members of the Firmicutes. The structure of a fragment of the Spore protein YabP from Desulfitobacterium hafniense has been resolved using NMR spectroscopy, showing a homodimer with two monomeric subunits, each consisting of five anti-parallel β-strands.
