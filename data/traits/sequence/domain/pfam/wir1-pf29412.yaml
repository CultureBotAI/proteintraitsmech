identifier: Pfam:PF29412
label: WIR1 pathogen defence protein
definition: >-
  This entry represents the WIR1 (Wheat Induced Resistance 1) family of small proteins found in grasses. The prototype members are WIR1A and WIR1B from Triticum aestivum. These are single-pass type II membrane proteins with an N-terminal cytoplasmic domain, a transmembrane helix, and an extracellular C-terminal domain. WIR1 proteins are associated with pathogen defence in wheat. The family is found across the Poaceae including Triticum, Panicum and related grass genera.
