identifier: Pfam:PF22822
label: MrpR, N-terminal core-binding domain
definition: >-
  This family includes the MrpR protein from Bacillus subtilis (also known as SPbeta prophage-derived protein YopR), the master repressor of the lytic cycle of the temperate phage SPbeta. MrpR, a DNA-binding protein that has lost its recombinase function, shows a tyrosine recombinase fold with an N-terminal core-binding (CB) domain with four α-helices (this entry) and a C-terminal catalytic domain ( ).
