identifier: Pfam:PF21648
label: Integron cassette protein
definition: >-
  This entry represents a group of bacterial uncharacterised sequences from mobile gene cassettes, including Integron cassette protein from Vibrio cholerae ( ). This protein forms a dimer in which each protomer adopts a two-layered α/β fold with an anti-parallel β-sheet of five strands which curves around a pair of antiparallel α-helices. Its specific function is unknown.
