identifier: Pfam:PF22846
label: CATSPERG C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the gamma subunit (CATSPERG), which covers the Stem domain and the transmembrane helix, involved in the association with the channel domain. The CatSper (cation channel of sperm) complex is a tetrameric complex consisting of CATSPER1, CATSPER2, CATSPER3 and CATSPER4 that functions as an alkalinisation-activated calcium channel. This complex is involved in sperm cell hyperactivation, a process needed for sperm motility, which is essential late in the preparation of sperm for fertilisation. This complex requires four auxiliary subunits (beta, gamma, delta and epsilon), which play a role in channel assembly. These are multidomain proteins which share a similar domain organisation.
