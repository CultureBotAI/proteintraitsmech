identifier: Pfam:PF09232
label: Caenorhabditis elegans Her-1
definition: >-
  Her-1 adopts an all-helical structure with two subdomains: residues 19-80 comprise a left-handed three-helix bundle with an overhand connection between the second and third helices, whilst residues 81-164 comprise a left-handed anti-parallel four-helix bundle in which the first helix consists of four consecutive turns of 3-10-helix. Fourteen Cys residues are conserved in all known HER-1 sequences and form seven disulphide bonds. The protein dictates male development in Caenorhabditis elegans, probably by playing a direct role in cell signalling during C. elegans sex determination. It also inhibits the function of tra-2a.
