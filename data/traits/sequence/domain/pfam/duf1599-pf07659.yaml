identifier: Pfam:PF07659
label: Nucleotide modification associated domain 1
definition: >-
  This entry represents an α helical domain with conserved polar residues suggestive of enzymatic function. The domain is associated with the 5-hydroxymethyl uridine synthase and is predicted to play a role in modified base biosynthesis pathways.
