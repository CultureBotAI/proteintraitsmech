identifier: Pfam:PF25369
label: Myosin-1-like, N-terminal SH3 domain
definition: >-
  This SH3 domain is found at the N-terminal end of Myosin-1-3 from Arabidopsis thaliana (MYO1-3) and similar plant proteins. MYO1 is the myosin heavy chain that is required for the cell cycle-regulated transport of various organelles and proteins for their segregation. It is involved in endocytosis via its action in endosomal trafficking.
