identifier: Pfam:PF26578
label: LLG1 domain
definition: >-
  This domain is found in GPI-anchored protein LLG1 from Arabidopsis thaliana and similar plant proteins, including GPI-anchored protein LORELEI (LRE). These proteins are components of the FER-regulated Rho GTPase signalling complex, act as a chaperone and co-receptor for FER and are required for localisation of FER to the plasma membrane. LRE is a female gametophyte-specific component of the signalling pathway required for fertilisation. It is required for reception of the pollen tube by the female gametophyte. It plays a role in double fertilisation and early seed development. It shows an all-α configuration.
