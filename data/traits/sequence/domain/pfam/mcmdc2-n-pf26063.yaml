identifier: Pfam:PF26063
label: MCMDC2, N-terminal domain
definition: >-
  This domain is found N-terminal in the Minichromosome maintenance domain-containing protein 2 (MCMDC2) and related proteins. This domain is related to the N-terminal domain of MCM proteins and is predicted to adopt similar structure. MCMDC2 is essential for invasion of homologous sequences by RAD51- and DMC1-coated single-stranded DNA filaments, or stabilisation of recombination intermediates following strand invasion, both of which are needed to drive stable homologue pairing and DSB repair via recombination.
