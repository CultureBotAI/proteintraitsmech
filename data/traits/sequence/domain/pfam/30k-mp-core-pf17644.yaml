identifier: Pfam:PF17644
label: Jelly-roll domain of 30K viral movement proteins
definition: >-
  This entry represents the core domain found in viral movement proteins (MPs), including the 30K, 54K and 55K protein families. The core domain is conserved among 30K MPs and adopts a predicted secondary structure consisting of one α-helix and seven β-strands. The only sequence feature common to all 30K MPs is a short region between β-strands 1 and 2, which contains several conserved hydrophobic positions and a nearly-invariant aspartate residue that constitutes the sequence signature of the superfamily. This signature aspartate plays a conserved and essential role in viral cell-to-cell movement.
