identifier: Pfam:PF26440
label: Domain of unknown function (DUF8108) central domain
definition: >-
  This entry represents a the central transmembrane domain from a family of uncharacterised proteins from halophilic archaea. Proteins in this family are typically between 150 and 350 amino acids in length. They are predicted to be membrane-associated, as suggested by the presence of two transmembrane helices represented by this domain.
