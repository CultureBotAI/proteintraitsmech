identifier: Pfam:PF12877
label: UPF0606 protein KIAA1549 alpha/beta domain 2
definition: >-
  This entry represents an α/β domain found in the KIAA1549 protein from human ( ) which has been implicated in pilocytic astrocytomas. It has been found to be fused to BRAF gene in many cases of pilocytic astrocytomas. The fusion is due mainly to a tandem duplication of 2 Mb at 7q34. The BRAF protein is a well characterised oncoprotein. It is a serine/threonine protein kinase which is implicated in MAP/ERK signalling, a critical pathway for the regulation of cell division, differentiation and secretion. More recently, KIAA1549 has been described to play a role in photoreceptor function. This protein contains three homologous domains of this type found in tandem.
