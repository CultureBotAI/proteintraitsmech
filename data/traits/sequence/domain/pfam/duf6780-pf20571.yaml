definition: >-
  This presumed domain is functionally uncharacterised. This domain family is found at the C-terminal of fungal sequences, and is typically between 48 and 62 amino acids in length. The domain is found in association with . There is a conserved sequence motif WxRHxAAxK that may be functionally important.
