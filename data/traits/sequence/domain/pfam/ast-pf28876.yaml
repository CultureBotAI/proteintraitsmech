identifier: Pfam:PF28876
label: Allatostatin insects
definition: >-
  This entry represents the allatostatin neuropeptide precursor proteins found in arthropods, particularly insects. Allatostatin is a neuropeptide hormone that strongly inhibits juvenile hormone biosynthesis by the corpora allata. The precursor contains a signal peptide, propeptide region, and the mature allatostatin peptide at the C-terminal end. The mature peptide is processed from the precursor by cleavage at pairs of basic residues. Expression levels vary during development, with highest levels in adult female brain tissue. The function involves negative regulation of juvenile hormone biosynthetic processes through neuropeptide signalling pathways.
