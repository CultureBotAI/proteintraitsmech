identifier: Pfam:PF07593
label: ASPIC and UnbV
definition: >-
  This conserved domain is found associated with in many bacterial proteins. It is also found associated with in several eukaryotic integrin-like proteins (e.g. human ASPIC ) and in several other bacterial proteins. ASPIC, also known as cartilage acidic protein-1 (CRTAC1), is a secreted glycoprotein with roles in development, function and repair of the nervous system. Structural studies revealed that the protein consists of a three-domain fold, including a novel compact β-propeller-TTR combination, in which an extended loop of the TTR plugs the β-propeller core.
