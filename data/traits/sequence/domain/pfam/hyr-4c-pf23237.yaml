identifier: Pfam:PF23237
label: HYR-like domain with 4 cysteines
definition: >-
  This domain is found sometimes in tandem arrays in bacterial cell surface proteins. It contains four cysteines that appear to be likely to form two disulphide bridges between adjacent pairs of domains. It seems likely that these domains form rigid stalks. These domains show sequence similarity to HYR domains.
