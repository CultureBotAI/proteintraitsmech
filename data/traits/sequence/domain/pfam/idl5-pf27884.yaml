identifier: Pfam:PF27884
label: Protein IDA-LIKE 5
definition: >-
  This entry represents a group of from plant proteins, including IDA-like peptides and Precursor of CEP13 (PCP13). IDA contains a β sheet connected to a helix and functions as a secreted signalling peptide involved in floral organ abscission. It promotes abscission zone cell rounding and acts through receptor-like kinases HAESA and HAESA-LIKE2. The proteins are secreted to the extracellular space and expressed specifically in floral abscission zones during abscission. Structural studies show the peptide binds to RLK5 receptor. PCP13 may regulate primary root growth rate and systemic nitrogen (N)-demand signalling. These proteins contain disordered regions.
