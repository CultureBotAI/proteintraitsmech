identifier: Pfam:PF03370
label: Carbohydrate/starch-binding module (family 21)
definition: >-
  The carbohydrate binding type-21 or CBM21 domain is a 90-130 amino acid carbohydrate binding domain. The domain is named after proteins classified in carbohydrate-binding module (CBM) family 21 and is sometimes called starch-binding domain (SBD). The CBM21 domain occurs in several eukaryotic proteins implicated in glycogen metabolism. A glucoamylase active site region or alpha amylase catalytic domain can occur C-terminal to the CBM21 domain. The CBM21 domain of Rhizopus oryzae glucoamylase can bind to raw starch. Most conserved residues are located in a region with a length of 35 in the N-terminal part and in a 15-25 residue motif II at the C terminus of the domain.
