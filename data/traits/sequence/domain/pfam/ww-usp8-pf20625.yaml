identifier: Pfam:PF20625
label: USP8 WW domain
definition: >-
  This entry represents a divergent WW domain found in the USP8 protein, where it has been shown to be involved in auto-inhibition. USP8 is a hydrolase that removes a conjugated ubiquitin from proteins and plays an important regulatory role at the level of protein turnover by preventing degradation. This WW domain might interact with and inhibit the catalytic USP domain by binding the catalytic cleft, and narrowing the entrance to the ubiquitin-binding pocket. Release of autoinhibition may underlie Cushing's disease caused by USP8 mutations.
