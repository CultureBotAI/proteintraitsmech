identifier: Pfam:PF08529
label: NusA N-terminal domain
definition: >-
  This entry represents the N-terminal RNA polymerase-binding domain of bacterial transcription factors such as NusA (N-utilising substance A). NusA is involved in transcriptional pausing, termination and anti-termination. NusA from Thermotoga maritima contains an N-terminal domain and three RNA-binding domains (one S1 domain and two KH domains ). The N-terminal domain consists of a bifurcated coiled β-sheet within an α/β(3)/α/β/α fold, which can be divided into two subdomains: a globular head and a helical body. The globular head subdomain may interact with RNA polymerase, while the helical body displays a similar structure to that of the helical domain in sigma70.
