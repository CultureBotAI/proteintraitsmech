identifier: Pfam:PF29322
label: Neurexin-related protein bam-2 second ConA domain
definition: >-
  This entry represents the second domain of the neurexin-related protein BAM-2 and related proteins. BAM-2 is a single-pass type I membrane protein that belongs to the neurexin family. The protein maintains normal guidance and termination of axonal branches of VC motorneurons and mediates axonal interactions to establish synaptic connections between neurons. BAM-2 associates with cell adhesion protein CASY-1 and plays a role in regulating male mating behaviour. This domain contains a concanavalin A-like lectin/glucanase fold. The specific function of this domain remains to be determined.
