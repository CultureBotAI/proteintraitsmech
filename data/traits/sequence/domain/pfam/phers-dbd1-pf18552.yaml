identifier: Pfam:PF18552
label: 'PheRS DNA binding domain 1 '
definition: >-
  This is a DNA-binding fold domain found in Phenylalanyl-tRNA Synthetase ( ) N-terminal region. This domain belongs to a superfamily of 'winged helix' DNA-biding domains. The topology of DBD-1 and DBD-3 closely resembles the topology of the Z-DNA-binding domain Zalpha of double-stranded RNA (dsRNA) adenosine deaminase and other domains from DNA-binding proteins. Mutational analysis indicate that DBD-1, 2 and 3 play critical roles in tRNA-Phe binding and recognition, i.e., from the drastic reduction of aminoacylation activity seen upon removal of the N-terminal domains.
