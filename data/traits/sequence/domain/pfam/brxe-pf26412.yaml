identifier: Pfam:PF26412
label: BrxE family protein
definition: >-
  This entry represents a family that includes the BrxE proteins found in both bacteria and archaea. These proteins range from 166 to 218 amino acids in length. BrxE is a protein of unknown function found in type 6 BREX phage resistance systems.
