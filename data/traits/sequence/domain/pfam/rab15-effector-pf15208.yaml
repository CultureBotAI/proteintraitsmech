identifier: Pfam:PF15208
label: Rab15 effector
definition: >-
  This entry represents a domain covering the whole length of Rab15 effector protein (REP15) found in metazoa. REP15 is an effector that interacts with Rab GTPases in their active form (GTP-bound) including RAB15, RAB3A-D and RAB34. It controls downstream signalling such as cell proliferation and cell migration. It also regulates transferrin receptor recycling from the endocytic recycling compartment.
