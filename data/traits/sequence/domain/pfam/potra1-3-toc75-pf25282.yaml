identifier: Pfam:PF25282
label: Toc75-like, POTRA domain
definition: >-
  This entry represents the first and third POTRA domains of Toc75 from Arabidopsis thaliana and similar plant proteins. The first and third POTRA domains fold into one another, each containing the conserved core β-α-α-β-β fold seen in other POTRA domains. Toc75 is an essential protein required for the import of protein precursors into chloroplasts. Toc75 has three POTRA domains, represented by and , which together adopt a bent L-shaped conformation.
