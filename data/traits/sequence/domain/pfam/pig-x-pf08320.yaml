identifier: Pfam:PF08320
label: PIG-X / PBN1
definition: >-
  Mammalian PIG-X and yeast PBN1 are essential components of glycosylphosphatidylinositol-mannosyltransferase I. These enzymes are involved in the transfer of sugar molecules. They probably act by stabilizing the mannosyltransferase PIG-M (GPI14 in yeast).
