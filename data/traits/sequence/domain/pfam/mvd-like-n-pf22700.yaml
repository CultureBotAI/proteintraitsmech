identifier: Pfam:PF22700
label: Diphosphomevalonate decarboxylase-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Diphosphomevalonate decarboxylases which catalyse the ATP dependent decarboxylation of (R)-5-diphosphomevalonate to form isopentenyl diphosphate (IPP). Members of this entry function in the mevalonate pathway leading to isopentenyl diphosphate (IPP), a key precursor for the biosynthesis of isoprenoids and sterol synthesis. Diphosphomevalonate decarboxylases are structurally related members of the GHMP superfamily, but do not possess kinase activity. This entry also includes domains from Mevalonate-3-kinase which catalyses the phosphorylation of mevalonate to mevalonate-3-phosphate. This enzyme functions in an alternative mevalonate pathway, which passes through mevalonate 3-phosphate rather than mevalonate 5-phosphate.
