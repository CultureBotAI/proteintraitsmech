identifier: Pfam:PF27661
label: DRC10 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of dynein regulatory complex protein 9/10 (DRC9/10) and similar proteins mainly found in animals. DRC9/10 are components of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary and flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. These proteins contain coiled coil regions. The specific function of this domain remains to be determined.
