identifier: Pfam:PF30413
label: IS1634 family transposase, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of IS1634 family transposases. In some members, it precedes the C-terminal DDE transposase catalytic domain ( ). IS1634 is a bacterial insertion sequence element. The family is found broadly in bacteria. The specific function of this N-terminal domain remains to be determined, but it may be involved in DNA binding or protein-protein interactions required for transposition.
