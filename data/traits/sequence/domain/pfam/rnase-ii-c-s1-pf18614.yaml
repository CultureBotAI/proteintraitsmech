identifier: Pfam:PF18614
label: RNase II-type exonuclease C-terminal S1 domain
definition: >-
  This entry describes the C-terminal S1 domain found in type 2 RNase (DrII) exonucleases, such as DrR63 from Deinococcus radiodurans. Structure analysis of DrII indicates that it has an N-terminal HTH domain which interacts with a flexible loop that connects two β-strands from the conserved C-terminal S1 domain, forming a β-wing fold common in wHTH domains.
