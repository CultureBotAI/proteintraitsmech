identifier: Pfam:PF28925
label: KIAA1586 C-terminal domain
definition: >-
  This entry represents a domain found in the C-terminal region of KIAA1586 proteins. KIAA1586 is an E3 SUMO-protein ligase that facilitates UBE2I/UBC9- mediated SUMO2 modification of target proteins. The N-terminal region of KIAA1586 (residues 1-223) is sufficient for E3 SUMO-protein ligase activity and contains SUMO2 interaction regions. Members of this group are found primarily in vertebrates. The domain is approximately 73 amino acids in length. The specific function of this domain remains to be determined.
