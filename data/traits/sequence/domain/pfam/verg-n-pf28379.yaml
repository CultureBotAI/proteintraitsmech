identifier: Pfam:PF28379
label: Acyl-CoA N-acyltransferase verG N-terminal domain
definition: >-
  This entry represents the N-terminal domain of VerG, an acyl-CoA N- acyltransferase involved in verrucosidin biosynthesis in fungi. While the full-length VerG protein is involved in verrucosidin biosynthesis, the specific function of this N-terminal domain remains to be determined. VerG is part of a gene cluster that mediates the biosynthesis of the neurotoxin verrucosidin, a methylated alpha-pyrone polyketide that inhibits oxidative phosphorylation in mitochondria. The complete VerG protein functions as an acyl-CoA N-acyltransferase in the secondary metabolite pathway that produces this mycotoxin.
