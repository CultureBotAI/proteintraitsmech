identifier: Pfam:PF16732
label: Type IV minor pilin ComP, DNA uptake sequence receptor
definition: >-
  This entry represents the type IV pilus non-core minor pilin PilE. It is an essential component of the type IV pilus (T4P) that plays a role in surface and host cell adhesion, colonization, biofilm maturation, virulence, and twitching, a form of surface-associated motility facilitated by cycles of extension, adhesion, and retraction of T4P fibers.
