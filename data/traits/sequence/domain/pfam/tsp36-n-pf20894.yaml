identifier: Pfam:PF20894
label: Small heat shock protein Tsp36, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Small heat shock protein p36 from the parasitic flatworm Taenia saginata (Tsp36) and similar proteins from flatworms. Tsp36 is organised into two α-crystallin domains, two repeat segments on the N-terminal side, a linker region, and a long N-terminal segment of about 80 residues (this entry). This domain consists of a series of helices with sharp turns between them marked by prolines.
