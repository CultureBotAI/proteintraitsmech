identifier: Pfam:PF03319
label: Ethanolamine utilisation protein EutN/carboxysome
definition: >-
  This entry represents a family of related bacterial proteins with roles in ethanolamine and carbon dioxide metabolism. The ethanolamine utilization protein EutN is involved in the cobalamin-dependent degradation of ethanolamine. The crystal structure of EutN contains a central five-stranded β-barrel, with an α-helix at the open end of this barrel ( ). The structure also contains three additional β-strands, which help the formation of a tight hexamer, with a hole in the centre. This suggests that EutN forms a pore, with an opening of 26 Amstrong in diameter on one face and 14 Amstrong on the other face. Beside the Escherichia coli ethanolamine utilization protein EutN and the Synechocystis sp. carboxysome (beta-type) structural protein CcmL, this family also includes alpha-type carboxysome structural proteins CsoS4A and CsoS4B (previously known as OrfA and OrfB), propanediol utilization protein PduN, and some hypothetical homologous of various bacterial microcompartments. The carboxysome, a polyhedral organelle, participates in carbon fixation by sequestering enzymes. It is the prototypical bacterial microcompartment. Its enzymatic components, ribulose bisphosphate carboxylase/oxygenase(RuBisCO) and carbonic anhydrase (CA), are surrounded by a polyhedral protein shell. Similarly, the ethanolamine utilization (eut) microcompartment, and the 1,2-propanediol utilization (pdu) microcompartment encapsulate the enzymes necessary for the process of cobalamin-dependent ethanolamine degradation, and coenzyme B12-dependent degradation of 1,2-propanediol, respectively, within its polyhedral protein shells. It is interesting that both carboxysome structural proteins CcmL and CsoS4A assemble as pentamers in the crystal structures, which might constitute the twelve pentameric vertice…
