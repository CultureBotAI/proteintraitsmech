identifier: Pfam:PF22805
label: Protein M, smaller domain
definition: >-
  This domain is found in proteins from Mycoplasmaceae, including Uncharacterized protein MG281 from Mycoplasma genitalium, also known as protein M. This virulence protein consists of two domains. The larger one ( ) binds the IgG light chain to block the binding of antibody to antigen and includes a leucine-rich repeat (LRR)-like subdomain. This domain folds into two α-helices.
