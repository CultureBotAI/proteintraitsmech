identifier: Pfam:PF01020
label: Ribosomal L40e family
definition: >-
  This entry represents the L40 ribosomal domain from both archaea and eukaryotes. In eukaryotes, L40 is fused to ubiquitin moieties, and this fusion protein is known as Ubiquitin-ribosomal protein eL40 fusion protein or UBL40. Specific endopeptidases cleave these precursor molecules to release ubiquitin moieties. UBL40 plays important roles in gametogenesis. This fusion may also have a pre-cleavage function in ribosome assembly. In Saccharomyces cerevisiae, eL40 is essential for translation of a subset of cellular transcripts, including stress response transcripts, such as DDR2. In humans, it has been reported to be required for cap-dependent translation of vesicular stomatitis virus mRNAs. In archaea and some eukaryotic species such as Candida albicans, this domain covers the whole length of the protein, which is known as Large ribosomal subunit protein eL40. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which the…
