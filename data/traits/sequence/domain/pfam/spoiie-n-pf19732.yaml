identifier: Pfam:PF19732
label: SpoIIE, N-terminal domain
definition: >-
  This is the N-terminal domain of Stage II sporulation protein E (SpoIIE), which includes the 10 transmembrane domains and the regulatory domain, the latter located adjacent the PP2C phosphatase domain. The regulatory domain mediates the formation of dimers between SpoIIE molecules, required for phosphatase activation. An N-terminal 45-residue long α-helix makes intramolecular contacts with the switch helices (α1 and α2) of the phosphatase domain.
