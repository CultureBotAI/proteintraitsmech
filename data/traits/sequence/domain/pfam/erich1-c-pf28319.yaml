identifier: Pfam:PF28319
label: Glutamate-rich protein 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of glutamate-rich protein 1 (ERICH1). The function of this C-terminal domain remains to be determined. ERICH1 protein contains extensive disordered regions enriched in various residue types including acidic and basic residues. The protein undergoes phosphorylation at multiple serine and threonine residues and acetylation at lysine residues. ERICH1 has been identified by proteomics analyses and is expressed across multiple human tissues. The protein may interact with MTG1, according to IntAct database. Conservation across vertebrates suggests an important biological role.
