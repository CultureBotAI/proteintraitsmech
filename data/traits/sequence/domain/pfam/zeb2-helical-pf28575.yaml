identifier: Pfam:PF28575
label: ZEB2-like helical domain
definition: >-
  This entry represents a helical domain found in ZEB2 and related transcription factors involved in secondary metabolite biosynthesis in fungi. ZEB2 is a bZIP family transcription factor that specifically controls transcription of the zearalenone biosynthesis cluster genes. Related proteins are involved in the regulation of other secondary metabolite clusters, including the W493 A and B biosynthesis pathway. These proteins belong to the bZIP family and contain a basic leucine zipper domain for DNA binding. This helical domain is a conserved structural feature associated with the regulatory function. The domain is found in filamentous fungi, particularly within the Ascomycota. The specific function of this helical domain remains to be determined.
