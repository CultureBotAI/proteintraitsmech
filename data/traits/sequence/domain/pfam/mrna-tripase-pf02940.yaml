identifier: Pfam:PF02940
label: mRNA capping enzyme, beta chain
definition: >-
  The mRNA capping enzyme in yeast is composed of two subunits, alpha and beta. The alpha subunit has guanylyltransferase activity, whilst the beta subunit is an RNA 5'-triphosphatase (RTPase). This entry represents a domain found in the mRNA capping enzyme beta subunit Cet1. RTPase catalyzes the first step in the mRNA cap formation process, the removal of the gamma-phosphate of triphosphate terminated pre-mRNA. This activity is metal-dependent. The 5'-end of the resulting mRNA diphosphate is subsequently capped with GMP by RNA guanylytransferase, and then further modified by one or more methyltransferases. The mRNA cap-forming activity is an essential step in mRNA processing. The RTPases are not conserved among eukarya and this subgroup includes fungal and protozoal RTPases. The RTPase domain of the mimivirus RTPase-GTase fusion mRNA capping enzyme also belongs to this subgroup. The domain is related to the CYTH domain. Cet1 has a novel active site fold whereby an eight-strand β-barrel forms a topologically closed tunnel known as the "triphosphate tunnel". Enzymes with similar structures are able to bind triphosphorylated substrates and requiring divalent metal ions as activators. They were thus called triphosphate tunnel metalloenzymes (TTMs). Cetl paralogue, Ctl1 (capping enzyme RNAtriphosphatase-like 1), is a RNA 5'-triphosphatase probably involved in an RNA processing event other than mRNA capping.
