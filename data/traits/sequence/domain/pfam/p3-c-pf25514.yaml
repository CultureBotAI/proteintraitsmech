identifier: Pfam:PF25514
label: P3 major capsid protein C-terminal
definition: >-
  This entry represents the C-terminal domain of the Major capsid protein P3. The P3 major capsid protein adopts a 'double-sandwich' structure comprising two eight-stranded viral β-sandwich domains with a jellyroll fold, each of which contains a 12-residue α-helix. This protein trimerises through a 'trimerisation loop' sequence, and is incorporated within the viral capsid.
