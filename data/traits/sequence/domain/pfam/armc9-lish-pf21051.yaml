identifier: Pfam:PF21051
label: ARMC9, LIS1 homology motif
definition: >-
  This entry represents the Lis1H motif found in the ARMC9 protein family. The ARMC9 protein plays a role in ciliogenesis, being essential for the proper acetylation and polyglutamylation of ciliary microtubules, as well as for the control of cilium length.
