identifier: Pfam:PF26498
label: Domain of unknown function (DUF8164)
definition: >-
  This entry represents a family of uncharacterised proteins from halophilic archaea. The proteins are primarily found in members of the Halobacteria class, including genera such as Natrialba, Natrarchaeobaculum, and Halobiforma. The proteins in this family typically range from 200 to 300 amino acids in length. These proteins contain an Ig-like fold.
