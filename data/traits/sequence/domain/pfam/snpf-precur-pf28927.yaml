identifier: Pfam:PF28927
label: Short neuropeptide F precursor
definition: >-
  This entry represents the short neuropeptide F (sNPF) precursor. These secreted proteins are neuropeptide precursors that are processed to produce multiple bioactive peptides including sNPF peptides and RLRF peptides. The proteins regulate food intake and body size in insects. The precursors contain multiple processing sites flanked by dibasic residues and produce several distinct neuropeptides that are C-terminally amidated. They belong to the NPY neuropeptide family and is found throughout arthropods, particularly insects from orders including Diptera, Hymenoptera, Lepidoptera and Coleoptera. Members are expressed in the central nervous system and play roles in neuropeptide signalling pathways.
