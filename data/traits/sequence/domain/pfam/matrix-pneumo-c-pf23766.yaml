identifier: Pfam:PF23766
label: Pneumovirus matrix protein C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the pneumoviral matrix protein. The C-terminal domain of the RSV M protein (residues 140-255) consists of a flattened β-barrel formed by two 3-stranded antiparallel β-sheets. The regions linking the β-sheets between strands 2 and 3, and strands 5 and 6, are largely α-helical. This domain contains a positively charged pocket that may serve as an interaction site. A striking planar arrangement of conserved tyrosine residues (Y163, Y197, Y215, Y229, Y236, Y237) encircles the domain, suggesting a role in membrane association. Sequence comparisons indicate the C-terminal domain is more conserved among pneumoviruses compared to the N-terminal domain. However, surface-exposed loop regions still represent areas of significant diversity, likely involved in species-specific interactions. The C-terminal domain is loosely tethered to the N-terminal domain by a flexible linker.
