identifier: Pfam:PF30527
label: Cyanobacterial DnaJ chaperone, C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 130 residues found exclusively in cyanobacterial DnaJ-type molecular chaperones. The domain is located C-terminal to the J-domain ( ), which is responsible for stimulating the ATPase activity of the DnaK/Hsp70 chaperone. DnaJ proteins function as co-chaperones that assist in protein folding and the cellular stress response. This cyanobacteria-specific C-terminal domain is distinct from other DnaJ C-terminal domains and its specific function remains to be determined.
