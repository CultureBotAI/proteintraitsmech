identifier: Pfam:PF29551
label: Protein terminus
definition: >-
  This entry represents the N-terminal region of protein terminus from Drosophila melanogaster. Terminus is a blastoderm-specific protein that encodes a potential DNA-binding finger. The protein is expressed from the cellular blastoderm stage during gastrulation and is no longer detected by the end of germ band extension. Terminus transcripts are concentrated posteriorly in the embryo and the protein contains a C3H1-type zinc finger domain following this region. The specific function of this developmental protein remains to be determined.
