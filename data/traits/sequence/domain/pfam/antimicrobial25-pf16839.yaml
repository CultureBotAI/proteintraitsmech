identifier: Pfam:PF16839
label: Nematode antimicrobial peptide
definition: >-
  This family of antimicrobial peptides is found in nematodes. It includes ABF-1 and ABF-2 proteins from C. elegans. Recombinant ABF-2 has been shown to possess potent microbicidal activity against Gram-positive and Gram-negative bacteria, and yeasts.
