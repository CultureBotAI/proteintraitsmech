identifier: Pfam:PF09108
label: Switch protein XOL-1, N-terminal
definition: >-
  This domain, found in sex-determining protein Xol-1, adopts a secondary structure consisting of five α helices and six antiparallel β sheets, in a β-α-β-β-β-α-β-α-α-α-β arrangement. The fold of this family is similar to that found in ribosomal protein S5 domain 2-like. The active site of the enzyme is found at the interface between this domain and the C-terminal GHMP-like domain.
