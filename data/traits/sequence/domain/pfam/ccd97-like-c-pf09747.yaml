identifier: Pfam:PF09747
label: Coiled-coil domain containing protein 97-like, C-terminal
definition: >-
  This domain is found at the C-terminal of Coiled-coil domain-containing protein 97 (CCD97). In some proteins, this domain is found as two conserved domains separated by a region of low complexity, spanning some 200 residues. The function is unknown.
