identifier: Pfam:PF27894
label: ECM13-like, helical domain
definition: >-
  This entry represents a helical domain found in Protein ECM13 and the uncharacterised protein YJR115W from Saccharomyces cerevisiae and similar fungal proteins. ECM13 may be involved in cell wall organisation and biogenesis. The function of this domain is unknown.
