identifier: Pfam:PF16563
label: Coiled-coil and interaction region of P66A and P66B with MBD2
definition: >-
  This entry represents a short coiled-coil interaction region found in the transcriptional repressors P66alpha and P66beta. P66alpha and P66beta form complex with MBDs (methyl-binding domain-containing proteins) via a coiled-coil region on each. The MBD2-NuRD complex recognizes methylated DNA and silences expression of associated genes through histone deacetylase and nucleosome remodeling functions.
