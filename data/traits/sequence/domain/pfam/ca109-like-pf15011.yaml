identifier: Pfam:PF15011
label: Ribosome biogenesis protein C1orf109-like
definition: >-
  Ribosome biogenesis protein C1orf109 is involved in the cytoplasmic maturation steps of pre-60S ribosomal particles by promoting the release of shuttling protein RSL24D1/RLP24 from the pre-ribosomal particles. It has been first identified as the downstream target of a protein kinase, casein kinase 2 (CK2) which is upregulated in cancer cells. C1orf109 has been found upregulated in cancer cells and therefore, it has been suggested to be important in the regulation of cancer cell proliferation. The precise mechanism of CK2 targeting C1orf109 is not well characterised. It is found to be localised in the nucleus and cytoplasm.
