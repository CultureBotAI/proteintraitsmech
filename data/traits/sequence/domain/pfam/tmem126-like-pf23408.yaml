identifier: Pfam:PF23408
label: TMEM126-like protein
definition: >-
  This entry represents a family of proteins from nematodes that have sequence and structural similarity to the TMEM126 family of integral membrane proteins that are involved in the assembly of complex I. Therefore these proteins may have a similar function. However, it has also been suggested that this assembly function was only acquired by the TMEM126B proteins.
