identifier: Pfam:PF14028
label: Lantibiotic biosynthesis dehydratase C-term
definition: >-
  This domain is often found within longer proteins that contain lantibiotic dehydratase domains (see ), such as Epidermin biosynthesis protein EpiB, Subtilin biosynthesis protein SpaB and Nisin biosynthesis protein NisB. It occurs also in bacteriocin biosynthesis single-domain proteins, including the pyridine synthases GE2270A (PbtD, ) and TbtD ( ).
