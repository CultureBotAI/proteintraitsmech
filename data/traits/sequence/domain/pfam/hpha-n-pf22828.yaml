identifier: Pfam:PF22828
label: HphA N-terminal heme-binding domain
definition: >-
  HphA (heme scavenger) is a secreted hemophore that binds and acquires heme from hemoglobin. It consists of two domains: N-terminal heme binding domain (this entry) and C-terminal β-barrel that is related to domains members of the Outer membrane β-barrel superfamily. The N-terminal domain has a clamp-like structure consisting of six antiparallel β-strands and an α-helix. Two histidines located on loops coordinate the heme.
