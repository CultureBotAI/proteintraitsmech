identifier: Pfam:PF29489
label: Cyclic-di-GMP receptor FimW, middle PilZ domain
definition: >-
  This entry represents the middle PilZ domain of FimW, a cyclic-di-GMP receptor protein from Pseudomonas aeruginosa and related proteobacteria. FimW regulates type IV pili (T4P) elongation and is required for T4P-mediated surface attachment and walking motility during early phases of surface colonisation.
