identifier: Pfam:PF15738
label: 'Bacterial toxin of type II toxin-antitoxin system, YafQ '
definition: >-
  YafQ is a ribosome-associated endoribonuclease that serves as part of a toxin-antitoxin system, for which DinJ is the antidote component. It associates with the ribosome and blocks translation elongation through sequence-specific and frame-dependent mRNA cleavage.
