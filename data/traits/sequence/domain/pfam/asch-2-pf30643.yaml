identifier: Pfam:PF30643
label: ASCH domain
definition: >-
  This entry represents an ASCH domain that covers most of the protein in bacterial N(4)-acetylcytidine amidohydrolase (ac4C amidohydrolase), which catalyses the hydrolysis of N4-acetylcytidine (ac4C). This domain also includes Uncharacterized protein YhfF.
