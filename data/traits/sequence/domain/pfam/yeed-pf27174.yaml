identifier: Pfam:PF27174
label: YeeD uncharacterised protein
definition: >-
  This entry represents the YeeD protein, an uncharacterised protein of 101 amino acids found in Bacillus subtilis. The protein forms a four helical bundle domain that comprises the entire protein. YeeD is encoded by the gene yeeD (locus tag BSU06790) on the B. subtilis chromosome. The function of this protein remains to be determined.
