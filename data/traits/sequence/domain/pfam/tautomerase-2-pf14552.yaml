identifier: Pfam:PF14552
label: Tautomerase enzyme
definition: >-
  Members of the tautomerase superfamily (TSF) are characterised by a β-α-β building block and a catalytic amino terminal proline. There are five known TSF families, which are named for the first characterised member. This entry represents the malonate semialdehyde decarboxylase (MSAD) family. MSAD is part of a bacterial pathway for the degradation of the soil fumigant known as 1,3-dichloropropene. There are five homologues identified, including YusQ/YodA/YrdN from Bacillus subtilis, IolK from Lactobacillus casei strain BL23, and Bp4401 from Burkholderia phymatum. IolK was found in a degradative pathway for myo-inositol, but its disruption does not affect growth or myo-inositol utilization. Bp4401 has a modest hydratase activity. YrdN, YodA, and IolK have comparable decarboxylase and hydratase activities, but this activity is missing in YusQ and Bp4401.
