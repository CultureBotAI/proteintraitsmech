identifier: Pfam:PF29037
label: DSE1 N-terminal domain
definition: >-
  This entry represents a domain of DSE1 proteins, found in ascomycetes. DSE1 is a daughter-specific expression protein involved in cell wall metabolism. DSE1 is required for the separation of mother and daughter cells during cytokinesis. The protein is expressed periodically during cell division and localised to the bud neck. Expression requires the transcription factors ACE2 and SWI5, as well as the kinases CBK1 and MOB2. This domain contains a β-propeller fold, composed by WD40 repeats.
