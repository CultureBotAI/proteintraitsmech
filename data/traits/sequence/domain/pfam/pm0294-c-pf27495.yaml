identifier: Pfam:PF27495
label: PM0294 C-terminal domain
definition: >-
  This entry represents the C-terminal PH domain of PM0294, an uncharacterised protein from Pasteurella multocida. PM0294 is 423 amino acids in length. This domain is found predominantly in Bacteroidota, particularly within Flavobacteriia and Sphingobacteriia. The function of this C-terminal PH domain remains to be determined.
