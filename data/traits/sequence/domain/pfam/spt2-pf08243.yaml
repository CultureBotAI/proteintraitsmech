identifier: Pfam:PF08243
label: SPT2 chromatin protein
definition: >-
  This entry includes the Saccharomyces cerevisiae (Baker's yeast) protein SPT2 which is a chromatin protein involved in transcriptional regulation. These proteins shows conservation of several domains across numerous species, including having a cluster of positively charged amino acids. This cluster probably functions in the binding properties of the proteins. Sin1p/Spt2p probably modulates the local chromatin structure by binding two strands of double-stranded DNA at their crossover point. Sin1p/Spt2p has sequence similarity to HMG1 and serves as a negative transcriptional regulator of a small family of genes that are activated by the SWI/SNF chromatin-remodelling complex. It is also involved in maintaining the integrity of chromatin during transcription elongation. Sin1p/Spt2 is required for, and is directly involved in, the efficient recruitment of the mRNA cleavage/polyadenylation complex. Spt2 is also involved in regulating levels of histone H3 over transcribed regions.
