identifier: Pfam:PF21305
label: GspD-like, N0 domain
definition: >-
  GspD is a type II general secretion pathway protein involved in protein export. This entry represents the N0 domain found at the N-terminal of GspD type II secretins and its close homologues. These proteins form a dodecameric ring, in which the N0 domain mediate extensive contacts suggesting that dodecameric N0 ring is an important feature of T2SS secretins. This domain is also found in virion export proteins, proteins thought to form a channel across the host outer membrane for the purposes of extruding the bacteriophage.
