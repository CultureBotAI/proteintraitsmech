identifier: Pfam:PF25300
label: Dep-1 third Fn3-like domain
definition: >-
  This entry represents the third Fn3-like domain. This domain is found in the Receptor-type tyrosine-protein phosphatase Dep-1 from Caenorhabditis elegans and related proteins. Dep-1 is involved in the dephosphorylation of the receptor let-23 and the β-integrin subunit pat-3. It is involved in the regulation of the cell fate during the development of the vulva and the excretory system. It is also involved indirectly in the negative regulation of let-23 signalling and vulval induction. Dep-1 is a multidomain protein which is predicted to contain a number of Fn3-like domains arranged in tandem.
