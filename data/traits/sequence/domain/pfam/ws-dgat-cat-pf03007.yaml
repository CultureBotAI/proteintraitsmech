identifier: Pfam:PF03007
label: Wax ester synthase/diacylglycerol acyltransferase catalytic domain
definition: >-
  This entry represents the N-terminal catalytic domain of a number of wax ester synthase/diacylglycerol acyltransferases (WS/DGATs), predominantly from bacteria and plants. They catalyse the condensation of a fatty alcohol and a fatty acyl-Coenzyme A (acyl-CoA) and they can also catalyse the transesterification of acyl-CoAs with diacylglycerols. These are bifunctional enzymes that share low overall sequence similarity but all WS/DGATs share a conserved HHXXXDG motif, which is also found in other acyltransferases. This domain contains the conserved HHXXXDG motif and consists of a mixed β-sheet flanked by four α-helices and a small antiparallel β-sheet.
