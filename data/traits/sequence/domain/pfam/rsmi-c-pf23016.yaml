identifier: Pfam:PF23016
label: RsmI C-terminal HTH domain
definition: >-
  This entry represents a small α-helical domain at the C terminus of RsmI mainly from proteobacteria and actinomycetes, that folds into a typical three helical DNA/RNA binding bundle containing an HTH motif. This domain is found in Ribosomal RNA small subunit methyltransferase I (RsmI) and related proteins. RsmI is an S-adenosyl-L-methionine-dependent methyltransferase that catalyses the 2-O-methylation of the ribose of cytidine 1402 (C1402) in 16S rRNA. It may play a role in fine-tuning the shape and functions of the P-site to increase the translation fidelity. In vitro, it is active on the assembled 30S subunit, but not naked 16S rRNA or 70S ribosomes.
