identifier: Pfam:PF10640
label: mRNA capping enzyme catalytic subunit, RNA triphosphatase domain
definition: >-
  mRNA-capping enzyme catalytic subunit from Vaccinia virus (MCEL, also known as mRNA-capping enzyme D1 subunit) catalyses the hydrolysis of the 5' triphosphate end of the pre-mRNA, the capping of the resulting diphosphate RNA end with GMP and the methylation of the GpppN cap [1-3]. It consists of an N-terminal RNA triphosphatase (TPase)-guanylyltransferase (GTase) module, and a C-terminal guanine-N7-methyltransferase (MTase) module ( ). The N-terminal module comprises a TPase domain, represented in this entry, followed by the GTase at the C-terminal, which consists of the nucleotidyltransferase (NTPase, ) and OB fold ( ) domains. This domain catalyses the hydrolysis of the the 5' triphosphate end of the pre-mRNA.
