identifier: Pfam:PF30405
label: Phage integrase core-binding domain
definition: >-
  This entry represents a core-binding (CB) domain found in a subset of prophage and phage integrases, including Prophage integrase IntF from Escherichia coli. In the full-length protein, this domain is located between the N-terminal Arm-DNA-bind_3 domain ( ) and the C-terminal catalytic Phage_integrase domain ( ). Integrases catalyse site-specific recombination for integration of phage DNA into the host chromosome and, together with excisionase, for excision of prophage DNA. In Escherichia coli K12, this domain is found in IntF, encoded by the cryptic prophage CP4-6. The entry is found predominantly in beta and gammaproteobacteria.
