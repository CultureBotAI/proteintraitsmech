identifier: Pfam:PF29194
label: Peptidase M3 N-terminal domain
definition: >-
  This entry represents an N-terminal domain found in M3 family oligoendopeptidases, predominantly from Bacillota. The domain is located N-terminal to the M3 peptidase catalytic domain ( ). M3 peptidases are metallopeptidases that cleave oligopeptides. This domain is related to . The specific function of this N-terminal domain remains to be determined but may act as a propeptidase domain.
