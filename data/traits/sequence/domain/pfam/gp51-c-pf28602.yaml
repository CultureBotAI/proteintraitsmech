identifier: Pfam:PF28602
label: Baseplate hub assembly protein Gp51 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in Gp51 and related T4 phage proteins. The Baseplate Hub Assembly Protein family consists of chaperones that play a crucial role in the assembly of the baseplate's central hub during bacteriophage tail formation. These proteins are essential for the proper construction of the baseplate, which is a complex structure at the base of the bacteriophage tail. It serves as a platform for tail assembly and is critical for the phage's ability to attach to host bacteria and inject its genetic material. Members of the Baseplate Hub Assembly Protein family facilitate the correct folding and assembly of baseplate components, ensuring the formation of a functional viral structure. Tape measure (TM) protein assembly into tails requires the action of tail assembly chaperones (TACs). Gp26 and Gp51 have been shown to be TAC proteins.
