identifier: Pfam:PF22917
label: PRISE-like Rossmann-fold domain
definition: >-
  This NAD(P)-binding Rossmann-fold-like domain is found in a number of enzymes with oxidoreductase activity from eukaryotes and uncharacterised bacterial sequences. Amongst them are the PRISEs (Progesterone 5beta-reductase and/or iridoid synthase-like 1,4-enone reductases) that are involved in cardenolide and iridoid biosynthesis. This domain is also found in the short chain dehydrogenase ausT, involved in the terpenoid biosynthesis pathway.
