identifier: Pfam:PF31027
label: XK-related protein 4 C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 50 residues found in XKR4/6/7 (XK-related protein 4/6/7) and similar sequences from vertebrates. This domain follows the multi-pass transmembrane XK-related domain ( ). XKR4 is a phospholipid scramblase that exposes phosphatidylserine on apoptotic cell surfaces. During apoptosis, caspase cleavage removes this C-terminal region to generate the active processed form of the protein.
