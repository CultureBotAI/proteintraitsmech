identifier: Pfam:PF13344
label: Haloacid dehalogenase-like hydrolase
definition: >-
  These sequences form one of the structural subclasses of the Haloacid Dehalogenase (HAD) superfamily of aspartate-nucleophile hydrolases. The superfamily is defined by the presence of three short catalytic motifs. The classes are defined based on the location and the observed or predicted fold of a so-called "capping domain", or the absence of such a domain. Class I consists of sequences in which the capping domain is found in between the first and second catalytic motifs. Class II consists of sequences in which the capping domain is found between the second and third motifs. Class III sequences have no capping domain in either of these positions. The Class IIA capping domain is predicted to consist of a mixed α-β fold with the basic pattern: Helix-Helix-Helix-Sheet-Helix-Loop-Sheet-Helix-Sheet-Helix. Presently, this subfamily covers the eukaryotic phosphoglycolate phosphatase, as well as four further subfamilies covering closely related sequences in eukaryotes, in Gram-positive bacteria and in Gram-negative bacteria. The Escherichia coli NagD gene and the Bacillus subtilis AraL gene are members of this subfamily but are not members of the any of the presently defined equivalogs within it. NagD is part of the NAG operon responsible for N-acetylglucosamine metabolism. Genes from several organisms have been annotated as NagD, or NagD-like. However, without data on the presence of other members of this pathway, (such as in the case of Yersinia pestis) these assignments should not be given great weight. The AraL gene is similar and is part of the L-arabinose operon. A gene from Halobacterium has been annotated as AraL, but no other Ara operon genes have been annotated. Many of the genes in this subfamily have been annotated as "pNPPase" "4-nitrophenyl phosphatase" or "NPPa…
