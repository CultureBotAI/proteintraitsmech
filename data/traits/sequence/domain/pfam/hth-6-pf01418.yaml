identifier: Pfam:PF01418
label: Helix-turn-helix domain, rpiR family
definition: >-
  This family represents small uncharacterised proteins of approximately 108 residues found in Actinomycetes, particularly Streptomyces and Nocardioides. These proteins typically consist of this single domain only. STRING network analysis shows strong functional association with SIS domains ( ) and HTH_6 transcription factors ( ), suggesting a possible role in sugar metabolism regulation.
