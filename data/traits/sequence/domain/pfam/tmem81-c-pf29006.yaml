identifier: Pfam:PF29006
label: Transmembrane protein 81 C-terminal domain
definition: >-
  This entry represents the transmembrane region of transmembrane protein 81 (TMEM81). TMEM81 is an essential fertilisation factor required for male fertility. The protein forms part of a conserved trimeric sperm complex with IZUMO1 and SPACA6 which bridges sperm and oocyte membranes during fertilisation by binding to IZUMO1R/JUNO on the oocyte. TMEM81 is a single-pass type I membrane protein with an extracellular immunoglobulin-like domain and a cytoplasmic C-terminal region. The protein is highly expressed in sperm and localised to the cell membrane.
