identifier: Pfam:PF21803
label: Nab2-type CCCH zinc finger 4
definition: >-
  This entry represents the CCCH-type fourth zinc finger of Nab2p (Znf4), which is also found in similar fungal sequences. It doesn't participate in RNA binding. Poly(A)-binding proteins (PABPs) protect against nuclease activity and are co-transcriptionally recruited to the nascent poly(A) tail. Nab2 belongs to one of the three major families of PABPs. It contains seven CCCH-type zinc fingers (Znf1-7) that are found in three structurally independent tandems, Nab2p Znf1-2, Nab2p Znf3-4 and Nab2p Znf5-7.
