identifier: Pfam:PF27785
label: Dynein axonemal intermediate chain 3 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of dynein axonemal intermediate chain 3 (DNAI3, also known as WD repeat-containing protein 63) and similar animal sequences. DNAI3 is a component of the multisubunit axonemal dynein complex involved in cilia function and acts as a negative regulator of cell migration through inhibition of Arp2/3 complex-mediated actin polymerisation.
