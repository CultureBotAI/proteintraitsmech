identifier: Pfam:PF03594
label: Benzoate membrane transport protein
definition: >-
  Several proteins in this entry have been identified as benzoate transporters. They exhibit about 30% identity to each other and show limited sequence similarity to members of the aromatic acid:H+symporter (AAHS) family of the major facilitator superfamily (MFS). Interestingly, they have different protein structures comparing to the MFS members. For instance, Corynebacterium glutamicum BenE (NCgl2326) is predicted to have 11 transmembrane α-helices, instead of 12 transmembrane α-helices found in the MFS members. BenE is also lacking some conserved domains/amino acids usually found in the MFS members. Therefore, BenE is thought to be a novel type of benzoate transporter. This family is classified as TC number 2.A.46 under the transporter classification (TC) system.
