identifier: Pfam:PF00545
label: ribonuclease
definition: >-
  This entry represents Guanyl-specific ribonuclease N1 from Neurospora crassa, and similar sequences from fungi and bacteria, including Ribonuclease from Bacillus amyloliquefaciens (also known as Barnase) and Ribonuclease clavin from Aspergillus clavatus. Barnase hydrolyses the phosphodiester bonds in RNA and oligoribonucleotides, resulting in 3'-nucleoside monophosphates via 2',3'-cyclophosphate intermediates. Clavin has the same substrate specificity as alpha-sarcin. It is specific for purines in both single- and double-stranded RNA. Its toxic action on eukaryotic cells is the result of cleavage of a single phosphodiester bond in the 60S subunit of ribosomes.
