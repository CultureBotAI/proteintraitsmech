identifier: Pfam:PF27639
label: Vacuole membrane protein 1 C-terminal helical domain
definition: >-
  This entry represents the C-terminal helical domain of vacuole membrane protein 1 (VMP1), also known as transmembrane protein 49 (TMEM49). This domain is found across eukaryotes including plants, animals, and protists. VMP1 is a multi-pass transmembrane protein localised to the endoplasmic reticulum membrane. The full-length protein functions as a phospholipid scramblase involved in lipid homeostasis and membrane dynamics, and is required for autophagosome formation. In Dictyostelium, VMP1 is essential for protein secretion, organelle biogenesis, contractile vacuole function, and development. The protein typically contains eight transmembrane helices with this C-terminal domain encompassing the final transmembrane segments and cytoplasmic tail. The specific function of this C-terminal domain remains to be determined.
