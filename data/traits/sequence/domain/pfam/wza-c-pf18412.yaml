identifier: Pfam:PF18412
label: Outer-membrane lipoprotein Wza C-terminal domain
definition: >-
  This is the C-terminal domain found in Wza, an integral outer membrane lipoprotein, which is essential for group 1 capsule export in Escherichia coli. The domain is exposed on the cell surface and is suggested to mimic antimicrobial peptide pore formation.
