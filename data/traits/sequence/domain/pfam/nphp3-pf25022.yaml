identifier: Pfam:PF25022
label: Nephrocystin-3 domain
definition: >-
  This domain is found in human Nephrocystin-3 (NPHP3) and similar animal proteins. This domain is predicted to show a β-sheet with α-helices at both sides. NPHP3 is a protein required for normal ciliary development and function. It inhibits disheveled-1-induced canonical Wnt-signalling activity and may also play a role in the control of non-canonical Wnt signalling which regulates planar cell polarity. Loss of the NPHP3 function results in situs inversus, congenital heart defects, and embryonic lethality in mice.
