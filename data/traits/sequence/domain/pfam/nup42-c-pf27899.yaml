identifier: Pfam:PF27899
label: NUP42 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of nucleoporin NUP42 and similar proteins mainly found in animals and fungi. The specific function of this C-terminal domain remains to be determined. NUP42 is a component of the nuclear pore complex required for the export of mRNAs containing poly(A) tails from the nucleus into the cytoplasm. The protein localises to the nuclear pore complex at the nuclear membrane. NUP42 contains an N-terminal C3H1-type zinc finger domain and multiple FG repeats that serve as interaction sites for karyopherins.
