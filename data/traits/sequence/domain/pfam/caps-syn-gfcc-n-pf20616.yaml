identifier: Pfam:PF20616
label: Capsule biosynthesis GfcC, N-terminal
definition: >-
  Many bacteria are covered in a layer of surface-associated polysaccharide called the capsule. These capsules can be divided into four groups depending upon the organisation of genes responsible for capsule assembly, the assembly pathway and regulation. This family plays a role in group 4 capsule biosynthesis. These proteins have a β-grasp fold. Two β-grasp domains, D2 and D3, are arranged in tandem. There is a C-terminal amphipathic helix which packs against D3. A helical hairpin insert in D2 binds to D3 and constrains its position, a conserved arginine residue at the end of this hairpin is essential for structural integrity. This entry represents D2 domain found at the N-terminal.
