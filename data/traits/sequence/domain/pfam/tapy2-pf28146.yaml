identifier: Pfam:PF28146
label: Type IVa secretion system protein TapY2-like
definition: >-
  Members of this family, found exclusively in gammaproteobacteria, are about 100 amino acid residues in length and include two invariant Cys residues. The family is named for TapY2 (Type IV Aeromonas Pilus Y2), which has been described as the counterpart to PilY2 from the type IVa pilus system Pil in Pseudomonas aeruginosa. However, sequence similarity between TapY2 and PilY2 is very low, and is not certain to represent a true homology.
