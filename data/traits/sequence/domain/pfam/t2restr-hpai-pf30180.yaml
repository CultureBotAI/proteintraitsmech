identifier: Pfam:PF30180
label: Type II restriction endonuclease HpaI
definition: >-
  This entry represents a type II restriction endonuclease domain found in diverse bacteria. The prototype enzyme HpaI recognises the double-stranded DNA sequence 5'-GTTAAC-3' and cleaves after the third nucleotide. This domain belongs to the restriction endonuclease superfamily which includes structurally related enzymes such as SwaI, HincII, NgoBV and EcoRV.
