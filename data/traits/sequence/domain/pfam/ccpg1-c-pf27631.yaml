identifier: Pfam:PF27631
label: CCPG1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of human cell cycle progression protein 1 (CCPG1), Pre-B-cell leukemia transcription factor-interacting protein 1 (PBIP1) and similar proteins from vertebrates. This domain is located in the lumenal region of the protein following the transmembrane helix. The specific function of this C-terminal domain remains to be determined. CCPG1 is a type II membrane protein localised to cytoplasmic granule membranes that limits guanine nucleotide exchange activity of MCF2L toward RHOA which results in an inhibition of both its transcriptional activation ability and its transforming activity and may be involved in regulation of Rho-mediated signalling pathways and cell cycle regulation. The protein contains multiple coiled-coil regions and extensive disordered regions. PBIP1 inhibits the binding of PBX1-HOX complex to DNA, blocks the transcriptional activity of E2A-PBX1 and tethers estrogen receptor-alpha (ESR1) to microtubules and allows them to influence estrogen receptors-alpha signalling.
