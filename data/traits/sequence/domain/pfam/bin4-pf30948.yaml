identifier: Pfam:PF30948
label: DNA-binding protein BIN4
definition: >-
  This entry represents a domain found in DNA-binding protein BIN4 (BRASSINOSTEROID INSENSITIVE 4, also known as MIDGET) from plants. BIN4 is a nuclear protein that functions as a component of the DNA topoisomerase VI complex, where it binds double-stranded DNA. The protein is required for chromatin organisation and progression of endoreduplication cycles. BIN4 interacts with TOP6A, RHL1 and itself, but not with TOP6B. Loss of BIN4 activates ATM- and ATR-dependent DNA damage responses in postmitotic cells and causes a severe dwarf phenotype in Arabidopsis.
