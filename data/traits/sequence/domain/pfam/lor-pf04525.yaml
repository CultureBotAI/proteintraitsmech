identifier: Pfam:PF04525
label: LURP-one-related
definition: >-
  The structure of protein LURP-one-related 15 (At5g01750) has been solved. It comprises a 12-stranded β-barrel with a central C-terminal α-helix. This helix is thought to be a transmembrane helix. It is structurally similar to the C-terminal domain of the Tubby protein. In plants LURP1 plays a role in defense against pathogens.
