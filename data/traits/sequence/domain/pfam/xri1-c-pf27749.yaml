identifier: Pfam:PF27749
label: XRI1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of protein XRI1 from Arabidopsis thaliana and similar plant proteins. XRI1 is required for mitotic division of the generative cell nucleus and the development of mature tricellular pollen grains, and for male and female meiosis. The protein interacts via its C-terminal domain with MIP1. XRI1 is induced by X-rays and bleomycin treatment through ATM-dependent DNA damage signalling pathways. Disruption of XRI1 results in complete sterility. The function of this domain remains to be determined.
