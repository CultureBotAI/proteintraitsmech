identifier: Pfam:PF27116
label: YjiV N-terminal domain
definition: >-
  This entry represents a β-barrel domain which is found in the Druantia protein DruE and related bacterial proteins. This domain is also found in the Putative uncharacterized protein YjiV which is could be, however, the product of a pseudogene. DruE is a component of antiviral defense system Druantia type I, composed of DruA, DruB, DruC, DruD and DruE. Expression of Druantia in E.coli (strain MG1655) confers resistance to phage lambda, SECphi18, SECphi27 and T4. This protein is probably a helicase.
