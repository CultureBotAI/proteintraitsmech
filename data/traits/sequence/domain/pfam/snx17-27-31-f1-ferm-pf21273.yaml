identifier: Pfam:PF21273
label: Sortin nexin 17/27/31, FERM domain, F1 lobe
definition: >-
  Sorting nexin 17 and 31 are known as PX-FERM proteins, a sub-group of the PX superfamily that contain a defining PtdInsP-binding PX domain, and a C-terminal 4.1, ezrin, radixin, moesin (FERM) domain. They are modular peripheral membrane proteins that act as central scaffolds mediating protein-lipid interactions, cargo binding, and regulatory protein recruitment. The FERM domain comprises three lobes termed F1, F2, and F3: F1 adopts a ubiquitin-like fold, F2 is a helical structure similar to acyl-CoA binding protein ( ), and F3 is similar to the phosphotyrosine binding (PTB)/pleckstrin homology domain and referred to as atypical FERM domain ( ). This entry represents the F1 lobe that folds as a prototypical ubiquitin/Ras association (RA) domain.
