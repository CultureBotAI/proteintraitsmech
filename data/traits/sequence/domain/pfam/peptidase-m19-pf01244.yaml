identifier: Pfam:PF01244
label: Membrane dipeptidase (Peptidase family M19)
definition: >-
  This group of peptidases belong to the MEROPS peptidase family M19 (membrane dipeptidase family, clan MJ). The protein fold of the peptidase domain for members of this family resembles that of Klebsiella urease, the type example for clan MJ. Renal dipeptidase ( ), also known as microsomal dipeptidase or membrane-bound dipeptidase, is a zinc-dependent metalloenzyme that hydrolyses a wide range of dipeptides. It is involved in renal metabolism of glutathione and its conjugates. It is a homodimeric disulphide-linked glycoprotein attached to the renal brush border microvilli membrane by a GPI-anchor. A glutamate residue has recently been shown to be important for the catalytic activity of renal dipeptidase. Renal dipeptidase seems to be evolutionary related to hypothetical proteins in the PQQ biosynthesis operons of Acinetobacter calcoaceticus and Klebsiella pneumoniae.
