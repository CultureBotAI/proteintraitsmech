identifier: Pfam:PF29118
label: SUP-10 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in SUP-10 proteins, spanning approximately 125 amino acids. This domain is found in nematodes. SUP-10 is a putative potassium channel regulatory protein that may contribute to coordination of muscle contraction as a regulatory subunit of a nonessential potassium channel complex. SUP-10 may form a complex with SUP-9 and UNC-93 where SUP-10 and UNC-93 act as regulatory subunits of the two pore potassium channel SUP-9. The protein localises to dense body-like structures in body-wall muscle cells and colocalises with SUP-18. The specific function of this domain remains to be determined
