identifier: Pfam:PF26208
label: Putative phage tail fibre N-terminal domain
definition: >-
  This entry represents the N-terminal region of a putative phage tail fibre protein. Members of this group are found in tailed bacteriophages and bacterial prophages, including Phage PhiTE protein phiTE_241 . These proteins are predicted to form a homotrimeric arrangement.
