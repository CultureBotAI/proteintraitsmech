identifier: Pfam:PF27107
label: Dynein regulatory complex subunit 11-like, N-terminal domain
definition: >-
  This domain is found at the N-terminal of human Dynein regulatory complex subunit 11 (DRC11), a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. This domain is predicted to adopt an all-α configuration.
