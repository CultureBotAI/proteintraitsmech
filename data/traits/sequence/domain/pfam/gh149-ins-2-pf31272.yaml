identifier: Pfam:PF31272
label: GH149 phosphorylase insertion domain 2
definition: >-
  This entry represents the second insertion domain (Dom 2) found within the catalytic domain of glycoside hydrolase family 149 ( ) beta-(1->3) glucan phosphorylases, which are annotated as Cellobiose phosphorylase proteins. This domain is approximately 85 residues in length and is located in proximity to the substrate binding gate. Structural analysis shows that Dom 2 has higher B-factors than the rest of the protein, suggesting it is more dynamic. The domain shows no significant similarity to any known protein structures by DALI analysis (Z scores less than 5). It is found in bacteria, predominantly in Flavobacteriaceae (Bacteroidota) and also in Pseudomonadota. A related insertion domain (Dom 1) is represented by . The function of this domain remains to be determined.
