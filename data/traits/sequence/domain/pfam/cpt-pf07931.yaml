identifier: Pfam:PF07931
label: Chloramphenicol phosphotransferase-like protein
definition: >-
  The members of this family are all similar to chloramphenicol 3-O phosphotransferase (CPT, ) expressed by Streptomyces venezuelae. Chloramphenicol (Cm) is a metabolite produced by this bacterium that can inhibit ribosomal peptidyl transferase activity and therefore protein production. By transferring a phosphate group to the C-3 hydroxyl group of Cm, CPT inactivates this potentially lethal metabolite.
