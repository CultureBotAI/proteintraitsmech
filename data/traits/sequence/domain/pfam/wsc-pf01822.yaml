identifier: Pfam:PF01822
label: WSC domain
definition: >-
  The WSC domain is a putative carbohydrate binding domain. The domain contains up to eight conserved cysteine residues that may be involved in disulphide bridges. The Trichoderma harzianum beta-1,3 exoglucanase contains two copies of the WSC domain, while the yeast SLG1 protein contains only one. This domain folds as a sandwich of five antiparallel β-sheet and a single α-helix, with similarity with the hepatocyte growth factor ( ,.
