identifier: Pfam:PF00011
label: Hsp20/alpha crystallin family
definition: >-
  Prokaryotic and eukaryotic organisms respond to heat shock or other environmental stress by inducing the synthesis of proteins collectively known as heat-shock proteins (hsp). Amongst them is a family of proteins with an average molecular weight of 20 Kd, known as the hsp20 proteins. These seem to act as chaperones that can protect other proteins against heat-induced denaturation and aggregation. Hsp20 proteins seem to form large heterooligomeric aggregates. These low-molecular-weight proteins are evolutionarily related to alpha-crystallin. Alpha-crystallin is an abundant constituent of the eye lens of most vertebrate species. Its main function appears to be to maintain the correct refractive index and transparency of the lens. It is also found in other tissues where it seems to act as a chaperone. Other related proteins include certain surface antigens. This entry represents a conserved C-terminal domain of about 100 residues characteristic of this group of proteins.
