identifier: Pfam:PF29466
label: COS11 F-box domain
definition: >-
  This entry represents the F-box domain found in COS111 proteins from Saccharomyces cerevisiae, Debaryomyces hansenii, Candida albicans, and related fungal species. COS111 proteins are F-box proteins involved in the ubiquitin conjugation pathway. The N-terminal domain precedes the characteristic F-box domain found in these proteins. F-box proteins function as substrate recognition components of SCF ubiquitin-protein ligase complexes. The function of this specific domain remains to be determined.
