identifier: Pfam:PF10021
label: Microbial-type PARG, catalytic domain
definition: >-
  This entry represents the catalytic domain of the Poly(ADP-ribose) glycohydrolase (PARG) homologue predominantly found in bacteria and fungi. This enzyme hydrolyses the ribose-ribose bonds present in poly(ADP-ribose) (PAR) chains. Its structure shows a typical macro domain folding consisting of a seven-stranded β-sheet sandwiched between nine α-helices.
