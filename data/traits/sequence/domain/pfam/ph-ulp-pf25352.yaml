identifier: Pfam:PF25352
label: Ubiquitin-like protease PH domain
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in the probable ubiquitin-like-specific protease 2A and 2B from Arabidopsis thaliana and similar plant proteins. These proteins contain a C-terminal Peptidase_C48 catalytic domain. The PH domain is found either before or after the peptidase domain in different proteins, suggesting it may have been subject to domain rearrangement during evolution.
