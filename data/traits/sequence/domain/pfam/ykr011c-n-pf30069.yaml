identifier: Pfam:PF30069
label: YKR011C N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein YKR011C found in Saccharomycetales. The protein is expressed at moderate levels in yeast cells during log phase growth. The function of this domain remains to be determined.
