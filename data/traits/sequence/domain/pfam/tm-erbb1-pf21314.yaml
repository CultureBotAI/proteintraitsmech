identifier: Pfam:PF21314
label: Epidermal growth factor receptor transmembrane-juxtamembrane segment
definition: >-
  Epidermal growth factor receptor (ErbB) family is a class of receptor tyrosine kinases (RTKs) that have a pivotal role in the processes of cell growth, proliferation, and differentiation. They exist on the cell surface as dimers in both active and inactive states, which switch between them through conformational changes upon ligand binding. They suffer a strong lateral dimerization that leads to proper assembly of their extracellular ligand-binding, single-span transmembrane, and cytoplasmic kinase domains which is key for ErbB activation. The transmembrane (TM) and juxtamembrane region of these receptors are essential for dimerization and activation. This entry represents the TM and juxtamembrane segment of EGFR, ErbB2 and ErbB4 and similar sequences.
