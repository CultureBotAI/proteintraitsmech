identifier: Pfam:PF14976
label: Yippee homolog 2 zinc finger protein
definition: >-
  This entry represents a family of proteins (previously known as FAM72) that is distantly related to and named after the drosophila Yippee, a zinc-binding protein. In contrast to the other Yippee-like proteins ( , , ), this family of proteins possesses some distinct features such as the presence of a second putative zinc binding site that is unique to them. The constituent zinc coordinating residues of this second site are invariant within the family suggesting that this is likely a genuine zinc binding site.
