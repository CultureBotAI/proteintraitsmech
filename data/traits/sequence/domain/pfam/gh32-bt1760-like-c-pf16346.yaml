identifier: Pfam:PF16346
label: GH32, BT1760-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of BT1760 from Bacteroides thetaiotaomicron and similar bacterial proteins that predominantly belong to the glycoside hydrolase family 32 (GH32, ). BT1760 is an endo-levanase. This protein requires its C-terminal β-sandwich domain to fold and function correctly. This domain shows two facing β-sheets consisting of seven and eight antiparallel β-strands displayed in such a way that a concave surface is formed on the top sheet at the same side of the protein which harbours the active centre.
