identifier: Pfam:PF05067
label: Manganese containing catalase
definition: >-
  Catalases ( ) are antioxidant enzymes that catalyse the conversion of hydrogen peroxide to water and molecular oxygen. Hydrogen peroxide is produced as a consequence of oxidative cellular metabolism and can be converted to the highly reactive hydroxyl radical via transition metals, this radical being able to damage a wide variety of molecules within a cell, leading to oxidative stress and cell death. Catalases act to neutralise hydrogen peroxide toxicity, and are produced by all aerobic organisms ranging from bacteria to man. There are three structurally independent classes of catalases: ubiquitous mono-functional haem-containing catalases ( ), bifunctional haem-containing catalase-peroxidases that are closely related to plant peroxidases ( ), and non-haem manganese-containing catalases. This entry represents the non-haem Mn-catalases, which are found in several bacterial species. The structure of the Mn catalase from Lactobacillus plantarum reveals a homo-hexamer, where each subunit contains a dimanganese active site that is accessed by a single substrate channel. The dimanganese active site performs a two-electron catalytic cycle that alternately oxidises and reduces the dimanganese atoms in a manner that is similar to its haem-counterpart found in other catalases.
