identifier: Pfam:PF25526
label: Liprin-alpha-like coiled coil domain 2
definition: >-
  This entry describes the dimeric coiled coil (CC2) found in liprin-alpha proteins mainly from animals. The CC2 domain is located after the coiled coil domain 1 (CC1). The long CC2 coiled coils are toward the outside of this CC1 oligomer, making them accessible for recognition by presynaptic binding partners of liprin-alpha, such as ELKS and RIM. This domain is usually found associated with . Liprin-alpha proteins contain three copies (repeats) of the SAM domain, which is a protein-protein interaction domain. They may form heterodimers with liprin-beta proteins through their SAM domains. They participate in mammary gland development and in axon guidance; in particular, liprin-alpha is involved in formation of the presynaptic active zone. Liprin was originally identified as binding partners of the receptor protein tyrosine phosphatase LAR (leukocyte common antigen-related), which functions in axon guidance and mammary gland development. In vertebrates, there are two families of liprins, liprin-alpha and liprin-beta, which have four (alpha1-4) and two (beta1-2) members. In C. elegans and Drosophila, there are only one liprin-alpha (known as Syd-2 and Dliprin-alpha) and one liprin-beta. Another liprin family member, liprin-gamma, has also been identified in Drosophila. Liprins contain an N-terminal coiled-coil domain and a C-terminal liprin homology (LH) region comprised of three sterile alpha motif (SAM) domains. The N-terminal coiled coils of liprin-alpha mediate interactions with adapter proteins at the presynaptic active zone, while the SAM repeats bind proteins such as LAR receptor tyrosine phosphatase.
