identifier: Pfam:PF02006
label: Phosphopantothenate/pantothenate synthetase
definition: >-
  Proteins in this family include pantothenate synthetase ( ) from Methanosarcina mazei and 4-phosphopantoate--beta-alanine ligase, also known as phosphopantothenate synthetase, ( ) from Pyrococcus kodakaraensis. Pantothenate synthetase catalyses the condensation of pantoate with beta-alanine in an ATP-dependent and ADP-producing reaction. 4-phosphopantoate--beta-alanine ligase catalyses the conversion of (R)-4-phosphopantoate and beta-alanine to 4'-phosphopantothenate in the CoA biosynthesis pathway. It cannot use (R)-pantoate as substrate and thus does not display pantothenate synthetase (PS) activity.
