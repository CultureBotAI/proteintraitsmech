identifier: Pfam:PF10099
label: Anti-sigma-K factor rskA, C-terminal
definition: >-
  This domain, formerly known as DUF2337, is found at the C-terminal end of the anti-sigma-K factor from Mycobacterium tuberculosis (RskA) and similar bacterial sequences. RskA (regulator of sigma K) represses the extra-cytoplasmic function (ECF) sigma factor K (sigK) by binding to it and inhibiting its activity. This leads to a decreased expression of SigK-regulated genes, such as MPB70 and MPT83. RskA from Mycobacterium bovis is however probably dysfunctional, due to at least one of the two natural occurring polymorphisms in its encoding gene, when compared to M. tuberculosis. This leads to an increased expression of SigK-regulated genes.
