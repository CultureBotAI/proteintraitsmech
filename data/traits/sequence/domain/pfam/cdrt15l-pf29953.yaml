identifier: Pfam:PF29953
label: CMT1A duplicated region transcript 15 protein-like
definition: >-
  This entry represents the CMT1A duplicated region transcript 15 protein-like (CDRT15L) family found in primates. These are uncharacterised membrane proteins predicted to be single-pass transmembrane proteins. The family includes CDRT15L2 which is expressed in testis and other tissues, according to bgee database. The proteins contain disordered regions and a predicted transmembrane domain. The function of this family remains to be determined. This entry also includes Putative uncharacterized protein CDRT15P3 which could be the product of a pseudogene.
