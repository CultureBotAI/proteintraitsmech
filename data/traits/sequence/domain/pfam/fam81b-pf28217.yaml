identifier: Pfam:PF28217
label: FAM81B
definition: >-
  This entry includes FAM81A and FAM81B from animals. FAM81A plays a crucial role in facilitating the interaction and assembly of proteins within the postsynaptic density, and its presence is important for maintaining normal synaptic function. It is required for neuronal activity and its accumulation at the postsynaptic density results in enlargement of dendritic spines. It interacts with DLG4/PSD-95, GRIN2B/GLUN2B and SYNGAP1 to facilitate condensate formation.
