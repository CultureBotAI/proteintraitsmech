identifier: Pfam:PF22558
label: Restriction Endonuclease associating with ARP
definition: >-
  This entry represents a rapidly evolving Restriction Endonuclease (REase) family of bacterial proteins observed in host systems and predicted to counter the action of viral ribosylating toxins, associated with ARG and Rhodanese-Phosphatase domain (ARP). It potentially functions as an effector in these systems.
