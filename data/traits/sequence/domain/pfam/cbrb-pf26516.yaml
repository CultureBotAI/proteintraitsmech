identifier: Pfam:PF26516
label: Inner membrane protein CbrB
definition: >-
  This entry represents Inner membrane protein CbrB from Escherichia coli and related enterobacterial proteins. CbrB (also known as YieI) is predicted to be an integral inner membrane protein. The specific function of CbrB remains to be determined, but it is conserved among various E. coli strains including pathogenic variants. Unlike the similarly named CbrB in Pseudomonas species, which is part of a two-component regulatory system, the E. coli CbrB does not appear to have a known regulatory function. The protein is encoded by the cbrB gene (b3716 in E. coli K-12 MG1655).
