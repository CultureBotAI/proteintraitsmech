identifier: Pfam:PF04352
label: ProQ/FINO family
definition: >-
  This entry represents a structural domain consisting of six helices in an irregular non-globular array; it also contains two small β-hairpins. This domain is found at the C terminus of the RNA-binding fertility inhibitor FinO that represses the conjugative transfer of F-like plasmids in Escherichia coli. FinO blocks the translation of TraJ, a positive activator of transcription of gene thereby protecting it from degradation, and catalyses FinP-TraJ mRNA hybridization. Interactions between these two RNAs are predicted to block the TraJ ribosomal binding site. FinO is largely helical, binds to its highest affinity binding site within FinP as a monomer, and contains two distinct RNA binding regions. This domain is also found as an N-terminal domain in ProQ, a protein required for full activation of the osmoprotectant transporter ProP in Escherichia coli.
