identifier: Pfam:PF14065
label: Pvc16 N-terminal domain
definition: >-
  This entry represents a C-terminal β sandwich domain of approximately 110 residues found in Pvc16 proteins. The domain is located C-terminal to the Pvc16_N domain ( ). These proteins are components of extracellular contractile injection systems (eCIS), which are phage tail-like structures used by bacteria to deliver effector proteins. This family is found in bacteria, predominantly Cyanobacteriota, Pseudomonadota, and Actinomycetota. The function of this domain remains to be determined.
