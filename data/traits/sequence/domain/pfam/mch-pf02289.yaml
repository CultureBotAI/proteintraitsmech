identifier: Pfam:PF02289
label: Cyclohydrolase (MCH)
definition: >-
  Methenyltetrahydromethanopterin cyclohydrolase ( ) catalyses the interconversion of methenyltetrahydromethanopterin and N(5)formyltetrahydromethanopterin, and is found in both archaea and bacteria. In methanogenic archaea, this enzyme is involved in the production of methane from carbon dioxide. In the sulphate-reducer Archaeoglobus fulgidus, this enzyme is involved in the tetrahydromethanopterin-dependent oxidation of lactate. In Gram-negative methylotrophic bacteria this enzyme is involved in the tetrahydromethanopterin-dependent oxidation of formaldehyde to formate. The protein functions as a homodimer or homotrimer, depending on the organism.
