identifier: Pfam:PF22237
label: SO2946-like, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of SO2946 from Shewanella oneidensis ( ). This protein consists of a short helical N-terminal domain and a large C-terminal domain with the jelly-roll topology, identified as a putative carbohydrate-binding module. This domain can also be found in other regions in bacterial proteins.
