label: Domain of unknown function (DUF6836)
definition: >-
  This domain is predominantly found in proteins from bacteria, including CLOLEP_02462 from Clostridium leptum ( ). It adopts an α/β structure consisting of eight antiparallel β-sheet and α-helices packed on one side of it with an overside connection ( ). The function of this protein is unknown.
