identifier: Pfam:PF24200
label: Domain of unknown function (DUF7425)
definition: >-
  This entry represents a domain of unknown function found in bacteriophage proteins. The domain is around 90-95 amino acids in length. It is found in uncharacterised proteins from phages that infect Enterobacteria such as Salmonella and Shigella species as well as Dickeya. The specific function of this domain remains unknown. Structure prediction suggests that these proteins may form a homotetramer (iPTM=0.88). The domain contains a three twisted stranded β-sheet.
