identifier: Pfam:PF22420
label: Macrophage Locus Protein A, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Macrophage growth locus, subunit A (MglA) from Francisella tularensis ( ) and similar sequences from gammaproteobacteria. MglA forms a complex with stringent starvation protein A (SspA) and this complex interacts with both RNA polymerase (RNAP) and the pathogenicity island (FPI) gene regulator to activate FPI transcription.
