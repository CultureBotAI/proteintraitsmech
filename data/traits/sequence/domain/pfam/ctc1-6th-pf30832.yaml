identifier: Pfam:PF30832
label: CST, telomere maintenance, complex subunit CTC1 sixth domain
definition: >-
  This entry represents the sixth domain of CTC1 from vertebrates. CTC1 is one of the three components of the CST complex that assists Shelterin to protect the ends of telomeres from attack by DNA-repair mechanisms. Mutations in human CTC1 have been recognised as contributing to cerebroretinal microangiopathy.
