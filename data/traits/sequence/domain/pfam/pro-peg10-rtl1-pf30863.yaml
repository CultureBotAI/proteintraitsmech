identifier: Pfam:PF30863
label: PEG10/RTL1 protease domain
definition: >-
  This entry represents the protease (PRO) domain of eukaryotic retrotransposon-derived proteins from the Mart family, RTL1 and PEG10. Mammal RTL1 plays an essential role in capillaries endothelial cells for the maintenance of feto-maternal interface and for development of the placenta. PEG10 is a retrotransposon-derived protein that binds its own mRNA and self-assembles into virion-like capsids that are released from cells, enabling intercellular transfer of PEG10 mRNA.
