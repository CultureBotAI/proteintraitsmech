identifier: Pfam:PF29915
label: Seroin C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in seroin, a silk protein from lepidopteran insects, particularly Galleria mellonella. Seroin is a secreted glycoprotein produced by silk glands and is involved in silk production. The protein contains repeat regions and N-linked glycosylation sites. Seroin expression is regulated during development, reaching maximum levels during cocoon spinning. The function of this domain remains to be determined. This domain contains a β-sheet fold.
