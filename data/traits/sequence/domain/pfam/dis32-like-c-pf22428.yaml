identifier: Pfam:PF22428
label: DIS3-like exonuclease 2-like, C-terminal
definition: >-
  This domain is found at the C-terminal of DIS3-like exonuclease 2 from Schizosaccharomyces pombe (Dis32) and related proteins from Schizosaccharomyces. Dis32, also known as Dis3l2, is a 3'-5'-exoribonuclease that specifically recognises RNAs polyuridylated at their 3' end and mediates their degradation. This domain shows three antiparallel β-strands that show OB-fold characteristics.
