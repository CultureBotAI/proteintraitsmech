identifier: Pfam:PF28581
label: Basic helix-loop-helix protein 144 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of basic helix-loop-helix transcription factor bHLH144 from plants. This domain precedes the C-terminal bHLH DNA-binding domain and contains multiple disordered regions with compositional bias. While the full-length bHLH144 protein functions in transcriptional control, the specific function of this N-terminal domain remains to be determined. Related transcription factors contain a small β-sheet region similar to this domain. However, this domain seems to be exclusive for bHLH144. bHLH144 belongs to the large family of bHLH transcription factors in Arabidopsis and forms homodimers as well as interacts with the LHW protein. The protein is localised to the nucleus and functions in DNA-binding transcriptional regulation.
