identifier: Pfam:PF29603
label: KpnI N-terminal domain
definition: >-
  This entry represents the N-terminal domain of KpnI-like type 2 restriction enzymes. KpnI from Klebsiella pneumoniae recognises the sequence 5'-GGTACC-3' and cleaves after C-5. Many proteins containing this domain also possess a C-terminal HNH endonuclease domain ( or ). The family is found in proteins across bacteria, predominantly in Streptomyces and related Actinomycetes within Actinomycetota, as well as in Pseudomonadati. The specific function of this N-terminal domain remains to be determined.
