identifier: Pfam:PF25115
label: Agd3 deacetylase domain
definition: >-
  This entry represents the carbohydrate esterase (CE) domain of the exopolysaccharide deacetylase Agd3 from Aspergillus fumigatus ( ), a protein required for biofilm formation. This domain has structural similarity to members of the carbohydrate esterase family (CE4) but the amino acid sequences is too divergent and constitutes a founding member of a CE family.
