identifier: Pfam:PF15481
label: Chondroitin proteoglycan 4
definition: >-
  This entry represents a helical domain found in chondroitin proteoglycan 4 (CPG4). In Caenorhabditis elegans, chondroitin proteoglycans (CPGs) serve essential structural and developmental roles throughout the organism's lifecycle. These proteins carry chondroitin chains that are typically attached to low-complexity or intrinsically disordered regions. Functional analyses showed that CPGs in C. elegans not only contribute to extracellular matrix formation but also participate in more specialized processes such as embryogenesis, including roles in cell division and cytokinesis.
