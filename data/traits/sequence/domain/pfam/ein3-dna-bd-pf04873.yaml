identifier: Pfam:PF04873
label: Ethylene insensitive 3, DNA-binding domain
definition: >-
  This entry represents the DNA-binding domain of EIN3 and EIN3-like proteins. Ethylene insensitive 3 (EIN3) proteins are a family of plant DNA-binding proteins that regulate transcription in response to the gaseous plant hormone ethylene, and are essential for ethylene-mediated responses. In the presence of ethylene, dark-grown dicotyledonous seedlings undergo dramatic morphological changes collectively known as the 'triple response'. In Arabidopsis, these changes consist of a radial swelling of the hypocotyl, an exaggeration in the curvature of the apical hook, and the inhibition of cell elongation in the hypocotyl and root.
