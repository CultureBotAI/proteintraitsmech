identifier: Pfam:PF30448
label: Diguanylate cyclase DgcQ, linker domain
definition: >-
  This entry represents a cytoplasmic linker domain found in the diguanylate cyclase DgcQ and related proteins. It is located between the periplasmic CHASE7 sensor domain ( ) and the C-terminal GGDEF catalytic domain ( ). DgcQ catalyses the synthesis of cyclic-di-GMP (c-di-GMP), a bacterial second messenger that regulates cellulose biosynthesis and biofilm formation. The enzymatic activity of DgcQ is enhanced by uridine triphosphate and inhibited by N-carbamoyl-aspartate. The family is found in Enterobacterales, including Enterobacteriaceae. The specific function of this linker domain remains to be determined, but it may be involved in signal transduction between the sensor and catalytic domains.
