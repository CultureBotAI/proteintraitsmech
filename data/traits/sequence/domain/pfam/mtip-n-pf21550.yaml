identifier: Pfam:PF21550
label: Myosin A tail domain interacting protein, N-terminal
definition: >-
  This domain is found at the N-terminal end of Myosin A tail domain interacting protein from Plasmodium falciparum (MTIP) and in similar sequences mainly found in Apicomplexa. MTIP is one of the proteins that empower host cell invasion. This domain adopts an EF hand configuration.
