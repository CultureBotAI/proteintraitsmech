identifier: Pfam:PF29465
label: Hydrophobin-like domain
definition: >-
  This entry represents a hydrophobin-like protein 1 found in fungi. Hydrophobins are small amphipathic proteins that can self-assemble at hydrophobic-hydrophilic interfaces. These proteins contain four disulfide bonds that are characteristic of hydrophobin proteins. The specific function of this family remains to be determined.
