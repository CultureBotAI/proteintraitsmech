identifier: Pfam:PF29196
label: TraB family protein, C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in TraB family proteins. The domain is approximately 130-180 residues in length and is located downstream of the TraB N-terminal domain ( ). TraB proteins are involved in bacterial conjugation and plasmid transfer systems. This C-terminal region contains multiple transmembrane helices and is predicted to be membrane- associated. The domain is found in both Bacteria and Archaea. The specific function of this domain remains to be determined.
