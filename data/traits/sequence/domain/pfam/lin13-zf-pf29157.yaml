identifier: Pfam:PF29157
label: LIN-13 C2H2 zinc finger domain
definition: >-
  This entry represents a C2H2 zinc finger domain found in the middle region of LIN-13 proteins and related zinc finger proteins from nematodes. LIN-13 is a zinc finger protein involved in repression of vulval fate in Caenorhabditis elegans, possibly through a tumour suppressor protein Rb-mediated mechanism. LIN-13 interacts with chromobox protein homologue HPL-2 and plays a role in recruiting HPL-2 to specific chromatin sites. The protein contains multiple C2H2 zinc finger domains distributed throughout its length, with this domain representing one of the zinc finger regions. The specific function of this individual zinc finger domain remains to be determined.
