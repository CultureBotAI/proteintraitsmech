identifier: Pfam:PF00175
label: 'Oxidoreductase NAD-binding domain '
definition: >-
  Bacterial ferredoxin-NADP + reductase may be bound to the thylakoid membrane or anchored to the thylakoid-bound phycobilisomes. Chloroplast ferredoxin-NADP + reductase ( ) may play a key role in regulating the relative amounts of cyclic and non-cyclic electron flow to meet the demands of the plant for ATP and reducing power. It is involved in the final step in the linear photosynthetic electron transport chain and has also been implicated in cyclic electron flow around photosystem I where its role would be to return electrons from ferredoxin to the cytochrome B-F complex. This domain is present in a variety of proteins that include, bacterial flavohemoprotein, mammalian NADH-cytochrome b5 reductase, eukaryotic NADPH-cytochrome P450 reductase, nitrate reductase from plants, nitric-oxide synthase, bacterial vanillate demethylase, as well as others.
