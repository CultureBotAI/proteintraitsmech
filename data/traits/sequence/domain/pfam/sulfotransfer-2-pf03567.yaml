identifier: Pfam:PF03567
label: Sulfotransferase family
definition: >-
  This entry consists of a number of carbohydrate sulphotransferases that transfer sulphate to carbohydrate groups in glycoproteins and glycolipids. These include: Carbohydrate sulphotransferases 8 and 9, which transfer sulphate to position 4 of non-reducing N-acetylgalactosamine (GalNAc) residues in both N-glycans and O-glycans. They function in the biosynthesis of glycoprotein hormones lutropin and thyrotropin, by mediating sulphation of their carbohydrate structures. Carbohydrate sulphotransferase 10, which transfers sulphate to position 3 of the terminal glucuronic acid in both protein- and lipid-linked oligosaccharides. It directs the biosynthesis of the HNK-1 carbohydrate structure, a sulphated glucuronyl-lactosaminyl residue carried by many neural recognition molecules, which is involved in cell interactions during ontogenetic development and in synaptic plasticity in the adult. Carbohydrate sulphotransferases 11 - 13, which catalyze the transfer of sulphate to position 4 of the GalNAc residue of chondroitin. The orthologue in Caenorhabditis elegans is known as carbohydrate sulfotransferase chst-1. Chondroitin sulphate constitutes the predominant proteoglycan present in cartilage and is distributed on the surfaces of many cells and extracellular matrices. Some, thought not all, of these enzymes also transfer sulphate to dermatan. Carbohydrate sulphotransferase D4ST1, which transfers sulphate to position 4 of the GalNAc residue of dermatan sulphate. Heparan sulphate 2-O-sulphotransferase (HS2ST). Heparan sulphate (HS) is a co-receptor for a number of growth factors, morphogens, and adhesion proteins. HS biosynthetic modifications may determine the strength and outcome of HS-ligand interactions. Mice that lack HS2ST undergo developmental failure only after midgestat…
