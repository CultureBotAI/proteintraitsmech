identifier: Pfam:PF00494
label: Squalene/phytoene synthase
definition: >-
  Squalene synthase (farnesyl-diphosphate farnesyltransferase)(SQS) and phytoene synthase (PSY) share a number of functional similarities. These similarities are also reflected at the level of their primary structure. In particular three well conserved regions are shared by SQS and PSY; they could be involved in substrate binding and/or the catalytic mechanism. SQS catalyses the conversion of two molecules of farnesyl diphosphate (FPP) into squalene. It is the first committed step in the cholesterol biosynthetic pathway. The reaction carried out by SQS is catalysed in two separate steps: the first is a head-to-head condensation of the two molecules of FPP to form presqualene diphosphate; this intermediate is then rearranged in a NADP-dependent reduction, to form squalene: 2 FPP ->presqualene diphosphate + NADP ->squalene SQS is found in eukaryotes. In yeast it is encoded by the ERG9 gene, in mammals by the FDFT1 gene. SQS seems to be membrane-bound. PSY catalyses the conversion of two molecules of geranylgeranyl diphosphate (GGPP)into phytoene. It is the second step in the biosynthesis of carotenoids from isopentenyl diphosphate. The reaction carried out by PSY is catalysed in two separate steps: the first is a head-to-head condensation of the two molecules of GGPP to form prephytoene diphosphate; this intermediate is then rearranged to form phytoene: 2 GGPP ->prephytoene diphosphate ->phytoene PSY is found in all organisms that synthesise carotenoids: plants and photosynthetic bacteria as well as some non-photosynthetic bacteria and fungi. In bacteria PSY is encoded by the gene crtB. In plants PSY is localised in the chloroplast.
