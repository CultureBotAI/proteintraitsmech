identifier: Pfam:PF21883
label: Wntless, GOLD domain
definition: >-
  This entry represents the GOLD domain from wntless (WLS) proteins. WLS are membrane trafficking and secretion chaperones for lipidated Wnt signaling proteins. They are homologous to GPR180, TMEM145, and TMEM181, which have been described as GOST proteins (for GOLD domain seven-transmembrane helix proteins) together with TMEM87A/B, GPR107, and GPR108, as they share the same domain architecture consisting of a GOLD domain atop of a membrane-spanning seven-transmembrane helix domain.
