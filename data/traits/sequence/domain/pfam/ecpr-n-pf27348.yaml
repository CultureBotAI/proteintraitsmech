identifier: Pfam:PF27348
label: EcpR N-terminal domain
definition: >-
  This entry represents the N-terminal domain of EcpR (also known as MatA), an HTH-type transcriptional regulator found in gammaproteobacteria. While the full-length protein has demonstrated transcriptional regulatory functions, the specific role of this N-terminal domain remains to be determined. This entry also includes the N-terminal in YqeH and Vi polysaccharide biosynthesis protein TviA. EcpR protein regulates the ecpRABCDE operon encoding the E. coli common pilus (ECP) and represses the flagellar master operon flhDC, thereby controlling both pilus formation and motility. EcpR contains an HTH luxR-type DNA-binding domain at the C-terminal end ( ), while the N-terminal domain precedes the DNA-binding region. The protein is found in both commensal and pathogenic strains and plays roles in biofilm development and host cell recognition. TviA acts as an activator for the viaB operon by binding to the upstream region of the viaB promoter, thereby upregulating the expression of genes responsible for Vi antigen production. Although TviA does not directly participate in the enzymatic steps of Vi biosynthesis, it is essential for optimal viaB operon transcription and, consequently, for the presence of the Vi antigen. In addition, TviA also represses the expression of flagellar and type III secretion system genes, reducing invasion and motility, and allowing coordinated expression of virulence factors during host infection.
