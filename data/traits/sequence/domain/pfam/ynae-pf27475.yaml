identifier: Pfam:PF27475
label: Cold shock protein YnaE
definition: >-
  This entry represents cold shock proteins found in enterobacterles, including YnaE and YdfK from Escherichia coli. These proteins are induced by cold shock, with YdfK showing up to 70-fold induction at 10 degrees Celsius. The precise molecular function remains to be determined.
