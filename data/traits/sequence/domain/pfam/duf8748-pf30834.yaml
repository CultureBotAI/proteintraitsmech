identifier: Pfam:PF30834
label: Domain of unknown function (DUF8748)
definition: >-
  This entry represents a probable zinc finger domain found in uncharacterised plant proteins. This domain shares similarity with GRF zinc fingers. It has highly conserved cysteine residues in equivalent positions but is has a large insertion located between the third and the fourth potential zinc coordinating residue.
