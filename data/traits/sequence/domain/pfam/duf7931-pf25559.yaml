identifier: Pfam:PF25559
label: Domain of unknown function (DUF7931)
definition: >-
  This entry represents a domain of unknown function mostly found in bacteria. According to structure predictions it might adopt a phospholipase D/nuclease fold. Whilst the typical phospholipase D motif HxK(x)4D(x)6GSxN is not strictly conserved the overall fold suggests a potential distant evolutionary relationship to the PLD superfamily. The PLD nucleases can have endonuclease or exonuclease activity. These enzymes use the imidazole group of histidine as a nucleophile in their catalytic mechanism.
