identifier: Pfam:PF11848
label: PIN domain
definition: >-
  This entry (ex DUF3368) represents a group of PIN domain proteins that cleave single-stranded RNA in a sequence- or structure-dependent manner. The PIN domain has a Rossmanoid fold with a central parallel β-sheet surrounded by α-helices.
