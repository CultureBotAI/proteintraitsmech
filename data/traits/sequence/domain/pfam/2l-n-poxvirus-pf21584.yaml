identifier: Pfam:PF21584
label: Poxvirus, 2L, N-terminal domain
definition: >-
  This domain is found at the N-terminal of 2L protein from Yaba-like disease virus (YLDV) and similar proteins from poxvirus. 2L binds tumour necrosis factor-alpha (TNFalpha) to inhibit host antiviral and immune responses. This entry represents the α1-α2 superdomain which consists of an antiparallel β-sheet that is topped by two α-helices. It shows similarity with the same domain in classical class I MHC molecules and MHC homologues ( ).
