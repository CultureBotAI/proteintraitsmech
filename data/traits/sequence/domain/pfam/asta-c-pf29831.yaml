identifier: Pfam:PF29831
label: Arginine N-succinyltransferase beta subunit C-terminal domain
definition: >-
  This entry represents the C-terminal β barrel domain of Arginine N-succinyltransferase which catalyses the transfer of succinyl-CoA to arginine to produce succinyl-arginine. This is the first step in arginine catabolism by the arginine succinyltransferase pathway.
