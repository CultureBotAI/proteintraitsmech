identifier: Pfam:PF20049
label: Domain of unknown function (DUF6451)
definition: >-
  This presumed domain is functionally uncharacterised. Proteins containing this domain are found in eukaryotes, predominantly in Platyhelminthes. It contains the conserved sequences QLxNIWNSK and KxRIFN. Some proteins containing this domain also contain a reverse transcriptase domain.
