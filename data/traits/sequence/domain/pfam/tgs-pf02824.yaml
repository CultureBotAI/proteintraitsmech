identifier: Pfam:PF02824
label: TGS domain
definition: >-
  The TGS domain (named for its presence ThrRS, GTPase, and SpoT) is present in a number of enzymes, for example, in threonyl-tRNA synthetase (ThrRS), a distinct family of GTPases (the OBG family), and guanosine-3',5'-bis(diphosphate) 3'-pyrophosphohydrolase (SpoT) and synthetase (RelA) which are involved in stringent response in bacteria. The TGS domain is also present at the N-terminal of the uridine kinase from the spirochaete Treponema pallidum (but not any other organism, including the related spirochaete Borrelia burgdorferi). TGS is a small domain that consists of ~50 amino acid residues and has nucleic acid binding affinity. It is arranged in a six-stranded half-barrel that curves around an α-helix and belongs to the β-grasp fold superfamily. The function of the TGS domain of SpoT is in transcription of survival and virulence genes in response to environmental stress.
