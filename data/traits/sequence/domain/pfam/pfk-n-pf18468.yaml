identifier: Pfam:PF18468
label: Phosphofructokinase N-terminal domain yeast
definition: >-
  This is a phosphofructokinase (Pfk) N-terminal domain found in yeast ATP-dependent 6-phosphofructokinase subunit alpha. ATP-dependent 6-phosphofructokinases (Pfks, ) catalyze the phosphorylation of fructose 6-phosphate (F-6-P) to fructose 1,6-bisphosphate, a key control step of glycolysis in most organisms. The N-terminal domain contains the active site and is related to glyoxalase I ( ).
