identifier: Pfam:PF01680
label: SOR/SNZ family
definition: >-
  The family of pyridoxal 5'-phosphate synthase subunits, known as the PdxS/SNZ family, occur in organisms in four kingdoms and form one of the most highly conserved families. A PdxS/SNZ protein has a classic (β/α)8-barrel fold, consisting of eight parallel β-strands alternating with eight α helices. PdxS subunits form two hexameric rings. Proteins are involved in vitamin B6 biosynthesis. The term vitamin B6 is used to refer collectively to the compound pyridoxine and its vitameric forms, pyridoxal, pyridoxamine, and their phosphorylated derivatives. Vitamin B6 is required by all organisms and plays an essential role as a co-factor for enzymatic reactions. Plants, fungi, bacteria, archaebacteria, and protists synthetize vitamin B6. Animals and some highly specialised obligate pathogens obtain it nutritionally. Vitamin B6 has two distinct biosynthetic pathways, which do not coexist in any organism. The pdxA/pdxJ pathway, that has been extensively characterised in Escherichia coli, is found in the gamma subdivision of the proteobacteria. A second pathway of vitamin B6 synthesis involving the pdxS/SNZ and pdxT/SNO protein families, which are completely unrelated in sequence to the pdxA/pdxJ proteins, is found in plants, fungi, protists, archaebacteria and most bacteria. PdxS/SNZ and pdxT/SNO proteins form a complex which serves as a glutamine amidotransferase to supply ammonia as a source of the ring nitrogen of vitamin B6. PdxT/SNO and pdxS/SNZ appear to encode respectively the glutaminase subunit, which produces ammonia from glutamine, and the synthase subunit, which combines ammonia with five- and three-carbon phosphosugars to form vitamin B6. This entry represents the N-terminal domain of the pyridoxal 5'-phosphate synthase subunit PdxS/SNZ.
