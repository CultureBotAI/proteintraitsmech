identifier: Pfam:PF22556
label: Phage DNA Adenine Methylase-like domain 2
definition: >-
  This domain, which is found in a group of proteins from bacteroidetes, has been characterised as part of a nucleic acid modifying system in certain phages. This system may modify tRNAs that are encoded adjacent to the system on the genome. These tRNAs are then possibly packaged into the viral head, to render them resistant to host restriction.
