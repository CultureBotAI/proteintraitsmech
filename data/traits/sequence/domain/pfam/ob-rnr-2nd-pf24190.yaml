identifier: Pfam:PF24190
label: Ribonuclease R second OB domain
definition: >-
  This entry represents the second OB domain found in ribonuclease R (RNR) from bacteria. The function of this domain is unknown. Ribonuclease R proteins are 3'-5' exoribonucleases that release 5'-nucleoside monophosphates and are involved in maturation of structured RNAs.
