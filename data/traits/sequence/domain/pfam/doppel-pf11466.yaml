identifier: Pfam:PF11466
label: Prion-like protein Doppel
definition: >-
  Dpl is a homologue related to the prion protein (PrP). Dpl is toxic to neurons and is expressed in the brains of mice that do not express PrP. In DHPC and SDS micelles, Dpl shoes about 40% α-helical structure however in aqueous solution it consists of a random coil. The α helical segment can adopt a transmembrane localisation also in a membrane. The unprocessed Dpl protein is thought to posses a possible channel formation mechanism which may be related to toxicity through direct interaction with cell membranes and damage to the cell membrane.
