identifier: Pfam:PF21551
label: Exosome complex component CSL4, N-terminal domain
definition: >-
  This domain is found at the N-terminal of Exosome complex component CSL4 from Saccharomyces cerevisiae, a non-catalytic component of the RNA exosome complex which has 3'->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events.
