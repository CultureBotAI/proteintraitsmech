identifier: Pfam:PF29218
label: Spirochaete C-terminal OB fold
definition: >-
  This entry represents a C-terminal domain with an OB fold found in spirochaetes, including Treponema and Spirochaeta species. This domain is found at the C-terminal of multi-domain proteins. These proteins can be annotated as Tetratricopeptide repeat proteins. The function of this domain remains to be determined.
