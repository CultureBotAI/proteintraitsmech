identifier: Pfam:PF25045
label: Ro60 vWA domain
definition: >-
  This entry represents the vWA domain of RNA-binding protein RO60 which is found after the TROVE domain at the N-terminal end. RO60 binds to misfolded non-coding RNAs, pre-5S rRNA, and several small cytoplasmic RNA molecules known as Y RNAs. This domain closes the ring from the TROVE domain.
