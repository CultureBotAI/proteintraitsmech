identifier: Pfam:PF15292
label: Treslin, M domain
definition: >-
  This entry represents the M domain of Treslin, a checkpoint regulator which plays a role in DNA replication preinitiation complex formation. This domain adopts a Ku70-like β-barrel fold which engage in homotypic interactions with MTBP, which is also essential for replication in human cells. Treslin is the metazoan counterpart of Sld3 from yeast, which are the hub proteins mediating protein associations critical for the helicase formation. Treslin, as Sld3, interacts with TopBP1 in a Cdk2-dependent manner, which then collaborate in the Cdk2-mediated loading of Cdc45 onto replication origins. Treslin and Sld3 differ in their molecular sizes and amino acid sequences, however, they share a conserved Sld3/Treslin domain (STD). According to their similarities, it has been suggested that helicase activation in mammals has diverged in complexity during evolution from that in yeasts and may involve additional partners that interact with TopBP1.
