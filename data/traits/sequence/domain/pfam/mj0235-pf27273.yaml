identifier: Pfam:PF27273
label: Uncharacterized protein MJ0235 family
definition: >-
  This entry represents the MJ0235 protein family, an uncharacterised protein found in Archaea. MJ0235 is found in Methanocaldococcus jannaschii and related archaeal species. The function of this small protein family remains to be determined. This entry also includes uncharacterised sequences from bacteria.
