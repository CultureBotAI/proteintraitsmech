identifier: Pfam:PF07417
label: Sigma factor-binding transcriptional regulator Crl
definition: >-
  This family contains the bacterial Sigma factor-binding protein Crl. This is a transcriptional regulator of the csgA curlin subunit gene for curli fibres that are found on the surface of certain bacteria. These proteins bind to the sigma-S subunit of RNA polymerase, activating expression of sigma-S-regulated genes. It was initially suggested that Crl affects transcription initiation in vitro by other sigmas, such as sigma-70 and sigma-32. However, it is now established that Crl binds specifically to the alternative sigma factor S/RpoS and favors its association with the core RNAP (RNA polymerase), thereby increasing its activity, which in turn regulates general stress response that protects many Gram-negative bacteria from several harmful environmental conditions. Furthermore, sigma S factor/RpoS plays important roles in biofilm formation and virulence of the food-borne pathogen Salmonella enterica serovar Typhimurium.
