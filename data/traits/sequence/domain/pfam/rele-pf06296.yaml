identifier: Pfam:PF06296
label: RelE toxin of RelE / RelB toxin-antitoxin system
definition: >-
  Bacterial toxin-antitoxin loci consist of two genes in an operon encoding a 'toxin' and an 'antitoxin' respectively. Ectopic expression of the toxins severely reduces cell growth and prevents colony formation. This entry includes HigB-2, one of the toxins found in Vibrio cholerae. It inhibits translation by cleavage of mRNA.
