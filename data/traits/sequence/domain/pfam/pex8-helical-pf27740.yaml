identifier: Pfam:PF27740
label: PEX8 helical domain
definition: >-
  This entry represents an helical domain in PEX8 (Peroxisomal biogenesis factor 8). PEX8 is an essential component of the machinery required for the import of peroxisomal matrix proteins and is located at the peroxisome membrane. This domain is composed entirely of α-helical secondary structure similar to TPRs. PEX8 interacts with the PEX5 cargo receptor, and binding of PEX8 to the N-terminal of PEX5 induces conformational changes that facilitate the release of PTS1 proteins within the peroxisome. The protein contains a microbody targeting signal at residues 711-713. This domain is found in fungi, particularly across ascomycete species. The function of this specific domain remains to be determined.
