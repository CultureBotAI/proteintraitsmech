identifier: Pfam:PF21628
label: Major coat protein-like
definition: >-
  This protein family includes Major coat protein from Salmonella phage epsilon15 (Gp10) and similar sequences from tailed bacteriophages and from bacterial prophages. Gp10 binds to the outer surface of the virus capsid. It adopts a jellyroll viral protein fold with two sheets consisting of four β-strands each.
