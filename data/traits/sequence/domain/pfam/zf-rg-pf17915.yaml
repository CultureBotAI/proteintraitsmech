identifier: Pfam:PF17915
label: Reverse gyrase zinc finger
definition: >-
  This is the N-terminal zinc finger domain present in reverse gyrase proteins. Most reverse gyrases conserve the N-terminal zinc finger of the zinc ribbon type, pointing to a crucial function of this domain. Structure of Thermotoga maritima reverse gyrase elucidates that the N-terminal zinc finger firmly attaches the H1 (helicase 1) domain to the topoisomerase domain contributing to double-strand DNA (dsDNA) binding.
