identifier: Pfam:PF05294
label: Scorpion short toxin
definition: >-
  Short scorpion toxin chloride channel inhibitors are short-chain neurotoxins (SCNs), which block small-conductance chloride channels. They are 30-40-residue long and contain four intramolecular disulphide bridges, which have been assigned as C1-C4, C2-C6, C3-C7 and C5-C8. The global fold of the scorpion short toxin chloride channel inhibitor subfamily is an α-helix packed on a two-stranded β-sheet. The structure also contains a short fragment in an extended form. The two antiparalllel β-strands are connected by a type I β-turn. The four disulphide bridges help to maintain a very compact structure by heavily attaching the N-terminal and C-terminal ends to the α-helix.
