identifier: Pfam:PF22551
label: T3SS (YopN, CesT) and YbjN peptide-binding chaperone 1
definition: >-
  This entry represents a domain found centrally located in a group of T3SS (YopN, CesT) and YbjN peptide-binding chaperone 1 (TY-Chap) proteins from bacteria. Members are observed in host systems and predicted to counteract the action of viral ribosylating toxins. It is found between the TY-Chap N-terminal ( ) and C-terminal ( ) domains.
