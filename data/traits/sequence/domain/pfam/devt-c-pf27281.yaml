identifier: Pfam:PF27281
label: DevT C-terminal domain
definition: >-
  This entry represents the C-terminal domain in CRISPR-associated protein Cas8a1/Csx13 proteins.The N-terminal domain is described by . In Lyngbya sp., the protein is split into two tandem genes, and this entry corresponds to the downstream gene in these species. Members of the Myxococcus xanthus subtype of the Cas8a1/Csx13 family are found among cas (CRISPR-Associated) genes close to CRISPR repeats in Leptospira interrogans (a spirochete), Myxococcus xanthus (a delta-proteobacterium), and Lyngbya sp. PCC 8106 (a cyanobacterium). They are found with other cas genes in Anabaena variabilis ATCC 29413. In Myxococcus xanthus Cas8a1 is also known as DevT (developmental protein T) where stimulates synthesis of a signal transduction protein required for fruiting body morphogenesis (formation of fruiting bodies within the rod-shaped cells under starvation conditions that differentiate into spherical spores).
