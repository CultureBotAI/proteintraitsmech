identifier: Pfam:PF01947
label: Chorismate pyruvate-lyase Rv2949c-like
definition: >-
  This entry includes chorismate pyruvate-lyase Rv2949c from Mycobacterium tuberculosis. It removes the pyruvyl group from chorismate to provide 4-hydroxybenzoate (4HB). The chorismate pyruvate-lyase encoded by sll1797 in cyanobacteria Synechocystis sp. , has been shown to catalyse the initial and essential step in plastoquinone biosynthesis. In E. coli, the chorismate lyase (UbiC) catalyses the conversion of chorismate to p-hydroxybenzoate and pyruvate in the biosynthesis of ubiquinone as well.
