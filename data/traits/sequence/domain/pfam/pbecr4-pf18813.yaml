identifier: Pfam:PF18813
label: phage-Barnase-EndoU-ColicinE5/D-RelE like nuclease4
definition: >-
  Polyvalent proteins are predicted to be transmitted by genomic parasites such as conjugative elements, plasmids, and phages during the initial phase of infection along with their DNA. They are typified by the presence of multiple domains with disparate activities. This entry represents a predicted endoRNase of the Barnase-EndoU-ColicinE5/D-RelE like nuclease fold found in polyvalent proteins of phages and conjugative elements. The predicted active site contains a conserved histidine residue.
