identifier: Pfam:PF08639
label: DNA replication regulator SLD3, STD domain
definition: >-
  The Sld3 DNA replication regulator is required for loading and maintenance of Cdc45 on chromatin during DNA replication. This entry represents the C-terminal domain of Sld3 which includes the Sld3-Treslin domain (STD), essential for replication origin firing. This domain consists of two segments with 12 helices, sufficient to bind to Cdc45. Treslin is the metazoan functional homologue of yeast Sld3, which differ in molecular size and amino acid sequence., which also contains a STD. Based on their similarities, it has been suggested that helicase activation in mammals has diverged in complexity during evolution from that in yeasts and may involve additional partners that interact with TopBP1.
