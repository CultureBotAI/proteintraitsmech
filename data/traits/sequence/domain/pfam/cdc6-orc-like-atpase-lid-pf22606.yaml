identifier: Pfam:PF22606
label: Cdc6/ORC-like, ATPase lid domain
definition: >-
  This entry represents the AAA+ ATPase lid domain of eukaryotic Cdc6/ORC proteins and its homologues from archaea. Cdc6 is involved in the initiation of DNA replication. It also participates in checkpoint controls that ensure DNA replication is completed before mitosis is initiated.
