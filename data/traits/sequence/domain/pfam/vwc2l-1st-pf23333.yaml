identifier: Pfam:PF23333
label: VWC2L-like, N-terminal domain
definition: >-
  This domain is found at the N-terminal of von Willebrand factor C domain-containing protein 2-like (VWC2L), VWC2 (also known as Brorin) and similar proteins predominantly found in vertebrates. This domain is predicted to adopt an all-β configuration. Brorin is a secreted BMP antagonist that promotes neurogenesis in mouse neural precursor cells. VWC2L may also play roles in neural development and functions.
