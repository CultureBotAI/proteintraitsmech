identifier: Pfam:PF29230
label: TP0546 family PDZ domain
definition: >-
  This entry represents the second PDZ domain (PDZ2) of HtrA family periplasmic serine proteases from Spirochaetota, particularly Treponema and Spirochaeta species. The domain is named after the Treponema pallidum TP0546 protein ( ), a putative DegS homologue. HtrA proteases are periplasmic quality control proteases involved in protein folding stress responses. These proteins contain an N-terminal trypsin-like protease domain followed by two PDZ domains. PDZ domains regulate protease activity and facilitate substrate recognition and oligomerisation.
