identifier: Pfam:PF20881
label: Phage G1 gp67, C-terminal domain
definition: >-
  Gp67 from Staphylococcus virus G1 ( , also known as ORF067) binds to the sigma(A)-subunit of the RNA polymerase (RNAP) of its host to block cell growth by inhibiting transcription. This protein is organized in two domains, an N-terminal β-sheet-rich domain ( ) and a C-terminal α-helical domain, which are connected by an α-helical linker on the surface of gp67 opposite the interaction surface. This entry includes the C- terminal domain and the helical linker.
