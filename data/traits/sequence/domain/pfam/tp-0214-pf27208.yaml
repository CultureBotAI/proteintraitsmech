identifier: Pfam:PF27208
label: TP_0214 zinc finger-like domain
definition: >-
  This entry represents a group of uncharacterised bacterial sequences, including TP_0214, a small protein from Treponema pallidum. TP_0214 is a 65-amino-acid protein (gene TP_0214) from the syphilis spirochete. It is predicted to adopt a zinc finger-like structure, which typically involves coordination of zinc ions by cysteine and histidine residues for DNA binding or protein- protein interactions. The specific function remains to be determined. This entry also includes uncharacterised proteins that contain a FdhE-like fold ( ).
