identifier: Pfam:PF23962
label: Domain of unknown function (DUF7290)
definition: >-
  This entry represents a small family of uncharacterised proteins found in enterobacteria phages. The proteins are around 80 residues in length. The proteins assume a compact domain that has four β strands forming a sheet followed by three α helices packed on one side.
