identifier: Pfam:PF28286
label: Lmo0673
definition: >-
  In Listeria monocytogenes, lmo0673 ( ) is encoded immediately downstream of mogR in a bicistronic operon encoded divergently from flagellar genes. MogR is a transcriptional repressor essential for temperature-dependent transcription of flagellar genes. The gene lmo0673 is therefore considered the end gene of a large flagellar biosynthesis and motility region from lmo0673 to lmo0718. Lmo0673 is commonly cited as a biofilm formation-associated protein. This entry represents its homologues.
