identifier: Pfam:PF18169
label: SMODS and SLOG-associating 2TM effector domain 6
definition: >-
  The SLATT domain contains two transmembrane helices. SLATT domains are generally predicted to function as pore-forming effectors in a class of conflict systems which are reliant on the production of second messenger nucleotide or nucleotide derivatives. SLATT domains are predicted to initiate cell suicide responses upon their activation. This SLATT domain associates with a SMODS nucleotide synthetase domain fused to the predicted AGS-C sensor domain. It is sometimes further coupled to R-M systems.
