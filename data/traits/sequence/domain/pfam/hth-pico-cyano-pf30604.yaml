identifier: Pfam:PF30604
label: Picocyanobacterial HTH transcriptional regulator
definition: >-
  This entry represents the HTH helical domain of a family of small proteins of approximately 75 residues found in marine picocyanobacteria and related proteins from Cyanophyceae. Family members are annotated as transcriptional regulators containing a helix-turn-helix (HTH) Cro/C1-type domain, suggesting a role in DNA binding and transcriptional regulation. The entry is restricted to Prochlorococcus, Synechococcus, Microcystaceae and Aphanothecaceae. The specific regulatory targets of these proteins remain to be determined.
