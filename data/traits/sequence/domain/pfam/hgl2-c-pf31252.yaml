identifier: Pfam:PF31252
label: HGL2, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Galactose/N-acetyl-D-galactosamine lectin heavy subunit 2 (HGL2) from Entamoeba histolytica and related sequences. HGL2 is a lectin which binds galactose and N-acetyl-D-galactosamine of host glycoproteins and thus mediates adhesion to host cells. It may mediate adherence to host colonic mucins, an essential step for pathogenic tissue invasion. This region may consist of six pairs of antiparallel β-strands, arranged in an elongated pattern.
