identifier: Pfam:PF29199
label: TP0693-like lipoprotein, C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in lipoproteins mainly from Spirochaetota, particularly Treponema species. The domain is approximately 140-150 residues in length. These lipoproteins are anchored to the cell membrane via N-terminal lipid modifications. In Treponema pallidum, the TP0693 protein containing this domain has been characterised as an immunogenic antigen. The specific function of this C-terminal domain remains to be determined.
