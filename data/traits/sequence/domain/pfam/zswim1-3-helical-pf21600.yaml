identifier: Pfam:PF21600
label: ZSWIM1/3, helical domain
definition: >-
  This entry represents a helical domain found in ZSWIM1 and ZSWIM3, ZSWIM-type zinc finger domain containing proteins. The function of ZSWIM3 is not yet clear. ZSWIM1 is thought to play in the development or function of T helper cells.
