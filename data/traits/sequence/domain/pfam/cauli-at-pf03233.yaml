identifier: Pfam:PF03233
label: Aphid transmission protein
definition: >-
  This protein is found in various caulimoviruses. It codes for an 18kDa protein (PII), which is dispensable for infection but which is required for aphid transmission of the virus. This protein interacts with the PIII protein.
