identifier: Pfam:PF22128
label: Alp7A C-terminal domain
definition: >-
  Bacterial Actin-Like Proteins (ALPs) participate in many biologically, clinically and commercially important processes, including segregation of low-copy plasmids. Alp7A is a bacterial actin that functions in plasmid segregation. It is composed of two domains both structurally similar to domains of actin-like ATPases ( ). This entry represents the C-terminal domain.
