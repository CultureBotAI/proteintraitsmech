identifier: Pfam:PF06071
label: Protein of unknown function (DUF933)
definition: >-
  This domain is found at the C terminus of YchF. The crystal structure of YchF from Haemophilus influenzae has been determined. This protein consists of three domains: an N-terminal domain which has a mononucleotide binding fold typical for the P-loop NTPases, a central domain which forms an α-helical coiled coil, and this C-terminal domain which is composed of a six-stranded half-barrel curved around an α-helix. The central domain and this domain are topologically similar to RNA-binding proteins, while the N-terminal region contains the features typical of GTP-dependent molecular switches. The purified protein was capable of binding both double-stranded nucleic acid and GTP. It was suggested, therefore, that this protein might be part of a nucleoprotein complex and could function as a GTP-dependent translation factor.
