identifier: Pfam:PF22162
label: Plasmid Fertility inhibition factor
definition: >-
  FiwA-like proteins are fertility inhibition factors (FIN), which are employed by plasmids to block import of rival plasmids. FiwA is encoded by plasmid RP1 and blocks the transfer of plasmid R388. A FiwA-like protein called Osa (oncogenic suppressive activity) inhibits the oncogenic properties of Agrobacterium tumefaciens. Osa is structurally similar to the ParB/Sulfiredoxin fold. Osa has been shown to have ATPase and DNAse activities, and can block T-DNA transfer into plants.
