identifier: Pfam:PF18556
label: Bacterial Tetracyclin repressor,  C-terminal domain
definition: >-
  This is the C-terminal tetracycline repressor domain found in HTH-type transcriptional regulator AlkX and similar sequences from actinobacteria. It represses the expression of the alkB-rubAB operon, which encodes the alkane hydroxylase AlkB and the rubredoxins RubA and RubB. AlkX can bind to the promoter region of mmpS1 and mmpL3 and to the intragenic region of mmpL11, suggesting that it may participate in the regulatory network that controls the expression of MmpL lipid transporters. Similar to other TetR family regulators, these proteins are α-helical dimeric proteins consisting of a smaller N-terminal DNA-binding domain and a larger C-terminal regulatory domain.
