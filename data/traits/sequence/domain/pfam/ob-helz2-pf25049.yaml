identifier: Pfam:PF25049
label: 3'-5' exoribonuclease HELZ2, OB-fold domain
definition: >-
  This domain is found in human 3'-5' exoribonuclease HELZ2 and similar animal proteins. HELZ2 can degrade highly structured RNAs through its concerted ATP-dependent RNA helicase and 3' to 5' exoribonuclease activities.
