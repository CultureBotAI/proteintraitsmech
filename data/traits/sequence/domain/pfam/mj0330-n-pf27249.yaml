identifier: Pfam:PF27249
label: Uncharacterized protein MJ0330, N-terminal P-loop domain
definition: >-
  This entry represents the N-terminal P-loop domain of the uncharacterised protein MJ0330 from Methanocaldococcus jannaschii and related archaeal species. This domain belongs to the P-loop containing nucleotide triphosphate hydrolase superfamily suggesting it may have nucleotide binding and/or hydrolysis activity. The specific function of this protein and its N-terminal P-loop domain remains to be determined. This domain is also found in predicted terminases viral and bacterial proteins.
