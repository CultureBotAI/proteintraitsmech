identifier: Pfam:PF14495
label: Cytochrome c-550 domain
definition: >-
  This domain is found in the heme binding cytochrome known as cytochrome c550, or cytochrome c549, or PsbV. PsbV is an extrinsic subunit found in the lumen of photosystem II (PSII), which functions as a light-driven water plastoquinone oxidoreductase. PSII utilised light energy to extract electrons from H2O, creating a proton gradient that is later utilised for ATP synthesis. The extrinsic proteins serve to reinforce the structural integrity of the oxygen-evolving complex (OEC) within photosystem II.
