identifier: Pfam:PF11415
label: Antifungal peptide termicin
definition: >-
  Termicin is a cysteine-rich antifungal peptide, which also exhibits weak antibacterial activity. The global fold of termicin consists of an α-helical segment and a two-stranded antiparallel β-sheet forming a cysteine stabilised alphabeta motif that is also found in antibacterial and antifungal defensins from insects and from plants. The antifungal properties of termicin may be related to its marked hydrophobicity and its amphipatic structure compared to the antibacterial defensins.
