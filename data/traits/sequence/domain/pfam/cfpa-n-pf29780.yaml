identifier: Pfam:PF29780
label: Cytoplasmic filament protein A N-terminal domain
definition: >-
  This entry represents the N-terminal domain of cytoplasmic filament protein A (CfpA) from Treponema pallidum. CfpA is 678 amino acids and is a component of the cytoplasmic filaments that run the length of the organism just underneath the cytoplasmic membrane. An array of 4 to 6 filaments lie in close apposition to the inner membrane and are always localised directly underneath the corresponding group of periplasmic flagella. Members are classified in NCBIfam as cfpA_ASD. The function of this domain remains to be determined.
