identifier: Pfam:PF14214
label: Helitron helicase-like domain at N-terminus
definition: >-
  This domain is found in Helitrons, widespread eukaryotic DNA transposons that have significantly contributed to genome variability and evolution, as they perform a distinctive, replicative rolling-circle mechanism, which often mobilizes adjacent genes. Helitron transposases contain a single-stranded DNA (ssDNA)-specific HUH endonuclease domain, with structural similarity to viral replication initiator (Rep) proteins. In many instances a protein-coding gene is disrupted by their insertion.
