identifier: Pfam:PF26095
label: Bre1, coiled-coil containing domain
definition: >-
  This domain is found in the human paralogues E3 ubiquitin-protein ligase BRE1A and BRE1B, and related proteins from animals and fungi. The domain represented by this entry is predicted with high probability to contain at least two coiled-coil regions. BRE1A (known as RNF20) and BRE1B (known as RNF40) form a heterodimeric E3 ubiquitin ligase complex essential for monoubiquitinating histone H2B at lysine 120, a key epigenetic mark influencing transcription, DNA repair, and chromatin remodelling
