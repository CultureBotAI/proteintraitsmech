identifier: Pfam:PF25524
label: CPSF6-like, RSLD domain, N-terminal region
definition: >-
  This entry represents the N-terminal region of the (RS)-like domain (RSLD) found in human Cleavage and polyadenylation specificity factor subunit 6/7 (CPSF6/7) and similar animal proteins. This domain is predicted to adopt an all-α fold. CPSF6/7 are components of the Cleavage Factor Im complex (CFIm) which plays a key role in pre-mRNA 3'-cleavage and polyadenylation. These proteins are components of the cleavage factor Im (CFIm) complex that functions as an activator of the pre-mRNA 3'-end cleavage and polyadenylation processing required for the maturation of pre-mRNA into functional mRNAs.
