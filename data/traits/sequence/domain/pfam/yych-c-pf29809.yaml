identifier: Pfam:PF29809
label: YycH protein, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the bacterial protein YycH. YycH plays a role in signal transduction and is found immediately downstream of the essential histidine kinase YycG. YycG forms a two component system together with its cognate response regulator YycF. PhoA fusion studies have shown that YycH is transported across the cytoplasmic protein. It is postulated that YycH functions as an antagonist to YycG. This domain consists of two intertwined subdomains.
