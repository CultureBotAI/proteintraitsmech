identifier: Pfam:PF11979
label: Smad anchor for receptor activation-like, C-terminal
definition: >-
  This entry represents a domain, previously known as DUF3480, that is found in a group of Zinc finger FYVE domain-containing proteins such as Zinc finger FYVE domain-containing protein 9, also known as SARA, and Zinc finger FYVE domain-containing protein 16 (KIAA0305) from humans and similar sequences present in animals. This domain is involved in the interaction with the TGF-beta receptor. Smad proteins mediate transforming growth factor-beta (TGF-beta) signalling from the transmembrane serine-threonine receptor kinases to the nucleus. SARA (Smad anchor for receptor activation) recruits Smad2 to the TGF-beta receptors for phosphorylation. KIAA0305 may be involved in regulating membrane trafficking in the endosomal pathway. Its overexpression induces endosome aggregation. It is required to target TOM1 to endosomes.
