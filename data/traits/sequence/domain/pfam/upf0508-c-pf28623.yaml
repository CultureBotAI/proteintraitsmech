identifier: Pfam:PF28623
label: UPF0508 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in a group of longer UPF0508 proteins. UPF0508 proteins are uncharacterised proteins found in fungi, including yeasts such as Candida glabrata and Kluyveromyces lactis. The full-length proteins are approximately 800-850 amino acids in length and contain disordered regions and low-complexity sequences. The proteins were identified through genome sequencing projects. UPF0508 proteins are conserved across different fungal species as indicated by their classification into orthologous groups. The function of this domain remains to be determined. It contains a PH-like fold.
