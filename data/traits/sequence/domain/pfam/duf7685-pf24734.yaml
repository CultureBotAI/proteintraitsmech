identifier: Pfam:PF24734
label: Domain of unknown function (DUF7685)
definition: >-
  This domain is found in uncharacterised bacterial proteins. It contains two pairs of conserved cysteine residues and it is predicted to adopt a fold typical for treble clef zinc fingers. It has a detectable similarity to the N-terminal zinc finger domain of the bacterial AAA+ disaggregase ClpG, which confers extreme heat resistance to bacteria. The latter is is crucial for structural integrity and disaggregase functionality of ClpG.
