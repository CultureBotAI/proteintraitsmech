identifier: Pfam:PF00484
label: Carbonic anhydrase
definition: >-
  Carbonic anhydrases ( ) (CA) are zinc metalloenzymes which catalyze the reversible hydration of carbon dioxide. In Escherichia coli, CA (gene cynT) is involved in recycling carbon dioxide formed in the bicarbonate-dependent decomposition of cyanate by cyanase (gene cynS). By this action, it prevents the depletion of cellular bicarbonate. In photosynthetic bacteria and plant chloroplast, CA is essential to inorganic carbon fixation. Prokaryotic and plant chloroplast CA are structurally and evolutionary related and form a family distinct from the one which groups the many different forms of eukaryotic CA's (see ). This family also includes the carbonyl sulfide hydrolase from Thiobacillus thioparus which responsible for the degradation of carbonyl sulfide to hydrogen sulfide and CO2, the second step of SCN(-) assimilation, and a carbon disulfide hydrolase from acidothermophilic archaeon Acidianus, which has a typical carbonic anhydrase fold and active site but does not use CO2 as a substrate.
