identifier: Pfam:PF07434
label: CFA/I fimbrial subunit E, second domain
definition: >-
  This domain is found in a family consisting of several minor pilin proteins including CfaE. CfaE is the minor, tip-localized adhesive subunit of colonization factor antigen I fimbriae (CFA/I) of enterotoxigenic Escherichia coli and is thought to be essential for the attachment of enterotoxigenic E. coli to the human small intestine early in diarrhea pathogenesis. CfaE contains two homologous domains with Ig-like topology. This entry represents the second of these domains. This domain is also found in several minor pilin proteins including CblD from Burkholderia cepacia which is known to CblD be the initiator of pilus biogenesis.
