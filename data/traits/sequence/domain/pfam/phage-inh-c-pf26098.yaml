identifier: Pfam:PF26098
label: Phage inhibitor of prohead protease C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Inh protein. This C-terminal domain is predicted to be composed of a three stranded β sheet with three α helices packed on one side. Bacteriophage T4 inhibitor (Inh) protein functions as an inhibitor of the prohead protease gp21. The inh gene is located upstream of the hoc gene in the T4 genome. The protein is approximately 226 amino acids long and acts as a minor capsid protein in phage T4.
