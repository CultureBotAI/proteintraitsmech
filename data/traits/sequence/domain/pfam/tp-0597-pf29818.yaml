identifier: Pfam:PF29818
label: Uncharacterised protein TP_0597
definition: >-
  This entry represents the uncharacterised protein TP_0597 from Treponema pallidum. The protein is 92 amino acids long and is found in Treponema species. In some strains, this protein is fused with TP_0598 ( ) as a result of frameshift mutations. The function of this protein remains to be determined.
