identifier: Pfam:PF28933
label: RxLR effector protein CRE9
definition: >-
  This entry represents the CRE9 (Core RXLR effector 9) family found in Phytophthora species. CRE9 is a secreted effector protein that contributes to virulence during early infection stages by inhibiting plant defence responses. The protein contains an RxLR-dEER motif that facilitates translocation into host plant cells through binding to phosphatidylinositol-3-phosphate. CRE9 suppresses both PAMP-triggered immunity and effector-triggered immunity in the host. Expression is induced during host plant infection. The protein is approximately 140 residues in length and contains a C-terminal transmembrane helix.
