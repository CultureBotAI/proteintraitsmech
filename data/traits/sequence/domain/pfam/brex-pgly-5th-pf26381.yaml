identifier: Pfam:PF26381
label: BREX System ATPase PglY protein 5th domain
definition: >-
  This entry represents the 5th domain in ATPase PglY and similar bacterial proteins. The ATPase PglY is part of a type 2 BREX system, which provides immunity against bacteriophage infections. It was previously known as the phage growth limitation (Pgl) system and offers protection against bacteriophage phiC31. The system allows one cycle of phage infection, but subsequent cycles are impaired, thereby protecting the original bacterial colony. The BREX system, which includes the pglW-pglX-pglY-pglZ genes, confers resistance to phage phiC31 and phiBT1 when transformed into a susceptible strain. All four genes are necessary for this resistance. PglY hydrolyses ATP but not other nucleotides, and its activity is inhibited by the non-hydrolysable ATP analogue 5-adenylyl beta,gamma-imidodiphosphate.
