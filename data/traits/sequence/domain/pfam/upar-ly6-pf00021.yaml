identifier: Pfam:PF00021
label: u-PAR/Ly-6 domain
definition: >-
  This entry represents a three-fold repeated domain that is found in a number of venomous neuro- and cytotoxins from snakes as well as in cell receptors such as urokinase-type plasminogen activator receptor (uPAR) that occurs singly in other GPI-linked cell-surface glycoproteins (Ly-6 family, CD59). A variety of GPI-linked cell-surface glycoproteins are composed of one or more copies of a conserved domain of about 100 amino-acid residues. Among these proteins, U-PAR contains three tandem copies of the domain, while all the others are made up of a single domain. As shown in the following schematic, this conserved domain contains 10 cysteine residues involved in five disulphide bonds -in U-PAR, the first copy of the domain lacks the fourth disulphide bond. +------+ +------------------------+ +---+ | | | | | | xCxxCxxxxxxCxxxxxCxxxxxCxxxxxxxxxxxxxxxxxxCxxxxCxxxxxxxxxxxxxxCCxxxCxxxxxxxx | | | | +---------------------+ +--------------+ 'C': conserved cysteine involved in a disulphide bond.
