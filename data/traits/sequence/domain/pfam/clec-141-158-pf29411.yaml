identifier: Pfam:PF29411
label: C-type lectin domain-containing protein 141/158
definition: >-
  This entry represents a C-type lectin domain found in nematodes, particularly abundant in Caenorhabditis elegans. The entry includes numerous CLEC (C-type lectin) proteins such as CLEC-141 and CLEC-158. These are secreted proteins with predicted signal peptides. The proteins share the characteristic C-type lectin fold. Many family members contain disordered regions in addition to the structured lectin domain. The specific function of this domain remains to be determined.
