identifier: Pfam:PF16914
label: Bacterial transcriptional repressor C-terminal
definition: >-
  This entry represents the C-terminal domain found in a number of different TetR transcription regulator proteins. TetR regulates the expression of the membrane-associated tetracycline resistance protein, TetA, which exports the tetracycline antibiotic out of the cell before it can attach to the ribosomes and inhibit protein synthesis. TetR blocks transcription from the genes encoding both TetA and TetR in the absence of antibiotic. The C-terminal domain is multi-helical and is interlocked in the homodimer with the helix-turn-helix (HTH) DNA-binding domain. Other members of the TetR family of transcriptional regulators carry this C-terminal domain. These include: QacR from Staphylococcus aureus, a multidrug binding protein that represses transcription of the qacA multidrug transporter gene Ethr, a repressor from Mycobacterium tuberculosis implicated in ethionamide drug resistance CprB, a gamma-butyrolactone autoregulator/receptor from Streptomyces coelicolor that acts as a DNA-binding protein YcdC, a hypothetical transcriptional regulator from Escherichia coli YsiA, YfiR, and YxaF, hypothetical transcriptional regulators from Bacillus subtilis YbiH, a hypothetical transcriptional regulator from Salmonella typhimurium The antibiotic tetracycline has a broad spectrum of activity, acting to inhibit bacterial protein synthesis by binding to the 30S ribosomal subunit, which prevents the association of the aminoacyl-tRNA to the ribosomal acceptor A site. Tetracycline binding is reversible, therefore diluting out the antibiotic can reverse its effects. Tetracycline resistance genes are often located on mobile elements, such as plasmids, transposons and/or conjugative transposons, which can sometimes be transferred between bacterial species. In certain cases, tetracycline can e…
