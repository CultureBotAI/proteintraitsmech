identifier: Pfam:PF16577
label: UBA domain
definition: >-
  This UBA domain is found in sequestosome-1 (SQSTM) and similar proteins. Sequestosome-1 (SQSTM), also known as ubiquitin-binding protein p62, is a widely expressed multifunctional cytoplasmic protein that is able to noncovalently bind ubiquitin and several signaling proteins, suggesting a regulatory role connected to the ubiquitin-proteasome pathway. It functions as a scaffolding protein that regulates a diverse range of signaling pathways. It plays a critical role in cell's selective autophagy and oxidative stress response.
