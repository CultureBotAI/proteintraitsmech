identifier: Pfam:PF28233
label: YIPF3 N-terminal domain
definition: >-
  This entry represents the N-terminal cytoplasmic domain of YIPF3 (YIP1 protein 3) and similar sequences mainly found in vertebrates. YIPF3 is a multi-pass transmembrane protein involved in the maintenance of Golgi structure and may play a role in hematopoiesis. The full-length protein localises to the cis-Golgi network membrane and interacts with YIPF4 and YIPF5. YIPF3 proteins contain five transmembrane helical regions. The protein is expressed by nucleated hematopoietic cells and shows developmental regulation. The specific function of this N-terminal domain remains to be determined.
