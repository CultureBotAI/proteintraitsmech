identifier: Pfam:PF18256
label: Co-chaperone HscB tetracysteine metal binding motif
definition: >-
  This is the N-terminal domain of human co-chaperone protein HscB (hHscB). This domain is capable of binding a metal ion through its tetracysteine metal binding motif. The metal atom is coordinated by a set of four cysteine residues (Cys41, Cys44, Cys58 and Cys61) on opposed β-hairpins. Although the N-domain lacks any recognizable secondary structure elements, it has several distant structural homologs including C-4 zinc finger domains and rubredoxin.
