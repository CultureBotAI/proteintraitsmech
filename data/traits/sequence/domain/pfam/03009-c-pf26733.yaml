identifier: Pfam:PF26733
label: Adenylate-forming reductase 03009, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of adenylate-forming reductases 03009 and 06235 from Coprinopsis cinerea and related proteins mainly from fungi. Adenylate forming reductases are natural product biosynthesis enzymes that resemble non-ribosomal peptide synthetases but act on a single substrate rather than condensing multiple building blocks. The N-terminal adenylation domain preferentially accepts L-serine, L-alanine, and L-valine as substrates. The natural product of this enzyme is not yet known. The C-terminal region of Adenylate-forming reductase 03009 contains a ferredoxin NADP reductase (FNR) fold rather than the canonical short-chain dehydrogenase/reductase (SDR) domain. The C-terminal FNR domain catalyses the transfer of electrons from NADPH, a key step in the reduction phase of the enzymes catalytic mechanism. Class IV adenylate forming reductases in C. cinerea, including 03009, are therefore structurally and functionally distinct from classic Lys2-type enzymes, which possess an SDR domain at the C-terminal region.
