identifier: Pfam:PF29146
label: F-box protein UCC1 N-terminal domain
definition: >-
  This entry represents the F-box domain found at the N-terminal region of UCC1 and related F-box proteins from fungal species. The F-box domain mediates interaction with SKP1 as part of the SCF ubiquitin ligase complex. UCC1 functions as the substrate recognition component of the SCF(UCC1) complex, which acts as a metabolic switch for the glyoxylate cycle by regulating the ubiquitination and degradation of CIT2 protein.
