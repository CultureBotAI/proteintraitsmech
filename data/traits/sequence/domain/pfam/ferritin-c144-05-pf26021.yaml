identifier: Pfam:PF26021
label: C144.05-like, ferritin-like domain
definition: >-
  This predicted domain is found in a group of uncharacterised fungal proteins, including yeast ATP-dependent DNA repair protein/ubiquitin-protein ligase E3 IRC20, which directs homologous recombination (HR)-mediated double-strand break (DSB) repair towards the synthesis dependent strand annealing (SDSA) pathway, promotes the loading of RAD51 to ssDNA during DSB repair, and limits the accumulation of RAD52. This domain is predicted to fold into an α-helical bundle.
