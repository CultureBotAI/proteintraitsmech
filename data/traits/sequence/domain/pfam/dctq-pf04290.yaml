identifier: Pfam:PF04290
label: Tripartite ATP-independent periplasmic transporters, DctQ component
definition: >-
  This entry includes tripartite ATP-independent periplasmic (TRAP) transporters which are substrate-binding protein (SBP)-dependent secondary transporters ubiquitous prokaryotes. They are comprised of an SBP of the DctP or TAXI families and two integral membrane proteins of unequal sizes that form the DctQ and DctM protein families (the small and large membrane components respectively). This entry represents the DctQ component and its homologues, which consists of five transmembrane segments. In SiaT, a protein involved in sialic acid uptake, this entry represents the N-terminal five transmembrane segments.
