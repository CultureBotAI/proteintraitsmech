identifier: Pfam:PF22936
label: Pol polyprotein, beta-barrel domain
definition: >-
  This domain is found in retrovirus-related Pol polyproteins from transposon TNT 1-94 (PolX) from Nicotiana tabacum and similar retrovirus-related Pol polyprotein from transposons found in eukaryotes, mainly plant, fungi and arthropods. It is predicted to adopt a β-barrel fold with significant similarity to retroviral acid proteases.
