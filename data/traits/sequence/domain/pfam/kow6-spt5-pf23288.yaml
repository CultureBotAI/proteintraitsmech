identifier: Pfam:PF23288
label: 'Transcription elongation factor SPT5, sixth KOW domain '
definition: >-
  This entry represents the sixth KOW domain of Spt5 from animals. Spt5, an eukaryotic ortholog of NusG, contains multiple KOW motifs at its C-terminal. Spt5 is involved in transcription elongation and termination. The KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. Unlike bacterial NusG with its single KOW motif, eukaryotic Spt5 has multiple KOW domains. There are five KOW motifs in yeast Spt5, whereas animals and plants Spt5 have seven. Spt5 KOW domains play critical roles in recruitment of multiple other eukaryotic transcription elongation and RNA biogenesis factors and additionally are involved in the binding of the eukaryotic Spt5 proteins to RNA polymerases. This entry only includes Spt5 proteins from eukaryotes.
