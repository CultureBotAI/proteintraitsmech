identifier: Pfam:PF08423
label: Rad51
definition: >-
  This domain is found at the C-terminal of DNA repair and recombination protein Rad51, and eukaryotic and archaeal Rad51-like proteins. It is critical for DNA binding. Rad51 is a homologue of the bacterial RecA protein. Rad51 and RecA share a core ATPase domain. RAD51 is a key protein involved in the homologous recombination repair (HRR) pathway, which resolves double-stranded DNA breaks that occur during DNA replication or as a result of DNA-damaging agents. It plays a crucial role in promoting the assembly of presynaptic RAD51 nucleoprotein filaments, essential for the strand invasion step of HR. RAD51 binds both single-stranded and double-stranded DNA and exhibits DNA-dependent ATPase activity. It forms part of the RAD51 paralogue protein complex BCDX2, which operates within the BRCA1-BRCA2-dependent HR pathway. Following DNA damage, BCDX2 acts downstream of BRCA2 recruitment and upstream of RAD51 loading onto DNA. The complex preferentially binds at the crossover points of Holliday junctions and at replication fork junctions. Initially, BCDX2 was reported to interact with single-stranded DNA, single-stranded gaps in duplex DNA, and nicks in duplex DNA. The RAD51B:RAD51C subcomplex within BCDX2 also demonstrates single-stranded DNA-dependent ATPase activity, supporting its proposed role in the early stages of homologous recombination.
