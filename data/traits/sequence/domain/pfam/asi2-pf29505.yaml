label: Amino acid sensor-independent protein 2
definition: >-
  This entry represents ASI2, an amino acid sensor-independent protein from Saccharomyces cerevisiae. ASI2 is found in fungi, particularly in the Saccharomycotina subphylum. The function of this protein remains to be determined.
