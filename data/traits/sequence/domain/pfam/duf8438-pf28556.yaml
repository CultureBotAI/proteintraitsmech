identifier: Pfam:PF28556
label: Domain of unknown function (DUF8438)
definition: >-
  This domain is found in uncharacterised proteins mainly from gram-negative bacteria. It is predicted to fold into small α/β domain consisting of three-stranded β-sheet and two α-helices packed on it. It is frequently found in combination with helicase domains.
