identifier: Pfam:PF10342
label: Kre9/KNH-like N-terminal Ig-like domain
definition: >-
  This domain is found at the N-terminal of a group of cell wall synthesis proteins, such as Knh1 and Kre9 from budding yeast, involved in cell wall beta 1,6-glucan synthesis. Kre9 is also involved in cell wall beta-glucan assembly. In Saccharomyces cerevisiae, a kre9 null mutation leads to severe growth defects, aberrant multi-budded morphology, and mating defects. Over-expression of Knh1 suppresses growth defects of a kre9 null mutant. Knh1 is required for propionic acid resistance. In Aspergillus fumigatus, proteins containing this domain play a role in fungal cell wall organisation. This entry includes proteins from Lentinula edodes, involved in fruiting body formation, and may have a more general role in signalling in other organisms as it interacts with MAPK. This entry also includes uncharacterised proteins from fission yeast, archaea and bacteria.
