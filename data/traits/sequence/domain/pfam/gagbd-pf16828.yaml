identifier: Pfam:PF16828
label: GAG-binding domain on surface antigen
definition: >-
  This entry represents a domain found in the surface antigen protein from the swine pathogen Streptococcus suis and related species. This domain expresses three clusters of basic residues, largely lysines, that are critical for heparin-binding and cell adhesion during bacterium-host cell adhesion. This domain binds to the host cell surface glycosaminoglycans or GAGs of the Streptococcus.
