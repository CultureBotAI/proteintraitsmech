identifier: Pfam:PF04982
label: HPP, transmembrane region
definition: >-
  This entry represents the C-terminal transmembrane region of At3g47980 from Arabidopsis thaliana ( ), which is involved in nitrite transport and similar integral transmembrane proteins. The most conserved region of the alignment is a motif HPP. It is predicted to show five helices.
