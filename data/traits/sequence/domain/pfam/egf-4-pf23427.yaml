identifier: Pfam:PF23427
label: EGF-like domain
definition: >-
  This entry represents an EGF-like domain found in a variety of nematode cell surface proteins, including Transmembrane cell adhesion receptor mua-3 and Transmembrane matrix receptor MUP-4 from Caenorhabditis elegans. Mua-3 is involved in cell adhesion and required for organ positioning and attachment. Mup-4 is essential for enclosure of the embryo by the hypodermis, hypodermal integrity, embryo elongation, and maintenance of hypodermal morphology in fully elongated embryos and is required for junctional attachments between hypodermis and muscle.
