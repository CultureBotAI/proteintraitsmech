identifier: Pfam:PF31245
label: HGL2, middle region
definition: >-
  This entry represents the middle region of Galactose/N-acetyl-D-galactosamine lectin heavy subunit 1/2 (HGL1/2) from Entamoeba histolytica and related sequences. HGL2 is a lectin which binds galactose and N-acetyl-D-galactosamine of host glycoproteins and thus mediates adhesion to host cells. It may mediate adherence to host colonic mucins, an essential step for pathogenic tissue invasion. This region may consist of five pairs of antiparallel β-strands, arranged in an elongated pattern.
