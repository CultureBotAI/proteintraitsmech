identifier: Pfam:PF31000
label: Warthog N-terminal signalling domain
definition: >-
  This entry represents the N-terminal signalling domain of warthog (WRT) proteins found in nematodes. Warthog proteins are hedgehog family members that function as secreted intercellular signals essential for developmental patterning. In Caenorhabditis elegans, WRT-5 is essential for hypodermal development; loss of function results in embryonic or larval lethality and abnormal morphology. Some family members such as WRT-1, WRT-4, WRT-6 and WRT-8 contain a C-terminal Hint domain ( ) that displays autoproteolytic activity, cleaving the protein into N-product and C-product. Shorter family members such as WRT-3 and WRT-5 lack the Hint domain.
