identifier: Pfam:PF01977
label: 3-octaprenyl-4-hydroxybenzoate carboxy-lyase Rift-related domain
definition: >-
  This entry represents the central RIFT-related domain of 3-octaprenyl-4- hydroxybenzoate carboxy-lyase enzymes. This enzyme catalyses the third reaction in ubiquinone biosynthesis. For optimal activity, the carboxylase was shown to require Mn2.
