identifier: Pfam:PF00264
label: Common central domain of tyrosinase
definition: >-
  This domain represents the C terminus of polyphenol oxidases. This region is primarily found in eukaryotes, although a few bacterial members also exist. It is typically between 138 and 152 amino acids in length and the family is found in association with and . Many members are plant or plastid polyphenol oxidases, and there is a highly conserved KFDV sequence motif.
