identifier: Pfam:PF03217
label: Surface layer protein A domain
definition: >-
  This short domain is found at the C-terminal end of Lactobacillus S-layer proteins and in a variety of bacterial cell surface proteins. The domain is about 60 residues in length (although previously defined as 2 copies of this domain). It usually occurs in tandem pairs. It may be distantly related to the SH3 domain. It is involved in the binding to TAs (teichoic acid binding domain), one of the components of the bacterial cell wall.
