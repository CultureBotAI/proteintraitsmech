identifier: Pfam:PF31104
label: KCTD10/TNFAIP1/KCTD13 C-terminal domain
definition: >-
  This domain is found in the homologues of human KCTD10, TNFAIP1 and KCTD13 proteins that are members of the KCTD family. Genetic alternations in KCTD family members have been associated with neurodevelopmental disorders, epilepsy, autism, schizophrenia, movement disorders, obesity, and several cancers. Human KCTD10, TNFAIP1, and KCTD13 are BTB/POZ-domain adaptor proteins that form Cullin3-based ubiquitin ligase complexes and regulate small GTPases (especially Rho family members), with important roles in cell signaling, cytoskeleton, and development. These proteins define distinct phyletic group referred to as group B and share similar BTB and C-terminal domains. The domain represented by this entry is predicted to adopt unique α/β structure composed of a mixed five-stranded β-sheet with strand order 21345 and α-helices packed on one side.
