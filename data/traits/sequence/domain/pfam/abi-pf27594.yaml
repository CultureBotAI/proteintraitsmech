identifier: Pfam:PF27594
label: Abl interactor protein
definition: >-
  This entry represents the N-terminal domain of Abl interactor (ABI) proteins, which are adaptor proteins that regulate actin cytoskeleton dynamics. ABI proteins function as components of the WAVE complex, which activates the Arp2/3 actin nucleating machinery to drive lamellipodia formation. Representative members include human ABI2 and Dictyostelium abiA. ABI proteins act as regulators and substrates of non-receptor tyrosine kinases ABL1 and ABL2, which are involved in processes linked to cell growth and differentiation. They are required for proper cytokinesis and contribute to the regulation of actin assembly at the tips of cellular projections. This domain is characterised by the presence of an SH3 domain, which is critical for binding to ABL kinases. ABI proteins are found in animals and plants and play essential roles in cell motility, adhesion, and cytoskeletal organisation.
