identifier: Pfam:PF30393
label: EFCB5 first GAF domain
definition: >-
  This domain is found in the human EF-hand calcium-binding domain-containing protein 5 and related proteins. EFCAB5 was shown to be part of a molecular neighborhood around RS3 (radial spoke 3) within the sperm axoneme, downstream of the CFAP91 scaffold. This protein probably acts as a sperm-specialised movement regulator. The domain represented by this entry has similarity to GAF domains ( ) and is predicted to adopt similar structure.
