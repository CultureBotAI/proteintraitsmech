identifier: Pfam:PF19566
label: Sorting nexin 8/Mvp1 BAR domain
definition: >-
  This is the BAR (Bin/amphiphysin/Rvs) domain of Sortin nexin 8 (Snx8), which can sense, stabilise and induce membrane curvature. These proteins are involved in intracellular protein transport from early endosomes to the trans-Golgi network. Its yeast counterpart, Mvp1 is required for sorting proteins to the vacuole.
