identifier: Pfam:PF30362
label: Membrane-associated kinase regulator 5 helix
definition: >-
  This entry represents a group of plant proteins, including MAKR2 and MAKR5 from Arabidopsis. MAKR5 is a positive effector of CLE45 signaling. MAKRs belong to the MEMBRANE-ASSOCIATED KINASE REGULATOR (MAKR) family, whose members contain putative kinase interacting motifs and membrane localization signals.
