identifier: Pfam:PF22821
label: Zona pellucida sperm-binding proteins 1/4, Ig-like domain
definition: >-
  This entry represents an immunoglobulin-like domain found at the N-terminal of Zona pellucida sperm-binding proteins 1 and 4 (ZP1 and ZP4). ZP1 and ZP4 are components of the zona pellucida, an extracellular matrix surrounding oocytes which mediates sperm binding, induction of the acrosome reaction and prevents post-fertilization polyspermy. This domain is also present in CIROZ proteins.
