identifier: Pfam:PF22224
label: Amylase-binding protein AbpA
definition: >-
  Amylase binding streptococci only colonise hosts that produce amylase in their saliva. In Streptococcus gordonii, amylase binding is mediated by amylase-binding protein A (AbpA). This protein folds into an elongated structure that consists of two domains: an N-terminal helical domain and a small C-terminal α/β domain consisting of a three-stranded β-sheet packed with α-helix. The helical domain has been shown to be responsible for the amylase binding, while the C-terminal domain interacts with SrtB.
