identifier: Pfam:PF24871
label: Piezo TM1-24
definition: >-
  This entry represents the N-terminal TM segment (TM1-24) which are peripheral part of the blade and exhibit a greater degree of flexibility of these helices relative to TM25-TM36, as apparently, they do not have intracellular supporting structures. Members of this entry are found in animals. Piezo is a family of proteins that form mechanosensitive non-specific cation channels whose conductance is higher for Li+, intermediate for Na+ and lowest for Li+. Divalent ions except for Mn2+ permeate the channel but more slowly than monovalent ions and can reduce K+ currents. Members play key roles in cell adhesion, blood vessel formation and vascular structure in both development and adult physiology. These channels have a homotrimeric three-blade propeller-shaped structure that use a cap-motion and plug-and-latch mechanism to gate their ion-conducting pathways. Each protomer consists of 38 TM helices (referred to THUs) that form unusual non-planar blades, and an extracellular cap-like structure ( ).
