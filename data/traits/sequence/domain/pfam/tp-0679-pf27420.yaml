identifier: Pfam:PF27420
label: TP_0679
definition: >-
  This entry represents TP_0679 membrane proteins found primarily in Treponema and related spirochaetes. TP_0679 is a small membrane protein of approximately 105 amino acids that contains three predicted transmembrane helical regions. The protein forms a helical bundle structure and is predicted to be localised to the cell membrane. The protein is found across the pirochaetota phylum. The function of this protein remains to be determined.
