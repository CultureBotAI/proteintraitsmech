identifier: Pfam:PF21569
label: Histone-lysine N-methyltransferase, RNA-binding domain
definition: >-
  This domain is found in Histone-lysine N-methyltransferase, H3 lysine -4 specific from Saccharomyces cerevisiae (SET1) and similar proteins from yeast. SET1 is the methyltransferase subunit of the COMPASS (Set1C) complex that plays a role in telomere length maintenance and transcription elongation regulation. This entry represents the RNA-binding domain (RBD), which adopts an α/β structure.
