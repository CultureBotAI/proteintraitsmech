identifier: Pfam:PF15806
label: TRAPP14 N-terminal
definition: >-
  This entry includes Trafficking protein particle complex subunit 14 (TRAPP14), a specific subunit of the TRAPP (transport protein particle) II complex, a conserved vesicle tethering complex that functions in late Golgi trafficking as a membrane tether. This entry represents the N-terminal region consisting of two domains which are predicted to adopt an Ig-like fold, where distant amino acids in the sequence contribute to different β-sheets in the structure.
