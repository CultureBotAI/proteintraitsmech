identifier: Pfam:PF21098
label: MTMR6-9, GRAM domain
definition: >-
  This entry represents a PH-like domain found in a variety of myotubularin proteins, including MTMR6-9. MTMR6-8 are lipid phosphatases that specifically dephosphorylates the D-3 position of phosphatidylinositol 3-phosphate (PtdIns3P) and inositol 1,3-bisphosphate (Ins(1,3)P2). MTMR8, in complex with MTMR9 negatively regulates autophagy. Moreover, MTMR6 in complex with MTMR9 negatively regulates DNA damage-induced apoptosis. MTMR9 acts as an adapter for myotubularin-related phosphatases, positively regulating the catalytic activity of MTMR6 and MTMR7. MTMR9 lacks the conserved active site cysteine residue at position 333 in the dsPTPase catalytic loop, suggesting that it has no phosphatase activity.
