identifier: Pfam:PF30183
label: Citrate utilization protein B Fer4-like domain
definition: >-
  This entry represents the N-terminal Fer4-like domain found in citrate utilization protein B and related bacterial proteins. This entry includes proteins that are described as citrate utilization protein B, mainly found in proteobacteria. CitB has been identified in Salmonella and Escherichia coli as the signal transduction component of a two-component system for citrate in which CitA acts as a citrate transporter. This also includes Rhodobacter capsulatus (Rhodopseudomonas capsulata) CobZ ( ), which in most other species exists as the separate CitB gene (also known as TcuB) adjacent to CobZ. CobZ is essential for cobalamin biosynthesis (by knockout of the R. capsulatus gene) and is complemented by the characterised precorrin 3B synthase CobG. The enzyme has been shown to contain flavin, haem and Fe-S cluster cofactors and is believed to require dioxygen as a substrate.
