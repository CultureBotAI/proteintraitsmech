identifier: Pfam:PF01346
label: Domain amino terminal to FKBP-type peptidyl-prolyl isomerase
definition: >-
  Peptidyl-prolyl cis-trans isomerase (PPIase) catalyses the cis-trans isomerisation of proline imidic peptide bonds in oligopeptides. This α helical domain is found at the N terminus of proteins belonging to the FKBP-type peptidyl-prolyl cis-trans isomerase family. Peptidyl-prolyl cis-trans isomerase has been shown to accelerate the refolding of several proteins in vitro; the FKPB-type enzymes probably act in the folding of extracytoplasmic proteins.
