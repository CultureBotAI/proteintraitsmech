identifier: Pfam:PF26651
label: Family of unknown function (DUF8216)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea, specifically within the Halobacteria class. The proteins in this family are typically around 116 amino acids in length. They are predicted to be integral membrane proteins, as suggested by the presence of four predicted transmembrane helices.
