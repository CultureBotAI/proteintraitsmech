identifier: Pfam:PF09125
label: Cytochrome C oxidase subunit II, transmembrane
definition: >-
  This N-terminal domain forms the transmembrane region in subunit II of cytochrome c oxidase from Thermus thermophilus. This domain adopts a tertiary structure consisting of two antiparallel transmembrane helices, in a transmembrane helix hairpin fold.
