identifier: Pfam:PF27160
label: Y4kK N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Y4kK, an uncharacterised protein from Sinorhizobium fredii. The specific function of this N-terminal domain remains unknown. Y4kK protein is encoded on the symbiotic plasmid pNGR234a and belongs to the COG1404 functional category, the N-terminal is represented by and the central domain following the N-terminal is represented by .
