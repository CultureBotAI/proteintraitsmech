identifier: Pfam:PF18211
label: Csm1 subunit domain B
definition: >-
  This domain is found in the Csm1 subunit of the Csm complex found in Thermococcus onnurineus. Csm is a type III-A CRISPR-Cas system, which is an RNA-guided immune defense mechanism that detects and destroys foreign DNA or RNA. This domain is known as domain A and is positioned side by side with domain C. Both domain A and domain C adopt the BABBA topology. Domain A interacts primarily with domain B.
