identifier: Pfam:PF27255
label: Uncharacterised lipoprotein PM1805
definition: >-
  This entry represents the PM1805 family of uncharacterised lipoproteins found in Pasteurella multocida. PM1805 contains an N-terminal signal peptide that is predicted to be processed. The function of this protein remains to be determined.
