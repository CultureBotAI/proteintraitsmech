identifier: Pfam:PF21317
label: Beta-galactosidase, first all-beta domain
definition: >-
  This entry represents a subset of the glycosyl hydrolase 35 family, including beta-galactosidase (B-gal), B-gal-1, B-gal-1-like, B-gal-8, B-gal-17. Mammalian beta-galactosidase is a lysosomal enzyme (gene GLB1) which cleaves the terminal galactose from gangliosides, glycoproteins, and glycosaminoglycans and whose deficiency is the cause of the genetic disease Gm(1) gangliosidosis (Morquio disease type B). These proteins consist of a catalytic TIM-barrel and two all-β domains (ABD1 and ABD2). This entry represents the first all-β domain ABD1.
