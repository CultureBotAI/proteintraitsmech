identifier: Pfam:PF22707
label: S1/CSD-like domain 2 of the TOTE conflict systems
definition: >-
  This entry represents a presumed ribonucleoprotein complex-forming domain of the TOTE ((TPR, OB, TBP, Effector) conflict systems, potentially binding ssRNAs derived from hybrid duplexes bound by the systems. It is typically found in a two-domain tandem repeat arrangement, this is the second domain.
