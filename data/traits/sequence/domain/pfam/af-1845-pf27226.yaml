identifier: Pfam:PF27226
label: AF_1845 START domain-like
definition: >-
  This entry represents a domain found in AF_1845, an uncharacterised protein from Archaeoglobus fulgidus. AF_1845 is a 288 amino acid protein (gene AF_1845) that contains an N-terminal signal peptide and is predicted to be secreted. This domain adopts a structure similar to the START (StAR-related lipid transfer) domain, which is typically involved in lipid binding and transfer. The protein is annotated as arCOG10356 and is found in archaeal species. This domain is also found in bacterial sequences. The specific function of this domain remains to be determined.
