identifier: Pfam:PF27183
label: YomQ N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YomQ, an uncharacterised protein of 116 amino acids from Bacillus subtilis. YomQ is derived from the SPbeta prophage and is encoded by the gene yomQ (locus tag BSU21260) on the B. subtilis chromosome. The function of this protein remains to be determined.
