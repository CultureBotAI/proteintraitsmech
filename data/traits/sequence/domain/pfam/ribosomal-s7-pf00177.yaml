label: Ribosomal protein S7p/S5e
definition: >-
  This entry represents the uS7 structural domain, which consists of a bundle of six helices and an extended β hairpin between helices 3 and 4, with two or more RNA-binding sites on its surface. This entry includes the small ribosomal subunit protein uS7, formerly referred to as 30S ribosomal proteins S7 (bacterial, archaeal, plastid, mitochondrial), and eukaryotic 40S ribosomal proteins S5 (cytoplasmic). 30S ribosomal protein S7 contacts ribosomal proteins S9 and S11. It is also one of the primary rRNA binding proteins - it binds directly to 16S rRNA - where it nucleates assembly of the head domain of the 30S subunit. S7 is located at the subunit interface close to the decoding centre, where it has been shown to contact mRNA. It has also been shown to contact tRNA in both the P and E sites; it probably blocks exit of the E site tRNA. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1…
