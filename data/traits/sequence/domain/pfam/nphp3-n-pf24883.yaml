identifier: Pfam:PF24883
label: Nephrocystin 3, N-terminal
definition: >-
  This entry represents a P-loop like domain found at the N-terminal of nephrocystin-3 (NPHP3) as well as in the Ankyrin repeat domain-containing protein 50, Ankyrin repeat domain-containing protein SAT10, Vegetative incompatibility protein HET-E-1 and other related eukaryotic and bacterial proteins. This domain belongs to NACHT NTPases clade defined by a residue (glycine, alanine or serine) directly C-terminal of the Mg2+-coordinating aspartate, and two additional acidic residues one position downstream, with a consensus sequence hhhhD[GAS]hDE. NPHP3 is a protein required for normal ciliary development and function. It inhibits disheveled-1-induced canonical Wnt-signalling activity and may also play a role in the control of non-canonical Wnt signalling which regulates planar cell polarity. Loss of the NPHP3 function results in situs inversus, congenital heart defects, and embryonic lethality in mice. Ankyrin repeat domain-containing protein 50 is involved in the endosome-to-plasma membrane trafficking and recycling of SNX27-retromer-dependent cargo proteins, such as GLUT1. Ankyrin repeat domain-containing protein SAT10 is part of the satratoxin SC1 cluster involved in the biosynthesis of satratoxins, trichothecene mycotoxins that are associated with human food poisonings.
