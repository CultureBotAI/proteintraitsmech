identifier: Pfam:PF02436
label: Conserved carboxylase domain
definition: >-
  This domain represents a conserved region in pyruvate carboxylase (PYC) ( ), oxaloacetate decarboxylase alpha chain (OADA) ( ), and transcarboxylase 5s subunit ( ). The domain is found adjacent to the HMGL-like domain ( ) and often close to the biotin_lipoyl domain ( ) of biotin requiring enzymes.
