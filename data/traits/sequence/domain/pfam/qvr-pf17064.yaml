identifier: Pfam:PF17064
label: Quiver family u-PAR/Ly-6-like domain
definition: >-
  Drosophila QUIVER protein (qvr), also known as SLEEPLESS protein or SSS, is a small (~15kDa) glycosylphosphatidylinositol (GPI)-anchored protein from the Ly-6 family required for homoeostatic regulation of sleep under normal conditions and following sleep deprivation. SSS is a novel potassium channel subunit that regulates the voltage-gated potassium channel Shaker (Sh) protein, a potassium channel which regulates the sleep. This interaction suppresses neuronal excitability and enables sleep. Besides the Sh modulation, SSS also antagonises nicotinic acetylcholine receptors (nAChRs) to reduce synaptic transmission and promote sleep. This entry also includes paralogues of qvr called UPAR/Ly6 domain-containing proteins such as crim, rtv and bero from Drosophila melanogaster and the uncharacterised protein F46C5.4 from C.elegans.
