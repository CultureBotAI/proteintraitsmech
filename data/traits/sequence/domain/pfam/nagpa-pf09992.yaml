identifier: Pfam:PF09992
label: Phosphodiester glycosidase
definition: >-
  This domain can be found in many bacterial and several viral proteins and can be identified in the mammalian transmembrane glycoprotein N-acetylglucosamine-1-phosphodiester alpha-N-acetylglucosaminidase (NAGPA). Some proteins containing this domain may function as phosphodiester glycosidases.
