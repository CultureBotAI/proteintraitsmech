identifier: Pfam:PF28679
label: Interleukin-27 receptor alpha N-terminal domain
definition: >-
  This entry represents the N-terminal Fibronectin type III domain of interleukin-27 receptor subunit alpha (IL27RA). IL27RA is a type I cytokine receptor that functions as a receptor for IL-27 and requires IL6ST/GP130 to mediate signal transduction. The receptor is highly expressed in lymphoid tissues and is involved in the regulation of Th1-type immune responses. The full-length protein contains multiple fibronectin type-III domains and a WSXWS motif necessary for proper protein folding and cell-surface receptor binding. This N-terminal domain adopts an Fibronectin type III fold and contributes to the extracellular portion of the receptor. The specific function of this domain within the receptor complex remains to be determined.
