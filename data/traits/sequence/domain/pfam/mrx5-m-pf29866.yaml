identifier: Pfam:PF29866
label: MRX5 middle domain
definition: >-
  This entry represents a middle domain found in MRX5 and related proteins from fungi. MRX5 is a component of MIOREX complexes, which are large expressome-like assemblies of ribosomes with factors involved in all steps of post-transcriptional gene expression in mitochondria. The protein associates with the mitochondrial ribosome and localises to mitochondria. MRX5 is present at moderate levels in cells and plays a role in mitochondrial gene expression organisation. The function of this domain remains to be determined.
