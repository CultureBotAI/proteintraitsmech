identifier: Pfam:PF26631
label: Domain of unknown function (DUF8204)
definition: >-
  This domain is found in uncharacterised plant proteins. It is predicted to fold into an open barrel-like structure. It contains two pair of conserved cysteine residues which are predicted to form disulfide bonds. It may be involve in oligomerisation given the number of conserved exposed hydrophobic residues.
