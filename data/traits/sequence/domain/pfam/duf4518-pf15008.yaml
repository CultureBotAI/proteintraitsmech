identifier: Pfam:PF15008
label: DUF4518 C-terminal domain
definition: >-
  This entry represents the C-terminal β sheet domain found in human Uncharacterized protein C3orf38 and similar animal proteins. Members of this group were previously known as the DUF4518 family. This domain has an NTF2-like fold. The function of this domain is unknown.
