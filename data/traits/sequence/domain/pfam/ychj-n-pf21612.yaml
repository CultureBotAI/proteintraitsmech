identifier: Pfam:PF21612
label: YchJ family protein, N-terminal zinc binding domain
definition: >-
  This domain is found at the N-terminal of the functionally uncharacterised YchJ family protein from Psychrobacter arcticus ( ) and related proteins from Psychrobacter species. The structure of YchJ ( ) shows that this domain folds into an α-helical structure. This domain contains the same type of C4 zinc finger as in SEC-C motif ( ) located at the C-terminal of YchJ, suggesting internal duplication in the YchJ family.
