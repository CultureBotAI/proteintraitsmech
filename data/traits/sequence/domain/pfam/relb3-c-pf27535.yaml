identifier: Pfam:PF27535
label: Antitoxin RelB3 C-terminal domain
definition: >-
  This entry represents the C-terminal in antitoxin RelB2, RelB3, RelB4 and Orphan antitoxin ParD2 proteins, mostly found in bacteria. RelB2-4 and ParD2 are antitoxin components of a type II toxin-antitoxin (TA) system. They neutralise the effect of the cognate toxin RelE2-4 respectively, but not other RelE or ParE toxins.
