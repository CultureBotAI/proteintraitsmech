identifier: Pfam:PF26512
label: Styrene oxide isomerase
definition: >-
  This entry represents Styrene oxide isomerase from Pseudomonas fluorescens (SOI, EC 5.3.99.7), Hydroxylaminobenzene mutase HabA from Ectopseudomonas oleovorans and similar proteins from bacteria and some eukaryotic species. SOI is a membrane-bound enzyme involved in bacterial styrene degradation. It catalyses the Meinwald rearrangement, a Lewis-acid-catalysed isomerisation of styrene oxide to phenylacetaldehyde. The enzyme forms a trimeric assembly, with each monomer having four transmembrane helices. A ferric haem b prosthetic group is bound at the subunit interface, where Fe(III) acts as the Lewis acid by binding to the epoxide oxygen. Key residues include H58 which coordinates the haem iron, and Y103 and N64 which position the substrate for high regio-selectivity and stereo-specificity. SOI is highly stable and shows high catalytic activity, making it promising for biocatalytic applications. HabA and HabB catalyse the rearrangement of hydroxylaminobenzene to 2-aminophenol and is involved in the degradation of nitrobenzene.
