identifier: Pfam:PF14865
label: Macin
definition: >-
  The macin family consists of theromacin, neuromacin and hydramacin-1. All of the macins exert antimicrobial activity, but neuromacin also possesses nerve repair activity. Structurally, they form a disulphide-stabilised α-β motif.
