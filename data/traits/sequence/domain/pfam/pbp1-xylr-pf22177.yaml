identifier: Pfam:PF22177
label: XylR N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Xylose operon regulatory protein (XylR), an atypical AraC protein. This D-xylose-binding domain contains a periplasmic-binding protein (PBP) fold, similar to LacI/GalR transcription regulators, and mediates dimerisation.
