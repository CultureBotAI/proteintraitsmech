identifier: Pfam:PF13916
label: PP1-regulatory protein, Phostensin N-terminal
definition: >-
  Phostensin has been identified as a PP1 regulatory protein binding protein. This domain is N-terminal to the PP1- and SH3-binding regions, though may carry an additional SH3-binding motif. It is likely that phostensin targets PP1 to the F-actin cytoskeleton. Phostensin binds to actin and decreases the elongation and depolymerisation rates of actin filament pointed ends. This domain is also found in the taperin, which is a PP1 binding protein that is ancestrally related to phostensin. Taperin has a role in sound perception.
