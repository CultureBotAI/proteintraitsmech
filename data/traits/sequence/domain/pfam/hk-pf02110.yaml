identifier: Pfam:PF02110
label: Hydroxyethylthiazole kinase family
definition: >-
  Most microorganisms and plants can synthesise thiamin de novo. In this de novo pathway, the thiazole and pyrimidine moieties of thiamin are made separately and coupled together to form thiamin phosphate. For the thiazole moiety, 4-methyl-5-(2-hydroxyethyl)thiazole (THZ), the key salvage step is phosphorylation to give 4-methyl-5-(2-phosphonooxyethyl)thiazole (THZ-P). The enzyme hydoxyethylthiazole kinase ( ) is responsible for this step. Hydoxyethylthiazole kinase is encoded by thiM in Escherichia coli and other bacteria, and by the C-terminal region of bifunctional proteins in some cases, such as Saccharomyces cerevisiae, in which the N-terminal domain corresponds to the bacterial thiamine-phosphate pyrophosphorylase ( ), ThiE. ThiM constitutes a potential target for pro-drug compounds for antibacterial drug development. The Arabidopsis and maize genomes encode homologues of ThiM.
