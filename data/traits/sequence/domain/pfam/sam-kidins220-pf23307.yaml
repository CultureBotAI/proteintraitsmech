identifier: Pfam:PF23307
label: Kinase D-interacting substrate of 220 kDa-like, SAM domain-like
definition: >-
  This is the predicted Sterile alpha motif (SAM) domain of human Kinase D-interacting substrate of 220 kDa (KIDINS220) and similar animal and insect proteins. KIDINS220 promotes a prolonged MAP -kinase signalling by neurotrophins and is involved in nerve growth factor (NGF)-induced recruitment of RAPGEF2 to late endosomes and neurite outgrowth. This protein is rich in ankyrin repeats, has a KAP family P-loop domain () and a SAM domain (this entry) with a predicted all α-helical structure.
