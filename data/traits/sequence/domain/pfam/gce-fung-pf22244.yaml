identifier: Pfam:PF22244
label: Glucuronyl esterase, fungi
definition: >-
  This entry represents a domain found in 4-O-methyl-glucuronoyl methylesterase from Schizophyllum commune (GCE) and similar glucuronyl esterases from fungi and bacteria. This protein seems to play a significant role in biomass degradation, as they can disconnect hemicellulose from lignin through the hydrolysis of the ester bond between 4-O-methyl-D-glucuronic acid residues of glucuronoxylans and aromatic alcohols of lignin. Members of this group belong to the carbohydrate esterase family 15 (CE15).
