identifier: Pfam:PF08538
label: Protein of unknown function (DUF1749)
definition: >-
  This entry includes fusarinine C esterase SidJ from the yeast Neosartorya fumigata . Fusarinine C is an intracellular siderophore (an iron-chelating compound that transports iron across membranes) that is crucial for virulence. The closely related siderophore triacetylfusarinine C is not hydrolysed by SidJ. Homologues of SidJ are found in plants and bacteria.
