identifier: Pfam:PF29650
label: Autophagy-related protein 23
definition: >-
  This entry represents ATG23, an autophagy-related protein required for cytoplasm to vacuole transport vesicle formation and efficient autophagy. ATG23 plays a crucial role in ATG protein retrieval from the pre-autophagosomal structure and is especially required for autophagy-dependent cycling of ATG9. The protein forms a complex with ATG9 and ATG27. ATG23 is found in yeast, particularly within the Saccharomycetaceae family, and localises to the cytoplasm and pre-autophagosomal structure membrane as a peripheral membrane protein.
