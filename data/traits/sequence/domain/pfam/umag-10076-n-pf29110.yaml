identifier: Pfam:PF29110
label: UMAG_10076 N-terminal domain
definition: >-
  This entry represents a N-terminal domain found in UMAG_10076 and related uncharacterised proteins from fungi. The proteins containing this domain are approximately 160-180 amino acids in length and possess N-terminal signal peptides, suggesting they are secreted or targeted to specific cellular compartments. The domain is classified under eggNOG family KOG4146. The function of this domain remains to be determined.
