identifier: Pfam:PF20957
label: GxGYxYP_N second domain
definition: >-
  This entry represents a domain that is found repeated in three copies per protein and is likely to be involved in binding the bacterial cell wall. This domain can be found in the N-terminal region of a group of proteins that carry a characteristic sequence motif, GxGYxYP, and are putative glycoside hydrolases. This domain corresponds to the second one and it is found in association with .
