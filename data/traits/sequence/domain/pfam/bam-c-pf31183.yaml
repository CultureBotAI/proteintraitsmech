identifier: Pfam:PF31183
label: Protein bag of marbles, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of BAM (bag of marbles), found in Drosophilidae. BAM is required to initiate male and female gametogenesis and promotes germline stem cell differentiation. The full-length protein forms complexes with BGCN, TUT and OTU involved in translational regulation, deubiquitinase activity and immune signalling. The C-terminal region interacts with OTU and enhances its deubiquitinase activity; together they deubiquitinate cyclin A and regulate K63-linked ubiquitination in the IMD pathway. This domain also interacts with BGCN.
