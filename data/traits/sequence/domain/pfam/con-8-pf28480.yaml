identifier: Pfam:PF28480
label: Conidiation-specific protein 8
definition: >-
  This entry represents a family of conidiation-specific proteins found in fungi, exemplified by con-8 from Neurospora crassa. The protein is 176 amino acids in length and is expressed early during conidial differentiation. Conidia are dormant spores produced during asexual reproduction in filamentous fungi. The protein contains extensive disordered regions with a low complexity region. This family is found across Ascomycota fungi. The specific molecular function of this protein remains to be determined.
