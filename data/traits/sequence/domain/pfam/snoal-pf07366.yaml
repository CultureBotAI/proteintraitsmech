identifier: Pfam:PF07366
label: SnoaL-like polyketide cyclase
definition: >-
  Polyketides form a diverse group of compounds produced mainly by microorganisms and plants. This family of polyketide synthases includes aklanonic acid methyl ester cyclases, involved in the synthesis of aklavinone, an intermediate in the biosynthetic pathway of clinically important anthracyclines such as daunorubicin and doxorubicin. SnoaL belongs to this family; it is involved in nogalamycin biosynthesis. SnoaL adopts a distorted α-β barrel fold. Structural data together with site-directed mutagenesis experiments have shown that SnoaL has a different mechanism to that of the classical aldolase for catalysing intramolecular aldol condensation.
