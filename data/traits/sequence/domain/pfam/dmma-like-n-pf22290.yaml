identifier: Pfam:PF22290
label: Dimethylamine monooxygenase subunit DmmA-like, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the dimethylamine monooxygenase subunit DmmA from Methylocella silvestris (Msil_3607, ) and similar sequences, mainly found in proteobacteria and actinomycetes. Dimethylamine (DMA) monooxygenase is required for metabolism of trimethylamine N-oxide (TMAO). This domain may adopt a Rossmann-like fold similar to Ferredoxin/Ferric reductase-like NAD binding domain. This domain is also found in a central position in Carnitine monooxygenase reductase subunit from Escherichia coli, Heme-dependent oxidative N-demethylase delta subunit from Ectopseudomonas mendocina, Vanillate O-demethylase oxidoreductase from Pseudomonas putida and closely related species.
