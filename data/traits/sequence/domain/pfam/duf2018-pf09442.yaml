identifier: Pfam:PF09442
label: Domain of unknown function (DUF2018)
definition: >-
  This entry represents proteins of unknown function. The crystal structure of HP0242, a hypothetical protein from Helicobacter pylori (Campylobacter pylori) has been determined. It reveals an acid-adaptive protein possibly of physiological significance when H. pylori colonises the human stomach. The protein adopts a unique four α-helical triangular conformations. The biologically active form is thought to be a tetramer. The gene exist in an operon along with 6 other genes where the gene products appear to be related to iron storage and haem biosynthesis.
