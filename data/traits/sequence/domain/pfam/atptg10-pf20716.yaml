identifier: Pfam:PF20716
label: ATPTG10-like
definition: >-
  This entry, previously known as DUF6828, represents a domain found in the T. gondii ATP synthase subunit 10 (ATPTG10, ) and related proteins from Apicomplexan species. This domain adopts an α-helical structure consisting of five helices. It contains two highly conserved sequence motifs: FSWxD and MxLWI/LKxRI/L. The formation of the T. gondii ATP synthase hexamer involves two contact sites in the lumenal region. ATPTG10 contributes to the the second site via interaction with ATP synthase subunit 11 (ATPTG11).
