identifier: Pfam:PF30250
label: DegR domain
definition: >-
  This entry represents the DegR domain found in the regulatory protein DegR and its orthologues, found in Bacillus species. DegR stabilises the phosphorylated form of DegU, leading to enhanced production of levansucrase, alkaline protease, and neutral protease. The protein forms a homotetramer.
