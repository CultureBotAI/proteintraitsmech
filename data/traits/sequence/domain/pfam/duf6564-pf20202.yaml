identifier: Pfam:PF20202
label: Domain of unknown function (DUF6564)
definition: >-
  This domain is functionally uncharacterised and is found in proteins from bacteria and archaea. This domain is found in LicC proteins, CTP:phosphocholine cytidylyltransferases involved in LPS biosynthesis. Members containing this domain are annotated as nucleotidyltransferases. It is probable that this domain has a Rossmann-like fold.
