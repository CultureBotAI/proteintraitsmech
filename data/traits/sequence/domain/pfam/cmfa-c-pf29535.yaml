identifier: Pfam:PF29535
label: Conditioned medium factor C-terminal domain
definition: >-
  This entry represents the C-terminal domain of conditioned medium factor found in Dictyostelium discoideum. The full-length protein CMF is involved in cell density sensing and may synchronise the onset of development by triggering aggregation when cells have starved. The protein is secreted and N- and O-glycosylated. The C-terminal region contains a disordered segment. While the full-length protein functions in density sensing and developmental regulation, the specific function of this C-terminal domain remains to be determined.
