identifier: Pfam:PF20871
label: BTB/POZ domain-containing protein KCTD1/15, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of BTB/POZ domain-containing proteins 1 and 15 (KCTD1/15), characterised by β-sheets surrounded by α-helices ( ). Structural similarities of the C-terminal domain of KCTD proteins allowed their classification in clades and subclades described in. This domain is also found in similar animal proteins.
