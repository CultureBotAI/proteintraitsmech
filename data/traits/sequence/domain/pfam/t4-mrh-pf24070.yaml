identifier: Pfam:PF24070
label: T4 MRH-like protein family
definition: >-
  This entry represents RpoH-modulating protein from Enterobacteria phage T4 (Mrh), the uncharacterised Y01F from bacteriophage T4 and similar sequences from tailed bacteriophages. Mrh plays a role in transcriptional regulation of late T4 genes. It modulates the phosphorylation status of host heat shock sigma factor RpoH which is an initiation factor that promotes the attachment of host RNA polymerase to specific initiation sites. Structure prediction suggests that this protein may oligomerise, with the C-terminal contacting the next subunit in a cyclic homo-oligomer.
