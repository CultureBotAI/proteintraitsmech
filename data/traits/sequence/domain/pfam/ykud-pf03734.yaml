identifier: Pfam:PF03734
label: L,D-transpeptidase catalytic domain
definition: >-
  This domain is found in L,D-transpeptidases, such as LDT2 from Mycobacterium tuberculosis, which generates 3->3 cross-links in peptidoglycan, catalysing the cleavage of the mDap3-D-Ala4 bond of a tetrapeptide donor stem and the formation of a bond between the carbonyl of mDap3 of the donor stem and the side chain of mDap3 of the acceptor stem. It is specific for donor substrates containing a stem tetrapeptide since it cannot use pentapeptide stems. The Probable L,D-transpeptidase YbiS from E.coli, is responsible, at least in part, for anchoring of the major outer membrane lipoprotein (Lpp, also known as the Braun lipoprotein) to the peptidoglycan via a meso-diaminopimelyl-L-Lys- bond on the terminal residue of Lpp. This entry also includes Peptidoglycan meso-diaminopimelic acid protein amidase A, hydrolase that plays a role in the regulation of peptidoglycan-outer membrane linkages. It has two distinctive enzymatic functions, an L,D-endopeptidase activity and a carboxypeptidase activity. It acts as a murein L,D-endopeptidase that catalyses the cleavage of the cross-link between the outer membrane-anchored Braun's lipoprotein (Lpp) and peptidoglycan, detaching Lpp from the peptidoglycan layer.
