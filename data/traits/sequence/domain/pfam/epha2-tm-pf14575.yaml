identifier: Pfam:PF14575
label: Ephrin type-A receptor 2 transmembrane domain
definition: >-
  This entry represents the left-handed dimer transmembrane domain of Ephrin receptors. This domain oligomerises and is important for the active signalling process. Proteins containing this domain include the ephrin type-A and type-B receptors. Ephrin receptors (Ephs) are a group of receptor tyrosine kinases that are activated in response to binding ephrin ligands residing on adjacent cells. This binding leads to contact-dependent bidirectional signaling into neighbouring cells. The Eph receptors, which bind a group of cell-membrane-anchored ligands known as ephrins, represent the largest subfamily of receptor tyrosine kinases (RTKs). These receptors and their ephrin ligands control a diverse array of cell-cell interactions in the nervous and vascular systems. Upon ephrin binding, the Eph kinase domain is activated, initiating "forward" signalling in the receptor-expressing cells. Simultaneously, signals are induced in the ligand-expressing cells, a phenomenon referred to as "reverse" signalling. The extracellular region of Eph receptors contains a conserved 180-amino-acid N-terminal ligand-binding domain (LBD), which is both necessary and sufficient for binding to ephrin ligands. An adjacent cysteine-rich region may be involved in the receptor-receptor oligomerisation often observed upon ligand binding, whereas the two fibronectin type III repeats have yet to be assigned a clear biological function. The cytoplasmic region contains a kinase domain, a sterile alpha motif (SAM) domain, and a PDZ-binding motif. The LBD is unique to this family of RTKs and shares no significant amino acid sequence homology with other known proteins. The Eph LBD forms a compact globular structure that folds into a jellyroll β-sandwich composed of 11 antiparallel β-strands. Two antiparallel β-…
