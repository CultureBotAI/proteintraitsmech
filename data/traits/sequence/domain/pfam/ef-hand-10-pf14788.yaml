identifier: Pfam:PF14788
label: EF hand
definition: >-
  This entry represents the EF-hand domain found in 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase delta-3 (PLC-delta3). PLC-delta-3 is essential for trophoblast and placental development. It locates at the cleavage furrow where it may participate in cytokinesis.
