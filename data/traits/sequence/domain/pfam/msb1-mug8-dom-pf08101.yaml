identifier: Pfam:PF08101
label: Meiotically up-regulated protein Msb1/Mug8 domain
definition: >-
  This domain of unknown function is found in fungal proteins, including Mug8 from Schizosaccharomyces pombe which may have a role in meiosis and septation. Saccharomyces cerevisiae homologue MSB1( ) may be involved in positive regulation of 1,3-beta-glucan synthesis and the Pkc1p-MAPK pathway.
