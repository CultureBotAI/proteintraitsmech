identifier: Pfam:PF12019
label: Type II transport protein GspH
definition: >-
  GspH is involved in bacterial type II export systems. Like all pilins, GspH has an N terminus α helix. This helix is followed by nine β strands forming two β sheets, one of five antiparallel strands and one of four antiparallel strands. GspH is a minor pseudopilin; it is expressed much less than other pseudopilins in the type II secretion pilus (major pilins). The function and localisation of minor pseudo-pilins are still to be fully unraveled. It has been suggested that some minor pseudopilins may assemble either into the base or the tip of pili, or both. They function as initiators or regulators of pilus biogenesis and dynamics, and/or as adaptors between various pseudopilin component and other members of the T2SS.
