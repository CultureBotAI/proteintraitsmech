identifier: Pfam:PF01174
label: SNO glutamine amidotransferase family
definition: >-
  This entry represents a family of pyridoxal 5'-phosphate synthase subunit, also known as the pdxT/SNO family. This family belongs to a superfamily containing a triad glutamine aminotransferase fold, characterised by a conserved Cys-His-Glu active site. Two regions are highly conserved across all taxa, the PGGEST motif and the FHPE(LT) motif. PdxT/SNO proteins are an α/β three-layer sandwich containing a seven- stranded twisted mixed parallel β-sheet flanked by a six α-helices on the N-terminal stretch of the sheet, four on one side and two on the other. They are involved in vitamin B6 biosynthesis.
