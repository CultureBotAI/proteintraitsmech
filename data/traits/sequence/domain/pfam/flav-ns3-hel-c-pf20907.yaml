identifier: Pfam:PF20907
label: Flavivirus NS3 helicase, C-terminal helical domain
definition: >-
  This domain is found at the C-terminal end of NS3 helicase (Non-structural protein 3-helicase, NS3-Hel) found in Flavivirus such as Zika virus (ZIKV) and Dengue virus type 1 (DENV-1). This protein binds RNA and unwinds dsRNA in the 3' to 5' direction. It consists of three domains. This entry represent the final domain, which is mostly α-helical. A highly conserved arginine residue located in this domain was proven essential for the enzymatic activities of the protein.
