identifier: Pfam:PF24559
label: DNA repair protein RAD5A UBA domain
definition: >-
  This is the UBA domain found at the N-terminal of DNA repair protein RAD5A from Arabidopsis thaliana and similar plant sequences. RAD5A functions in error-free postreplication DNA repair or DNA-damage tolerance (DTT) pathway. It is required for homologous recombination (HR) induced by DNA double-strand break (DSB) in somatic cells.
