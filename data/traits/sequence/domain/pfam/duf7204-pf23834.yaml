identifier: Pfam:PF23834
label: Domain of unknown function (DUF7204)
definition: >-
  This domain family is found in viruses that infect Streptococcus thermophilus bacteria. All members are from Caudoviricetes viruses. The domain is approximately 50 amino acids in length. The function of this domain is currently unknown. An AlphaFold model shows these proteins adopt a compact domain composed of a three stranded β sheet with a single α helix.
