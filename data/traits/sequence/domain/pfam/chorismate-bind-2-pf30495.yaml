identifier: Pfam:PF30495
label: Chorismate binding enzyme
definition: >-
  Isochorismate synthase ( ) catalyses the conversion of chorismate to isochorismate, the first step in the biosynthesis of both the respiratory chain component menaquinone (MK, vitamin K2) and phylloquinone (vitamin K1). In bacteria, isochorismate is a precursor of siderophores enterobactin (via the 2,3-dihydroxybenzoate (DHB) precursor), amonabactins and salicylic acid. Most aerobic bacteria secrete siderophores to facilitate iron acquisition. Siderophores are iron-chelating agents which are low molecular weight compounds that specifically bind ferric iron and mediate iron uptake into the cell by recognition of specific membrane receptor proteins and transport systems. In plants, isochorismate synthase is required for defence against pathogens. Salicylic acid synthesised via the pathway using isochorismate synthase is responsible for both local and systemic acquired resistance in plants. In Escherichia coli and Bacillus subtilis, two distinct isochorismate synthase isoenzymes, MenF and EntC/DhbC, are known to be involved in MK and siderophore biosynthesis pathways, respectively. MenF and EntC are differentially regulated and isochorismate synthesised by EntC is mainly channelled into enterobactin synthesis, whereas isochorismate synthesised by MenF is mainly channelled into menaquinone synthesis. The catalytic/chorismate binding domain characteristic of members of this group is related to other chorismate binding enzymes: component I of anthranilate synthase, para-aminobenzoate synthase, and aminodeoxychorismate synthase (please see ). There is a significant heterogeneity in the length and sequence of the N-terminal region of members of this group. Partially on the basis of the N-terminal region, the group can be divided into subfamilies, with the enzymes involved in D…
