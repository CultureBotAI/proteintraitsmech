identifier: Pfam:PF25593
label: Gliding motility lipoprotein GldD
definition: >-
  This entry represents the GldD lipoprotein family, found in members of the Bacteroidetes lineage, including species such as Cytophaga johnsonae, which exhibit a poorly understood form of rapid gliding motility, as well as species that lack this capability. GldD is a post-translationally modified lipoprotein and an essential component of the bacterial gliding motility machinery. In C. johnsonae, mutation of the GldD gene disrupts both gliding motility and chitin utilisation, underscoring its functional importance. Although GldD is critical for surface motility, its precise molecular role remains to be fully elucidated.
