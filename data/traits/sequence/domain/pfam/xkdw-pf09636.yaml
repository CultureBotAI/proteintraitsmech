identifier: Pfam:PF09636
label: XkdW protein
definition: >-
  This entry includes the phage SPbeta protein YorD, the function of which is not known. It also contains the protein XkdW ( ) from the Phage-like element PBSX in Bacillus subtilis. XkdW is approximately 100 residues long and contains two α helices and two β strands, and is probably monomeric. XkdW is expressed in bacteria but is probably viral in origin. Its function is unknown. PBSX, a defective prophage of B. subtilis, is a chromosomally based element which encodes a non-infectious phage-like particle with bactericidal activity. PBSX is induced by agents which elicit the SOS response.
