identifier: Pfam:PF26097
label: Phage inhibitor of prohead protease N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Inh protein. This N-terminal domain is predicted to be composed of a three α helix bundle. Bacteriophage T4 inhibitor (Inh) protein functions as an inhibitor of the prohead protease gp21. The inh gene is located upstream of the hoc gene in the T4 genome. The protein is approximately 226 amino acids long and acts as a minor capsid protein in phage T4.
