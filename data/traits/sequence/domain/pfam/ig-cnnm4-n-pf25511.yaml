identifier: Pfam:PF25511
label: Metal transporter CNNM4-like, immunoglobulin-like domain
definition: >-
  This domain is found at the N-terminal end of human Metal transporter CNNM1/2/4 and similar proteins mainly found in vertebrates. CNNM4 may play a role in sensory neuron functions and in biomineralisation and retinal function.
