identifier: Pfam:PF26177
label: C2H2-domain containing protein first zinc finger domain
definition: >-
  This entry represents the first C2H2 zinc finger domain in C2H2 domain-containing proteins found in fungi. C2H2 zinc fingers contain a short β-hairpin and an α-helix (β/β/α structure), where a single zinc atom is held in place by Cys(2)His(2) (C2H2) residues in a tetrahedral array. C2H2 zinc fingers are the most common DNA-binding motifs found in eukaryotic transcription factors and have also been identified in prokaryotes.
