identifier: Pfam:PF10577
label: FAM171A1/A2/B, N-terminal
definition: >-
  This entry represents a domain found at the N-terminal of a family of proteins that includes FAM171A1/A2 and FAM171B. FAM171A1 is a type 1 transmembrane glycoprotein also known as astroprincin (APCN) due to abundant expression in astrocytes. APCN is also expressed in placental trophoblasts, skeletal and heart muscle, kidney and pancreas. APCN is involved in the regulation of the cytoskeletal dynamics, playing a role in actin stress fibre formation.
