identifier: Pfam:PF27165
label: TnsB N-terminal SH3-like domain
definition: >-
  This entry represents the N-terminal domain of TnsB, a DNA- binding component of the Tn7 transposase complex. This domain adopts an SH3-like barrel fold and forms part of the first DNA-binding domain (DBD1) that recognises sequences at both ends of the Tn7 transposon. The domain is essential for DNA binding and transposition activity, with mutations in this region leading to reduced DNA-binding and loss of transposition.
