identifier: Pfam:PF21613
label: Pesticin, receptor binding domain
definition: >-
  Pesticin (Pst) is a anti-bacterial toxin produced by Yersinia pestis that acts through uptake by the target related bacteria and the hydrolysis of peptidoglycan in the periplasm. Pst contains an N-terminal translocation domain, an intermediate receptor binding domain, and a phage-lysozyme like C-terminal activity domain. The N-terminal domain is further divided into the TonB box (which binds TonB), the T (translocation domain) and the R (receptor binding domain). Bacteriocins such as pesticin are produced by Gram-negative bacteria to attack related bacteria stains. Pst is transported to the periplasm via FyuA, an outer-membrane receptor of Y. pestis and E. coli, where it hydrolyzes peptidoglycan via the cleavage of N-acetylmuramic acid and C4 of N-acetylglucosamine. Disruption of the peptidoglycan layer renders the bacteria vulnerable to lysis via osmotic pressure. This domain covers the N-terminal translocation and the receptor binding regions.
