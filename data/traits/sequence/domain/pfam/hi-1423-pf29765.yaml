identifier: Pfam:PF29765
label: Uncharacterised protein HI_1423
definition: >-
  This entry represents the C-terminal region of the uncharacterised protein HI_1423 from Haemophilus influenzae and related bacteria. The family is found in Pasteurellaceae, Neisseriaceae, and Burkholderiaceae. This domain represents a winged helix domain.
