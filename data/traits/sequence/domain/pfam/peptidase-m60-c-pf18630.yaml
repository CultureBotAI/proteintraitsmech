identifier: Pfam:PF18630
label: Peptidase M60 C-terminal domain
definition: >-
  This is C-terminal domain (CTD) of M60-peptidases. It can also be found at the C-terminal region of gingipain B (RgpB) from P. gingivalis. It was found to possess a typical Ig-like fold encompassing seven antiparallel β-strands organized in two β-sheets, packed into a β-sandwich structure that can spontaneously dimerise through C-terminal strand swapping. Translocation of gingipains from the periplasm across the OM is dependent on the conserved CTD, which appears to be important for secretion of the proteins and in particular, truncation of the last few C-terminal residues of this domain leads to accumulation of gingipains in the periplasm. Subsequently, the T9SS targeting signal was demonstrated to reside within the last 22 residues at the C terminus of the CTD. During gingipain translocation across the OM, the CTD is cleaved off by PorU.
