identifier: Pfam:PF18077
label: Domain of unknown function (DUF5595)
definition: >-
  This domain is found in Nude C 80 (Ndc80) proteins which can be found in species such as Homo sapiens. Ndc80 protein complexes are a core component of the end-on attachment sites for kinetochore microtubules. Ndc80 is also known as Hec1, for highly expressed in cancer 1.
