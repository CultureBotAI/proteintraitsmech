identifier: Pfam:PF31081
label: AbeC-like domain
definition: >-
  This entry represents a domain of approximately 270 residues found predominantly in Streptomyces and related Actinomycetes. The domain is named after SCO3289 (AbeC) from Streptomyces coelicolor, which is part of the abe gene cluster involved in secondary metabolite production. The function of this domain remains to be determined.
