identifier: Pfam:PF15600
label: Immunity protein 64
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved DxEA motif and arginine residue. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Tox-ColD family.
