identifier: Pfam:PF21310
label: Inositol polyphosphate 5-phosphatase OCRL-like, ASH domain
definition: >-
  This domain is found in Inositol polyphosphate 5-phosphatase OCRL-1 and Type II inositol 1,4,5-trisphosphate 5-phosphatase (OCRL-2) from humans and similar eukaryotic proteins. OCRL-1 is an enzyme that dephosphorylate the 5' position of the inositol ring. It is thought to help coordinate intracellular membrane traffic through changes in the phosphoinositide composition of associated membranes. Mutations in this protein are responsible for Lowe syndrome. This entry represents a domain found C-terminal to and N-terminal to . It is comprised by two layers of β-sheets and is closely related to the members of the family of immunoglobulin-like β-sandwiches.
