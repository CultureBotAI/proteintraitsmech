identifier: Pfam:PF26476
label: Domain of unknown function (DUF8149)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins are predominantly found in the Halobacteria class, including families such as Haloferacaceae and Natrialbaceae. The domain is approximately 70 amino acids in length. Reviewed UniProt entry Q18JS4 from Haloquadratum walsbyi contains this domain. This domain is likely to be zinc binding based on conservation of cysteine and histidine residues.
