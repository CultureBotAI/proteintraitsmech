identifier: Pfam:PF29342
label: Accumulates dyads protein 4 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ADY4 (Accumulates dyads protein 4), a meiosis-specific protein found in fungi. It is involved in the organisation of prospore membrane shaping and sizing during sporulation. ADY4 localises to the meiotic outer plaque of the spindle pole body and may be required to stabilise the outer plaque structure. The protein interacts with CNM67, SPO21 and NUD1 at the spindle pole body.
