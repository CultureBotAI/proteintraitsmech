identifier: Pfam:PF02303
label: Helix-destabilising protein
definition: >-
  This entry is represented by the Bacteriophage M13, G5P, DNA-binding protein. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. G5P is the bacteriophage helix-destabilising protein, or single-stranded DNA binding protein, required for DNA synthesis. The protein binds to DNA in a highly cooperative manner without pronounced sequence specificity. In the presence of single-stranded DNA it binds cooperatively to form a helical protein-DNA complex. It prevents the conversion during synthesis of the single-stranded (progeny) viral DNA back into the double-stranded replicative form.
