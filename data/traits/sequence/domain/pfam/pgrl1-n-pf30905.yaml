identifier: Pfam:PF30905
label: PGRL1 N-terminal domain
definition: >-
  This entry represents a domain found in the central region of PGRL1 (PGR5-like protein 1) proteins from plants. PGRL1 is a chloroplast thylakoid membrane protein that functions as a ferredoxin-plastoquinone reductase involved in cyclic electron flow around photosystem I. The C-terminal region ( ) is required for ferredoxin binding and contains conserved cysteine residues involved in disulfide bond formation with PGR5 and binding of an iron-containing cofactor. The N-terminal region of these proteins is disordered.
