identifier: Pfam:PF11001
label: YDR124W-like, helical bundle domain
definition: >-
  This entry represents a domain found in mitochondrial proteins such as Subtelomeric hrmA-associated cluster protein AFUB_079030 from Aspergillus fumigatus and YDR124W from yeast. AFUB_079030 is part of the subtelomeric hrmA-associated cluster (HAC) containing genes that alter the hyphal surface (such as reduced total chitin or increased beta-glucan exposure) and perturb inter-hyphal interactions within the developing biofilms, resulting in a loss of vertically aligned polarised growing filaments. According to structure predictions, it may adopt an helical bundle fold. Null mutant showed severe fragmentation of mitochondria and its expression is strongly induced by alpha factor. Members of this entry may have role in maintenance of mitochondrial morphology.
