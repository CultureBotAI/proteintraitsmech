identifier: Pfam:PF28342
label: Fungal ACT-like domain
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an α/β structure with a significant similarity to domains members of ACT-like domain superfamily. This domain is found in combination with and . It probably has a regulatory role or may be involved in oligomerisation. It has two pairs of cysteine residues which are predicted to form disulfide bonds.
