identifier: Pfam:PF23246
label: CDK5 regulatory subunit-associated protein 2-like, coiled coil
definition: >-
  This domain is found in human CDK5 regulatory subunit-associated protein 2 (CDK5RAP2), myomegalin (MYOME, also known as PDE4DIP) and related sequences mainly from vertebrates. CDK5RAP2 is a potential regulator of CDK5 activity that plays a role in the spindle checkpoint activation and regulates centrosomal maturation. It plays a role in the spindle checkpoint activation by acting as a transcriptional regulator of both BUBR1 and MAD2 promoter. Together with EB1/MAPRE1, it may promote microtubule polymerization, bundle formation, growth and dynamics at the plus. It forms a complex with MYOME isoform 13/MMG8/SMYLE, MAPRE1 and AKAP9, to contribute to microtubules nucleation and extension from the centrosome to the cell periphery. MYOME participates in microtubule dynamics, promoting microtubule assembly. Depending upon the cell context, may act at the level of the Golgi apparatus or that of the centrosome. It forms a complex with AKAP9, and recruits CAMSAP2 to the Golgi apparatus and tethers non-centrosomal minus-end microtubules to the Golgi, an important step for polarised cell movement. This entry represents a centrally located region that forms an α-helical coiled-coil (CC) in these proteins.
