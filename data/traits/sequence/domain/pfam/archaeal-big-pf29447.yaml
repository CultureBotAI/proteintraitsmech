identifier: Pfam:PF29447
label: Archaeal bacterial Ig-like domain
definition: >-
  This entry represents a bacterial Ig-like (Big) domain found in halophilic archaea, including members of the Natrialbaceae, Haloferacaceae, and Haloarculaceae families. The domain is approximately 90-95 residues in length and adopts a bacterial Ig-like fold. It is found in multi-domain proteins that also contain DUF4129 domains ( ). While some of the full-length proteins are annotated as protein-glutamine gamma-glutamyltransferases, the specific function of this domain remains to be determined.
