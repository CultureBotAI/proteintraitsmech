identifier: Pfam:PF23025
label: C2 domain-containing protein 5, YbjQ-like domain
definition: >-
  This domain is found in several copies in human C2 domain -containing protein 5 (C2CD5) and similar proteins predominantly found in animals. C2CD5 is required for insulin-stimulated glucose transport and glucose transporter SLC2A4 /GLUT4 translocation to the plasma membrane in adipocytes. This domain is predicted to show a β-sheet and an α-helix. C2CD5, also known as CDP138 or KIAA0528, is a C2 domain-containing phosphoprotein. It is a substrate for protein kinase Akt2, and it may be involved in the regulation of GLUT4 vesicle-plasma membrane fusion in response to insulin. The C2 domain of C2CD5 was shown to be capable of binding Ca(2+) and lipid membranes. Other studies indicate that C2CD5 is a CDK5- and FIBP-interacting protein, forming a complex with these proteins that is involved in cell proliferation and migration.
