identifier: Pfam:PF22366
label: NDH2 C-terminal domain
definition: >-
  This entry represent the C-terminal domain of alternative NADH:quinone oxidoreductases known as NDH2 and related proteins. NDH2 delivers electrons to the respiratory chain by oxidation of NADH and reduction of quinones but does not pump protons. NDH2 have a particular relevance in yeasts like Saccharomyces cerevisiae and in several prokaryotes, whose respiratory chains are devoid of complex I, in which NDH2 keep the balance and are the main entry point of electrons into the respiratory chains. NDH2 proteins are found in bacteria, certain plant, fungal and protozoan mitochondria, they have been used as a drug target for Mycoplasma tuberculosis, Plasmodium falciparum and Toxoplasma gondii. This entry also includes yeast Rotenone-insensitive NADH-ubiquinone oxidoreductase and plant Internal alternative NAD(P)H-ubiquinone oxidoreductase A1/2.
