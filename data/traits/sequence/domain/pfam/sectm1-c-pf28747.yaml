identifier: Pfam:PF28747
label: SECTM1 C-terminal domain
definition: >-
  This entry represents the transmembrane helix found towards the C-terminal of SECTM1 (secreted and transmembrane protein 1). SECTM1 is single-pass type I membrane protein of 248-amino acids that interacts with CD7 and is involved in thymocyte signalling. The protein is found in primates and is expressed in thymic epithelial cells, fibroblasts and myeloid lineage leukocytes. SECTM1 is induced by interferon-gamma and can exist as both membrane-bound and secreted isoforms.
