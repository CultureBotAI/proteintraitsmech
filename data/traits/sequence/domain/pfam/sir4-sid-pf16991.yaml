identifier: Pfam:PF16991
label: Sir4 SID domain
definition: >-
  This is the Sir2 interaction domain (SID domain) of silent information regulator 4 (Sir4). Sir4 is a silent information regulator (SIR) required for transcriptional repression of the silent mating type loci, HML and HMR. It also and helps maintain a repressed chromatin structure near telomeres.
