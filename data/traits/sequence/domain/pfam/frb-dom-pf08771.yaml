identifier: Pfam:PF08771
label: 'FKBP12-rapamycin binding domain '
definition: >-
  The macrolide antibiotic rapamycin and the cytosol protein FKBP12 can form a complex which specifically inhibits the TORC1 complex, leading to growth arrest. The FKBP12-rapamycin complex interferes with TORC1 function by binding to the FKBP12-rapamycin binding domain (FRB) of the Tor proteins. In budding yeast, the Tor2 protein exists in two distinct multi-component complexes, TORC1 and TORC2. TORC1 regulates cell growth by regulating many growth-related processes and is rapamycin sensitive, while TORC2 regulates the cell cytoskeleton and is rapamycin insensitive. Budding yeast TORC1 consists of either Tor1 or Tor2 in complex with Kog1, Lst8 and Tco89, while TORC2 is composed of Avo1, Avo2, Tsc11, Lst8, Bit61, Slm, Slm2 and Tor2. In both yeast and mammals, FKBP12-rapamycin binds to Tor (Tor1, Tor2, or mTOR) in TORC1, but not to Tor (Tor2 or mTOR) in TORC2. It has been suggested that the architecture of TORC2 or its unique composition might be responsible for the observed rapamycin resistance.
