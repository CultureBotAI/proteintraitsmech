identifier: Pfam:PF05773
label: RWD domain
definition: >-
  The RWD domain is a conserved region of about 110 amino acid residues, which has been identified in the mouse GCN2 eIF2alpha kinase and histidyl-tRNA synthetase and in presumed orthologues in other eukaryotic species from yeast to vertebrates. Additionally, it is also found in WD repeat containing proteins, yeast DEAD (DEXD)-like helicases, many RING-finger containing proteins, the UPF0029 uncharacterised protein family and a range of hypothetical proteins. The RWD domain has been named after the better characterised RING finger and WD repeat containing proteins and DEAD-like helicases. It has been proposed that the RWD domain might have a function in protein interaction.
