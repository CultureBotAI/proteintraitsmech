identifier: Pfam:PF11576
label: FeGP cofactor biosynthesis protein HcgB, guanylyltransferase
definition: >-
  This entry represents the guanylyltransferase component of the Iron-guanylylpyridinol (FeGP) cofactor biosynthesis protein HcgB. HcgB transfers the guanosine monophosphate (GMP) moiety from guanosine triphosphate (GTP) to a pyridinol precursor.
