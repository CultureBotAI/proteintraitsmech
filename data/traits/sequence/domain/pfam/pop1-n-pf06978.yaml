identifier: Pfam:PF06978
label: Ribonucleases P/MRP protein subunit POP1, N-terminal
definition: >-
  This entry represents a conserved region approximately 150 residues long located towards the N terminus of the POP1 subunit that is common to both the RNase MRP and RNase P ribonucleoproteins ( ). These RNA-containing enzymes generate mature tRNA molecules by cleaving their 5' ends. This is a short N-terminal domain consisting of a small helical core and a long α-helix, which is enriched with positively charged residues involved in pre-tRNA substrate recognition.
