identifier: Pfam:PF22027
label: NS3 RNA helicase, C-terminal helical domain
definition: >-
  This entry represents the C-terminal all-α helical domain (referred to as domain 3) of hepatitis C virus RNA helicase (NS3). NS3 helicase consists of three domains, separated by a series of clefts. Bound ssDNA lies in a channel that separates domain 3 from domains 1 and 2. The 5' end of the oligonucleotide resides at the interface of domains 2 and 3 and its 3' end is positioned at the interface of domains 1. This domain is associated with domain 2 by a pair of antiparallel β-strands.
