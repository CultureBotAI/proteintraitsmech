identifier: Pfam:PF02025
label: Interleukin 5
definition: >-
  This entry represents interleukin-5 (IL5), also known as eosinophil differentiation factor (EDF), is a lineage-specific cytokine for eosinophilpoiesis. It regulates eosinophil growth and activation, and thus plays an important role in diseases associated with increased levels of eosinophils, including asthma. IL5 has a similar overall fold to other cytokines (e.g., IL2, IL4 and GCSF), but while these exist as monomeric structures, IL5 is a homodimer. The fold contains an anti-parallel 4-α-helix bundle with a left handed twist, connected by a 2-stranded anti-parallel β-sheet. The monomers are held together by 2 interchain disulphide bonds.
