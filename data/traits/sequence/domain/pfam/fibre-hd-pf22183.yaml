identifier: Pfam:PF22183
label: 'Atadenovirus fibre, head domain '
definition: >-
  This entry represents the carboxy-terminal virus-distal fibre head domain present in Atadenovirus. This domain is putatively responsible for primary receptor recognition. Atadenovirus fibre head domains has a similar β-sandwich propeller topology found in other adenovirus fibre proteins ( ).
