identifier: Pfam:PF24577
label: RNA-dependent RNA polymerase 6 second domain
definition: >-
  This entry represents the second domain of RNA-dependent RNA polymerase 6 (RDR6) from Arabidopsis and related plant sequences. This domain has similarity to PH domains and it is predicted to adopt similar β-barrel structure. RDR6 is involved in post-transcriptional gene silencing (PTGS) and natural virus resistance. It possesses ssRNA and ssDNA-dependent polymerase activity. RDR6 is required for the production of trans-acting siRNA and other siRNA.
