identifier: Pfam:PF29950
label: A-specific gene 7 protein
definition: >-
  This entry represents the A-specific gene 7 (ASG7) protein found in Saccharomyces cerevisiae. ASG7 is required for receptor inhibition of inappropriately expressed a-factor receptor (STE3) in MAT a cells. The protein inhibits signalling by relocalising the G protein beta-gamma (STE4-STE18) subunit to intracellular membranes. ASG7 may also provide a mechanism for down-regulation of the mating pheromone response after zygotic fusion, promoting transition of the new diploid cell to vegetative growth. The protein is a multi-pass membrane protein localised to the endomembrane system. Expression is induced by alpha-pheromone and repressed by the ALPHA2- MCM1 repressor.
