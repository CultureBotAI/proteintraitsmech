identifier: Pfam:PF30054
label: UvrC-like GIY-YIG domain
definition: >-
  This entry represents the catalytic GIY-YIG domain localised at the N-terminal of nucleotide excision repair endonucleases UvrC, Cho (UvrC homologue) and similar proteins predominantly found in prokaryotes. This domain is also known as Uri domain and it is responsible for the 3' incision reaction. UvrC is essential for nucleotide excision repair (NER). Besides UvrC, protein Cho serves as a second endonuclease in E. coli NER. Cho contains GIY-YIG motif followed by a Cys-rich region and shares sequence homology with the N-terminal half of UvrC. It is capable of incising the DNA at the 3' side of a lesion in the presence of the UvrA and UvrB proteins during NER. The C-terminal half of Cho is a unique uncharacterised domain, which is distinct from that of UvrC. Moreover, unlike UvrC, Cho does not require the UvrC-binding domain of UvrB for the 3' incision reaction, which might cause the shift in incision position and the difference in incision efficiencies between Cho and UvrC on different damaged substrates. Due to this, the range of NER in E. coli can be broadened by combining action of Cho and UvrC.
