identifier: Pfam:PF14803
label: Nudix N-terminal
definition: >-
  Ths domain occurs at the N terminus of several Nudix (Nucleoside Diphosphate linked to X) hydrolases, such as chloroplastic nudix hydrolase 23 from Arabidopsis thaliana (also known as AtNUDT23). AtNUDT23 mediates the hydrolysis of some nucleoside diphosphate derivatives and can use FAD and ADP-ribose as substrates.
