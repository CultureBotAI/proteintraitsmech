identifier: Pfam:PF31222
label: Bacteriophage baseplate wedge protein gp6, third domain
definition: >-
  This entry represents the third domain of bacteriophage baseplate wedge protein gp6, found in T4-like phages. The domain is located between the Gp6_2nd domain ( ) and the Gp6_C-I domain ( ). Gp6 is a component of the inner baseplate where 12 copies form a continuous ring. Each gp6 molecule interacts with its neighbours, forming an N-terminal dimer with one and a C-terminal dimer with the other. Gp6 forms a heterotrimer with gp7, and the gp25-(gp6)2-gp7 module is involved in sheath contraction during infection.
