identifier: Pfam:PF28984
label: Putative zinc finger protein C02F5.12 N-terminal domain
definition: >-
  This entry represents a small domain found in putative zinc finger protein C02F5.12 and related proteins. The domain is found predominantly in nematodes, especially Caenorhabditis and related genera. It occurs at the N-terminal in C02F5.12 but can be found multiple times within zinc finger proteins. The prototype protein C02F5.12 from Caenorhabditis elegans is a putative zinc finger protein that localises to the nucleus and is predicted to bind DNA. While these proteins are involved in DNA binding and transcriptional regulation, the specific function of this domain remains to be determined.
