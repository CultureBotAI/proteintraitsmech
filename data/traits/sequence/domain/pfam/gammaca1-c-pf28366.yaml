identifier: Pfam:PF28366
label: Gamma carbonic anhydrase 1, mitochondrial C-terminal domain
definition: >-
  This entry represents the C-terminal domain of gamma-class carbonic anhydrases (GAMMACA1) found in plants. The specific function of this C-terminal domain remains to be determined. GAMMACA1 functions as homotrimers and is involved in the catabolism of bicarbonate but does not mediate the reversible hydration of carbon dioxide. They require zinc as cofactors and are located in mitochondria, specifically as components of the respiratory chain complex I. The proteins mediate complex I assembly and respiration. In Arabidopsis, GAMMACA2 is required for male fertility during anther development and dehiscence.
