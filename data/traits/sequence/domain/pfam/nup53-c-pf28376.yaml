identifier: Pfam:PF28376
label: Nucleoporin NUP53 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of nucleoporin NUP53, a component of the nuclear pore complex (NPC) found in eukaryotes. NUP53 functions as both a structural component of the NPC and as a docking partner for nuclear transport factors. The protein is part of a tetrameric module comprising NUP192-NUP170-NIC96-NUP53 or NUP188- NUP170-NIC96-NUP53. NUP53 contains FG repeats that serve as interaction sites for karyopherins and form an affinity gradient guiding transport proteins through the NPC. The protein shows symmetric distribution at both cytoplasmic and nucleoplasmic sides of the nuclear membrane. While the full-length NUP53 protein is involved in nucleocytoplasmic transport, the specific function of this C-terminal domain remains to be determined.
