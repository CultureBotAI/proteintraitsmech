identifier: Pfam:PF21344
label: Alpha-aminoadipate carrier protein LysW-like, globular domain
definition: >-
  While most bacteria synthesise lysine via diaminopimelate, a few species, such as Thermus thermophilus, and some hyperthermophilic archaea, synthesise this amino acid from alpha-aminoadipate (AAA). LysW plays an essential role in this pathway by preventing unstable intermediates from undergoing intramolecular cyclisation. This is accomplished by covalent binding of the reactive amino group of AAA to a glutamate residue in LysW. The covalently attached AAA is subsequently converted to lysine and then released from LysW by the action of other proteins in this pathway.
