identifier: Pfam:PF25855
label: Invasion plasmid antigen J, cysteine protease
definition: >-
  This entry represents the invasion plasmid antigen J (IpaJ) family of cysteine proteases found in proteobacterial pathogens such as Shigella flexneri. IpaJ functions as a virulence factor that is secreted via the type III secretion system and delivered into host cells. It has a unique proteolytic activity that cleaves the peptide bond between N-myristoylated glycine-2 and asparagine-3 of various host proteins, removing the N-myristoyl modification. A key target is ARF1 GTPase, resulting in disruption of Golgi structure and protein trafficking. IpaJ contains a catalytic triad consisting of Cys64, His206, and Asp218, which is essential for its proteolytic activity. IpaJ is structurally related to the C39-peptidase-like family of cysteine proteases.
