identifier: Pfam:PF25697
label: EBNA-2 N-terminal domain
definition: >-
  This entry represents the N-terminal dimerisation domain in EBNA2. This domain (also known as END domain) forms a novel dimeric fold comprising four β-strands and a short exposed α-helix. The dimer is stabilised by anti-parallel interactions of β-strands, forming a strong hydrophobic interface. EBNA2 is a key regulator of viral and cellular gene expression that plays an essential role in B-cell transformation by EBV. In addition to its role in transcriptional regulation, the END domain has been shown to compromise the mitotic spindle checkpoint and cause chromosomal instability, which may contribute to EBV-mediated tumorigenesis. Epstein-Barr virus nuclear antigen 2 (EBNA2) is a key viral transcriptional regulator essential for B-cell transformation by EBV. EBNA2 plays a crucial role in activating resting B-cells in the host and stimulating their proliferation. It achieves this by upregulating the expression of viral genes, including EBNA1-6, LMP1, LMP2A, and LMP2B, as well as several host genes such as CD21, CD23, and MYC. EBNA2 functions as an adaptor molecule that activates transcription by binding to cellular sequence-specific DNA-binding proteins, including host factors CBF1, SMARCB1, and SPI1. When positioned near promoter regions, its acidic activation domain recruits core and associated transcription factors, such as TFIIB, TAF40, TFIIH components ERCC2 and ERCC3, and CBP, to initiate transcription. Additionally, EBNA2 can influence the activity of cell cycle regulators, slowing progression at the G2/M phase. It is also implicated in inducing chromosomal instability by disrupting mitotic checkpoints, causing multi-nucleation, and promoting the formation of micronuclei in infected cells.
