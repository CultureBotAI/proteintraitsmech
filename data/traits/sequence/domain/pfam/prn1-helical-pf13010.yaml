identifier: Pfam:PF13010
label: Primase helical domain
definition: >-
  This α helical domain is found in a set of archaeal plasmid replication proteins. The domain is found to the C terminus of the primase/polymerase domain and is necessary for primase activity. Mutations in this domain can result in defective template binding, dinucleotide formation and conformation change prior to DNA extension.
