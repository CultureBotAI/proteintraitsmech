label: Family of unknown function (DUF6911)
definition: >-
  This entry represents a family of uncharacterised proteins. Proteins in this family are primarily found in Proteobacteria. The structure of these proteins contains a six stranded antiparallel β-sheet and α-helices packed on one side of the sheet.
