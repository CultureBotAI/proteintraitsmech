identifier: Pfam:PF06451
label: Moricin
definition: >-
  Moricin is a antibacterial peptide that is highly basic. The structure of moricin reveals that it is comprised of a long α-helix. The N terminus of the helix is amphipathic, and the C terminus of the helix is predominately hydrophobic. The amphipathic N-terminal segment of the α-helix is mainly responsible for the increase in permeability of the bacterial membrane which kills the bacteria.
