identifier: Pfam:PF03258
label: Baculovirus FP protein domain 1
definition: >-
  This entry represents the N-terminal domain of the FP protein from Orgyia pseudotsugata multicapsid polyhedrosis virus, which is also found in other uncharacterised sequences from arthropods and baculovirus. The function of the FP protein is not known. The protein is missing in baculovirus FP (Few Polyhedra) mutants.
