identifier: Pfam:PF29576
label: SIAMESE-RELATED CDK inhibitor domain
definition: >-
  This entry represents the SIAMESE-RELATED (SMR) family of cyclin-dependent protein kinase inhibitors that regulate the transition from the mitotic cell cycle to endoreplication in plants. Members include SMR11 and SMR16 from Arabidopsis thaliana, which are functionally conserved across land plants. SMR11 has been shown to interact with CYCB2-4. The specific cyclin-dependent kinase complexes which are inhibited, and the functions of most SMRs remain unknown.
