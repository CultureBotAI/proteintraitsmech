identifier: Pfam:PF14291
label: ZMYM1/FAM200, RNase-like domain
definition: >-
  This entry (ex DUF4371) represents a RNase-like domain in Zinc finger MYM-type protein 1 (ZMYM1), 52 kDa repressor of the inhibitor of the protein kinase (THAP12) and similar proteins mainly found in animals. THAP12 is an upstream regulator of interferon-induced serine/threonine protein kinase R (PKR). It may block the PKR-inhibitory function of DNAJC3, resulting in restoration of kinase activity and suppression of cell growth.
