identifier: Pfam:PF06141
label: Phage minor tail protein U
definition: >-
  This entry represents bacteriophage lambda, GpU, a minor tail protein. GpU plays an essential role in tail assembly by capping the rapidly polymerizing tail once it has reached its requisite length and serving as the interaction surface for the completion protein. GpU forms a hexameric ring within the tail structure since it spontaneously forms such rings in the presence of Mg2+ that match the size of the hexameric rings of gpV that comprise the bulk of the tail tube. However, prior to tail assembly, gpU remains monomeric. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
