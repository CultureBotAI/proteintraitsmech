identifier: Pfam:PF09035
label: Excisionase from transposon Tn916
definition: >-
  The phage-encoded excisionase protein Tn916-Xis adopts a winged-helix structure that consists of a three-stranded anti-parallel β-sheet that packs against a helix-turn-helix (HTH) motif and a third C-terminal α-helix. It is encoded for by Tn916, which also codes for the integrase Tn916-Int. The protein interacts with DNA by the insertion of helix α2 into the major groove and the contact of the hairpin that connects strands β2 and β3 with the adjacent phosphodiester backbone and/or minor groove. Tn916-Xis stimulates phage excision and inhibits viral integration by stabilising distorted DNA structures.
