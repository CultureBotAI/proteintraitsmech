identifier: Pfam:PF29102
label: Suppressor of sable N-terminal domain
definition: >-
  This entry represents the N-terminal domain of suppressor of sable [Su(s)] proteins. Su(s) proteins are RNA-binding proteins that suppress transcription of some RNAs and promote transcription termination of aberrant RNAs. The proteins function together with Wdr82 as part of a transcription termination checkpoint that promotes transcription termination and subsequent RNA degradation by the nuclear exosome. Members of this group are found in arthropods. The specific function of this domain remains to be determined.
