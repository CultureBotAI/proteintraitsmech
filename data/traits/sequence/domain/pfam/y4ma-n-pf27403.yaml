identifier: Pfam:PF27403
label: Y4mA N-terminal domain
definition: >-
  This entry represents the N-terminal domain of y4mA proteins. The domain is found in bacteria, predominantly in Alphaproteobacteria with representatives in Hyphomicrobiales and Rhodobacterales orders. The function of this domain remains to be determined.
