identifier: Pfam:PF29397
label: CERLI2-like middle domain
definition: >-
  This entry represents a domain found in CERLI2 (cytosolically exposed rhoptry leaflet interacting protein 2) and related proteins from apicomplexan parasites. CERLI2 is a rhoptry surface protein that plays an important role in rhoptry physiology and is essential for merozoite invasion of host erythrocytes. The protein localises to the cytosolic face of the rhoptry bulb membrane in merozoites. The specific function of this domain remains to be determined.
