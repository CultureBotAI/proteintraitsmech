identifier: Pfam:PF27289
label: YomX N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YomX proteins found in bacteria. YomX is derived from the SPbeta prophage in Bacillus subtilis. While the full-length YomX protein is approximately 216 amino acids, the specific function of this N-terminal domain remains to be determined.
