identifier: Pfam:PF00687
label: Ribosomal protein L1p/L10e family
definition: >-
  Ribosomal protein uL1 is the largest protein from the large ribosomal subunit. The uL1 protein contains two domains: 2-layer α/β domain and a 3-layer α/β domain (interrupts the first domain). The two domains cycle between open and closed conformations via a hinge motion. In Escherichia coli, uL1 is known to bind to the 23S rRNA. The RNA-binding site of uL1 is highly conserved, with both mRNA and rRNA binding the same binding site. Like several other large ribosomal subunit proteins, uL1 displays RNA chaperone activity. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial uL1 Algal and plant chloroplast uL1 Cyanelle uL1 Archaebacterial uL1 Vertebrate L10A Yeast Utp30, Rpl1a, Rpl1b and Mrpl1. This entry also matches ribosome biogenesis proteins, such as Cic1, which associates with the proteasome and is required for the degradation of specific substrates, and for the synthesis of 60S ribosome subunits.
