identifier: Pfam:PF27473
label: Cytoplasmic filament protein A C-terminal domain
definition: >-
  This entry represents the C-terminal domain of cytoplasmic filament proteins found in spirochaetes, including CfpA from Treponema pallidum. The specific function of this domain remains to be determined CfpA is a component of cytoplasmic filaments that run the length of the organism just underneath the cytoplasmic membrane. The full-length CfpA protein is localised to arrays of 4-6 filaments that lie in close apposition to the inner membrane.
