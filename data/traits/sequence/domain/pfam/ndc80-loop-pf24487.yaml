identifier: Pfam:PF24487
label: Kinetochore protein NDC80 loop region
definition: >-
  This entry represents the so-called NDC80 'loop' structure found at the coiled coil C-terminal of kinetochore protein NDC80. NDC80 is a conserved coiled-coil protein that forms the mitotic spindle, which is required for kinetochore integrity and the organisation of stable microtubule binding sites in the outer plate of the kinetochore. The Ndc80 'loop' is a stiff, α-helical 'switchback' structure.
