identifier: Pfam:PF28414
label: Biotrophy-associated secreted protein 4
definition: >-
  This entry represents the biotrophy-associated secreted protein 4 (BAS4) found in plant pathogenic fungi. The prototype protein from Pyricularia oryzae (rice blast fungus) is a secreted effector protein with a predicted signal peptide for secretion. BAS4 is involved in biotrophic colonisation of plant cells and plays a role in the transition from biotrophic to necrotrophic infection phases. The protein elicits rice basic defence responses during early infection and promotes cell death during late compatible interactions. BAS4 localises to the extra-invasive hyphal membrane matrix and is highly upregulated in invasive hyphae. The protein undergoes N-glycosylation and is found across various fungal taxa including Sordariomycetes. The protein represents an important class of fungal effectors that manipulate host plant defences during pathogenesis.
