identifier: Pfam:PF29202
label: AAA+ chaperone, N-terminal Rossmann-like domain
definition: >-
  This entry represents an N-terminal Rossmann-like domain found in AAA+ family proteins. The domain is approximately 190-230 residues in length. These proteins contain a C-terminal AAA+ domain ( ), which is a P-loop containing ATPase domain. AAA+ proteins are involved in diverse cellular processes including protein folding, degradation and DNA replication. Some members of this family have been annotated as chaperones. The domain is found in Bacteria, predominantly in Pseudomonadota and Actinomycetota. The specific function of this N-terminal domain remains to be determined.
