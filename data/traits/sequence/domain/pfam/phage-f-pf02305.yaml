identifier: Pfam:PF02305
label: Capsid protein (F protein)
definition: >-
  This entry represents the Microviridae F protein family, including capsid protein F and capsid protein VP1. Capsid protein F is the major capsid component in single-stranded DNA bacteriophages. 60 copies of this protein are present in the virion. This group includes proteins from all cellular organisms.
