identifier: Pfam:PF28290
label: SCO0607-like
definition: >-
  This entry represents the homologues of SCO0607 lipoprotein. The lipoprotein SCO0607 of Streptomyces coelicolor ( ), along with a number of morphogenic membrane proteins, is regulated by the response regulator transcription factor MarR (SCO2120) . Related lipoproteins are found in a large number of Streptomyces species.
