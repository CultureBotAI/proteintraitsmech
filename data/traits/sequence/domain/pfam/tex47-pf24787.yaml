identifier: Pfam:PF24787
label: Testis-expressed protein 47
definition: >-
  This entry represents human Testis-expressed protein 47 (TEX47) and similar proteins predominantly found in animals. The function of these proteins is unknown. This domain has a detectable similarity to domains that are members of Acylphosphatase/BLUF domain-like superfamily and are predicted to adopt similar structure.
