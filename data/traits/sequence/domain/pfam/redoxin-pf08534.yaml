identifier: Pfam:PF08534
label: Redoxin
definition: >-
  This redoxin domain is found in peroxiredoxin, thioredoxin and glutaredoxin proteins. Peroxiredoxins (Prxs) constitute a family of thiol peroxidases that reduce hydrogen peroxide, peroxinitrite, and hydroperoxides using a strictly conserved cysteine. Chloroplast thioredoxin systems in plants regulate the enzymes involved in photosynthetic carbon assimilation. It is thought that redoxins have a large role to play in anti-oxidant defence. Cadmium-sensitive proteins are also regulated via thioredoxin and glutaredoxin thiol redox systems.
