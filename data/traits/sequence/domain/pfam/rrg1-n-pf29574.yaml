identifier: Pfam:PF29574
label: RRG1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of RRG1 proteins from Saccaromycetales. RRG1 (Required for respiratory growth protein 1) is essential for respiratory growth and required for mitochondrial protein synthesis. The protein is also required for vacuolar acidification and mitochondrial genome maintenance. RRG1 is localised to the mitochondrion and may be N-glycosylated, with glycosylation being important for correct localisation. The specific function of this domain within RRG1 proteins remains to be determined.
