identifier: Pfam:PF21552
label: Transcription factor tau 138 kDa subunit, extended winged helix
definition: >-
  This domain is found in a group of proteins from ascomycetes, including Transcription factor tau 138 kDa subunit from Saccharomyces cerevisiae (TFC3) ( ). TFC3 may play a role in linking tauA, tauB, and TFIIIB to regulate the formation of the RNA polymerase III pre-initiation complex. This entry represents its extended winged helix (eWH) domain, which is centrally located.
