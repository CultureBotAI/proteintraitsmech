identifier: Pfam:PF24875
label: Domain of unknown function (DUF7736)
definition: >-
  This entry represents a small family of bacterial and phage proteins that are uncharacterised. The domain is composed of three α-helices, which dimerise to create a larger structure. Some members of the families contain two copies of this domain, most appear to homodimerise.
