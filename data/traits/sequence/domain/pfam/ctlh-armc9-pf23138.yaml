identifier: Pfam:PF23138
label: Armc9, CTLH-like domain
definition: >-
  This entry represents a domain that is found C-terminal to LisH motif in human LisH domain-containing protein ARMC9 and related proteins. Armc9 is involved in ciliogenesis and is required for appropriate acetylation and polyglutamylation of ciliary microtubules, and regulation of cilium length. This domain is distantly related to the CTLH/CRA domain ( ) found in proteins components of ubiquitin-protein ligase complex. This domain is found also in Suppressor of organelle fusion 1 from Caenorhabditis elegans and vertebrate WD repeat-containing protein 91 both acting as negative regulators of the PI3 kinase/PI3K activity associated with endosomal membranes.
