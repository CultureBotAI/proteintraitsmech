identifier: Pfam:PF27440
label: TP_0927
definition: >-
  This entry represents TP_0927 proteins found primarily in Treponema and related spirochaetes. The protein is found mainly in Spirochaetota phylum within the Spirochaetales order. TP_0927 proteins are particularly abundant in Treponema species. The function of this protein remains to be determined. This proteins contain a β-sheet fold.
