identifier: Pfam:PF13690
label: Chemotaxis phosphatase CheX
definition: >-
  This entry represents a domain found in chemotaxis phosphatase CheX, which is responsible for modulating the bacterial swimming behavioiur in the presence of external chemicals (nutrients and repellents). CheX is very closely related to the CheC chemotaxis phosphatase, but it dimerises in a different way, via a continuous β sheet between the subunits. CheC and CheX both dephosphorylate CheY, which controls the sense of flagella rotation and thereby determine swimming behavior. The structures of CheX and CheC have been solved.
