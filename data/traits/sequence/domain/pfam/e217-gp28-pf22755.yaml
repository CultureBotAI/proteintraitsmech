identifier: Pfam:PF22755
label: E217 collar protein gp28
definition: >-
  This entry represents a family of proteins from tailed bacteriophages and proteobacterial prophages, including Gp28 from E217, a Pseudomonas phage used in an experimental cocktail to eradicate cystic fibrosis-associated Pseudomonas aeruginosa. The collar protein gp28 is located at the neck of the E217 virion. Gp28 consists of a small β-barrel decorated by an α-helix and two wing-like lateral extensions. Six collar proteins pack under the head-to-tail dodecamer with Gp28 N-helix positioned orthogonal to two Gp27 subunits. On the opposite side of the Gp28 barrel, the wing-like extensions contact two gateway subunits.
