identifier: Pfam:PF26400
label: Domain of unknown function (DUF8098)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins in this family are predominantly found in halophilic archaea, specifically within the Halobacteria class. The family includes proteins from various genera such as Haloarculaceae, Natrialbaceae, and Haloferacaceae. Proteins in this family typically range from 320 to 400 amino acids in length.
