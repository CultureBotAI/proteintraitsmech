identifier: Pfam:PF08229
label: 'ER membrane protein SH3 '
definition: >-
  This family of proteins are membrane localised chaperones that are required for correct plasma membrane localisation of amino acid permeases (AAPs). Shr3 prevents AAPs proteins from aggregating and assists in their correct folding. In the absence of Shr3, AAPs are retained in the ER.
