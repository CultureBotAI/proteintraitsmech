identifier: Pfam:PF25342
label: PLOD GT domain
definition: >-
  This entry represents the N-terminal glycosyltransferase (GT) domain found in collagen lysyl hydroxylases (LH or PLOD), mainly found in animals, including human procollagen-lysine, 2-oxoglutarate 5-dioxygenase 1/2 and Multifunctional procollagen lysine hydroxylase and glycosyltransferase LH3 (PLOD1-3). The two N-terminal domains have a topology typical for glycosyltransferases, whereas the C-terminal has a DSBH fold. The domain represented by this entry is the only catalytically active domain and is solely responsible for the glycosyltransferase activity. This entry also represent an uncharacterised viral protein that displays a similar N-terminal fold. Enzymes belonging to this family catalyse the lysine hydroxylation of collagens using Fe2+, 2-oxoglutarate, ascorbate and molecular oxygen. In humans, the three LH enzyme isoforms share significant sequence similarity. Mutations in PLOD genes that reduce or abolish their activity are associated with severe connective tissue diseases, including Ehlers-Danlos and Bruck syndromes. PLOD3 is considered the evolutionary ancestor of the family, as this isoform is the only one capable of further processing of hydroxylysines through glycosylation, whereas other isoforms might have lost such capability during evolution. These enzymes consist of three domains encompassing multiple active sites.
