identifier: Pfam:PF27520
label: SP15 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of 55.5 kDa and 49.5 kDa sporulation proteins (SP15), mostly found in bacteria. These proteins may form a catalyst/regulator pair involved in the temporally controlled sporulation process. The decrease in level of the smaller protein early in sporulation may relieve negative regulation of the activity of the larger protein. This domain contains a helix-turn-helix fold.
