identifier: Pfam:PF03883
label: Peroxide stress protein YaaA
definition: >-
  YaaA (also refer to as DUF328/UPF0246) is involved in DNA recombination and oxidative stress response, being a key element of the stress response to H2O2. It acts by reducing the level of intracellular iron levels after peroxide stress, thereby attenuating the Fenton reaction and the DNA damage that this would cause. Yaa binds double-stranded, bulge-containing, bubble duplex and Holliday junction DNA with approximately equal affinity and ssDNA with lower affinity; DNA binding shows positive cooperativity. Structure analysis of this protein revealed a new fold with a positively charged cleft and a helix-hairpin-helix (HhH) DNA-binding motif named as cantaloupe fold.
