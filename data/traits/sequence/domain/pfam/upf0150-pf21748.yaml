identifier: Pfam:PF21748
label: UPF0150-like
definition: >-
  This entry represents a family of prokaryotic uncharacterised proteins that adopt an α-β-β-β-α fold and are structurally similar to HicB-like antitoxin, including TTHA0281 from Thermus thermophilus ( ). TTHA0281, which belongs to the uncharacterised protein family UPF0150, is speculated to be involved in RNA metabolism, including RNA binding and cleavage. This entry also includes other members of the UPF0150 family such as ssl0259, TM_1321 and TM_1313.
