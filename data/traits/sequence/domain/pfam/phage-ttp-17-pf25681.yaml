identifier: Pfam:PF25681
label: Phage tail tube protein
definition: >-
  This entry represents a family of phage tail tube proteins from a variety of phages and bacterial prophages, including Mycobacteriophage Bxb1. These proteins form homohexameric rings. The tail tube forms the inner channel of the contractile tail which is used for DNA transfer from the capsid to the host during infection.
