identifier: Pfam:PF05670
label: NFACT protein RNA binding domain
definition: >-
  This domain occurs in proteins that have been annotated as fibronectin/fibrinogen binding protein by similarity. This annotation comes from where the N-terminal region is involved in this activity. This entry represents an RNA binding domain in the NFACT (NEMF, FbpA, Caliban, and Tae2) proteins. This domain is found in two eukaryotic gene contexts: fused to the NFACT-N and NFACT-C domains in the NFACT protein involved in the ribosomal quality control pathway which contributes to CAT-tailing, and as a standalone domain. Additionally this domain contains a conserved motif D/E-X-W/Y-X-H that may be functionally important.
