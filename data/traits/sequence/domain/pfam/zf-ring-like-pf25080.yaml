identifier: Pfam:PF25080
label: RING zinc finger-like domain
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into a structure with significant similarity to RING/U-box domains. It contains four highly conserved pairs of cysteine residues.
