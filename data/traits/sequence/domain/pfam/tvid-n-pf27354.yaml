identifier: Pfam:PF27354
label: TviD N-terminal domain
definition: >-
  This entry represents the N-terminal in TviD, a protein involved in Vi polysaccharide biosynthesis in Salmonella typhi. This domain contains a SGNH hydrolase-like fold. TviD protein is required for maturation of the Vi polysaccharide, which forms part of the bacterial capsule and contributes to virulence. The protein is part of the viaB locus that encodes the Vi antigen production system. TviD contains TPR-like helical domains ( ) and is involved in capsule polysaccharide biosynthesis pathways. The full-length protein has a demonstrated role in Vi polysaccharide maturation.
