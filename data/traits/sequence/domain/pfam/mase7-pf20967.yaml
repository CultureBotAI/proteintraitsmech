identifier: Pfam:PF20967
label: MASE7
definition: >-
  This entry represents an integral membrane sensor domain (MASE7) that is found at the N-terminal end of Adenylate cyclase from Mycobacterium tuberculosis (Cya) and similar proteins mainly found in actinomycetes and proteobacteria. This domain is often found in association with GGDEF domain ( ), histidine sensor kinases and adenylate cyclase output domain ( ).
