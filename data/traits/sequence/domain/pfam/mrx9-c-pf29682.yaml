identifier: Pfam:PF29682
label: MRX9 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of MRX9 (MIOREX complex component 9), a mitochondrial protein found in fungi. MRX9 is a component of MIOREX complexes, which are large expressome-like assemblies of ribosomes with factors involved in post- transcriptional gene expression. The full-length protein is a multi-pass transmembrane protein localised to mitochondrial membranes and associates with the mitochondrial ribosome. The specific function of this C-terminal domain remains to be determined.
