identifier: Pfam:PF02273
label: Acyl transferase
definition: >-
  LuxD proteins are bacterial acyl transferases. Together with an acyl-protein synthetase (LuxE) and reductase (LuxC), they form a multienzyme complex. This complex channels activated fatty acids into the aldehyde substrate for the luciferase-catalyzed bacterial bioluminescence reaction.
