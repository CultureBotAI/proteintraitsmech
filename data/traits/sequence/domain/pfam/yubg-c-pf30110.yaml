identifier: Pfam:PF30110
label: C-terminal domain of YubG
definition: >-
  This entry represents a conserved C-terminal domain found in YubG, an uncharacterised 258-amino acid plasmid-encoded protein from Escherichia coli O157:H7. Orthologues are found on plasmids in related Enterobacteriaceae. The function of this domain remains to be determined.
