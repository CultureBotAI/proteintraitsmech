identifier: Pfam:PF02203
label: Tar ligand binding domain homologue
definition: >-
  This entry represents the ligand-binding domain found in a number of methyl-accepting chemotaxis receptors, such as E.coli Tar (taxis to aspartate and repellents), which is a receptor for the attractant L-aspartate. It is a homodimeric receptor that contains an N-terminal periplasmic ligand binding domain, a transmembrane region, a HAMP domain and a C-terminal cytosolic signaling domain. Methyl-accepting chemotaxis proteins (MCPs) are a family of bacterial receptors that mediate chemotaxis to diverse signals, responding to changes in the concentration of attractants and repellents in the environment by altering swimming behaviour. Environmental diversity gives rise to diversity in bacterial signalling receptors, and consequently there are many genes encoding MCPs. For example, there are four well-characterised MCPs found in Escherichia coli: Tar (taxis towards aspartate and maltose, away from nickel and cobalt), Tsr (taxis towards serine, away from leucine, indole and weak acids), Trg (taxis towards galactose and ribose) and Tap (taxis towards dipeptides).
