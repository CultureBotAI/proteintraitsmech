identifier: Pfam:PF05746
label: DALR anticodon binding domain
definition: >-
  Aminoacyl-tRNA synthetase (aaRS) is a key enzyme during protein biosynthesis. Each aaRS contains a catalytic central domain (CCD), responsible for activating amino acid, and an anticodon-binding domain (ABD), necessary for binding the anticodon in cognate tRNA. aaRSs are classified into class I and II (aaRS-I and aaRS-II) based on the topologies of CCDs. Whereas the structure of the CCDs is similar among the members of each of the two different aaRS classes, the ABDs are diverse in structure. The synthetases specific for arginine, cysteine, glutamic acid, glutamine, isoleucine, leucine, methionine, tyrosine, tryptophan and valine belong to class I synthetases. The synthetases specific for alanine, asparagine, aspartic acid, glycine, histidine, lysine, phenylalanine, proline, serine, and threonine belong to class-II synthetases. Both classes of tRNA synthetases have been subdivided into three subclasses, designated Ia, Ib, Ic and IIa, IIb, IIc. This all α helical domain is the anticodon binding domain (ABD) of arginyl tRNA synthetase, and also matches the ABD of some glycine tRNA synthetases. This domain is known as the DALR domain after characteristic conserved amino acids.
