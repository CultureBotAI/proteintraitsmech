identifier: Pfam:PF01166
label: TSC-22/dip/bun family
definition: >-
  This entry includes a group of eukaryotic proteins that are evolutionary related and involved in transcriptional regulation. These proteins are highly similar in a region of about 50 residues that include a conserved leucine-zipper domain most probably involved in homo- or hetero-dimerisation. Proteins included in this entry are: Vertebrate proteins TSC22 1-4, transcriptional regulators that act in different pathways, for instance, TSC22-1 acts on C-type natriuretic peptide (CNP) promoter, it also promotes CASP3-mediated apoptosis and positively regulates TGF-beta signaling; TSC22-3 (also known as DIP) protects T-cells from IL2 deprivation-induced apoptosis through the inhibition of FOXO3A transcriptional activity that leads to the down-regulation of the pro-apoptotic factor BCL2L11 and it also contributes to enhancement of TGF-beta signaling by binding to and modulating the transcription activator activity of SMAD4. Drosophila protein bunched (gene bun) (also known as shortsighted), a probable transcription factor required for peripheral nervous system morphogenesis, eye development and oogenesis. Caenorhabditis elegans protein tsct-1 (also known as T18D3.7), whose function is unknown.
