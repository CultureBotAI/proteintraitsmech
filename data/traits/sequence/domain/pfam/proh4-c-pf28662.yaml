identifier: Pfam:PF28662
label: PROHORMONE-4 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in PROHORMONE-4 and related proteins across metazoans. PROHORMONE-4 is a neuropeptide precursor that produces IDLSRF-like peptides in the nervous system. The protein contains an LDL-receptor class A domain and is processed to generate multiple bioactive neuropeptides including IDLSRFYGHFNT and related sequences. These neuropeptides are expressed in brain regions, ganglia, and the retrocerebral complex of insects. The specific function of this domain remains to be determined.
