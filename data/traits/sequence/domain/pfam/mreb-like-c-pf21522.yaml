identifier: Pfam:PF21522
label: Archaeal actin homologue MreB-like, C-terminal
definition: >-
  Archaeal actin homologue Ta0583 is an active ATPase at physiological temperatures, which has a propensity to form filaments. It has the core actin structure and is highly homologous to MreB and ParM from bacteria. This entry represents the C-terminal actin-like domain.
