identifier: Pfam:PF30677
label: CCDC18 first coiled-coil region
definition: >-
  This entry represents the first coiled-coil region of coiled-coil domain-containing protein 18 (CCDC18), also known as sarcoma antigen NY-SAR-24. CCDC18 is a large protein containing multiple coiled-coil regions that localises to centriolar satellites. The protein shows enhanced expression in bone marrow, lymphoid tissue, and testis. The specific function of this N-terminal coiled-coil region remains to be determined.
