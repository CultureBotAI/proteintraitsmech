identifier: Pfam:PF09424
label: Yqey-like protein
definition: >-
  This entry consist of uncharacterised proteins from bacteria, such as YqeY from Bacillus subtilis, and Aim41/YOR215C from yeast. Altered inheritance of mitochondria protein 41 (Aim41/YOR215C) is a protein of unknown function. It was detected in highly purified mitochondria in high-throughput studies, and null mutant displays reduced frequency of mitochondrial genome loss. Aim41/YOR215C is not an essential gene.
