identifier: Pfam:PF23040
label: Protein phosphatase Slingshot homolog 1-like, PH domain-like
definition: >-
  This entry represents the N-terminal conserved SSH region of Slingshot. Slingshot (SSH) is a cofilin-specific phosphatase. Dephosphorylation reactivates cofilin, which in turn depolymerizes actin and is thus required for actin filament reorganisation. Slingshot is a member of the dual-specificity protein phosphatase family. The N-terminal SSH region may be involved in P-cofilin binding (the model C terminus plus the DEK_C-like domain, which are characterised as the "B" domain in some of the literature), and may be required for the F-actin mediated activation of slingshot.
