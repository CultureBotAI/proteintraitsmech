identifier: Pfam:PF20608
label: Phage tail tube protein C-terminal domain
definition: >-
  This entry represents a short all-β domain found at the C-terminal of some phage tube proteins, including Tail tube protein from Lactococcus phage p2, which forms the cylindrical rigid tail tube with a 4 nm wide central channel for DNA ejection. This domain probably makes protruding decorations on the whole length of the tail tube. It is also found in bacterial prophages.
