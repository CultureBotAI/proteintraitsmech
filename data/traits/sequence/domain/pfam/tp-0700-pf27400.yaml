identifier: Pfam:PF27400
label: TP_0700
definition: >-
  This entry represents a group of uncharacterised proteins of approximately 130 amino acids found in bacteria. The domain contains single α-helices involved in coiled-coils and is found predominantly in Spirochaetota, with representatives in Treponema and Spirochaeta genera within Spirochaetales order. The function of these proteins remains to be determined.
