identifier: Pfam:PF11762
label: L-arabinose isomerase C-terminal domain
definition: >-
  This entry represents a C-terminal non-catalytic domain in L-arabinose isomerase. This entry includes L-arabinose isomerases, AraA, ( ). These enzymes catalyse the reaction: L-arabinose => L-ribulose. This reaction is the first step in the pathway of L-arabinose utilisation as a carbon source after entering the cell L-arabinose is converted into L-ribulose by the L-arabinose isomerases enzyme.
