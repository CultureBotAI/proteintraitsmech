identifier: Pfam:PF18078
label: Thioredoxin-like SNTX domain
definition: >-
  This domain is found in pore-forming toxin stonustoxin (SNTX), a lethal venom found in Synanceia horrida. Because of the thioredoxin-like nature of the domain, it is referred to as the THX domain. The THX domain is comprised of a five-stranded β-sheet and shares greatest structural similarity with Saccharomyces cerevisiae mitochondrial THX3. It is thought that THX domain plays a purely structural role.
