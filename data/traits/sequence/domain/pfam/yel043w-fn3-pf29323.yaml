identifier: Pfam:PF29323
label: YEL043W fibronectin type III domain
definition: >-
  This entry represents a fibronectin type III domain found in the uncharacterised protein YEL043W from Saccharomyces cerevisiae. YEL043W is a 956 amino acid protein that is phosphorylated at multiple sites and has been detected at the cell periphery and endoplasmic reticulum. The protein contains extensive disordered regions. Fibronectin type III domains typically adopt an immunoglobulin-like fold and are commonly involved in protein-protein interactions. The specific function of this domain remains to be determined.
