identifier: Pfam:PF04952
label: AstE/AspA barrel-sandwich hybrid domain
definition: >-
  This entry represents the barrel-sandwich hybrid domain found in Succinylglutamate desuccinylase (AstE), aspartoacylase (AspA) and related enzymes. AstE catalyses the fifth and last step in arginine catabolism by the arginine succinyltransferase pathway whereas AspA cleaves acylaspartate into a fatty acid and aspartate. Mutations in human AspA lead to Canavan disease disease. The domain represented by this entry has similarity to known barrel-sandwich domains that are defined by sandwich of half-barrel shaped β-sheets. This domain is also described as shielding domain as it was found to cover the enzyme active site and thus limiting its accessibility.
