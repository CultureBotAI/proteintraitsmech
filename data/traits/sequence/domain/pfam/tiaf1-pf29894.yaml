identifier: Pfam:PF29894
label: TGFB1-induced anti-apoptotic factor 1
definition: >-
  This entry represents TIAF1 (TGFB1-induced anti-apoptotic factor 1), a small protein originally identified from human mammary gland tissue. TIAF1 inhibits the cytotoxic effects of TNF-alpha and overexpressed TNF receptor adapters TRADD, FADD, and RIPK1. The protein is involved in TGF-beta1 inhibition of IkappaB-alpha expression and suppression of TNF- mediated IkappaB-alpha degradation. TIAF1 localises to the nucleus and is up-regulated in chronic and acute allograft rejection, being expressed in inflammatory infiltrate and tubular epithelial cells. However, this protein is the product of a dubious gene prediction, being coded in the 3'-UTR region of MYO18A and does not appear to exist in orthologous sequences.
