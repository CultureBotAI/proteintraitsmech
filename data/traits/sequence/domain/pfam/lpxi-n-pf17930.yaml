identifier: Pfam:PF17930
label: LpxI N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the LpxI enzyme that is involved in biosynthesis of lipid A. Specifically it carries out the hydrolysis of UDP-2,3-diacyl- glucosamine. This step is either carried out by LpxI or LpxH. This domain has a Rossmann fold.
