identifier: Pfam:PF28325
label: Fungal beta-trefoil domain
definition: >-
  This domain is mostly found in single domain fungal proteins, although some members have other domains. It may have a β-trefoil fold. The β-trefoil fold consists of six β-hairpins arranged in threefold symmetry around a central axis. This family is primarily found in ascomycota. The function of these proteins remains to be determined.
