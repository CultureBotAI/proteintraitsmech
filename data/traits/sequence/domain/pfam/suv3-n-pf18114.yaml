identifier: Pfam:PF18114
label: Suv3 helical N-terminal domain
definition: >-
  This is the N-terminal domain of Suv3 from animals. Suv3 is an NTP-dependent RNA/DNA helicase that is necessary for the degradation of mature mtRNAs. Suv3 has been found to interact in vitro with polynucleotide phosphorylase.
