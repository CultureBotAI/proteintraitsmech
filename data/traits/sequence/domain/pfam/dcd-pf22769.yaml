identifier: Pfam:PF22769
label: dCTP deaminase-like
definition: >-
  Deoxycytidine triphosphate deaminase (dCTP deaminase) is an enzyme involved in nucleotide metabolism. It catalyses the formation of dUTP (deoxyuridine (5'-)triphosphate), which in turn is degraded by dUTPase (dUTP diphosphatase) to produce dUMP (deoxyuridine monophosphate). dUMP is the immediate precursor of thymidine nucleotides. Members of this family include the Escherichia coli monofunctional deoxycytidine triphosphate deaminase (dCTP deaminase) and a Methanocaldococcus jannaschii (Methanococcus jannaschii) bifunctional dCTP deaminase ( )/dUTP diphosphatase ( ).
