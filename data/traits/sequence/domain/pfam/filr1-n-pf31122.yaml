identifier: Pfam:PF31122
label: Methanogenesis regulatory protein FilR1, N-terminal domain
definition: >-
  This is the N-terminal domain of Methanogenesis regulatory protein FilR1, a member of the two-component regulatory system FilI/FilRs which is involved in the regulation of methanogenesis. It regulates its own expression, expression of the filI-filR2 operon, and of genes involved in methanogenesis such as acs1, acs4 and mtrABC. This is an ArsR-related winged helix domain, which suggests it is a DNA-binding domain. This domain is also found at the N-terminal end of HTH-type transcriptional activator ArnR from Sulfolobus acidocaldarius, which activates flaB transcription upon nutrient starvation by acting on the flaB promoter.
