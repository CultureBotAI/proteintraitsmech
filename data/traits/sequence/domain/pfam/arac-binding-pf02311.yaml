identifier: Pfam:PF02311
label: AraC-like ligand binding domain
definition: >-
  This entry defines the ligand-binding and dimerisation domain of the bacterial regulatory protein AraC and other HTH-type transcriptional regulators. The crystal structure of the arabinose-binding and dimerisation domain of the Escherichia coli gene regulatory protein AraC was determined in the presence and absence of L-arabinose. The arabinose-bound molecule shows that the protein adopts an unusual fold, binding sugar within a β-barrel and completely burying the arabinose with the N-terminal arm of the protein. Dimer contacts in the presence of arabinose are mediated by an antiparallel coiled-coil. In the uncomplexed protein, the N-terminal arm is disordered, uncovering the sugar-binding pocket and allowing it to serve as an oligomerisation interface.
