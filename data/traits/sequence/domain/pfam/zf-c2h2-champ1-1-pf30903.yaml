identifier: Pfam:PF30903
label: CHAMP1 first C2H2-type zinc finger
definition: >-
  This entry represents a C2H2-type zinc finger domain in CHAMP1 (chromosome alignment-maintaining phosphoprotein 1) proteins. The domain is found in vertebrates including mammals and birds. CHAMP1 is a nuclear phosphoprotein required for proper chromosome alignment at metaphase and accurate segregation during mitosis. The full-length protein localises to the kinetochore and spindle, and interacts with MAD2L2. Mutations in CHAMP1 are associated with intellectual disability with severe speech impairment (NEDHILD).
