identifier: Pfam:PF19858
label: Bacterial oxidoreductases, C-terminal
definition: >-
  This entry represents the C-terminal domain found in a group of bacterial oxidoreductases, such as 4-carboxy-2-hydroxymuconate-6-semialdehyde dehydrogenase (LigC) from Sphingobium sp., involved in the degradation of protocatechuate (PCA) via the PCA 4,5-cleavage pathway. Proteins containing this domain belong to the Gfo/Idh/MocA protein family, whose members catalyse various different chemical reactions such as oxidation and reduction of carbohydrates, oxidation of trans-dihydrodiols, reduction of biliverdin, and hydrolysation of glycosidic bonds, using NAD(P) as a hydride donor or acceptor. This is likely to be an α/β-domain involved in substrate binding and oligomerisation.
