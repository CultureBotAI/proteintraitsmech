identifier: Pfam:PF30493
label: DISC1 domain
definition: >-
  This domain is found in human Disrupted in schizophrenia 1 protein (DISC1) and related sequences. DISC1 is involved in neurogenesis and microtubule network formation, and is localised to centrosomes, cytoplasm and mitochondria. Mutations disrupting the C-terminal region ( ) are associated with schizophrenia and related psychiatric disorders. This domain shows structural similarity with .
