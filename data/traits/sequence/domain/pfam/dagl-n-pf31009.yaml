identifier: Pfam:PF31009
label: Diacylglycerol lipase N-terminal transmembrane region
definition: >-
  This entry represents an N-terminal transmembrane region of approximately 150 residues found in diacylglycerol lipases (DAGL-alpha and DAGL-beta) in Metazoa. This region precedes the catalytic Lipase_3 domain ( ). The region contains four transmembrane helices that anchor the enzyme to the cell membrane. Diacylglycerol lipases catalyze the hydrolysis of diacylglycerols to produce 2-arachidonoylglycerol (2-AG), the principal endocannabinoid involved in retrograde signaling at synapses. STRING analysis indicates functional association with alpha/beta hydrolases ( ). This domain appears to be related to .
