identifier: Pfam:PF16822
label: SGNH hydrolase-like domain, acetyltransferase AlgX
definition: >-
  This entry represents a domain found in alginate biosynthesis protein AlgX, probable alginate O-acetylase AlgJ, and related proteins. This domain demonstrates catalytic activity similar to that of the SGNH hydrolase-like domain, with the typical Ser-His-Asp triad found in this enzyme. Alginate is an exopolysaccharide that contributes to biofilm formation. AlgX is secreted into the biofilm and is responsible for the acetylation of biofilm polymers that help protect them from host destruction.
