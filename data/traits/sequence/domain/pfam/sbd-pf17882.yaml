identifier: Pfam:PF17882
label: OAA-family lectin sugar binding domain
definition: >-
  This domain is found in agglutinin family of lectins. Oscillatoria agardhii agglutinin (OAA)- family lectins comprise either one or two homologous domains, with a single domain possessing two glycan binding sites. OAA is one of the lectins with anti-HIV activity. This sugar binding domain is also found in Pseudomonas fluorescens agglutinin (PFA) and myxobacterial hemagglutinin (MBHA), where MBHA contains two sugar-binding domains (i.e. 4 sugar binding sites), whereas OAA and PFA are single-domain proteins (i.e. 2 sugar binding sites).
