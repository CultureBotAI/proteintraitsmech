identifier: Pfam:PF29606
label: Uncharacterized protein SSO3021, third domain
definition: >-
  This entry represents the third domain of the uncharacterised SSO3021 protein found in Saccharolobus solfataricus and related archaeal species. Research in this organism has focused on carbohydrate-active enzymes including alpha-xylosidase. The specific function of this protein and its second domain remains to be determined. This entry also includes uncharacterised sequences from Bacteria.
