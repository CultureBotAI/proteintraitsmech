identifier: Pfam:PF29503
label: Hymenoptaecin
definition: >-
  This entry represents hymenoptaecin, an antimicrobial peptide with antibacterial activity found in Hymenoptera. The peptide is synthesised as a precursor with a signal peptide and propeptide that are cleaved to produce the mature antimicrobial peptide. Hymenoptaecin is part of the innate immune response and defence against bacterial infection. Some proteins contain multiple copies of this domain in tandem repeats.
