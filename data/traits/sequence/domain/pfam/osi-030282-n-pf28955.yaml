identifier: Pfam:PF28955
label: OsI_030282 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the OsI_030282 protein family found in rice (Oryza sativa). The domain is approximately 37 amino acids in length and is located at the N-terminal region following a signal peptide. These proteins are expressed in anthers and have been identified through proteomics analysis of rice anther tissue. The specific function of this N-terminal domain remains to be determined.
