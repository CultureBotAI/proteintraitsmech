identifier: Pfam:PF14705
label: Costars
definition: >-
  This domain is found both alone (in the costars family of proteins) and at the C terminus of actin-binding Rho-activating protein (ABRA). It binds to actin, and in muscle regulates the actin cytoskeleton and cell motility. It has a winged helix-like fold consisting of three α-helices and four antiparallel β strands. Unlike typical winged helix proteins it does not bind to DNA, but contains a hydrophobic groove which may be responsible for interaction with other proteins.
