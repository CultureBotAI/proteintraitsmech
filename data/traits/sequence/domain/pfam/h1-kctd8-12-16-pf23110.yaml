identifier: Pfam:PF23110
label: KCTD8/12/16 H1 domain
definition: >-
  This entry represents the H1 domain found in the potassium channel tetramerization domain-containing protein 8/12/16 (KCTD8/12/16), which consists of a five-stranded antiparallel β-sheet interrupted by two α-helices, according to the structure described in. The H1 domain found at the C-terminal of these proteins, engages in interactions with G-protein beta-gamma subunits and has been described to be responsible for desensitisation in KCTD12.
