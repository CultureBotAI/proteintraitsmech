identifier: Pfam:PF13684
label: Fatty acid kinase subunit A-like, C-terminal
definition: >-
  This domain is found at the C-terminal of FakA (fatty acid subunit A) protein, which is part of the fatty acid kinase machinery. In the human pathogens Staphylococcus and Streptococcus, this system is used to scavenge host fatty acids. FakA is an ATP-binding subunit which interacts with varied FakB (fatty acid-binding protein) isoforms and synthesises acyl-phosphate from extracellular fatty acids [1]. FakA comprises three domains (FakA_N, FakA_M and FakA_C, ) and resembles an evolutionary mimic of the DhaK-DhaL kinase system. This entry represents FakA_C, which acts as a recipient of fatty acids transferred from FakB in the context of Fak activity.
