identifier: Pfam:PF00713
label: Hirudin
definition: >-
  The hirudin family are proteinase inhibitors that belong to MEROPS inhibitor family I14, clan IM. Hirudin is a potent thrombin inhibitor secreted by the salivary glands of the Hirudinaria manillensis (Buffalo leech) and Hirudo medicinalis (Medicinal leech). It forms a stable non-covalent complex with alpha-thrombin, thereby abolishing its ability to cleave fibrinogen.
