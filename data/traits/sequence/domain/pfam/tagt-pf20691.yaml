identifier: Pfam:PF20691
label: TET-Associated Glycosyltransferase
definition: >-
  This entry represents a Family 2/fringe-like glycosyltransferase domain that is found in DNA-modifying proteins of phages and eukaryotes. The name TAGT is derived from phage versions that are operonic with TET/JBP-dioxygenases. In kinetoplastids, the TAGT enzyme catalyses the second step in forming the hypermodified base J. The vertebrate GREB1 protein appears to catalyse the O-GlcNAcylation of ERalpha, protecting it from ubiquitination-based degradation.
