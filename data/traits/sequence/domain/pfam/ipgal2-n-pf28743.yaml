identifier: Pfam:PF28743
label: IPGAL2 N-terminal domain
definition: >-
  This entry represents the N-terminal helical domain found in INCREASED PETAL GROWTH ANISOTROPY 1-like protein 2 (IPGAL2) and related microtubule-associated proteins from land plants. This domain contains a predicted coiled-coil region and is located upstream of disordered regions rich in proline residues. The full-length proteins are involved in microtubule organisation and cell expansion during petal morphogenesis. IPGAL2 proteins colocalise with cortical microtubules and bind directly to microtubules in the cytoplasm. The proteins belong to the CHUP1/IPGA1-like group. Members are found across flowering plants and contain multiple coiled-coil regions. The specific function of this N-terminal helical domain remains to be determined.
