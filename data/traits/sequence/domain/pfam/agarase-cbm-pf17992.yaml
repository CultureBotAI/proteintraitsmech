identifier: Pfam:PF17992
label: Agarase CBM like domain
definition: >-
  This is the N-terminal CBM-like domain found in exo-beta-agarase proteins from the marine microbe Saccharophagus degradans. This enzyme catalyzes a critical step in the metabolism of agarose by S. degradans through cleaving agarose oligomers into neoagarobiose products that can be further processed into monomers. The CBM-like domain is structurally very similar to some CBM domains. A loop in the CBM-like domain is involved in forming the roof of the active site channel. The contribution of the CBM-like domain to formation of the active site of the enzyme supports a role in substrate recognition explaining the exo-mode of beta-agarase action.
