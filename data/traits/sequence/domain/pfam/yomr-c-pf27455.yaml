identifier: Pfam:PF27455
label: YomR C-terminal beta sandwich domain
definition: >-
  This entry represents the C-terminal domain of YomR proteins derived from SPbeta prophage and related bacteriophages. This domain adopts a β-sandwich fold similar to phage tail base-plate receptor-binding proteins found in Siphoviridae. The protein is found across 28 species including both bacteria and viruses, particularly in Bacillales and various bacteriophage groups. YomR proteins are associated with prophage elements integrated into bacterial genomes. The function of this domain remains to be determined.
