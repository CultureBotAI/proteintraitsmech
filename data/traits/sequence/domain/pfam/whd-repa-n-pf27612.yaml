identifier: Pfam:PF27612
label: RepA N-terminal winged helix domain
definition: >-
  This entry represents the N-terminal winged helix-turn-helix (HTH) domain found in plasmid replication initiator proteins of the RepA family. This domain is found in proteins from Bacillales and related Bacillota. The exemplar RepA protein from Bacillus subtilis plasmid pRAT11 is a 396 amino acid protein involved in plasmid replication control. The HTH domain likely functions in DNA binding, recognising specific sequences in the plasmid origin of replication. The protein contains a second domain C-terminal to this HTH domain. RepA proteins are essential for initiating plasmid DNA replication.
