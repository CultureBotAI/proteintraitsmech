identifier: Pfam:PF11663
label: Toxin with endonuclease activity, of toxin-antitoxin system
definition: >-
  YhaV causes reversible bacteriostasis and is part of a toxin-antitoxin system in Escherichia coli along with PrlF. The toxicity of YhaV is counteracted by PrlF by the formation of a tight complex which binds to the promoter of the prlF-yhaV operon. In vitro, YhaV also has endonuclease activity.
