identifier: Pfam:PF29983
label: YLL032C third KH domain
definition: >-
  This entry represents the third KH domain of the yeast YLL032C protein. YLL032C is predicted to bind approximately 80 different mRNAs in yeast cells, often those with a specific sequence motif (A/U)AUACC(C/U). Among the targets of Yll032C is MIH1, encoding a protein tyrosine phosphatase that in mitosis dephosphorylates and activates the master regulator of cell division, the cyclin-dependent kinase Cdk.
