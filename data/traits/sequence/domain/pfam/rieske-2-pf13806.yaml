identifier: Pfam:PF13806
label: Rieske-like [2Fe-2S] domain
definition: >-
  In Proteobacteria and Actinobacteria the main nitrite reductase activity is contributed by the NADH-dependent nitrite reductase, which detoxifies the nitrite formed as the product of nitrate reduction. The NADH-nitrite reductase operon consists of 4 genes: nirB, nirD, nirC and cysG. The enzyme is formed by the two subunits nirB and nirD. NirC is a nitrite transporter and cysG is required for the synthesis of sirohaem, a cofactor of the nirB subunit. NirD displays some sequence similarities with the 2Fe-2S Rieske domain (see ), but it does not contain the essential residues for the coordination of the iron sulphur. The entry includes the NirD subunit. Members include bacterial and fungal proteins. The bacterial NirD contains a single Rieske domain while fungal proteins have a C-terminal Rieske domain in addition to several other domains. The fungal NirD is involved in nutrient acquisition, functioning at the soil/fungus interface to control nutrient exchange between the fungus and the host plant. The Rieske domain is a [2Fe-2S] cluster binding domain involved in electron transfer. The Rieske [2Fe-2S] cluster is liganded to two histidine and two cysteine residues present in conserved sequences called Rieske motifs. In this family, only a few members contain these residues. Other members may have lost the ability to bind the Rieske [2Fe-2S] cluster.
