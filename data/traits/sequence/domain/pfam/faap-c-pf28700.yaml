identifier: Pfam:PF28700
label: Fra a 1-associated protein C-terminal domain
definition: >-
  This entry represents the C-terminal helix of Fra a 1-associated protein (FaAP), found in plants. FaAP interacts with Fra a 1 allergen proteins, including FRAA1E, FRAA2 and FRAA3. Fra a 1 proteins are major allergens in strawberry. The full-length protein is approximately 193 residues with an N-terminal disordered region.
