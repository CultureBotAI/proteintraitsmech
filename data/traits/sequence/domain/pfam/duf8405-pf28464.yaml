identifier: Pfam:PF28464
label: Domain of unknown function (DUF8405)
definition: >-
  This domain is found in uncharacterised proteins from bacteria and eukaryotes. It is predicted to fold into an α/β structure composed of four-stranded antiparallel β-sheet with strand order 2341 and α helices packed on one face of the sheet. This domain contains two pair of highly conserved cysteine residues that are predicted to form disulfide bonds. It is frequently found N-terminal to TIM-barrel domain.
