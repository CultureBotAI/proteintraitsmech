identifier: Pfam:PF30152
label: INO80 complex subunit 4
definition: >-
  This entry represents the IES4 (Ino eighty subunit 4) family, found in fungi, particularly within the Saccharomycetaceae. IES4 is a component of the chromatin-remodelling INO80 complex, which is involved in ATP-dependent chromatin remodelling, DNA repair, and regulation of DNA-templated transcription. The INO80 complex contains at least ARP4, ARP5, ARP8, RVB1, RVB2, TAF14, NHP10, IES1, IES3, IES4, IES6, ACT1, IES2, IES5, and INO80. IES4 is a small protein that localises to the nucleus and plays a role in DNA damage response, DNA repair, and telomere maintenance via recombination. IES4 is essential for proper chromatin remodelling activity of the INO80 complex.
