identifier: Pfam:PF27523
label: PSD
definition: >-
  This entry represents a domain that covers the N-terminal in phosphatidylserine decarboxylase proenzyme (PSD) from alpha, beta and gammaproteobacteria. This domain also covers the entire length of PSD in Azotobacter vinelandii ( ]) which is smaller compared to other PSD proteins. This domain contains an all helical fold. PSD plays a pivotal role in the synthesis of phospholipid by the mitochondria. The substrate phosphatidylserine is synthesised extramitochondrially and must be translocated to the mitochondria prior to decarboxylation. Phosphatidylserine decarboxylases is responsible for conversion of phosphatidylserine to phosphatidylethanolamine and plays a central role in the biosynthesis of aminophospholipids.
