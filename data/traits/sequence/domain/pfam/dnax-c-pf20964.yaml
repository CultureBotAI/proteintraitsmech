identifier: Pfam:PF20964
label: DNA polymerase III subunit tau, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of sequences similar to the subunit tau of bacterial DNA polymerase III (DnaX), such as from Thermus aquaticus. It binds to the C-terminal of the alpha subunit of the same complex through its C-terminal helix and the adjacent loop.
