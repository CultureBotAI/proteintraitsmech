identifier: Pfam:PF00340
label: Interleukin-1 / 18
definition: >-
  Interleukin-1 alpha and interleukin-1 beta (IL-1 alpha and IL-1 beta) are cytokines that participate in the regulation of immune responses, inflammatory reactions, and hematopoiesis. Two types of IL-1 receptor, each with three extracellular immunoglobulin (Ig)-like domains, limited sequence similarity (28%) and different pharmacological characteristics have been cloned from mouse and human cell lines: these have been termed type I and type II receptors. The receptors both exist in transmembrane (TM) and soluble forms: the soluble IL-1 receptor is thought to be post-translationally derived from cleavage of the extracellular portion of the membrane receptors. The receptors can both bind all three forms of IL-1: IL-1 alpha, IL-1 beta and the receptor antagonist IL-1RA. This entry represents the Interleukin-1 family, which includes seven ligands with agonist activity (IL1-alpha and IL1-beta, IL-18, IL-33, IL36-alpha, IL36-beta, IL36-gamma), three receptor antagonists (IL-1Ra, IL-36Ra, IL-38), and an anti-inflammatory cytokine (IL-37).
