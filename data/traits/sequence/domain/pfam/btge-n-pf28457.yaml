identifier: Pfam:PF28457
label: Probable beta-glucosidase btgE N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in probable beta-glucosidase btgE from Aspergillus species and related fungi. This domain is found within the larger glycosyl hydrolase enzyme. The btgE protein is involved in cellulose degradation and belongs to glycosyl hydrolase family 17. The enzyme catalyses the hydrolysis of terminal beta-D-glucosyl residues with release of beta-D-glucose. The protein is secreted and covalently linked to the fungal cell wall. The function of this N-terminal domain remains to be determined.
