identifier: Pfam:PF16132
label: Domain of unknown function (DUF4843)
definition: >-
  This family consists of uncharacterised proteins around 220 residues in length and is mainly found in various Bacteroides species. Distant homology analysis suggest distant relation between this family and other families of proteins with immunoglobulin-like folds, which are often involved in substrate binding. However, specific function of this family is unknown.
