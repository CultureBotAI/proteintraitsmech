identifier: Pfam:PF29716
label: Defensin-like protein 78/80
definition: >-
  This entry represents a defensin-like domain found in plants, particularly in the Brassicaceae and other eudicotyledon groups. The domain is characterised by a conserved pattern of four disulphide bonds and is found in small secreted proteins. These proteins belong to the DEFL group and are involved in antimicrobial defence responses, particularly against fungi. The mature protein is secreted following cleavage of an N-terminal signal peptide. This defensin-like domain forms part of a large group of over 300 related genes in Arabidopsis thaliana.
