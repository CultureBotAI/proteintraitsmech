identifier: Pfam:PF23304
label: Bardet-Biedl syndrome 1 protein, GAE domain
definition: >-
  This entry represents the GAE domain of BBS1, found at the C terminus. It adopts a β-sandwich fold. This domain mediates interactions with other subunits (BBS8 and BBS9) of the complex. Bardet-Biedl syndrome is characterised by usually severe pigmentary retinopathy, early-onset obesity, polydactyly, hypogenitalism, renal malformation and mental retardation. Bardet-Biedl syndrome proteins (BBS1, BBS2, BBS4, BBS5, BBS7, BBS8/TTC8, BBS9 and BBIP10) form the BBSome complex, which functions as a coat complex required for sorting of specific membrane proteins to the primary cilia. The ciliary trafficking function of BBSome is regulated by LZTFL1 (Leucine-zipper transcription factor-like 1). Primary cilia are ubiquitous cellular appendages that provide important sensory and signalling functions and their dysfunction underlies numerous human genetic disorders. The proteins disrupted in the human ciliary disorder Bardet-Biedl syndrome (BBS) are required for the localisation of G protein-coupled receptors to primary cilia on central neurons. The alteration of signalling caused by mislocalisation of ciliary signalling proteins underlies the BBS phenotype. Of the 12 known BBS genes, BBS1 is the most commonly mutated. This entry includes BBS1, is the most important BBSome subunit for cargo recognition as it mediates the interaction of the GTP-bound Arf-like GTPase ARL6 with the BBSome, a critical step in the recruitment of the BBSome to membranes.
