identifier: Pfam:PF29600
label: PPi-type PEPCK N-terminal domain
definition: >-
  This entry represents an N-terminal domain of approximately 290 amino acids found in PPi-type phosphoenolpyruvate carboxykinase (PEPCK) enzymes. These enzymes use inorganic pyrophosphate (PPi) as a phosphoryl donor to convert oxaloacetate to phosphoenolpyruvate, playing a key role in central carbon metabolism. The full-length enzymes are found in both bacteria and eukaryotes, including Entamoeba histolytica where three paralogues (PEPCK1-3) have been experimentally characterised. The specific function of this domain remains to be determined.
