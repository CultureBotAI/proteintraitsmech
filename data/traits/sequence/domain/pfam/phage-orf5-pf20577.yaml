identifier: Pfam:PF20577
label: Phage ORF5 protein
definition: >-
  This family of proteins includes ORF5 from Chlamydia phage 1 and VP5 from Bacteriophage phiMH2K, which are typically between 81 and 96 amino acids in length. These proteins appear to have a role in phage packaging.
