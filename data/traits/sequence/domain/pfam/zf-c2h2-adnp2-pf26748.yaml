identifier: Pfam:PF26748
label: Adnp2-like, C2H2-type zinc finger
definition: >-
  This C2H2-type zinc finger is found in human Activity-dependent neuroprotector homeobox protein (ADNP1) and Activity-dependent neuroprotector homeobox protein 2 (ADNP2), which may be involved in transcriptional regulation, play a role in neuronal function, and be involved in the protection of brain tissues from oxidative stress.
