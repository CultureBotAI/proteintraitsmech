identifier: Pfam:PF21149
label: Fatty acid synthase, pseudo-KR domain
definition: >-
  Fatty acid synthase is a multifunctional enzyme that catalyses the de novo biosynthesis of long-chain saturated fatty acids, starting from acetyl-CoA and malonyl-CoA in the presence of NADPH. This entry represents the pseudo-ketoreductase (pseudo-KR) domain which is catalytically inactive and supports the integrity of the active KR domain.
