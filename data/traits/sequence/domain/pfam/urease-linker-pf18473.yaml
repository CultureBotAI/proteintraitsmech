identifier: Pfam:PF18473
label: Urease subunit beta-alpha linker domain
definition: >-
  This domain is present in plant ureases and corresponds to the gap region between the C terminus of the beta-chain Urease beta subunit and the N terminus of the alpha-chain Urease alpha-subunit, N-terminal domain. It is suggested that this region is required for the stability of the putative transmembrane β-barrel.
