identifier: Pfam:PF23789
label: Pre-tape measure protein
definition: >-
  This entry represents a conserved region found in bacteriophage pre-tape measure proteins, located just upstream of the tape measure protein. The region is typically around 140-160 amino acids in length. In some phages, the pre-tape measure protein is produced by a programmed translational frameshift.
