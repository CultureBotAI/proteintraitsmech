identifier: Pfam:PF19755
label: Domain of unknown function (DUF6242) N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Outer membrane protein assembly factor BamI from Bacteroides thetaiotaomicron and similar proteins from bacteroidales. BamI is part of the outer membrane assembly machinery complex, which is involved in the assembly and insertion of β-barrel proteins into the outer membrane. This domain shows a β-sandwich fold. This entry was previously known as DUF6242.
