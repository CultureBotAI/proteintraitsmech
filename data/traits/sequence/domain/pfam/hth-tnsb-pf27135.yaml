identifier: Pfam:PF27135
label: TnsB transposase helix-turn-helix domain
definition: >-
  This entry represents a helix-turn-helix domain found in TnsB, the transposase component of bacterial transposon Tn7. TnsB is a sequence-specific DNA-binding protein that recognises sequences necessary for recombination at both left and right ends of Tn7. The protein contains multiple DNA-binding domains that contact double-stranded DNA and enable the formation of nucleoprotein filaments along the transposon ends. TnsB binding introduces DNA bending and the protein can bind multiple sites on each transposon end, with higher protein levels contributing to transposon immunity.
