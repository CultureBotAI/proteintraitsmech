identifier: Pfam:PF21895
label: MTHFR, SAM-binding regulatory domain
definition: >-
  This is the C-terminal SAM-binding regulatory domain of 5,10-methylenetetrahydrofolate reductase (MTHFR) that follows the catalytic domain and is unique to eukaryotes. This domain provides the required interface for MTHFR homo-dimerization, thus positioning the N-terminal serine-rich phosphorylation region near the SAM-binding site. The core of this domain comprises two mixed β-sheets, one of which flanked with helices. This regulatory domain represents distinct architecture from the classical SAM-dependent methyltransferases and non-methyltransferases.
