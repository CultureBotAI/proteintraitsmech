identifier: Pfam:PF01109
label: Granulocyte-macrophage colony-stimulating factor
definition: >-
  Granulocyte-macrophage colony-stimulating factor (GMCSF) is a cytokine that acts in hematopoiesis to stimulate growth and differentiation of hematopoietic precursor cells from various lineages including granulocytes, macrophages, eosinophils and erythrocytes. GMCSF is a glycoprotein of ~120 residues that contains 4 conserved cysteines that participate in disulphide bond formation. The crystal structure of recombinant human GMCSF has been determined. There are two molecules in the asymmetric unit, which are related by an approximate non-crystallographic 2-fold axis. The overall structure, which is highly compact and globular with a predominantly hydrophobic core, is characterised by a 4-α-helix bundle. The helices are arranged in a left-handed anti-parallel fashion, with two overhand connections. Within the connections is a two-stranded anti-parallel β-sheet. The tertiary structure has a topology similar to that of Sus scrofa (pig) growth factor and interferon-beta. Most of the proposed critical regions for receptor binding are located on a continuous surface at one end of the molecule that includes the C terminus.
