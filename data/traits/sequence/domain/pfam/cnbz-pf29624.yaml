identifier: Pfam:PF29624
label: 2-aminomuconate deaminase CnbZ
definition: >-
  This entry represents the 2-aminomuconate deaminase CnbZ ( ), found predominantly in Alpha and Betaproteobacteria. CnbZ catalyses the deamination of 2-aminomuconate to yield 2-hydroxymuconate and of 2-amino-5-chloromuconate to yield 2-hydroxy-5-chloromuconate, releasing ammonia. This enzyme is involved in the biodegradation of xenobiotic compounds, specifically nitrobenzene and 4-chloronitrobenzene. The characterised enzyme from Comamonas testosteroni is a monomeric protein of approximately 30 kDa.
