identifier: Pfam:PF06134
label: L-rhamnose isomerase (RhaA)
definition: >-
  This family consists of several bacterial L-rhamnose isomerase proteins ( ). This enzyme interconverts L-rhamnose and L-rhamnulose. In some species, including Escherichia coli, this is the first step in rhamnose catabolism. Sequential steps are catalysed by rhamnulose kinase (rhaB), then rhamnulose-1-phosphate aldolase (rhaD) to yield glycerone phosphate and (S)-lactaldehyde. Bifunctional enzyme RhaA/RhaB from Bacillus clausii is also included in this entry. It contains both rhamnulokinase and L-rhamnose isomerase domains.
