identifier: Pfam:PF28636
label: Halfway C-terminal domain
definition: >-
  This entry represents the C-terminal helix of Halfway proteins found in Drosophila species. The full-length Halfway proteins are involved in the ecdysone-induced developmental cascade and have a role in the indirect control of late ecdysone genes. Experimental evidence shows that mutations in these proteins specifically interrupt transmission of regulatory signals from early to late ecdysone inducible genes. This C-terminal helix is found downstream of leucine-rich repeat regions and LRRNT/LRRCT domains and it is predicted as a transmembrane helix. The specific function of this C-terminal domain remains to be determined.
