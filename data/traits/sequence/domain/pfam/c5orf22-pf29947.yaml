identifier: Pfam:PF29947
label: UPF0489 protein C5orf22 domain
definition: >-
  This domain is found in the middle region of human UPF0489 protein C5orf22 and similar proteins mainly found in animals. Proteins in this group also contain and are likely to be enzymes related to the Arginase family. This domain is predicted to show an all-helical configuration. Its specific function is unknown.
