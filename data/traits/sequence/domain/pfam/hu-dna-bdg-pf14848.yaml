label: DNA-binding domain
definition: >-
  This entry includes uncharacterised bacterial proteins, such as the hypothetical protein Bvu_2165 from Bacteroides vulgatus. These proteins consist of two domains, an N-terminal one similar to DNA sequence specific (integration host factor) IHF and non-specific (HU) domains which is represented in this entry, and a C-terminal Ig-like domain ( ).
