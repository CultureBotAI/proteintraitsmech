identifier: Pfam:PF27278
label: YuaE
definition: >-
  This entry represents the YuaE domain found in uncharacterised lipoproteins from Escherichia coli. YuaE is a 137 amino acid protein encoded on the F plasmid (locus ECOK12F014) in Escherichia coli strain K12. The protein contains an N-terminal signal peptide that is processed and a lipid anchor at position 22 (N-palmitoyl and S-diacylglycerol cysteine). The function of this domain remains to be determined.
