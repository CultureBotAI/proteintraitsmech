identifier: Pfam:PF25799
label: Class I prePAAR effector Rhs1 motif
definition: >-
  This motif, known as prePAAR motif, is found at the N-terminal of the class I prePAAR effector Rhs1 from Salmonella Typhimurium, Double-stranded DNA deaminase toxin A from Burkholderia cenocepacia (DddA) and related proteins mainly from proteobacteria. prePAAR facilitates PAAR domain interaction with the VgrG spike. prePAAR is required for PAAR function and effector export by the T6SS. DddA is the toxic component of a toxin, immunity protein module that functions within a cellular contact-dependent growth inhibition (CDI) system, enabling bacteria to communicate with and inhibit the growth of closely related neighbouring bacteria through direct contact. It contains a deaminase domain with double-stranded DNA cytidine deaminase activity and has been adapted for CRISPR-free mitochondrial base editing, highlighting its potential in genome engineering applications. This motif is also found in the NAD(P)(+) glycohydrolase toxin Tse6 which is a Type VI secretion exported toxin that acts as a glycohydrolase on bacterial target cells and degrades the essential dinucleotides NAD+ and NADP+, thereby inducing bacteriostasis. The activity resides in the C-terminal region that is initially neutralised by the cognate immunity protein Tsi6.
