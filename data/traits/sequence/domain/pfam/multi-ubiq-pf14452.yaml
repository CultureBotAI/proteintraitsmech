identifier: Pfam:PF14452
label: Multiubiquitin
definition: >-
  This entry represents a ubiquitin-like domain that is often present in multiple tandem copies in the same polypeptide. Proteins in this entry are associated in gene neighbourhoods, or on occasions fused to, bacterial homologues of components of ubiquitin-dependent modification system such as the E1, E2 and JAB metallopeptidase enzymes and a distinct metal-binding domain. The E2/UBC fold domain appears to be inactive. The JAB domain in these operons is usually fused to the E1 domain.
