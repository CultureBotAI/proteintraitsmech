identifier: Pfam:PF01591
label: 6-phosphofructo-2-kinase
definition: >-
  6-Phosphofructo-2-kinase ( , ) is a bifunctional enzyme that catalyses both the synthesis and the degradation of fructose-2, 6-bisphosphate. The fructose-2,6-bisphosphatase reaction involves a phosphohistidine intermediate. The catalytic pathway is: ATP + D-fructose 6-phosphate = ADP + D-fructose 2,6-bisphosphate D-fructose 2,6-bisphosphate + H 2 O = 6-fructose 6-phosphate + P i The enzyme is important in the regulation of hepatic carbohydrate metabolism and is found in greatest quantities in the liver, kidney and heart. In mammals, several genes often encode different isoforms, each of which differs in its tissue distribution and enzymatic activity. The family described here bears a resemblance to the ATP-driven phospho-fructokinases, however, they share little sequence similarity, although a few residues seem key to their interaction with fructose 6-phosphate. This domain forms the N-terminal region of this enzyme, while forms the C-terminal domain.
