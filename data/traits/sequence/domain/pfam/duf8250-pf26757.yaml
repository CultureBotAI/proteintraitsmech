identifier: Pfam:PF26757
label: Domain of unknown function (DUF8250)
definition: >-
  This domain is found in uncharacterised proteins predominantly from bacteria. It contains two pairs of conserved cysteine residues that may be involved in metal ion coordination. This domain is predicted to adopt a fold typical for zinc beta-ribbon domains.
