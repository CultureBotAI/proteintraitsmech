identifier: Pfam:PF30003
label: IRC8 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of IRC8 and related proteins found in yeasts. IRC8 (Increased recombination centers protein 8) is an uncharacterised multi-pass membrane protein that has been implicated in mitotic recombination processes. The N-terminal region of IRC8 contains four predicted transmembrane helices and shows conservation across fungal species. The protein is localised to cellular membranes, the cellular bud, and fungal-type vacuoles. IRC8 undergoes phosphorylation at serine residues, indicating potential regulatory functions. The specific function of this domain remains to be determined.
