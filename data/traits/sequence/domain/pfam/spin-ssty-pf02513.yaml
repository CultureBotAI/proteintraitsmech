identifier: Pfam:PF02513
label: Spin/Ssty Family
definition: >-
  Spindlin (Spin) and Ssty were first identified for their involvement in gametogenesis. Spindlin was identified as a maternal transcript present in the unfertilised egg and early embryo, and was subsequently shown to interact with the spindle apparatus during oogenesis, and may therefore be important for mitosis. In addition, spindlin appears to be a target for cell cycle-dependent phosphorylation, and as such may play a role in cell cycle regulation during the transition from gamete to embryo. Ssty is a multi-copy, Y-linked spermatogenesis-specific transcript that appears to be required for normal spermatogenesis. Ssty may play an analogous role to spindlin in sperm cells, namely during the transition from sperm cells to early embryo, and in mitosis.
