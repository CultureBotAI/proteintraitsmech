identifier: Pfam:PF25661
label: Phycodnaviridae minor capsid protein P4
definition: >-
  This entry represents a small family of putative metallopeptidases found in the phycodnaviridae group. In Paramecium bursaria chlorella virus (PBCV), a member of this family has been identified as minor capsid protein P4. These proteins contain a HEXXH motif characteristic of metallopeptidases. The P4 protein plays a structural role in stabilising the viral capsid by glueing together neighbouring capsomers. The N-terminal part of P4 (residues 5-23) glues together two neighbouring capsomers. Its central domain (residues 24-54) is folded into a fist-like structure consisting of three short helices. The C-terminal part of P4 anchors in the central 3-fold cavity of a third capsomer. This protein is part of a network of minor capsid proteins that stabilise the viral capsid of nucleocytoplasmic large DNA viruses.
