identifier: Pfam:PF26115
label: GAPS4 protein PD-(D/E)XK nuclease domain
definition: >-
  This entry represents the PD-(D/E)XK domain found in the GAPS4 protein from Vibrio furnissii ( ) and similar prokaryotic proteins. The PD-(D/E)XK phosphodiesterase domain, is a widespread catalytic domain found in a diverse superfamily of nucleases. The domain is characterised by a conserved catalytic motif containing Proline-Aspartate (PD) followed by an acidic residue (Aspartate or Glutamate) separated by one residue from a conserved Lysine (XK). These residues form the active site that coordinates divalent metal ions (typically Mg2+) to catalyse phosphodiester bond hydrolysis in nucleic acid substrates. The PD-(D/E)XK superfamily includes restriction endonucleases, Holliday junction resolvases, and various anti-phage defence systems. In anti-phage defence, this domain is found in several systems including GAPS1 and GAPS4 within Gamma-Mobile-Trio (GMT) islands, where it likely plays a critical role in targeting phage nucleic acids. Mutagenesis studies on GAPS1 have shown that substituting the conserved D313 and K328 residues within the active site completely abolishes the anti-phage activity, confirming the essential role of this domain in defence function. These domains are often paired with sensing or regulatory domains that confer specificity to their nucleolytic activity.
