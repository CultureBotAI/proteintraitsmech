identifier: Pfam:PF30456
label: Frv operon regulatory protein FrvR, fourth domain
definition: >-
  This entry represents the fourth domain of FrvR and related bifunctional regulatory proteins. FrvR contains an N-terminal HTH DNA-binding domain ( ) and a C-terminal PTS EIIA type-2 domain ( ), and may be involved in regulating transcription of the frv operon. The PTS EIIA domain is proposed to serve a regulatory function through its phosphoryl- ation activity. The family shows similarity to BglG-type antiterminators, which regulate sugar utilisation operons. The family is found in Enterobacterales and Lactobacillales. The specific function of this fourth domain remains to be determined.
