identifier: Pfam:PF27213
label: VspR N-terminal domain
definition: >-
  This entry represents the N-terminal domain of VspR, a transcriptional regulator from Vibrio cholerae. VspR is a 187 amino acid transcriptional repressor (gene VC_0177) that represses transcription of several genes encoded within the Vibrio 7th pandemic island-1 (VSP-1), including dncV, VC_0176, VC_0178 and VC_0180. The specific function of this N-terminal domain remains to be determined.
