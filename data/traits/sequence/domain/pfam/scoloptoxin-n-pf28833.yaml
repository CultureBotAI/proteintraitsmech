identifier: Pfam:PF28833
label: Scoloptoxin-like N-terminal domain
definition: >-
  This entry represents an N-terminal domain found in arthropod proteins, including carboxypeptidase inhibitors and other uncharacterised proteins. The domain is approximately 50-60 amino acids in length and is found in spiders and related arachnids. It shares structural similarity with scoloptoxin proteins from centipedes, which are small disulfide-rich venom peptides. In multi-domain proteins, this domain is often found in combination with other domains such as VldE. The specific function of this domain remains to be determined.
