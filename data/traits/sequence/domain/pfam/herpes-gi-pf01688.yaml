identifier: Pfam:PF01688
label: Alphaherpesvirus glycoprotein I
definition: >-
  This family consists of glycoprotein I from various members of the alphaherpesvirinae. These include Human herpesvirus 1 (HHV-1), Human herpesvirus 3 (HHV-3) and Suid herpesvirus 1 (Pseudorabies virus). Glycoprotein I (gI) is important during natural infection, mutants lacking gI produce smaller lesions at the site of infection and show reduced neuronal spread. gI forms a heterodimeric complex with gE; this complex displays Fc receptor activity (binds to the Fc region of immunoglobulin). Glycoproteins are also important in the production of virus-neutralizing antibodies and cell mediated immunity. The alphaherpesviridae have a dsDNA genome and have no RNA stage during viral replication.
