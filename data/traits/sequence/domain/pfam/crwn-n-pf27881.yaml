identifier: Pfam:PF27881
label: CROWDED NUCLEI 2, N-terminal domain
definition: >-
  This entry represents the N-terminal coiled-coil domain of CROWDED NUCLEI (CRWN) proteins found in plant species. Proteins in this entry also include NMCP1A/B from rice. NMCP1B, also known as OsNMCP1, regulates drought resistance and root growth through chromatin accessibility. CRWN proteins are components of SUN-protein-containing LINC complexes that link the nucleoskeleton and cytoskeleton. These proteins are required for nuclear size control and heterochromatin organisation.
