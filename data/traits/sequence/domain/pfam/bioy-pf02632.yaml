identifier: Pfam:PF02632
label: BioY family
definition: >-
  BioMNY, a high-affinity biotin transporter, is a member of the ECF (energy-coupling factor) transporters. ECF transporters share a common architecture consisting of pairs of ABC (ATP-binding cassette)-containing ATPases, a conserved transmembrane protein and a transmembrane substrate-capture protein. In the case of the biotin transporter these are represented by BioM, BioN and BioY respectively.
