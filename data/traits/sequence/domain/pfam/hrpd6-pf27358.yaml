identifier: Pfam:PF27358
label: Type III secretion system regulatory protein HrpD6
definition: >-
  This entry represents HrpD6, a small regulatory protein involved in controlling the type III secretion system (T3SS) in Xanthomonas oryzae pv. oryzicola and related proteins from Pseudomonadota. HrpD6 regulates several genes of the hrp-hrc-hpa cluster, upregulating expression of hpa2, hpa1 and hpaB, and partially controlling hrcC and hrcT expression. The protein controls secretion of T3SS TAL effectors such as AvrXa27 and regulates expression of HrpX-regulated protein (Xrp) genes. HrpD6 is positively regulated by HrpX and is expressed under control of the hrpD operon promoter. The protein is 80 amino acids in length and belongs to the HrpD6-like family. HrpD6 is essential for proper T3SS function and bacterial pathogenicity.
