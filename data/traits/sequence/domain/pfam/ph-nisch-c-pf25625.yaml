identifier: Pfam:PF25625
label: Nischarin, C-terminal PH domain
definition: >-
  This domain is found at the C-terminal end of human Nischarin and related animal proteins. Nischarin functions as a molecular scaffold, interacting with various protein partners and playing important roles in cell migration, cytoskeletal organisation, and tumour suppression. Nischarin expression is often reduced in various human cancers, including breast, ovarian, and lung cancers. Its downregulation has been associated with increased tumour growth and metastasis.
