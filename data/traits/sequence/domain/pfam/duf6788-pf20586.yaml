identifier: Pfam:PF20586
label: Domain of unknown function (DUF6788)
definition: >-
  This domain is found in functionally uncharacterised proteins mainly from bacteria and archaea. Proteins with this domain are around 100 amino acids in length and this domain is found toward their N terminus. There are two conserved sequence motifs, CGxxxCxC containing three conserved Cys residues and HGP.
