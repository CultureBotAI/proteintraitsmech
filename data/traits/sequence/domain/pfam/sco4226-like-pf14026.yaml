identifier: Pfam:PF14026
label: Nickel responsive protein SCO4226-like
definition: >-
  This entry represents a family of proteins found in prokaryotes, including SCO4226 from Streptomyces coelicolor ( ). This protein adopts a dimeric configuration able to bind four nickel ions, with each monomer showing a typical ferredoxin-like fold with five β-strands packing against two α-helices. It may play a role in cellular nickel homeostasis, detoxification, and/or nickel utilization in specialized cytoplasmic compartment.
