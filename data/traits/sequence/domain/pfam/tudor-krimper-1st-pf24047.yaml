identifier: Pfam:PF24047
label: Krimper first tudor domain
definition: >-
  This entry represents the first Tudor domain found in Protein krimper (also known as Tudor domain-containing protein krimp) from Drosophila melanogaster and similar fly proteins. Krimper is required for ping-pong piRNA amplification and is capable of both self-interactions and binding of the two PIWI proteins: Aub and Ago3. The ping-pong cycle is a process where the degradation of complementary target mRNA by PIWI proteins can trigger the generation of new RNA guides for the repression of transposable elements proliferation. This domain is found in a region of the protein involved in the interaction and binding to Ago3, but not Aub.
