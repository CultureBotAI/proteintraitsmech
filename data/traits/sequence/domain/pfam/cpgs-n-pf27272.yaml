identifier: Pfam:PF27272
label: Cyclic 2,3-diphosphoglycerate synthetase, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of cyclic 2,3- diphosphoglycerate synthetase (CpgS), found in Archaea and some thermophilic bacteria. This N-terminal domain is distinct from both the central P-loop nucleotide-binding domain and the C-terminal domain. The specific role of this N-terminal domain in catalysis and protein structure remains to be determined. CpgS is a low molecular weight compound that accumulates to high levels in some hyperthermophilic methanogens, suggesting that it may play a thermoadaptive role. The full-length enzyme catalyses the formation of cyclic 2,3-diphosphoglycerate from 2,3- bisphosphoglycerate and ATP . It has also been shown to protect proteins from heat denaturation in vitro. CpgS functions as a homodimer and may be involved in osmotic balance and thermoadaptation in hyperthermophilic organisms.
