identifier: Pfam:PF29172
label: Dolichol kinase N-terminal domain
definition: >-
  This entry represents the N-terminal domain of dolichol kinase, an enzyme that catalyses the CTP-mediated phosphorylation of dolichol to produce dolichyl monophosphate. Dolichol kinase belongs to the polyprenol kinase family and is an endoplasmic reticulum multi-pass transmembrane protein. The N-terminal domain is cytoplasmic and precedes multiple transmembrane helices. Dolichyl monophosphate is essential for protein glycosylation and GPI anchor biosynthesis. The enzyme is found across fungi and is required for core glycosylation processes. The specific function of this domain remains to be determined.
