identifier: Pfam:PF15568
label: Immunity protein 39
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and conserved GR, and GxK motifs. These proteins are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-URI2 family of nucleases.
