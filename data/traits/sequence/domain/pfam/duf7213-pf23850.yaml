identifier: Pfam:PF23850
label: Family of unknown function (DUF7213)
definition: >-
  This entry represents an uncharacterised protein of approximately 70-100 amino acids found in mycobacteriophages. The function of this protein is currently unknown. It is found in phages belonging to the Gracegardnervirinae subfamily, including Cheoctovirus and Terapinvirus genera. This protein forms a confident dimer according to an AlphaFold model of . The dimer forms a central four stranded β sheet with two α helices packed orthogonally to the direction of the β strands on each face of the sheet.
