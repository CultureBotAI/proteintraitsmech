identifier: Pfam:PF26994
label: Domain of unknown function (DUF8320)
definition: >-
  This entry represents a domain of unknown function at the N-terminal in uncharacterised proteins mostly found in bacteria. This domain belongs to proteins with a conserved four or five-helix up-and-down bundle structure. This structure is typical of focal adhesion targeting (FAT) domains and is responsible for dimerisation. These proteins are also present in transcriptional regulators where the bundle structure is important for their dynamic conformational equilibrium to control target specificity. The conserved helical bundle architecture enables these proteins to function in protein-protein interactions and regulatory processes.
