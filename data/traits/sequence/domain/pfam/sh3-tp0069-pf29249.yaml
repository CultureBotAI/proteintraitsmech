identifier: Pfam:PF29249
label: Treponema TP0069 SH3-like domain
definition: >-
  This entry represents an SH3-like domain found in Treponema pallidum protein TP0069 and related proteins. The domain is approximately 75 residues long and adopts the characteristic SH3-like fold. SH3 domains typically mediate protein-protein interactions through binding to proline-rich sequences. The proteins containing this domain are predicted to be lipoproteins. The function of this domain remains to be determined.
