identifier: Pfam:PF12891
label: Glycoside hydrolase family 44
definition: >-
  This is the catalytic domain of a family of bacterial glycoside hydrolases formerly known as cellulase family J, and now known as Cel44A. It is one of the major enzymatic components of the cellulosome of Clostridium thermocellum strain F1 and of many other Firmicutes.
