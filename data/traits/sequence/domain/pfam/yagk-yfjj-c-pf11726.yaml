identifier: Pfam:PF11726
label: YagK/YfjJ C-terminal domain
definition: >-
  This domain is found at the C-terminal end of a group of uncharacterised proteins from bacteria, such as YagK and YfjJ from E.coli. This domain is structurally similar to viral Rep proteins and bacterial relaxases based on structure predictions and comparison, containing also the conserved HXH motif typically found in those proteins.
