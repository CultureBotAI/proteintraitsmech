identifier: Pfam:PF02463
label: RecF/RecN/SMC N terminal domain
definition: >-
  This domain is found at the N terminus of structural maintenance of chromosomes (SMC) proteins, which function together with other proteins in a range of chromosomal transactions, including chromosome condensation, sister-chromatid cohesion, recombination, DNA repair and epigenetic silencing of gene expression. The eukaryotic SMC proteins form two kind of heterodimers: the SMC1/SMC3 and the SMC2/SMC4 types. These heterodimers constitute an essential part of higher order complexes, which are involved in chromatin and DNA dynamics. This domain is also found in RecF and RecN proteins, which are involved in DNA metabolism and recombination. This domain is also found in urease accessory protein 2 (URE2) which is a central component of cohesin, a complex required for chromosome cohesion during the cell cycle, and Is unrelated to urease function in C.neoformans.
