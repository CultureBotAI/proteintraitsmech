identifier: Pfam:PF02050
label: Flagellar FliJ protein
definition: >-
  The bacterial flagellum consists of three major parts: the basal body (including the rod), the hook, and the filament. Outer components of the flagellum are transported to the assembly site by a specialised type III export apparatus, which is related to the type III secretion system (T3SS). FliJ is a soluble regulatory component of the flagellar export apparatus. The function of FliJ is not clear.
