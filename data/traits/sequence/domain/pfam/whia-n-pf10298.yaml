identifier: Pfam:PF10298
label: WhiA N-terminal LAGLIDADG-like domain
definition: >-
  This entry represents the N-terminal domain of sporulation transcription factor WhiA. This domain is related to the LAGLIDADG homing endonuclease domain, while the C-terminal domain of WhiA is predicted to be a DNA binding helix-turn-helix domain.
