identifier: Pfam:PF18178
label: ATP nucleosidase Cap17-like, N-terminal
definition: >-
  This entry represents a domain found at the N-terminal of ATP nucleosidase Cap17 from E.coli and related sequences. Cap17 is likely an effector protein with (d)ATP degrading activity of a CBASS (cyclic oligonucleotide-based antiphage signaling system) antivirus system, which provides immunity against bacteriophages. Members of this entry often co-occur genomically with the bacterial HORMA and Pch2/TRIP13 domains.
