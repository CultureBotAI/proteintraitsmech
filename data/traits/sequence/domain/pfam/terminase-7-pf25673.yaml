identifier: Pfam:PF25673
label: Phage terminase small subunit
definition: >-
  This entry represents a putative phage small terminase subunit. Predicted structures show similarity albeit weak to the structure of the HK97 terminase ( ). Furthermore structure prediction suggests members of this family can form homomeric rings with high confidence as expected for small subunit terminases.
