identifier: Pfam:PF21721
label: Phage tail fibre adhesin Gp38 N-terminal domain
definition: >-
  This entry represents the N-terminal domain from several Gp38 proteins from T-even-like phages. Gp38 is a receptor binding protein that is at the tip of the long tail fibers and serves as the phage recognition site for the attachment host receptor. This domain interacts with the Gp37 tail fiber protein.
