identifier: Pfam:PF30275
label: Beta-porphyranase A-D, GH16 domain
definition: >-
  This entry represents the GH16 domain found in Beta-porphyranases A-E (PorA-E) and Beta-agarases A-D from Zobellia galactanivorans. PorA-E proteins cleave the sulfated polysaccharide porphyran at the (1->4) linkages between beta-D-galactopyranose and alpha-L-galactopyranose-6-sulfate, forming mostly the disaccharide alpha-L-galactopyranose-6-sulfate-(1->3)-beta- D-galactose. Beta-agarases, closely related to PorA-D, cleave the beta-1,4-linkages between beta-D-galactose and alpha-L-3,6-anhydro-galactose residues in agarose. This domain is also found at the N-terminal of Kappa-carrageenase from Pseudoalteromonas carrageenovora (CgkA), which catalyses the endohydrolysis of (1->4)-beta-D-linkages between D-galactose 4-sulfate and 3,6-anhydro-D-galactose in kappa-carrageenans.
