identifier: Pfam:PF03245
label: Bacteriophage Rz lysis protein
definition: >-
  The lysis of Gram-negative hosts by double-strand DNA bacteriophages requires, in addition to the actions of a holin and endolysin, a third step involving the spanin complex. This complex consists of a small outer membrane lipoprotein and an integral cytoplasmic membrane protein, designated as o-spanins and i-spanins, respectively. The spanin complex is involved in the disruption of the outer membrane. Without the spanin function, lysis is blocked and progeny virions are trapped in dead spherical cells. The first spanins to be characterised were phage lambda Rz and Rz1. Rz corresponds to the inner membrane or i-spanin, whereas Rz1 represents the outer membrane or o-spanin. Rz and Rz1 ( ) represent a unique example of two genes located in different reading frames in the same nucleotide sequence, which encode different proteins that are both required in the same physiological pathway. Rz and Rz1 form a disulfide-linked complex that spans the host inner and outer membranes.
