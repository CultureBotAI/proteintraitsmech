identifier: Pfam:PF21334
label: Fungal epsilon subunit of F1F0-ATP synthase C-terminal domain
definition: >-
  F-type ATPases consist of two structural domains, F1 containing the extramembranous catalytic core, and F0 which contains the membrane proton channel. This entry includes ATP synthase subunit delta from fungi (called epsilon in bacteria or chloroplast ATPase), which interacts with subunit C from F0 which is important for connecting the rotor of F1 (gamma subunit) to the rotor of F0 (C subunit). This entry represents the C-terminal α-helical domain which is likely to act as an inhibitor of ATPase activity.
