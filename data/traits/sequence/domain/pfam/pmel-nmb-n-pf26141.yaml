identifier: Pfam:PF26141
label: PMEL/NMB N-terminal domain
definition: >-
  This entry represents the N-terminal domain in PKD PMEL/NMB proteins, including Protein QNR-71. This domain contains an RGD motif, which mediates integrin binding. It also contains potential N-glycosylation sites and an Ig-like fold. This entry does not include the N-terminal in Transmembrane protein 130. PKD PMEL/NMB proteins are involved in melanosome morphogenesis and pigmentation. Proteins such as the melanocyte protein PMEL form physiological amyloids that are crucial for the development of melanosomes, the organelles responsible for melanin production. They facilitate the transition of premelanosomes from stage I to stage II by assembling amyloidogenic fragments into fibrillar sheets, which help shape the vesicle. In later stages, the amyloid matrix acts as a scaffold for eumelanin precursor accumulation, aiding in pigment formation. Additionally, these proteins may help prevent pigmentation-associated toxicity by sequestering harmful intermediates of the eumelanin biosynthesis pathway.
