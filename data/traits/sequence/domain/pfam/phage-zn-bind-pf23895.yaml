identifier: Pfam:PF23895
label: Phage zinc binding domain
definition: >-
  This entry represents a group of small uncharacterised tailed bacteriophage proteins with a domain that covers the whole length of the protein. Structure prediction shows that this domain adopts a four stranded β-meander fold and is likely zinc binding, with an N-terminal conserved CXXC motif and more central CXXXXC motif providing the zing binding residues.
