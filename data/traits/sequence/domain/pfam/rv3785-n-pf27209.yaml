identifier: Pfam:PF27209
label: Rv3785 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Rv3785, an uncharacterised protein from the Mycobacterium tuberculosis complex. Members of this group also include Mycobacterium bovis (gene Mb3814), and related species. The protein is predicted to be localised to the cytosol and is conserved within the Mycobacterium tuberculosis complex. The specific function of this domain remains to be determined.
