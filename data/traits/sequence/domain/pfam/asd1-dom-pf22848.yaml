identifier: Pfam:PF22848
label: Alpha-L-arabinofuranosidase 1 domain
definition: >-
  This entry represents the catalytic domain of Alpha-L-arabinofuranosidase 1/2 from Arabidopsis thaliana (ASD1/2), Alpha-L-arabinofuranosidases from fungi (AbfA), Intracellular exo-alpha-(1->5)-L-arabinofuranosidase 1 and Exo-alpha-(1->6)-L-arabinofuranosidase from bacteria and similar uncharacterised sequences. ASD1 may be involved in the coordinated dissolution of the cell wall matrix during abscission and in the secondary cell wall formation in xylem vessels. AbfA in involved in the degradation of arabinoxylan, a major component of plant hemicellulose. This domain is often found associated to .
