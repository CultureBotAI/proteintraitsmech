identifier: Pfam:PF13240
label: zinc-ribbon domain
definition: >-
  This entry consists of a single zinc ribbon domain. This domain is found in archaeal Large ribosomal subunit protein eL40 covering the full length of the protein. It is also found in Serine/threonine-protein kinase VRK3 found in eukaryotes, covering the N-terminal. In bacteria, this domain is found at the N-terminal in Membrane-associated protein TcaA and Uncharacterized membrane protein YvbJ.
