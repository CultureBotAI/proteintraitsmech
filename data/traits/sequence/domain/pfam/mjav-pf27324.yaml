identifier: Pfam:PF27324
label: Type II restriction enzyme MjaV family
definition: >-
  This entry represents the MjaV family of type II restriction endonucleases found predominantly in bacteria. The family is found mainly in Verrucomicrobiota, particularly Verrucomicrobiaceae. The prototype enzyme MjaV from Methanocaldococcus jannaschii recognises the double-stranded sequence 5'-GTAC-3' and performs endonucleolytic cleavage of DNA to give specific double-stranded fragments. The proteins are approximately 230 amino acids in length and function as part of restriction-modification systems.
