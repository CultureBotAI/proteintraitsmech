identifier: Pfam:PF04765
label: TOD1/MUCI70, glycosyltransferase-like domain
definition: >-
  This entry represents a glycosyltransferase-like domain found in alkaline ceramidase TOD1 ( ) and the probable hexosyltransferase MUCI70 from Arabidopsis ( ). MUCI70 is a predicted glycosyltransferase essential for the accumulation of seed mucilage, a gelatinous wall rich in unbranched rhamnogalacturonan I (RG I), and for shaping the surface morphology of seeds. TOD1 is an endoplasmic reticulum ceramidase that catalyses the hydrolysis of ceramides into sphingosine and free fatty acids at alkaline pH (e.g. pH 9.5).
