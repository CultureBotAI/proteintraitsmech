identifier: Pfam:PF26298
label: MurL C-terminal domain
definition: >-
  This entry represents the C-terminal domain of MurL, a novel glycopeptidyl- glutamate epimerase involved in bacterial cell wall formation. MurL is an ATP-dependent enzyme that catalyses the epimerisation of the terminal L-glutamate residue in UDP-MurNAc-L-Ala-L-Glu to D-glutamate, functioning in conjunction with MurD2-a non-canonical MurD ligase that incorporates L-Glu rather than D-Glu. This alternative pathway enables the incorporation of D-glutamate into peptidoglycan in bacteria that lack glutamate racemases or D-amino acid aminotransferases. The reaction catalysed by MurL requires Mg 2+ and results in the production of AMP, suggesting that substrate activation occurs via adenylation. Notably, the reaction is irreversible, as MurL cannot convert UDP-MurNAc-L-Ala-D-Glu back to the L-form. MurL is found in some Gammaproteobacteria, including Xanthomonas, Stenotrophomonas, and Lysobacter, as well as in certain rare actinobacteria such as Micromonospora and Salinispora.
