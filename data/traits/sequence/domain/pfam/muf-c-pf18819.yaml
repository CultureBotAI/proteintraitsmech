identifier: Pfam:PF18819
label: Phage MuF-C-terminal domain
definition: >-
  This entry represents a predicted endoRNase of the Barnase-EndoU-ColicinE5/D-RelE like nuclease fold found in polyvalent proteins of phages and conjugative elements and also fused to the MuF domain, a structural component of the phage head. The predicted active site contains a conserved histidine and serine residues.
