identifier: Pfam:PF12399
label: Branched-chain amino acid ATP-binding cassette transporter
definition: >-
  This domain is found C-terminal in branched-chain amino acid transporter LivG and LptB. It is approximately 30 amino acids in length and contains a conserved AYLG sequence motif. Structure and biochemical studies in LptB showed that this domain is essential for LPS transport.
