identifier: Pfam:PF20154
label: Apolipoprotein N-acyltransferase N-terminal domain
definition: >-
  This domain represents the N-terminal transmembrane region of the apolipoprotein N-acyltransferase enzyme. Proteins containing this domain also include bifunctional apolipoprotein N-acyltransferase/polyprenol monophosphomannose synthase from Mycobacterium tuberculosis. Apolipoprotein N-acyltransferase (Lnt) transfers the acyl group to lipoproteins and is involved in lipoprotein biosynthesis in Gram-negative bacteria. It is an integral membrane protein. In the last step of lipoprotein maturation, N-acylation by apolipoprotein N-acyltransferase of the plasma membrane is required for recognition of the outer membrane lipoproteins by the Lol system, which transports the lipoproteins from the plasma to the outer membrane. This is a reverse amidase (i.e. condensation) reaction.
