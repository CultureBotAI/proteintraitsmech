identifier: Pfam:PF23030
label: SCAF11-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of human protein SCAF11, SFR19, SCAF1 and PHD and RING finger domain-containing protein 1. These proteins play a role in pre-mRNA alternative splicing by regulating spliceosome assembly. The SCAF1 C-terminal domain binds to the CTD domain of RNA polymerase II, helping to couple transcription with pre-mRNA splicing. It has an α-helical structure and appears to be important in connecting the processes of making and processing RNA. The function of this domain is particularly relevant in cancer, as SCAF1 is involved in alternative mRNA processing in aggressive ovarian cancers.
