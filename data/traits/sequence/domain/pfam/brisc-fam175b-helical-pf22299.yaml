identifier: Pfam:PF22299
label: BRISC complex subunit FAM175B, helical domain
definition: >-
  This domain is found in BRISC complex subunit FAM175B from Camponotus floridanus and similar proteins mainly found in arthropods. This protein is an homologue of human Abraxas 2 or KIAA0157, a component of the BRISC complex, a multiprotein complex that specifically cleaves 'Lys-63'-linked polyubiquitin, leaving the last ubiquitin chain attached to its substrates. This domain, which shows an α-helical configuration, is normally found C-terminal to .
