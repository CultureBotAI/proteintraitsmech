identifier: Pfam:PF21904
label: CAND6/7, N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in CAND6/7 from Arabidopsis and related sequences. These proteins have been predicted to be G-protein coupled receptors that play a role in plant and microbe interactions. They consist of two domains, a GOLD-like domain represented in this entry and a seven transmembrane domain, an architecture shared with GOST (GOLD seven-transmembrane helix) proteins. CAND7 has been described as a G-protein coupled receptor involved in root growth mediated by the bacterial quorum-sensing signals N-acyl-homoserine lactones (AHLs).
