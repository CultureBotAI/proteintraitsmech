identifier: Pfam:PF29058
label: Shell matrix-like N-terminal domain
definition: >-
  This entry represents a domain found in shell matrix proteins and related uncharacterised proteins from molluscs. The domain can occur as an N-terminal domain in shell matrix proteins or as multiple repeats in uncharacterised proteins. Shell matrix proteins are involved in biomineralisation processes and the formation of molluscan shells. The domain is found across various molluscan groups including bivalves, cephalopods and gastropods. The specific function of this domain remains to be determined.
