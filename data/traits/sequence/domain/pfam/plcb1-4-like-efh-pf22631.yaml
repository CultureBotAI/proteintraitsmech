identifier: Pfam:PF22631
label: Phosphoinositide phospholipase C beta1-4-like EF-hand domain
definition: >-
  This entry represents the first EF-hand domain found in 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase beta-1-4 (PLCB1-4) from human and related animal proteins. PLC-beta isoforms mediate the production of the second messenger molecules diacylglycerol (DAG) and inositol 1,4,5-trisphosphate (IP3) to propagate signals for several physiological responses.
