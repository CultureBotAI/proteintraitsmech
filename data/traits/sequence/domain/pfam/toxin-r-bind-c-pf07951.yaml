identifier: Pfam:PF07951
label: Clostridium neurotoxin, C-terminal receptor binding
definition: >-
  The Clostridium neurotoxin family is composed of tetanus neurotoxins and seven serotypes of botulinum neurotoxin. The structure of the botulinum neurotoxin reveals a four domain protein. The N-terminal catalytic domain ( ), the central translocation domains and two receptor-binding domains. This domain is the C-terminal receptor-binding domain, which adopts a modified β-trefoil fold with a six stranded β-barrel and a β-hairpin triplet capping the domain. The first step in the intoxication process is a binding event between this domain and the pre-synaptic nerve ending.
