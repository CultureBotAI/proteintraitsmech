identifier: Pfam:PF28918
label: ZC3H3 middle domain
definition: >-
  This entry represents a domain found in the middle region of ZC3H3 proteins. ZC3H3 is required for the export of polyadenylated mRNAs from the nucleus and is involved in the regulation of mRNA polyadenylation. The protein contains multiple domains including CCCH zinc finger domains. While ZC3H3 binds to polyadenylated mRNA and regulates nuclear export, the specific function of this domain remains to be determined. The protein is found in the nucleus and interacts with Pabp2, Sbr and Swm proteins.
