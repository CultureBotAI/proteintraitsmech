identifier: Pfam:PF18668
label: Tail spike TSP1/Gp66 receptor binding N-terminal domain
definition: >-
  Bacteriophages recognize and bind to their hosts with the help of receptor-binding proteins (RBPs) that emanate from the phage particle in the form of fibres or tailspikes. RBPs of podovirus G7C tailspikes gp63.1 and gp66 are essential for infection of its natural host bacterium E. coli 4s. Gp63.1 and gp66 form a stable complex, in which the N-terminal part of gp66 serves as an attachment site for gp63.1 and anchors the gp63.1-gp66 complex to the G7C tail. The two N-terminal domains show 70% sequence identity to the N-terminal region of the CBA120 phage tailspike 1 (orf210, TSP1). The N-terminal domain of TSP1 is the virion head binding domain that interfaces with the phage baseplate. The N-terminal domain can be further divided into two subdomains, each beginning with a α-helix followed by an anti-parallel β-sandwich. Subdomain two folds similarly to the chitin binding domain of Chitinase from Bacillus circulans.
