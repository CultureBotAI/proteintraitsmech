identifier: Pfam:PF22784
label: Swiss Army Knife protein, DSP-PTPase phosphatase domain
definition: >-
  The Swiss Army Knife class of proteins features a diverse domain repertoire acting to repair RNA damaged in the wake of RNase attacks. PTP-SAK is one such domain, a phosphatase of the rhodanese-phosphatase superfamily. It is predicted to 'clean' RNA ends by removing phosphate groups, preparing them for ligation by their associating RNA ligases.
