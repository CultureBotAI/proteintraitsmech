identifier: Pfam:PF26045
label: Halobacterial membrane associated OB-fold like protein
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. Proteins in this family are predicted to have two transmembrane α-helices: one at the N terminus and one at the C terminus. Within these helices resides a 5 stranded β-barrel resembling the OB fold.
