label: Uncharacterised protein family (UPF0227)
definition: >-
  Despite being classed as uncharacterised proteins, the members of this family are almost certainly enzymes in that contain a domain distantly related to . One of the members of this family YqiA has been shown to be a esterase. Other members, which include the Escherichia coli (strain K12) YcfP protein, are uncharacterised.
