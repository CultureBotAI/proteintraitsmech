identifier: Pfam:PF24006
label: SCAP N-terminal
definition: >-
  This entry represents a domain found at the N-terminal of SCAP (Sterol regulatory element-binding protein cleavage-activating protein) and similar animal proteins. This domain is the luminal domain of SCAP, which binds cholesterol. SCAP is a key player in the sterol regulatory element-binding protein (SREBP) pathway that controls the cellular homeostasis of sterol. It consists of a luminal domain, eight transmembrane segments from which TM2-TM6 corresponds to the SSD ( ) and a WD40 domain at the C-terminal.
