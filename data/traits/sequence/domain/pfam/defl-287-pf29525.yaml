identifier: Pfam:PF29525
label: Defensin 287
definition: >-
  This entry represents defensin 287 and similar proteins found in plants, particularly in Brassicaceae and Fabaceae. These proteins belong to the DEFL group and are secreted antimicrobial peptides involved in plant defence responses against fungi and other pathogens. The proteins contain characteristic cysteine residues that form disulfide bonds, although some members may lack one or more of the typical disulfide bonds. Arabidopsis contains over 300 defensin-like genes organised throughout the genome.
