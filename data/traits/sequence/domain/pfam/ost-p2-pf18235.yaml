identifier: Pfam:PF18235
label: Oligosaccharyltransferase Peripheral 2 domain
definition: >-
  This is a domain found in the C-terminal region of AGLB present in P. furiosus, oligosaccharyltransferase which catalyses the transfer of a heptasaccharide, containing one hexouronate and two pentose residues, onto peptides in an Asn-X-Thr/Ser-motif-dependent manner. This domain, known as the Peripheral 2 (P2) domain, encircles the central core domain.
