identifier: Pfam:PF21773
label: ODAD1 central coiled coil region
definition: >-
  This domain, previously know as DUF6872, is found in Outer dynein arm-docking complex subunit 1 (ODAD1, CCDC114) from humans and similar eukaryotic proteins. In mammals, ODAD1 forms a hetero-coiled coil with CCDC151 within the A07/A08 interprotofilament cleft, analogous to the DC1/2 coiled coil of the trimeric ODA-DC observed in C. reinhardtii axoneme. DC2 is a homologue of the human ODAD1 and in C. reinhardtii it is a part of the outer dynein arm docking complex (ODA-DC) that consists of three proteins: DC1, DC2, and DC3. The N-terminal halves of DC1 and DC2 form a microtubule-bound heteromeric coiled-coil.
