identifier: Pfam:PF02668
label: Taurine catabolism dioxygenase TauD, TfdA family
definition: >-
  This domain is found in TauD/TfdA taurine catabolism dioxygenases. The Escherichia coli tauD gene is required for the utilisation of taurine (2-aminoethanesulphonic acid) as a sulphur source and is expressed only under conditions of sulphate starvation. TauD is an alpha-ketoglutarate-dependent dioxygenase catalysing the oxygenolytic release of sulphite from taurine. The 2,4-dichlorophenoxyacetic acid/alpha-ketoglutarate dioxygenase from Burkholderia sp. (strain RASC) also belongs to this family. TfdA from Ralstonia eutropha (Alcaligenes eutrophus) is a 2,4-D monooxygenase. This domain is also found in gamma-butyrobetaine hydroxylase (GBBH), the enzyme responsible for the biosynthesis of L-carnitine, a key molecule of fatty acid metabolism. The GBBH monomer consists of this catalytic double-stranded β-helix (DBSH) domain, which is found in all 2-ketoglutarate (2KG) oxygenases, and a smaller N-terminal domain.
