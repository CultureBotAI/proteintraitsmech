identifier: Pfam:PF14850
label: DNA-binding domain of Proline dehydrogenase
definition: >-
  This entry represents domain II of PutA. It has been suggested that this domain may be involved in DNA binding. The PutA flavoprotein from Escherichia coli plays multiple roles in proline catabolism by functioning as a membrane-associated bi-functional enzyme and a transcriptional repressor of proline utilisation genes.
