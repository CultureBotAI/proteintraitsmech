identifier: Pfam:PF31085
label: PorX response regulator linker domain
definition: >-
  This entry represents a three-helix bundle linker domain of approximately 80 residues found in PorX response regulator proteins in Bacteroidota. This domain connects the N-terminal response regulator receiver domain ( ) to the C-terminal PglZ domain. The full-length PorX protein is a response regulator involved in the type IX secretion system (T9SS) and virulence factor secretion. The specific function of this linker domain remains to be determined.
