identifier: Pfam:PF30217
label: X92 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in X92 and related proteins from trypanosomatids. X92 is a protein that shares epitopes with the major structural protein of the paraflagellar rod and most likely represents a silent open reading frame in the Trypanosoma brucei genome.
