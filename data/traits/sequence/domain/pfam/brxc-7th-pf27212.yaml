identifier: Pfam:PF27212
label: BrxC seventh domain
definition: >-
  This entry represents the seventh domain of the BrxC protein from the BREX (bacteriophage exclusion) system from Bacillus cereus. This domain contains an α-helical fold, and it is next to the C-terminal domain. This entry is found in bacillota. BrxC is a P-loop-containing, probable ATPase associated with type 1 BREX (bacteriophage exclusion) systems, which provide immunity against bacteriophage infections by methylating specific DNA sites to distinguish self from non-self. Although phage adsorption is permitted, BREX systems block phage DNA replication. BrxC, a probable ATP-binding protein, operates within a six-protein complex (BrxA-BrxB-BrxC-PglX-PglZ-BrxL) that confers resistance to a range of bacteriophages.
