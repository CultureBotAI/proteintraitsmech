identifier: Pfam:PF22850
label: CATSPERD/E C-terminal domain
definition: >-
  This entry represents the C-terminal domain of delta and epsilon subunits, which covers the stem domain and the transmembrane helix, that are involved in the association with the channel domain. The CATSPER (cation channel of sperm) complex is a tetrameric complex consisting of CATSPER1, CATSPER2, CATSPER3 and CATSPER4, it functions as an alkalinisation-activated calcium channel. This complex is involved in sperm cell hyperactivation, a process needed for sperm motility, which is essential late in the preparation of sperm for fertilisation. This complex requires four auxiliary subunits (beta, gamma, delta and epsilon), which play a role in channel assembly. These are multidomain proteins which share a similar domain organisation.
