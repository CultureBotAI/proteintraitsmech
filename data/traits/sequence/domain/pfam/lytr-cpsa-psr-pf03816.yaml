label: LytR_cpsA_psr family
definition: >-
  This domain often appears at the C terminus of , in members of the LytR/CpsA/Psr regulatory protein family. Proteins containing this domain include lcpA from Corynebacterium glutamicum, Cell envelope integrity protein Cei and Vesiculogenesis and immune response regulator virR, both from Mycobacterium tuberculosis. IcpA is involved in cell wall biosynthesis. Cei and virR both contribute to cell envelope integrity.
