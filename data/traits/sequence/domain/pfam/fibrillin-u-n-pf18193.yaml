identifier: Pfam:PF18193
label: Fibrillin 1 unique N-terminal domain
definition: >-
  This is the N-terminal domain of human fibrillin-1. Fibrillin is a primary constituent of microfibrils in the extracellular matrix of many elastic and non-elastic connective tissues. This domain, known as the fibrillin unique N-terminal (FUN) domain, constitutes the minimal interaction site for the fibrillin C terminus. The FUN domain has homologues in the human proteins LTBP-1L/2 and VWCE, which are also associated with a C-terminal EGF-like domain.
