identifier: Pfam:PF23054
label: N4BP1, C-terminal UBA domain
definition: >-
  This domain is found in the N4BP1 family which includes NEDD4-binding protein 1, KHNYN and other related proteins. This domain has a significant sequence and structural similarity to known UBA domains. It was shown that in KHNYN, this domain is responsible for binding ubiquitin-like protein NEDD8 ( ). In N4BP1, this domain is required for binding to linear polyubiquitin ( ). N4BP1 is a potent suppressor of cytokine production that acts as a regulator of innate immune signalling and inflammation. It acts as a restriction factor against some viruses, such as HIV-1. N4BP1 restricts HIV-1 replication by binding to HIV-1 mRNAs and mediating their degradation via its ribonuclease activity.
