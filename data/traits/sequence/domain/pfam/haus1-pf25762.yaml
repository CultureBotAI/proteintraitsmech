identifier: Pfam:PF25762
label: HAUS augmin-like complex subunit 1
definition: >-
  Assembly of a robust microtubule-based mitotic spindle is essential for accurate segregation of chromosomes to progeny. Spindle assembly relies on the concerted action of centrosomes, spindle microtubules, molecular motors and non-motor spindle proteins. A number of novel regulators of spindle assembly have been identified: one of these is HAUS, an 8-subunit protein complex that shares similarity with Drosophila Augmin. Plants also have a augmin complex consisting of eight subunits. Subunits AUG1 to AUG6 can be aligned with the human HAUS1 to HAUS6 proteins. HAUS localises to interphase centrosomes and to mitotic spindle micro- tubules; its disruption induces microtubule-dependent fragmentation of centrosomes, and an increase in centrosome size. HAUS disruption results in the destabilisation of kinetochore microtubules and eventual formation of multipolar spindles. Such severe mitotic defects are alleviated by co-depletion of NuMA, indicating that both factors regulate opposing activities. HAUS disruption alters NuMA localisation, suggesting that mis-localised NuMA activity contributes to the observed spindle and centrosome defects. The Augmin complex (HAUS) is thus a critical, evolutionarily conserved multi-subunit protein complex that regulates centrosome and spindle integrity. The HAUS (Homologous to AUgmin Subunits) individual subunits have been designated HAUS1 to HAUS8. HAUS1 contains multiple coiled-coil domains that are essential for its interactions within the complex. The N-terminal forms a dumbbell-shaped structure with HAUS4 connected by a coiled-coil, while the C-terminal region contains three coiled-coils that interact with HAUS4 to form the heterodimer. HAUS1 forms a stable heterodimer with HAUS4 , with the two proteins forming part of the filamentous ta…
