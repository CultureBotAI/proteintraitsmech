identifier: Pfam:PF29072
label: WFDC11 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of WFDC11 (WAP four- disulfide core domain 11). WFDC11 is a secreted protein found in mammals and is particularly enriched in the epididymis. The protein is approximately 87 amino acids in length and contains a signal peptide for secretion. Although WFDC11 was initially identified in a region containing WAP proteins, it does not contain a classical WAP domain. WFDC11 shows predicted serine-type endopeptidase inhibitor activity and may be involved in innate immune response. The specific function of this N-terminal domain remains to be determined.
