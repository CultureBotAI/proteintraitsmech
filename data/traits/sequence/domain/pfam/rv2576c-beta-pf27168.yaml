identifier: Pfam:PF27168
label: Rv2576c beta-sandwich domain
definition: >-
  This entry represents a β-sandwich domain found in uncharacterised membrane proteins from Mycobacterium species, including Rv2576c from M. tuberculosis and orthologues in M. bovis. These proteins are predicted to be single-pass transmembrane proteins that may localise to the cell membrane, extracellular region, or peptidoglycan-based cell wall. The specific function of this β-sandwich domain is unknown.
