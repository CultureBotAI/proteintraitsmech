identifier: Pfam:PF29316
label: ECM19
definition: >-
  This entry represents the ECM19 protein, originally identified as an extracellular mutant protein in Saccharomyces cerevisiae. ECM19 is a single-pass transmembrane protein localised to the mitochondrial membrane. The protein may be involved in cell wall organisation and biogenesis. ECM19 was identified in large-scale screens for genes involved in cell surface biosynthesis and architecture, though its specific function remains unclear. Members are found in fungi, and represent small proteins that contain a transmembrane helix. The function of this protein remains to be determined.
