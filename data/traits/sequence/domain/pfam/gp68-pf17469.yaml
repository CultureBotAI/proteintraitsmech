identifier: Pfam:PF17469
label: Gp68-like predicted RNA polymerase component
definition: >-
  This is a family of unknown function found in Mycobacterium phages and related proteins from Caudoviricetes lineage. This is entry includes a protein that purifies with the non-virion RNA polymerase in group 1/PhiKZ-like phages. Structure predictions shows the protein contain a pair of β-strands and several short helical segments.
