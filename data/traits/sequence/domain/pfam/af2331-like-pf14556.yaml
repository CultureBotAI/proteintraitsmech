identifier: Pfam:PF14556
label: AF2331-like protein
definition: >-
  AF2331-like protein is a 11kDa orphan protein from Archaeoglobus fulgidus. The structure consists of an α + β fold formed by an unusual homodimer, where the two core β-sheets are interdigitated, containing strands alternating from both subunits. AF2331 contains multiple negatively charged surface clusters and is located on the same operon as the basic protein AF2330. It is suggested that AF2331 and AF2330 may form a charge-stabilised complex in vivo, though the role of the negatively charged surface clusters is not clear.
