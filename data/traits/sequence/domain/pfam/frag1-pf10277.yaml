identifier: Pfam:PF10277
label: Frag1/DRAM/Sfk1/Cwh43P N-terminal domain
definition: >-
  This entry represents a domain which is found N-terminal in Protein CWH43 from Saccharomyces cerevisiae. This domain is found standalone in Frag1, DRAM and Sfk1 proteins. Frag1 (FGF receptor activating protein 1, also known as post-GPI attachment to proteins factor 2) is a protein that is conserved from fungi to humans. There are four potential iso-prenylation sites throughout the peptide, CILW (x2), CIIW and CIGL. Frag1 is a membrane-spanning protein that is ubiquitously expressed in adult tissues suggesting an important cellular function. DRAM is a family of proteins conserved from nematodes to humans with six hydrophobic transmembrane regions and an endoplasmic reticulum signal peptide. It is a lysosomal protein that induces macro-autophagy as an effector of p53-mediated death, where p53 is the tumour-suppressor gene that is frequently mutated in cancer. Expression of DRAM is stress-induced. DRAM-3 (also known as modulator of macroautophagy TMEM150B) has been shown to be a modulator of both macroautophagy and cell survival under starvation conditions. This region is also part of a family of small plasma membrane proteins, referred to as Sfk1, that may act together with or upstream of Stt4p to generate normal levels of the essential phospholipid PI4P, thus allowing proper localisation of Stt4p to the actin cytoskeleton.
