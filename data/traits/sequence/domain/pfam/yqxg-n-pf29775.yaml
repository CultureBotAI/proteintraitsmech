identifier: Pfam:PF29775
label: Uncharacterised protein YqxG N-terminal domain
definition: >-
  This entry represents the N-terminal β sandwich domain of uncharacterised protein YqxG (also called YqdC) and phage-like element PBSX protein XepA (also called XkdY), found in Bacillus species. The full-length proteins contain a C-terminal XepA domain ( ). The crystal structure of XepA has been determined (PDB: 6I56). These proteins are part of prophage lytic cassettes.
