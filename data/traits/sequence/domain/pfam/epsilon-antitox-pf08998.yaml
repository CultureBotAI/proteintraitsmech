identifier: Pfam:PF08998
label: Bacterial epsilon antitoxin
definition: >-
  The epsilon antitoxin, produced by various prokaryotes, forms part of a post-segregational killing system, which is involved in the initiation of programmed cell death of plasmid-free cells. The protein is folded into a three-helix bundle directly interacting with the zeta toxin, inactivating it. PezA is the cognate antitoxin to the S. pneumoniae PezT toxin. PezA shares sequence similarity in the C-terminal region with the epsilon antitoxin. The PezA protein functions as a transcriptional repressor of the pezAT operon together with PezT, by binding a palindrome sequence that overlaps the promoter. This differs from the epsilon-zeta system in which epsilon functions solely as the antitoxin and transcriptional regulation is carried out by another protein designated omega.
