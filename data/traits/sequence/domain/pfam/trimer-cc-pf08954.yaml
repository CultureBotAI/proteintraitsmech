identifier: Pfam:PF08954
label: Trimerisation motif
definition: >-
  This domain is predominantly found in the structural protein coronin, and is duplicated in some sequences. It appears to have the function of stabilising the topology of short coiled-coils in proteins. Coronins are evoluntionarily conserved proteins, mainly involved in actin cytoskeleton organisation.
