identifier: Pfam:PF30366
label: YehQ four-helical bundle domain
definition: >-
  This entry represents a four-helical bundle domain found in YehQ-like proteins from bacteria, predominantly Actinomycetes and Pseudomonadota. This domain is located between the N-terminal SWIM-type zinc finger domains ( ) and the C-terminal OB-fold domain. The function of this domain remains to be determined.
