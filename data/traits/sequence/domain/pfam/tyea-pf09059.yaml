identifier: Pfam:PF09059
label: TyeA
definition: >-
  This domain is composed of two pairs of parallel α-helices, and interacts with the bacterial protein YopN via hydrophobic residues located on the helices. Association of TyeA with the C terminus of YopN is accompanied by conformational changes in both polypeptides that create order out of disorder: the resulting structure then serves as an impediment to type III secretion of YopN.
