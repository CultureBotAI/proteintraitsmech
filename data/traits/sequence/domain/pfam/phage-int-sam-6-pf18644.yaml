identifier: Pfam:PF18644
label: Phage integrase SAM-like domain
definition: >-
  Xer recombinases are members of the tyrosine site-specific recombinase superfamily, a large group of enzymes that catalyze DNA breakage and rejoining using a conserved tyrosine nucleophile. Tyrosine recombinases promote various programmed DNA rearrangements including the monomerization of phage, plasmid and chromosome multimers, resolution of hairpin telomeres, and the movement of virulence and antibiotic resistance carrying integrative mobile genetic elements. Structural analysis of Helicobacter pylori XerH indicates that this N-terminal domain consisting of six α-helices contacts the DNA using a four-helix bundle.
