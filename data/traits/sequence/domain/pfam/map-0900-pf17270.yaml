identifier: Pfam:PF17270
label: 34 kDa antigenic protein
definition: >-
  This entry (ex DUF5336) represents 34 kDa antigenic protein homolog (MAP_0900) proteins found in bacteria. The occurrence of well-defined hydrophobic and hydrophilic portions suggests that this protein could be located in the cell wall. Most of the family members are predicted to have have 4 trans-membrane regions.
