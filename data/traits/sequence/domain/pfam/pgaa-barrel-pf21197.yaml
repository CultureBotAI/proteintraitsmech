identifier: Pfam:PF21197
label: PgaA membrane beta barrel domain
definition: >-
  The partially de-N-acetylated poly-beta-1,6-N-acetyl-d-glucosamine (dPNAG) polymer serves as an intercellular biofilm adhesin that plays an essential role for the development and maintenance of integrity of biofilms of diverse bacterial species. Translocation of dPNAG across the bacterial outer membrane is mediated by a tetratricopeptide repeat-containing outer membrane protein, PgaA. This entry represents the PgaA membrane β-barrel domain.
