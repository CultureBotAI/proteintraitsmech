identifier: Pfam:PF23755
label: IP5P C-F Ig-like domain
definition: >-
  This entry represents the immunoglobulin-like domain found in plant inositol polyphosphate 5-phosphatases Type I IP5P12/IP5PC and IP5P13/IP5PD and Type II IP5P14/IP5PE and IP5PF/IP5PF from Arabidopsis thaliana. The function of this domain is unknown. IP5Ps have different functions, including the degradation of phosphoinositides in the signalling pathways of various cellular processes such as Ca2+ release, abscisic acid signalling and vesicle trafficking, among others.
