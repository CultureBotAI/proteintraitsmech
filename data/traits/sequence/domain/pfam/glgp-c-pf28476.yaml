identifier: Pfam:PF28476
label: Glycogen phosphorylase C-terminal domain
definition: >-
  This entry represents the C-terminal domain of bacterial glycogen phosphorylase (GlgP) and maltodextrin phosphorylase (PHSG), which adopts an immunoglobulin-like fold. Glycogen phosphorylase catalyses the phosphorolytic cleavage of alpha-1,4-glycosidic bonds in glycogen to release glucose 1-phosphate, playing a central role in glycogen metabolism. Maltodextrin phosphorylase catalyses the phospholytic cleavage of maltodextrins with a minimal chain length of five glucose residues to yield glucose-1-phosphate. This protein contains an N-terminal DUF3417 domain ( ), a central phosphorylase catalytic domain ( ), and this C-terminal Ig-fold domain.
