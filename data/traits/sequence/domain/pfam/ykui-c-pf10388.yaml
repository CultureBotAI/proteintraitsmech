identifier: Pfam:PF10388
label: EAL-domain associated signalling protein domain
definition: >-
  In most cases this highly conserved region of the YkuI protein lies immediately downstream of the EAL (diguanylate cyclase/phosphodiesterase) domain so that together they form a monomer which dimerises for its enzymatic action. This region contains three α helices and five β strands and forms C-terminal half of the structure.
