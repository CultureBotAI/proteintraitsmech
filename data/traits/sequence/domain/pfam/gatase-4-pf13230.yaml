identifier: Pfam:PF13230
label: Glutamine amidotransferases class-II
definition: >-
  This entry represents a group of glutamine amidotransferase domain containing proteins, including EgtC and DUG3. DUG3, is a component of the GSH degradosomal complex involved in the degradation of glutathione (GSH) and other peptides containing a gamma-glu-X bond. In Mycolicibacterium, EgtC catalyzes the hydrolysis of the gamma-glutamyl amide bond of hercynyl-gamma-L-glutamyl-L-cysteine sulfoxide to produce hercynylcysteine sulfoxide, a step in the biosynthesis pathway of ergothioneine.
