identifier: Pfam:PF28825
label: CD19 transmembrane domain
definition: >-
  This entry represents the transmembrane domain of CD19, a B-lymphocyte surface antigen found in mammals. CD19 functions as a coreceptor for the B-cell antigen receptor complex (BCR) on B-lymphocytes, decreasing the threshold for activation of downstream signalling pathways and for triggering B-cell responses to antigens. The full-length CD19 protein is a single-pass type I membrane protein that contains extracellular immunoglobulin-like domains and a cytoplasmic domain containing multiple tyrosine phosphorylation sites. The specific function of this transmembrane domain within the CD19 protein remains to be determined.
