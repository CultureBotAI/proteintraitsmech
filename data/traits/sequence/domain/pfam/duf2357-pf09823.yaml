identifier: Pfam:PF09823
label: Domain of unknown function (DUF2357)
definition: >-
  This entry represents a C-terminal domain of approximately 130 residues. The domain is found C-terminal to DUF2357 ( ) and PDDEXK_7 ( ) domains in proteins annotated as restriction endonucleases, including 5-methylcytosine-specific restriction enzymes. This family is found in bacteria (predominantly Bacillota) and archaea (Methanobacteriota). The function of this domain remains to be determined.
