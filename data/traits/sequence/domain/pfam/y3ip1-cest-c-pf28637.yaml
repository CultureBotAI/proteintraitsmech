identifier: Pfam:PF28637
label: Y3IP1/CEST C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Y3IP1/CEST proteins found in plants. This domain contains a single transmembrane helix that anchors these proteins to the chloroplast thylakoid membrane. The full-length Y3IP1/CEST proteins are involved in photosystem I assembly and stress tolerance responses. Y3IP1 cooperates with the plastid-encoded Ycf3 protein in assembling stable photosystem I units, whilst CEST enhances tolerance to multiple environmental stresses and reduces photooxidative damage. The specific function of this domain remains to be determined.
