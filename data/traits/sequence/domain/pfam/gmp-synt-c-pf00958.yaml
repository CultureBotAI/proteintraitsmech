identifier: Pfam:PF00958
label: GMP synthase C terminal domain
definition: >-
  This entry represents the C-terminal domain of bacterial GMP synthase [glutamine-hydrolyzing] sequences and similar proteins found in all cellular organisms. The amidotransferase family of enzymes utilises the ammonia derived from the hydrolysis of glutamine for a subsequent chemical reaction catalyzed by the same enzyme. The ammonia intermediate does not dissociate into solution during the chemical transformations. GMP synthetase is a glutamine amidotransferase from the de novo purine biosynthetic pathway. The C-terminal domain is specific to the GMP synthases . In prokaryotes this domain mediates dimerisation. Eukaryotic GMP synthases are monomers. This domain in eukaryotes includes several large insertions that may form globular domains.
