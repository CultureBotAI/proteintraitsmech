label: Domain of unknown function (DUF8506)
definition: >-
  Ths domain is found in uncharacterised proteins from Gram-negative bacteria. It is found either standalone or in combination with other domains. It is predicted to fold into a very simple structure composed of a beta-hairpin flanked by two helices.
