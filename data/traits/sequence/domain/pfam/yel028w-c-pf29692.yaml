label: YEL028W C-terminal domain
definition: >-
  This entry represents a group of uncharacterised proteins from the Saccharomycetaceae, including YEL028W from Saccharomyces cerevisiae. These proteins are predicted to be secreted, as they contain an N-terminal signal peptide. The function of this family remains to be determined.
