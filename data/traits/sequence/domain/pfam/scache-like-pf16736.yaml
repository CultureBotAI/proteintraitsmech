identifier: Pfam:PF16736
label: 'Single Cache-like '
definition: >-
  This entry represents the N-terminal Cache-like domain of the alkaline phosphatase synthesis sensor protein PhoR. It covers part of the PAS-like fold that share a central five-stranded β-sheet of identical topology to other PAS domains. Cache is an extracellular domain that is predicted to have a role in small-molecule recognition in a wide range of proteins, including the animal dihydropyridine-sensitive voltage-gated Ca2 channel alpha-2delta subunit, and various bacterial chemotaxis receptors. The name Cache comes from CAlcium channels and CHEmotaxis receptors.
