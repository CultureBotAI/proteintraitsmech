identifier: Pfam:PF21375
label: Protection of telomeres protein 1 (POT1), C-terminal insertion domain
definition: >-
  Protection of telomeres protein 1 (POT1) is responsible for binding to and protecting the 3' single-stranded DNA (ssDNA) overhang at most eukaryotic telomeres. This entry represents an insertion domain found at the C-terminal of POT1 and similar sequences from vertebrates. It is described as Holliday junction resolvase-like domain (HJRL) in.
