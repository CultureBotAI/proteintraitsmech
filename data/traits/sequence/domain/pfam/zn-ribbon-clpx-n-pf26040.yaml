identifier: Pfam:PF26040
label: CLPX-like, zinc ribbon domain
definition: >-
  This zinc ribbon domain is found towards the N-terminal of human mitochondrial ATP-dependent clpX-like chaperone (CLPX) and similar proteins in animals. The mitochondrial ATP-dependent clpX-like chaperone (CLPX) functions as an unfoldase. This protein is part of the ClpXP protease complex and is also involved in heme biosynthesis and in the control of mtDNA nucleoid distribution.
