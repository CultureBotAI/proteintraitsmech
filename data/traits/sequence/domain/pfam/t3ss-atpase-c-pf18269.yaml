identifier: Pfam:PF18269
label: T3SS EscN ATPase C-terminal domain
definition: >-
  This is the C-terminal domain of the EscN protein family of ATPases that form part of the Type III secretion system (T3SS) present in Escherichia coli. T3SS is a macromolecular complex that creates a syringe-like apparatus extending from the bacterial cytosol across three membranes to the eukaryotic cytosol. This process is essential for pathogenicity. EscN is a functionally unique ATPase that provides an inner-membrane recognition gate for the T3SS chaperone-virulence effector complexes as well as a potential source of energy for their subsequent secretion. The C-terminal domain of T3SS ATPases mediates binding with multiple contact points along the chaperone.
