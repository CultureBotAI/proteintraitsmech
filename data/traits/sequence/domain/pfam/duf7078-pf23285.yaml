label: Domain of unknown function (DUF7078)
definition: >-
  This domain is found in uncharacterised proteins mainly from fungi. This domain is predicted to adopt a globular structure consisting of a four helical bundle and having structural similarity to the α-helical domain inserted in the third Ig domain of the Trs130 component of the TRAPPII complex.
