identifier: Pfam:PF26658
label: MADD penultimate PH-like domain
definition: >-
  This entry represents the penultimate C-terminal pleckstrin homology (PH)-like domain found in animal MAP kinase-activating death domain (MADD) proteins. Although towards the C terminus of these proteins it is found towards the N terminus of . MADD proteins function as adaptor proteins in cell death and MAP kinase signalling pathways.
