identifier: Pfam:PF19192
label: Response receiver domain
definition: >-
  Two-component systems (TCS) are widespread signal sensing and transduction machineries found mainly in bacteria and archaea, but can be also found in yeasts and plants. They comprise a homodimeric histidine kinase (HK) bound to the membrane that contains an extracellular sensor domain, and a response regulator (RR) that triggers the response modifying target genes expression. The signal transduction implies the ATP-dependent phosphorylation of a His residue present in the dimerisation and histidine phosphotransfer HK domain (DHp). The C-terminal catalytic domain (CA, also known as HATPase_c) binds ATP and phosphorylates the His residue. Then, the phosphoryl group in the His is transferred to an Asp present in a RR domain called the receiver domain (REC), which induces conformational changes of RR and modulates the affinity of an effector domain. In cases which lack an effector domain, the REC domain takes over that role. This entry represents the receiver domain (REC) that, together with Histidine kinase (HK), constitutes the TCS system.
