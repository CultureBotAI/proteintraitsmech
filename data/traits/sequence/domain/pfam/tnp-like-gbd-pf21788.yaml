identifier: Pfam:PF21788
label: TNP-like, GTP-binding insertion domain
definition: >-
  This entry represents a GTP-binding insertion domain (GBD) from Transposable element P transposase from Drosophila melanogaster (TNP) and its human homologue, DNA transposase THAP9. This domain is inserted in the RNaseH domain and adopts a mostly α-helical fold, similar to that in Hermes, Tn5 or RAG1 proteins. This domain is involved in protein-DNA interactions. TNP specifically mediates transposition of P-elements, being involved in both precise and imprecise excision. It has unique features such as the requirement for a guanosine triphosphate cofactor and the generation of long staggered DNA breaks during transposition. TNP structure revealed that it consists of several domains: THAP at the N-terminal, followed by a dimerisation domain, a HTH domain, the catalytic RNase H domain is interrupted by a GTP-binding insertion domain (GBD) and a C-terminal one. The HTH, GBD and C-terminal domains are involved in protein-DNA interactions. THAP9 specifically recognises the bipartite 5'-TXXGGGX(A/T)-3' consensus motif and mediates transposition.
