identifier: Pfam:PF18362
label: Tri-helix bundle domain
definition: >-
  This domain can be found in the myosin-binding motif (m-domain) region present in myosin-binding protein C (MyBP-C). MyBP-C is a sarcomeric assembly protein necessary for the regulation of sarcomere structure and function. The MyBP-C family of proteins consists mainly of modules with immunoglobulin (Ig) or fibronectin folds. This domain exhibits a three-helix bundle fold and there is a known actin-binding motif, LK(R/K)XK positioned in the third helix (alpha3), similar to that found in villin and related proteins.
