identifier: Pfam:PF21782
label: PKMT, C-terminal winged helix domain
definition: >-
  This entry represents the C-terminal winged helix domain of predicted PKMTs including Uncharacterized protein RP789 and Uncharacterized protein RP027. PKMTs are protein-lysine methyltransferases that catalyse the methylation of lysine residues on many different proteins. They consist of N-terminal S-adenosylmethionine binding domain , a middle domain and a C-terminal domain. The middle and the C-terminal domain share significant structural similarity and are both distantly related to HTH winged helix DNA-binding domains. In RP027 this domain is found by itself.
