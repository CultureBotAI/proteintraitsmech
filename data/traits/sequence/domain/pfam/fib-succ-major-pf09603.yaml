identifier: Pfam:PF09603
label: Fibrobacter succinogenes major domain (Fib_succ_major)
definition: >-
  This domain of about 175 to 200 amino acids is found, in from one to five copies, in over 50 proteins in Fibrobacter succinogenes, an obligate anaerobe of the rumen. Many members of this family have an apparent lipoprotein signal sequence. Conserved cysteine residues, suggestive of disulphide bond formation, are also consistent with an extracytoplasmic location for this domain. This domain can also be found in small numbers of proteins in Bacteroides thetaiotaomicron.
