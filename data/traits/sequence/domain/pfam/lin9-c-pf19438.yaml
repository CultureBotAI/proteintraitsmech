identifier: Pfam:PF19438
label: LIN9 C-terminal
definition: >-
  MuvB transcriptional regulatory complex interacts with B-Myb to form the MMB complex during S-phase of the cell cycle to activate genes required for the G2 and M phases. This is a domain found at the C terminus of LIN9, one of the core members of the MuvB complex that functions as a scaffold protein and forms a subcomplex with the C terminus of LIN152. This subcomplex forms a binding interface that recruits B-Myb to the MuvB complex which is arranged as a three-stranded antiparallel coiled-coil as the core of the structure. LIN9 contributes two helices (α1 and α2) that run antiparallel and are connected through a short linker.
