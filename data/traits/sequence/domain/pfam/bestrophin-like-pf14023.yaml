identifier: Pfam:PF14023
label: Bestrophin-like domain
definition: >-
  This family of proteins is functionally uncharacterised. It is distantly related to bestrophin proteins. Structure prediction suggests that these proteins can form homopentamers as Bestrophin proteins do. These proteins may function as chloride channels. This domain is sometimes found at the C terminus in large RHS proteins suggesting that it may function as a toxin.
