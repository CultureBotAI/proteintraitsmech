identifier: Pfam:PF13611
label: Serine peptidase of plant viral polyprotein, P1
definition: >-
  This entry represents the serine peptidase at the N terminus of P1 protein of the Potyviridae polyproteins. The catalytic triad in P1 from the ssRNA positive-strand Brome streak mosaic rymovirus, is His-311, Asp-322 and Ser-355.
