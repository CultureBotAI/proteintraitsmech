label: Sulfocyanin, N-terminal
definition: >-
  This entry represents an α-helix found at the N-terminal of Sulfocyanin from Sulfolobus acidocaldarius (SoxE) and similar archaeal sequences. SoxE is a blue copper protein involved in in electron transfer reactions.
