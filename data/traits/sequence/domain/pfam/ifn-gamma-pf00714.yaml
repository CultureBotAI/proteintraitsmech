identifier: Pfam:PF00714
label: Interferon gamma
definition: >-
  This entry represents the type II interferon also known as interferon gamma. Interferon gamma (IFN-gamma) is produced by lymphocytes activated by specific antigens or mitogens. IFN-gamma shows antiviral activity and has important immunoregulatory functions. It is a potent activator of microphages and had antiproliferative effects on transformed cells. It can potentiate the antiviral and antitumor effects of the type I interferons. The crystal structures of a number IFN-gamma proteins have been solved, including bovine interferon-gamma at 2.0-A and human IFN-gamma at 2.9-A. Tetrapods possess only a single copy of type II IFN gene, called IFN-gamma, which is mainly involved in immune regulation. In general, teleost fish are reported to have the composition of two type II IFN genes, including IFN-gamma and IFN-gamma-related (IFN-gammarel), except that two IFN-gamma genes were identified in channel catfish (named as IFN-gamma2a and IFN-gamma2b) and in ginbuna crucian carp (IFN-gamma1 and IFN-gamma2), and two IFN-gammarel genes were also reported in ginbuna crucian carp (IFN-gammarel1 and IFN-gammarel2). Three members of type II IFN family, named as IFN-gamma-like, IFN-gamma and IFN-gammarel, were identified in the osteoglossiform fish, arapaima. IFN-gamma does possess some antiviral activity but is mainly an immunomodulatory cytokine acting on leukocytes. Interferons are proteins which produce antiviral and antiproliferative responses in cells. The interferons (IFNs) are a subset of class II α-helical cytokines that have a variety of functions, most notably conferring a viral-resistant state to receptive cells. They play a major role in orchestrating the innate immune response toward viruses in vertebrates, and their defining characteristic is their ability to induce an an…
