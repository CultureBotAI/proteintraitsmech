identifier: Pfam:PF27264
label: YdhW C-terminal domain
definition: >-
  This entry represents the a domain that is found repeated in the YdhW protein from Escherichia coli, a protein that is part of the ydhYVWXUT operon (locus b1672). In some members this domain is found only once, at the C-terminal. The expression of YdhW is up-regulated by the oxygen-responsive transcription factor FNR under anaerobic conditions and repressed in the presence of nitrate or nitrite via the NarXL and NarPQ two-component systems. This protein shows regulated expression under anaerobic conditions.
