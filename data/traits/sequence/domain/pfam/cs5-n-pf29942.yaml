identifier: Pfam:PF29942
label: CS5 fimbrial protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of a fimbrial protein from the CS5 operon, a colonization factor found in enterotoxigenic Escherichia coli (ETEC) on plasmids. The mature protein is approximately 208 amino acids following cleavage of an N-terminal signal peptide. The protein contains two distinct structural domains. The specific function of this N-terminal region remains to be determined.
