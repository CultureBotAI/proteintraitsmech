identifier: Pfam:PF18159
label: SMODS-associating 4TM effector domain
definition: >-
  This entry represents a family of prokaryotic proteins, including the probable CBASS effector molecule IK1_05631 ( ) from Bacillus cereus. CBASS (cyclic oligonucleotide-based antiphage signaling system) provides immunity against bacteriophages. Some members of this group are predicted pore-forming effectors found in conserved genome contexts with diverse nucleotide synthetases including the SMODS (Second Messenger Oligonucleotide or Dinucleotide Synthetases).
