identifier: Pfam:PF21634
label: Helicase MOV-10, beta-barrel domain
definition: >-
  Helicase MOV-10 is a 5'-3' RNA helicase required for RNA-mediated gene silencing by the RNA-induced silencing complex (RISC) [1-3]. It is involved in mRNA metabolism and translation, modulation of viral infectivity, inhibition of retrotransposition and regulation of synaptic transmission. It interacts with FMRP1 and regulates miRNA-mediated translational repression by AGO2. This entry represents a presumed domain found in MOV-10 and similar sequences from animals, plants and fungi, which, according to structure predictions, it seems to form a β-barrel, closely related to the OB fold. This domain is found prior to the helicase domain.
