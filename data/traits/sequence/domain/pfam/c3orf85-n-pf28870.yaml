identifier: Pfam:PF28870
label: C3orf85_N
definition: >-
  This entry represents human Uncharacterized protein C3orf85 and related vertebrate homologues. C3orf85 is expressed in various tissues including intestine, kidney, and liver. Family members are typically small proteins of around 90 amino acids. The specific function of this family remains to be determined.
