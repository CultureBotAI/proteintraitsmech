identifier: Pfam:PF08829
label: Alpha C protein N terminal
definition: >-
  The alpha C protein (ACP) is found in Streptococcus and acts as an invasin which plays a role in the internalisation and translocation of the organism across human epithelial surfaces. Group B Streptococcus is the leading cause of diseases including bacterial pneumonia, sepsis and meningitis. The N-terminal of ACP is associated with virulence and forms a β sandwich and a three helix bundle.
