identifier: Pfam:PF30503
label: NDH complex assembly factor CRR9
definition: >-
  This entry represents CHLORORESPIRATORY REDUCTION 9 (CRR9), a stromal protein required for the assembly of the chloroplast NADH dehydrogenase-like (NDH) complex. In Arabidopsis thaliana, CRR9 ( ) is specifically required for the formation of NDH subcomplex A, which corresponds to the Q module of respiratory Complex I. CRR9 facilitates the accumulation of the NdhK subunit in NDH assembly intermediates in the stroma and the incorporation of NdhM into the assembly intermediate complex. The chloroplast NDH complex mediates cyclic electron transport around photosystem I in the thylakoid membrane. The family is conserved in cyanobacteria and land plants but absent from green algae, which lack chloroplast NDH.
