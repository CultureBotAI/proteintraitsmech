identifier: Pfam:PF09052
label: SipA N-terminal domain
definition: >-
  This entry represents the N-terminal domain of SipA. Salmonella invasion protein A (SipA) is a virulence factor that is translocated into host cells by a type III secretion system. In the host cell it binds to actin, stimulates actin polymerisation and counteracts F-actin destabilising proteins. This contributes towards cytoskeletal rearrangements that allow the entry of the pathogen into the host cell.
