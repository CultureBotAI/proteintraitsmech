identifier: Pfam:PF00241
label: Cofilin/tropomyosin-type actin-binding protein
definition: >-
  The actin-depolymerising factor homology (ADF-H) domain is an ~150-amino acid motif that is present in three phylogenetically distinct classes of eukaryotic actin-binding proteins: ADF/cofilins, which include ADF, cofilin, destrin, actophorin, coactosin, depactin and glia maturation factors (GMFs) beta and gamma. ADF/cofilins are small actin-binding proteins composed of a single ADF-H domain. They bind both actin-monomers and filaments and promote rapid filament turnover in cells by depolymerising/fragmenting actin filaments. ADF/cofilins bind ADP-actin with higher affinity than ATP-actin and inhibit the spontaneous nucleotide exchange on actin monomers Twinfilins, which are actin monomer-binding proteins that are composed of two ADF-H domains Abp1/Drebrins, which are relatively large proteins composed of an N-terminal ADF-H domain followed by a variable region and a C-terminal SH3 domain. Abp1/Drebrins interact only with actin filaments and do not promote filament depolymerisation or fragmentation Although these proteins are biochemically distinct and play different roles in actin dynamics, they all appear to use the ADF-H domain for their interactions with actin. The ADF-H domain consists of a six-stranded mixed β-sheet in which the four central strands (β2-β5) are antiparallel and the two edge strands (β1 and β6) run parallel with the neighbouring strands. The sheet is surrounded by two α-helices on each side.
