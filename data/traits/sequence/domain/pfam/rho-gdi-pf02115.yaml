identifier: Pfam:PF02115
label: RHO protein GDP dissociation inhibitor
definition: >-
  The GDP dissociation inhibitor for rho proteins, rho GDI, regulates GDP/GTP exchange by inhibiting the dissociation of GDP from them. The protein contains 204 amino acids, with a calculated Mr value of 23,421. Hydropathy analysis shows it to be largely hydrophilic, with a single hydrophobic region. The protein plays an important role in the activation of the superoxide (O2-)-generating NADPH oxidase of phagocytes. This process requires the interaction of membrane-associated cytochrome b559 with 3 cytosolic components: p47-phox, p67-phox and a heterodimer of the small G-protein p21rac1 and rho GDI. The association of p21rac and GDI inhibits dissociation of GDP from p21rac, thereby maintaining it in an inactive form. The proteins are attached via a lipid tail on p21rac that binds to the hydrophobic region of GDI. Dissociation of these proteins might be mediated by the release of lipids (e.g., arachidonate and phosphatidate) from membranes through the action of phospholipases. The lipids may then compete with the lipid tail on p21rac for the hydrophobic pocket on GDI. Two homologues of rho GDP-dissociation inhibitors have been identified in Dicytostelium: GDI1 and GDI2. They are cytosolic proteins. GDI1 has been found to play a central role in cytokinesis through the regulation of Rho family GTPases Rac1s and/or RacE. Rho GDI in yeast has been shown to have similar properties as mammalian rho GDI.
