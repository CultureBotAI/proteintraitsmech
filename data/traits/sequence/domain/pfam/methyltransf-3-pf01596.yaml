identifier: Pfam:PF01596
label: O-methyltransferase
definition: >-
  Members of this family are O-methyltransferases, including catechol O-methyltransferase, caffeoyl-CoA O-methyltransferase and norbelladine 4'-O-methyltransferase. The family includes also bacterial O-methyltransferases that may be involved in antibiotic production.
