identifier: Pfam:PF15571
label: Immunity protein 44
definition: >-
  This entry represents a predicted immunity protein with an α+β fold. These proteins are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-URI1, Tox-URI2 or Tox-ParBL1 families. The gene for this toxin is also found in heterogeneous polyimmunity loci that show variations in structure even between closely related strains.
