identifier: Pfam:PF07528
label: DZF N-terminal domain
definition: >-
  This entry represents the N-terminal mixed α/β region of the DZF domain, which contains a central anti-parallel β-sheet. It is usually found in combination with . Members of this entry are found exclusively in metazoa. The DZF domain (domain associated with zinc fingers) is a dimerisation domain found in: Interleukin enhancer-binding factor 3 (also known as Nuclear factor of activated T-cells 90 kDa, NF90, DRBP76 or NFAR), contains two double-stranded RNA-binding motifs (dsRBMs) and interacts with highly structured RNAs as well as the dsRNA-activated protein kinase (PKR). Interleukin enhancer-binding factor 2 (also known as NF45), which appears to function predominantly as a heterodimeric complex with NF90. Spermatid perinuclear RNA-binding protein (SPNR, also known as STRBP), a testes specific paralogue of NF90. Zinc finger RNA-binding protein (Zfr). Nuclear factors NF90 and NF45 form a protein complex involved in a variety of cellular processes and are thought to affect gene expression both at the transcriptional and translational level. In addition, this complex affects the replication of several viruses through direct interactions with viral RNA. NF90 and NF45 dimerise through their common DZF domain. The DZF domain shows structural similarity to the template-free nucleotidyltransferase family of RNA modifying enzymes. However, the lack of conserved catalytic residues suggests that the DZF domain encodes a 'pseudotransferase' that is no longer able to catalyse transfer of nucleotides. The DZF dimerisation domain form an oblong structure with a flat face on one side and a curved face on the other. The DZF domain is bipartite and characterised by an N-terminal mixed α/β region that contains a central anti-parallel β-sheet and a C-terminal α-helical region. The overal…
