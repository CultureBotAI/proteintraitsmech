identifier: Pfam:PF06825
label: Heat shock factor binding protein 1
definition: >-
  Heat shock factor binding protein 1 (HSBP1) interacts with the oligomerization domain of heat shock factor 1 (Hsf1), suppressing Hsf1's transcriptional activity following stress. It plays an essential role during early mouse and zebrafish embryonic development. In the plant Arabidopsis, heat shock factor-binding protein (HSBP) is required for acquired thermotolerance but not basal thermotolerance and for seed development.
