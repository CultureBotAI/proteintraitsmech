identifier: Pfam:PF21435
label: Shigella glutamine deamidase OspI
definition: >-
  This entry represents a protein family that includes OspI ( ), a Shigella flexneri effector encoded by ORF169b that suppresses the TNF-receptor-associated factor 6 (TRAF6)-mediated signalling pathway and inhibits acute inflammatory responses in the initial stage of infection. This is a glutamine deamidase essential for the deamidation of UBC13.
