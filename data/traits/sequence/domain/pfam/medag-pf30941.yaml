identifier: Pfam:PF30941
label: Mesenteric estrogen-dependent adipogenesis protein
definition: >-
  This entry represents a globular domain found in the MEDA-4 (mesenteric estrogen-dependent adipogenesis) protein family found in metazoans, primarily vertebrates. MEDA-4 is involved in processes that promote adipocyte differentiation, lipid accumulation, and glucose uptake in mature adipocytes. The protein localises to the cytoplasm and is highly expressed in visceral fat and white adipose tissue. Expression is down-regulated by oestrogen treatment.
