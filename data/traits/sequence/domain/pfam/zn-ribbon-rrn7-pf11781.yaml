identifier: Pfam:PF11781
label: Zinc-finger of RNA-polymerase I-specific TFIIB, Rrn7
definition: >-
  This entry represents the zinc-finger found in the N terminus of the Rrn7 protein. Rrn7 is a transcription binding factor that associates strongly with both Rrn6 and Rrn11 to form a complex which itself binds the TATA-binding protein and is required for transcription by the core domain of the RNA PolI promoter.
