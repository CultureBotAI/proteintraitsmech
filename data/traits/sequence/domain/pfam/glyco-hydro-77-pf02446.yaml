identifier: Pfam:PF02446
label: 4-alpha-glucanotransferase
definition: >-
  4-alpha-glucanotransferases ( ) belong to the glycoside hydrolase family 77 . They transfer a segment of a (1,4)-alpha-D-glucan to a new 4-position in an acceptor, which may be glucose or (1,4)-alpha-D-glucan. 4-alpha-glucanotransferases from prokaryotes are known as amylomaltases and those from plants, including algae, are known as disproportionating enzymes (DPE). Both belong to the disproportionating family.
