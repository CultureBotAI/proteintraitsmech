identifier: Pfam:PF30070
label: YKR011C middle domain
definition: >-
  This entry represents a middle domain of the uncharacterised protein YKR011C found in Saccharomycetales. The protein is expressed at moderate levels in yeast cells during log phase growth. The function of this domain remains to be determined. This domain contains an helical fold.
