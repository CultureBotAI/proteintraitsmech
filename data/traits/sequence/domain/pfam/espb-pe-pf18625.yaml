identifier: Pfam:PF18625
label: ESX-1 secreted protein B PE domain
definition: >-
  The ESX-1 secretion system is an important for virulence and immunogenicity in Mycobacterium tuberculosis. ESX-1 secreted protein B (EspB) is a member of the PE/PPE family, being the only one described to date to form higher-order oligomers. It contains PE (Pro-Glu) and PPE (Pro-Pro-Glu) domains, and a C-terminal domain, which is processed by MycP1 protease during secretion. Once secreted across the inner mycobacterial membrane, EspB oligomerizes into a cylinder-like heptamer through its N-terminal domain that form channel-like structures, enabling other ESX-1 secreted substrates to pass through and beyond the inner mycobacterial envelope. This domain represents the PE domain located at the N-terminal region of EspB which carries the conserved YxxxD/E secretion motif.
