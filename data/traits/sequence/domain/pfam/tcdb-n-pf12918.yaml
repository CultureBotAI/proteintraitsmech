identifier: Pfam:PF12918
label: TcdB toxin N-terminal helical domain
definition: >-
  Toxins A (TcdA) and B (TcdB) of Clostridium difficile belong to the family of clostridial glucosylating toxins. These toxins glucosylate small GTPases of Rho and Ras families, inhibiting the signalling and regulatory functions of these switch proteins. After receptor-binding, the toxins are endocytosed to reach acidic endosomal compartments from where the toxins are translocated into the cytosol. This entry represents a short helical bundle domain found associated with the catalytic domain of TcdA and TcdB. It is also found in some other toxins. The function of this domain is unknown, but it may be involved in substrate recognition.
