identifier: Pfam:PF23015
label: Zinc finger found in WIZ protein
definition: >-
  This entry represents a C2H2 type zinc finger found at the C-terminal end of human Protein Wiz and similar sequences from vertebrates. Wiz interacts with the a SET-domain histone methyltransferases G9a and GLP independently and plays a major role in G9a/GLP heterodimer formation and stabilisation. This domain is also found in Zinc finger protein 644 (ZNF644). Similarly to Wiz, ZNF644 is a core subunit of the G9a/GLP complex. Both proteins contain multiple zinc finger motifs that recognise consensus DNA sequences, target G9a and GLP to the chromatin and mediate the G9a/GLP complex-dependent H3K9 methylation as well as gene repression.
