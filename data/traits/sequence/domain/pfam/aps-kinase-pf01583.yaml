identifier: Pfam:PF01583
label: Adenylylsulphate kinase
definition: >-
  This entry represents the APS kinase domain which is found, either standalone or in combination with other domains, in proteins with diverse enzymatic functions. The APS kinase domain is a critical part of the bifunctional enzyme PAPS synthase (PAPSS), which catalyses the formation of 3'-phosphoadenosine 5'-phosphosulfate (PAPS), an essential universal sulfate donor in cells. This domain phosphorylates adenosine 5'-phosphosulfate (APS) which is produced by the ATP sulfurylase domain, and this occurs at the 3'-OH position using another ATP molecule to produce PAPS. In cyanobacteria, for example, the APS kinase domain exists on its own and similarly is required for the production of 3'-phosphoadenosine 5'-phosphosulfate (PAPS) as a sulfur donor in specialised metabolism.
