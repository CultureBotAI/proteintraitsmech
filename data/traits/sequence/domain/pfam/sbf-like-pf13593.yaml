identifier: Pfam:PF13593
label: SBF-like CPA transporter family (DUF4137)
definition: >-
  This family includes sodium/bile acid cotransporter 7 and other uncharacterised proteins with sodium bile acid cotransporter domain; they are found both in prokaryotes and eukaryotes.They are related to the human bile acid:sodium symporters, which are transmembrane proteins functioning in the liver in the uptake of bile acids from portal blood plasma, a process mediated by the co-transport of Na +.
