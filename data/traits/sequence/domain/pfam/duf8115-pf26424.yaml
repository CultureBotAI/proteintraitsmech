identifier: Pfam:PF26424
label: Domain of unknown function (DUF8115)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins in this family are predominantly found in the class Halobacteria, which are known for their adaptation to high-salt environments. The proteins in this family are generally around 130 amino acids in length. Structure prediction with AlphaFold 3 suggests that proteins in this family may form intertwined homodimers (ipTM=0.68 pTM=0.69).
