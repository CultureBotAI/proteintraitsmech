identifier: Pfam:PF20441
label: Terminase large subunit, endonuclease domain
definition: >-
  This is the endonuclease domain of bacteriophage Terminase large subunit TerL, a key component of the DNA packing machinery in tailed bacteriophages and related viruses. TerL comprises a N-terminal ATPase domain ( ) which powers the DNA translocation and this C-terminal endonuclease domain that cuts concatemeric DNA first in the initiation phase in a sequence specific site and later in the completion stage of the DNA packaging process when the capsid is full. Cryo-EM studies indicate that TerL forms a pentamer that binds to a dodecameric assembly called portal and attaches to the capsid. It has been proposed that nuclease domains form a radially arranged ring that is proximal to portal, playing a key role in pentamer assembly. This nuclease domain has a RNAse H-like fold and it has been proposed to utilise a two-metal catalysis mechanism like in other RNAse H-like endonucleases such as RNase H, transposases, retroviral integrases and RuvC Holliday junction resolvases. This domain is also found in uncharacterised proteins encoded by bacterial prophages, including YmfN from Escherichia coli.
