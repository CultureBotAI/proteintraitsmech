identifier: Pfam:PF10502
label: 'Signal peptidase, peptidase S26 '
definition: >-
  This entry represents a domain found in some members of the S26A family of serine endopeptidases. Peptidases S26A (signal peptidase I) removes the hydrophobic, N-terminal signal peptides as proteins are translocated across membranes. The type I signal peptidases are unique serine proteases that utilize a serine/lysine catalytic dyad mechanism in place of the classical serine/histidine/aspartic acid catalytic triad mechanism. Peptidases S26B includes eukaryotic microsomal signal peptidases involved in the removal of signal peptides from secretory proteins as they pass into the endoplasmic reticulum lumen. Peptidases 26C (TraF signal peptidase) are found in operons that encode elements of conjugative transfer systems.
