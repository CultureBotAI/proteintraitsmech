identifier: Pfam:PF02621
label: Menaquinone biosynthesis
definition: >-
  This family includes two enzymes which are involved in menaquinone (vitamin K2) biosynthesis. One which catalyses the conversion of cyclic de-hypoxanthine futalosine to 1,4-dihydroxy-6-naphthoate, and one which may be involved in the conversion of chorismate to futalosine. These enzymes comprise two domains with α/β structures, a large domain and a small domain. A pocket between the two domains may form the active site, a conserved histidine located within this pocket could be the catalytic base.
