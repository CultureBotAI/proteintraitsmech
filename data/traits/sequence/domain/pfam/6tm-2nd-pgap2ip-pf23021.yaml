identifier: Pfam:PF23021
label: PGAP2IP, second transmembrane domain
definition: >-
  This domain is found in the human PGAP2-interacting protein (PGAP2IP) and its homologues in yeast CWH43. PGAP2IP is composed of three domains. Two of these domains are predicted to adopt very similar structure consisting of six transmembrane helices, which suggests a possible duplication event in these proteins. Its yeast homologue CWH43 is involved in the remodeling of the lipid moiety of GPI anchors to ceramides.
