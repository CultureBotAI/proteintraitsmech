identifier: Pfam:PF02090
label: Salmonella surface presentation of antigen gene type M protein
definition: >-
  The Salmonella typhimurium Surface Presentation of Antigens M gene (SpaM) is one of 12 that form a cluster responsible for invasion properties. The gene product is required for entry by the bacterium into epithelial cells, and is thus considered to be a virulence factor. Other Spa genes in the cluster are related to invasion (Inv) genes in similar Salmonella and Shigella species, and flagella biosynthesis genes in Helicobacter pylori. A homologue of this protein has been found in Salmonella enterica. The protein, named InvI, is required by the organism to gain access to mammalian epithelial cells, and cellular mutants (InvI-) failed to successfully infect these cells. It has also been found that the inv-spa loci of this particular species encode for a type III protein secretion system, essential in the bacterium's host cell invasion process. Proteins in this group are found in proteobacteria.
