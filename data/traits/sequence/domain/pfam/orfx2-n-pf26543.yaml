identifier: Pfam:PF26543
label: Orfx2 N-terminal TULIPs domain
definition: >-
  This domain is found N-terminal in the Orfx2, a protein encoded in the orfX gene cluster from certain strains of Clostridium botulinum, specifically those producing botulinum neurotoxin type E (BoNT/E1). The N-terminal domain of OrfX2 adopts the so-called TULIPs (Tubular lipid binding proteins) domain fold, which is characteristic of a superfamily of lipid-binding proteins known as Aha1/BPI domain-like. The structure of OrfX2 closely resembles the combined structure of OrfX1 and OrfX3, with its N-terminal domain mimicking OrfX1 and its C-terminal domain mimicking OrfX3. OrfX2, along with other OrfX proteins and P47, significantly increases the oral toxicity of BoNT in animal models.
