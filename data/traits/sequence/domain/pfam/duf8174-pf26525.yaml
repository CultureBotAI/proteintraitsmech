identifier: Pfam:PF26525
label: Domain of unknown function (DUF8174)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins predominantly found in the Mycobacteriaceae family. The proteins in this family are primarily distributed across various species of Mycobacterium and Mycolicibacterium. The domain is typically found in proteins ranging from approximately 160 to 230 amino acids in length. Many of these proteins are predicted to be membrane-associated, as suggested by the presence of transmembrane helices. The precise function of this domain remains unknown. This domain belongs to the NTF2 superfamily.
