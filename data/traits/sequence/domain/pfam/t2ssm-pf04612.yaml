identifier: Pfam:PF04612
label: Type II secretion system (T2SS), protein M
definition: >-
  This entry represents the periplasmic C-terminal domain of GspM (also known as T2SM or PulM), a component of the type II secretion system (T2SS) assembly platform. The T2SS allows Gram-negative bacteria to secrete folded proteins such as toxins, hydrolytic enzymes, and adhesins across the outer membrane. GspM is an inner membrane protein with a cytoplasmic N-terminal region, a single transmembrane segment, a coiled-coil domain, and this C-terminal globular domain with a ferredoxin-like fold. The C-terminal domain forms homodimers with an antiparallel arrangement and also heterodimerises with the structurally similar GspL protein in a parallel arrangement. Both homo- and heterodimerisation interfaces involve the same structural elements, exhibiting high structural plasticity. In vivo, GspM is present in large excess over GspL (approximately 20:1 molar ratio). The GspM-GspL heterodimer is essential for T2SS function, with the interface playing a key role in protein secretion. GspM interacts with the major pseudopilin GspG and is proposed to target GspG to the GspL-GspE ATPase complex for pseudopilus assembly. The assembly platform formed by GspL and GspM acts as a dynamic hub that orchestrates pseudopilus polymerisation during secretion.
