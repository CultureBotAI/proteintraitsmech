identifier: Pfam:PF21428
label: Baseplate wedge protein gp7, helical domain
definition: >-
  This domain is found in Baseplate wedge protein gp7 from Bacteriophage T4 ( ) and similar proteins from tailed bacteriophages. Gp7 provides the primary control of the conformational changes of the viral baseplate during assembly and infection. This protein is organised into six domains connected by flexible linkers. This entry represents helix-turn-helix motif that is part of the long linker connecting the second and fourth domains.
