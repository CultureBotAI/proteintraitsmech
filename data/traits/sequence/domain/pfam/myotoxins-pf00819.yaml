identifier: Pfam:PF00819
label: 'Myotoxin, crotamine '
definition: >-
  Myotoxins are small basic peptides (42 to 45 residues) that can cause severe muscle necrosis by a non-enzymatic mechanism. They act extremely rapidly and serve two primary biological functions: limiting the flight of prey by causing instantaneous paralysis of the hind limbs and promoting rapid death by paralysis of the diaphragm. These myotoxins have a well-conserved structure containing six cysteines involved in three disulphide bridges. One of the better studied myotoxins is crotamine, from South American rattlesnake Crotalus durissus terrificus. Crotamine is a multifunctional peptide with pharmacological interest; it can penetrate cells and has potential selective antitumoral activity together with its ability to inhibit the potassium current through voltage-gated potassium channels. Similar toxins have been isolated from the venom of other rattlesnake species.
