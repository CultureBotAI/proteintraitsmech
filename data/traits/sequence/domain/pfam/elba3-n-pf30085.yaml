identifier: Pfam:PF30085
label: Early boundary activity protein 3 N-terminal domain
definition: >-
  This entry represents the N-terminal domain in early boundary activity protein 3 (Elba3) found in Drosophila species. The heterotrimeric Elba complex is required for chromatin domain boundary function during early embryogenesis. The complex binds to a 8-bp sequence in the Fab-7 insulator or boundary element in the bithorax complex. Elba3 lacks DNA-binding activity and plays the role of an adapter protein, bringing Elba1 and 2 together to establish a complex that recognises the asymmetric sequence motif.
