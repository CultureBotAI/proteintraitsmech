identifier: Pfam:PF18266
label: Nicastrin small lobe
definition: >-
  This domain is part of the protein Nicastrin, a component of gamma secretase present in Homo sapiens. Gamma-secretase is thought to contribute to Alzheimer's disease development by generating beta-amyloid peptides. This domain is the known as the small lobe which forms the 'lid'. The lid is an extended surface loop that covers the hydrophilic pocket that is thought to be responsible for substrate recruitment. On substrate binding, the large lobe is thought to rotate relative to the small lobe.
