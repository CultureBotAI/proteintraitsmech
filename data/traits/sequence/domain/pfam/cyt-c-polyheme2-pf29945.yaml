identifier: Pfam:PF29945
label: C-type polyheme cytochrome domain 2
definition: >-
  This entry represents a domain of approximately 192 amino acids found in C-type polyheme cytochromes OmcC, OmcB and related proteins from Geobacter and related bacteria. These cytochromes are involved in anaerobic respiration with Fe(3+) as the terminal electron acceptor, acting as electron-transport mediators in the dissimilatory reduction of Fe(3+).
