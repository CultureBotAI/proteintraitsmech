identifier: Pfam:PF30896
label: RBBP6 linker domain
definition: >-
  This entry represents a small domain of approximately 40 residues found in retinoblastoma-binding protein 6 (RBBP6). This domain is located between the CCHC-type zinc finger ( ) and the U-box/RING finger domain ( ). RBBP6 is an E3 ubiquitin- protein ligase that promotes ubiquitination of substrates including YBX1 and functions as a negative regulator of p53 by promoting assembly of the p53-MDM2 complex. RBBP6 also regulates DNA replication and chromosomal fragile site stability. The N-terminal region of RBBP6 containing the DWNN, zinc finger and U-box domains has been structurally characterised. This family is found in eukaryotes. The function of this domain remains to be determined.
