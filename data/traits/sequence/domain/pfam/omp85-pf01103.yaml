identifier: Pfam:PF01103
label: Omp85 superfamily domain
definition: >-
  This entry represent the β-barrel domain found in Outer membrane protein assembly factor BamA, Translocation and assembly module subunit TamA/TamL and closely related sequences from bacteria and also animal proteins including Sorting and assembly machinery component 50 homolog (SAM50). BamA is part of the outer membrane protein assembly complex, which is involved in assembly and insertion of β-barrel proteins into the outer membrane. Constitutes, with BamD, the core component of the assembly machinery. TamA is a component of the translocation and assembly module (TAM), which facilitates the insertion and assembly of specific β-barrel proteins into the outer membrane. SAM50 plays a crucial role in the maintenance of the structure of mitochondrial cristae and the proper assembly of the mitochondrial respiratory chain complexes. It is required for the assembly of TOMM40 into the TOM complex.
