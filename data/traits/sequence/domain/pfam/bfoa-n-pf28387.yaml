identifier: Pfam:PF28387
label: BfoA N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Bifonsecin B biosynthesis cluster protein A Aspergillus brasiliensis (BfoA) and similar sequences mainly found in filamentous fungi. Members of this group are components of gene clusters that mediate the biosynthesis of dimeric gamma-naphthopyrones such as bifonsecin B and aurasperone B. They are secreted glycoproteins with N-terminal signal peptides and multiple predicted N-linked glycosylation sites. The specific function of this domain remains to be determined.
