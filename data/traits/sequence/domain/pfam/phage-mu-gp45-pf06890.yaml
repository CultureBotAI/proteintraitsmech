identifier: Pfam:PF06890
label: Bacteriophage Mu Gp45, N-terminal
definition: >-
  This entry represents the N-terminal domain of Gp45 and similar sequences. This domain may adopt a OB-like β-barrel fold. This entry includes Gp45 from bacteriophage Mu. Gp45 is a component of the baseplate that forms a central needlelike spike used to puncture the host cell membrane for tube insertion during virus entry. It serves as the distal plug of tail tube channel and might regulate the process of the phage DNA and protein ejection into the host cell. The characteristics of the protein distribution suggest prophage matches.
