identifier: Pfam:PF26551
label: Domain of unknown function (DUF8180)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins predominantly found in Clostridia. The proteins containing this domain are typically between 60 and 130 amino acids in length. The domain is highly conserved across various species within the Bacillota and Thermodesulfobacteriota phyla. Structure prediction suggests this protein is composed of two α-helices and forms a head to tail dimer conformation. The sequences contain a set of histidines in helix one that according to AlphaFold 3 confidently binds to a zinc ion.
