identifier: Pfam:PF21644
label: Histone H3 binding protein ORF158L-like
definition: >-
  This protein family is found in ORF158L from Singapore grouper iridovirus ( ) and similar viral proteins. ORF158L interacts with the histone H3/H4 complex and H3. It may play a key role in histone H3 modulation and function as a histone H3 chaperon. It folds into two β-sheets that form an elongated β-sandwich domain, and two short α-helices on one surface of the molecule with several loops between the secondary structures. The β-sheets consist of four antiparallel β-strands and five antiparallel β-strands, respectively.
