identifier: Pfam:PF05157
label: MshEN domain
definition: >-
  This domain is found at the N-terminal of the Type II secretion secretion system protein E (GspE) and type IV pilus extensin ATPase PilB and near the C-terminal of the glycosyltransferase NfrB. A variant of this domain, called MshEN, binds cyclic di-GMP, which modulates the activity of the respective protein. The structure of this domain is now known. Proteins containing this domain are typically involved in Type IV pilus biogenesis (e.g. ), though some are involved in other processes; for instance aggregation in Myxococcus xanthus (e.g. ).
