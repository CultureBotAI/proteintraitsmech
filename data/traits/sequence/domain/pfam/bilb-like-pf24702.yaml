identifier: Pfam:PF24702
label: Bacterial E2-like ubiquitin protein BilB
definition: >-
  This protein family includes Bacterial E2-like ubiquitin protein BilB from Collimonas sp. and similar short uncharacterised bacterial proteins. BilB is a component of the Bil (bacterial ISG15-like) antiviral defense system. BilB probably accepts ubiquitin from the BilA-BilD (E1) complex and catalyses its covalent attachment to target protein (CTF).
