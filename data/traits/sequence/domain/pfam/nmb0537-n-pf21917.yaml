identifier: Pfam:PF21917
label: N-terminal region of NMB0537
definition: >-
  This entry represents a pair of helices found at the N-terminal of some CBS domain proteins. A pair of these regions dimerise to form a four helical bundle. Proteins in this family have this region followed by two CBS domains and a Transporter-associated domain ( ).
