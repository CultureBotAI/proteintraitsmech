identifier: Pfam:PF28960
label: Domain of unknown function (DUF8485)
definition: >-
  This entry represents the N-terminal domain found in mannose-6- phosphate isomerase family proteins. The domain is approximately 190-220 residues in length. The family is found in diverse bacteria including Bacillota, Bacteroidota and Actinomycetota. The function of this domain remains to be determined.
