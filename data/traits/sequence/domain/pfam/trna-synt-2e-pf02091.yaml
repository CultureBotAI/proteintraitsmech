identifier: Pfam:PF02091
label: Glycyl-tRNA synthetase alpha subunit
definition: >-
  This entry represents the alpha subunit of glycine-tRNA ligase (also known as glycyl-tRNA synthetase alpha subunit). It is responsible for the attachment of glycine to the 3' OH group of ribose of the appropriate tRNA. This domain is primarily responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. In eubacteria, glycine-tRNA ligase ( ) is an alpha2/beta2 tetramer composed of 2 different subunits. In some eubacteria, in archaea and eukaryota, glycine-tRNA ligase is an alpha2 dimer (see ). It belongs to class IIc and is one of the most complex ligases. What is most interesting is the lack of similarity between the two types: divergence at the sequence level is so great that it is impossible to infer descent from common genes. The alpha and beta subunits also lack significant sequence similarity. However, they are translated from a single mRNA, and a single chain glycine-tRNA ligase from Chlamydia trachomatis has been found to have significant similarity with both domains, suggesting divergence from a single polypeptide chain. Aminoacyl-tRNA synthetases (also known as aminoacyl-tRNA ligases) catalyse the attachment of amino acids to their cognate transfer RNA molecules through a highly specific two-step reaction. These enzymes vary widely in size and oligomeric state, and share limited sequence homology. The 20 aminoacyl-tRNA synthetases are divided into two classes. Class I synthetases contain a characteristic Rossmann fold catalytic domain and are predominantly monomeric. Class II synthetases feature an antiparallel β-sheet fold flanked by α-helices and are mostly dimeric or multimeric, with at least three conserved regions. Despite these structural differences, both classes share a conserved α-helical structure involved in tRNA binding. Th…
