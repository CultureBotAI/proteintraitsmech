identifier: Pfam:PF18039
label: UBA-like domain
definition: >-
  This entry represents a UBA-like domain found at the N terminus of ribonuclease ZC3 proteins, such as Rege-1 from C. elegans. Rege-1 is an endonuclease which binds to the 3'UTR of target mRNAs and induces degradation of the transcript. Proteins containing this domain also include ZC3H12A/B/C/D from humans.
