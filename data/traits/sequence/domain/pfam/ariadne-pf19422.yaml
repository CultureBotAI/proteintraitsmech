identifier: Pfam:PF19422
label: Ariadne domain
definition: >-
  This entry represents the Ariadne domain found in the Ariadne subfamily E3 ubiquitin ligase proteins. The C-terminal Ariadne domain adopts an elongated four-helix bundle consisting of an antiparallel arrangement of seven-to-ten-turn long helices. The Ariadne domain is straddled on one side by the IBR domain, and on the other by the RING2 domain. Notably, the Ariadne domain embraces the surface of RING2 containing the catalytic Cys357. The Ariadne domain masks the HHARI catalytic Cys357 and inhibits intrinsic E3 Activity.
