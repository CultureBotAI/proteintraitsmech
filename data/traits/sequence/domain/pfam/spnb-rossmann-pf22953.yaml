identifier: Pfam:PF22953
label: Polyketide synthase extender module SpnB, Rossmann fold domain
definition: >-
  This entry represents a domain found in a group of proteins mainly from actinomycetes, including the polyketide synthase extender module SpnB from Saccharopolyspora spinosa ( ) and Phenolphthiocerol synthesis polyketide synthase type I Pks15/1 from Mycobacterium bovis. This domain adopts a classical Rossmann fold.
