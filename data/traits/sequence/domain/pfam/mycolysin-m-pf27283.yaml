identifier: Pfam:PF27283
label: Mycolysin middle domain
definition: >-
  This entry represents the 7-stranded β-sandwich domain of mycolysin found in Streptomyces cacaoi. The full-length mycolysin precursor is 550 amino acids with a signal peptide (residues 1-34). Mycolysin is a zinc-dependent metalloprotease that preferentially cleaves bonds with hydrophobic residues. The mature enzyme contains zinc-binding residues and belongs to the peptidase M5 family. While the full-length protein has characterised protease activity, the specific function of this 7-stranded β-sandwich domain remains to be determined.
