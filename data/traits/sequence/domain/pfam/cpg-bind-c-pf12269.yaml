identifier: Pfam:PF12269
label: CpG binding protein C-terminal domain
definition: >-
  CpG-binding protein is a transcriptional activator that exhibits a DNA binding specificity for unmethylated CpG motifs. CpG is made of a PHD1, an acidic, a basic, a coiled-coil, and a PHD2 domains. This protein contains three cysteine-rich domains identified at the N-terminal, central region, and C-terminal of the protein, where the central cysteine-rich domain is located within the DNA-binding domain, found between PHD1 and the acidic domains. This domain is found in eukaryotes, and is approximately 240 amino acids in length. It is found at the C-terminal of the CpG-binding protein containing the coiled-coil and PHD2 domains.
