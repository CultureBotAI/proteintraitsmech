identifier: Pfam:PF04307
label: YdjM inner membrane protein
definition: >-
  This is a family of putative LexA-binding proteins. Members are predicted to be membrane-bound metal-dependent hydrolases that may be acting as phospholipases. It is a member of the SOS network, that rescues cells from UV and other DNA-damage. Expression of YdjM is regulated by LexA. This entry represents the N-terminal domain.
