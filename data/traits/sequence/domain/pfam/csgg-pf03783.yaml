identifier: Pfam:PF03783
label: Curli production assembly/transport component CsgG
definition: >-
  CsgG is an outer membrane-located lipoprotein that is highly resistant to protease digestion. During curli assembly, an adhesive surface fibre, CsgG is required to maintain the stability of CsgA and CsgB. May be involved in the biogenesis of curli organelles.
