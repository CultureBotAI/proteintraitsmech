identifier: Pfam:PF17763
label: Glutaminase/Asparaginase C-terminal domain
definition: >-
  This domain is found at the C terminus of asparaginase enzymes. L-Asparaginases ( ) hydrolyse L-asparagine to L-aspartate and ammonia. Enzymes with asparaginase activity play an important role in the metabolism of all living organisms. Enzymes capable of converting L-asparagine to L-aspartate can be classified as bacterial-type or plant-type L-asparaginase. Bacterial-type L-asparaginase are further divided into subtypes I and II, defined by their intra-/extra-cellular localization, substrate affinity, and oligomeric form. Homologous bacterial-type L-asparaginase are found in all kingdoms of life. Furthermore, bacterial-type L-asparaginase are related to other enzymes, including: Bacterial L-glutaminase-asparaginase ( ). Archaeal GatD subunit of Glu-tRNA amidotransferase (Glu-AdT). Mammalian lysophospholipase ( ), which is believed to play a major role in the hydrolytic degradation of lysophosphatidylcholine.
