identifier: Pfam:PF21157
label: DnaK suppressor protein DksA, N-terminal domain
definition: >-
  DksA is a transcription factor that directly binds RNA polymerase and controls the bacteria response to stress and starvation. DksA is all helical. This is the N-terminal domain that consists of two helices arranged in an antiparallel α-hairpin with left-handed twist. It extends through the secondary channel toward the RNAP active site and serves as a conduit for the substrate NTPs.
