identifier: Pfam:PF24682
label: RRP5 OB-fold domain
definition: >-
  This domain is found in the rRNA biogenesis protein Rrp5 from Arabidopsis thaliana and related plant proteins. This domain has a detectable similarity to OB fold domains, in particular to OB domain of 30S ribosomal protein S1 and it is predicted to adopt similar structure. Rrp5 is involved in the biogenesis of rRNA. It is required for formation of both 18S and 5.8S rRNA in budding yeasts. In humans, it is also known as NFBP, which is essential for the generation of 18S rRNA. In Arabidopsis, it is essential for normal development of female gametophytes.
