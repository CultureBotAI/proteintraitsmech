identifier: Pfam:PF20740
label: Outer membrane-associated lipoprotein TP0453
definition: >-
  This domain is found in TP0453 ( ), a lipoprotein associated with the inner leaflet of the outer membrane of Treponema pallidum. This domain consists of an α/β/α-fold and includes five stably folded amphipathic α-helices and may function as a carrier of lipids, glycolipids, and/or derivatives during the biogenesis of the outer membrane ( ).
