identifier: Pfam:PF24579
label: Phage putative PDDEXK endonuclease
definition: >-
  This entry represents a small family of phage proteins that are structurally related to the PD-(D/E)XK nuclease superfamily. The highest structural similarity is to Holliday junction resolvase Hjc proteins and tRNA-splicing endonucleases from archaebacteria. The exact function of this protein family, which also includes bacterial prophages, is unknown.
