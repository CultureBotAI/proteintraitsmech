identifier: Pfam:PF27260
label: Y4jQ
definition: >-
  This entry represents a domain found in Detocs histidine-protein kinase DtcA from Enterobacter cloacae (DtcA) and similar bacterial sequences. DtcA is a sensor-kinase member of the two-component regulatory system Detocs that confers resistance to bacteriophage. The function of this domain is still unknown.
