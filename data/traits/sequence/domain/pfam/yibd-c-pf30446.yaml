identifier: Pfam:PF30446
label: Glycosyltransferase YibD, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the glycosyltransferase YibD and related proteins. It follows the N-terminal glycosyltransferase family 2 catalytic domain ( ). YibD belongs to glycosyltransferase family GT2 and has been shown to possess glucuronosyltransferase activity. Expression is induced during phosphate starvation. The protein is membrane-associated. The family is found in Enterobacterales, including Enterobacteriaceae and Erwiniaceae. The specific function of this C-terminal domain remains to be determined.
