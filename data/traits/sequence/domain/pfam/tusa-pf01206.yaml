identifier: Pfam:PF01206
label: Sulfurtransferase TusA
definition: >-
  The structure of TusA (also known YhhP and SirA) consists of an α/β sandwich with a β-α-β-α-β(2) fold, comprising a mixed four-stranded β-sheet stacked against two α-helices, both of which are nearly parallel to the strands of the β-sheet. Several uncharacterised bacterial proteins (73 to 81 amino-acid residues in length) that contain a well-conserved region in their N-terminal region show structural similarity to the TusA protein, including the E. coli protein YedF ( ), and other members of the UPF0033 family. NOTE: TusA was previously known as SirA, but should not be confused with the sporulation inhibitor of replication protein SirA ( ) or with the LuxR/UhpA family response regulator , also known as SirA.
