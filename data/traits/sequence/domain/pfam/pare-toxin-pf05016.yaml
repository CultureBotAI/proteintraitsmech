identifier: Pfam:PF05016
label: ParE toxin of type II toxin-antitoxin system, parDE
definition: >-
  The RelE/ParE family encompasses several toxin components of toxin-antitoxin modules. RelE is a sequence-specific, ribosome-dependent mRNA endoribonuclease which inhibits translation during amino acid starvation. ParE is involved in plasmid partition. ParE acts by inhibiting DNA gyrase, converting supercoiled plasmid DNA into a singly cleaved linear form in an ATP-dependent fashion.
