identifier: Pfam:PF22520
label: Crb2, Tudor domain
definition: >-
  This entry represents a Tudor domain in the DNA repair protein Crb2 from Schizosaccharomyces pombe. Crb2 possesses tandem Tudor domains which interact with histone H4 dimethylated at Lys20 (H4-K20me2). Crb2 is a checkpoint mediator required for the cellular response to DNA damage.
