identifier: Pfam:PF27059
label: MmpR5-like MarR family transcriptional regulator
definition: >-
  This entry represents the C-terminal α-hairpin domain of HTH-type transcriptional regulator MmpR5 from Mycobacterium tuberculosis and related proteins. This domain is involved in dimerisation. MmpR5 (also known as Rv0678) controls the expression level of the MmpS2-MmpL2, MmpS4-MmpL4, and MmpS5-MmpL5 transport systems in Mycobacterium tuberculosis. The protein also controls its own expression through negative autoregulation. The domain contains a helix-turn-helix DNA-binding motif (residues 53-76) and functions as a homodimer. Crystal structure analysis reveals a two-domain architecture with DNA-binding and dimerization domains that cooperate to bind an inducing ligand identified as 2-stearoylglycerol, a fatty acid glycerol ester. Ligand binding causes conformational changes that result in a state incompatible with DNA binding, leading to derepression of target genes. MmpR5 is clinically significant as mutations or insertions/deletions that inactivate the protein or decrease its activity lead to increased levels of MmpL5 and MmpS5, resulting in non-target based resistance to azoles, clofazimine, and bedaquiline. The protein binds directly to the promoter regions of its target genes, and this binding is reversed upon addition of the ligand.
