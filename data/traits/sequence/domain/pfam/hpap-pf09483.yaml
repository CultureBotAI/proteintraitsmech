identifier: Pfam:PF09483
label: Type III secretion protein (HpaP)
definition: >-
  This entry represents proteins encoded by genes which are always found in type III secretion operons, which are described as SctP (Secretion and Cellular Translocation P) proteins in many pathogenic bacteria. Lineage-specific names for SctP include HpaP in Ralstonia solanacearum, YscP in Yersinia, HrpP in Pseudomonas syringae, EscP in enteropathogenic Escherichia coli, etc. SctP is homologous to flagellar hook-length control protein FliK, and member protein YscP has been described as a molecular ruler, but it appears to have other functions as well.
