identifier: Pfam:PF18157
label: MID domain of pPIWI_RE
definition: >-
  This is the MID domain of the pPIWI_RE PIWI/Argonaute module. pPIWI_RE is found in a conserved three-gene island that also contains a DinG-type helicase and an REase nuclease. This three gene island is predicted to form a conflict system which targets R-loop formation of invasive plasmids during plasmid replication.
