identifier: Pfam:PF08734
label: GYD domain
definition: >-
  This entry represents Glutamine synthetase and cystathionine beta-lyase binding protein (TTHA1554) from T. thermophilus. This protein binds to glutamine synthetase and cystathionine beta-lyase. It may be utilised for the efficient use of nitrogen in the global nitrogen regulation of T.thermophilus. This entry includes related prokaryotic proteins.
