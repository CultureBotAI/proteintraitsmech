identifier: Pfam:PF08058
label: Nuclear pore complex component
definition: >-
  Proteins containing this domain are components of the nuclear pore complex. One member of this domain is Nucleoporin POM34 ( ) which is thought to have a role in anchoring peripheral Nups into the pore and mediating pore formation.
