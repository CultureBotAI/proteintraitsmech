identifier: Pfam:PF26436
label: Domain of unknown function (DUF8119)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins are predominantly found in Halobacteria. The domain is approximately 70-90 amino acids in length and is characterised by the presence of two predicted transmembrane helices, suggesting a potential role in membrane-associated processes.
