identifier: Pfam:PF00551
label: Formyl transferase
definition: >-
  A number of formyl transferases belong to this group. Methionyl-tRNA formyltransferase transfers a formyl group onto the amino terminus of the acyl moiety of the methionyl minoacyl-tRNA. The formyl group appears to play a dual role in the initiator identity of N-ormylmethionyl-tRNA by promoting its recognition by IF2 and by impairing its binding to EFTU-GTP. Formyltetrahydrofolate dehydrogenase produces formate from formyl-tetrahydrofolate. This is the N-terminal domain of these enzymes and is found upstream of the C-terminal domain ( ). The trifunctional glycinamide ribonucleotide synthetase-aminoimidazole ribonucleotide synthetase-glycinamide ribonucleotide transformylase catalyses the second, third and fifth steps in de novo purine biosynthesis. The glycinamide ribonucleotide transformylase belongs to this group.
