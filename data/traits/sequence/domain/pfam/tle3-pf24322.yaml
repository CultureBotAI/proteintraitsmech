identifier: Pfam:PF24322
label: T6SS Tle3 phospholipase effector domain
definition: >-
  This entry represents a domain found at the N-terminal end of the type VI secretion system (T6SS) Tle3 phospholipase effector from adherent-invasive Escherichia coli and related bacterial proteins. Tle3 has a phospholipase A1 activity, and its toxicity is neutralised by the cognate immunity protein Tli3. Tli3 and Tle3 form a stable complex in which a loop of Tli3 inserts deeply in the Tle3 substrate-binding pocket, thus inhibiting its function. This Tle3 domain folds into a globular α/β structure consisting of a central β-sheet and α-helices packed on both sides. It contains the typical nucleophile-elbow motif and structurally resembles the classical α/β hydrolase fold but elaborated with a number of large loops.
