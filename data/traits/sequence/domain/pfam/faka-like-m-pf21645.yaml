identifier: Pfam:PF21645
label: Fatty acid kinase subunit A-like, middle domain
definition: >-
  This domain is found in fatty acid kinase subunit A (FakA) from a bacterial fatty acid kinase (Fak) system and it is localised between and . Two major human pathogens, Staphylococcus and Streptococcus, use this machinery to scavenge host fatty acids. The Fak complex consists of an ATP-binding subunit FakA, which interacts with varied FakB (fatty acid-binding protein) isoforms, and synthesises acyl-phosphate from extracellular fatty acids. FakA comprises three domains, denoted as FakA_N, FakA_M and FakA_C in of which the middle domain is represented by this entry. It consists of four α-helices, four β-strands and several long loops, containing a zinc finger motif. It shows similarities to the yeast copper chaperone ATX1, a metallochaperone/metal-binding protein.
