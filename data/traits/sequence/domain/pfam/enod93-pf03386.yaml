identifier: Pfam:PF03386
label: Early nodulin 93 ENOD93 protein
definition: >-
  The expression of early nodulin (ENOD) genes has been well characterised in several legume species. Based on their biochemical attributes and expression patterns, they are postulated to have roles in cell structure, in the control of nodule ontogeny by the degradation of Nod factor, and in carbon metabolism.
