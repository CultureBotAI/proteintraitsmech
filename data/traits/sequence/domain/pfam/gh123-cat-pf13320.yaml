identifier: Pfam:PF13320
label: Glycoside hydrolase 123, catalytic domain
definition: >-
  This entry, formerly known as DUF4091, represents the C-terminal end of members of the glycoside hydrolase family 123 (GH123). A member of this family, beta-D-N-acetylgalactosaminidase from Clostridium perfringens, removes specific terminal N-D-acetylgalactosamine from glycosphingolipids. This catalytic domain folds into a pair of α-helices and a two-stranded β-sheet.
