identifier: Pfam:PF29691
label: YJL043W N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in uncharacterised proteins from the Saccharomycetaceae. This domain is present in proteins YJL043W and YKR015C from Saccharomyces cerevisiae, which show similarity to each other, and in related proteins across yeast species. The proteins containing this domain are predicted to localise to the cytoplasm and mitochondrion. The function of this domain remains to be determined.
