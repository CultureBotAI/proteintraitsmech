identifier: Pfam:PF25496
label: Up-regulator of cell proliferation-like domain
definition: >-
  This domain is found in the human URGCP. This domain is also found in human Interferon-induced very large GTPase 1 and caspase recruitment domain-containing protein 6. This domain is predicted to adopt an α-β structure. URGCP, the up-regulator of cell proliferation, may be involved in cell cycle progression through the regulation of cyclin D1 expression. This protein is thought to play an important role in the development of gastric cancer.
