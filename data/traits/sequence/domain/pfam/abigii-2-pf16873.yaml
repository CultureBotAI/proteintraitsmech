identifier: Pfam:PF16873
label: Putative abortive phage resistance protein AbiGii toxin
definition: >-
  This is a family of putative type IV toxin-antitoxin system toxins. The AbiG abortive phage resistance protein affects lactococcal bacteriophages phiP335 and phiQ30 but not the other P335 phage species. AbiGii toxin appears to confer resistance to phages by a mechanism of abortive infection that acts by interfering with phage RNA synthesis. The cognate anti-toxin is found in ( ).
