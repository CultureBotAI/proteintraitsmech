identifier: Pfam:PF18241
label: 'Flax-rust effector AvrM-A '
definition: >-
  This domain is found in AvrM-A present in Melampsora lini. AvrM-A is a natural variant of AvrM which is a secreted effector protein that can internalize into plant cells in the absence of the pathogen and bind to phosphoinositides. AvrM results in effector-triggered immunity. This domain makes up part of the C-terminal region, which is highly conserved in AvrM. The domain is required for M-dependent effector-triggered immunity.
