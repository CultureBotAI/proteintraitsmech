identifier: Pfam:PF21195
label: Complement components C8A/B/C6, EGF-like domain
definition: >-
  This domain is found in the alpha and beta chains of complement component C8 (C8A/B) and in complement component C6 (C6) from humans. These are constituents of the membrane attack complex (MAC) that play a key role in the innate and adaptive immune response by forming pores in the plasma membrane of target cells. This entry represents the rigid, disulfide-rich epidermal growth factor (EGF) domain, which is included in the regulatory segment of these proteins. It is found C-terminal to the membrane attack complex perforin domain ( ) and N-terminal to the thrombospondin type 1 repeat ( ).
