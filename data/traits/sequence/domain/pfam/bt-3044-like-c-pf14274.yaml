identifier: Pfam:PF14274
label: BT_3044-like, C-terminal
definition: >-
  This entry represents a domain found at the C-terminal end of a group of proteins from bacteroidetes. Some members of this group also contain , including BT_3044 from Bacteroides thetaiotaomicron ( ), a glycan binding enzyme that could degrade oligosaccharides or even large molecular size glycans. Many other members also contain , including the auxiliary nutrient binding protein BT3507 from Bacteroides thetaiotaomicron ( , ) and BACOVA_03322 from Bacteroides ovatus ( ). This domain was previously known as DUF4361.
