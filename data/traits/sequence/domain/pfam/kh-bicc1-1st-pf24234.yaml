identifier: Pfam:PF24234
label: BICC1, first type I KH domain
definition: >-
  This entry represents the first type I KH RNA-binding domain of BICC/BICC1. Bicaudal-C from Drosophila melanogaster (BICC) and its homologues from vertebrates BICC1, are RNA-binding proteins with translational repression function; they regulate gene expression and modulate cell proliferation and apoptosis. BICC1 is a negative regulator of Wnt signalling. These proteins are involved in the regulation of embryonic differentiation and play a role in the regulation of Dvl (Dishevelled) signalling, particularly in the correct cilia orientation and nodal flow generation. In Drosophila, disruption of BICC can disturb the normal migration direction of the anterior follicle cell of oocytes. In mammals, mutations in this gene are associated with polycystic kidney disease and it was suggested that the BICC1 protein can indirectly interact with ANKS6 protein (ANKS6 is also associated with polycystic kidney disease) through some protein and RNA intermediates. BICC1 contains N-terminal K homology (KH) RNA-binding vigilin-like repeats and a C-terminal SAM domain.
