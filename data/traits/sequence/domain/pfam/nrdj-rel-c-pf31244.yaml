identifier: Pfam:PF31244
label: NrdJ homologue C-terminal domain
definition: >-
  This entry represents a domain found C-terminal in homologues of vitamin B12- dependent ribonucleoside-diphosphate reductase (NrdJ) in Bacteroidota. NrdJ uses adenosylcobalamin (vitamin B12) as a cofactor for reducing ribonucleotides to deoxyribonucleotides during DNA synthesis. The catalytic domain ( ) and the N-terminal domain ( ) are located N-terminal to this domain. This enzyme is found in gut commensal bacteria including Bacteroides, Flavobacteria and Porphyromonas. The specific function of this C-terminal domain remains to be determined.
