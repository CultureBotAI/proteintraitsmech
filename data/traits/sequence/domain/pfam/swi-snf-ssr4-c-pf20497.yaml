identifier: Pfam:PF20497
label: SWI/SNF and RSC complexes subunit Ssr4 C-terminal
definition: >-
  This entry represents the C-terminal domain of Ssr4 (SWI/SNF and RSC complexes subunit ssr4), an essential component of the chromatin-remodelling SWI/SNF and RSC (remodelling the structure of chromatin) complexes found in S. pombe. This domain contains a conserved RYxxxHEWMEEI/V motif. RSC is involved in transcription regulation and nucleosome positioning which controls, particularly, membrane and organelle development genes. The ATP-dependent chromatin remodelling complex SWI/SNF is required for the positive and negative regulation of gene expression of a large number of genes through the regulation of nucleosome remodelling.
