identifier: Pfam:PF26586
label: R-PTP-O-like, fibronectin type III domain
definition: >-
  This fibronectin type-III (Fn3) domain is found in human Receptor-type tyrosine-protein phosphatase O (R-PTP-O), which possesses tyrosine phosphatase activity. R-PTP-O is a long protein predicted to have five tandem Fn3 domains connected to another two through an unstructured loop in the N-terminal region. This domain is found associated to .
