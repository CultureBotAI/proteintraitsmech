identifier: Pfam:PF07682
label: Sulphur oxygenase reductase
definition: >-
  The crystal structure of the sulphur oxygenase/reductase (SOR) of the thermo-acidophilic archaeon Acidianus ambivalens has been determined to 1.7-A resolution. Twenty-four monomers form a large hollow sphere enclosing a positively charged nanocompartment. Apolar channels provide access for linear sulphur species. A cysteine persulphide and a low-potential mononuclear non-heme iron site ligated by a 2-His-1-carboxylate facial triad in a pocket of each subunit constitute the active sites, accessible from the inside of the sphere. The iron is likely the site of both sulphur oxidation and sulphur reduction. At 85 degrees C in vitro , elemental sulphur is oxidised to sulphite, thiosulphate and hydrogen sulphide with no external cofactors needed. The proposed equation is: 4S + O 2 + 4 H 2 O ---> 2 HSO3- + 2 H2S + 2 H + .
