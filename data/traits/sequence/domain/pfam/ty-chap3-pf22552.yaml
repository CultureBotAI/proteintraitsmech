identifier: Pfam:PF22552
label: T3SS (YopN, CesT) and YbjN peptide-binding chaperone 3
definition: >-
  This entry represents a domain found at the N-terminal end of a group of T3SS (YopN, CesT) and YbjN peptide-binding chaperone 1 (TY-Chap) proteins from bacteria. Members are observed in host systems and predicted to counteract the action of viral ribosylating toxins. It is found N-terminal to the central ( ) and C-terminal ( ) domains.
