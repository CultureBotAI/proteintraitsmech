identifier: Pfam:PF25458
label: Integrator subunit 4 family C-terminal Ig-like domain
definition: >-
  This entry represents the C-terminal domain of animal Integrator complex subunit 4 (INTS4) and plant Protein SIEL. The domain has been structurally identified near the INTS9 beta-CASP domain but is poorly resolved in current structures, suggesting flexibility. Its specific function remains to be determined. INTS4 is a component of the Integrator complex which plays essential roles in snRNA 3' end processing and transcription termination. INTS4 along with INTS9 and INTS11 constitute the Integrator cleavage module, which contains endonuclease activity and resembles the cleavage module of the cleavage and polyadenylation specific factor required for 3' processing of mRNA transcripts. SIEL (for SHR INTERACTING EMBRYONIC LETHAL) is an intracellular shuttle that promotes movement of the SHORT-ROOT (SHR) protein from the stele into the endodermis. It is required for SHR association to endosomes and localisation, and for intercellular movement of SHR.
