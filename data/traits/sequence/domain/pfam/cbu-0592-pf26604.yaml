identifier: Pfam:PF26604
label: CBU_0592 family
definition: >-
  This entry represents an uncharacterised domain found in CBU_0592 protein from Coxiella burnetii RSA 493 and related proteins. These proteins are about 90 amino acids in length and rich in hydrophobic residues, suggesting a location largely in the membrane. A minority have an additional C-terminal domain related to cyclic nucleotide-binding domains. Some proteins have two copies of this domain.
