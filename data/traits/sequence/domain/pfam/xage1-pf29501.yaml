identifier: Pfam:PF29501
label: X antigen family member 1
definition: >-
  This entry represents XAGE1, an X antigen family member also known as cancer/testis antigen 12.1. In normal tissues, XAGE1 is highly expressed in testis but is also expressed in many different types of cancers including breast cancer, prostate cancer, lung cancers, and Ewing's sarcoma. The protein undergoes phosphorylation and sumoylation and interacts with several proteins including YY1, RYBP and SETBP1. XAGE1 belongs to the GAGE family and has multiple alternatively spliced isoforms.
