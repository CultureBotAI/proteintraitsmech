identifier: Pfam:PF00019
label: Transforming growth factor beta like domain
definition: >-
  The transforming growth factor-beta (TGF-beta) superfamily comprises a number of structurally related, secreted polypeptides that regulate a multitude of cellular processes including proliferation, differentiation, cell invasion, immune regulation, and neoplastic transformation. Family members include the activins/inhibins, bone morphogenetic proteins (BMPs), growth and differentiation factors (GDFs), and TGF-betas. These growth regulatory molecules induce ligand-mediated hetero-oligomerisation of distinct type II and type I serine/threonine kinase receptors that transmit signals predominantly through receptor-activated Smad proteins, but also induce Smad-independent pathways. TGF-beta-1 is a peptide of 112 amino acid residues derived by proteolytic cleavage from the C-terminal of a precursor protein. Proteins from the TGF-beta family are only active as homo- or heterodimers, with the two chains linked by a single disulphide bond. The remaining cysteines are involved in intrachain disulphide bonds: TGF-beta and inhibin beta chains contain four such bonds, while other family members lack the first bond. TGF-beta exerts tumour-suppressive effects but also modulates cell invasion and immune regulation. Misregulation of the TGF-beta signalling pathway can result in tumour development.
