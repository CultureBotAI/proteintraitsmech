identifier: Pfam:PF24558
label: Domain of unknown function (DUF7604)
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is usually associated with von Willebrand factor type A domain ( ), which is inserted into the domain core. Members of this entry are likely to contain an intramolecular isopeptide bond. The domain represented by this entry is predicted to fold into a β-sandwich. This entry does not include the two N-terminal strands that precede the von Willebrand factor type A domain and are segregated from the remaining part of the core domain.
