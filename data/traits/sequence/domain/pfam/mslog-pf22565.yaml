identifier: Pfam:PF22565
label: Minimal SLOG domain
definition: >-
  This entry represents a domain predicted to be an active, minimal version of the SLOG domain. It is found N-terminally fused to the DUF4326 domain ( ). It may play a role in base cleavage, potentially forming abasic sites acted on by the DuOB domain ( ). Members of this group are found in proteobacteria.
