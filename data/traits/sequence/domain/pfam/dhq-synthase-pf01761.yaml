identifier: Pfam:PF01761
label: 3-dehydroquinate synthase N-terminal
definition: >-
  This is the Rossmann-fold domain found at the N-terminal of these proteins, which binds NAD+ in an inverted orientation to that observed in all other classic Rossmann-fold proteins. The 3-dehydroquinate synthase (DHQS) domain can exist in isolation or as a domain in the pentafunctional AROM polypeptide ( ). 3-dehydroquinate synthase catalyses the formation of dehydroquinate (DHQ) and orthophosphate from 3-deoxy-D-arabino heptulosonic 7 phosphate. This reaction is part of the shikimate pathway which is involved in the biosynthesis of aromatic amino acids. DHQS consists of an N-terminal Rossmann-fold domain and a C-terminal α-helical domain. The active site is located in a cleft between the two domains. The enzyme 2-deoxy-scyllo-inosose synthase (DOIS) catalyses carbocycle formation from D-glucose-6-phosphate to 2-deoxy-scyllo-inosose through a multistep reaction, and is evolutionarily related to DHQS. This entry includes members of 3-dehydroquinate synthase II ( ), encoded by aroB genes in M. maripaludis which is widely distributed in methanogens. In M. jannaschii, proteins ADTH synthase (AroA) and DHQ synthase II (AroB) are required to convert 6-deoxy-5-ketofructose-1-phosphate (DKFP) and aspartate semialdehyde to 3-dehydroquinate (DHQ) in vitro.
