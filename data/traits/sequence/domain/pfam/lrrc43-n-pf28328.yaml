identifier: Pfam:PF28328
label: Leucine-rich repeat-containing protein 43 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of leucine-rich repeat-containing protein 43 (LRRC43). The specific function of this N-terminal domain remains to be determined. Leucine-rich repeat-containing protein 43 (LRRC43) is found in mammals and contains multiple leucine-rich repeats. The protein is expressed in testis and other tissues. Its function is not yet clear.
