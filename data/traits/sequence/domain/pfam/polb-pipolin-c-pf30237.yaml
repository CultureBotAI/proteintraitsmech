identifier: Pfam:PF30237
label: Primer-independent DNA polymerase PolB C-terminal domain
definition: >-
  This entry represents a C-terminal helical domain found in primer-independent DNA polymerase PolB proteins associated with pipolin mobile genetic elements in proteobacteria. The domain is approximately 120 amino acids in length. PolB has primer-independent and primer-dependent DNA polymerisation activity, translesion synthesis activity, 3'-5' exodeoxyribonuclease activity, and de novo primer synthesis activity. The specific function of this domain remains to be determined.
