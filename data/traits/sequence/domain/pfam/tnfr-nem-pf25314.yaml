identifier: Pfam:PF25314
label: TNF receptor-like domain
definition: >-
  This entry represents a TNF receptor-like domain found widely distributed throughout nematodes, including both Chromadorea and Enoplea. The domain appears in multiple copies in transmembrane proteins involved in cell adhesion and matrix interactions, such as MUP-4 and MUA-3 in C. elegans. The domain is found across multiple nematode clades including Trichinellida, Rhabditina, Tylenchina, Spirurina, and Dorylaimia.
