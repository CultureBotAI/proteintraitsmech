identifier: Pfam:PF12204
label: Domain of unknown function (DUF3598), N-terminal
definition: >-
  This entry represents a domain predominantly found in proteins from cyanobacteria and plants, including Biogenesis factor required for ATP synthase 1 (BFA1, ) from Arabidopsis thaliana and other uncharacterised proteins. BFA1 promotes the assembly of the CF1 subcomplex of the chloroplast ATP synthase by specifically interacting with the gamma and beta subunits. This protein consists of two distinct β-barrels: a typical β-barrel with ten β-sheets and one α-helix and an atypical one, oriented perpendicularly, with nine β-sheets and two α-helices; and shows structural similarity with the lipocalin superfamily.
