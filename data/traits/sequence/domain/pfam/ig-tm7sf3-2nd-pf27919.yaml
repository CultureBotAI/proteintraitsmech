identifier: Pfam:PF27919
label: TM7SF3-like, second immunoglobulin-like domain
definition: >-
  This domain is found towards the N-terminal of human Transmembrane 7 superfamily member 3 (TM7SF3) and similar animal proteins. TM7SF3 is involved in the inhibition of cytokine-induced death of pancreatic beta cells and in the promotion of insulin secretion. It acts as a pro-survival homeostatic factor that attenuates the development of cellular stress. This domain is predicted to fold into a β-sandwich with immunoglobulin-like (Ig-like) fold. It is the second of a pair of two found at the N-terminal.
