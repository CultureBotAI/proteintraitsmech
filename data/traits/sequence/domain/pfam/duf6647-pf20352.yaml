identifier: Pfam:PF20352
label: Domain of unknown function (DUF6647)
definition: >-
  This entry represents a presumed domain found in a group of functionally uncharacterised proteins from bacteria. Proteins in this family are typically between 158 and 180 amino acids in length. Proteins in this entry have a metzincin-like fold and are most closely related to the structure of the YbeY endoribonuclease proteins.
