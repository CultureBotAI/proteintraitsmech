identifier: Pfam:PF21251
label: Small ribosomal subunit protein uS5m, N-terminal
definition: >-
  This entry represents an extension segment found at the N-terminal of mitochondrial 28S Small ribosomal subunit protein uS5m. This region lines a part of the mRNA entry path and connects the 28S subunit body to the head forming a latch across the mRNA channel entrance.
