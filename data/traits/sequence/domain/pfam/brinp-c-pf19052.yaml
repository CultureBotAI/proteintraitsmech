identifier: Pfam:PF19052
label: BRINP C-terminal domain
definition: >-
  This entry represents the C-terminal domain of BMP/retinoic acid-inducible neural-specific protein (BRINP) 1, 2 and 3. BRINP proteins are involved in neurogenesis and brain development. These proteins play a role in inhibiting neuronal cell proliferation by negatively regulating cell cycle progression, particularly by suppressing the G1/S transition in postmitotic neurons. This regulation is essential for proper brain development and the functioning of GABAergic neurons. Additionally, certain BRINP proteins have been implicated in promoting the proliferation, migration, and invasion of pituitary gonadotrope cells when overexpressed, suggesting a potential role in pituitary tumour development. BRINP proteins are also characterised by their responsiveness to BMP and retinoic acid, which are key signalling molecules in neural-specific pathways.
