identifier: Pfam:PF22687
label: BRCA2 TR2 domain
definition: >-
  This domain is found near the C terminus of BRCA2 and similar proteins from vertebrates. It is likely that the TR2 domain is largely disordered and does not fold into a globular structure. It contains a highly conserved proline-rich region which is preceded by a conserved stretch of positively charged residues. This domain is known to interact with meiosis-specific recombinase DMC1 and RAD51.
