identifier: Pfam:PF29509
label: Mediator complex subunit 30
definition: >-
  This entry represents the mediator complex subunit 30 (mdt-30) protein family. These proteins are characterised by glutamine and asparagine-rich regions and are found primarily in nematodes. The C. elegans protein mdt-30 interacts with mdt-28. Members of this family are typically around 460-550 amino acids in length and contain extensive disordered regions with low complexity sequences enriched in polar residues. The specific function of this protein family remains to be determined.
