label: Domain of unknown function (DUF7945)
definition: >-
  This domain is found in uncharacterised bacterial proteins predominantly from Actinomycetes. It is predicted to fold into an array of α-helices. Members of this entry include REIS_1423, which was suggested to be the antitoxin for REIS_1424-like toxins.
