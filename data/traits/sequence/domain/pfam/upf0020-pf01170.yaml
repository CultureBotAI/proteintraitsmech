identifier: Pfam:PF01170
label: RMKL-like, methyltransferase domain
definition: >-
  This entry represents the methyltransferase domain found in ribosomal RNA large subunit methyltransferase K/L from Escherichia coli (RmlKL) and tRNA (guanine(10)-N2)-dimethyltransferase from Methanocaldococcus jannaschii which is associated with the THUMP domain ( ) RmlKL specifically methylates the guanine in positions 2445 and 2069 of 23S rRNA before its assembly into 50S subunits.
