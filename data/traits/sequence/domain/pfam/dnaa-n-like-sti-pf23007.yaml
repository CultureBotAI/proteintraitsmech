identifier: Pfam:PF23007
label: STICHEL, DnaA_N-like alpha-beta domain
definition: >-
  This domain is found in protein STICHEL (STI) from Arabidopsis thaliana and related proteins from plants and cyanobacteria. STICHEL acts as a key regulator of trichome branching through an endoreduplication-independent pathway. The domain represented by this entry is predicted to adopt a globular α/β structure with significant similarity to domains belonging to Ribosome-binding factor A, RbfA superfamily including ribosomal protein eS7. It has a significant sequence similarity to DnaA N-terminal domain. This domain is topologically very similar to KH type II domains but it lacks their characteristic KH-motif.
