identifier: Pfam:PF27147
label: YGL2 N-terminal alpha-helical domain
definition: >-
  This entry represents the N-terminal α-helical domain of YGL2, an uncharacterised protein from Streptomyces viridochromogenes. The protein is located in the glnII region, which contains a gene encoding a eukaryotic-like glutamine synthetase that confers resistance to the antibiotic phosphinothricyl-alanyl-alanine. The specific function of this domain remains unknown.
