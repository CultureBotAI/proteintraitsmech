identifier: Pfam:PF29830
label: YRF11-like helical domain
definition: >-
  This entry represents a helical domain found in Y' element ATP-dependent helicases from Saccharomyces cerevisiae. These proteins are ATP-dependent helicases that play a role in DNA unwinding and are implicated in telomerase-independent telomere maintenance. The specific function of this domain remains to be determined. This domain is found next to the N-terminal domain ( ).
