identifier: Pfam:PF13111
label: pPIWI_RE module N-terminal domain
definition: >-
  This entry represents a domain N-terminal to the pPIWI_RE domain module. PIWI/Argonaute modules are typically N-terminally fused to the PTND1 and PTND2 domains, pPIWI_RE_X may represent an ancestral version of these domains or represent a N-terminal innovation predating the emergence of PTND1 and PTND2.
