identifier: Pfam:PF30786
label: Domain of unknown function (DUF8737)
definition: >-
  This entry represents a family of uncharacterised integral membrane bacterial proteins of approximately 125 residues. These proteins contain five potential transmembrane helices. AlphaFold3 prediction suggests these proteins form a homotrimeric arrangement ( ipTM = 0.86 pTM = 0.87). The protein has a small variable C-terminal tail that is likely to be intracellular.
