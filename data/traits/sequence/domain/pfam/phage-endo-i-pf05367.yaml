identifier: Pfam:PF05367
label: Phage endonuclease I
definition: >-
  Endonuclease I ( ) is a junction-resolving enzyme encoded by bacteriophage T7, that selectively binds and cleaves four-way Holliday DNA junctions. The structure of the enzyme shows that it forms a symmetric homodimer arranged in two well-separated domains. Each domain, however, is composed of elements from both subunits, and amino acid side chains from both protomers contribute to the active site.
