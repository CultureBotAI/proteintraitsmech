identifier: Pfam:PF14928
label: Short tail fibre protein receptor-binding domain
definition: >-
  This entry represents the C-terminal domain of the bacteriophage T4 short tail fibre. During virus attachment, Bacteriophage T4 binds Escherichia coli with its long tail fibres and then binds irreversibly to the lipopolysaccharides component on the cell surface using its short tail fibres. The short tail fibres are composed of a single protein, gp12. The C-terminal domain of gp12 is a receptor-binding domain consisting of three extensively intertwined monomers.
