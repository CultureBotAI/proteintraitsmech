identifier: Pfam:PF30485
label: Coiled-coil domain-containing protein 13
definition: >-
  This entry represents the coiled-coil domain-containing protein 13 (CCDC13) family found in animals. Members contain extensive coiled-coil regions. In humans, CCDC13 localises to centriolar satellites and the cilium basal body, where it is required for primary cilia formation and promotes the localisation of BBS4 to both centriolar satellites and cilia. CCDC13 interacts with centrosomal proteins PCM1, CEP290 and pericentrin (PCNT). The protein is also implicated in genome stability.
