identifier: Pfam:PF22994
label: RSC4 Ig-like domain
definition: >-
  The RSC4 family includes components of the RSC chromatin remodeling complex, which plays a crucial role in the regulation of transcription and the positioning of nucleosomes. Members of the RSC4 family are particularly important for the control of genes associated with membrane and organelle development, thereby influencing cellular structure and function. This protein contains two N-terminal bromodomains followed by this C-terminal Ig-like domain. This entry includes RSC4 from S.pombe and closely related fungal sequences.
