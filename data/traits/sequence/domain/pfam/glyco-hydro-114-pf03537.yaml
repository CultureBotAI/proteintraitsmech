identifier: Pfam:PF03537
label: Glycoside-hydrolase family GH114
definition: >-
  Proteins in this entry are recognised as members of a glycosyl-hydrolase family, number 114. It is endo-alpha-1,4-polygalactosaminidase, a rare enzyme. It is proposed to be TIM-barrel, the most common structure amongst the catalytic domains of glycosyl-hydrolases.
