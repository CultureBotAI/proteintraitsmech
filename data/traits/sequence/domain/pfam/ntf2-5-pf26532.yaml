identifier: Pfam:PF26532
label: NTF2-like domain
definition: >-
  This entry represents a family of uncharacterised proteins mainly found in Trypanosomatida that contain a domain that belongs to the NTF2-like superfamily, which is characterised by a partial β-barrel structure with α helices enclosing a solvent-accessible cavity. Proteins in this family are approximately 275-343 amino acids in length.
