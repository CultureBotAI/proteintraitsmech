identifier: Pfam:PF28969
label: F22D3.4 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in uncharacterised protein F22D3.4 from Caenorhabditis elegans and related proteins. These proteins also frequently contain an N-terminal domain ( ). The C-terminal domain is found in the latter portion of these proteins and is conserved across nematodes, particularly within the Rhabditida order. The function of the F22D3.4 protein and its constituent domains remains to be determined.
