identifier: Pfam:PF25800
label: FimV N-terminal domain Ig-like domain
definition: >-
  This entry represents the N-terminal domain of the motility hub protein FimV that is located N-terminal to the LysM domain ( ). This domain adopts an immunoglobulin (Ig)-fold structure and is likely involved in interactions with other proteins and might contribute to the localisation of components of the type IV pilus and type II secretion machinery to the bacterial cell poles. FimV is an inner membrane protein that plays a role in twitching motility, type IV pilus assembly, and type II secretion in bacteria like Pseudomonas aeruginosa. Disruption of FimV blocks twitching motility from type IV pili, which suggests a role in peptidoglycan layer remodelling required by type IV fimbrial systems. The C-terminal of FimV proteins is represented by . In between is a highly variable, often repeat-filled region rich in the negatively charged amino acids Asp and Glu.
