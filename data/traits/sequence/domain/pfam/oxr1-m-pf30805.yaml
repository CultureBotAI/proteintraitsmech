identifier: Pfam:PF30805
label: Oxidation resistance protein 1, middle domain
definition: >-
  This entry represents a large middle domain of approximately 520 residues found in oxidation resistance protein 1 (OXR1) and nuclear receptor coactivator 7 (NCOA7/ERAP140) proteins. The domain is located between an N-terminal LysM domain ( ) and a C-terminal TLDc domain ( ). OXR1 proteins are induced by heat shock and oxidative stress and localise to mitochondria. NCOA7 functions as a tissue-specific coactivator for estrogen receptors. Mutations in human OXR1 cause cerebellar hypoplasia/atrophy, epilepsy, and global developmental delay. The antioxidant activity has been mapped to the TLDc domain rather than this middle domain. This domain is found exclusively in metazoans, including vertebrates and arthropods. The specific function of this domain remains to be determined.
