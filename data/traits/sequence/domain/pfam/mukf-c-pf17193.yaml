identifier: Pfam:PF17193
label: MukF C-terminal domain
definition: >-
  This entry represents the C-terminal domain of MukF. MukF is involved in chromosome condensation, segregation and cell cycle progression. MukE along with MukF interact with MukB in vivo forming a complex, which is required for chromosome condensation and segregation in Escherichia coli. The Muk complex appears to be similar to the SMC-ScpA-ScpB complex in other prokaryotes where MukB is the homologue of SMC. The C-terminal domain of MukF is thought to bind to MukE and MukB.
