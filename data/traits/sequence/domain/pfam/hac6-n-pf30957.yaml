identifier: Pfam:PF30957
label: HAC6 N-terminal domain
definition: >-
  This entry represents a small helical domain at the N-terminal of proteins from the subtelomeric hrmA-associated cluster (HAC) in filamentous fungi. The domain is found in HAC6 proteins, exemplified by the 396 amino acid protein AFUA_5G14930 from Aspergillus fumigatus. HAC6 proteins are part of a gene cluster that is regulated by the hypoxia responsive morphology factor A (hrmA). The HAC gene cluster contains genes that alter hyphal surface properties and perturb inter-hyphal interactions within developing biofilms, contributing to the formation of a hypoxia-typic morphotype (H-MORPH) that enhances hypoxia fitness and virulence in invasive aspergillosis. The specific function of this helical domain within HAC6 proteins remains to be determined.
