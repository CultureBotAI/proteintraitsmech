identifier: Pfam:PF21590
label: AP5B1, C-terminal
definition: >-
  AP5B1 is part of the AP-5 adaptor protein complex, which may be involved in endosomal transport. This entry represents a presumed α/β domain found at the C-terminal of AP5B1 proteins. Structure predictions suggest that it consists of five β-strands with three α-helices around them.
