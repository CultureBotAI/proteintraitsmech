identifier: Pfam:PF21609
label: Toxofilin-like domain
definition: >-
  This domain is found in a group of proteins from eukaryotic parasites, including Toxofilin ( ) from Toxoplasma gondii, an actin-binding protein involved in invasion. This domain interacts with the host mammalian actin. It folds into five α-helices connected by loops ( ).
