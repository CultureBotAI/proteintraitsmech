identifier: Pfam:PF06831
label: Formamidopyrimidine-DNA glycosylase H2TH domain
definition: >-
  This entry represents a helix-2-turn-helix DNA-binding domain found in DNA glycosylase/AP lyase enzymes, which are involved in base excision repair of DNA damaged by oxidation or by mutagenic agents. Formamidopyrimidine-DNA glycosylases (Fpg, MutM) are trifunctional DNA base excision repair enzymes that remove a wide range of oxidation-damaged bases (N-glycosylase activity; ) and cleave both the 3'- and 5'-phosphodiester bonds of the resulting apurinic/apyrimidinic site (AP lyase activity; ). Fpg has a preference for oxidised purines, excising oxidised purine bases such as 7,8-dihydro-8-oxoguanine (8-oxoG). Its AP (apurinic/apyrimidinic) lyase activity introduces nicks in the DNA strand, cleaving the DNA backbone by beta-delta elimination to generate a single-strand break at the site of the removed base with both 3'- and 5'-phosphates. Fpg is a monomer composed of 2 domains connected by a flexible hinge. The two DNA-binding motifs (a zinc finger and the helix-two-turns-helix motifs) suggest that the oxidised base is flipped out from double-stranded DNA in the binding mode and excised by a catalytic mechanism similar to that of bifunctional base excision repair enzymes. Fpg binds one ion of zinc at the C-terminal, which contains four conserved and essential cysteines. Endonuclease VIII (Nei) has the same enzyme activities as Fpg ( , ), but with a preference for oxidised pyrimidines, such as thymine glycol, 5,6-dihydrouracil and 5,6-dihydrothymine. These proteins contain three structural domains: an N-terminal catalytic core domain, a central helix-two turn-helix (H2TH) module and a C-terminal zinc finger. The N-terminal catalytic domain and the C-terminal zinc finger straddle the DNA with the long axis of the protein oriented roughly orthogonal to the helical axis of th…
