identifier: Pfam:PF21387
label: Baseplate structural protein gp6, C-terminal domain I
definition: >-
  This entry represents a domain that has been described as C-terminal domain I in Baseplate wedge protein gp6 from Enterobacteria phage T4 ( ). It adopts a two-layer β-sandwich fold. Members of this group are found in tailed bacteriophages and bacterial prophages. Baseplate structural protein gp6 is located next to the tail tube and is an intermediate (or inner) baseplate protein involved in tail assembly. Two molecules of gp6 form a complex with gp25 and gp7 which is involved sheath contraction.
