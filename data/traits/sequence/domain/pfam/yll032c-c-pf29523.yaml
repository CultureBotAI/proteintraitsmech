identifier: Pfam:PF29523
label: YLL032C-like C-terminal domain
definition: >-
  This entry represents the C-terminal domain in YLL032C-like proteins foundparticularly in Saccharomycetaceae and related yeasts. These proteins contain a KH domain and are involved in RNA binding. The representative protein YLL032C is localised to the cytoplasm and exhibits mRNA binding activity. These proteins undergo phosphorylation and are involved in RNA metabolism. The specific function of these proteins remains to be determined.
