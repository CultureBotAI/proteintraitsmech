identifier: Pfam:PF00729
label: Viral coat protein (S domain)
definition: >-
  The capsid proteins of plant icosahedral positive strand RNA viruses form 4 different domains, a positively charged, N-terminal 'R' domain, which interacts with RNA (66 residues); a connecting arm, 'a' (35 residues); a central, surface 'S' domain, which forms the virion shell; and a projecting, C-terminal 'P' domain. Some of the viruses lack either the R or P domains. The S domain contains from 158 to 166 amino acids and comprises 8 anti-parallel β-strands, which form a twisted sheet or jelly-roll fold. This structure is shared by a number of plant viral capsid proteins, which include: Carmovirus, Dianthovirus, Sobemovirus, Tombusvirus and an unidentified tobacco necrosis virus.
