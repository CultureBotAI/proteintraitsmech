identifier: Pfam:PF31034
label: SatS C-terminal domain
definition: >-
  This domain is found C-terminal in SatS, a protein export factor with a role in intracellular growth of M. tuberculosis. SatS functions as a protein export chaperone and has the ability to bind and protect substrates from aggregation. SatS is required for M. tuberculosis growth in macrophages. This domain has a significant similarity to the N-terminal domain of SatS, suggesting duplication. It folds into and α/β structure with an unique topology composed of a curved mixed β-sheet packed with α-helices on both sides. This domain is frequently found in two tandem copies.
