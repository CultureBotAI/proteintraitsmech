identifier: Pfam:PF13553
label: Function to find
definition: >-
  This entry contains the whole FIIND domain composed by the ZU5 sub-domain and the UPA sub-domain . The so-called function-to-find (FIIND) domain was initially identified in two proteins: NLRP1 (also known as NALP1, CARD7, NAC, DEFCAP) and CARD8 (also known as TUCAN, Cardinal). NLRP1 is a member of the Nod-like receptor (NLR) protein superfamily and is involved in apoptosis and inflammation; to date, it remains the only NLR protein known to possess a FIIND domain. The domain is likewise present in CARD8, where, as in NLRP1, it is followed by a C-terminal CARD domain. Both proteins are reported to form an "inflammasome", a macromolecular complex capable of processing caspase-1 and activating pro-IL1β. The FIIND domain comprises two subdomains: ZU5 (found in the tight-junction protein ZO-1 and the netrin receptor UNC5) and UPA (conserved in UNC5, the death-domain-containing protein PIDD, and proteins of the ankyrin family). Notably, the FIIND domain is found in only a small subset of the animal kingdom, including primates, rodents (mouse, rat), carnivores (e.g., dog), and a few other species such as horses. Early studies describing NLRP1 did not initially recognise FIIND as a distinct domain, mistakenly identifying it as part of the adjacent leucine-rich repeat (LRR) domain. The discovery of CARD8 later revealed that its N-terminal region shared significant sequence identity with an uncharacterised region in NLRP1. Before receiving its current designation, the FIIND domain was referred to as the NALP1-associated domain (NAD).
