identifier: Pfam:PF11559
label: Afadin- and alpha -actinin-Binding
definition: >-
  This family is found in mammals where it is localised at cell-cell adherens junctions, and in Sch. pombe and other fungi where it anchors spindle-pole bodies to spindle microtubules. It is a coiled-coil structure, and in pombe, it is required for anchoring the minus end of spindle microtubules to the centrosome equivalent, the spindle-pole body. The name ADIP derives from the family being composed of Afadin- and alpha Actinin-Binding Proteins Localised at Cell-Cell Adherens Junctions.
