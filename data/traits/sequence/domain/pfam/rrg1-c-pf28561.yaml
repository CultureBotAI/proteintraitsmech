identifier: Pfam:PF28561
label: Required for respiratory growth protein 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the required for respiratory growth protein 1 (RRG1). RRG1 is essential for respiratory growth and required for mitochondrial protein synthesis and vacuolar acidification. The protein is localised to the mitochondrion and belongs to the RRG1 family. RRG1 is found in fungi including Saccharomyces cerevisiae and related yeasts. The full-length protein is N-glycosylated, which is important for correct localisation. The specific function of this C-terminal domain remains to be determined.
