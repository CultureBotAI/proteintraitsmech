identifier: Pfam:PF30374
label: IS481 family transposase, C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in IS481 family transposases from Pseudomonadota (Alpha-, Beta- and Gammaproteobacteria). These transposases contain an N-terminal helix-turn-helix DNA-binding domain ( ), followed by an integrase catalytic core domain ( ), an RNase H-like domain ( ), and this C-terminal domain. The E. coli protein YagA is a member of this family. The specific function of this C-terminal domain remains to be determined.
