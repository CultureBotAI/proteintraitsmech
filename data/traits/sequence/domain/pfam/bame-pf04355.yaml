identifier: Pfam:PF04355
label: Outer membrane protein assembly factor BamE domain
definition: >-
  This domain is found in bacterial outer membrane lipoproteins probably involved in maintaining the structural integrity of the cell envelope, including Outer membrane protein assembly factor BamE from Vibrio cholerae (also known as SmpA). The lipid attachment site is a conserved N-terminal cysteine residue sometimes found adjacent to the OmpA domain ( ). Proteins containing this domain also includes TpgA from Acinetobacter sp. TpgA forms a complex with AtaA, anchoring it to the outer membrane (OM).
