identifier: Pfam:PF29608
label: YgaN domain
definition: >-
  This entry represents a β sandwich domain found in the YgaN protein family, found in Bacillus subtilis. The representative member YgaN from Bacillus subtilis strain 168 is a 178 amino acid uncharacterised protein. The function of this protein remains to be determined.
