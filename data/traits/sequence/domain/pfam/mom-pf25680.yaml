identifier: Pfam:PF25680
label: Mom protein family
definition: >-
  The Mom protein family comprises iron-binding proteins that catalyse the methylcarbamoylation of adenine using acetyl-CoA and also using charge tRNA. This modification, known as momylation, converts adenine into N6-methylcarbamoyl adenine, rendering viral DNA resistant to various host type I and type II restriction enzymes. Approximately 15% of DNA adenine residues are modified, targeting sequences 5'-(C or G)-A-(C or G)-N-(C or T)-3'. This process occurs just before viral DNA packaging and can also modify adenine residues in host cellular DNA, providing a protective mechanism against host defences. This family is related to the DruA family .
