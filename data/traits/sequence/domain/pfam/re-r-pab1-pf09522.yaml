identifier: Pfam:PF09522
label: R.Pab1 restriction endonuclease
definition: >-
  This family includes proteins related to R.Pab1 from Pyrococcus abyssi. R.Pab1 is homodimeric and has a curved anti-parallel β-sheet, which forms a three dimensional shape resembling a 'half pipe' that is responsible for double-strand DNA-binding.
