identifier: Pfam:PF25416
label: GRHL1-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of human Grainyhead-like protein 1 homolog (GRHL1), Transcription factor CP2-like protein 1 and similar animal and fungal proteins. This domain is normally found associated with . Grainyhead/CP2 are highly conserved transcription factors in metazoa that function as key regulators of epithelial differentiation and organ development. The family comprises two distinct groups, CP2 (CCAAT box-binding protein 2) and Grh (grainyhead). All family members share a common domain architecture. Grainyhead/Elf1 was first identified in Drosophila. Three grainyhead-like (Grhl) homologues constitute the Grh subfamily in mammals. Grhl proteins are predominantly expressed in epithelial tissues and are essential regulators of epithelial development and extracellular barrier repair after tissue damage. TFCP2 (LSF, CP2 transcription factor) is a critical regulator of erythroid gene expression. It also regulates the expression of the male-dominant sex-determining gene SRY. TFCP2 can interact with NF-E4 proteins, forming a heteromeric stage selector protein complex (SSP); this complex can bind stage selector element (SSE) and regulate embryonic globin expression in fetal-erythroid cells.
