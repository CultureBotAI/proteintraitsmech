identifier: Pfam:PF08123
label: 'Histone methylation protein DOT1 '
definition: >-
  This entry represents the DOT1 domain. The Dot1 protein (Dot1p) is an histone-lysine N-methyltransferase ( ) that methylates lysine 79 (Lys-79) of histone H3. It was first identified as a Disruptor Of Telomeric silencing in yeast where Dot1p is implicated in gene silencing and localization of the Silent Information Regulator (SIR) complex; in higher eukaryotes the methylation carried out by this enzyme may be used for differentiating chromatin domains. Unlike other histone-lysine methyltransferases (HKMTs), Dot1p displays a Rossmann-like (Class I) S-adenosyl-L-methyionine (SAM)-dependent MT fold while other HKMTs contain the SET domain and hence belong to a whole different structural class. Whereas most HKMTs, such as Suvar3-9 methylate Lys on the N-terminal tails of histones that stick out from the nucleosome, Dot1p substrate (Lys-79 of histone H3) is located in the conserved histone core, in a short turn connecting the first and second helices, exposed on the nucleosome disk surface. In order for Lys-79 of H3 to be methylated by Dot1p, another lysine, Lys-123 of histone H2B, needs to be ubiquitinated. A possible reason put forward for this requirement is that the ubiquitination may create a space between adjacent nucleosomes, permitting access of Dot1p to its substrate. In yeast, different states of methylation on Lys-79 of histone H3 (unmodified, mono-, di- and trimethylated) co-exist at the same time, but no clear function is associated with these different methylation states. The structure of the evolutionary conserved core of Dot1p, the DOT1 domain, has first been described for the yeast Dot1p in complex with S-adenosyl-L-homocysteine (AdoHcy) and then for the human Dot1-like protein (Dot1Lp) in complex with SAM. The DOT1 domain is about 300-350 amino acids long…
