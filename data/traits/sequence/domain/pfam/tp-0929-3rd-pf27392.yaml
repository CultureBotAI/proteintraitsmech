identifier: Pfam:PF27392
label: TP_0929 third domain
definition: >-
  This entry represents the third domain of TP_0929 proteins. The domain is found predominantly in Spirochaetota, with representatives in Treponema and related spirochetes. The function of this domain remains to be determined. This domain is also found in putative PpiC domain-containing proteins from bacteria and is usually associated with .
