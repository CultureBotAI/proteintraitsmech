identifier: Pfam:PF09221
label: Bacteriocin class IId cyclical uberolysin-like
definition: >-
  Circular bacteriocins are antimicrobial peptides produced by a variety of Gram-positive bacteria. They are part of a growing family of ribosomally synthesized peptides with a head-to-tail cyclization of their backbone that are found in mammals, plants, fungi and bacteria and are exceptionally stable. These circular bacteriocins arise after the cleavage of a leader peptide and the formation of a peptide bond between the N and C termini. They contain a saposin-fold, which is similar to the structure of leaderless bacteriocins. Enterocin AS-48 was the first bacteriocin identified with a head-to-tail cyclized backbone that was shown to be ribosomally synthesized. This entry includes AS-48 from Enterococcus, pumilarin from Bacillus safensis, carnocyclin-A from Carnobacterium maltaromaticum, and bacteriocin uberolysin from Streptococcus uberis.
