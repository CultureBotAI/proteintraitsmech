identifier: Pfam:PF27465
label: DNA-binding protein Fis N-terminal domain
definition: >-
  This entry represents the N-terminal domain of DNA-binding protein Fis. The Factor for Inversion Stimulation (FIS) protein is a regulator of bacterial functions, and binds specifically to weakly related DNA sequences. It activates ribosomal RNA transcription, and is involved in upstream activation of rRNA promoters. Found in gammaproteobacterial microbes, the protein has been shown to play a part in the regulation of virulence factors in both Salmonella typhimurium and Escherichia coli. Some of its functions include inhibition of the initiation of DNA replication from the OriC site, and promotion of Hin-mediated DNA inversion. In its C-terminal extremity, FIS encodes a helix-turn-helix (HTH) DNA- binding motif, which shares a high degree of similarity with other HTH motifs of more primitive bacterial transcriptional regulators, such as the nitrogen assimilation regulatory proteins (NtrC) from species like Azobacter, Rhodobacter and Rhizobium. This has led to speculation that both evolved from a single common ancestor.
