identifier: Pfam:PF10862
label: FcoT-like thioesterase domain
definition: >-
  Proteins in this family have a HotDog fold. This family was formerly known as DUF2662. FcoT from M. tuberculosis (also known as (2E)-enoyl-[ACP] glycyltransferase) is involved in the biosynthesis of a unique class of isonitrile lipopeptides (INLPs) that seem to play a role in metal acquisition in M.marinum. Its structure suggested a thioesterase function. Assays showed that this protein was a thioesterase with a preference for long chain fatty acyl groups. The maximal Kcat was observed for palmitoyl-CoA, although longer and shorter molecules were also cleaved. In solution this protein forms a homo-hexameric complex.
