identifier: Pfam:PF04378
label: Ribosomal RNA large subunit methyltransferase D, RlmJ
definition: >-
  Ribosomal methyltransferase RlmJ (YhiR) specifically methylates the adenine in position 2030 of 23S rRNA. Nascent 23S rRNA seems to be the natural substrate. RlmJ seems to be required for the utilisation of extracellular DNA as the sole source of carbon and energy.
