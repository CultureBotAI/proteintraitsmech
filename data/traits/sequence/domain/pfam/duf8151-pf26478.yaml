identifier: Pfam:PF26478
label: Domain of unknown function (DUF8151)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins in this family are predominantly found in Halobacteria, including members of the Haloferacaceae, Natrialbaceae, and Haloarculaceae families. The domain is approximately 70-90 amino acids in length. Proteins in this family contain two transmembrane helices.
