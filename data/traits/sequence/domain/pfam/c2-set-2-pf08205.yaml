identifier: Pfam:PF08205
label: 'CD80-like C2-set immunoglobulin domain '
definition: >-
  This entry represents the C2-set type domains found in the T-cell antigen CD80, as well as in related proteins. CD80 (B7-1) is a glycoprotein expressed on antigen-presenting cells. The shared ligands on CD80 and CD86 (B7-2) deliver the co-stimulatory signal through CD28 and CTLA-4 on T-cells, where CD28 augments the T-cell response and CTLA-4 attenuates it. The basic structure of immunoglobulin (Ig) molecules is a tetramer of two light chains and two heavy chains linked by disulphide bonds. There are two types of light chains: kappa and lambda, each composed of a constant domain (CL) and a variable domain (VL). There are five types of heavy chains: alpha, delta, epsilon, gamma and mu, all consisting of a variable domain (VH) and three (in alpha, delta and gamma) or four (in epsilon and mu) constant domains (CH1 to CH4). Ig molecules are highly modular proteins, in which the variable and constant domains have clear, conserved sequence patterns. The domains in Ig and Ig-like molecules are grouped into four types: V-set (variable; ), C1-set (constant-1; ), C2-set (constant-2; ) and I-set (intermediate; ). Structural studies have shown that these domains share a common core Greek-key β-sandwich structure, with the types differing in the number of strands in the β-sheets as well as in their sequence patterns. Immunoglobulin-like domains that are related in both sequence and structure can be found in several diverse protein families. Ig-like domains are involved in a variety of functions, including cell-cell recognition, cell-surface receptors, muscle structure and the immune system.
