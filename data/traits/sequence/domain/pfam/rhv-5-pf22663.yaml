identifier: Pfam:PF22663
label: Picornavirus coat protein
definition: >-
  This entry represents the VP1 domain found in capsid proteins from picornavirus. The Picornaviridae family includes rhinovirus (common cold), poliovirus, hepatitis A virus, foot-and-mouth disease virus and encephalomyocarditis virus. The capsid coat protein composition of picornaviruses consists of multiple structural proteins arranged to form an icosahedral capsid. Each capsid is made up of 60 protomers, and every protomer generally contains three or four structural proteins; most commonly VP1, VP2, VP3, and VP4. The core structural domain of each of the major capsid proteins (VP1, VP2, and VP3) contains an 8-stranded antiparallel β-barrel (jelly-roll fold).
