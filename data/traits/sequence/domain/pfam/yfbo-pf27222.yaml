identifier: Pfam:PF27222
label: Uncharacterized protein YfbO family
definition: >-
  This entry represents the YfbO protein, an uncharacterised protein found in Enterobacteriaceae. YfbO is found in Escherichia coli and related species within the Enterobacteria. The function of this protein family remains to be determined. In some members, this entry represents a domain, while in YfbO, this is the only domain.
