identifier: Pfam:PF22187
label: Domain of unknown function (DUF6946)
definition: >-
  This domain is found in uncharacterised bacterial proteins either standalone or in combination with other domains. It is distantly related to the type II restriction endonucleases with predicted similar active site architecture. These proteins are most likely endonucleases based on the strict conservation of the putative active site residues.
