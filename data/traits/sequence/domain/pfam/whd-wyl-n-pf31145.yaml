identifier: Pfam:PF31145
label: WYL domain-containing protein, N-terminal winged helix domain
definition: >-
  This entry represents an N-terminal winged helix DNA-binding domain of approximately 77 residues found in WYL domain-containing transcriptional regulators. The domain is followed by the WYL domain ( ) and WCX domain ( ). Some family members also contain a C-terminal PhyH domain ( ). The winged helix fold is a common DNA-binding motif in transcriptional regulators. The entry is restricted to Bacteroidota, including Flavobacteriales, Chitinophagales, Sphingobacteriales, Bacteroidales and Cytophagales.
