identifier: Pfam:PF21903
label: Hypothetical protein BDI_0842
definition: >-
  This entry represents the C-terminal region of BDI_0842 from Parabacteroides distasonis and similar sequences, for which there is a known structure . The structure has similarity to the alpha-lytic protease prodomain-like fold. Proteins in this family have an N-terminal lipoprotein attachment motif. The function of these proteins is unknown.
