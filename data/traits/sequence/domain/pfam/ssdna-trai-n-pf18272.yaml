identifier: Pfam:PF18272
label: single-stranded DNA binding TraI N-terminal subdomain
definition: >-
  This is a subdomain found in TraI present in E. coli. Tra1 is a conjugative relaxase that forms part of the Type IV secretion system. This subdomain, referred to as 2A, is located in N-terminal region of the translocation signal (TSA) domain. TSA is known to reside in a larger ssDNA-binding domain.
