identifier: Pfam:PF26609
label: Domain of unknown function (DUF8191)
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an unique α/β structure consisting of a mixed five-stranded β-sheet in which the last β-strand is antiparallel to the rest, and an α-helix which packs nearly orthogonal to the β-sheet.
