identifier: Pfam:PF25051
label: MCM8 winged helix domain
definition: >-
  The domain represented by this entry is located at the C-terminal of MCM8. It adopts a winged helix fold, and it has a DNA binding activity. This domain is also found in DNA replication licensing factor REC, a distant MCM homologue, which has no, or only a minor, role in DNA repair and recombination in somatic cells. Minichromosome maintenance 8 (MCM8) is a member of the minichromosome maintenance family, which possesses helicase and ATPase activity. It interacts with MCM9 and participates in homologous recombination repair and (HR) repair pathway. MCM8/9 dysfunction can cause genome instability. MCM8/9 complex forms a 3:3 hetero-hexamer in an alternating pattern.
