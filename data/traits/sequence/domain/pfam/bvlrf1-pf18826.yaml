identifier: Pfam:PF18826
label: Bacteroidetes VLRF1 release factor
definition: >-
  This entry represents a domain found in proteins belonging to the VLRF1 clade of the archaeo-eukaryotic RF1 (aeRF1) superfamily. The yeast Vms1 is the founding member the VLRF1 (Vms1-Like Release Factor-1) clade. In addition to the eukaryotic orthologs of Vms1 the VLRF1 clade also contains members from certain bacteria, predominantly bacteroidetes and more divergent versions in certain Archaea. Proteins containing this domain have a conserved glutamine residue in the release factor catalytic loop, suggesting they function as active peptidyl-tRNA hydrolases at the ribosome. This domain is also found in Ankyrin repeat and zinc finger domain-containing protein 1 from humans (ANKZF1), which plays a role in the cellular response to hydrogen peroxide and in the maintenance of mitochondrial integrity under conditions of cellular stress. It is an endonuclease that cleaves polypeptidyl-tRNAs downstream of the ribosome-associated quality control (RQC) pathway to release incompletely synthesized polypeptides for degradation.
