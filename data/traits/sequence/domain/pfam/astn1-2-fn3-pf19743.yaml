identifier: Pfam:PF19743
label: ASTN1/2 Fn3 domain
definition: >-
  This domain localises to the middle of the C-terminal region of ASTN1 and 2, which comprises a fibronectin type III (Fn3) domain. This domain is located between the MACPF and annexin-like domains. The structure of Fn3 from ASTN2 revealed an unexpected feature which has two additional β-strands folded across the core. The junction between EGF-4 and Fn3 domains in ASTN2 (but not in ASTN1) is thought to be an inositol triphosphate binding site. Astrotactin-1 and 2 (ASTN1/2) are integral membrane perforin-like, vertebrate-specific proteins that play critical roles in neurodevelopment. They consist of an N-terminal cytosolic domain suspended between two transmembrane α-helices with a large C-terminal domain, extracellular for ASTN1 and endosome luminal for ASTN2. ASTN1 acts as a neuronal receptor for granule neuron migration along astroglial fibres. ASTN2 forms a complex with ASTN1, which regulates the surface expression of ASTN1. It mediates ASTN1 recycling by promoting its internalisation and transport during endocytosis. ASTN2 is also involved in the planar cell polarity pathway in hair cells.
