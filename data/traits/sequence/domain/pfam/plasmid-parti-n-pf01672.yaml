label: Putative plasmid partition protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of conserved hypothetical proteins from Borrelia burgdorferi, the Lyme disease spirochaete, and similar sequences from Borreliella and Borrelia species. Some members are putative plasmid partition proteins.
