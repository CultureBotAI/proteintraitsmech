identifier: Pfam:PF19584
label: MCAfunc domain
definition: >-
  MCAfunc domain (MCAfunc) is located in the N-terminal region of a mechanosensitive channel protein MID1-COMPLEMENTING ACTIVITY (MCA). MCAfunc represents the provisionally advocated ARPK domain (Amino-terminal domain of Rice putative Protein Kinases), overlapping with the EF hand-like region at the N-terminal. In MCA proteins, MCAfunc has Ca2 influx activity and is proposed to be a functional domain of MCAs. MCAfunc is exclusively observed in streptophytes and exists not only in MCA but also in E3 ubiquitin ligase-like proteins, ARO3-like proteins and and protein kinases. In the most basal plant lineage, charophytes, MCAfunc is only found in E3 ubiquitin ligase-like proteins and protein of presently unknown function, while MCA proteins are exclusively found in land plants, from bryophytes to angiosperms.
