identifier: Pfam:PF18243
label: Metal-independent restriction enzyme BfiI DNA binding domain
definition: >-
  This domain is found in the metal-independent restriction enzyme BfiI present in Bacillus firmus. This domain is found at the C terminus of the protein and is responsible for DNA binding. The domain exhibits a β-barrel-like structure similar to the effector DNA-binding domain of the Mg2+ dependent restriction enzyme EcoRII and to the B3-like DNA-binding domain of plant transcription factors.
