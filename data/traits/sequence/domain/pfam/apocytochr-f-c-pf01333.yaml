identifier: Pfam:PF01333
label: Apocytochrome F, C-terminal
definition: >-
  The cytochrome b6f integral membrane protein complex transfers electrons between the two reaction centre complexes of oxygenic photosynthetic membranes, and participates in formation of the transmembrane electrochemical proton gradient by also transferring protons from the stromal to the internal lumen compartment. The cytochrome b6f complex contains four polypeptides: cytochrome f (285 aa); cytochrome b6 (215 aa); Rieske iron-sulphur protein (179 aa); and subunit IV (160 aa). In its structure and functions, the cytochrome b6f complex bears extensive analogy to the cytochrome bc1 complex of mitochondria and photosynthetic purple bacteria; cytochrome f (cyt f) plays a role analogous to that of cytochrome c1, in spite of their different structures. This family is found in bacteria and plants.
