identifier: Pfam:PF28864
label: F59B10.3 N-terminal domain
definition: >-
  This entry represents a conserved N-terminal domain found in nematode proteins, including F59B10.3 from Caenorhabditis elegans. The domain is approximately 40 amino acids in length. Members include uncharacterised membrane proteins with single transmembrane helices. Their specific cellular function remains to be determined.
