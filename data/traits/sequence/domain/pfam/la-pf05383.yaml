identifier: Pfam:PF05383
label: La domain
definition: >-
  This domain is found at the N terminus of La RNA-binding proteins as well as other proteins. Human Ro ribonucleoproteins (RNPs) are composed of one of the four small Y RNAs and at least two proteins, Ro60 and La. The La protein is a 47kDa polypeptide that frequently acts as an autoantigen in systemic lupus erythematosus and Sjogren's syndrome. In the nucleus, La acts as a RNA polymerase III (RNAP III) transcription factor, while in the cytoplasm, La acts as a translation factor. In the nucleus, La binds to the 3'UTR of nascent RNAP III transcripts to assist in folding and maturation. In the cytoplasm, La recognises specific classes of mRNAs that contain a 5'-terminal oligopyrimidine (5'TOP) motif known to control protein synthesis. The specific recognition is mediated by the N-terminal domain of La, which comprises a La motif and a RNA recognition motif (RRM). The La motif adopts an α/β fold that comprises a winged-helix motif. Homologous La domain-containing proteins have been identified in a wide range of organisms except Archaea, bacteria and viruses.
