identifier: Pfam:PF26326
label: YtzJ protein
definition: >-
  This entry represents the YtzJ protein from B. subtilis and related bacterial proteins. This protein forms a small compact α/β domain composed of a three-stranded β sheet with two α-helices packed on one side. This protein family seems specific to bacilli. Structure prediction suggests this protein might form a homodimer. In the STRING network this protein is associated with proteins involved in sporulation.
