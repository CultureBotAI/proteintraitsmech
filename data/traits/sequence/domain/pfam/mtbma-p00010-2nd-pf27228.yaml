identifier: Pfam:PF27228
label: MTBMA_p00010 P-loop domain
definition: >-
  This entry represents the second domain of MTBMA_p00010, an uncharacterised protein from Methanothermobacter marburgensis. MTBMA_p00010 is a 804 amino acid protein (gene MTBMA_p00010) located on plasmid pMTBMA4. This domain adopts a P-loop fold, which is typically associated with nucleotide binding and hydrolysis activities. The protein is found in methanogenic archaea. The specific function of this P-loop domain remains to be determined. This entry also includes uncharacterised prokaryotic proteins and putative bacterial Toprim domain-containing proteins.
