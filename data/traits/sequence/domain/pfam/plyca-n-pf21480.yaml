identifier: Pfam:PF21480
label: PlyCA, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of PlyCA from Fischettivirus C1, the catalytic subunit of the potent lysin PlyC that is specific for streptococcal virus. PlyCA contains three distinct domains. This domain, which folds into a loose bundle of α-helices, is considered as a putative glycosyl hydrolase (GyH) domain, as it has similarity to class IV family 19 chitinases.
