identifier: Pfam:PF25400
label: FAN protein N-terminal PH domain
definition: >-
  This entry represents the pleckstrin homology (PH) domain found at the N-terminal of the Factor Associated with Neutral sphingomyelinase activation (FAN) protein and its orthologue BEACH domain-containing protein lvsF in Dictyostelium discoideum. The PH domain binds specifically to phosphatidylinositol 4,5-bisphosphate (PIP2) and is essential for the plasma membrane localisation of FAN. This domain interacts physically and functionally with the adjacent BEACH domain, and both are required for TNF-induced neutral sphingomyelinase activation. The FAN proteins are involved in coupling the p55 TNF-receptor (TNF-R55/TNFR1) to neutral sphingomyelinase (N-SMASE). This interaction is crucial for the regulation of ceramide production by N-SMASE. The proteins specifically bind to the N-smase activation domain of TNF-R55, suggesting a role in signal transduction pathways associated with TNF-R55. The presence of a BEACH domain indicates potential involvement in vesicular trafficking or membrane dynamics.
