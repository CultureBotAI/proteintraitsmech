identifier: Pfam:PF28762
label: MDM34 helical domain
definition: >-
  This entry represents a helical domain found in Mdm34 (mitochondrial distribution and morphology protein 34). Mdm34 is a component of the ERMES (endoplasmic reticulum-mitochondria encounter structure) complex, which serves as a molecular tether connecting the endoplasmic reticulum and mitochondria. The ERMES complex is composed of Mmm1, Mdm10, Mdm12 and Mdm34, and is involved in the control of mitochondrial shape and protein biogenesis, and functions in nonvesicular lipid trafficking between the ER and mitochondria. Mdm34 is localised to the mitochondrion outer membrane and contains an N-terminal SMP-LTD domain that can bind glycerophospholipids. This helical domain is found C-terminal to the SMP-LTD domain. The function of this domain remains to be determined.
