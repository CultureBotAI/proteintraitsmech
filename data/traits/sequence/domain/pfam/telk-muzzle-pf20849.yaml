identifier: Pfam:PF20849
label: Protelomerase, muzzle domain
definition: >-
  This domain is found in protelomerase from Klebsiella phage phiKO2 (TelK) and similar proteins from tailed bacteriophages and bacterial prophages mainly from gammaproteobacteria. TelK is a hairpin telomere resolvase with DNA cleavage-rejoining activity that resolves the catenated circular dimer produced from the bidirectional replication of a chromosome. The core of the TelK monomer consists of an N-terminal domain and a catalytic domain connected by a long α-helical linker. However, there are two extensions of the protein: a C-terminal DNA binding domain named the stirrup ( ) and an N-terminal domain. The latter has an insertion termed the muzzle, represented in this entry, which folds into two long α-helices. This protruding element is packed against the DNA-binding catalytic and N-terminal domains of the opposite subunit in each dimer.
