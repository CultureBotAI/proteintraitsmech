identifier: Pfam:PF26533
label: NTF2-like domain
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the Kinetoplastea class, which includes organisms such as Trypanosoma and Leishmania. The proteins in this family are approximately 110-150 amino acids in length. This domain belongs to the NTF2-like superfamily (CL0051), characterised by a partial β-barrel structure with α-helices enclosing a solvent-accessible cavity. Members of this superfamily display remarkable sequence diversity and serve diverse functions, including both enzymatic and non-enzymatic roles often involving small molecule binding or modification.
