identifier: Pfam:PF01782
label: RimM N-terminal domain
definition: >-
  The RimM protein is essential for efficient processing of 16S rRNA. It was shown to have affinity for free ribosomal 30S subunits but not for 30S subunits in the 70S ribosomes. RimM contains a characteristic N-terminal domain and a PRC-barrel C-terminal domain, linked by an unstructured region. The N-terminal domain folds into a closed β-barrel structure.
