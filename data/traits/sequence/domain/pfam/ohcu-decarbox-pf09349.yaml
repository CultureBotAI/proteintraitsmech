identifier: Pfam:PF09349
label: OHCU decarboxylase
definition: >-
  The proteins in this entry are OHCU decarboxylase, an enzyme of the purine catabolism that catalyses the conversion of OHCU into S(+)-allantoin; it is the third step of the conversion of uric acid (a purine derivative) to allantoin. Step one is catalysed by urate oxidase ( ) and step two is catalysed by hydroxyisourate hydrolase ( ).
