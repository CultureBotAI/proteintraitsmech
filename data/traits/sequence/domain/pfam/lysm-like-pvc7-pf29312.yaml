identifier: Pfam:PF29312
label: PVC7, LysM-like domain
definition: >-
  This entry represents LysM-like domain found in PVC7 and related proteins. Photorhabdus Virulence Cassettes (PVCs) are eCISs produced by bacteria of the Photorhabdus genus, which can translocate toxins across eukaryotic target membranes. PVC7 is a tube initiator and consists of two domains. This entry represents the C-terminal. This domain interacts with the sheath initiator PVC4 and the baseplate wedge protein PVC12. It plays an important role in the stabilization of the baseplate-trunk interface.
