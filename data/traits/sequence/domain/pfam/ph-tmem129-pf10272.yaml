identifier: Pfam:PF10272
label: TM129 PH-like domain
definition: >-
  This entry represents the central PH-like domain found in TM129, a transmembrane E3 ubiquitin ligase that functions within ER-associated degradation (ERAD) complexes. TMEM129 is a tri-spanning transmembrane protein with a cytosolic C terminus containing an unconventional C4C4-type RING finger domain that catalyses ubiquitination. The protein resides within ER-resident dislocation complexes together with Derlin-1, Derlin-2, VIMP and p97. TMEM129 preferentially associates with the E2 ubiquitin-conjugating enzyme UBE2J2. Localisation to the endoplasmic reticulum positions the RING domain in the cytosol where it catalyses polyubiquitination of ER misfolded proteins targeted for retrotranslocation. TMEM129 is conserved in metazoans, with orthologues traceable to the unicellular metazoan ancestor Capsaspora owczarzaki, but is absent from yeast. The protein can be exploited by human cytomegalovirus protein US11 to mediate HLA class I downregulation via ERAD-dependent degradation.
