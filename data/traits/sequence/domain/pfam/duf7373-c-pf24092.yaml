identifier: Pfam:PF24092
label: Domain of unknown function (DUF7373) C-terminal
definition: >-
  This domain is found C-terminal in uncharacterised proteins from actinomycetes. It is predicted to adopt a seven-stranded antiparallel β-sheet with similarity to Mog1p/PsbP-like domains. Some proteins containing this domain have a lipoprotein attachment motif at the N terminus suggesting they may be associated with the membrane. This domain is usually found in two copies that share little sequence similarity to each other.
