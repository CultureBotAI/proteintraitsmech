identifier: Pfam:PF22741
label: DSP-PTPase phosphatase fused to NAD+ Kinase
definition: >-
  This domain is found in NAD kinase 2 from Arabidopsis thaliana, related sequences from plants and uncharacterised sequences from bacteria. While the land plant version of this DSP-PTPase domain is likely inactive as the catalytic cysteine is replaced by serine or threonine, the rest are predicted to be active. Keeping with the proposed sugar phosphatase activity in related members, these domains could potentially function as phosphatases converting NADP+ to NAD+.
