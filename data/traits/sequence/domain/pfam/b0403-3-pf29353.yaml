identifier: Pfam:PF29353
label: Uncharacterized protein B0403.3
definition: >-
  This entry represents uncharacterized protein B0403.3 found in Caenorhabditis elegans. The protein is predicted to be secreted and contains a signal peptide. The protein contains two predicted N-linked glycosylation sites at asparagine residues 246 and 252. Expression analysis indicates that the gene is expressed in adult organisms. The function of this protein remains to be determined. This protein contains an all-helical fold.
