identifier: Pfam:PF25370
label: HTH three-helical bundle
definition: >-
  This HTH (helix-turn-helix) three-helical bundle domain is found in uncharacterised plant proteins. It has a very weak but detectable similarity to known HTH domains. It is predicted to fold into a three-helical bundle with an up-and-down anticlockwise topology and right-handed twist. This domain contains semi-conserved TSKALR sequence motif, predicted to be located on the C-terminal helix, which could potentially be involved in DNA interaction.
