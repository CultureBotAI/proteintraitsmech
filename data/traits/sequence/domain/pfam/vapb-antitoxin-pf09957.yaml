identifier: Pfam:PF09957
label: Bacterial antitoxin of type II TA system, VapB
definition: >-
  VapB is the antitoxin of a bacterial toxin-antitoxin gene pair. The cognate toxin is VapC ( ). The family contains several related antitoxins from Cyanobacteria and Actinobacterial families. Antitoxins of this class carry an N-terminal ribbon-helix-helix domain, RHH, that is highly conserved across all type II bacterial antitoxins, which dimerises with the RHH domain of a second VapB molecule. A hinge section follows the RHH, with an additional pair of flexible α helices at the C terminus. This C terminus is the Toxin-binding region of the dimer, and so is specific to the cognate toxin, whereas the RHH domain has the specific function of lying across the RNA-binding groove of the toxin dimer and inactivating the active-site - a more general function of all antitoxins.
