identifier: Pfam:PF24926
label: ACT domain-containing protein ACR9, C-terminal
definition: >-
  This ACT domain is found at the C-terminal of ACT domain-containing proteins ACR9/10 from from Arabidopsis thaliana and similar plant proteins. They may bind amino acids. Plant ACT DOMAIN REPEAT (ACR) proteins may also serve as nutrient sensors. ACR9 might function as a repressor in glucose (Glc) signalling pathways. It is highly expressed in the leaves, and its expression is downregulated by sugars.
