identifier: Pfam:PF07603
label: Lcl C-terminal domain
definition: >-
  This domain, previously known as DUF1566, is found C-terminal in the Legionella collagen-like protein (Lcl) and related proteins mainly from bacteria. Lcl is an extracellular peripheral membrane protein that recognises sulphated glycosaminoglycans (GAGs) on the surface of eukaryotic cells, but also stimulates bacterial aggregation in response to divalent cations. This domain has a structural similarity to C-type lectins and is involved in glycan recognition.
