identifier: Pfam:PF17255
label: EbsA-like protein
definition: >-
  The pore-forming protein EbsA is one of three proteins (EbsA, EbsB, and EbsC) that affects the expression of a chromosomally encoded receptor, named binding substance (BS). In Enterococcus faecalis (Streptococcus faecalis), transfer of the conjugative plasmid pCF10 involves production of a plasmid-encoded aggregation substance in response to stimulation by a pheromone secreted by recipient cells. The aggregation substance then facilitates attachment to recipient cells via the BS receptor. Both ebsA and ebsB encode peptides likely to function in cell wall metabolism, where EbsA may assist in the localisation of EbsB to the cell wall. EbsC may encode a product that suppresses the function or expression of EbsB.
