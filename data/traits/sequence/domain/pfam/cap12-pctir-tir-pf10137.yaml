identifier: Pfam:PF10137
label: CAP12/Pycsar effector protein, TIR domain
definition: >-
  This entry represents a TIR domain found in prokaryotic nucleotide-binding proteins, including CD-NTase-associated protein 12 (CAP12) and Pycsar effector proteins ( ). Members of this entry are part of anti phage resistance systems that provide immunity against bacteriophage. CAP12 is part of the CBASS (cyclic oligonucleotide-based antiphage signaling system) and binds c-di-GMP and 3'-3'-cGAMP, cyclic nucleotides synthesized by the CD-NTase protein in response to infection that serve as specific second messenger signals to activate a diverse range of effectors, leading to bacterial cell death and thus abortive phage infection. Pycsar effector proteins are part of the Pycsar (pyrimidine cyclase system for anti phage resistance) and are activated by cyclic nucleotides produced by the pyrimidine cyclase (PycC) in response to infection. The TIR effector domain oligomerizes and functions as NADase that deplete the cell of NAD+.
