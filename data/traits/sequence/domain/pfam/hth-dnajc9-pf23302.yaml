identifier: Pfam:PF23302
label: DNAJC9 HTH domain
definition: >-
  This domain is found in human DnaJ homolog subfamily C member 9 (DNAJC9) and related eukaryotic proteins. DNAJC9 acts as a dual histone chaperone and heat-shock co-chaperone. This protein was shown to also assemble histones onto DNA in vitro. The domain represented in this entry has a weak similarity to helix-turn-helix (HTH) domains and it is predicted to adopt similar three helical bundle.
