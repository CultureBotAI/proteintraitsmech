identifier: Pfam:PF01171
label: PP-loop domain
definition: >-
  The structure of tRNA(Ile)-lysidine synthetase consists of an N-terminal dinucleotide-binding fold domain (NTD), and a C-terminal globular domain (CTD). The structure of the NTD closely resembles that of a P-loop "N-type" ATP pyrophosphatase. tRNA(Ile)-lysidine and 2-thiocytidine synthase both belong to the PP-loop superfamily.
