identifier: Pfam:PF24637
label: DEAH11 RRM domain
definition: >-
  This RNA recognition motif (RRM) containing domain is found in the ATP-dependent RNA helicase DEAH11, DEAH12 from Arabidopsis thaliana and related plant proteins. This domain shares detectable similarity to RNA binding domains and is predicted to adopt an α/β structure with similar topology.
