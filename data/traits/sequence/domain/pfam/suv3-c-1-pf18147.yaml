identifier: Pfam:PF18147
label: Suv3 C-terminal domain 1
definition: >-
  This domain is found in Suv3 present in Homo sapiens. Suv3 is an NTP-dependent RNA/DNA helicase that is necessary for the degradation of mature mtRNAs. Suv3 has been found to interact in vitro with polynucleotide phosphorylase. This domain makes up part of the C-terminal domain.
