identifier: Pfam:PF27377
label: Methanothermobacter ORF3 family
definition: >-
  This entry represents the ORF3 family of uncharacterised proteins found exclusively in methanogenic archaea. The prototype protein is encoded by plasmid pFV1 in Methanothermobacter thermautotrophicus, which is associated with restriction-modification systems. The proteins are approximately 197 amino acids in length. The function of this protein family remains to be determined.
