identifier: Pfam:PF22112
label: OmcA-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of OmcA ( ) from Shewanella oneidensis and similar proteins. OmcA is a decaheme c-type cytochrome homologue of MtrF and MtrC. OmcA may be able to receive electrons from the MtrCAB or MtrFDE complexes through the interaction with MtrC or MtrF. OmcA, MtrF and MtrC are involved in the use of manganese and iron as terminal electron acceptors.
