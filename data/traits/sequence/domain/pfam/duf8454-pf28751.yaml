identifier: Pfam:PF28751
label: Domain of unknown function (DUF8454)
definition: >-
  This entry represents a domain found in uncharacterised proteins from Fungi which may adopt a similar structure to the hyaluronidase post-catalytic domain, consisting of a five helical bundle with an up-and-down topology. In some members, this domain is duplicated, while other members are mono domain proteins.
