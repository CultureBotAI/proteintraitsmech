identifier: Pfam:PF03172
label: HSR domain
definition: >-
  The Sp100 protein is a constituent of nuclear domains, also known as nuclear dots (NDs). An ND-targeting region that coincides with a homodimerisation domain was mapped in Sp100. Sequences similar to the Sp100 homodimerization/ND-targeting region occur in several other proteins and constitute a novel protein motif, termed HSR domain (for homogeneously-staining region). This domain can also be found in Vertebrate AutoImmune REgulator (AIRE) protein, a transcription regulator predominantly expressed in thymus medullary epithelial cells which also localises to nuclear dots.
