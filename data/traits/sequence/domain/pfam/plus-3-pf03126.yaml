identifier: Pfam:PF03126
label: Plus-3 domain
definition: >-
  The yeast Paf1 complex consists of Pfa1, Rtf1, Cdc73, Ctr9, and Leo1. The complex regulates histone H2B ubiquitination, histone H3 methylation, RNA polymerase II carboxy-terminal domain (CTD) Ser2 phosphorylation, and RNA 3' end processing. The conservation of Paf1 complex function in higher eukaryotes has been confirmed in human cells, Drosophila and Arabidopsis. The Plus3 domain spans the most conserved regions of the Rtf1 protein and is surrounded by regions of low complexity and coiled-coil propensity. It contains only a limited number of highly conserved amino acids, among which are three positively charged residues that gave the Plus3 domain its name. The capacity to bind single-stranded DNA is at least one function of the Plus3 domain. The plus-3 domain is about 90 residues in length and is often found associated with the GYF domain ( ). The Plus3 domain structure consists of six α-helices intervened by a sequence of six β-strands in a mixed α/β topology. β-strands 1, 2, 5, and 6 compose a four-stranded antiparallel β-sheet with a β-hairpin insertion formed by strands 3 and 4. The N-terminal helices α1-α3 and C-terminal helix α6 pack together to form an α subdomain, while the β-strands and the small 3(10) helix α4 form a β-subdomain. The two subdomains pack together to form a compact, globular protein.
