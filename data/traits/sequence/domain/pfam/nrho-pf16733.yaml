identifier: Pfam:PF16733
label: Rhomboid N-terminal domain
definition: >-
  Rhomboids are integral membrane proteases that release cellular signals from membrane-bound substrates through a general signal transduction mechanism known as regulated intramembrane proteolysis (RIP). This entry represents the N-terminal cytosolic domain of rhomboid intramembrane proteases from Pseudomonas. This domain, known as NRho, consists of a novel α/β fold and displays a strong and specific association with micelles of the zwitterionic lysophospholipid-analogue C16PN.
