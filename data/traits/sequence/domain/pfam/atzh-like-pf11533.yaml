identifier: Pfam:PF11533
label: AtzH-like
definition: >-
  This entry represents a family of bacterial proteins previously known as DUF3225, including AtzH from Pseudomonas sp. ( ). AtzH is thought to be an amidase responsible for converting 1,3-dicarboxyurea to allophanate. This protein, which adopts a dimeric assembly, shows a seven-stranded anti-parallel β-sheet and three helices.
