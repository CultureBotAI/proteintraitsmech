identifier: Pfam:PF30787
label: Domain of unknown function (DUF8738)
definition: >-
  This entry represents a domain of approximately 100 residues. The domain can occur once or twice within a protein, sometimes in tandem. Some members are predicted lipoproteins. This family is found predominantly in Cyanobacteriota and Actinomycetota. The function of this domain remains to be determined.
