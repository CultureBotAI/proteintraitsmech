identifier: Pfam:PF30220
label: PA0049, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein PA0049 from Pseudomonas aeruginosa and related bacteria. This domain exhibits similarity to peptidase C15 family proteins (pyroglutamyl peptidase I-like) which likely provides peptidase activity.
