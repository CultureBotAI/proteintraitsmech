identifier: Pfam:PF21695
label: Transcription regulator GlnR, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Transcription regulator GlnR from Amycolatopsis mediterranei (also known as Global nitrogen response regulator GlnR, ) and similar sequences predominantly found in actinobacteria. GlnR plays a key role in the global regulation of nitrogen metabolism. It belongs to the OmpR/PhoB subfamily. This domain shows five alternating β-strands and α-helices that form a five-stranded parallel β-sheet in the middle surrounded by two α-helices on one side and three on the other, showing great structure similarity with most of the known structures of the typical RR receiver domains. This domain is usually found associated with .
