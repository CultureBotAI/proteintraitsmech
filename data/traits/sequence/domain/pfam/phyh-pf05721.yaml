identifier: Pfam:PF05721
label: Phytanoyl-CoA dioxygenase (PhyH)
definition: >-
  This family includes several eukaryotic phytanoyl-CoA dioxygenase (PhyH) proteins as well as several bacterial deoxygenases. PhyH is a peroxisomal enzyme catalysing the first step of phytanic acid alpha-oxidation. PhyH deficiency causes Refsum's disease (RD), which is an inherited neurological syndrome biochemically characterised by the accumulation of phytanic acid in plasma and tissues. The bacterial deoxygenase 2-aminoethylphosphonate dioxygenase (PhnY) hydroxylates 2-aminoethylphosphonic acid to form (2-amino-1-hydroxyethyl)phosphonic acid, which is then oxidatively converted to inorganic phosphate and glycine by 2-amino-1-hydroxyethylphosphonate dioxygenase (PhnZ). Ectoine dioxygenase from Streptomyces coelicolor (EctD) is involved in the biosynthesis of 5-hydroxyectoine, called compatible solute, which helps organisms to survive extreme osmotic stress by acting as a highly soluble organic osmolyte.
