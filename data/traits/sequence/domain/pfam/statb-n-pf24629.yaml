identifier: Pfam:PF24629
label: Signal transducer and activator of transcription b N-terminal
definition: >-
  This entry represents the N-terminal domain of Signal transducer and activator of transcription b (STATB) from C.elegans and similar proteins from nematodes. STATB can have a dual function, signal transduction and activation of transcription. It is required, together with with transcription factor elt-3, for up-regulation of the vacuolar H+-ATPase and acceleration of lysosome maturation at molt. It plays a role in the innate immune response to molting and injury of the adult epidermis where it positively regulates the expression of epidermal antimicrobial peptides.
