identifier: Pfam:PF29359
label: MTD-1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of MTD-1, a membrane protein involved in mechanosensory transduction in Caenorhabditis elegans and similar proteins from nematodes. MTD-1 is a single-pass type I membrane protein localised to the extracellular side of the cell membrane in touch receptor neurons. The full-length protein plays a role in touch sensitivity, and RNAi knockdown enhances the touch-insensitive phenotype of mec-6 mutants. The protein is expressed in embryos and larvae, specifically in the six touch receptor neurons during L2 and L3 larval stages. The protein contains multiple N-linked glycosylation sites. The specific function of this domain remains to be determined.
