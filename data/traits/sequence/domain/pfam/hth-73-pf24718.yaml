identifier: Pfam:PF24718
label: HTH-like domain
definition: >-
  This entry represents a domain that covers the whole length of the sequence in a group of uncharacterised bacterial proteins. Proteins in this family are approximately 80 amino acids in length. These proteins structurally resemble a HTH domain. They are often found genomically associated with likely restriction modification systems. Structure prediction suggests that these domains homodimerise and bind to the major groove of double-stranded DNA. This domain is also found in longer uncharacterised bacterial proteins in combination with other domains, such as .
