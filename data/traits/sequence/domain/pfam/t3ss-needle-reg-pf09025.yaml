identifier: Pfam:PF09025
label: YopR, type III needle-polymerisation regulator
definition: >-
  Proteins in this entry are type III secretion system effectors, named differently in different species and designated YopR in Yersinia and AscH in Aeromonas salmonicida subsp. salmonicida. Yersinia employs a type III secretion system (T3SS) to secrete and translocate virulence factors into to the cytoplasm of mammalian host cells. One of the secreted virulence factors is YopR (Yersinia outer protein R, named Type 3 secretion system regulator YopR), encoded by the YscH (Yersinia secretion H) gene. This Yop protein is unusual in that it is released to the extracellular environment rather than injected directly into the target cell as are most Yop proteins. These are regulatory proteins that control the polymerisation of the needle.
