identifier: Pfam:PF30645
label: Mcf1 N-terminal effector domain
definition: >-
  This entry represents the N-terminal effector domain (NED) of the bacterial Makes caterpillars floppy 1 (Mcf1) toxin. At the cellular level, activity of the toxin leads to apoptotic blebbing of membranes and fragmentation of nuclei. Such apoptosis in the insect midgut cells leads to a rapid loss of body turgor and the characteristic 'floppy' phenotype of the intoxicated insect and subsequent death. Mcf1 undergoes three autocleavage reactions. The first cleavage site is located near the NED domain and results in its release. NED domain is highly toxic in eukaryotic cells.
