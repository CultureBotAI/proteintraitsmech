identifier: Pfam:PF22363
label: MrkH-like, YcgR-like domain
definition: >-
  This entry represents the YcgR-like domain found at the N-terminal of MrkH ( ) from Klebsiella pneumoniae and similar sequences. Some members included in this contain a PilZ domain ( ) at the C-terminal. MrkH is a c-di-GMP-related transcriptional regulator that affects type 3 fimbrial expression in response to cellular c-di-GMP level, playing and important role in biofilm formation. This protein binds to the promoter regulation fragments of MrkHI and MrkA mainly through its PilZ domain and this YcgR-like domain also participates in DNA-binding.
