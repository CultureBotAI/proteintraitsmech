identifier: Pfam:PF29745
label: VPS3 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of vacuolar protein sorting-associated protein 3 (VPS3) from Saccharomyces cerevisiae and similar proteins from saccharomycetales. This domain is found downstream of the CNH domain in VPS3 proteins. The domain is found in VPS3 family proteins involved in vacuolar protein sorting. VPS3 is required for sorting and processing of soluble vacuolar proteins, integrity of vacuolar morphology, efficient segregation of vacuolar material during the cell cycle, vacuolar acidification, and assembly of the vacuolar H(+)-ATPase. VPS3 is a component of the CORVET tethering complex and localises to the cytoplasm. The specific function of this domain remains to be determined.
