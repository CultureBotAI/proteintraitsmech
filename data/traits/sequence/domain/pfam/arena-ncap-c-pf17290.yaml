identifier: Pfam:PF17290
label: Arenavirus nucleocapsid C-terminal domain
definition: >-
  Arenaviridae are single stranded RNA viruses. The arenaviridae S RNAs that have been characterised include conserved terminal sequences, an ambisense arrangement of the coding regions for the precursor glycoprotein (GPC) and nucleocapsid (N) proteins and an intergenic region capable of forming a base-paired "hairpin" structure. The mature glycoproteins that result are G1 and G2 and the N protein. The C-terminal domain of the nucleocapsid protein (that encapsulates the viral ssRNA) in arenaviridae has an RNaseH-like fold. This domain contains 3'-5' exoribonuclease activity involved in suppressing interferon induction. It forms a typical α/β/α sandwich architecture and contains a CCHE zinc-binding site near the 3'-5' exonuclease active site.
