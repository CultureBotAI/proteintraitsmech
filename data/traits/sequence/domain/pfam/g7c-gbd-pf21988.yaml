identifier: Pfam:PF21988
label: Podovirus tailspike protein Galactose-binding domain-like
definition: >-
  This entry represents the Tailspike galactose-binding domain-like domain, also known as domain 5 (d5) of the tailspike receptor-binding protein (RBP) gp63.1 of bacteriophage G7C. This domain is structurally similar to carbohydrate-binding modules (CBMs) and is involved in substrate binding. Specifically, gp63.1 deacetylates surface polysaccharides of E. coli 4s using the esterase domain located within d5, while other domains mediate the interaction between gp63.1 and gp66 to form a stable complex. CBMs, including d5, are non-catalytic domains found in multidomain polysaccharide depolymerases where they play a role in substrate binding and determine the substrate specificity of the entire enzyme.
