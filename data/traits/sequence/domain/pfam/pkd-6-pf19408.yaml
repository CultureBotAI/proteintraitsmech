identifier: Pfam:PF19408
label: PKD-like domain
definition: >-
  This entry represents the presumed PKD-like domain found as tandem repeats in bacterial cell surface proteins. In some proteins this domain is associated with PA14 or DUF11 domains . Members of this family are predominantly found in Bacteroidetes.
