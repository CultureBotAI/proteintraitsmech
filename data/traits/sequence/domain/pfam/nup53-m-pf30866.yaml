identifier: Pfam:PF30866
label: Nucleoporin NUP53 middle domain
definition: >-
  This entry represents the middle domain of fungal nucleoporin NUP53, a component of the nuclear pore complex (NPC). The domain adopts an RRM-like α/β plait fold. NUP53 is part of a tetrameric module with NUP192 or NUP188, NUP170, and NIC96.
