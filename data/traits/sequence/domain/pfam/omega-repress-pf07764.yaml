identifier: Pfam:PF07764
label: Omega Transcriptional Repressor
definition: >-
  The omega transcriptional repressor regulates expression of genes involved in copy number control and stable maintenance of plasmids. The omega protein belongs to the structural superfamily of MetJ/Arc repressors featuring a ribbon-helix-helix DNA-binding motif with the β-ribbon located in and recognising the major groove of operator DNA.
