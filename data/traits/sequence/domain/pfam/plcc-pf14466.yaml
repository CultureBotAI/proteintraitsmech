identifier: Pfam:PF14466
label: PLAT/LH2 and C2-like Ca2+-binding lipoprotein
definition: >-
  A small family of bacterial proteins, found in several species from bacteroidetes. Structure determination (NMR and Xray) shows an immunoglobulin β-barrel fold. Multiple homologues have been found in human gut metagenomics data sets. Structural experimentation shows it to share features with two well-established protein architectures in the SCOP database, ie, C2 (calcium/lipid-binding domain) of the C2 domain ( ) and the PLAT/LH2 domain ( ). The C2 and PLAT/LH2 domains bind Ca2+ in their functions of targeting proteins to cell-membranes; this domain is also shown to bind Ca2+ as well as to be a novel fold.
