identifier: Pfam:PF31021
label: Rabenosyn-5 middle domain
definition: >-
  This entry represents a middle domain of approximately 100 residues found in Rabenosyn-5 (RBSN/ZFYVE20) and its orthologues including PEP7/VAC1 in fungi. The domain forms a three-helix bundle and is positioned between the FYVE domain ( ) and the Rab-binding domains ( ). Rabenosyn-5 functions as a Rab4/Rab5 effector protein involved in early endocytic membrane fusion and recycling endosome trafficking. Mutations in human RBSN cause neurodevelopmental disorders including Kariminejad syndrome. The specific function of this middle domain remains to be determined.
