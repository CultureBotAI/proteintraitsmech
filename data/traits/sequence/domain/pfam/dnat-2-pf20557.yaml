identifier: Pfam:PF20557
label: Putative DnaT-like ssDNA binding protein
definition: >-
  This presumed domain is functionally uncharacterised. This domain is found in bacteria and viruses, and is approximately 110 amino acids in length. This domain is predicted to contain a complex four helical bundle structure. The structure shows similarity to the single stranded DNA-binding protein DnaT.
