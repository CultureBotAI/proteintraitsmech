identifier: Pfam:PF22901
label: Ferlin dsRNA-binding domain-like domain
definition: >-
  This entry represents a domain which structurally resembles double stranded RNA binding domains, which is found in ferlin proteins. Ferlins are involved in vesicle fusion events. Ferlins and other proteins, such as synaptotagmins, are implicated in facilitating the fusion process when cell membranes fuse together. There are six known human Ferlins: Dysferlin (Fer1L1), Otoferlin (Fer1L2), Myoferlin (Fer1L3), Fer1L4, Fer1L5, and Fer1L6. Defects in these genes can lead to a wide range of diseases including muscular dystrophy (dysferlin), deafness (otoferlin), and infertility (fer-1, fertilization factor-1). Structurally they have 6 tandem C2 domains, designated as (C2A-C2F) and a single C-terminal transmembrane domain, though there is a new study that disputes this and claims that there are actually 7 tandem C2 domains with another C2 domain inserted between C2D and C2E. In a subset of them (Dysferlin, Myoferlin, and Fer1) there is an additional conserved domain called DysF.
