identifier: Pfam:PF00941
label: FAD binding domain in molybdopterin dehydrogenase
definition: >-
  Oxidoreductases, that also bind molybdopterin, have essentially no similarity outside this common domain. They include aldehyde oxidase ( ), that converts an aldehyde and water to an acid and hydrogen peroxide, and xanthine dehydrogenase ( ), that converts xanthine to urate. These enzymes require molybdopterin and FAD as cofactors and have and two 2FE-2S clusters. Another enzyme that contains this domain is the Pseudomonas thermocarboxydovorans carbon monoxide oxygenase and nicotine dehydrogenase involved in the degradation of nicotine.
