identifier: Pfam:PF25411
label: Domain of unknown function (DUF7888)
definition: >-
  This entry represents Elicitor VP2 from Verticillium dahliae and similar sequences from fungi and bacteria, including Stress response protein YvgO from Bacillus subtilis. VP2 is a secreted protein that acts as an elicitor that can be recognised by multiple plant species and trigger the immune response. In cotton, this protein triggers the immune system and defence response leading to enhanced resistance to the fungal organism without causing abnormal plant growth and development, by activating phytohormone synthesis and phenolic metabolite biosynthesis. It also up-regulates the expression of cotton genes involved in the salicylic acid signalling pathway. Members of this group are predicted to show an α-β-β sandwich fold. It has two pairs of conserved cysteine residues that are predicted to form disulfide bonds.
