identifier: Pfam:PF22114
label: Nucleoporin NUP120, helical domain
definition: >-
  This domain is found in Nucleoporin NUP120 from Saccharomyces cerevisiae and similar sequences from Saccharomycetes. NUP120 is a a component of the nuclear pore complex (NPC) involved in nuclear poly(A)+ RNA and pre-ribosome export, in GSP1 nuclear import, in NPC assembly and distribution, as well as in nuclear envelope organisation. This entry represents the α-helical domain of NUP120, which packs against the side of the β-propeller, located N-terminal of the protein.
