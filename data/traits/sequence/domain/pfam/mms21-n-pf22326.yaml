identifier: Pfam:PF22326
label: E3 SUMO-protein ligase MMS21, N-terminal domain
definition: >-
  This domain is found at the N-terminal of E3 SUMO-protein ligase MMS21 from Saccharomyces cerevisiae and similar proteins specific to Saccharomycetales. MMS21 acts in a DNA repair pathway for removal of UV-induced DNA damage that is distinct from classical nucleotide excision repair and in repair of ionizing radiation damage. This domain forms an helix bundle with a coiled-coil structure. It is required for the binding to Smc5, which is essential for cell growth and resistance to DNA damage.
