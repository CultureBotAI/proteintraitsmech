identifier: Pfam:PF26145
label: Domain of unknown function (DUF8041)
definition: >-
  This entry describes a domain of unknown function in putative HSP20-like chaperone proteins mostly found in plants. HSP20-like chaperones are a ubiquitous and abundant class of small Heat shock proteins (sHsps) that function as ATP-independent molecular chaperones in plants, protecting proteins from stress-induced denaturation and aggregation. This domain is predicted to show a helix-turn-helix (HTH) like fold.
