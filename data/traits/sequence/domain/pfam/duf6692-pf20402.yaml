identifier: Pfam:PF20402
label: Domain of unknown function (DUF6692)
definition: >-
  Proteins in this entry are functionally uncharacterised. This presumed domain is predominantly found in proteins from Alphaproteobacteria. Proteins in this family are typically between 161 and 194 amino acids in length. This family is related to and is therefore part of the ferritin superfamily.
