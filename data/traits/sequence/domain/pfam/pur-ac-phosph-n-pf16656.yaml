identifier: Pfam:PF16656
label: Purple acid Phosphatase, N-terminal domain
definition: >-
  This domain is found at the N-terminal of purple acid phosphatase proteins (PAPs) and related acid phosphatase proteins. This typically adopts an immunoglobulin-like β-sandwich fold. Purple acid phosphatases (PAPs) ( ) are a family of binuclear metallohydrolases that break down phosphate esters and anhydrides in acidic conditions; they have been identified in plants, animals, and fungi. The best-characterised enzyme is from kidney bean, and that enzyme binds Fe 3+ and Zn 2+ ions. The metals bound differ according to source species; for example, the enzyme from sweet potato binds iron and manganese. The structure of the kidney bean enzyme has been solved and shows a disulfide-linked homodimer, with each monomer having a two-domain structure. Human acid phosphatase type 7 is also known as purple acid phosphatase long form. It is associated with bone resorption and microbial killing through its phosphatase activity and hydroxyl radical production. While most of the PAPs are active on a wide range of substrates, some PAPs display higher activity on phytate or 2-phosphoenolpyruvate (PEP).
