identifier: Pfam:PF28993
label: K02D10.4-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of K02D10.4-like proteins found primarily in nematodes and arthropods. The domain is present in uncharacterised proteins from Caenorhabditis elegans and related species, as well as in some predicted C2H2-type domain-containing proteins from arthropods including spiders. The full-length proteins range from approximately 150-227 amino acids and are classified as regulatory factors involved in gene expression and cell death processes. The proteins show expression in larval stages and various tissues. The specific function of this N-terminal domain remains to be determined.
