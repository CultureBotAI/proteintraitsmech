identifier: Pfam:PF26082
label: Oxidoreductase acuF-like, C2H2 type zinc-finger
definition: >-
  This C2H2 type zinc-finger is found in Oxidoreductase acuF from Aspergillus aculeatus and similar proteins from ascomycetes. AcuF is part of the gene cluster that mediates the biosynthesis of aculins.
