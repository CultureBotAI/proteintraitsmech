identifier: Pfam:PF22841
label: CATSPERE first N-terminal domain
definition: >-
  This entry includes CATSPERE, the auxiliary subunit epsilon of the CatSper complex, a complex involved in sperm cell hyperactivation. This process is needed for sperm motility, which is essential late in the preparation of sperm for fertilisation. This is a multi-domain protein which has a similar domain organisation as the other auxiliary subunits, beta, gamma and delta. The epsilon subunit has an additional N-terminal domain (NTD2). This entry represents the first N-terminal domain (NTD1).
