identifier: Pfam:PF01321
label: Creatinase/Prolidase N-terminal domain
definition: >-
  Creatinase or creatine amidinohydrolase ( ) catalyses the conversion of creatine and water to sarcosine and urea. The enzyme works as a homodimer, and is induced by choline chloride. Each monomer of creatinase has two clearly defined domains, a small N-terminal domain, and a large C-terminal domain. The structure of the C-terminal region represents the "pita-bread" fold. The fold contains both α-helices and an anti-parallel β-sheet within two structurally similar domains that are thought to be derived from an ancient gene duplication. The active site, where conserved, is located between the two domains. The fold is common to methionine aminopeptidase ( ), aminopeptidase P ( ), prolidase ( ), agropine synthase and creatinase ( ). Though many of these peptidases require a divalent cation, creatinase is not a metal-dependent enzyme. This entry represents the N-terminal domain of creatinase, aminopeptidase P, prolidases and similar proteins.
