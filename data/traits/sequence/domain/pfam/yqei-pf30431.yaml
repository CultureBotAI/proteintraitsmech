identifier: Pfam:PF30431
label: Uncharacterised protein YqeI, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YqeI and related proteins. It follows the N-terminal OmpR/PhoB-type DNA-binding domain ( ). YqeI is a predicted transcriptional regulator that shows similarity to the Vibrio cholerae cholera toxin transcriptional activator ToxR. In Escherichia coli, yqeI is located within the ETT2 (E. coli type III secretion system 2) gene cluster region. The family is restricted to Enterobacterales, including Enterobacteriaceae and Erwiniaceae. The specific function of this C-terminal domain remains to be determined.
