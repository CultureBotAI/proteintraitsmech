identifier: Pfam:PF26318
label: Sliding clamp-binding bacterial toxin SocB
definition: >-
  This entry represents the SocB toxin found in a toxin-antitoxin system in bacteria. SocB is a protein toxin that inhibits DNA replication by binding to the β sliding clamp DnaN through a conserved clamp-binding motif. When SocB accumulates, it competes with DNA polymerase III for binding to DnaN, leading to replication fork collapse and activation of the SOS response. In Caulobacter crescentus, SocB is constitutively degraded by the ClpXP protease, which requires the antitoxin SocA to act as a proteolytic adaptor. SocA binds both SocB and the N-terminal domain of ClpX to promote SocB degradation. This toxin-antitoxin system is unusual because the toxin is unstable rather than the antitoxin. SocB homologs are found primarily in alpha-proteobacteria.
