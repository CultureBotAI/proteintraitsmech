identifier: Pfam:PF26137
label: Sporulation delaying protein family toxin
definition: >-
  This entry represents the antimicrobial Sporulation delaying protein C from Bacillus subtilis (SdpC) and related proteins in species as distant as Myxococcus xanthus from the Deltaproteobacteria. SdpC collapses the proton motive force (probably both the membrane potential and pH gradient) across the cell membrane, which leads to autolysis, probably forming a proton channel. Its maturation is dependent on SdpA and SdpB.
