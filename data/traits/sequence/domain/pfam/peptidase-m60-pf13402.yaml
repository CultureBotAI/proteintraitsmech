identifier: Pfam:PF13402
label: Peptidase M60, enhancin and enhancin-like
definition: >-
  The peptidase family M60 domain belongs to the Merops zincin superfamily of zinc-requiring metalloproteases (clan MA, subclan MA(E)). The peptidase family M60 domain contains the metal-binding consensus motif HExxH. The two histidine residues are ligands of the catalytic Zn(2) and the glutamic acid residue is involved in nucleophilic attack. An additional conserved glutamic acid is found approximately 20 residues from the first histidine within the metal-binding motif. The second conserved glutamic acid potentially acts as a third proteous Zn(2) ligand. The peptidase family M60 domain targets complex host glycoproteins, such as mucins. Some proteins known to contain a peptidase family M60 domain are listed below: Baculovirus viral enhancing factor (VEF), also known as Enhancin, a metalloprotease that enhances viral infection by degrading the peritrophic membrane (PM) of the insect midgut. Bacteria enhancin-like metalloproteases. Mammalian FAM115 family proteins (also known as TRPM8 channel-associated factor 1-3).
