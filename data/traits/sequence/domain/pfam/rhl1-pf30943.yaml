identifier: Pfam:PF30943
label: DNA-binding protein RHL1 domain
definition: >-
  This entry represents a conserved domain found at the N-terminal of RHL1 (ROOT HAIRLESS 1) proteins from plants. RHL1 is a component of the DNA topoisomerase VI complex involved in chromatin organisation and progression of endoreduplication cycles. The protein binds DNA and is required for endoreduplication beyond 8C. RHL1 interacts with BIN4 and TOP6A and localises to the nucleus. Loss of RHL1 function results in plants with no hairs on primary roots and an extreme dwarf phenotype.
