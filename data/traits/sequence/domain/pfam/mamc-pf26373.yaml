identifier: Pfam:PF26373
label: Magnetosome MamC family
definition: >-
  This protein family includes Magnetosome protein MamC from Magnetococcus marinus and similar bacterial proteins. MamC is involved in the regulation of magnetite crystal size and shape, playing a crucial role in magnetosome formation. The lumenal magnetite interacting component (MIC) within these proteins is key to binding magnetite, influencing the growth and development of magnetite crystals. This interaction is thought to occur through the formation of a helix in the lumenal loop, which may bind the magnetite crystals, thereby affecting their size and shape. Additionally, MamC proteins can self-assemble into micelles in the presence of ferric chloride, although the biological relevance of this process remains uncertain. These proteins likely interact with MamA, suggesting a cooperative role in magnetosome assembly. These membrane proteins contain a glycine zipper motif.
