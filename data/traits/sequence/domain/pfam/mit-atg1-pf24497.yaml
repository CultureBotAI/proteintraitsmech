identifier: Pfam:PF24497
label: ATG1, MIT domain
definition: >-
  This is the MIT domain found at the C-terminal of ATG1a/b/c proteins from Arabidopsis thaliana and related plant sequences. These proteins are serine/threonine protein kinases involved in autophagy. They form the ATG1-ATG13 protein kinase complex which initiates autophagosome formation and regulates downstream events required for autophagosome enclosure and/or vacuolar delivery.
