identifier: Pfam:PF17224
label: Domain of unknown function (DUF5300)
definition: >-
  This domain is found in a small group of proteins found in Clostridia, which is functionally uncharacterised. Proteins in this family are around 130 amino acids in length. Based on NMR structure , it forms a β-sandwich structure consisting of two 4-stranded antiparallel β-strands. The structure is very similar to glutamine glutamyltransferases ( ] and peptide transporters ( ).
