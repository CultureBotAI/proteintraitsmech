identifier: Pfam:PF27262
label: y4jL C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the y4jL protein found in Sinorhizobium fredii. The full-length y4jL protein is 220 amino acids and is encoded on the symbiotic plasmid pNGR234a (locus NGR_a03030). The specific function of this C-terminal domain remains to be determined.
