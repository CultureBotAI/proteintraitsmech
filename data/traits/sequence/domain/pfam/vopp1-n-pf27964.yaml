identifier: Pfam:PF27964
label: VOPP1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of VOPP1 (WW domain binding protein VOPP1), also known as ECOP (EGFR-coamplified and overexpressed protein). VOPP1 is a single-pass type I membrane protein that localises to cytoplasmic vesicle membranes, late endosomes and lysosomes. It increases the transcriptional activity of NFKB1 and interacts with WWOX via WW domains. The domain is conserved within the VOPP1/ECOP family across vertebrates.
