identifier: Pfam:PF02471
label: Borrelia outer surface protein E
definition: >-
  This is a family of outer surface proteins (Osp) from the Borrelia spp. spirochete. The family includes OspE, OspF, and OspEF-related proteins (Erp). These proteins are coded for on different circular plasmids in the Borrelia genome. Borrelia burgdorferi spirochetes, that cause Lyme borreliosis, survive for a long time in human serum due to their ability to succesfully evade the complement system, an important arm of innate immunity. The outer surface protein E (OspE) of B. burgdorferi is required for this since it recruits complement regulator factor H (FH) onto the bacterial surface to evade complement-mediated cell lysis.
