identifier: Pfam:PF01042
label: Endoribonuclease L-PSP
definition: >-
  The YjgF/YER057c/UK114 family (also known as the Rid family) of proteins is conserved in all domains of life. A phylogenetic analysis applied by Lambrecht et al. has divided the Rid family into a widely distributed archetypal RidA (YjgF) subfamily and seven other subfamilies (Rid1 to Rid7) that are largely confined to bacteria and often co-occur in the same organism with RidA and each other. Although the family members share high levels of protein sequence and structure similarity, their functions vary widely across different species. Structurally, these proteins are homotrimers with clefts between the monomeric subunits that are proposed to have some functional relevance. This family includes: YjgF (also known as RidA or 2-iminobutanoate/2-iminopropanoate deaminase), which displays enamine/imine deaminase activity and can accelerate the release of ammonia from reactive enamine/imine intermediates of the pyridoxal 5'-phosphate-dependent threonine dehydratase (IlvA) the yeast growth inhibitor YER057c (protein HMF1) that appears to play a role in the regulation of metabolic pathways and cell differentiation the mammalian 14.5kDa translational inhibitor protein UK114, also known as L-PSP (liver perchloric acid-soluble protein), with endoribonucleolytic activity that directly affects mRNA translation and can induce disaggregation of the reticulocyte polysomes into 80 S ribosomes RutC from E. coli, which is essential for growth on uracil as sole nitrogen source and is thought to reduce aminoacrylate peracid to aminoacrylate YabJ from B. subtilis, which is required for adenine-mediated repression of purine biosynthetic genes Structurally, these proteins are homotrimers with clefts between the monomeric subunits that are proposed to have some functional relevance. This family…
