identifier: Pfam:PF09227
label: Bubble protein
definition: >-
  This family includes Penicillium brevicompactum bubble protein (BP) and similar proteins. Bubble protein (BP) is a small cysteine-rich protein that is a member of the growing class of defensins, and may act as a toxin. Studies show that P. brevicompactum BP inhibits growth of the yeast Saccharomyces cerevisiae in a dose-dependent manner, thus exhibiting anti-fungal effects. BP may recognise a molecule or part of a molecule with a negatively charged surface. It is a globular protein consisting of several β-strands that are stabilised by disulfide bonds..
