identifier: Pfam:PF22553
label: T3SS (YopN, CesT) and YbjN peptide-binding chaperone 2
definition: >-
  This domain is observed in proteins from bacterial host systems predicted to counter viral ribosylating toxins. They are predicted to function as peptide-binding chaperone domains that target proteins modified by ADPr and potentially misfolded as a consequence.
