identifier: Pfam:PF29288
label: Three helical bundle domain
definition: >-
  This entry represents a small domain of approximately 45-50 amino acids found exclusively in halophilic archaea. The family is restricted to the order Halobacteriales, particularly the families Natrialbaceae, Haloferacaceae and Haloarculaceae. The domain adopts a three helical bundle structure. The function of this domain remains to be determined. It can be found associated with .
