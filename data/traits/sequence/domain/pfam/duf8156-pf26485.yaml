identifier: Pfam:PF26485
label: Domain of unknown function (DUF8156)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The domain is predominantly found in members of the Halobacteria class, including families such as Haloferacaceae and Haloarculaceae. Proteins containing this domain are typically between 90 and 110 amino acids in length. The C terminus of this domain is predicted by AlphaFold 3 to form a trimeric coiled-coil structure (ipTM=0.89 pTM=0.89).
