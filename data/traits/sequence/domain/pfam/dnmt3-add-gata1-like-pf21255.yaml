identifier: Pfam:PF21255
label: DNMT3, ADD PHD zinc finger
definition: >-
  This entry represents the C4-type PHD zinc finger of a cysteine-rich domain termed ADD (ATRX-DNMT3-DNMT3L, AD-DATRX) found in animal DNMT3 proteins. The ADD domain is composed of three clearly distinguishable modules that pack together through extensive hydrophobic interactions to form a single globular domain. Packed against the N-terminal GATA1-like finger there is a second subdomain, which binds two zinc ions and closely resembles the structure reported for several PHD fingers. Finally, there is a long C-terminal α-helix that runs out from the PHD finger and makes extensive hydrophobic contacts with the N- terminal GATA1-like finger, bringing the N- and C-termini of the ADD domain close together. This combination of fused GATA1-like and PHD fingers within a single domain is thus far unique. The ADD domains of the DNMT3 family have a decisive role in blocking DNMT activity in the areas of the genome with chromatin containing methylated H3K4. Furthermore, the ADD domain of DNMMT3A (ADD-3A) competes with the chromodomain (CD) of heterochromatin protein 1 alpha (HP1alpha, CDHP1alpha) for binding to the H3 tail. The DNA methyltransferase (DNMT) 3 family members DNMT3A and DNMT3B and the DNMT3-like non-enzymatic regulatory factor DNMT3L, are involved in de-novo establishment of DNA methylation patterns in early mammalian development.
