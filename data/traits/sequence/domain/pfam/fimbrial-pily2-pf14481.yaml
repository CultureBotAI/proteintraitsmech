label: Type 4 fimbrial biogenesis protein PilY2
definition: >-
  Members of this family were experimentally shown to be involved in fimbrial biogenesis, but its exact role is not clear. The structure of a member from Pseudomonas aeruginosa was determined ( ) that adopts a β-barrel with an OB-fold topology.
