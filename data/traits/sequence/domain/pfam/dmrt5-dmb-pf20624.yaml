identifier: Pfam:PF20624
label: DMRT5, DMB domain
definition: >-
  This is the DMB domain found at the C-terminal of DMRT5 (also known as Doublesex- and mab-3-related transcription factor A2) and DMRT1 proteins (Doublesex- and mab-3-related transcription factor A1). DMRT5 is involved in sexual development although not restricted to the developing gonads in vertebrates. This protein, together with DMRT4, has been identified as an important regulator of neurogenesis. This domain is adjacent the DMA domain ( ), both of which are required for neuronal differentiation.
