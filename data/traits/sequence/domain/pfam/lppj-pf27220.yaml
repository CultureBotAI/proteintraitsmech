identifier: Pfam:PF27220
label: Putative lipoprotein LppJ
definition: >-
  This entry represents the putative lipoprotein LppJ found in the Mycobacterium tuberculosis complex. The protein is 187 amino acids in length and contains an N-terminal signal peptide that is cleaved during processing. The mature protein is anchored to the cell membrane via lipid modifications at the N-terminal cysteine residue, including N-palmitoyl cysteine and S-diacylglycerol cysteine modifications. The protein is found in Mycobacterium tuberculosis, Mycobacterium bovis and related species within the M. tuberculosis complex. LppJ has been identified by mass spectrometry in M. tuberculosis H37Rv strain. The specific function of this lipoprotein remains to be determined.
