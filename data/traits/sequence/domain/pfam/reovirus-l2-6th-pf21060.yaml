identifier: Pfam:PF21060
label: Reovirus core-spike protein lambda-2 (L2), 6th domain
definition: >-
  Reovirus core-spike protein VP1/lambda-2 (VP1/L2) forms a pentamer that mediates enzymatic reactions in 5' capping of the viral plus-strand transcripts. It forms a hollow cylinder with projecting turrets. Each VP1/L2 monomer consists of eight domains with the most N-terminal domain at the base of the turret and the most C-terminal domain at the top. This entry represents the sixth domain which, together with the seventh and eighth ( ) domains forms a three-domain flap at the top of the turret, that may serve as a gate to retard exit of the 5' terminus of the mRNA. This domain has a Ig-like fold, resembling the V of an antibody light chain.
