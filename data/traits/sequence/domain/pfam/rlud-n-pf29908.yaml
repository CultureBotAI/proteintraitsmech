identifier: Pfam:PF29908
label: RluD ribosomal pseudouridine synthase N-terminal domain
definition: >-
  This entry represents the N-terminal domain of RluD, a ribosomal large subunit pseudouridine synthase. This domain is approximately 70 amino acids and precedes the central catalytic PseudoU_synth_2 domain ( ). The domain is conserved across diverse bacterial species including Bacillus, Streptococcus, and Staphylococcus. The specific function of this N-terminal region remains to be determined.
