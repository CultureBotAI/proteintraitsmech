identifier: Pfam:PF29481
label: SKG1 domain
definition: >-
  This entry represents the SKG1 domain found in the suppressor of lethality of KEX2 GAS1 double null mutant protein 1. SKG1 proteins play a role in cell wall integrity and affect cell wall polymer composition in the growing region of the cell. The domain is found in type III membrane proteins that localise to the inner surface of the plasma membrane at the bud and in the daughter cell. These proteins are involved in cell wall organisation and biogenesis in fungi, particularly during budding processes.
