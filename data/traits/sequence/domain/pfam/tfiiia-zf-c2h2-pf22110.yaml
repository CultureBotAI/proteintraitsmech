identifier: Pfam:PF22110
label: TFIIIA, beta-beta-alpha zinc finger
definition: >-
  This entry represents a beta-beta-alpha (C2H2-type) zinc finger from TFIIIA, a transcription factor involved in ribosomal large subunit biogenesis. It binds the approximately 50 base pairs internal control region (ICR) of 5S ribosomal RNA genes. It is required for their RNA polymerase III-dependent transcription and may also maintain the transcription of other genes. This group of proteins is specific to animals. This entry also includes P43 5S RNA-binding protein, a 5S RNA binding protein which is a major constituent of oocytes and comprises part of a 42S ribonucleoprotein storage particle.
