identifier: Pfam:PF27350
label: AF_1447 domain
definition: >-
  This entry represents the AF_1447 small uncharacterised proteins found predominantly in bacteria with some archaeal members. The domain is found mainly in Bacteroidota, particularly Flavobacteriaceae and Flavobacterium, with additional members in Bacillota and some archaea. The proteins are approximately 81 amino acids in length. The function of this protein family remains to be determined.
