identifier: Pfam:PF25334
label: C2 domain of glycine-rich domain-containing protein
definition: >-
  This entry represents a C2 domain found in GRDP1 and GRDP2 proteins. Glycine-rich domain-containing proteins (GRDPs) play a regulatory role in abscisic acid (ABA) signalling and tolerance to abiotic stress during germination. They may be involved in the regulation of the ABI transcriptional factors and in the development of stress responses. The C2 domain is a Ca 2+ -dependent membrane-targeting module found in many cellular proteins involved in signal transduction or membrane trafficking. C2 domains are unique among membrane targeting domains in that they show wide range of lipid selectivity for the major components of cell membranes, including phosphatidylserine and phosphatidylcholine. This C2 domain is about 116 amino-acid residues and is located between the two copies of the C1 domain in Protein Kinase C and the protein kinase catalytic domain. Regions with significant homology to the C2-domain have been found in many proteins. The C2 domain is thought to be involved in calcium-dependent phospholipid binding and in membrane targetting processes such as subcellular localisation. The 3D structure of the C2 domain of synaptotagmin has been reported, the domain forms an eight-stranded β-sandwich constructed around a conserved 4-stranded motif, designated a C2 key. Calcium binds in a cup-shaped depression formed by the N- and C-terminal loops of the C2-key motif. Structural analyses of several C2 domains have shown them to consist of similar ternary structures in which three Ca 2+ -binding loops are located at the end of an 8 stranded antiparallel β-sandwich.
