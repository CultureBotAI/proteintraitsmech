identifier: Pfam:PF22599
label: SecDF, P1 head subdomain
definition: >-
  This entry represents the head subdomain from P1 domain from SecDF proteins, which constitutes a critical element for proton transport. P1 domain binds an unfolded protein, and undergoes functionally important conformational changes. SecDF functions as a membrane-integrated chaperone that mediates ATP-independent protein translocation.
