identifier: Pfam:PF18096
label: THUMP domain-like
definition: >-
  This entry represents an N-terminal helical domain of approximately 60 residues found in bacterial SAM-dependent methyltransferases. This domain is always located N-terminal to a methyltransferase domain ( , ) and is frequently followed by a THUMP-like domain ( ). The family is found almost exclusively in Actinomycetota, particularly in Streptomyces species and related genera. The specific function of this N-terminal domain remains to be determined.
