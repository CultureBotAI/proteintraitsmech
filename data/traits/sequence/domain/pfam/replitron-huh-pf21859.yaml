identifier: Pfam:PF21859
label: Replitron, HUH endonuclease domain
definition: >-
  This entry represents the Rep HUH endonuclease domain of the eukaryotic transposase encoded by replitrons, a fourth independent group of DNA transposons found in genomes of green algae and plants, diverse stramenopiles including brown seaweeds and likely also cryptophytes and haptophytes, which suggests an ancient origin and broad eukaryotic distribution. This domain contains motif I (SUTU), motif II (HUQ) and motif III (YxxK), the latter including the catalytic tyrosine residue. There is also a conserved Glu upstream of motif II, which may represent the third metal-binding ligand, analogous to those in the Reps of CRESS-DNA virus PCV2 or Helraiser Helitron. Members of this group are mainly found in plants.
