identifier: Pfam:PF18283
label: Carbohydrate binding module 77
definition: >-
  This domain is the non-catalytic carbohydrate binding module 77 (CBM77) present in Ruminococcus flavefaciens. CBMs fulfil a critical targeting function in plant cell wall depolymerisation. In CBM77, a cluster of conserved basic residues (Lys1092, Lys1107 and Lys1162) confer calcium-independent recognition of homogalacturonan.
