identifier: Pfam:PF23658
label: CPAF-like PDZ domain
definition: >-
  This domain is found in fungal proteins that share global similarity to chlamydial protease/proteasome-like activity factor (CPAF). Amongst these proteins are peptidase S41 family proteins phomP1, phomP1' and ustP. This domain is predicted to adopt PDZ-like fold and shares sequence similarity with CPAF PDZ domain.
