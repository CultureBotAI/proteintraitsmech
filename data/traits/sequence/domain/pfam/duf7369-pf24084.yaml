label: Domain of unknown function (DUF7369)
definition: >-
  This entry represents a small family of uncharacterised phage proteins. Structure prediction suggests that this protein forms a small domain that likely forms a stable dimeric complex. In this predicted complex there is a C-terminal α-helix that binds to the opposite oligomer in a helix swapped arrangement.
