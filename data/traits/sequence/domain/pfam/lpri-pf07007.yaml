identifier: Pfam:PF07007
label: Lysozyme inhibitor LprI
definition: >-
  This domain is found in uncharacterised bacterial proteins and towards the N-terminal part of lipoprotein LprI from Mycobacterium. The function of this domain is not known. LprI binds to and inhibits macrophage lysozyme, which may aid bacterial survival.
