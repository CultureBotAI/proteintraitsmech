identifier: Pfam:PF26556
label: Domain of unknown function (DUF8183)
definition: >-
  This entry represents a domain of unknown function found in uncharacterised archaeal proteins. This domain shows strong structural similarity to the SycN protein from Y. pestis that forms a heterodimeric complex with YscB and acts as a secretion chaperone to YopN. DUF8183 contains a SycN-like N-terminal domain and an HTH C-terminal domain .
