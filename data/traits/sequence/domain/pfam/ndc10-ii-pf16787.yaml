identifier: Pfam:PF16787
label: Centromere DNA-binding protein complex CBF3 subunit, domain 2
definition: >-
  This entry represents the second of five domains on the Kluyveromyces lactis Ndc10 protein. Each subunit of the Ndc10 dimer binds a separate fragment of DNA, suggesting that Ndc10 stabilises a DNA loop at the centromere. Proteins containing this domain also include Cbf2 from S. cerevisiae. S. cerevisiae Ndc10 (also known as Cbf2) is a component of the centromere DNA-binding protein complex CBF3, which is essential for chromosome segregation and movement of centromeres along microtubules. The structure of the protein shows that it can be divided in the two α-helical N- and C-lobes. The N-lobe consists of an antiparallel four-helix bundle with a central β-sheet which is involved in DNA binding.
