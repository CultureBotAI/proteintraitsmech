identifier: Pfam:PF03884
label: DNA gyrase inhibitor YacG
definition: >-
  This entry represents the DNA gyrase inhibitor YacG family. E coli. YacG inhibits all the catalytic activities of DNA gyrase by preventing its interaction with DNA. It acts by binding directly to the C-terminal domain of GyrB, which probably disrupts DNA binding by the gyrase. YacG has been shown to bind zinc and contains the structural motifs typical of zinc-binding proteins. The conserved four cysteine motif in this protein (-C-X(2)-C-X(15)-C-X(3)-C-) is not found in other zinc-binding proteins with known structures.
