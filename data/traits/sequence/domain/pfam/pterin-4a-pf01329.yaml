identifier: Pfam:PF01329
label: Pterin 4 alpha carbinolamine dehydratase
definition: >-
  Pterin 4 alpha carbinolamine dehydratase is also known as DCoH. DCoH is the dimerisation cofactor of hepatocyte nuclear factor 1 (HNF-1) that functions as both a transcriptional coactivator and a pterin dehydratase. X-ray crystallographic studies have shown that the ligand binds at four sites per tetrameric enzyme, with little apparent conformational change in the protein.
