identifier: Pfam:PF28223
label: CAP22
definition: >-
  This entry represents a domain found in CAP22 from Colletotrichum gloeosporioides, SCP41 from Verticillium dahliae and similar fungal sequences, which contains helical regions with interspersed disordered segments. This entry is found in fungi, particularly plant pathogens such as Verticillium species. These proteins are secreted effector proteins that suppress host plant innate immune responses by targeting transcription regulators such as CBP60G and SARD1. The proteins contain nuclear localisation signals and are induced by plant roots during infection. The function of this domain remains to be determined.
