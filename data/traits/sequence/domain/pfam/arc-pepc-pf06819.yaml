identifier: Pfam:PF06819
label: Archaeal Peptidase A24 C-terminal Domain
definition: >-
  This region is of unknown function and is found at the C-terminal of some archaeal proteins that have multiple transmembrane domains and are predicted to be aspartic peptidases belonging to the MEROPS peptidase subfamily A24A (type 4 prepilin peptidase 1). This entry includes EppA, which is a prepilin-peptidase that can cleave proteins with class III signal peptides ( ).
