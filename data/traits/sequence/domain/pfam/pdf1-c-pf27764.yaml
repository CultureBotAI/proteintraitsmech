identifier: Pfam:PF27764
label: Protodermal factor 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of protodermal factor 1 (PDF1) and similar sequences found in plants. PDF1 is involved in the regulation of meristem growth. The protein is expressed specifically in the shoot apical meristem layer L1 in vegetative, inflorescence and floral meristems, as well as in protoderm of organ primordia during embryogenesis. PDF1 contains an N-terminal signal peptide, a large disordered region, and this structured C-terminal domain. The protein is secreted to the extracellular region. The specific function of this remains to be determined.
