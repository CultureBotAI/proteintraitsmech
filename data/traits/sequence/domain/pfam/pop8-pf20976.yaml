identifier: Pfam:PF20976
label: Ribonucleases P/MRP protein subunit Pop8
definition: >-
  This entry represents the structural domain of Pop8 from yeast, which is a component of ribonuclease P, a protein complex that generates mature tRNA molecules by cleaving their 5'-ends. It is also a component of Ribonuclease MRP, which cleaves pre-rRNA sequences. Ribonuclease P consists of an RNA moiety and at least 9 protein subunits including POP1, POP3, POP4, POP5, POP6, POP7, POP8, RPP1 and RPR2. Ribonuclease MRP complex consists of an RNA moiety and at least 10 protein subunits including POP1, POP3, POP4, POP5, POP6, POP7, POP8, RMP1, RPP1 and SNM1, many of which are shared with the Ribonuclease P complex. Pop8 interacts with Pop5 and Rpp1 to form the Pop5-Pop8-(Rpp1)2 heterotetramer, which is part of the arm module of the protein hook. This domain can be found in multidomain protein sequences from fungi.
