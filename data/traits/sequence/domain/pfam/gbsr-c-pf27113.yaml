identifier: Pfam:PF27113
label: GbsR family transcriptional regulator, C-terminal helical hairpin
definition: >-
  This entry represents the C-terminal α-helical hairpin domain found in GbsR family transcriptional regulators from Bacillus subtilis and related Bacilli bacteria. This domain is distinct from the N-terminal helix-turn-helix (HTH) DNA-binding domain . The C-terminal domain may be involved in ligand sensing, protein oligomerisation, or regulatory functions. The specific function of this C-terminal helical hairpin domain remains to be determined. GbsR family members include GbsR, OpcR, and YvaV, which are transcriptional repressors involved in regulating choline uptake and glycine betaine synthesis operons. In GbsR, choline binding induces conformational changes that relieve transcriptional repression. While OpcR also regulates choline uptake operons, it is not choline-responsive.
