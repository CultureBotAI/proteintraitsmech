identifier: Pfam:PF27828
label: Deconstructed propeller
definition: >-
  This entry represents a conserved region found in uncharacterised proteins from Apicomplexa lineage. It is predicted to fold into a complex structure that in some parts is reminiscent of propeller blades some of which are packed on each other but this does not result in a toroid structure.
