identifier: Pfam:PF27657
label: Regulator of rDNA transcription protein 15
definition: >-
  This entry represents a domain found in the regulator of rDNA transcription protein 15 (RRT15), and similar proteins from eukaryotes. RRT15 proteins are small proteins of approximately 60 amino acids that are involved in modulation of ribosomal DNA transcription. These proteins play a role in transcriptional regulation. This domain is also found in longer uncharacterised eukaryotic sequences.
