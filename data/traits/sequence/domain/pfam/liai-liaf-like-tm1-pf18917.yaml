identifier: Pfam:PF18917
label: LiaI-LiaF-like transmembrane region
definition: >-
  This entry represents a transmembrane region found in sequences related to LiaI-LiaF proteins. It is composed of two transmembrane helices that are often found in 2 or three copies in a protein. The members of this family are functionally uncharacterised. This domain family is found in bacteria and archaea, and is approximately 40 amino acids in length. This entry is often associated with a putative adhesive domain that adopts a β-helix fold.
