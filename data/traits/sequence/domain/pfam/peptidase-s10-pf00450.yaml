identifier: Pfam:PF00450
label: Serine carboxypeptidase
definition: >-
  This group of serine peptidases belong to MEROPS peptidase family S10 (clan SC). The type example is carboxypeptidase Y from Saccharomyces cerevisiae (Baker's yeast). All known carboxypeptidases are either metallo carboxypeptidases or serine carboxypeptidases ( and ). The catalytic activity of the serine carboxypeptidases, like that of the trypsin family serine proteases, is provided by a charge relay system involving an aspartic acid residue hydrogen-bonded to a histidine, which is itself hydrogen-bonded to a serine. The sequences surrounding the active site serine and histidine residues are highly conserved in all the serine carboxypeptidases.
