identifier: Pfam:PF13680
label: Protein of unknown function (DUF4152)
definition: >-
  This family of archaeal proteins is functionally uncharacterised. The structure of the family member from Pyrococcus furiosus has been solved. It shows an RNaseH like fold that conserves critical catalytic residues. This suggests that these proteins may cleave nucleic acid.
