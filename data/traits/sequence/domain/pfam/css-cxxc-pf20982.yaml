identifier: Pfam:PF20982
label: CSS_CxxC domain
definition: >-
  This is a periplasmic sensor domain found at the N-terminal of c-di-GMP phosphodiesterases, which is a variation of the CSS motif sensor. This domain, apart of the CSS motif, has an additional conserved CxxC motif, which presumably broaden its redox-sensing palette. It has been found in Shewanella spp. and members of Altermonadales, and Vibrionales.
