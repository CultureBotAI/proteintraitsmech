identifier: Pfam:PF21736
label: REC102 protein
definition: >-
  This entry represents a family of proteins from Saccharomycetales, including Meiotic recombination protein REC102 from Saccharomyces cerevisiae. REC102 protein is required for formation of the SPO11-mediated double-strand breaks (DSBs) that initiate meiotic recombination. It may mediate the interaction between SPO11 subunits during meiosis. It is also needed for homologue chromosome pairing, synaptonemal complex formation, and for the proper timing of the first meiotic division. It is not required for mitosis and mitotic DNA repair mechanisms.
