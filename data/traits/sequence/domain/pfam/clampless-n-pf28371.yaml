identifier: Pfam:PF28371
label: Clampless protein 1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of clampless protein 1 (CLP1) found in basidiomycete fungi, particularly Cryptococcus neoformans. The full-length CLP1 protein is required for developmental progression after cells of opposite mating types fuse and is essential for both dikaryotic filament formation and monokaryotic fruiting. CLP1 is a direct target of the homeodomain transcription factors Sxi1-alpha and Sxi2-a and is expressed abundantly during sexual development conditions. The protein is glycosylated and disruption results in complete absence of sexual development. The specific function of this N-terminal domain remains to be determined.
