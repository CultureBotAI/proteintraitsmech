identifier: Pfam:PF22165
label: SSO1393-like, winged-helix domain
definition: >-
  This entry represents a winged-helix (WH)-like domain found in CRISPR system ring nuclease SSO1393 from Sulfolobus solfataricus ( ) and similar archaeal sequences. This protein has been described as a component of the CRISPR system. SSO1393 has been described as a component of the CRISPR system. CRISPR (clustered regularly interspaced short palindromic repeat) is an adaptive immune system that provides protection against mobile genetic elements (viruses, transposable elements and conjugative plasmids).
