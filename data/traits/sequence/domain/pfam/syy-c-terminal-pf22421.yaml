identifier: Pfam:PF22421
label: Tyrosine--tRNA ligase SYY-like C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Tyrosine--tRNA ligases which contains the S4 motif that binds RNA. Members of this group are mainly found in bacteria, including tyrS from Escherichia coli which structure has been determined ( ). TyrS catalyses the attachment of L-tyrosine to tRNA(Tyr) in a two-step reaction: tyrosine is first activated by ATP to form Tyr-AMP and then transferred to the acceptor end of tRNA(Tyr).
