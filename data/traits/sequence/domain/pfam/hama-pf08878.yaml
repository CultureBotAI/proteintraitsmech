identifier: Pfam:PF08878
label: HamA
definition: >-
  Hachiman antiphage defence system has been described in Ralstonia solanacearum species complex (RSSC) and in Escherichia coli, and is composed of two genes, hamAB, which encode Anti-bacteriophage protein A (also known as HamA, represented in this entry), and an helicase (HamB/AbpB). These proteins confer temperature dependent resistance to phages T2, T4, T7 and lambda but not RB32 or RB69. This entry represents a nuclease domain that in HamA it covers the full length, while in AbpA it is found at the C-terminal.
