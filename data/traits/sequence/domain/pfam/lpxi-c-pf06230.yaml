identifier: Pfam:PF06230
label: LpxI C-terminal domain
definition: >-
  This entry represents the catalytic C-terminal domain of the LpxI enzyme that is involved in biosynthesis of lipid A. LpxI hydrolyzes the pyrophosphate bond of UDP-2,3-diacylglucosamine to form 2,3-diacylglucosamine 1-phosphate (lipid X) and UMP by catalyzing the attack of water at the beta-P atom.
