identifier: Pfam:PF08669
label: Glycine cleavage T-protein C-terminal barrel domain
definition: >-
  This entry represents the C-terminal β-barrel domain of aminomethyltransferase, also known as glycine cleavage T-proteins, part of the glycine cleavage multienzyme complex (GcvT)) found in bacteria and the mitochondria of eukaryotes. The glycine cleavage multienzyme complex (GCV) catalyses the catabolism of glycine in eukaryotes. GCVT (aminomethyltransferase, ) is a folate-dependent enzyme that catalyses the release of ammonia and the transfer of the methylene carbon unit (C1 unit) to tetrahydrofolate (H4folate) from the aminomethyl intermediate attached to the lipoate cofactor of H-protein. GCV is found in bacteria and the mitochondria of eukaryotes. Mutations in the human GCVT gene are known to cause nonketotic hyperglycinemia.
