identifier: Pfam:PF30902
label: CHAMP1 N-terminal domain
definition: >-
  This entry represents an N-terminal domain in CHAMP1 (chromosome alignment-maintaining phosphoprotein 1) proteins. The domain is found in vertebrates including mammals and birds. CHAMP1 is a nuclear phosphoprotein required for proper chromosome alignment at metaphase and accurate segregation during mitosis. The full-length protein localises to the kinetochore and spindle, and interacts with MAD2L2. Mutations in CHAMP1 are associated with intellectual disability with severe speech impairment (NEDHILD). The specific function of this N-terminal domain remains to be determined. This domain can be found in other positions.
