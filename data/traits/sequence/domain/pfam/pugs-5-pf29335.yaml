identifier: Pfam:PF29335
label: Protein upregulated in glial subsets pugs-5
definition: >-
  This entry represents the pugs-5 protein domain found in nematodes. The protein is upregulated in glial subsets and contains 425 amino acids. The domain adopts an all-helical fold. It contains a disordered region at the C-terminal end with compositional bias for basic and acidic residues. Expression has been observed in pharyngeal muscle cells. The function of this family remains to be determined.
