identifier: Pfam:PF26530
label: NTF2-like domain
definition: >-
  This entry represents a domain found in uncharacterised proteins from nematodes, specifically within the genus Caenorhabditis. These proteins often contain multiple copies of this domain. The domain belongs to the NTF2-like superfamily ( ), characterised by a partial β-barrel structure with α-helices enclosing a solvent-accessible cavity. These proteins display remarkable sequence diversity and serve diverse functions, including both enzymatic and non-enzymatic roles often involving small molecule binding or modification.
