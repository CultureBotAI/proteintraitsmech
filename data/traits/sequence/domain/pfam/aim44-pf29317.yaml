identifier: Pfam:PF29317
label: Altered inheritance of mitochondria protein 44
definition: >-
  This entry represents AIM44 (Altered inheritance of mitochondria protein 44), a protein localised to the bud neck in Saccharomyces cerevisiae and related fungi. AIM44 is involved in regulating mitochondrial inheritance, with disruption leading to increased frequency of mitochondrial genome loss. The protein is found at the cell division site, cellular bud neck, septin collar, and split septin rings. AIM44 expression is controlled by the transcription factor SWI5. The protein contains coiled-coil regions and multiple disordered regions.
