identifier: Pfam:PF30461
label: IS30 family transposase, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of IS30 family transposases. It precedes the HTH DNA-binding domain ( ) and the C-terminal integrase catalytic domain ( ). IS30 is a bacterial insertion sequence element first characterised in Escherichia coli. The transposase is required for mobilisation of the insertion element. Multiple copies of IS30 elements are present in E. coli K12, designated IS30A, IS30C and IS30D. The family is found in Pseudomonadota and Actinomycetota. The specific function of this short domain remains to be determined.
