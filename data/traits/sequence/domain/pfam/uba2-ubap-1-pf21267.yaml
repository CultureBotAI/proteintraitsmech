identifier: Pfam:PF21267
label: Ubiquitin-associated protein 1, UBA2 domain
definition: >-
  This domain is found in Ubiquitin-associated protein 1 (UBAP-1) and similar proteins predominantly found in animals and uncharacterised plant proteins. UBAP-1 is involved in vesicular trafficking process, as it's a component of an endosome-specific endosomal sorting complex I (ESCRT-I). It is thought to play an important role in the ubiquitin pathway and cell progression. It co-localises with TDP-43 proteins in neuronal cytoplasmic inclusions and acts as a genetic risk factor for frontotemporal lobar degeneration (FTLD). This protein contains an N-terminal UBAP-1-MVB12-associated (UMA) domain, and several tandem ubiquitin- associated (UBA) domains that may be responsible for the binding of ubiquitin-conjugating enzymes. This entry corresponds to UBA2 domain.
