identifier: Pfam:PF30544
label: Domain of unknown function (DUF8622)
definition: >-
  This entry represents putative zinc-binding domain found in a family of small uncharacterised proteins of approximately 50 to 70 residues. The family is found in cyanobacteria, chlorophyte algae, stramenopiles (including diatoms), and ascomycete fungi (primarily Dothideomycetes). The presence in both cyanobacteria and photosynthetic eukaryotes suggests possible plastid-associated function or horizontal gene transfer. The function of this family remains to be determined.
