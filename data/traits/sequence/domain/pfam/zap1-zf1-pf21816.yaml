identifier: Pfam:PF21816
label: Zap1, C2H2 zinc finger 1
definition: >-
  Zap1 transcription factor ( ) controls the expression of genes that regulate zinc homeostasis in Saccharomyces cerevisiae. Zap1 contains seven classical C2H2 zinc fingers. This domain corresponds to zinc finger 1 (Znf1) which together with zinc finger 2 (Znf2) has been shown to be a responsive transcriptional activator. Both zinc fingers interact cooperatively to stabilise the Zn-binding. This zinc finger is also found in pH-response transcription factor pacC/RIM101 ( ) that mediates regulation of both acid- and alkaline-expressed genes in response to ambient pH. Proteins containing this domain are primarily found in fungi and eumetazoa.
