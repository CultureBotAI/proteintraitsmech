identifier: Pfam:PF05336
label: L-rhamnose mutarotase
definition: >-
  Mutarotases are enzymes which interconvert the alpha and beta stereoisomers of monosaccharides, enhancing the rate of their metabolism. Proteins in this entry are homologues of the rhamnose mutarotase YiiL ( ) from Escherichia coli, and are often encoded in rhamnose utilisation operons. YiiL is an enzyme which interconverts the alpha and beta stereoisomers of the pyranose form of L-rhamnose. It is not required for growth on rhamnose, but allows cells to utilise this carbon source more efficiently.The structure of YiiL is distinct from other mutarotases, forming an asymmetric dimer stabilised by an intermolecular β-sheet, hydrophobic interactions and a salt bridge. Included in this family is the L-fucose mutarotase from Xanthomonas campestris XCC4070, but not other L-fucose mutarotases.
