identifier: Pfam:PF26114
label: Mok13, second Ig-like beta-sandwich domain
definition: >-
  This domain is found in the family of fungal cell wall alpha-1,3-glucan synthase enzymes such as Mok11, Mok12, Mok13 and Ags1. The domain represented by this entry has a detectable similarity to known Ig-like domains and is predicted to adopt a similar structure. Mok11, Mok12, Mok13 and Ags1 are involved in the biosynthesis of alpha-1,3-glucan, a key structural polysaccharide in fungal cell walls. They play critical roles in maintaining cell integrity, morphology, and virulence. Mok12 and Mok13 are involved in the synthesis of the greater part of α-glucan in the spores envelope, a polymer that is mainly digested with mutanase.
