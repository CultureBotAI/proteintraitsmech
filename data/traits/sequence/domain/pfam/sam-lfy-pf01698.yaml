identifier: Pfam:PF01698
label: Floricaula / Leafy protein SAM domain
definition: >-
  FLO and LFY proteins are floral meristem identity proteins. Mutations in the sequences of these proteins affect flower and leaf development. LFY has been shown to bind semi-palindromic 19-bp DNA elements through its highly conserved C-terminal DNA-binding domain (DBD). In addition to its well-characterised DBD, LFY possesses a second conserved domain at its amino terminus (LFY-N). Crystallographic structure determination shows that LFY-N is a sterile alpha motif (SAM) domain that mediates LFY oligomerisation. It allows LFY to bind to regions lacking high-affinity LFY-binding sites and to access closed chromatin regions. Experiments revealed that altering the capacity of LFY to oligomerize compromised floral function. It has been suggested that the biochemical properties of the SAM domain are evolutionarily conserved in all plant species. This entry represents a SAM domain found in various plant proteins which are homologues of floricaula (FLO) and Leafy (LFY).
