identifier: Pfam:PF07645
label: Calcium-binding EGF domain
definition: >-
  This entry represents the EGF-like domains found in Neurogenic locus notch homolog protein 1 (NOTCH1) and related proteins such as protein kinase C-binding protein NELL2, Uromodulin and others. The EGF-like domains in NOTCH1 perform multiple functions and constitute crucial elements of the Notch signalling system. They play a role in dimer formation. They also serve as a protection against proteases, including TNF-alpha converting enzyme, which prevents Notch1 from ligand-independent activation.
