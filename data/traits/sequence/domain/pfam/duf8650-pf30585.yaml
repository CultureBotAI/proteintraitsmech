identifier: Pfam:PF30585
label: Domain of unknown function (DUF8650)
definition: >-
  This entry represents a family of small proteins of approximately 100 residues found in Cyanobacteriota, predominantly in Synechococcales. One member of this family has been detected in the exoproteome of Synechococcus, suggesting these proteins may be secreted. The function of this family remains to be determined.
