identifier: Pfam:PF00847
label: AP2 domain
definition: >-
  Ethylene is an endogenous plant hormone that influences many aspects of plant growth and development. Some defense related genes that are induced by ethylene contain a cis-regulatory element known as the Ethylene-Responsive Element (ERE). Sequence analysis on various ERE regions has identified a short motif rich in G/C nucleotides, the GCC-box, essential for the response to ethylene. This short motif is recognised by a family of transcrition factors, the ERE binding factors (ERF). ERF proteins contain a domain of around 60 amino acids which is also found in the APETALA2 (AP2) protein. This AP2/ERF domain has been shown in various proteins to be necessary and sufficient to bind the GCC-box. The structure of the AP2/ERF domain in complex with the target DNA has been solved. The structure resembles that of bacteriophage integrases and the methyl-CpG-binding domain (MBD): a three-stranded β-sheet and an α helix almost parallel to the β-sheet. It contacts DNA via Arg and Trp residues located in the β-sheet.
