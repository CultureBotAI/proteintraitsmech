identifier: Pfam:PF04457
label: MJ1316 RNA cyclic group end recognition domain
definition: >-
  This MJ1316 domain appears to be an RNA repair domain predicted to be involved specifically in the recognition of RNA 3' ends with 2'-3' cyclic phosphate groups. It is found in UPF0248 proteins and Leukocyte receptor cluster member 9.
