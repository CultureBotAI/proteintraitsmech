identifier: Pfam:PF01884
label: PcrB family
definition: >-
  This entry represents geranylgeranylglyceryl phosphate (GGGP) synthase and Heptaprenylglyceryl phosphate (HepGP) synthase. GGGP synthase is a prenyltransferase that catalyses the transfer of the geranylgeranyl moiety of geranylgeranyl diphosphate (GGPP) to the C3 hydroxyl of sn-glycerol-1-phosphate (G1P). This reaction is the first ether-bond-formation step in the biosynthesis of archaeal membrane lipids. This entry also matches putative glycerol-1-phosphate prenyltransferases that may catalyse the transfer of a prenyl moiety to sn-glycerol-1-phosphate (G1P).
