identifier: Pfam:PF26484
label: WNWW domain
definition: >-
  This entry represents a family of uncharacterised proteins from Halobacteria. Its exact function remains unknown. It contains a highly conserved WNWW motif close to the C terminus after which the domain is named. Tryptophan is usually a relatively uncommon amino acid so this motif is unusual.
