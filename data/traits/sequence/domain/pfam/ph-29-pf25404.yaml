identifier: Pfam:PF25404
label: PH-like domain
definition: >-
  This entry represents PH-like domains found in a group of uncharacterised proteins from unicellular eukaryotes, primarily kinetoplastids. The domain is found in several different domain architectures with Pex24p-like domains , or phosphatases.
