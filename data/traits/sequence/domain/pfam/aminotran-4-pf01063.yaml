identifier: Pfam:PF01063
label: Amino-transferase class IV
definition: >-
  Aminotransferases share certain mechanistic features with other pyridoxal-phosphate dependent enzymes, such as the covalent binding of the pyridoxal-phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies. This entry represents a subfamily of aminotransferases, called class-IV, with currently consists of proteins of about 270 to 415 amino-acid residues that share a few regions of sequence similarity. Surprisingly, the best conserved region does not include the lysine residue to which the pyridoxal-phosphate group is known to be attached, in ilvE, but is located some 40 residues at the C terminus side of the pyridoxal-phosphate-lysine. The D-amino acid transferases (D-AAT), which are among the members of this entry, are required by bacteria to catalyse the synthesis of D-glutamic acid and D-alanine, which are essential constituents of bacterial cell wall and are the building block for other D-amino acids. Despite the difference in the structure of the substrates, D-AATs and L-ATTs have strong similarity. Bifunctional aminodeoxychorismate lyase / D-amino acid transaminase from Mycobacterium tuberculosis (also referred to as Rv0812) is a bifunctional enzyme that catalyses two enzymatic reactions in biochemically unrelated pathways: acts as an aminodeoxychorismate (ADC) lyase (ADCL) in folate biosynthesis, converting 4-amino-4-deoxychorismate (ADC) to 4-aminobenzoate (PABA), and as a D-amino acid transaminase (DAAT) in peptidoglycan (PG) biosynthesis. This group also includes transaminase htyB from Aspergillus rugulosus , which is one of the enzymes required for the biosynthesis of the antifungal agent echinocandin B. HtyB catalyses the production of L-homotyrosine from the intermediate 2-oxo-4-(4-hydr…
