identifier: Pfam:PF30792
label: Type II secretion system protein E, N-terminal domain
definition: >-
  This entry represents an N-terminal four-helical bundle domain of approximately 65 residues. The domain is found at the N-terminal of type II secretion system protein E (T2SSE, ). According to STRING, proteins containing this domain are functionally associated with T2SSF ( ). This domain is found predominantly in Alphaproteobacteria, particularly Rhodobacterales and Hyphomicrobiales.
