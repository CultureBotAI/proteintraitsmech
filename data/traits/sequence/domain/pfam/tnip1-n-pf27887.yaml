identifier: Pfam:PF27887
label: TNFAIP3-interacting protein 1, N-terminal domain
definition: >-
  This entry represents the N-terminal helical domain of TNFAIP3- interacting protein 1 (TNIP1) and similar proteins from vertebrates. This domain forms a coiled-coil structure spanning approximately residues 20-73 in the human protein. The specific function of this domain remains to be determined. TNIP1 inhibits NF-kappa-B activation and TNF-induced NF-kappa-B-dependent gene expression by regulating TAX1BP1 and A20/TNFAIP3-mediated deubiquitination of IKBKG. The protein is involved in regulation of EGF-induced ERK1/ERK2 signalling pathways and prevention of autoimmunity.
