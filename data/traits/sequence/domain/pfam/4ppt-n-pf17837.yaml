identifier: Pfam:PF17837
label: 4'-phosphopantetheinyl transferase N-terminal domain
definition: >-
  This entry represents the N-terminal domain from 4'- phosphopantetheinyl transferase enzymes. This domain is structurally related to the 4'-phosphopantetheinyl transferase domain ( ) with which it forms a pseudodimeric arrangement. This domain can also be found in enterobactin synthase component D (EntD), which forms part of the enterobactin-synthetase enzyme complex. It plays an essential role in the assembly of the enterobactin by catalyzing the transfer of the 4'-phosphopantetheine (Ppant) moiety from coenzyme A to the apo-domains of both EntB (ArCP domain) and EntF (PCP domain) to yield their holo-forms which make them competent for the activation of 2,3-dihydroxybenzoate (DHB) and L-serine, respectively. Deletion studies involving EntD- mutants have shown that it is essential for virulence.
