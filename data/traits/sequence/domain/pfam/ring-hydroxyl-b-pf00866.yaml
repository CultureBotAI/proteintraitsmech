identifier: Pfam:PF00866
label: Ring hydroxylating beta subunit
definition: >-
  This entry represents the ring hydroxylating dioxygenase beta subunit. This subunit has a similar structure to NTF-2, Ketosteroid isomerase and scytalone dehydratase. The degradation of aromatic compounds by aerobic bacteria frequently begins with the dihydroxylation of the substrate by nonhaem iron-containing dioxygenases. These enzymes consist of two or three soluble proteins that interact to form an electron-transport chain that transfers electrons from reduced nucleotides (NADH) via flavin and [2Fe-2S] redox centres to a terminal dioxygenase. Aromatic-ring-hydroxylating dioxygenases oxidise aromatic hydrocarbons and related compounds to cis-arene diols. These enzymes utilise a mononuclear non-haem iron centre to catalyse the addition of dioxygen to their respective substrates. The active site of these enzymes however is in the alpha subunit. No functional role has been attributed to the beta subunit except for a structural role.
