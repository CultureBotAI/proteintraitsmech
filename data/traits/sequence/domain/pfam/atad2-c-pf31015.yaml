identifier: Pfam:PF31015
label: ATAD2 ATPase C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 60 residues found in ATAD2 and ATAD2B proteins in animals and fungi. This domain follows the AAA ATPase domain ( ), AAA_lid_3 domain ( ), and Bromodomain ( ). ATAD2 is a transcriptional coactivator of estrogen receptor alpha (ESR1) that is upregulated in multiple cancers. The protein binds acetylated histones via its bromodomain and is required for histone hyperacetylation at ESR1 target gene promoters. ATAD2B localises to replication sites and is involved in chromatin dynamics during DNA replication.
