identifier: Pfam:PF17820
label: PDZ domain
definition: >-
  This entry represents a conserved domain found at the C terminus of S41 family carboxyl-terminal processing peptidases in members of the phylum Bacteroidota. The domain is approximately 85-90 amino acids in length and is located immediately downstream of the Peptidase_S41 catalytic domain ( ). S41 family peptidases are serine proteases involved in C-terminal processing of proteins, including the removal of C-terminal extensions from penicillin-binding proteins and other substrates. This C-terminal domain is found exclusively in Bacteroidota, particularly in the classes Bacteroidia, Flavobacteriia, Cytophagia and Sphingobacteriia, suggesting it may confer phylum-specific functionality or substrate specificity. The domain architecture of these proteins typically consists of an N-terminal CtpB_N-like domain ( ), one or more PDZ domains ( , , ), the catalytic Peptidase_S41 domain, and this C-terminal domain. The function of this domain remains to be determined.
