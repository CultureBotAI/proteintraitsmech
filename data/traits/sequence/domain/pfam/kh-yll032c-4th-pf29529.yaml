identifier: Pfam:PF29529
label: YLL032C fourth KH domain-containing protein
definition: >-
  This entry represents the fourth KH domain in YLL032C and similar proteins found in fungi,. These proteins are involved in RNA binding. The representative protein YLL032C is localised to the cytoplasm and exhibits mRNA binding activity. These proteins undergo phosphorylation and are involved in RNA metabolism. The specific function of these proteins remains to be determined. This domain is also found in K homology domain-containing protein 4 from Mycosarcoma maydis, an RNA-binding protein that recognises the sequence AUACCC via its tandem KH domains 3 and 4, probably in order to promote mRNA instability and plays an essential role in filamentous growth and virulence.
