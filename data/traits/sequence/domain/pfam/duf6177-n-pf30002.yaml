identifier: Pfam:PF30002
label: DUF6177, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of a member of a biosynthetic gene cluster (BGC) represented by . This BGC (BGC0000360) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the GE81112 biosynthetic gene cluster from Streptomyces sp. L-49973 and appears to be predominantly found in Actinobacteria. This domain can also be found in uncharacterised proteins.
