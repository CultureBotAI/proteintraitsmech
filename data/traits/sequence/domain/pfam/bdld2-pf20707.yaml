identifier: Pfam:PF20707
label: Bacterial Death-like domain 2
definition: >-
  This bacterial adaptor domain of the Death-domain fold is involved in protein-protein interactions in biological conflict systems. bDLDs show a characteristic architectural pattern. One copy is always fused, typically to the N- or C-terminal, of a core component of a biological conflict system; examples include VMAP and iSTAND. Further copies of the same bDLD are fused to either effector or signal-transducing domains, or additional Effector-associated domains (EADs). bDLD pairs are frequently observed together on the genome in conserved gene neighbourhoods, but can also be severed from such neighbourhoods and located in distant regions, indicating the bDLD-bDLD coupling approximates the advantages of collinear transcription.
