identifier: Pfam:PF15094
label: Domain of unknown function (DUF4556), Ig-like
definition: >-
  This entry (ex DUF4556) represents an uncharacterised domain in CIROZ proteins from animals. This domain is predicted to adopt an all-β structure and can be found at the C-terminal in some CIROZ proteins. CIROZ, formerly known as C1orf127, encodes a secreted protein characterised by an N-terminal signal peptide followed by three zona pellucida N domains ( ), consistent with an extracellular localisation. It is specifically expressed in the left-right organiser (LRO) of several vertebrates, including mice, frogs and fish. Bi-allelic inactivation of CIROZ in humans is associated with heterotaxy and congenital heart defects, and knockout studies in mice confirm its essential role in establishing left-right embryonic asymmetry. However, targeted inactivation of the gene in zebrafish and Xenopus does not result in overt laterality defects, suggesting species-specific roles. Evolutionary analysis reveals that CIROZ is either absent or rendered non-functional in certain vertebrate lineages possessing motile cilia at the LRO, such as Carnivora, Atherinomorpha fish and jawless vertebrates. These findings highlight CIROZ as a key regulator of bilateral symmetry in mammals, with its loss or pseudogenisation reflecting divergent mechanisms of left-right axis specification across vertebrate evolution.
