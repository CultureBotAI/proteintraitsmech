identifier: Pfam:PF27130
label: Sll1247 N-terminal helical domain
definition: >-
  This entry represents the N-terminal helical domain of uncharacterised protein sll1247 from Synechocystis sp. PCC 6803 and related cyanobacteria. The gene is located adjacent to murF, which encodes UDP-N-acetylmuramoyl-tripeptide--D-alanyl-D-alanine ligase involved in peptidoglycan biosynthesis. The specific function of sll1247 and its N-terminal domain remains to be determined.
