identifier: Pfam:PF26421
label: Avidin-like protein
definition: >-
  This entry represents a group of uncharacterised proteins primarily from the bacteria. Members of this family are generally around 100-120 amino acids in length. Its predicted structure forms an 8-stranded β- barrel closely structurally related to avidins.
