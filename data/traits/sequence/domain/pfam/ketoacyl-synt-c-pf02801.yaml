identifier: Pfam:PF02801
label: Beta-ketoacyl synthase, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of beta-ketoacyl-ACP synthases. The active site is contained in a cleft between N-and C-terminal domains, with residues from both domains contributing to substrate binding and catalysis. It is also found in polyketide synthases such as Non-reducing polyketide synthase nscA, reducing polyketide synthase FUB1, Phenolphthiocerol synthesis polyketide synthase type I Pks15/1 and related enzymes. Beta-ketoacyl-ACP synthase (KAS) is the enzyme that catalyses the condensation of malonyl-ACP with the growing fatty acid chain. It is found as a component of a number of enzymatic systems, including fatty acid synthetase (FAS), which catalyses the formation of long-chain fatty acids from acetyl-CoA, malonyl-CoA and NADPH; the multi-functional 6-methysalicylic acid synthase (MSAS) from Penicillium patulum, which is involved in the biosynthesis of a polyketide antibiotic; polyketide antibiotic synthase enzyme systems; Emericella nidulans multifunctional protein Wa, which is involved in the biosynthesis of conidial green pigment; Rhizobium nodulation protein nodE, which probably acts as a beta-ketoacyl synthase in the synthesis of the nodulation Nod factor fatty acyl chain; and yeast mitochondrial protein CEM1. The condensation reaction is a two step process, first the acyl component of an activated acyl primer is transferred to a cysteine residue of the enzyme and is then condensed with an activated malonyl donor with the concomitant release of carbon dioxide.
