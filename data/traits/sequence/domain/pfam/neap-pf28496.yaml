identifier: Pfam:PF28496
label: Nuclear envelope-associated protein
definition: >-
  This entry represents the C-terminal region of nuclear envelope-associated protein (NEAP) family of proteins from plants. These proteins are characterised by extensive coiled-coil domains and a C-terminal transmembrane region that anchors them to the nuclear inner membrane. This entry covers part of the coiled-coil and the C-terminal transmembrane helix. In Arabidopsis thaliana, this family comprises three genes AtNEAP1-3 expressed ubiquitously and a pseudogene AtNEAP4. These proteins consist of coiled-coils and localise to the nuclear periphery where they form part of stable protein complexes. They are able to form homo- and heteromers, and interact with the SUN domain proteins AtSUN1 and AtSUN2, which are involved in the linker of nucleoskeleton and cytoskeleton (LINC) complex.
