identifier: Pfam:PF29987
label: STM0557-like, C-terminal domain
definition: >-
  This entry represents the C-terminal domain in STM0557 from Salmonella typhimurium ( ) and in similar sequences from bacteria. STM0557 is involved in the addition of glucose to the galactose moiety of the S.Typhimurium O-antigen via an alpha 1-4 linkage. This domain is predicted to show an all-β configuration.
