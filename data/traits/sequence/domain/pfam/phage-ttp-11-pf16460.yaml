identifier: Pfam:PF16460
label: Phage tail tube, TTP, lambda-like
definition: >-
  This family represents the phage-tail-tube protein from a set of Siphoviridae from Gammaproteobacteria. Tail tube proteins polymerise with the assistance of the Tail-tip complex, a tape measure protein and two chaperones. Infectivity of host is delivered through the tube. The protein from Pseudomonas is a structural protein.
