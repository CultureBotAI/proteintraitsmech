identifier: Pfam:PF02981
label: FokI, recognition domain, subdomain 1
definition: >-
  Type IIS restriction endonuclease FokI ( ) is a member of an unusual class of bipartite restriction enzymes that recognises the double-stranded DNA sequence 5'-GGATG-3' and cleave DNA phosphodiester groups 9 base pairs away on this strand and 13 base pairs away on the complementary strand. FokI contains amino- and carboxy-terminal domains corresponding to the DNA-recognition and cleavage functions, respectively. The recognition domain is made of three smaller subdomains (D1, D2 and D3) which are evolutionarily related to the helix-turn-helix-containing DNA-binding domain of the catabolite gene activator protein CAP. This entry represents the subdomain D1 of FokI. Subdomain D1 of the recognition domain covers the DNA major groove, recognizing base pairs at the 3' end of the recognition sequence (GGATG).
