identifier: Pfam:PF25452
label: TM225-like domain
definition: >-
  This domain is found in human Transmembrane protein 225 (TM225), 225B (TM225B) and similar animal proteins. This domain is predicted to adopt an all-α configuration. Transmembrane protein 225 (TM225) is specifically expressed in testis. It may be involved in the differentiation and function of spermatozoa through the regulation of PP1gamma2 activity.
