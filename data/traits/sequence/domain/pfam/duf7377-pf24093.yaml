identifier: Pfam:PF24093
label: Domain of unknown function (DUF7377)
definition: >-
  This domain is found in uncharacterised plant proteins. It is predicted to adopt an α/β structure with a central four-stranded antiparallel β-sheet and α-helices packed on it. It has weak sequence and structural similarity to NIL domains. It is usually found N-terminal to protein kinase domains.
