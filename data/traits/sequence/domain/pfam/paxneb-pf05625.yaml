identifier: Pfam:PF05625
label: PAXNEB protein
definition: >-
  Elongator is a 6 subunit protein complex highly conserved in eukaryotes. The human Elongator six-subunit complex, known as holo-Elongator, has histone acetyltransferase activity directed against histone H3 and H4. It consists of two subcomplexes, a core subcomplex (ELP1-3), and an accessory subcomplex (ELP4-6). The elongator complex has been associated with many cellular activities, including transcriptional elongation, but its main function is tRNA modification. It is required for the formation of 5-methoxy-carbonylmethyl (mcm5) and 5-carbamoylmethyl (ncm5) groups on uridine nucleosides present at the wobble position of many tRNAs. This entry represents the ELP4 subunit. Mammalian ELP4 gene is implicated in rolandic epilepsy.
