identifier: Pfam:PF27503
label: Rv3811 N-terminal galactose-binding domain-like
definition: >-
  This entry represents the N-terminal domain of Mycobacterium tuberculosis Rv3811 ( ) and related proteins mainly found in actinomycetes. This domain adopts a galactose-binding domain-like fold and is found at the N-terminal of a larger multi-domain protein. The full-length Rv3811 protein is a 539-residue conserved hypothetical protein that also contains a middle region with similarity to peptidoglycan recognition proteins and a C-terminal region similar to secreted proteins. Rv3811 shows the highest similarity to proteins from Streptomyces species and is classified as non-essential for in vitro growth of M. tuberculosis. The specific function of this region remains to be determined.
