identifier: Pfam:PF16242
label: Pyridoxamine 5'-phosphate oxidase like
definition: >-
  This domain, approximately 140 residues in length, is mainly found in general stress proteins in various Xanthomonas species. It is composed of a six-stranded antiparallel β-barrel flanked by five α-helices and can bind to FMN and FAD, suggesting that it may help the bacteria to react against the oxidative stress induced by the defense mechanisms of the plant. Proteins containing this domain also include some fungal proteins, such as bli-3 from Neurospora crassa. Bli-3 is induced by blue-light and osmotic stress.
