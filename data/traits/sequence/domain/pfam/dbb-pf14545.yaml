identifier: Pfam:PF14545
label: Dof, BCAP, and BANK (DBB) motif,
definition: >-
  This entry represents the DBB domain. The following proteins share a number of distinct parts, namely with ankyrin repeats (see ), a coiled coil, and a stretch of approximately 140 amino acid residues the development of the immune system in higher upstream of the ankyrin repeats, which has been called the Dof/BCAP/BANK (DBB) domain: Drosophila Downstream-of-EGF receptor (Dof), a protein essential for the morphogenesis of both the mesoderm and the tracheae. It has been proposed to mediate the transmission of a signal from an activated receptor to other components of the cell, including the MAP kinase cascade. Vertebrate BANK and BCAP proteins that function in B-cell signalling. These proteins are involved in signalling; however, unlike Dof, BANK and BCAP are not implicated in FGF signalling but appear to have undergone rapid change during the course of evolution to acquire a novel function with vertebrates. The DBB domain in both Dof and BCAP is required to mediate self-association in yeast cells, indicating that this domain may have a more general role in mediating protein-protein interactions. DBB domain of BCAP is required for dimerization and leads to negative regulation of TLR signalling.
