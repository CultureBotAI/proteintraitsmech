identifier: Pfam:PF21541
label: CATSPER protein subunit beta protein 1st domain
definition: >-
  This entry represents the N-terminal domain from the Cation channel sperm-associated protein subunit beta. CatSper (cationic channel of sperm) is a complex ion channel that mediates Ca2+ entry in sperm flagellum and is required for sperm hyperactivation and male fertility. The CATSPER channel consists of four CatSper proteins (CatSper1-4) that form a tetramer surrounding a Ca(2+)-selective pore. In addition to the pore-forming proteins, the CATSPER channel contains auxiliary subunits, beta, gamma, delta and epsilon (CATSPERB/G/D/E), CATSPERB is included in this entry, which mediates extensive contacts with other subunits and thus, it is involved in stabilising the channel complex.
