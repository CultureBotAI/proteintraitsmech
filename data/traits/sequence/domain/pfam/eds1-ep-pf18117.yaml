identifier: Pfam:PF18117
label: Enhanced disease susceptibility 1 protein EP domain
definition: >-
  This entry represents the C-terminal domain found in a group of sequences from plants, including Protein EDS1 (also known as Enhanced disease susceptibility 1), Lipase-like PAD4 (also termed Protein PHYTOALEXIN DEFICIENT 4) and Senescence-associated carboxylesterase 101 (SAG101) from Arabidopsis thaliana. Members of this group of proteins are involved in signalling by cell surface and intracellular immune receptors.
