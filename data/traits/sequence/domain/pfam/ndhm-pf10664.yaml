identifier: Pfam:PF10664
label: Cyanobacterial and plastid NDH-1 subunit M
definition: >-
  The NADH dehydrogenase I complex shuttles electrons from an unknown electron donor, via FMN and iron-sulphur (Fe-S) centres, to quinones in the respiratory and/or the photosynthetic chain. The immediate electron acceptor for the enzyme in plants is believed to be plastoquinone. The NADH dehydrogenase I complex couples the redox reaction to proton translocation, and thus conserves the redox energy in a proton gradient. This entry represents subunit M of the NADH dehydrogenase I complex in cyanobacteria and plant chloroplasts.
