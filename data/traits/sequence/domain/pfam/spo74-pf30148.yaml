identifier: Pfam:PF30148
label: Sporulation-specific protein 74
definition: >-
  This entry represents the SPO74 (sporulation-specific protein 74) family, found in fungi. SPO74 is a meiosis-specific protein involved in the pathway that organises the shaping and sizing of the prospore membrane during sporulation. The protein is a probable component of a core structural unit of the scaffold that initiates synthesis of the prospore membrane. SPO74 localises to the meiotic outer plaque of the spindle pole body at the end of the meiotic spindles. The protein interacts with itself and with other spindle pole body components including MPC54, NUD1, and SPO21. SPO74 exhibits structural molecule activity and is essential for proper ascospore formation during meiosis. The protein is expressed specifically during meiosis and plays a critical role in prospore membrane organisation and development in fungal sporulation.
