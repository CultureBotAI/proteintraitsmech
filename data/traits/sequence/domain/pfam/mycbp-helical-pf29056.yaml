identifier: Pfam:PF29056
label: c-Myc-binding protein
definition: >-
  This entry represents c-Myc-binding protein homologs and related proteins from the AMY1 family. c-Myc-binding proteins are involved in transcriptional regulation and act as transcription coactivators. The proteins are localised to the nucleus and participate in the regulation of DNA-templated transcription.
