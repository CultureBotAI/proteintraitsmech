identifier: Pfam:PF08965
label: Aca2/YdiL-like
definition: >-
  This family includes Aca2 repressor from Pectobacterium phage ZF40, the uncharacterised protein YdiL from Escherichia coli and similar sequences found in tailed bacteriophages, proteobacteria and actinomycetes. Aca2 regulates the transcription and translation of phage anti-CRISPR acrIF8 gene through DNA binding to 2 inverted repeats in the promoter region and translationally by binding conserved RNA stem-loops on mRNAs thereby blocking ribosome access. This protein contains six α-helices and two parallel β-strands. The function of YdiL, which is predicted to adopt a very similar structure, is still unknown.
