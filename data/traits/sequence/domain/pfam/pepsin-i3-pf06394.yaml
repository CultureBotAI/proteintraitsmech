identifier: Pfam:PF06394
label: Pepsin inhibitor-3-like repeated domain
definition: >-
  Pepsin inhibitor-3 consists of two domains, each comprising an antiparallel β-sheet flanked by an α-helix. In the enzyme-inhibitor complex, the N-terminal β-strand of PI-3 pairs with one strand of the active site flap region of pepsin. The two domains are tandem repeats of sequence, and has therefore been termed repeated domain.
