identifier: Pfam:PF26480
label: Domain of unknown function (DUF8153)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins in this family are primarily found within the Halobacteria class, including genera such as Halorubrum, Haloquadratum, and Haloplanus. The domain is approximately 95-147 amino acids in length. Proteins containing this domain are predicted to be integral membrane proteins.
