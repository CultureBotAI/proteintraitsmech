identifier: Pfam:PF27148
label: Slr1353 N-terminal dsRNA-binding domain-like
definition: >-
  This entry represents the N-terminal domain of Slr1353, an uncharacterised protein from the cyanobacterium Synechocystis sp. PCC 6803. This domain adopts a double-stranded RNA-binding domain-like fold, though its specific nucleic acid binding properties and biological function remain to be determined. The function of this N-terminal domain is unknown.
