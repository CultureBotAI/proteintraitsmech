identifier: Pfam:PF31029
label: Caulimoviridae transactivator/viroplasmin C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 250 residues found in the transactivator/viroplasmin (Tav/P6) protein of plant DNA viruses in the family Caulimoviridae. This domain follows the N-terminal Cauli_VI domain ( ) which has RNase H-like structural similarity. The full-length Tav protein enhances translation of downstream ORFs on polycistronic viral mRNAs through ribosomal reinitiation, and localises to cytoplasmic inclusion bodies which are sites of viral replication. The specific function of this domain remains to be determined.
