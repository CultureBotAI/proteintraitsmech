identifier: Pfam:PF26378
label: YpfK family
definition: >-
  This entry represents a family of small transmembrane proteins found in enterobacterales, including Uncharacterized protein YpfK from Salmonella typhimurium. Members of this family are characterised by three predicted transmembrane helices. The biological function of these proteins remains unknown.
