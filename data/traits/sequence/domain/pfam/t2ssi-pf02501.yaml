identifier: Pfam:PF02501
label: Type II secretion system (T2SS), protein I
definition: >-
  This entry represent the C-terminal domain of GspI, which is a pseudopilin component of the type II secretion system (T2SS). It contains the prepilin signal sequences. In Pseudomonas aeruginosa GspI homologue, known as XcpV, has been suggested to be the central component and initiator of pseudopilus formation. The type II secretion system (T2SS) is one of several extracellular secretion systems in gram-negative bacteria. It delivers toxins and a range of hydrolytic enzymes including proteases, lipases and carbohydrate-active enzymes to the cell surface or extracellular space. T2SS systems are composed of 11 to 15 different proteins, which are generally called GspA to GspO and GspS. The T2SS spans the two bacterial membranes and ensures secretion of folded proteins across the outer membrane pore formed by GspD. The inner membrane complex contains GspC, GspL, GspM, and GspF. The cytoplasmic domains of GspL and GspF interact with an ATPase, GspE. GspE is thought to energize the formation of a short pseudopilus by several pilin-like proteins, GspG to GspK. GspD has been shown to interact with the inner membrane component GspC.
