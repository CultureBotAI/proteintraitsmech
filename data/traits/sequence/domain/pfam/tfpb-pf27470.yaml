identifier: Pfam:PF27470
label: Type IV pilus biogenesis protein TfpB
definition: >-
  This entry represents a family of proteins involved in type IV pilus biogenesis found predominantly in gammaproteobacteria. The prototype protein TfpB from Moraxella bovis is located in the pilin gene inversion region. Members of this family are approximately 261 amino acids in length and contain multiple N-terminal transmembrane helices. The function of this protein family remains to be determined.
