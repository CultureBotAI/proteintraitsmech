identifier: Pfam:PF29549
label: FAR1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in FAR1 and related cyclin-dependent kinase inhibitors. The C-terminal region of FAR1 is required for oriented cell polarisation in response to mating pheromones. The domain is found in FAR1 orthologues across Saccharomycotina yeasts. FAR1 functions as an inhibitor of the CDC28-CLN cyclin-dependent kinase complex and is essential for G1 cell cycle arrest during the mating response.
