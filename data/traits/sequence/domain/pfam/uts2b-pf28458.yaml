identifier: Pfam:PF28458
label: Urotensin-2B
definition: >-
  Urotensin II has been reported as the most potent known vasoconstrictor, involved in the cardiovascular regulation and osmoregulation. Urotensin II-related proteins mRNA are specifically expressed in several cerebral structures and tissues (heart, seminal vesicle), suggesting a role in the regulation of autonomic, cardiovascular and reproductive functions. This entry includes Urotensin-2B (U-IIB) proteins. U-IIB inhibits glucagon-like peptide-1(GLP-1) secretion in mouse intestinal crypts and organoid through the activation of the somatostatin receptor 5 (SSTR5).
