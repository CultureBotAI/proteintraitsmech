identifier: Pfam:PF21057
label: Hikeshi-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Hikeshi from humans and its orthologues OPI10 from yeast and arthropods. Hikeshi is an specific nuclear import carrier for HSP70 proteins following heat-shock stress, which is required to protect cells from heat-shock damages. The intrinsically flexible C-terminal domain is responsible for the asymmetric dimeric conformation adopted by the protein, which seems to be an important regulator of Hsp70 binding. It shows three α-helices and a short β-strand in a coiled-coil-like configuration.
