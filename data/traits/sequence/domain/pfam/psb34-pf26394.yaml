identifier: Pfam:PF26394
label: Psb34 family
definition: >-
  This entry represents a group of proteins from cyanobacteria, including Psb34 from Synechocystis sp. PCC 6803 ( ). Members of this family are small, usually about 56 amino acids, with an N-terminal half related to HliA/B proteins belonging to a family of high-light-inducible proteins (Hlips), and a highly hydrophobic C-terminal half embedded in the thylakoid membrane. It has been proposed that the Psb34 protein regulates the binding of high-light-inducible proteins to assembly intermediates of photosystem II that contain CP47.
