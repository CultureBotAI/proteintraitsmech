identifier: Pfam:PF22133
label: Botulinum neurotoxin, helical domain
definition: >-
  This entry represents an elongated helical domain present in Clostridium neurotoxins, including non-toxic nonhaemagglutinin (NTNH). The Clostridium neurotoxin family is composed of tetanus neurotoxin and seven serotypes of botulinum neurotoxin (BoNT). Bacteria of the Clostridium genus produce protein neurotoxins, which are complexes consisting of neurotoxin (NT), haemagglutinin (HA), non-toxic nonhaemagglutinin (NTNH), and RNA. BoNT is always encoded together with associated non-toxic proteins (ANTPs) that are co-produced with it and form a complex that protects the toxin. Often, NTNH is one of these ANTPs, with the ntnh gene lying immediately upstream of the bont gene.
