identifier: Pfam:PF27425
label: AF0631-like N-terminal beta-barrel domain
definition: >-
  This entry represents the N-terminal domain of AF0631-like proteins found in archaea and bacteria. This domain forms a seven-stranded β-barrel structure of approximately 138 amino acids. The family is found predominantly in Archaeoglobi, including Archaeoglobus, Geoglobus, and Ferroglobus species, with additional members in Spirochaetota. The specific function of this N-terminal β-barrel domain remains to be determined.
