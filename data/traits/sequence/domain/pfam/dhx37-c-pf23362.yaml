identifier: Pfam:PF23362
label: DEAH helicase DHX37 C-terminal domain
definition: >-
  This domain is found at the C-terminal in human ATP-dependent RNA helicase DHX37 and related proteins. DHX37 is a component of the human SSU processome and plays an important role in processome maturation. This domain folds into an array of α-helices and it is involved in protein-protein interactions with other components such as PWP2 and WDR36. It is also involved in the recruitment of DHX37 to the processome.
