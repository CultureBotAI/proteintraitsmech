identifier: Pfam:PF29783
label: TP_0976 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of TP_0976, a 459 amino acid uncharacterised membrane protein from Treponema pallidum. The full-length protein is annotated as ENOG5030273 and contains transmembrane helices. The protein is predicted to localise to the plasma membrane. The specific function of this domain remains to be determined.
