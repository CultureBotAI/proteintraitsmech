  This entry represents a domain of unknown function found in large multi-domain proteins. The domain is typically located between N-terminal domains, such as lamin tail domains ( ) or cadherin-like domains, and C-terminal regions containing endonuclease/exonuclease ( , ) or calcium-binding repeat domains ( ). The function of this domain remains to be determined.
