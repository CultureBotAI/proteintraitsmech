identifier: Pfam:PF03348
label: Serine incorporator (Serinc)
definition: >-
  The serine incorporator/TMS membrane protein (TDE1/TMS) family include SERINC1-5 from mammals and its homologues membrane protein Tms1 from yeasts. Members in this family contain eleven transmembrane helices. SERINC1-5 function in incorporating serine into membranes and facilitating the synthesis of two serine-derived lipids, phosphatidylserine and sphingolipids. SERINC3 (also known as TDE1) and SERINC5 are restriction factors required to restrict infectivity of lentiviruses, such as HIV-1; they act by inhibiting an early step of viral infection and they impair the penetration of the viral particle into the cytoplasm. SERINC3/5 are non-ATP-dependent, non-specific lipid transporters for phosphatidylserine, phosphatidylcholine, and phosphatidylethanolamine that functions as a scramblase that flips lipids in both directions across the membrane. Phospholipid scrambling results in HIV-1 surface exposure of phosphatidylserine and loss of membrane asymmetry, which leads to changes in HIV-1 Env conformation and loss of infectivity. SERINC3 is overexpressed in tumours.
