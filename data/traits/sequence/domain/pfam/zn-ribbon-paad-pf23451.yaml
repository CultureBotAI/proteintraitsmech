identifier: Pfam:PF23451
label: PaaD zinc beta ribbon domain
definition: >-
  This domain is found in PaaD from Escherichia coli and similar sequences from bacteria and some archaeal proteins. This domain is predicted to adopt a zinc β-ribbon fold and contains two invariant CxxC sequence motifs. In addition, towards the C-terminal it has a semi-conserved [EQ]PF[DEQ] sequence motif. PaaD from Escherichia coli is thought to be a component of 1,2-phenylacetyl-CoA epoxidase multicomponent enzyme system which catalyses the reduction of phenylacetyl-CoA to form 1,2-epoxyphenylacetyl-CoA.
