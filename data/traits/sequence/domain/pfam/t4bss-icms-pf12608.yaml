identifier: Pfam:PF12608
label: Type IVb secretion, IcmS, effector-recruitment
definition: >-
  This entry represents a family of Gram-negative bacterial proteins involved in the Dot/Icm type IVb transport system, including IcmS from Legionella pneumophila. Members are small acidic cytoplasmic proteins required for Dot/Icm-dependent activities. IcmS is part of a subcomplex which recruits effector proteins and delivers them to the core transmembrane subcomplex.
