identifier: Pfam:PF22922
label: NLP protein GAF domain
definition: >-
  This entry represents a GAF-like domain found in plant NLP1-9 from Arabidopsis thaliana and similar proteins mainly found in plants. Several members of this group contain two copies of this domain, while most contain a RWP-RK domain ( ), and a carboxy-terminal Phox and Bem1 (PB1) domain ( ). Additionally, a nuclear export signal domain is predicted in the N terminus.
