identifier: Pfam:PF01041
label: DegT/DnrJ/EryC1/StrS aminotransferase family
definition: >-
  This entry represents the 3-amino-5-hydroxybenzoic acid synthase family (AHBA_syn) that are probably all pyridoxal-phosphate-dependent aminotransferase enzymes with a variety of molecular functions. Members of the family have the same structural fold as members of the pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily. The AHBA_syn family members are involved in various biosynthetic pathways for secondary metabolites. The AHBA_synfamily includes StsA , StsC and StsS. The aminotransferase activity was demonstrated for purified StsC protein as the L-glutamine:scyllo-inosose aminotransferase , which catalyses the first amino transfer in the biosynthesis of the streptidine subunit of streptomycin. Some other well studied proteins in this family are AHBA_synthase, the protein product of the pleiotropic regulatory gene degT, Arnb aminotransferase and pilin glycosylation protein. The prototype of this family, the AHBA_synthase, is a dimeric PLP dependent enzyme. AHBA_syn is the terminal enzyme of 3-amino-5-hydroxybenzoic acid (AHBA) formation, which is involved in the biosynthesis of ansamycin antibiotics, including rifamycin B. Some members of this family are involved in 4-amino-6-deoxy-monosaccharide D-perosamine synthesis. Perosamine is an important element in the glycosylation of several cell products, such as antibiotics and lipopolysaccharides of Gram-positive and Gram-negative bacteria. The pilin glycosylation protein encoded by gene pglA, is a galactosyltransferase involved in pilin glycosylation. Additionally, this family consists of ArnB (PmrH) aminotransferase, a 4-amino-4-deoxy-L-arabinose lipopolysaccharide-modifying enzyme. This family also includes several predicted pyridoxal phosphate-dependent enzymes apparently involved in regulation…
