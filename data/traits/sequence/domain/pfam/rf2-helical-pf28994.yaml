identifier: Pfam:PF28994
label: Protein FERTILITY RESTORER RF2, mitochondrial helical domain
definition: >-
  This entry represents a small coiled-coil domain found in RF2-like proteins from grasses and related plants. The domain is found predominantly in the Poaceae family, particularly in Oryza, Triticum, and related grass genera. The specific function of this helical domain remains to be determined. FERTILITY RESTORER RF2 (RF2) is involved in restoring male fertility in rice with cytoplasmic male sterility. YL1 (Yellow Leaf 1) plays a role in chloroplast development and photosynthetic protein complex assembly. These proteins are targeted to organelles (mitochondria or chloroplasts) and contain glycine-rich regions that may form coiled-coil structures.
