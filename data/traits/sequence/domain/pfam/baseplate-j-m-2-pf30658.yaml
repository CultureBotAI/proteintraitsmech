identifier: Pfam:PF30658
label: Baseplate J-like central domain
definition: >-
  This entry represents an alpha/beta domain of approximately 75 residues found in bacteriophage baseplate J-like proteins. This domain is typically located in the middle of large multidomain proteins that form part of the phage tail baseplate complex. The baseplate mediates host recognition and triggers tail contraction during phage infection. This family is found in prophages integrated into bacterial genomes, predominantly in Actinomycetota and Pseudomonadota. The specific function of this domain remains to be determined.
