identifier: Pfam:PF22072
label: FAP42 domain B3
definition: >-
  FAP42 is a large protein that forms the peripheral 'beam' of the C1b projection of the ciliary central apparatus (CA). This protein forms a complex with FAP413 and FAP246, which is essential for a stable assembly of the C1b, C1f and C2b projections, and loss of these proteins leads to ciliary motility defects. FAP42 structure has been determined along with other components of the Chlamydomonas reinhardtii ciliary central apparatus. FAP42 contains cysteine peptidase domain, adenylate kinase domain, five guanylate kinase domains and three β-sandwich domains. The latter adopt a jelly-roll topology and have a significant sequence and structural similarity to domain III in calpains and the predicted β-sandwich domains in androglobin. This entry represents the third FAP42 β-sandwich domain B3.
