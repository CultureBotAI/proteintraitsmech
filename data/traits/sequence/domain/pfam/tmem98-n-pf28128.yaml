identifier: Pfam:PF28128
label: Transmembrane protein 98 N-terminal helical domain
definition: >-
  This entry represents the N-terminal helical domain of transmembrane protein 98 (TMEM98) animal proteins. TMEM98 is a single-pass type II membrane protein localised to the endoplasmic reticulum and cell membrane. TMEM98 functions as a negative regulator of oligodendrocyte differentiation and myelination, and the secreted form promotes T helper 1 cell differentiation. The protein is expressed in various tissues including eye, ovary, pancreas and prostate. Mutations in TMEM98 cause nanophthalmos type 4, characterised by extreme hyperopia and small functional eyes. This domain spans approximately 90 amino acids at the N-terminal region and includes a transmembrane helix. It is required for interaction with MYRF and inhibits MYRF self-cleavage.
