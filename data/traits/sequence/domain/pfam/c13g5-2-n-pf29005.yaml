identifier: Pfam:PF29005
label: C13G5.2-like N-terminal domain
definition: >-
  This entry represents a domain found in the central region of C13G5.2 and similar uncharacterised proteins found predominantly in nematodes. The proteins are classified as containing channel/colicin domains and are related to motile sperm proteins. The function of this protein family and the specific role of this domain remain to be determined. This domain may consist of four β-strands flanked by an α-helix at each end.
