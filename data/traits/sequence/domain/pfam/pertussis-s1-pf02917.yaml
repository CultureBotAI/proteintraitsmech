identifier: Pfam:PF02917
label: Pertussis toxin, subunit 1
definition: >-
  This entry represents the S1 subunit of pertussis toxin in Bordetella pertussis and the ADP-ribosylating toxin CARDS (Community-Acquired Respiratory Distress Syndrome toxin) of Mycoplasma pneumoniae. B. pertussis is the causative agent of whooping cough and its major virulence factor is the pertussis toxin, an A/B exotoxin that mediates both colonisation and toxaemic stages of the disease. The S1 subunit acts as the catalytic "A" component and causes the characteristic "whoop" through ADP-ribosylation of host Gi alpha-units, an adenylate cyclase inhibitor, leading to elevated cAMP levels, increased cell exudate and inflammation in the lungs. The crystal structure of pertussis toxin has been determined to 2.9 Angstrom resolution; the S1 subunit shares structural similarity with other ADP-ribosylating bacterial toxins, although differences in the C-terminal portion explain its unique activation mechanism. CARDS toxin is a mono-ADP-ribosylating toxin (mART) that transfers the ADP-ribosyl group from NAD+ to multiple target proteins in vitro. It also elicits cytopathic effects in mammalian cells, including disorganisation and disruption of respiratory epithelial integrity in tracheal epithelium and vacuolisation in the cytoplasm of CHO and HeLa cells. Treatment of mice or baboons with CARDS toxin elicits prolonged inflammatory responses and airway dysfunction consistent with human M. pneumoniae infections, inducing cytokines including G-CSF, IL-1Ra, IL-6, IL-8, MIP-1a and RANTES. CARDS toxin binds phosphatidyl choline, dipalmitoylphosphatidylcholine (DPPC) and sphingomyelin via domains D2 and D3.
