identifier: Pfam:PF26487
label: Domain of unknown function (DUF8157) C-terminal domain
definition: >-
  This entry represents the C-terminal domain from a family of uncharacterised proteins from archaea, predominantly from halobacteria. The proteins typically range from 450 to 550 amino acids in length. Proteins in this entry have a methyltransferase domain centrally located and at the N-terminal end.
