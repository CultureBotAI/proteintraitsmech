identifier: Pfam:PF14780
label: Nucleolus and neural progenitor protein, N-terminal
definition: >-
  This entry represents a domain found in Nucleolus and neural progenitor protein from mouse (Nepro) and similar eukaryotic sequences. Nepro may play a role in cortex development as part of the Notch signalling pathway. Downstream of Notch, it may repress the expression of proneural genes and inhibit neuronal differentiation thereby maintaining neural progenitors. It may also be involved in preimplentation embryo development. In humans, NEPRO (also known as Ribonuclease MRP subunit P64, Rmp64), which is required for the activity of human RNase MRP, interacts with multiple protein subunits of RMRP and is implicated in Anauxetic dysplasia 3. The specific function of this domain, which is predicted to have a four-helix bundle structure, is still unknown.
