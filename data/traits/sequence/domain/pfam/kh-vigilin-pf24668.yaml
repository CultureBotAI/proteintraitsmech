identifier: Pfam:PF24668
label: Vigilin KH domain
definition: >-
  This entry represents the first KH domain located at the N-terminal of Vigilin proteins. Vigilin, also known as high-density lipoprotein-binding protein (HDL-binding protein), is a ubiquitous and highly conserved RNA-binding protein that shuttles between the nucleus and cytoplasm, presumably in association with RNA molecules. It may be involved in chromosome partitioning during mitosis, facilitation of translation and tRNA transport, and regulation of mRNA metabolism, including oestrogen-mediated stabilisation of vitellogenin mRNA. Vigilin is upregulated in response to cholesterol loading in cells and functions to protect against excessive intracellular cholesterol accumulation. It may also play a role in cellular sterol metabolism. Disruption of human vigilin impairs chromosome condensation and segregation. Vigilin possesses a unique structure comprising 14 to 15 consecutively arranged, though non-identical, K-homology (KH) domains, which appear to mediate RNA-protein interactions.
