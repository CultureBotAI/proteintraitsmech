identifier: Pfam:PF01353
label: Green fluorescent protein
definition: >-
  The green fluorescent protein (GFP) is found in the jellyfish (Aequorea victoria), and functions as an energy-transfer acceptor. It fluoresces in vivo upon receiving energy from the Ca 2+ -activated photoprotein aequorin. The protein absorbs light maximally at 395 nm and exhibits a smaller absorbance peak at 470 nm. The fluorescence emission spectrum peaks at 509 nm with a shoulder at 540 nm. The protein is produced in the photocytes and contains a chromophore, which is composed of modified amino acid residues. The chromophore is formed upon cyclisation of the residues ser-dehydrotyr-gly. There are several other members of the GFP family, which are able to fluoresce different colours, several of which are non-fluorescent. These proteins are all essentially encoded by single genes, since both the substrate and the catalytic enzyme for pigment biosynthesis are provided within a single polypeptide chain.
