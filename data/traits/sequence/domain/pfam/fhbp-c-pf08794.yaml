identifier: Pfam:PF08794
label: Factor H binding protein, C-terminal
definition: >-
  Factor H binding protein (also known as GNA1870) is a surface exposed lipoprotein in Neisseria meningitidis that is a potent antigen and a potential candidate for a vaccine against meningococcal disease. The structure of the C-terminal domain consists of an anti-parallel β-barrel overlaid by a short α-helical region. This entry includes sequences mainly found in beta and gammaproteobacteria.
