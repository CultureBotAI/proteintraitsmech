identifier: Pfam:PF13925
label: con80 domain of Katanin
definition: >-
  This entry represents the C-terminal domain of katanin 80kDa subunit. Katanin is a microtubule-severing protein consist of a 60kDa ATPase subunit (katanin-p60) and a 80kDa subunit (katanin-p80), ]. Katanin-p80 is composed of an N-terminal WD40 repeat domain, a central proline-rich domain and a C-terminal domain required for dimerisation with the catalytic katanin-p60. The katanin complex associates with a specific subregion of the mitotic spindle leading to increased microtubule disassembly and targeting of katanin-p60 to the spindle poles. Katanin is a crucial regulator of early embryonic development, and recessive mutations or deletions in the KATNB1 gene cause severe microcephaly or microlissencephaly. Katanin forms a complex with another microcephaly-associated protein, ASPM (abnormal spindle-like microcephaly-associated) that controls spindle pole organization, poleward spindle flux, and spindle positioning, processes that when misregulated could perturb proliferation of neuronal progenitors and lead to microcephaly. Katanin also interacts with CAMSAPs (calmodulin-regulated spectrin-associated proteins) and is required for limiting the length of CAMSAP-bound MT minus-end stretches during interphase. In plants it also plays an important role as it is required for the bending of the plant axis toward the light source.
