identifier: Pfam:PF13355
label: ARC6-like, IMS domain
definition: >-
  This domain corresponds to the C-terminal intermembrane space (IMS) region from Plastid division protein CDP1, Protein ACCUMULATION AND REPLICATION OF CHLOROPLASTS 6 (ARC6) and its paralogue PARC6. This group of proteins function as key components of the plastid division machinery, which is responsible for the constriction and division of plastids, including chloroplasts and non-green plastids. It includes proteins such as FtsZ, ARC6, DRP5B, and MinE. ARC6 and PARC6 are essential for the chloroplast replication process, which implies the assembly and constriction of the tubulin-like FtsZ ring on the stromal surface of the inner envelope membrane (IEM) and the dynamin-like ARC5 ring on the cytosolic surface of the outer envelope membrane (OEM). They are also involved in stromule biogenesis and may contribute to plant gravitropism. ARC6 facilitates FtsZ ring assembly and promotes the recruitment of MCD1, which is essential for forming the chloroplast Z-ring. CDP1, on the other hand, is required for the localisation of PDV1 and the correct formation of the FtsZ ring in non-green plastids. ARC6 is evolutionarily related to the cyanobacterial cell division protein Ftn2/ZipN, having similar structures. This domain from ARC6 and PARC6 interacts with PDV2 and PDV1 respectively. PDV proteins recruit dynamin-like ARC5 ring to the chloroplast surface and mediate its constriction..
