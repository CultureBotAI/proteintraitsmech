identifier: Pfam:PF04234
label: CopC domain
definition: >-
  Copper resistance protein C (CopC) is a bacterial blue copper protein that binds 1 atom of copper per protein molecule. Along with CopA, CopC mediates copper resistance by sequestration of copper in the periplasm. The structure of CopC consists of a Greek key β-barrel fold.
