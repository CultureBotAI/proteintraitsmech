identifier: Pfam:PF02261
label: Aspartate decarboxylase
definition: >-
  Decarboxylation of aspartate is the major route of beta-alanine production in bacteria, and is catalysed by the enzyme L-aspartate decarboxylase (ADC, ). Beta-alanine is required for the biosynthesis of pantothenate, in which the enzyme plays a critical regulatory role. The enzyme is translated as an inactive proenzyme, and is cleaved via self-processing at Gly23-Ser24 to yield an alpha chain (C-terminal fragment) and beta chain (N-terminal fragment). This model spans the precursor (or both beta and alpha chains) of aspartate decarboxylase. A pyruvoyl cofactor, which is covalently bound to the enzyme, is required for activity. The active site of the tetrameric enzyme is located at the interface of two subunits, with a lysine and a histidine from the beta chain of one subunit forming the active site with residues from the alpha chain of the adjacent subunit.
