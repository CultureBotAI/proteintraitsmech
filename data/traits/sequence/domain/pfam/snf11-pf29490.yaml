identifier: Pfam:PF29490
label: SNF11 SWI/SNF complex component
definition: >-
  This entry represents SNF11, a component of the SWI/SNF complex found in fungi. SNF11 is a transcription regulatory protein that is part of the 1.14 MDa SWI/SNF global transcription activator complex. The SWI/SNF complex is an ATP-dependent chromatin remodelling complex required for positive and negative regulation of gene expression. The protein contains tandem repeats including six 4-amino acid repeats and two 5-amino acid repeats. SNF11 interacts with SNF2 and SNF6 components of the complex and is localised to the nucleus.
