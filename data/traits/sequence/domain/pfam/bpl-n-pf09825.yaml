identifier: Pfam:PF09825
label: Biotin-protein ligase, N terminal
definition: >-
  The function of this structural domain is unknown. It is found to the N terminus of the biotin protein ligase catalytic domain. Biotin protein ligase carries out the post-translational modification of specific proteins by the attachment of biotin. It acts on various carboxylases such as acetyl-CoA-carboxylase, pyruvate carboxylase, propionyl CoA carboxylase, and 3-methylcrotonyl CoA carboxylase.
