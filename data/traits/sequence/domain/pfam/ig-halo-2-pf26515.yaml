identifier: Pfam:PF26515
label: Halobacterial Ig domain protein
definition: >-
  This entry represents a family of uncharacterised proteins in halophilic archaea. The protein contains an N-terminal transmembrane helix followed by an immunoglobulin-like domain. This Ig domain unusually has a small three β stranded subdomain inserted between the second and third strands of the Ig domain.
