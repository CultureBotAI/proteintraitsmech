identifier: Pfam:PF21863
label: Helix-turn-helix family
definition: >-
  This family of proteins is found in bacteria and eukaryotes. Proteins in this family are typically between 270 and 293 amino acids in length. These proteins are composed of a large α-helical domain which appears to be related to MarR transcription factors.
