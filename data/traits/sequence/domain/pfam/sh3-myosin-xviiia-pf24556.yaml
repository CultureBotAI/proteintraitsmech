identifier: Pfam:PF24556
label: Unconventional myosin-XVIIIa SH3 domain
definition: >-
  This entry represents the SH3 domain found in Myo18a. Unconventional myosin-XVIIIa (Myo18a) may play a role in Golgi membrane trafficking and could indirectly give its flattened shape to the Golgi apparatus. In macrophages, it regulates trafficking, expression, and activation of innate immune receptors. The myosin N-terminal SH3-like domain may mediate some aspect of the conformational communication that occurs within the myosin head during actin and nucleotide binding. Part of this effect may be mediated through interactions with the neck-associated essential light chains that are in close proximity to this portion of the head domain and also transiently interact with actin. The myosin N-terminal SH3-like domain comprises ~50 amino acids and forms a protruding, six-stranded, antiparallel, β-barrel domain with similarities to the SH3 domain.
