identifier: Pfam:PF12879
label: 'SICA C-terminal inner membrane domain '
definition: >-
  The schizont-infected cell agglutination (SICA) proteins of Plasmodium knowlesi, one of the variant antigen gene families, are associated with parasitic virulence. SICA proteins comprise multiple domains, with the extracellular cysteine-rich domains (CRDs) occurring at different frequencies. They contain a five-cysteine CRD (SICA-alpha) at the N terminus, which occurs once or twice, then between 1 and 10 SICA-beta CRDs with 7-10 cysteine residues, a transmembrane domain, and a conserved C-terminal domain. The conserved C-terminal domain is thought to remain within the cytoplasm of the infected erythrocyte.
