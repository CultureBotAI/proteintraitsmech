identifier: Pfam:PF28774
label: Domain of unknown function (DUF8457)
definition: >-
  This entry represents a small helical domain of unknown function found in proteins from Flavobacteriia. The domain is typically around 70-90 residues in length and is located towards the C terminus of these proteins, following a short N-terminal region. The proteins are found almost exclusively in the Flavobacteriaceae family within the Bacteroidota phylum. The function of this domain remains to be determined.
