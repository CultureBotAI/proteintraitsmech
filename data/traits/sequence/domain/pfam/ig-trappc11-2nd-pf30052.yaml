identifier: Pfam:PF30052
label: TRAPPC11 second Ig-like domain
definition: >-
  This entry includes Trafficking protein particle complex subunit 11 from human (also known as gryzun homologue) and related sequences, which is part of the TRAPPIII complex. These proteins are involved in Golgi trafficking and regulation of protein complex stability. This is one of the largest subunits and essential for viability of mammalian cells. TRAPPC11 is linked to TRAPPC2L and also to TRAPPC3. This entry represents an Ig-like domain of TRAPPC11, the second of a tandem of four β-sandwiches that form an arm connecting to the vertex with TRAPPC12 and TRAPPC13 subunits, holding the core of TRAPPIII complex. This protein is implicated in autosomal recessive limb-girdle muscular dystrophy type 2S.
