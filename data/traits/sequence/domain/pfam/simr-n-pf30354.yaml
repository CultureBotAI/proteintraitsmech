identifier: Pfam:PF30354
label: SIMR-1-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in nematode proteins including SIMR-1 (siRNA-defective and mortal germline protein 1) and HPO-40 (hypersensitive to pore-forming toxin protein 40). This domain is found next to the middle degenerate Tudor domain that may bind symmetrically dimethylated arginines. SIMR-1 promotes siRNA production from piRNA-targeted mRNAs and is involved in spermatogenesis, oogenesis, and maintaining fertility. SIMR-1 localises to perinuclear SIMR foci in germ cells. The Tudor domain in SIMR-1 lacks two of the four conserved aromatic residues typically required for methylated substrate recognition.
