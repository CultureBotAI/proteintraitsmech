identifier: Pfam:PF20812
label: Bacteriophage PM2, Viral membrane protein P3
definition: >-
  Viral membrane protein P3 assemblies into dimers. Each P3 subunit comprise a core of two perpendicular α-helices, and subunits are bound together by a parallel two-stranded β sheet. 120 asymmetric dimers form a layer below the outer capsid shell in an almost planar structure. This protein family is found in Bacteriophage PM2 and similar sequences from virus and gammaproteobacteria.
