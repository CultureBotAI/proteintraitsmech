identifier: Pfam:PF05770
label: Inositol 1,3,4-trisphosphate 5/6-kinase ATP-grasp domain
definition: >-
  This entry represents the ATP-grasp domain. Proteins containing this domain include several inositol 1, 3, 4-trisphosphate 5/6-kinase proteins. Inositol 1,3,4-trisphosphate is at a branch point in inositol phosphate metabolism. It is dephosphorylated by specific phosphatases to either inositol 3,4-bisphosphate or inositol 1,3-bisphosphate. Alternatively, it is phosphorylated to inositol 1,3,4,6-tetrakisphosphate or inositol 1,3,4,5-tetrakisphosphate by inositol trisphosphate 5/6-kinase.
