identifier: Pfam:PF12883
label: Protein of unknown function (DUF3828)
definition: >-
  This entry represents a domain found covering the whole length of Putative periplasmic protein Rpic12D_3261 from Ralstonia pickettii ( , Tai3), a cognate immunity protein from the type VI secretion system (T6SS) that shows four helices and five strands. This domain is also found in uncharacterised bacterial proteins such as YbjP and YqhG from Escherichia coli. Its specific function is currently unknown.
