identifier: Pfam:PF30020
label: AT-rich binding protein third C2H2-type zinc finger domain
definition: >-
  This entry represents the third C2H2-type zinc finger domain in AT-rich binding protein (ATbp) proteins from arthropods and molluscs. Members may function as transcription factors for genes having AT stretches in their promoter and enhancer regions and bind to AT-rich DNA. The proteins are localised to the nucleus and contain multiple C2H2-type zinc finger domains.
