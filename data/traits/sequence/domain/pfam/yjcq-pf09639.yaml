identifier: Pfam:PF09639
label: YjcQ protein
definition: >-
  YjcQ is a protein of approx. 100 residues containing four α helices and three β strands. It is found in bacteria and also in the Lactococcus phage Tuc2009. In bacteria it appears to be under the regulation of SigD RNA polymerase which is responsible for the expression of many genes encoding cell-surface proteins related to flagellar assembly, motility, chemotaxis and autolysis in the late exponential growth phase. The exact function of YjcQ is unknown. However, it is thought to be the major head protein in viruses and is found in prophage in bacteria.
