identifier: Pfam:PF28819
label: GSCFA domain protein, C-terminal domain
definition: >-
  This entry represents a C-terminal three-helix bundle domain of approximately 55 residues found in GSCFA domain-containing proteins from Bacteroidota. The domain is located C-terminal to the GSCFA domain ( ). The GSCFA domain is named after conserved residues Gly, Ser, Cys, Phe and Ala. The function of this C-terminal domain remains to be determined.
