identifier: Pfam:PF26734
label: SUVR5 N-terminal domain
definition: >-
  This entry describes the N-terminal domain of Histone-lysine N-methyltransferase SUVR5 from Arabidopsis thaliana and related proteins mainly from plants. This domain is predicted to adopt an SH3-like fold and appears to be exclusive to SUVR5, as other methyltransferases in Arabidopsis contain a different N-terminal domain. SUVR5 proteins are histone methyltransferases that play a crucial role in regulating flowering time in Arabidopsis. These enzymes mediate the deposition of H3K9me2 marks and regulate gene expression independently of DNA methylation. They bind DNA through zinc finger motifs and repress the expression of specific stimulus response genes. SUVR5, in conjunction with its binding partner LDL1/SWP1, forms a regulatory complex that may provide plants with a mechanism to modulate chromatin and transcriptional states, allowing adaptability to environmental or developmental cues.
