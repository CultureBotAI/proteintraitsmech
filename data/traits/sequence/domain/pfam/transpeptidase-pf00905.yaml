identifier: Pfam:PF00905
label: Penicillin binding protein transpeptidase domain
definition: >-
  This signature identifies a large group of proteins, which include: Beta-lactamase precursor ( , penicillinase) Peptidoglycan synthetase ftsI ( , peptidoglycan glycosyltransferase 3) Methicillin resistance mecR1 protein Methicillin resistance blaR1 protein The large number of penicillin binding proteins, which are represented in this group of sequences, are responsible for the final stages of peptidoglycan biosynthesis for cell wall formation. The proteins synthesise cross-linked peptidoglycan from lipid intermediates, and contain a penicillin-sensitive transpeptidase carboxy-terminal domain. The active site serine (residue 337 in ) is conserved in all members of this family. MecR1 and BlaR1 are metallopeptidases belonging to MEROPS peptidase family M56, clan M-. BlaR1 and MecR1 cleave their cognate transcriptional repressors BlaI and MecI, respectively, activating the synthesis of MecA. MecR1 is present in Staphylococcus aureus and Staphylococcus sciuri, whereas BlaR1 (also known as BlaR, PenR1, or PenJ) has been found in Bacillus licheniformis, Staphylococcus epidermidis, Staphylococcus haemolyticus, and several S. aureus strains. These proteins are either plasmid-encoded, chromosomal, or transposon-mediated. MecR1/BlaR1 proteins are made up by homologous N-terminal 330-residue transmembrane metallopeptidase domains linked to extracellular 260-residue homologous PBP-like penicillin sensor moieties.
