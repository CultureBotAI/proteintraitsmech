identifier: Pfam:PF23151
label: 'NuiA-like '
definition: >-
  This entry represents a group of fungal proteins that are related to the nuclease A inhibitor NuiA ( ). NuiA is known to regulate the activity of NucA, one of the most potent nucleases involved in degradation of both single- and double-stranded DNA and RNA. The NucA inhibition by NuiA involves an unusual divalent metal ion bridge that connects the nuclease with its inhibitor. A highly conserved glutamate extends into the active site, mimicking the charge of a phosphate. The functionally essential glutamate is conserved within this family. In some members, it is replaced with aspartate. Most members of this family bear a deletion affecting the second interaction site located on one of the two 'jaws' of the NuiA structure and known to contribute to the specificity and strength of the NuiA-NucA interaction. The lack of this region indicates some functional differences of this group of potential inhibitors.
