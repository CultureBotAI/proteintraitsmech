identifier: Pfam:PF14534
label: Domain of unknown function (DUF4440)
definition: >-
  This entry represents a domain found in uncharacterised proteins from bacteria, archaea and eukaryotes, including NTF2-Like SgcJ protein from Streptomyces carzinostaticus, which plays a role in the biosynthesis of the 9-membered enediyne antitumor antibiotic C-1027. It shows a cone-like α+β barrel structure with a long N-terminal α-helix, a curved six-stranded antiparallel β-sheet and two additional shorter α-helices. Its specific function is still unkown.
