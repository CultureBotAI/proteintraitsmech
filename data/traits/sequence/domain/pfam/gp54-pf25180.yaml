identifier: Pfam:PF25180
label: Phage antiviral trigger protein Gp54
definition: >-
  This entry represents a small phage family of proteins of approximately 66 amino acids that act as a trigger for bacterial antiviral defence systems. The protein adopts a rare six-stranded β-barrel fold in its unbound state. Upon binding to the bacterial CapRel defence protein, Gp54 undergoes a dramatic conformational change where the β-barrel unfolds and forms a hybrid eight-stranded β-sheet with CapRel. The interaction is entropically driven and activates CapRel's antiviral response. The β-barrel structure is unique, with the closest structural homologues being five-stranded SH3 domains. Gp54 represents one of two known protein triggers for the CapRel defence system, the other being phage major capsid proteins.
