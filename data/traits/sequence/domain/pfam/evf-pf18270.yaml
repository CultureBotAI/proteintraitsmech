identifier: Pfam:PF18270
label: Virulence factor Evf
definition: >-
  This entry represents a domain found in Erwinia virulence factor (Evf). The structure of this domain has been solved in the Drosophila Pathogen, Erwinia carotovora (Pectobacterium carotovorum). Evf is able to bind to model membranes containing negatively charged phospholipids and to promote their aggregation. Palmitoic acid covalently binds to the completely conserved Cys209. The structure of Evf is unlike any virulence factors known to date.
