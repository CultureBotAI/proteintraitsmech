identifier: Pfam:PF01526
label: Tn3 transposase DDE domain
definition: >-
  Proteins containing this domain include transposases of Tn3, Tn21, Tn1721, Tn2501, Tn3926 transposons from Escherichia coli. The specific binding of the Tn3 transposase to DNA has been demonstrated. Sequence analysis has suggested that the invariant triad of Asp689, Asp765, Glu895 (numbering as in Tn3) may correspond to the D-D-35-E motif previously implicated in the catalytic performance of numerous transposases.
