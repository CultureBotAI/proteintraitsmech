identifier: Pfam:PF12146
label: Serine aminopeptidase, S33
definition: >-
  This domain is found in bacteria and eukaryotes and is approximately 110 amino acids in length. The majority of the members in this entry carry the exopeptidase active-site residues of Ser-122, Asp-239 and His-269 as in . α/β hydrolase domain-containing protein 17C (ABHD17C) belongs to the AB hydrolase superfamily and functions as a protein depalmitoylase . It hydrolyses fatty acids from S-acylated cysteine residues in proteins, with demonstrated depalmitoylating activity towards NRAS and the postsynaptic density protein DLG4/PSD95. The protein localises to recycling endosome membranes, dendritic spines, and postsynaptic density membranes, where it regulates protein palmitoylation dynamics. ABHD17C itself is palmitoylated on cysteine residues within an N-terminal cysteine cluster, which is required for membrane localisation and catalytic activity. The ABHD17 family (comprising ABHD17A, ABHD17B, and ABHD17C in mammals) plays important roles in regulating synaptic protein localisation and RAS signalling through the reversible control of protein palmitoylation.
