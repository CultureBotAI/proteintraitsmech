identifier: Pfam:PF29036
label: EGAP4-like C-terminal domain
definition: >-
  This entry represents a domain in EGAP4 small secreted glycoproteins found in nematodes. EGAP4.1 from Caenorhabditis elegans is a 113 amino acid protein with an N-terminal signal peptide for secretion. The mature protein contains a single N-linked glycosylation site at asparagine 47. EGAP4.1 is expressed in larval stages and shows sequence similarity to ZP domain-containing proteins and activin receptor domain-containing proteins. The protein is predicted to be secreted to the extracellular region. The specific function of this protein remains to be determined.
