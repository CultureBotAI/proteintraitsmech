identifier: Pfam:PF07740
label: Ion channel inhibitory toxin
definition: >-
  This entry describes huwentoxins, the endoparasitoid wasp peptide Teratocyte protein CftICK-IV, which has immununosuppressive and insecticidal activities and related proteins. Huwentoxins function as ion-channel inhibitors. Omega-Grammotoxin SIA is a VSCC antagonist that inhibits neuronal N- and P-type VSCC responses. Huwentoxin-IV, from the Chinese bird spider, is a highly potent neurotoxin that specifically inhibits the neuronal tetrodotoxin-sensitive voltage-gated sodium channel in rat dorsal root ganglion neurons. Hainantoxin-4, from the venom of spider Selenocosmia hainana, adopts an inhibitor cystine knot structural motif like huwentoin-IV, and is a potent antagonist that acts at site 1 on tetrodotoxin-sensitive (TTX-S) sodium channels. Study of the molecular nature of toxin-receptor interactions has helped elucidate the functioning of many ion-channels. Some members of this family, Tap1 and Tap2, can modulate the activity of both voltage-gated sodium and calcium channels which are implicated in the etiology of chronic pain, being interesting for chronic pain treatment. Peptides of the huwentoxin type I family contain 6 cysteine residues involved in three disulphide bonds. The three disulphide bridges have been assigned as C1-C4, C2-C5 and C3-C6. HWTX-I adopts a compact structure consisting of a small triple-stranded antiparallel β-sheet and five β-turns.
