identifier: Pfam:PF30358
label: GOLM
definition: >-
  This entry represents proteins from the Golgi membrane protein 1 (GOLM1) and cancer susceptibility candidate 4 (CASC4), also known as GOLM2, family. GOLM1 is a Golgi-localised protein that is upregulated by viral infection, but whose precise function is unknown. CASC4, like GOLM1, appears to be a single pass membrane protein.
