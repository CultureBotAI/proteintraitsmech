identifier: Pfam:PF11826
label: Vibrionales, replication initiator protein RctB, central region
definition: >-
  This region is found in the replication initiator protein RctB from Vibrio cholerae and similar sequences predominantly found in Vibrionales. RctB mediates oriCII-based replication and other regulatory processes. This protein is organised into four domains and adopts a dimeric configuration, which occurs with the interface in one of the two central domains: a seven-stranded β-sheet form a swapped configuration with the same domain of the other monomer. It seems to be involved in DNA binding.
