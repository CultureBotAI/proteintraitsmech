identifier: Pfam:PF21488
label: YqbF, HeH motif
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein YqbF from Bacillus subtilis and related bacterial proteins. This domain folds into a three helical bundle ( ). It contains a bi-helical motif named helix-extension-helix (HeH) motif which is linked to DNA-binding and other diverse functions.
