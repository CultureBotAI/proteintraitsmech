identifier: Pfam:PF21409
label: Ski2, beta-barrel domain
definition: >-
  Ski2 from yeast is an helicase with an overall similar structure to MTR4 proteins. It has an arch domain with an α-helical stalk/elbow ( ) that flanks a β-barrel (referred to as the KOW module in MTR4 homologues). This entry represents the β-barrel of Ski2 and related proteins from Saccharomycetales. This domain does not have the KOW motif and is tightly packed against the α-helical stalk.
