identifier: Pfam:PF10680
label: RNA polymerase I specific transcription initiation factor
definition: >-
  This entry represent a domain found in the Rrn9 protein, a component of the UAF (upstream activation factor) complex which interacts with the upstream element of the RNA polymerase I promoter and forms a stable preinitiation complex. This domain seems to be constrained to fungi, is the two highly conserved regions of proteins which form one of the subunits of UAF and appears to be the region responsible for the interaction with TBP, a TATA-binding transcription initiation factor protein.
