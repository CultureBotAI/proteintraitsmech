identifier: Pfam:PF26958
label: tRNA hydrolases-like, Thioredoxin-like domain
definition: >-
  This entry represents the Thioredoxin-like domain in putative tRNA hydrolases and uncharacterised proteins from fungi. Members of this clan are small redox-active proteins that mediate thiol-disulfide exchange through a conserved active-site disulfide bond. They share a characteristic thioredoxin fold, consisting of a three-layer α/β/α sandwich with a central mixed β-sheet. These proteins typically function in redox regulation by cycling between oxidised and reduced forms.
