identifier: Pfam:PF30263
label: Type II restriction endonuclease HgaI, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Type II restriction endonucleases such as HgaI from Avibacterium volantium. HgaI is an S subtype restriction enzyme that recognises the double-stranded sequences 5'-GACGC-3' and 5'-GCGTC-3', cleaving ten bases downstream of the recognition site. This N-terminal domain is found in diverse bacterial restriction endonucleases across proteobacteria, bacillota and other bacterial taxa. The specific function of this domain remains to be determined.
