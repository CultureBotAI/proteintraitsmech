identifier: Pfam:PF31113
label: Domain of unknown function (DUF8813)
definition: >-
  This entry represents a small C-terminal helical domain of approximately 40 residues found in bacterial ImmA/IrrE family metallopeptidases. This domain is located C-terminal to the Peptidase_M78 catalytic domain ( ). The function of this domain remains to be determined.
