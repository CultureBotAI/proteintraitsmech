identifier: Pfam:PF21092
label: FACT complex subunit SSRP1, C-terminal domain
definition: >-
  FACT (facilitates chromatin transactions) is a general chromatin factor that acts to reorganise nucleosomes. SSRP1 is a subunit of this complex that is conserved among higher eukaryotes. This entry represents the C-terminal domain of SSRP1, which is highly likely to be disordered.
