identifier: Pfam:PF20974
label: tRNA synthetases class I (E and Q), anti-codon binding domain
definition: >-
  This entry represents the second ribosomal L25-like domain of tRNA synthetases class I, which is part of the anticodon binding domain. Other tRNA synthetase sub-families are too dissimilar to be included. This entry includes only glutamyl and glutaminyl tRNA synthetases. In some organisms, a single glutamyl-tRNA synthetase aminoacylates both tRNA(Glu) and tRNA(Gln).
