identifier: Pfam:PF17405
label: Nrap protein nucleotidyltransferase domain 4
definition: >-
  This entry represents a conserved domain found in Nrap. Nucleolar RNA-associated proteins (Nrap) are highly conserved from yeast (Saccharomyces cerevisiae) to human. In the mouse, Nrap is ubiquitously expressed and is specifically localised in the nucleolus. Nrap is a large nucleolar protein (of more than 1000 amino acids). Nrap appears to be associated with ribosome biogenesis by interacting with pre-rRNA primary transcript.
