identifier: Pfam:PF29119
label: F13C5.5-like protein C-terminal domain
definition: >-
  This entry represents the C-terminal transmembrane domain of F13C5.5 and similar proteins from nematodes. The domain spans approximately 40 amino acids. The domain encompasses the transmembrane region and cytoplasmic tail of these single-pass type I membrane proteins. F13C5.5 is an uncharacterised glycoprotein of 219 amino acids that contains a signal peptide, a large extracellular domain ( ), a transmembrane helix (this entry), and a short cytoplasmic tail. The protein contains N-linked glycosylation sites and is expressed in pharyngeal muscle cells and other tissues in Caenorhabditis elegans.
