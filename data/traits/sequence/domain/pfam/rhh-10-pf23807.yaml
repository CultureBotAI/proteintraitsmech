identifier: Pfam:PF23807
label: Ribbon-helix-helix protein
definition: >-
  This entry represents a family of phage Ribbon-Helix-Helix (RHH) domain containing proteins and proteobacterial prophages. Members of the RHH superfamily are often parts of toxin/antitoxin systems, suggesting these proteins may form part of a phage immunity response.
