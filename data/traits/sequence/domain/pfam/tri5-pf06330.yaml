identifier: Pfam:PF06330
label: Trichodiene synthase (TRI5)
definition: >-
  This family consists of several fungal trichodiene synthase proteins ( ). TRI5 encodes the enzyme trichodiene synthase, which has been shown to catalyse the first step in the trichothecene pathways of Fusarium and Trichothecium species. Proteins in this entry also includes COP6 from Coprinopsis cinerea and CLM1 from Gibberella zeae. COP6 is an alpha-cuprenene synthase involved in the biosynthesis of alpha-cuprenene and oxidized derivatives. CLM1 is a longiborneol synthase required for culmorin production.
