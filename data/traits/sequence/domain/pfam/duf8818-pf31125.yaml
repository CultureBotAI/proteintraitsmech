identifier: Pfam:PF31125
label: Domain of unknown function (DUF8818)
definition: >-
  This entry represents a small β-sandwich domain of approximately 82 residues found in large outer membrane proteins in Bacteroidota (Flavobacteriaceae, Cytophagales). The domain is inserted within larger β-barrel structures. These proteins are associated with the type IX secretion system (T9SS). The function of this domain remains to be determined.
