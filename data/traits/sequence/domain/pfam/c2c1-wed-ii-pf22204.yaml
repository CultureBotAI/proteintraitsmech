identifier: Pfam:PF22204
label: CRISPR-associated endonuclease C2c1, wedge domain, second region
definition: >-
  This entry represents the second region of the wedge domain (WED-II) of CRISPR-associated endonuclease C2c1 (also known as Cas12b). It adopts an oligonucleotide-binding (OB) fold with eight β-stranded distorted β-sheets flanked by two α-helices and one β-hairpin. C2c1 is a class 2 type V-B effector protein that was shown to be active for target DNA cleavage in vivo and in vitro. In contrast to Cpf1, this enzyme cleavage activity requires both crRNA and tracrRNA. The structure of C2c1 consists of an α-helical recognition (REC) lobe, including Helical-I and Helical-II, and a NUC lobe, including OBD, RuvC, and two Nuc domains.
