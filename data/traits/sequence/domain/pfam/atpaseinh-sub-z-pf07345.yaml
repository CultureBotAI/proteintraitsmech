identifier: Pfam:PF07345
label: ATPase inhibitor subunit zeta
definition: >-
  This entry represents zeta-subunits, which are found in alpha-proteobacterial F1F0-ATPase regulatory proteins. The zeta subunit is a potent inhibitor of the alpha-proteobacterial F1FO-ATPase. The inhibitory region resides in the first 14 N-terminal residues of the protein, which protrude from the 4-α-helix bundle structure of the isolated zeta subunit.
