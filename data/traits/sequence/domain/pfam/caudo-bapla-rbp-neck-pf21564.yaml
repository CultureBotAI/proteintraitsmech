identifier: Pfam:PF21564
label: Lactococcus phage p2, Receptor binding protein, neck domain
definition: >-
  This domain is centrally located in the receptor binding protein from Lactococcus phage p2 (RBP, also known as Gp18) and similar proteins from closely related lactococcal phages. RBP shows three domains that form the phage tail base-plate: the N-terminal shoulder domain ( ), which is attached to the phage, the neck domain and the C-terminal receptor-recognition head domain ( ). This entry represents the central neck domain, which folds into four β-strands, which interlace with the β-strands of two other subunits to form an equilateral triangular prism around the three-fold axis of a triple-stranded β-helix.
