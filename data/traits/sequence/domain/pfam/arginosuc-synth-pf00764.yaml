identifier: Pfam:PF00764
label: Arginosuccinate synthase N-terminal HUP domain
definition: >-
  This entry represents the N-terminal domain of the argininosuccinate synthase enzymes. This domain is part of the HUP superfamily. Argininosuccinate synthase ( ) (AS) is a urea cycle enzyme that catalyses the penultimate step in arginine biosynthesis: the ATP-dependent ligation of citrulline to aspartate to form argininosuccinate, AMP and pyrophosphate. In humans, a defect in the AS gene causes citrullinemia, a genetic disease characterised by severe vomiting spells and mental retardation. AS is a homotetrameric enzyme of chains of about 400 amino-acid residues. An arginine seems to be important for the enzyme's catalytic mechanism. The sequences of AS from various prokaryotes, archaebacteria and eukaryotes show significant similarity.
