identifier: Pfam:PF21915
label: Sputnik virophage major capsid protein 1st domain
definition: >-
  This entry represents the N-terminal domain of the major capsid protein V20 from Sputnik virophage, which adopts a jelly roll fold. Sputnik is a dsDNA virus, referred to as a virophage, that is co-assembled with Mimivirus in the host amoeba. The capsid is organized into a T = 27 lattice in which there are 260 trimeric capsomers and 12 pentameric capsomers. The trimeric capsomers consist of three double jelly-roll major capsid proteins creating pseudohexameric capsomer symmetry.
