identifier: Pfam:PF07071
label: KDGP aldolase
definition: >-
  DgaF is part of the dga operon required for wild-type growth of Salmonella Typhimurium with D-glucosaminate. It catalyses the conversion of keto-3-deoxygluconate 6-phosphate (KDGP) to yield pyruvate and glyceraldehyde-3-phosphate. Orthologs of the dga genes are largely restricted to certain enteric bacteria and a few species in the phylum Firmicutes.
