identifier: Pfam:PF29321
label: Vomeromodulin C-terminal domain
definition: >-
  This entry represents the C-terminal domain of vomeromodulin, a secreted glycoprotein found in mammals. Vomeromodulin belongs to the BPI fold-containing family B and is abundantly expressed in lateral nasal glands, with additional presence in posterior septal and vomeronasal glands. The protein is heavily N-glycosylated with complex sialylated and fucosylated biantennary structures. In rodents, vomeromodulin is found in olfactory epithelium and nasal mucosa and has been described as a putative pheromone transporter. In mice, the protein is also expressed in lung tissue.
