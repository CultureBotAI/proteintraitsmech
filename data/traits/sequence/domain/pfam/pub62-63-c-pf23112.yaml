identifier: Pfam:PF23112
label: U-box protein 62/63 C-terminal
definition: >-
  This is a domain found at the C-terminal of Plant U-Box 62/63 (PUB62/63) from Arabidopsis thaliana and similar proteins from plants. According to structure predictions, this domain may adopt an SH3-like barrel fold. The U-box domain-containing proteins function as E3 ubiquitin ligases. These proteins play a crucial role in the ubiquitination process, which is essential for protein degradation, signal transduction, and various cellular processes. The U-box domain is a type of E3 ligase that facilitates the transfer of ubiquitin from an E2 ubiquitin-conjugating enzyme to specific substrate proteins, marking them for degradation by the proteasome. This activity is vital for maintaining protein homeostasis and regulating numerous cellular pathways.
