identifier: Pfam:PF26527
label: Domain of unknown function (DUF8176)
definition: >-
  This entry represents an NTF2-like domain found in a family of uncharacterised proteins predominantly found in the Nocardiaceae family within the Actinomycetota phylum. The proteins in this family are typically found in bacteria, with a notable presence in genera such as Nocardia and Rhodococcus. The proteins are generally around 200 to 300 amino acids in length. Many of these proteins are predicted to be membrane-associated, as indicated by the presence of transmembrane helices. The exact function of this family remains unknown.
