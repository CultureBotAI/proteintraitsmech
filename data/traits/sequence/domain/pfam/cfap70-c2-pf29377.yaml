identifier: Pfam:PF29377
label: Cilia and flagella-associated protein 70 C2 domain
definition: >-
  This entry represents a middle domain of human cilia and flagella-associated protein 70 (CFAP70) and similar eukaryotic proteins. CFAP70 is an axoneme-binding protein that plays a role in the regulation of ciliary motility and cilium length. The protein localises to the cilium axoneme and flagellum, with particular concentration at the base of the outer dynein arm. The specific function of this domain remains to be determined. This contains a C2-like fold.
