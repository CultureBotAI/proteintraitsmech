identifier: Pfam:PF08759
label: Glycosyltransferase GT-D fold
definition: >-
  This domain is found at the C terminus of proteins such as the probable glycosyltransferase Gly ( ) that also contain the glycosyl transferase domain at the N terminus. It is also found N-terminal in numerous putative glycosyltransferases such as GalT1. GalT1 has been shown to catalyze the third step of Fap1 glycosylation. This domain is structurally distinct from all known GT folds of glycosyltransferases and contains a metal binding site. This new glycosyltransferase fold has been named GT-D.
