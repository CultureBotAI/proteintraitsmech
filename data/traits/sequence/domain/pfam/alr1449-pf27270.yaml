identifier: Pfam:PF27270
label: Alr1449
definition: >-
  This entry represents the alr1449 domain found in uncharacterised proteins from bacteria mainly from cyanobacteria. The protein was identified in Nostoc sp. during analysis of cyanobacterial nif gene developmental rearrangement and is associated with nitrogen fixation processes. The function of this domain remains to be determined.
