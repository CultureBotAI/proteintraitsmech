identifier: Pfam:PF29946
label: Peptide arginase FlmR/OhkR-like domain
definition: >-
  This entry represents a small domain found in FlmR from Flagellimonas meridianipacifica ( ), OhkR from Ohtaekwangia koreensis ( ) and similar uncharacterised proteins mainly found in bacteria. FlmR and OhkR have been reported to be peptide arginases that modify Arg residues to ornithine in bioactive RiPP peptides. This domain, which is found associated with , is predicted to show an antiparallel three-stranded β-sheet with two α-helices on one side.
