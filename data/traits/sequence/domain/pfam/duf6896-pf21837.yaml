identifier: Pfam:PF21837
label: Domain of unknown function (DUF6896)
definition: >-
  This entry represents a domain found in bacterial proteins of unknown function. The domain structure includes a four stranded β-sheet which has two conserved aspartates in a DXDXG motif close to a highly conserved histidine. These three residues may for the potential active site.
