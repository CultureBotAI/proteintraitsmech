identifier: Pfam:PF09269
label: Domain of unknown function (DUF1967)
definition: >-
  Obg subfamily proteins (also known as ObgE, YhbZ and CgtA) are conserved P- loop GTPases, that are involved in a wide range of cellular processes, including sporulation, cellular differentiation, ribosome assembly, DNA replication, chromosome segregation, and stringent response in eubacteria and plant chloroplasts. Obg subfamily proteins have three domains: the Obg fold, the G domain, and the Obg C-terminal (OCT) domain. A potential role of the OCT domain in the regulation of the nucleotide-binding state has been suggested. The OCT domain structure contains a four-stranded β-sheet and three α-helices flanked by an additional β-strand.
