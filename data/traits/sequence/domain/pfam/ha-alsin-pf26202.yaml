identifier: Pfam:PF26202
label: Alsin, helical array domain
definition: >-
  This domain is found in human Alsin and related proteins. This domain precedes the VPS domain ( ) found at the C-terminal. Alsin functions as a guanine nucleotide exchange factor (GEF) for Rho family GTPases, particularly Rac1, in addition to its role as a Rab5 GEF. It contains a DH domain and a PH domain ( ). This dual GEF activity links endocytic processes (via Rab5) and actin cytoskeleton remodelling (via Rac1), critical for neuronal membrane transport and motor neurone maintenance. Alsin's dysfunction is implicated in amyotrophic lateral sclerosis (ALS), where impaired GEF activity disrupts intracellular trafficking and cytoskeletal dynamics, contributing to neurodegeneration.
