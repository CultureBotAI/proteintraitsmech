identifier: Pfam:PF22619
label: DNA polymerase I, ribonuclease H-like domain
definition: >-
  This entry represents a domain found in DNA polymerase I from Geobacillus stearothermophilus and similar sequences mainly from actinomycetes and firmicutes. In addition to polymerase activity, this enzyme has strand displacement and 5'-3' exonuclease activity, but lacks proofreading 3'-5' exonuclease activity. This domain is responsible for the 3'-5' exonuclease proofreading activity. It is one of the constituent domains of the Klenow fragment.
