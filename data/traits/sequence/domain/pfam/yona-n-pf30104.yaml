identifier: Pfam:PF30104
label: YonA N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YonA, a 156 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. YonA is divided into two domains: this N-terminal region and a C-terminal domain The protein is found in SPbeta phage and related prophages across Bacillales. The function of this domain remains to be determined.
