identifier: Pfam:PF17333
label: Beta defensin 136
definition: >-
  Beta-defensins are small cationic peptides that have a triple-stranded β-sheet structure. They are characterised by the presence of multiple cysteine residues (forming three distinctive intramolecular disulfide bridges) and a highly similar tertiary structure known as the defensin motif. All beta-defensin genes encode a precursor peptide that consists of a hydrophobic, leucine-rich signal sequence, a pro-sequence, and a mature six-cysteine defensin motif at the carboxy terminus. They exhibit broad-spectrum antimicrobial properties and contribute to mucosal immune responses at epithelial sites. Several beta-defensin family members have been shown to play essential roles in sperm maturation and fertility in rats, mice and humans. In addition to the wide spectrum of antimicrobial activity, mammalian beta-defensins have been reported to have other roles in the immune system, such as the chemotactic ability for immature dendritic cells and memory T-cells via chemokine receptor-6 demonstrated by human beta-defensin-2. Defensin beta 136 exhibits antibacterial and antifungal activity. It has high lipopolysaccharide (LPS)-binding affinity, and may thereby be involved in immunoregulation through LPS neutralization.
