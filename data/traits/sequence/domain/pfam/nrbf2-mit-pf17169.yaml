identifier: Pfam:PF17169
label: MIT domain of nuclear receptor-binding factor 2
definition: >-
  This domain is the MIT (microtubule interaction and trafficking) domain of nuclear receptor-binding factor 2 (NRBF2) in higher eukaryotes. It is a coiled-coil region. NRBF2 plays an essential role in autophagy, the cellular pathway that degrades long-lived proteins and other cytoplasmic contents through lysosomes. NRBF2 binds Atg14L - a Beclin-binding protein - directly via the MIT domain and enhances Atg14L-linked Vps34 kinase (a class III phosphatidylinositol-3 kinase) activity and autophagy induction.
