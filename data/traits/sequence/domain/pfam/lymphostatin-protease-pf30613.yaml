identifier: Pfam:PF30613
label: Lymphostatin, protease domain
definition: >-
  This entry represents the protease domain of Lymphostatin. The mutation of the conserved cysteine residue abolishes the activity of this domain. Lymphostatin is a key virulence factor of enteropathogenic and enterohaemorrhagic Escherichia coli, playing roles in bacterial colonisation of the gut and in the inhibition of lymphocyte proliferation and proinflammatory responses. Lymphostatin is composed of six distinct domains which enable complex interactions with host cells. These domains include two glycosyltransferase domains, one PaToxP-like protease domain, an ADP-ribosyltransferase domain, a vertex domain and a delivery domain.
