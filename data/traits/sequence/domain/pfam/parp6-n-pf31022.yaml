identifier: Pfam:PF31022
label: PARP6/PARP8 N-terminal domain
definition: >-
  This entry represents an N-terminal domain of approximately 110 residues found in PARP6 and PARP8 proteins in vertebrates. This domain precedes the PARP catalytic domain ( ). PARP6 and PARP8 are mono-ADP-ribosyltransferases belonging to the ARTD/ PARP family, with the catalytic activity residing in the C-terminal PARP domain rather than this N-terminal region. PARP6 functions as a regulator of dendrite morphogenesis during neuronal development, and mutations in PARP6 are associated with developmental delay. The specific function of this N-terminal domain remains to be determined.
