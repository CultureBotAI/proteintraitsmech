identifier: Pfam:PF28965
label: Mucin-20 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of mucin-20 (MUC20). This domain is responsible for interaction with the MET receptor tyrosine kinase. Experimental studies demonstrate that this C-terminal region of MUC20 binds to the multifunctional docking site of MET and suppresses the hepatocyte growth factor-induced GRB2-RAS signalling pathway. The domain inhibits HGF-induced proliferation and expression of MMP1 and MMP9. This domain is found in the C-terminal portion of MUC20 proteins, which are secreted mucins highly expressed in kidney and moderately in placenta, lung, prostate, liver and digestive system. The domain is conserved across vertebrates.
