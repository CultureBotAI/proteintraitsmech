identifier: Pfam:PF21265
label: Single-stranded DNA-binding protein, Bacteriophage T7
definition: >-
  Single-stranded DNA-binding proteins (SSB, also known as helix-destabilising proteins and gp2.5) from Bacteriophage T7 is expressed in the late stage of lytic development, binding preferentially to single-stranded DNA and is implicated in DNA replication, formation of concatemers, recombination and repair of double-stranded breaks. It physically interacts with T7 DNA polymerase and T7 primase-helicase during replication to coordinate events at the replication fork. This entry represents the OB-fold domain which is well adapted for interactions with ssDNA.
