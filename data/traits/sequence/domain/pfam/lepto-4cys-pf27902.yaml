identifier: Pfam:PF27902
label: Small lipoprotein, LB_250 family
definition: >-
  Members of this family average about 92 amino acids in length, including an apparent lipoprotein signal peptide and a mature portion with four additional invariant Cys residues. This family is universal, so far, across at least twenty species of Leptospira but unknown outside the genus.
