identifier: Pfam:PF23540
label: DesK N-terminal domain
definition: >-
  This domain is found at the N-terminal of sensor histidine kinases predominantly found in bacilli, including DesK and YvfT from Bacillus subtilis. DesK is responsible for detecting changes in membrane fluidity during cold stress and activating the response regulator DesR by phosphorylation, which leads to the induction of the des gene for Delta5 acyl-lipid desaturase. YvfT is part of the YvfT/YvfU regulatory system and likely activates the response regulator YvfU by phosphorylation. This domain is composed of 5 transmembrane helices. Sensor histidine kinases function as part of two-component regulatory systems. These kinases are involved in sensing environmental stimuli and initiating appropriate cellular responses. They play a critical role in adapting to environmental changes by modulating the activity of their respective response regulators.
