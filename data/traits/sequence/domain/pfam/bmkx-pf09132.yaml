identifier: Pfam:PF09132
label: BmKX
definition: >-
  This entry represents a domain with high similarity to a region found in short-chain scorpion toxins. It forms a structure consisting of a cysteine-stabilised α/β scaffold consisting of a short 3-10-helix and a two-stranded antiparallel β-sheet. The function of this domain remains unknown.
