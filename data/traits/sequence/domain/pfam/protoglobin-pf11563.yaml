identifier: Pfam:PF11563
label: Protoglobin
definition: >-
  This domain is found at the N-terminal of globin-containing proteins mainly from bacteria, archaea and fungi. It is found in protoglobin, a single-domain globin of yet unknown biological function, which has specific loops and an amino-terminal extension which leads to the burying of the heme within the matrix of the protein. Protoglobin-specific apolar tunnels allow the access of O2, CO and NO to the haem distal site. This domain can also recognise cyanide (Matilla et. al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043). Proteins containing this domain include protoglobins from the strictly anaerobic methanogen Methanosarcina acetivorans and from the obligate aerobic hyperthermophile Aeropyrum pernix. This domain is also found in the N-terminal regions of HemAT from the archaeon Halobacterium salinarum (HemAT-Hs) and from the Gram-positive bacterium Bacillus subtilis (HemAT-Bs). It contains a myoglobin-like motif, displays characteristic heme-protein absorption spectra, and binds oxygen reversibly. This domain is present in Diguanylate cyclase DosC (also known as YddV) from E. coli which is coupled with a C-terminal diguanylate cyclase (DGC/GGDEF) domain, which likely functions as a c-di-GMP cyclase in the synthesis of the second messenger cyclic-di-GMP (c-di-GMP).
