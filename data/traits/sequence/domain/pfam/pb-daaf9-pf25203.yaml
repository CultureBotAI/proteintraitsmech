identifier: Pfam:PF25203
label: DAAF9 Pita bread like domain
definition: >-
  This domain is found in human DAAF9 and related proteins. This domain shows a fold similar to that of aminopeptidase, prolidase, and related proteins, collectively referred to as the "pita bread" fold. Dynein axonemal assembly factor 9 DNAAF9 (Shulin) is a dynein axonemal assembly factor that regulates the transport and activation of outer dynein arms (ODAs) in cilia. It binds and inhibits ODAs in the cytoplasm, maintaining them in a closed conformation until they are delivered to cilia. It may interact with ARL-3. This GTP-dependent interaction might ensure spatiotemporal control of dynein function, critical for proper ciliary beating in multiciliated cells such as airway epithelia. Dysregulation of DNAAF9 is linked to primary ciliary dyskinesia (PCD), characterised by impaired mucociliary clearance and respiratory defects.
