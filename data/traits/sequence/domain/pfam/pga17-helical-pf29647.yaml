identifier: Pfam:PF29647
label: PGA17 helical domain
definition: >-
  This entry representsPGA17, a predicted GPI-anchored protein from Candida albicans and similar GPI-anchored proteins from various fungal species. The PGA17 protein is up-regulated during host-pathogen interactions and oralpharyngeal candidiasis. The protein is also a substrate for cleavage by KEX2 proteinase.
