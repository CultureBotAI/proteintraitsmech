identifier: Pfam:PF09051
label: Stannin cytoplasmic
definition: >-
  This domain forms a distorted cytoplasmic helix that is partially absorbed into the plane of the lipid bilayer with a tilt angle of approximately 80 degrees from the membrane normal. It interacts with the surface of the lipid bilayer, and contributes to the initiation of the apoptotic cascade on binding of the unstructured linker domain to dimethyltin.
