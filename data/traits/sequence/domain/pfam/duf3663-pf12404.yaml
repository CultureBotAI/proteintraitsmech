identifier: Pfam:PF12404
label: Peptidase
definition: >-
  This entry represents the N-terminal domain found in Peptidase B from Escherichia coli and other members of the family of M17 peptidases from gammaproteobacteria. M17 peptidases are a diverse metalloprotease family that consist of conserved C-terminal LAP domain and more divergent N-terminal domain. This N-terminal domain adopts α/β fold comprising a mixed β-sheet with α-helices packed on one side. The number of strands in the β-sheet and the α-helices can vary in different M17 peptidases. It is involved in dimeric interactions. Over 70 metallopeptidase families have been identified to date. In these enzymes a divalent cation, which is usually zinc but may be cobalt, manganese or copper, activates the water molecule. The metal ion is held in place by amino acid ligands, usually three in number. In some families of co-catalytic metallopeptidases, two metal ions are observed in crystal structures ligated by five amino acids, with one amino acid ligating both metal ions. The known metal ligands are His, Glu, Asp or Lys. At least one other residue is required for catalysis, which may play an electrophilic role. Many metalloproteases contain an HEXXH motif, which has been shown in crystallographic studies to form part of the metal-binding site. The HEXXH motif is relatively common but can be more stringently defined for metalloproteases as 'abXHEbbHbc', where 'a' is most often valine or threonine and forms part of the S1' subsite in thermolysin and neprilysin, 'b' is an uncharged residue, and 'c' a hydrophobic residue. Proline is never found in this site, possibly because it would break the helical structure adopted by this motif in metalloproteases.
