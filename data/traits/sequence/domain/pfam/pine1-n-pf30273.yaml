identifier: Pfam:PF30273
label: PGIP-inactivating effector protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in PINE1 (PGIP-inactivating effector protein 1) from ascomycetes. PINE1 is a secreted effector protein required for full virulence of plant pathogenic fungi. The protein directly interacts with and functionally inactivates plant polygalacturonase-inhibiting proteins (PGIPs) by enhancing dissociation of PGIPs from polygalacturonases.
