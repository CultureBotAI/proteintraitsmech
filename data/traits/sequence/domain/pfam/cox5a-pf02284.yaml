identifier: Pfam:PF02284
label: Cytochrome c oxidase subunit Va
definition: >-
  Cytochrome c oxidase ( ) is an oligomeric enzymatic complex which is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex are encoded within the mitochondrial genome, there are a variable number of small polypeptidic subunits encoded within the nuclear genome. This entry represents subunits Va and VI, which are the heme A-containing chains of cytochrome c oxidase. Subunit Va is one of three mammalian subunits that lacks a transmembrane region. Subunit Va is located on the matrix side of the membrane and binds thyroid hormone T2, releasing allosteric inhibition caused by the binding of ATP to subunit IV and allowing high turnover at elevated intramitochondrial ATP/ADP ratios.
