identifier: Pfam:PF29612
label: Uncharacterised plasmid protein pXO2-29, C-terminal domain
definition: >-
  This entry represents the C-terminal Ig-like domain of an uncharacterised protein encoded on plasmid pXO2 of Bacillus anthracis. The protein is also known by locus tags pXO2-29/pXO2-30, BXB0028, and GBAA_pXO2_0028. The full-length protein is 922 amino acids in length and contains a transmembrane helix near the N terminus. The protein is predicted to localise to the membrane. Plasmid pXO2 is one of the two virulence plasmids of Bacillus anthracis. The function of this domain remains to be determined.
