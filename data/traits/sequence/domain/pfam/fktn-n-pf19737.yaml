identifier: Pfam:PF19737
label: Fukutin N-terminal
definition: >-
  This is the N-terminal domain of Ribitol-5-phosphate transferase FKTN (also referred to fukutin) which contains the transmembrane domain required for its localisation to the Golgi and participates in the interaction with POMGnT1 (Protein O-linked-mannose beta-1,2-N-acetylglucosaminyltransferase 1) for normal POMGnT1 location and activity. FKTN is a ribitol-phosphate transferase that forms a complex with FKRP (fukutin-related protein, also a ribitol-phosphate transferase) and TMEM5 (a ribitol xylosyltransferase). Fukutin, FKRP, and TMEM5 maintain each of their enzyme activities in the complex and may contribute to specific biosynthesis of glycans required for dystroglycan function.
