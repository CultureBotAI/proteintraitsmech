identifier: Pfam:PF29405
label: YdaU C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YdaU-type proteins found in bacteria and bacteriophages. YdaU from Escherichia coli is an uncharacterised protein. Some family members also contain a phage replication protein O domain ( ). The function of this domain remains to be determined.
