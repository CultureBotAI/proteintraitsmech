identifier: Pfam:PF19275
label: HflX C-terminal domain
definition: >-
  This entry represents the C-terminal domain of GTPase HflX from Escherichia coli. HflX is a GTPase that associates with the 50S ribosomal subunit. Its C-terminal domain (CTD) predominantly interacts with the N-terminal domain of uL11 at the bL12 stalk base. Truncation of the CTD rendered HflX inactive in 70S splitting. HflX may play a role in the rescuing of heat-damaged ribosomes and in the improvement of cell survival.
