identifier: Pfam:PF27321
label: WcaD colanic acid polymerase
definition: >-
  This entry represents WcaD proteins involved in colanic acid biosynthesis in bacteria. WcaD is a putative colanic acid polymerase that functions in slime polysaccharide biosynthesis. These proteins are multi-pass membrane proteins localised to the inner membrane with multiple transmembrane helices. Members are found primarily in Pseudomonadota, particularly in Enterobacteriaceae including Escherichia and Citrobacter species. The protein is approximately 405 amino acids in length.
