identifier: Pfam:PF12684
label: PDDEXK-like domain of unknown function (DUF3799)
definition: >-
  This entry represents a PDDEXK-like domain of unknown function found in proteins from bacteria and viruses. Many of these proteins are annotated as exodeoxyribonuclease 8, which is involved in the RecE pathway of recombination. The PD-(D/E)XK domain is ubiquitously found in enzymes involved in metabolism of nucleic acids, mostly in nucleases.
