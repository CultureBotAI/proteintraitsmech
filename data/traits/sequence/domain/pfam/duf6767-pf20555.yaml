label: Domain of unknown function (DUF6767)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in actinobacteria. Proteins in this family are typically between 59 and 74 amino acids in length. There are two conserved sequence motifs: VTGP and DPE. The proteins contain four conserved cysteines.
