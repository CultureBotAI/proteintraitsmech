identifier: Pfam:PF27066
label: Rv0461-like membrane protein
definition: >-
  This entry represents a family of uncharacterised membrane proteins found in mycobacteria. The prototype member Rv0461 from Mycobacterium tuberculosis is a 200 amino acid multi-pass membrane protein containing three predicted transmembrane helices. The protein also contains a disordered region. Recent proteogenomic studies have confirmed protein expression and corrected the N-terminal annotation of this protein. The function of this protein family remains unknown.
