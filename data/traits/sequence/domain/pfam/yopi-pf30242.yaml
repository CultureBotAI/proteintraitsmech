identifier: Pfam:PF30242
label: YopI Ig-like domain
definition: >-
  This entry represents YopI, an uncharacterised membrane protein from the SPbeta prophage of Bacillus subtilis. YopI is a 177 amino acid protein containing an N-terminal transmembrane helix (residues 11-31) and a Ig-like domain. The function of this domain remains to be determined.
