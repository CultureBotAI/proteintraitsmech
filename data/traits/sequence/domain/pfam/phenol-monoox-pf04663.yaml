identifier: Pfam:PF04663
label: Phenol hydroxylase
definition: >-
  Under aerobic conditions, phenol is usually hydroxylated to catechol and degraded via the meta or ortho pathways. Two types of phenol hydroxylase are known: one is a multi-component enzyme, such as Phenol 2-monooxygenase, oxygenase component DmpO from Pseudomonas sp., the other is a single-component monooxygenase. This signature is found in both types of enzymes.
