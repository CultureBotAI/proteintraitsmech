identifier: Pfam:PF13521
label: AAA domain
definition: >-
  This entry represents the AAA domain found in a group of proteins, including NadR from Escherichia coli and Ttd14 from Drosophila melanogaster. NadR has three activities: DNA binding, nicotinamide mononucleotide (NMN) adenylyltransferase and ribosylnicotinamide (RN) kinase. Ttd14 is a GTP-binding protein that regulates trafficking of the TRPL ion channel in Drosophila photoreceptor cells. AAA ATPases belong to the AAA+ superfamily of ringshaped P-loop NTPases, which exert their activity through the energy-dependent unfolding of macromolecules.
