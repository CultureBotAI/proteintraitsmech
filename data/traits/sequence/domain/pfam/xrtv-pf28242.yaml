identifier: Pfam:PF28242
label: Sorting system accessory protein XrtV-like
definition: >-
  Members of this hydrophobic protein family are found associated with the protein-sorting cysteine endopeptidase XrtV (exosortase V as in Victor), and likely participate in the proper targeting and localisation of client PEP-CTERM proteins. The system is mainly seen in Sphingomonadales.
