identifier: Pfam:PF22952
label: Eukaryotic type KH-domain (KH-domain type I)
definition: >-
  This entry represents a KH domain found in SCP160 from S.cerevisiae and similar fungal sequences. SCP160 is involved in the control of mitotic chromosome transmission. It is required during cell division for faithful partitioning of the ER-nuclear envelope membranes which, in S.cerevisiae, enclose the duplicated chromosomes. This domain is typically found in RNA-binding proteins along with many other KH domains belonging to .
