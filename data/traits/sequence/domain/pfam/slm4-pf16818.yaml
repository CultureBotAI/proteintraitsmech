identifier: Pfam:PF16818
label: Protein SLM4
definition: >-
  Budding yeast Slm4 is a component of both the GSE and the EGO complexes. The GSE (GAP1 Sorting in the Endosomes) complex is a GTPase complex required for intracellular sorting of Gap1 out of the endosome, which is required for the eventual delivery of GAP1 to the plasma membrane. The GSE complex is composed of two small GTPases (Gtr1 and Gtr2), as well as three other proteins (Slm4, Meh1 and Ltv1) that are located in the late endosomal membrane. Gtr2 interacts with the C-terminal cytosolic domain of Gap1; a tyrosine-containing motif in this domain is necessary both to bind Gtr2 and to direct sorting of GAP1 to the plasma membrane. The EGO complex is involved in the regulation of microautophagy. The EGO complex is composed of at least Gtr2, Slm4 and Meh1 subunits.
