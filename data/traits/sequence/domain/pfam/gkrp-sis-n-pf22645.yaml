identifier: Pfam:PF22645
label: Glucokinase regulatory protein N-terminal SIS domain
definition: >-
  The sugar isomerase (SIS) domain is a phosphosugar-binding module that is found in a variety of eubacterial, archaebacterial and eukaryotic proteins that have a role in phosphosugar isomerization or regulation. In enzymes, the SIS domain can have a catalytic function as an isomerase and bind to phosphorylated sugars. In bacterial transcriptional regulators of the rpiR family, the domain seems to bind substrates implicated in the genes for sugar metabolism that are controlled by the regulator. The SIS domain is found in one or two copies and can be linked to additional domains, such as helix-turn-helix (HTH), CBS, glutamine amidotransferases type 2, or phosphopantetheine-attachment. The SIS domain has an α-β structure and is dominated by a five-stranded parallel β-sheet flanked on either side by α-helices forming a three-layer α-β-α sandwich. The fold shows similarities to that of glucose-6-phosphate isomerase.
