identifier: Pfam:PF28997
label: SHE10 family N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Outer spore wall assembly protein SHE10 (SHE10) yeast proteins. SHE10 (Sensitivity to high expression protein 10) is involved in outer spore wall assembly. It may function as a component of the mitochondrial RNase MRP (MtMRP), a ribonucleoprotein endoribonuclease involved in cleaving RNA transcripts to generate primers for DNA replication in mitochondria. SHE10 proteins contain an N-terminal signal peptide for mitochondrial targeting. The specific function of this domain remains to be determined.
