identifier: Pfam:PF26490
label: Domain of unknown function (DUF8159)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins containing this domain are found predominantly in the class Halobacteria, which includes families such as Natrialbaceae, Haloferacaceae, and Haloarculaceae. The domain is approximately 100-120 amino acids in length. The domain adopts an alpha/beta plait architecture.
