identifier: Pfam:PF12047
label: Cytosine specific DNA methyltransferase replication foci domain
definition: >-
  This domain is part of a cytosine-specific DNA methyltransferase enzyme (DNMT). It functions non-catalytically to target the protein towards replication foci. This allows the DNMT1 protein to methylate the correct residues. This domain targets DMAP1 and HDAC2 to the replication foci during the S phase of mitosis. They are thought to have some importance in the conversion of critical histone lysine moieties. A structure exists for the human cytosine specific DNA methyltransferase replication foci domain.
