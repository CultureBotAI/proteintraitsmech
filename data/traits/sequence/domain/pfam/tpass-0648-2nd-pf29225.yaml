identifier: Pfam:PF29225
label: TPASS_0648 family, second domain
definition: >-
  This entry represents a domain of approximately 120 residues found in proteins from Spirochaetota, particularly Treponema and Spirochaeta species. The domain is named after the Treponema pallidum TPASS_0648 protein ( ). These proteins typically contain N-terminal tetratricopeptide repeats followed by this domain. The function of this domain remains to be determined.
