identifier: Pfam:PF22138
label: 'Archaeal argonaute protein N-terminal domain   '
definition: >-
  Argonaute (Ago) proteins are found in all three domains of life. They share a common molecular architecture, with the C-terminal lobe consisting of the middle (Mid) and PIWI (P element wimpy testis) domains and the N-terminal lobe containing the N-terminal and PIWI-Argonaute-Zwille (PAZ) domains. Archaeal argonaute proteins are guided by 5'-phosphorylated DNA strands and exclusively process cognate DNA targets. This entry represents the N-terminal domain of the archaeal argonaute protein found in M.jannaschii. This domain consists of a four-stranded antiparallel β-sheet and an α-helix.
