identifier: Pfam:PF27629
label: UNC13 third domain
definition: >-
  This entry represents a third domain found in protein UNC13 homologue (PATROL1) from Arabidopsis thaliana and similar proteins from land plants including eudicotyledons, monocotyledons and other spermatophytes. The specific function of this third domain remains to be determined. This domain contains helices and a small β-sheet. PATROL1 controls the tethering of proton ATPase AHA1 to the plasma membrane and is essential for stomatal opening in response to low carbon dioxide concentration and light. The protein translocates reversibly between the cytoplasm and plasma membrane depending on environmental conditions. PATROL1 contains two Munc13 domains (MHD1 and MHD2; and ).
