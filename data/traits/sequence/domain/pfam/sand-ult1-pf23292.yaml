identifier: Pfam:PF23292
label: ULTRAPETALA1 SAND domain
definition: >-
  This domain is found in the family of ULTRAPETALA proteins ULT1/2 from Arabidopsis thaliana and related plant proteins. This domain is predicted to adopt a globular structure with significant similarity to SAND domains. It also contains several highly conserved cysteine residues that could be involved in metal coordination. ULT1/2 are putative transcription factors that act as regulators of cell accumulation in shoot and floral meristems. They also act as antirepressors that counteract EMBRYONIC FLOWER1 (EMF1) action through modulation of histone marks on target genes and thus regulating their transcriptional activities.
