identifier: Pfam:PF22134
label: DNA Mimic Protein Arn
definition: >-
  This entry represents Anti-restriction endonuclease from Enterobacteria phage T4 () proteins and similar sequences from tailed bacteriophages. Arn plays a role in the inhibition of the host restriction-modification system. Arn was identified as an inhibitor of the restriction enzyme McrBC. Its structure consists of a three-stranded, anti-parallel β-sheet on one side, while on the other side, four α-helices are bundled together. A structural analysis of Arn revealed that its shape and negative charge distribution are similar to dsDNA, suggesting that this protein could act as a DNA mimic.
