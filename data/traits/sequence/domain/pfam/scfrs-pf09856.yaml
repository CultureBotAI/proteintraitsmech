identifier: Pfam:PF09856
label: Short-chain fatty acyl coenzyme A regulator, C-terminal
definition: >-
  This domain is found at the C-terminal end of various short-chain fatty acyl coenzyme A regulators (ScfRs) from bacteria, including HTH-type transcriptional regulators PrpR and RamB from Mycobacterium tuberculosis. PrpR (propionate regulator) plays a key role in the regulation of the expression of enzymes involved in the catabolism of short chain fatty acids (SCFA) via both the glyoxylate (acetyl degradation route) and the methylcitrate cycle (propionate degradation route). RamB (regulator of acetate metabolism B) negatively controls the expression of the expression of the isocitrate lyase during growth on acetate as the sole carbon source, and therefore the utilization of fatty acids. This region is organised into a GAF-like domain with a central β-sheet and a C-terminal region that consists mainly of loops and short secondary structure elements.
