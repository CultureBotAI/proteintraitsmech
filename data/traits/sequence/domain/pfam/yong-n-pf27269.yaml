identifier: Pfam:PF27269
label: YonG N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the YonG protein found in Bacillus subtilis. The full-length YonG protein is 306 amino acids and is derived from the SPbeta prophage. YonG is encoded by the yonG gene (locus tag BSU21100) in Bacillus subtilis strain 168. The specific function of this N-terminal domain remains to be determined.
