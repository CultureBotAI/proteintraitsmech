identifier: Pfam:PF29570
label: YMR252C
definition: >-
  This entry represents YMR252C uncharacterised proteins found in fungi. The family includes the Saccharomyces cerevisiae protein YMR252C, which is expressed at 172 molecules per cell in log phase and has been detected by proteomic analysis. The protein has been localised to the mitochondrion. The function of this protein family remains to be determined.
