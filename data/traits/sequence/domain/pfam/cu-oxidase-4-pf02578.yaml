identifier: Pfam:PF02578
label: Multi-copper polyphenol oxidoreductase laccase
definition: >-
  Laccases are multi-copper oxidoreductases able to oxidise a wide variety of phenolic and non-phenolic compounds and are widely distributed among both prokaryotes and eukaryotes. There are two main active catalytic sites with conserved histidines that are capable of binding four copper atoms. This family consists of polyphenol oxidases with laccase activity from bacteria. They may constitute a new laccase subfamily, as they lack sequence relatedness to known laccases. This family also includes laccase domain-containing protein 1 (Lacc1, FAMIN), which is thought to be a central regulator of immunometabolic function in humans.
