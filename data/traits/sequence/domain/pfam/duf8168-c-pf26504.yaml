identifier: Pfam:PF26504
label: Domain of unknown function (DUF8168) C-terminal domain
definition: >-
  This entry represents the C-terminal domain from a family of uncharacterised proteins found predominantly in Proteobacteria that contain two domains the N-terminal represented by . The proteins are distributed among various orders including Burkholderiales, Rhodobacterales, and Hyphomicrobiales. The proteins in this family are typically around 240 to 250 amino acids in length. This domain contains a conserved RHG motif that may be functionally important. This α-helical domain belongs to the Hpt superfamily according to CATH.
