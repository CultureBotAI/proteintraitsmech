identifier: Pfam:PF06155
label: Gamma-butyrobetaine hydroxylase-like, N-terminal
definition: >-
  Gamma-butyrobetaine hydroxylase (GBBH/BBOX) is an alpha-ketoglutarate-dependent dioxygenase that catalyses the biosynthesis of L-carnitine by hydroxylation of gamma-butyrobetaine (GBB). GBBH is a dimeric enzyme. The monomer consists of a catalytic double-stranded β-helix domain and a smaller N-terminal domain. The N-terminal domain has a bound Zn ion, which is coordinated by three cysteines and one histidine. The N-terminal domain facilitates the assembly of a symmetric head-to-tail dimer formation through the interface with the C-terminal domain of the other monomer. This is the N-terminal dimerisation domain found in gamma-butyrobetaine dioxygenases, Fe-S cluster assembly factor HCF101, TMAEP hydroxylase (TmpA) and trimethyllysine dioxygenase proteins. The N-terminal domains of TmpA and BBOX are structurally homologous, despite sharing less than 20% sequence identity. TmpA lacks the CxCxxCxxxH sequence motif required for metal binding, and a divalent cation is not observed in its N-terminal domain.
