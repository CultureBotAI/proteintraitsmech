identifier: Pfam:PF25144
label: IFT122, zinc ribbon domain
definition: >-
  This zinc ribbon domain is found in the human Intraflagellar transport protein 122 homolog (IFT122) and related animal proteins. IFT122 contains two zinc ribbon domains toward the C-terminal. This one is the first of the pair. Intraflagellar transport protein 122 homolog (IFT122) is one of the core components (together with WDR19/IFT144 and IFT140) of the IFT-A complex which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors (GPCRs), being involved in cilia function and/or assembly. IFT-A polymerises interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins.
