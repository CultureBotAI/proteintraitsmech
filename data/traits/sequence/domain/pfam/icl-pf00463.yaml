identifier: Pfam:PF00463
label: Isocitrate lyase family
definition: >-
  Isocitrate lyase ( ) is an enzyme that catalyzes the conversion of isocitrate to succinate and glyoxylate. This is the first step in the glyoxylate bypass, an alternative to the tricarboxylic acid cycle (also known as the TCA cycle) in bacteria, fungi and plants. A cysteine, a histidine and a glutamate or aspartate have been found to be important for the enzyme's catalytic activity. Only one cysteine residue is conserved between the sequences of the fungal, plant and bacterial enzymes; it is located in the middle of a conserved hexapeptide. Mitochondrial 2-methylisocitrate lyase ICL2 from the yeast Saccharomyces cerevisiae does not act on isocitrate but on 2-methylisocitrate. It catalyses the formation of pyruvate and succinate during the metabolism of endogenous propionyl-CoA. Methylisocitrate lyase, mitochondrial from the filamentous fungus Aspergillus nidulans is responsible for the same reaction.
