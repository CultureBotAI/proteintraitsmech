identifier: Pfam:PF18309
label: Argonaute PAZ domain
definition: >-
  This entry represents the PAZ domain found in argonaute from Thermus thermophilus and Synechococcus elongatus. Argonaute has a central role in the RNA interference pathway by mediating the maturation of small interfering RNA (siRNA) through initial degradation of the passenger strand, followed by guide-strand-mediated sequence-specific cleavage of target mRNA. The nucleic-acid-binding channel is thought to be positioned between the PAZ and PIWI domain.
