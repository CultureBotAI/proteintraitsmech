identifier: Pfam:PF25744
label: Bacteriophage T4 Y13H protein
definition: >-
  This entry represents the uncharacterised Y13H (cd.5) protein found in Enterobacteria phage T4. The protein is encoded in the cd-pseT intergenic region of the phage genome. The function of this small 8.7 kDa protein remains unknown. It may play a role in phage replication or host interaction.
