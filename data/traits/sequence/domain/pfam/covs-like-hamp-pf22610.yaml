identifier: Pfam:PF22610
label: Histidine kinase, HAMP domain
definition: >-
  This domain is found at the N-terminal of sensor histidine protein kinase/phosphatase WalK from Streptococcus pneumoniae, the histidine kinase SMU_1516 from Streptococcus mutans (CovS, ) and similar proteins mainly found in Lactobacillales. WalK functions as a sensor protein kinase which is autophosphorylated at a histidine residue and transfers its phosphate group to WalR, the other member of the two-component regulatory system WalK/WalR that regulates genes involved in cell wall metabolism. CovS plays a role in the regulation of acid production and tolerance conducive to dental caries, including proton expulsion. This protein has one transmembrane domain before a HAMP signal transducer domain (this entry), a PAS sensor domain ( ), a DHp domain ( ) and a CA domain ( ). This domain shows two α-helices that form a parallel four-helical coiled-coil when the protein dimerises.
