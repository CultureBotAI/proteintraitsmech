identifier: Pfam:PF21362
label: E3 ubiquitin-protein ligase sina/sinah, RING finger
definition: >-
  This is the RING finger domain of Sina and its homologues from animals, such as Siah-1/2 and plants, such as SINAT3 from Arabidopsis. Sina (seven in absentia) was first identified in Drosophila and is essential for the determination of the R7 pathway in photoreceptor cell development. It consists of a RING zinc finger at the N-terminal, followed by two zinc finger (C2H2 type) domains and a C-terminal TRAF-like domain ( ). This domain carries the E3 ubiquitin ligase activity of these proteins.
