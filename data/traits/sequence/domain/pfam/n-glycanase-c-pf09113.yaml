identifier: Pfam:PF09113
label: Peptide-N-glycosidase F, C terminal
definition: >-
  This domain adopts an eight-stranded antiparallel β jelly roll configuration, with the β strands arranged into two sheets. It is similar in topology to many viral capsid proteins, as well as lectins and several glucanases. This domain allows the protein to bind sugars and catalyses the complete removal of N-linked oligosaccharide chains from glycoproteins.
