identifier: Pfam:PF27904
label: Small lipoprotein, LA_3946 family
definition: >-
  This entry represents a group of small lipoproteins that occur in at least nineteen species of Leptospira, but not so far anywhere outside that genus. They have putative lipoprotein modification Cys and an additional Cys near the C terminus, both invariant, plus a well-conserved (although not invariant) Tyr-Tyr pair. From one to four paralogues occur in most Leptospira species.
