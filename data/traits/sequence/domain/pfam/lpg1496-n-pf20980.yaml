identifier: Pfam:PF20980
label: lpg1496 N-terminal domain
definition: >-
  This domain is found at the N terminus of the uncharacterised Lpg1496 (also known as Lem10) protein from Legionella pneumophila ( , ). It is also known as KLAMP domain. This domain adopts an α/β structure with two α-helices flanked on one side by a five-stranded β-sheet and a four-stranded on the other. Lpg1496 contains two copies of this domain, known as KLAMP1 and KLAMP2.
