identifier: Pfam:PF22038
label: Polycomb protein EED insertion domain
definition: >-
  EED ( ) is one of the core subunits of Polycomb Repressive Complex 2 (PRC2) that is involved in histone methylation. EED consists of two domains: a seven-bladed β-propeller and a small α/β domain that is inserted into the sixth blade. EED specifically binds to histone tails carrying trimethyl-lysine residues associated with repressive chromatin marks, and this leads to the allosteric activation of the methyltransferase activity of PRC2. This entry represents the insertion domain.
