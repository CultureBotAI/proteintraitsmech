identifier: Pfam:PF08881
label: CVNH domain
definition: >-
  Cyanovirin-N (CV-N) is an 11kDa protein from the cyanobacterium Nostoc ellipsosporum that displays virucidal activity against several viruses, including human immunodeficiency virus (AIDS). The virucidal activity of CV-N is mediated through specific high-affinity interactions with the viral surface envelope glycoproteins gp120 and gp41, as well as to high-mannose oligosaccharides found on the HIV envelope. In addition, CV-N is active against rhinoviruses, human parainfluenza virus, respiratory syncytial virus, and enteric viruses. The virucidal activity of CV-N against influenza virus is directed towards viral haemagglutinin. The CV-N domain is evolutionarily conserved and occurs as a protein module in eukaryotes. CV-N has a complex fold composed of a duplication of a tandem repeat of two homologous motifs comprising three-stranded β-sheet and β-hairpins.
