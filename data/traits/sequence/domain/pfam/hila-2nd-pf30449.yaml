identifier: Pfam:PF30449
label: HilA/YgeH-like transcriptional regulator, second domain
definition: >-
  This entry represents the second domain of HilA, YgeH and related transcriptional regulators mainly found in proteobacteria and bacteroidota. It follows the N-terminal OmpR/PhoB-type DNA-binding domain ( ). In Salmonella, HilA is the main transcriptional regulator of Salmonella pathogenicity island 1 (SPI1) and activates the expression of invasion genes. The Escherichia coli homologue YgeH can functionally replace HilA in Salmonella. The specific function of this domain remains to be determined.
