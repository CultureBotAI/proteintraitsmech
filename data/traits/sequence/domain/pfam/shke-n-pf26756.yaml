identifier: Pfam:PF26756
label: ShkE, N-terminal domain
definition: >-
  This entry represents the N-terminal domain in ShkE and related proteins mainly from Dictyostelium discoideum. ShkE is involved in essential cellular processes such as chemotaxis and phagocytosis. It plays a critical role in the regulation of F-actin levels within chemotaxing cells, ensuring proper spatiotemporal control. Additionally, it acts as a negative regulator of the PI3K pathway, which is crucial for various signaling processes. It predominantly phosphorylates serine and threonine residues, with some activity on tyrosine residues. There are four additional putative SHK genes in Dictyostelium. This domain is α-helical.
