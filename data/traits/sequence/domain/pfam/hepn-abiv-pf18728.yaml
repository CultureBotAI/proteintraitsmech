identifier: Pfam:PF18728
label: AbiV
definition: >-
  Bacterial abortive infection (Abi) systems contain phage resistance proteins that limit viral replication. Abi mechanisms differ greatly. This family includes AbiV from Lactococcus lactis. AbiV interacts directly with the protein SaV in phage p2 and blocks translation of phage proteins.
