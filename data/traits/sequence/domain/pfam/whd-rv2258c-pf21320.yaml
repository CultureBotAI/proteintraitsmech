identifier: Pfam:PF21320
label: Rv2258c-like winged HTH domain
definition: >-
  The Mycobacterium tuberculosis Rv2258c protein ( ) is an S-adenosyl-L-methionine (SAM)-dependent methyltransferase (MTase). The monomeric structure of Rv2258c consists of two domains which are linked by a long α-helix. The N-terminal domain, represented by this entry, is essential for dimerisation and the C-terminal domain has the Class I MTase fold. This domain, which has a winged helix-turn-helix (HTH) fold, is also found at the N-terminal of S-adenosylmethionine-dependent methyltransferase FlcA from Pseudomonas aeruginosa, a enzyme involved in the biosynthesis of fluopsin C, a copper-containing antibiotic.
