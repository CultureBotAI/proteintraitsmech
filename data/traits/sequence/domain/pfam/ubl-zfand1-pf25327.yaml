identifier: Pfam:PF25327
label: ZFAND1-like ubiquitin-like domain
definition: >-
  This entry represents the ubiquitin-like domain (UBL) found in ZFAND1, CDC48-associated ubiquitin-like/zinc finger protein 1 and similar proteins. The domain adopts a β-grasp fold similar to ubiquitin and other UBLs, but contains an additional N-terminal helix. The UBL domain is the primary interaction site with p97/VCP and is essential for stress granule clearance. The domain shows low sequence identity with other UBLs despite structural similarity. Crystal and NMR structures reveal that the N-terminal helix adopts different conformations in solution versus crystal states.
