identifier: Pfam:PF28902
label: Toxin SpoIISA, transmembrane domain
definition: >-
  SpoIISA is a toxin which causes lysis of vegetatively growing cells. It forms part of a type II toxin-antitoxin system, where the SpoIISB protein, , acts as an antitoxin. It is a transmembrane protein, with a cytoplasmic domain accounting for approximately two-thirds of the protein. The structure of the cytoplasmic domain resembles that of the GAF domains, . SpoIISB binds to the cytoplasmic domain of SpoIISA with high affinity. This entry represents the transmembrane domain.
