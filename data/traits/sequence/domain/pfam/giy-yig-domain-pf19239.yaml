identifier: Pfam:PF19239
label: GIY-YIG domain-containing protein
definition: >-
  This entry represents the GIY-YIG domain found in Protein EFFECTOR OF TRANSCRIPTION 2 and 3 from Arabidopsis thaliana and related proteins. This is a well characterised domain among the members of the GYI-YIG endonuclease family, which is involved in several cellular processes such as DNA repair and recombination and transfer of mobile genetic elements. Note: this domain is absent from Protein EFFECTOR OF TRANSCRIPTION 1. Protein EFFECTOR OF TRANSCRIPTION 2 (ET2) is a transcriptional regulator involved in the regulation of cell differentiation in meristems. It probably regulates the expression of various KNAT genes involved in the maintenance of the cells in an undifferentiated, merismastic state. ET2 plays a role in the regulation of gibberellin 20 oxidase and the gibberellin-regulated protein GASA4. It localises in the nucleus during the cellular differentiation state and may act via a single strand cutting domain. ET2 is required for the induction of dormancy during late seed development. Interacts genetically with FUS3 and may be component of the same regulatory pathway during embryogenesis. Binds both linear and supercoiled DNA without sequence preference. Effectors of transcription (ETs) are plant-specific regulatory proteins characterised by the presence of two to five C-terminal DNA- and Zn-binding repeats, and a highly conserved cysteine pattern. There are three ETs in Arabidopsis thaliana. AtET2 plays a role in the regulation of plant hormone GA (gibberellin) and cell-cycle-related protein GASA4. Regulation of GA response has also been observed in Brassica napus ET, and could be a conserved feature of these proteins.
