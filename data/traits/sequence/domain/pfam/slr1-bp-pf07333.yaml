identifier: Pfam:PF07333
label: S locus-related glycoprotein 1 binding pollen coat protein (SLR1-BP)
definition: >-
  This family consists of defensin-like proteins from plants. Plant genomes contain several hundred defensin-like (DEFL) genes that encode short cysteine-rich proteins resembling defensins, which are known antimicrobial polypeptides. Arabidopsis thaliana has more than 300 DEFL genes, and they are likely to be involved in both natural immunity and cell-to-cell communication, including pollen-pistil interactions.
