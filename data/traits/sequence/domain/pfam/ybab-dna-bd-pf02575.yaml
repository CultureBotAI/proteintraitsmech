identifier: Pfam:PF02575
label: YbaB/EbfC DNA-binding family
definition: >-
  This is a family of DNA-binding proteins, mainly found in bacteria and plants. Members of this family form homodimers which bind DNA via a tweezer-like structure. The conformation of the DNA is changed when bound to these proteins. In bacteria, these proteins may play a role in DNA replication-recovery following DNA damage. The plant form contains an additional N-terminal region that may serve as a transit peptide and shows a close relationship to the cyanobacterial member, suggesting that it is a chloroplast protein. The crystal structure YbaB from Haemophilus influenzae revealed a core structure consisting of two layers, α/β; YbaB forms a tight dimer with a 3-layer structure, β/α/β.
