identifier: Pfam:PF13562
label: Sugar nucleotidyl transferase
definition: >-
  The MJ_1101 protein from Methanococcus jannaschii has been characterised as the GlmU, a bifunctional enzyme (UDP-N-acetylglucosamine diphosphorylase/glucosamine-1-phosphate N-acetyltransferase) catalyzing the final two steps of UDP-GlcNAc biosynthesis. Homologues of this enzyme are identified in a number of bacterial organisms. A number of these are observed in proximity to the glmS and glmM genes, and phylogenetic profiling identifies the LEPBI_I0518 gene in Leptospira biflexa as a likely Glm-system candidate. There are significant structural differences between these bacterial homologues with their archaeal counterparts represented by .
