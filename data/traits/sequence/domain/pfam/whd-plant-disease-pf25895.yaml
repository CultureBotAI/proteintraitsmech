identifier: Pfam:PF25895
label: Winged Helix Domain in plant disease resistance proteins
definition: >-
  This entry represents a Winged Helix Domain (WHD) found in plant disease resistance proteins. The domain is typically found C-terminal and adjacent to the NB-ARC domain in proteins often annotated as disease resistance proteins in plants. These proteins are involved in the plant immune response against pathogens. This domain organisation is characteristic of nucleotide-binding leucine-rich repeat (NLR) immune receptors in plants.
