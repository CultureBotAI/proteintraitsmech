identifier: Pfam:PF27279
label: Fumarate--diaminopropanoate ligase C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the fumarate--(S)-2,3- diaminopropanoate ligase (DdaG) found in Enterobacter agglomerans. While the full-length protein has characterised ligase activity in antibiotic biosynthesis, the specific function of this domain remains to be determined. The full-length DdaG protein is 396 amino acids and catalyses the formation of N-beta-fumaroyl-DAP from fumarate and 2,3-diaminopropanoate in the presence of ATP. DdaG is involved in dapdiamide antibiotic biosynthesis and can also form N-succinoyl-DAP from succinate and DAP with lower efficiency.
