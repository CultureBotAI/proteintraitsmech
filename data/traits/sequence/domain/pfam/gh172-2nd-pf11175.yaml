identifier: Pfam:PF11175
label: GH172 second beta-sandwich domain
definition: >-
  This entry represents a domain found in GH172 family of enzymes including DFA I synthase/hydrolase from Bifidobacterium dentium , Exo-alpha-D-arabinofuranosidase from Microbacterium arabinogalactanolyticum and related proteins. These proteins contain a pair of homologous structurally similar domains which adopt jelly-roll β-sandwich. They assemble into trimeric structure that can form other higher order assemblies.
