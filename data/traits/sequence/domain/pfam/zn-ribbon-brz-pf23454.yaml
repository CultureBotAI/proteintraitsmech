identifier: Pfam:PF23454
label: Transcriptional regulator Brz zinc beta ribbon domain
definition: >-
  This entry represents a group of small proteins mainly from Halobacteria including Transcriptional regulator Brz. Brz is known to activate transcription of bacteriorhodopsin and phytoene synthase. It may interact with DNA or RNA via the zinc finger domain. These proteins are predicted to adopt a zinc β-ribbon fold in which the last zinc coordinating residue is histidine instead of the commonly found cysteine. This kind of substitution has been already observed in other zinc β-ribbon domains from transcription factors, methytransferases and ribosomal proteins. Mutation of the cysteine and histidine residues has a pronounced effect on the Brz function.
