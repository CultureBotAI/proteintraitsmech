identifier: Pfam:PF25691
label: Baseplate wedge 3 tail fiber network component
definition: >-
  This entry represents the Baseplate Wedge 3 Tail Fibre Network (BW3TFN) component found in bacteriophage A511 and related phages. The protein forms dimers that constitute an essential part of the bacteriophage tail fibre structure. The BW3TFN protein (gp105 in phage A511, ) is located in the proximal part of the tail fibre and interacts with the Baseplate Wedge 3 (BW3) protein, which crosses the surface of BW3TFN dimers. The protein retains the structure and functionality of T4 BW3TFN gp8 but has a more streamlined architecture, making it about half the size. BW3TFN proteins are found in many contractile tail bacteriophages and related injection systems. Multiple BW3TFN dimers arranged in series form a rigid scaffold that constitutes the proximal part of the phage tail fibre and is involved in the transmission of the conformational signal from the baseplate to the receptor binding proteins during host cell attachment.
