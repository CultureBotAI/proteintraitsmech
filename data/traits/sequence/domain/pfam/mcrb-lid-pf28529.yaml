identifier: Pfam:PF28529
label: McrB, alpha-helical lid domain
definition: >-
  This domain is found in McrB component of McrBC complex from Escherichia coli and related bacterial proteins. McrBC system is a motor driven nuclease functioning in bacterial self-defence. McrB is a GTP-specific AAA+ protein that powers the translocation along DNA. This domain is inserted into the AAA-like domain. MrcB associates into a hexameric ring. McrB is the only AAA+ protein that preferentially binds and hydrolyzes GTP.
