identifier: Pfam:PF00436
label: Single-strand binding protein family
definition: >-
  The Escherichia coli single-strand binding protein (gene ssb), also known as the helix-destabilising protein, is a protein of 177 amino acids. It binds tightly, as a homotetramer, to single-stranded DNA (ss-DNA) and plays an important role in DNA replication, recombination and repair. Closely related variants of SSB are encoded in the genome of a variety of large self-transmissible plasmids. SSB has also been characterised in bacteria such as Proteus mirabilis or Serratia marcescens. Eukaryotic mitochondrial proteins that bind ss-DNA and are probably involved in mitochondrial DNA replication are structurally and evolutionary related to prokaryotic SSB. Primosomal replication protein N (PriB) is a specialist protein from bacteria that binds single-stranded DNA at the primosome assembly site (PAS). The primosome is a mobile multiprotein replication priming complex which is believed to operate on the lagging-strand template at the E. coli DNA replication fork. The primosome consists of one monomer of PriC and DnaT, two monomers of PriA, two dimers of PriB and one hexamer of DnaB.
