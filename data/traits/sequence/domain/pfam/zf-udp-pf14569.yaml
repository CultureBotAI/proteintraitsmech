identifier: Pfam:PF14569
label: Zinc-binding RING-finger
definition: >-
  This RING-type zinc finger domain is frequently found in the catalytic subunit of cellulose synthase ( ). This enzyme removes the glucose from UDP-glucose and adds it to the growing cellulose, thereby releasing UDP. The domain-structure is treble-clef like (PDB:1weo).
