identifier: Pfam:PF20845
label: Pre-mRNA cleavage complex 2 protein Pcf11, alpha-helical domain
definition: >-
  This entry represents the α-helical domain found adjacent the CID domain in Pre-mRNA cleavage complex 2 protein Pcf11 from human and similar animal proteins whose function is unknown. Pcf11 is a subunit and an essential component of CFII (the orthologue of cleavage and polyadenylation factor IA (CFIA) from yeast) which is involved in pre-mRNA 3' end processing and in transcription termination. PCF11 is thought to be one of the scaffold proteins of the processing complex. PCF11-mediated termination is essential for vertebrate development.
