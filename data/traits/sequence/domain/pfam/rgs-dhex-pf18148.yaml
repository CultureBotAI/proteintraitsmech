identifier: Pfam:PF18148
label: Regulator of G-protein signalling DHEX domain
definition: >-
  This domain is found in a diverse group of multifunctional proteins that regulate cellular signalling events downstream of G-protein coupled receptors (GPCRs). They belong to the R7 (Neuronal RGS) subfamily, which includes RGS6, RGS7, RGS9, and RGS11, all of which, in humans, are expressed predominantly in the nervous system. They form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes. In addition, R7 proteins were found to bind many other proteins outside of the G protein signalling pathways including: m-opioid receptor, beta-arrestin, alpha-actinin-2, NMDAR, polycystin, spinophilin, guanylyl cyclase, among others. They have an RGS domain, which is an essential part of the R7 protein subfamily. These proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. This entry also includes egl-10, an orthologue of human RGS7 from C. elegans. This domain is referred to as DEP helical extension (DHEX) because it is located next to N-terminal Dishevelled/Egl-10/Pleckstrin homology (DEP) domain. Both the DEP and DHEX domains are necessary, but not sufficient, to bind anchoring proteins such as RGS9 anchor protein. These constitute a site of major allosteric regulation of the complex via association with GPCRs and small SNARE-like membrane proteins. DHEX has no close structural homologues.
