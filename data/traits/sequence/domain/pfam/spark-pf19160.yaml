identifier: Pfam:PF19160
label: 'SPARK '
definition: >-
  This entry represents an extracellular domain of plant receptor-like kinases (SIMILAR PROTEIN TO ARK, SPARK), many of which play a role in signalling during plant-fungal symbiosis. The precise function of this domain is unknown (Montero H et. al., PNAS June 22, 2021 118 (25) e2105281118; https://doi.org/10.1073/pnas.2105281118).
