identifier: Pfam:PF23806
label: Phage tail tube protein
definition: >-
  This entry represents a family of bacteriophage tail tube proteins. The tail tube forms the inner channel of the contractile tail which is used for DNA transfer from the capsid to the host during infection. The family is found in a wide variety of phages that infect bacteria.
