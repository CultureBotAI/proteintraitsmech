identifier: Pfam:PF21447
label: 'Ppx/GppA phosphatase, domain III '
definition: >-
  Ppx/GppA phosphatases belong to ASKHA (acetate and sugar kinases, Hsp70, actin) which has an N-terminal ( ) nucleotide-binding domain (domains I/II), domain III which corresponds to the catalytic phosphohydrolase domain with the common helical fold and domain IV. This entry represents the C-terminal region that includes domains III and IV.
