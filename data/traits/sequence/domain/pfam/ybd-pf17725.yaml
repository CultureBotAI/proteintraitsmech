identifier: Pfam:PF17725
label: YAP binding domain
definition: >-
  TEA domain transcription factors contain an N-terminal TEA domain ( ) and a C-terminal YAP binding domain (YBD). This entry corresponds to the YBD that binds to the oncoproteins YAP and TAZ. The structure of the YBD shows that it has an Ig-like β sandwich fold.
