identifier: Pfam:PF29963
label: Cadherin-23 alpha/beta domain
definition: >-
  This entry represents an α/β domain found in the vertebrate Cadherin-23 (CDH23) and related proteins, including their orthologues in fruit fly Cadherin-87A and Cadherin-89D. Cadherins are calcium-dependent cell adhesion proteins. They preferentially interact with themselves in a homophilic manner in connecting cells. CDH23 is required for establishing and/or maintaining the proper organisation of the stereocilia bundle of hair cells in the cochlea and the vestibule during late embryonic/early postnatal development. It is part of the functional network formed by USH1C, USH1G, CDH23 and MYO7A that mediates mechanotransduction in cochlear hair cells.
