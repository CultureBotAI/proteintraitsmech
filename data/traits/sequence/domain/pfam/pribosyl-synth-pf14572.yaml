identifier: Pfam:PF14572
label: Phosphoribosyl synthetase-associated domain
definition: >-
  Ribose-phosphate diphosphokinase, also known as ribose-phosphate pyrophosphokinase (RPPK), or phosphoribosyldiphosphate synthetase ( ), catalyses the transfer of an intact diphosphate (PP) group from ATP to ribose-5-phosphate (R-5-P), which results in the formation of AMP and 5-phospho-D-ribosyl--1-diphosphate (PRPP).
