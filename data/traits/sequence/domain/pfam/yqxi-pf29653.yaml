identifier: Pfam:PF29653
label: Uncharacterised protein YqxI
definition: >-
  This entry represents uncharacterised protein YqxI (also called YqdE) found in Bacillales and Paenibacillaceae within Bacillota, as well as Actinomycetota. The protein is encoded by gene BSU25890 in Bacillus subtilis and is part of the skin element.
