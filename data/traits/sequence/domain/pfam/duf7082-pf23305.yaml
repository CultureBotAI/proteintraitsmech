identifier: Pfam:PF23305
label: Domain of unknown function (DUF7082)
definition: >-
  This domain is found in uncharacterised proteins mainly from Fungi. This domain is predicted to adopt a globular structure consisting of a curved β-sheet and α-helices packed on it. This domain is probably distantly related to the N-terminal domain of STE-like transcription factors ( ) based on the similarity of their predicted structures. The predicted structure of this domain has a partial similarity to pseudo Winged helix domains.
