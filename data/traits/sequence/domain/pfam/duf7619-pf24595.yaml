identifier: Pfam:PF24595
label: Domain of unknown function (DUF7619)
definition: >-
  This domain is found in uncharacterised proteins, sometimes in multiple copies. Some proteins containing this domain contain either LPXTG cell wall anchor motif or secretion system C-terminal sorting domain at the C terminus. It is likely that some members of this entry contain an intramolecular isopeptide bond.
