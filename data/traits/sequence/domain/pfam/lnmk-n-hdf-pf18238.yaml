identifier: Pfam:PF18238
label: LnmK N-terminal Hot Dog Fold domain
definition: >-
  This domain is found in LnmK and is present in Streptomyces atroolivaceus. LnmK is a bifunctional acyltransferase/decarboxylase (AT/DC) that catalyzes first self-acylation using methylmalonyl-CoA as a substrate and subsequently trans-acylation of the methylmalonyl group to the phosphopantetheinyl group of the LnmL acyl carrier protein. LnmK is a homodimer composed of two monomeric double-hot-dog folds (DHDF). This domain is the N-terminal hot dog fold.
