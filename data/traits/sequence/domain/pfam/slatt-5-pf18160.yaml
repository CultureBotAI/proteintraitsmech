identifier: Pfam:PF18160
label: SMODS and SLOG-associating 2TM effector domain family 5
definition: >-
  The SLATT domain contains two transmembrane helices. SLATT domains are generally predicted to function as pore-forming effectors in a class of conflict systems which are reliant on the production of second messenger nucleotide or nucleotide derivatives. SLATT domains are predicted to initiate cell suicide responses upon their activation. This SLATT family contains an additional C-terminal α-helix, and strictly associates with a reverse transcriptase domain, part of a predicted retroelement with diversity-generating potential.
