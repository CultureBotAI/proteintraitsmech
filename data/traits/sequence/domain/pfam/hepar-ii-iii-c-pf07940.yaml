identifier: Pfam:PF07940
label: Heparinase II/III-like, C-terminal
definition: >-
  This is the C-terminal domain of heparin and heparin-sulfate lyase (HepB, also known as heparinase II), heparin-sulfate lyase (HepC, also known as heparinase III) and distantly related sequences. The structures of heparinase II and III have been solved. HepB cleaves both heparin and heparan sulfate glycosaminoglycans through a beta-elimination mechanism. It cleaves heparin at alpha-D-GlcNp2S6S(1->4) alpha-L-IdoAp2S and heparan sulfate at alpha-D-GlcNp2Ac(or 2S)6OH(1->4)beta-D-GlcAp. HepC specifically cleaves heparan sulfate-rich regions of acidic polysaccharides, it does not act on N,O-desulfated glucosamine or N-acetyl-O-sulfated glucosamine linkages. HepC functions in cleaving metazoan heparan sulfate and providing carbon, nitrogen and sulfate sources for microorganisms. This entry also includes FtsZ-localized protein C (FzlC), which binds and recruits FtsZ polymers to membranes early in the cell cycle. It may also improve the efficiency of cytokinesis through the regulation of cell wall hydrolysis. This protein has been reported to have sequence similarity to heparinase II/III family proteins.
