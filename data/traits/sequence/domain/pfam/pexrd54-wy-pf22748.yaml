identifier: Pfam:PF22748
label: Effector PexRD54, WY-domain
definition: >-
  This entry represents homologous WY domains of the RxLR effector PexRD54 from Phytophthora infestans and similar proteins from Peronosporales, water moulds that are mainly associated with plant diseases. PexRD54 is an effector that specifically binds host autophagy protein ATG8CL (from the ATG8 family) to stimulate autophagosome formation and subsequent autophagy and pays a key role in plant immunity. The WY domain is a conserved structural unit consisting of three α-helices and two characteristic hydrophobic amino acids, frequently W (Trp) and Y (Tyr), which contribute to a stable hydrophobic core.
