identifier: Pfam:PF20858
label: Immunodominant antigen Pgp3, N-terminal domain
definition: >-
  This domain is found in Virulence plasmid protein pGP3-D, a virulence protein from Chlamydia trachomatis involved in stimulating host immune responses and thought to be required for growth within mammalian cells. Pgp3 consists of globular N- and C-terminal domains ( is the latter) connected by a triple-helical coiled coil (THCC). The N-terminal domain (this entry), which includes several structural motifs typically found in trimeric viral proteins, folds into a fairly flat surface.
