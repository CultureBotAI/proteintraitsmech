identifier: Pfam:PF23904
label: Domain of unknown function (DUF7246)
definition: >-
  This entry describes a domain of unknown function found in phage proteins. The proteins containing this domain average 90 to 100 amino acids in length and is found in a variety of phage proteins, particularly those from Streptomyces and Mycobacterium phages. The domain usually occurs near the middle or C-terminal of proteins. The domain forms a small β-barrel.
