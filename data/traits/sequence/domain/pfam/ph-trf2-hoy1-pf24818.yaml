identifier: Pfam:PF24818
label: TRF2/HOY1 PH-like domain
definition: >-
  This domain is found in Pyriculol/pyriculariol biosynthesis cluster transcription factor 1 (TRF2), Homeobox protein HOY1 (HOY1) and uncharacterised proteins mainly from plants and fungi. TRF2 is a transcription regulator which negatively regulates the expression of a gene cluster responsible for the biosynthesis of pyriculol and pyriculariol. This domain has a detectable similarity to characterised PH domains and is predicted to adopt a similar β-barrel structure.
