identifier: Pfam:PF04673
label: Polyketide synthesis cyclase
definition: >-
  Aromatic polyketides are assembled by a type II (iterative) polyketide synthases (PKSs) in bacteria. Type II PKS complexes consist of several monofunctional or bifunctional proteins which produce polyketide chains of variable but defined length from a specific starter unit and a number of extender units. They also specify the initial regiospecific folding and cyclization pattern of nascent polyketides either through the action of a cyclase (CYC) subunit or through the combined action of site-specific ketoreductase and CYC subunits.
