identifier: Pfam:PF30934
label: ARB_06334 middle domain
definition: >-
  This entry represents a middle domain found in putative metallopeptidases from fungi (Ascomycota) and bacteria (Actinomycetota). Proteins containing this domain are typically secreted and belong to the M6 or M10B peptidase families. This domain may occur in multiple copies within a single protein. The specific function of this domain remains to be determined.
