identifier: Pfam:PF20144
label: TIG domain
definition: >-
  This entry represents the IPT domain of the recombination signal Jkappa binding protein (RBP-Jkappa, also known as RBP-J). RBP-J kappa, was initially considered to be involved in V(D)J recombination because of its DNA binding specificity and structural similarity to site-specific recombinases known as the integrase family. Further studies indicated that RBP-J kappa functions as a repressor of transcription, via destabilization of the general transcription factor IID and recruitment of histone deacetylase complexes. Later, its was found to be a transcriptional regulator downstream of Notch receptors. IPT/TIG (immunoglobulin, plexin, transcription factor-like/transcription factor immunoglobulin) domains adopt an immunoglobulin-like fold and have been found in proteins involved in transcriptional regulation and signal transduction, and can also participate in protein-protein interactions.
