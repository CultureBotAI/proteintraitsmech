identifier: Pfam:PF22080
label: Dark, CARD domain
definition: >-
  This entry represents a caspase recruitment domain (CARD) present in a set of Dark (Drosophila Apaf-1-related killer) proteins from insects, including Apaf-1/CED-4-related caspase activator Dapaf-1S from Drosophila melanogaster (Dark). Dark protein is part of the apoptosome complex and plays a key role in procaspases activation and apoptosis. This N-terminal CARD in Dark belongs to the α-helical Death domain superfamily ( ) and interacts with the N-terminal CARD of Dronc protein.
