identifier: Pfam:PF28256
label: Coiled-coil domain-containing protein 171
definition: >-
  The function of CCDC171 is not clear. The protein is large, ranging from 1324-1326 amino acids in length, and contains multiple coiled-coil regions. In humans, the protein is encoded by the CCDC171 gene located on chromosome 9. Alternative splicing generates multiple isoforms of the protein. The protein shows tissue-enhanced expression in testis and is expressed across various cell types.
