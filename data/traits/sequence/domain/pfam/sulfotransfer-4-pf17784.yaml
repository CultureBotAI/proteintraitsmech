identifier: Pfam:PF17784
label: Sulfotransferase domain
definition: >-
  This family of proteins are distantly related to sulfotransferase enzymes, mainly found in fungi and platyhelminthes. In S. mansonii, it has been shown to be involved in resistance to oxamniquine and to have sulfotransferase activity. This entry also includes Ava biosynthesis cluster protein M from Aspergillus versicolor, which is part of the cluster that mediates the biosynthesis of a highly modified cyclo-arginine-tryptophan dipeptide (cRW).
