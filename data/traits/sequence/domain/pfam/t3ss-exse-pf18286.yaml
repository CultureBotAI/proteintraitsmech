identifier: Pfam:PF18286
label: Type III secretion system ExsE
definition: >-
  This domain is found in ExsE present in Pseudomonas aeruginosa. ExsE forms part of the ExsACDE signaling cascade which acts as an important regulatory switch that ensures timely expression of the Type III secretion system (T3SS) and so plays a critical role in facilitating infection. Prior to host-cell contact, the T3SS is inactive and ExsE and Type III Secretion Chaperone (ExsC) form a stable complex. ExsC forms a compact homodimer and ExsE wraps around one face of this dimer.
