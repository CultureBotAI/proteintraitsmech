identifier: Pfam:PF01750
label: Hydrogenase maturation protease
definition: >-
  This group represents metallopeptidases of the MEROPS peptidase family A31 (HybD endopeptidase family). Peptidase family A31 includes endopeptidases involved in hydrogenase maturation. HycI (hydrogenase 3 maturation protease) is a protease involved in the C-terminal processing of HycE, the large subunit of hydrogenase 3. HybD is involved in processing of pre-HybC (the large subunit of hydrogenase 2); and HyaD is assumed to be involved in processing of the large subunit of hydrogenase 1. The large subunit of [NiFe]-hydrogenase, as well as other nickel metalloenzymes, is synthesized as a precursor devoid of the metalloenzyme active site. This precursor undergoes a complex post-translational maturation process that requires a number of accessory proteins. At one step of this process, after nickel incorporation, each hydrogenase isoenzyme is processed by proteolytic cleavage at the C-terminal end by the corresponding hydrogenase maturation endopeptidase. The cleavage site is after a His or an Arg, liberating a short peptide. This cleavage occurs only in the presence of nickel, and the endopeptidase probably uses the metal in the large subunit of [NiFe]-hydrogenases as a recognition motif. There is no direct evidence for the active site or substrate-binding site, but there are predictions based on an available structure. Nomenclature note: the following names are used in different organisms for members of this group: HycI, HybD, HyaD, HoxM, HoxW, HupD, HynC, HupM, VhoD, VhtD. Gene/protein names are sometimes used interchangeably to designate various "hydrogenase cluster" proteins unrelated to each other in various organisms. For example, the following names are used for members of this group, but also for unrelated proteins: HupD is used in Azotobacter chroococcum and Anaba…
