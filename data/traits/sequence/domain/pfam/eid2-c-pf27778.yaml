identifier: Pfam:PF27778
label: EID1-like F-box protein 2 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of EID1-like F-box 1-3 proteins from plants, including EID1, EDL1, EDL2 and EDL3 from Arabidopsis thaliana and related sequences. These proteins are components of SCF E3 ubiquitin ligase complexes. EID1 is a negative regulator of the phytochrome A signalling pathway and is involved in protein ubiquitination. EDL3 is involved in abscisic acid signalling and stress responses. The proteins are localised to the nucleus. The proteins contain an N-terminal F-box domain required for interaction with SKP1 proteins and this C-terminal domain, whose specific function is still unknown.
