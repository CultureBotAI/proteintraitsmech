identifier: Pfam:PF30170
label: Type I restriction enzyme EcoKI endonuclease subunit second domain
definition: >-
  This entry represents the second domain of Type I restriction enzyme EcoKI endonuclease subunit (T1RK) from E.coli and related sequences. T1RK is a subtype A restriction (R) subunit of a type I restriction enzyme that recognises 5'-AACN6GTGC-3' and cleaves a random distance away. The R subunit is required for both endonuclease and ATPase activities.
