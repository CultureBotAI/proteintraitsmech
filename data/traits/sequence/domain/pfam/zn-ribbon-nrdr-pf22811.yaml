identifier: Pfam:PF22811
label: Transcriptional repressor NrdR-like, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the Transcriptional repressor NrdR and similar sequences, which is a zinc β-ribbon domain, followed by an ATP-cone domain ( ). These proteins negatively regulates transcription of bacterial ribonucleotide reductase nrd genes and operons by binding to NrdR-boxes. This domain harbors two conserved CxxC motifs that coordinate a zinc ion, and binds to the highly conserved NrdR boxes ( ).
