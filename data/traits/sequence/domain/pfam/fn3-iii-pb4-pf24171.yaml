identifier: Pfam:PF24171
label: Straight fiber protein PB4 third Fn3-like domain
definition: >-
  This entry represents the third Fn3-like domain of the Straight fiber protein PB4 found in in Escherichia phage T5 and other tailed bacteriophages. PB4 along with PB3, forms the central straight fibre, bearing the receptor binding protein PB5 at its C terminus. Upon PB5 binding to the host receptor FhuA, the central fibre reorganises and undergoes structural rearrangements that lead to its bending, bringing PB3 close to the host membrane for anchoring. The PB4-PB3 interactions are ensured by the proximal loops of the first and the distal loops of the second of the three PB4 Fn3-like domains. These interactions are disrupted upon binding to the host receptor and the string of the three PB4 Fn3-like domains undergoes drastic conformational changes.
