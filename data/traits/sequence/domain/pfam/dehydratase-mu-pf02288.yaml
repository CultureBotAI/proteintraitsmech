identifier: Pfam:PF02288
label: Dehydratase medium subunit
definition: >-
  This family contains the medium subunit of the trimeric diol dehydratases and glycerol dehydratases, and the small subunit of the diol/glycerol dehydratase reactivating factor. Diol dehydratases are produced by some enterobacteria in response to growth substances. Both diol dehydratase and glycerol dehydratase comprise three subunits: PduC/PduD/PduE or PddA/PddB/PddC for propanediol dehydratase, and GldA/Gld/B/GldC or DhaB/DhaC/DhaE for glycerol dehydratase.
