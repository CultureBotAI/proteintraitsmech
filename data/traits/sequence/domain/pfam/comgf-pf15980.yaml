identifier: Pfam:PF15980
label: Putative Competence protein ComGF
definition: >-
  This entry represents Competence protein ComGF (also known as ComG operon protein 6), from Streptococcus pneumoniae, ComGF from Bacillus subtilisand similar proteins from Bacilli. These proteins are required for transformation and DNA binding. Competence protein ComGF from Streptococcus pneumoniae is required for formation of the type IV-like pilus (T4P) that plays a role in transformation. The comG operon of Bacillus subtilis encodes seven membrane associated proteins which function in binding of transforming DNA to the competent cell surface. ComGC, GD, GE and GG have N-terminal sequence motifs typical of type 4 pre-pilins and are processed by a pathway that requires the product of comC, also an essential competence gene. They form pilin-like structures that are localised to the cytoplasmic membrane and cell wall. The comG operon also consist of ComGF, a small integral membrane protein, ComGA and ComGB, which are predicted to be a nucleotide binding protein and an integral membrane protein respectively. When strains missing each of the 7 proteins are created, they were all found to be nontransformable and failed to bind transforming DNA to the cell surface. The development of genetic competence in Bacillus subtilis is a highly regulated adaptive response to stationary-phase stress. For competence to develop, the transcriptional regulator, ComK, must be activated. ComK is required for the expression of genes encoding proteins that function in DNA uptake. In log-phase cultures, ComK is inactive in a complex with MecA and ClpC. The comS gene is induced in response to high culture cell density and nutritional stress and its product functions to release active ComK from the complex. ComK then stimulates the transcription initiation of its own gene as well as that of the l…
