identifier: Pfam:PF31162
label: Domain of unknown function (DUF8827)
definition: >-
  This entry represents a membrane protein domain of approximately 70 residues found in Streptomyces and related Actinomycetes. In Streptomyces coelicolor, SCO4131 containing this domain is located in a gene cluster (SCO4126-SCO4131) that affects actinorhodin antibiotic biosynthesis. The function of this domain remains to be determined.
