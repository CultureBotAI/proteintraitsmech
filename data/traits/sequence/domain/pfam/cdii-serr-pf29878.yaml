identifier: Pfam:PF29878
label: Serratia CdiI immunity protein-like
definition: >-
  This entry represents a group of CdiI immunity proteins which are component of a Contact-dependent inhibition system. Contact-dependent growth inhibition (Cdi) is a widespread form of inter-bacterial competition mediated by CdiA effector proteins. CdiI are immunity proteins, which neutralize the CdiA toxins to prevent auto-inhibition. The structure of a member of this family from Serratia marcescens has been determined ( ).
