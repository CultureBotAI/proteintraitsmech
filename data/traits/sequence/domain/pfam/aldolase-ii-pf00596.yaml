identifier: Pfam:PF00596
label: Class II Aldolase and Adducin N-terminal domain
definition: >-
  This entry represents the α/β/α domain found in class II aldolases and in adducin (usually at the N terminus of adducin). Proteins containing this domain include: rhamnulose-1-phosphate aldolase ( ), L-fuculose phosphate aldolase ( ) that is involved in the third step in fucose metabolism, L-ribulose- 5-phosphate 4-epimerase ( ) involved in the third step of L-arabinose catabolism, a probable sugar isomerase SgbE and the metazoan adducins, which have not been ascribed any enzymatic function but which play a role in cell membrane cytoskeleton organisation. It also includes ribulose-1-phosphate aldolase that catalyses the cleavage of ribulose 1-phosphate to dihydroxyacetone phosphate and glycolaldehyde.
