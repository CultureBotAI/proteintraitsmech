identifier: Pfam:PF31233
label: B3 domain-containing protein At5g26805, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the B3 domain- containing protein At5g26805, found in Brassicaceae. At5g26805 is a small nuclear protein predicted to be involved in transcription regulation. The protein contains this N-terminal domain and a C-terminal TF-B3 DNA-binding domain represented by . The specific function of this N-terminal domain remains to be determined.
