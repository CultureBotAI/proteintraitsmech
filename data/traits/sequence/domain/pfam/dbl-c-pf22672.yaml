identifier: Pfam:PF22672
label: Duffy-binding-like domain, C-terminal subdomain
definition: >-
  This entry represents a domain found C-terminally to Duffy binding-like (DBL, ) domains of PfEMP1 ( ), the adhesin of Plasmodium falciparum which is an important target for protective immunity and is implicated in the pathology of malaria through its ability to adhere to host endothelial receptors. This domain consists of an helical bundle.
