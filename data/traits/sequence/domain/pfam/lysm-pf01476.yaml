identifier: Pfam:PF01476
label: LysM domain
definition: >-
  This entry represents a C-terminal domain of approximately 70 residues found in cyanobacterial LysM-containing proteins. The proteins containing this domain typically have multiple N-terminal LysM domains ( ) which bind peptidoglycan. The specific function of this C-terminal domain remains to be determined.
