identifier: Pfam:PF30766
label: Domain of unknown function (DUF8725)
definition: >-
  This entry represents a bacterial immunoglobulin-like (Big) domain of approximately 150 residues. The domain is found in multi-domain proteins that also contain the DUF7408 domain ( ). This family is restricted to Bacillota, particularly Bacillales (including Paenibacillus and Bacillaceae) and Clostridia. The function of this domain remains to be determined.
