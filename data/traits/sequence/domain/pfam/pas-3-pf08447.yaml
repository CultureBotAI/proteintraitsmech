identifier: Pfam:PF08447
label: PAS fold
definition: >-
  This domain is found in the family of Period circadian protein homologues (PER1, PER2, PER3) found in vertebrates. Sequences represented by this entry are found C-terminal to . PER proteins (PER 1-3) are transcriptional repressors which form the core component of the circadian clock. They play a critical role in rhythm generation, whereas delays imposed by post-translational modifications are important for determining the period of the rhythms. The core clock genes: PER1/2/3 and CRY1/2 form the negative limb of the feedback loop and interact with the CLOCK|NPAS2-BMAL1|BMAL2 heterodimer inhibiting its activity and thereby negatively regulating their own expression.
