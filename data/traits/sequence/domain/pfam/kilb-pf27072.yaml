identifier: Pfam:PF27072
label: KilB plasmid transfer protein
definition: >-
  This entry represents the KilB protein family involved in bacterial plasmid transfer. The prototype member from Streptomyces lividans plasmid pIJ101 is a 147 amino acid protein that functions in conjugative plasmid transfer. The protein contains a hydrophobic N-terminal region (residues 1-20) that likely serves as a membrane anchor or signal sequence. KilB is encoded on the pIJ101 plasmid, a well-studied conjugative plasmid in Streptomyces species that serves as a model for understanding plasmid transfer mechanisms in actinomycetes.
