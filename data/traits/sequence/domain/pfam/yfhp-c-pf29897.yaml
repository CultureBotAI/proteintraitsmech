identifier: Pfam:PF29897
label: YfhP C-terminal alpha/beta plait domain
definition: >-
  This entry represents the C-terminal α/β plait domain of YfhP proteins found in Bacillus and related Gram-positive bacteria. YfhP proteins are multidomain transmembrane proteins with an N-terminal YdjM domain ( ), a middle domain of unknown function, and this C-terminal domain. The specific function of this domain remains to be determined.
