identifier: Pfam:PF08974
label: Domain of unknown function (DUF1877)
definition: >-
  This entry represents Protein YfbM from Escherichia coli (strain K12) and similar proteins mainly found in bacteria. The structure of YfbM has been solved, showing α/β/α layers with an antiparallel β-sheet. Although this protein is been suggested to be a binding site for peptide nucleic acids (PNAs, species-selective antibacterials,), its function is yet to be characterised.
