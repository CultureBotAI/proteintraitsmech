identifier: Pfam:PF04131
label: Putative N-acetylmannosamine-6-phosphate epimerase
definition: >-
  This family includes N-acetylmannosamine-6-phosphate 2-epimerases that convert N-acetylmannosamine-6-phosphate (ManNAc-6-P) to N-acetylglucosamine-6-phosphate (GlcNAc-6P) in the N-acetylmannosamine utilisation pathway, found mainly in pathogenic bacteria. It is encoded by the yhcJ/nanE gene. This reaction is part of the pathway that allows the usage of sialic acid as a carbohydrate source.
