identifier: Pfam:PF13188
label: PAS domain
definition: >-
  PAS domains are involved in many signalling proteins where they are used as a signal sensor domain. PAS domains appear in archaea, bacteria and eukaryotes. Several PAS-domain proteins are known to detect their signal by way of an associated cofactor. Heme, flavin, and a 4-hydroxycinnamyl chromophore are used in different proteins. The PAS domain was named after three proteins that it occurs in: Per- period circadian protein Arnt- Ah receptor nuclear translocator protein Sim- single-minded protein. PAS domains are often associated with PAC motifs . It appears that these domains are directly linked, and that together they form the conserved 3D PAS fold. The division between the PAS and PAC domains is caused by major differences in sequences in the region connecting these two motifs. In human PAS kinase, this region has been shown to be very flexible, and adopts different conformations depending on the bound ligand. Probably the most surprising identification of a PAS domain was that in EAG-like K -channels.
