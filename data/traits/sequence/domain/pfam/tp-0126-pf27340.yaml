identifier: Pfam:PF27340
label: TP_0126
definition: >-
  This entry represents TP_0126, TP_0733 and BB_0027 proteins found in Treponema and related spirochaetes. The proteins adopt a β-barrel fold structure and belong to the OmpA-like. TP_0126 is found in Treponema pallidum, the causative agent of syphilis, and shows similarity to TP_0733. The proteins are classified in the OmpA-OmpF porin family and contain predicted transmembrane helices. The function of this protein remains to be determined.
