identifier: Pfam:PF26758
label: DALR, N-terminal domain
definition: >-
  This entry represents the N-terminal domain in DALR proteins from animals. DALR is involved in the process of tRNA methylation. It plays a crucial role in the recognition and targeting of specific tRNA substrates, namely tRNA(Arg)(CCU) and tRNA(Arg)(UCU), for N(3)-methylcytidine modification. This modification is facilitated by the interaction with methyltransferases such as METTL2, METTL2A, and METTL2B. The proteins in this entry form part of a complex that includes tRNA(Arg) and the aforementioned methyltransferases, ensuring the precise modification of tRNA molecules, which is essential for proper protein synthesis and cellular function.
