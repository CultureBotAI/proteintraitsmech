identifier: Pfam:PF27488
label: BioS helical-like domain
definition: >-
  This entry represents the helical-like domain found in BioS, a biotin transport regulator from Sinorhizobium meliloti. This domain is found predominantly in Alphaproteobacteria, particularly within Hyphomicrobiales including the Rhizobiaceae. While BioS is involved in biotin transport regulation, the specific function of this helical-like domain remains to be determined. BioS may be part of a system that S. meliloti uses to respond to plant alfalfa biotin signals and is a possible LysR-type regulator. The protein is 217 amino acids in length and contains a disordered N-terminal region.
