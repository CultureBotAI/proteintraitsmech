identifier: Pfam:PF03714
label: Bacterial pullanase-associated domain
definition: >-
  This entry repreesents the family 41 carbohydrate-binding module from pullulanase-like enzymes. Pullulanases are a group of starch-debranching enzymes, catalyzing the hydrolysis of the alpha-1,6-glucosidic linkages of alpha-glucans, preferentially pullulan. Pullulan is a polysaccharide in which alpha-1,4 linked maltotriosyl units are combined via an alpha-1,6 linkage. These enzymes are of importance in the starch industry, where they are used to hydrolyze amylopectin starch. Pullulanases consist of multiple distinct domains, including a catalytic domain belonging to the glycoside hydrolase (GH) family 13 and carbohydrate-binding modules (CBM), including CBM41. CBM41 domains themselves are known to have glycogen/starch binding functions.
