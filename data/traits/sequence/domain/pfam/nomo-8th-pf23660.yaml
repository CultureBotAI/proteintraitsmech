identifier: Pfam:PF23660
label: NOMO eighth prealbumin-like domain
definition: >-
  This domain is found in the NOMO family of proteins. This entry represents the eighth domain that is predicted to fold into a β-sandwich with prealbumin-like topology. NOMO family of proteins includes NOMO1, NOMO2, NOMO3. These proteins are components of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. They play an important role in the protein topogenesis and cells lacking these components show reduced multipass protein stability. NOMO proteins are multidomain proteins.
