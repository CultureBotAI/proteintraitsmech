identifier: Pfam:PF02482
label: Sigma 54 modulation protein / S30EA ribosomal protein
definition: >-
  This family consists of ribosome hibernation promoting factor (RHF). RHF promotes and stabilizes dimerization of 70S ribosomes by the ribosome modulation factor (RMF), leading to the formation of inactive 100S ribosomes during the stationary phase.
