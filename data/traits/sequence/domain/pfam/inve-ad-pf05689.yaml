identifier: Pfam:PF05689
label: Adhesion domain
definition: >-
  This entry represents the Adhesion domain found in InvasinE (InvE) from Yersinia pseudotuberculosis ( ). Invasins are members of the inverse autotransporter (IAT) family also referred to as type Ve secretion system. In general, they consist of an N-terminal β-barrel-like domain, which is responsible for attachment of invasin to the outer membrane region of bacteria, repetitive Immunoglobulin-like (Ig) domains, which vary significantly in number among all the invasins, and the C-terminal domain/adhesion domain (AD), which provides invasins with the specificity to bind to its host target molecules. This domain adopts a C-type lectin-like domain (CTLD) fold with unique modifications. Its core structure is made up of a globular α/β fold and can be divided into three sub-sections: a lasso-shaped loop structure termed the "adaptor ring" since it forms a ring-shaped platform that connects BIg21 ( ) with the two other sub-sections in the domain; the "C-type lectin-like domain" and the "wedge module". AD lacks the ability to coordinate Ca2+, and motifs such as EPN, QPD, and WND that are responsible for the specificity of carbohydrate recognition are also absent, giving rise to the notion that the it is not a carbohydrate binding domain. This domain is also found repeated in sequences from Enterobacterales such as Salmonella typhimurium and Escherichia coli. These repeats are almost always found with and are associated with RatA and RatB, the coding sequences of which are found in the pathogeneicity island of Salmonella. The sequences may be determinants of pathogenicity.
