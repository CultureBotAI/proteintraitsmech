identifier: Pfam:PF29370
label: B0252.5 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of uncharacterised protein B0252.5 and related proteins found in nematodes. The domain contains a predicted disordered region with compositional bias enriched in basic and acidic residues. These proteins also contain a C-terminal domain ( ). The function of this N-terminal domain remains to be determined.
