identifier: Pfam:PF30659
label: Chloroflexota. gingipain-like propeptide domain
definition: >-
  This entry represents a putative propeptide region of approximately 130-150 residues found N-terminal to gingipain-like cysteine peptidase domains ( ) in Chloroflexota. The region shows structural similarity to known gingipain propeptides ( ). Propeptides in cysteine proteases typically function to maintain enzyme latency and direct proper folding, and are cleaved during maturation. This entry is restricted to Chloroflexota bacteria.
