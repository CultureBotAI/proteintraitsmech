identifier: Pfam:PF25272
label: Vitelline envelope sperm lysin receptor, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of VERL and related proteins, which is related to the zona pellucida domain in animals ( ). Members of this group are mainly found in invertebrates. VERL (Vitelline envelope sperm lysin receptor) is a giant unbranched glycoprotein comprising 30% of the vitelline envelope. It functions as a species-specific receptor for the sperm protein lysin; prevents fertilisation by sperm from other species.
