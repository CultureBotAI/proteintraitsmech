identifier: Pfam:PF25489
label: At5g54830-like domain
definition: >-
  This domain is found in At5g54830 from Arabidopsis thaliana and similar plant proteins such as Cytochrome b561, DM13 and DOMON domain-containing proteins. It is predicted to adopt an all-β configuration. The function of this domain has not been characterised yet. This domain is also found in Protein Skeletor isoforms B/C from Drosophila melanogaster. At5g54830 may act as a catecholamine-responsive trans-membrane electron transporter. It is formed by DM13 domain at the N-terminal ( ), followed by DOMON domain ( ), an uncharacterised domain ( ) and Cytochrome B561 ( ) at the C-terminal.
