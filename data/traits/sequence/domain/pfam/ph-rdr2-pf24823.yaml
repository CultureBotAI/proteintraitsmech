identifier: Pfam:PF24823
label: RDR2 PH-like domain
definition: >-
  This domain is found in RNA-dependent RNA polymerase 1/2 (RDR1/2) from Arabidopsis thaliana and related plant proteins. It adopts a β-barrel structure with significant similarity to known PH domains. RDR1/2 are involved in the production of small interfering RNAs (siRNAs). RDR1 is involved in antiviral silencing, amplifying silencing signals during viral infections. RDR2 binds to single-stranded RNA (ssRNA), engages ssRNAs longer than 7 nucleotides and initiates internal to their 3' ends. RDR2 is non-functional in the absence of associated Pol IV.
