identifier: Pfam:PF30209
label: GRA6 helical domain
definition: >-
  This entry represents a helical domain found in GRA6 and related proteins involved in gramillins biosynthesis. The domain is found in Fusarium species and related fungi. GRA6 is part of a gene cluster that mediates the biosynthesis of gramillins A and B, bicyclic lipopeptides that induce cell death in maize leaves but not in wheat leaves. The specific function of this helical domain within the gramillins biosynthetic pathway remains to be determined.
