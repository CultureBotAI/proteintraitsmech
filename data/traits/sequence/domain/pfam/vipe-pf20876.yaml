identifier: Pfam:PF20876
label: Effector protein VipE
definition: >-
  Legionella pneumophila use the Icm/Dot type IVB secretion system to deliver into the host cell effectors that inhibit phagosome maturation and modulate host vesicle trafficking pathways. VipE ( ) is one of those effectors. This entry represents the N-terminal domain of VipE that adopts an α-helical fold ( ). This domain is also found in similar sequences from gammaproteobacteria.
