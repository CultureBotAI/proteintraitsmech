identifier: Pfam:PF18322
label: Serine protease Clip domain PPAF-2
definition: >-
  This domain is found in Prophenoloxidase-activating factor (PPAF)-II present in the beetle Holotrichia diomphalia. PPAF-II is indispensable for the generation of the active phenoloxidase leading to melanization, a major defense mechanism of insects. This domain is the clip domain and it is thought to tightly associate with regions I-III of the serine protease-like (SPL) domain. The clip domain is a protein-interaction module that plays an essential role in the binding and activation of PO76s via its central cleft. This domain is also found in clip-domain serine protease homologues (cSPHs), including A3 from Aedes aegypti and CLA8/30 from Anopheles gambiae, the vector of malaria parasites. These proteins are non-catalytic, but critical for the activation of prophenoloxidase (PPO) in the melanization response, playing an essential role in the innate immune response against bacteria, fungi and protozoa infection.
