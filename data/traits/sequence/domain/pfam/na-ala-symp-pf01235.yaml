identifier: Pfam:PF01235
label: Sodium:alanine symporter family
definition: >-
  Sodium symporters can be divided by sequence and functional similarity into various groups. One such group is the sodium/alanine symporter family, the members of which transport alanine in association with sodium ions. These transporters have between 10-14 transmembrane (TM) helices, characterised by a five or seven transmembrane helix inverted-topology repeat motif, forming a channel or pore through the cytoplasmic membrane, the interior face being hydrophilic to allow the passage of alanine molecules and sodium ions. This family is restricted to the bacteria and archaea, examples are the alanine carrier protein from the Bacillus PS3 (Thermophilic bacterium PS-3); the sodium/alanine symporter AgcS from Methanococcus maripaludis, the D-alanine/glycine permease from Pseudoalteromonas haloplanktis (Alteromonas haloplanktis); and the hypothetical protein yaaJ from Escherichia coli.
