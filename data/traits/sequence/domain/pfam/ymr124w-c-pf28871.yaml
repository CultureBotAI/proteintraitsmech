identifier: Pfam:PF28871
label: YMR124W C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in YMR124W and related fungal proteins such as YLR031W. The domain is approximately 100 amino acids in length and comprises the entire C-terminal region of these uncharacterised proteins. YMR124W from Saccharomyces cerevisiae localises to the cellular bud neck and cytoplasm, and is involved in endoplasmic reticulum polarisation. The protein shows multiple phosphorylation sites and has been found to interact with several other proteins including PEA2, SCS2, and SHS1. The domain is conserved across various fungal species including Ascomycota, suggesting an important cellular function. The specific function of this C-terminal domain remains to be determined.
