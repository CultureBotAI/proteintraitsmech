identifier: Pfam:PF29654
label: YonV middle domain
definition: >-
  This entry represents a middle domain of approximately 67 amino acids found in SPbeta prophage-derived proteins from Bacillota, including YonV from Bacillus subtilis. The domain is located between an N-terminal domain and a C-terminal YonV_C domain ( ). The function of this domain remains to be determined.
