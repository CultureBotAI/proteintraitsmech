identifier: Pfam:PF27016
label: TRPM8, N-terminal domain
definition: >-
  This entry represents the N-terminal in TRPM8 channel-associated factor (TCAF). This domain adopts a Glutamine amidotransferase-like fold. TCAF is involved in the regulation of the TRPM8 cation channel activity. These proteins either positively or negatively regulate TRPM8, influencing its recruitment to the cell surface. TCAF1 proteins are known to positively regulate TRPM8 activity and inhibit prostate cancer cell migration in a TRPM8-dependent manner. Conversely, TCAF2 proteins negatively regulate TRPM8 activity and promote prostate cancer cell migration. Both TCAF1 and TCAF2 interact with TRPM8 via their N-terminal and C-terminal domains, and also interact with TRPV6. TCAF3 proteins may play a role in the regulation of TRPM8 activity, although their specific function is less well characterised.
