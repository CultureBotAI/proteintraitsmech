label: YafT bacterial lipoprotein
definition: >-
  This entry represents the uncharacterised lipoprotein YafT from Escherichia coli and similar bacterial sequences. The proteins in this family are anchored to the cell membrane via lipid modification of an N-terminal cysteine residue.
