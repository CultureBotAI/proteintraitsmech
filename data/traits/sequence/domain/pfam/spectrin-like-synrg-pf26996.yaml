identifier: Pfam:PF26996
label: SYNRG, Spectrin-like domain
definition: >-
  This entry represents a Spectrin-like domain in synergin gamma proteins. This domain is usually found associated with . It is not present in C. elegans orthologues. Synergin gamma proteins are involved in endocytosis and membrane trafficking at the trans-Golgi network (TGN). They function by linking the adapter protein complex AP-1 to other proteins and is a component of clathrin-coated vesicles. It is part of the aftiphilin/p200/gamma-synergin complex, which plays a crucial role in AP1G1/AP-1-mediated protein trafficking. This includes the trafficking of transferrin from early to recycling endosomes and the membrane trafficking of furin and the lysosomal enzyme cathepsin D between the TGN and endosomes. These proteins self-associate and interact with various other proteins, including GGA1, GGA2, GGA3, and components of the adapter protein complex AP-1, facilitating their role in cellular trafficking processes.
