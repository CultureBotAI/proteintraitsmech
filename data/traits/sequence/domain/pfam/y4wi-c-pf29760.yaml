identifier: Pfam:PF29760
label: Protein y4wI C-terminal domain
definition: >-
  This entry represents the C-terminal domain of protein y4wI, found in bacteria. The full-length protein is annotated as a radical SAM family RIPP maturase ( , ), involved in post-translational modification of ribosomally synthesised and post-translationally modified peptides. The specific function of this domain remains to be determined.
