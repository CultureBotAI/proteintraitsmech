identifier: Pfam:PF27678
label: BIG1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of BIG1 proteins found in Saccharomycetales. BIG1 proteins are endoplasmic reticulum membrane proteins required for normal beta-1,6-glucan synthesis in the cell wall. Members of this group are single-pass type I membrane proteins with a large N-terminal lumenal domain, a single transmembrane helix, and a short C-terminal cytoplasmic domain. The function of this domain is unknown.
