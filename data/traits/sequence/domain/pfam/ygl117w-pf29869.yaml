identifier: Pfam:PF29869
label: YGL117W
definition: >-
  This entry represents uncharacterised proteins from fungi, including YGL117W from Saccharomyces cerevisiae. The protein is present at low levels in cells and is subject to phosphorylation at serine 223. The protein has been detected in stress granules. The function of this family remains to be determined.
