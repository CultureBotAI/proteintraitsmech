identifier: Pfam:PF20915
label: Viral genome-linked protein
definition: >-
  This entry represents the viral genome-linked protein (VPg) from Caliciviruses, such as Feline calicivirus (FCV). VPg plays a key role in translation initiation from genomic and subgenomic RNAs and is thought to function as a cap substitute for ribosomal recruitment. It interacts with the initiation factor eIF4E. This protein shows a compact helical structure flanked by flexible N- and C-terminal ends.
