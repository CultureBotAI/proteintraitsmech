identifier: Pfam:PF22877
label: Thc1, RRM domain
definition: >-
  The founder of this entry is a domain found in Thc1 protein from Schizosaccharomyces pombe. This protein is a subunit of sno(s)RNA-containing ribonucleoprotein complex and is involved in snRNA processing. This domain is predicted to adopt a typical RRM fold with a significant similarity to Poly (A)-specific ribonuclease PARN. Besides the global structural similarity, the residues involved in RNA-binding in PARN, are conserved within this entry. These residues define a semi-conserved IWx(2)DTx(5)F sequence motif.
