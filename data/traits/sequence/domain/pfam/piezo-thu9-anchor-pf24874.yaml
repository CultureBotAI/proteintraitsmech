identifier: Pfam:PF24874
label: Piezo, THU9 and anchor domain
definition: >-
  This entry represents a TM segment comprising TM33-36 (THU9) and the anchor domain of Piezo proteins, found towards the C-terminal before the cap domain. Members of this entry are found in animals and plants. Piezo is a family of proteins that form mechanosensitive non-specific cation channels whose conductance is higher for Li+, intermediate for Na+ and lowest for Li+. Divalent ions except for Mn2+ permeate the channel but more slowly than monovalent ions and can reduce K+ currents. Members play key roles in cell adhesion, blood vessel formation and vascular structure in both development and adult physiology. These channels have a homotrimeric three-blade propeller-shaped structure that use a cap-motion and plug-and-latch mechanism to gate their ion-conducting pathways. Each protomer consists of 38 TM helices (referred to THUs) that form unusual non-planar blades, and an extracellular cap-like structure ( ).
