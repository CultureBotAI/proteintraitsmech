label: Lysozyme-like protein 1
definition: >-
  This family is found in Lysozyme-like protein 1 from Caenorhabditis elegans (Lys-1) and related sequences. Lys-1 is involved in resistance to the Gram-negative bacterium S.marcescens and to the Gram-positive S.aureus infection. This family shows similarity with .
