identifier: Pfam:PF29098
label: Suppressor of sable C-terminal domain
definition: >-
  This entry represents the C-terminal domain of suppressor of sable [Su(s)] proteins. Su(s) proteins are RNA-binding proteins that suppress transcription of some RNAs and promote transcription termination of aberrant RNAs. The proteins function together with Wdr82 as part of a transcription termination checkpoint that promotes transcription termination and subsequent RNA degradation by the nuclear exosome. This C-terminal domain is found in arthropods and follows the CCCH zinc finger domain. The specific function of this domain remains to be determined.
