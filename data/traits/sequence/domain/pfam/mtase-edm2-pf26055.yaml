identifier: Pfam:PF26055
label: EDM2 methyltransferase-like domain
definition: >-
  This domain is found in the Protein ENHANCED DOWNY MILDEW 2 (EDM2) and related plant proteins. EDM2 is a nuclear protein in Arabidopsis thaliana with roles in immunity, epigenetic regulation, and development. It is a cellular antisilencing factor and regulator of genome DNA methylation patterns involved in the regulation of chromatin states. It is also an epigenetic reader that binds DNA and contributes to transcriptional transposable element silencing by modulating levels of the repressive post-translational histone modifications H3K9me2. The domain represented by this entry has a detectable sequence similarity to known methyltransferases and is predicted to adopt a similar structure.
