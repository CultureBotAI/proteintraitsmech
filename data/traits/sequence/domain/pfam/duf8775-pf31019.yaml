identifier: Pfam:PF31019
label: Domain of unknown function (DUF8775)
definition: >-
  This entry represents a domain of approximately 70 residues found almost exclusively in spiders (Araneae), particularly in the families Araneidae and Nephilidae. The domain is found in one to three copies per protein. Some family members occur in proteins that also contain a GEMIN2/SIP1 domain ( ). The function of this domain remains to be determined.
