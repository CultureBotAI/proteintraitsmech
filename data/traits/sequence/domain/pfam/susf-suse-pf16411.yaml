identifier: Pfam:PF16411
label: SusF/SusE starch specific CBMs
definition: >-
  This entry represents a CBM domain found twice in the Outer membrane protein SusE and SusF from Bacteroides thetaiotaomicron and similar sequences from bacteroidetes. These are starch specific CBMs that fold into a β-sandwich. SusF contains three CBMs. This entry represents the second and third domains of SusF. SusE and SusF are two outer membrane proteins composed of tandem starch specific carbohydrate-binding modules (CBMs) with no enzymatic activity. They are are likely to play an important role in starch metabolism in Bacteroides. It has been speculated that they could compete for starch in the human intestinal tract by sequestering starch at the bacterial surface and away from competitors. SusE has higher affinity for starch compared to SusF. SusF is a multidomain protein and contains three starch specific carbohydrate binding modules (CBMs). Each of this CBMs differ in the way it binds starch. Each binding site has a unique starch preference that probably enable these proteins to interact with different regions of starch or its breakdown products. This CBMs are represented by and which are common to SusE as well. The SusF N-terminal is represented by .
