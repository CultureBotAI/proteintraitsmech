identifier: Pfam:PF04074
label: YhcH/YjgK/YiaL
definition: >-
  This protein family consists of bacterial proteins. N-acetylneuraminate anomerase NanQ (NanQ, previously known as YhcH) plays a role in sialic acid catabolism by opening both the alpha- and beta-forms of N-acetylneuraminate (sialic acid; Neu5Ac) to provide aceneuramate, the preferred substrate for the sialic acid aldolase (NanA). TabA (YjgK), also included in this entry, influences biofilm formation by toxin-antitoxin systems.
