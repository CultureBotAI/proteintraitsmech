identifier: Pfam:PF30480
label: Secreted LysM effector N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in a group of secreted LysM effector proteins from filamentous fungi, including Penicillium expansum LysM4. The domain is found upstream of one or more LysM domains ( ). LysM4 is highly expressed during infection and development of decay in apple fruit, and may function in sequestration of chitin oligosaccharides to dampen host defence responses. The N-terminal region contains multiple predicted N-linked glycosylation sites and conserved cysteine residues. The specific function of this domain remains to be determined.
