identifier: Pfam:PF00964
label: Elicitin
definition: >-
  Elicitins are small, highly-conserved proteins secreted by phytopathogenic fungi belonging to the phytophthora species. They are toxic proteins reponsible for inducing a necrotic and systemic hypersensitive response in plants from the solanaceae and cruciferae families. Leaf necrosis provides immediate control of fungal invasion and induces systemic acquired resistance; both responses mediate basic protection against subsequent pathogen inoculation. Members of this family share a high level of sequence similarity, but they differ in net charge, dividing them into two classes: alpha and beta. Alpha-elicitins are highly acidic, with a valine residue at position 13, whereas beta-elicitins are basic, with a lysine at the same position. Residue 13 is known to be involved in the control of necrosis and, being exposed, is thought to be involved in ligand/receptor binding. Phenotypically, the two classes can be distinguished by their necrotic properties: beta-elicitins are 100-fold more toxic and provide better subsequent protection.
