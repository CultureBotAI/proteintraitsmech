identifier: Pfam:PF09685
label: Magnetosome magnetite crystal formation protein family
definition: >-
  This entry, previously known as DUF4870, represents the magnetosome MamF/MmsF protein family found in magnetotactic bacteria. These membrane proteins are involved in magnetite crystal formation within magnetosome organelles. They are not essential for biomineralization, but play a major role in controlling the size and shape of magnetite crystals. Loss of these proteins results in crystals that are approximately 75% of wild-type size with altered morphology. They are multi-pass membrane proteins associated with the magnetosome membrane and exhibit cumulative, partially redundant functions in regulating crystal growth. This family includes proteins from organisms that are not known to contain magnetosomes suggesting that this family of proteins have a broader function.
