identifier: Pfam:PF21006
label: Nitrile hydratase beta subunit, N-terminal
definition: >-
  Nitrile hydratases (NHases) ( ) are unusual metalloenzymes that catalyse the hydration of nitriles to their corresponding amides. They are used as biocatalysts in acrylamide production, one of the few commercial scale bioprocesses, as well as in environmental remediation for the removal of nitriles from waste streams. Nitrile hydratases are composed of two subunits, alpha and beta, and they contain one iron atom per alpha-beta unit. Beta subunit consists of an N-terminal helical domain, represented in this entry, and an SH3-like domain ( ). Thiocyanate hydrolase (SCNase) is a member of the NHase family and comprises alpha, beta and gamma subunits, which share amino acid sequence similarities with NHase beta subunit C-terminal, beta subunit N-terminal and NHase alpha subunit, respectively.
