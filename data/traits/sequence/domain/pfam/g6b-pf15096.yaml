identifier: Pfam:PF15096
label: G6b-B extracellular V-set Ig-like domain
definition: >-
  This entry represents the N-terminal extracellular HS binding domain. G6b-B is a unique platelet ITIM-containing receptor that is highly expressed in mature megakaryocytes and platelets. It inhibits platelet aggregation and activation by agonists such as ADP and collagen-related peptide. It appears to operate in a calcium-independent manner. It is a type I transmembrane protein that consists of a single N-glycosylated immunoglobulin-variable (IgV)-like domain in its extracellular region, a single transmembrane domain and a cytoplasmic tail containing an ITIM and an immunoreceptor tyrosine-based switch motif (ITSM). The human G6B gene encodes a number of splice forms that are translated into both cell-surface and secreted isoforms. Cell-surface isoforms G6B-A and G6B-B have the same extracellular N-terminal Ig-like domain but differ in their C-terminal cytoplasmic tails. The extracellular matrix heparan sulfate (HS) proteoglycan perlecan was identified as a G6b-B binding partner. Subsequent in vitro biochemical studies and a cell-based genetic screen demonstrated that the interaction is specifically mediated by the HS chains of perlecan.
