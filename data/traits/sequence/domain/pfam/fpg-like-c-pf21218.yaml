identifier: Pfam:PF21218
label: Formamidopyrimidine-DNA glycosylase-like, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Formamidopyrimidine-DNA glycosylase-like from Arabidopsis thaliana (Fpg1) (SwissProt: ) and similar proteins from plants. Fpg is involved in base excision repair of DNA damaged by oxidation or by mutagenic agents. It catalyses the hydrolysis of the N-glycosylic bond between the damaged base and the deoxyribose (glycosylase activity) before cleaving the DNA backbone (lyase activity). This domain, which shows four α-helices, two of them forming the helix-two-turn-helix (H2TH) motif, and two antiparallel β-strands involved in a structural motif mimicking an antiparallel β-hairpin zinc finger.
