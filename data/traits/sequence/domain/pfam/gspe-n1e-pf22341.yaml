identifier: Pfam:PF22341
label: GSPII protein E, N1E domain
definition: >-
  Type II secretion system protein E (GSPE) is an ATPase component of the type II secretion system required for the energy-dependent secretion of extracellular factors such as proteases and toxins from the periplasm. This entry represents its N-terminal N1E domain, which associates with the cytoplasmic domain of the inner membrane protein GspL.
