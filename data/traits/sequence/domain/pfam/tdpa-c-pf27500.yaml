identifier: Pfam:PF27500
label: TdpA C-terminal domain
definition: >-
  This entry represents the C-terminal domain of TdpA proteins. TdpA is a 53 kDa membrane antigen found in Treponema denticola that is localised to the cell membrane as a lipoprotein. The specific function of this domain remains to be determined. This domain can be found in other positions in uncharacterised bacterial proteins.
