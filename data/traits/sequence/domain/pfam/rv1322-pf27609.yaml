identifier: Pfam:PF27609
label: Rv1322 family protein
definition: >-
  This entry represents a domain found in uncharacterised proteins exclusively in Mycobacterium tuberculosis complex species, including M. tuberculosis and M. bovis. The domain comprises the entire length of these 98 amino acid proteins, which are designated as Rv1322 in M. tuberculosis H37Rv and Mb1356 in M. bovis. The N-terminal region (residues 1-21) is predicted to be disordered with a basic residue bias in the first 10 amino acids. The protein has been detected in proteomics studies of M. tuberculosis. The function of this domain remains to be determined.
