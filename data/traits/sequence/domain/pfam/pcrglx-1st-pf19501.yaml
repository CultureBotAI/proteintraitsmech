identifier: Pfam:PF19501
label: PcRGLX-like N-terminal RIFT barrel domain
definition: >-
  This entry includes Exo-rhamnogalacturonan lyase from Penicillium chrysogenum 31B (PcRGLX) and YetA from B. subtilis. YetA is functionally uncharacterised. This entry represents the N-terminal RIFT barrel like domain. Members of this entry share a 3 domain architecture.
