identifier: Pfam:PF25382
label: Ceramide kinase PH domain
definition: >-
  This entry represents the PH domain found at the N-terminal of ceramide kinases in animals. The presence of this domain in ceramide kinases suggests a role in membrane localisation where their lipid substrates are found. The Ceramide kinase proteins are responsible for the phosphorylation of ceramide to produce ceramide 1-phosphate. This enzymatic activity is specific to ceramides, including both natural and analogue forms such as C6, C8, C16 ceramides, and C8-dihydroceramide. The proteins exhibit a preference for the D-erythro isomer of ceramides and show reduced activity on C2-ceramide and C6-dihydroceramide. Notably, they do not act on other lipid types, such as various sphingosines. Additionally, members of this group have the ability to bind phosphoinositides, which may play a role in their function or regulation. Ceramide is a critical sphingolipid metabolite that induces programmed cell death (PCD), while ceramide-1-phosphate has a PCD suppressive effect. Thus, ceramide phosphorylation plays a role in the modulation of PCD, and the CERK activity is crucial for the maintenance of cell viability.
