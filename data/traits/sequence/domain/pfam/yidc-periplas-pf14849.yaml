identifier: Pfam:PF14849
label: YidC periplasmic domain
definition: >-
  YidC is required for the insertion and assembly of the bacterial inner (or only) membrane. This entry represents the N-terminal domain of YidC from Gram-negative bacteria, which includes a large periplasmic domain lacking in YidC members from Gram-positive species. The structure of the periplasmic domain has been solved.
