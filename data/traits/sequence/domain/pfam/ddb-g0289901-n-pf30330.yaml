identifier: Pfam:PF30330
label: DDB_G0289901 N-terminal domain
definition: >-
  This entry represents the N-terminal extracellular domain of uncharacterised transmembrane proteins found in Dictyostelia (social amoebae). The full-length proteins are predicted type I membrane proteins with a signal peptide, this N-terminal domain, a large disordered glycine-rich region, and a C-terminal transmembrane helix. The function of this domain remains to be determined.
