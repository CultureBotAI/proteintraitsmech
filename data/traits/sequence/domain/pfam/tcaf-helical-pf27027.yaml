identifier: Pfam:PF27027
label: TCAF all helical domain
definition: >-
  This entry represents an α-helical domain in TCAF proteins. This domain is found in the middle region, between and . TCAF proteins are involved in the regulation of the TRPM8 cation channel activity. These proteins are either positively or negatively regulate TRPM8, influencing its recruitment to the cell surface. This regulation plays a role in prostate cancer cell migration, with some family members promoting stimulation and others inhibition, all in a TRPM8-dependent manner. These proteins interact with TRPM8 through their N-terminal and C-terminal domains, affecting the channel's activity. Additionally, interactions with TRPV6 have been noted. The C-terminal region of some members is crucial for stimulating channel activity.
