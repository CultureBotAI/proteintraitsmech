identifier: Pfam:PF03458
label: Glycine transporter
definition: >-
  This domain contains three transmembrane helices. Proteins containing this domain are important for glycine utilisation, being identified as glycine transporters. Some proteins containing this domain are also important for alanine utilisation. In these proteins this domain is found in pairs. An archaeal protein which contains this domain is a TRIC-type potassium channel.
