identifier: Pfam:PF26469
label: Domain of unknown function (DUF8144)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in Halobacteria. These proteins are found predominantly in archaea, particularly within the Halobacteriales order. The domain is typically around 65 amino acids in length. Proteins containing this domain are predicted to be membrane-associated, as suggested by the presence of two transmembrane helices.
