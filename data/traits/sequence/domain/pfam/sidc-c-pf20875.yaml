identifier: Pfam:PF20875
label: SidC, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of SidC, which shows an α-helical fold. Its function is unknown SidC is one of the effectors delivered by Legionella pneumophila into the host cell. Like its paralogue SdcA, SidC anchors on the Legionella-containing vacuole (LCV) to facilitate the recruitment of endoplasmic reticulum (ER) proteins. This protein is organised into four domains that are packed into an arch-like shape: the N- terminal SNL domain ( ), the INS domain (which is inserted within the SNL domain), the P4C domain, and a C-terminal domain.
