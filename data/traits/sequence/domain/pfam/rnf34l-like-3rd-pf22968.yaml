identifier: Pfam:PF22968
label: E3 ubiquitin-protein ligase rififylin-like domain
definition: >-
  This entry represents a domain found in human E3 ubiquitin-protein ligase rififylin (RNF34L), RFFL and similar eukaryotic proteins. This domain is predicted to adopt an helix-extended loop-helix (HeH) structure. RNF34 and RFFL are of E3 ubiquitin-protein ligases that play a crucial role in various biological processes by mediating the ubiquitin-mediated proteasomal degradation of target proteins. They are involved in the regulation of apoptosis by ubiquitinating and promoting the degradation of caspases CASP8 and CASP10. They also participate in the regulation of the tumour necrosis factor-mediated signalling pathway, mainly through the 'Lys-48'-linked polyubiquitination and degradation of RIPK1. Additionally, they have a role in the negative regulation of p53/TP53, either directly through ubiquitination or indirectly via the degradation of SFN. RNF34 is implicated in metabolic regulation by targeting PPARGC1A for degradation, influencing brown fat cell metabolism, and is thought to be involved in innate immunity by the ubiquitination of NOD1. Additionally, RFFL is thought to be involved in endocytic recycling.
