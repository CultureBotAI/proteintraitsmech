identifier: Pfam:PF21595
label: CCL2 lectin-like
definition: >-
  This entry includes CCL2 lectin from Coprinopsis cinerea and similar sequences from fungi. CCL2 is a fruiting body lectin that binds to Fuc-alpha-1,3-modified core N-glycans, which are characteristic for invertebrates but absent from fungi. This protein adopts a β-trefoil fold consisting of three β-β-β-β repeats.
