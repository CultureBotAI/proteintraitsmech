identifier: Pfam:PF21376
label: Torsin-1A, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Torsin-1A from humans (TOR1A), an AAA ATPase that resides in the endoplasmic reticulum and the contiguous perinuclear space primarily in nerve cells. TOR1A needs the AAA-like proteins Lamina-associated protein 1 (LAP1) or Luminal domain like LAP1 (LULL1) to catalyse ATP hydrolysis. A single amino acid deletion in the domain represented in this entry is known to be at the root of primary dystonia, probably by weakening these interactions. This small domain forms a three-helical bundle.
