identifier: Pfam:PF04495
label: 'GRASP55/65 PDZ-like domain '
definition: >-
  The Golgi apparatus is a highly dynamic organelle responsible for sorting out proteins and other biomolecules to the cell surface and to the extracellular milieu. The Golgi apparatus is comprised of flattened membrane-bound compartments called cisternae, which are apposed to one another to form a Golgi stack. The structural organization of the cisternae into stacks and their lateral connection, building the Golgi ribbon, requires a family of proteins called Golgi ReAssembly and Stacking Proteins (GRASP). Two homologues (GRASP55 and GRASP65) have been described in vertebrates and their functions have been associated to Golgi phosphorylation-regulated assembly/disassembly, protein secretion , Golgi remodeling in migrating cells, among others. There is only one gene for GRASP in lower eukaryotes. Essentially all GRASPs contain a conserved N-terminal GRASP region, which comprises two tandem PDZ domains (PDZ1 and PDZ2), a classical protein-peptide interaction domain, and is responsible for GRASP homo-oligomerization and for the attachment to the Golgi membrane. The C-terminal half which is not conserved between species but is rich in proline and serines residues, as well as glutamine and asparagine residues.
