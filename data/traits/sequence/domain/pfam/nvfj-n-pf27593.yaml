identifier: Pfam:PF27593
label: Meroterpenoid methyltransferase N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the S-adenosyl-L-methionine- dependent methyltransferase nvfJ from Aspergillus novofumigatus, which mediates novofumigatonin biosynthesis, TstE for phomoidride biosynthesis, AusD for austinoid biosynthesis, Trt5 for terretonin biosynthesis and similar proteins found in fungi. Many members of this group are involved in meroterpenoid biosynthesis. They catalyse the methylation of carboxyl groups in meroterpenoid biosynthetic intermediates, typically converting carboxylic acids to their corresponding methyl esters. These methylation reactions are essential steps in the biosynthetic pathways leading to bioactive compounds such as novofumigatonin, phomoidrides, austinoids, and terretonin. The specific function of this domain remains to be determined.
