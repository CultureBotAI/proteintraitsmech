identifier: Pfam:PF21141
label: Trehalose-6-phosphate phosphatase, C-terminal
definition: >-
  This entry represents the catalytic C-terminal domain of trehalose-6-phosphate phosphatase (TPP) from nematodes such as Caenorhabditis elegans and Brugia malayi. TPP catalyses the hydrolysis of trehalose 6-phosphate to trehalose and phosphate, preventing the accumulation of toxic levels of trehalose 6-phosphate. This domain adopts a C2B-type HAD phosphatase fold ( ). In C. elegans, TPP is essential for survival due to the toxic effect(s) of the accumulation of trehalose 6-phosphate. This domain is also found in a number of bacterial TPPs.
