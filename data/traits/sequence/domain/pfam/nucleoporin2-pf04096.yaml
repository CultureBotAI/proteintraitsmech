identifier: Pfam:PF04096
label: Nup98-96 autopeptidase S59
definition: >-
  Nuclear pore complexes (NPCs) facilitate all nucleocytoplasmic transport in eukaryotic cells, playing essential roles in cellular homeostasis. The NPC is a modular structure composed of multiple copies of ~30 proteins (nucleoporins, Nups) arranged into distinct subcomplexes. A number of these peptides are synthesised as precursors and undergo self-catalysed cleavage. The largest NPC sub-complex is the heptameric Y-shaped mammalian Nup107-Nup160 complex (called Nup84 complex in budding yeast), an essential scaffolding component of the NPC. Nup98 and Nup96 are encoded by the same gene that produces a 190 kDa polyprotein with autoproteolytic activity which generates the N-terminal NUP98 and C-terminal NUP96 proteins, part of the Nup107-Nup160 subcomplex. The yeast homologue Nup145 undergoes the similar proteolytic event to produce Nup145N and Nup145C, which are part of the Nup84 complex. The function of the heptamer is to coat the curvature of the nuclear pore complex between the inner and outer nuclear membranes. Nup96, which is predicted to be an α helical solenoid, complexes with Sec13 in the middle of the heptamer. The interaction between Nup96 and Sec13 is the point of curvature in the heptameric complex. The proteolytic cleavage site of yeast Nup145p has been mapped upstream of an evolutionary conserved serine residue. Then, Nup145C form the heptameric Y-complex together with six other proteins while Nup145N shuttle between the NPC and the nuclear interior.. Nup98, a component of the nuclear pore that plays its primary role in the export of RNAs, is expressed in two forms, derived from alternate mRNA splicing. Both forms are processed into two peptides through autoproteolysis mediated by the C-terminal domain of hNup98. The three-dimensional structure of the C-termi…
