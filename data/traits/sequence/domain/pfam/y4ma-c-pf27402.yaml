identifier: Pfam:PF27402
label: Y4mA C-terminal domain
definition: >-
  This entry represents the C-terminal domain of y4mA proteins. The domain adopts an SH3-like fold structure and is found in bacteria, predominantly in Alphaproteobacteria with representatives in Hyphomicrobiales and Rhodobacterales orders. The function of this domain remains to be determined.
