identifier: Pfam:PF06875
label: Plethodontid receptivity factor PRF
definition: >-
  This family includes plethodontid receptivity factor (PRF) proteins which seem to be specific to Plethodon jordani (Jordan's salamander). PRF is a courtship pheromone produced by males increase female receptivity. This family also includes cardiotrophin-2 (neuropoietin) and cardiotrophin-like cytokine factor 1 (CLCF1) from mammals, which share sequence similarity to PRF. They are four-helix bundle cytokines that signal through the gp130 receptor subunit.
