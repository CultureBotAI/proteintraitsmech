identifier: Pfam:PF22408
label: PsV, capsid protein, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of the putative capsid protein from Penicillium stoloniferum virus F (CP, ). This protein has a disordered N-terminal end that interacts with the dsRNA genome and probably participates in its packaging or transcription, and a C-terminal domain (this entry) that shows a helix-loop-helix motif involved in the formation flexible channels thought to be involved in RNA synthesis activity.
