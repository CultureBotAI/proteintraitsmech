identifier: Pfam:PF28990
label: MAD2 adhesin N-terminal domain
definition: >-
  This entry represents the N-terminal domain of MAD2 adhesin proteins found in plant pathogenic fungi. MAD2 is a cell surface adhesion protein that enables adherence to plant root surfaces for colonisation. The complete protein contains tandem repeats that may provide structural rigidity to present this N-terminal adhesive domain at the cell surface. The specific function of this domain remains to be determined.
