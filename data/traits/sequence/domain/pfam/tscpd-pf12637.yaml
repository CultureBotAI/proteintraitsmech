identifier: Pfam:PF12637
label: TSCPD domain
definition: >-
  The domain is found in isolation in many proteins where it has a conserved C-terminal motif TSCPD, after which the domain is named. Most copies of the domain possess 4 conserved cysteines that may be part of an Iron-sulphur cluster. This domain is found at the C-terminal of some ribonucleoside-diphosphate reductase enzymes.
