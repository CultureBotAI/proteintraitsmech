identifier: Pfam:PF27316
label: YonG C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YonG proteins found in bacteria and viruses. YonG proteins are derived from prophage elements such as SPbeta in Bacillus subtilis. Members of this domain are also found in Spbetavirus. The specific function of this C-terminal domain remains to be determined.
