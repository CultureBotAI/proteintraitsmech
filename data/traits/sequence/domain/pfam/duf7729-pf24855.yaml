identifier: Pfam:PF24855
label: Domain of unknown function (DUF7729)
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to adopt a globular structure consisting of array of α-helices. It contains several conserved cysteine residues that are predicted to form disulfide bonds. It is likely that the proteins containing this domain are secreted.
