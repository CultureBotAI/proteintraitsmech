identifier: Pfam:PF18582
label: Hydrazine synthase alpha subunit middle domain
definition: >-
  This entry represents the middle domain of subunit alpha of hydrazine synthase (HZS). The crystal structure of hydrazine synthase multiprotein complex isolated from the anammox organism Kuenenia stuttgartiensis implies a two-step mechanism for hydrazine synthesis: a three-electron reduction of nitric oxide to hydroxylamine at the active site of the gamma-subunit and its subsequent condensation with ammonia, yielding hydrazine in the active centre of the alpha-subunit. The alpha-subunit consists of three domains: an N-terminal domain which includes a six-bladed β-propeller, a middle domain binding a pentacoordinated c-type haem (haem alphaI) and a C-terminal domain which harbours a bis-histidine-coordinated c-type haem (haem alphaII).
