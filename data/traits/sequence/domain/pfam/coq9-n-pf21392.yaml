identifier: Pfam:PF21392
label: Ubiquinone biosynthesis protein COQ9, N-terminal domain
definition: >-
  This domain is found towards the N-terminal of ubiquinone biosynthesis protein COQ9 from humans and similar proteins predominantly from vertebrates. COQ9 is a lipid-binding protein involved in the biosynthesis of coenzyme Q, also named ubiquinone, an essential lipid-soluble electron transporter for aerobic cellular respiration. This protein has structural homology to the TFR family of bacterial transcriptional regulators. This domain contains an a helix-turn- helix (HTH) motif that largely lacks the positive charges required for DNA binding.
