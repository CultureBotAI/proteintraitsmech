identifier: Pfam:PF10357
label: KIN17 WH-like domain
definition: >-
  Kin17 is a highly conserved protein that participates in DNA replication, DNA repair and cell cycle progression. Region 51-160 of human Kin17 folds into an atypical winged helix (WH) domain. It consists of a three-α-helix bundle packed against a three-stranded β-sheet. Structural comparison with analogous WH domains reveals that Kin17 WH module presents an additional helix. In addition, helix H3 is not positively charged as in classical DNA-binding WH domains. This domain may be involved in protein-protein interactions.
