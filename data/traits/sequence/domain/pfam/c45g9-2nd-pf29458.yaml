identifier: Pfam:PF29458
label: C45G9.6 second domain
definition: >-
  This entry represents the second domain found in uncharacterised proteins from nematodes. The domain may adopt a β-sheet structure and is found in C45G9.6 ( ) from Caenorhabditis elegans. The function of this domain remains to be determined.
