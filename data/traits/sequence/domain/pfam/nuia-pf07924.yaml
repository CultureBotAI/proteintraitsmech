identifier: Pfam:PF07924
label: Nuclease A inhibitor-like protein
definition: >-
  This family represents the nuclease A inhibitor NuiA expressed by Anabaena sp (NuiA, ) and similar bacterial proteins. This protein adopts an α+β fold described as an 'open jaw', which shares some similarity to the PR-1-like fold. NuiA regulates the activity of Nuclease A (NucA). The NucA inhibition by NuiA involves an unusual divalent metal ion bridge that connects the nuclease with its inhibitor. A highly conserved glutamate extends into the active site, mimicking the charge of a phosphate. In addition, a second interaction site located on one of the two 'jaws' of the NuiA structure, contribute to the specificity and strength of the NuiA-NucA interaction.
