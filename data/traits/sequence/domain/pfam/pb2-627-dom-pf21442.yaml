identifier: Pfam:PF21442
label: Polymerase basic protein 2 (PB2), '627' domain
definition: >-
  This entry represents the so-called '627 domain' of the PB2 of several Thogotovirus. This domain was named because it contains the host specificity residue 627 which is a lysine in human Influenza A virus and a glutamate in avian strains. It contains a large positively charged region, consistent with its ability to bind RNA. Polymerase basic protein 2 (PB2) is a subunit of the RNA-dependent RNA polymerase of Orthomyxovirus Influenza A virus (IAV) which performs transcription of viral mRNAs by cap-snatching, a processes that generated capped primers by host pre-mRNA binding, mediated by PB2.
