identifier: Pfam:PF27342
label: ComB N-terminal domain
definition: >-
  This entry represents the N-terminal domain of ComB proteins found in Gram-positive bacteria. The domain adopts a helical fold structure. While the full-length protein has demonstrated roles in competence induction, the specific function of this N-terminal domain remains to be determined. This entry also represents other members of the MesE/LcnD family such as Lactococcin A secretion protein LcnD, Mesentericin Y105 secretion protein MesE and Uncharacterized protein LBA1794. ComB belongs to the membrane fusion protein family and is required for induction of competence for genetic transformation. The full-length protein contains a single transmembrane helix and is localised to the cell membrane. ComB shows homology to lactococcin A secretion proteins and is classified in the MesE/LcnD family. Bacteriocins are antibacterial proteinaceous compounds produced by bacteria. In Gram-positive bacteria, they are divided into four classes. Within the class II, constituted by non-modified peptides produced mainly by lactic acid bacteria, bacteriocins of the subclass IIa (also known as pediocin-like bacteriocins), such as mesentericin Y105, are of particular interest. They are active against the foodborne pathogen Listeria monocytogenes and share a similar primary structure, with a conserved N-terminal motif (YGNGV). Subclass IIa bacteriocins induce membrane permeabilization of sensitive strains. Class-IId contains the one-peptide non-cyclic bacteriocins that show no sequence similarity to the pediocin-like bacteriocins, and include lactococcin A (LcnA). The translocation of most of the class II bacteriocins requires a type I secretion system which is composed of maturation and secretion protein and an accessory factor. MesD and MesE encode the dedicated transport system of mesenter…
