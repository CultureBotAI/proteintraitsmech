identifier: Pfam:PF16851
label: Stomagen
definition: >-
  This entry represents the C-terminal domain of Stomagen. Stomagen (epidermal patterning factor-like protein 9) is a defensin-like secretory epidermal patterning factor (EPF) peptide hormones which acts as a positive regulator of stomatal development. The structure of stomagen is composed of a loop and a scaffold containing three disulphide bonds.
