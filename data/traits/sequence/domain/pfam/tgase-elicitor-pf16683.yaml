identifier: Pfam:PF16683
label: Transglutaminase elicitor
definition: >-
  This entry represents a family of largely oomycete sequences from plant pathogens that elicit transglutaminase/acyltransferase activity. The enzyme classification is ( ). From the presence of sequences from Vibrio spp one can propose a lateral gene transfer event having occurred between bacteria and oomycetes to the probable selective advantage of the pathogen.
