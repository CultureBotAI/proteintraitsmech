identifier: Pfam:PF17190
label: RecG N-terminal helical domain
definition: >-
  ATP-dependent DNA helicase RecG is involved in the processing of stalled replication forks. It acts by reversing the fork past the damage to create a four-way junction that allows template switching and lesion bypass. RecG comprises three structural domains: N-terminal domain 1 (residues 1-350) and C-terminal domain 2 (residues 351-549) and domain3 (residues 550-780). This entry represents an antiparallel four helix bundle motif of the domain 1.
