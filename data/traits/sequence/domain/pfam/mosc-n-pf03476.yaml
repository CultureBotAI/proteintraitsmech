identifier: Pfam:PF03476
label: MOSC N-terminal beta barrel domain
definition: >-
  This entry represents a domain located in the middle of Molybdenum cofactor sulfurases (MOCOS). MOCOS sulfurates the molybdenum cofactor. Mutations in this protein lead to a disorder characterised by excretion of very large amounts of xanthine in the urine and a tendency to form xanthine stones. This domain is also found at the N-terminal of Mitochondrial amidoxime-reducing component 1 (mARC1), which catalyses the reduction of N-oxygenated molecules, acting as a counterpart of cytochrome P450 and flavin-containing monooxygenases in metabolic cycles, This protein comprises two structural domains which consist of non successive secondary-structure element, with mainly β-strands forming three- and four-stranded antiparallel β-sheets and several α-helices of different lengths. This domain, also known as the MOSC_N domain, is often found to the N terminus of MOSC domain ( ). This domain is also found in 6-hydroxylaminopurine reductase YcbX from E.coli, a reductase involved in the detoxification of N-hydroxylated base analogues. It contributes to the detoxification of 6-N-hydroxylaminopurine (HAP) by catalysing the reduction of HAP to adenine.
