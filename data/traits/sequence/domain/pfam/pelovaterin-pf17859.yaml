identifier: Pfam:PF17859
label: Pelovaterin
definition: >-
  The pelovaterin peptide is a major intracrystalline peptide found in turtle eggshell. The global fold of pelovaterin is similar to that of human beta-defensins. Pelovaterin exhibits strong antimicrobial activity against two pathogenic Gram-negative bacteria, Pseudomonas aeruginosa and Proteus vulgaris.
