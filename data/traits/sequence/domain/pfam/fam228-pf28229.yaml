identifier: Pfam:PF28229
label: FAM228
definition: >-
  This entry represents FAM228A proteins found in vertebrates. The family consists of FAM228A and FAM228B members ranging from approximately 230-325 amino acids. These proteins contain helical regions and disordered segments, with FAM228A showing phosphorylation at serine residues. FAM228A is expressed in testis and other tissues, while FAM228B shows broader tissue distribution. Both proteins undergo alternative splicing producing multiple isoforms. The function of this protein remains to be determined.
