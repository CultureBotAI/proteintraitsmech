identifier: Pfam:PF03834
label: Binding domain of DNA repair protein Ercc1 (rad10/Swi10)
definition: >-
  This entry represents a domain located centrally in ERCC1, at the C-terminal of Rad10 and at the N-terminal of Swi10. In ERCC1, this domain interacts tightly with XPF and may be involved in binding to single-stranded DNA. This group of proteins includes Rad10 from budding yeasts, Swi10 from fission yeasts and ERCC-1 from animals and plants. All proteins in this family for which functions are known are components in a multiprotein endonuclease complex (usually made up of Rad1 and Rad10 homologues). This complex is used primarily for nucleotide excision repair but also for some aspects of recombination repair. In budding yeast, Rad10 works as a heterodimer with Rad1, and is involved in nucleotide excision repair of DNA damaged with UV light, bulky adducts or cross-linking agents. The complex forms an endonuclease which specifically degrades single-stranded DNA. ERCC1 and XPF (xeroderma pigmentosum group F-complementing protein) are two structure-specific endonucleases of a class of seven containing an ERCC4 domain. Together they form an obligate complex that functions primarily in nucleotide excision repair (NER), a versatile pathway able to detect and remove a variety of DNA lesions induced by UV light and environmental carcinogens, and secondarily in DNA inter-strand cross-link repair and telomere maintenance. This domain in fact binds simultaneously to both XPF and single-stranded DNA; this ternary complex explains the important role of Ercc1 in targeting its catalytic XPF partner to the NER pre-incision complex.
