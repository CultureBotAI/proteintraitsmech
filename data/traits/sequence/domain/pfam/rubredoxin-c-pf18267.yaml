identifier: Pfam:PF18267
label: Rubredoxin NAD+ reductase C-terminal domain
definition: >-
  This is the C-terminal domain of NADH rubredoxin oxidoreductase present in Clostridium acetobutylicum. The majority of obligatory anaerobes detoxify micro-aerobic environments by consuming O2 via H2O-forming NADH oxidase. This enzyme offers an alternate reaction pathway for scavenging of O2 and reactive oxygen species, wherein the reducing equivalent is obtained from NADH.
