identifier: Pfam:PF26286
label: UBA-like domain
definition: >-
  This entry represents a UBA-like domain found in a set of fungal proteins. These proteins also contain a CUE domain , a domain related to the UBA domain. These domains may be more related to CUE domains than UBA domains. CUE domains are involved in ubiquitin binding, suggesting a potential function for this domain. Proteins in this family contain a C-terminal SMR domain .
