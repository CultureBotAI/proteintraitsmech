identifier: Pfam:PF24547
label: Domain of unknown function (DUF7601)
definition: >-
  This domain is found in Pilin from Streptococcus pyogenes and similar proteins from firmicutes and actinomycetes. Pilin is a major component of the pilus. A stack of the pilin subunits, joined by intermolecular isopeptide bonds, forms the pilus, which is required for bacterial adhesion to host cells, for bacterial aggregation, and for biofilm formation. This domain is predicted to fold into a β-sandwich. Some members of this entry are likely to contain an intramolecular isopeptide bond connecting their N- and C-terminal strands. This group of proteins is closely related to .
