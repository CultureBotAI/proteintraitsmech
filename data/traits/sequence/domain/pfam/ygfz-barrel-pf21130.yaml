identifier: Pfam:PF21130
label: YgfZ, beta-barrel domain
definition: >-
  tRNA-modifying protein YgfZ is a folate-binding protein involved in regulating the level of ATP-dnaA and in the modification of some tRNAs. It consists of a folate-binding domain at the N terminus and a six-stranded antiparallel β-barrel at the C-terminal. This entry represents the C-terminal domain that is structurally similar to the C-terminal domain of elongation factors Tu, eEF-1alpha and the initiation factor eIF2 gamma. Homologues of YgfZ are found exclusively in gammaproteobacteria.
