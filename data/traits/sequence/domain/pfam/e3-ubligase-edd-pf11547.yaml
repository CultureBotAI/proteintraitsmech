identifier: Pfam:PF11547
label: E3 ubiquitin ligase EDD
definition: >-
  This entry represents the N-terminal ubiquitin-associated (UBA) domain (also known as CUE domain) of UBR5 and similar animal proteins. Ubiquitin is recognised by helices alpha-1 and -3 in in the UBA domain. UBR5 binds to mono-ubiquitinated proteins. E3 ubiquitin-protein ligase UBR5 (also known as E3 ligase identified by differential display, EDD), the ER ubiquitin ligase from the HECT ligases, acts as a key regulator of the ubiquitin proteasome system in both cancer and developmental biology. It is frequently overexpressed in breast and ovarian cancer. It is required for Wnt signal responses in Drosophila and human cell lines downstream of activated Armadillo/beta-catenin. It also plays a key role in ciliogenesis by regulating centriolar satellite stability and primary cilia. UBR5 contains an N-terminal ubiquitin-associated (UBA) domain which binds ubiquitin, a zinc-finger-like domain termed the ubiquitin-recognin (UBR) box, a MLLE (mademoiselle) domain, and a C-terminal catalytic HECT domain.
