identifier: Pfam:PF02300
label: Fumarate reductase subunit C
definition: >-
  Fumarate reductase is a membrane-bound flavoenzyme consisting of four subunits, A-D. A and B comprise the membrane-extrinsic catalytic domain and C and D link the catalytic centres to the electron-transport chain. This family consists of the 15kDa hydrophobic subunit C. Members of this subfamily are classified as Type D as they contain two transmembrane subunits (C and D) and no heme groups. The structural arrangement allows efficient electron transfer between the catalytic subunit, through iron-sulfur centres, and the transmembrane subunit containing the electron donor (quinol). The quinone binding site resides in the transmembrane subunits. Quinol:fumarate reductase (QFR) couples the reduction of fumarate to succinate to the oxidation of quinol to quinone, the opposite reaction to that catalyzed by the related protein, succinate:quinine oxidoreductase (SQR). QFRs oxidize low potential quinols such as menaquinol and are involved in anaerobic respiration with fumarate as the terminal electron acceptor. SQR and QFR share a common subunit arrangement, composed of a flavoprotein catalytic subunit, an iron-sulfur protein and one or two hydrophobic transmembrane subunits.
