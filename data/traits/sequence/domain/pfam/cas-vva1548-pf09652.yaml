identifier: Pfam:PF09652
label: Putative CRISPR-associated protein (Cas_VVA1548)
definition: >-
  This entry represents the CRISPR-associated protein Csx16 which has not been experimentally characterised but seems to be distantly related to DUF1874 (AcrIII-1) family proteins, which are potent ring nucleases. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
