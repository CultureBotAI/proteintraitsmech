identifier: Pfam:PF23704
label: General transcription factor 3C polypeptide 1, winged-helix domain
definition: >-
  This is the winged-helix (WH) domain found at the N-terminal of human General transcription factor 3C polypeptide 1 (GTF3C1, also known as TFIIIC220) and similar eukaryotic sequences. GTF3C1 is required for RNA polymerase III-mediated transcription. It binds to the box B promoter element.TFIIIC assembles the initiation complex TFIIIB-TFIIIC-tDNA, sufficient for RNA polymerase III recruitment and function.
