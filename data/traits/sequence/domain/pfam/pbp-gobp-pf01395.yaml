identifier: Pfam:PF01395
label: PBP/GOBP family
definition: >-
  The olfactory receptors of terrestrial animals exist in an aqueous environment, yet detect odorants that are primarily hydrophobic. The aqueous solubility of hydrophobic odorants is thought to be greatly enhanced via odorant binding proteins which exist in the extracellular fluid surrounding the odorant receptors. This family is composed of pheromone binding proteins (PBP) and general-odorant binding proteins (GOBP). GOBPs and PBPs form a subgroup of the insect odorant binding proteins (OBPs). PBPs are male-specific and associate with pheromone-sensitive neurons. This entry also includes Short and Long form salivary proteins having one or two odorant-binding protein-like domains and involved in binding diverse range of compounds.
