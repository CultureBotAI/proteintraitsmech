identifier: Pfam:PF27188
label: SfmD 3-methyl-L-tyrosine peroxygenase
definition: >-
  This entry represents the 3-methyl-L-tyrosine peroxygenase (SfmD) from Streptomyces lavendulae and related bacterial proteins. SfmD is an enzyme that catalyses the regioselective hydroxylation of 3-methyl-L-tyrosine to 3-hydroxy- 5-methyl-L-tyrosine using hydrogen peroxide as an oxidant. The enzyme contains one heme group per subunit and has an optimum pH of 9.0. SfmD is involved in the biosynthesis of saframycin A, a potent antitumor antibiotic belonging to the tetrahydroisoquinoline family. The enzyme binds heme through histidine and cysteine residues, which are critical for catalytic activity.
