identifier: Pfam:PF24068
label: Tapetum determinant 1, C-terminal
definition: >-
  This family consist of protein TAPETUM DETERMINANT 1 (TPD1) and homologues from plants. TPD1 is required for the specialization of tapetal cells in the Arabidopsis anther. TPD1 serves as a ligand for the EMS1 receptor kinase to control anther cell differentiation during plant sexual reproduction.
