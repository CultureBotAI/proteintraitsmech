identifier: Pfam:PF23659
label: E3 UFM1-protein ligase 1-like domain
definition: >-
  This domain is found in human E3 UFM1-protein ligase 1 (Ufl1) and similar eukaryotic sequences. This domain, which is predicted to show an all-α configuration, is often found associated to the Ufl1 N-terminal domain . The ubiquitin fold modifier 1 (Ufm1) is the most recently discovered ubiquitin-like modifier whose conjugation (ufmylation) system is conserved in multicellular organisms. Ufm1 is known to covalently attach with cellular protein(s) via a specific E1-activating enzyme (Uba5), an E2-conjugating enzyme (Ufc1), and a E3-ligating enzyme (Ufl1). Ufl1 mediates the covalent attachment of the ubiquitin-like modifier Ufm1 to lysine residues on target proteins and plays a key role in reticulophagy (also called ER-phagy) induced in response to endoplasmic reticulum stress.
