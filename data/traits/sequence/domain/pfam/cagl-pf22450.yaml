identifier: Pfam:PF22450
label: T4SS protein CagL
definition: >-
  This family includes CagL from Helicobacter pylori ( ), a type IV secretion system (T4SS) pilus protein that interacts with several integrins through an helical RGD motif. It shows an all-α structure that undergoes specific conformational changes depending on pH variations. These changes also affect the exposure of the RGD motif and therefore modulate its binding capacity to host cell integrins.
