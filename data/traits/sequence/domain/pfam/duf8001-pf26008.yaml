identifier: Pfam:PF26008
label: Family of unknown function (DUF8001)
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. These proteins are about 80 amino acids in length and adopt a compact fold composed of a 5 stranded β sheet with two α helices packed on one side. The sheet has a simple 1-2-3-4-5 topology of strands.
