identifier: Pfam:PF30945
label: NF-kappa-B inhibitor-like protein 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of NF-kappa-B inhibitor-like protein 1 (NFKBIL1, also known as IkappaBL). The full-length NFKBIL1 protein is a nuclear protein that acts as a negative regulator of Toll-like receptor and interferon-regulatory factor signalling pathways, contributing to the negative regulation of NF-kappa-B target gene transcription. The N-terminal region of NFKBIL1 contains ankyrin repeats and mediates interaction with CACTIN. The specific function of this C-terminal domain remains to be determined.
