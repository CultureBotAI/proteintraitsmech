identifier: Pfam:PF17246
label: Cell division control protein 24, OB domain 1
definition: >-
  This entry represents the first OB-fold domain found in cell division control protein 24 (Cdc24). The OB-fold domains are nucleic acid binding domains. Cdc24 plays an essential role in the progression of normal DNA replication and is required to maintain genomic integrity. Cdc24 has been reported to interact with replication factor C (RFC) as well as proliferating cell nuclear antigen (PCNA), and has been suggested to act as a target for the regulation of damage repair DNA synthesis.
