identifier: Pfam:PF02129
label: X-Pro dipeptidyl-peptidase (S15 family)
definition: >-
  This entry represents a domain found in Xaa-Pro dipeptidyl-peptidases, which belong to MEROPS peptidase family S15. It is also found in hydrolases from the CocE/NonD family. Cocaine esterase (CocE) hydrolyses cocaine endowing the bacteria with the ability to utilise cocaine as a sole source of carbon and energy.
