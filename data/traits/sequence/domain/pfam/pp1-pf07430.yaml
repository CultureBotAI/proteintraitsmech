identifier: Pfam:PF07430
label: Phloem filament protein PP1 cystatin-like domain
definition: >-
  This domain represents a conserved region approximately 200 residues long, four copies of which are found within the plant phloem filament protein PP1. This is one of the constituents of the proteinaceous filaments found in the sieve elements of Cucurbita phloem.
