identifier: Pfam:PF28742
label: SECTM1 immunoglobulin-like domain
definition: >-
  This entry represents the immunoglobulin-like domain found in the extracellular region of SECTM1 mammal proteins. SECTM1 proteins are secreted and transmembrane proteins involved in immune signalling. The Ig-like domain is located in the N-terminal extracellular portion of these proteins and contains a conserved disulphide bond. SECTM1 proteins interact with CD7 and may be involved in thymocyte signalling. The domain contains N-linked glycosylation sites. The proteins are expressed in immune cells, particularly myeloid lineage cells and thymic epithelial cells.
