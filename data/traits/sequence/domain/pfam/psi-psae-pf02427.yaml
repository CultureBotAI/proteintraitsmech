identifier: Pfam:PF02427
label: Photosystem I reaction centre subunit IV / PsaE
definition: >-
  PsaE is a 69 amino acid polypeptide from photosystem I present on the stromal side of the thylakoid membrane. The structure is comprised of a well-defined five-stranded β-sheet similar to SH3 domains. This subunit may form complexes with ferredoxin and ferredoxin-oxidoreductase in the photosystem I reaction centre.
