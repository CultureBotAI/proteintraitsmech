identifier: Pfam:PF01338
label: Bacillus thuringiensis toxin
definition: >-
  Bacillus thuringiensis produces the delta-endotoxin CytB, a membrane pore-forming protein, which is active against insects. The toxin kills the larvae of dipteran insects by making pores in the epithelial cell membrane of the insect midgut. The crystal protein is produced during sporulation and is accumulated both as an inclusion and as part of the spore coat.
