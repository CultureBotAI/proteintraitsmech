identifier: Pfam:PF02330
label: Mitochondrial glycoprotein
definition: >-
  This mitochondrial matrix protein family contains members of the MAM33 family (also known as Complement component 1 Q subcomponent-binding protein in human) which bind to the globular 'heads' of C1Q.b. In vertebrates, these proteins are involved in inflammation and infection processes, ribosome biogenesis, protein synthesis in mitochondria, regulation of apoptosis, transcriptional regulation and pre-mRNA splicing. It is thought to be involved in mitochondrial oxidative phosphorylation and in nucleus-mitochondrion interactions.
