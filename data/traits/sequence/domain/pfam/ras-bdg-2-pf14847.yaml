identifier: Pfam:PF14847
label: Ras-binding domain of Byr2
definition: >-
  This entry represents the Ras binding/interacting domain of the Byr2 protein from Schizosaccharomyces pombe. The Ras binding domain (RBD) of Byr2 is necessary and sufficient for the protein to be translocated by Ras to the plasma membrane. This domain can also be found in Ste11 protein from Saccharomyces cerevisiae. Byr2 is mitogen-activated protein/ERK kinase kinase (MEKK) that responds to pheromone signalling and controls mating through a mitogen-activated protein kinase (MAPK) pathway. The small GTP binding protein Ras binds and activates Byr2.
