identifier: Pfam:PF28549
label: Nucleoside diphosphate sugar hydrolase N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in bacterial nucleoside diphosphate sugar hydrolases (NDPSases). This domain consists of a β-sheet composed of three anti-parallel strands connected by loops. The domain is involved in substrate recognition, with loop L1 contributing to pi-stacking interactions with the nucleoside substrate via conserved aromatic residues such as Y19 in Bd3179. This N-terminal domain forms part of a domain-swapped homodimeric structure where it interacts with the substrate in the catalytic site of the opposite monomer. The domain works in concert with the C-terminal Nudix fold ( ) to form the complete catalytic cavity. NDPSases hydrolyse nucleoside diphosphate sugars including GDP-mannose, UDP-glucose, and GDP-glucose, and show lower activity towards ADP-ribose. In Bdellovibrio bacteriovorus, the complete enzyme localises to the periplasmic space where it may play a role in metabolising host material during the predatory life cycle.
