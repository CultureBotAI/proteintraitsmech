identifier: Pfam:PF28850
label: Follicle cell protein 3C C-terminal domain
definition: >-
  This entry represents the C-terminal domain of follicle cell protein 3C found in insects. The domain is present in Drosophila melanogaster follicle cell protein 3C-1, which is expressed in follicle cells during vitelline membrane formation. The full-length protein shows tissue-specific expression in ovary follicle cells and displays significant sequence variation across Drosophila strains. This C-terminal domain is found in proteins from various insect species including Diptera, Hymenoptera, and Lepidoptera. The specific function of this domain remains to be determined.
