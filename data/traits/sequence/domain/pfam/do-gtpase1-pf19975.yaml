identifier: Pfam:PF19975
label: Double-GTPase 1
definition: >-
  This domain is known as DO-GTPase1. Protein containing this domain are GTPases of a GTPase-centric, NTP-dependent ternary systems. This domain belongs to a previously unrecognised TRAFAC clade with a conserved glutamate in its Walker B motif. In 38% of these systems they occur as two paralogous copies suggesting that they function as dimers, and accordingly, they were named as double-GTPases (DO-GTPases).
