identifier: Pfam:PF30651
label: Winged helix-turn-helix domain C-terminal to NACHT
definition: >-
  This entry represents a winged helix-turn-helix domain of approximately 125 residues found in bacteria. This domain is frequently located C-terminal to a NACHT domain ( ). NACHT domains are nucleotide-binding domains found in STAND proteins involved in signal transduction. The domain architecture frequently also includes an FGE-sulfatase domain ( ). The family is predominantly found in Actinomycetota. The specific function of this domain remains to be determined.
