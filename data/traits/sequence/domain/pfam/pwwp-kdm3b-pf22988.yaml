identifier: Pfam:PF22988
label: Lysine-specific demethylase 3B, PWWP domain
definition: >-
  This domain is found in Lysine-specific demethylase 3B (KDM3B, also known as JmjC domain-containing histone demethylation protein 2B or JHDM2B), Lysine-specific demethylase 3A (KDM3A, also known as JmjC domain-containing histone demethylation protein 2A or JHDM2A) and related proteins. KDM3B is a histone demethylase that specifically demethylates lysine at position 9 of histone H3. This enzyme plays a central role in histone code. This domain is predicted to adopt an open β-barrel with an SH3-like topology. It has detectable sequence and structural similarity to PWWP reader domains of LEDGF and ZMYND8 known to recognise the histone H3 methylation marks of lysine at position 36.
