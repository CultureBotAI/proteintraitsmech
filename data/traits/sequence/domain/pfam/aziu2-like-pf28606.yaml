identifier: Pfam:PF28606
label: AziU2-like beta-sandwich domain
definition: >-
  This entry represents a β-sandwich domain found in the AziU2 subunit of the aziridine synthase complex and related proteins. The domain is most commonly found in multidomain glycoside hydrolases from Actinomycetes, particularly Streptomyces species, where it occurs at the N terminus of proteins containing glycoside hydrolase family 38 domains ( ). In the aziridine synthase complex AziU3/U2, this domain forms part of a heterotetrameric structure and contributes to substrate binding and proper positioning for sulfate elimination reactions that form aziridine rings. The domain adopts a β-sheet-rich structure and forms homodimers through β-strand interactions. The specific function of this domain in glycoside hydrolases remains to be determined.
