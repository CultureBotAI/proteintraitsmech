identifier: Pfam:PF01845
label: CcdB protein
definition: >-
  CcdB protein is a topoisomerase poison from Escherichia coli. It is responsible for killing plasmid-free segregants, and interferes with the activity of DNA gyrase. It acts to inhibit partitioning of the chromosomal DNA.
