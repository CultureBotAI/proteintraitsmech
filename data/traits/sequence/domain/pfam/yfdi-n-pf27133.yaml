identifier: Pfam:PF27133
label: YfdI N-terminal transmembrane domain
definition: >-
  This entry represents the N-terminal domain of uncharacterised protein YfdI from Escherichia coli and related enterobacteria. It is predicted to be a multi-pass membrane protein localised to the cell membrane with ten transmembrane helices.
