identifier: Pfam:PF21518
label: Spindle assembly abnormal protein 5, implico domain
definition: >-
  This entry represents the implico domain found in Spindle assembly abnormal protein 5 from Caenorhabditis elegans (Sas-5) and related proteins from Caenorhabditis species. Sas-5 is essential for daughter-centriole formation. This protein is composed of two independent domains, a coiled-coil domain that is followed by the implico domain. The implico domain consists of three α-helices and adopt a globular dimeric structure.
