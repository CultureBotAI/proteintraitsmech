identifier: Pfam:PF22327
label: U8 snoRNA-decapping enzyme-like
definition: >-
  This entry represents a group of proteins mainly found in animals that contain the NUDIX hydrolase domain, including U8 snoRNA -decapping enzyme NudT16. NudT16 was initially described as an RNA-binding and decapping enzyme but it was later reported to be specialised in the removal of hazardous (deoxy)inosine diphosphate from the nucleotide pool. It adopts a canonical NUDIX fold, an α-β-α sandwich constituted by two β-sheets whose strands interact in a way that could also be described as a single extended β-sheet.
