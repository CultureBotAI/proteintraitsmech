identifier: Pfam:PF21329
label: Peptidyl-prolyl cis-trans isomerase CYP38-like, PsbQ-like domain
definition: >-
  Peptidyl-prolyl cis-trans isomerase CYP38 from Arabidopsis is required for the assembly and stabilisation of PSII. It consists of an N-terminal helical bundle and a C-terminal cyclophilinβ-barrel ( ). This entry represents the N-terminal helical bundle found in Cyp37/38 from Arabidopsis and similar proteins from plants and cyanobacteria. This domain establishes strong interactions with the C-terminal domain to avoid the access of the cyclophilin domain to other proteins.
