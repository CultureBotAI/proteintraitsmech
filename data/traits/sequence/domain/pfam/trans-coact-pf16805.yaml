identifier: Pfam:PF16805
label: Phage late-transcription coactivator
definition: >-
  This family of proteins is found in Caudovirales. It is a late-transcription coactivator which interacts with the host RNA polymerase forming a part of the initiation complex. It activates transcription at late promoters when the sliding clamp is present. It is able to bind to both the host RNA polymerase (RNAP) and the upstream dsDNA.
