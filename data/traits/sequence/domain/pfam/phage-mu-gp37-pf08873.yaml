identifier: Pfam:PF08873
label: Bacteriophage Mu, Gp37
definition: >-
  This entry is represented by Bacteriophage Mu, Gp37 (also known as Probable tail terminator protein) which may stop tail tube polymerisation by capping the rapidly polymerising tail tube once it has reached its requisite length and prevents its depolymerisation. This family also has prophages matches, such as the Gp37 protein from the FluMu prophage.
