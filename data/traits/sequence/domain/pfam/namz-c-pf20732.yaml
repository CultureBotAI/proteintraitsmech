identifier: Pfam:PF20732
label: Exo-beta-N-acetylmuramidase NamZ, C-terminal
definition: >-
  NamZ is an exo-beta-N-acetylmuramidase which catalyses an exo-lytic cleavage of beta-1,4-acetylmuramic acid from from the non-reducing ends of peptidoglycan chains and it is a founding member of a new family of glycosidases (GH171). NamZ consists of a N-terminal catalytic domain with a Rossmann-like fold ( ) and a C-terminal auxiliary α/β domain (represented in this entry).
