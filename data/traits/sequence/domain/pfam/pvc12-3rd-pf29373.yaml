identifier: Pfam:PF29373
label: Baseplate wedge Pvc12-like domain 3
definition: >-
  This domain is found in the Baseplate wedge proteins Pvc12 from Photorhabdus laumondii ( ) and related proteins. This domain has similarity to the C-terminal domain of the P2 bacteriophage baseplate J protein. The baseplate wedge protein Pvc12 and the sheath protein Pvc4 play an important role in the stabilisation of the baseplate-trunk interface of the phage contractile injection system.
