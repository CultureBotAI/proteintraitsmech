identifier: Pfam:PF25791
label: BREX ATP-binding protein BrxC winged helix-turn-helix domain
definition: >-
  This entry represents the winged helix-turn-helix (wHTH) domain of the BrxC protein from the BREX (bacteriophage exclusion) system. This domain is predicted to be the 5th of 8 domains in the full-length BrxC protein. The winged helix-turn-helix domain likely plays a role in DNA binding. BrxC is a P-loop-containing, probable ATPase associated with type 1 BREX (bacteriophage exclusion) systems, which provide immunity against bacteriophage infections by methylating specific DNA sites to distinguish self from non-self. Although phage adsorption is permitted, BREX systems block phage DNA replication. BrxC, a probable ATP-binding protein, operates within a six-protein complex (BrxA-BrxB-BrxC-PglX-PglZ-BrxL) that confers resistance to a range of bacteriophages.
