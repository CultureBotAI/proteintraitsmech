identifier: Pfam:PF31243
label: HGL2, vWA domain
definition: >-
  This entry represents the vWA domain of Galactose/N-acetyl-D-galactosamine lectin heavy subunit 1/2 (HGL1/2) from Entamoeba histolytica and related sequences. HGL2 is a lectin which binds galactose and N-acetyl-D-galactosamine of host glycoproteins and thus mediates adhesion to host cells. It may mediate adherence to host colonic mucins, an essential step for pathogenic tissue invasion.
