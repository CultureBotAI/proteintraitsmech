identifier: Pfam:PF24861
label: Sucrose synthase N-terminal
definition: >-
  This entry represents the N-terminal domain of sucrose synthases, which corresponds to the cellular targeting domain (CTD, also referred to as SSN1) and together with the EPBD domain (SSN2, ), they have regulatory functions in plant species, however, the function of these domains in cyanobacteria is not yet clear. Sucrose synthases are sucrose-cleaving enzymes that provide UDP-glucose and fructose for various metabolic pathways.
