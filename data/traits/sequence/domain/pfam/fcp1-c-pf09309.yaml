identifier: Pfam:PF09309
label: FCP1, C-terminal
definition: >-
  The C-terminal domain of FCP-1 is required for interaction with the carboxy terminal domain of RAP74. Interaction relies extensively on van der Waals contacts between hydrophobic residues situated within α-helices in both domains. Fcp1 catalyses the dephosphorylation of the C-terminal domain of the largest RNA polymerase (RNAP) II and plays a role in polymerase recycling. Fcp1 preferentially dephosphorylates serine 2 residues within the CTD RNAP II heptads repeats YSPTSPS, although it can also act on serine 5 under certain conditions
