identifier: Pfam:PF23787
label: Domain of unknown function (DUF7172)
definition: >-
  This entry represents a domain found in proteins typically around 200 amino acids in length. It is found in phage that infect Mycobacteria, Gordonia, and Nocardia. The exact function is unknown. The structure of the domain shows an extended β sandwich fold where one sheet is hinged in the middle to form a kink.
