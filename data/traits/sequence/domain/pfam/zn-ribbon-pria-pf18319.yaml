identifier: Pfam:PF18319
label: PriA DNA helicase Cys-rich region (CRR) domain
definition: >-
  This is a cys-rich region (CRR) domain found in PriA DNA helicases. The CRR region which is embedded within the C-terminal helicase lobe has been identified to bind two Zn2+ ions. This 50-residue insertion forms a structure on the surface of the helicase core in which two Zn2+ ions are coordinated by invariant Cys residues. Biochemical experiments have shown that sequence changes to Zn2+-binding Cys residues in the PriA CRR can eliminate helicase, but not ATPase, activity and can block assembly of PriB onto DNA-bound PriA, implicating the CRR in multiple functions in PriA. Primosomal protein N', also known as ATP-dependent helicase PriA, is a component of the primosome, which is involved in replication, repair, and recombination. PriA serves as a sensor/stabiliser for an arrested replication fork, which is lethal in bacteria if left unrepaired and eventually promotes restart of DNA replication through the assembly of a primosome. It also serves as a checkpoint protein that prevents the replicase from advancing in a strand displacement reaction on forks that do not contain a functional replicative helicase. This protein shows a modular arrangement in which its central helicase core is surrounded by several DNA-binding elements, including a 3'DNA-binding domain at the N-terminal. This domain is usually followed by a circularly permuted winged helix (WH) domain . At the C-terminal, there is a Cys-rich region (CRR) domain , which is embedded within the C-terminal helicase lobe , followed by the C-terminal domain (CTD) .
