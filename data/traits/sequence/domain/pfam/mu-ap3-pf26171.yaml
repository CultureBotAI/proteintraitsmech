identifier: Pfam:PF26171
label: AP3 Mu C-terminal domain
definition: >-
  This entry represents the Mu C-terminal domain in AP-3 complex subunit delta and related proteins mainly found in animals. AP3 is part of the AP-3 complex, an adaptor-related complex associated with the Golgi region as well as more peripheral structures. It facilitates the budding of vesicles from the Golgi membrane and may be directly involved in trafficking to lysosomes. It is involved in process of CD8+ T-cell and NK cell degranulation. In conjunction with the BLOC-1 complex, it targets cargos into vesicles for delivery into neurites and nerve terminals, highlighting its importance in neuronal transport. This domain has a flexible conformation, it contains a binding site for transmembrane cargo that recognises tyrosine-based motifs.
