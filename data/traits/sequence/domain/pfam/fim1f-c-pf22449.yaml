identifier: Pfam:PF22449
label: Fim1F, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of the putative fimbrium tip subunit Fim1F from Parabacteroides distasonis, which contain an N-terminal domain ( ) and a slightly larger C-terminal domain (this entry) with a transthyretin-like fold that contains seven core β-strands arranged in two β-sheets an extra conserved 'appendage' of two amphipathic β-strands.
