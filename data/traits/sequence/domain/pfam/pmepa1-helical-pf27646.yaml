identifier: Pfam:PF27646
label: PMEPA1 helical domain
definition: >-
  This entry represents the cytoplasmic helical domain found in PMEPA1 (prostate transmembrane protein androgen induced 1) and related proteins mainly found in vertebrates, including human LDLRAD4 (Low-density lipoprotein receptor class A domain-containing protein 4). PMEPA1 functions as a negative regulator of TGF-beta signalling and is involved in down-regulation of the androgen receptor. LDLRAD4 functions as a negative regulator of TGF-beta signalling and thereby probably plays a role in cell proliferation, differentiation, apoptosis, motility, extracellular matrix production and immunosuppression. This domain is located in the cytoplasmic region following the single transmembrane helix and contains binding sites for regulatory proteins. The domain includes two PPxY motifs that mediate interaction with the E3 ubiquitin ligase NEDD4. It also contains a SMAD interaction motif (SIM) required for interaction with SMAD2 and SMAD3 proteins and negative regulation of TGF-beta signalling. Through these interactions, PMEPA1 modulates cell proliferation, differentiation and apoptosis. The protein is localised to early endosomes and Golgi membranes. Expression is highest in prostate tissue and is up-regulated by both androgen and TGF-beta.
