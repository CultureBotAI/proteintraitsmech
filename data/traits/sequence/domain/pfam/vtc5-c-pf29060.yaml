identifier: Pfam:PF29060
label: VTC5 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in VTC5 (Vacuole transporter chaperone complex subunit 5) and related proteins from fungi. This domain is located after the cytoplasmic region and contains three transmembrane helices that anchor VTC5 to the vacuole membrane. VTC5 is a regulatory subunit of the VTC complex that catalyses polyphosphate synthesis and is involved in phosphate homeostasis. The VTC complex acts as a vacuolar polyphosphate polymerase and VTC5 increases the rate of polyphosphate production. The specific function of this domain remains to be determined.
