identifier: Pfam:PF15111
label: TMEM101 protein family
definition: >-
  The function of this family of transmembrane proteins, TMEM101, has not, as yet, been determined. Members of this family remain uncharacterised. This family of proteins is found in eukaryotes. Proteins in this family are typically between 127 and 257 amino acids in length. These proteins contain eight putative transmembrane helices. This family appears to show some distant sequence similarity with the SURF4 ( ) and DoxX ( ) families.
