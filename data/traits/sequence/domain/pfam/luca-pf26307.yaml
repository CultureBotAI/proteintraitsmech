identifier: Pfam:PF26307
label: Lipid uptake coordinator A family
definition: >-
  Lipid uptake coordinator A (LUCA) is essential for the import of fatty acids and cholesterol, particularly during growth in macrophages and axenic culture. It plays a crucial role by stabilising the protein subunits of the Mce1 and Mce4 multi-subunit transporters, which are responsible for transporting fatty acids and cholesterol, respectively. This stabilisation is vital for the uptake of these lipids, contributing to the full virulence of the organism in vivo. The protein interacts with accessory subunits such as Rv0199/OmamA, Rv0177/Mam1C, and Rv3492c/Mam4B, which are part of the lipid transport mechanism. Members of this family contain a domain predicted to show four transmembrane α-helices.
