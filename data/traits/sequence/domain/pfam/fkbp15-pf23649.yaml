identifier: Pfam:PF23649
label: FK506-binding protein 15-like domain
definition: >-
  This domain is found in human FK506-binding protein 15 (FKBP15) and similar animal proteins. It is also found in the amoebozoan homologue from Dictyostelium discoideum FK506-binding protein 5 (FKBP5). FKBP15 is involved in the transport of early endosomes and probably in the cytoskeletal organisation of neuronal growth cones. This domain, predicted to show a long α-helix, is often found C-terminal to .
