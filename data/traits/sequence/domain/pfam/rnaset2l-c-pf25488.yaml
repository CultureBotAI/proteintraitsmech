identifier: Pfam:PF25488
label: RNase T2-like C-terminal domain
definition: >-
  This domain is found C-terminal in Ribonuclease T2-like from Emericella nidulans and related fungal proteins. Ribonuclease T2-like enzymes preferentially cleave single-stranded RNA between purine and uridine residues to generate two nucleotide fragments with 2'3'-cyclic phosphate adenosine/guanosine terminus and uridine residue. This domain is predicted to adopt a β-Trefoil fold.
