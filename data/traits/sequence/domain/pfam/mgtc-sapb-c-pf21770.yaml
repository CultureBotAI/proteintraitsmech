identifier: Pfam:PF21770
label: MGTC/SAPB C-terminal domain
definition: >-
  This entry represents a domain found at the C-terminal of Protein MgtC from Salmonella typhimurium and similar bacterial proteins. MgtC is a virulence factor required for growth in low Mg2+ medium and for intramacrophage survival. It may be involved in regulating membrane potential by activating Na+/K+-ATPase. This domain adopts a ferredoxin-like fold and has a significant structural similarity to ACT-like domains. In contrast to the canonical ACT-like domains, this domain doesn't dimerise or bind to small molecules. It is probably involved in protein-protein interactions.
