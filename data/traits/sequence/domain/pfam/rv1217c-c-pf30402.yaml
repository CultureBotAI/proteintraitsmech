identifier: Pfam:PF30402
label: Multidrug efflux system permease Rv1217c, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Multidrug efflux system permease protein Rv1217c from Mycobacterium tuberculosis, which is robably part of the ABC transporter complex Rv1217c-Rv1218c involved in the resistance to a wide range of structurally unrelated drugs. This domain shows an all-α configuration.
