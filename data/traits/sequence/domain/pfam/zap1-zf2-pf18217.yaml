identifier: Pfam:PF18217
label: Zap1 zinc finger 2
definition: >-
  This domain can be found in Zap1 present in Saccharomyces cerevisiae. Zap1 regulates S. cerevisiae which mediates the transcription of genes encoding uptake vacuolar transporters. This domain corresponds to zinc finger 2 (Znf2) which has been shown to be a constitutive transcriptional activator. The two zinc fingers interactions stabilizes Zn(II)-binding.
