identifier: Pfam:PF07088
label: GvpD gas vesicle protein, P-loop domain
definition: >-
  This entry represents the N-terminal domain of several archaeal GvpD gas vesicle proteins. This domain includes the P-loop and the basic region 1 (bR1, an arginine-rich region) which are essential for GvpD repressive function. GvpD is involved in the regulation of gas vesicle formation through the interaction and breakdown induction of the transcriptional activator GvpE.
