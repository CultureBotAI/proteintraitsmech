identifier: Pfam:PF05995
label: Cysteine dioxygenase type I
definition: >-
  Cysteine dioxygenase (CDO) plays an important role in the homeostatic regulation of steady-state cysteine levels and provides important oxidized metabolites of cysteine such as sulfate and taurine. It converts cysteine to cysteinesulphinic acid and is the rate-limiting step in sulphate production. This entry also includes a cysteine dioxygenase homologue from Pseudomonas aeruginosa known as p3MDO. It functions as a 3-mercaptopropionate dioxygenase that catalyses the dioxygenation of 3-MPA to 3-sulfinopropionic acid (3-SPA). 3-Mercaptopropionic acid (3-MPA) is a structural analogue of cysteine.
