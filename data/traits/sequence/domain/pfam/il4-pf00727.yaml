identifier: Pfam:PF00727
label: Interleukin 4
definition: >-
  Cytokines are protein messengers that carry information from cell to cell. Interleukin is one such molecule, and participates in several B-cell activation processes: e.g., it enhances production and secretion of IgG1 and IgE; it induces expression of class II major histocompatability complex (MHC) molecules on resting B-cells; and it regulates expression of the low affinity Fc receptor for IgE on lymphocytes and monocytes. Interleukin-4 (IL4), which this entry represents, has a compact, globular fold (similar to other cytokines), stabilised by 3 disulphide bonds. One half of the structure is dominated by a 4 α-helix bundle with a left-handed twist. The helices are anti-parallel, with 2 overhand connections, which fall into a 2-stranded anti-parallel β-sheet.
