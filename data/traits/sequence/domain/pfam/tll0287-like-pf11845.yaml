identifier: Pfam:PF11845
label: Tll0287
definition: >-
  This domain covers the full length of Tll0287 from Thermosynechococcus vestitus ( ) and similar bacterial proteins. Tll0287 is a c-type haem protein that shows a β-sheet with four antiparallel β-strands surrounded by five α-helices. This structure is similar to some kinases and sensor proteins, but its specific function is unknown. This domain is also found associated with in many uncharacterised bacterial sequences.
