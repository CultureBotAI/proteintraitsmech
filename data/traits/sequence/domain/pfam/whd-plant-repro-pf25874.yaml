identifier: Pfam:PF25874
label: Winged helix-turn-helix domain in plant reproductive proteins
definition: >-
  This entry represents a winged helix-turn-helix (wHTH) domain found in plant proteins involved in reproductive development, particularly male gametogenesis, meiosis, and tapetal cell development. These proteins generally function as transcription factors regulating key processes in pollen development and meiotic chromosome organisation. The most well-characterised members include MALE STERILITY 1 (MS1), PERSISTENT TAPETAL CELL 1 (PTC1), MALE MEIOCYTE DEATH 1 (MMD1), and AMEIOTIC 1 (AM1). These proteins contain this wHTH domain that is distinct from the PHD finger domain also found in some members of this family. MS1 and PTC1 proteins are required for post-meiotic pollen development and tapetal programmed cell death, while MMD1 and DYAD/SWI1 are necessary for meiotic chromosome organisation. The wHTH domain likely functions in DNA-binding and transcriptional regulation.
