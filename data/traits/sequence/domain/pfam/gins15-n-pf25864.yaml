identifier: Pfam:PF25864
label: GINS complex Gins15 subunit N-terminal domain
definition: >-
  This entry represents the N-terminal (A domain) in Gins15 ( ) from archaea. This domain consists primarily of α-helical structures and corresponds to the A domain in the circularly permuted AB domain arrangement of Gins15. While the N-terminal domain does not directly interact with Cdc45, it plays an important structural role in the formation of the tetrameric archaeal GINS complex Gins15/Gins23. This domain is structurally related to portions of the eukaryotic GINS components Sld5 and Psf1. In the complete archaeal CMG (Cdc45-MCM-GINS) complex, this domain contributes to the overall architecture that is essential for the functional replicative helicase activity during DNA replication. Gins15 is a core subunit of the GINS complex involved in DNA replication. Together with Cdc45 and Gins23, forms a stable complex that stimulates the helicase activity of MCM.
