identifier: Pfam:PF02452
label: PemK-like, MazF-like toxin of type II toxin-antitoxin system
definition: >-
  PemK is a growth inhibitor in Escherichia coli known to bind to the promoter region of the Pem operon, auto-regulating synthesis. It is responsible for mediating cell death through inhibiting protein synthesis through the cleavage of single-stranded RNA. PemK is part of the PemK-PemI system, where PemI is an antitoxin that inhibits the action of the PemK toxin. PemK homologues have been found in a wide range of bacteria, which together form an endonuclease family that interfere with mRNA function. This family consists of the PemK protein in addition to ChpA, ChpB, Kid and MazF.
