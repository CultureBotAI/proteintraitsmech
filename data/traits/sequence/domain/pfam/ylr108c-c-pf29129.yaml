identifier: Pfam:PF29129
label: YLR108C C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YLR108C and related BTB/POZ domain-containing proteins found in fungi. The domain spans approximately 150-170 residues at the C-terminal region of these proteins. Members include the uncharacterised proteins YLR108C and YDR132C from Saccharomyces cerevisiae. These proteins contain an N-terminal BTB/POZ domain involved in protein-protein interactions and oligomerisation. The proteins are localised to both the cytoplasm and nucleus. Members of this family are found across fungal species in the Saccharomycotina including Saccharomyces, Candida and related yeasts. The function of this specific C-terminal domain remains to be determined.
