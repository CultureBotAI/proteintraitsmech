identifier: Pfam:PF00202
label: Aminotransferase class-III
definition: >-
  Aminotransferases share certain mechanistic features with other pyridoxalphosphate-dependent enzymes, such as the covalent binding of the pyridoxalphosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies. One of these, called class-III, includes: Acetylornithine aminotransferase ( ), which catalyses the transfer of an amino group from acetylornithine to alpha-ketoglutarate, yielding N-acetyl-glutamic-5-semi-aldehyde and glutamic acid; Ornithine aminotransferase ( ), which catalyses the transfer of an amino group from ornithine to alpha-ketoglutarate, yielding glutamic-5-semi-aldehyde and glutamic acid; Omega-amino acid--pyruvate aminotransferase ( ), which catalyses transamination between a variety of omega-amino acids, mono-and diamines, and pyruvate; 4-aminobutyrate aminotransferase ( ) (GABA transaminase), which catalyses the transfer of an amino group from GABA to alpha-ketoglutarate, yielding succinate semialdehyde and glutamic acid; DAPA aminotransferase ( ), a bacterial enzyme (bioA), which catalyses an intermediate step in the biosynthesis of biotin, the transamination of 7-keto-8-aminopelargonic acid to form 7,8-diaminopelargonic acid; 2,2-dialkylglycine decarboxylase ( ), a Burkholderia cepacia (Pseudomonas cepacia) enzyme (dgdA) that catalyses the decarboxylating amino transfer of 2,2-dialkylglycine and pyruvate to dialkyl ketone, alanine and carbon dioxide; Glutamate-1-semialdehyde aminotransferase ( ) (GSA); Bacillus subtilis aminotransferases yhxA and yodT; Haemophilus influenzae diaminobutyrate--2-oxoglutarate aminotransferase (HI0949); Caenorhabditis elegans alanine--glyoxylate aminotransferase 2-like (T01B11.2).
