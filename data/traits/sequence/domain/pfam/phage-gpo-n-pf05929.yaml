identifier: Pfam:PF05929
label: GPO serine peptidase, N-terminal domain
definition: >-
  The bacteriophage P2 capsid is formed by multiple copies of the capsid protein GpN. The scaffolding protein GpO, which is essential for the assembly of this capsid, consists of an N-terminal serine protease domain and a C-terminal scaffolding domain. During capsid assembly, GpO interacts with GpN via the N-terminal domain, while the C-terminal domain plays an essential role as a scaffold. When capsid assembly is complete the C-terminal domain of GpO is cleaved autocatalytically. Cleavage of GpN to its mature form by the remaining N-terminal domain then completes the maturation process.
