identifier: Pfam:PF01870
label: Archaeal holliday junction resolvase (hjc)
definition: >-
  This entry represents Holliday junction resolvases (hjc gene) and related proteins, primarily from archaeal species. The Holliday junction is an essential intermediate of homologous recombination. Holliday junctions are four-stranded DNA complexes that are formed during recombination and related DNA repair events. In the presence of divalent cations, these junctions exist predominantly as the stacked-X form in which the double-helical segments are coaxially stacked and twisted by 60 degrees in a right-handed direction across the junction cross-over. In this structure, the stacked arms resemble two adjacent double-helices, but are linked at the junction by two common strands that cross-over between the duplexes. During homologous recombination, genetic information is physically exchanged between parental DNAs via crossing single strands of the same polarity within the four-way Holliday structure. This process is terminated by the endonucleolytic activity of resolvases, which convert the four-way DNA back to two double strands.
