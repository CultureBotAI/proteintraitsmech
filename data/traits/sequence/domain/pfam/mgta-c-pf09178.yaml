identifier: Pfam:PF09178
label: 4-alpha-glucanotransferase, C-terminal
definition: >-
  Members of this entry, which are predominantly found in prokaryotic 4-alpha-glucanotransferase, adopt a structure composed of six antiparallel β-strands, four of which form a β-sheet and another two form a type I, β-hairpin. The role of this family of domains, has not, as yet, been defined.
