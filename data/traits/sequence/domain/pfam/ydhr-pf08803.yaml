identifier: Pfam:PF08803
label: Putative mono-oxygenase ydhR
definition: >-
  YdhR is a homodimeric protein that comprises of a central four-stranded β sheet and four surrounding α helices. It shows structural homology to the ActVA-Orf6 and YgiN proteins which indicates it could be a mono-oxygenase.
