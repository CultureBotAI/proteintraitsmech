identifier: Pfam:PF30550
label: Cyanobacterial response regulator, helical hairpin domain
definition: >-
  This entry represents a helical hairpin domain of approximately 80 residues found in cyanobacterial two-component response regulators. The domain is positioned between an N-terminal CheY-like receiver domain and a C-terminal DUF3685 domain ( ). Two-component systems are signal transduction pathways where a sensor histidine kinase phosphorylates a response regulator to control cellular responses. This helical hairpin domain may serve as a linker or regulatory element connecting the receiver and output domains. The family is found exclusively in cyanobacteria. The function of this domain remains to be determined.
