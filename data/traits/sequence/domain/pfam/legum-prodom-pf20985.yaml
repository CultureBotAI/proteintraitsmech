identifier: Pfam:PF20985
label: Legumain, prodomain
definition: >-
  This domain is found in the proenzyme form of Vacuolar-processing enzyme (VPE), known as legumain. VPE is an asparagine-specific endopeptidase that plays important roles in many physiological processes, including the maturation of toll-like receptors 3/7/9. The mature active form of VPE is generated by autoproteolytic maturation at acidic pH. In the three-dimensional structure of the proenzyme, this prodomain is located on top of the protease domain, blocking access to the active site. It adopts an α-helical structure, with an activation peptide and a region that assembles into a death domain-like fold at its C-terminal end.
