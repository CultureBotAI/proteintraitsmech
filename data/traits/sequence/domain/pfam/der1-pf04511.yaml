identifier: Pfam:PF04511
label: Der1-like family
definition: >-
  This entry includes Degradation in the endoplasmic reticulum protein 1 (DER1) from yeasts and its homologue Derlin which are components of the endoplasmic reticulum-associated degradation (ERAD) pathway for misfolded lumenal within the endoplasmic reticulum proteins. It facilitates retrotranslocation of misfolded proteins from the ER lumen through the ER membrane in conjunction with HRD1. Substrates insert into the membrane as a hairpin loop with one strand interacting with DER1 and the other with HRD1. Derlins form homotetramers which encircle a large channel traversing the endoplasmic reticulum (ER) membrane. This allows the retrotranslocation of misfolded proteins from the ER into the cytosol where they are ubiquitinated and degraded by the proteasome. The channel has a lateral gate within the membrane which provides direct access to membrane proteins with no need to reenter the ER lumen first. They are also involved in endoplasmic reticulum stress-induced pre-emptive quality control, a mechanism that selectively attenuates the translocation of newly synthesised proteins into the endoplasmic reticulum and reroutes them to the cytosol for proteasomal degradation. Derlin can also indirectly regulate the insulin-like growth factor receptor signalling pathway, by controlling the steady-state expression of the IGF1R receptor, indirectly regulates the insulin-like growth factor receptor signalling pathway.
