identifier: Pfam:PF26495
label: Domain of unknown function (DUF8161) C-terminal domain
definition: >-
  This entry represents the C-terminal domain from a family of uncharacterised proteins in archaea. The proteins are predominantly found in the class Halobacteria, which includes organisms from the orders Halobacteriales and families such as Haloferacaceae, Haloarculaceae, and Natrialbaceae. The proteins in this family are typically around 130-140 amino acids in length. The N-terminal of these proteins is represented by .
