identifier: Pfam:PF25121
label: ESF1 RRM domain
definition: >-
  This domain is found in the yeast Pre-rRNA-processing protein ESF1 and related eukaryotic proteins. ESF1 is involved in the 18S rRNA synthesis and required for the early cleavages at sites A0, A1 and A2. This domain has a detectable similarity to known RNA binding domains.
