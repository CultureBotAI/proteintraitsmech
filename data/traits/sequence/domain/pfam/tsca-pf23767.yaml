identifier: Pfam:PF23767
label: TscA antitoxin
definition: >-
  This protein family, previously known as DUF7166, is found in a variety of staphylococcus phage. It was shown to be the antitoxin TscA of a toxin-antitoxin system, with TscT being the toxin . It is composed of two α helices and a β hairpin and shows weak structural similarity to archaeal prefoldins. Members of this family form a confident homodimer structure with AlphaFold 3.
