identifier: Pfam:PF25449
label: CCDC174 alpha/beta GRSR domain
definition: >-
  This entry represents the α/β GRSR domain in Coiled-coil domain-containing protein 174 (CCDC174) and related proteins. This domain is predicted to adopt a minimal structure that is topologically similar to the classical C2H2 zinc fingers but lacks zinc coordinating residues. Proteins with this domain have a highly conserved GRSR sequence motif, after which the domain was named. CCDC174 is a ubiquitous protein which is restricted to the cell nucleus and co-localises with EIF4A3. Mutations in this gene have been linked to a syndrome characterised by hypotonia (low muscle tone) and psychomotor developmental delay.
