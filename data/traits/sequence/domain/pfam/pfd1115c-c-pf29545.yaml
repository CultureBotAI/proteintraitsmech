identifier: Pfam:PF29545
label: Uncharacterized protein PFD1115c C-terminal domain
definition: >-
  This entry represents the C-terminal domain of uncharacterized protein PFD1115c from Plasmodium falciparum. The full-length protein is expressed during the asexual cell-cycle on the cell surface of host erythrocytes and contains a single transmembrane helix. PFD1115c has been identified as a possible malaria vaccine candidate based on epitope response in sera. This C-terminal region contains coiled coil structures. The specific function of this domain remains to be determined.
