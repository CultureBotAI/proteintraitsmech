identifier: Pfam:PF23812
label: Phage tail assembly chaperone
definition: >-
  This entry represents a putative phage tail assembly chaperone protein protein family found primarily in viruses that infect bacteria. Members are typically around 100 amino acids in length. Tail assembly chaperones are known to assist in forming and attaching phage tails. This entry is found in caudoviruses of several families including Myoviridae, Podoviridae and Siphoviridae, but is not universal in phages.
