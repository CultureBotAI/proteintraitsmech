identifier: Pfam:PF27197
label: YomX C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YomX, an uncharacterised protein from Bacillus subtilis, and similar sequences from tailed bacteriophages and bacterial prophages. YomX is a 216 amino acid protein (gene BSU21190) derived from the SPbeta prophage in Bacillus subtilis strain 168. The specific function of this domain remains to be determined.
