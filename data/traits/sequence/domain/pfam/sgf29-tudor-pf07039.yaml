identifier: Pfam:PF07039
label: SGF29 tudor-like domain
definition: >-
  SAGA-associated factor 29 (SGF29) is involved in transcriptional regulation as a chromatin reader component of some histone acetyltransferase (HAT) SAGA-type complexes like the TFTC-HAT, ATAC or STAGA complexes. SGF29 specifically recognises and binds methylated 'Lys-4' of histone H3 (H3K4me), with a preference for the trimethylated form (H3K4me3). It also may be involved in MYC-mediated oncogenic transformation. This entry represents the two tandem tudor-like domains found at the C-terminal of yeast and human SAGA-associated factor 29 proteins and the plant homologues. Each of them has a negatively-charged pocket capable of binding H3A1 and an aromatic cage for the recognition of H3K4me2/3 residues.
