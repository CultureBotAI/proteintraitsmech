identifier: Pfam:PF17950
label: S-adenosylmethionine decarboxylase N -terminal
definition: >-
  This is the N-terminal domain found in human spermine synthase. The N-terminal domain, which forms the major part of the dimerization interface, shows a considerable structural similarity to the AdoMetDC-like fold (S-adenosylmethionine decarboxylase, the enzyme that forms the aminopropyl donor substrate). Deletion of the N-terminal domain led to a complete loss of spermine synthase activity, suggesting that dimerization may be required for activity. The N-terminal domain (amino acids 1-117) includes seven β-strands and two α-helices.
