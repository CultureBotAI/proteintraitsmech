identifier: Pfam:PF08793
label: 2-cysteine adaptor domain
definition: >-
  The virus-specific 2-cysteine adaptor is found fused to OTU/A20-like peptidases and S/T protein kinases. The associations to these proteins indicate that they might function as viral adaptors connecting the kinases and OTU/A20 peptidases to specific targets.
