identifier: Pfam:PF04033
label: Domain of unknown function (DUF365)
definition: >-
  This entry represents a PUA-like domain found in Large ribosomal subunit protein uL22 from Ureaplasma parvum, Small ribosomal subunit protein uS3 from Mycoplasma penetrans and related sequences found in archaea and bacteria. uL22 binds specifically to 23S rRNA. Its binding is stimulated by other ribosomal proteins, e.g. L4, L17, and L20. It plays an important role during the early stages of 50S assembly. It makes multiple contacts with different domains of the 23S rRNA in the assembled 50S subunit and ribosome. uS3 binds the lower part of the 30S subunit head. It binds mRNA in the 70S ribosome, positioning it for translation.
