identifier: Pfam:PF12209
label: Leucine permease transcriptional regulator helical domain
definition: >-
  This domain is found in fungal proteins, including the nuclear mRNA export protein SAC3. It has been suggested this domain provides a scaffold within the yeast Sac3:Cdc31:Sus1:Thp1 (TREX-2) complex to integrate interactions between protein complexes to facilitate the coupling of transcription and mRNA export during gene expression.
