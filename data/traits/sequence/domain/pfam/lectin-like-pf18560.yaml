identifier: Pfam:PF18560
label: Lectin like domain
definition: >-
  This is a lectin like domain found in Cwp84, a surface-located cysteine protease (a member of the C1A cysteine protease family, also known as papain proteases) responsible for the maturation of the SlpA precursor protein which has been implicated in the degradation of extracellular matrix proteins such as fibronectin, laminin and vitronectin. Structural comparison indicates that this domain is similar to carbohydrate-binding domains.
