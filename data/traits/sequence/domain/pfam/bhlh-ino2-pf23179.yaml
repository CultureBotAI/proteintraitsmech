identifier: Pfam:PF23179
label: INO2 bHLH domain
definition: >-
  The founding member of this family is the bHLH domain of yeast protein INO2. It is mainly found in saccharomycetales and pichiales yeast. This protein is a positive regulatory factor involved in the transcriptional regulation of phospholipid biosynthetic genes. INO2 forms a heterodimer with INO4 and this complex specifically recognises the inositol/choline-responsive element, followed by the transcription activation of the phospholipid biosynthetic gene. Ternary INO2(bHLH)/INO4(bHLH)/DNA complex showed that the recognition and binding of promoter DNA is mediated by the presence of both protein domains. There's no known homologue of INO2 protein in Schizosaccharomyces pombe.
