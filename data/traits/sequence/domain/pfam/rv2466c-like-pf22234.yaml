identifier: Pfam:PF22234
label: Mycothiol-dependent nitroreductase Rv2466c
definition: >-
  This entry represents a family of proteins mainly found in actinomycetes, including thioredoxin-like reductase Rv2466c from Mycobacterium tuberculosis. Rv2466c is a key oxidoreductase that mediates the reductive activation of TP053, a thienopyrimidine derivative that kills replicating and non-replicating M.tuberculosis. This enzyme transforms nitro-containing compounds to their corresponding amine and uses as a cofactor, a low molecular weight sugar thiol, mycothiol. This protein adopts a thioredoxin-like fold and forms a unique homodimer in which the C-terminal β-strand is swapped between the thioredoxin domains of each subunit. Rv2466c undergoes significant conformational changes upon formation of its oxidised state.
