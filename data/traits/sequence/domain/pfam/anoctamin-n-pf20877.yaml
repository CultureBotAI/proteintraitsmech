identifier: Pfam:PF20877
label: Alpha-beta plait domain in TMEM16 lipid scramblase
definition: >-
  This entry represents an α/β plait domain found at the N-terminal of a group of fungal TMEM16 family of proteins, also known as anoctamins, including from Aspergillus fumigatus and ist2 from S.pombe. Proteins in this entry operate as Ca2-activated lipid scramblases. This domain may play a role in dimerisation, although the precise function of this domain is uncertain.
