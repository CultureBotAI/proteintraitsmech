identifier: Pfam:PF29251
label: Archaeoglobus AF_2183-like domain
definition: >-
  This entry represents a group of uncharacterised proteins mainly found in Archaeoglobus, including AF_2183. The Archaeoglobus fulgidus genome encodes five paralogues containing this domain. The domain is approximately 100-160 residues long. Some family members are predicted to be membrane-associated proteins, whilst others contain signal peptides. The function of this family remains to be determined.
