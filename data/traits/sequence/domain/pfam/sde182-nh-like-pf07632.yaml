identifier: Pfam:PF07632
label: Cellulose-binding Sde182, nucleoside hydrolase-like domain
definition: >-
  This entry represents a Rossmann-related domain found in bacterial and fungal proteins, including Cellulose-binding protein from Saccharophagus degradans ( ). This protein, which seems to have capacity to bind plant carbohydrates, contain carbohydrate-binding modules (CBMs) together with a C-terminal domain of unknown function that is organised into two subdomains. This entry represents the N-terminal region of this C-terminal domain. It adopts an α/β configuration with a central β-sheet of eight β-strands surrounded by 12 α-helices and shows structural similarity to some ribonucleoside hydrolases (NH).
