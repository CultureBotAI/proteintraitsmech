identifier: Pfam:PF08939
label: Basophilic leukemia-expressed protein Bles03
definition: >-
  This family includes Basophilic leukemia-expressed protein Bles03 (also known as UPF0696 protein C11orf68, ) and various uncharacterised proteins of unknown function from eukaryotes, bacteria and archaea. Bles03 shows a two-layer sandwich architecture with a a nine-stranded β-sheet, three α-helices on each side and one solvent-exposed amino-terminal α-helix. This protein has been suggested to have phosphothreonine lyase activity and to play a role in the biosynthesis of dehydro amino acids.
