identifier: Pfam:PF30009
label: USA1 ubiquitin-like domain
definition: >-
  This entry represents the ubiquitin-like domain found in the middle region of USA1 and related proteins found in yeasts. This middle region is required for HRD1 trans-ubiquitination and degradation. The domain facilitates substrate ubiquitylation and is important for optimal function of the HRD1 ubiquitin ligase complex. USA1 is a scaffold protein of the endoplasmic reticulum-associated degradation (ERAD) pathway involved in the ubiquitin-dependent degradation of misfolded ER proteins. USA1 functions as a scaffold within the HRD1 complex, recruiting DER1 and regulating HRD1 activity in both ERAD-L and ERAD-M pathways.
