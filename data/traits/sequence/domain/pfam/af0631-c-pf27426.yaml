identifier: Pfam:PF27426
label: AF0631-like C-terminal four-helix domain
definition: >-
  This entry represents the C-terminal domain of AF0631-like proteins found in archaea. This domain is composed of four short α-helical segments. The family is found predominantly in Archaeoglobi, including Archaeoglobus, Geoglobus, and Ferroglobus species. The specific function of this C-terminal four-helix domain remains to be determined.
