identifier: Pfam:PF25267
label: TANGO6 N-terminal domain
definition: >-
  This domain is found in the Transport and Golgi organisation protein 6 homolog (TANGO6) and related proteins. It is predicted to fold into an array of α-helices. TANGO6 associates with COPI vesicles. Cytoplasmic TANGO6 tethers to COPI vesicle via a signal anchor and two transmembrane domains. Its N- and C-terminal cytoplasmic domains capture RNA polymerase II subunit B (RPB) 2 in the cis-Golgi during the G1 phase. TANGO6 is also observed in the nucleus where it enters via the COPI-SNARE-ER pathway. The nuclear entry of TANGO6 is assisted by KPNB1.
