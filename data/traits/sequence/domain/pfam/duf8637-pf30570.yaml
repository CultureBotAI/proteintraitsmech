identifier: Pfam:PF30570
label: Domain of unknown function (DUF8637)
definition: >-
  This entry represents a family of uncharacterised proteins approximately 150 residues in length. Members are found in Cyanobacteriota and in cyanophages. Some members are annotated as putative serine hydroxymethyltransferases but this has not been experimentally verified. The function of this family remains to be determined.
