identifier: Pfam:PF28352
label: Retinitis pigmentosa 9 protein N-terminal domain
definition: >-
  This entry represents the N-terminal helix of RP9 proteins, also known as Pim-1-associated protein. RP9 is thought to be a target protein for the PIM1 kinase and may play roles in B-cell proliferation. The protein is nuclear localised and interacts with PIM1 and ZNHIT4. This N-terminal region contains the PIM1 binding region and extensive disordered regions. The protein is involved in RNA splicing and is associated with the signal recognition particle receptor complex. Mutations in RP9 cause retinitis pigmentosa 9, an autosomal dominant retinal dystrophy.
