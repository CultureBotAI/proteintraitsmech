identifier: Pfam:PF25139
label: Secreted LysM effector LysM14, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Secreted LysM effector LysM3, 6, 9 and 14 from Penicillium expansum, which might have a role in sequestration of chitin oligosaccharides to dampen host defence. This domain is predicted to have a mainly β configuration.
