identifier: Pfam:PF18237
label: Tk-SP N-propeptide domain
definition: >-
  This is the N-propeptide domain found in Tk-SP, a subtilisin-like serine protease from Thermococcus kodakaraensis. The β sheet of this domain packs tightly to the two nearly parallel α helices 2 and 3 located at the surface of the subtilisin domain. Gln105 and Asp107 of the N-propeptide domain also bind to the N-termini of these two α-helices to form helix caps.
