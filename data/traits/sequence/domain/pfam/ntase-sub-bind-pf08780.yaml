identifier: Pfam:PF08780
label: Nucleotidyltransferase substrate binding protein like
definition: >-
  The member of this family from Haemophilus influenzae, Probable ribonuclease HepT (also known as HI0074), is an homologue of the mRNA nuclease HepT (SO_3166) from Shewanella oneidensis, being probably the toxic component of a type VII toxin-antitoxin (TA) system. It contains a HEPN (higher eukaryotes and prokaryotes nucleotide-binding) domain containing a RX4-6H motif whose conformations are remarkably different form SO_3166, indicating that they have different substrate-binding specificities. It forms a complex with HI0073 ( ), encoded by the adjacent gene, which contains a nucleotidyltransferase nucleotide binding domain ( ).
