identifier: Pfam:PF23452
label: Hydroxyproline O-arabinosyltransferase family N-terminal domain
definition: >-
  The Hydroxyproline O-arabinosyltransferase family is comprised of glycosyltransferases involved in the post-translational modification of plant proteins. Members of this family catalyse the transfer of L-arabinose to the hydroxyl group of hydroxyproline (Hyp) residues in target proteins, such as extensins and small signalling peptides. This modification is crucial for the proper function of these proteins, which play roles in plant structure and signalling. In legumes, some family members are also implicated in the autoregulation of nodulation (AON), a process that controls the number of root nodules formed in response to nitrogen availability and rhizobial colonisation. They function upstream of receptor kinases like SUNN and through CLE peptides to regulate long-distance signalling events between the root and shoot. This domain is also found in SERGT1, also known as AtSGT1, a peptidyl serine O-alpha-galactosyltransferase.
