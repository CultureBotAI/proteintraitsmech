identifier: Pfam:PF01595
label: Cyclin M transmembrane N-terminal domain
definition: >-
  Proteins containing the ancient conserved domain protein/cyclin M (CNNM) are integral membrane proteins that are conserved from bacteria to humans. CNNM family members influence metal ion homeostasis through mechanisms that may not involve direct membrane transport of the ions. Structurally, CNNMs are complex proteins that contain an extracellular N-terminal domain preceding a transmembrane domain, a "Bateman module", which consists of two cystathionine-beta-synthase (CBS) domains, and a C-terminal cNMP (cyclic nucleotide monophosphate) binding domain. The CNNM transmembrane domain contains four hydrophobic regions and forms a dimer through hydrophobic contacts between TM2 and TM3, in which each chain is composed of three transmembrane helices (TM1-3), a pair of short helices exposed on the intracellular side, and a juxtamembrane (JM) helix that forms a belt-like structure. The homodimer adopts an inward-facing conformation with a negatively charged cavity containing a conserved pi-helical turn in TM3 that coordinates a Mg2 ion.
