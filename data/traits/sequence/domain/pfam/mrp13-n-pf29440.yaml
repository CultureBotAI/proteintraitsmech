identifier: Pfam:PF29440
label: MRP13-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of MRP13 and related mitochondrial ribosomal yeast proteins. MRP13 is a component of the small ribosomal subunit (mS27) of the mitochondrial ribosome. This domain follows the mitochondrial transit peptide and comprises approximately 90 amino acids of the mature protein. The domain contains multiple α-helical regions and is part of the structural framework of the 37S mitochondrial small ribosomal subunit. The specific function of this domain remains to be determined.
