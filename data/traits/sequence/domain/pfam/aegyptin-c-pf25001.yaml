identifier: Pfam:PF25001
label: Aegyptin, C-terminal domain
definition: >-
  This entry represents a four-helix bundle found at the C-terminal of Aegyptin and salivary IL-4-inducing protein from Aedes aegypti and as the only structural domain in gSG7 salivary protein from Anopheles sp. Aegyptin modulates blood feeding of female mosquitoes on vertebrate hosts. This domain is predicted to adopt an all alpha configuration. Salivary IL-4-inducing protein induces expression of IL4 in host skin by diverting host CD4 cells away from Th1 and towards Th2 responsiveness. It induces expression of IL10 in host skin and it down-regulates expression of IL12B, IFN-gamma (IFNG) and TNF-alpha (TNF) in host skin. gSG7 salivary protein potently inhibits the alternative pathway of complement system activation in the host while having no inhibitory effect on the classical or lectin pathways. It binds and stabilises activated host C3-convertase complex C3bBb (C3-CFB) and inhibits its convertase activity. It enhances accumulation of C3bBb on immobilised properdin. This domain is also found in Simplagrin from Simulium nigrimanum which inhibits host platelet aggregation induced by low concentrations of collagen via blocking the von Willebrand Factor (VWF) interaction with collagen.
