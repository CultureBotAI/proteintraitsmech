identifier: Pfam:PF13603
label: Leucyl-tRNA synthetase, editing domain
definition: >-
  This entry represents the editing domain (known as CP1 domain) of Leucyl-tRNA synthetase ( ), which hydrolyses mischarged tRNALeu. In the case of Leucyl-tRNA synthetase, the β-strands that link the CP1 domain to the aminoacylation core of the protein are also required for editing activity.
