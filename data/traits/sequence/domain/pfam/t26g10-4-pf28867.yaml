identifier: Pfam:PF28867
label: T26G10.4 domain
definition: >-
  This entry represents a conserved domain named after the prototypical member T26G10.4 from Caenorhabditis elegans. The domain is approximately 130 amino acids in length and can be found in various positions within proteins, including C-terminal and internal locations. The domain is conserved across nematodes and some species of arthropods. The specific function of this domain remains to be determined.
