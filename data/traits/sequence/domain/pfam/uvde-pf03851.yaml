identifier: Pfam:PF03851
label: UV-endonuclease UvdE
definition: >-
  Proteins in this family are a group of endonucleases for the repair of UV-irradiated DNA. Schizosaccharomyces pombe ultraviolet damage endonuclease (UVDE or Uve1p) is involved in the excision of cyclobutane pyrimidine dimers (CPD) and 6-4 pyrimidine pyrimidones (6-4PP) which forms the UV damage repair (UVDR) pathway. It also functions also in oxidative damage repair in vivo. It provides back-up AP endonuclease activity to apn2 together with apn1. This DNA repair pathway was originally thought to be specific for UV damage, however Uve1p also recognises UV-induced bipyrimidine photoadducts and other non-UV-induced DNA adducts.
