identifier: Pfam:PF26536
label: REH2 DRSM domain
definition: >-
  This entry represents a DSRM domain found in RNA editing associated helicase 2 (REH2) and similar eukaryotic proteins. The RNA editing-associated helicase 2 family is involved in mitochondrial mRNA editing, a crucial process that includes the addition and deletion of uridine nucleotides in pre-mRNA. These proteins function as ATP-dependent RNA helicases that unwind RNA in a 3' to 5' direction. They play a significant role in the assembly of mRNA-gRNA hybrids and the recruitment of the RNA editing core complex. These proteins regulate various steps of mRNA editing, including the loading of unedited mRNA and editing progression across multiple sequence blocks. Additionally, it influences the RNA substrate content and the association of editing complexes with mitoribosomes. These proteins are part of the REH2-associated complex, interacting with various editing complexes and mitochondrial ribosomes.
