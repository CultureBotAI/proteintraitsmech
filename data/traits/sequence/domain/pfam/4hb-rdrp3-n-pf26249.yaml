identifier: Pfam:PF26249
label: RdRP3/4/5, N-terminal four helical bundle domain
definition: >-
  This domain is found N-terminal in the plant probable RDR3, RDR4 and RDR5. This domain is not present in RDR1, RDR2 and RDR6. It is predicted to fold into a four α-helical bundle. RDR3, RDR4 and RDR5 are probably involved in the RNA silencing pathway and required for the generation of small interfering RNAs (siRNAs). RNA dependent RNA polymerases (RDRP) enzymes (RDRP; ) are involved in the amplification of regulatory microRNAs during post-transcriptional gene silencing; they are also required for transcriptional gene silencing. Double-stranded RNA has been shown to induce gene silencing in diverse eukaryotes by a variety of pathways. These enzymes also play a role in the RNA interference (RNAi) pathway, which is important for heterochromatin formation, accurate chromosome segregation, centromere cohesion, and telomere function during mitosis and meiosis. RDRP enzymes are highly conserved in most eukaryotes but are missing in archaea and bacteria. The core catalytic domain of RDRP enzymes is structurally similar to the beta' subunit of DNA-dependent RNA polymerases (DDRP); however, the other domains of DDRP show no similarity to those of RDRP.
