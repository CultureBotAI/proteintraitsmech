identifier: Pfam:PF09021
label: HutP
definition: >-
  The HutP protein regulates the expression of Bacillus 'hut' structural genes by an anti-termination complex, which recognises three UAG triplet units, separated by four non-conserved nucleotides on the RNA terminator region. L-Histidine and Mg2+ ions are also required. These proteins exhibit the structural elements of alpha/beta proteins, arranged in the order: α-α-β-α-α-β-β-β in the primary structure, and the four antiparallel β-strands form a β-sheet in the order beta1-beta2-beta3-beta4, with two α-helices each on the front (alpha1 and alpha2) and at the back (alpha3 and alpha4) of the β-sheet.
