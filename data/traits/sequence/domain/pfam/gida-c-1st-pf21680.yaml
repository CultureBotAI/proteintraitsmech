identifier: Pfam:PF21680
label: tRNA modifying enzyme MnmG/GidA C-terminal helical domain
definition: >-
  This entry represents the first helices of the GidA associated domain, the C-terminal domain of MnmG (also known as GidA). This domain consists of several helices, the last three being rather short and forming small bundle (covered in ). GidA is an tRNA modification enzyme found in bacteria and mitochondrial. Based on mutational analysis this domain has been suggested to be implicated in binding of the D-stem of tRNA and, in particular the small bundle, to be responsible for the interaction with protein MnmE ( ). Structures of GidA in complex with either tRNA or MnmE are missing.
