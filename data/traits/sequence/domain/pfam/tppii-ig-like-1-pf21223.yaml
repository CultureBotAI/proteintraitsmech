identifier: Pfam:PF21223
label: Tripeptidyl-peptidase II, first Ig-like domain
definition: >-
  Tripeptidyl peptidase II (TPPII) is a crucial component of the proteolytic cascade acting downstream of the 26S proteasome in the ubiquitin-proteasome pathway. It is an amino peptidase belonging to the subtilase family removing tripeptides from the free N terminus of oligopeptides. This protein adopts a dimeric assembly. Each monomer is organised into three main parts: the N-terminal subtilisine-like domain ( ) a central domain and C-terminal domain ( ). The central domain can be subdivided into two Ig-like domains and a GBD-like domain ( ). This entry represents the first Ig-like domain, while represents the second one.
