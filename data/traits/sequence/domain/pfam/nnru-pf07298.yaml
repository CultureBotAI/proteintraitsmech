identifier: Pfam:PF07298
label: NnrU protein
definition: >-
  This entry represents a domain found in bacterial NnrU proteins. It can also be found in plant 15-cis-zeta-carotene isomerase (Z-ISO). NnrU is thought to be involved in the reduction of nitric oxide. The exact function of NnrU is unclear. It is thought however that NnrU and perhaps NnrT are required for expression of both nirK and nor. Plant Z-ISO is an isomerase involved in the biosynthesis of carotenoids. It catalyses the cis- to trans-conversion of the 15-cis-bond in 9,15,9'-tri-cis-ζ-carotene.
