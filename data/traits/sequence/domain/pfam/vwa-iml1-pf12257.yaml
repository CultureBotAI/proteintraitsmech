identifier: Pfam:PF12257
label: Vacuolar membrane-associated protein Iml1, vWA-like domain
definition: >-
  This domain is found towards the N-terminal of vacuolar membrane-associated protein Iml1 and related proteins. These proteins also contain a DEP domain, which is a globular domain of about 80 residues. This entry includes vacuolar membrane-associated protein Iml1 and DEP domain-containing protein 5/DDB_G0279099. In Saccharomyces cerevisiae, Iml1 is a subunit of both the SEA (Seh1-associated) and Iml1 complexes (Iml1-Npr2-Npr3). SEA complex is associates dynamically with the vacuole and is involved in autophagy. Iml1 complex is required for non-nitrogen-starvation (NNS)-induced autophagy.
