identifier: Pfam:PF16892
label: Chitin biosynthesis protein CHS5 N-terminus
definition: >-
  This domain is found at the N-terminal of the fungal chitin biosynthesis protein Chs5. It functions as a dimerisation domain. Chs5/6 is a multi-protein complex conserved in fungi that interacts with chitin synthase III (Chs3p) and is involved in its transport to the cell surface from the trans-Golgi network, functioning as an exomer cargo adapter. Chs5p appears to form a complex with Chs6p and its paralogues Bch1p, Bud7p, and Bch2p. In this complex, Chs5p may act as a central scaffold. The N-terminal domain characterised by this model forms a homodimer and has been shown to interact with Chs6p and Bch1p. It may function as a flexible hinge domain that allows the exomer to interact with both proteins and the Golgi membrane as the latter undergoes changes in curvature during the formation of transport vesicles. The dimerisation domain sits N-terminally to a conserved FBE (FN3-BRCT) unit, which binds Arf1 and is involved in the recruitment of the exomer to the membrane.
