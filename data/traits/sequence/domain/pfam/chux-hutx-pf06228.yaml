identifier: Pfam:PF06228
label: Haem utilisation ChuX/HutX
definition: >-
  This entry represents the homologues of intracellular heme transport protein HutX. HutX is a member of the conserved heme utilization operon from pathogenic E. coli, and includes ChuS, HutX, HuvX, HugX, and ShuX in proteobacteria, among others. It forms a dimer which displays a very similar fold and organization to the monomeric structure of other heme utilization proteins such as HemS, ChuS, HmuS, PhuS; these latter occurring as duplicated domains. They all bind heme via a key conserved histidine. The genes encoded within these heme utilization operons enable the effective uptake and utilization of heme as an iron source in pathogenic microorganisms to enable multiplication and survival within hosts they invade. In E. coli O157:H7, HutX forms a dimer with a very similar fold to the monomer structure of two other heme utilization proteins, ChuS and HemS, despite low sequence homology. ChuX has been shown to bind heme in a 1:1 manner, inferring that the ChuX homodimer could coordinate two heme molecules in contrast to only one heme molecule bound in ChuS and HemS.
