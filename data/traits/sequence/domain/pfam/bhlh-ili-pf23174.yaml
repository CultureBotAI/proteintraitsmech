identifier: Pfam:PF23174
label: ILI bHLH domain
definition: >-
  This entry represents the paclobutrazol-resistant (PRE) family of helix-loop-helix (HLH) factors, including PRE1-6 from Arabidopsis and Increased Leaf Inclination (ILI) family of atypical bHLH transcription factors in rice. The members of this family ILI1/2/3/4/5/6/7 lack the basic region for DNA binding and have been implicated in brassinosteroids signalling. They are involved in development in Arabidopsis and rice. They lack the basic domain required for DNA binding but dimerises with DNA binding bHLH factors to inhibit their DNA binding. Moreover, they also antagonize their interacting HLH or bHLH proteins.
