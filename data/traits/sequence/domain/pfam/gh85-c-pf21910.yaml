identifier: Pfam:PF21910
label: GH85 endohexosaminidases, C-terminal domain
definition: >-
  This entry represents the D2 domain of Endo-beta-N-acetylglucosaminidase D (EndoD, ) from Streptococcus pneumoniae and similar sequences, which belong to family 85 of glycoside hydrolases (GH85 endohexosaminidases). These enzymes cleave the glycosidic linkage between the two N-acetylglucosamine units that make up the chitobiose core of N-glycans.This domain adopts a typical fibronectin Ig-like fold.
