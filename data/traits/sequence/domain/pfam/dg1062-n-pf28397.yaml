identifier: Pfam:PF28397
label: DG1062 N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in DG1062 which is a CudA-like protein. This domain adopts an immunoglobulin-like fold and is found at the N-terminal region of transcriptional regulators including CudA from Dictyostelium discoideum and is the second domain in SHA/SHB from Arabidopsis thaliana. The CudA protein is essential for normal culmination in the social amoeba and functions as a transcriptional regulator with sequence-specific DNA binding activity. SHA/SHB are SH2 domain-containing proteins predicted to be transcription factors. The function of this domain is not clear.
