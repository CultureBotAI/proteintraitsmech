identifier: Pfam:PF22763
label: NrS-1  polymerase HBD domain
definition: >-
  This entry represents the helix bundle domain (HBD) domain of NrS-1 polymerase (NrSPol) which together with the N-terminal Prim/Pol domain, is responsible for DNA polymerization and de novo primer synthesis activities. This domain is critical for the primer synthesis activity of NrS-1 polymerase. Members of this group are found in tailed bacteriophages and prokaryotes.
