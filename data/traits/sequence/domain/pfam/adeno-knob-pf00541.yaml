identifier: Pfam:PF00541
label: Adenoviral fibre protein (knob domain)
definition: >-
  Adenoviruses are responsible for diseases such as pneumonia, cystitis, conjunctivitis and diarrhoea, all of which can be fatal to patients who are immunocompromised. Viral infection commences with recognition of host cell receptors by means of specialised proteins on viral surfaces. Specific attachment of adenovirus is achieved through interactions between host-cell receptors and the adenovirus fibre protein and is mediated by the globular carboxy-terminal domain of the adenovirus fibre protein, termed the carboxy-terminal knob domain. Fibre protein forms spikes that protrude from each vertex of the icosahedral capsid. Fibre proteins are shed during virus entry, when virus is still at the cell surface.
