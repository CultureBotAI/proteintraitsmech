identifier: Pfam:PF27564
label: APC1 C-terminal helical domain
definition: >-
  This entry represents the C-terminal helical domain found in APC1 in nematodes. Its specific function remains to be determined. APC1 is the largest of the subunits of the anaphase-promoting complex or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. The APC/C complex mediates ubiquitination and degradation of target proteins and is essential for the metaphase to anaphase transition during both meiosis and mitosis. Infection of human fibroblasts with human cytomegalovirus (HCMV) leads to cell cycle dysregulation, which is associated with the inactivation of the anaphase-promoting complex.
