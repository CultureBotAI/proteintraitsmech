identifier: Pfam:PF23581
label: Domain of unknown function (DUF7135)
definition: >-
  This domain of unknown function is found N-terminal in a group of uncharacterised proteins specific to plants, including Protein CYPRO4 from Cynara cardunculus (cardoon). This domain is predicted to adopt a β-barrel with topology typical for PH domains. It has a weak sequence similarity to Dcp1 PH domain.
