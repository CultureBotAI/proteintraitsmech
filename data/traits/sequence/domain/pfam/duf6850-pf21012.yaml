identifier: Pfam:PF21012
label: Family of unknown function (DUF6850)
definition: >-
  This entry corresponds to a functionally unknown domain found in bacteria, and it is probable that it folds as an outer-membrane β-barrel.(OMBBs). OMBBs are found in the outer membrane of gram-negative bacteria and eukaryotic organelles. OMBBs fold as antiparallel β-sheets that close onto themselves, forming pores that traverse the membrane.
