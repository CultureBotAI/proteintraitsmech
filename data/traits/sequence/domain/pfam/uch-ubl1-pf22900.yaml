identifier: Pfam:PF22900
label: Ubiquitin carboxyl-terminal hydrolases, Ubiquitin-like 1
definition: >-
  This entry represents a Ubiquitin-like domain found in a ubiquitin carboxyl-terminal hydrolases, such as UBP24, USP9X and USP9Y from human and its orthologue from Drosophila, the probable ubiquitin carboxyl-terminal hydrolase FAF. UCHs are thiol proteases that recognise and hydrolyse the peptide bond at the C-terminal glycine of ubiquitin. UBP24 regulates cell survival in various contexts through modulating the protein stability of some of its substrates including DDB2, MCL1 or TP53. It plays a positive role on ferritinophagy where ferritin is degraded in lysosomes and releases free iron. USP9X and USP9Y are involved in deubiquitination of target proteins. USP9X is also involved in the processing of ubiquitin precursors and therefore, it may play an important regulatory role at the level of protein turnover by preventing degradation of proteins.
