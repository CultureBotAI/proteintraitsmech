identifier: Pfam:PF28411
label: Four-jointed box protein middle domain
definition: >-
  This entry represents the kinase-like domain found in four-jointed box proteins (FJX1/FJ family). In Drosophila, the four-jointed protein is a functional Golgi-resident serine/threonine kinase that phosphorylates cadherin domains of Fat and Dachsous proteins during their transit through the Golgi apparatus. The kinase activity is essential for planar cell polarity and growth regulation. In contrast, vertebrate FJX1 proteins are secreted and act as inhibitors of dendrite extension and branching. The domain is found in secreted proteins that undergo glycosylation and proteolytic processing.
