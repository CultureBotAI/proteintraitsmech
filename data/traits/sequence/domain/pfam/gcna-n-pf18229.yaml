identifier: Pfam:PF18229
label: N-acetyl-beta-D-glucosaminidase N-terminal domain
definition: >-
  This is the N-terminal domain found in N-acetyl-beta-D-glucosaminidase (GcnA) present in Streptococcus gordonii. GcnA is a family 20 glycosidase that cleaves N-acetyl-beta-D-glucosamine and N-acetyl-beta-D-galactosamine from 4-methylumbelliferylated substrates. Similar N-terminal domains have been observed in all family 20 glycosidases although the number of β-sheet strands may vary from five.
