identifier: Pfam:PF26049
label: RLMG N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Ribosomal RNA large subunit methyltransferase G (RlmG) and similar proteins mainly found in proteobacteria and actinomycetes. RlmG is a specific S-adenosylmethionine (AdoMet)-dependent methyltransferase responsible for N2-methylation of guanine at position 1835 (m2G1835) in 23S rRNA. The modified G1835 is located on the 50S subunit side of the intersubunit bridge B2, a functionally important region of the ribosome. This methylation enhances the association of ribosomal subunits and provides a significant advantage to bacteria under osmotic and oxidative stress conditions. RlmG contains two homologous domains arranged in tandem.
