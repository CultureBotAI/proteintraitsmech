identifier: Pfam:PF25186
label: Type I Thoeris inhibitor Tad4
definition: >-
  This entry represents the Tad4 family of phage proteins that inhibit the bacterial Type I Thoeris defence system. Tad4 binds directly to ThsB and blocks its active site via a conserved loop region, preventing production of the immune signalling molecule gcADPR. Interestingly, Tad4 can also bind and inhibit plant and human TIR domain proteins including BdTIR and SARM1. These proteins form a small helical bundle domain structure. This family also includes bacterial prophages.
