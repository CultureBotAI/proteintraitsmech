identifier: Pfam:PF29875
label: Nucleotide exchange factor Sil1 small beta-sheet domain
definition: >-
  This entry represents a small β-sheet domain located towards the N-terminal in Sil1 nucleotide exchange factors found in eukaryotes. Sil1 functions as a nucleotide exchange factor for HSP70 family chaperones in the endoplasmic reticulum lumen. The protein is required for protein translocation and folding in the endoplasmic reticulum. Sil1 contains a signal peptide for ER targeting, multiple N-linked glycosylation sites.
