identifier: Pfam:PF26472
label: Domain of unknown function (DUF8147)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins are predominantly found in the class Halobacteria, which includes various genera such as Halorubrum, Haloarcula, and Natrialba. The domain is typically found in proteins ranging from 59 to 484 amino acids in length. The proteins in this family are integral membrane proteins usually with four transmembrane helices.
