identifier: Pfam:PF27641
label: SIP5 protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of fungal Protein SIP5 and plant E3 ubiquitin-protein ligase DA2. In Botrytis cinerea, SIP5 may negatively regulate the SNF1 kinase and is localised to the cytoplasm. The protein contains multiple disordered regions throughout its length. DA2 is involved in the regulation of organ and seed size. It functions synergistically with DA1 to regulate seed size and with DA1 to restrict cell proliferation in the maternal integuments of ovules and developing seeds. The N-terminal region contains areas enriched in basic and acidic residues. The specific function of this domain remains to be determined.
