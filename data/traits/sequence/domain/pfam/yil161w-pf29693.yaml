identifier: Pfam:PF29693
label: Uncharacterised protein YIL161W
definition: >-
  This entry represents uncharacterised protein YIL161W from Saccharomyces cerevisiae. This protein is localised to the cytoplasm and is subject to ubiquitination at lysine residues 16 and 35. YIL161W is predicted to be involved in nonfunctional rRNA decay and has been observed in stress granules. The protein has a large disordered N-terminal region. The function of this protein remains to be determined.
