identifier: Pfam:PF21972
label: 'Nuclear-export cofactor Arc1p '
definition: >-
  This entry represents a domain found N-terminal in the nuclear-export cofactor Arc1 (Arc1-N) from yeast and related proteins. Arc1-N and GluRS-N are known to be necessary and sufficient for formation of the yeast aaRS complex in vivo and in vitro. They are likely to form a stable complex with each other. Arc1-N adopts a fold similar to the C-terminal domain of glutathione S-transferase (GST-C). This domain is also found at the C-terminal of the Arc1 homologue AIMP3/p18, a human translation elongation factor 1 which is associated with the multi-tRNA synthetase complex via its specific interaction with methionyl-tRNA synthetase, and also works as a tumor suppressor by interacting with ATM, the upstream kinase of p53. This domain was also identified in bifunctional glutamate/proline--tRNA ligase, a multifunctional protein which primarily functions within the aminoacyl-tRNA synthetase multienzyme complex.
