identifier: Pfam:PF29933
label: YomK prophage membrane protein
definition: >-
  This entry represents YomK, a 148 amino acid membrane protein from the SPbeta prophage of Bacillus subtilis. The protein contains two transmembrane helices (residues 72-92 and 104-124) and is predicted to be localised to the cell membrane. YomK is found in proteins across Bacillales and Tissierellales. The function of this protein remains to be determined.
