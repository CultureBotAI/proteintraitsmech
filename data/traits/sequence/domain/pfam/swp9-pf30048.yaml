identifier: Pfam:PF30048
label: Spore wall protein 9
definition: >-
  This entry represents the spore wall protein 9 (SWP9) and related proteins in microsporidian parasites. SWP9 is involved in adherence of spores to the host cell surface and in infection efficiency. The protein interacts with SWP7 and is localised to the spore wall and polar tube of mature spores. SWP9 is expressed at all developmental stages and is found across Microsporidia including Nosema and Encephalitozoon species.
