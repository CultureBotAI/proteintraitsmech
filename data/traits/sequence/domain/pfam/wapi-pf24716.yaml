identifier: Pfam:PF24716
label: Immunity protein WapI-like family
definition: >-
  The WapI family comprises immunity proteins that are part of a toxin-immunity protein module functioning as a cellular contact-dependent growth inhibition (CDI) system. These proteins neutralize the tRNase activity of their cognate toxin WapA upon expression in E.coli. Notably, they do not inhibit WapA from other strains of Bacillus subtilis. The WapA C-terminal cannot be expressed independently in E.coli, but can be cloned when its cognate immunity protein gene is present. The structure of these proteins resembles the fold of the Whirly ssDNA binding proteins.
