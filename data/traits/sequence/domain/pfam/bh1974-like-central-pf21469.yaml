identifier: Pfam:PF21469
label: BH1974-like, central domain
definition: >-
  This entry represents a domain found in the central region of BH1974 protein from Alkalihalobacillus halodurans and similar bacterial proteins, including Probable xanthine dehydrogenase subunit A from Bacillus subtilis (PucA). PucA oxidises hypoxanthine and xanthine to uric acid and could exert a molybdenum cofactor recruiting function. It is found flanked by and . It adopts an α/β structure ( ).
