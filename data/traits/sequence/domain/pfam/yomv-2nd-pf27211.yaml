identifier: Pfam:PF27211
label: YomV second domain
definition: >-
  This entry represents the C-terminal domain of YomV, an uncharacterised protein from Bacillus subtilis. YomV is a 236 amino acid protein (gene BSU21210) derived from the SPbeta prophage in Bacillus subtilis strain 168. The protein is found in bacterial species and is associated with prophage elements. The specific function of this domain remains to be determined.
