identifier: Pfam:PF30355
label: Disconnected/basonuclin C2H2-type zinc finger
definition: >-
  This entry represents a C2H2 zinc finger domain found in Disconnected and basonuclin family transcription factors. This domain is found in metazoans. In Drosophila, Disconnected is a DNA-binding transcription factor involved in antennal, brain and leg development. In vertebrates, basonuclin-1 (BNC1) is a transcriptional activator involved in keratinocyte differentiation and gametogenesis, while basonuclin-2 (BNC2) functions in skin and urinary tract development. In C. elegans, BNC-1 acts as a transcriptional repressor in motor neuron fate determination. Basonuclins contain three copies of this paired zinc finger unit.
