identifier: Pfam:PF21621
label: Mannose-6-phosphate isomerase, cupin domain
definition: >-
  This domain is found in Mannose-6-phosphate isomerase from bacteria, including Archaeoglobus fulgidus (MPI), Salmonella typhimurium, Escherichia coli among others. This enzyme catalyses the interconversion of mannose 6-phosphate and fructose 6-phosphate. This entry represents the C-terminal domain, which is found associated with . This domain shows an all-β structure.
