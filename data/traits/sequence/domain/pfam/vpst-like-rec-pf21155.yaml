identifier: Pfam:PF21155
label: VpsT-like, receiver domain
definition: >-
  This domain is found at the N-terminal of the CsgBAC operon transcriptional regulatory protein (CsgD) from Escherichia coli ( ) and other proteins predominantly found in proteobacteria. CsgD is responsible for the curli fibers production that promotes biofilm formation and can modulate cellulose biosynthesis through activation of the yoaD gene. It is organised into two domains: an N-terminal regulatory receiver domain (REC) and a C-terminal helix-turn-helix domain ( ). This entry represents the REC domain which consists of five α-helices and five β-strands, with the β-strands stabilising as a parallel β-sheet surrounded by the α-helices ( ).
