identifier: Pfam:PF20758
label: 2B protein soluble domain
definition: >-
  This domain is found in the membrane-targeting protein 2B from Human hepatitis A virus. This protein, which is the soluble region of the virus, plays a key role in the rearrangement of host intracellular membranes, part of the viral infection process of this picornavirus. This entry represents the soluble domain of this protein, which is organised into two subdomains: the N-terminal adopts a pseudo-β-barrel shape with five β-strands that fold into a curved antiparallel β-sheet, and two β-strands prolonged by a β-hairpin; the C-terminal consists of four α-helices forming an helical bundle. This structure shows great similarity to the β-barrel domain of enteroviral 2A proteins.
