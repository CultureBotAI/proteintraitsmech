identifier: Pfam:PF27244
label: GtfB middle domain
definition: >-
  This entry represents the second domain in GtfB proteins found in Streptococcus pneumoniae. This domain contains a glycosyltransferase 1 fold. GtfB is a 445 amino acid protein required for polymorphic O-glycosylation of serine-rich repeat proteins. GtfB, together with GtfA, forms a two-protein enzyme complex that is involved in glycosylation. GtfB stabilises the glycosylation activity of GtfA and forms a heterotetramer complex with GtfA. The protein contains a glycosyltransferase 1 domain at residues 55-171 which is required for stable complex formation with GtfA. GtfB is a peripheral membrane protein localised to the cell membrane and is part of the accessory SecA2/SecY2 protein translocation system.
