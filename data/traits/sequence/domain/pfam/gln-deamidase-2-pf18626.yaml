identifier: Pfam:PF18626
label: Glutaminase
definition: >-
  Protein glutaminase (PG, ) can deamidate glutamine residues in proteins to glutamate residues. This entry represents the mature PG enzyme which bears partial homology to factor XIII-like Transglutaminase (TG), especially its Cys-His-Asp catalytic triad. A similar triad (Cys-His-Asn) is also shared by some cysteine proteases such as papain and actinidin. The mature PG is a monomer enzyme consisting of 185 amino acid residues.
