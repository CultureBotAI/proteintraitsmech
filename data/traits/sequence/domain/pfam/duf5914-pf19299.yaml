identifier: Pfam:PF19299
label: Domain of unknown function (DUF5914)
definition: >-
  This entry represents a presumed domain found to the C-terminal of the Rieske [2Fe-2S] iron-sulphur domain, predominantly found in bacterial proteins. The Rieske domain-containing protein CrtV from Streptomyces griseus (strain NBRC 13350) contain this domain and is predicted to be a methylesterase.
