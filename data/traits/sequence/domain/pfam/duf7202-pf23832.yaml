identifier: Pfam:PF23832
label: Domain of unknown function (DUF7202)
definition: >-
  This entry describes a domain of unknown function (DUF). It is found in phage proteins, generally around 70 amino acids in length. The domain is found in a variety of phages infecting hosts such as Escherichia, Shigella, Yersinia, Erwinia, Providencia, and Pectobacterium. No functional information is known. An AlphaFold model shows this protein adopts a three stranded β sheet structure.
