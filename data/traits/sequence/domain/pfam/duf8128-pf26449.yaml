label: Domain of unknown function (DUF8128)
definition: >-
  This entry represents a domain of uncharacterised proteins found in both bacteria and archaea. The proteins are predominantly found in Actinomycetes and Halobacteria. The proteins in this family are approximately 300 to 400 amino acids in length. In some proteins it covers the whole length, and in others only the N-terminal domain next to .
