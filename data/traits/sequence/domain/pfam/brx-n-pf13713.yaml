identifier: Pfam:PF13713
label: Transcription factor BRX N-terminal domain
definition: >-
  This entry represents the N-terminal α-helical domain of the BREVIS RADIX (BRX), which was characterised as being a transcription factor in plants regulating the extent of cell proliferation and elongation in the growth zone of the root. BRX maintains a rate-limiting brassinosteroid biosynthesis enzyme expression to keep brassinosteroid biosynthesis above a critical threshold. BRX has a ubiquitous, although quantitatively variable role in modulating the growth rate in both the root and the shoot.
