identifier: Pfam:PF26960
label: ISOC1 N-terminal ubiquitin-like domain
definition: >-
  This entry represents the N-terminal ubiquitin-like domain found in isochorismatase domain-containing protein 1 (ISOC1) and related proteins. ISOC1 contains two main domains: this N-terminal ubiquitin-like domain and a C-terminal isochorismatase catalytic domain. Ubiquitin-like domains are small regulatory modules that adopt the characteristic ubiquitin fold, consisting of a five-stranded β-sheet and a single α-helix. These domains often mediate protein-protein interactions and may serve as scaffolding modules for protein complex assembly. While the specific function of this N-terminal domain in ISOC1 proteins remains to be fully characterised, ubiquitin-like domains in other proteins are known to regulate enzymatic activity, subcellular localisation, or protein stability. ISOC1 proteins are involved in DNA damage repair pathways and cellular responses to inflammation.
