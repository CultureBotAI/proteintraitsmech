identifier: Pfam:PF00296
label: Luciferase-like monooxygenase
definition: >-
  Coenzyme F420 has a limited phylogenetic distribution, including methanogenic archaea, Mycobacterium tuberculosis and related species, Colwellia psychrerythraea 34H and Rhodopseudomonas palustris HaA2. Partial phylogenetic profiling identifies protein subfamilies, within the larger family called luciferase-like monooxygenanases ( ), that appear only in F420-positive genomes and are likely to be F420-dependent. This entry describes a small family, closely related to other such families in the putative F420-binding region, exemplified by MSMEG_3544 in Mycobacterium smegmatis.
