identifier: Pfam:PF27650
label: Metallothionein, crustacean
definition: >-
  Metallothioneins (MT) are small proteins that bind heavy metals, such as zinc, copper, cadmium, nickel, etc. They have a high content of cysteine residues that bind the metal ions through clusters of thiolate bonds. An empirical classification into three classes has been proposed by Fowler and coworkers and Kojima. Members of class I are defined to include polypeptides related in the positions of their cysteines to equine MT-1B, and include mammalian MTs as well as from crustaceans and molluscs. Class II groups MTs from a variety of species, including sea urchins, fungi, insects and cyanobacteria. Class III MTs are atypical polypeptides composed of gamma-glutamylcysteinyl units. This original classification system has been found to be limited, in the sense that it does not allow clear differentiation of patterns of structural similarities, either between or within classes. Subsequently, a new classification was proposed on the basis of sequence similarity derived from phylogenetic relationships, which basically proposes an MT family for each main taxonomic group of organisms. Crustacean MTs belong to family 3. They are small proteins, with 18 totally conserved cysteines. The members of this family are recognised by the sequence pattern P-[GD]-P-C-C-x(3,4)-C-x-C located at the Nterm. The taxonomic range of the members extends to crustaceans. Known characteristics of this family are: 58 to 60 AAs; variants exist with and without the N-terminal Met. Protein sequence is divided into two structural domains, containing each 9 Cys binding 3 bivalent metal ions. Family 3 includes subfamilies: c1, c2, c. All sequences are very similar. c1 and c2 are forming two distinct monophyletic groups in the AA phylogenetic tree. c are crustacean MTs different from c1 and c2 based on phylo…
