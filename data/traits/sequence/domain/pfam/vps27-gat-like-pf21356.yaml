identifier: Pfam:PF21356
label: Vacuolar protein sorting-associated protein 27, GAT-like domain
definition: >-
  This domain is found in Vacuolar protein sorting-associated protein 27 from Saccharomyces cerevisiae (Vps27, ) and similar sequences predominantly found in yeast. Vps27 binds to ubiquitinated transmembrane proteins and recruits both ubiquitin ligases and deubiquitinating enzymes. Besides the GAT domain (this entry), Vps27 contains VHS ( ) and FYVE domains ( ). This domain forms a three α-helical bundle that resembles closely the structure of a GAT domain.
