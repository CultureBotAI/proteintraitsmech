identifier: Pfam:PF28222
label: Bombesin receptor-activated protein C6orf89 N-terminal domain
definition: >-
  This entry represents the N-terminal helix hairpin domain of bombesin receptor-activated protein (BRAP), also known as C6orf89. This small structural domain is found in metazoans, particularly vertebrates. The domain is located in the cytoplasmic N-terminal region of BRAP proteins. The specific function of this domain remains to be determined. Bombesin receptor-activated protein (BRAP, C6orf89) is an important regulator of immune and inflammatory responses in the human airway epithelium. BRAP interacts with the orphan G protein-coupled bombesin receptor subtype 3. BRAP is widely expressed in human airway epithelial cells and vascular endothelial cells and exhibits histone deacetylase enhancer properties. It may play roles in cell cycle progression and wound repair. It regulates NF-kB activity by enhancing histone deacetylase (HDAC) activity.
