identifier: Pfam:PF23265
label: KY-like, immunoglobulin-like domain
definition: >-
  This domain is found in tandem in human Kyphoscoliosis peptidase (KY), a probable cytoskeleton-associated protease required for normal muscle growth. This domain is predicted to adopt an immunoglobulin-like structure. Proteins containing this domain are mainly found in animals. This domain is also found in tandem in the Lim and transglutaminase domain protein ltd-1 from C.elegans and Hillarin from D.melanogaster, both distant orthologs of KY.
