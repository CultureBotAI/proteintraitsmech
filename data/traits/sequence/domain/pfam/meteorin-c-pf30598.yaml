identifier: Pfam:PF30598
label: Meteorin, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of meteorin and meteorin-like proteins (METRNL), also known as subfatin. This domain may adopt and OB-like fold similar to that found in TIMP-like domains. METRNL is a secreted hormone induced following exercise or cold exposure that promotes energy expenditure and browning of white adipose tissue. The protein stimulates eosinophil-dependent IL4 expression and promotes alternative activation of adipose tissue macrophages, leading to increased thermogenic gene expression.
