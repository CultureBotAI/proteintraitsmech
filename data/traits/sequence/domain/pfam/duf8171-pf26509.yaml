identifier: Pfam:PF26509
label: Family of unknown function (DUF8171)
definition: >-
  This entry represents a family of uncharacterised proteins from the Bacillota phylum. The family is predominantly found in bacteria such as Paenibacillus and Bacillus species. Proteins in this family are typically around 280-300 amino acids in length. The proteins are predicted integral membrane proteins containing eight transmembrane domains. These proteins show structural similarity to suggesting this family is likely to be a transporter for an as yet unidentified substrate.
