identifier: Pfam:PF18088
label: Glycoside Hydrolase 20C C-terminal domain
definition: >-
  This is the C-terminal domain of Glycoside hydrolase 20 C (GH20C) present in S. pneumoniae. GH20C possesses the ability to hydrolyse the beta-linkages joining either N-acetylglucosamine or N-acetylgalactosamine to a wide variety of aglycon residues. The C-terminal domain is commonly known as Domain III is important in dimerization as it forms the primary interface of the dimer. However, there is presently no evidence supporting dimerization as being necessary for catalysis. Domain III is unusual among structurally characterised GH20 enzymes but in GH20 enzymes possessing domain III, dimerization seems to be a conserved feature.
