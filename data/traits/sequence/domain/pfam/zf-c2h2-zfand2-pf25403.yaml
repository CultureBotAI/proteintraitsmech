identifier: Pfam:PF25403
label: ZFAND2A/B-like C2H2 zinc finger
definition: >-
  This C2H2 zinc finger is found in the stress-associated proteins AN1-type zinc finger protein 2A and 2B (ZFAND2A and ZFAND2B), and their plant homologues SAP11/13/16. The precise function of these proteins is unknown. The human ZFAND2A/AIRAP was identified as a stress-regulated survival factor implicated in the stabilization of the antiapoptotic protein cIAP2 in melanoma.
