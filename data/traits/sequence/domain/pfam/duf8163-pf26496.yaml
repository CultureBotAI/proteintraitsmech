identifier: Pfam:PF26496
label: Domain of unknown function (DUF8163)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halobacteria. The proteins containing this domain are predominantly found in archaea, specifically within the Halobacteria class. Proteins in this family are typically around 150-200 amino acids in length. The domain is predicted to be part of integral membrane proteins with six predicted transmembrane helices.
