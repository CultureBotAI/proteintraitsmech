identifier: Pfam:PF08766
label: DEK C terminal domain
definition: >-
  DEK is a chromatin associated protein that is linked with cancers and autoimmune disease. This domain is found at the C-terminal of human DEK and is of clinical importance since it can reverse the characteristic abnormal DNA-mutagen sensitivity in fibroblasts from ataxia-telangiectasia (A-T) patients. This domain folds into a three helical bundle that is topologically similar to the DNA/RNA-binding bundles. The DEK CTD structure revealed homology to the E2F/DP transcription factor family. This domain is also found in fungal chitin synthase proteins, including Chitin synthase 5 from Gibberella zeae, in protein phosphatases such human Protein phosphatase Slingshot homolog 1 (SSH1,) and in plant proteins like DEK domain-containing chromatin-associated protein 3 from Arabidopsis thaliana (DEKP3,).
