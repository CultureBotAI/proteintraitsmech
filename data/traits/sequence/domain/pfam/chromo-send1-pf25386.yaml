identifier: Pfam:PF25386
label: Single-strand DNA endonuclease 1, chromo domain
definition: >-
  This domain is found in Single-strand DNA endonuclease 1 from Arabidopsis thaliana (SEND1) and similar plant proteins. SEND1 cleaves flap structures at the junction between single-stranded DNA and double-stranded DNA with a specific cleavage site in the 5' overhang strand exactly one nucleotide 3' of the branch point. It resolves holliday junctions (HJs) by symmetrically oriented incisions in two opposing strands near the junction point, thus leading to ligatable products. This domain is often found associated with and . It is predicted to fold into three-stranded curved β-sheet packed against an α-helix.
