identifier: Pfam:PF20729
label: PE-PGRS C-terminal aspartyl peptidase-like domain
definition: >-
  This entry represents the C-terminal domain of PE cleavage protein A (PecA) and related proteins found in mycobacteria. PecA from Mycobacterium marinum ( ), and related paralogues from Mycobacterium tuberculosis PE_PGRS35 ( ), and PE_PGRS16 ( ), are all PE domain-containing proteins secreted by a type VII secretion system (T7SS, also called ESX in Mycobacterium). These proteins share a common C-terminal aspartic protease-like domain. PecA is known to be a functional aspartic protease that cleaves within the PE domain of T7SS secretion substrates containing this domain, in addition to its autoproteolytic activity. The structure of PE_PGRS16 ( ) revealed fold and catalytic site architecture with a greater similarity to pepsins than to retroviral proteases. It was found that this protein is insensitive to common pepsin substrates, suggesting that PE_PGRS16 may have a narrow specificity.
