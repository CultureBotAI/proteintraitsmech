identifier: Pfam:PF01537
label: Herpesvirus glycoprotein D/GG/GX domain
definition: >-
  Herpesviruses are dsDNA viruses with no RNA stage. This entry represents a conserved domain found in several Herpes viruses glycoproteins, including: Glycoprotein-D (gD or gIV), which is common to Human herpesvirus 1 (HHV-1) and Human herpesvirus 2 (HHV-2), as well as Equid herpesvirus 1, Bovine herpesvirus 1 and Meleagrid herpesvirus 1 (MeHV-1). Glycoprotein-D has been found on the viral envelope and the plasma membrane of infected cells. gD immunisation can produce an immune response to bovine herpes virus (BHV-1). This response is stronger than that of the other major glycoproteins gB (gI) and gC (gIII) in BHV-1. Glycoprotein G (gG), which is one of the seven external glycoproteins of Human herpesvirus 1 (HHV-1) and Human herpesvirus 2 (HHV-2). In the HHV-2 virus-infected cell, gG-2 is cleaved into a secreted amino-terminal portion (sgG-2) and a carboxy-terminal portion. The latter protein is further O-glycosylated, generating the cell membrane-associated mature gG-2 (mgG-2). The mgG-2 protein has widely been used as a prototype antigen for detection of type-specific antibodies against HHV-2. Glycoprotein GX (gX), which was initially identified in Suid herpesvirus 1 (Pseudorabies virus).
