identifier: Pfam:PF28484
label: DLEC1 helical domain
definition: >-
  This entry represents a helical domain found in DLEC1 (Deleted in lung and esophageal cancer protein 1) and related proteins. DLEC1 is a large protein essential for spermatogenesis and male fertility, playing important roles in sperm head and tail formation. The full-length protein acts as a tumour suppressor by inhibiting cell proliferation and interacts with tubulin and chaperonin components. The protein is found in the cytoplasm and shows tissue-enriched expression in testis. The specific function of this helical domain within DLEC1 remains to be determined.
