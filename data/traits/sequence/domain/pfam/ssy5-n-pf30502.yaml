identifier: Pfam:PF30502
label: SSY5 N-terminal domain
definition: >-
  This entry represents the helical domain of SPS-sensor serine protease component SSY5 from S.cerevisiae and similar fungal proteins. It is found at the N-terminal of and may adopt an helical bundle fold. SSY5 is the protease component of the SPS-sensor system, which regulates the expression of several metabolising enzymes and amino acid- and peptide-permeases in response to extracellular amino acid levels by controlling the activity of two transcription factors, STP1 and STP2. It activates these factors.
