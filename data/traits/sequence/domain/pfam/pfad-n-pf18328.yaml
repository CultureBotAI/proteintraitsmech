identifier: Pfam:PF18328
label: Fatty acid synthase subunit PfaD N-terminal domain
definition: >-
  This domain is found in N-terminal region of PfaD, an enoyl reductase enzyme present in Bacillus subtilis. PfaD plays a role in the biosynthesis of polyunsaturated fatty acids. The domain is typically found just before the N-terminal region of a nitronate monooxygenase domain.
