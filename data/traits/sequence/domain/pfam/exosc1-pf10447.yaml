identifier: Pfam:PF10447
label: Exosome component EXOSC1/CSL4
definition: >-
  Exosome is a complex of 3' --> 5' exoribonucleases that play a major role in diverse RNA processing and degradation pathways. The eukaryotic exosome complex contains 9 proteins. Six RNase PH domain containing proteins (Rrp41, Rrp42, Rrp43, Rrp45, Rrp46, and Mtr3) form a catalytic ring, three RNA binding domain containing proteins (Rrp4,Rrp40, and Csl4) bind on top of the ring. This entry represents the C-terminal domain of the exosome complex component CSL4 (also known as EXOSC1). CSL4 does not have exonuclease activity, but are required for the 3'-processing of the 7S pre-RNA to the mature 5.8S rRNA and for mRNA decay.
