identifier: Pfam:PF15542
label: Bacterial toxin 50
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts between related strains. Toxin proteins of these systems are as a rule multi-domain and display a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems that is proposed to adopt the BECR (Barnase-EndoU-ColicinE5/D-RelE) fold, and contains two conserved histidine, a serine, two lysine, and a threonine residue and a HxVP motif. In bacterial polymorphic toxin systems, the toxin is usually exported by the type 2, type 6, type 7, and MuF-type secretion system.
