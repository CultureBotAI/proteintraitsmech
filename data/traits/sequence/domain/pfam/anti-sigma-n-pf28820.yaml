identifier: Pfam:PF28820
label: Anti-sigma factor, N-terminal domain
definition: >-
  This entry represents an N-terminal domain of approximately 50 residues found in putative anti-sigma factors from Bacteroidota species. Anti-sigma factors regulate the activity of sigma factors by sequestering them and preventing transcription initiation. In Porphyromonas gingivalis, genes encoding proteins with this domain are located downstream of extracytoplasmic function sigma factors and may function as cognate anti-sigma factors. In Bacteroides thetaiotaomicron, BT2561 is annotated as a putative anti-sigma factor. The specific function of this N-terminal domain remains to be determined.
