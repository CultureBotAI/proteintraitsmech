identifier: Pfam:PF21800
label: KRR1 small subunit processome component, second KH domain
definition: >-
  This is the second K homology domain (KH2) found in KRR1 small subunit processome component from Saccharomyces cerevisiae and similar eukaryotic and archaeal sequences. Ribosomal RNA assembly protein KRR1 is required for 40S ribosome biogenesis. It is involved in nucleolar processing of pre-18S ribosomal RNA and ribosome assembly in Saccharomyces cerevisiae. In Schizosaccharomyces pombe it is known as Mis3.
