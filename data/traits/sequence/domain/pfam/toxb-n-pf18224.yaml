identifier: Pfam:PF18224
label: ToxB N-terminal domain
definition: >-
  This entry includes the N-terminal domain of ToxB and other similar proteins found in ascomycota. This domain has been shown to be crucial for toxin activity. There are two amino acid differences between ToxB and toxb, an inactive homologue of ToxB. These two differences are a Val at position 3 in ToxB compared to a Thr in toxb, and an Ala at position 12 in ToxB compared to a Val in toxb. Both ToxB and Toxb are matched by this entry. AvrPiz-t, a secreted avirulence protein produced by the rice blast fungus, is a structural homologue to ToxB.
