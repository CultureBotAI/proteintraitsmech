identifier: Pfam:PF22918
label: PTEN2, C2 domain
definition: >-
  This entry represents a C2 domain found in PTEN2A (Phosphatidylinositol 3,4,5-trisphosphate 3-phosphatase and protein-tyrosine-phosphatase) and PTEN2B from plants. These proteins are tyrosine phosphatases that exhibit also a weak lipid phosphatase activity towards PtdIns3P.
