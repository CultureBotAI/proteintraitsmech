identifier: Pfam:PF24502
label: TMEM131 homolog third Ig-like domain
definition: >-
  This entry represents the third Ig-like domain of TMEM131 from Drosophila and related sequences from flies. This protein is the orthologue of human TMEM131. TMEM131 is a collagen binding transmembrane protein involved in collagen secretion by recruiting the ER-to-Golgi transport complex TRAPPIII. Human TMEM131 is predicted to contain eight Ig-like domains.
