identifier: Pfam:PF22454
label: PQQ synthase PqqF, N-terminal lobe domain 2
definition: >-
  This entry represents domain 2 from the N-terminal lobe of Coenzyme PQQ synthesis protein F (PqqF), a protein required for coenzyme pyrroloquinoline quinone (PQQ) biosynthesis. It consists of four structurally similar domains organised in N-terminal (domain 1 represented by and domain 2) and C-terminal (domain 3 and domain 4) lobes. Members of this group are mainly found in enterobacterales.
