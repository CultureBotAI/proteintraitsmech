identifier: Pfam:PF22020
label: RlmL ferredoxin-like domain
definition: >-
  This entry represents the ferredoxin-like domain found at the N-terminal of RmlL, referred to as NFLD domain usually fused to the THUMP domain. Ribosomal RNA large subunit methyltransferase K/L from E.coli (also known as YcbY) specifically methylates the guanine in positions 2445 and 2069 of 23S rRNA before its assembly into 50S subunits.
