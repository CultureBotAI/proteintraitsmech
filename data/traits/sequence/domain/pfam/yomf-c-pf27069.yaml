identifier: Pfam:PF27069
label: SPbeta prophage YomF protein, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YomF. The function of this domain remains unknown. YomF is an uncharacterised protein encoded by the SPbeta prophage in Bacillus subtilis. This protein contains an N-terminal domain , middle domain and a C-terminal domain .
