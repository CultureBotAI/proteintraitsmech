identifier: Pfam:PF22808
label: RhopH3 C-terminal domain
definition: >-
  This entry represents a domain found towards the C terminus in homologues of High molecular weight rhoptry protein 3 from Plasmodium falciparum (RhopH3) and similar sequences specific to Plasmodium species. RhopH3 is a component of the RhopH complex that is essential for the pathogen erythrocyte invasion and for remodelling its host cells to achieve tissue adherence and nutrient acquisition.
