identifier: Pfam:PF07381
label: EarA-like
definition: >-
  This entry represents Uncharacterized protein MJ0905, EarA from Methanococcus maripaludis (MMP1718, ) and similar sequences widely distributed in archaea except for extreme halophiles. EarA is a transcriptional activator that directly regulates the fla operon, which contains genes involved in archaella formation. However, this protein might not always be required for transcription, This protein family was previously known as DUF1495.
