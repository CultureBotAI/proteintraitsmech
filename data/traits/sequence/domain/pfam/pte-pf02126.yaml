identifier: Pfam:PF02126
label: Phosphotriesterase family
definition: >-
  Bacteria such as Brevundimonas diminuta (Pseudomonas diminuta) harbour a plasmid that carries the gene for phosphotriesterase (PTE also known as parathion hydrolase; ). This enzyme has attracted interest because of its potential use in the detoxification of chemical waste and organophosphate warfare agents such as VX, soman, and sarin, and its ability to degrade agricultural pesticides such as parathion. It acts specifically on synthetic organophosphate triesters and phosphorofluoridates. It does not seem to have a naturally occurring substrate and may thus have optimally evolved for utilising paraoxon. PTE exists as a homodimer with one active site per monomer. The active site is located next to a binuclear metal centre, at the C-terminal end of a TIM α-β barrel motif. The native enzyme contains two zinc ions at the active site however these can be replaced with other metals such as cobalt, cadmium, nickel or manganese and the enzyme remains active. PTE belongs to a family of enzymes that possess a binuclear zinc metal centre at their active site. The two zinc ions are coordinated by six different residues, six of which being histidines. This family so far includes, in addition to the parathion hydrolase, the following proteins: Sulfolobus solfataricus aryldialkylphosphatase that has a low paraoxonase activity. E. coli php (phosphotriesterase homology) protein. The substrate of php is not yet known. Mycobacterium tuberculosis phosphotriesterase homology protein Rv0230C. Phospho-furanose lactonase from Mycoplasma. Animal phosphotriesterase related protein (PTER) (RPR-1).
