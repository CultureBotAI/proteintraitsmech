identifier: Pfam:PF03966
label: Trm112p-like protein
definition: >-
  Trm112 is required for tRNA methylation in Saccharomyces cerevisiae (Baker's yeast) and is found in complexes with 2 tRNA methylases (Trm9 and Trm11) also with putative methyltransferase Ydr140w. Trm112 from S. cerevisiae (Ynr046w) is plurifunctional and a component of the eRF1 methyltransferase. The crystal structure of Ynr046w has been determined to 1.7 A resolution. It comprises a zinc-binding domain built from both the N- and C-terminal sequences and an inserted domain, absent from bacterial and archaeal orthologues of the protein, composed of three α-helices. Trm112 has also been described in archaea (UPF0434 protein from Haloferax volcanii). UPF0434 proteins are found both in bacteria and archaea, and the study of interacting partners from the H. volcanii member appears to indicate that Trm112 is a general partner for methyltransferases in all organisms. This entry also includes mitochondrial protein preY, an uncharacterised protein from vertebrates.
