identifier: Pfam:PF16452
label: Bacteriophage CI repressor C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the CI repressor, which functions in oligomer formation. The bacteriophage lambda cI repressor is a part of a phage molecular switch which transforms the phage from lysogenic to lytic growth. The CI repressor from Enterobacteria phage phi80 is known to function as a transcriptional switch, determining whether transcription is lytic or lysogenic. It contains two domains connected by a flexible "hinge" region with a cleavage site.
