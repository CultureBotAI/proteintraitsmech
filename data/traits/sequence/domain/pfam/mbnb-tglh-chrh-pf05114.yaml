identifier: Pfam:PF05114
label: RiPP precursor modification enzyme MbnB/TglH/ChrH
definition: >-
  This entry represents a family of multinuclear iron-containing proteins which are post-translational modification enzymes involved in the biosynthesis of ribosomally synthesized and post-translationally modified peptide (RiPP) natural products, including the precursor modification enzymes MbnB, TglH, and ChrH, formerly known as DUF692.
