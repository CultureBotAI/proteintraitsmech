identifier: Pfam:PF29840
label: Polar tube protein 3 beta-sheet domain
definition: >-
  This entry represents a β-sheet domain found in polar tube proteins from microsporidia. The specific function of this middle domain remains to be determined. PTP3 is involved in sporoblast-to-spore polar tube biogenesis and plays a role in controlling polar tube extrusion in response to ionic stimuli. The protein is localised to the spore polar tube and is highly expressed during polar tube formation.
