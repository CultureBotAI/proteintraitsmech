identifier: Pfam:PF08906
label: T6SS immunity protein Tdi1, C-terminal
definition: >-
  This entry represents a domain found at the C-terminal region of the type VI secretion system (T6SS) immunity protein Tdi1 from Agrobacterium tumefaciens (Atu4351, ) and similar bacterial proteins. Tdi1 is organised into a N-terminal GAD-related domain ( ) and a C-terminal domain likely to exist as an insertion in the GAD-like domain. This domain, previously known as DUF1851, shows a two-stranded antiparallel β-sheet and four helices. A positive groove that extends to both domains may be associated with nucleotide binding.
