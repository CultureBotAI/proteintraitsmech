identifier: Pfam:PF10192
label: GPR180/TMEM145, transmembrane domain
definition: >-
  This entry represents the seven transmembrane α-helical domain of GPR180 (also known as intimal thickness-related receptor, ITR) and TMEM145. In vivo analyses of this gene revealed that expression of GPR180 protein increased with intimal thickening induced by cuff placement around murine femoral artery. Furthermore, GPR180-knockout mice were found to be resistant to this experimental intimal thickening. GPR180 was first thought to be an orphan Rhodopsin-like GPCR (G protein-coupled receptor) given structural similarities to GPCR transmembrane region, however, it was then confirmed not to signal as a GPCR. This protein is associated with TGF-beta signaling as it regulates the activity of the TGF-beta receptor complex through SMAD3 phosphorylation. Furthermore, GPR180 is also required for the action of Collagen triple helix repeat containing 1 (CTHRC1) to regulate brown and beige adipocyte activity and glucose homeostasis. Proteins in this entry are homologous to TMEM181 and Wntless (WLS), which have been described as GOST proteins (for GOLD domain seven-transmembrane helix proteins) together with TMEM87A/B, GPR107, and GPR108, given they share the same domain architecture consisting of a GOLD domain atop of a membrane-spanning seven-transmembrane helix domain.
