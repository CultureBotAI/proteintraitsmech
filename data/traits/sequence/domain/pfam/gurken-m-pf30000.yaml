identifier: Pfam:PF30000
label: Gurken middle domain
definition: >-
  This entry represents a EGF domain found in the middle region of the Drosophila gurken protein. Gurken is a TGF-alpha-like growth factor critical for defining the anterior-posterior and dorsal-ventral axes of the egg during oogenesis. The protein signals directly to dorsal follicle cells through the torpedo receptor, instructing follicle cells to follow a dorsal developmental pathway. Gurken is expressed in nurse cells and oocyte up to oogenesis stage 7 and specifically accumulates in the dorsal anterior corner of the oocyte during stages 9/10. This domain is also found in related proteins from insects including U18-myrmicitoxin-Mri1a, U-actitoxin-Avd12a, OMEGA-stichotoxin-Shd4a and Protein spitz. In some of these proteins, this domain is found as a standalone domain.
