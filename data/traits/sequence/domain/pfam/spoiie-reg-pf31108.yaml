identifier: Pfam:PF31108
label: SpoIIE, regulatory domain
definition: >-
  This entry represents the regulatory domain of Stage II sporulation protein E, which is located adjacent the PP2C phosphatase domain. The regulatory domain mediates the formation of dimers between SpoIIE molecules, required for phosphatase activation. An N-terminal 45-residue long α-helix makes intramolecular contacts with the switch helices (α1 and α2) of the phosphatase domain. SpoIIE is the most upstream member of a three-protein pathway that activates sigma F in the small cell. It does so by dephosphorylating the phosphoprotein SpoIIAA-P.
