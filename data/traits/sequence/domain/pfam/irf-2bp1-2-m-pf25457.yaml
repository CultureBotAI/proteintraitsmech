identifier: Pfam:PF25457
label: IRF-2BP1/2 middle domain
definition: >-
  This entry represents a domain found toward the central part of Interferon regulatory factor 2-binding protein 1 and 2 (IRF-2BP1/2) and their homologue IRF-2BP-like (also known as IRF-2BPL or C14orf4). These proteins are nuclear transcriptional repressors that bind to the C-terminal repression domain of IRF-2 and can inhibit both enhancer-activated and basal transcription. They contain N-terminal zinc finger, C-terminal RING finger domains and the domain represented by this entry which was previously not described. Mutations in IRF-2BP2 are responsible for a Familial Form of Common Variable Immunodeficiency Disorder (CVID), one of the most frequently diagnosed forms of primary immunodeficiency characterised by low quantity of IgG and IgA and poor specific antibody production. IRF-2BPL may play a role in the development of the central nervous system and in neuronal maintenance. This domain is predicted to adopt a globular structure consisting of an open barrel decorated with α-helices.
