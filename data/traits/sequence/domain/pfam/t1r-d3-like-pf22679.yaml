identifier: Pfam:PF22679
label: Type I restriction enzyme subunit R domain 3
definition: >-
  This entry represents the second RecA-like helicase domain (the third domain) found in a restriction (R) subunit (HsdR) of a number of type I restriction enzymes, including the Type I restriction enzyme EcoR124I/EcoR124II endonuclease subunit from Escherichia coli. Subunit R is required for both nuclease and ATPase activities, but not for modification. This domain folds into an α/β structure consisting of a central β-sheet and α-helices packed on both sides of it.
