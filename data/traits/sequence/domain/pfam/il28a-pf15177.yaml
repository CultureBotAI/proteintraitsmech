identifier: Pfam:PF15177
label: Interleukin-28A
definition: >-
  This entry represents the Interferon (IFN)-lambda proteins which belong to the new type III IFN group. In contrast to type I or type II IFNs, the response to type III IFN is cell-type specific. Only epithelial-like cells and some immune cells respond to IFN-lambda. In human,four distinct proteins called IFN-lambda1 (interleukin-29, IL-29), IFN-lambda2 (IL-28A), IFN_lambda3 (IL-28B) and IFNL4 have been identified. IFN-lambda proteins activate IFN-stimulated gene factor 3 (ISGF3), and are capable of inducing antiviral protection and MHC class I antigen expression. Type III IFNs, commonly known as interferon lambda (IFNL or IFN-lambda), have been reported in mammals, birds, reptiles, amphibians, and cartilaginous fish. IFN-IIIs include IFN-lambda1-3 (also known as interleukin [IL]-29, IL-28A, and IL-28B) and IFN-lambda4 (only IFN-lambda2 and IFN-lambda3 exist in mice). They play a crucial role as gatekeepers, particularly in safeguarding mucosal epithelial cells. Interferons are proteins which produce antiviral and antiproliferative responses in cells. The interferons (IFNs) are a subset of class II α-helical cytokines that have a variety of functions, most notably conferring a viral-resistant state to receptive cells. They play a major role in orchestrating the innate immune response toward viruses in vertebrates, and their defining characteristic is their ability to induce an antiviral state in responsive cells. IFNs are characterised by activities that vary over time and can lead to opposing outcomes. IFNs have protective roles during bacterial, viral, and fungal infections but can also drive numerous inflammatory and autoimmune diseases. Beyond their function during infections, IFNs have emerged as key regulators of the immune system in essentially every human disease…
