identifier: Pfam:PF19979
label: Family of unknown function (DUF6415)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000703) is described by MIBiG as an example of the following biosynthetic class, saccharide, in particular the kanamycin biosynthetic gene cluster from Streptomyces kanamyceticus. This family appears to be predominantly found in Actinobacteria. This domain can also be found at the N-terminal in putative Nudix hydrolase domain-containing protein and other uncharacterised proteins.
