identifier: Pfam:PF26739
label: Domain of unknown function (DUF8245)
definition: >-
  This domain is found in uncharacterised proteins from gram-negative bacteria. It contains highly conserved histidine and three cysteine residues arranged in HCCC pattern. These residues are predicted to be located in proximity and likely to coordinate a metal ion. This domain is usually found preceding HNH nuclease domain.
