identifier: Pfam:PF31036
label: mS65 domain
definition: >-
  This domain is found in the mS65 protein which is a Trypanosoma-specific mitoribosomal protein and a component of the mitoribosomal small subunit (mt-SSU) assemblosome. This domain folds into an α/β structure composed of a five-stranded antiparallel β-sheet packed with α-helices on one side.
