identifier: Pfam:PF29083
label: TIM14 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of TIM14, also known as PAM18, a subunit of the mitochondrial import inner membrane translocase complex. TIM14 is an essential component of the PAM complex required for translocation of transit peptide-containing proteins from the inner membrane into the mitochondrial matrix in an ATP-dependent manner. The protein is localised to the mitochondrial inner membrane as a single-pass membrane protein with this domain in the intermembrane space. TIM14 contains a C-terminal J domain that is essential for co-chaperone activity and stimulation of mtHSP70. The protein forms heterodimers with PAM16 and is part of the larger PAM complex including mtHsp70, MGE1, TIM44, PAM16, and PAM17. The specific function of this domain remains to be determined.
