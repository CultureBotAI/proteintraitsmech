identifier: Pfam:PF00326
label: Prolyl oligopeptidase family
definition: >-
  This entry represents an N-terminal domain of approximately 70 residues found in secreted alpha/beta hydrolases in Actinomycetes, particularly Streptomycetaceae, Microbacteriaceae, and Micrococcaceae. This domain is found N-terminal to various hydrolase domains including Abhydrolase_1 ( ) and Peptidase_S9 ( ). The function of this domain remains to be determined.
