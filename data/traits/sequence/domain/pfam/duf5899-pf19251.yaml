identifier: Pfam:PF19251
label: Minor capsid protein P2, DUF5899
definition: >-
  This entry represents a domain of unknown function found in Minor capsid protein P2 from Paramecium bursaria Chlorella virus 1 and related sequences from Mimiviridae and Phycodnaviridae. Minor capsid protein P2 is one of the minor capsid proteins that constitute a network internal to the major capsid proteins and outside the lipid membrane. The minor capsid proteins glue and stabilize the capsomers. It also acts as a molecular tape measure protein that determines the size of the viral capsid.
