identifier: Pfam:PF28225
label: LOC1 helical domain
definition: >-
  This entry represents the helical region found at the C-terminal of LOC1 proteins. This is coiled-coil region and is found in fungi, particularly Ascomycota. While the full-length LOC1 protein has established roles in ribosomal assembly, the specific function of this helical region remains to be determined. Loc1 is required for efficient assembly and nuclear export of the 60S ribosomal subunit. These proteins localise to the nucleolus and are involved in ribosome biogenesis. Budding yeast Loc1 recognizes double-stranded RNA structures and is required for efficient localization of ASH1 mRNA.
