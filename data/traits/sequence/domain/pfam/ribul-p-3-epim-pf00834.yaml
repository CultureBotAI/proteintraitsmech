identifier: Pfam:PF00834
label: Ribulose-phosphate 3 epimerase family
definition: >-
  Ribulose-phosphate 3-epimerase ( ) (also known as RPE, pentose-5-phosphate 3-epimerase or PPE) is the enzyme that converts D-ribulose 5-phosphate (Ru5P) into D-xylulose 5-phosphate in Calvin's reductive pentose phosphate cycle. In Ralstonia eutropha (Alcaligenes eutrophus) two copies of the gene coding for PPE are known, one is chromosomally encoded , the other one is on a plasmid . PPE has been found in a wide range of bacteria, archaebacteria, fungi and plants. All the proteins have from 209 to 241 amino acid residues. The enzyme has a TIM barrel structure. This family also includes other enzymes from the ribulose-phosphate 3-epimerase family, like D-allulose-6-phosphate 3-epimerase and other putative pentose-5-phosphate 3-epimerases. D-allulose-6-phosphate 3-epimerase catalyses the reversible epimerization of D-allulose 6-phosphate to D-fructose 6-phosphate, but it can also catalyse with lower efficiency the reversible epimerization of D-ribulose 5-phosphate to D-xylulose 5-phosphate.
