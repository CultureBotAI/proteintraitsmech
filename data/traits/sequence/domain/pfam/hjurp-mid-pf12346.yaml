identifier: Pfam:PF12346
label: Holliday junction recognition protein-associated repeat
definition: >-
  This entry represents a central, conserved region found in Holliday junction recognition protein from humans (HJURP) and similar proteins from vertebrates. This domain is not present in Holliday junction recognition proteins from fungi. However, both the N-terminal domain and a repeated domain that appears further downstream, also of unknown function, appear in all both vertebral and fungal Holliday junction recognition proteins.
