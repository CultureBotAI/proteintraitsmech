identifier: Pfam:PF27195
label: YdhT N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YdhT, an uncharacterised protein from Escherichia coli, and related proteins. YdhT is encoded by gene b1669 that is part of the ydhYVWXUT operon. The protein is up-regulated by the oxygen-responsive transcription factor FNR under anaerobic conditions and repressed in the presence of nitrate or nitrite via the two-component systems NarXL and NarPQ. The specific function of this domain is unknown.
