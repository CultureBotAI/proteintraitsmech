identifier: Pfam:PF08634
label: Mitochondrial protein Pet127
definition: >-
  This entry represents a group of fungal mitochondria proteins, known as Pet127, that stimulate mitochondrial RNA degradation. Pet127 has been classified as part of the PD-(D/E)XK nuclease superfamily including a full set of active site residues.
