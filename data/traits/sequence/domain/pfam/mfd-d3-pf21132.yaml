identifier: Pfam:PF21132
label: MFD, D3 domain
definition: >-
  The transcription-repair coupling factor (TRCF, also known as MFD) couples transcription and DNA repair in bacteria. MFD removes transcription elongation complexes stalled at DNA lesions and recruits the nucleotide excision repair (NER) machinery to the site. This protein consists of eight domains, of which D3 is represented in this entry. D1-D3 module plays a critical role in unmasking of the UvrA binding site.
