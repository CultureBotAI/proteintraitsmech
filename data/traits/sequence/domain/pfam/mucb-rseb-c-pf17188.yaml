identifier: Pfam:PF17188
label: MucB/RseB C-terminal domain
definition: >-
  This entry represents the C-terminal domain of sigma-E factor regulatory protein RseB and sigma factor AlgU regulatory protein MucB. MucB plays a role in the differentiation of P. aeruginosa into the alginate-producing form. RseB negatively modulates the activity of sigma-E (RpoE) by stabilizing RseA under non-stress conditions. The small C-terminal domain of RseB is responsible for interaction with RseA.
