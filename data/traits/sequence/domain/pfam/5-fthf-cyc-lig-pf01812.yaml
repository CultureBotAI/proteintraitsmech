identifier: Pfam:PF01812
label: 5-formyltetrahydrofolate cyclo-ligase family
definition: >-
  5-formyltetrahydrofolate cyclo-ligase or methenyl-THF synthetase catalyses the interchange of 5-formyltetrahydrofolate (5-FTHF) to 5-10-methenyltetrahydrofolate, this requires ATP and Mg 2. 5-FTHF is used in chemotherapy where it is clinically known as Leucovorin. This entry also includes the 5-formyltetrahydrofolate cyclo-ligase-like protein COG0212 (At1g76730) from Arabidopsis. It does not possess the 5-formyltetrahydrofolate cyclo-ligase activity in vitro and does not complement the growth defect or the characteristic 5-formyltetrahydrofolate accumulation of a 5-FCL-deficient Escherichia coli strain. Instead, it may play a role in thiamin metabolism.
