identifier: Pfam:PF17516
label: ProQ C-terminal domain
definition: >-
  This domain is found at the C terminus of many ProQ proteins. ProQ is a RNA chaperone with significant RNA binding, RNA strand exchange and RNA duplexing activities. It may regulate ProP activity through an RNA-based, post-transcriptional mechanism. It contains a FinO-like domain that serves as a high-affinity RNA-binding domain and a Hfq-like domain that is largely responsible for RNA strand exchange and duplexing.
