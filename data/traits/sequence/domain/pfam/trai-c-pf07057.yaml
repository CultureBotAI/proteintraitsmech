identifier: Pfam:PF07057
label: DNA helicase TraI, C-terminal
definition: >-
  This entry represents the C-terminal domain of the bacterial DNA helicase TraI. TraI is a bifunctional protein that catalyses the unwinding of duplex DNA as well as acts as a sequence-specific DNA trans-esterase, providing the site- and strand-specific nick required to initiate DNA transfer. This domain is essential for conjugative DNA transfer.
