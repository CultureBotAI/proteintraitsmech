identifier: Pfam:PF10662
label: Ethanolamine utilisation - propanediol utilisation
definition: >-
  Members of this family function in ethanolamine and propanediol degradation pathways. Both pathways require coenzyme B12 (adenosylcobalamin, AdoCbl). Bacteria that harbour these pathways can use ethanolamine as a source of carbon and nitrogen, or propanediol as a sole carbon and energy source, respectively. The exact roles of the EutP and PduV proteins in these respective pathways are not yet determined, however, EutP is a putative bidirectional acetate kinase that may drive flux through the ethanolamine degradation pathway under anoxic conditions found when Salmonella typhimurium infects host intestine. It may generate ATP that can be used by other enzymes (EutA and EutT) in the eut pathway. It can use GTP instead of ATP with reduced efficiency. Members of this family contain P-loop consensus motifs in the N-terminal part, and are distantly related to various GTPases and ATPases, including ATPase components of transport systems. Propanediol degradation is thought to be important for the natural Salmonella populations, since propanediol is produced by the fermentation of the common plant sugars rhamnose and fucose. More than 1% of the Salmonella enterica genome is devoted to the utilisation of propanediol and cobalamin biosynthesis. In vivo expression technology has indicated that propanediol utilisation ( pdu ) genes may be important for growth in host tissues, and competitive index studies with mice have shown that pdu mutations confer a virulence defect. The pdu operon is contiguous and co-regulated with the cobalamin (B12) biosynthesis cob operon, indicating that propanediol catabolism may be the primary reason for de novo B12 synthesis in Salmonella.
