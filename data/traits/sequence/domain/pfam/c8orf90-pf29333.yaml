identifier: Pfam:PF29333
label: Uncharacterised protein C8orf90
definition: >-
  This entry represents human C8orf90 and similar proteins mainly found in mammals. These proteins contain proline-rich regions with compositional bias. The proteins have disordered regions at both the N-terminal and C-terminal ends. The protein is characterised by the presence of multiple proline residues concentrated in specific regions. The function of this protein family remains to be determined.
