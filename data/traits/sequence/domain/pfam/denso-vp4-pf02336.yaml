identifier: Pfam:PF02336
label: Capsid protein VP4
definition: >-
  The virus capsid is composed of 60 icosahedral units of a combination of VP4, VP3, VP2 and VP1. Four different translation initiation sites of the Densovirus capsid protein mRNA give rise to these four viral proteins, VP1 to VP4. This family represents VP4.
