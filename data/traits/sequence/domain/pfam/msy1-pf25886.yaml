identifier: Pfam:PF25886
label: Mechanosensitive ion channel protein Msy1-like, transmembrane domain
definition: >-
  This domain is found in Mechanosensitive ion channel protein Msy1/2 from Schizosaccharomyces pombe, Mechanosensitive ion channel protein 9/10 from Arabidopsis thaliana (MSL9/10), and similar sequences from fungi and plants. Msy1 regulates intracellular calcium levels and cell volume for survival in response to hypo-osmotic shock. This protein is involved in the response to membrane stretch and in maintaining vacuole integrity. MSL9/10 open in response to stretch forces in the membrane lipid bilayer. This domain, usually found associated with , is predicted to show an all-α configuration.
