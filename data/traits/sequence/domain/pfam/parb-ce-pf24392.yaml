identifier: Pfam:PF24392
label: ParB CE domain
definition: >-
  This entry represents a ParB-like domain predicted to act as a catalytic effector (CE) in multiple antiviral immunity systems and predicted to target nucleotides along with Calcineurin-CE, HD-CE and PRTase-CE. ParB plays a vital role in chromosome partitioning and nucleoid occlusion. These proteins are essential for ensuring proper chromosome segregation during cell division by binding to the DNA origin of replication and localising to both poles of the predivisional cell following DNA replication. ParB proteins share significant sequence and structural similarity with Sulfiredoxin (Srx), a sulfinic acid reductase identified in eukaryotes. Sequence comparison and phylogenetic analysis of the Srx and ParB protein families suggest that Srx evolved via truncation of ParB, resulting in the removal of the entire C-terminal half of the protein including the HTH domain. ParB comprises three highly conserved domains: an N-terminal nucleotide-binding domain (NBD) , a central helix-turn-helix parS-binding domain , non-structured linker region, and a C-terminal dimerisation domain that tightly links the two subunits of the ParB dimer.
