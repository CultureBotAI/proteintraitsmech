identifier: Pfam:PF21524
label: SAM domain-containing protein 1, WH domain
definition: >-
  This entry represents a novel distinct group of WH domains. SAM domain-containing protein 1 (SAMD1, also known as Atherin) is an unmethylated CpG island (CGI)-binding protein that acts as a repressive chromatin regulator. It consists of a C-terminal SAM domain ( ), a central unstructured region and an atypical winged helix N-terminal domain that directly recognises unmethylated CpG-containing DNA. This domain has also been found in the transcriptional regulators KAT6A, KAT6B, and ZMYND11 which were grouped together as a novel class of WH domains (represented here).
