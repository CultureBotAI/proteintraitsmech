identifier: Pfam:PF12197
label: LCI fold
definition: >-
  This entry represents the LCI fold found in bacteria, functionally related to antimicrobial activity. It is approximately 40 amino acids in length and consists of three antiparallel β-strands in a β1-β3-β2 topology. This domain has been reported linked to CHAP, PGBD and SH3 domains in a putative cysteine protease.
