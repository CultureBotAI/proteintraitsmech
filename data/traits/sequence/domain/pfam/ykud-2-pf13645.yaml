identifier: Pfam:PF13645
label: L,D-transpeptidase catalytic domain
definition: >-
  This domain is found in uncharacterised proteins from Gammaproteobacteria. It is predicted to adopt a structure which has similarity to SPM domain. The Ca2+ binding sites are not conserved suggesting that this domain doesn't bind Ca2+ ions. This domain is frequently found in combination with representing a group of putative L,D-transpeptidase domains.
