identifier: Pfam:PF25312
label: Allergen Asp f 4-like domain
definition: >-
  This entry represents a major allergen from Aspergillus fumigatus that is mainly found in filamentous ascomycete fungi and is strongly associated with allergic bronchopulmonary aspergillosis (ABPA). The protein contains four conserved cysteine residues at positions 81, 198, 236, and 243 that are important for IgE antibody binding and protein structure. The C-terminal cysteines appear particularly important for immunoreactivity. Based on ECOD classification, this protein belongs to the Osmotin-like superfamily, suggesting it likely adopts a beta-rich immunoglobulin-like fold similar to other antifungal proteins in this group. This entry also includes an uncharacterised group of proteins from Myxococcales bacteria.
