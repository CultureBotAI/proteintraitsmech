identifier: Pfam:PF22368
label: Response regulator protein ChxR, N-terminal domain
definition: >-
  This domain is found at the N-terminal of the response regulator protein ChxR from Chlamydia trachomatis ( ). ChxR is organised into a receiver domain, represented in this entry, and a C-terminal effector domain ( ). Dimerisation occurs through the receiver domain. It shows an α-β configuration.
