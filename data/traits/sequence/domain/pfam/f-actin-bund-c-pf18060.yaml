identifier: Pfam:PF18060
label: F actin bundling C terminal
definition: >-
  This is the C-terminal domain found in 34kDa F actin bundling protein ABP34, a calcium regulated actin binding protein that cross links actin filaments into bundles. Residues 216-244 in the C-terminal domain are part of the strongest actin-binding sites (residue 193 residue 254) and have conserved sequences with the actin-binding regions of alpha-actinin and ABP120.
