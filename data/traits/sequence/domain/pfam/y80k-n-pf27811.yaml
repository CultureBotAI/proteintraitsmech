identifier: Pfam:PF27811
label: Uncharacterised 80 kDa protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of an uncharacterised protein family found in ciliates. The domain is found N-terminal to a transmembrane region in proteins of approximately 680 amino acids. Proteins in this group are predicted to be single-pass membrane proteins with extensive N-linked glycosylation. The function of this domain remains to be determined.
