identifier: Pfam:PF23364
label: MAX effector
definition: >-
  This entry represents a family of MAX effectors (for Magnaporthe Avrs and ToxB like) from Magnaporthe oryzae (rice blast fungus). MAX effectors share a conserved β-sandwich structure ( ), despite sharing low sequence similarity between them They also contain two highly conserved cysteines. Effectors are small and very diverse proteins secreted by fungi and translocated in plant cells during infection. They are usually secreted during plant infection. The effectors are small proteins (under 200 amino acids) whose specific targets remain only partially known. Effectors show very divergent sequences, sharing a signal peptide on the N-terminal end. This signal peptide is essential for their secretion and then their translocation inside the plant cell.
