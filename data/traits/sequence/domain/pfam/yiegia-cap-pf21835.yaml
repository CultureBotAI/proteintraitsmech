identifier: Pfam:PF21835
label: Capping complex subunit for YIEGIA
definition: >-
  This entry contains a family of small protein of unknown function. Proteins in this family are found in Firmicutes. These proteins adopt a β-sheet structure with four strands with an α-helix packed on one face between the second and third strands. Using AlphaFold we can identify a likely hexameric ring complex. Additionally these proteins likely form a cap on a goblet like hexameric complex of . Analysis of genomic context suggests this larger complex is involved in spore germination and possibly phospholipid synthesis or regulation.
