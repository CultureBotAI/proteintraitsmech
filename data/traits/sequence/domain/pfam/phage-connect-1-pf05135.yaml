identifier: Pfam:PF05135
label: Phage gp6-like head-tail connector protein
definition: >-
  This family of proteins contain head-tail connector proteins related to gp6 from bacteriophage HK97. The gp15 protein of Bacillus phage SPP1, for which the tertiary structure is known, is included in this entry. This family contain head-tail connector proteins related to gp6 from bacteriophage HK97. These proteins show similarities to the gp6 protein of phage HK97, and, probably, it is part of the head-tail connector by binding to the portal protein and to the tail completion protein. The bacteriophage HK97 gp6 protein is critical in the assembly of the connector, a specialized structure that serves as an interface for head and tail attachment, as well as a point at which DNA exits the head during infection by the bacteriophage. The gp15 protein of Bacillus phage SPP1, for which the tertiary structure is known, is included in this entry.
