identifier: Pfam:PF03291
label: mRNA (guanine-N(7))-methyltransferase domain
definition: >-
  This entry represents mRNA (guanine-N(7))-methyltransferase, which can either be found as a single domain protein, or as a domain within the mRNA-capping enzyme catalytic subunit. mRNA (guanine-N(7))-methyltransferase methylates the N7 position of the added guanosine to the 5'-cap structure of mRNAs. It binds RNA containing 5'-terminal GpppC. Viral mRNA capping enzymes, meanwhile, are multidomain proteins that catalyse the first two reactions in the mRNA cap formation pathway. They are heterodimers consisting of a large (catalytic) and small subunit.
