identifier: Pfam:PF18393
label: MotY N-terminal domain
definition: >-
  The bacterial flagellar motor is a rotary motor complex composed of various proteins. MotX and MotY are essential for the Na+-driven flagellar motor motility of Vibrio, Shewanella and Aeromonas species. MotY is main component for T-ring formation and absence of MotY completely disrupt the T-ring formation. This is the N-terminal domain of MotY which is shown to be essential for motility and responsible for the interaction with both MotX and the basal body. Functional analysis suggests that MotY-N connects the basal body to MotX and that the PomA/PomB complex associates with MotX to form the functional stator complex around the rotor. MotY-N alone does not associate strongly with the basal body, but the partial T-ring structure made of the MotY-N/MotX complex is sufficient to allow at least a few PomA/PomB stator complexes to be incorporated into the motor.
