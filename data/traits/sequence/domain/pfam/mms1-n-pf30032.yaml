identifier: Pfam:PF30032
label: MMS1 N-terminal WD40-like domain
definition: >-
  This entry represents the N-terminal WD40-like domain of MMS1 proteins. MMS1 is a component of cullin-RING-based E3 ubiquitin-protein ligase complexes involved in DNA damage response and replication fork stabilisation. The protein is localised to the nucleus and is enriched on chromatin at stalled replication forks.
