identifier: Pfam:PF23790
label: Kyanoviridae Gp96 protein
definition: >-
  This family represents the Gp90-like protein from Synechococcus phages. Sequences in the family are typically around 110 residues in length. Gp90 homologues are found in a variety of different tailed bacteriophages. The function of Gp90 is currently unknown.
