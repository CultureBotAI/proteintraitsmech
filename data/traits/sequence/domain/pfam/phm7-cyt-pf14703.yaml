identifier: Pfam:PF14703
label: Cytosolic domain of 10TM putative phosphate transporter
definition: >-
  This is the cytosolic domain of integral membrane proteins, such as plant OSCA1, yeast PHM7 and CSC1-like protein 1 (also known as TRANSMEMBRANE PROTEIN 63A),. Fold recognition programs consistently and with high significance predict this domain to be distantly homologous to RNA binding proteins from the RRM clan. CSC1, OSCA1 and PHM7 are mechanosensitive calcium-permeable ion channels consisting of an N-terminal transmembrane domain (RSN1_TM), a cytosolic domain and a 7TM region at the C-terminal. Fold recognition programs consistently and with high significance predict this domain to be distantly homologous to RNA binding proteins from the RRM clan. Human CSC1-like protein 1 is involved myelin development.
