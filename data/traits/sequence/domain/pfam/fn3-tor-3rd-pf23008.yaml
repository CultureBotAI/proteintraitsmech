identifier: Pfam:PF23008
label: Tyrosine-protein kinase receptor torso, third FN3 domain
definition: >-
  This domain is found in the Tyrosine-protein kinase receptor torso from Bombyx mori (Tor), which is involved in the initiation of metamorphosis during postembryonic development. This protein is organised into three consecutive fibronectin type III (FN3) domains and a C-terminal Kinase domain. This entry represents the third FN3 domain.
