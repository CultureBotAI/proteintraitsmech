identifier: Pfam:PF08014
label: Microtubule-associated tyrosine carboxypeptidase
definition: >-
  This entry includes microtubule-associated tyrosine carboxypeptidases, proteins that remove the C-terminal tyrosine residue of alpha-tubulin, thereby regulating microtubule dynamics and function. They are also able to remove the C-terminal phenylalanine residue of alpha-tubulin TUBA8. These proteins recognise adjacent tubulin dimers along the same protofilament.
