identifier: Pfam:PF27145
label: YfhS family
definition: >-
  This entry represents a family of uncharacterised proteins found in bacillales, including YfhS from Bacillus subtilis. YfhS is expressed in the mother cell during sporulation and its expression is sigma E-dependent. The protein is located near the sspE locus, which encodes a small acid-soluble spore protein. However, its specific biological function remains unknown.
