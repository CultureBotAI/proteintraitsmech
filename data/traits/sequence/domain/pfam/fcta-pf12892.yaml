identifier: Pfam:PF12892
label: Spy0128-like isopeptide containing domain
definition: >-
  This entry describes a domain that occurs once in the major pilin of Streptococcus pyogenes, Spy0128, but in higher copy numbers in other streptococcal and related bacteria proteins. The domain occurs nine times in a surface-anchored protein of Bifidobacterium longum. All members of this family have LPXTG-type sortase target sequences. The Streptococcus pyogenes major pilin has been shown to undergo isopeptide bond cross-linking, mediated by sortases, that are critical to maintaining pilus structural integrity. One such Lys-to-Asn isopeptide bond is to a near-invariant Asn near the C-terminal end of this domain. A Glu in the S. pyogenes major pilin, invariant as Glu or Gln, is described as catalytic for isopeptide bond formation.
