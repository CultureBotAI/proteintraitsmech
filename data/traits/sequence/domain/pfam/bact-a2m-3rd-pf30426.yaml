identifier: Pfam:PF30426
label: Bacterial alpha-2-macroglobulin, Ig-like domain 3
definition: >-
  This entry represents an Ig-like domain found in some alpha-2-macroglobulin homologues from gamma and betaproteobacteria. It is located between the MG2 domain ( ) and the A2M_BRD domain ( ). Alpha-2- macroglobulins are large protease inhibitors that protect cells from host peptidases. Some bacterial homologues lack the conserved thioester bond characteristic of eukaryotic alpha-2-macroglobulins.
