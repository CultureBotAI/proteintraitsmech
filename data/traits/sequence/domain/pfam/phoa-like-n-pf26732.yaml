identifier: Pfam:PF26732
label: PhoA-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain in putative alkaline phosphatases (PhoA), from fungi. PhoA acts as a non-specific phosphomonoesterase to hydrolyse phosphate esters, optimally at high pH. This domain appears to be specific to PhoA proteins mainly from Ascomycota, but not all, as PhoA from Saccharomyces cerevisiae and Schizosaccharomyces pombe lack this N-terminal domain. This domain contains mainly β-sheets with an Ig-like fold.
