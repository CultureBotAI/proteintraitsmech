identifier: Pfam:PF12202
label: Oxidative-stress-responsive kinase 1 C-terminal domain
definition: >-
  Oxidative-stress-responsive kinase 1 (OSR1) is involved in the signalling cascade which activates Na/K/2Cl co-transporter during osmotic stress. This entry represents the CCT domain found in OSR1, STE20/SPS1-related kinase and in WNK activators. This domain is found in eukaryotes, and is approximately 40 amino acids in length. There is a single completely conserved residue F that may be functionally important.
