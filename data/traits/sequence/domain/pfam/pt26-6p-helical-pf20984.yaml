identifier: Pfam:PF20984
label: PT26-6P, helical domain
definition: >-
  This domain is found at the C-terminal end of T26-6P , a large protein encoded by a plasmid from the hyperthermophilic archaea Thermococcus. This protein, present in all members of a family of mobile elements, has homologues in archaeal genomes. T26-6p has three domains: two β- sandwich with two sheets made of four antiparallel β-strands ( and ) and a bundle of five α-helices (this entry). Its function is unknown.
