identifier: Pfam:PF30925
label: CCDC146 C-terminal coiled-coil domain
definition: >-
  This entry represents the C-terminal coiled-coil domain found in CCDC146 (Coiled-coil domain-containing protein 146) from vertebrates. CCDC146 is essential for sperm flagellum biogenesis and male fertility. The full-length protein localises to centrioles, the flagellum axoneme, cilium basal body and midbody, and interacts with CCDC38, CCDC42 and intraflagellar transport proteins IFT20 and IFT88. Variants in CCDC146 cause spermatogenic failure 94 (SPGF94), characterised by reduced sperm motility and multiple morphological abnormalities of the flagella. While the full-length protein is required for flagellum assembly, the specific function of this C-terminal domain remains to be determined.
