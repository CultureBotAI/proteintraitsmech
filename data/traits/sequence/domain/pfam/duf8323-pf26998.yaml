identifier: Pfam:PF26998
label: Domain of unknown function (DUF8323)
definition: >-
  This entry represents a domain of unknown function in a small group of proteins mostly found in animals , particularly nematodes. This domain contains a Spectrin fold with a conserved three-helix bundle structure that is typically arranged in tandem repeats. These repeats confer mechanical flexibility and structural resilience, allowing the proteins to maintain cell shape and organisation. Spectrin-repeat proteins form elongated scaffolds beneath the plasma membrane and contribute to cytoskeletal integrity and membrane stability. This domain can be found associated with .
