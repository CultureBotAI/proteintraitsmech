identifier: Pfam:PF28426
label: ATRIP C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ATRIP (ATR-interacting protein) found in vertebrates. The C-terminal domain contains a conserved EEXXXDDL motif (residues 769-776 in human ATRIP) that is essential for interaction with the catalytic subunit PRKDC and its recruitment to sites of DNA damage. ATRIP is essential for DNA damage checkpoint signalling. The full-length protein forms a heterodimer with ATR kinase and is recruited to single-stranded DNA through interaction with RPA complexes. The ATR-ATRIP heterodimer binds the RPA complex and is recruited to single- stranded DNA during DNA damage response. ATRIP localises to the nucleus and redistributes to discrete nuclear foci upon DNA damage. The protein is phosphorylated by ATR and is required for ATR expression and stability.
