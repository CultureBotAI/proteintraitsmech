identifier: Pfam:PF23989
label: PilB3-like, C-terminal
definition: >-
  This domain is found at the C-terminal of PilB3 from Haloferax volcanii and similar archaeal proteins. This domain, normally found C-terminal to , is predicted to show an α-β structure. PilB3 is involved in the biosynthesis and assembly of type IV pili, which are filamentous protein structures on the cell surface that play various roles in cellular processes. PilB3 works in conjunction with PilC3 as part of the PilB3-C3 system in Haloferax volcanii.
