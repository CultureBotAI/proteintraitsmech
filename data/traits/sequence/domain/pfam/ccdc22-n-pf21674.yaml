identifier: Pfam:PF21674
label: CCDC22 protein N-terminal domain
definition: >-
  This entry represents the N-terminal helical domain of the CCDC22 and its homologues from animals and plants. CCDC22 is involved in regulation of NF-kappa-B signalling; the function may involve association with COMMD8 and a CUL1-dependent E3 ubiquitin ligase complex. It is part of the COMMD/CCDC22/CCDC93 (CCC) complex, which interacts with the multisubunit WASH complex required for endosomal deposition of F-actin and cargo trafficking in conjunction with the retromer. This entry also includes CCDC22 homologues from animals and plants.
