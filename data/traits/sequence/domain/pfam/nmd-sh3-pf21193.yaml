identifier: Pfam:PF21193
label: NMD3 SH3 domain
definition: >-
  A key step in ribosome biogenesis is the nuclear export of pre-ribosomal particles. 60S ribosomal export protein NMD3, a highly conserved protein in eukaryotes, is a specific adaptor required for the export of pre-60S particles. This entry represents the second domain in NMD3 which adopts an SH3-fold denoted as RBDII in. The two short α-helices in RBDII participate in rRNA recognition.
