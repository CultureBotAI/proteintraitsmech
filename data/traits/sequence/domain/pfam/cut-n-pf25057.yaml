identifier: Pfam:PF25057
label: Cuticlin N-terminal domain
definition: >-
  This entry represents the N-terminal Ig-like domain of cuticlins 1/3-6 from C. elegans. Cuticlin is a component of the cuticles, which contributes to the formation of extracellular envelopes protecting the organism from the environment. It also plays a role in alae formation in dauer larvae.
