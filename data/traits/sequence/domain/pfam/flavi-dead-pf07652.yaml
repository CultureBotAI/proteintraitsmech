identifier: Pfam:PF07652
label: 'Flavivirus DEAD domain '
definition: >-
  The non-structural protein NS3 from flavivirus is a bifunctional protein that contains an N-terminal protease ( ) and a C-terminal helicase domains that plays an essential role in viral polyprotein processing and genome replication. The N-terminal domain is a chymotrypsin-like serine protease, which is responsible for most of the maturation cleavages of the polyprotein precursor in the cytosolic side of the endoplasmic reticulum membrane. The C-terminal domain, is a helicase belonging to superfamily 2 (SF2) that unwinds the dsRNA and removes the gamma-phosphate at the 5'-RNA prior to RNA cap addition. This entry represents the DEAD-box domain from flavivirus NS3 helicase domain. This domain is also found in a group of potyviruses, which are plant viruses, such as Zucchini yellow mosaic virus, Plum pox potyvirus and Tobacco etch virus.
