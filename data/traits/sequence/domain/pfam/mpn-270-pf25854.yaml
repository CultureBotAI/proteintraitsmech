identifier: Pfam:PF25854
label: Mycoplasma MPN_270/MG131 three-helix transmembrane protein
definition: >-
  This entry represents a family of small three-helix transmembrane proteins found in Mycoplasma species. Members contain three predicted transmembrane helices that form a three-helix bundle. In Mycoplasma genitalium, this protein (MG131) has been experimentally demonstrated to be non-essential for growth as determined by gene deletion studies. The specific function of this protein family remains unknown.
