identifier: Pfam:PF29368
label: FMRFamide-like neuropeptide 27 precursor
definition: >-
  This entry represents the precursor of FMRFamide-like neuropeptide 27 (FLP-27) found in nematodes. The precursor contains a signal peptide and is processed to yield the mature neuropeptide EASAFGDIIGELKGKGLGGRMRF-amide. FMRFamides and FMRFamide-like peptides function as neuropeptides involved in signalling pathways. Each flp gene is expressed in a distinct set of neurons. The family belongs to the FARP (FMRFamide related peptide) family and is secreted into the extracellular region.
