identifier: Pfam:PF03841
label: L-seryl-tRNA selenium transferase
definition: >-
  In prokaryotes, the incorporation of selenocysteine as the 21st amino acid, encoded by TGA, requires several elements: SelC is the tRNA itself, SelD acts as a donor of reduced selenium, SelA modifies a serine residue on SelC into selenocysteine, and SelB is a selenocysteine-specific translation elongation factor. 3-prime or 5-prime non-coding elements of mRNA have been found as probable structures for directing selenocysteine incorporation. This entry describes SelA and pyridoxal phosphate enzymes of unknown function. A close homologue of SelA is found in Helicobacter pylori, but all other required elements are missing and the protein is shorter at the N terminus than SelA from other species.
