identifier: Pfam:PF29135
label: LIN-13 zinc finger protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of LIN-13 zinc finger proteins found in nematodes. LIN-13 is involved in repression of vulval fate and plays a role in recruiting chromobox protein homologue HPL-2 to specific chromatin sites. This N-terminal domain is located after a large disordered region and precedes multiple C2H2-type zinc finger domains. The domain is approximately 140 amino acids in length. The specific function of this domain remains to be determined.
