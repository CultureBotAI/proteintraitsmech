identifier: Pfam:PF17802
label: Prealbumin-like fold domain
definition: >-
  This entry contains a prealbumin-like fold domain from a wide variety of bacterial surface proteins. This entry corresponds to domain 1 and domain 3 of SpaA from Corynebacterium diphtheriae. It is also present in Collagen adhesin and Trypsin-resistant surface T6 protein from Streptococci species. Some members of this family contain an isopeptide bond. This domain is also found in eukaryotic proteins including Nodal modulators.
