identifier: Pfam:PF30549
label: Intimin, first Ig-like domain
definition: >-
  This entry represents an Ig-like domain found in Intimin, Invasin and Inverse autotransporter adhesin YeeJ. Intimin (Eae), an inverse autotransporter that functions as an adhesin, which mediates attachment to the human intestine epithelial cells. In intimin, this entry represents the first Ig-like domain rom a tandem of four, found after the autotransporter domain ( ).
