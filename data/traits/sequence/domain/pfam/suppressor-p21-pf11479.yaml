identifier: Pfam:PF11479
label: RNA silencing suppressor P21 C-terminal domain
definition: >-
  P21 is produced by Beet yellows virus to suppress the antiviral silencing response mounted by the host. P21 acts by binding directly to siRNA which is a mediator in the process. P21 has an octameric ring structure with a large central cavity.
