identifier: Pfam:PF19259
label: Ty3 transposon capsid-like protein
definition: >-
  This entry corresponds to the capsid protein found in the Ty3 transposons of yeast as well as other transposable elements present in eukaryotes. These long terminal repeat (LTR) retrotransposons share similarities with the envelope protein in retroviruses like HIV-1.
