identifier: Pfam:PF22803
label: Glycan binding domain Y3
definition: >-
  This entry represents the domain present in the glycan-binding protein Y3 from Coprinus comatus ( ) and related proteins from fungi. The structure of this domain consists of an α-β-α sandwich motif, which includes three α-helices and a five-stranded β-sheet. This domain is characterised by the presence of four intramolecular disulfide bridges.
