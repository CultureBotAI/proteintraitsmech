identifier: Pfam:PF29694
label: Regulator of Ty1 transposition protein 105
definition: >-
  This entry represents a conserved region found in regulator of Ty1 transposition protein 105 from S.cerevisiae. This protein is found in fungi and is localised to both the cytoplasm and nucleus. RTT105 is involved in regulation of Ty1 transposition, inhibiting Ty1 transposition at a post-transcriptional and pre-integrational stage of the Ty1 retrotransposition cycle. The protein also functions in nuclear import signal receptor activity and protein carrier chaperone activity. RTT105 plays roles in double-strand break repair, heterochromatin formation, and telomere maintenance. This entry also includes Protein dhm2 (also known as Uncharacterized protein C17C9.15c) from S.pombe, which is required for proper DNA replication and maintenance of heterochromatin.
