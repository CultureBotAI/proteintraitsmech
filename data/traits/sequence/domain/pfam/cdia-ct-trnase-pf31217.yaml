identifier: Pfam:PF31217
label: CdiA C-terminal tRNase toxin domain
definition: >-
  This entry represents a tRNase toxin domain found at the C-terminal of CdiA proteins in contact-dependent growth inhibition (CDI) systems. The domain adopts a crescent-shaped fold comprising three α-helices and a four-stranded antiparallel β-sheet and is structurally homologous to the C-terminal RNase domain of Colicin D. A conserved histidine residue is essential for catalytic activity. The domain cleaves tRNA molecules, with apparent preference for proline and glutamine tRNAs. It functions both in interbacterial competition and as a virulence factor against mammalian hosts. This domain is found in polymorphic toxin systems, often associated with RHS repeats, PAAR motifs and SpvB-like domains.
