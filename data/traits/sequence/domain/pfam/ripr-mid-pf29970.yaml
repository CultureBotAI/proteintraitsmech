identifier: Pfam:PF29970
label: RIPR middle domain
definition: >-
  This entry represents a middle domain found in the RH5-interacting protein (RIPR) of Plasmodium species. RIPR is an essential component of the PfRH5 adhesion complex, which facilitates merozoite invasion of human erythrocytes. The protein forms a tripartite complex with RH5 and CyRPA at the merozoite surface during host cell invasion. This domain contains a jelly roll-like fold. This proteins also contain multiple EGF-like domains.
