identifier: Pfam:PF19419
label: Family of unknown function (DUF5983) C-terminal domain
definition: >-
  This domain is mostly found in proteins from proteobacteria that are likely to be phage derived. It is predicted to fold into a β-sheet with α-helices packed on one face. Structure prediction suggests that this domain is likely to form a homodimeric structure. This domain covers the whole legth of the sequence in many proteins and is found at the C-terminal end, associated with , in others.
