identifier: Pfam:PF30758
label: ORANGE protein C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ORANGE (OR) proteins, which are found in land plants (Embryophyta). ORANGE proteins are chloroplast-localised regulators of carotenoid biosynthesis that function through post-transcriptional regulation of phytoene synthase (PSY). A conserved arginine residue within this domain region is critical for carotenoid accumulation; substitution to histidine promotes carotenoid overaccumulation in both Arabidopsis and melon. The proteins are related to the DnaJ family but lack the J domain, and possess a C-terminal CR-type-like zinc finger region. This entry also includes Protein PHOTOSYSTEM I ASSEMBLY 2, chloroplastic.
