identifier: Pfam:PF22218
label: SAS-6, C-terminal coiled coil
definition: >-
  This domain is found at the C-terminal end of Spindle assembly abnormal protein 6 (Sas-6). Sas-6 is a central scaffolding component of the centrioles ensuring their nine-fold symmetry. Sas-6 forms a dimer through this domain to then further homo-oligomerise to form a ring structure from which the CC domains emanate as spokes.
