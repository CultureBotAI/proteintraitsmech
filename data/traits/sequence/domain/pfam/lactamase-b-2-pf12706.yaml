identifier: Pfam:PF12706
label: Beta-lactamase superfamily domain
definition: >-
  Metallo beta lactamases exhibit low sequence identity between enzymes but they are structurally similar. They have a characteristic α-β/β-α sandwich fold in which the active site is at the interface between domains. Apart from the beta-lactamases and metallo-beta-lactamases, a number of other proteins contain this domain and share the same fold type. These proteins include thiolesterases, members of the glyoxalase II family, that catalyse the hydrolysis of S-D-lactoyl-glutathione to form glutathione and D-lactic acid and a competence protein that is essential for natural transformation in Neisseria gonorrhoeae and could be a transporter involved in DNA uptake. Except for the competence protein these proteins bind two zinc ions per molecule as cofactor.
