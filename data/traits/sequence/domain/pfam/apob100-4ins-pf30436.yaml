identifier: Pfam:PF30436
label: Apolipoprotein B100, insert 4
definition: >-
  This domain is found in the human Apolipoprotein B100 and related proteins. Apolipoprotein B100 (apoB100), one of the largest proteins in the genome, is the primary structural and functional component of the Low-density lipoprotein (LDL). ApoB100 functions as a recognition signal for the cellular binding and internalization of LDL particles by the apoB/E receptor. The domain represented by this entry is described as insert 4. This is an R-face insert and forms an extended prong-shaped appendage with two highly articulated arms. The insert 4 is the main structural domain of the R-face.
