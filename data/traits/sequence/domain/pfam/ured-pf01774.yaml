identifier: Pfam:PF01774
label: UreD urease accessory protein
definition: >-
  UreD is a urease accessory protein. Urease hydrolyses urea into ammonia and carbamic acid. UreD is involved in activation of the urease enzyme via the UreD-UreF-UreG-urease complex and is required for urease nickel metallocentre assembly. This entry includes UreH from Helicobacter pylori, which is an orthologue of UreD. This entry also includes the URE4 from Cryptococcus neoformans which is a fungal homologue of UreD and pays a role in host brain invasion causing meningoencephalitis.
