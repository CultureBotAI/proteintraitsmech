identifier: Pfam:PF09081
label: Glucan 1,4-alpha-maltotetraohydrolase, domain C
definition: >-
  Glucan 1,4-alpha-maltotetraohydrolase AMT4 ( ), also known as maltooligosaccharide-forming amylase (MFA), degrades starch into maltooligosaccharides. Crystal structure of AMT4 from Pseudomonas saccharophila, which shares high sequence similarity with AMT4 from P. stutzeri, revealed that it folds into three domains, domain A, B and C. This entry represents domain C, which consists of five antiparallel β-strands.
