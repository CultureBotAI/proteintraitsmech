identifier: Pfam:PF28794
label: FAD synthetase 1/2, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of FAD synthetase 1 and 2 (RIBF1/2) from Arabidopsis thaliana and related plant proteins. RIBF1/2 catalyse the adenylation of flavin mononucleotide (FMN) to form flavin adenine dinucleotide (FAD) coenzyme.
