identifier: Pfam:PF21099
label: DNA_pol_Q helicase like region helical domain
definition: >-
  DNA polymerase theta (Pol Theta, encoded the POLQ gene) is one of ~15 DNA polymerases in the human genome. PolQ is distinct among human DNA polymerases, exhibiting not only a C-terminal DNA polymerase domain but also an N-terminal domain exhibiting similarity and motifs typical of superfamily 2 (SF2) helicases. This entry corresponds to the helical domain. This entry also includes mammal Helicase POLQ-like (HELQ,) and Helicase and polymerase-containing protein TEBICHI (TEB,).
