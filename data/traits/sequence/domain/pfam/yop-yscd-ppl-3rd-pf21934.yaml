identifier: Pfam:PF21934
label: YscD/CdsD-like Bon-like domain 3
definition: >-
  This entry represents the third of three periplasmic BON domains. YscD is a single-pass inner membrane protein required for the export process of the Yop proteins. It is an essential component of the type III secretion system. YscD contains an N-terminal cytoplasmic domain ( ), a transmembrane linker and a large periplasmic region formed by the three BON domains ( ), ( ) and ( ). YscD forms part of the inner membrane component of the bacterial type III secretion injectosome apparatus.
