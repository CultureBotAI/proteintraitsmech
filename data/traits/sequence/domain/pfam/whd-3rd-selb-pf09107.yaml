identifier: Pfam:PF09107
label: 'Elongation factor SelB, winged helix '
definition: >-
  This domain is found in Elongation factor SelB from Moorella thermoacetica ( ) and similar bacterial proteins. SelB is a selenocysteine(Sec)-specific elongation factor that brings the selenocysteinyl-tRNA(Sec) to the ribosome. It consists of three EF-Tu-like domains followed by four winged-helix domains (WHD1-4). This entry represents the fourth winged-helix domains (WHD4). Selenocysteine is coded by a UGA stop codon in combination with a specific downstream mRNA hairpin. In bacteria, the C-terminal part of SelB recognises this hairpin, while the N-terminal part binds GTP and tRNA in analogy with elongation factor Tu (EF-Tu). The SelB C-terminal part comprises the four winged-helix domains that are arranged in tandem into 'L' shape.
