identifier: Pfam:PF16251
label: Betacoronavirus nucleic acid-binding (NAB)
definition: >-
  This entry represents the nucleic acid binding domain (NAB/NAR), of approximately 100 residues in length, found in the multidomain nonstructural protein NSP3 from betacoronavirus, and described as NSP3e domain. NSP3 is part of Orf1a polyproteins in SARS-CoV. It is an essential component of the replication/transcription complex. The global domain of the NAB represents a new fold, with a parallel four-strand β-sheet holding two α-helices of three and four turns that are oriented antiparallel to the β-strands. A group of residues form a positively charged patch on the protein surface as the binding site responsible for binding affinity for nucleic acids. When binding to ssRNA, the NAB prefers sequences with repeats of three consecutive Gs, such as (GGGA)5 and (GGGA)2. A positively charged surface patch (Lys75, Lys76, Lys99, and Arg106) is involved in RNA binding.
