identifier: Pfam:PF14243
label: ATP-grasp domain, R2K clade family 3
definition: >-
  Proteins containing this domain are a group of ATP-grasp enzymes belonging to the R2K clade, wherein one of the absolutely-conserved lysine residues has migrated to the RAGYNA domain which is a part of the core ATP-grasp module. This family is predicted to catalyse peptide ligation reactions on protein substrates in biological conflict contexts, probably between bacteriophages and their hosts.
