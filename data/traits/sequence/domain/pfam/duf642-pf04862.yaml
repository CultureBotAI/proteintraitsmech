identifier: Pfam:PF04862
label: Protein of unknown function (DUF642)
definition: >-
  This entry represents a domain found twice in the protein DUF642 L-galactono-1,4-lactone-responsive gene 2 from Arabidopsis thaliana (DGR2) and similar proteins found in plants and bacteria. DGR2 is involved in the regulation of testa rupture during seed germination and in the development of roots and rosettes. This domain was previously known as DUF642.
