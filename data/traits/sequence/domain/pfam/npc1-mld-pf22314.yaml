identifier: Pfam:PF22314
label: NPC1, middle luminal domain
definition: >-
  NPC intracellular cholesterol transporter 1 (NPC1) is a endosomal/lysosomal membrane protein that facilitates the trafficking of cholesterol and other cargo from lysosomes and is involved in cholesterol homeostasis. Mutations in the NPC1 gene cause the rare neurodegenerative disease Niemann-Pick Type C (NPC). This entry represents the middle luminal domain (MLD) of NPC1, which contains the Ebola glycoprotein interacting site.
