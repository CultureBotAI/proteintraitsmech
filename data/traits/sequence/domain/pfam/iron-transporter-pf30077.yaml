identifier: Pfam:PF30077
label: Putative iron transporter
definition: >-
  This entry represents putative iron transporters found in Plasmodium species. These proteins are multi-pass transmembrane proteins localised to the cell membrane. Expression is modulated by iron ion levels in the environment and the proteins are expressed in blood stages. The proteins contain multiple N-linked glycosylation sites and coiled-coil regions.
