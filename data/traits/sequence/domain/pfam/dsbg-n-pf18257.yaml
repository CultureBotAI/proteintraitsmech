identifier: Pfam:PF18257
label: Disulfide isomerase DsbG N-terminal
definition: >-
  This is the N-terminal domain found in DsbG, a protein disulfide isomerase present in the periplasm of Helicobacter pylori ( ). The formation of correct disulphide bonds is critical in the folding process of many secretory and membrane proteins in bacteria. Non-native disulphides are corrected by the isomerase DsbC and, to a lesser extent, by DsbG. The N-terminal domain is involved in dimerisation. The dimer interface of Helicobacter pylori's DsbG is stabilised by hydrophobic interactions and hydrogen bonds involving alpha 1, beta-3 to beta-4 loop, beta-4 and beta-4 to alpha-2 loop. This pattern of dimerisation is similar to that of E. coli's DsbG. The crystal structure of DsbG ( ) from Helicobacter hepaticus has also been elucidated.
