identifier: Pfam:PF30143
label: Gigasin middle domain
definition: >-
  This entry represents the middle domain of gigasin-2. This entry also includes EGF-like domain-containing protein 1/2, whose function is unknown. Gigasin-2 is component of the organic matrix in calcified shell layers of bivalves, particularly oysters within the Ostreidae family. Gigasin-2 is found in molluscs and is involved in shell biomineralisation processes. The protein is secreted and localises to the shell matrix where it contributes to the structural organisation of calcium carbonate deposition during shell formation. Shell matrix proteins like gigasin-2 are essential for proper shell development and maintenance in marine bivalves.
