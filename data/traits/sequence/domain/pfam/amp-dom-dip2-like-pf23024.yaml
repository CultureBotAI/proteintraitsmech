identifier: Pfam:PF23024
label: 'Disco-interacting protein 2-like, AMP domain '
definition: >-
  This is a small domain that is found C-terminal to in ATP-dependent AMP-binding enzymes from eukaryotes, bacteria and archaea, including Acetyl-coenzyme A synthetase (Acs). In Acs, this domain undergoes a large rotation to allow for both half-reaction to occur. It shows a central β-sheet core that is flanked by α-helices. This domain can be found multiple times in the protein or in other positions. For example, this domain is found at the N-terminal region in Flagellar M-ring proteins.
