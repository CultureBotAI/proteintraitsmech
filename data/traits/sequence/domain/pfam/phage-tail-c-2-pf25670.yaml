identifier: Pfam:PF25670
label: Phage tail protein C-terminal domain
definition: >-
  This entry represents a C-terminal domain that is found in a range of probable phage tail proteins, including Gp26 from Bacteriophage T1 and from Escherichia phage vB_EcoP_SU10. The domain forms an elaborated β-sandwich domain. Members of this entry are found in tailed bacteriophages and prophages mainly found in proteobacteria.
