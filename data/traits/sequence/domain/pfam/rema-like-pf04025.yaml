identifier: Pfam:PF04025
label: Extracellular matrix regulatory protein A-like
definition: >-
  This family of mostly uncharacterised proteins includes the extracellular matrix regulatory protein A (RemA) from Bacillus subtilis . RemA is required for biosynthesis of the extracellular matrix and biofilm formation. It binds to DNA at multiple sites upstream of the promoters of the operons eps and tapA-sipW-tasA, which are required for the synthesis of the extracellular matrix components, extracellular polysaccharide and TasA amyloid proteins. SinR negatively regulates eps operon expression by occluding RemA binding. Structure of RemA homologue from Geobacillus thermodenitrificans revealed that it forms an unique octameric ring with the potential to form a 16-meric superstructure and suggests that RemA can wrap DNA around its ring-like structure.
