identifier: Pfam:PF21717
label: DTX3L, alpha/beta domain
definition: >-
  DTX3L is a RING-domain E3 ubiquitin-protein ligase that regulates endosomal sorting of the G protein-coupled receptor CXCR4 from endosomes to lysosomes. It also regulates subcellular localisation of its partner protein, B aggressive lymphoma (BAL), by a dynamic nucleocytoplasmic trafficking mechanism. This entry represents a domain found towards the N-terminal of DTX3L, whose function is unknown. According to structure predictions (AlphaFold), it may adopt a β-α-β-β-α conformation, similar to Smr domains.
