identifier: Pfam:PF20170
label: Plexin cytoplasmic RhoGTPase-binding domain
definition: >-
  This entry represents the RhoGTPase-binding domain found in the cytoplasmic domain of plexins. Plexins are receptors for semaphorins, and plexin signalling is important in pathfinding and patterning of both neurons and developing blood vessels. The cytoplasmic region, which has been called a SEX domain, and is involved in downstream signalling pathways, by interaction with proteins such as Rac1, RhoD, Rnd1 and other plexins.
