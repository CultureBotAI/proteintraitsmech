identifier: Pfam:PF23125
label: Antitoxin Xre/MbcA/ParS-like, middle domain
definition: >-
  This entry represents a small domain found in the middle region of a group of uncharacterised bacterial sequences related to the antitoxin components of a type II toxin-antitoxin (TA) system Xre/MbcA/ParS. This domain may consist of four β-sheets and two short α-helices, which is followed by a toxin-binding domain ( ).
