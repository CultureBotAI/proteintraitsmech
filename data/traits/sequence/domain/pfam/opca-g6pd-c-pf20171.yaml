identifier: Pfam:PF20171
label: Glucose-6-phosphate dehydrogenase subunit C-terminal domain
definition: >-
  This entry represents the C-terminal domain in OpcA and related proteins. OpcA protein may play a role in the functional assembly of glucose-6-phosphate dehydrogenase. The opcA gene is found immediately downstream of zwf, the glucose-6-phosphate dehydrogenase (G6PDH) gene, in a number of species, including Mycobacterium tuberculosis, Streptomyces coelicolor, Nostoc punctiforme (strain ATCC 29133/PCC 73102), and Synechococcus sp. (strain PCC 7942). In the latter, disruption of opcA was shown to block assembly of G6PDH into active oligomeric forms.
