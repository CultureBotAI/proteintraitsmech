identifier: Pfam:PF14823
label: Sirohaem biosynthesis protein C-terminal
definition: >-
  This entry represents the C-terminal domain of the siroheme biosynthesis protein Met8. In Saccharomyces cerevisiae, Met8 is a bifunctional dehydrogenase ( ) and ferrochelatase ( ). It catalyses the final two steps in the biosynthesis of sirohaem, involving a NAD(+)-dependent dehydrogenation of precorrin-2 to generate sirohydrochlorin followed by ferrochelation to yield sirohaem.
