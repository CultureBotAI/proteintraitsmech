identifier: Pfam:PF08840
label: BAAT / Acyl-CoA thioester hydrolase C terminal
definition: >-
  Acyl-CoA thioesterases are a group of enzymes that catalyse the hydrolysis of acyl-CoAs to the free fatty acid and coenzyme A (CoASH), providing the potential to regulate intracellular levels of acyl-CoAs, free fatty acids and CoASH. Bile acid-CoA:amino acid N-acetyltransferase (BAAT) is involved in bile acid metabolism and may also act as an acyl-CoA thioesterase that regulates intracellular levels of free fatty acids. This entry represents a catalytic domain is found at the C terminus of acyl-CoA thioester hydrolases and bile acid-CoA:amino acid N-acetyltransferases.
