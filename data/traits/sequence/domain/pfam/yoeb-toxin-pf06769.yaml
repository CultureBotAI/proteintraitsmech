identifier: Pfam:PF06769
label: YoeB-like toxin of bacterial type II toxin-antitoxin system
definition: >-
  This is a family of bacterial toxins that forms one component of the type II toxin-antitoxin system in E. coli whose antitoxin is represented by YefM, found in . The plasmid encoded Axe-Txe proteins in Enterococcus faecium act as an antitoxin-toxin pair. When the plasmid is lost, the antitoxin is degraded relatively quickly by host enzymes. This allows the toxin to interact with its intracellular target, thus killing the cell or impeding cell growth. These toxins are highly potent protein synthesis inhibitors, specifically blocking the initiation of translation. In the case of YoeB, it binds to the 50 S ribosomal subunit in 70 S ribosomes and interacts with the A site leading to mRNA cleavage at this site. As a result, the 3'-end portion of the mRNA is released from ribosomes, and translation initiation is effectively inhibited.
