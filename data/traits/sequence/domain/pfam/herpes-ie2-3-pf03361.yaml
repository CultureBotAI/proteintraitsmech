identifier: Pfam:PF03361
label: IE2/3-like DNA-binding domain
definition: >-
  This domain is found C-terminal in the Herpes virus 6A intermediate/early protein 2 (IE2), Immediate-early protein 3 (IE3) and related proteins from Herpesvirales, including protein UL117. The C-terminal region of HHV-6A IE2 is involved in dimerisation, DNA binding, and transcription factor binding. This domain forms a dimeric α/β barrel stabilised by two interchanging long loops. Protein UL117 from Human cytomegalovirus plays a role in the inhibition of host DNA replication in the infected cell. It targets the mini-chromosome maintenance (MCM) complex and blocks the accumulation of MCM proteins and their loading onto host chromatin. Herpesvirus 6A immediate/early protein 2 (IE2) is a multifunctional regulatory protein that plays a key role in the replication and reactivation of the virus, as well as in the regulation of both viral and cellular gene expression.
