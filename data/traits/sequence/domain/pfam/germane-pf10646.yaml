identifier: Pfam:PF10646
label: Sporulation and spore germination
definition: >-
  The GerMN domain is a region of approximately 100 residues that is found, duplicated, in the Bacillus GerM protein and is implicated in both sporulation and spore germination. It is also found in lipoprotein LpqB. The domain is present in a number of different bacterial species both alone and in association with other domains such as Gmad1 and Gmad2. It is predicted to have a novel α-β fold. LpqB may modulate activity of the MtrAB system in controlling homeostasis of the cell wall and cell division. It partially restores antibiotic resistance to M.smegmatis in which this gene has been disrupted.
