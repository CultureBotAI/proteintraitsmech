identifier: Pfam:PF01183
label: Glycosyl hydrolases family 25
definition: >-
  Glycoside hydrolase family 25 comprises enzymes with only one known activity; lysozyme ( ). It has been shown that a number of cell-wall lytic enzymes are evolutionary related and can be classified into a single family. Two residues, an aspartate and a glutamate, have been shown to be important for the catalytic activity of the Charalopsis enzyme. These residues as well as some others in their vicinity are conserved in all proteins from this family. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
