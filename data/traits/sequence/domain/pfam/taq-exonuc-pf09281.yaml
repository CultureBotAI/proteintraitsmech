identifier: Pfam:PF09281
label: Taq polymerase, exonuclease
definition: >-
  This domain is found in prokaryotic Taq DNA polymerase (thermostable), where it assumes a ribonuclease H-like motif. The domain confers 5'-3' exonuclease activity to the polymerase.
