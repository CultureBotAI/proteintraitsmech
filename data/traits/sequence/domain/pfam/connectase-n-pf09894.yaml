identifier: Pfam:PF09894
label: Connectase MJ0548-like, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Connectase MJ0548 from Methanocaldococcus jannaschii and similar archaeal sequences. MJ0548 is a distant, monomeric proteasome homologue which connects proteins in a sequence-specific manner.
