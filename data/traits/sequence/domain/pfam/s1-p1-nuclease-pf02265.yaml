identifier: Pfam:PF02265
label: S1/P1 Nuclease
definition: >-
  This family summarizes both S1 and P1 nucleases ( ) which cleave RNA and single stranded DNA with no base specificity. S1 nuclease is more active on DNA than RNA. Its reaction products are oligonucleotides or single nucleotides with 5' phosphoryl groups. Although its primary substrate is single-stranded, it may also introduce single-stranded breaks in double-stranded DNA or RNA, or DNA-RNA hybrids. It is used as a reagent in nuclease protection assays and in removing single stranded tails from DNA molecules to create blunt ended molecules and opening hairpin loops generated during synthesis of double stranded cDNA. P1 nuclease cleaves its substrate at every position yielding nucleoside 5' monophosphates, and it does not recognize or act on double-stranded DNA. It is useful at removing single stranded strands hanging off the end of double stranded DNA and at completely cleaving melted DNA for simple DNA composition analysis.
