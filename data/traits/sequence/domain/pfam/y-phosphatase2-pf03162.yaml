identifier: Pfam:PF03162
label: Tyrosine phosphatase family
definition: >-
  This group of atypical dual-specificity phosphatases are predominantly from fungi, plants and bacteria. This entry includes budding yeast Siw14 (also known as Oca3) and related proteins. Siw14 is a inositol pyrophosphate phosphatase that modulates inositol pyrophosphate metabolism by dephosphorylating the IP7 isoform 5PP-IP5to IP6. This entry also includes budding yeast Oca1/2/4/6 and Arabidopsis DSP1/2/3/4/5. All DSPs tested (AtPFA-DSP1, -2, -3, and -5) displayed phosphatase activity toward PI(3,5)P2, with AtPFA-DSP2 showing a higher activity. Oca1/2/4/6 are putative phosphatases associated with the caffeine-sensitivity stress pathway in S. cerevisiae. It also includes dual specificity protein phosphatase TpbA that regulates diverse phenotypes in P.aeruginosa via regulation of the concentration of cellular c-di-GMP. This phosphatase acts by dephosphorylating the membrane-anchored diguanylate cyclase TpbB at tyrosine and serine/threonine sites, leading to inactivation of TpbB and reduced c-di-GMP production.
