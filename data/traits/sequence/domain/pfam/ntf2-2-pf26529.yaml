identifier: Pfam:PF26529
label: NTF2-like domain
definition: >-
  This entry represents an NTF2-like domain found in a family of uncharacterised proteins from nematodes. The typical length of the proteins containing this domain ranges from approximately 450 to 550 amino acids. These proteins usually contain three copies of this domain. This domain belongs to the NTF2-like superfamily (CL0051), characterised by a partial β-barrel structure with α-helices enclosing a solvent-accessible cavity. Members of this superfamily display remarkable sequence diversity and serve diverse functions, including both enzymatic and non-enzymatic roles often involving small molecule binding or modification.
