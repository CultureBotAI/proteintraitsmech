identifier: Pfam:PF22270
label: Transcriptional regulator MlrA, helical domain
definition: >-
  The HTH transcription regulator MlrA belongs to the MerR superfamily of transcription regulators that promote expression of several stress regulon genes by re configuring the spacer between the -35 and -10 promoter elements. MlrA it is also known as YehV, and has been shown to control cell-cell aggregation by co-regulating the expression of curli and extracellular matrix production in Escherichia coli and Salmonella typhimurium. MlrA is part of a signalling cascade that regulates curli biosynthesis. These proteins have dissimilar C-terminal domains that may bind specific coactivator molecules. This entry represents an helical domain, similar to the B12-binding module cap domain ( ). This group also includes the MerR-type HTH-type transcriptional repressor BluR from Escherichia coli, which controls the expression of several small proteins that may play a role in biofilm maturation.
