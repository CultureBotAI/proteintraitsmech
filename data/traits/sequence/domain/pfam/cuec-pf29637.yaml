identifier: Pfam:PF29637
label: Conotoxin Cl14.12
definition: >-
  This entry represents the CUEC family of conotoxins found in gastropod molluscs. These are secreted neurotoxic peptides expressed by the venom duct of cone snails. The mature toxin contains a cysteine framework XIV with four cysteine residues and two disulphide bonds. Conotoxins are derived from larger precursor proteins that contain a signal peptide and propeptide region. These toxins exhibit neurotoxic activity and are important components of cone snail venom.
