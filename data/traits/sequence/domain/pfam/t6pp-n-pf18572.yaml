identifier: Pfam:PF18572
label: Trehalose-6-phosphate phosphatase N-terminal helical bundle domain
definition: >-
  This is the N-terminal domain found in trehalose-6-phosphate phosphatase (T6PP, ) from parasitic nematodes such as Brugia malayi. In the model nematode Caenorhabditis elegans, T6PP is essential for survival due to the toxic effect(s) of the accumulation of trehalose 6-phosphate. T6PP has also been shown to be essential in Mycobacterium tuberculosis. The N-terminal domain composed of a three-helix bundle is similar in topology to the Microtubule Interacting and Transport (MIT) domains of the Vps4-like ATPases from Sulfolobus acidocaldarius. MIT domains are protein-interacting domains typically associated with multivesicular body formation, cytokinetic abscission, or viral budding. Mutational analysis indicate that deletion or mutation of the MIT-like domain is highly destabilizing to the enzyme. This helical bundle domain is also found towards the C terminus in TPS-1 and TPS-2 (trehalose phosphate synthase) from C. elegans, which otherwise show little similarity to T6PP in their N-terminal halves, corresponding to the catalytic domains.
