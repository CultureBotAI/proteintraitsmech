identifier: Pfam:PF27338
label: Cytochrome b558/566 subunit B
definition: >-
  This entry represents CbsB (cytochrome b558/566 subunit B), a hydrophobic membrane-bound protein found in thermoacidophilic archaea, particularly within Thermoproteota including Sulfolobaceae members such as Sulfolobus, Saccharolobus, Metallosphaera, and Acidianus. The proteins are approximately 310-314 amino acids in length and contain eight predicted transmembrane helices, indicating they are integral membrane proteins. CbsB is highly glycosylated and functions as part of the respiratory electron transport chain in these hyperthermophilic organisms. CbsB is encoded at the same locus as several other proteins: CbsA (a high-potential cytochrome b558/566), SoxL (a Rieske iron-sulphur protein), SoxN (a predicted membrane-bound b-type cytochrome b), and OdsN (a protein of unknown function). Transcriptional studies suggest that these proteins may form a complex analogous to the cytochrome bc1 complex, where the redox-active subunits consist of CbsA, SoxL and SoxN, while CbsB and OdsN serve as additional non-redox-active subunits. Based on its hydrophobicity and transmembrane structure, CbsB likely functions to anchor CbsA to the membrane.
