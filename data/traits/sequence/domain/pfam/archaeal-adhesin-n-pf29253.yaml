identifier: Pfam:PF29253
label: Archaeal adhesin N-terminal domain
definition: >-
  This entry represents the N-terminal domain of archaeal adhesin-like proteins found in hyperthermophilic archaea, including the uncharacterised protein AF_2077. The domain is approximately 100 residues long and adopts a β-sandwich immunoglobulin-like fold. These proteins form filamentous surface structures (tat-fimbriae) that assemble through a donor strand exchange mechanism, similar to bacterial type 1 pili. In non-halophilic archaea, the precursor proteins contain Sec signal peptides, while halophilic counterparts use the twin-arginine translocation (Tat) pathway. The domain is found in gene clusters alongside signal peptidases and DUF5305 family proteins. AlphaFold modelling indicates the domain can interact with neighbouring subunits via complementary N-terminal donor strands to form linear oligomeric structures. This entry is related to DUF11 ( ), which has been shown to contain intramolecular isopeptide bonds providing thermostability and proteolytic resistance in adhesive structures.
