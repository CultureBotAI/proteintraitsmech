identifier: Pfam:PF13403
label: Hint domain
definition: >-
  This entry represents a domain found in the pretoxin HINT domain protein and the C-terminal of protein hedgehog. Hedgehog proteins are a family of secreted signal molecules required for embryonic cell differentiation. They are synthesised as inactive precursors with an N-terminal signalling domain linked to a C-terminal autoprocessing domain. The three-dimensional structure of the autoprocessing domain shows similarity with the β-strand core of intein splicing domains. It has hence been termed the Hedgehog/Intein (Hint) domain.
