identifier: Pfam:PF28648
label: Dopamine receptor-interacting protein 1
definition: >-
  This family includes Dopamine receptor-interacting protein 1 (DRIP1, also known as C14orf28 in human) and similar proteins from vertebrates. C14orf28 has been shown to inhibit apoptosis in colorectal cancer and contribute to oncogenicity. The mouse member is thought to be a regulator of the dopamine receptor signalling pathway.
