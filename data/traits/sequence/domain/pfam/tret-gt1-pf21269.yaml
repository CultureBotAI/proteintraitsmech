identifier: Pfam:PF21269
label: Trehalose synthase, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Trehalose synthase from Pyrococcus horikoshii (TreT, ) and similar proteins from bacteria and fungi. TreT synthesises an α,α-trehalose from nucleoside diphosphate glucose and glucose. This protein has a typical GT-B glycosyltransferase structure with dual α/β Rossmann-folds. The N-terminal domain shows a core of six β-strands and seven associated α-helices. This domain is found in the middle region of trehalose phosphorylase TREPH (also known as trehalose synthase) from Pleurotus pulmonarius and related fungal sequences.
