identifier: Pfam:PF29731
label: RP252-like transmembrane domain
definition: >-
  This entry represents transmembrane domain of RP252-like proteins found in diverse bacteria including Rickettsia, Marinomonas, Dyadobacter and members of Gammaproteobacteria, Bacteroidota and Alphaproteobacteria. Proteins in this entry contain two transmembrane helices and two distinct domains: a C-terminal OB-fold nucleic acid-binding domain and an N-terminal transmembrane region.
