identifier: Pfam:PF26698
label: Membrane-stabilizing protein A
definition: >-
  This family of proteins includes Membrane-stabilizing protein A from Staphylococcus aureus (MspA) and similar sequences from Bacillales. MspA is involved in the production of toxins, defence against host immune responses, and the regulation of iron within the organism. Members of this family are characterised by their role in membrane stabilisation, which is crucial for maintaining the integrity and functionality of cellular membranes under various conditions. Members are predicted to fold into a four α-helical bundle.
