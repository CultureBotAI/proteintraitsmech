identifier: Pfam:PF25916
label: AREL1 PH-like domain
definition: >-
  This entry describes the PH-like domain in Apoptosis-resistant E3 ubiquitin protein ligase 1 (AREL1) found in animals. PH domains function as membrane-targeting modules that bind phosphoinositide lipids and/or proteins to localise signalling molecules to specific cellular membranes. Apoptosis-resistant E3 ubiquitin protein ligase 1 (AREL1) proteins function as E3 ubiquitin-protein ligases, catalysing the formation of polyubiquitin chains linked through 'Lys-11' or 'Lys-33', with a preference for 'Lys-33'. These enzymes transfer ubiquitin from an E2 ubiquitin-conjugating enzyme to specific substrates, including SEPTIN4, DIABLO/SMAC, and HTRA2, in vitro. Additionally, they play a role in modulating pulmonary inflammation by targeting SOCS2 for ubiquitination and subsequent degradation via the proteasome. AREL1 interacts with SOCS2 and, through its HECT domain, with HTRA2, DIABLO/SMAC, and SEPTIN4, particularly in the cytoplasm following the induction of apoptosis.
