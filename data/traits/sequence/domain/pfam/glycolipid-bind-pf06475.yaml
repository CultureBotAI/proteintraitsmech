identifier: Pfam:PF06475
label: Putative glycolipid-binding
definition: >-
  This family has a novel fold known as a spiral β-roll, consisting of a 15-stranded β sheet wrapped around a single α helix. It forms dimers. It has some structural similarity to the E. coli lipoprotein localisation factors LolA ( ) and LolB ( ). Its structure suggests that it may have a role in glycolipid binding. Its genomic context supports a role in glycolipid metabolism.
