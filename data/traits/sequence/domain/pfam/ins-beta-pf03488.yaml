identifier: Pfam:PF03488
label: Nematode insulin-related peptide beta type
definition: >-
  Insulin is found in many animals, and is involved in the regulation of normal glucose homeostasis. It also has other specific physiological effects, such as increasing the permeability of cells to monosaccharides, amino acids and fatty acids, and accelerating glycolysis and glycogen synthesis in the liver. Insulin exerts its effects by interaction with a cell-surface receptor, which may also result in the promotion of cell growth. This entry represents Caenorhabditis elegans insulin-like peptides, beta type.
