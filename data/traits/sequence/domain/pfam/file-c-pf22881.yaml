identifier: Pfam:PF22881
label: FilE, C-terminal domain
definition: >-
  This entry represents a domain found C-terminal in FilE protein. FilE is found almost exclusively in Acinetobacter, and is assigned as a putative pilus system protein from local genomic contexts that include several additional putative pilus system proteins. It is predicted to adopt a globular structure similar to galactose-binding domains.
