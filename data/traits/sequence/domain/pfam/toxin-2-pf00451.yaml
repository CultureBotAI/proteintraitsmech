identifier: Pfam:PF00451
label: Scorpion short toxin, BmKK2
definition: >-
  Scorpion venoms contain a variety of peptides toxic to mammals, insects and crustaceans. Among these peptides there is a family of short toxins (30 to 40 residues). This entry represents members of this family with potassium channel blocking activity. KTX 12 Sp2 toxin from Scorpiops pococki has shown a strong immunosuppressant effect, being an interesting therapeutic agent for autoimmune disease treatment. This entry also includes NU-buthitoxin-Ptr1a, a toxin that acts as an agonist on melanocortin receptors and does not show activity on mammalian sodium or potassium channels. Toxin BmK NSPK from Manchurian scorpion, is a voltage-gated potassium (Kv) channel inhibitor that augments neurite extension via NGF/TrkA signaling pathway. As Kv channels may represent molecular targets to modulate spinal cord neurons development and regeneration, they become interesting targets to develop treatments for spinal cord injury.
