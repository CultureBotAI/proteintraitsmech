identifier: Pfam:PF26403
label: Domain of unknown function (DUF8101)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins found predominantly in the Halobacteria class of Archaea. The proteins containing this domain are primarily distributed among members of the Haloarculaceae and Haloferacaceae families. The domain is typically found in proteins ranging from 85 to 117 amino acids in length. The domain adopts a four helical bundle structure.
