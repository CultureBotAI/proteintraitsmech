identifier: Pfam:PF29700
label: Uncharacterised protein YBR085C-A C-terminal domain
definition: >-
  This entry represents the uncharacterised protein YBR085C-A found in fungi. The protein is localised to both the cytoplasm and nucleus and undergoes phosphorylation at serine residues. YBR085C-A is found across the Saccharomycetaceae family and related yeasts. The function of this family remains to be determined.
