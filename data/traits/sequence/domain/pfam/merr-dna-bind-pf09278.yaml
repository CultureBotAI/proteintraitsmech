identifier: Pfam:PF09278
label: MerR, DNA binding
definition: >-
  This entry represents a DNA-binding domain of the transcriptional regulator MerR and similar sequences predominantly found in bacteria. It adopts a structure consisting of a core of three α-helices, with an architecture that is similar to that of the 'winged helix' fold.
