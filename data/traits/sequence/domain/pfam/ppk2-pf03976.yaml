identifier: Pfam:PF03976
label: Polyphosphate kinase 2 (PPK2)
definition: >-
  Inorganic polyphosphate (polyP) plays a role in metabolism and regulation and has been proposed to serve as a energy source in a pre-ATP world. In prokaryotes, the synthesis and utilisation of polyP are catalysed by PPK1, PPK2 and polyphosphatases. PPK2s can be subdivided into three classes: class I preferentially phosphorylates nucleoside diphosphates, class II converts nucleoside monophosphates into diphosphates and class III can phosphorylate either nucleoside mono- or diphosphates. This domain can be found in one or two copies; in class I proteins there is a single copy of this domain (which preferentially catalyse polyP-dependent phosphorylation of ADP to ATP), whereas in class II proteins (which phosphorylate AMP to ADP) there are 2 fused PPK2 domains. The structure of PPK2 from Pseudomonas aeruginosa has revealed a 3-layer α/β/α-sandwich fold with an α-helical lid similar to the structures of microbial thymidylate kinases.
