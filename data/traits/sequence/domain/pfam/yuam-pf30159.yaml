identifier: Pfam:PF30159
label: YuaM protein
definition: >-
  This entry represents an uncharacterised protein family found in proteobacteria. The family includes YuaM from E. coli ( ). The function of this family remains to be determined. The protein is likely to be an integral membrane protein with four transmembrane α helices.
