identifier: Pfam:PF23977
label: Pam3 phage gp34-like protein
definition: >-
  This entry represents a family of proteins related to PAM3 gp34-like protein found in tailed bacteriophages, bacterial prophages and some bacteria. In Pseudomonas phage Pa193, gp34 has been characterised as a baseplate protein. Both gp34 and gp35 decorate the cap complex, with six copies of each present. These copies do not make direct contact with one another, suggesting that these proteins function as adapters rather than discrete structural components of the baseplate.
