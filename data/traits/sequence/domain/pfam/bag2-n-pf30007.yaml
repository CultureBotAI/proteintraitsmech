identifier: Pfam:PF30007
label: BAG2 N-terminal domain
definition: >-
  This entry represents the N-terminal in BAG family molecular chaperone regulator 2 (BAG-2). BAG2 is a co-chaperone for HSP70 and HSC70 chaperone proteins that acts as a nucleotide-exchange factor promoting the release of ADP from HSP70 and HSC70 proteins thereby triggering client and substrate protein release. BAG2 contains a coiled coil region and a BAG domain. The protein binds to the ATPase domain of HSP and HSC70 chaperones and interacts with HSPA1A, HSPA1B and HSPA8. The protein has been found to undergo phosphorylation at serine residues and N-acetylation. BAG2 may also interact with NWD1 and DNJC9 proteins. This entry corresponds to the coiled coil region.
