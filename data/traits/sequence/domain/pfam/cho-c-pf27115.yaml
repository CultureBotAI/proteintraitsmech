identifier: Pfam:PF27115
label: Excinuclease Cho C-terminal domain
definition: >-
  This entry represents the C-terminal domain of excinuclease Cho (also known as UvrC homolog), a protein involved in nucleotide excision repair in bacteria. Cho acts as an alternative endonuclease that can substitute for UvrC in certain DNA repair situations. The full-length Cho protein contains an N-terminal RNase T domain ( ), often a middle UvrC-like domain ( ), and this C-terminal domain. Some proteins also contain a GIY-YIG endonuclease domain ( ) between the RNase T and UvrC-like domains. While the N-terminal regions are responsible for the nuclease activity, the specific function of this C-terminal domain remains to be determined. Cho incises DNA at the 3' side of lesions during nucleotide excision repair, cutting farther from the lesion than UvrC, which broadens the substrate range of the bacterial nucleotide excision repair system. The Cho protein is induced as part of the SOS response to DNA damage and is regulated by LexA.
