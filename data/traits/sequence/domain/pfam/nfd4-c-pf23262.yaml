identifier: Pfam:PF23262
label: NFD4, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Protein NUCLEAR FUSION DEFECTIVE 4 from Arabidopsis thaliana (NFD4) and similar sequences predominantly found in plants. NFD4 is required for karyogamy during female gametophyte development, when the two polar nuclei fuse to form the diploid central cell nucleus. This protein is predicted to organise into two α-helical domains, represented by and this entry.
