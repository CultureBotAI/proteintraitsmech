identifier: Pfam:PF03861
label: ANTAR domain
definition: >-
  ANTAR (AmiR and NasR transcription antitermination regulators) is an RNA-binding domain found in bacterial transcription antitermination regulatory proteins. This domain has been detected in various response regulators of two-component systems, which are structured around two proteins, a histidine kinase and a response regulator. This domain is also found in one-component sensory regulators from a variety of bacteria. Most response regulators interact with DNA, however ANTAR-containing regulators interact with RNA. The majority of the domain consists of a coiled-coil.
