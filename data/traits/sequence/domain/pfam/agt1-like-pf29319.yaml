identifier: Pfam:PF29319
label: Ribonuclease ageritin-like
definition: >-
  This entry represents ribonuclease ageritin (AGT1) from Cyclocybe which is a fungal ribotoxin that functions as a highly specific endonuclease. The protein cleaves a single phosphodiester bond in the 28S rRNA of eukaryotic ribosomes at the universally conserved GAGA tetraloop of the sarcin-ricin loop. This cleavage inhibits the binding of translation elongation factors and halts protein biosynthesis, ultimately resulting in cell death. The enzyme requires magnesium as a cofactor and is completely inhibited by EDTA. Ageritin shows cytotoxicity towards human glioma cells and displays entomotoxicity against Aedes aegypti larvae. The protein is highly expressed during fruiting body formation and is localised to the vacuole lumen.
