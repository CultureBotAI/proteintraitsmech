identifier: Pfam:PF21321
label: Putative DNA-binding HTH domain
definition: >-
  This entry represents a domain found at the N-terminal of the VapB45 protein from Mycobacterium tuberculosis ( ) and similar bacterial sequences. VapB45 is thought to be part the antitoxin component of a Toxin-Antitoxin system. This domain adopts a helix-turn-helix structure that is likely to be a DNA-binding domain.
