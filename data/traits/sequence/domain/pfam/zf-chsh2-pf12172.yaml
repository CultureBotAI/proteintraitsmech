identifier: Pfam:PF12172
label: ChsH2, rubredoxin-like zinc ribbon domain
definition: >-
  This domain is found in the probable enoyl-CoA hydratase alpha subunit from Thermomonospora curvata (ChsH2) and similar archaeal and bacterial proteins. ChsH2 is likely to be involved in bile acid degradation. The C-terminal region of this protein is organised into two domains: an N-terminal zinc finger domain with a three-stranded antiparallel β-sheet and an N-terminal α-helix (this entry), and a C-terminal domain with an oligonucleotide/oligosaccharide binding (OB)-fold that consists of a five-stranded β-barrel ( ). Other members of this group of proteins are Geobacter metallireducens Benzoylsuccinyl-CoA thiolase subunit BbsA, a component of the BbsAB thiolase complex, which catalyses the thiolytic cleavage of (S)-2-benzoylsuccinyl-CoA to succinyl-CoA and benzoyl-CoA, the final step of anaerobic toluene metabolism, and Methanothermococcus thermolithotrophicus HMGCS, an enzyme complex comprising the thiolase and 3-hydroxy-3-methylglutaryl (HMG)-CoA synthase, that catalyses the second reaction in the mevalonate pathway-the exergonic condensation of acetoacetyl-CoA and acetyl-CoA to HMG-CoA. The domain is duplicated in from M.tuberculosis. The structure of from Saccharolobus solfataricus reveals two long N-terminal helices followed by a rubredoxin-like zinc ribbon domain represented in this entry and a C-terminal OB fold domain. Zinc is chelated by the four conserved cysteines in the alignment.
