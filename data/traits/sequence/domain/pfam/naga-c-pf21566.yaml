identifier: Pfam:PF21566
label: Beta-N-acetylglucosaminidase, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Beta-N- acetylglucosaminidase from Thermotoga maritima (NagA, ), which hydrolyses chitooligomers into monomer beta-N-acetylglucosamine. NagA forms a dimer structure in which the monomer structure is organised into an N- and a C-terminal domain ( and this entry, respectively). This domain shows an α-β-α-sandwich fold, which comprises six β-strands with two α-helices on either side of the β-sheet.
