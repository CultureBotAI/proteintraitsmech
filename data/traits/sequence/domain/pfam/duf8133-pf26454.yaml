identifier: Pfam:PF26454
label: Domain of unknown function (DUF8133)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins in this family are predominantly found in halophilic archaea, including members of the Halobacteriales order. Proteins containing this domain are typically around 140 amino acids in length. The domain is predicted to be part of integral membrane proteins, as suggested by the presence of multiple transmembrane helices.
