identifier: Pfam:PF25275
label: Golvesin C-terminal domain
definition: >-
  This entry represents the CBD-like domain at the C-terminal in Golvesin in amoebas, Xanthan lyase in bacteria and related proteins. This domain is predicted to fold into a β-sandwich with a topology similar to galactose binding domains. This domain can also be found in putative fibronectin proteins. Xanthan lyase cleaves the linkage between the terminal mannosyl and glucuronyl residues of the side chain of xanthan to liberate pyruvate mannose. Golvesin is a membrane-bound protein from endosomes, vacuoles and Golgi found in Dictyostelium. They are part of the Carbohydrate binding module family 6 (CBM6, family 6 CBM), also known as cellulose-binding domain family VI (CBD VI), and related CBMs (CBM35 and CBM36). These are non-catalytic carbohydrate-binding domains found in a range of enzymes that display activities against a diverse range of carbohydrate targets, including mannan, xylan, beta-glucans, cellulose, agarose, and arabinans. These domains facilitate the strong binding of the appended catalytic modules to their dedicated, insoluble substrates. Many of these CBMs are associated with glycoside hydrolase (GH) domains. CBM6 is an unusual CBM as it represents a chimaera of two distinct binding sites with different modes of binding: binding site I within the loop regions and binding site II on the concave face of the β-sandwich fold. CBM36s are calcium-dependent xylan binding domains. CBM35s display conserved specificity through extensive sequence similarity but divergent function through their appended catalytic modules.
