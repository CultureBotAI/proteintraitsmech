identifier: Pfam:PF28399
label: Calsyntenin, immunoglobulin-like domain
definition: >-
  This immunoglobulin-like (Ig-like) domain is found twice at the N-terminal of animal Calsyntenin (CLSTN) proteins; this entry represents the first one and the second is represented in . Members of this family bind to presynaptic neurexins to mediate both excitatory and inhibitory synapse formation. They also function as a cargo in axonal anterograde transport by acting as a molecular adapter that promotes KLC1 association with vesicles and are involved in APP metabolism.
