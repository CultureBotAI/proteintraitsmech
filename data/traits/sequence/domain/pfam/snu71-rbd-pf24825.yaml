identifier: Pfam:PF24825
label: SNU71 RNA binding domain
definition: >-
  This entry represents the RNA binding domain (RBD, also known as RNA recognition motif, RRM) found in U1 small nuclear ribonucleoprotein component SNU71 from yeast, which is a component of the U1 snRNP particle that recognises and binds the 5'-splice site of pre-mRNA.
