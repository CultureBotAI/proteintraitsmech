identifier: Pfam:PF16844
label: 'Dinitrogenase iron-molybdenum cofactor, N-terminal      '
definition: >-
  This entry represents the N-terminal domain of the gamma (Y) subunit of nitrogenase, also known as nitrogenase accessory factor Y, NafY. This region is negatively charged and appears to be necessary for recognising and interacting with the apo state of dinitrogenase. The full-length NafY protein facilitates the transfer of iron-molybdenum cofactor (FeMo-co) into apodinitrogenase by binding to both. The C-terminal region ( ), is the part that binds to the cofactor, and the N terminus binds to apodinitrogenase. Nitrogenase is the bacterial enzyme responsible for nitrogen fixation by catalysing the reduction of nitrogen gas (N2) to ammonium in an ATP-dependent manner. It has two components, dinitrogenase and dinitrogenase reductase.
