identifier: Pfam:PF09728
label: Myosin-like coiled-coil protein
definition: >-
  The taxilin family of proteins includes alpha-, beta- and gamma-taxilins. They bind to members of the syntaxin protein family, which are implicated in intracellular vesicle traffic. Taxilins might therefore be involved in this process. Alpha-taxilin may also be involved in calcium-dependent exocytosis in neuroendocrine cells, while gamma-taxilin (also known as Elrg) may have a role in cell cycle progression.
