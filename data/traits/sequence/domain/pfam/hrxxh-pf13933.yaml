identifier: Pfam:PF13933
label: Putative peptidase family
definition: >-
  This entry represents fungal antigens. PRA1 from Candida albicans is a cell-surface protein involved in host-parasite interactions during infection. ASPF2 from Aspergillus fumigatus is a major allergen associated with allergic bronchopulmonary aspergillosis. Similarly, ASPND1 from Aspergillus nidulans is specifically recognised by sera from patients with aspergilloma. Members of this family contain a domain with a His-Arg-Xaa-Xaa-His motif, which is reminiscent of the His-Glu-Xaa-Xaa-His zinc-binding motif found in some metallopeptidases. Moreover, ASPF2 in Verticillium dahliae positively regulates pathogenicity but is not involved in mycelium penetration and is essential for normal vegetative growth and conidial production and participates in stress adaptation. Proteins containing this entry are putative peptidases closely related to the M35 family ( ). The metal binding HEXXH motif is replaced with HRXXH. The exact function of these fungal proteins is unknown.
