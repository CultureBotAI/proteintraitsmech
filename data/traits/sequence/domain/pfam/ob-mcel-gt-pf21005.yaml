identifier: Pfam:PF21005
label: mRNA-capping enzyme catalytic subunit, GTase, OB fold
definition: >-
  mRNA-capping enzyme catalytic subunit from Vaccinia virus (MCEL, also known as mRNA-capping enzyme D1 subunit) catalyses the hydrolysis of the 5' triphosphate end of the pre-mRNA, the capping of the resulting diphosphate RNA end with GMP and the methylation of the GpppN cap. It consists of an N-terminal RNA triphosphatase (TPase)-guanylyltransferase (GTase) module and a C-terminal guanine-N7-methyltransferase (MTase) module ( ). The N-terminal module comprises a TPase domain ( ), followed by the GTase at the C-terminal, which consists of the nucleotidyltransferase (NTPase, ) and OB fold (represented in this entry) domains. This domain contains an essential motif (RxxK) for GTase activity.
