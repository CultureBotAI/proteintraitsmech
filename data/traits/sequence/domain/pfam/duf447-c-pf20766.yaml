identifier: Pfam:PF20766
label: Protein of unknown function (DUF447)
definition: >-
  This entry represents a spectrin-like domain found in the DUF447 family of bacterial and archaeal proteins. This domain is found C-terminal to the FMN-binding split β-barrel domain . It consists of a three helical bundle that packs on the β-barrel wall .
