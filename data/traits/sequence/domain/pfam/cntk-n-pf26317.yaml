identifier: Pfam:PF26317
label: Histidine racemase CntK N-terminal domain
definition: >-
  This entry represents a group of bacterial histidine racemases, including CntK from Staphylococcus aureus and HisR from Fusobacterium nucleatum. These proteins are cofactor-independent histidine racemases that catalyse the conversion of L-histidine to D-histidine. CntK is involved in the first step of staphylopine biosynthesis, with D-histidine serving as an essential building block for this metallophore. The N-terminal domain contains one of the two conserved cysteine residues (Cys72) required for the two-base catalytic mechanism and contributes to dimerisation, with β-sheets from two monomers aligning and forming main chain hydrogen bonds that stabilise the homodimer. This catalytic activity is linked to bacterial virulence by enhancing survival in metal-limited environments, and structural studies reveal a conserved overall fold with key catalytic cysteine residues despite low sequence similarity to other racemases.
