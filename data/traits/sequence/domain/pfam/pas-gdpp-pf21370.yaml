identifier: Pfam:PF21370
label: Cyclic-di-AMP phosphodiesterase GdpP-like, PAS domain
definition: >-
  This domain is found at the N-terminal region of Cyclic-di-AMP phosphodiesterase GdpP from Geobacillus thermodenitrificans, following two potential transmembrane regions. GdpP is a stress signaling protein with phosphodiesterase activity against cyclic-di-AMP (c-di-AMP). This protein contains three domains in addition to the two N-terminal transmembrane helices: a Per-ARNT-Sim (PAS) domain, a GGDEF domain, and the DHH/DHHA1 domains ( and ). This entry represents the PAS domain, which adopts the typical α/β-PAS domain fold formed by several short and distorted α-helices and one five-stranded antiparallel β-sheet. Noticeably, three of the strands and one of the helices are shorter than those found in other typical PAS domains. This domain is also found at the N-terminal of the membrane protein-large ribosomal subunit bL9 fusion protein from Aster yellows witches'-broom phytoplasma and Onion yellows phytoplasma, which have a large N-terminal domain structurally similar to this group of sequences, although not functionally related.
