identifier: Pfam:PF08337
label: Plexin cytoplasmic RasGAP domain
definition: >-
  This domain is found at C terminus of various plexins (e.g. ). Plexins are receptors for semaphorins, and plexin signalling is important in pathfinding and patterning of both neurons and developing blood vessels. The cytoplasmic region, which has been called a SEX domain, is involved in downstream signalling pathways, by interaction with proteins such as Rac1, RhoD, Rnd1 and other plexins.
