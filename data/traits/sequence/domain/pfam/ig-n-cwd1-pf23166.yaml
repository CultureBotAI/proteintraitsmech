identifier: Pfam:PF23166
label: Alpha-glucan water dikinase 1 Ig-like N-terminal domain
definition: >-
  This domain is found twice in the N-terminal region of alpha-glucan water dikinases (GWD) from plants including alpha-glucan water dikinase 1 (GWD1) from Arabidopsis thaliana and related plant proteins such as alpha-amylase 3 (AMY3). GWD1 is involved in the incorporation of phosphate into starch-like alpha-glucan, with preferred C-6 position of glucose units. It acts as an overall regulator of starch mobilization and it is required for starch degradation. AMY3 is involved in the determination of the final structure of glucans by shortening long linear phospho-oligosaccharides in the chloroplast stroma. This enzyme can function on both soluble and insoluble glucan substrates to release small linear and branched malto-oligosaccharides. The domain represented by this entry is predicted to adopt a globular structure with an Ig-like topology. This domain is distantly related to CBM98 carbohydrate-binding family and is found associated with in many members of this group.
