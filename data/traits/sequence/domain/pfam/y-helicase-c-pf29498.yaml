identifier: Pfam:PF29498
label: Y' element helicase C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Y' element ATP-dependent helicases from Saccharomyces cerevisiae. These helicases catalyse DNA unwinding and are involved in telomerase- independent telomere maintenance. The proteins are induced in the absence of telomerase TLC1 and belong to the yeast subtelomeric Y' repeat subfamily of helicases. This domain is found alongside helicase ATP-binding domains and Sir1 domains in these proteins.
