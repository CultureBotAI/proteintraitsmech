identifier: Pfam:PF06119
label: Nidogen-like domain
definition: >-
  The ~180-residue NIDO domain is an extracellular domain of unknown function, found in nidogen (entactin) and hypothetical proteins. The NIDO domain is found in association with other domains, such as nidogen G2 β-barrel ( ), thyroglobulin type-1 ( ), LDLRB ( ), AMOP ( ), EGF-like ( ), VWFD, IPT/TIG, or sushi/CCP/SCR ( ). Some proteins known to contain a NIDO domain are listed below: Vertebrate nidogen-1 (NID-1) or entactin, a sulphated glycoprotein widely distributed in basement membranes. Vertebrate nidogen-2 (NID-2) or osteonidogen, a cell adhesion glycoprotein which is widely distributed in basement membranes. Vertebrate alpha-tectorin. Mammalian mucin-4 (MUC4), a highly glycosylated membrane-bound protein. Xenopus ID14, a putative matrix protein.
