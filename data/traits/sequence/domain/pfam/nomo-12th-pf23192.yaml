identifier: Pfam:PF23192
label: 'NOMO C-terminal transthyretin-like domain '
definition: >-
  This domain is found at the C-terminal of NOMO family of proteins. The domain represented by this entry has a weak sequence similarity to transthyretin-like domains and it is predicted to adopt similar structure that consists of seven-stranded β-sandwich. NOMO family of proteins includes NOMO1, NOMO2, NOMO3. These proteins are components of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. They play an important role in the protein topogenesis and cells lacking these components show reduced multipass protein stability. NOMO proteins are multidomain proteins.
