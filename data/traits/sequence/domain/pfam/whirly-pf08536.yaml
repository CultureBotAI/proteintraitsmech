identifier: Pfam:PF08536
label: Whirly transcription factor
definition: >-
  The whirly family members are plant transcription factors that bind to single-stranded DNA and regulate defense gene expression. They may contribute to plastid genome stability by protecting against illegitimate repeat-mediated recombination.
