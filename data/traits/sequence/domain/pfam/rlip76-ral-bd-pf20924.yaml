identifier: Pfam:PF20924
label: RLIP76, Ral binding domain
definition: >-
  This entry represents a domain found in human RalA-binding protein 1 (RalBP1, also known as RLIP76), a multifunctional protein that interacts with multiple small G protein families and endocytosis proteins. The Ral binding domain is a coiled-coil. The orientation of its α-helices and the loop between them slightly changes upon binding to RalB. This interaction appears to be related to the cellular localisation of the complex.
