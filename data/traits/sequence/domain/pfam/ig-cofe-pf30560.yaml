identifier: Pfam:PF30560
label: F420-0:gamma-glutamyl ligase, N-terminal Ig-like domain
definition: >-
  This entry represents an N-terminal immunoglobulin-like domain found in F420-0:gamma-glutamyl ligase (CofE)-like proteins. F420 is a redox cofactor involved in methanogenesis and other metabolic processes. This domain is found in Cyanobacteriota and Viridiplantae. The specific function of this domain remains to be determined.
