identifier: Pfam:PF14500
label: Dos2-interacting transcription regulator of RNA-Pol-II
definition: >-
  This entry represents the N-terminal domain of MMS19. MMS19 is a key component of the cytosolic iron-sulfur protein assembly (CIA) complex, a multiprotein complex that mediates the incorporation of iron-sulfur cluster into apoproteins specifically involved in DNA metabolism and genomic integrity.
