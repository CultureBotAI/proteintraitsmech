identifier: Pfam:PF28800
label: Domain of unknown function (DUF8463)
definition: >-
  This entry represents a middle domain found in DoxX family proteins from Bacteroidota. The domain is composed of three β-strands forming a small β-sheet and is around 40 residues in length. The domain is located between the N-terminal MauE domain ( ) and a C-terminal region. DoxX family proteins are found primarily in Bacteroidales, Chitinophagales and Cytophagales within the Bacteroidota phylum. The function of this domain remains to be determined.
