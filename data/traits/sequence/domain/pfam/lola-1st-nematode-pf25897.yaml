identifier: Pfam:PF25897
label: Nematode 1st LolA-like domain
definition: >-
  This entry represents a LolA-like domain that is found at the N terminus of a family of large nematode proteins. These uncharacterised proteins are composed of two LolA-like domains followed by a third C-terminal domain. Members of this group are though to be membrane anchored and glycosylated.
