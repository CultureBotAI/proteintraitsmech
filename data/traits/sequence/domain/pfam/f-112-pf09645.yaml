label: F-112 protein
definition: >-
  This entry is represented by Sulfolobus spindle-shape virus 1 (SSV1), F112 protein. This protein adopts a winged helix DNA binding fold containing an intrachain disulfide bond. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
