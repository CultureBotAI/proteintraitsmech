identifier: Pfam:PF12177
label: Prohormone convertase enzyme
definition: >-
  This domain family is found in eukaryotes, and is approximately 40 amino acids in length. The family is found in association with , . There are two completely conserved residues (Y and D) that may be functionally important. This protein is the C-terminal domain of a prohormone convertase enzyme which targets hormones in dense core secretory granules. This C-terminal tail domain is the domain responsible for targeting these dense core secretory granules. The domain adopts an α helical structure.
