identifier: Pfam:PF16813
label: CRISPR-associated protein Csn2 subfamily St
definition: >-
  This is a family of Csn2 CRISPR-associated (Cas) proteins found in Firmicutes, largely Streptococcus and Enterococcus. CRISPR-associated (Cas) proteins are the main executioners of the process whereby prokaryotes acquire immunity against foreign genetic material. Cas allow short segments of this DNA, called spacer, to become incorporated into chromosomal loci as clustered regularly interspaced short palindromic repeats or CRISPRs; the resulting encoded RNAs are then processed into small fragments that guide the silencing of the invading genetic elements. Thus Cas are involved in the acquisition of new spacers. Proteins in this family are usually longer than the canonical Csn2 ( ) through the addition of a large C-terminal domain. The central domain present in both families appears to be a channel that selectively interacts with dsDNA.
