identifier: Pfam:PF16518
label: T3SS negative regulator,GrlR
definition: >-
  This entry represents a small family of bacterial proteins with structural similarity to GrlR. GrlR is a family of protobacterial type III secretion system negative regulators. Structurally, GrlR consists of a typical β-barrel fold with eight β-strands containing an internal hydrophobic cavity and a plug-like loop on one side of the barrel. Strong hydrophobic interactions between the two β-barrels maintain its dimeric architecture. A unique surface-exposed EDED (Glu-Asp-Glu-Asp) motif is identified to be critical for GrlA-GrlR interaction and for the repressive activity of GrlR. The locus of enterocyte effacement (LEE) is essential for virulence of enterohaemorrhagic Escherichia coli (EHEC) and enteropathogenic E. coli (EPEC). It encodes some 20 genes including an overall regulator ler and two others, GrlR and GrlA, that form the type three secretion system for infection. GrlR comlexes with GrlA to repress expression of ler.
