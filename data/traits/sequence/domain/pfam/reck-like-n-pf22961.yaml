identifier: Pfam:PF22961
label: Reversion-inducing cysteine-rich with Kazal motifs, N-terminal
definition: >-
  This domain is found at the N-terminal of human Reversion-inducing cysteine-rich protein with Kazal motifs (RECK) and similar proteins mainly found in vertebrates. RECK is a membrane-anchored glycoprotein that plays a role in Wnt7-specific responses in the central nervous system angiogenesis and in the blood-brain barrier regulation. This domain adopts an α-helical structure.
