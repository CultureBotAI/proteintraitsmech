label: Usp-48 domain
definition: >-
  This entry represents a domain found towards the C-terminal of USP48 C. elegans and related sequences from nematodes. This domain is usually found in association with . In C.elegans, USP48 is required post-developmentally to restrict the plasticity of epidermal cells, probably by regulating gene expression.
