identifier: Pfam:PF18446
label: Domain of unknown function (DUF5611)
definition: >-
  This is a domain of unknown function. Studies of the TA0095 gene product indicate that this 96-residue hypothetical protein from Thermoplasma acidophilum is a member of the COG4004 orthologous group of unknown function found in Archaea bacteria. The structure displays an α/β two-layer sandwich architecture formed by three α-helices and five β-strands. Furthermore, structural homologs indicate that the TA0095 structure belongs to the TBP-like fold.
