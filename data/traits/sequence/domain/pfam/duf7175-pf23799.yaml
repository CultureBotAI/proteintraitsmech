identifier: Pfam:PF23799
label: Domain of unknown function (DUF7175)
definition: >-
  This entry represents an uncharacterised protein family found in various phages infecting Gram-negative bacterial hosts, including Salmonella, Shigella, Erwinia, Aeromonas, Vibrio and Klebsiella phages. The family typically contains proteins between 80-120 amino acids in length. The function of this protein family is currently unknown.
