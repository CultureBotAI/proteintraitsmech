identifier: Pfam:PF29733
label: YddI NTF2-like domain
definition: >-
  This entry represents YddI-like single-pass transmembrane proteins found in Bacilli, particularly Bacillaceae. The protein is 168 amino acids with a transmembrane helix near the N terminus. The C-terminal region adopts an NTF2-like fold, a common structural scaffold found in transport and conjugation system proteins. Structural analysis suggests similarity to families in the conjugation and secretion system, including TraH-like proteins and components of type IV secretion systems.
