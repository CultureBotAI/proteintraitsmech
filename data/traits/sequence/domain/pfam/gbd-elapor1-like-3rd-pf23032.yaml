identifier: Pfam:PF23032
label: ELAPOR1-like, galactose-binding domain
definition: >-
  This domain is found in Endosome/lysosome-associated apoptosis and autophagy regulator family member 1/2 (Elapor1/2) and similar sequences predominantly found in vertebrates. It is predicted to form a β sandwich with a jelly roll topology typical of a galactose binding domain (GBD). Human Elapor1, also known as EIG121 and KIAA1324, is a type I transmembrane protein induced by estrogen. It is associated with the endosome-lysosome compartments and may play an important role in autophagy and cell proliferation. Mouse Elapor2 (Eig121l) functions as a regulator of the BMP signalling pathway and may be involved in epidermal differentiation.
