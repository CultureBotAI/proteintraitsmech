identifier: Pfam:PF00960
label: Neocarzinostatin family
definition: >-
  This family is comprised of antitumour antibiotic chromoproteins, as represented by neocarzinostatin. These chromoproteins consist of a noncovalently bound, labile enediyne chromophore and its stabilising carrier apoprotein. The protein component of the chromophore displays an unusual bicyclic dienediyne structure. The chromoprotein inter-chelates the DNA, where its cycloaromatisation produces a biradical intermediate that has the ability to abstract hydrogens from the sugar moiety of DNA. This causes single- and double-strand breaks in the DNA. In addition to their ability to cleave DNA at sites specific for each chromophore, results indicate that these chromoproteins also possess proteolytic activity against histones, with histone H1 as the preferred substrate. Neocarzinostatin has 2 disulphide bridges and is kidney-shaped with 2 defined domains that hold a binding cavity. The larger domain forms a 7-stranded antiparallel β-barrel and the smaller domain consists of 2 anti-parallel strands of β sheet that are perpendicular to each other. Other members of this family include macromycin, actinoxanthine, kedarcidin, and C-1027.
