identifier: Pfam:PF27366
label: Type II restriction enzyme MwoI, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of a group of MwoI type II restriction endonucleases found predominantly in bacteria with some archaeal members, including MwoI from Methanothermobacter wolfeii, which recognises the double-stranded sequence 5'-GCNNNNNNNGC-3' and cleaves after N-5. The proteins are approximately 363 amino acids in length and perform endonucleolytic cleavage of DNA to give specific double-stranded fragments as part of restriction-modification systems.
