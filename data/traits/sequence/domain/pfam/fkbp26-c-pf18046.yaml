identifier: Pfam:PF18046
label: FKBP26_C-terminal
definition: >-
  This is the C-terminal domain (CTD) of Methanocaldococcus jannaschii peptidyl-prolyl cis/trans isomerase FKBP26. FKBP26 mediates protein folding. CTD has an α/β-sandwich structure composed of three α-helices and a three-stranded, mixed-orientation β-sheet. The CTD domain is responsible for dimerization of FKBP26 by through inter-subunit antiparallel pairing of the third β-strands of the two CTDs. The CTD dimer forms a continuous, six-stranded mixed β-sheet.
