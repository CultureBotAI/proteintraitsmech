identifier: Pfam:PF28107
label: SitI3-like
definition: >-
  This entry represents SitI3 from Myxococcus xanthus ( ) and related bacterial proteins. SitI3 is an immunity protein encoded immediately downstream of a lipoprotein toxin, SitA3, that can move between cells by means of a transfer system for exchange of outer membrane lipoproteins involved in kin recognition. It is not clear what fraction of the members of this family are immunity proteins from other toxin/immunity-type conflict systems.
