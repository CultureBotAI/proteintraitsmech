identifier: Pfam:PF24340
label: DBL homology domain (DH-domain)
definition: >-
  This domain is found in uncharacterised fungal proteins. It shares significant sequence similarity to known DBL homology domains (DH-domains) and it is predicted to adopt similar structure. Proteins containing this domain also contain a PH-domain located upstream the DH-domain and are likely members of the Dbl family of guanine nucleotide exchange factors.
