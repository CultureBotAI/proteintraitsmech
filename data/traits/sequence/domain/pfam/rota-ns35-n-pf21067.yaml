identifier: Pfam:PF21067
label: Rotavirus non-structural protein 35, N-terminal
definition: >-
  Rotavirus non-structural protein 35 (NS35, also known as NSP2) is a basic protein which possesses RNA-binding, and helix-destabilising activities in addition to nucleoside and 5' RNA triphosphatase (NTPase/RTPase) and nucleoside-diphosphate (NDP) kinase-like activities. NS35 forms a functional octamer which is essential for genome replication and formation of viroplasms. This is the N-terminal domain, which contains basic residues, that in addition to the basic residues in the C-terminal helix, are important for sequence-independent RNA binding of NS35. This domain also has conserved cysteine residues which form disulfide that might be relevant for NS35 activity.
