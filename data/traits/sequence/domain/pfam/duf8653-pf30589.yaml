label: Domain of unknown function (DUF8653)
definition: >-
  This entry represents a family of small proteins of approximately 85 residues found in Cyanobacteriota. Several members of this family are annotated as 4Fe-4S iron-sulfur cluster binding proteins, though this has not been experimentally verified. The function of this family remains to be determined.
