identifier: Pfam:PF13930
label: DNA/RNA non-specific endonuclease
definition: >-
  This entry includes EssD, which is a component of the type VII secretion system (Ess) and acts as a secretion factor for the Ess pathway in Staphylococcus aureus. Proteins containing this domain are part of the DNA/RNA non-specific endonuclease family that contains the His-Me finger fold, which is thought to be suited for efficient, nonspecific DNA cleavage.
