identifier: Pfam:PF23169
label: Halogenase D
definition: >-
  This entry represents L-lysine 4-chlorinase BesD, L-lysine 5-chlorinase HalB, ornithine halogenase HalD and related proteins. BesD is involved in the biosynthesis of terminal alkyne-containing amino acids such as L-propargylglycine (Pra) and L-beta-ethynylserine, that are produced as antibiotics by S.cattleya. It catalyses the chlorination of L-lysine at the C4 position, leading to the production of 4-chloro-L-lysine. In addition to ornithine, HalD chlorinates lysine but with slower rate. This preference of HalD for ornithine is due to a narrower active site pocket. These enzymes are structurally very similar and adopt a typical cupin-like fold.
