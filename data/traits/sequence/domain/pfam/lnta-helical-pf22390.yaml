identifier: Pfam:PF22390
label: LntA, four-helical up-and-down bundle
definition: >-
  This entry represents the C-terminal helical domain present in LntA protein, a virulence factor from Listeria monocytogenes. LntA targets and inhibits the chromatin repressor BAHD1 in the host cell nucleus to activate interferon-stimulated genes. LntA interacts directly with a central domain of BAHD1 via a surface patch of conserved positive charges, located nearby a groove on the elbow region of LntA. This group of proteins is specific to Listeria species.
