identifier: Pfam:PF14474
label: RTC4-like domain
definition: >-
  This entry represents the C-terminal domain of the RTC4 (restriction of telomere capping protein 4) protein from yeasts. In Saccharomyces cerevisiae, deletion of RTC4 affects the cell response to telomere uncapping. This domain is also found in proteins that contain a DNA-binding myb domain.
