identifier: Pfam:PF19214
label: Coronavirus spike glycoprotein S2, intravirion
definition: >-
  The type I glycoprotein S of Coronavirus, trimers of which constitute the typical viral spikes, is assembled into virions through noncovalent interactions with the M protein. The spike glycoprotein is translated as a large polypeptide that is subsequently cleaved to S1 ( ) and S2. The cleavage of S can occur at two distinct sites: S2 or S2'. The spike is present in two very different forms: pre-fusion (the form on mature virions) and post-fusion (the form after membrane fusion has been completed). The spike is cleaved sequentially by host proteases at two sites: first at the S1/S2 boundary (i.e. S1/S2 site) and second within S2 (i.e. S2' site). After the cleavages, S1 dissociates from S2, allowing S2 to transition to the post-fusion structure. Both chimeric S proteins appeared to cause cell fusion when expressed individually, suggesting that they were biologically fully active. The spike is a type I membrane glycoprotein that possesses a conserved transmembrane anchor and an unusual cysteine-rich (cys) domain that bridges the putative junction of the anchor and the cytoplasmic tail. SARS-CoV S is largely uncleaved after biosynthesis. It can be later processed by endosomal cathepsin L, trypsin, thermolysin, and elastase, which are shown to induce syncytia formation and virus entry. Other proteases that are of potential biological relevance in potentiating SARS-CoV S include TMPRSS2, TMPRSS11a, and HAT which are localized on the cell surface and are highly expressed in the human airway. The furin-like S2' cleavage site at KR/SF with P1 and P2 basic residues and a P2' hydrophobic Phe downstream of the IFP is identical between the SARS-CoV-2 and SARS-CoV. One or more furin-like enzymes would cleave the S2' site at KR/SF. Deletion of SARS-CoV-2 furin cleavage site suggests…
