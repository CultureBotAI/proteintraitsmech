identifier: Pfam:PF05215
label: Spiralin domain
definition: >-
  This entry represents the C-terminal domain of Spiralin from Spiroplasma citri and similar proteins from Tenericutes. The surface of spiroplasma bacteria is crowded with the membrane-anchored lipoprotein spiralin, whose structure and function are unknown, although its cellular function is thought to be a structural and mechanical one rather than catalytic. In some members, this domain can be found in multiple copies.
