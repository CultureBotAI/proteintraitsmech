identifier: Pfam:PF09787
label: Golgin subfamily A member 5
definition: >-
  This entry represents a family of proteins involved in maintaining Golgi structure. They stimulate the formation of Golgi stacks and ribbons, and are involved in intra-Golgi retrograde transport. Two main interactions have been characterised: one with RAB1A that has been activated by GTP-binding and another with isoform CASP of CUTL1.
