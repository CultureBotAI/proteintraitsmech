identifier: Pfam:PF27909
label: C613.03 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of SSP120 from Saccharomyces cerevisiae, the uncharacterised calcium-binding protein C613.03 from SSchizosaccharomyces pombe and similar sequences found in fungi. SSP120 is thought to be involved in transport of plasma membrane glycoproteins through the early secretory pathway. Members of this group also contain an N-terminal EF-hand calcium-binding domain. C613.03 localises to the endoplasmic reticulum lumen and Golgi apparatus lumen. The function of this domain remains to be determined.
