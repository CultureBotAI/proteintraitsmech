identifier: Pfam:PF28674
label: Copper resistance protein D-like, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Copper resistance protein D from Pseudomonas syringae, which is involved in copper resistance. This domain, which is found associated with , is predicted to form an α helical bundle. It is also found at the N-terminal of Copper transporter YebZ from Escherichia coli, a component of the AZY copper uptake system that functions as an energy-dependent copper importer. The AZY proteins are necessary for the copper-dependent activation of the mar operon, thus leading to multidrug antibiotic resistance. This domain is also found at the middle region in Copper transport protein CutJ from Bacillus subtilis.
