identifier: Pfam:PF07107
label: Wound-induced protein WI12
definition: >-
  This entry consists of several plant wound-induced protein sequences related to WI12 from Mesembryanthemum crystallinum (Common ice plant) ( ). Wounding, methyl jasmonate, and pathogen infection is known to induce local WI12 expression. WI12 expression is also thought to be developmentally controlled in the placenta and developing seeds. WI12 preferentially accumulates in the cell wall and it has been suggested that it plays a role in the reinforcement of cell wall composition after wounding and during plant development.
