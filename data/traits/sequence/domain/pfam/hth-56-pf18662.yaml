identifier: Pfam:PF18662
label: Cch helix turn helix domain
definition: >-
  Staphylococcal Cassette Chromosome, or SCC elements, are a family of genomic islands found in S. aureus and closely related species. SCC elements that carry the mecA gene are called SCCmec and render S. aureus methicillin-resistant, creating the MRSA strains. Cch, the self-loading helicase encoded by SCCmec type IV, belongs to the pre-sensor II insert clade of AAA+ ATPases, as do the archaeal and eukaryotic MCM-family replicative helicases. The central domain (residues 157-438) contains an AAA+ ATPase fold. This domain is found at the C-terminal region, it is a winged helix-turn-helix (WH) domain typical of many dsDNA-binding proteins.
