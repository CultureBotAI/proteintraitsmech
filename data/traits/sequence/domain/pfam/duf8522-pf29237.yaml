label: Domain of unknown function (DUF8522)
definition: >-
  This entry represents a helical domain of unknown function found in spirochaetes. The domain is approximately 50-70 residues in length and is found N-terminal in proteins containing tetratricopeptide repeat (TPR) domains. The function of this domain remains to be determined.
