identifier: Pfam:PF29729
label: Kebab C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Kebab (Kinetochore and Eb1-associated basic protein). The domain is found in Kebab proteins from Drosophila and related insects. This region contains a predicted coiled-coil region. The Kebab protein localises to kinetochores during metaphase and shows dynamic localisation during mitosis, with expression in microtubules during anaphase and telophase. While the full-length protein interacts with Eb1 via N-terminal SxIP motifs and is involved in kinetochore and microtubule localisation, the specific function of this C-terminal is unknown.
