identifier: Pfam:PF28461
label: Regulator of G-protein signalling 9-binding protein C-terminal domain
definition: >-
  This entry represents the C-terminal domain of regulator of G-protein signalling 9-binding protein (RGS9BP), also known as RGS9-anchoring protein (R9AP). This C-terminal domain contains the transmembrane anchor region that localises the protein to membranes. The domain spans approximately the final 25 amino acids and functions as a type IV membrane anchor. While the full-length RGS9BP protein mediates targeting of RGS9-1 to photoreceptor outer segments and enhances GTPase activity during phototransduction, the specific function of this C-terminal domain is membrane anchoring. The domain is found in proteins predominantly expressed in retinal photoreceptors.
