identifier: Pfam:PF03784
label: Cyclotide family
definition: >-
  Cyclotides (cyclo peptides) are plant peptides of ~30 amino acids with a head to-tail cyclic backbone and six cysteine residues involved in three disulphide bonds. The cyclotides are extremely resistant to proteolysis and are remarkably stable. Cyclotides display a diverse range of biological activities, including uterotonic activity, inhibition of neurotensin binding, hemolytic, anti-HIV and anti-microbial activity. This range of biological activities makes cyclotides amenable to potential pharmaceutical and agricultural applications. Although their precise role in plants has not yet been reported, it appears that they are most likely present as defence molecules. The three-dimensional structure of cyclotides is compact and contains a number of β-turns, three β-strands arranged in a distorted triple-stranded β-sheet, a short helical segment, and a network of disulphide bonds which form a cystine knot. The cystine knot consists of an embedded ring in the structure, formed by two disulphide bonds and their connecting backbone segments is threaded by a third disulphide bond. Although the cystine knot motif is now well known in a wide variety of proteins, the cyclotides remain as the only example in which a cystine knot is embedded within a circular protein backbone, a motif that is referred to as the cyclic cystine knot (CCK). Cyclotides can be separated into two sub-families, one of which tends to contain a larger number of positively charged residues and has a bracelet-like circularisation of the backbone. The second subfamily contains a backbone twist due to a cis-Pro peptide bond and may conceptually be regarded as a molecular Moebius strip. Bracelet and Moebius families of cyclotides possess a Knottin scaffold. The cyclotide family of proteins is abundant in plants…
