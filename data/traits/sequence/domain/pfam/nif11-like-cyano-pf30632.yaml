identifier: Pfam:PF30632
label: Cyanobacterial NIF11-like domain
definition: >-
  This entry represents a domain of approximately 66 residues found in cyanobacteria. Proteins containing this domain have been annotated as NIF11 domain-containing proteins. In Prochlorococcus marinus, genes encoding this domain are located upstream of glnB and show nitrogen-responsive expression, with PMM1462 being highly upregulated following nitrogen deprivation. The specific function of this domain remains to be determined.
