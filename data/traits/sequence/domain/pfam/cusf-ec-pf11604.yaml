identifier: Pfam:PF11604
label: Copper binding periplasmic protein CusF
definition: >-
  CusF is a periplasmic protein involved in copper and silver resistance in Escherichia coil. CusF forms a five-stranded β-barrel OB fold. Cu(I) binds to H36, M47 and M49 which are conserved residues in the protein.
