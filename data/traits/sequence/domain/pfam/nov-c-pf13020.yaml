identifier: Pfam:PF13020
label: Protein NO VEIN, C-terminal
definition: >-
  This entry represents an N-terminal SH3-like barrel domain of approximately 60 residues. The domain is found at the N terminus of DEAD/DEAH box helicases, preceding ResIII ( ), SNF2-rel_dom ( ), DEAD ( ), Helicase_C ( ) and NOV_C ( ) domains. This family is found in bacteria, predominantly Actinomycetota and Pseudomonadota. The function of this domain remains to be determined.
