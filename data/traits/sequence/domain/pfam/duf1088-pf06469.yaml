identifier: Pfam:PF06469
label: Neurobeachin-like, DUF1088
definition: >-
  This domain is found in the neurobeachins (NBEAs) and BEACH domain-containing proteins (BDCPs). NBEAs are localised near Golgi apparatus and are involved in vesicular trafficking, intracellular transport, membrane dynamics, endosomal recycling, and receptor signalling. BDCPs are associated with lysosome size, apoptosis, autophagy, granule size, or synapse formation. Although the function of this domain is unknown, its mutations have been related to autosomal recessively inherited lipopolysaccharide-responsive beige-like anchor (LRBA) protein deficiency, responsible for common variable immunodeficiency (CVID) and autoimmune lymphoproliferative syndrome (ALPS). NBEAs deficiency may induce spine loss with defects in synaptic efficacy and plasticity, being associated with autism spectrum disorder (ASD) and ASD-related syndromes.
