identifier: Pfam:PF27214
label: PM1083 family
definition: >-
  This entry represents PM1083, an uncharacterised protein from Pasteurella multocida. PM1083 contains an N-terminal signal peptide and is predicted to be secreted. The protein is found in Gammaproteobacteria and is conserved in Pasteurellaceae. The function of this protein family remains to be determined.
