identifier: Pfam:PF11738
label: Protein of unknown function (DUF3298)
definition: >-
  This entry represents a highly conserved domain found in a group of bacterial proteins. The function of this domain is not known. Proteins containing this domain include pdaC and anti-sigma-V factor RsiV from Bacillus subtilis. PdaC catalyzes the deacetylation of N-acetylmuramic acid (MurNAc) residues in peptidoglycan, a modification that confers resistance to lysosyme.
