identifier: Pfam:PF22132
label: TilS-like substrate binding domain
definition: >-
  This entry represents the C-terminal domain of tRNA(Ile)-lysidine synthase from Aquifex aeolicus (TilS) and similar bacterial sequences. TilS ligates lysine onto the cytidine present at position 34 of the AUA codon-specific tRNA(Ile) that contains the anticodon CAU, in an ATP-dependent manner. It is probably implicated in the recognition of the tRNA acceptor stem.
