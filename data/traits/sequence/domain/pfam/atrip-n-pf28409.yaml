identifier: Pfam:PF28409
label: ATR-interacting protein N-terminal domain
definition: >-
  This entry represents the N-terminal region of ATR-interacting protein (ATRIP), a component of the ATR-ATRIP DNA damage-sensing kinase complex. The N-terminal region contains extensive disordered regions and a coiled-coil domain. This region includes the CINP interaction domain which is important for genome maintenance. ATRIP is essential for DNA damage checkpoint signalling. The full-length protein forms a heterodimer with ATR kinase and is recruited to single-stranded DNA through interaction with RPA complexes. The ATR-ATRIP heterodimer binds the RPA complex and is recruited to single- stranded DNA during DNA damage response. ATRIP localises to the nucleus and redistributes to discrete nuclear foci upon DNA damage. The protein is phosphorylated by ATR and is required for ATR expression and stability.
