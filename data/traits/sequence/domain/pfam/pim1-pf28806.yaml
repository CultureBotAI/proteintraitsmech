identifier: Pfam:PF28806
label: Immunity protein PIM1
definition: >-
  This entry represents the immunity protein PIM1 from E. marmotae and related proteins. PIM1 is the cognate immunity protein of the polymorphic toxin PT1 which acts as a DNase. PT1 and PIM1 form a complex, in which PIM1 hinder the catalytic pocket. PIM1 folds into an α-helical structure composed of array of five helices.
