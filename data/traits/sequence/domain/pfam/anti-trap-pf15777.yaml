identifier: Pfam:PF15777
label: Tryptophan RNA-binding attenuator protein inhibitory protein
definition: >-
  Tryptophan RNA-binding attenuator protein (TRAP) inhibitory protein, also known as anti-TRAP (AT), recognises the tryptophan-activated RNA-binding domain of TRAP, a protein that regulates expression of genes involved in tryptophan metabolism in response to the accumulation of l-tryptophan. Anti-TRAP relieves TRAP-mediated repression of the trp operon expression by binding directly to Trp-bound activated TRAP and excluding RNA binding.
