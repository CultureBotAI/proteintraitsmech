identifier: Pfam:PF30910
label: Agglutinin-like protein middle domain
definition: >-
  This entry represents a domain found in the central region of agglutinin-like (ALS) family of proteins. The domain is found in Ascomycota fungi, particularly in Sordariomycetes and Eurotiomycetes. ALS family proteins are GPI-anchored cell surface adhesins that mediate cell agglutination and host tissue adherence. In Arthroderma benhamiae, the protein ARB_02240 containing this domain was identified as a secreted protein. The specific function of this middle domain remains to be determined.
