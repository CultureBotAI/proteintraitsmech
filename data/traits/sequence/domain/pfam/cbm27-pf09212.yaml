identifier: Pfam:PF09212
label: Carbohydrate binding module 27
definition: >-
  This domain is found in carbohydrate binding proteins that bind to beta-1, 4-mannooligosaccharides, carob galactomannan, and konjac glucomannan, but not to cellulose (insoluble and soluble) or soluble birchwood xylan. The region adopts a β sandwich structure comprising 13 β strands with a single, small α-helix and a single metal atom.
