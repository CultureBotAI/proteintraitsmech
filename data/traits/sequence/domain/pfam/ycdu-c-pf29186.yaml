identifier: Pfam:PF29186
label: YcdU C-terminal alpha-helical domain
definition: >-
  This entry represents the C-terminal α-helical domain of YcdU family inner membrane proteins, found predominantly in gammaproteobacteria. The domain is located at the C terminus of multi-pass membrane proteins containing approximately four transmembrane helices. The function of this protein family remains to be determined.
