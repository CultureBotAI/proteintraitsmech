identifier: Pfam:PF30403
label: Lytic transglycosylase MltD, LysM-like domain
definition: >-
  This entry represents a LysM-like domain found in membrane-bound lytic murein transglycosylase D (MltD) proteins. This domain is located between the catalytic SLT domain ( ) and the C-terminal tandem LysM domains ( ). MltD is a murein-degrading enzyme that plays a role in recycling muropeptides during cell elongation and division. The crystal structure of MltD from Pseudomonas aeruginosa has been determined. The family is found broadly in Gram-negative bacteria, including Pseudomonadota and Bacteroidota.
