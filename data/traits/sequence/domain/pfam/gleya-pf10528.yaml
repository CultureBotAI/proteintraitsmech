identifier: Pfam:PF10528
label: GLEYA domain
definition: >-
  The GLEYA domain is related to lectin-like binding domains found in the Saccharomyces cerevisiae Flo proteins and the Candida glabrata Epa proteins. It is a carbohydrate-binding domain that is found in fungal adhesins (also referred to as agglutinins or flocculins). Adhesins with a GLEYA domain possess a typical N-terminal signal peptide and a domain of conserved sequence repeats, but lack glycosylphosphatidylinositol (GPI) anchor attachment signals. They contain a conserved motif G(M/L)(E/A/N/Q)YA, hence the name GLEYA. Based on sequence homology, it is suggested that the GLEYA domain would predominantly contain β sheets. The GLEYA domain is also found in Schizosaccharomyces pombe protein , thought to be a kinetochore protein (Sim4 complex subunit), however no direct evidence for kinetochore association has been found. Furthermore, a global protein localisation study in S. pombe identified it as a secreted protein localized to the Golgi complex.
