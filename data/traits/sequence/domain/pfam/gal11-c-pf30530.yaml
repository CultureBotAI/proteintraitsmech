identifier: Pfam:PF30530
label: Gallinacin-11, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Gallinacin-11 from Gallus gallus (GAL11) and similar proteins. GAL11 is an antimicrobial peptide of the chicken egg. It is one of four major proteins in vitelline membranes, along with ovomucin, lysozyme, and VMO-1. Gal-11 has bactericidal activity toward both Gram-positive and Gram-negative bacteria. Gal-11 is a compact fold composed of 2 packed β-defensin domains with the motifs CX6CX5CX9CX6CC and CX6CX6CX7CX6CC, respectively; this entry corresponds to the second one.
