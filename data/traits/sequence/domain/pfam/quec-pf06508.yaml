identifier: Pfam:PF06508
label: Queuosine biosynthesis protein QueC
definition: >-
  This family represents Queuosine biosynthesis protein (QueC), also known as 7-cyano-7-deazaguanine synthas, which catalyses the ATP-dependent conversion of 7-carboxy-7-deazaguanine (CDG) to 7-cyano-7-deazaguanine (preQ0).
