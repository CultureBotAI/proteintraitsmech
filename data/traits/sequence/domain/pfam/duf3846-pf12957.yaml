identifier: Pfam:PF12957
label: Domain of unknown function (DUF3846)
definition: >-
  A family of uncharacterised proteins found by clustering human gut metagenomic sequences. In a few cases it is found fused to the C terminus of ArdA ( ). ArdA functions in bacterial conjugation to allow an unmodified plasmid to evade restriction in the recipient bacterium and yet acquire cognate modification.
