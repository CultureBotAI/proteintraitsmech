identifier: Pfam:PF30014
label: Non-disjunction protein 1
definition: >-
  This entry represents non-disjunction protein 1 (NDJ1). NDJ1 is required for telomeric clustering during meiosis 1 prophase, formation and efficient homologue pairing, meiosis 1 disjunction, and telomere deletion during meiosis. The protein also promotes meiotic recombination. NDJ1 is specifically induced during meiosis and is localised to the nucleus and chromosome telomeres. NDJ1 interacts with MPS3 to mediate meiotic bouquet formation and promote rapid telomere movement in meiotic prophase. This family is found in fungi.
