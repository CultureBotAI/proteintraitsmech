identifier: Pfam:PF28874
label: Fend C-terminal domain
definition: >-
  This entry represents the Ig-like domain found in transmembrane protein Fend and related arthropod proteins. The domain is approximately 140 amino acids in length and is located in the extracellular region preceding the transmembrane helix. Fend is involved in neuromuscular specificity and functions as an axon guidance molecule required for normal targeting of ventral muscle by motoneurons. The protein is expressed in the central nervous system, peripheral nervous system, and various tissues during Drosophila development. Disruption of fend causes specific defects in muscle innervation patterns.
