identifier: Pfam:PF30898
label: Polycomb-like middle domain
definition: >-
  This entry represents a helical domain of approximately 80 residues found in Polycomb-like (PCL) proteins including PHF1, PHF19, and MTF2 and its orthologue Pcl from Drosophila melanogaster. This domain is located between the second PHD finger domain ( ) and the C-terminal Mtf2_C domain ( ). PCL proteins are accessory components of the Polycomb repressive complex 2 (PRC2). They specifically bind histone H3 trimethylated at lysine 36 (H3K36me3) through their Tudor domain and recruit PRC2, enhancing its H3K27me3 methylation activity. PCL proteins form dimeric PRC2.1 complexes that stabilise PRC2 interaction with chromatin. PHF1 is involved in the DNA damage response, while PHF19 promotes transition from active to repressed chromatin states in embryonic stem cells. The specific function of this domain remains to be determined.
