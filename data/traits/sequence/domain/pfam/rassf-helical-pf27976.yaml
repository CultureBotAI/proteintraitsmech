identifier: Pfam:PF27976
label: RASSF protein helical domain
definition: >-
  This entry represents a helical domain found in mouse RASSF9/10 (Ras association domain-containing 9 and 10) and similar proteins found in vertebrates. RASSF9 is thought to play a role in regulating vesicular trafficking in cells, while RASSF10 plays an important role in regulating embryonic neurogenesis. RASSF proteins localise to various cellular compartments including endosomes and centrosomes, and some family members interact with proteins such as PAM (peptidylglycine alpha-amidating monooxygenase). This domain consists of extended coiled-coil regions that probably facilitate protein-protein interactions.
