identifier: Pfam:PF17887
label: Jak1 pleckstrin homology-like domain
definition: >-
  This entry represents the pleckstrin homology-like (PHL) subdomain found in JAK1-3/TYK2 proteins. PHL (residues 283-419) together with the N-terminal ubiquitin-like subdomain (residues 36-111) and an acyl-coenzyme A binding protein-like subdomain (residues 148-282), associate into a canonical tri-lobed FERM domain. Janus kinases (JAKs) are tyrosine kinases that function in membrane-proximal signalling events initiated by a variety of extracellular factors binding to cell surface receptors. Many type I and II cytokine receptors lack a protein tyrosine kinase domain and rely on JAKs to initiate the cytoplasmic signal transduction cascade. Ligand binding induces oligomerisation of the receptors, which then activates the cytoplasmic receptor-associated JAKs. These subsequently phosphorylate tyrosine residues along the receptor chains with which they are associated. The phosphotyrosine residues are a target for a variety of SH2 domain-containing transducer proteins. Amongst these are the signal transducers and activators of transcription (STAT) proteins, which, after binding to the receptor chains, are phosphorylated by the JAK proteins. Phosphorylation enables the STAT proteins to dimerise and translocate into the nucleus, where they alter the expression of cytokine-regulated genes. This system is known as the JAK-STAT pathway. Four mammalian JAK family members have been identified: JAK1, JAK2, JAK3, and TYK2. They are relatively large kinases of approximately 1150 amino acids, with molecular weights of ~120-130kDa. Their amino acid sequences are characterised by the presence of 7 highly conserved domains, termed JAK homology (JH) domains. The C-terminal domain (JH1) is responsible for the tyrosine kinase function. The next domain in the sequence (JH2) is known as the tyro…
