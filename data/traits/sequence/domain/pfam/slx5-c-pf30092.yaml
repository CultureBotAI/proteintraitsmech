identifier: Pfam:PF30092
label: SLX5 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in SLX5 and related proteins in Saccharomycetes. SLX5 is a component of the heterodimeric SUMO-targeted ubiquitin ligase (STUbL) complex SLX5-SLX8 that mediates ubiquitination and subsequent degradation of sumoylated proteins. The SLX5-SLX8 complex plays essential roles in chromosome stability and DNA repair. The helical domain contains a conserved region required for recruitment of SLX5 to genomic ubiquitin hotspots via interaction with the sumoylated transcription factor-like protein EUC1. The protein localises to the nucleus, centromeres and kinetochores.
