identifier: Pfam:PF02654
label: Cobalamin-5-phosphate synthase
definition: >-
  Cobalamin (vitamin B12) is a structurally complex cofactor, consisting of a modified tetrapyrrole with a centrally chelated cobalt. Cobalamin is usually found in one of two biologically active forms: methylcobalamin and adocobalamin. Most prokaryotes, as well as animals, have cobalamin-dependent enzymes, whereas plants and fungi do not appear to use it. In bacteria and archaea, these include methionine synthase, ribonucleotide reductase, glutamate and methylmalonyl-CoA mutases, ethanolamine ammonia lyase, and diol dehydratase. In mammals, cobalamin is obtained through the diet, and is required for methionine synthase and methylmalonyl-CoA mutase. This entry represents the CobS protein, which joins adenosylcobinamide-GDP and alpha-ribazole to generate adenosylcobalamin (Ado-cobalamin) and also synthesizes adenosylcobalamin 5'-phosphate from adenosylcobinamide-GDP and alpha-ribazole 5'-phosphate. It catalyses the reactions: Adenosylcobinamide-GDP + alpha-ribazole = GMP + adenosylcobalamin Adenosylcobinamide-GDP + alpha-ribazole 5'-phosphate = GMP + adenosylcobalamin 5'-phosphate The protein product from these catalyses is associated with a large complex of proteins and is induced by cobinamide. CobS is involved in part III of cobalamin biosynthesis, one of the late steps in adenosylcobalamin synthesis that, together with CobU, CobT, and CobC proteins, defines the nucleotide loop assembly pathway.
