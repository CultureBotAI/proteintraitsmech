identifier: Pfam:PF27149
label: YdjY domain
definition: >-
  The founding member of this family is the poorly characterised protein YdjY, an apparent lipoprotein, of Escherichia coli K-12. Many members are lipoproteins. YdjY and other members of its branch of the broader family have an invariant GCxxCxxxC motif.
