identifier: Pfam:PF29506
label: Uncharacterised protein YCR043C
definition: >-
  This entry represents YCR043C, an uncharacterised protein from Saccharomyces cerevisiae. The family is found in fungi. YCR043C is localised to the cytosol, Golgi apparatus and mating projection tip. The protein is present with approximately 4240 molecules per cell in log phase medium. The function of this protein remains to be determined.
