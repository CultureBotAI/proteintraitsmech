identifier: Pfam:PF28232
label: Like early starvation, chloroplastic
definition: >-
  This entry represents a β-sheet domain found within LESV (Like Early Starvation) chloroplastic proteins in plants. LESV proteins are alpha-glucan binding proteins that bind preferentially to highly ordered alpha-glucans such as starch and crystalline maltodextrins. The full-length proteins are involved in the organisation of starch granule matrix and promote gravitropic responses by facilitating starch granule formation. The proteins localise to chloroplast stroma and bind to starch granules. The specific function of this β-sheet domain remains to be determined.
