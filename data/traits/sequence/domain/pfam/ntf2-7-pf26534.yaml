identifier: Pfam:PF26534
label: NTF2-like domain
definition: >-
  This entry represents a domain found in a family of uncharacterised proteins from ascomycetes. The typical length of the proteins in this group is around 150-200 amino acids. This domain belongs to the NTF2-like superfamily ( ), characterised by a partial β-barrel structure with α-helices enclosing a solvent-accessible cavity. Members of this superfamily display remarkable sequence diversity and serve diverse functions, including both enzymatic and non-enzymatic roles often involving small molecule binding or modification.
