identifier: Pfam:PF31267
label: Cognate immunity protein YxxD
definition: >-
  This entry represents the YxxD cognate immunity protein which is a component of the YxiD-YxxD toxin-antitoxin system in Bacillus subtilis. YxiDCTD is a metal ion-dependent tRNase that cleaves several tRNAs. YxiDCTD and YxxD form a stable 1:1 stoichiometric complex. YxiD adopts a Barnase/EndoU/colicin/RelE (BECR) fold, a characteristic of RNase toxins and the immunity protein YxxD sterically occludes binding of the molecular substrate to neutralize the toxin.
