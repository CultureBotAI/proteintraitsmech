identifier: Pfam:PF00268
label: Ribonucleotide reductase, small chain
definition: >-
  Ribonucleotide reductase (RNR), also known as ribonucleoside diphosphate reductase, ( ) catalyses the reductive synthesis of deoxyribonucleotides from their corresponding ribonucleotides: 2'-deoxyribonucleoside diphosphate + oxidized thioredoxin + H 2 O = ribonucleoside diphosphate + reduced thioredoxin RNR provides the precursors necessary for DNA synthesis. RNRs divide into three classes on the basis of their metallocofactor usage. Class I RNRs, found in eukaryotes, bacteria, bacteriophage and viruses, use a diiron-tyrosyl radical, Class II RNRs, found in bacteria, bacteriophage, algae and archaea, use coenzyme B12 (adenosylcobalamin, AdoCbl). Class III RNRs, found in anaerobic bacteria and bacteriophage, use an FeS cluster and S-adenosylmethionine to generate a glycyl radical. Many organisms have more than one class of RNR present in their genomes.
