identifier: Pfam:PF27003
label: Domain of unknown function (DUF8324)
definition: >-
  This entry represents a domain of unknown function in uncharacterised proteins mostly from plants. This domain contains a Spectring fold with a conserved three-helix bundle structure that is typically arranged in tandem repeats. These repeats confer mechanical flexibility and structural resilience, allowing the proteins to maintain cell shape and organisation. Spectrin-repeat proteins form elongated scaffolds beneath the plasma membrane and contribute to cytoskeletal integrity and membrane stability.
