identifier: Pfam:PF27207
label: Y4lR second domain
definition: >-
  This entry represents the second domain of Y4lR, an uncharacterised protein from Sinorhizobium fredii. Y4lR is a 522 amino acid protein (gene NGR_a02600) located on the symbiotic plasmid pNGR234a. The protein is annotated as COG3318 in the eggNOG database and consists of four domains. This domain is the second in the multi-domain protein. The specific function of this domain remains to be determined.
