identifier: Pfam:PF18665
label: Tetracyclin repressor-like, C-terminal domain
definition: >-
  IcaR belongs to the tetracycline repressor (TetR) family of proteins, which are involved in a wide variety of gene regulations. It binds to a 42 bp region immediately upstream of the icaA gene. This entry represents the C-terminal domain which is involved in dimerization.
