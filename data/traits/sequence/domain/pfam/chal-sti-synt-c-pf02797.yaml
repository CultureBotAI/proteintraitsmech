identifier: Pfam:PF02797
label: Chalcone and stilbene synthases, C-terminal domain
definition: >-
  Chalcone synthases (CHS) ( ) and stilbene synthases (STS) (formerly known as resveratrol synthases) are related plant enzymes. CHS is an important enzyme in flavanoid biosynthesis and STS is a key enzyme in stilbene-type phyloalexin biosynthesis. Both enzymes catalyse the addition of three molecules of malonyl-CoA to a starter CoA ester (a typical example is 4-coumaroyl-CoA), producing either a chalcone (with CHS) or stilbene (with STS). These enzymes have a conserved cysteine residue, located in the central section of the protein sequence, which is essential for the catalytic activity of both enzymes and probably represents the binding site for the 4-coumaryl-CoA group. This entry also includes 3-oxoglutarate synthase (OGAS) from Atropa belladonna and related proteins from flowering plants. OGAS is a non-canonical type III polyketide synthase involved in the biosynthesis of tropane (e.g. hyoscyamine, littorine and scopolamine) and pyrrolidine (e.g. hygrine and cuscohygrine) alkaloids natural products, acting as toxic repellents against herbivorous predators and exhibiting antispasmodic, stimulant, anticholinergic and psychoactive effects in medical use. This domain of chalcone synthase is reported to be structurally similar to domains in thiolase and beta-ketoacyl synthase. The differences in activity are accounted for by differences in the N-terminal domain.
