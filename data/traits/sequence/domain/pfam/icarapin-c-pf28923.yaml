identifier: Pfam:PF28923
label: Icarapin C-terminal domain
definition: >-
  This entry represents the C-terminal domain of icarapin-like proteins. Icarapin-like proteins are secreted glycoproteins found in honeybee venom and are known allergens (Api m 10). This C-terminal domain is found in arthropods, primarily in hymenopteran insects. The domain contains predicted N-linked glycosylation sites. While icarapin-like proteins are venom components that cause allergic reactions in humans, the specific function of this domain remains to be determined.
