identifier: Pfam:PF30188
label: PF3D7_1446700-like protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of PF3D7_1446700-like proteins. This domain is found in merozoite-associated proteins from Plasmodium parasites. The domain contains α-helical coiled coil motifs and represents a potential malaria vaccine candidate as determined by epitope response in sera. The function of this domain remains to be determined.
