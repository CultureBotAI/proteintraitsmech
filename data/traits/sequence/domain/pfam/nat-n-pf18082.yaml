identifier: Pfam:PF18082
label: N-acyltransferase N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in bacterial N-acyltransferases (NATs), the gene products orf11 and dbv8, which show a a dumbbell-like structure with two domains. The N-terminal domain folds into an all-α configuration, composed of eight helices with two helix-turn-helix motifs in tandem. It is structurally similar to the AAA+ protein family (ATPases associated with various cellular activities).
