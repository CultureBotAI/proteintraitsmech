identifier: Pfam:PF05853
label: beta-keto acid cleavage enzyme
definition: >-
  This family represents a group of beta-keto acid cleavage enzymes (BKACE) mainly found in prokaryotes that show at least 14 slightly different potential enzymatic activities. In certain instances these enzymes catalyse the conversion of 3-keto-5-aminohexanoate and acetyl-CoA into acetoacetate and 3-aminobutyryl-CoA and are involved in the lysine fermentation pathway.
