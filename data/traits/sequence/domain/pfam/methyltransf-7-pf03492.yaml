identifier: Pfam:PF03492
label: SAM dependent carboxyl methyltransferase
definition: >-
  This family of plant methyltransferases contains enzymes that act on a variety of substrates including salicylic acid, jasmonic acid and 7-methylxanthine. Caffeine is synthesised through sequential three-step methylation of xanthine derivatives at positions 7-N, 3-N, and 1-N. The protein 7-methylxanthine methyltransferase (designated as CaMXMT) catalyses the second step to produce theobromine. The protein Carlactonoate CLA methyltransferase (CLAMT) catalyses the biosynthesis of (11R)-methyl carlactonoate from (11R)-carlactonoate.
