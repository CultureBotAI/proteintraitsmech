identifier: Pfam:PF27916
label: Coiled-coil domain-containing protein 43 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of coiled-coil domain-containing protein 43 (CCDC43) proteins from animals and fungi. CCDC43 is typically 213-224 amino acids in length and contains multiple coiled-coil regions. This C-terminal region is predicted to form a coiled-coil. The middle region is largely disordered and both the middle and C-terminal contain acidic and basic residue-rich regions. The protein is subject to post-translational modifications including phosphorylation and sumoylation. CCDC43 is found in the cytosol.
