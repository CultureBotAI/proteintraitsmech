identifier: Pfam:PF27645
label: Ninein middle domain
definition: >-
  This entry represents the middle domain of Ninein and similar animal proteins. Ninein proteins are centrosomal and microtubule-organising centre (MTOC) components involved in microtubule anchoring and nuclear positioning. This domain is found between the N-terminal microtubule-binding region and the C-terminal regions that contain protein interaction sites. The domain is approximately 120 residues in length and is found in vertebrates and invertebrates. In Drosophila, the protein (also known as Bsg25D) functions at both centrosomal and non-centrosomal MTOCs. The full-length protein cooperates with Ensconsin in myonuclear positioning during muscle development. Mutations in human ninein (NIN) are associated with Seckel syndrome, a form of microcephalic primordial dwarfism. This middle domain is flanked by disordered regions and may provide structural organisation between the functional N-terminal and C-terminal regions. The specific function of this domain remains to be determined.
