identifier: Pfam:PF30034
label: Microplusin antimicrobial peptide
definition: >-
  This entry represents the microplusin family of antimicrobial peptides. Members have bacteriostatic activity against Gram-positive bacteria and fungistatic activity against some fungi. The peptides bind and sequester copper and iron ions, with copper-chelating being crucial for antimicrobial activity. The proteins are secreted and contain multiple disulfide bonds. The family is found in ticks (Ixodidae).
