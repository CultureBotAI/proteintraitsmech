identifier: Pfam:PF27206
label: HI_1241 integral membrane domain
definition: >-
  This entry represents HI_1241, an uncharacterised integral membrane protein from Haemophilus influenzae. HI_1241 is a 266 amino acid multi-pass membrane protein (gene HI_1241) with eight predicted transmembrane helices. The protein is localised to the cell membrane and is found in Gammaproteobacteria. The function of this integral membrane domain remains to be determined.
