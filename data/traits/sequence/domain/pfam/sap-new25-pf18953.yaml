identifier: Pfam:PF18953
label: SAP domain-containing new25, SAP domain
definition: >-
  This entry represents the SAP domain found in the Schizosaccharomyces pombe SAP domain-containing new25 protein and related fungal proteins. SAP (SAF-A/B, Acinus and PIAS) motif is a DNA/RNA binding domain found in diverse nuclear and cytoplasmic proteins. This fungal SAP domain may be important for DNA-related cellular processes such as gene regulation and maintenance of genome integrity.
