identifier: Pfam:PF29099
label: F55H2-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of F55H2.7-like proteins. The prototype protein F55H2.7 is an uncharacterised protein from Caenorhabditis elegans. This N-terminal domain is conserved across nematodes and is found in proteins that are annotated as DBF4-type domain-containing proteins. The domain architecture suggests these proteins may be related to cell cycle regulation, as DBF4 is a regulatory subunit of the CDC7 kinase complex involved in DNA replication initiation with BRCT-like fold. However, the specific function of this N-terminal domain remains to be determined.
