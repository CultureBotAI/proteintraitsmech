identifier: Pfam:PF29776
label: Secreted effector protein SteB
definition: >-
  This entry represents secreted effector protein SteB (Salmonella translocated effector B) of approximately 127 amino acids from Salmonella species. Effector proteins function to alter host cell physiology and promote bacterial survival in host tissues. SteB is secreted via type III secretion systems 1 and 2 (SPI-1 and SPI-2 T3SS), and delivered into the host cytoplasm.
