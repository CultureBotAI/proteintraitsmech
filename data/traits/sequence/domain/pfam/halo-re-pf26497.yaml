identifier: Pfam:PF26497
label: Putative halobacteria restriction endonuclease
definition: >-
  This entry represents a domain from a family of uncharacterised proteins mainly found in halobacteria. The proteins in this family are typically around 181 amino acids in length. The domain shows structural similarity to restriction endonucleases such as BglIIR.
