identifier: Pfam:PF22699
label: GEM-interacting protein-like, FCH domain
definition: >-
  This entry represents the FCH (FER-CIP4 homology) domain (part of the F-BAR domain) found at the N-terminal of GEM-interacting protein from humans (GMIP) and F-BAR domain only proteins 1 and 2 (FCHO1/2). This domain is also found in Rho GTPase-activating protein 29 and 45. This domain mediates dimerisation and acts as a membrane recruitment module that affects membrane curvature. GMIP interacts with Gem, a Ras-related protein, through its N-terminal half and stimulates the GTPase activity of RhoA through its C-terminal domain ( ).
