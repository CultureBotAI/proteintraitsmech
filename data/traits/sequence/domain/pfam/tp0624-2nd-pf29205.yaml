identifier: Pfam:PF29205
label: Treponema pallidum Tp0624, second domain
definition: >-
  This entry represents an uncharacterised domain which is usually found at the C-terminal in uncharacterised bacterial proteins. This domain is also found as the second domain of Treponema pallidum Tp0624 . The domain adopts a pseudo β-sandwich fold with orthogonally packed β-sheets. This domain is found in combination with the N-terminal domain and a OmpA-like domain in approximately 50 bacterial proteins from various species. However, the combination of all three Tp0624 domains together is found exclusively in treponemes, primarily in pathogenic species. The first and second domains appear to function as an integrated structural unit, with an extensive buried interface of approximately 800 square Angstroms. This domain is also found at the C-terminal together with the N-terminal domain .
