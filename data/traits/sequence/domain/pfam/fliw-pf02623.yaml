identifier: Pfam:PF02623
label: FliW protein
definition: >-
  FliW binds to the C-terminal region of flagellin, which is implicated in polymerisation, and participates in the assembly of the flagellum. FliW is part of a three-part feedback loop: in Bacillus subtilis FliW inhibits CsrA (an RNA-binding protein) which inhibits FliC translation; hence FliW is required for FliC (flagellin) production.
