identifier: Pfam:PF25243
label: E3 ubiquitin-protein ligase WAV3-like, C-terminal domain
definition: >-
  This domain is found towards the C-terminal end of E3 ubiquitin -protein ligase WAV3, WAVH1, WAVH2 and EDA40 from Arabidopsis thaliana and similar plant proteins. WAV3 is involved in the regulation of root growth and acts as a positive regulator of root gravitropism. This domain is predicted to show an all-α configuration and is often found associated with and .
