identifier: Pfam:PF21391
label: Tyrosine decarboxylase, C-terminal
definition: >-
  This is the C-terminal (small) domain of tyrosine decarboxylase from Enterococcus faecalis ( ) and related species. These are PLP-dependent decarboxylases that catalyse tyrosine decarboxylation to produce tyramine. This domain may play a regulatory role.
