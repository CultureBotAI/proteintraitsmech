identifier: Pfam:PF10411
label: Disulfide bond isomerase protein N-terminal domain
definition: >-
  This is the N-terminal domain of the disulphide bond isomerase DsbC and DsbG. The whole molecule is V-shaped, where each arm is a DsbC monomer of two domains linked by a hinge; and the N-termini of each monomer join to form the dimer interface at the base of the V, so are vital for dimerisation. DsbC is required for disulphide bond formation and functions as a disulphide bond isomerase during oxidative protein-folding in bacterial periplasm. It also has chaperone activity.
