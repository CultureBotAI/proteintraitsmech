identifier: Pfam:PF24268
label: T2SS substrate NttC
definition: >-
  This entry represents the T2SS protein NttC from Legionella pneumophila ( ) and related proteins found mainly in other Legionella species. NttC has a key role during L.pneumophila infection of Vermamoeba vermiformis and Willaertia magna amoebas. It folds into an Ig-like β-sandwich containing ten β-strands and an α-helix which provides one of the pair cysteines involved in the disulfide bond formation. NttC is unusual in that it lacks a compact core and instead contains a buried internal cavity. This cavity was proposed to bind a variety of organic molecules.
