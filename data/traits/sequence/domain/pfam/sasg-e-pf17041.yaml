identifier: Pfam:PF17041
label: E domain
definition: >-
  This short domain is about 50 amino acids in length. Its structure shows that it is composed of two β sheets each of three strands. This domain is found associated with the G5 domain ( ) and has structural similarity with G5 domain, although it is somewhat shorter. The E domain forms part of a rod like structure.
