identifier: Pfam:PF17172
label: 'Glutathione S-transferase N-terminal domain '
definition: >-
  Several biological processes regulate the activity of target proteins through changes in the redox state of thiol groups (S2 to SH2), where a hydrogen donor is linked to an intermediary disulphide protein. Such processes include the ferredoxin/thioredoxin system, the NADP/thioredoxin system, and the glutathione/glutaredoxin system. Several of these disulphide proteins share a common structure, consisting of a three-layer α/β/α core.
