identifier: Pfam:PF25823
label: Ams2/SPT21 N-terminal domain
definition: >-
  This entry describes the N-terminal domain found in CENP-A multicopy suppressor protein 2 (Ams2) and SPT21 proteins found in Schizosaccharomyces pombe and Saccharomyces cerevisiae respectively. Ams2 is required for proper chromosome segregation via regulation of CENP-A localisation to the centromere. SPT21 is required for transcriptional silencing. The N-terminal of Ams2 physically interacts with other Ams2 proteins. This domain is predicted to fold into an unique topology resembling a hybrid structure composed a five-stranded β-barrel capped with α-helix and which two strands protrude to complete a five stranded curved β-sheet that grasp the α-helix.
