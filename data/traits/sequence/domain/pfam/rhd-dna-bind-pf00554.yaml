identifier: Pfam:PF00554
label: Rel homology DNA-binding domain
definition: >-
  The Rel homology domain (RHD) is found in a family of eukaryotic transcription factors, which includes NF-kappaB, Dorsal, Relish, NFAT, among others. The RHD is composed of two structural domains that grip the DNA in the major groove: the N-terminal DNA binding domain and the C-terminal domain, which has an immunoglobulin-like fold (See ). This entry represents the N-terminal DNA binding domain, whose specificity domain resembles the core domain of the p53 transcription factor, and contains a recognition loop that interacts with DNA bases. The C-terminal dimerisation domain contains the site for interaction with I-kappaB.
