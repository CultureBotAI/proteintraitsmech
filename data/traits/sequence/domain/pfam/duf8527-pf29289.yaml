identifier: Pfam:PF29289
label: Domain of unknown function (DUF8527)
definition: >-
  This entry represents a small integral membrane domain of approximately 50-70 amino acids with two predicted transmembrane helices. The family is found exclusively in halophilic archaea, restricted to the order Halobacteriales, particularly the families Haloferacaceae, Natrialbaceae and Haloarculaceae. Some members are found in proteins containing PEP-CTERM protein-sorting domains. The function of this domain remains to be determined.
