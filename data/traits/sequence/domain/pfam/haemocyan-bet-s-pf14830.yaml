identifier: Pfam:PF14830
label: Haemocyanin beta-sandwich
definition: >-
  This antiparallel β-sandwich domain occurs in the C-terminal of mollusc haemocyanins. Hemocyanins are copper-containing oxygen carriers occurring freely dissolved in the hemolymph of many mollusks and arthropods. Each mollusc haemocyanin contains several globular oxygen binding functional units. Each unit consists of an α-helical copper binding domain ( ) and an antiparallel β-sandwich domain.
