identifier: Pfam:PF13884
label: Chaperone of endosialidase
definition: >-
  The Intramolecular Chaperone Auto-processing (ICA) domain, also called Intramolecuar Chaperone Domain (ICD) or C-terminal Intramolecular Chaperone Domain (CIMCD), is capable of catalysing trimerisation-dependent auto-proteolysis. The ICA domain contains two absolutely conserved serine and lysine residues. They form a catalytic dyad that mediates cleavage at the serine residue. The correct positioning of these catalytic residues, along with an arginine residue that stabilises the oxyanion during the peptide bond breakage, is thought to be achieved only upon folding and trimerisation, enabling the ICA domain to function as a folding sensor. The ICA domain belongs to peptidase family S74. The ICA domain displays an α1-β1-α2-β2-α3-β3-β4-α4 fold. The ICA domain homotrimer has a jellyfish-like outline with a central threefold symmetry axis and mainly consists of α-helices. It comprises a quite globular core and an extended loop region, reminiscent of tentacles, protruding from the centre. The central part of the core is a slightly twisted three helix bundle, forming the trimerisation interface. Some proteins known to contain an ICA domain are listed below: Animal myelin regulatory factor (MYRF), a key transcriptional regulator for of oligodendrocyte differentiation and central nervous system (CNS) myelination. The MYRF protein undergoes an activating cleavage event to release the functional transcription factor from the transmembrane domain that otherwise anchors it to the endoplasmic reticulum. Tailed bacteriophage (Caudovirus) endosialidases, the tailspike proteins essential for bacteriophages to infect bacteria encapsulated with polysaccharides.
