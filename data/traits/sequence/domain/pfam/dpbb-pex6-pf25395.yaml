identifier: Pfam:PF25395
label: PEX6 double psi barrel domain
definition: >-
  This domain is found in the human Peroxisomal ATPase PEX6 and related proteins from vertebrates. PEX6 is a component of the PEX1-PEX6 AAA ATPase complex, a protein dislocase complex that mediates the ATP-dependent extraction of the PEX5 receptor from peroxisomal membranes, an essential step for PEX5 recycling. PEX6 recognises PEX5 monoubiquitination at Cys 11, and enables its translocation out of the peroxisome lumen through the PEX2-PEX10-PEX12 retrotranslocation channel. In human PEX6, this domain is predicted to fold into a barrel-like structure with a double psi barrel topology. This domain precedes the AAA ATPase domains and shares detectable sequence and structural similarity with known double psi β-barrel domains such as the N-terminal domain of the N-ethylmaleimide-sensitive factor (NSF) ( ).
