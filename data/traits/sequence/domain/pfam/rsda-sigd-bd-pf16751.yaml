identifier: Pfam:PF16751
label: Anti-sigma-D factor RsdA to sigma factor binding region
definition: >-
  This entry represents a domain found in the N terminus of anti-sigma-D factor RsdA proteins. It binds to the -35 promoter binding domain of sigma-D. The complex formed regulates the transcriptional expression of the bacterium.
