identifier: Pfam:PF29078
label: SFG1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of SFG1, a probable transcription factor required for superficial pseudohyphal development in response to nitrogen starvation in fungi. SFG1 is localised to the nucleus and is involved in regulating filamentous growth pathways. SFG1 enhances superficial pseudohyphal growth when overexpressed, playing a role in cell-cell adhesion and invasive filamentous growth. While the complete SFG1 protein functions as a transcriptional regulator in pseudohyphal development, the specific function of this domain remains to be determined.
