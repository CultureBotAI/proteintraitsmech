identifier: Pfam:PF27361
label: HrcQa N-terminal domain
definition: >-
  This entry represents the N-terminal domain of HrcQa proteins found in Pseudomonas and related Type III secretion proteins. While the full-length protein has demonstrated roles in type III secretion, the specific function of this N-terminal domain remains to be determined. HrcQa is a component of the type III secretion system required for effector protein delivery and pathogenicity in plants. The protein is localised to the cell inner membrane as a peripheral membrane protein and probably participates in the formation of a C-ring-like assembly along with HrcQb.
