identifier: Pfam:PF11876
label: Type VI immunity for VRR-NUC
definition: >-
  This entry represents bacterial immunity proteins that in are encoded by the PAAR2 cluster and have been named Type VI immunity for VRR-NUC (TsiV). These proteins form an effector-immunity pair with TseV (type VI effector VRR-NUC), the TseV-TsiV pair. These are α+β class of proteins whose surface is mainly electronegative with a a hydrophobic core formed by the N-terminal region.
