identifier: Pfam:PF24781
label: FANCA helical domain
definition: >-
  This entry represents the helical domain of Fanconi anaemia group A protein (FANCA), found in the central region of the protein, which is packed against the arcC half of the C-terminal domain. Fanconi anemia (FA) is a human disorder characterised by cancer susceptibility and cellular sensitivity to DNA crosslinks and other damages. The FA complex repairs the interstrand cross-linking (ICL) lesions and coordinates activities of the downstream DNA repair pathway including nucleotide excision repair, translesion synthesis, and homologous recombination. It is required for the monoubiquitylation of FANCD2 and FANCI heterodimer. The FA core complex consists of FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL, FANCM, FANCT (UBET2), FAAP100 and FAAP24.
