identifier: Pfam:PF24591
label: Phage YunG-like protein
definition: >-
  This entry represents a small family of uncharacterised phage and prophage proteins. These proteins show structural similarity to the B. subtilis YunG protein and appear to conserve a putative catalytic triad of cys, his and asp. Structure predictions suggest that these proteins may form homodimers.
