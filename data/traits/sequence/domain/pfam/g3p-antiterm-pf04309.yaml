identifier: Pfam:PF04309
label: Glycerol-3-phosphate responsive antiterminator
definition: >-
  Glycerol enters bacterial cells via facilitated diffusion, an energy-independent transport process catalysed by the glycerol transport facilitator GlpF, an integral membrane protein of the aquaporin family. Intracellular glycerol is usually converted to glycerol-3-P in an ATP-requiring phosphorylation reaction catalysed by glycerol kinase (GlpK). Glycerol-3-P, the inducer of the glpFK operon, is not a substrate for GlpF and hence remains entrapped in the cell where it is metabolized further. In some bacterial species, for example Bacillus firmus, glycerol-3-P activates the antiterminator GlpP. In B. subtilis, glpF and glpK are organised in an operon followed by the glycerol-3-P dehydrogenase-encoding glpD gene and preceded by glpP coding for an antiterminator regulating the expression of glpFK, glpD and glpTQ. Their induction requires the inducer glycerol-3-P, which activates the antiterminator GlpP by allowing it to bind to the leader region of glpD and presumably also of glpFK and glpTQ mRNAs.
