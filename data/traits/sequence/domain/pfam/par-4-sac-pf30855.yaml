identifier: Pfam:PF30855
label: Par-4 SAC region
definition: >-
  This entry represents the SAC (Selective for Apoptosis induction in Cancer cells) domain found in the prostate apoptosis response protein Par-4 (PAWR) in metazoans. The SAC domain is a 59-amino-acid core region that is 100% conserved in rat, mouse, and human Par-4. This domain is both necessary and sufficient to induce apoptosis selectively in cancer cells without affecting normal cells. The SAC domain contains a bipartite nuclear localisation sequence (NLS2) required for nuclear entry, and a threonine residue (Thr163 in human) that is phosphorylated by protein kinase A for activation. The domain induces apoptosis through activation of the Fas prodeath pathway and inhibition of NF-kappa-B transcriptional activity. Unlike full-length Par-4, the SAC domain lacks the Akt and casein kinase 2 phosphorylation sites that negatively regulate Par-4 activity, which may explain its ability to induce apoptosis even in Par-4-resistant cancer cells.
