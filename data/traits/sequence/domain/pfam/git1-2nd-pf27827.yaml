identifier: Pfam:PF27827
label: Adenylate cyclase activation protein git1 second domain
definition: >-
  This entry represents the second domain of adenylate cyclase activation protein git1 from Schizosaccharomyces species. Git1 is involved in the glucose/cAMP signalling pathway and is required for maintaining basal cAMP levels and for producing a glucose-triggered cAMP response. The full-length protein interacts with adenylate cyclase (cyr1) and localises to the cytoplasm, nucleus, and spindle pole body. Git1 contains Munc13 homology domains which are characteristic of proteins involved in vesicle priming and membrane trafficking. This domain is all-helical.
