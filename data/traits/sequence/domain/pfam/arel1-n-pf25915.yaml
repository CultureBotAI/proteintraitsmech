identifier: Pfam:PF25915
label: AREL1 N-terminal domain
definition: >-
  This entry describes the N-terminal domain in AREL1 and similar sequences found in animals. This domain is 55 amino acids long and adopts an all α-helical fold. It is often found adjacent to . Apoptosis-resistant E3 ubiquitin protein ligase 1 (AREL1) proteins function as E3 ubiquitin-protein ligases, catalysing the formation of polyubiquitin chains linked through 'Lys-11' or 'Lys-33', with a preference for 'Lys-33'. These enzymes transfer ubiquitin from an E2 ubiquitin-conjugating enzyme to specific substrates, including SEPTIN4, DIABLO/SMAC, and HTRA2, in vitro. Additionally, they play a role in modulating pulmonary inflammation by targeting SOCS2 for ubiquitination and subsequent degradation via the proteasome. AREL1 interacts with SOCS2 and, through its HECT domain, with HTRA2, DIABLO/SMAC, and SEPTIN4, particularly in the cytoplasm following the induction of apoptosis.
