identifier: Pfam:PF10006
label: Uncharacterized conserved protein (DUF2249)
definition: >-
  This entry represents a domain of approximately 120 residues found in predicted integral membrane proteins. Some members are annotated as NnrS family proteins. According to STRING, this domain co-occurs with DUF2249 ( ). This family is found predominantly in Actinomycetota and Pseudomonadota. The function of this domain remains to be determined.
