identifier: Pfam:PF28034
label: Four-cysteine protein VF_A0006-like
definition: >-
  Members of this family, including VF_A0006 ( ) of Vibrio fischeri, PSPA7_2531 ( ) of Pseudomonas aeruginosa, and BPSL3341 ( ) from Burkholderia pseudomallei, have an N-terminal signal peptide and four invariant Cys residues suggesting the formation of two disulfide bonds. The function of these proteins is unknown.
