identifier: Pfam:PF25720
label: Herpesvirus ORF28 domain
definition: >-
  This entry represents a conserved domain at the N-terminal in the uncharacterised protein ORF28 from Ictalurid herpesvirus 1. This domain contains conserved cysteine residues that may form a zinc-binding motif. The function of this domain remains unknown, but it is primarily found in herpesviruses that infect fish.
