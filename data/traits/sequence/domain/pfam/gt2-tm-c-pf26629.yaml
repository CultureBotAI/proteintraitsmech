identifier: Pfam:PF26629
label: Glycosyltransferase family 2 C-terminal transmembrane region
definition: >-
  This entry represents the C-terminal transmembrane region found in Low-salt glycan biosynthesis hexosyltransferase Agl6 from Haloferax volcanii and similar prokaryotic proteins involved in N-glycosylation pathways. Agl6 (HVO_2061) function as hexosyltransferase in a low-salt specific N-glycosylation pathway. This pathway is activated when cells are grown under low salt conditions (1.75 M NaCl) and results in the attachment of a distinct tetrasaccharide to Asn-498 of the S-layer glycoprotein, different from the pentasaccharide attached under standard salt conditions (3.4 M NaCl). The transmembrane helices likely anchor the enzyme to the membrane where glycan assembly occurs on dolichol phosphate carriers. The cytoplasmic regions of the protein contain the catalytic glycosyltransferase domain responsible for sugar transfer. This membrane association is essential for proper localisation and function in the N-glycosylation pathway. This domain is found in various prokaryotic glycosyltransferases involved in protein glycosylation, cell wall biosynthesis, and other carbohydrate metabolism pathways. The presence of multiple transmembrane helices distinguishes these membrane-associated glycosyltransferases from their soluble counterparts. This transmembrane domain may form a homodimeric arrangement according to structure prediction.
