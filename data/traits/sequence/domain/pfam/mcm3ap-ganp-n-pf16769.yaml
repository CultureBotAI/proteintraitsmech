identifier: Pfam:PF16769
label: GANP, MCM3AP N-terminal domain
definition: >-
  This entry represents the N-terminal part of the MCM3AP domain of germinal-centre associated nuclear protein (GANP) from higher eukaryotes. GANP is involved in the nuclear export of poly(A)-containing mRNAs by acting as a scaffold for the TREX-2 complex. The localisation of the TREX-2 complex to nuclear pore complexes requires the MCM3AP domain of GANP. This domain, together with have been described as the MCM3AP domain that is required to recruit ENY2.
