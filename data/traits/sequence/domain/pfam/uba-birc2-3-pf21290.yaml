identifier: Pfam:PF21290
label: BIRC2/3-like, UBA domain
definition: >-
  Baculoviral IAP repeat-containing proteins, also known as c-IAPs, function as ubiquitin E3 ligases that mediate the ubiquitination of the substrates involved in apoptosis, nuclear factor-kappaB (NF-kappaB) signalling, and oncogenesis. This entry represents the UBA domain of BIRC2/3/4/8, E3 ubiquitin-protein ligase XIAP from mammals and BIRC7 from Xenopus tropicalis.
