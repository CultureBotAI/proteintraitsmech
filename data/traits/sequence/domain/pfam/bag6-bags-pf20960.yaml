identifier: Pfam:PF20960
label: Bag6, BAG-similar domain
definition: >-
  Bag6 (BCL2-associated athanogene cochaperone 6) is part of a cytosolic protein quality control complex involved in the post- translational delivery of tail-anchored/type II transmembrane proteins to the endoplasmic reticulum membrane, in the mislocalised protein degradation pathway and in the endoplasmic reticulum- associated degradation. The BAG-similar domain, found at the C- terminal end of this protein, plays a role in the interaction with the other members of the complex, Ubl4A and TRC35. This domain shows three helices in an extended conformation that differ from the three-helix bundle fold of the canonical BAG domain ( ).
