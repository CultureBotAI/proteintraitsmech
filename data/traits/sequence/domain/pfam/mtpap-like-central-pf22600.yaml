identifier: Pfam:PF22600
label: Poly(A) RNA polymerase, mitochondrial-like, central palm domain
definition: >-
  This domain is found centrally in human Poly(A) RNA polymerase, mitochondrial (MTPAP) and similar proteins from eukaryotes. MTPAP is a noncanonical polymerase that creates the 3' poly(A) tail of mitochondrial transcripts. It plays a role in the replication-dependent histone mRNA degradation. MTPAP may be involved in the terminal uridylation of mature histone mRNAs before their degradation is initiated and might be responsible for the creation of some UAA stop codons which are not encoded in mtDNA. This protein contains three domains: a N-terminal domain RL ( ) and the canonical palm (represented by this entry) and fingers domains. This domain shows a five-stranded β-sheet with the three catalytic aspartic acid residues located on its surface, together with several α-helices, forming an α-β configuration.
