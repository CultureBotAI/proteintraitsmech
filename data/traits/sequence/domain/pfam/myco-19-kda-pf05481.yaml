identifier: Pfam:PF05481
label: Mycobacterium 19 kDa lipoprotein antigen
definition: >-
  Most of the antigens of Mycobacterium leprae and Mycobacterium tuberculosis that have been identified are members of stress protein families, which are highly conserved throughout many diverse species. Of the M. leprae and M. tuberculosis antigens identified by monoclonal antibodies, all except the 18kDa M. leprae antigen and the 19kDa M. tuberculosis antigen are strongly cross-reactive between these two species and are coded within very similar genes.
