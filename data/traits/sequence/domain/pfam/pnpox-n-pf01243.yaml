identifier: Pfam:PF01243
label: Pyridoxamine 5'-phosphate oxidase
definition: >-
  Pyridoxamine 5'-phosphate oxidase (PNPOx; ) is a FMN flavoprotein that catalyses the oxidation of pyridoxamine-5-P (PMP) and pyridoxine-5-P (PNP) to pyridoxal-5-P (PLP). This reaction serves as the terminal step in the de novo biosynthesis of PLP in Escherichia coli and as a part of the salvage pathway of this coenzyme in both E. coli and mammalian cells. The binding sites for FMN and for substrate have been highly conserved throughout evolution. In some species, coenzyme F420 may perform the cofactor role instead of FMN. This entry represents the N-terminal segment which is involved in FMN binding when they form the dimer. In human PNPO, it has been shown that this region contains some of the residues that constitute the PLP allosteric site which regulates its activity. The C-terminal region of these proteins is involved in dimerisation ( ). This entry also includes Dihydrophenazinedicarboxylate synthase (PhzG) which catalyses several oxidations in the terminal steps of core phenazine biosynthesis.
