identifier: Pfam:PF03168
label: Late embryogenesis abundant protein
definition: >-
  This entry represents a region found in the subgroup of LEA proteins LEA_2 (LEA14, D-95). The structure of Arabidopsis LEA14 has been revealed. LEA (late embryogenesis abundant) proteins were first identified in land plants. Plant LEA proteins have been found to accumulate to high levels during the last stage of seed formation (when a natural desiccation of the seed tissues takes place) and during periods of water deficit in vegetative organs. Later, LEA homologues have also been found in various species. They have been classified into several subgroups in Pfam and according to Bray and Dure.
