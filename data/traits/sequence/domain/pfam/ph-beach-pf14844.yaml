identifier: Pfam:PF14844
label: PH domain associated with Beige/BEACH
definition: >-
  This entry represents a domain with a fold similar to that of the PH (pleckstrin homology) domain, despite displaying little sequence homology with canonical PH domains. Furthermore, this domain is incapable of binding phospholipids. This domain is found preceding the BEACH domain in beige-like and BEACH-domain containing proteins. The BEACH domain is found in eukaryotic proteins that have diverse cellular functions ranging from lysosomal traffic to apoptosis and cytokinesisin vesicle trafficking, membrane dynamics, and receptor signaling. The name BEACH is derived from BEige And Chediak-Higashi syndrome.
