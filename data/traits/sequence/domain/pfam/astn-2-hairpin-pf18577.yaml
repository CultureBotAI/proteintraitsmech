identifier: Pfam:PF18577
label: Astrotactin-2 C-terminal beta-hairpin domain
definition: >-
  This is a β-hairpin domain found at the C-terminal region of astrotactin 2 proteins (ASTN-2). ASTN-2 is an integral membrane perforin-like protein linked to the planar cell polarity pathway in hair cells. It consists of multiple polypeptide folds: a perforin-like domain, a minimal epidermal growth factor-like module, a fibronectin type III domain Fn (III) and an annexin-like domain as well as the β hairpin domain which packs across the fibronectin domain.
