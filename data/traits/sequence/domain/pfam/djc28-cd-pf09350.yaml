identifier: Pfam:PF09350
label: DnaJ homologue, subfamily C, member 28, conserved domain
definition: >-
  This entry represents a domain found in a group of sequences that may have a role in protein folding or as a chaperone. DnaJ is a member of the J-protein family, which are defined by the presence of a J domain that can regulate the activity of 70kDa heat-shock proteins. Some of the proteins in this entry contain a J domain.
