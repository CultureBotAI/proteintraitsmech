identifier: Pfam:PF21998
label: Myosin-X FERM PH domain-like
definition: >-
  The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe/F3 within the FERM domain is part of the PH domain family. This entry represents the C-lobe of the MyoVII first FERM domain. MyoVII, a MyTH-FERM myosin, is an actin-based motor protein essential for a variety of biological processes in the actin cytoskeleton function. Mutations in MyoVII leads to problems in sensory perception: deafness and blindness in humans (Usher Syndrome), retinal defects and deafness in mice (shaker 1). Myosin VIIAs have plus (barbed) end-directed motor activity on actin filaments and a characteristic actin-activated ATPase activity. MyoVII consists of a conserved spectrin-like, SH3 subdomain N-terminal region, a motor/head region, a neck made of 4-5 IQ motifs, and a tail consisting of a coiled-coil domain, followed by a tandem repeat of myosin tail homology 4 (MyTH4) domains and partial FERM domains that are separated by an SH3 subdomain and are thought to mediate dimerization and binding to other proteins or cargo.
