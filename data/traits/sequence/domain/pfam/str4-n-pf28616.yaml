identifier: Pfam:PF28616
label: STR4 N-terminal domain
definition: >-
  This entry represents region found towards the C-terminal in STR4 (Sulfurtransferase 4) proteins from Arabidopsis and similar sequences from plants. STR4 is also known as TROL (Thylakoid Rhodanese-Like) and is a 466 amino acid chloroplast protein that contains a rhodanese domain, two transmembrane helices, and transit peptides for chloroplast and thylakoid targeting. STR4/TROL is required for anchoring ferredoxin-NADP reductase to thylakoid membranes and sustaining efficient linear electron flow in photosystem II. The protein is a component of high molecular weight thylakoid complexes and is localised to the non-appressed regions of the thylakoid membrane. While the full- length STR4 protein functions in photosynthetic electron transport, the specific function of this region remains to be determined.
