identifier: Pfam:PF11396
label: Putative beta-lactamase-inhibitor-like, PepSY-like
definition: >-
  This entry represents a domain found in a group of bacterial proteins that are probably periplasmic. Members are found predominantly in microbes of the human gut and oral cavity. Structurally, one member of this family is found to show similarity to the beta-lactamase-inhibitor PepSY proteins, so the overall function may be inhibitory. There are tandem repeats of the domain on many members.
