identifier: Pfam:PF30662
label: Peptidase C39 N-terminal domain
definition: >-
  This entry represents an approximately 150-190 residue N-terminal domain found in peptidase C39 family proteins, predominantly in Actinomycetota. The domain is located upstream of the peptidase C39 catalytic domain ( ). SCO1432 from Streptomyces coelicolor was identified as a twin-arginine translocation pathway substrate, suggesting these proteins are secreted. The specific function of this N-terminal domain remains to be determined.
