label: C2orf42 C-terminal domain
definition: >-
  This domain is found in the human uncharacterised protein C2orf42 and related metazoan proteins. It is predicted to fold into a curved antiparallel β-sheet with α-helices packed on the concave side. This domain is frequently found in combination with .
