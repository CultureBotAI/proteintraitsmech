identifier: Pfam:PF04130
label: Gamma tubulin complex component C-terminal
definition: >-
  This is the C-terminal domain found in components of the gamma-tubulin complex proteins (GCPs). Family members include spindle pole body (SBP) components such as Spc97 and Spc98 which function as the microtubule-organizing centre in yeast. Furthermore, family members such as human GCP4 (gamma-tubulin complex component 4) have been structurally elucidated ( ). Structure-based sequence analysis revealed the existence of an exposed surface area conserved in all human GCPs and in GCP4 orthologues. This area is located in the C-terminal domain of GCP4, which was confirmed in vitro to bind directly to gamma-tubulin. Sequence alignment of human GCPs based on the GCP4 structure helped delineate conserved regions in the N- and C-terminal domains. The microtubule organizing centres (MTOCs) of eukaryotic cells are the sites of nucleation of microtubules, and are known as the centrosome in animal cells and the spindle pole body in yeast. Gamma-tubulin, which is 30% identical to alpha and beta tubulins that form microtubules, appears to be a key protein involved in nucleation of microtubules. Gamma tubulin can assemble into complexes of various sizes with members of the GCP family. In budding yeast, the gamma tubulin-containing small complex (gammaTuSC) contains gamma tubulin, GCP2 and GCP3 (also known as Spc97 and Spc98). In Drosophila and vertebrates, gamma tubulin forms much larger assemblies, termed gamma-tubulin ring complexes (gammaTuRCs), with gamma tubulin, GCP2, GCP3, GCP4, GCP5 and GCP6. The purified gammaTuSC and gammaTuRC complexes exhibit a 'lock washer' shape. However, the purified gammaTuSC has been shown to have a much lower microtubule-nucleating activity than intact gammaTuRC. Several models have been proposed to explain their assembly and nucleation mechanism.
