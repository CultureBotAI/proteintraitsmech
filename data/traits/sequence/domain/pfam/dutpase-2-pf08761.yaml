identifier: Pfam:PF08761
label: dUTPase
definition: >-
  This entry represents dimeric deoxyuridine triphosphate nucleotidohydrolase (dUTPase) ( ) and phage T4 dCTP pyrophosphatase ( ). dUTPase catalyses the hydrolysis of dUTP to dUMP and pyrophosphate. There are several classes of dUTPases: trimeric dUTPases found in most organisms and homologous monomeric dUTPases, found in mammalian herpesviruses. The dUTPases in this entry belong to a third class of dUTPases that form a dimer in solution and are able to hydrolyse both dUTP and dUDP. It contains a novel all-α fold that is unrelated to the all-β fold found in dUTPases of the majority of organisms.
