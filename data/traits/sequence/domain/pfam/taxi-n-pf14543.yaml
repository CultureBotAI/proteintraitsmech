identifier: Pfam:PF14543
label: Xylanase inhibitor N-terminal
definition: >-
  This entry represents a domain found N-terminal in some aspartic proteinases and in xylanase inhibitors. The activity of these proteins is vital for plant-survival as xylanase produced by phytopathogens destroys plant cells.
