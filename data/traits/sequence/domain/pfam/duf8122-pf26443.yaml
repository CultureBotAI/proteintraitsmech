identifier: Pfam:PF26443
label: Domain of unknown function (DUF8122)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins are predominantly found in the Halobacteria class, including genera such as Halostagnicola, Natrialbaceae, and Halobacteriales. The domain is approximately 100-130 amino acids in length. This domain is a small putative zinc binding domain that is found C-terminal to a putative toxin-like domain .
