identifier: Pfam:PF01123
label: Staphylococcal/Streptococcal toxin, OB-fold domain
definition: >-
  Streptococcus pyogenes (group A streptococcus) cause a wide range of human infections, in a range from acute illness in an initial exposure such as pharyngitis or impetigo to serious and life-threatening infections in humans like toxic shock syndrome (TSS) with or without necrotizing fasciitis and myositis. This pathogen is also associated with development of autoimmune diseases, namely rheumatic fever, acute glomerulonephritis, and guttate psoriasis. Staphylococcus aureus is another major human pathogen that can cause a wide variety of infections, ranging from relatively benign furuncles and soft tissue abscesses to others that are life-threatening, such as infective endocarditis, necrotizing (hemorrhagic) pneumonia, sepsis, and toxic shock syndrome (TSS). The ability of these two pathogens to cause serious infections relays on the production of cell surface and secreted virulence factors, known altogether as superantigens exotoxins which overstimulates many immune processes. Among the cell surface factors, large families of microbial surface components recognising adhesive matrix molecules (MSCRAMMs) and immunoglobulin Fc-binding proteins are included, which are important for host colonisation and interfere with local host immune responses. The secreted virulence factors include multiple cytolysins, proteases, nucleases, and lipases. A hallmark of superantigens is a conserved overall structure containing two major protein domains: an amino-terminal oligosaccharide/oligonucleotide binding (O/B) fold, comprised of a β-barrel, and a carboxy-terminal β-grasp domain made of antiparallel β-strands, with domains connected by a central, diagonal α-helix. This entry represents the O/B fold domain present in streptococcal exotoxins and staphylococcal enterotoxins. This entry a…
