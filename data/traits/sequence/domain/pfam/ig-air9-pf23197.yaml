identifier: Pfam:PF23197
label: AIR9 A9 domain
definition: >-
  This entry represents an Ig-like domain known as the A9 domain that is repeated 10/11 times in AIR9 (187-kDa microtubule-associated protein AIR9) from Arabidopsis thaliana. This domain is also found only once, often associated with in a group of plant and bacterial uncharacterised proteins. AIR9 and TAN1 function redundantly to maintain POK1 at the division site to ensure correct cell wall placement and interactions between POK1 and AIR9 are important for division plane orientation and plant growth.
