identifier: Pfam:PF10986
label: ZrgA family zinc uptake protein
definition: >-
  This entry, previously known as DUF2796, represents the zinc-specific solute binding protein ZrgA homologues found predominantly in gammaproteobacteria. ZrgA is an important component of the zrgABCDE operon in Vibrio parahaemolyticus and Vibrio cholerae. It is anticipated to function as a solute binding protein (SBP) for the ZrgBC permease/ATPase transporter system as it is required for a normal growth and survival in zinc-deficient conditions. The wild type ZrgA can bind up to 10 zinc ions with four high-affinity zinc binding sites. The structures of ZrgA from Vibrio cholerae and its homologue, protein PA4063 from Pseudomonas aeruginosa, were determined bound to zinc, and , respectively. These proteins adopt an α/β structure consisting of a six-stranded meander β-sheet and two α-helices packed on it with an unique topology.
