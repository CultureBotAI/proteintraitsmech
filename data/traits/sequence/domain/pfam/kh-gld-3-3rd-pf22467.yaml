identifier: Pfam:PF22467
label: GLD-3 3rd KH domain (aka KH4)
definition: >-
  GLD-3 from C.elegans, also called defective in germ line development protein 3, is a Bicaudal-C (Bic-C) homologue that is involved in the translational control of germline-specific mRNAs during embryogenesis. It interacts with the cytoplasmic poly(A)-polymerase GLD-2. The two proteins cooperate to recognize target mRNAs and convert them into a polyadenylated, translationally active state. CeGLD-3 contains four K-homology (KH) RNA-binding domains, which are divergent KH domains that lacks the RNA-binding GXXG motif. This entry corresponds to the third KH domain.
