identifier: Pfam:PF23477
label: Probable treble clef zinc finger
definition: >-
  This domain, with a pair of CXXC motifs separated by 17 amino acids, is a candidate zinc finger domain based on these motifs. Some proteins have two copies of the domain, while others are fused to another probable zinc-binding domain.
