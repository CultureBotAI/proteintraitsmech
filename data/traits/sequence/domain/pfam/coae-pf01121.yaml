identifier: Pfam:PF01121
label: Dephospho-CoA kinase
definition: >-
  This family contains Dephospho-coenzyme A kinase (DPCK, ), which catalyzes the final step in dephosphocoenzyme A (dCoA) biosynthesis, the phosphorylation of the 3'-hydroxyl group of ribose using ATP as a phosphate donor. The crystal structures of a number of the proteins in this entry have been determined, including the structure of the protein from Haemophilus influenzae to 2.0-A resolution in a comlex with ATP. The protein consists of three domains: the nucleotide-binding domain with a five-stranded parallel β-sheet, the substrate-binding α-helical domain, and the lid domain formed by a pair of α-helices; the overall topology of the protein resembles the structures of other nucleotide kinases.
