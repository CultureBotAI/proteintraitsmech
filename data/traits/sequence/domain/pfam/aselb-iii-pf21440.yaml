identifier: Pfam:PF21440
label: Archaeal selenocysteine-specific elongation factor, domain III
definition: >-
  Selenocysteine-specific elongation factor (SelB) is a transcription factor necessary for the incorporation of selenocysteine into proteins. This entry represents domain III of archaeal SelB, which adopts a β-barrel fold and is homologous to domain III of EF-Tu.
