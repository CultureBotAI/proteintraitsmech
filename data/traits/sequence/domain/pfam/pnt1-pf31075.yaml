identifier: Pfam:PF31075
label: Pentamidine resistance factor domain
definition: >-
  This domain is found in yeast Pentamidine resistance factor (PNT1), which is likely to be involved in mitochondrial export. It confers resistance to the anti-pneumocystis carinii drug pentamidine. This domain is predicted to adopt a mostly α-helical structure.
