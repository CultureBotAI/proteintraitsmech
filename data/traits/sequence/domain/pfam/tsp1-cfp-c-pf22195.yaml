identifier: Pfam:PF22195
label: CFP-like, C-terminal thrombospondin type 1 domain
definition: >-
  This represents the C-terminal thrombospondin type I repeat (TSR_C) found in human Properdin (CFP) and similar proteins from vertebrates. Properdin is a glycoprotein constructed from a common pool of structure units or modules, which are homologous to the thrombospondin type 1 repeat, TSR. It is a positive regulator of the complement system that stabilises the alternative pathway C3-convertase C3bBb. Properdin also inhibits the factor H-mediated cleavage of C3b by factor I. In addition, this protein acts as a pattern recognition molecule capable of identifying and interacting with microbial surfaces, apoptotic cells, and necrotic cells. However this role of pattern recognition is controversial. Studies indicate that this domain is a TSR variants. CFP is a positive regulator of the alternate pathway (AP) of complement. It contains six thrombospondin repeat type I (TSP 1-6 domains and an N-terminal domain ( ). This entry represents the last TSP type I domain, which binds to the first TSP type I domain ( ), contributing to multimerisation.
