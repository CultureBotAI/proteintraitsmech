identifier: Pfam:PF22982
label: ATP-dependent helicase HRQ1, winged helix domain
definition: >-
  This domain is found in ATP-dependent helicase HRQ1 from yeast and isimilar proteins from fungi, plants, and bacteria, including DNA 3'-5' helicase SftH from Mycolicibacterium smegmatis. HRQ1 is a helicase with 3'-5' helicase activity involved in genome stability. Hrq1 is able to unwind relatively long duplex DNA up to 120-bp and is significantly stimulated by a preexisting fork structure. SftH loads on a 3'-tailed substrate and unwinds DNA as it translocates in a 3'-5' direction. This domain is predicted to form a globular structure with significant similarity to Winged helix HTH domains.
