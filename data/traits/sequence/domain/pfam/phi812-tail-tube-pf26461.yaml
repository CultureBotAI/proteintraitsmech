identifier: Pfam:PF26461
label: Phi812 tail tube protein
definition: >-
  This entry represents Tail tube protein of bacteriophage phi812 and related proteins. Phi812 is a bacteriophage that infects Staphylococcus aureus, including many methicillin-resistant strains (MRSA). This protein adopts an eight-stranded β-barrel fold with a protruding stacking loop, characteristic for tail tube proteins of long-tailed phages. In a native tail, the phi812 tail sheath proteins interact with tail tube proteins and mediate substantial contacts between tail sheath proteins.
