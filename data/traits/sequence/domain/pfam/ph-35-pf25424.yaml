identifier: Pfam:PF25424
label: Fungal deubiquitinating enzyme PH domain
definition: >-
  This entry represents the PH domain of Ubiquitin-like-specific protease B from Verticillium dahliae (ULPB) and similar fungal proteins that also contain a peptidase C48 domain ( ). ULPB is a SUMO-specific protease that is capable to catalyze SUMO precursor maturation and shows SUMO deconjugation activity.
