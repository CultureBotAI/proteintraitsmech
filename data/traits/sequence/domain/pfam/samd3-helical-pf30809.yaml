identifier: Pfam:PF30809
label: Sterile alpha motif domain-containing protein 3, helical domain
definition: >-
  This entry represents an α-helical domain of approximately 55 residues found in sterile alpha motif domain-containing protein 3 (SAMD3) and related proteins. The domain is found following SAM domains ( ). In some family members, this domain is present in two copies. SAMD3 proteins have been shown to interact with various proteins including AKAP9, KDM1A, and huntingtin (HTT). This family is found in metazoans. The function of this domain remains to be determined.
