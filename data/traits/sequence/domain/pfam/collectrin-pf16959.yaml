identifier: Pfam:PF16959
label: Renal amino acid transporter
definition: >-
  This domain is found in collectrin, a single-pass transmembrane protein that regulates SNARE complex function. This domain can be also found in the C-terminal region of human angiotensin-converting enzyme 2, ACE2. The transmembrane protease angiotensin converting enzyme 2 (ACE2) is a protective regulator within the renin angiotensin system and additionally represents the cellular receptor for SARS-CoVs. It functions as carboxypeptidase and cleaves the C-terminal amino acid of angiotensin I to angiotensin 1-9 or directly converts angiotensin II to angiotensin 1-7. ACE2 consists of an N-terminal catalytically active metalloprotease domain and a C-terminal collectrin-like domain. Collectrin is a type I membrane protein and shares significant homology with the C-terminal domain of ACE2. However, collectrin lacks catalytic domain and it suggests the presence of uncharacterised physiological functions of collectrin. Collectrin binds to SNARE complex protein such as snapin and the collectrin-mediated processes of vesicle transport and fusion to the plasma membrane in a polarized manner is crucial for delivering insulin and amino acid transporters. The collectrin-like domain mediates homodimerization. It consists of a small extracellular neck subdomain, which adopts a ferredoxin-like fold, a long linker, and a single transmembrane (TM) helix.
