identifier: Pfam:PF00881
label: Nitroreductase family
definition: >-
  The entry represents a domain found in a group of FMN- or FAD-dependent and NAD(P)H-dependent nitroreductases that are able to metabolise nitrosubstituted compounds. Reduced flavins participate in numerous biochemical processes. NAD(P)H-flavin oxidoreductases (flavin reductases) catalyse the reduction of flavin by NAD(P)H. The representative member of this family, Frp (flavin reductase P), is a supplier of reduced flavin mononucleotide (FMNH2) to the bioluminescence reaction in Vibrio harveyi. Oxygen-insensitive NADPH nitroreductase also belongs to this family. It catalyses the reduction of nitroaromatic compounds using NADH. It is a major component of the oxygen-insensitive nitroreductase activity of some bacteria, such as E.coli. Both the reductase and nitroreductase are homodimeric flavoproteins that contain one FMN per monomer as a cofactor.
