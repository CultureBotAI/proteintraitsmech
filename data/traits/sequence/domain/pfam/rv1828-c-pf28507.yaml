identifier: Pfam:PF28507
label: Rv1828-like, C-terminal domain
definition: >-
  This is the C-terminal domain of the Uncharacterized HTH-type transcriptional regulator Rv1828 from Mycobacterium tuberculosis and related proteins. Rv1828 is a transcriptional regulator that binds to its own promoter and thus may play a role in the regulation of the cotranscribed genes Rv1827 and Rv1828. It can also bind several promoter regions of genes that are essential, including ftsZ. It binds to the imperfect everted repeat sequence CTCAA through its N-terminal winged-HTH motif ( ). This domain corresponds to the effector binding domain and mediates dimer formation of Rv1828.
