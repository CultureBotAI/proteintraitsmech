identifier: Pfam:PF26358
label: EcdD/BsdD phenolic detoxification
definition: >-
  This entry represents a group of bacterial enzymes, including proteins such as VdcD from Streptomyces sp., BsdD from Bacillus subtilis, and EcdD from Escherichia coli, that are involved in the non-oxidative decarboxylation and detoxification of phenolic derivatives under both aerobic and anaerobic conditions. These proteins contribute to the breakdown of phenolic acids, helping bacteria manage phenolic compound toxicity, which is critical for survival in diverse environments. Although they are thought to operate as part of a coordinated response, the precise biochemical pathways and mechanisms remain unclear. In particular, it is not yet known whether VdcD forms a hetero-complex with VdcB and VdcC, as the term "subunit" currently refers to the operon structure, and there is no direct experimental evidence supporting the existence of such a protein complex.
