identifier: Pfam:PF29193
label: TP0910 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of TP0910 family proteins found exclusively in Treponema species (Spirochaetota). The proteins contain an N-terminal S1-like domain ( ) followed by this C-terminal domain. The function of this protein family and the specific role of this C-terminal domain remain to be determined.
