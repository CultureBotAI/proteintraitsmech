identifier: Pfam:PF21886
label: BRF2-like, C-terminal cyclin repeat
definition: >-
  This domain is found in human Transcription factor IIIB 50 kDa subunit (BRF2) and similar sequences mainly found in eukaryotes. BRF2 is a general activator of RNA polymerase III transcription. This protein consists of an N-terminal zinc ribbon ( ), a core domain consisting of two cyclin fold imperfect repeats and a C-terminal domain. This entry represents the second or C-terminal cyclin repeat. This domain is also found in Plant-specific TFIIB-related protein PTF2 which is a plant-specific TFIIB-related protein that plays important roles in pollen germination and embryogenesis, possibly by regulating gene expression through interaction with TBP2 and the subunits of RNA polymerases.
