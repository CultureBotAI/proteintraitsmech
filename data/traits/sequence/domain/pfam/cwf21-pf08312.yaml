identifier: Pfam:PF08312
label: cwf21 domain
definition: >-
  The cwf21 domain is found in proteins involved in mRNA splicing. Proteins containing this domain have been isolated as a subcomplex of the splicosome in Schizosaccharomyces pombe (Fission yeast). In yeast, this domain binds the protein Prp8p, a large and highly conserved U5 snRNP protein which has been proposed as a protein cofactor at the spliceosomal catalytic centre. The cwf21 domain is found in, amongst others, the small Cwc21p protein in yeast as well as in the much larger human ortholog SRm300 (serine/arginine repetitive matrix protein).
