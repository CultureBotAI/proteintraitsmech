identifier: Pfam:PF11494
label: Ta0938
definition: >-
  Ta0938 is a protein of unknown function however the structure has been determined . The protein has a novel fold and a putative Zn-binding motif. The structure has two different parts, one region contains a β sheet flanked by two α helices and the other contains a bundle of loops which contain all cysteines in the protein.
