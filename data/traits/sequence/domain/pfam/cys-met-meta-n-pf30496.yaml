identifier: Pfam:PF30496
label: Fungal trans-sulfuration enzyme, N-terminal domain
definition: >-
  This entry represents a domain found in cystathionine gamma-synthases, Alanine racemase ungC, Homocysteine/cysteine synthase and related proteins from fungi. It precedes the pyridoxal phosphate-dependent catalytic domain ( ) in cystathionine gamma-synthase (EC 2.5.1.48) and O-acetylhomoserine sulfhydrylase (EC 2.5.1.49). In Saccharomyces cerevisiae, STR2 (MET7) is a cystathionine gamma- synthase that catalyses the formation of L-cystathionine from O-succinyl-L-homoserine and L-cysteine. The paralogue HSU1 (YLL058W) was recently characterised as a homocysteine synthase that enables yeast cells to utilise inorganic sulfur for methionine biosynthesis during sulfur-limited conditions. The specific function of this domain remains to be determined.
