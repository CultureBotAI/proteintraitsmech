identifier: Pfam:PF00143
label: Interferon alpha/beta domain
definition: >-
  This entry represents the Type I interferons belonging to the larger helical cytokine superfamily, which includes growth hormones, interleukins, several colony-stimulating factors and several other regulatory molecules. Proteins in this entry are different from the interferon gamma family. The sequence differences may possibly cause different responses to various inducers, or result in the recognition of different target cell types. All function as regulators of cellular activty by interacting with cell-surface receptors and activating various signalling pathways. Interferons produce antiviral and antiproliferative responses in cells. Receptor specificity determines function of the various members of the family. The main conserved structural feature of interferons is a disulphide bond that, except in mouse beta interferon, occurs in all alpha, beta and omega sequences. Type I IFNs are widespread in vertebrates from fish to mammals and include the IFN-alpha family of subtypes, a single IFN-beta and several poorly defined single gene products (IFN-epsilon, IFN-tau, IFN-kappa, IFN-omega, IFN-delta and IFN-zeta. Type I IFNs have diverse effects on innate and adaptive immune cells during infection with viruses, bacteria, parasites and fungi, directly and/or indirectly through the induction of other mediators. Type I IFNs are important for host defence against viruses. Interferons are proteins which produce antiviral and antiproliferative responses in cells. The interferons (IFNs) are a subset of class II α-helical cytokines that have a variety of functions, most notably conferring a viral-resistant state to receptive cells. They play a major role in orchestrating the innate immune response toward viruses in vertebrates, and their defining characteristic is their ability to…
