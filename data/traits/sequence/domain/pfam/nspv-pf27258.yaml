identifier: Pfam:PF27258
label: Type II restriction enzyme NspV
definition: >-
  This entry represents Type II restriction enzyme NspV from Nostoc sp. and similar bacterial sequences. NspV is a 220 amino acid P subtype restriction enzyme that recognises the double-stranded sequence 5'-TTCGAA-3' and cleaves after T-2. The enzyme catalyses endonucleolytic cleavage of DNA to produce specific double-stranded fragments with terminal 5'-phosphates. NspV is part of a restriction- modification system found in Nostoc sp. strain PCC 7524.
