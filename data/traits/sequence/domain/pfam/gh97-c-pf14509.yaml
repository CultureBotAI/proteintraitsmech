identifier: Pfam:PF14509
label: Glycosyl-hydrolase 97 C-terminal, oligomerisation
definition: >-
  Proteins containing this domain include the aglycoside hydrolase family 97 enzyme, SusB protein, from Bacteroides thetaiotaomicron. SusB has three domains: the N-terminal, catalytic, and C-terminal domains. This entry represents the C-terminal domain that is found to be necessary for oligomerisation of the whole molecule in order to create the active-site pocket and the Ca++-binding site.
