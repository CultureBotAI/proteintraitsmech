identifier: Pfam:PF29774
label: Uncharacterised protein BB_0097
definition: >-
  This entry represents BB_0097, a 128 amino acid uncharacterised protein from Borreliella burgdorferi. Expression of bb0097 is regulated by the BosR transcriptional regulator. The protein is found in proteins across diverse Spirochaetes. The function of this protein remains to be determined.
