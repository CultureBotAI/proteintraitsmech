identifier: Pfam:PF14757
label: Immunogenic region of nsp2 protein of arterivirus polyprotein
definition: >-
  This domain is in a non-essential part of the nsp2 (non-structural protein) subunit section of the arterivirus polyprotein. This domain carries seven small sequence-regions that are predicted to be potential B-cell epitopes.
