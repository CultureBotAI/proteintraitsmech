identifier: Pfam:PF30061
label: Defensin-like protein 293
definition: >-
  This entry represents defensin-like protein 293 (DEF293), a member of the DEFL family found in Arabidopsis and simialr plant sequences. DEF293 is a secreted antimicrobial peptide involved in plant defence responses, particularly against fungal pathogens. The protein contains disulphide bonds that are essential for its structure and activity. DEF293 lacks one of the four disulphide bonds that are typically conserved in the family. More than 300 defensin-like genes are present in the Arabidopsis genome.
