identifier: Pfam:PF12038
label: tRNA-queuosine alpha-mannosyltransferase N-terminal
definition: >-
  This domain is found in tRNA-queuosine alpha-mannosyltransferase (QTMAN, also known as Glycosyltransferase-like domain-containing protein 1 GTDC1) from animals and in uncharacterised bacterial sequences. QTMAN is a glycosyltransferase that specifically catalyses mannosylation of cytoplasmic tRNA(Asp) modified with queuosine at position 34 (queuosine(34)) to form mannosyl-queuosine(34). Mannosylation of queuosine(34) in tRNA(Asp) is required to slow-down elongation at cognate codons, GAC and GAU, thereby regulating protein translation. This is the N-terminal domain of QTMAN which is about 170 amino acids in length and adopts a Rossmann-fold; these proteins have a glycosyl transferase domain , at the C-terminal. Two conserved sequence motifs are found within this entry: HENQ and FNS. There is also a single completely conserved residue S that may be functionally important.
