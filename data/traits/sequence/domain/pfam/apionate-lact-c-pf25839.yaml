identifier: Pfam:PF25839
label: D-apionate lactonase, C-terminal immunoglobulin-like domain
definition: >-
  This entry represents the C-terminal immunoglobulin-like domain of ApnL. This domain likely plays a role in protein stability, substrate recognition, or protein-protein interactions. The immunoglobulin-like fold is found in many different proteins with diverse functions. This entry lacks the first strand of the Ig-fold which is contributed by the sequence between the first and second domains of these proteins. D-apionate lactonase (ApnL) hydrolyses D-apionolactone to D-apionate. The protein is involved in D-apiose catabolism pathways in bacteria. D-apiose is a branched pentose found in the cell walls of higher plants.
