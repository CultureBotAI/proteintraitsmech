identifier: Pfam:PF30270
label: Lysozyme A
definition: >-
  This entry represents the lysozyme A-D and similar sequences found in social amoebae (Dictyostelia). These proteins are secreted lysozymes that localise to cytoplasmic vesicles and have antibacterial activity against Gram-positive bacteria including Bacillus subtilis, Bacillus megaterium and Micrococcus luteus. They catalyse hydrolysis of 1,4-beta-linkages between N-acetylmuramic acid and N-acetyl-D-glucosamine residues in peptidoglycan. The proteins are synthesised as precursors with signal peptides and contain multiple disulfide bonds.
