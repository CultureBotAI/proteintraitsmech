identifier: Pfam:PF23524
label: MGAT4 C-terminal domain
definition: >-
  This domain is found C-terminal in Alpha-1,3-mannosyl-glycoprotein 4-beta-N-acetylglucosaminyltransferase A/B/C (MGAT4A/B/C) and related proteins. MGAT4A catalyses the transfer of GlcNAc from UDP-GlcNAc to the GlcNAcbeta1-2Manalpha1-3 arm of the core structure of N-linked glycans. This domain selectively interacts with the product N-glycans having a beta1-4 GlcNAc branch. Mutation of the residue critical for the sugar recognition impairs the enzymatic activity, suggesting that the lectin domain is a regulatory subunit for efficient catalytic reaction. This domain adopts a β-sandwich fold typical for galactose binding domains.
