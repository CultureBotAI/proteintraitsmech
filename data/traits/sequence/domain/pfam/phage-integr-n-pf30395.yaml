identifier: Pfam:PF30395
label: Phage integrase N-terminal domain
definition: >-
  This entry represents the N-terminal domain of approximately 50 residues found in lambdoid phage integrases and related prophage integrases. In the full-length protein, this domain precedes the core-binding (CB) domain and the catalytic Phage_integrase domain ( ). Integrases catalyse site-specific recombination for integration of phage DNA into the host chromosome and, together with excisionase, for excision of prophage DNA. The domain is found in lambdoid phages of the order Caudoviricetes and in prophage regions within Proteobacteria. This domain is distantly related to . The specific function of this N-terminal domain remains to be determined.
