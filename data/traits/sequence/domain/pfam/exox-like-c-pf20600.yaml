identifier: Pfam:PF20600
label: Exodeoxyribonuclease X-like C-terminal
definition: >-
  This entry represents a short domain found at the C-terminal of Exodeoxyribonuclease 10 (ExoX) from Escherichia coli (strain K12) whose function is unknown. This domain is found in bacteria and some uncharacterised sequences from eukaryotes. There is a conserved FGKY/H sequence motif.
