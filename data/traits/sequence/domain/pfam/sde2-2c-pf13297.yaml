identifier: Pfam:PF13297
label: Replication stress response SDE2 C-terminal
definition: >-
  This is the SAP domain found at the C-terminal of SDE2 and in the middle region of splicing factor 3A subunit 3 (SF3A, also known as noisette). SDE2 is both an RNA-binding protein and also a trans-acting adaptor protein that functions to regulate RNA splicing and ribosome biogenesis. SF3A is involved in pre-mRNA splicing as a component of pre-catalytic spliceosome 'B' complexes.
