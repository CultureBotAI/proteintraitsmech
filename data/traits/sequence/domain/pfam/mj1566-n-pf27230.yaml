identifier: Pfam:PF27230
label: MJ1566 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of MJ1566, an uncharacterised protein from Methanocaldococcus jannaschii. MJ1566 is a 447 amino acid multi-pass membrane protein (gene MJ1566) with two predicted transmembrane helices at the C terminus. This domain encompasses the soluble N-terminal region of the protein, excluding the transmembrane helices. This domain is also found in uncharacterised sequences from egg fungi. Its function remains to be determined.
