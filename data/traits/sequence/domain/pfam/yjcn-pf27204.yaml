identifier: Pfam:PF27204
label: YjcN family
definition: >-
  This entry represents YjcN, an uncharacterised protein from Bacillus subtilis. YjcN is a 106 amino acid protein (gene BSU11920) that contains an N-terminal signal peptide and is predicted to be secreted. The mature protein is 75 amino acids in length. The protein is found in Gram-positive bacteria and is conserved in the Bacillus genus. The function of this protein family remains to be determined.
