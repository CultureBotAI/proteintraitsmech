identifier: Pfam:PF22912
label: Zinc finger domain of DNA polymerase-epsilon
definition: >-
  This zinc finger domain is found in the epsilon subunit of eukaryotic DNA polymerase which is involved in DNA synthesis during DNA repair. This domain is also found in DNA polymerase II large subunit DP2 from archaea, which is the large subunit of a two-subunit archaebacterial replicative DNA polymerase.
