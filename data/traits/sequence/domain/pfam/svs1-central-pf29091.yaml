identifier: Pfam:PF29091
label: SVS1 central domain
definition: >-
  This entry represents the family of the SVS1 proteins found in fungi. SVS1 is a serine- and threonine-rich protein required for vanadate resistance in yeast. The full-length SVS1 protein is a glycoprotein that localises to the fungal cell wall and cell periphery. This entry includes the related cell wall protein SRL1.
