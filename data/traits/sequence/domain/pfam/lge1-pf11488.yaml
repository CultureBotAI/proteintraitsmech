identifier: Pfam:PF11488
label: Transcriptional regulatory protein LGE1
definition: >-
  This domain, comprising a single α-helix, is found in the Transcriptional regulatory protein Lge1 from S. cerevisiae and related proteins including the S. pombe homologue Shf1. It is involved in Bre1 binding. In yeast, the Lge1 protein facilitates co-transcriptional H2B ubiquitination. Multiple roles were attributed to Lge1. In S. cerevisiae, Rad6 and Bre1 are present in a complex, also containing Lge1. Bre1 is the H2B ubiquitin ligase that interacts with acidic activators, such as Gal4, and recruits Rad6 and its binding partner Lge1 to target promoters. Recent reports invoke a role for Lge1 in liquid-liquid phase separation and formation of a structure that concentrates Bre1 in a shell that surrounds a Lge1 scaffolding core and allows the recruitment of Rad6 and nucleosomes. There is no Lge1 homologue in humans but the WAC protein is thought to be its functional analogue.
