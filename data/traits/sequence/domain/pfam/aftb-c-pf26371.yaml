identifier: Pfam:PF26371
label: AftB family C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Terminal beta-(1->2)-arabinofuranosyltransferase from Mycobacterium tuberculosis (AftB) and similar proteins mainly found in actinomycetes. AftB is involved in the biosynthesis of the arabinogalactan (AG) region of the mycolylarabinogalactan-peptidoglycan (mAGP) complex, a crucial component of the cell wall in certain bacteria. It catalyses the transfer of arabinofuranosyl (Araf) residues from the sugar donor decaprenyl-phospho-arabinose (DPA) to the arabinan domain. This process results in the formation of terminal beta-(1->2)-linked Araf residues, which signifies the completion of AG arabinan biosynthesis prior to the addition of mycolic acids.
