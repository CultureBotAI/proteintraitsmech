identifier: Pfam:PF28881
label: Stabilizer of axonemal microtubules 3
definition: >-
  This entry represents the stabilizer of axonemal microtubules 3 (SAXO3), a 334 amino acid protein found across metazoan species, with particular conservation in mammals. SAXO3 contains multiple disordered regions and compositionally biased segments, including polar residue and proline-rich regions. The protein is expressed in the pancreas and numerous other tissues. As a member of the axonemal microtubule stabiliser family, SAXO3 plays a role in maintaining the stability and integrity of axonemal microtubules, core components of the cytoskeleton found within the axonemes of cilia and flagella. These microtubules provide structural support and are essential for the beating movements of cilia and flagella, and their disruption can lead to ciliary disorders known as ciliopathies, which can affect multiple organ systems. The specific mechanism by which SAXO3 stabilises axonemal microtubules remains to be determined.
