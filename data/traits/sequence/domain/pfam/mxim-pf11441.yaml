identifier: Pfam:PF11441
label: Pilot protein MxiM
definition: >-
  MxiM, a Shigella pilot protein (also known as type 3 secretion system pilotin), is essential for the assembly and membrane association of the Shigella secretin MxiD. MxiM contains an orthologous secretin component and has a specific binding domain for the acyl chains of bacterial lipids. The C-terminal domain of MxiD hinders lipid binding to MxiM.
