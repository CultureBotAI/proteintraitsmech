identifier: Pfam:PF25611
label: KCTD C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in KCTD7 and KCTD14. The domain has a consistent structural motif with three antiparallel β-sheets packing against one α-helix. This domain adopts different interfaces in different KCTD subfamily members, resulting in distinct substrate binding mechanisms. The domain forms part of a pentameric assembly in native KCTD proteins. This domain is associated with . KCTD7 is a BTB/POZ domain-containing protein that has an impact on K+ fluxes, neurotransmitter synthesis, and neuronal function. It functions as a regulator of potassium conductance in neurones and is involved in the control of excitability of cortical neurones. KCTD7 may be involved in the control of the excitability of cortical neurones. Mutations in KCTD7 may cause progressive myoclonus epilepsy (PME).
