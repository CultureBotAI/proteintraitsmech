identifier: Pfam:PF23990
label: PilB3-like, N-terminal
definition: >-
  This domain is found at the N-terminal of PilB3 from Haloferax volcanii and similar archaeal proteins. This domain is found associated with and . PilB3 is involved in the biosynthesis and assembly of type IV pili, which are filamentous protein structures on the cell surface that play various roles in cellular processes. PilB3 works in conjunction with PilC3 as part of the PilB3-C3 system in Haloferax volcanii.
