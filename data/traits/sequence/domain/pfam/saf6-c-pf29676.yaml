identifier: Pfam:PF29676
label: SAGA factor-like TAF6 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of SAGA factor-like TAF6 (Saf6) from Drosophila melanogaster and related sequences from flies, which is a component of the transcription regulatory SAGA complex. The specific function of this C-terminal domain remains to be determined. Saf6 activates transcription by remodelling chromatin and mediating histone acetylation and deubiquitination. Saf6 is involved in SAGA complex coactivator function and is required for oogenesis and transcriptional activation. The protein localises to the nucleus and associates with chromosomes near transcriptional start sites.
