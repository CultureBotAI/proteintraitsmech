identifier: Pfam:PF03459
label: TOBE domain
definition: >-
  The TOBE domain (Transport-associated OB) always occurs as a dimer as the C-terminal strand of each domain is supplied by the partner. It is probably involved in the recognition of small ligands such as molybdenum ( , ) and sulphate ( ), and is found in ABC transporters immediately after the ATPase domain.
