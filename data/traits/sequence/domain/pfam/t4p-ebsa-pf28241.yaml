identifier: Pfam:PF28241
label: Type IV pilus, essential for biofilm suppression A-like
definition: >-
  This entry represents a family of proteins from cyanobacteria, including EbsA (essential for biofilm self-suppression A) from Synechococcus elongatus ( ), a protein that plays a role in both type IV pilus formation and protein secretion across the outer membrane, two processes that rely on the same set of genes.
