identifier: Pfam:PF06943
label: LSD1 zinc finger
definition: >-
  This model describes a zinc finger domain found in three closely spaced copies in Arabidopsis protein LSD1 and in two copies in other proteins from the same species. The domain contains a conserved motif that resembles CxxCRxxLMYxxGASxVxCxxC. This domain was anticipated to play a role in the regulation of transcription, via either repression of a prodeath pathway or activation of an antideath pathway, in response to signals emanating from cells undergoing pathogen-induced hypersensitive cell death. LSD1 protein that is a negative regulator of PCD, playing a molecular function of transcriptional regulator and scaffold protein. LSD1 acts as a negative switch for two positive cell death regulators, ENHANCED DISEASE SUSCEPTIBILITY 1 (EDS1) and PHYTOALEXIN DEFICIENT 4 (PAD4). LSD1 was also found to control the salicylic acid accumulation that is essential in triggering cell death in response to abiotic stress. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino acid sequence of the finger domains and of the linker between fingers, as well as on the higher-order structures and the number of fingers. Znf domains are often found in clusters, where fingers can have different binding specificities. There are many superfam…
