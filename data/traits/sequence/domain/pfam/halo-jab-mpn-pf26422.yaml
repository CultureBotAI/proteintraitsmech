identifier: Pfam:PF26422
label: Halobacterial JAB/MPN domain protein
definition: >-
  This entry represents a family of uncharacterised proteins from halobacteria that contain a JAB/MPN-like domain. Proteins in this group range from 130 to 160 amino acids in length. JAB/MPN domains are related to enzymes involved in deubiquitination.
