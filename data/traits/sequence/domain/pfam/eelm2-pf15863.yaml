identifier: Pfam:PF15863
label: Extended EGL-27 and MTA1 homology domain
definition: >-
  EELM2, the extended EGL-27 and MTA1 homology domain, is found in proteins from apicomplexan parasites. It shares partial homology with the ELM2 domain , but has longer conserved boundaries, hence the term 'extended'. Some EELM2-containing proteins also carry a PHD finger domain , which is implicated in chromatin remodelling, suggesting a similar role for EELM2.
