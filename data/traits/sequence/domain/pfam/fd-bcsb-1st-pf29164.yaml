identifier: Pfam:PF29164
label: Cellulose synthase BcsB, first FD domain
definition: >-
  This entry represents the first flavodoxin-like domain (FD) of BcsB, a protein involved in cellulose synthesis. This protein consists of four domains arranged in a triangular shape; there is a structural repeat unit formed by a CBM domain connected to an α/β domain referred to as flavodoxin-like domain (FD) and forms two pairs.
