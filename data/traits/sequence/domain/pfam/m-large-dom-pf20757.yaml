identifier: Pfam:PF20757
label: Protein M, large region
definition: >-
  This domain is found in proteins from Mycoplasmatota, including Uncharacterized protein MG281 from Mycoplasma genitalium, also known as protein M. This virulence protein consists of two domains. The larger one, represented in this entry, binds the IgG light chain to block the binding of antibody to antigen. It includes a leucine-rich repeat (LRR)-like subdomain, which faces away from the antibody molecule.
