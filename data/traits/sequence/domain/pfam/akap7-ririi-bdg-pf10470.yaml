identifier: Pfam:PF10470
label: PKA-RI-RII subunit binding domain of A-kinase anchor protein
definition: >-
  This entry represents the RI-RII subunit-binding domain found at the C-terminal of the cyclic AMP-dependent protein kinase A (PKA) anchor protein, AKAP7 (also known as AKAP18). This protein anchors PKA, for its role in regulating PKA-mediated gene transcription in both somatic cells and oocytes, by binding to its regulatory subunits, RI and RII, hence being known as a dual-specific AKAP. The 25 crucial amino acids of RII-binding domains in general form structurally conserved amphipathic helices with unrelated sequences; hydrophobic amino acid residues form the backbone of the interaction and hydrogen bond- and salt-bridge-forming amino acid residues increase the affinity of the interaction. AKAP7 contains a nuclear localisation signal (NLS) at the N terminus, a conserved central domain member of the 2H phosphoesterase family in addition to the RI-RII subunit-binding domain.
