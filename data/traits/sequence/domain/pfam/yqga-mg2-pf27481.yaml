identifier: Pfam:PF27481
label: YqgA MG2 macroglobulin domain
definition: >-
  This entry represents the YqgA, a cell wall-binding protein from Bacillus subtilis. This protein adopts a MG2 macroglobulin domain-like domain with a β-sandwich structure consisting of one three-stranded and one four-stranded antiparallel β-sheet stacked in an approximately parallel sandwich arrangement. YqgA binds to the cell wall. This family is present in pathogenically invasive bacteria and species that colonise higher eukaryotes. The specific function of this domain in YqgA remains to be determined. This entry also includes some viral sequences.
