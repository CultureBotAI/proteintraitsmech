identifier: Pfam:PF00606
label: Herpesvirus Glycoprotein B ectodomain
definition: >-
  This domain corresponds to the C-terminal region of the glycoprotein B ectodomain. gB ectodomain has an elongated rod-like molecule, composed of five domains that contain both β-sheet and α-helical secondary structures. Domains 1 and 2 have a fold that resembles that of a plekstrin-homology (PH) domains. Domains 3, 4 and 5 (represented by this entry) have a more complex structure. Glycoprotein B is an envelope glycoprotein that plays a role in host cell entry, cell to-cell virus transmission, and fusion of infected cells.
