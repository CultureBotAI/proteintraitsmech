identifier: Pfam:PF22394
label: AfAlkA-like, TATA-box binding protein-like domain
definition: >-
  This entry represents a TATA-box binding protein (TBP)-like domain present at the N-terminal end of AlkA from Archaeoglobus fulgidus ( ). AlkA is a glycosylase involved in base excision repair, capable of repairing mutagenic lesions such as N1-methyladenine (m1A) and N3-methylcytosine (m3C) found in DNA.
