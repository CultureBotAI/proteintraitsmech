identifier: Pfam:PF26348
label: ScoMcrA-like, SRA domain
definition: >-
  This entry represents the SRA domain found in the endonuclease ScoMcrA and related type IV restriction enzymes. This domain has a detectable similarity to known PUA domains. The ScoMcrA SRA domain mediates dimerisation and does not engage in interactions with the phosphorothioated DNA.
