identifier: Pfam:PF27124
label: Photosynthetic complex reorganisation protein PuhC
definition: >-
  PuhC regularly is found encoded near PuhA, which encodes a component of the photosynthetic reaction centre, among other genes associated with photosynthesis. Members of this entry are predominantly found in alpha- and betaproteobacteria.
