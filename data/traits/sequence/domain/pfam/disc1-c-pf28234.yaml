identifier: Pfam:PF28234
label: DISC1 C-terminal domain
definition: >-
  This entry represents the C-terminal coiled coil/zipper domain of DISC1 (Disrupted in schizophrenia 1 protein). This domain contains a small helical region that is essential for protein-protein interactions. The domain is required for interaction with NDEL1 and PAFAH1B1 proteins. DISC1 is involved in neurogenesis and microtubule network formation, and is localised to centrosomes, cytoplasm and mitochondria. Mutations disrupting this C-terminal region are associated with schizophrenia and related psychiatric disorders. The specific function of this helical domain remains to be determined.
