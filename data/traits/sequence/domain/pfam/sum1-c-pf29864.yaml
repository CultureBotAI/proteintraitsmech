identifier: Pfam:PF29864
label: SUM1 C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in SUM1 and related proteins from fungi. SUM1 is a DNA-binding protein that specifically binds the regulatory region of middle sporulation genes and is required for their repression during vegetative growth. The protein localises to the nucleus and represses gene expression via recruitment of histone deacetylase HST1. SUM1 interacts with RFM1 to recruit HST1 and is subject to multiple phosphorylation events. The protein is present at low levels in cells and functions in transcriptional regulation and chromosome stability. The function of this C-terminal domain remains to be determined.
