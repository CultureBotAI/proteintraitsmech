identifier: Pfam:PF21509
label: Fungal polycomb repressive complex 2, Ezh2-like, preSET CXC domain
definition: >-
  This domain is found in a group of fungal proteins, including the Histone-lysine N-methyltransferase EZH2 from Chaetomium thermophilum ( ), which is the catalytic subunit of the of the Polycomb Repressive Complex 2 (PRC2), responsible for methylation of histone H3 lysine 27 (H3K27) and therefore involved in epigenetic gene silencing. This entry represents the domain found N-terminal to the SET domain ( ). It contains a Zn3Cys8His and a Zn3Cys9 cluster.
