identifier: Pfam:PF16831
label: CS6 fimbrial subunits A and B, Coli surface antigen 6
definition: >-
  This is a family of CS6 pilins from E.coli, including both subunits A (CssA) and B (CssB). They act as colonisation factors for the enterotoxigenic species of E.coli to mediate bacterial attachment to the small intestinal epithelium. Both subunits in the fibre bind to receptors on epithelial cells. CssB, but not CssA, specifically recognises the extracellular matrix protein fibronectin.
