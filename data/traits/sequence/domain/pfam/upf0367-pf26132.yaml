identifier: Pfam:PF26132
label: UPF0367 protein family
definition: >-
  This entry represents an uncharacterised family of proteins called UPF0367. The structure of these proteins is reminiscent of PH domains and like bacterial PH domains are predicted to form large homomeric ring complexes. In the case of this family they seem to form homoheptamers.
