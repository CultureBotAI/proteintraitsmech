identifier: Pfam:PF18134
label: Adenylyl/Guanylyl and SMODS C-terminal sensor domain
definition: >-
  This entry represents a sensor domain found in cytidylate cyclase (PycC, clade E) and cyclic GMP-AMP synthase (CdnB) from E.coli, which are involved in immunity against bacteriophage. PycC and CdnB are part of the Pycsar (pyrimidine cyclase system for antiphage resistance) and CBASS system respectively, which are closely related; both of these proteins synthesize cyclic nucleotides in response to infection which serve as specific second messenger signals that activate the adjacent effectors. This domain (AGS-C) adopts a Ig-like fold and it has been suggested to mediate phage detection.
