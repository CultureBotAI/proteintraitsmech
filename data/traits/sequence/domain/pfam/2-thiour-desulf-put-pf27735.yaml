identifier: Pfam:PF27735
label: Putative 2-thiouracil desulfurase
definition: >-
  Members of this family of prokaryotic proteins typically show weak sequence similarity to , the 2-thiouracil desulfurase (TudS) family. Proteins in this group frequently co-occur with the selenide, water dikinase SelD and with the [Fe8-S9] double-cubane cluster family , plus frequent occurrence in a tandem gene pair with the putative ECF transporter S component proteins of. These observations suggest both a role in the import and utilisation of some organic compound for anaerobic fermentation and a connection to anaerobic sulfur and/or selenium metabolism.
