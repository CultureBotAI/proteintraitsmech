identifier: Pfam:PF13696
label: Zinc knuckle
definition: >-
  This is a zinc-binding domain of the form CxxCxxxGHxxxxC from a variety of different species. It is found in the MPE1 protein from Saccharomyces cerevisiae which is a component of the cleavage and polyadenylation factor (CPF) complex important for polyadenylation-dependent pre-mRNA 3'-end formation.
