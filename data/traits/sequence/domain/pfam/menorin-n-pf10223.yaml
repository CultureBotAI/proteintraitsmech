identifier: Pfam:PF10223
label: Menorin N-terminal domain
definition: >-
  This entry represents a domain found at the N-terminal end of Menorin from C. elegans and covering the whole length of the protein, sometimes in tandem, in its mammal homologues FAM151A and FAM151B. Menorin is involved in generation of neurons and regulation of dendrite extension. Proteins FAM151A and FAM151B are mammalian homologues of C. elegans menorin, which is involved in generation of neurons and regulation of dendrite extension. FAM151B has been shown to be essential for retinal function. Sequence analysis and the fact that these proteins have a TIM-barrel fold similar to that in phospholipase D and glycerophosphodiester phosphodiesterase (GDPD) families, indicate that they belong to PLC-like phosphodiesterase superfamily, although their substrates and function remain unknown.
