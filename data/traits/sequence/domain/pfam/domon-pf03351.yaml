identifier: Pfam:PF03351
label: DOMON domain
definition: >-
  The DOMON domain is an 110-125 residue long domain which has been identified in the physiologically important enzyme dopamine beta-monooxygenase and in several other secreted and transmembrane proteins from both plants and animals. It has been named after DOpamine beta-MOnooxygenase N-terminal domain. The DOMON domain can be found in one to four copies and in association with other domains, such as the Cu-ascorbate dependent monooxygenase domain, the epidermal growth factor domain, the trypsin inhibitor-like domain (TIL), the SEA domain and the Reelin domain. The DOMON domain may be involved in heme and sugar recognition. The sequence conservation is predominantly centred around patches of hydrophobic residues. The secondary structure prediction of the DOMON domain points to an all-β-strand fold with seven or eight core strands supported by a buried core of conserved hydrophobic residues. There is a chraracteristic motif with two small positions (Gly or Ser) corresponding to a conserved turn immediately C-terminal to strand three. It has been proposed that the DOMON domain might form a β-sandwich structure, with the strands distributed into two β-sheets as is seen in many extracellular adhesion domains such as the immunoglobulin, fibronectin type III, cadherin and PKD domains.
