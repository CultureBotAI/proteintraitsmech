identifier: Pfam:PF04319
label: NifZ domain
definition: >-
  NifZ is a short protein is found in the nif (nitrogen fixation) operon. It is required for the maturation of the nitrogenase MoFe protein. In the absence of NifZ, only one of the two P-clusters of the MoFe protein is matured to the ultimate [8Fe-7S] structure. The other P-cluster site in the protein contains a [4Fe-4S] cluster pair, suggesting that NifZ is specifically required for the formation of the second P-cluster.
