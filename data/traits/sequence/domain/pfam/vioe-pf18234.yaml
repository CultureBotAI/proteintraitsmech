identifier: Pfam:PF18234
label: Violacein biosynthetic enzyme VioE
definition: >-
  This domain can be found in VioE from Chromobacterium violaceum. VioE plays a key role in the biosynthesis of violacein. Violacein has potential medical applications as an antibacterial, anti-tryptanocidal, anti-ulcerogenic and as an anti-cancer drug. VioE forms a homodimer with a chiefly hydrophobic interface between the two VioE monomers. The fact that VioE adopts a fold normally associated with lipoprotein carrier proteins may be due to VioE for binding the hydrophobic polyethylene glycol.
