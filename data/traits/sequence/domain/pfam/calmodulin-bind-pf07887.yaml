identifier: Pfam:PF07887
label: Calmodulin binding protein-like N-terminal domain
definition: >-
  This entry represents the N-terminal β-sandwich domain of Calmodulin-binding proteins A/B/C/D/E/F/G. Members of this family include putative or actual calmodulin binding proteins and other transcription factors expressed by various plant species. Some members (for example, ), are known to be involved in the induction of plant defence responses. However, their precise function in this regards is as yet unknown.
