identifier: Pfam:PF04077
label: DsrH like protein
definition: >-
  The three proteins TusB, TusC, and TusD form a heterohexamer responsible for a sulphur relay reaction. In large numbers of proteobacterial species, this complex acts on a Cys-derived persulphide moiety, delivered by the cysteine desulphurase IscS to TusA, then to TusBCD. The activated sulphur group is then transferred to TusE (DsrC), then by MnmA (TrmU) for modification of an anticodon nucleotide in tRNAs for Glu, Lys, and Gln. The sulphur relay complex TusBCD is also found, under the designation DsrEFH, in phototrophic and chemotrophic sulphur bacteria, such as Chromatium vinosum and Allochromatium vinosum. In these organisms, it seems the primary purpose is related to sulphur flux, such as oxidation from sulphide to molecular sulphur to sulphate.
