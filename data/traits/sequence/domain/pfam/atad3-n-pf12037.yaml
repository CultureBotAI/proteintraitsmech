identifier: Pfam:PF12037
label: ATPase family AAA domain-containing protein 3, N-terminal
definition: >-
  This is the conserved N-terminal domain of ATPase family AAA domain-containing protein 3 (ATAD3) which is involved in dimerisation and interacts with the inner surface of the outer mitochondrial membrane. This domain is found associated with the AAA ATPase domain . ATAD3 is essential for mitochondrial network organisation, mitochondrial metabolism and cell growth at organism and cellular level. It may also play an important role in mitochondrial protein synthesis.
