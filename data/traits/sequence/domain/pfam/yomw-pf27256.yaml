identifier: Pfam:PF27256
label: YomW
definition: >-
  This entry represents YomW proteins found in tailed bacteriophages and prophages mainly found in bacteria. YomW is an SPbeta prophage-derived protein of 168 amino acids. The protein is encoded by the yomW gene (locus tag BSU21200) in Bacillus subtilis strain 168. The function of this protein remains to be determined.
