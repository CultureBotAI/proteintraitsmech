identifier: Pfam:PF28139
label: EvC complex member EVC N-terminal domain
definition: >-
  This entry represents the N-terminal domain of EvC complex member EVC and similar animal proteins. The specific function of this domain remains to be determined. EVC is a single-pass membrane protein that forms part of the EvC complex composed of EFCAB7, IQCE, EVC2 and EVC. The complex localises at the base of primary cilia and positively regulates ciliary Hedgehog signalling. EVC is involved in endochondral growth and skeletal development. Mutations in EVC cause Ellis-van Creveld syndrome, characterised by chondrodystrophy, polydactyly, ectodermal dysplasia and cardiac anomalies.
