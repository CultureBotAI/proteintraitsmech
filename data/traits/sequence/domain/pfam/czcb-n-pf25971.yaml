identifier: Pfam:PF25971
label: CzcB, N-terminal domain
definition: >-
  This domain is found N-terminal in the Cobalt-zinc-cadmium resistance protein CzcB and related proteins from proteobacteria. This domain can be found sometimes inserted in members of the Cation efflux family or in the NicO family of high-affinity nickel-transports . It is predicted to fold into a β-sandwich with an Ig-like topology. CzcB is a crucial component of the CzcCBA protein complex, which mediates heavy metal resistance in bacteria through an active cation efflux mechanism. CzcB binds to CzcA, which in turn is bound to CzcC, forming the complete CzcCBA complex.
