identifier: Pfam:PF07063
label: 2-oxoadipate dioxygenase/decarboxylase
definition: >-
  This entry represents a group of bacterial, fungal and plant sequences, including 2-oxoadipate dioxygenase/decarboxylase (referred to as HGLS and YdcJ) from Escherichia coli. YdcJ, which is involved in D-lysine metabolism, catalyses a successive decarboxylation and intramolecular hydroxylation of 2-oxoadipate forming 2-hydroxyglutarate in a Fe(II) and oxygen-dependent manner. Members of this protein family are thought to belong to the the vicinal oxygen chelate (VOC) superfamily. The structure has been solved ( , ).
