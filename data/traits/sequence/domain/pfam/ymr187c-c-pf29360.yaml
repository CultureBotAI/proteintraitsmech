identifier: Pfam:PF29360
label: YMR187C C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the uncharacterized protein YMR187C from Saccharomyces cerevisiae. YMR187C is predicted to be a multi-pass membrane protein with four transmembrane helices located in the C-terminal region. The protein is found in fungi, particularly in the Saccharomycetaceae family. The function of this protein and its C-terminal domain remains to be determined.
