identifier: Pfam:PF25850
label: Pectate disaccharide-lyase central Ig-like domain
definition: >-
  This entry represents the central immunoglobulin-like domain of pectate disaccharide-lyase from Dickeya chrysanthemi (PelX, ), also known as exopolygalacturonate lyase, and similar bacterial proteins. This domain is positioned between the N-terminal β-supersandwich domain and the C-terminal catalytic α-helix domain. While the specific function of this domain remains to be determined, the full-length enzyme is known to catalyse the exo-cleavage of pectate and contributes to pectate catabolism in bacteria. The enzyme requires calcium ions for activity and has an optimum pH of 7.5-8.0.
