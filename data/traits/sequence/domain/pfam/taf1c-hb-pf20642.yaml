identifier: Pfam:PF20642
label: TAF1C, helical bundle domain
definition: >-
  This is the helical bundle domain (HB, also referred to as the headlock domain) of TATA box-binding protein-associated factor RNA polymerase I subunit C (TAF1C) from animals, the orthologue of yeast Rrn6. TAF1C is a component of the transcription factor SL1/TIF-IB complex, which is involved in the assembly of the PIC (preinitiation complex) during RNA polymerase I-dependent transcription.
