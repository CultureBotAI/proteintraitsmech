identifier: Pfam:PF13350
label: Tyrosine phosphatase family
definition: >-
  This is a family of putative tyrosine/serine-protein phosphatases. A member of this family, IphP, is a cyanobacterial dual-specificity protein phosphatase with MAP kinase phosphatase activity. This entry also includes PtpB from Mycobacterium tuberculosis. PtpB is a phosphatase that possesses triple substrate specificity toward phosphotyrosine, phosphoserine/threonine and phosphoinositides.
