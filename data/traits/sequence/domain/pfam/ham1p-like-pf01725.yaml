identifier: Pfam:PF01725
label: Ham1 family
definition: >-
  This family contains a group of purine NTP pyrophosphatases, including dITP/XTP pyrophosphatase RdgB from E.coli and inosine triphosphate pyrophosphatase (ITPA, also known as HAM1) from Saccharomyces cerevisiae (Baker's yeast) ( ), as well as archaeal and Caenorhabditis elegans homologues. S. cerevisiae HAM1 was originally identified as a gene that protects against the mutagenic effects of the base analogue 6-N-hydroxylaminopurine (HAP) which can be a natural product of monooxygenase activity on adenine. Subsequent studies demonstrated that HAM1 detoxifies abnormal pyrimidine as well as purine nucleotides. RdgB appears to act by intercepting non-canonical deoxyribonucleotide triphosphates from replication precursor pools. Similarly, a Ham1-related protein from Methanococcus jannaschii is a novel NTPase that has been shown to hydrolyze nonstandard nucleotides such as XTP to XMP and ITP to IMP, but not the standard nucleotides, in the presence of Mg or Mn ions. The enzyme exists as a homodimer. This entry also includes Dihydroneopterin triphosphate diphosphatase which is involved in the biosynthesis of tetrahydrofolate and catalyses the hydrolysis of dihydroneopterin triphosphate to dihydroneopterin monophosphate and pyrophosphate.
