identifier: Pfam:PF19326
label: AMP deaminase
definition: >-
  AMP-deaminase (AMPD) ( ) is a large, well-conserved eukaryotic protein that catalyses the hydrolytic deamination of adenosine monophosphate (AMP) to inosine monophosphate (IMP), and so plays an important role in purine and energy metabolism. This entry also includes inactive deaminases from yeast, which lack the conserved His residues essential for binding the catalytic zinc ion and the conserved residues important for substrate binding and catalysis.
