identifier: Pfam:PF31119
label: Domain of unknown function (DUF8816)
definition: >-
  This entry represents a bacterial immunoglobulin-like domain of approximately 65 residues. This domain is found predominantly in Planctomycetota and Bacillota. These domains are typically found in large secreted or surface-associated proteins, often with multiple tandem repeats. The function of this domain remains to be determined.
