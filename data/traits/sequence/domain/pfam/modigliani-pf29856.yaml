identifier: Pfam:PF29856
label: Modigliani telomere protection protein
definition: >-
  This entry represents the modigliani protein family, found in Drosophila species. The protein is a component of the MTV complex that associates with the HipHop-HOAP complex to form the terminin telomere-capping complex. The protein functions in telomere maintenance and prevention of telomere fusion. As part of the MTV complex, modigliani binds single-stranded DNA in a sequence-independent manner, protecting it from degradation. It localises to the nucleus and specifically to telomeres. Disruption of this gene results in lethality and frequent telomeric fusions. The protein probably forms homodimers and interacts directly with verrocchio and tea proteins to form the MTV complex.
