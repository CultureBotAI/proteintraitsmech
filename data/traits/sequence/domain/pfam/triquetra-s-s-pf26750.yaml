identifier: Pfam:PF26750
label: Triquetra cystein-rich domain
definition: >-
  This domain is found in uncharacterised proteins from Choanoflagellates. It contains four pairs of highly conserved cysteine residues which are predicted to form disulfide bonds. The polypeptide chain path defines a shape with similarity to Triquetra symbol.
