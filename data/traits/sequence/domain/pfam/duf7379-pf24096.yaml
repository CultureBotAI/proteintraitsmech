identifier: Pfam:PF24096
label: Domain of unknown function (DUF7379)
definition: >-
  This entry represents a domain of unknown function found towards the N-terminal of CHAT domain-containing protein, such as SwissProt:A0A100JVW6, from Streptomyces scabiei. This domain may adopt a A/B hydrolase fold and is often found in association with TCAD7 (Pfam:PF19973) and CHAT (Pfam:PF12770) domains.
