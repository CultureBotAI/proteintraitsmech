identifier: Pfam:PF18011
label: C-terminal domain found in long catalases
definition: >-
  The most conspicuous difference between small and large catalases is the presence in large catalases of an extra C-terminal domain. This domain is found at the C terminus of a variety of large catalase enzymes. Structurally it is related to class I glutamine amidotransferase domains. The precise molecular function of this domain is uncertain.
