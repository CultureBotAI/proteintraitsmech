identifier: Pfam:PF26553
label: PD-(D/E)XK superfamily domain
definition: >-
  This entry represents a PD-(D/E)XK endonuclease domain found in MTH_967 from Methanothermobacter thermautotrophicus and similar proteins. These domains are most similar from a structural point of view to archaeal holliday junction resolvase proteins. These proteins contains an N and C-terminal PD-(D/E)XK domain that interact. Archaebacterial Putative HTH-type transcriptional regulatory proteins, including MTH_967 from Methanothermobacter thermautotrophicus contain a cro/C1-type HTH domain. The cro/C1-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 50-60 residues present in transcriptional regulators. The domain is named after the transcriptional repressors Cro and C1 of temperate bacteriophages 434 and lambda, respectively. Besides the bacteriophages, cro/C1-type regulators are present in prokaryotes and in eukaryotes.
