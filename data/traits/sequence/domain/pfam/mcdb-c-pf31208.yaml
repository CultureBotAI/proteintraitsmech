identifier: Pfam:PF31208
label: McdB, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Maintenance of carboxysome distribution protein B from Synechococcus elongatus (McdB), which together with McdA mediate carboxysome spacing, size, ultrastructure and probably inheritance in the cell. McdB, an adapter protein, may have an additional function in cell divison. It stimulates the ATPase activity of McdA, causing McdA to be released from DNA.
