identifier: Pfam:PF24600
label: RavZ catalytic domain
definition: >-
  This entry represents the N-terminal in RavZ proteins. The intracellular pathogen Legionella pneumophila interferes with autophagy by delivering an effector protein, cysteine protease RavZ, into the host cytosol. This effector protein cleaves membrane-conjugated Atg8/LC3 proteins from pre-autophagosomal structures. RavZ is a two domain protein consisting of an N-terminal catalytic domain ( ) and a C-terminal phosphatidylinositol 3-phosphate (PI3P)-binding domain ( ). RavZ targets the autophagosome via the PI3P-binding domain.
