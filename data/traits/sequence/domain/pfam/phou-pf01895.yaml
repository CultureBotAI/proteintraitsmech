identifier: Pfam:PF01895
label: PhoU domain
definition: >-
  PhoU proteins are known to play a role in the regulation of phosphate uptake. The PhoU domain is composed of a three helix bundle. The PhoU protein contains two copies of this domain. The domain binds to an iron cluster via its conserved E/DXXXD motif. Deletion of PhoU activates constitutive expression of the phosphate ABC transporter and allows phosphate transport, but causes a growth defect; suggesting that the protein has some secondary function. The crystal structure of PHOU_AQUAE reveals two similar coiled-coil PhoU domains, each forming a three-helix bundle. This entry also includes Uncharacterized protein MG409 and related proteins.
