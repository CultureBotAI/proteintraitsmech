identifier: Pfam:PF29166
label: Cellulose synthase BcsB, second FD domain
definition: >-
  This entry represents the second flavodoxin-like domain (FD) of Cellulose synthase protein B (BcsB), a regulatory protein involved in cellulose synthesis. This protein consists of four domains arranged in a triangular shape; there is a structural repeat unit formed by a CBM domain connected to an alpha/beta domain referred to as flavodoxin-like domain (FD) and forms two pairs. This domain is also found in the Cellulose synthase 1/2 which is a bifunctional protein comprised of a catalytic subunit and a regulatory subunit.
