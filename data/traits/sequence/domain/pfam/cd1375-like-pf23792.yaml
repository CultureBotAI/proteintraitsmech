identifier: Pfam:PF23792
label: CD1375-like protein
definition: >-
  This entry represents a short uncharacterised domain of about 50 residues. It is found in phage proteins from a variety of phages infecting Bacilli or Clostridia bacteria. Structural predictions suggest it adopts an α-helical fold. Its function is currently unknown.
