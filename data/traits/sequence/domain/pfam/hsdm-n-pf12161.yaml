identifier: Pfam:PF12161
label: HsdM N-terminal domain
definition: >-
  This domain is found at the N-terminal of the methylase subunit of Type I DNA methyltransferases. This domain is found in bacteria and archaea, and is typically between 123 and 138 amino acids in length. It is found in association with . Mutations in this region of EcoKI methyltransferase abolish the normally strong preference of this system for methylating hemimethylated substrate. The structure of this domain has been shown to be all α-helical.
