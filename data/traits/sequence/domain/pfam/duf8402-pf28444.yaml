identifier: Pfam:PF28444
label: Domain of unknown function (DUF8402)
definition: >-
  This domain is found C-terminal in uncharacterised bacterial proteins. It is predicted to fold into L-shaped β-sandwich. Most proteins containing this domain also contain a lipoprotein lipid attachment site at the N terminus suggesting they may be associated with the membrane.
