identifier: Pfam:PF26595
label: Alpha-helical endospore appendage domain
definition: >-
  This entry represents a group of uncharacterised proteins from firmicutes that contain the α-helical endospore appendage (A-ENA) domain. A-ENA proteins form 8 nm diameter protein nanofibers with a double helical symmetry that function as extrasporal matrix components in bacterial spore biofilms. Its structure consists of an α-helical hairpin structure comprising two α-helices connected by a short loop, with an N-terminal lock region. A-ENA subunits self-assemble through a dock-and-lock mechanism where hydrophobic interactions drive initial contact, followed by autocatalytic isopeptide bond formation. Each A-ENA subunit can form up to ten intermolecular isopeptide bonds with neighbouring subunits, creating a remarkably stable covalent polymer resistant to heat, chemical treatment, and proteolysis. A-ENA functions as a virulence factor in Bacillus thuringiensis by clustering spores and parasporal toxin bodies into infectious biofilm-like units. It correlates with the presence of insecticidal toxin genes (doi: 10.1101/2025.02.11.637640).
