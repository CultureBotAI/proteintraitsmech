identifier: Pfam:PF15539
label: CAF1 complex subunit p150, region binding to CAF1-p60 at C-term
definition: >-
  Chromatin assembly factor 1 (CAF-1) consists of three evolutionary conserved subunits, p150, p60, and p48 (yeast homologues Cac1, cac2 and cac3 respectively), and mediates the assembly of nucleosomes onto newly replicated DNA. The p150 subunit (CAF-1_p150, also known as subunit A) is the core component of the CAF-1 histone chaperone complex, which functions in depositing newly synthesised and acetylated histones H3/H4 into chromatin during DNA replication and repair, being essential for cell viability and efficient DNA replication. The p150 subunit contains the interaction regions with proliferating cell nuclear antigen (PCNA), heterochromatin protein 1 (HP1), the CAF-1 p60 subunit among others proteins. It is thought that the DNA association with two histone-bound CAF-1 complexes may promote the formation of the (H3-H4)2 tetramer on DNA. This entry represents the C-terminal domain of CAF-1 subunit p150, which includes the winged helix domain (WHD), a DNA binding domain that requires the presence of histones, and a p60 subunit binding site. It is proposed that histone binding to CAF-1 triggers the DNA-WHD interaction, promoting the juxtaposition of two CAF-1 complexes bound to H3-H4 dimer and allows the formation of the tetramer on the DNA.
