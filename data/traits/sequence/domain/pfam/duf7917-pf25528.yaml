identifier: Pfam:PF25528
label: Domain of unknown function (DUF7917)
definition: >-
  This domain is the second helical domain (3HB-2) found in EndoE. It forms specific inter-domain interactions with 3HB-1 through hydrogen bonds and provides the architectural framework necessary for cooperative substrate processing in the full-length enzyme. The 3HB-2 domain is essential for positioning the GH18 and GH20 domains optimally, enabling the unique two-step mechanism where the C-terminal GH20 domain first trims terminal GlcNAc residues from complex-type N-glycans, followed by GH18-mediated core processing. This domain architecture represents an evolutionary adaptation unique to EndoE that facilitates both immune evasion through IgG antibody deglycosylation and nutrient acquisition in E. faecalis. found in Endo-beta-N-acetylglucosaminidase and related bacterial proteins. It is predicted to adopt a three α-helical bundle topology. The EndoE-GH18L domain represents a unique multi-modular architecture from the Endoglycosidase EndoE, comprising three structurally distinct domains: a GH18 catalytic domain ( ) with (β/α)8-barrel topology that functions as an endo-β-1,4-N-acetylglucosaminidase, followed by two consecutive three α-helical bundle domains, 3HB-1 and 3HB-2 ( ). The GH18 domain specifically processes the central core of complex-type and high-mannose-type N-glycans through substrate-assisted catalysis mediated by active site residues D184 and E186, while forming extensive contacts with the first helical bundle domain through hydrophobic interactions and salt bridges.
