identifier: Pfam:PF03147
label: Ferredoxin-fold anticodon binding domain
definition: >-
  Aminoacyl-tRNA synthetases (aaRSs) play a crucial role in the translation of the genetic code by means of covalent attachment of amino acids to their cognate tRNAs. Phenylalanine-tRNA synthetase (PheRS, also known as Phenylalanine-tRNA ligase) is known to be among the most complex enzymes of the aaRS family. Bacterial and mitochondrial PheRSs share a ferredoxin-fold anticodon binding (FDX-ACB) domain, which represents a canonical double split α+β motif having no insertions. The FDX-ACB domain displays a typical RNA recognition fold (RRM) (see ) formed by the four-stranded antiparallel β sheet, with two helices packed against it.
