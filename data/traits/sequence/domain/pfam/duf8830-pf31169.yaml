identifier: Pfam:PF31169
label: Domain of unknown function (DUF8830)
definition: >-
  This entry represents a domain of approximately 100 residues found in small uncharacterised proteins in Streptomyces and related Actinomycetes. These proteins typically consist of this single domain only. Foldseek analysis suggests weak structural similarity to DUF6204 ( ). The function of this domain remains to be determined.
