identifier: Pfam:PF20147
label: Crinkler effector protein N-terminal domain
definition: >-
  Phytophthora sojae encodes hundreds of putative host cytoplasmic effectors with conserved FLAK motifs following signal peptides, termed crinkling- and necrosis-inducing proteins (CRN) or Crinkler. CRNs have been functionally characterised in pathogenic microbes and shown to participate in processes controlling plant cell death and immunity. This entry represents the N-terminal domain of Crinkler. It contains an ubiquitin-like fold. Proteins containing this domain also include Rhizophagus irregularis RiCRN1 (crinkler effector protein 1). Similar to other CRNs, RiCRN1 can be found in host nucleus. However, it is involved in arbuscule development.
