identifier: Pfam:PF30251
label: YmfE protein family
definition: >-
  This entry represents a domain covering the whole length of YmfE, found in Escherichia and related bacteria. YmfE is an uncharacterised inner membrane protein with four predicted transmembrane helices. The function of this protein remains to be determined. This domain also covers the N-terminal in uncharacterised bacterial proteins.
