identifier: Pfam:PF30252
label: 2-hydroxyethylphosphonate dioxygenase cupin-like domain
definition: >-
  This entry represents a cupin-like domain from 2-hydroxyethylphosphonate dioxygenase (HepD) from Streptomyces viridochromogenes and related bacteria. The full-length HepD protein is approximately 443 amino acids and contains two HTH cro/C1-type DNA-binding domains . HepD is a non-heme iron-dependent dioxygenase that catalyses the conversion of 2-hydroxyethylphosphonate to hydroxymethylphosphonate in the biosynthesis of phosphinothricin tripeptide (bialaphos), a natural-product antibiotic and herbicide.
