identifier: Pfam:PF28647
label: HrmA N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the HrmA-C proteins found in fungi. HrmA is a hypoxia responsive morphology factor that modulates biofilm architecture in Aspergillus fumigatus. The full-length protein contains an N-terminal nuclear localisation signal and a C-terminal RNA recognition motif-like domain. While the complete HrmA protein regulates expression of genes that alter hyphal surface properties and biofilm morphology under hypoxic conditions, the specific function of this domain remains to be determined.
