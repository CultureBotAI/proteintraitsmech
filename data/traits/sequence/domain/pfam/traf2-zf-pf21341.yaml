identifier: Pfam:PF21341
label: TRAF2, second zinc finger
definition: >-
  TRAF2 regulates activation of NF-kappa-B and JNK and plays a central role in the regulation of cell survival and apoptosis. It has E3-ubiquitin protein ligase activity and promotes K63-linked ubiquitination of target proteins. It consists of an N-terminal domain with RING ( ) and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled-coil ( ) and a TRAF-C domain. This entry represents the second β-β-α zinc finger.
