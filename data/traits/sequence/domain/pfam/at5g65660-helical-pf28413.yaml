identifier: Pfam:PF28413
label: At5g65660-like helical domain
definition: >-
  This entry represents a helical region found at the N-terminal of At5g65660 from Arabidopsis thaliana and similar proteins from plants. The prototype protein At5g65660 from Arabidopsis thaliana is a 136-amino acid uncharacterised membrane protein containing a predicted transmembrane helix (residues 19-39) and extensive disordered regions. The protein is classified within the hydroxyproline-rich glycoprotein family by PANTHER annotation and is predicted to be a single-pass membrane protein. This entry encompasses the transmembrane region and surrounding structural elements. The function of this protein remains to be determined.
