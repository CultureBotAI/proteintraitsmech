identifier: Pfam:PF21908
label: Cel124 C-terminal catalytic domain
definition: >-
  This entry represents the catalytic domain of endo-acting cellulase Cel124 ( ), found at its C-terminal, and related proteins. The active site architecture of this cellulase shares significant structural similarity to GH23 enzymes, a family that contains inverting lysozymes and lytic transglycosylases. These proteins adopt typical lysozyme (muramidase)-like fold.
