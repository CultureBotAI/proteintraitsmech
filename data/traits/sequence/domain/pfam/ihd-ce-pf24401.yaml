label: iHD-CE
definition: >-
  This entry represents an inactive HD-CE domain (iHD-CE) which acts as a sensor in the antiviral immunity systems and it is predominantly located within HSP90 systems. Specifically, it is associated with wHTH repeats located at the C-terminal ( ).
