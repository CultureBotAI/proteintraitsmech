identifier: Pfam:PF10525
label: Engrailed homeobox C-terminal signature domain
definition: >-
  Homeodomain proteins are transcription factors that share a related DNA-binding homeodomain. The homeodomain was initially identified in Drosophila melanogaster (Fruit fly) homeotic and segmentation proteins, but is well conserved throughout metazoans. The homeodomain binds DNA through a helix-turn-helix (HTH) structure, consisting of approximately 20 residues. The HTH motif is comprised of two α-helices that make intimate contacts with the DNA; the second helix binds to DNA via a number of hydrogen bonds and hydrophobic interactions. These interactions occur between specific side chains and the exposed bases and thymine methyl groups within the major groove of the DNA. The first helix helps to stabilise the structure and is joined to the second through a short turn. Most proteins which contain a homeobox domain can be classified, on the basis of their sequence characteristics, into three subfamilies, engrailed, antennapedia and paired. A number of different proteins contain homeodomains, including Drosophila engrailed, yeast mating type proteins, hepatocyte nuclear factor 1a and Hox proteins. Hox genes encode homeodomain-containing transcriptional regulators that operate differential genetic programs along the anterior-posterior axis of animal bodies. The homeodomain motif is very similar in sequence identity and structure to domains in other DNA-binding proteins, including recombinases, GARP response regulators, human telomeric protein, AraC type transcriptional activator and tetracycline repressor. This entry represents a conserved region of some 20 amino-acid residues located at the C-terminal of the 'homeobox' domain and forms a kind of a signature pattern for this subfamily of proteins.
