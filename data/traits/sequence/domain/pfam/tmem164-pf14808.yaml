identifier: Pfam:PF14808
label: TMEM164 family
definition: >-
  This entry represents a family of integral membrane proteins. In eukaryotes this protein is known as TMEM164, which is a positive regulator of ferroptosis, but it is also widely distributed in bacteria. Proteins in this family are typically between 200 to 300 amino acids in length. The protein contains several conserved cysteine and histidine residues that are likely to be functionally important. Proteins in this family are predicted to have seven transmembrane helices.
