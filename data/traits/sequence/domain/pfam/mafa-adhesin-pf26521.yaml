identifier: Pfam:PF26521
label: MafA glycolipid-binding adhesin
definition: >-
  This entry represents the MafA (meningococcal adhesin family) protein, which functions as a glycolipid-binding adhesin in pathogenic Neisseria species. MafA was originally identified as a 36 kDa adhesin in Neisseria gonorrhoeae that binds to specific glycolipid receptors on host cells, including lactosylceramide, gangliotriosylceramide, and gangliotetraosylceramide. In Neisseria meningitidis, the protein has been shown to bind to human brain microvascular endothelial cells, suggesting a role in the adhesion and transcytosis of the bacterium across the blood-brain barrier. MafA is encoded by mafA genes located on genomic islands that also contain mafB genes, which encode toxins involved in interbacterial competition. Recently, MafA has been shown to function in the transport of MafB toxins across the outer membrane, suggesting a dual role as both an adhesin and a component of a novel protein secretion pathway.
