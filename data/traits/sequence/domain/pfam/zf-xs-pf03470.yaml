identifier: Pfam:PF03470
label: XS zinc finger domain
definition: >-
  This domain is a putative nucleic acid binding zinc finger and is found at the N terminus of proteins that also contain an adjacent XS domain and in some proteins a C-terminal XH domain. Proteins containing this domain include protein SUPPRESSOR OF GENE SILENCING 3 (SGS3), which is required for post-transcriptional gene silencing and natural virus resistance.
