identifier: Pfam:PF25190
label: Type I Thoeris inhibitor Tad5
definition: >-
  This entry represents the Tad5 family of phage proteins that inhibit the bacterial Type I Thoeris defense system. Tad5 binds to ThsB and interacts with its catalytic residue E85, though it does not completely block the active site pocket.
