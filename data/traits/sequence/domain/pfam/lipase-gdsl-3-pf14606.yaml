identifier: Pfam:PF14606
label: GDSL-like Lipase/Acylhydrolase family
definition: >-
  This entry represents the SGNH hydrolase-type esterase domain, which has a similar fold to flavoproteins, namely a three-layer α/β/α structure, where the β-sheets are composed of five parallel strands. Enzymes containing this domain act as esterases and lipases, but have little sequence homology to true lipases. Proteins containing this type of esterase domain have been found in a variety of hydrolases; those with structural information include an esterase from Streptomyces scabies; the esterase domain of viral haemagglutinin-esterase surface glycoproteins (influenza C virus, coronaviruses and toroviruses); mammalian acetyl hydrolases; fungal rhamnogalacturonan acetylesterase; and the multifunctional enzyme thioesterase I (TAP) from Escherichia coli. SGNH hydrolase-type esterase domains contain unique hydrogen bond network that stabilises their catalytic centres; they usually contain the catalytic triad Ser/Acid/His.
