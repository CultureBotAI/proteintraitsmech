identifier: Pfam:PF29998
label: KHD4 second KH domain
definition: >-
  This entry represents a KH domain found in the K homology domain-containing protein 4 (KHD4) in fungi, which is an RNA-binding protein that recognises the sequence AUACCC via its tandem KH domains 3 and 4, probably in order to promote mRNA instability. This protein plays an essential role in filamentous growth and virulence.
