identifier: Pfam:PF19307
label: Type 2A encapsulin shell protein SrpI-like
definition: >-
  This entry includes type 2A encapsulin shell protein SrpI from Synechococcus elongatus and its homologues from Mycobacteria, such as from M. leprae, which has been described as the most antigenic protein in human leprosy patients and useful for serodiagnosis of leprosy. SrpI forms a nanocompartment that is probably involved in sulfur metabolism. Some members of this entry contain an N-terminal cyclic nucleotide binding domain. This entry also includes proteins annotated as phage capsid proteins, such as , suggesting that in bacteria this protein is a co-opted phage protein. There is a clear evolutionary relationship between the bacterial encapsulins and Caudovirales bacteriophages as they share the HK97 fold of the capsid proteins.
