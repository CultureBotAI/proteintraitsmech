identifier: Pfam:PF22018
label: LPP20 lipofamily protein, middle domain
definition: >-
  This domain is found in LPP20 lipofamily protein from Helicobacter pylori (HP1454) and similar sequences mainly found in epsilonproteobacteria. HP1454 is a secreted protein composed of three distinct domains: the N-terminal ( ), this domain and the C-terminal ( ). This domain forms an anti-parallel three-helix bundle.
