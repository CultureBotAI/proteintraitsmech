identifier: Pfam:PF18341
label: PSA endolysin C-terminal cell wall binding domain
definition: >-
  This is the C-terminal domain in L-alanyl-D-glutamate peptidase (Ply). The C-terminal domain is the cell wall-binding domain (CBD) which is composed of two structurally homologous subdomains. CBD comprises two copies of a β-barrel-like folds, which are held together by means of swapped β-strands. The observed structure of the CBD sub-domains from Listeriaphage endolysin (N-acetyl-muramoyl-l-alanine amidase), could be the result of either a gene duplication during evolution of the CBD or the pick-up of another functionally equivalent coding sequence, followed by swapping of the respective ancestral leading β-strands. Ply is a cell wall lytic enzyme which hydrolyses the link between L-alanine and D-glutamate residues in certain bacterial cell-wall glycopeptides.
