identifier: Pfam:PF24192
label: Domain of unknown function (DUF7417)
definition: >-
  This entry represents an uncharacterised protein domain found in various phage and bacterial proteins. The domain is approximately 60-80 amino acids in length. The domain is composed of four α-helices that form a small bundle. The surface of the domain is negatively charged.
