identifier: Pfam:PF09200
label: Monellin
definition: >-
  Monellin, a protein produced by the West African plant Dioscoreophyllum cumminsii (Serendipity berry), is approximately 70,000 times sweeter than sucrose on a molar basis. The protein adopts an α-β structure, with a cystatin-like fold, where each helix packs against a coiled antiparallel β-sheet.
