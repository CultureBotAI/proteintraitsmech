identifier: Pfam:PF24410
label: wHTH-Hsp90_Na associated
definition: >-
  This is a wHTH domain commonly observed in tandem repeats with 5 or more modules and located at the C-terminal of HSP90 proteins engaged in antiviral immunity. These proteins often additionally feature an inactive HD-CE domain ( ) at the N-terminal. Structural modelling suggests that the wHTH repeats form a ring-shaped module for recognising nucleic acids.
