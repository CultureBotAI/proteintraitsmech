label: Domain of unknown function (DUF6772)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria. Proteins in this family are typically between 292 and 316 amino acids in length. An AlphaFold prediction show similarity to the concanavalin superfamily suggesting that this family may be involved in carbohydrate binding.
