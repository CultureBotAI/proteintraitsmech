identifier: Pfam:PF00682
label: HMGL-like
definition: >-
  Pyruvate carboxylase ( ) (PC), a member of the biotin-dependent enzyme family, is involved in gluconeogenesis by mediating the carboxylation of pyruvate to oxaloacetate. Biotin-dependent carboxylase enzymes perform a two step reaction. Enzyme-bound biotin is first carboxylated by bicarbonate and ATP and the carboxyl group temporarily bound to biotin is subsequently transferred to an acceptor substrate such as pyruvate. PC has three functional domains: a biotin carboxylase (BC) domain, a carboxyltransferase (CT) domain which perform the second part of the reaction and a biotinyl domain. The pyruvate binding to the CT active site induces a conformational change stabilised by the interaction of conserved Asp and Tyr residues in this domain which leads to the formation of the biotin binding pocket and ensures the efficient coupling of BC and CT domain reactions. The mechanism by which the carboxyl group is transferred from the carboxybiotin to the pyruvate is not well understood. The pyruvate carboxyltransferase domain is also found in other pyruvate binding enzymes and acetyl-CoA dependent enzymes suggesting that this domain can be associated with different enzymatic activities. For examples, this domain is found in various synthase enzymes, including methylthioalkylmalate synthases involved in the conversion of 4-methylsulfanyl-2-oxobutanoate into 2-(2-methylsulfanyl)ethylmalate. This domain is found towards the N-terminal region of various aldolase enzymes. This N-terminal TIM barrel domain interacts with the C-terminal domain. The C-terminal DmpG_comm domain ( ) is thought to promote heterodimerization with members of to form a bifunctional aldolase-dehydrogenase.
