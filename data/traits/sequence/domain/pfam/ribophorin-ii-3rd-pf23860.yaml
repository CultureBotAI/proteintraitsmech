identifier: Pfam:PF23860
label: Ribophorin II third domain
definition: >-
  This entry represents the third domain of Ribophorin II (RPN2, also known as dolichyl-diphosphooligosaccharide--protein glycosyltransferase subunit 2) proteins, which may adopt a β-sandwich fold. The mammalian oligosaccharyltransferase (OST) is a protein complex that effects the cotranslational N-glycosylation of newly synthesised polypeptides, and is composed of the following proteins: ribophorins I and II (RI and RII), OST48, and Dadl, N33/IAP, OST4, STT3.
