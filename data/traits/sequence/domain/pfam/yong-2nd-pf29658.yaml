identifier: Pfam:PF29658
label: YonG second domain
definition: >-
  This entry represents the second domain of YonG, a 306 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. YonG contains three domains: an N-terminal domain ( ), this central region, and a C-terminal domain ( ). This domain is found in proteins mainly in firmicutes and in bacteriophages. The function of this domain remains to be determined.
