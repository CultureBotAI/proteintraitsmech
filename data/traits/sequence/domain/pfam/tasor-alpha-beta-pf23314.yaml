identifier: Pfam:PF23314
label: TASOR alpha/beta domain
definition: >-
  This is a domain found in TASOR proteins, a key component of the HUSH complex, a vertebrate-specific multiprotein complex that mediates epigenetic repression of both exogenous and endogenous genetic elements. The HUSH complex regulates H3K9me3 deposition by promoting recruitment of SETDB1 and also recruits MORC2 to compact chromatin. TASOR is crucial in early embryonic development and contains a catalytically-inactive PARP domain, necessary for epigenetic regulation of target elements. This entry represents an α/β domain found towards the C terminus of TASOR and TASOR2 which consist of four β-sheets and short α-helices.
