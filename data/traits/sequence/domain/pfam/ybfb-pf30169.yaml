identifier: Pfam:PF30169
label: Uncharacterised membrane protein YbfB family
definition: >-
  This entry represents the YbfB protein family, small membrane proteins found in Pseudomonadota, including Gamma- and Betaproteobacteria. Members are typically 100-140 amino acids in length and are predicted to be inner membrane proteins with three transmembrane helices. The function of this family remains to be determined.
