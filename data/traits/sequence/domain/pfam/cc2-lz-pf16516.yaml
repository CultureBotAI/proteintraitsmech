identifier: Pfam:PF16516
label: Leucine zipper of domain CC2 of NEMO, NF-kappa-B essential modulator
definition: >-
  NF-kappa-B essential modulator NEMO comprises two coiled-coil regions, denoted as CC1 and CC2, a leucine zipper (LZ), and a zinc finger (ZF). This entry represents the CC2-LZ domain that plays a regulatory role. It contains a ubiquitin-binding domain (UBD) and represents one region that contributes to NEMO oligomerisation. NEMO itself is an integral part of the IkappaB kinase complex and serves as a molecular switch via which the NF-kappaB signalling pathway is regulated.
