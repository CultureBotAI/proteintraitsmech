identifier: Pfam:PF23782
label: Twisted gastrulation (Tsg) protein N-terminal domain
definition: >-
  This entry represents the N-terminal helical domain of Tsg. This domain forms a compact bundle of three α-helices stabilised by 7 disulphide bonds. This unique fold lacks homology to other known protein structures. This domain occupies the BMP type 1 receptor binding site on BMPs. Twisted gastrulation (Tsg) was identified in Drosophila melanogaster as being required to specify the dorsal-most structures in the embryo, for example, the amnioserosa. Biochemical experiments have revealed three key properties of Tsg: It can synergistically inhibit Dpp/BMP action in both D. melanogaster and vertebrates by forming a tripartite complex between itself, SOG/chordin and a BMP ligand; Tsg seems to enhance the Tld/BMP-1-mediated cleavage rate of SOG/chordin and may change the preference of site utilisation; Tsg can promote the dissociation of chordin cysteine-rich-containing fragments from the ligand to inhibit BMP signalling.
