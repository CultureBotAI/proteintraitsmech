identifier: Pfam:PF27232
label: Uncharacterized protein MJ1433, C-terminal helical domain
definition: >-
  This entry represents the C-terminal α-helical domain of the uncharacterized protein MJ1433 from Methanocaldococcus jannaschii. This protein contains two predicted transmembrane helices. This C-terminal helical domain is distinct from the transmembrane regions and is predicted to be cytoplasmic. The function of this protein and its C-terminal domain remains to be determined. This domain is found in archaea and bacteria.
