identifier: Pfam:PF24568
label: Peptidoglycan hydrolase PcsB, coiled-coil domain
definition: >-
  This coiled-coil (CC) domain is found at the N-terminal of Peptidoglycan hydrolase PcsB from Streptococcus pneumoniae and similar bacterial proteins. PcsB forms a dimer, and the CC domain acts as a pair of molecular tweezers, locking the catalytic domain of each dimeric partner in an inactive configuration. PcsB is required for the maintenance of normal growth and cellular morphology and is involved in the splitting of the septum during cell division. This protein is organised into three regions: an α-helical coiled coil (CC) domain, an alanine-rich linker region and a globular catalytic CHAP domain ( ) with an α+β papain-like amidase fold.
