identifier: Pfam:PF22740
label: RapZ C-terminal domain
definition: >-
  This entry represents the C-terminal domain of RapZ which belongs to the Rhodanese-Phosphatase superfamily. It has been shown to bind multiple ligands as part of the regulation of glucosamine-6-phosphate (GlcN6P) levels, which is a precursor to the bacterial cell wall polymer peptidoglycan. Assignment to the greater Rhodanese-Phosphatase superfamily has led to the prediction that, as part of this regulation, it functions as a sugar phosphorylation-dephosphorylation switch.
