identifier: Pfam:PF26982
label: Domain of unknown function (DUF8311)
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to adopt a globular structure composed of four stranded antiparallel β sheet and α helices packed on one side of it. It contains a number of positively charged residues which may be essential for function.
