identifier: Pfam:PF21906
label: NrtR DNA-binding winged helix domain
definition: >-
  This entry represents the C-terminal DNA-binding domain of transcriptional regulator NrtR from Acinetobacter baylyi and similar bacterial proteins. NrtR is involved in regulating the transcription of NAD biosynthetic genes. This domain has a winged helix-turn-helix structure.
