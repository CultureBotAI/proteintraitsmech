identifier: Pfam:PF21418
label: Lincosamide nucleotidyltransferase-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Lincosamide nucleotidyltransferase from Enterococcus faecium (LinB) and similar proteins from bacteria. LinB catalyses adenylylation of the lincosamide class of antibiotics. This domain folds into an α-helical bundle, which consists of five α-helices. It is involved in dimer formation.
