identifier: Pfam:PF20578
label: Atrophied bacterial Ig domain
definition: >-
  This domain is related to , a bacterial immunoglobulin-like domain. It is found centrally in Alpha-L-arabinofuranosidase from Bifidobacterium longum, which plays a role in the type II arabinogalactan (AG) side chains degradation. According to structure predictions members of this group have lost several β-strands found on one sheet of the Ig domain. This domain is found in a wide range of bacterial cell surface proteins.
