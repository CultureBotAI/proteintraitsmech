identifier: Pfam:PF29799
label: P granule abnormality protein C-terminal domain
definition: >-
  This entry represents the C-terminal domain of P granule abnormality proteins found in Caenorhabditis species. The full-length proteins are guanyl-specific endoribonucleases that localise to P granules and are essential for germline development. The family includes PGL-1, PGL-2 and PGL-3 proteins which function redundantly in P granule assembly and germline development. The specific function of this C-terminal domain remains to be determined.
