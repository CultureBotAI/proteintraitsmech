identifier: Pfam:PF01083
label: Cutinase
definition: >-
  Plant pathogenic fungi produce extracellular degradative enzymes that play an important role in pathogenesis. They include cutinase, which hydrolyses cutin, facilitating fungus penetration through the cuticle. Cutinase is a serine esterase containing the classical Ser, His, Asp triad of serine hydrolases. The protein belongs to the α-β class, with a central β-sheet of 5 parallel strands covered by 5 helices on either side of the sheet. The active site cleft is partly covered by 2 thin bridges formed by amino acid side chains, by contrast with the hydrophobic lid possessed by other lipases. The protein also contains 2 disulphide bridges, which are essential for activity, their cleavage resulting in complete loss of enzymatic activity. In the actinobacteria Kineococcus radiotolerans, this enzyme shows a C-terminal extension that is similar to the substrate binding domain of poly(hydroxybutyrate) (PHB) depolymerases. Acetylxylan esterase from fungi removes acetyl side groups from xylan. The catalytic core of the enzyme has an α/β/α-sandwich fold, similar to that of cutinase. This protein family also includes enzymes that do not show cutinase activity but exhibit esterase activity, such as phospholipases and carboxylesterases from Actinobacteria. Phospholipase Culp4 from Mycobacterium tuberculosis hydrolyses dipalmitoylphosphatidylcholine, while Carboxylesterase Culp1 from Mycobacterium tuberculosis hydrolyses various p-nitrophenol-linked aliphatic esters and has weak lipase activity.
