identifier: Pfam:PF20626
label: Zona-pellucida-binding protein (Sp38) C-terminal EGF-like domain
definition: >-
  This entry represents the C-terminal EGF-like domain found in zona-pellucida-binding proteins. These are sperm proteins that bind to the 90 kDa family of zona pellucida glycoproteins in a calcium-dependent manner. These represent some of the specific molecules that mediate the first steps of gamete interaction, allowing fertilisation to occur.
