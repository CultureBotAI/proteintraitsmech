identifier: Pfam:PF27181
label: Putative lipoprotein YvcA
definition: >-
  This entry represents the putative lipoprotein YvcA that belongs to the Mog1p superfamily. YvcA is required for complex colony architecture. The protein is upregulated by DegU and Spo0A, and its disruption results in loss of complex colony architecture and fruiting body-like structures. YvcA is a membrane-anchored lipoprotein encoded by the gene yvcA (locus tag BSU34850) on the B. subtilis chromosome.
