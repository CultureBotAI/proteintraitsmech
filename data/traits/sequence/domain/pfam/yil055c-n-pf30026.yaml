identifier: Pfam:PF30026
label: YIL055C N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in uncharacterised proteins from the YIL055C family. Members are found in Saccharomycetaceae yeasts and are phosphoproteins localised to the mitochondrion. The domain shows structural similarity to RNA recognition motif domains. The function of this domain remains to be determined.
