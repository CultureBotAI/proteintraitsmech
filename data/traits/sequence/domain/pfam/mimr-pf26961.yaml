identifier: Pfam:PF26961
label: MimR domain
definition: >-
  This domain is found in Propane 2-monooxygenase operon transcriptional activator MimR from Mycolicibacterium smegmatis and related proteins. MimR acts as a transcriptional activator of the mimABCD operon encoding the propane 2-monooxygenase complex. This domain is predicted to show a twisted β-sheet with α-helices in both sides.
