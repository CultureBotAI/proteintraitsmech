identifier: Pfam:PF25525
label: Serine/threonine-protein kinase D1-like, ubiquitin-like domain
definition: >-
  This presumed ubiquitin domain is found at the N-terminal end of human Serine/threonine-protein kinase D1-3 (PRKD1-3) and similar proteins mainly found in animals. These proteins convert transient diacylglycerol signals into prolonged physiological effects downstream of PKC. PRKD1 is involved in the regulation of MAPK8/JNK1 and Ras signalling, Golgi membrane integrity and trafficking, cell survival and cell migration. The protein kinase D family of enzymes consists of three isoforms: PKD1 (PKCmu), PKD2, and PKD3 (PKCnu). They all share a similar architecture with regulatory sub-domains that play specific roles in the activation, translocation and function of the enzymes. The PKD enzymes have recently been implicated in very diverse cellular functions, including Golgi organisation and plasma membrane directed transport, metastasis, immune responses, apoptosis and cell proliferation. Each isoform is differentially regulated through phosphorylation.
