identifier: Pfam:PF23887
label: Phage L5 gene 47-like protein
definition: >-
  This entry represents the gene 47 protein found in Mycobacterium phage L5 and related proteins from tailed bacteriophages. This protein forms a small globular β-barrel domain that is related to LSM superfamily proteins such as Hfq. AlphaFold modelling suggests this protein forms an unusual octameric arrangement. Based on similarity to LSM proteins these proteins may bind to RNA.
