identifier: Pfam:PF00862
label: Sucrose synthase first GT-B domain
definition: >-
  This entry represents the first GT-B domain (also referred to as GT-BN in of sucrose synthases, while the second one, at the C-terminal (GT-BC), is represented in. The substrates of these proteins (UDP-Glc or UDP and fructose) bound in the cleft between the GT-B domains. Sucrose synthases catalyse the synthesis of sucrose in the following reaction: UDP-glucose + D-fructose = UDP + sucrose This family includes the bulk of the sucrose synthase protein. This enzyme is found mainly in plants but also appears in cyanobacteria.
