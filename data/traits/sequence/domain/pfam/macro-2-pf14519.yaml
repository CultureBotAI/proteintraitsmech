identifier: Pfam:PF14519
label: Macro-like domain
definition: >-
  This domain is an ADP-ribose binding module. It is found predominantly in yeast proteins. Some members in this domain family also contain the A1pp domain and are putative ADP-ribose-1''-monophosphatase that converts ADP-ribose-1''-monophosphate to ADP-ribose.
