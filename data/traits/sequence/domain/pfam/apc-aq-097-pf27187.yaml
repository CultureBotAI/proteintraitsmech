identifier: Pfam:PF27187
label: aq_097 APC superfamily transporter
definition: >-
  This entry represents the Aq_097 protein, an uncharacterised integral membrane protein found in Aquifex aeolicus. The protein belongs to the APC (amino acid-polyamine- organocation) superfamily of transporters and is predicted to be a multi-pass membrane protein with 11 transmembrane helices. Aq_097 is encoded by the gene aq_097 on the A. aeolicus chromosome. The protein shows structural similarity to amino acid and polyamine transporters but its specific substrate and function is unknown.
