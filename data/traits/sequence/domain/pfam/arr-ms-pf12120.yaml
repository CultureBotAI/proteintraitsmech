identifier: Pfam:PF12120
label: Rifampin ADP-ribosyl transferase
definition: >-
  Arr enzymes catalyze ADP-ribosylation of rifamycins, thus rendering rifamycin antibiotics ineffective. The opportunistic pathogen Mycobacterium smegmatis possesses a chromosomally encoded rifampin ADP-ribosyltransferase (Arr-ms). An homologue of Arr, Arr-2, is present in several transposons and integrons found in Gram-negative pathogenic bacteria. The structure of Arr-ms reveals similarity to protein ADP-ribosyltransferases, despite a lack of amino acid sequence similarity.
