identifier: Pfam:PF25560
label: Domain of unknown function (DUF7932)
definition: >-
  This entry describes a domain of unknown function located at the N-terminal of proteins mostly found in fungi. According to structure predictions it might adopt an immunoglobulin, fibronectin type III fold. It is formed of two antiparallel β-sheets stacked against each other, forming a β-sandwich.
