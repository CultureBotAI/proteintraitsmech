identifier: Pfam:PF30540
label: Glutathione transferase 3 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of glutathione transferase 3 (GTT3), a nuclear membrane protein found in fungi. In Saccharomyces cerevisiae, GTT3 localises to the nuclear membrane, where this C-terminal region contains two predicted transmembrane helices. Despite the name, no glutathione transferase activity has been experimentally demonstrated for this protein. The function of this domain remains to be determined.
