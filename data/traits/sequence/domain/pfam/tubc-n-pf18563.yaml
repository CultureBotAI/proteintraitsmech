identifier: Pfam:PF18563
label: TubC N-terminal docking domain
definition: >-
  This is the N-terminal docking domain (also termed the amino acid adenylation domain) found in TubC proteins from the tubulysin polyketide synthase and nonribosomal polypeptide synthetase (PKS-NRPS) system, which binds to C-terminal docking domain of TubB. This domain can also be found at the N terminus of bacitracin synthase 2 (BacB) from Bacillus licheniformis and Pyochelin synthetase PchF from Pseudomonas aeruginosa.
