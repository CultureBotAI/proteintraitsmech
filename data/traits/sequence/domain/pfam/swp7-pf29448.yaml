identifier: Pfam:PF29448
label: Spore wall protein 7
definition: >-
  This entry represents the SWP7 family of spore wall proteins found in microsporidia. These proteins are approximately 280-295 amino acids in length and contain an N-terminal signal peptide. SWP7 is involved in adherence of spores to host cell surfaces and plays a role in infection efficiency. The protein is localised to the cytoplasm of sporonts and sporoblasts and to the spore wall and polar tube of mature spores. SWP7 interacts with SWP9, another spore wall protein, and is expressed at all developmental stages. The family is found across microsporidia, including Nosema, Encephalitozoon, and related genera. These obligate intracellular parasites use spore wall proteins for host recognition and invasion.
