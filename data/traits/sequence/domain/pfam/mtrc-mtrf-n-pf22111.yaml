identifier: Pfam:PF22111
label: Decaheme cytochrome c component MtrC/MtrF N-terminal domain
definition: >-
  This entry represents the domain I (N-terminal) of the decaheme cytochrome c component MtrC from the MtrCAB complex and its homologue MtrF, which is part of the MtrFDE complex. In Shewanella oneidensis, these proteins are at bacterial cell surface at the termini of trans-outer-membrane electron transfer conduits and allow the utilisation of extracellular mineral forms of iron and manganese as respiratory electron acceptors. MtrC/MtrF consist of four domains: domain I and III containing seven antiparallel β-strands in an extended Greek key topology; domains II and IV ( ) each bind five tightly packed hemes covalently attached to the Cys residues of the five CXXCH motifs in each domain and form the central core ( ), flanked by domains I and III ( ).
