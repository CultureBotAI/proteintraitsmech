identifier: Pfam:PF02521
label: Putative outer membrane protein
definition: >-
  Helicobacter pylori is a causative agent of gastritis and peptic ulceration in humans. As the first step towards development of a vaccine against H. pylori infection, many attempts have been made to identify protective antigens. Potential targets for vaccine development are H. pylori-specific proteins that are surface-exposed and highly antigenic. This family consists of putative outer membrane proteins, mainly from H. pylori. and related Campylobacterales.
