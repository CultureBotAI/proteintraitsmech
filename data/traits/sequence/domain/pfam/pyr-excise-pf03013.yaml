identifier: Pfam:PF03013
label: Pyrimidine dimer DNA glycosylase
definition: >-
  Pyrimidine dimer DNA glycosylases are enzymes responsible for initiating the base excision repair pathway, excising pyrimidine dimers by hydrolysis of the glycosylic bond of the 5' pyrimidine, followed by the intra-pyrimidine phosphodiester bond. One such enzyme is T4 endonuclease V, an enzyme responsible for the first step of a pyrimidine-dimer-specific excision-repair pathway. Bacteriophage T4 that are deficient in these enzymes are extremely sensitive to UV.
