identifier: Pfam:PF21433
label: Mevalonate-3-kinase, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of M3K and similar archaeal proteins. Mevalonate-3-kinase (M3K) is a mevalonate diphosphate decarboxylase (MDD) homologue from Thermoplasma acidophilum, which catalyses phosphorylation of (R)-mevalonate without concomitant decarboxylation.
