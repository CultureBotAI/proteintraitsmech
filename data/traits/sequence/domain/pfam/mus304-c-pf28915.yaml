identifier: Pfam:PF28915
label: ATR-interacting protein mus304 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ATRIP (ATR-interacting protein). ATRIP is a DNA damage checkpoint protein that interacts with ATR kinase and is required for chromosome break repair and genomic stability during development. The protein contains an EEXXXDDL motif that is essential for interaction with ATR/mei-41. ATRIP is localised to the cytoplasm and is highly expressed in oocytes and nurse cells during oogenesis. The protein is involved in DNA damage checkpoint signalling, DNA repair, meiotic recombination, and cell cycle regulation.
