identifier: Pfam:PF28892
label: Small cysteine and glycine repeat-containing domain
definition: >-
  This entry represents the small cysteine and glycine repeat-containing proteins which are keratin-associated proteins of the type 28 family. The proteins are characterised by tandem cysteine-glycine (CG) dipeptide repeats, typically ranging from 10 to 19 repeats per protein. These proteins are components of the hair cortex interfilamentous matrix and are essential for formation of rigid hair shafts through extensive disulphide bond cross-linking with hair keratins. It is found in mammals and shows considerable variation in repeat number between members. Several members exist as pseudogenes in some human populations due to nonsense mutations.
