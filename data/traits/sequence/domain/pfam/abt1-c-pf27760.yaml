identifier: Pfam:PF27760
label: ABT1 C-terminal domain
definition: >-
  This entry represents the C-terminal region of activator of basal transcription 1 (ABT1). ABT1 is a TATA-binding protein that functions as a basal transcription activator and regulator of basal transcription for class II genes. The protein interacts with ESF1/ABTAP and IGHMBP2.
