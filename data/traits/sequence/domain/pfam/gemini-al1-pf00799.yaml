identifier: Pfam:PF00799
label: Geminivirus Rep catalytic domain
definition: >-
  Circular Rep-encoding single-stranded DNA (CRESS-DNA) viruses, such as circoviruses, nanoviruses, and geminiviruses, are eukaryotic viruses with small circular single-stranded DNA (ssDNA) genomes encoding a replication initiator protein (Rep) with a distinctive two functional domain organization, containing an endonuclease domain toward the N-terminal and a superfamily 3 (SF3) helicase domain at the C-terminal. The Rep endonuclease domain is responsible for initiating, progressing, and completing rolling circle replication (RCR) of the genome. The Rep endonuclease domain is characterised by RCR motifs I through III, which are important for RCR initiation and termination. Motif I, UUTU (U denotes hydrophobic residues), is thought to be involved in the recognition of the origin of replication. Motif II, HU(H/Q), is involved in the coordination of divalent metal ions, Mg+2 or Mn+2, which are essential for endonuclease activity at the origin of replication. Motif III (YxxK, where x is any amino acid) is involved in dsDNA cleavage and subsequent covalent attachment of the Rep through the catalytic tyrosine residue to the 5' end of the cleaved product. This entry represents the CRESS-DNA Rep endonuclease domain which consists of a central 5-stranded antiparallel β-sheet covered on one side by an α-helix and irregular loops and on the other, more open side of the domain, by an α-helix containing the catalytic tyrosine residue (the catalytic helix). The replication initiator protein (Rep) of geminiviruses is a replicon-specific initiator enzyme and is an essential component of the replisome. In geminivirus Rep protein, this N-terminal region is crucial for origin recognition and DNA cleavage and nucleotidyl transfer. It is found in association with . Proteins in this entry are…
