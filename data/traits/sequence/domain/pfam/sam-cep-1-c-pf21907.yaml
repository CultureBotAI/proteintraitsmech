identifier: Pfam:PF21907
label: CEP-1 C-terminal SAM domain
definition: >-
  This entry represents the C-terminal domain of the CEP-1 protein which is a p53 homologue found in C. elegans. The CEP-1 C-terminal is composed of two sub-domains, an oligomerisation domain (OD) followed by a SAM domain (this entry) that closely interacts with the oligomerisation. The OD domain of CEP-1 forms a dimer instead of the usual tetramer observed in human p53.
