identifier: Pfam:PF16522
label: Flagellar FLiS export co-chaperone, HP1076
definition: >-
  HP1076 is a co-chaperone for FliS, one of the type III secretion system flagellar chaperones. The HP1076 and FliS complex together prevents premature polymerisation of flagellins and is critical for flagellar assembly and bacterial colonisation. The HP1076 shows co-chaperone activity that promotes protein folding of FliS with mutations in the flagellin binding pocket and enhances the chaperone activity of FliS.
