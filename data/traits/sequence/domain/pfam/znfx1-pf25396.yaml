identifier: Pfam:PF25396
label: ZNFX1 domain
definition: >-
  This domain is found in Znfx1 proteins in animals or hrr1 in fission yeast. This domain is often found associated with and is predicted to adopt a mainly-β configuration. Znfx1, or NFX1-type zinc finger-containing protein 1, are RNA-binding proteins involved in antiviral responses and immunity against certain bacteriaproteins. They act as double-stranded RNA sensors, recognising viral RNA and interacting with mitochondrial antiviral-signalling protein (MAVS) to initiate the type I interferon response.
