identifier: Pfam:PF29212
label: TP0088 domain
definition: >-
  This entry represents a conserved family of proteins approximately 130 residues long, predominantly found in Treponema species and related spirochaetes. The prototype member is TP0088 from Treponema pallidum, the causative agent of syphilis. This protein has been identified as an immunogenic antigen that elicits IgG antibody responses in rabbits experimentally infected with T. pallidum. TP0088 shares sequence similarity with Borrelia burgdorferi protein BB0662. The function of this protein family remains to be determined. The domain is made up of two four stranded β meander subdomains that form a pseudodimeric structure.
