identifier: Pfam:PF21993
label: Transcriptional regulator LmrA/YxaF-like, C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in a group of TetR transcription regulators, including YxaF (also known as T1414) and LmrA from Bacillus subtilis, which are paralogous to each other. LmrA and YxaF are repressors that bind specifically to almost the same cis sequences, LmrA/YxaF boxes, located in the promoter regions of the lmrAB operon, the yxaF gene, and the yxaGH operon.
