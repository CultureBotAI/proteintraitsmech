identifier: Pfam:PF30165
label: YomZ prophage protein
definition: >-
  This entry represents YomZ, a 131 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. The protein is found in SPbeta phage and related prophages across Bacillales. The function of this protein remains to be determined.
