identifier: Pfam:PF23822
label: Domain of unknown function (DUF7192)
definition: >-
  This entry represents a bacterial domain of unknown function. The domain is around 270 to 300 amino acids in length. It is found in a variety of bacterial phyla including Actinobacteria, Bacteroidota, Pseudomonadota and Verrucomicrobiota. The domain is also found in some bacterial phages. The function of this domain is unknown. The structure of this domain shows similarity to VWFA domains.
