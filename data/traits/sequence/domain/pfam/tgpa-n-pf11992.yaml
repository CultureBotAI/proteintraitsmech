identifier: Pfam:PF11992
label: TgpA N-terminal domain
definition: >-
  This domain can be found at the N terminus of TgpA from Pseudomonas aeruginosa. TgpA is a transglutaminase that plays a critical role in the viability of Pseudomonas aeruginosa. This domain is composed of 5 transmembrane helices.
