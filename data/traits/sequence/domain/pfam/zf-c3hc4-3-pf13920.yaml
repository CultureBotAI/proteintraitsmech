identifier: Pfam:PF13920
label: Zinc finger, C3HC4 type (RING finger)
definition: >-
  This domain is found in uncharacterised plant proteins. It contains three repeats with topology similar to the C-terminal domain of defensin. Each of these repeats has two predicted disulfide bonds that are conserved and occupying the same spatial position as the disulfide bonds in defensin. This domain is frequently found in combination with and .
