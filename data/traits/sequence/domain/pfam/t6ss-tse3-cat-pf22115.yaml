identifier: Pfam:PF22115
label: T6SS, Peptidoglycan muramidase Tse3, catalytic domain
definition: >-
  This entry represents the catalytic domain found in Peptidoglycan muramidase Tse3. Tse3 is a toxin secreted by the H1 type VI (H1-T6SS) secretion system into the periplasm of recipient cells. This protein degrades peptidoglycan via muramidase activity. Tse3 is composed of a small N-terminal domain ( ) and a C-terminal catalytic domain, which contains two major lobes that form an open, accessible catalytic groove with three calcium-binding ions.
