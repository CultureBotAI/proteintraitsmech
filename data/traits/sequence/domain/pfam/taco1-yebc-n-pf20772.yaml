identifier: Pfam:PF20772
label: TACO1/YebC protein N-terminal domain
definition: >-
  This entry represents the N-terminal helical bundle domain from proteins in the TACO1/YebC family, which are thought to act as transcriptional regulators. In mammals, TACO1 protein activates the translation of mitochondriallye-ncoded COX1. In bacteria, it negatively regulates the quorum-sensing response regulator by binding to its promoter region. This domain consists of three α-helices arranged in a bundle ( ).
