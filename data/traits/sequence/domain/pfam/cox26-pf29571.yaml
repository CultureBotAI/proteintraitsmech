identifier: Pfam:PF29571
label: Cytochrome c oxidase subunit 26
definition: >-
  This entry represents cytochrome c oxidase subunit 26 (COX26), a component of the mitochondrial cytochrome c oxidase complex (complex IV). Cytochrome c oxidase is the terminal enzyme in the mitochondrial electron transport chain that catalyses the reduction of oxygen to water. The complex is composed of a catalytic core of three subunits (COX1, COX2 and COX3) encoded in mitochondrial DNA, and nine supernumerary subunits encoded in the nuclear genome. COX26 is one of these supernumerary subunits and is a single-pass transmembrane protein localised to the mitochondrial inner membrane. The protein contains an N-terminal mitochondrial transit peptide that is cleaved upon import. COX26 belongs to the fungal cytochrome c oxidase subunit 26 family and is found in yeast and related fungi.
