identifier: Pfam:PF27231
label: Uncharacterized protein MJ1567 family
definition: >-
  This entry represents a domain that covers most of the sequence in MJ1567 from Methanocaldococcus jannaschii, and similar uncharacterised proteins found in archaea. The protein is 175 amino acids in length with a molecular weight of approximately 20.7 kDa. Its function remains to be determined.
