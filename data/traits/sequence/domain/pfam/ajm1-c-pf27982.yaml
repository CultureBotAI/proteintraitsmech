identifier: Pfam:PF27982
label: Apical junction component 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of apical junction component 1 (AJM1), a protein involved in adherens junction integrity. AJM1 localises to the apical cell membrane, adherens junctions and cilia, where it may control cell-cell junction organisation. The protein contains extensive disordered regions throughout its sequence, including at the C-terminal region. AJM1 undergoes multiple post-translational modifications including phosphorylation and arginine methylation. The protein is tissue-enhanced in brain and expressed broadly across cell types. The specific function of this C-terminal domain remains to be determined. Members of this group are found in animals.
