identifier: Pfam:PF30531
label: Domain of unknown function (DUF8621)
definition: >-
  This entry represents a family of very small uncharacterised proteins of approximately 60 residues found exclusively in cyanobacteria. The family is widely distributed across the phylum, including members of the orders Nostocales, Oscillatoriales, Synechococcales, and Chroococcales. The function of this family remains to be determined.
