identifier: Pfam:PF27037
label: Domain of unknown function (DUF8341)
definition: >-
  This entry represents a domain of unknown function at the C-terminal in uncharacterised proteins mainly from Pseudomonadati. This domain contains a RNase like fold. The core architecture typically features a central five-stranded β-sheet flanked by several α-helices.
