identifier: Pfam:PF22096
label: Teichoic acid transporter subunit TagH C-terminal domain
definition: >-
  TagH from Staphylococcus epidermidis ( ) is the ATPase subunit of the two-component transporter TagGH involved in the synthesis of bacterial polysaccharides-wall teichoic acids. This entry represents the C-terminal of TagH that adopts an α/β structure consisting of a central antiparallel mixed β-sheet packed on one side with helices. It is anticipated that this domain is involved in the binding to negatively charged polymer. It is usually found C-terminal to .
