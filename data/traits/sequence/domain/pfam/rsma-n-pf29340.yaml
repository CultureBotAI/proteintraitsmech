identifier: Pfam:PF29340
label: Anti-sigma factor RsmA, N-terminal cytoplasmic anti-sigma domain
definition: >-
  This entry represents the N-terminal domain of RsmA (regulator of SigM) and similar sequences from actinobacteria. RsmA is an anti-sigma factor that regulates the extracytoplasmic function (ECF) sigma factor SigM. It functions to hold the ECF sigma factor SigM in an inactive form until it is released by regulated intramembrane proteolysis (RIP). This domain architecture, with this N-terminal cytoplasmic anti-sigma domain, a single transmembrane helix, and a C-terminal extracellular sensor domain ( ), is characteristic of anti-sigma factors involved in regulated intramembrane proteolysis signalling pathways in bacteria.
