identifier: Pfam:PF13280
label: WYL domain
definition: >-
  This presumed domain is often found to the C-terminal of a DNA-binding helix-turn-helix domain. This domain may be involved in binding to an as yet unknown ligand that allows a transcriptional regulation response to that molecule. There are a number of proteins that contain two tandem copies of this domain such as . This suggests that this domain may form a dimeric arrangement.
