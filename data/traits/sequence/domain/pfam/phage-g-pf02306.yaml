identifier: Pfam:PF02306
label: Major spike protein (G protein)
definition: >-
  This is a family of proteins from single-stranded DNA bacteriophages. The G protein is a major spike protein involved in attachment to the bacterial host cell. The virion is composed of sixty copies of each of the F, G and J proteins, and 12 copies of the H protein. There are twelve spikes formed by five G proteins, each a tight β barrel, and one H protein.
