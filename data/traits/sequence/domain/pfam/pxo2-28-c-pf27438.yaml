identifier: Pfam:PF27438
label: PXO2-28 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of pXO2-28 proteins found in Bacillus anthracis and related Bacilli. This domain is found in a protein of approximately 497 amino acids encoded on the virulence plasmid pXO2. The C-terminal region contains a disordered segment with acidic residue bias. The function of this domain remains to be determined.
