identifier: Pfam:PF09056
label: Prokaryotic phospholipase A2
definition: >-
  This entry represents bacterial and fungal phospholipase A2 proteins, as well as various hypothetical and putative proteins. They enable the liberation of fatty acids and lysophospholipid by hydrolysing the 2-ester bond of 1,2-diacyl-3-sn-phosphoglycerides. The phospholipase domain adopts an α-helical secondary structure, consisting of five α-helices and two helical segments.
