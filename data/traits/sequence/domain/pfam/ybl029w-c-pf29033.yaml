identifier: Pfam:PF29033
label: YBL029W C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YBL029W, an uncharacterised protein from Saccharomyces cerevisiae. The domain spans approximately 100 amino acids and is conserved across various yeast species in ascomycetes. YBL029W protein is 376 amino acids and contains predicted disordered regions. It has been localised to both cytoplasm and nucleus based on high-throughput data. The specific function of this domain remains to be determined.
