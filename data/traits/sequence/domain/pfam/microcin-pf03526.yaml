identifier: Pfam:PF03526
label: Colicin E1 (microcin) immunity protein
definition: >-
  The structural and functional relationships among independently cloned segments of the plasmid ColE1 region that regulates and codes for colicin E1 (cea), immunity (imm) and the mitomycin C-induced lethality function (lys) have been analysed. A model for the structure and expression of the colicin E1 operon has been proposed in which the cea and lys genes are expressed from a single inducible promoter that is controlled by the lexA repressor in response to the SOS system of Escherichia coli. The imm gene lies between the cea and lys genes and is expressed by transcription in the opposite direction from a promoter located within the lys gene. This arrangement indicates that the transcriptional units for all three genes overlap. It is proposed that the formation of anti-sense RNA may be an important element in the coordinate regulation of gene expression in this system.
