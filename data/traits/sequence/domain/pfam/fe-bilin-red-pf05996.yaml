identifier: Pfam:PF05996
label: Ferredoxin-dependent bilin reductase
definition: >-
  This family consists of several different but closely related proteins which include phycocyanobilin:ferredoxin oxidoreductase (PcyA), 15,16-dihydrobiliverdin:ferredoxin oxidoreductase (PebA) and phycoerythrobilin:ferredoxin oxidoreductase (PebB). Phytobilins are linear tetrapyrrole precursors of the light-harvesting prosthetic groups of the phytochrome photoreceptors of plants and the phycobiliprotein photosynthetic antennae of cyanobacteria, red algae, and cryptomonads. It is known that that phytobilins are synthesised from haem via the intermediacy of biliverdin IX alpha (BV), which is reduced subsequently by ferredoxin-dependent bilin reductases with different double-bond specificities.
