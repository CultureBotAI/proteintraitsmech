identifier: Pfam:PF10174
label: RIM-binding protein of the cytomatrix active zone
definition: >-
  This entry represents the ELKS family, which are thought to be involved in the organisation of CAZ. Vertebrate ELKS proteins are produced by two genes, ERC1 and ERC2. Caenorhabditis elegans expresses a homologue of ELKS that acts downstream of syd2/liprin-alpha during active zone assembly. Drosophila melanogaster expresses a related protein termed bruchpilot (brp) that consists of a conserved N-terminal and a C-terminal half with no homologous sequences in vertebrates. Brp is required for structural integrity and function of synaptic active zones. Vertebrate ELKS proteins are enriched at presynaptic active zones and support Ca2+ influx at nerve terminals of inhibitory hippocampal neurons. They have a C-terminal PDZ-binding motif that binds directly to RIM (a small G protein Rab-3A effector). These proteins also contain four coiled-coil domains. The active zone is the presynaptic region in the nerve terminals that mediates neurotransmitter release and is composed a dense collection of proteins called the cytomatrix at the active zone (CAZ). The CAZ proteins are thought to mediate synapse formation and regulate neurotransmitter release.
