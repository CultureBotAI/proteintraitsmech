identifier: Pfam:PF27277
label: Holdfast attachment protein D
definition: >-
  This entry represents the Holdfast attachment protein D (HfaD, ) from Caulobacter vibrioides and related proteins from alphaproteobacteria. HfaD is involved in attachment of the holdfast to the cell. The holdfast is a structure that allows the bacteria to firmly adheres to surfaces. The holdfast biosynthesis and secretion machinery are encoded by two major loci, hfsEFGH and hfsDABC. The hfsDAB genes encode a secretion protein complex believed to span the inner and outer membrane of the cell envelope. Deletion of any of the components of this complex results in holdfast shedding and decreased adherence and biofilm formation.
