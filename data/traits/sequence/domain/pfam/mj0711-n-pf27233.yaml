identifier: Pfam:PF27233
label: Uncharacterized protein MJ0711, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the archaeal uncharacterised protein MJ0711 and similar bacterial sequences. This protein is 322 amino acids with a molecular weight of approximately 38.6 kDa and contains a single transmembrane helix at the C terminus. This N-terminal domain comprises the cytoplasmic region distinct from the transmembrane region. The function of this protein and its N-terminal domain remains to be determined.
