identifier: Pfam:PF14489
label: QueF-like protein
definition: >-
  QueF is involved in the biosynthesis of queuosine (Q), a modified nucleoside present in certain tRNAs. It catalyses the reduction of 7-cyano-7-deazaguanine (preQ0) to the corresponding amine 7-amino-methyl-7-deazaguanine (preQ1). QueF family members fall into two structural subfamilies. The YkvM (Bacillus subtilis QueF) subfamily is comprised of 160-amino-acid unimodular proteins, whereas the YqcD (E. coli QueF) subfamily is characterised by 280-amino-acid bimodular proteins. YkvM enzymes function as homododecamers, while the YqcD enzymes are homodimers.
