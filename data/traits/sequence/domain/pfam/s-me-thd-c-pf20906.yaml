identifier: Pfam:PF20906
label: S-Me-THD-like, C-terminal domain
definition: >-
  This entry represents a domain found C-terminal in S-methyl thiohydantoin desulfurase from Variovorax sp. (S-Me-THD) and similar sequences mainly found in bacteria and fungi. S-Me-THD catalyses the hydrolysis of S-methyl-thiohydantoin-5-propanoate into hydantoin-5-propanoate and methanethiol, the third step in S-methyl ergothioneine degradation. This domain is also found in the hypothetical protein from Chromobacterium violaceum . It folds into a partly open β-barrel ( ).
