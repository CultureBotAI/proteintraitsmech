identifier: Pfam:PF28836
label: BamP, C-terminal domain
definition: >-
  This domain is found C-terminal in the BamP protein from Flavobacterium johnsoniae and related proteins. BamP is a periplasmic protein which is a component of the BAM complex. In the complex, this domain appears to be located between BamA and BamD proteins. It fold into array of α helices.
