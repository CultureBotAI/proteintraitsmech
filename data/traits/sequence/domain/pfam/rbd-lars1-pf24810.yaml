label: Leucine--tRNA ligase, RagD-binding domain
definition: >-
  This is the RagD-binding domain (RBD) of human Leucine--tRNA ligase, a synthetase that catalyses the specific attachment of leucine to its cognate tRNA. This domain shows three α-helices.
