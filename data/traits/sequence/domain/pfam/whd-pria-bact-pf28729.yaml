identifier: Pfam:PF28729
label: Winged helix domain, PriA helicase, Bacteroidota
definition: >-
  This entry represents a winged helix-turn-helix domain found in PriA helicases from Bacteroidota. The domain is located between the PriA 3-prime DNA-binding domain ( ) and the ResIII domain ( ). PriA is an ATP-dependent DNA helicase involved in replication restart at stalled replication forks. The domain is found primarily in Flavobacteriaceae, Sphingobacteriaceae and Bacteroidales within the Bacteroidota phylum. The function of this domain remains to be determined.
