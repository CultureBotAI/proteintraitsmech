identifier: Pfam:PF25830
label: NFAM1 immunoglobin domain
definition: >-
  This entry describes the immunoglobin domain found in NFAM1 and similar proteins mostly found in animals. NFAT activation molecule 1 (NFAM1) is a cell surface molecule of the immunoglobulin superfamily that plays a role in immune signalling. It contains an N-terminal signal peptide, an extracellular immunoglobulin domain, a transmembrane region, and a cytoplasmic immunoreceptor tyrosine-based activation motif (ITAM), all characteristic of this protein family. NFAM1 activates the calcineurin/NFAT signalling pathway, promoting downstream transcription of cytokine genes and modulating immune responses. It has also been shown to regulate B cell development through ITAM-mediated signalling, suggesting a functional role in lymphocyte maturation.
