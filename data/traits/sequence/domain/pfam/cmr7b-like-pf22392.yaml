identifier: Pfam:PF22392
label: Cmr7b-like, BtrG-like domain
definition: >-
  This entry represents a BtrG-like domain present in Cmr7b protein from Sulfolobus solfataricus. Cmr7b is involved in the CRISPR/Cas pathway. CRISPR (clustered regularly interspaced short palindromic repeat) is an adaptive immune system that provides protection against mobile genetic elements (viruses, transposable elements and conjugative plasmids).
