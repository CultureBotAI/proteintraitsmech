identifier: Pfam:PF03109
label: ABC1 atypical kinase-like domain
definition: >-
  This entry represents a domain found in Escherichia coli UbiB, known in Providencia stuartii as Aarf, which is required for ubiquinone (CoQ) biosynthesis. Some proteins with this domain are described as aarF domain-containing protein kinases (ADCKs). This domain is also found in yeast ABC1 proteins ( ) required for function of the mitochondrial bc1 complex, in which CoQ functions as an essential cofactor.
