identifier: Pfam:PF29124
label: Meiotic sister-chromatid recombination protein 3 beta-sheet domain
definition: >-
  This entry represents the β-sheet domain in meiotic sister-chromatid recombination protein 3 (MSC3) found in fungi. MSC3 is involved in the control of meiotic sister-chromatid recombination. The protein is localised to the cell membrane as a peripheral membrane protein at the cell periphery. Members of this family are found across Saccharomycotina yeasts including Saccharomyces cerevisiae, Candida glabrata, Kluyveromyces lactis and Eremothecium gossypii. The proteins contain multiple disordered regions and are subject to phosphorylation at multiple serine and threonine residues.
