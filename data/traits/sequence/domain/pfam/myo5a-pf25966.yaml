identifier: Pfam:PF25966
label: Unconventional myosin-Va domain
definition: >-
  This domain is found in mouse Unconventional myosin-Va/b (Myo5a/b) and similar sequences mainly found in animals. Myo5a is a processive actin-based motor that can move in large steps approximating the 36-nm pseudo-repeat of the actin filament. This protein is involved in melanosome transport and mediates the transport of vesicles to the plasma membrane. Myo5b may be involved in vesicular trafficking via its association with the CART complex, which is necessary for efficient transferrin receptor recycling but not for EGFR degradation. This domain shows an α helical configuration.
