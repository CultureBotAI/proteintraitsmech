identifier: Pfam:PF02630
label: SCO1/SenC
definition: >-
  The SCO (an acronym for Synthesis of Cytochrome c Oxidase) family is involved in biogenesis of respiratory and photosynthetic systems. Members of this family are required for the proper assembly of cytochrome c oxidase (COX). They contain a metal binding motif, typically CXXXC, which is located in a flexible loop.
