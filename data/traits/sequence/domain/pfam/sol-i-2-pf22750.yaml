identifier: Pfam:PF22750
label: Ant venom allergen Sol i 2 family
definition: >-
  Sol i 2, one of four known potent allergens from the venom of red imported fire ant, is a powerful trigger of anaphylaxis. It causes production of IgE antibody in many individuals stung by fire ants. The closest structure homologue of Sol I 2 is the odorant binding protein and pheromone binding protein LUSH of the fruit fly Drosophila ( ), suggesting a possible similar biological function.
