identifier: Pfam:PF12652
label: CotJB protein
definition: >-
  The cotJ operon proteins affect spore coat composition, and is controlled by sigma E. The genes, which include CotJB, are either required for the normal formation of the inner layers of the coat or are themselves structural components of the coat. CotJB has been identified as a spore coat protein.
