identifier: Pfam:PF00537
label: 'Scorpion toxin-like domain '
definition: >-
  This family contains both neurotoxins and plant defensins. The mustard trypsin inhibitor, MTI-2, is a plant defensin. It is a potent inhibitor of trypsin with no activity towards chymotrypsin. MTI-2 is toxic for Lepidopteran insects, but has low activity against aphids. The scorpion toxin (a neurotoxin) binds to sodium channels and inhibits the activation mechanisms of the channels, thereby blocking neuronal transmission.
