identifier: Pfam:PF27171
label: YxeC helical domain
definition: >-
  This entry represents a domain found standalone in the YxeC protein from Bacillus subtilis. YxeC is an uncharacterised multi-pass membrane protein predicted to localise to the cell membrane with three transmembrane helices. The protein is located in a genomic region between the iol and hut operons. In some proteins, this domain is found in combination with other domains.
