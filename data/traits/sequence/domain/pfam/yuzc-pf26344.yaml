identifier: Pfam:PF26344
label: YuzC spore coat inner layer protein
definition: >-
  This entry represents an inner spore coat protein that contributes to spore protection and structural integrity. It is involved in the assembly and defence of the spore during bacterial sporulation. Experimental evidence, including protein fusion studies, supports a role for YuzC in the kinetics of spore coat formation.
