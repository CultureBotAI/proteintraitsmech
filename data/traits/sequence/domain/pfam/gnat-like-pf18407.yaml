identifier: Pfam:PF18407
label: GCN5-related N-acetyltransferase like domain
definition: >-
  This is a domain with a GCN5-related N-acetyltransferase (GNAT) fold which can be found in Rv1692 phophatases. Crystal structure of Rv1692 indicates that this C-terminal extension, which is absent in other characterised HADSF members, resembles a small GCN5-related N-acetyltransferase (GNAT) fold. Furthermore, it is fused to the HADSF catalytic domain. Functional studies indicate that this GNAT region is not likely to be involved in acetyl group transfer using AcCoA and SucCoA, it could nonetheless be a regulatory domain. Furthermore, it is suggested that this GNAT domain is required for the solubility of the HADSF fold of Rv1692 and is potentially needed for the structural integrity of this enzyme.
