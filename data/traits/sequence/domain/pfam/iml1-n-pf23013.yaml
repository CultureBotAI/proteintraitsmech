identifier: Pfam:PF23013
label: IML1 N-terminal double psi beta barrel domain
definition: >-
  This entry represents the N-terminal double psi β-barrel domain found in IML1/DEPDC5 proteins predominantly from animals. The IML1 protein family is involved in the regulation of the mTORC1 signaling pathway, particularly in response to amino acid availability. Members of this family are components of the GATOR1 complex, which acts as an inhibitor of the amino acid-sensing branch of the mTORC1 pathway. When amino acids are scarce, GATOR1 increases GTP hydrolysis by Rag GTPases, converting them to their inactive GDP-bound state, thus detaching mTORC1 from the lysosomal surface and inhibiting its signaling. This action is crucial for cellular adaptation to nutrient deprivation, promoting catabolic metabolism and autophagy. Conversely, in the presence of abundant amino acids, GATOR1 is negatively regulated by GATOR2, allowing mTORC1 signaling to proceed. The IML1 family proteins interact with the nucleotide-binding pocket of Rag GTPases, coordinating their nucleotide loading states, but do not possess GAP activity themselves.
