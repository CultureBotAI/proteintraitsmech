identifier: Pfam:PF30409
label: ParB-methyltransferase HTH domain
definition: >-
  This entry represents a helix-turn-helix (HTH) DNA-binding domain found in ParB-methyltransferase fusion proteins. It is located between the N-terminal ParB-like nuclease domain ( ) and the C-terminal N6/N4 adenine methyltransferase domain ( ). These fusion proteins are components of restriction-modification systems often associated with prophages and mobile genetic elements. The HTH domain likely contributes to DNA recognition and binding for the methyltransferase activity. The family is found broadly in bacteria,.
