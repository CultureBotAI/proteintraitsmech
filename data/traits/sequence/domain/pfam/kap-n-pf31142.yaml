identifier: Pfam:PF31142
label: Kinetoplast-associated protein, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of kinetoplast-associated proteins (KAPs), found in trypanosomatid protozoa. KAPs are histone H1-like DNA-binding proteins involved in the organisation and segregation of kinetoplast DNA (kDNA). The mitochondrial DNA of kinetoplastid protozoa consists of approximately 5,000 minicircles and 20-30 maxicircles that are held together by catenation into a highly organised compact disc structure. KAPs bind preferentially to specific fragments of minicircle DNA and compact kDNA networks through DNA charge neutralisation.
