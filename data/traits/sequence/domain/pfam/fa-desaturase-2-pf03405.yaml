identifier: Pfam:PF03405
label: Fatty acid desaturase
definition: >-
  Fatty acid desaturases are enzymes that catalyse the insertion of a double bond at the delta position of fatty acids. There seem to be two distinct families of fatty acid desaturases which do not seem to be evolutionary related. Family 1 is composed of: Stearoyl-CoA desaturase (SCD) ( ). Family 2 is composed of: Bacterial fatty acid desaturases. Plant stearoyl-acyl-carrier-protein desaturase ( ), this enzyme catalyses the introduction of a double bond at the delta(9) position of steraoyl-ACP to produce oleoyl-ACP. This enzyme is responsible for the conversion of saturated fatty acids to unsaturated fatty acids in the synthesis of vegetable oils. Cyanobacterial DesA, an enzyme that can introduce a second cis double bond at the delta(12) position of fatty acid bound to membranes glycerolipids. DesA is involved in chilling tolerance; the phase transition temperature of lipids of cellular membranes being dependent on the degree of unsaturation of fatty acids of the membrane lipids. This entry contains fatty acid desaturases belonging to Family 2, also known as Acyl-ACP (Acyl Carrier Protein) desaturases.
