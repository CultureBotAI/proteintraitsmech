identifier: Pfam:PF30778
label: Bacterial solute-binding protein, 4-helix bundle domain
definition: >-
  This entry represents a 4-helix bundle domain of approximately 120 residues found in bacterial extracellular solute-binding proteins. The domain is found N-terminal to the SBP_bac_1 ( ) and SBP_bac_8 ( ) domains. This domain is found almost exclusively in Bacillota, particularly Paenibacillaceae. The function of this domain remains to be determined.
