identifier: Pfam:PF00994
label: Probable molybdopterin binding domain
definition: >-
  This entry represents an N-terminal domain of approximately 55 residues found in Bacillota and Thermodesulfobacteriota. This domain is located N-terminal to the MoCF_biosynth domain ( ), which is involved in molybdenum cofactor biosynthesis. The function of this domain remains to be determined.
