identifier: Pfam:PF22142
label: Hydroxylamine oxidoreductase, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Hydroxylamine oxidoreductase from Kuenenia stuttgartiensis (Hao, ) and similar bacterial sequences. This enzyme is responsible for the formation of NO from hydroxylamine in aerobic ammonium-oxidising bacteria. This domain shows a predominantly α-helical structure.
