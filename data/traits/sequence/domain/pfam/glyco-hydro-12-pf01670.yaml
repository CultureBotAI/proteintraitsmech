identifier: Pfam:PF01670
label: Glycosyl hydrolase family 12
definition: >-
  Glycoside hydrolase family 12 comprises enzymes with two known activities: Endo-β-1,4-glucanase ( ) and Xyloglucan-specific endo-β-1,4-glucanase / endo-xyloglucanase ( ). These enzymes were formerly known as cellulase family H. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
