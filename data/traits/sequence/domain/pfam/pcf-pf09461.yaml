identifier: Pfam:PF09461
label: Phytotoxin PcF protein
definition: >-
  PcF is a 52 residue protein factor of two α helices, containing a 4-hydroxyproline and three cysteine bridges. The presence of the hydroxyproline is unique in relation to other fungal phytotoxic proteins. The protein has a high content of acidic side-chains implying a lack of binding with lipid-rich components of membranes and appears to be an extracellular phytotoxin that causes leaf necrosis in strawberries.
