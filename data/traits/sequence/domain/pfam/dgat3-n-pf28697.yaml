identifier: Pfam:PF28697
label: DGAT3 N-terminal domain
definition: >-
  This entry represents a helical region found near the N-terminal of DGAT3 (diacylglycerol O-acyltransferase 3), an enzyme involved in triacylglycerol biosynthesis in plants. DGAT3 catalyses the acylation of the sn-3 hydroxy group of sn-1,2-diacylglycerol using acyl-CoA. The enzyme contains a [2Fe-2S] cluster with binding residues located in the C-terminal thioredoxin-like region. The full-length protein is expressed in germinating seeds and may preferentially use linolenoyl-CoA as substrate.
