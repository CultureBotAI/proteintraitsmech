identifier: Pfam:PF22457
label: ATP-dependent 6-phosphofructokinase subunit gamma, C-terminal
definition: >-
  This domain is found at the C-terminal in PFK3 subunit gamma. Pichia pastoris 6-phosphofructokinase (PpPfk or PFK3) is the most complex and probably largest (1 MDa) eukaryotic Pfk. It forms a dodecamer of four α-β-γ trimers. The gamma subunit is unique, in contrast to other eukaryotic ATP-dependent 6-phosphofructokinases, and participates in oligomerization of the alpha and beta chains. It is not essential for enzymatic activity, but it modulates the allosteric behavior of the enzyme.
