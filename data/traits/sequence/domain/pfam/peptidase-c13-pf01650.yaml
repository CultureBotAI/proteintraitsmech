identifier: Pfam:PF01650
label: Peptidase C13 family
definition: >-
  Asparaginyl endopeptidase, also known as legumain, is a family of cysteine proteases found in many organisms. This group of cysteine peptidases belong to the MEROPS peptidase family C13 (legumain family, clan CD). A type example is legumain from Canavalia ensiformis (Jack bean, Horse bean). Although legumains were first described from beans (also known as Vacuolar Processing Enzymes), homologues have been identified in plants, protozoa, vertebrates, and helminths. In blood-feeding helminths, asparaginyl endopeptidases (sometimes described as hemoglobinases) have been located in the gut and are considered to be involved in host hemoglobin digestion. Also included in the family C13 of cysteine peptidases are GPI-anchor transamidases, which share significant homology with legumains. GPI-anchor transamidases mediate glycosylphosphatidylinositol (GPI) anchoring in the endoplasmic reticulum. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an arginine is the general base. Cysteine peptidases can be grouped into fourteen different clans, with members of each clan possessing a tertiary fold unique to the clan. Four clans of cysteine peptidases share structural similarities with serine and threonine peptidases and asparagine lyases. From sequence similarities, cysteine peptidases can be cluste…
