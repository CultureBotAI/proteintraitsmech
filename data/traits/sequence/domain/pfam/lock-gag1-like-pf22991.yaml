identifier: Pfam:PF22991
label: Gag1-like, lock domain
definition: >-
  This domain found in Gag1 from Saccharomyces cerevisiae and similar fungal sequences. Gag1 interacts with Cka2, the fourth subunit of the eukaryotic kinase CK2. This protein is organised into three domains: lock (this entry), Gag and Clamp ( ). This short domain is predicted to adopt a predominantly α-helical configuration.
