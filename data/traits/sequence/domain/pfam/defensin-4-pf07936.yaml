identifier: Pfam:PF07936
label: Potassium-channel blocking toxin
definition: >-
  This entry represents the sea anemone type 3 (BDS) potassium channel toxins. Family members include toxin APETx1 and 2, and the antihypertensive and antiviral proteins BDS-I ( ) [[cite~:22442564]] and BDS-II ( ) expressed by Anemonia sulcata. BDS-I is organised into a triple-stranded antiparallel β-sheet, with an additional small antiparallel β-sheet at the N terminus. The proteins are known to specifically block the Kv3.4 potassium channel, and thus bring about a decrease in blood pressure. Moreover, they inhibit the cytopathic effects of mouse hepatitis virus strain MHV-A59 on mouse liver cells, by an unknown mechanism. This entry also includes the BDS-like antimicrobial peptide known as Crassicorin-I, a peptide with both antimicrobial and neurotoxin activities that may act by impairing sodium or potassium channels in the prey.
