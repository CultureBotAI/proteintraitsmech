identifier: Pfam:PF23473
label: LYK4/5 LysM3 domain
definition: >-
  This entry represents the third LysM domain found in proteins from plants, including LYK4/5 from Arabidopsis thaliana. The LysM domain adopt a β-α-α-β fold. LYK4 is a chitin-binding protein and contributes to chitin-triggered immunity. LYK5 has been identified as a receptor with a very high affinity to chitooligosaccharides.
