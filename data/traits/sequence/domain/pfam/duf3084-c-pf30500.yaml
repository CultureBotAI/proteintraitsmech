identifier: Pfam:PF30500
label: DUF3084-associated C-terminal helical hairpin
definition: >-
  This entry represents a C-terminal helical hairpin domain found in DUF3084-containing membrane proteins. It follows the N-terminal DUF3084 domain ( ) and one or more intervening domains. The proteins contain an N-terminal signal peptide and a transmembrane helix, suggesting membrane localisation. In Nostoc sp. PCC 7120, the protein Alr4393 is predicted to be a single-pass membrane protein. In Synechococcus sp. WH 8102, the homologue SYNW0274 has been computationally linked to the nitrogen assimilation regulatory network controlled by NtcA. The family is found predominantly in Cyanobacteria. The function of this domain remains to be determined.
