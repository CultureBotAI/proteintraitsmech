label: Domain of unknown function (DUF7590)
definition: >-
  This domain is found in uncharacterised proteins mainly from Fungi. It has a detectable similarity to known galactose-binding domains, in particular to the C-terminal domain of Bacillus sp. alkaline serine protease, and is predicted to adopt similar structure.
