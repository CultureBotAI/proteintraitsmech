identifier: Pfam:PF09381
label: Outer membrane protein G (OmpG)
definition: >-
  Porins are channel proteins in the outer membrane of Gram-negative bacteria which mediate the uptake of molecules required for growth and survival. Escherichia coli OmpG forms a 14 stranded β-barrel and in contrast to most porins, appears to function as a monomer. The central pore of OmpG is wider than other E. coli porins and it is speculated that it may form a non-specific channel for the transport of larger oligosaccharides.
