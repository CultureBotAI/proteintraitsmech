identifier: Pfam:PF07110
label: EthD domain
definition: >-
  This domain is found in several bacterial and fungal sequences which are related to the EthD (Ethyl tert-butyl ether degradation) protein of Rhodococcus ruber . In Rhodococcus ruber, EthD is thought to be involved in the degradation of ethyl tert-butyl ether (ETBE). In Aspergillus terreus, EthD is part of the Pks1 gene cluster that mediates the biosynthesis of an anthraquinone derivative pigment that contributes to conidial pigmentation that provides protection from UV radiation, heat and cold stress. This domain can be found in some decarboxylases, such as GedI from Aspergillus terreus. GedI is part of the gene cluster that mediates the biosynthesis of geodin, an intermediate in the biosynthesis of other natural products. Atrochrysone carboxylic acid decarboxylase is part of the gene cluster that mediates the biosynthesis of anthraquinones, compounds noted for their medicinal applications as antiviral, laxative, anti-inflammatory, immunosuppressive and antitumor agents. The atrochrysone carboxylic acid decarboxylase is responsible for the decarboxylation of atrochrysone carboxylic acid to yield atrochrysone [[cite31028901]].
