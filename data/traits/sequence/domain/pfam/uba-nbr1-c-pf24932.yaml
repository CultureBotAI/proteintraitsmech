identifier: Pfam:PF24932
label: Next to BRCA1 gene 1 protein-like, C-terminal UBA domain
definition: >-
  This UBA domain is found at the C-terminal end of human Next to BRCA1 gene 1 protein (Nbr1) and similar eukaryotic proteins, including JOKA2 from Solanum tuberosum. Nbr1 (next to BRCA1) is an ubiquitin-binding autophagy adapter that participates in different processes including host defense or intracellular homeostasis. Nbr1-like molecules contain an N-terminal PB1 domain, one (animals, plants) or more (fungi) ZZ domains, an FW domain, and a C-terminal UBA domain. JOKA2 activates ATG8CL-mediated selective autophagy, and contributes to defense against the fungal pathogen Phytophtora infestans.
