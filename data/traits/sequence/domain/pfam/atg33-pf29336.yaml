identifier: Pfam:PF29336
label: Autophagy-related protein 33
definition: >-
  This family of proteins is involved in the selective degradation of mitochondria via autophagy. Autophagy is a cellular process that occurs during starvation and at post-log phase, where it plays a critical role in maintaining cellular homeostasis by recycling cellular components. Members of this family are essential for proper vegetative growth, asexual and sexual reproduction, and contribute to the virulence of certain species by participating in the biosynthesis of specific virulence determinants.
