identifier: Pfam:PF12821
label: Threonine/Serine exporter, ThrE
definition: >-
  This domain is found in a group of membrane proteins involved in the export of threonine and serine. L-threonine, L-serine are both substrates for the exporter. The exporter exhibits nine-ten predicted transmembrane-spanning helices with long charged C and N termini and an amphipathic helix present within the N terminus. L-Threonine can be made by the amino acid-producing bacterium Corynebacterium glutamicum, but the potential for amino acid formation can be considerably improved by reducing its intracellular degradation into glycine and increasing its export by this exporter. Proteins containing this domain are found in Bacteria, Archaea, and the fungal kingdoms, and the family can exist either as a single long polypeptide chain or as two short polypeptides. All members show an extended hydrophilic N-terminal domain with weak sequence similarity to portions of hydrolases (proteases, peptidases, and glycosidases); this suggests that since this region is cytoplasmic to the membrane it may be generating the transport substrate, so may imply that threonine may not be the primary substrate and the ThrE has a subsidiary function.
