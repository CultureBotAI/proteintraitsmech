identifier: Pfam:PF22247
label: Catechol 2,3-dioxygenase-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of a group of bacterial proteins that function as 2,3-dioxigenases, including Metapyrocatechase from Pseudomonas putida (XylE), which catalyses the incorporation of dioxygen into catechol and the extradiol ring cleavage to form 2-hydroxymuconate semialdehyde.
