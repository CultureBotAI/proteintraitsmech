identifier: Pfam:PF24025
label: DR_A0283-like, Ig-like domain
definition: >-
  This domain with an immunoglobulin (Ig)-like fold is found in Fervidolysin (Fls) from Fervidobacterium pennivorans, in the probable subtilase-type serine protease DR_A0283 from Deinococcus radiodurans and similar sequences from terrabacteria and thermotogota. Fls is a protease able to degrade keratin into peptides. It is responsible for keratinolysis by F.pennivorans, which allows this bacterium to grow on native feathers.
