identifier: Pfam:PF18870
label: HEPN/RES N-terminal domain 1
definition: >-
  This domain is mostly α helical. It is fused to HEPN (MAE_28990 superfamily), RES domain, a potential RNase found in various toxin systems. The HEPN (Higher Eukaryotes and Prokaryotes Nucleotide-binding domain) domain is found in an enormous variety of defense and stress response systems.
