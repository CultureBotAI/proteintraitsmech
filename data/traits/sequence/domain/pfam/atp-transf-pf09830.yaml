identifier: Pfam:PF09830
label: ATP adenylyltransferase C-terminal domain
definition: >-
  Diadenosine 5',5'''-P-1,P-4-tetraphosphate (Ap4A) and related diadenosine oligoposphates such as Ap3A are important intracellular and extracellular signalling molecules in prokaryotes and eukaryotes. They are implicated in the regulation of many vital celluar functions including stress response, cell division and apoptosis. Synthesis primarily occurs via aminoacyl-tRNA synthetases adding the AMP moiety of an aminoacyl-AMP to an acceptor nucleotide, and is an inevitable byproduct of protein synthesis. The concentration of these compounds must thus be controlled both to ensure the proper regulation of various celluar processes, but also to prevent their buildup to potentially toxic levels. This domain is found in a group of ATP adenylyltransferases found in bacteria and lower eukaryotes which catalyse the interconversion of Ap4A to ATP and ADP. While these enzymes are thought to act primarily to break down Ap4A, there is evidence to suggest that in some circumstances they may also act in a biosynthetic role. Some variability in substrate range is apparent eg the cyanobacterial enzyme can also utilise Ap3A as a substrate, while the Saccharomyces enzymes apparently cannot.
