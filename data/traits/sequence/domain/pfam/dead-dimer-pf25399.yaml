identifier: Pfam:PF25399
label: RNA helicase DeaD dimerization domain
definition: >-
  This entry represents the dimerisation domain found in the ATP-dependent RNA helicase DeaD (also known as CsdA) and related proteins. DeaD is involved in various cellular processes after cold shock, including ribosome biogenesis, mRNA degradation and translation initiation. It was found to unwind double-stranded RNA in the absence of ATP. In E.coli DeaD is associated with the pre50S particles and is involved in the biogenesis of the 50S subunit, and plays an essential role in the survival at low temperature. DeaD is a multidomain protein, composed of a conserved helicase core and a C-terminal domain that is probably involved in RNA recognition. The domain represented by this entry is indispensable for stabilising the DeaD dimeric structure. This domain consists of three α-helices, two of which entangle with the helices of another monomer and tightly pack to form the dimeric core.
