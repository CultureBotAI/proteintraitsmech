identifier: Pfam:PF25813
label: VAL1-like, N-terminal zinc finger domain
definition: >-
  This zinc finger is found at the N-terminal end of B3 domain-containing transcription repressor VAL1-3 from Arabidopsis thaliana, its homologues from rice Os07g0563300 and Os07g0679700 and similar plant proteins. VAL1/2 are transcriptional repressors of gene expression involved in embryonic pathways that play an essential role in regulating the transition from seed maturation to seedling growth. VAL3 may be involved in plant development.
