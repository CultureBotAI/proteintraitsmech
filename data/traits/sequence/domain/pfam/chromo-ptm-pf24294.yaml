identifier: Pfam:PF24294
label: Membrane-bound transcription factor PTM, chromo domain-like
definition: >-
  This is a putative chromo domain-like domain found in the membrane-bound transcription factor PTM (also known as DDP1) and similar plant sequences. PTM is required for the plastid-to-nucleus retrograde signalling, which plays an important role in the coordinated expression of both nuclear- and chloroplast-localised genes that encode photosynthesis-related proteins.
