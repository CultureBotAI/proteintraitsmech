identifier: Pfam:PF28393
label: Cadherin-99C-like, immunoglobulin-like domain
definition: >-
  This immunoglobulin-like (Ig-like) domain is found at the N-terminal end of Cadherin-99C from Drosophila melanogaster (Cad99C) and similar proteins mainly from arthropods and nematodes. Cad99C functions in epithelial morphogenesis and the intestine epithelial immune response. It is essential for female fertility and to regulate cell rearrangements during salivary tube elongation. This domain is often found associated with .
