identifier: Pfam:PF18271
label: Glycoside hydrolase 131 catalytic N-terminal domain
definition: >-
  This is the N-terminal domain found in glycoside hydrolase family 131 (GH131A) protein observed in Coprinopsis cinerea. GH131A exhibits bifunctional exo-beta-1,3-/-1,6- and endo-beta-1,4 activity toward beta-glucan. This domain is catalytic in nature though the catalytic mechanism of C. cinerea GH131A is different from that of typical glycosidases that use a pair of carboxylic acid residues as the catalytic residues. In the case of GH131A, Glu98 and His218 may form a catalytic dyad and Glu98 may activate His218 during catalysis.
