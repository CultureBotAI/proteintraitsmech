identifier: Pfam:PF20739
label: Potential transfer protein TraK
definition: >-
  This entry represents the TraK protein ( ) found in the pIP501 Type IV Secretion System operon. The protein localised to the cell envelope, facing towards the cell exterior, and behaves as a monomer under the tested conditions. It adopts a mixed α/β fold with seven α-helices and nine β-strands ( ).
