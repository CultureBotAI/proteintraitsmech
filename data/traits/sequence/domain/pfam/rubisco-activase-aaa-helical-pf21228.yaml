identifier: Pfam:PF21228
label: Ribulose bisphosphate carboxylase/oxygenase activase, AAA, helical
definition: >-
  This domain is found in Ribulose bisphosphate carboxylase/oxygenase activase from Nicotiana tabacum (RuBisCO activase) and similar proteins from plants and cyanobacteria. This enzyme facilitates the removal of the sugar phosphate inhibitors of RuBisCO, the enzyme that catalyses the fixation of atmospheric CO2 in photosynthesis. This protein is organised into an N-terminal domain, followed by a AAA module and a 23-residue C-terminal extension. The AAA module is composed of an α/β and an α-helical subdomains. This entry covers part of the α-helical subdomain and the C-terminal extension.
