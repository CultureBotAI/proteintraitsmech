identifier: Pfam:PF19306
label: Large helicase-related protein, winged helix domain
definition: >-
  This entry represents the third domain of ATP-dependent helicases such as the DNA damage-inducible superfamily 2 helicase Lhr from Mycobacteria, an enzyme that uses adenosine triphosphate (ATP) hydrolysis to drive unidirectional 3' to 5' translocation along single-stranded DNA (ssDNA). This domain with a winged helix (WH) domain fold appears C-terminal to two Rec-A-like modules and is involved in the binding of the 3' end of the ssDNA.
