identifier: Pfam:PF28688
label: ITPK4, N-terminal HAD-like domain
definition: >-
  This HAD-like domain is found at the N-terminal end of Inositol 1,3,4-trisphosphate 5/6-kinase 4 from Arabidopsis thaliana (ITPK4) and similar sequences. ITPK4 can phosphorylate the inositol polyphosphate Ins(1,3,4)P3 to form InsP4.
