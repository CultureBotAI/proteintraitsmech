identifier: Pfam:PF18293
label: Caprin-1 dimerization domain
definition: >-
  This domain is found in human Caprin-1 protein. Caprin-1 plays a role in many important biological processes, including cellular proliferation, innate immune response and synaptic plasticity. This domain is found in the highly conserved homologous region 1(HR1) and is responsible for the tight homodimerization of Caprin-1.
