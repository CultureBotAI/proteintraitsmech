identifier: Pfam:PF29939
label: Uncharacterised protein aq_aa01
definition: >-
  This entry represents aq_aa01, a 133 amino acid uncharacterised protein from the ece1 plasmid of Aquifex aeolicus. The protein is found sporadically in proteins across diverse Bacteria, including Bacillales (Anaerobacillus, Bacillaceae) and Clostridia (Eubacteriales) groups. The function of this protein remains to be determined.
