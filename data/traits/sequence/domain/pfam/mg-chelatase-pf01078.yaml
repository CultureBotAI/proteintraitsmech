identifier: Pfam:PF01078
label: Magnesium chelatase, subunit ChlI
definition: >-
  This domain can be found in the magnesium chelatase ChlI subunit, the catalytic domain that binds and hydrolyses ATP. This domain contains the nucleotide binding Walker motif and can also be found in the competence protein ComM from Haemophilus influenzae and Lon proteases from archaea. Magnesium-chelatase is a three-component enzyme that catalyses the insertion of Mg 2+ into protoporphyrin IX. This is the first unique step in the synthesis of (bacterio)chlorophyll. As a result, it is thought that Mg-chelatase has an important role in channeling intermediates into the (bacterio)chlorophyll branch in response to conditions suitable for photosynthetic growth. ChlI and BchD have molecular weights between 38-42kDa.
