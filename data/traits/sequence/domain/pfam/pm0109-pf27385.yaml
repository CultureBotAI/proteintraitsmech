identifier: Pfam:PF27385
label: PM0109
definition: >-
  This entry represents a domain covering the full length of a group of uncharacterised proteins of approximately 203 amino acids found in bacteria. The proteins are distributed across Pseudomonadati, with representatives in both Pseudomonadota and Bacteroidota. Members include protein PM0109 from Pasteurella multocida and related proteins from Flavobacteriaceae and other bacterial lineages. The function of these proteins remains to be determined. This domain can also be found at the C-terminal in related uncharacterised proteins.
