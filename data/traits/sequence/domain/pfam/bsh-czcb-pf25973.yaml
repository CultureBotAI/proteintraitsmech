identifier: Pfam:PF25973
label: CzcB-like, barrel-sandwich hybrid domain
definition: >-
  This domain is found in the Cobalt-zinc-cadmium resistance protein CzcB, its paralogue Nickel and cobalt resistance protein CnrB from Cupriavidus metallidurans and related bacterial proteins. CzcB is a crucial component of the CzcCBA protein complex, which mediates heavy metal resistance in bacteria through an active cation efflux mechanism. CzcB binds to CzcA, which in turn is bound to CzcC, forming the complete CzcCBA complex.
