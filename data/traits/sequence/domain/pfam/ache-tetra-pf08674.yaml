identifier: Pfam:PF08674
label: Acetylcholinesterase tetramerisation domain
definition: >-
  Cholinesterase enzymes are members of the broader alpha/beta hydrolase family and can be dividied into two distinct groups: those that catalyse the hydrolysis of acetylcholine to choline and acetate (acetylcholinesterases ) acetylcholine + H 2 O ->choline + acetate and those that catalyse the conversion of other acylcholines to a choline and a weak acid (cholinesterases ) an acylcholine + H 2 O ->choline + a carboxylate Acetylcholinesterase also acts on a variety of acetic esters and catalyses transacetylations. It is the most intensively studied of the cholinesterase enzymes due to its key physiological role in the turnover of the neurotransmitter acylcholine. This enzyme is found in, or attached to, cellular or basement membranes of presynaptic cholinergic neurons and postsynaptic cholinoceptive cells within the neuromuscular junction. Signal transmission at the neuromuscular junction involves the release of acylcholine, its interaction with the acycholine receptor and hydrolysis, all occuring in a period of a few milliseconds. Rapid hydrolysis of the newly released aceytlcholine is vital in order to prevent continuous firing of the nerve impulses. Consistent with its role in this process, acetylcholinesterase has an unusually high turnover number, ensuring that acetylcholine is broken down quickly. There is evidence to suggest that acetylcholinesterase has additional important roles including involvement in neuronal adhesion, the formation of Alzheimer fibrils, and neurite growth. The acetylcholinesterase tetramerisation domain is found at the C terminus and forms a left handed superhelix.
