identifier: Pfam:PF12153
label: LPS binding domain of CAP18 (C terminal)
definition: >-
  This entry represents the cathlecidin antimicrobial C-terminal peptides. The C terminus is cleaved from the cathlecidin precursor, and is approximately 30 amino acids in length with a helical structure. This entry is found in association with . The C terminus peptides possess antimicrobial activity by virtue of their binding to bacterial lipopolysaccharides.
