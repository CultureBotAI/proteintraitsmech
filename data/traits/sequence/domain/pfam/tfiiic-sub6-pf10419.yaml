identifier: Pfam:PF10419
label: TFIIIC subunit triple barrel domain
definition: >-
  This conserved domain is found in a family of proteins that function as subunits of transcription factor IIIC (TFIIIC). TFIIIC in yeast and humans is required for transcription of tRNA and 5 S RNA genes by RNA polymerase III. The yeast proteins in this entry are fused to phosphoglycerate mutase domain.
