identifier: Pfam:PF01579
label: Domain of unknown function (DUF19)
definition: >-
  This domain is found in a group of uncharacterised proteins from nematodes, including (T20D4.11) and Excretory canal abnormal exc-13 from Caenorhabditis elegans. Members of this group have been reported to be negative regulators of growth and development in response to some stress and environmental conditions that are probably involved in growth inhibition under mitochondrial stress conditions. The domain is roughly 130 amino acids long and contains 12 conserved cysteines, which suggests that it is an extracellular domain and that these cysteines form six intra-domain disulphide bridges. Structural prediction shows an all-α configuration. This domain was formerly known as DUF19.
