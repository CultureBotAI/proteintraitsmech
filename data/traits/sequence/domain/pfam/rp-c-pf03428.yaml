identifier: Pfam:PF03428
label: Replication protein C N-terminal domain
definition: >-
  Proteins in this group have homology with the RepC protein of Agrobacterium Ri and Ti plasmids. repABC plasmids are widely distributed among alphaproteobacteria; all repABC operons contain at least three protein-encoding genes: repA, repB and repC. The first two genes encode proteins involved in plasmid segregation, whereas repC encodes a protein crucial for replication. The origin of replication maps within the repC gene. RepC is rate limiting for pT181 replication and it is likely that pT181 replication is regulated at the level of RepC synthesis. This entry represents the N-terminal HTH domain of plasmid replication protein RepC.
