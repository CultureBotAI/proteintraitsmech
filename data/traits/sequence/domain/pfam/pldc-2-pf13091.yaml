identifier: Pfam:PF13091
label: Cardiolipin synthase, PLD-like domain
definition: >-
  This entry represents a phospholipase D-like domain, found in cardiolipin synthases and related proteins. Cardiolipin synthases catalyse the reversible phosphatidyl group transfer from one phosphatidylglycerol molecule to another to form cardiolipin (CL) (diphosphatidylglycerol) and glycerol. Mitochondrial cardiolipin hydrolase (PLD6) from mammals has phospholipase and nuclease activities, depending on the different physiological conditions and it plays a key role in mitochondrial fusion and fission via its phospholipase activity. This entry also includes Phospholipase D from Rickettsia spp., Phospholipase D1/2 from animals and Phospholipase D zeta from plants. PLD1/2 function as phospholipase selective for phosphatidylcholine. It is involved as a critical step in numerous cellular pathways, including signal transduction, membrane trafficking, and the regulation of mitosis. PLDZ from Arabidopsis regulates root-hair morphogenesis. It contributes to the supply of inorganic phosphorus for cell metabolism and diacylglycerol moieties for galactolipid synthesis in phosphorus-starved roots. It is also involved in root elongation during phosphate limitation.
