identifier: Pfam:PF18214
label: STATa Immunoglobulin-like domain
definition: >-
  This domain is found in signal transducer and activator of transcription A protein (STATa) present in Dictyostelium discoideum (dd). STATa is responsible for transcriptionally regulating cellular differentiation in Dictyostelium discoideum. ddSTATa is the only non-metazoan known to employ SH2 domain signaling. This domain adopts an Immunoglobulin-like fold.
