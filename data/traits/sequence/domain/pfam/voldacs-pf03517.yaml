identifier: Pfam:PF03517
label: Regulator of volume decrease after cellular swelling
definition: >-
  This entry includes ICln from animal and plants, and Lot5/Saf5 from fungi. The function of Lot5 (low temperature responsive 5) is not known. ICln, known as methylosome subunit pICln or chloride conductance regulatory protein ICln, owes these different names to its function in multiple regulatory pathways as different as ion permeation, ribonucleoprotein biosynthesis and cytoskeletal organisation. ICln can be identified both in the cytosol and in the cellular membrane, where it functions as a chloride current regulator and is important in regulating volume decrease after cellular swelling. pLCln also functions as a Sm chaperone in the stepwise snRNP assembly process. snRNPs is a RNA-protein complex esessential to the removal of introns from pre-mRNA. In humans, the core of snRNPs is composed of seven Sm proteins bound to snRNA. pLCln tethers the hetero-oligomers SmD1/D2 and SmE/F/G into a ring-shaped 6S complex, which subsequently docks onto the SMN complex. The SMN complex then removes pICln and enables the transfer of pre-assembled Sm proteins onto snRNA. Consistent with the role of human pICln, the orthologue from S. pombe is required for optimal production of the spliceosomal snRNPs and for efficient splicing. In Schizosaccharomyces pombe, Saf5 serves as a chaperone that regulates the assembly of spliceosomal U1, U2, U4 and U5 small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome, and thereby plays an important role in the splicing of cellular pre-mRNAs.
