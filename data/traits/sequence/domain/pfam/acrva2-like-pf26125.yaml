identifier: Pfam:PF26125
label: Anti-CRISPR type V subtype A2 family
definition: >-
  This protein family includes a group of proteins from tailed bacteriophagues and bacterial prophages, including AcrVA2 from Moraxella bovoculi ( ) and FinQ from Escherichia coli. AcrVA2 is an anti-CRISPR (Acr) protein that was discovered via STSS (self-targeting spacers search) with further functional TXTL (cell-free transcription-translation) assay. It has been shown to inhibit a CRISPR-associated nuclease Cas12a orthologue MbCas12a in Pseudomonas aeruginosa strains. Cas12a is an effector protein for the class 2, subtype V-A CRISPR-Cas system that has high efficiency in genome editing.The crystal structure of AcrVA2 has been solved ( ). FinQ, a transcriptional inhibitor of the F plasmid transfer gene, is a distant orthologue of AcrVA2. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). The distinguishing feature of types II, V and VI is a single, large, multi-domain effector protein, such as Cas12a in type V subtype A. Type V systems appear to have evolved, on multiple independent occasions, from TnpB proteins (predicted RuvC-like nucleases, encoded by IS605-like transposons) yielding a large pool of type V variants, many of which may become separate subtypes. Acr families are named for their type and subtype which are numbered sequentially as they are discovered.
