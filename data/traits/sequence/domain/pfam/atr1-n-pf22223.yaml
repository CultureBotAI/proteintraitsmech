identifier: Pfam:PF22223
label: ATR1 N-terminal domain
definition: >-
  Host-adapted plant pathogens secrete numerous effectors into the host extracellular spaces or inside cells. The A. thaliana TNL receptor RPP1 confers strain-specific immunity through recognition of H.arabidopsidis effector ATR1. ATR1 consists of two α-helical domains that are involved in interactions with the receptor. The ATR1 N-terminal domain interacts with both, the C-terminal jelly roll/Ig-like domain (C-JID) and the LRRs of the RPP1 receptor. This entry represents the N-terminal domain.
