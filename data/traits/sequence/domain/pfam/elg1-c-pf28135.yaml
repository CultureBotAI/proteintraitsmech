identifier: Pfam:PF28135
label: Enhanced level of genomic instability 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of enhanced level of genomic instability 1 (ELG1) from Drosophila melanogaster and similar animal proteins, including its orthologue ATPase family AAA domain-containing protein 5. ELG1 is the large subunit of the Elg1 RFC-like complex that regulates PCNA unloading from DNA during S phase. The protein is nuclear and expressed at higher levels in germline nurse cells than in somatic follicle cells. ELG1 interacts with the Enok acetyltransferase complex, specifically with Br140 protein, which may regulate PCNA-unloading activity. Atad5 has an important role in DNA replication and in maintaining genome integrity during replication stress. It modulates the RAD9A interaction with BCL2 and thereby induces DNA damage-induced apoptosis. This domain contains multiple short helical regions in Atad5 while ELG1 contains disordered regions. Its specific function is unknown.
