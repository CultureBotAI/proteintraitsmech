identifier: Pfam:PF14314
label: Virus-capping methyltransferase, MT domain
definition: >-
  This entry represents the methyltransferase region of the Mononegavirales single-stranded RNA viral RNA polymerase enzymes, mainly from Mononegavirales single-stranded RNA viral RNA polymerase enzymes (L proteins). This region is involved in the mRNA-capping of the virion particles.
