identifier: Pfam:PF20681
label: Domain of unknown function (DUF6818)
definition: >-
  This presumed domain is functionally uncharacterised. It is found in proteins from fungi, and is typically between 39 and 76 amino acids in length. There are several conserved motifs, Y/FxN, KF and KPTG and a highly conserved W residue at the N-terminal. Structural predictions indicate this domain may fold into three α-helices.
