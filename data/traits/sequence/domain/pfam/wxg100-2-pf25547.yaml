identifier: Pfam:PF25547
label: WXG100 like domain
definition: >-
  This entry represents a domain found towards the N-terminal of the Mycobacterium tuberculosis Outer membrane channel protein CpnT ( ) and similar sequences from actinomycetes. Members of this group are related to the WXG100 superfamily. CpmT has a dual function in the uptake of nutrients and the induction of host cell death. It has been suggested that this domain acts as a membrane channel. However, structure prediction does not show any regions of hydrophobic surface that would be expected in a channel protein. The secreted C-terminal toxic domain (TNT, ) acts as a glycohydrolase, which hydrolyses the essential cellular coenzyme NAD+ in the cytosol of infected macrophages, leading to necrotic host cell death. Both functions are required for survival, replication and cytotoxicity of the microorganism in macrophages.
