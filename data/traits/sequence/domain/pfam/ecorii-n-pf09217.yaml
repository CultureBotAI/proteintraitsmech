identifier: Pfam:PF09217
label: Restriction endonuclease EcoRII, N-terminal
definition: >-
  There are four classes of restriction endonucleases: types I, II, III and IV. All types of enzymes recognise specific short DNA sequences and carry out the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. They differ in their recognition sequence, subunit composition, cleavage position, and cofactor requirements, as summarised below: Type I enzymes ( ) cleave at sites remote from recognition site; require both ATP and S-adenosyl-L-methionine to function; multifunctional protein with both restriction and methylase ( ) activities. Type II enzymes ( ) cleave within or at short specific distances from recognition site; most require magnesium; single function (restriction) enzymes independent of methylase. Type III enzymes ( ) cleave at sites a short distance from recognition site; require ATP (but doesn't hydrolyse it); S-adenosyl-L-methionine stimulates reaction but is not required; exists as part of a complex with a modification methylase methylase ( ). Type IV enzymes target methylated DNA. This entry represents the N-terminal effector-binding domain of the type II restriction endonuclease EcoRII, which has a DNA recognition fold, allowing for binding to 5'-CCWGG sequences. It assumes a structure composed of an eight-stranded β-sheet with the strands in the order of b2, b5, b4, b3, b7, b6, b1 and b8. They are mostly antiparallel to each other except that b3 is parallel to b7. Alternatively, it may also be viewed as consisting of two mini β-sheets of four antiparallel β-strands, sheet I from β-strands b2, b5, b4, b3 and sheet II from strands b7, b6, b1, b8, folded into an open mixed β-barrel with a novel topology. Sheet I has a simple Greek key motif while sheet II does not. The domain represented by this entry is on…
