identifier: Pfam:PF27224
label: YfjT
definition: >-
  This entry represents YfjT/B and similar uncharacterised proteins found in Escherichia coli. These proteins are 155 amino acid and contain an N-terminal signal peptide. YfjT and YkfB are predicted to be secreted based on their signal peptide sequences. The function of this proteins remains to be characterised.
