identifier: Pfam:PF25014
label: NET2A-like domain
definition: >-
  This entry represents a domain found in Protein NETWORKED 2A/B/C/D from Arabidopsis thaliana (NET2A/B/C/D), Kinase-interacting protein 1 (KIP1) from Petunia integrifolia and similar plant proteins. This domain is predicted to adopt an all-α configuration. Plant-specific Networked 2 (NET2) family of actin-binding proteins localise to the actin cytoskeleton and specify different membrane compartments. NET2A, the founding member of this family, associates with F-actin at the plasma membrane in growing pollen tubes. This protein is anchored at the plasma membrane and predominates at cell junctions, the plasmodesmata, and is probably involved in mediating actin-membrane interactions. KIP1, another member of the NET2 family, interacts very strongly with PRK1-K , a receptor-like kinase of petunia, and is probably involved in the receptor-like kinase-mediated signal transduction pathway.
