identifier: Pfam:PF19528
label: STM0557-like, N-terminal glycosyltransferase domain
definition: >-
  This family of integral membrane proteins includes Inner membrane protein STM0557 from Salmonella typhimurium ( ) and similar sequences mainly found in bacteria. STM0557 is involved in the the addition of glucose to the galactose moiety of the S.Typhimurium O-antigen via an alpha 1-4 linkage. There is a conserved NYL sequence motif. This entry was previously known as DUF6056.
