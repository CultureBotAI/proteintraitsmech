identifier: Pfam:PF23109
label: RTEL1 helicase, ARCH domain
definition: >-
  This domain is found in Regulator of telomere elongation helicase 1. The ARCH domain follows the N-terminal Rad3-like domain (). The structure of the ARCH domain is predicted to share similarity with the ARCH domain of XPD despite low sequence similarity and to contain a four-stranded antiparallel β-sheet with four α-helices packed on it. This domain contains two large insertions that are not present in XPD. The ARCH domain probably plays a key role by interacting with the DNA translocating strand. Mutation found within this domain also emphasise the importance of the Rtel1 ARCH domain. Regulator of telomere elongation helicase 1 (Rtel1) is the animal functional analogue of yeast Srs2, which is a DNA helicase and DNA-dependent ATPase involved in DNA repair and checkpoint recovery. Rtel1 is an essential DNA helicase that disassembles a variety of DNA secondary structures to facilitate DNA replication, repair, and recombination processes, and to maintain both telomeric and genomic stability. It is recruited by Trf2 to telomeres in S phase to promote T-Loop unwinding. It is also required for the export and the correct cytoplasmic trafficking of the small nuclear (sn) RNA pre-U2, a component of the major spliceosome complex. Human Rtel1 is implicated in the etiology of Dyskeratosis congenital (DC, is an inherited bone marrow failure and cancer predisposition syndrome). Point mutations in its helicase domains, and truncations which result in loss of its C terminus have been discovered in DC families. It acts as anti-recombinase and antagonises homologous recombination by promoting the disassembly of D loop recombination intermediates in a reaction dependent upon ATP hydrolysis. Rtel1 is also a candidate gene influencing glioma susceptibility.
