identifier: Pfam:PF19687
label: MARF1 LOTUS domain
definition: >-
  This entry represents the first and second LOTUS domains of MARF1. This domain provides RNA-binding properties to this protein, acting as an adapter to recruit targets for the effector domain NYN at the N-terminal (RNase activity). Meiosis regulator and mRNA stability factor 1 (also known as meiosis arrest female protein 1, MARF1, or Limkain-b1) was first identified as a novel peroxisomal autoantigen that co-localizes with a subset of cytoplasmic microbodies marked by ABCD3. Later, it was found that it is an essential regulator of oogenesis required for female meiotic progression and retrotransposon surveillance, therefore, involved in the maintenance of genomic integrity. It acts as a RNAse that efficiently cleaves ssRNAs and down-regulates RNA transcripts, either at transcriptional or post-transcriptional level. It may function both as an adaptor to recruit specific RNA targets and an effector to catalyse the specific cleavages of target RNAs. MARF1 consists of three major domains, the N-terminal NYN domain, two RNA recognition motifs (RRMs) and a C-terminal repeat of LOTUS (also known as OST-HTH) domains.
