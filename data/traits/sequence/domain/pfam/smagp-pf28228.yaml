identifier: Pfam:PF28228
label: Small cell adhesion glycoprotein
definition: >-
  This entry represents the transmembrane helix in small cell adhesion glycoprotein (SMAGP) and related sequences from vertebrates. SMAGP is a small transmembrane glycoprotein that contains a single-pass type III transmembrane helix and is heavily O-glycosylated with sialic acid modifications. SMAGP is localised predominantly at lateral parts of the cell membrane at cell-cell epithelial junctions and on cytoplasmic vesicle membranes. The protein is expressed in various tissues including kidney, placenta, brain and breast. SMAGP may play a role in epithelial cell-cell contacts and tumor invasiveness.
