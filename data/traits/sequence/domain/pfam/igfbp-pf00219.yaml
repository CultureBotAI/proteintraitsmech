identifier: Pfam:PF00219
label: Insulin-like growth factor binding protein
definition: >-
  This entry represents insulin-like growth factors (IGF-I and IGF-II), which bind with high affinity to specific binding proteins in extracellular fluids. These IGF-binding proteins (IGFBP) prolong the half-life of the IGFs and have been shown to either inhibit or stimulate the growth promoting effects of the IGFs on cells culture. They seem to alter the interaction of IGFs with their cell surface receptors. There are at least six different IGFBPs and they are structurally related. The following growth-factor inducible proteins are structurally related to IGFBPs and could function as growth-factor binding proteins, mouse protein cyr61 and its probable chicken homologue, protein CEF-10 (both known as CCN family member 1); human connective tissue growth factor (CTGF) and its mouse homologue, protein FISP-12 (both known as CCN family member 2); and vertebrate protein NOV (known as CCN family member 3). Insulin-like Growth Factor Binding Proteins (IGFBP) are a group of vertebrate secreted proteins, which bind to IGF-I and IGF-II with high affinity and modulate the biological actions of IGFs. The IGFBP family has six distinct subgroups, IGFBP-1 through 6, based on conservation of gene (intron-exon) organisation, structural similarity, and binding affinity for IGFs. Across species, IGFBP-5 exhibits the most sequence conservation, while IGFBP-6 exhibits the least sequence conservation. The IGFBPs contain inhibitor domain homologues, which are related to MEROPS protease inhibitor family I31 (equistatin, clan IX). All IGFBPs share a common domain architecture ( : ). While the N-terminal ( , IGF binding protein domain), and the C-terminal ( , thyroglobulin type-1 repeat) domains are conserved across vertebrate species, the mid-region is highly variable with respect to protease cl…
