identifier: Pfam:PF01825
label: GAIN subdomain B
definition: >-
  The GPS motif is an integral part, and the most conserved region, of a much larger (320-residue approximately) domain that has been termed GPCR-Autoproteolysis INducing (GAIN) domain. The GAIN domain represents an autoproteolytic fold whose function is relevant for GPCR signalling and may regulate this process. The GPS motif is an essential element for receptor function and needs to be within the context of the GAIN domain to mediate autoproteolysis. GPS (for GPCR proteolytic site) motif is found in a number of G-protein-coupled receptors (GPCRs) including CIRLs/latrophilins and in other membrane-associated proteins like the sea urchin receptor for egg jelly protein (REJ). For the CIRL-1, CIRL-2, CIRL-3 and CD-97 proteins, it has been shown that they are each made of two non-covalently bound subunits resulting from the endogenous proteolytic cleavage of a precursor protein. Because the cysteine-rich domain of CIRL-1 and possibly other receptors is involved in the endogenous proteolytic processing of CIRL-1 and possibly other receptors, it has been named GPS for GPCR proteolytic site. As the amino acids surrounding the putative cleavage site are the most conserved residues in the GPS domain, it has been suggested that all proteins containing it may be cleaved at this position. GPS motifs are about 50 residues long and contain either 2 or 4 cysteine residues that are likely to form disulphide bridges. Based on conservation of these cysteines the following pairing can be predicted. +-----------------+ | | +-----------------+---------------+ | | | | | XXXCXXXXXXXXXXXXXXXXXCXXXXXXXXXXXXXXXCXCXXLTXXXXXXX ^ cleavage site
