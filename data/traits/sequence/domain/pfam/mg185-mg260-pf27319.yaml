identifier: Pfam:PF27319
label: MG185/MG260
definition: >-
  This entry represents a domain in MG185/MG260/MPN_363 and similar lipoproteins found in bacteria. This domain is found in uncharacterised lipoproteins that are anchored to the cell membrane via lipid modifications. Members contain a signal peptide and lipid anchor sites for N-palmitoyl cysteine and S-diacylglycerol cysteine. The domain is found primarily in Mycoplasmatota, particularly in Mycoplasmoidaceae. The function of this domain remains to be determined.
