identifier: Pfam:PF29541
label: F36G3.1 C-terminal domain
definition: >-
  This entry represents a very small domain found at the C-terminal of the uncharacterised protein F36G3.1 from nematodes. The protein is found across nematode species including Caenorhabditis elegans and related species. The full-length protein contains disordered regions at the N-terminal and a coiled-coil domain. The function of this specific domain remains to be determined.
