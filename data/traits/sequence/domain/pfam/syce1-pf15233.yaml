identifier: Pfam:PF15233
label: Synaptonemal complex central element protein 1
definition: >-
  Synaptonemal complex central element protein 1 is a major component of the transverse central element of synaptonemal complexes (SCS), formed between homologous chromosomes during meiotic prophase. It requires the transverse filament protein-SYCP1 in order to be incorporated into the central element. It may have a role in the synaptonemal complex assembly, stabilisation and recombination.
