identifier: Pfam:PF08887
label: GAD-like domain
definition: >-
  This entry represents the N-terminal domain of the type VI secretion system (T6SS) immunity protein Tdi1 from Agrobacterium tumefaciens (Atu4351, ) and other bacterial proteins. This domain, which appears to be distantly related to the GAD domain , folds into a a seven-stranded twisted antiparallel β-sheet, a two-stranded antiparallel β-sheet, and six helices. There is a positive groove that extends to the C-terminal domain ( , which may exist as an insertion), likely to play a role in nucleotide binding.
