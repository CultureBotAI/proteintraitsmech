identifier: Pfam:PF05991
label: YacP-like NYN domain
definition: >-
  This entry represents Ribosome-associated endoribonuclease 1 (Rae1) also known as YacP. Rae1 associates with the ribosome and cleaves between specific codons of mRNAs in a translation- and reading frame-dependent manner. It cleaves the yrzI operon mRNA within a short open reading frame called S1025 which encodes a 17-residue peptide. The cleavage occurs between a GAG (Glu) and an AAG (Lys) codon in positions 13 and 14 of the S1025 coding sequence. Also cleaves the polycistronic bmrBCD operon, which codes for the multidrug transporter bmrCD, in the intergenic region between bmrB and bmrC within an unannotated open reading frame bmrX. Cleavage of bmrX occurs between an AAA (Lys) and an AUA (Ile) codon at positions 22 and 23. Its crystal structure reveal an N-terminal NYN/PIN domain with an exposed active site and a flexible putative C-terminal RNA binding domain that consists of two α-helices.
