identifier: Pfam:PF31170
label: ABC transporter C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 65 residues found in ABC transporter ATP-binding proteins in Streptomyces and other Actinomycetes. This domain is located C-terminal to the ABC transporter domain ( ). The function of this C-terminal extension remains to be determined.
