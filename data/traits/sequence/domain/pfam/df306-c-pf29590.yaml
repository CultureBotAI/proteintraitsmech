identifier: Pfam:PF29590
label: Defensin-like protein 306 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of defensin-like protein 306 and related proteins found in plants, including Putative defensin-like proteins 305 and 307. The full-length proteins belong to the DEFL family and are secreted antimicrobial peptides involved in plant defence. These proteins contain multiple disulphide bonds but some like Putative defensin-like proteins 305 and 307 lack one of the four disulfide bonds, which are conserved features of the family. The function of this domain remains to be determined.
