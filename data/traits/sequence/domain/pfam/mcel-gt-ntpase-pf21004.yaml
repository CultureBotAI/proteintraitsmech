identifier: Pfam:PF21004
label: mRNA capping enzyme catalytic subunit, GTase, NTPase domain
definition: >-
  mRNA-capping enzyme catalytic subunit from Vaccinia virus (MCEL, also known as mRNA-capping enzyme D1 subunit) catalyses the hydrolysis of the 5' triphosphate end of the pre-mRNA, the capping of the resulting diphosphate RNA end with GMP and the methylation of the GpppN cap [1-3]. It consists of an N-terminal RNA triphosphatase (TPase)-guanylyltransferase (GTase) module, and a C-terminal guanine-N7-methyltransferase (MTase) module ( ). The N-terminal module comprises a TPase domain ( ), followed by the GTase at the C-terminal, which consists of the nucleotidyltransferase (NTPase, this entry) and OB fold ( ) domains. The TPase and GTase modules stabilise their active conformations and their contacts also clamp the NTase and OB fold.
