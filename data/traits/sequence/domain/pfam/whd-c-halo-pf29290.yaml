identifier: Pfam:PF29290
label: Winged helix C-terminal domain
definition: >-
  This entry represents a winged helix-turn-helix domain of approximately 55-60 amino acids found at the C terminus of proteins in halophilic archaea. This entry is restricted to Halobacteria, particularly the families Natrialbaceae, Haloarculaceae and Haloferacaceae. Winged helix-turn-helix domains typically function as DNA-binding domains in transcriptional regulators. This domain is found C-terminal to other domains. The function of this domain remains to be determined.
