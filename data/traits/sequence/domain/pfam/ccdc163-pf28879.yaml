identifier: Pfam:PF28879
label: Transmembrane protein CCDC163
definition: >-
  This entry represents the transmembrane protein CCDC163. CCDC163 is a transmembrane protein containing a single transmembrane helix and predicted coiled-coil domains. The protein is 145 amino acids in length and is found across mammalian species. The transmembrane region is located at approximately residues 38-54, with the conserved domain spanning residues 67-107. The protein shows low tissue specificity in expression.
