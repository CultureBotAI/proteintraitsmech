identifier: Pfam:PF19327
label: Ap4A phosphorylase N-terminal domain
definition: >-
  This entry represents the N-terminal HIT-like domain from the Ap4A phosphorylase enzyme. This entry represents a group of ATP adenylyltransferases found in bacteria and lower eukaryotes which catalyse the interconversion of Ap4A to ATP and ADP. While these enzymes are thought to act primarily to break down Ap4A, there is evidence to suggest that in some circumstances they may also act in a biosynthetic role. Some variability in substrate range is apparent (e.g., the cyanobacterial enzyme can also utilise Ap3A as a substrate, while the Saccharomyces enzymes apparently cannot). Proteins in this entry include Apa1 and Apa2 from budding yeasts. Apa1 is a bifunctional Diadenosine 5',5'''-P1,P4-tetraphosphate phosphorylase and ADP sulfurylase involved in catabolism of bis(5'-nucleosidyl) tetraphosphates. Apa2 is a Diadenosine 5',5'''-P1,P4-tetraphosphate phosphorylase II.
