identifier: Pfam:PF13495
label: Phage integrase, N-terminal SAM-like domain
definition: >-
  Proteins containing this domain cleave DNA substrates by a series of staggered cuts, during which the protein becomes covalently linked to the DNA through a catalytic tyrosine residue at the carboxy end of the alignment. The phage integrase N-terminal SAM-like domain is almost always found with the signature that defines the phage integrase family (see ).
