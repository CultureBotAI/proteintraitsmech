label: Family of unknown function (DUF6866) N-terminal domain
definition: >-
  This entry (previously known as DUF21739) represents the N-terminal α+β domain found Sfum_1244 ( ) from the selenoprotein-rich species Syntrophobacter fumaroxidans, which are uncharacterised proteins that occur primarily in Pseudomonadota and Thermodesulfobacteriota. The function of these proteins is unknown.
