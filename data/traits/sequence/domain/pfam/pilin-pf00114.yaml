identifier: Pfam:PF00114
label: Pilin (bacterial filament)
definition: >-
  Pilin is a component of type IV pilus (T4P), a polar flexible filament, which consists of a single polypeptide chain arranged in a helical configuration of five subunits per turn, which is involved cell adhesion, microcolony formation, twitching motility and transformation. Gram-negative bacteria produce pilin which is characterised by the presence of a very short leader peptide of 6 to 7 residues, followed by a methylated N-terminal phenylalanine residue and by a highly conserved sequence of about 24 hydrophobic residues, of the NMePhe type pilin.
