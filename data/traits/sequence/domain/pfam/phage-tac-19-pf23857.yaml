identifier: Pfam:PF23857
label: Phage tail chaperone protein
definition: >-
  This entry represents a family of proteins structurally similar to phage tail chaperone proteins and found in viruses and bacteria. The family contains proteins between 50-164 amino acids in length. Phage tail chaperone proteins play a role in the assembly of the phage tail apparatus.
