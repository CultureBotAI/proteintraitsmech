identifier: Pfam:PF14260
label: C4-type zinc-finger of DNA polymerase delta
definition: >-
  In fission yeast, this zinc-finger domain appears is the region of Pol3 that binds directly to the B-subunit, Cdc1. Pol delta is a hetero-tetrameric enzyme comprising four evolutionarily well-conserved proteins: the catalytic subunit Pol3 and three smaller subunits Cdc1, Cdc27 and Cdm1.
