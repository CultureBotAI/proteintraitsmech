identifier: Pfam:PF27022
label: NAI2 C-terminal domain
definition: >-
  This entry represents the C-terminal in NAI2 proteins from plants. These proteins play roles in seedling development and ER body formation. TSK-associating protein 1 is implicated in organising spindle microtubules and forming structural links between the nuclear envelope and the cytoskeleton through interactions with proteins like TSK and GIP1. Meanwhile, TSA1-like protein is crucial for the formation and regulation of ER bodies, influencing their number and shape, and the accumulation of PYK10 within them. However, it does not participate in the PYK10 complex. These proteins interact with various partners, highlighting their importance in cellular structure and development. This domain contains a coiled-coil.
