identifier: Pfam:PF27374
label: AF_2141 family
definition: >-
  This entry represents the AF_2141 family of uncharacterised proteins found predominantly in archaea with some bacterial members. The family is found mainly in Archaeoglobaceae, particularly Archaeoglobus, with additional members in candidate division MSBL1 and some Syntrophobacterales. The proteins are approximately 228 amino acids in length and contain an N-terminal disordered region (residues 1-20) rich in basic and acidic residues. The function of this protein family remains to be determined.
