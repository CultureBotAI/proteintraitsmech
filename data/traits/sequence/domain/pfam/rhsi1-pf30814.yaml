identifier: Pfam:PF30814
label: RhsI1 immunity protein
definition: >-
  This entry represents the immunity protein RhsI1 which neutralises the Rhs1CTD toxin. RhsI1 is encoded immediately downstream of rhs1. It forms a complex with Rhs1CTD and directly inhibits its activity. RhsI1 adopts an unique α/β fold consisting of a central seven-stranded β-meander packed on one face with a small three-stranded β-sheet ( ).
