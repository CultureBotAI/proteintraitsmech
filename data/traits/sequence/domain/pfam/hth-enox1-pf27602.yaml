identifier: Pfam:PF27602
label: ENOX1-like, C-terminal helix-turn-helix domain
definition: >-
  This helix-turn-helix (HTH) domain is found at the C-terminal end of human Ecto-NOX disulfide-thiol exchanger 1 (ENOX1). ENOX1/2 probably act as terminal oxidases of plasma electron transport from cytosolic NAD(P)H via hydroquinones to acceptors at the cell surface, playing a role in control of the ultradian cellular biological clock. The activities oscillate with a period length of 24 minutes and play a role in control of the ultradian cellular biological clock.
