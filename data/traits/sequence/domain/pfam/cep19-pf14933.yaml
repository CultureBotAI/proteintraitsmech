identifier: Pfam:PF14933
label: CEP19-like protein
definition: >-
  This entry represents the centrosomal protein of 19kDa (CEP19, also known as C3orf34) from eukaryotes. It was identified by complementary proteomics methods. It associates with the mother centriole in early interphase. It localises to spindle poles during mitosis, and to distinct foci oriented towards the midbody at telophase. Its function is not clear.
