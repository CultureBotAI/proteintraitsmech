identifier: Pfam:PF29285
label: YphG-like protein, second domain
definition: >-
  This entry represents the second domain found in YphG-like proteins from bacteria. This domain of approximately 80-90 residues adopts a β-sandwich fold and is located between an N-terminal domain ( , DUF5107) and C-terminal tetratricopeptide repeat (TPR) regions. YphG from Escherichia coli is an uncharacterised protein of 1093 residues. The protein is found across diverse bacterial taxa including Pseudomonadati, Bacillati, Actinomycetota, Bacteroidota, and Bacillota. The function of this domain remains to be determined.
