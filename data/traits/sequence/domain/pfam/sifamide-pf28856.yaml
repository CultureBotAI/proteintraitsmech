identifier: Pfam:PF28856
label: SIFamide-related peptide
definition: >-
  This entry represents the SIFamide neuropeptide precursor mainly found in insects. SIFamide is a highly conserved 12-amino acid neuropeptide that functions as a ligand for the SIFamide receptor. The peptide modulates sexual behaviour by negatively regulating female receptivity to male courtship and plays a role in male sex discrimination. SIFamide is also involved in promoting sleep. The precursor is secreted and processed to release the mature amidated peptide. This neuropeptide is expressed in the pars intercerebralis and belongs to the FARP (FMRFamide related peptide) family.
