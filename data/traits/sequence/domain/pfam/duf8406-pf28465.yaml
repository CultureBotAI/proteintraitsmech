identifier: Pfam:PF28465
label: Domain of unknown function (DUF8406)
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an α/β structure composed of a curved β-sheet and α-helices packed on the concave side of it. It contains two highly conserved cysteine residues predicted to form disulfide bond. This domain is flanked by regions predicted as transmembrane.
