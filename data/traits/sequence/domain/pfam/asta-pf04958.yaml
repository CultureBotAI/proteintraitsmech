identifier: Pfam:PF04958
label: Arginine N-succinyltransferase beta subunit
definition: >-
  Arginine N-succinyltransferase catalyses the transfer of succinyl-CoA to arginine to produce succinylarginine. This is the first step in arginine catabolism via the arginine succinyltransferase pathway. Six major L-arginine-degrading pathways have been described for prokaryotes. Arginine succinyltransferase AstA ( ) is the first enzyme of the succinyltransferase (AST) pathway operon consists of five genes. In a few species, such as Pseudomonas aeruginosa, arginine succinyltransferase consist of a heterodimer of subunits alpha (AstA) and beta (AruG).
