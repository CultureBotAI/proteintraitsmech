identifier: Pfam:PF13735
label: tRNA nucleotidyltransferase domain 2 putative
definition: >-
  This entry represents the C-terminal domain of the CCA-adding enzymes. It is a putative tRNA nucleotidyltransferase domain. CCA-adding enzymes are responsible for the synthesis and repair of the 3' terminal CCA sequence of tRNA molecules. They are encoded by essential genes in almost all organisms and add the three ribonucleotides C, C, and A to the 3' end of tRNAs in sequential order.
