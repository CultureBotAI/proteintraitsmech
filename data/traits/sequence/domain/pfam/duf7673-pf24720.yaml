identifier: Pfam:PF24720
label: Family of unknown function (DUF7673)
definition: >-
  This entry represents an uncharacterised family of proteins, which are typically between 100 and 122 amino acids in length. This protein is often found to be plasmid borne and in a few cases is associated with ParBc domains that are critical for plasmid segregation. This suggests that this domain may play a role in chromosome segregation or plasmid partitioning. Structural modelling suggests this domain will form a homodimeric complex.
