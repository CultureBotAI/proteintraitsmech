identifier: Pfam:PF19574
label: Outer membrane lipoprotein carrier protein LolA-like
definition: >-
  In Escherichia coli, lipoproteins are anchored to the periplasmic side of either the inner or outer membrane through N-terminal lipids, depending on the lipoprotein-sorting signal present at position 2. Five Lol proteins are involved in the sorting and outer membrane localization of lipoproteins. LolCDE, an ATP binding cassette (ABC) transporter, in the inner membrane releases outer membrane-directed lipoproteins from the inner membrane in an ATP-dependent manner, leading to the formation of a water-soluble complex between the lipoprotein and the molecular chaperone, LolA. The LolA-lipoprotein complex crosses the periplasm and then interacts with outer membrane receptor LolB, which is essential for the anchoring of lipoproteins to the outer membrane. E. coli lipoproteins are anchored to the inner or outer membrane depending on the residue at position 2. Aspartate at this position makes lipoproteins specific to the inner membrane, whereas other residues cause the release of lipoproteins from the inner membrane.
