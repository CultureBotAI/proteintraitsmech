identifier: Pfam:PF30388
label: MP81-like, OB fold domain
definition: >-
  This entry represents the OB fold domain found at the C-terminal of RNA-editing complex protein MP81 ( , also known as KREPA1) from Trypanosoma brucei brucei and related sequences from Trypanosomatida, such as Uncharacterized protein Tb927.8.680 in which it is the only domain. The editing process is performed by the editosome, a multi-protein complex that catalyses the insertion and deletion of uridylates (U) that occurs during RNA editing. Uridylate insertion/deletion editing, which appears to be unique to these organisms, processes most mitochondrial pre-mRNAs to produce mature mRNAs. Editosomes consist of several components and in Trypanosoma that include: REL1/MP52 and REL2/Mp48 RNA ligases; MP18, MP42, MP63 and MP81 that contain zinc fingers and an OB fold domain at the C-terminal. This entry also includes KREPA5 ( ), which is a monodomain protein.
