identifier: Pfam:PF22779
label: Shieldin complex subunit 2, second OB fold domain
definition: >-
  This entry represents the second OB fold domain found in the middle of Shieldin complex subunit 2 (SHLD2, formerly known as FAM35A) and in similar sequences mainly found in vertebrates. SHLD2 is a component of the shieldin complex, which plays an important role in repair of DNA double-stranded breaks (DSBs). In some homologues, this domain has undergone changes and decay and have lost the barrel-like shape.
