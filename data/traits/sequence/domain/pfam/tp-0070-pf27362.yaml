identifier: Pfam:PF27362
label: TP_0070
definition: >-
  This entry represents the uncharacterised protein TP_0070 from Treponema pallidum and related spirochetes. The protein is 128 amino acids in length and contains four transmembrane helices forming a four-helix bundle. The protein is predicted to be localised to the cell membrane as a multi-pass membrane protein. The function of this protein remains to be determined.
