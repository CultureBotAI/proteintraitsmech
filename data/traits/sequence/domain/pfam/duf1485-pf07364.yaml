identifier: Pfam:PF07364
label: Metallopeptidase family M81
definition: >-
  Proteins in this entry are involved in degradation of the cyanobacterial heptapeptide hepatotoxin microcystin LR, and are encoded in the mlr gene cluster. MlrC from Sphingomonas wittichii (strain RW1 / DSM 6014 / JCM 10273) is believed to mediate the last step of peptidolytic degradation of the tetrapeptide. It is suspected to be a metallopeptidase based on homology to known peptidases and its inhibition by metal chelators. The proteins encoded by the mlr cluster may be involved in cell wall peptidoglycan cycling and subsequently act fortuitously in hydrolysis of microcystin LR. This entry represents the N-terminal region of these proteins.
