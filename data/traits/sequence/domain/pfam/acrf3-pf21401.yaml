identifier: Pfam:PF21401
label: Cas3 inhibitor AcrF3
definition: >-
  AcrF3 , a protein encoded by gene 35 from phage JBD5, has been reported to specifically inhibit the Cas3 protein of the P. aeruginosa PA14 strain (PaCas3) and to counteract the type I-F CRISPR-Cas system. AcrF3 eluted as a dimer in gel-filtration chromatography. In the complex structure, AcrF3 binds to PaCas3 at a ratio of 2:1, suggesting that AcrF3 functions as a homodimer that inhibits PaCas3. A single AcrF3 molecule has a two-layer architecture with six α-helices.
