identifier: Pfam:PF06440
label: DNA polymerase III, theta subunit
definition: >-
  This entry represents the theta subunit of DNA polymerase III from bacteria, whose core structure consists of an irregular array of three helices. DNA polymerase III (Pol III) is the primary enzyme responsible for replication of Escherichia coli chromosomal DNA. The holoenzyme consists of 17 proteins and contains two core polymerases. The Pol III catalytic core has three tightly associated subunits: alpha, epsilon and theta. The alpha subunit is responsible for the DNA polymerase activity, while the epsilon subunit is the 3'-5' proofreading exonuclease. The epsilon subunit binds to both the alpha and theta subunits in the linear order α-ε-theta. The theta subunit is the smallest, and may act to enhance the proofreading activity of epsilon, especially under extreme conditions.
