identifier: Pfam:PF13304
label: AAA domain, putative AbiEii toxin, Type IV TA system
definition: >-
  This entry represents a C-terminal domain of approximately 65 residues found in ABC transporter ATP-binding proteins. The domain is located C-terminal to ABC_tran ( ) and AAA_21 ( ) domains. Many of these proteins are annotated as multidrug ABC transporters or ABC-2 type transport systems, including some daunorubicin/doxorubicin resistance proteins. This family is found almost exclusively in Actinomycetota, particularly Streptomyces. The function of this domain remains to be determined.
