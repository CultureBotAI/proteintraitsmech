identifier: Pfam:PF04486
label: SchA/CurD like domain
definition: >-
  Proteins having this domain have been identified mainly in species of the Streptomyces genus. Two of them are known to be part of gene clusters involved in the synthesis of polyketide-based spore pigments, homologous to clusters involved in the synthesis of polyketide antibiotics. Their function is unknown, but they has been speculated to contain a NAD(P) binding site. Many of these proteins contain two copies of the domain.
