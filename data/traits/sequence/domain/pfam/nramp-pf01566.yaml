identifier: Pfam:PF01566
label: Natural resistance-associated macrophage protein-like
definition: >-
  The natural resistance-associated macrophage protein (NRAMP) family consists of animal NRAMP1, NRAMP2 (DMT1), yeast proteins Smf1 and Smf2 and bacterial homologues such as divalent metal cation transporters (MntH). The NRAMP family includes functional related proteins defined by a conserved hydrophobic core of ten transmembrane domains. These membrane proteins are divalent cation transporters which have a high degree of sequence conservation, particularly, the residues contributing to ion interaction are strongly conserved (DPGN and MPH motifs). NRAMP1 is an integral membrane protein expressed exclusively in cells of the immune system and is recruited to the membrane of a phagosome upon phagocytosis, where it plays an essential role in host defense against pathogens. Mutations in NRAMP1 may genetically predispose an individual to susceptibility to diseases including leprosy and tuberculosis. NRAMP2 (DMT1) is a multiple divalent cation transporter broadly expressed in the duodenum, kidney, brain, testis and placenta. It transports Fe2+, Mn2+ and Cd+2, whereas Zn2+ is a poor substrate. Ca+2 and Mg+2 are not transported, which is important because their high concentrations in duodenum, where NRAMP2 is expressed at high levels, would interfere with the absorption of Fe2+. It is the major transferrin-independent iron uptake system in mammals. NRAMP related members of this family have substrate specificity for Mn2+ and/or Mg2+, such as the yeast proteins Smf1 and Smf2 and a group of bacterial transporters (NrmT, for Nramp-related magnesium transporter). This entry also includes related metal transporters such as nitrite/nitrate transporters.
