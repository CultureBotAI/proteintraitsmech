identifier: Pfam:PF18142
label: SMODS and SLOG-associating 2TM effector domain
definition: >-
  The SLATT domain contains two transmembrane helices. SLATT domains are generally predicted to function in bacteria as pore-forming effectors in a class of conflict systems which are reliant on the production of second messenger nucleotide or nucleotide derivatives. SLATT domains are predicted to initiate cell suicide responses upon their activation. The role of this fungal family is not yet understood, although the expansion of the family in many fungal lineages points to a potential role in conflict.
