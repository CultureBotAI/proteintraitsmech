identifier: Pfam:PF01202
label: Shikimate kinase
definition: >-
  Shikimate kinase ( ) catalyses the fifth step in the biosynthesis of aromatic amino acids from chorismate (the so-called shikimate pathway). The enzyme catalyses the following reaction: ATP + shikimate = ADP + shikimate-3-phosphate The protein is found in bacteria (gene aroK or aroL), plants and fungi (where it is part of a multifunctional enzyme that catalyses five consecutive steps in this pathway). In 1994, the 3D structure of shikimate kinase was predicted to be very close to that of adenylate kinase, suggesting a functional similarity as well as an evolutionary relationship. This prediction has since been confirmed experimentally. The protein is reported to possess an α/β fold, consisting of a central sheet of five parallel β-strands flanked by α-helices. Such a topology is very similar to that of adenylate kinase. The N terminus of threonine synthase-like 1 from metazoan shares protein sequence similarity with shikimate kinase and is included in this entry. However, their functions may be different.
