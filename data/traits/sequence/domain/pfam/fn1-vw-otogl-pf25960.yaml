identifier: Pfam:PF25960
label: Otogelin-like Fn1-VW hybrid domain
definition: >-
  This entry represents a Fn1-VW hybrid domain in Otogelin proteins from vertebrates. The Fn1-VW hybrid domain combines the VW β-sandwich with an Fn1-like subdomain (antiparallel β-sheets linked by loops). Otogelin is a structurally complex glycoprotein with specialised roles in the inner ear membranes. While it shares some structural similarities with mucins, including von Willebrand factor-like domains and cysteine-rich regions, it differs in its glycosylation patterns and functions. Otogelin undergoes primarily N-glycosylation and plays a critical role in the organisation of the extracellular matrix within the inner ear. Otogelin proteins are specific to the acellular membranes of the inner ear. Otogelin and Otogelin-like proteins are potentially involved in the anchoring of otoconial membranes and cupulae to the underlying neuroepithelia in the vestibule. They may also play a role in the organisation and stabilisation of the fibrillar network that composes the tectorial membrane in the cochlea. Additionally, these proteins might be involved in mechanotransduction processes, which are crucial for the conversion of mechanical stimuli in neural signals in the auditory system.
