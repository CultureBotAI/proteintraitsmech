identifier: Pfam:PF04884
label: Vitamin B6 photo-protection and homoeostasis domain
definition: >-
  This domain is found in a group of root UVB sensitive plant proteins and their eukaryotic RUS homologues. In plants, this domain plays a role in auxin-transport, plant growth and development and appears to be expressed by all cells in the plant as well as in plastids. This group of proteins has been shown to play a role in vitamin B6 photo-protection and homoeostasis in plants. This domain is predicted to adopt a similar structure to other major facilitator superfamily (MFS) membrane transporters, consisting of several transmembrane helices.
