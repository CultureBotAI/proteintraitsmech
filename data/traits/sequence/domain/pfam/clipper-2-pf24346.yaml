identifier: Pfam:PF24346
label: CLIPPER 2 domain
definition: >-
  This domain of unknown function is found in multiple copies in a number of bacterial proteins. It is closely related to domains represented by DUF11 ( ). Similarly to DUF11, this domain contains a conserved N-terminal lysine and a C-terminal asparagine with central aspartate/glutamate residues suggesting that it may contain an isopeptide bond. In addition, it contains a semi-conserved TNTGNV sequence motif in which a highly conserved asparagine probably plays a role in stabilising the rod structure formed by repetitive copies of this domain.
