identifier: Pfam:PF27169
label: YNQ2 N-terminal helical hairpin domain
definition: >-
  This entry represents the N-terminal helical hairpin domain of YNQ2, an uncharacterised protein from Paracoccus denitrificans. The protein is located in the nqo2 3' region and may be involved in the transfer of iron-sulfur clusters to the NADH dehydrogenase complex or in the assembly of the NADH dehydrogenase complex. The specific function of this N-terminal helical hairpin domain remains to be determined.
