identifier: Pfam:PF30222
label: Spore crust protein CgeA C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the spore crust protein CgeA from Bacillus subtilis and related bacteria. CgeA is involved in the formation of the spore crust, the outermost layer of the spore. CgeA plays a role in crust glycosylation and is required to initiate spore polysaccharide (SPS) assembly. The C-terminal half of CgeA is necessary for SPS addition. The function of this domain remains to be determined. It covers the whole length of the protein in many menbers.
