identifier: Pfam:PF26795
label: Domain of unknown function (DUF8265)
definition: >-
  This domain is found in uncharacterised proteins mainly from alphaproteobacteria. It is predicted to fold into an α/β structure composed of a four-stranded β-sheet and α-helix. It contains to highly conserved cysteine residues that are predicted to form disulfide bond bridging the α-helix and the β-sheet. Besides the conserved cysteine residues, this domain contains a conserved NLxDP sequence motif which may have a functional role.
