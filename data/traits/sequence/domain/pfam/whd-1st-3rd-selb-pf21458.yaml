identifier: Pfam:PF21458
label: Selenocysteine-specific elongation factor, winged helix 1/3
definition: >-
  This domain is found in Selenocysteine-specific elongation factor SelB from Escherichia coli ( ) and in similar proteins mainly found in enterobacteria. SelB is a translation factor necessary for the incorporation of selenocysteine into proteins. SelB is composed of a N-terminal region, and a C-terminal extension that consists of four winged-helix (WH) domains arranged in tandem. This entry represents the first of these domains, each of which contains three α-helices flanked by a three-stranded antiparallel β-sheet.
