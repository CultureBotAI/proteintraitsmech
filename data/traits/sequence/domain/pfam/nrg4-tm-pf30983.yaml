identifier: Pfam:PF30983
label: Neuregulin-4 C-terminal transmembrane region
definition: >-
  This entry represents the C-terminal region of neuregulin-4 (NRG4) found in vertebrates. This region contains a single transmembrane helix and a cytoplasmic tail. NRG4 is a type I membrane protein with an N-terminal EGF-like domain ( ) that acts as a low affinity ligand for the ERBB4 tyrosine kinase receptor. The soluble growth factor form is released by proteolytic cleavage near the membrane. The specific function of the cytoplasmic region remains to be determined.
