identifier: Pfam:PF27175
label: YodN second domain
definition: >-
  This entry represents the second central domain of the YodN protein found in Bacillus subtilis. This domain adopts an SH3-like barrel fold. YodN is required for efficient spore germination in response to both L-alanine and a mixture of L-asparagine, D-glucose, D-fructose and potassium ions (AGFK). The function of this protein remains to be determined.
