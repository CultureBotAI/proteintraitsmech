identifier: Pfam:PF21502
label: Oxalate biosynthetic component 1, cap domain
definition: >-
  This domain is found in a group of proteins mainly from proteobacteria, including the bifunctional enzyme Oxalate biosynthetic component 1 from Burkholderia pseudomallei (Obc1, ). This entry represents the cap domain of Obc1, which adopts an α-helical fold, with two layers of anti-parallel helices.
