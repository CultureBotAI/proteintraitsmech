identifier: Pfam:PF22279
label: DGF-1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain present in DGF-1 (Dispersed gene family protein 1) from Trypanosoma, one of the most abundant proteins in T. cruzi genome. It seems to have a preferential expression in amastigotes (intracellular replicative forms that develop in the mammalian host). The function of this protein is not yet clear, however, it is likely to play a role in cell-to-cell interactions or signal transduction.
