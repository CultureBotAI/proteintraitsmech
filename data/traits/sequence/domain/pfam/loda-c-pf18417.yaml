identifier: Pfam:PF18417
label: L-lysine epsilon oxidase C-terminal domain
definition: >-
  This is the C-terminal domain found in antimicrobial protein (LodA) with lysine-epsilon oxidase activity ( ) which is produced by Gram-negative marine bacteria such as Marinomonas mediterranea. The enzyme, previously named marinocine, catalyzes the oxidative deamination of l-lysine into 6-semialdehyde 2-aminoadipic acid, ammonia, and hydrogen peroxide (H2O2). Orthologous proteins have been detected in other bacterial genera, where they participate in biofilm development and dispersal. It has been shown that M. mediterranea LodA and its homologues induce cell death in the microcolonies formed in the process of biofilm development due to the hydrogen peroxide generated by their enzymatic activity. Moreover, cells dispersed from the biofilm by means of this mechanism show a phenotypic variation in growth and biofilm formation. The active form of LodA containing the quinonic cofactor is generated intracellularly only in the presence of LodB, suggesting that the latter protein is involved in this process.
