identifier: Pfam:PF27076
label: Rv1486c-like protein, C-terminal domain
definition: >-
  This entry represents the C-terminal domain (approximately residues 168-288) of uncharacterised proteins found in mycobacteria. Members of this family include Rv1486c from Mycobacterium tuberculosis, Mb1522c from M. bovis, ML1804 from M. leprae, and MAV321 from M. avium. This domain forms the second part of a two-domain protein architecture, following the N-terminal domain (Rv1486c_N). The function of this C-terminal domain remains unknown.
