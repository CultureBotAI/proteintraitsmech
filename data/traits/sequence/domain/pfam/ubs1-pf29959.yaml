identifier: Pfam:PF29959
label: Ubiquitin-conjugating enzyme suppressor 1
definition: >-
  This entry represents the N-terminal domain of ubiquitin-conjugating enzyme suppressor 1 (UBS1) family found in yeasts. UBS1 is a nuclear protein whose elevated expression suppresses the conditional cell cycle defects associated with UBC3/CDC34 mutations. The protein is involved in protein export from the nucleus and protein ubiquitination. UBS1 contains a disordered C-terminal region. The precise molecular function of this entry remains to be determined.
