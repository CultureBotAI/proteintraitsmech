identifier: Pfam:PF05930
label: Prophage CP4-57 regulatory protein (AlpA)
definition: >-
  This family consists of several short bacterial and phage proteins which are related to the E. coli protein AlpA. AlpA suppresses two phenotypes of a delta lon protease mutant, overproduction of capsular polysaccharide and sensitivity to UV light. AlpA acts as a transcriptional regulator of the slpA gene; activation of slpA transcription is necessary to suppress these phenotypes. Several of the sequences in this family are thought to be DNA-binding proteins.
