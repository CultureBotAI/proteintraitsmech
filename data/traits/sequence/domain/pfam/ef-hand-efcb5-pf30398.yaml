identifier: Pfam:PF30398
label: EFCB5 EF-hand domain
definition: >-
  This domain is found in the human EF-hand calcium-binding domain-containing protein 5 and related proteins. EFCAB5 was shown to be part of a molecular neighbourhood around RS3 (radial spoke 3) within the sperm axoneme, downstream of the CFAP91 scaffold. This protein probably acts as a sperm-specialised movement regulator. The domain represented by this entry has similarity to known EF-hand domains, and it is predicted to adopt a similar structure.
