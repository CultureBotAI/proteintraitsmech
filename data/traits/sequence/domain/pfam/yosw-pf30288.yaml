identifier: Pfam:PF30288
label: SPbeta prophage-derived membrane protein YosW
definition: >-
  This entry represents the YosW protein from Bacillus subtilis (113 amino acids), derived from the SPbeta prophage. The protein contains three predicted transmembrane helices and is localised to the cell membrane. This family is found in proteins across bacteria and viruses. The function of this family remains to be determined.
