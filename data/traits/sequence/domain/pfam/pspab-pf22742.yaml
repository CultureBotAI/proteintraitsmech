identifier: Pfam:PF22742
label: PspA associated protein B
definition: >-
  This entry represents a family of poorly characterised prokaryotic proteins, including PspA associated protein B, a component of the Psp system. It occurs in an operon with a membrane-associated metallopeptidase. In addition, these two genes occur in operon with the PspA-PspAA dyad.
