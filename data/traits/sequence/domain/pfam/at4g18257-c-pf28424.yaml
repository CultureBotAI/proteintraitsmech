identifier: Pfam:PF28424
label: At4g18257 C-terminal domain
definition: >-
  This entry represents the C-terminal coiled-coil domain found in At4g18257, an uncharacterised protein from Arabidopsis thaliana and related plant proteins. The domain spans approximately 62 residues and forms a predicted coiled-coil structure. The protein is classified as CCDC174-like based on sequence similarity and contains disordered regions flanking the coiled-coil domain. At4g18257 has been identified as a phosphoprotein with phosphorylation at Ser-127. The function of this coiled-coil domain remains to be determined.
