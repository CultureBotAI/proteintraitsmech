identifier: Pfam:PF03746
label: LamB/YcsF family
definition: >-
  This entry includes LamB/YcsF/PxpA and related proteins. The lam locus of Emericella nidulans (Aspergillus nidulans) consists of two divergently transcribed genes, lamA and lamB, involved in the utilization of lactams such as 2-pyrrolidinone. Both genes are under the control of the positive regulatory gene amdR and are subject to carbon and nitrogen metabolite repression. The B. subtilis homologue of LamB (known as YcsF) has been reported to be a previously unidentified prokaryotic 5-oxoprolinase (named PxpA), and has been suggested to function, along with PxPB and PxpC, in the disposal of 5-oxoproline.
