identifier: Pfam:PF27251
label: DNA import protein CedA1
definition: >-
  This entry represents a domain that covers the whole length of the DNA import protein CedA1 ( ) from Sulfolobus acidocaldarius, a component of the Ced (Crenarchaeal system for exchange of DNA) system found in Archaea. The protein is 78 amino acids in length with a molecular weight of approximately 8.6 kDa and contains two predicted transmembrane helices. This domain is also found at the N-terminal end of the DNA import protein CedA ( ) from Sulfolobus acidocaldarius CedA1 forms a complex with CedA and CedA2 proteins and is involved in DNA import. The protein is localised to the cell membrane and is up-regulated upon UV stress. Members of this group are found in archaeal species.
