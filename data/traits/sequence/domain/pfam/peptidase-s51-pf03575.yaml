identifier: Pfam:PF03575
label: Peptidase family S51
definition: >-
  Proteolytic enzymes that exploit serine in their catalytic activity are ubiquitous, being found in viruses, bacteria and eukaryotes. They include a wide range of peptidase activity, including exopeptidase, endopeptidase, oligopeptidase and omega-peptidase activity. Many families of serine protease have been identified, these being grouped into clans on the basis of structural similarity and other functional evidence. Structures are known for members of the clans and the structures indicate that some appear to be totally unrelated, suggesting different evolutionary origins for the serine peptidases. Not withstanding their different evolutionary origins, there are similarities in the reaction mechanisms of several peptidases. Chymotrypsin, subtilisin and carboxypeptidase C have a catalytic triad of serine, aspartate and histidine in common: serine acts as a nucleophile, aspartate as an electrophile, and histidine as a base. The geometric orientations of the catalytic residues are similar between families, despite different protein folds. The linear arrangements of the catalytic residues commonly reflect clan relationships. For example the catalytic triad in the chymotrypsin clan (PA) is ordered HDS, but is ordered DHS in the subtilisin clan (SB) and SDH in the carboxypeptidase clan (SC). This group of serine peptidases belong to MEROPS peptidase family S51 (clan PC(S)). The type example being dipeptidase E (alpha-aspartyl dipeptidase) from Escherichia coli. The family contains alpha-aspartyl dipeptidases (dipeptidase E) and cyanophycinases. The three-dimensional structure of Salmonella typhimurium aspartyl dipeptidase, peptidase E has been determine at 1.2-A resolution. The structure of this 25kDa enzyme consists of two mixed β-sheets forming a V, flanked by six α-helice…
