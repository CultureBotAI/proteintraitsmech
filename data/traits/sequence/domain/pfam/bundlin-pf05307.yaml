identifier: Pfam:PF05307
label: Bundlin
definition: >-
  This family consists of Major structural subunit of bundle-forming pilus (Bundlin) from Escherichia coli and similar proteins from Proteobacteria. Bundlin is a type IV pilin protein that is the only known structural component of enteropathogenic E. coli bundle-forming pili (BFP). BFP play a role in virulence, antigenicity, autoaggregation, and localised adherence to epithelial cells.
