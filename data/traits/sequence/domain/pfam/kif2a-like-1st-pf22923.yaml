identifier: Pfam:PF22923
label: Kinesin-like protein KIF2A-like, N-terminal
definition: >-
  This domain is found at the N-terminal of human Kinesin-like protein KIF2A and similar animal proteins with a kinesin motor domain ( ). KIF2A, which is required for normal progression through mitosis and for normal brain development, is a plus end-directed microtubule-dependent motor protein with microtubule depolymerisation activity. This domain is predicted to adopt an SH3 fold.
