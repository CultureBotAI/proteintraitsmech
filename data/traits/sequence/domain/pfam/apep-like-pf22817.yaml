identifier: Pfam:PF22817
label: ApeP dehydratase
definition: >-
  This entry ApeP dehydratase and its homologues. This enzyme forms a heterodimer with ApeI that carries out dehydratation in APE biosynthesis. Both subunits in this complex adopt a typical hotdog fold comprising six antiparallel β-strands and a central α-helix.
