identifier: Pfam:PF26085
label: SH3 domain
definition: >-
  This SH3-like domain is found in uncharacterised proteins mainly from Metazoa. It has a detectable similarity to the SH3 domain of STAC3 and is usually found in tandem with another SH3-like domain.
