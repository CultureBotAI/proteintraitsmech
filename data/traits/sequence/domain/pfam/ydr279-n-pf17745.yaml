identifier: Pfam:PF17745
label: Ydr279p protein triple barrel domain
definition: >-
  This entry represents the N-terminal triple barrel domain found in Rnh202 (also known as ribonuclease H2 subunit B), a non catalytic subunit of ribonuclease H2. RNases H2 cleaves RNA sequences that are part of RNA/DNA hybrids or that are incorporated into DNA. It prevents genomic instability and the accumulation of aberrant nucleic acid.
