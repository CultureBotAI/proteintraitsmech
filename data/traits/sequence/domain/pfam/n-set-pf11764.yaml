identifier: Pfam:PF11764
label: COMPASS (Complex proteins associated with Set1p) component N
definition: >-
  The COMPASS complex (complex proteins associated with Set1p) is conserved in yeasts and in other eukaryotes up to humans. The COMPASS complex functions to methylate the fourth lysine of Histone 3 and for the silencing of genes close to the telomeres of chromosomes.
