identifier: Pfam:PF19977
label: xRRM domain
definition: >-
  This is the atypical RRM (xRRM) domain found in a group of fungal proteins, including La-related protein 7 homolog (Lar7, also known as Pof8) from Schizosaccharomyces pombe, a member of the ancient superfamily of La and La-related proteins (LaRPs). Lar7 is a RNA-binding protein required for assembly of the holoenzyme telomerase ribonucleoprotein (RNP) complex. It binds telomerase RNA (TER1) and promotes assembly of TER1 with catalytic subunit of telomerase reverse transcriptase (Trt1).
