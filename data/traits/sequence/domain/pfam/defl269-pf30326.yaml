identifier: Pfam:PF30326
label: Defensin-like protein 269
definition: >-
  This entry represents defensin-like DEFL269 protein found in Arabidopsis thaliana. The protein contains a signal peptide and a mature cysteine-rich domain with four predicted disulfide bonds. Defensin- like proteins belong to a large gene family in Arabidopsis with over 300 members. These small cysteine-rich peptides resemble antimicrobial peptides and have been suggested to function in plant defence. The protein is predicted to be secreted.
