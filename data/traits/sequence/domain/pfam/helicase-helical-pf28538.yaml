identifier: Pfam:PF28538
label: Probable ATP-dependent RNA helicase, helical domain
definition: >-
  This domain is found in uncharacterised bacterial proteins which share a global similarity to known ATP-dependent RNA helicases and are likely to perform similar function. It is predicted to fold into non-compact α-helical structure.
