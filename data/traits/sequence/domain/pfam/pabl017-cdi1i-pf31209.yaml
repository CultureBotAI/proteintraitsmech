identifier: Pfam:PF31209
label: PABL017 Cdi1I immunity protein
definition: >-
  This entry represents the immunity protein Cdi1I from Pseudomonas aeruginosa PABL017 ( ) and related proteins from a toxin/antitoxin systems. Cdi1A toxin ( ) functions as a specific tRNAse. Cdi1I and Cdi1A form a tight complex. Cdi1I folds into an α/β structure composed of a seven-stranded antiparallel β-sheet and three α-helices packed on one side of it.
