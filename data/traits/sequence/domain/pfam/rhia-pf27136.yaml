identifier: Pfam:PF27136
label: RhiA
definition: >-
  This entry represents the RhiA protein from Rhizobium leguminosarum and related proteins. RhiA is one of the rhizosphere- expressed genes that can influence nodulation by Rhizobium leguminosarum biovar viciae. The protein may be involved in plant-microbe interaction, though the specific function remains to be determined.
