identifier: Pfam:PF30341
label: Coiled-coil protein mdt-28
definition: >-
  This entry represents the Mdt-28 protein found in nematodes. Mdt-28 localises mainly to the nucleus and plays a role in growth and development in Caenorhabditis elegans. Mdt-28 interacts with mediator subunits mdt-6 and mdt-30. Disruption of Mdt-28 results in developmental defects including a dumpy phenotype, defective gonadal growth and sterility.
