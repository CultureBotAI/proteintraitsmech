identifier: Pfam:PF29154
label: CSR2 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of proteins from the CSR2 family, including CSR2 (transcription factor CSR2, also known as MRG19) and ECM21 (extracellular mutant protein 21). The domain spans approximately residues 171-619 and is found in Saccharomycotina fungi. CSR2 is a transcription factor involved in the regulation of fermentation and aerobic oxidation, acting as a repressor of CYC1. CSR2 is required for pseudohyphal formation upon nitrogen starvation and may be involved in viability at stationary phase and ageing. ECM21 may be involved in cell wall organisation and biogenesis. The specific function of this N-terminal domain remains to be determined.
