identifier: Pfam:PF30858
label: SFI1 first Coiled-coil region
definition: >-
  This entry represents the first coiled-coil region of SFI1, a centrosomal protein found in vertebrates and other metazoans. SFI1 plays a role in the dynamic structure of centrosome-associated contractile fibres through its interaction with centrin-2 (CETN2). The full-length protein contains multiple HAT (Half-A-TPR) repeats and several CETN2-binding regions distributed along its length. The C-terminal domain contains one HAT repeat and forms part of the region that interacts with CETN2. The CETN2-binding regions contain a conserved tryptophan residue at their C-terminal ends that is critical for centrin binding. SFI1 localises to the distal end of centrioles.
