identifier: Pfam:PF12712
label: Domain of unknown function (DUF3805)
definition: >-
  This entry represents an N-terminal domain found in a family of bacterial proteins, whose function is unknown. In two related Bacteroides species, the gene for members of this family lies immediately upstream from a putative ATP binding component of an ATP transporter and a putative histidinol phosphatase. The structure of this domain is strikingly similar to the N-terminal structure of 1tui, also of unknown function. The domain carries four conserved tryptophan residues.
