identifier: Pfam:PF28775
label: Domain of unknown function (DUF8458)
definition: >-
  This entry represents an N-terminal domain of unknown function found in proteins from Bacteroidota. The domain is around 75-95 residues in length and adopts a helical structure. The domain is found primarily in Flavobacteriaceae, Bacteroidales and Cytophagales within the Bacteroidota phylum. The function of this domain remains to be determined.
