identifier: Pfam:PF29167
label: Cellulose synthase BcsB, second CBM domain
definition: >-
  This entry represents the second CBM domain, found at the N-terminal of Cellulose synthase protein B (BcsB). BcsB is a regulatory subunit and consists of four domains arranged in a triangular shape; there is a structural repeat unit formed by a CBM domain connected to a α/β domain referred to as flavodoxin-like domain (FD) and forms two pairs. This domain is also found in the Cellulose synthase 1/2 which is a bifunctional protein comprised of a catalytic subunit and a regulatory subunit. BcsB is involved in cellulose synthesis. Cellulose synthesis has been identified in several bacteria. In Agrobacterium tumefaciens, for instance, cellulose has a pathogenic role: it allows the bacteria to bind tightly to their host plant cells. While several enzymatic steps are involved in cellulose synthesis, potentially the only step unique to this pathway is that catalysed by cellulose synthase. This enzyme is a multi subunit complex. BcsB binds the positive effector cyclic di-GMP. This subunit is found in several different bacterial cellulose synthase enzymes. The first recognised sequence for this subunit is BcsB. In the AcsII cellulose synthase, this subunit and the subunit corresponding to BcsA are found in the same protein.
