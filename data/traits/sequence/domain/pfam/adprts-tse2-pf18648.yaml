identifier: Pfam:PF18648
label: Tse2 ADP-ribosyltransferase toxin
definition: >-
  Tse2 from P. aeruginosa has structural features similar to ADP-ribosylating toxins. It is a cytoactive toxin secreted by a type six secretion apparatus of Pseudomonas aeruginosa and found mostly in gamma proteobacteria. It naturally attacks a target in the cytoplasm of bacterial cells. Structural analysis shows similarity between Tse2 and nicotinamide adenine dinucleotide (NAD)-dependent enzymes from bacteria, notably the mono-ADP-ribosyltransferase toxins (ADPRTs). Furthermore, it revealed that the Tse2 active site is occluded upon binding the cognate immunity protein Tsi2. The abrogation of toxicity for the R14A, S80A, and H122A mutant Tse2 proteins indicates the importance of these amino acids in the mechanism of Tse2 toxicity and, given their conservation with NAD-reactive enzymes, also supports their assignment as being involved in a catalytic reaction.
