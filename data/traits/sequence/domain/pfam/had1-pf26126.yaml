identifier: Pfam:PF26126
label: Hachiman anti-defense protein
definition: >-
  This entry represents Hachiman anti-defense (Had1) from Bacillus phage SBSphiJ4 and similar proteins found in bacteriophages. Had1 counteracts the bacterial Hachiman antiviral defence system, allowing phages to overcome host immunity. The protein functions as a homodimer. Mutagenesis studies have shown that isoleucine at position 41 is critical for its anti-defence activity.
