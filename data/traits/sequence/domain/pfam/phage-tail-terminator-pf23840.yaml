identifier: Pfam:PF23840
label: Phage tail terminator protein
definition: >-
  This entry represents a family of phage tail terminator proteins related to the Pseudomonas aeruginosa phage JBD30 tail terminator protein. These proteins form a hexameric ring at the top of the phage tail tube in the neck of the phage ( ). This family also includes proteobacterial prophages.
