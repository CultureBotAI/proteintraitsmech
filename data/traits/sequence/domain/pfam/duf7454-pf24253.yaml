identifier: Pfam:PF24253
label: Domain of unknown function (DUF7454)
definition: >-
  This entry represents a small family of uncharacterised proteins from a set of mycobacterial phage including phage Bxb1 (gene 86). The members of the family range in length from 50 to 90 residues. Structurally, it shows some weak similarity to the N-terminal domain of IF5, which adopts an SH3 like barrel fold.
