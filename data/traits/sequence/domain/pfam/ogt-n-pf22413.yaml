identifier: Pfam:PF22413
label: Methylated DNA-protein cysteine MeTransferase OGT N-terminal domain
definition: >-
  This entry represents the N-terminal of methylated DNA-protein cysteine methyltransferase (MGMT, also known as 6-O-methylguanine-DNA methyltransferase and MJ1529/OGT) from Methanocaldococcus jannaschii and similar sequences. This entry corresponds to the ribonuclease-like domain associated with 6-O-methylguanine DNA methyltransferase activity.
