identifier: Pfam:PF21572
label: Archaeal Nop5/56-rel, N-terminal domain
definition: >-
  This domain is found at the N-terminal of a group of Nop5/56-related archaeal proteins. This domain interacts with fibrillarin, the other subunit of a complex that is critical to modify and process ribosomal RNAs. This domain shows a highly conserved folded structure despite low sequence similarity among homologues. It shows four β-sheets surrounded by four α-helices and is found associated with .
