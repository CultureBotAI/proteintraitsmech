label: Domain of unknown function (DUF8663)
definition: >-
  This entry represents a family of small uncharacterised proteins of approximately 110 residues. The family is restricted to marine picocyanobacteria, specifically Prochlorococcus and Synechococcus species (Synechococcales). The function of this family remains to be determined.
