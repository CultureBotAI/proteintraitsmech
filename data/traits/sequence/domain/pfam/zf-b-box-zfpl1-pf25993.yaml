identifier: Pfam:PF25993
label: ZFPL1-like, B-box zinc-binding domain
definition: >-
  This B-box zinc-binding domain is found at the N-terminal end in ZFPL1 mostly found in metazoa and uncharacterised plant proteins. Zinc finger protein-like 1 (ZFPL1) is required for cis-Golgi integrity and efficient ER to Golgi transport, possibly via its interaction with GOLGA2/GM130.
