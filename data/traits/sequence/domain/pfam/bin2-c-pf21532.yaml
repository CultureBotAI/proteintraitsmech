identifier: Pfam:PF21532
label: Bridging integrator 2, C-terminal tail
definition: >-
  Bridging integrator 2 (Bin2) is a BAR domain -containing protein that is mainly expressed in haematopoietic cells. It promotes cell motility and migration, probably via its interaction with the cell membrane and with podosome proteins that mediate interaction with the cytoskeleton. Bin2 modulates membrane curvature, mediates membrane tubulation and it plays a role in podosome formation. This entry represents the C-terminal tail which mediates interactions with SH3 domains, through its proline-rich regions, functioning as an adaptor for SH3 domain-containing proteins at podosomes. This domain is rich in glutamates, serines and prolines. It contains two consensus PxxP sequences (PTSPR and PEKPVR).
