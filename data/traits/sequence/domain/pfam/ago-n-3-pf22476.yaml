identifier: Pfam:PF22476
label: Argonaute, N-terminal domain
definition: >-
  This domain is found at the N-terminal of Protein argonaute from Pyrococcus furiosus (Ago), a component of the RNAi effector complex (RISC). Ago is organised into four domains: N (this entry), PAZ ( ), middle and PIWI ( ). This domain shows a small four-stranded β-sheet, three α-helices and a β-hairpin. Members of this group are specific to thermococcales.
