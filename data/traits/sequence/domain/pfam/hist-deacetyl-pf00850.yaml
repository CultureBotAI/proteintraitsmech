identifier: Pfam:PF00850
label: Histone deacetylase domain
definition: >-
  This entry represents the structural domain found in histone deacetylases. It consists of a 3-layer(α-β-α) sandwich. Histone deacetylases (HDACs) are a class of enzymes that remove acetyl groups from N(6)-acetyl-lysine residues on histones. This process plays a critical role in transcription regulation, as HDACs facilitate tighter wrapping of DNA around histones. DNA expression is regulated in part by the balance between acetylation and deacetylation. The reaction catalyzed by HDACs is the reverse of , which transfers acetyl groups to histones. In general, HDACs suppress gene expression because the removal of acetyl groups from the ε-amino group of lysine side chains at the N-terminal of histones restores the positive charge of lysine residues. This stabilization strengthens histone-DNA interactions and prevents transcription factors from binding to promoter elements. HDACs, along with acetoin utilization proteins and acetylpolyamine amidohydrolases, belong to an ancient protein superfamily. HDAC can be divided by different classes: Class I: Includes HDAC1, HDAC2, HDAC3, and HDAC8. Generally nuclear and involved in transcriptional repression. Class II: Includes HDAC4, HDAC5, HDAC6, HDAC7, HDAC9, and HDAC10. Can shuttle between the nucleus and cytoplasm and are involved in diverse cellular processes. Subdivided into IIa (HDAC4, 5, 7, 9) and IIb (HDAC6, 10). Class III: Sirtuins (SIRT1-7 in mammals). NAD+-dependent deacetylases with different enzymatic mechanisms, involved in aging, metabolism, and stress response. Often considered a separate family. Class IV: Includes HDAC11. Has characteristics of both Class I and II.
