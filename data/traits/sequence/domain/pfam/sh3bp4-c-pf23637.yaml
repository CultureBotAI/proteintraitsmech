identifier: Pfam:PF23637
label: SH3BP4 C-terminal helical domain
definition: >-
  The domain represented by this entry is predicted to fold into a mainly helical structure with a DEATH domain-like topology. This entry includes SH3 domain-binding protein 4 (SH3BP4) and related proteins such as Metastasis-associated in colon cancer protein 1 (MACC1). SH3BP4 binds and negative regulates Rag GTPase complex. This binding abrogates the interaction of mTORC1 with Rag GTPase complex and the recruitment of mTORC1 to the lysosome, thus inhibiting amino acid-induced mTORC1 activation and cell growth and promoting autophagy. MACC1 acts as a transcription activator for MET and as a key regulator of HGF-MET signaling. It promotes cell motility, proliferation and tumor growth and metastasis in vivo.
