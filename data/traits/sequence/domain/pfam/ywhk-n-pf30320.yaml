identifier: Pfam:PF30320
label: YwhK N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YwhK and related proteins from Bacillus and Clostridium species. YwhK interacts with the DNA helicase PcrA, although this interaction is not essential for cell viability or repair of UV-induced lesions. The function of this domain remains to be determined.
