identifier: Pfam:PF27407
label: YubE
definition: >-
  This entry represents YubE proteins found in Escherichia coli and related bacteria. YubE is a small protein of approximately 73 amino acids encoded on the F plasmid. The protein contains a predicted helical structure. YubE is an uncharacterised protein and its function remains to be determined.
