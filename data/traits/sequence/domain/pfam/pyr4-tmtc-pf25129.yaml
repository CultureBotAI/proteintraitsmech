identifier: Pfam:PF25129
label: Pyr4-like transmembrane terpene cyclases
definition: >-
  This entry matches terpene cyclases, such as PaxB from Penicillium paxilli. PaxB is part of the ATM2 gene cluster that mediates the biosynthesis of paxilline, a mycotoxin that acts as an inhibitor of mammalian maxi-K channels.
