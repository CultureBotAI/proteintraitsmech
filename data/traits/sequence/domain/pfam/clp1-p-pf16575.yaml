identifier: Pfam:PF16575
label: mRNA cleavage and polyadenylation factor CLP1 P-loop
definition: >-
  This entry represents the P-loop containing domain of Clp1. This domain carries the P-loop, suggesting it is the region that binds adenine or guanine nucleotide. Polyribonucleotide 5-hydroxyl-kinase Clp1 is a component of the cleavage factor IA (CF IA) complex, which is involved in the endonucleolytic cleavage during polyadenylation-dependent pre-mRNA 3'-end formation. It is involved in both the endonucleolyitc cleavage and polyadenylation steps of mRNA 3'-end maturation. Human Clp1 can also function as a tRNA splicing enzyme. In human, mutations in Clp1 affect tRNA biogenesis and lead to impairment of both peripheral and central nervous system function, causing severe motor-sensory defects, cortical dysgenesis and microcephaly. Clp1 contains three domains, a small N-terminal β sandwich domain involved in DNA binding, a C-terminal domain containing a novel α/β-fold and a central domain that binds ATP.
