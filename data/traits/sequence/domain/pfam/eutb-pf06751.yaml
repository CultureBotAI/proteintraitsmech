identifier: Pfam:PF06751
label: Ethanolamine ammonia lyase large subunit (EutB)
definition: >-
  This family consists of several bacterial ethanolamine ammonia-lyase heavy chain (EutB) (also known as ethanolamine ammonia lyase large subunit and ethanolamine ammonia-lyase alpha subunit) proteins. Ethanolamine ammonia-lyase is a bacterial enzyme that catalyses the adenosylcobalamin-dependent conversion of certain vicinal amino alcohols to oxo compounds and ammonia. The enzyme consists of EutB and C (beta-subunit) subunits which form a trimer composed of the (α-β)2 dimer. EutB is organised in a (β/α)8 barrel which contains the active site.
