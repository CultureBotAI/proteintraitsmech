identifier: Pfam:PF22081
label: SwaI restriction endonuclease
definition: >-
  SwaI is a Type IIP restriction endonuclease that recognises a palindromic eight base pair symmetric sequence, 5'-ATTTAAAT-3', and cleaves this target sequence at its centre to generate blunt-ended DNA fragments. SwaI forms a dimeric α/β structure, with each subunit having a central cradle-like mixed β-sheet with two helices packed on its concave side and a C-terminal helix contributing to the dimer interface. SwaI has a significant similarity to other restriction endonucleases such as HincII, NlaIV, HindIII and EcoRV.
