identifier: Pfam:PF25865
label: GINS complex Gins15 subunit C-terminal domain
definition: >-
  This entry represents the C-terminal (B domain) in Gins15 ( ) from archaea. This domain is predominantly composed of β-strands and corresponds to the B domain in the AB domain arrangement of Gins15. The C-terminal B domain is both necessary and sufficient for interaction with Cdc45, forming a key interface in the CG (Cdc45-GINS) complex. In Sulfolobus, this interaction is critical for assembling the complete CMG (Cdc45-MCM-GINS) complex, which functions as the replicative helicase. The archaeal GINS complex contains two copies of Gins15, potentially allowing for interaction with two copies of Cdc45 through this domain, creating a more symmetrical structure than in eukaryotes. The interaction mediated by this domain is essential for stimulating the helicase activity of MCM during DNA replication. Gins15 is a core subunit of the GINS complex involved in DNA replication. Together with Cdc45 and Gins23, forms a stable complex that stimulates the helicase activity of MCM.
