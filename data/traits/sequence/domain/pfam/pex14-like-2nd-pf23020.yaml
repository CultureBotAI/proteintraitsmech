identifier: Pfam:PF23020
label: Peroxisomal membrane protein PEX14-like, central
definition: >-
  This domain is centrally located in Peroxisomal membrane protein PEX14 from Arabidopsis thaliana and similar plant sequences. PEX14 is a component of the PEX13-PEX14 docking complex, a translocon channel that specifically mediates the import of peroxisomal cargo proteins bound to PEX5 receptor. It is often found C-terminal to and is predicted to adopt an all-α helical configuration.
