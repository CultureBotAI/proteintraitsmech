identifier: Pfam:PF25565
label: At1g33420-like, ubiquitin-like domain
definition: >-
  This domain is found in MS1 and similar proteins found in plants. This domain is predicted to adopt an ubiquitin-like fold. PHD finger protein MALE STERILITY 1 (MS1) is a nuclear transcriptional activator essential for anther and post-meiotic pollen development and maturation. It plays a key role in tapetal development, pollen wall biosynthesis, and may also influence inflorescence branching and floral development. MS1 contains both a leucine zipper-like domain and a plant homeodomain (PHD) finger motif, which are critical for its function. MMD1, encoded by the DUET gene, is another PHD finger protein expressed specifically in male meiocytes. It is required for proper male meiotic chromosome organisation and progression, and is thought to regulate gene expression during meiosis. Loss-of-function mutations in MMD1 lead to cell death in male meiocytes, highlighting its essential role in male gametophyte development.
