identifier: Pfam:PF29820
label: Nodulation outer protein P
definition: >-
  This entry represents nodulation outer protein P (NopP), a type III secreted effector found in Alphaproteobacteria. NopP is secreted via the type III secretion system and is phosphorylated. It is a major determinant of nodulation in tropical legumes. According to CATH this domain is part of the N-acetyltransferase superfamily.
