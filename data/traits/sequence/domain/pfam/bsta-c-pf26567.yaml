identifier: Pfam:PF26567
label: BstA C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the BstA protein, an abortive infection protein found in prophages of diverse Gram-negative bacteria . BstA mediates population-level defence against exogenous phage infection by localising to sites of phage DNA replication and inhibiting phage propagation. The C-terminal domain has an unknown function and is predicted to be distinct from the N-terminal KilA-N (-like) domain . Prophages encoding BstA proteins also contain a self-immunity element called aba (anti-BstA) within the bstA locus that allows the prophage to replicate without being targeted by its own BstA protein during induction. This entry also cover the whole sequence of other uncharacterised bacterial proteins.
