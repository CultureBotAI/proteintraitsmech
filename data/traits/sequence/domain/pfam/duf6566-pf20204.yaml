identifier: Pfam:PF20204
label: Domain of unknown function (DUF6566)
definition: >-
  This domain is found in functionally uncharacterised proteins, mainly from burkholderiales. This domain is approximately 60 amino acids in length and it has a conserved tryptophan residue at the N-terminal, the conserved motifs PxW and AxRxxxE and an aspartate conserved residue at the C-terminal. Some members containing this domain are hypothetical transposases.
