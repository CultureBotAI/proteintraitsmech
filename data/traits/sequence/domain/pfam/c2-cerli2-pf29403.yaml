identifier: Pfam:PF29403
label: CERLI2-like C2 domain
definition: >-
  This entry represents a C2 domain found in CERLI1/2 (cytosolically exposed rhoptry leaflet interacting protein 1/2) and related proteins from apicomplexan parasites. CERLI2 is a rhoptry surface protein that plays an important role in rhoptry physiology and is essential for merozoite invasion of host erythrocytes. The protein localises to the cytosolic face of the rhoptry bulb membrane in merozoites. The specific function of this domain remains to be determined.
