identifier: Pfam:PF22942
label: Domain of unknown function (DUF7025)
definition: >-
  This entry represents an SH3 barrel-like domain found in a large family of AAA proteins, including Isoindolinone tripeptide biosynthesis cluster protein B from Uncinocarpus reesii (UncB), part of the unc gene cluster that mediates the biosynthesis of the tripeptide D-Isd-L-Ala-L-Gln called isoindolamide B. The function of these proteins is uncertain.
