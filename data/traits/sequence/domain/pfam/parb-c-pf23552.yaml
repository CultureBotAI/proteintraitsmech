identifier: Pfam:PF23552
label: ParB dimerisation domain
definition: >-
  This entry represents the C-terminal dimerisation domain found in ParB proteins. The dimerisation domain tightly links the two subunits of the ParB dimer. Structural analysis of the C-terminal domain reveals a dimer with a lysine-rich surface that binds DNA non-specifically and is essential for DNA condensation in vitro. ParB plays a vital role in chromosome partitioning and nucleoid occlusion. These proteins are essential for ensuring proper chromosome segregation during cell division by binding to the DNA origin of replication and localising to both poles of the predivisional cell following DNA replication. ParB proteins share significant sequence and structural similarity with Sulfiredoxin (Srx), a sulfinic acid reductase identified in eukaryotes. Sequence comparison and phylogenetic analysis of the Srx and ParB protein families suggest that Srx evolved via truncation of ParB, resulting in the removal of the entire C-terminal half of the protein including the HTH domain. ParB comprises three highly conserved domains: an N-terminal nucleotide-binding domain (NBD) , a central helix-turn-helix parS-binding domain , non-structured linker region, and a C-terminal dimerisation domain that tightly links the two subunits of the ParB dimer.
