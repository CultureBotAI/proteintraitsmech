identifier: Pfam:PF26169
label: XRCC3/RpoA-like, helix-hairpin-helix domain
definition: >-
  This domain is found at the N-terminal end of human DNA repair protein XRCC3 and RAD51 homolog 2 (RAD51B) and similar proteins from animals and plants. This domain is predicted to adopt a helix-hairpin-helix (HHH) fold. XRCC3 is involved in the homologous recombination repair pathway of double-stranded DNA, thought to repair chromosomal fragmentation, translocations and deletions. It is part of the RAD51 paralogue protein complex CX3. RAD51B is involved in the homologous recombination repair (HRR) pathway of double-stranded DNA breaks arising during DNA replication or induced by DNA-damaging agents. It is part of the RAD51 paralog protein complex BCDX2 which acts in the BRCA1-BRCA2-dependent HR pathway.
