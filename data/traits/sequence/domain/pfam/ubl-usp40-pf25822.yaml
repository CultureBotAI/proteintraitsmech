identifier: Pfam:PF25822
label: USP40 ubiquitin-like domain
definition: >-
  This entry describes one of the ubiquitin-like (UBL) domains found in ubiquitin carboxyl-terminal hydrolase 40 (USP40) from animals. USP40 is a deubiquitinase (DUB) enzyme that belongs to the USP family. The UBL domain of USP40 has been shown to interact with Yes-associated protein (YAP). The number of UBL domains varies between different types of USP enzymes. In human USP40, the UBL domain is repeated six times after the catalytic core; this entry represents the third UBL domain. This domain is predicted to consist of four β-strands surrounding an α-helix.
