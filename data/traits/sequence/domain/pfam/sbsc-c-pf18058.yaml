identifier: Pfam:PF18058
label: SbsC C-terminal domain
definition: >-
  This is the C-terminal domain found in bacterial cell surface layer protein SbsC which can be found in species such as Geobacillus stearothermophilus. The C-terminal domain is the third and last triple-helical bundle and adopts a canonical coiled-coil structure. A similar overall arrangement of antiparallel triple-helical bundles has been found in the cytoskeletal protein spectrin (2SPC).
