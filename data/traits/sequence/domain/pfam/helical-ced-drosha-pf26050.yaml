identifier: Pfam:PF26050
label: Ribonuclease 3, central domain, two antiparallel helical region
definition: >-
  This entry represents a region of the central domain (CED) of human Ribonuclease 3 (Drosha) and similar animal sequences. Drosha is a double-stranded RNA-specific endoribonuclease that is involved in the initial step of microRNA (miRNA) biogenesis. It is a component of the microprocessor complex required to process primary miRNA transcripts to release precursor miRNA in the nucleus. In mouse, this protein plays a role in growth homeostasis in response to autophagy in motor neurons. This region shows two antiparallel helices.
