identifier: Pfam:PF00724
label: NADH:flavin oxidoreductase / NADH oxidase family
definition: >-
  The TIM-barrel fold is a closed barrel structure composed of an eight-fold repeat of β-α units, where the eight parallel β strands on the inside are covered by the eight α helices on the outside. It is a widely distributed fold which has been found in many enzyme families that catalyse completely unrelated reactions. The active site is always found at the C-terminal end of this domain. Proteins in this entry are a variety of NADH:flavin oxidoreductase/NADH oxidase enzymes, found mostly in bacteria or fungi, that contain a TIM-barrel fold. They commonly use FMN/FAD as cofactor and include: dimethylamine dehydrogenase trimethylamine dehydrogenase 12-oxophytodienoate reductase NADPH dehydrogenase NADH oxidase
