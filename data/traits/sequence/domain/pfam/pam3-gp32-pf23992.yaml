identifier: Pfam:PF23992
label: Phage Pam3 gp32-like protein
definition: >-
  This entry represents a family of uncharacterised proteins from phages and bacterial prophages that includes the Pam3 phage gp32 protein ( ). Structure prediction shows that the protein is composed of a small globular domain. This protein forms a confident dimer according to structure prediction.
