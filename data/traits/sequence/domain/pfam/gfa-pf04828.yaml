identifier: Pfam:PF04828
label: Glutathione-dependent formaldehyde-activating enzyme
definition: >-
  Centromere protein (CENP)-V is a kinetochore protein that drives the progression of mitosis by coordinating chromatin condensation, positioning of sister chromatid centromeres and targeting of the chromosome passenger complex (CPC), a machinery that regulates the attachment of spindle microtubules (MTs) to kinetochores. CENP-V homologues are found in all vertebrates as well as in plants and nematodes. At the C-terminal end, CENP-V possesses an evolutionally conserved domain that comprises an array of seven cysteines and shows high structural similarity to glutathione-dependent formaldehyde-activating enzyme (Gfa), an enzyme responsible for formaldehyde detoxification in prokaryotes. CENP-V could be an enzyme that scavenges the formaldehyde produced in histone demethylation reactions. The three central cysteines and the flanking four cysteines separately coordinate to zinc, forming a catalytic centre and a structural fold for a tertiary structure, respectively.
