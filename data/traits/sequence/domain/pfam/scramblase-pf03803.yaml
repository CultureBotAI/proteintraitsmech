identifier: Pfam:PF03803
label: 'Scramblase '
definition: >-
  This entry represents phospholipid scramblases. These are plasma membrane proteins, which are conserved from worms to humans. They have been originally identified based on their ability to accelerate the transbilayer movement of phospholipids in a calcium-dependent manner. Scramblase is palmitoylated and contains a potential protein kinase C phosphorylation site. Scramblase exhibits Ca 2+ -activated phospholipid scrambling activity in vitro. There are also possible SH3 and WW binding motifs. Scramblase is involved in the redistribution of phospholipids after cell activation or injury.
