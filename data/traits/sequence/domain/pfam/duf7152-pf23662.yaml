identifier: Pfam:PF23662
label: Domain of unknown function (DUF7152)
definition: >-
  This domain is found in plant proteins that are probably related to NOMO family of proteins. The latter are components of the multi-pass translocon (MPT) complex which mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. The domain represented by this entry is predicted to adopt a globular β-sandwich structure with a prealbumin-like topology.
