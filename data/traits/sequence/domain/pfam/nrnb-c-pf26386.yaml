identifier: Pfam:PF26386
label: Oligoribonuclease NrnB C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the Oligoribonuclease NrnB from Bacillus subtilis and similar proteins found in bacillales. NrnB is involved in the degradation of RNA oligonucleotides. It specifically targets RNA fragments that are 5 nucleotides long, breaking them down in a 3'- to 5'-direction and exhibits reduced activity on shorter RNA fragments and those that are 24 nucleotides in length. Additionally, the NrnB family shows a preference for RNA oligonucleotides that contain adenine bases over those with cytosine bases.
