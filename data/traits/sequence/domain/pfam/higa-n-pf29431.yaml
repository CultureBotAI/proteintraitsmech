identifier: Pfam:PF29431
label: HigA antitoxin, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the HigA antitoxin. HigA is the antitoxin component of the HigB-HigA type II toxin-antitoxin system found in Enterobacteriaceae. The N-terminal domain is composed entirely of α-helices and mediates HigA homodimerisation through helix α-1. This dimerisation is essential for formation of the heterotetrameric (HigBA)2 complex, where HigA neutralises HigB toxin activity. The domain adopts a distinctive V-shaped conformation in the apo-form, which undergoes conformational changes upon HigB binding through rigid-body movements around a central linker region. The C-terminal domain ( ) contains the helix-turn-helix DNA-binding motif responsible for transcriptional repression.
