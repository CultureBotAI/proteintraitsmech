identifier: Pfam:PF11870
label: Lactate utilisation protein B, C-terminal
definition: >-
  This entry represents the C-terminal domain of Lactate utilization protein B, a family of 4Fe-4S, iron-sulphur cluster binding proteins. These proteins have a perfect 4Fe-4S binding motif C-x(2)-C-x(2)-C-x(3)-CP followed by either a perfect or imperfect (the first Cys replaced by Ser) second copy. Members probably bind two 4fe-4S iron-sulphur clusters.
