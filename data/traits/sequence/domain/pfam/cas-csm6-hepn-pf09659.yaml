identifier: Pfam:PF09659
label: Cas_Csm6 HEPN domain
definition: >-
  This entry represents the HEPN domain of CRISPR system endoribonuclease Csm6 from Enterococcus italicus and similar bacterial sequences. Csm6 is a Cas (CRISPR-associated) protein from type III-A CRISPR-Cas system. It consists of a CARF domain at the N-terminal ( ), a six-helix domain and a C-terminal HEPN domain at the C-terminal, which has RNase activity.
