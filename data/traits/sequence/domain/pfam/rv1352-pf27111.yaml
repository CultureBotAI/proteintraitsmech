identifier: Pfam:PF27111
label: Rv1352-like extracellular domain
definition: >-
  This entry represents an extracellular domain found in uncharacterised proteins from the Mycobacterium tuberculosis complex, including Rv1352 from M. tuberculosis, MT1395 from M. tuberculosis CDC 1551, and Mb1387 from M. bovis. These proteins are 123 amino acids in length and contain an N-terminal signal peptide (residues 1-20) that directs them to the extracellular space. The mature protein consists of residues 21-123, representing this extracellular domain. The domain is often found in tandem pairs within proteins. The Rv1352 protein from M. tuberculosis H37Rv has been detected by mass spectrometry, confirming its expression, and has been localised to the extracellular region. The function of this domain remains to be determined.
