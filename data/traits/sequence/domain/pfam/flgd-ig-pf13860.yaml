identifier: Pfam:PF13860
label: FlgD Ig-like domain
definition: >-
  This domain has an immunoglobulin-like β-sandwich fold. It is found in the FlgD protein, a flagellar hook-capping protein and in the minor extracellular protease Vpr from Bacillus subtilis, a serine protease involved in the production of the competence and sporulation stimulating factor CSF. The structure for this domain shows that it is inserted within a Tudor-like β-barrel domain.
