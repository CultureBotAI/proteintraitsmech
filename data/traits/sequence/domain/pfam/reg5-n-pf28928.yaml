identifier: Pfam:PF28928
label: Rhythmically expressed gene 5 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of rhythmically expressed gene 5 (Reg-5) proteins from arthropods. Reg-5 proteins are involved in the generation of biological rhythms and show circadian oscillation in abundance. In Drosophila, Reg-5 expression oscillates with a daily peak during early night and this oscillation is dependent on period gene function. The domain is approximately 68 amino acids in length. The specific function of this domain remains to be determined.
