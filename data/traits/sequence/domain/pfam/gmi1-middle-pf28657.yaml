identifier: Pfam:PF28657
label: GMI1 middle domain
definition: >-
  This entry represents the middle domain found in GMI1 and related proteins. GMI1 is a structural maintenance of chromosomes flexible hinge domain-containing protein that contributes to DNA double-strand break repair via somatic homologous recombination. The protein functions downstream of ATM and is induced by DNA-damaging agents such as mitomycin C, bleocin and gamma-irradiation. While the full-length GMI1 protein is involved in homologous recombination, the specific function of this middle domain remains to be determined. Plants deficient in GMI1 show reduced somatic homologous recombination rates after DNA damage treatment.
