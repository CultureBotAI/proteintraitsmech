identifier: Pfam:PF25732
label: Gammaherpesvirus G-protein coupled receptor
definition: >-
  This entry represents the gammaherpesvirus G-protein coupled receptor (GPCR) BILF1 and related virus GPCR. These receptors are constitutively active and signal through Gi type G-proteins. BILF1 is a lytic gene in Epstein-Barr virus (EBV) and inhibits cAMP response element-binding protein (CREB) activation via stimulation of endogenous G proteins. The alcelaphine herpesvirus 1 homologue (A5) was found to be non-essential for the induction of malignant catarrhal fever in rabbits. Members of this family are 7-transmembrane GPCRs containing conserved cysteines in the amino terminus and extracellular loops, amino-terminal glycosylation sites, and intracellular phosphorylation sites.
