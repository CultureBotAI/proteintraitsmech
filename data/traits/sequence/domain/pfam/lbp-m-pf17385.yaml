identifier: Pfam:PF17385
label: Lacto-N-biose phosphorylase central domain
definition: >-
  This entry represents the central domain found in lacto-N-biose phosphorylase (lnpA) from Bifidobacterium. Proteins containing this domain also include D-galactosyl-beta-1->4-L-rhamnose phosphorylase (Cphy_1920) from Lachnoclostridium phytofermentans. LnpA can reversibly phosphorolyzes lacto-N-biose to Gal1-P and N-acetylglucosamine (GlcNAc) and galacto-N-biose to Gal1-P and N-acetylgalactosamine (GalNAc). It is involved in the lacto-N-biose I/galacto-N-biose (LNB/GNB) degradation pathway, which is important for host intestinal colonization by bifidobacteria. Cphy_1920 can reversibly phosphorolyzes beta-D-galactosyl-(1->4)-L-rhamnose to form alpha-D-galactose 1-phosphate and L-rhamnose. But it does not phosphorolyze galacto-N-biose or lacto-N-biose.
