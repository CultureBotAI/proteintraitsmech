identifier: Pfam:PF08997
label: Ubiquinol-cytochrome C reductase complex, 6.4kD protein
definition: >-
  The ubiquinol-cytochrome C reductase complex (cytochrome bc1 complex) is an essential component of the mitochondrial cellular respiratory chain. This family represents the 6.4kDa protein, which may be closely linked to the iron-sulphur protein in the complex and function as an iron-sulphur protein-binding factor.
