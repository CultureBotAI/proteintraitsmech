identifier: Pfam:PF01980
label: tRNA-methyltransferase O N-terminal domain
definition: >-
  TrmO (also known as TsaA or YaeB) is a RNA methyltransferase responsible for N6-methylation of N6-threonylcarbamoyladenosine in tRNAs. It has a unique single-sheeted β-barrel structure and represent a new category of AdoMet-dependent methyltransferases. The following uncharacterised proteins have been shown to be evolutionary related and to contain a TrmO-like β barrel structural domain domain: Agrobacterium tumefaciens Ti plasmid protein virR. Pseudomonas aeruginosa protein rcsF. Archaeoglobus fulgidus hypothetical protein AF0241. Archaeoglobus fulgidus hypothetical protein AF0433. Methanococcus jannaschii hypothetical protein MJ1583. Methanobacterium thermoautotrophicum hypothetical protein MTH1797. Mammalian Nef-associated protein 1 (NAP1). The crystal structure of Haemophilus influenzae TrmO has been solved. In addition to the N-terminal β-barrel methyltransferase domain it has a C-terminal domain containing the conserved sequence motif DPRxxY.
