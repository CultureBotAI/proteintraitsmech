identifier: Pfam:PF24801
label: Tip attachment protein J,FNIII-A domain
definition: >-
  This domain is found at the N-terminal of Tip attachment protein J from the bacteriophage lambda (GpJ) and similar sequences from tailed bacteriophages and bacterial prophages. This domain, which shows an Ig-like structure, undergoes rotation and determines the narrowest diameter within the hub domains (HDs) region in the final DNA channel. The Tip attachment protein J (GpJ) from Escherichia phage lambda is a crucial tail fibre protein responsible for recognising and binding the host cell's LamB receptor, thereby initiating infection. Structurally, GpJ forms the central tail fibre at the phage tip and undergoes conformational changes upon receptor engagement, which are essential for triggering DNA injection into the host. It interacts with other tail proteins during assembly, serving as a scaffold for tail tube formation and coordinating with the tape measure protein to regulate genome delivery. Mutations in GpJ can alter host specificity and affect phage stability, while its exposed position makes it a target for neutralising antibodies.
