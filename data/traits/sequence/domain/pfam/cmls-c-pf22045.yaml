identifier: Pfam:PF22045
label: Chloramphenicol halogenase CmlS C-terminal domain
definition: >-
  Chloramphenicol halogenase CmlS ( ) belongs to the large and diverse superfamily of flavin-dependent halogenases. CmlS is one of the few enzymes known to halogenate an alkyl group. This entry represents the C-terminal domain of CmlS that resembles an arch-like structure above a central α-helix. This domain creates a T-shaped tunnel leading to the halogenation active site and thus likely directs substrates into the active site to achieve the desired specificity.
