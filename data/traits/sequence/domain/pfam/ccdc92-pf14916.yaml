identifier: Pfam:PF14916
label: Coiled-coil domain of unknown function
definition: >-
  This entry represents a coiled-coil section found at the N-terminal of CCDC92 and CCDC74A/B. Coiled-coil domain-containing protein 92 (CCDC92) is an interferon-stimulated protein that plays a role in innate immunity. It strongly inhibits ebolavirus transcription and replication through the formation of a complex with viral RNA-bound nucleocapsid (NP) that prevents the transport of NP to the cell surface. It has also been shown to interact with centrosomal protein CEP164, which is required for primary (nonmotile) cilium formation. CCDC92 is associated with obesity and type 2 diabetes in humans. Studies in wild-type (WT) and CCCDC92 whole-body knockout (KO) mice, it was found that CCDC92 KO reduced obesity and increased insulin sensitivity under high-fat diet (HFD) conditions, it inhibited macrophage infiltration and fibrosis in white adipose tissue (WAT), which might protect against adipose tissue dysfunction. This suggests a critical role of CCDC92 in metabolism, and may be a potential target for treating obesity and insulin resistance. Coiled-coil domain-containing protein 74A/B are spindle-localized proteins that bind directly to microtubules through two separate domains and bundle microtubules, being important K-fiber crosslinkers required for bipolar spindle formation and chromosome alignment.
