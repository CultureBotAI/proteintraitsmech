identifier: Pfam:PF23145
label: IFT121, second zinc finger domain
definition: >-
  This entry represents the zinc finger rubredoxin-like fold domain at the C-terminal of IFT121. This domain is also found in the IFT121 homologue WDR19 (also known as IFT144) proteins which are similarly components of the IFT complex A and are involved in involved in ciliogenesis and ciliary protein trafficking. These proteins contain two tandem zinc finger domains; this entry represents the second one. IFT121 (also known as WDR35) is a component of the IFT complex A (IFT-A), which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors that is involved in ciliogenesis and ciliary protein trafficking. This protein plays a role in cilia assembly and maintenance. IFT121 contains a zinc finger with rubredoxin-like fold. Knock-out IFT121 cells showed defective retrograde trafficking within cilia.
