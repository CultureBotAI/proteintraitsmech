identifier: Pfam:PF05386
label: TEP1 N-terminal domain
definition: >-
  Telomerase protein component 1 (TP1/TLP1) or TEP1 is a protein component of two ribonucleoprotein (RNP) complexes: vaults and telomerase. Vaults are large RNP particles with a barrel-like structure ( ). The telomerase RNP replenishes incomplete chromosome termini due to DNA replication. Mammalian TEP1 is an RNA-binding protein and is required for the association of vault RNA with the vault particle. The N-terminal part of TEP1 contains 4 copies of the TEP1 N-terminal repeat in tandem. The repeat is composed of 30 amino acids and occurs in combination with the TROVE ( ) and NACHT ( ) domains and with WD-40 repeats (see ) in the C-terminal part.
