identifier: Pfam:PF26464
label: Domain of unknown function (DUF8141)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in Halobacteria. The proteins are predominantly found in various genera such as Halorubrum, Halostagnicola, and Halobacterium. The domain is approximately 64-72 amino acids in length. Proteins containing this domain are predicted to be integral membrane proteins with two transmembrane helices.
