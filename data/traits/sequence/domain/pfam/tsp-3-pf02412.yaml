identifier: Pfam:PF02412
label: Thrombospondin type 3 repeat
definition: >-
  The thrombospondin repeat is a short aspartate rich repeat which binds to calcium ions. The repeat was initially identified in thrombospondin proteins that contained 7 of these repeats. The repeat lacks defined secondary structure. This entry represents the type 3 thrombospondin repeat found in proteins of the thrombospondin family and related repeats present in other types of proteins.
