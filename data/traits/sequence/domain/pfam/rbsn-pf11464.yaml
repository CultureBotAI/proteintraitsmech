identifier: Pfam:PF11464
label: Rabenosyn Rab binding domain
definition: >-
  Rabenosyn-5 (Rbsn) is a multivalent effector with interacts with the Rab family. Rsbn contains distinct Rab4 and Rab5 binding sites within residues 264-500 and 627-784 respectively. Rab proteins are GTPases involved in the regulation of all stages of membrane trafficking.
