identifier: Pfam:PF29999
label: RIPR second jelly roll-like domain
definition: >-
  This entry represents a jelly roll-like domain found in the RH5-interacting protein (RIPR) of Plasmodium species. RIPR is an essential component of the PfRH5 adhesion complex, which facilitates merozoite invasion of human erythrocytes. The protein forms a tripartite complex with RH5 and CyRPA at the merozoite surface during host cell invasion. The specific function of this domain remains to be determined. This domain is located immediately after the N-terminal domain.
