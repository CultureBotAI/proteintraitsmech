identifier: Pfam:PF22896
label: Ribonuclease R, OB first domain, N-terminal
definition: >-
  This entry represents an N-terminal OB (oligonucleotide/oligosaccharide binding) domain found in a set of bacterial Ribonuclease R proteins. Ribonuclease R proteins are 3'-5' exoribonucleases that release 5'-nucleoside monophosphates and are involved in maturation of structured RNAs.
