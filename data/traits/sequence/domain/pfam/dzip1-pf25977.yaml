identifier: Pfam:PF25977
label: Cilium assembly protein DZIP1 domain
definition: >-
  This domain is found in zebrafish Cilium assembly protein DZIP1 and similar sequences from animals. DZIP1 is a molecular adapter that recruits protein complexes required for cilium assembly and function to the cilium basal body. It is required for establishment of left-right asymmetry during embryogenesis. This domain is often found associated with .
