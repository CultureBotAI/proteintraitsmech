identifier: Pfam:PF11816
label: WDR48/Bun107, ubiquitin-like domain
definition: >-
  This entry represents the ubiquitin-like domain of WDR48 from animals, Bun107 from fission yeasts and Duf1 from budding yeasts. WDR48 (also known as UAF1) is a regulator of deubiquitinating complexes. Bun107 is required for the Ubp9 recruitment to septa and cell tips but also for its enzymatic activity at these specific locations.
