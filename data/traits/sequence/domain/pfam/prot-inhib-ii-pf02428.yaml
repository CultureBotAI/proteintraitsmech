identifier: Pfam:PF02428
label: Potato type II proteinase inhibitor family
definition: >-
  Members of the potato peptidase inhibitor II family are proteinase inhibitors that belong to MEROPS inhibitor family I20, clan IA and are restricted to plants. They inhibit serine peptidases belonging to MEROPS peptidase family S1 ( ). They have a multidomain structure, which permits circular permutation of the sequences. It was been shown that some naturally occurring Pin2 proteins, have an `ancestral' circularly permuted structure. Circular permutation/ rearrangements of sequences has also been observed between species, such as favin from Vicia faba and the lectin concanavalin A from Canavalia ensiformis or amongst members of the plant aspartyl proteinases and human lung surfactant proteins.
