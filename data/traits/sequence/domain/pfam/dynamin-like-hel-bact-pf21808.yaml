identifier: Pfam:PF21808
label: Bacterial dynamin-like protein, helical domain
definition: >-
  This entry represents the helical region from Bacterial dynamin-like protein (BDLP, ) from Nostoc punctiforme and similar large GTPases with multidomain architectures mainly found in cyanobacteria. BDLP is a dynamin-related GTPase probably involved in membrane remodelling. This region covers the middle and GED domains which mediate extensive protein-protein contacts.
