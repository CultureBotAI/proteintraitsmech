identifier: Pfam:PF27822
label: SIGLEC family-like protein 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of SIGLEC family-like protein 1 (SIGLECL1). SIGLECL1 is a single-pass membrane protein with an extracellular region containing an immunoglobulin-like domain and a transmembrane helical region. The full-length protein is expressed in a tissue-enriched manner in testis and contains a predicted disordered region within the cytoplasmic C-terminal portion. This domain is found in mammals. The specific function of this cytoplasmic domain remains to be determined.
