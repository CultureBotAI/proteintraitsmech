identifier: Pfam:PF27355
label: MJ1278 domain
definition: >-
  This entry represents the uncharacterised protein MJ1278 and similar sequences found in archaea and bacteria. Proteins in this family are approximately 179-185 amino acids in length and contain predicted coiled-coil regions. Members are encoded by genes that are often adjacent in the genome, suggesting they may function together. Its function remains to be determined.
