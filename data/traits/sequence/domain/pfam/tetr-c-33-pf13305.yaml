identifier: Pfam:PF13305
label: Tetracyclin repressor-like, C-terminal domain
definition: >-
  This domain is around 80 amino acids in length and it is found to the C terminus of a DNA-binding helix-turn-helix domain from a group of bacterial sequences, including the HTH-type transcriptional regulator MT1864 and Rv1816 from Mycobacterium tuberculosis. MT1864 and Rv1816 may participate in the regulatory network that controls the expression of MmpL lipid transporters. Rv1816 binds to intragenic and/or promoter regions of rv1816, mmpL3, rv0204, mmpL11, mmpL7, kasA and mmpS3. This is a regulatory domain whose natural ligands may be fatty acids that allow a transcriptional regulation response.
