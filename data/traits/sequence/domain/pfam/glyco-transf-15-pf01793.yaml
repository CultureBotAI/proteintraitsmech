label: Glycolipid 2-alpha-mannosyltransferase
definition: >-
  This domain is found either standalone or in tandem in uncharacterised eukaryotic proteins. It has a weak sequence similarity to nucleotide-diphospho-sugar transferases, in particular to Glycolipid 2-alpha-mannosyltransferases and is predicted to adopt a similar structure.
