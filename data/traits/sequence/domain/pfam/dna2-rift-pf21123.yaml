identifier: Pfam:PF21123
label: Dna2 Rift barrel domain
definition: >-
  This entry represents ar barrel domain found in the DNA replication ATP-dependent helicase/nuclease DNA2 protein. This domain lies between the nuclease and helicase domains. The DNA2 nuclease-helicase maintains genomic integrity by processing DNA double-strand breaks, Okazaki fragments and stalled replication forks. DNA2 requires ssDNA ends, and is dependent on the ssDNA-binding protein Rpa, which controls cleavage polarity.
