identifier: Pfam:PF03760
label: Late embryogenesis abundant (LEA) group 1
definition: >-
  LEA (late embryogenesis abundant) proteins were first identified in land plants. Plant LEA proteins have been found to accumulate to high levels during the last stage of seed formation (when a natural desiccation of the seed tissues takes place) and during periods of water deficit in vegetative organs. Later, LEA homologues have also been found in various species. They have been classified into several subgroups in Pfam and according to Bray and Dure. This entry represents Pfam LEA_1, or D-113 from Dure, or group 4 from Bray. Proteins in this entry include LEA6, LEA18 and LEA46 from Arabidopsis. They may play roles in the adaptive process to water deficit in higher plants.
