identifier: Pfam:PF27271
label: Uncharacterized membrane protein AF_1327 family
definition: >-
  This entry represents the archaeal uncharacterised membrane protein AF_1327 and similar bacterial sequences. Members of this family vary in size, including AF_1327 (56 amino acids, ~6.2 kDa) and AF_2236 (211 amino acids, ~24.1 kDa). The proteins contain multiple predicted transmembrane helices and are predicted to be multi-pass membrane proteins localised to the cell membrane. The function of this membrane protein family remains to be determined.
