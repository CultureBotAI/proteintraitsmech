identifier: Pfam:PF16278
label: C2HE / C2H2 / C2HC zinc-binding finger
definition: >-
  This is an unusual zinc-binding domain found in fungi, plants and metazoa. It is often found at the C terminus of HIT-domain-containing proteins ( ). In fungi the fourth ligand is a Glu, in plants it is Cys and in metazoans it is usually a His. The fourth ligand is often mutated in neurogenerative disease-states. This domain can be found in Aprataxin, a DNA-binding protein involved in single-strand and double-strand DNA break repair, and base excision repair.
