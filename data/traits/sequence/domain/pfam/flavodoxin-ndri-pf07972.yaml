identifier: Pfam:PF07972
label: 'NrdI Flavodoxin like '
definition: >-
  Ribonucleotide reductases (RNRs) are enzymes that catalyse the conversion of ribonucleotides to the corresponding deoxyribonucleotides to provide the precursors of DNA synthesis. There are three classes (I-III) of RNRs and four known subclasses within class I RNRs (Ia-Id), which differ by their metal cofactor, their stable organic radical and sequence. Class I consists of two homodimeric subunits: alpha2, which catalyses the reversible one-electron oxidation of a conserved cysteine residue to a thiyl radical, which is initiated by a dinuclear metallocofactor and tyrosyl radical positioned in the beta2 subunit. Class Ib RNR is encoded in four different genes: nrdH, nrdI, nrdE (alpha subunit) and nrdF (beta subunit) and has Mn2 in the dimetal cluster to oxidize a nearby tyrosine residue to a stable radical. This family represents NrdI, a flavoprotein activase which provides superoxide that binds to the beta subunit and forms a hydrophilic channel connecting their active sites.
