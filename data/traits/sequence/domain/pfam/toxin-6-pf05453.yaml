identifier: Pfam:PF05453
label: BmTXKS1/BmP02 toxin family
definition: >-
  Scorpion toxins that target K+ channels (KTx) have been classified into four large families: alpha, beta, gamma and kappa-KTx. This family consists of toxin-like peptides from the alpha-KTx 8 and alpha-KTx 9 subfamilies. The precursor of these toxins consists of 60 amino acid residues, with a putative signal peptide of 28 residues and an extra residue, and a mature peptide of 31 residues with an amidated C-terminal. The peptides share close homology with other scorpion K+ channel toxins and should present a common three-dimensional fold - the Cysteine -Stabilised alphabeta (CSalphabeta) motif. This family acts by blocking small conductance calcium activated potassium ion channels in their victim.
