identifier: Pfam:PF04598
label: Gasdermin pore forming domain
definition: >-
  The N-terminal domain of Gasdermins can bind membrane lipids, phosphoinositides and cardiolipin, and exhibits membrane-disrupting cytotoxicity. It was shown to be able to lyse phosphoinositide/cardiolipin-containing liposomes and form pores on membranes. This entry represents the pore forming domain of gasdermin.
