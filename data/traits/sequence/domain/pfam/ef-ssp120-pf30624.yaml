identifier: Pfam:PF30624
label: SSP120-like, EF-hand pair
definition: >-
  This entry represents the EF-hand pair found at the N-terminal of SSP120 from S.cerevisiae and Uncharacterized calcium-binding protein C613.03 from S.pombe. SSP120 is thought to be involved in transport of plasma membrane glycoproteins through the early secretory pathway. C613.03 localises to the endoplasmic reticulum lumen and Golgi apparatus lumen.
