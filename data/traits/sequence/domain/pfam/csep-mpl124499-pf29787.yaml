identifier: Pfam:PF29787
label: Candidate secreted effector protein MPL124499
definition: >-
  This entry represents candidate secreted effector protein MPL124499 from the poplar leaf rust fungus Melampsora larici- populina. The protein is a rust effector that is delivered into infected host tissues to modulate host functions and contribute to pathogen virulence. The protein enhances leaf colonisation by bacterial and oomycete pathogens in Arabidopsis infection models. The protein is secreted and localises to the host cell cytoplasm and nucleus. Expression is induced during host infection. The protein belongs to the CPGH1 family.
