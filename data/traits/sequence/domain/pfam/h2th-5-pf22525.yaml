identifier: Pfam:PF22525
label: S13-like H2TH domain
definition: >-
  This entry represents helix-two turn-helix (H2TH) domains found in Integration host factor from Streptomyces coelicolor (IHF) and similar proteins mainly found in actinomycetes. IHF is a nucleoid-associated protein (NAP) that probably plays a role in chromosome compactation. It contributes to development and secondary metabolism, but is dispensable for growth and viability. This domain is also found at the N-terminal of guanylate kinases.
