identifier: Pfam:PF04413
label: 3-Deoxy-D-manno-octulosonic-acid transferase (kdotransferase)
definition: >-
  This is a domain found in proteins that transfer activated sugars to a variety of substrates, including glycogen, fructose-6-phosphate and lipopolysaccharides. Proteins bearing this domain transfer UDP, ADP, GDP or CMP linked sugars. This region is flanked at the N terminus by a signal peptide and at the C terminus by a glycosyl transferase group 1 domain ( ). The eukaryotic glycogen synthases may be distant members of this bacterial family.
