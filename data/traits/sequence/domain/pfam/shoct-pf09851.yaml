identifier: Pfam:PF09851
label: Short C-terminal domain
definition: >-
  The Short C-terminal (SHOCT) domain is widespread in bacteria but is missing from the most commonly studied model organisms, despite being present in closely related species. It's predominantly C-terminal location, co-occurrence with numerous other domains and short size is reminiscent of the Gram-positive anchor motif, however it is present in a much wider range of species. It may be involved in oligomerisation and nucleic acid binding.
