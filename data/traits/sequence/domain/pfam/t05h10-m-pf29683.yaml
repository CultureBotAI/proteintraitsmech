identifier: Pfam:PF29683
label: T05H10.4 middle domain
definition: >-
  This entry represents a middle domain found in the uncharacterised protein T05H10.4 from Caenorhabditis elegans and related nematode proteins. The protein is expressed in embryonic and other tissues but its function remains unknown. This domain is part of a larger multi-domain protein architecture. The specific function of this middle domain remains to be determined.
