identifier: Pfam:PF14336
label: D-glutamate cyclase-like, C-terminal
definition: >-
  This entry represents the C-terminal domain found in mitochondrial D-glutamate cyclase ( ), which converts D-glutamate to 5-oxo-D-proline. There are two completely conserved G residues that may be functionally important. This domain is also found in numerous uncharacterised proteins from bacteria.
