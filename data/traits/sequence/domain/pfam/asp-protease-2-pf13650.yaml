identifier: Pfam:PF13650
label: Aspartyl protease
definition: >-
  This entry represents a C-terminal domain of approximately 57 residues found in aspartic peptidases in Arachis (peanut). This domain is located C-terminal to the Asp_protease_2 domain ( ). These proteins may be associated with transposable elements. The function of this C-terminal domain remains to be determined.
