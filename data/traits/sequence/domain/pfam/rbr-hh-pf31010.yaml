identifier: Pfam:PF31010
label: RBR-type E3 ubiquitin ligase helical hairpin domain
definition: >-
  This entry represents a helical hairpin domain of approximately 100 residues found in RBR-type E3 ubiquitin-protein ligases including RNF19A (dorfin) and RNF19B (NKLAM) in Metazoa. This domain follows the TRIAD supradomain comprising two RING-type zinc fingers and an IBR domain ( ). These E3 ligases ubiquitinate substrates such as pathogenic SOD1 variants and synphilin-1. RNF19A localizes to Lewy bodies in Parkinson disease and ubiquitylated inclusions in amyotrophic lateral sclerosis, suggesting roles in neurodegenerative disease pathways.
