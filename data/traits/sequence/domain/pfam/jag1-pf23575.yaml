identifier: Pfam:PF23575
label: Protein jagged-1-like, predicted ferredoxin-like domain
definition: >-
  This domain is found in human Protein jagged-1/2 (JAG1, JAG2) and similar proteins from vertebrates. JAG1 is involved in the mediation of Notch signalling. This domain is predicted to show a ferredoxin-like fold.
