identifier: Pfam:PF07717
label: Oligonucleotide/oligosaccharide-binding (OB)-fold
definition: >-
  This domain is found towards the C terminus of the DEAD-box helicases ( ). In these helicases it is apparently always found in association with . There do seem to be a couple of instances where it occurs by itself - e.g. . This C-terminal domain of the yeast helicase contains an oligonucleotide/oligosaccharide-binding (OB)-fold which seems to be placed at the entrance of the putative nucleic acid cavity. It also constitutes the binding site for the G-patch-containing domain of Pfa1p. When found on DEAH/RHA helicases, this domain is central to the regulation of the helicase activity through its binding of both RNA and G-patch domain proteins.
