identifier: Pfam:PF09228
label: Prokaryotic Transcriptional repressor TraM
definition: >-
  Members of this family of transcriptional repressors adopt a T-shaped structure, with a core composed of two antiparallel α-helices. These proteins can be divided into two parts, a globular head and an elongated tail, and they negatively regulate conjugation and the expression of tra genes by antagonising traR/AAI-dependent activation.
