identifier: Pfam:PF00882
label: Zinc dependent phospholipase C
definition: >-
  This domain is found in bacterial zinc-dependent phospholipase C and in eukaryotic phosphatidylinositol-glycan-specific phospholipase D. Bacterial phospholipase C is a zinc-dependent enzyme, binding 3 zinc ions per molecule. This enzyme catalyses the conversion of phosphatidylcholine and water to 1,2-diacylglycerol and choline phosphate. Phosphatidylinositol-glycan-specific phospholipase D is an extracellular amphiphilic glycoprotein. It hydrolyses the inositol phosphate linkage in proteins anchored by phosphatidylinositol glycans, releasing these proteins from the membrane.
