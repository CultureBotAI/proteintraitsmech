identifier: Pfam:PF27146
label: Y4jL N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Y4jL, an uncharacterised protein from Sinorhizobium fredii. The protein is encoded on the symbiotic plasmid pNGR234a. The specific function of this domain remains unknown. This domain can also be found at the C-terminal in putative Plasmid pRiA4b Orf3-like domain-containing proteins from bacteria.
