identifier: Pfam:PF09367
label: CpeS-like protein
definition: >-
  This entry represents the CpcS/CpeS biliprotein lyase family, which have been shown to covalently attach chromophores to cystiene residue(s) of phycobiliproteins. In the chromatically adapting cyanobacterium Fremyella diplosiphon, the proteins have been shown to be induced by green light, as part of the cpeCDESTR operon.
