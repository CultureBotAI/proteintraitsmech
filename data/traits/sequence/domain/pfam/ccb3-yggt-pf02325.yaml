identifier: Pfam:PF02325
label: CCB3/YggT
definition: >-
  This family includes YlmG from bacteria, CCB3 and YlmG homologue proteins (YLMG1-1, YLMG1-2, YLMG2) from Arabidopsis. This family also includes the uncharacterised protein YggT, which has been reported to be required for growth of E.coli mutant cells lacking the major potassium uptake systems. YlmG might be involved in chloroplast and cyanobacterial division processes. Cofactor maturation pathways such as the CCB system (system IV) for cytochrome c-heme attachment are conserved in all organisms performing oxygenic photosynthesis. The CCB system consists of four proteins: CCB1-4. CCB2 and CCB4 are paralogues derived from a unique cyanobacterial ancestor. Orthologues are conserved in higher plants.
