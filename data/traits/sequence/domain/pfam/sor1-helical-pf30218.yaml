identifier: Pfam:PF30218
label: SOR-1 helical domain
definition: >-
  This entry represents a helical domain found in SOR-1 (Sop-2-related protein 1) and related proteins from nematodes. SOR-1 acts synergistically with SOP-2 to maintain the transcriptionally repressive state of homeotic genes throughout development. The proteins form a novel Polycomb group-like complex and are required for epigenetic regulation of gene expression. SOR-1 binds RNA in a sequence-independent manner and localises to the nucleus where it forms subnuclear bodies. The specific function of this helical domain within the SOR-1 protein remains to be determined.
