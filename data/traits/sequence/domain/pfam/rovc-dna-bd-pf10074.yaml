identifier: Pfam:PF10074
label: T6SS, Transcription factor, DNA binding domain
definition: >-
  This domain is found in a group of proteins from proteobacteria, including the hexameric transcription factor from Yersinia pseudotuberculosis RovC, which is essential for the activation of one of the Type VI secretion systems of this organism (T6SS4). This domain folds into a distinct variant of the helix-turn-helix domain that shows an 'extended-turn' motif. It is responsible for DNA binding, participating in transcriptional activation and antiactivation to initiate or inhibit horizontal gene transfer.
