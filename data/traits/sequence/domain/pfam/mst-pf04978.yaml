identifier: Pfam:PF04978
label: Mycothiol-S-transferase
definition: >-
  This entry, previously known as DUF664, represents the Mycothiol S-transferase (MST) from Mycobacterium tuberculosis and related proteins mainly found in Actinobacteria. MST binds to and is responsible for the transfer of Mycothiol (MSH) to xenobiotic acceptors. The ability of MST to catalyse this reaction depends on the presence of divalent metal ions and this enzyme exhibits only a residual activity in metal absence. MST is a member of the DinB-like superfamily ( ). It folds into a canonical four-helical bundle that creates a metal binding site using a combination of three highly conserved coordinating histidine and aspartate residues. It was shown that MST uses Fe2+ as the catalytic metal in vivo.
