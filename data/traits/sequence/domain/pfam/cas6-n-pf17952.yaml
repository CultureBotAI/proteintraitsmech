identifier: Pfam:PF17952
label: Cas6 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Cas 6, which is an endoribonuclease necessary for crRNA production whereas the additional Cas proteins that form the Cascade complex are needed for crRNA stability. Structural analysis of Sulfolobus sulfotaricus P2 Cas6 (SsCas6) proteins indicate that SsCas6 is able to bind and cleave the nonstructured RNA by stabilizing an otherwise unstable duplex of two base pairs near the cleavage site, leading to an inline conformation around the scissile phosphate necessary for its breakage.
