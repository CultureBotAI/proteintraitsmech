identifier: Pfam:PF16823
label: Atypical PilZ domain, cyclic di-GMP receptor
definition: >-
  This entry represents an atypical PilZ domain, which has the same structure as canonical PilZ domains with the exception of a short N-terminal α-helix and an insert that forms two additional α-helices. This domain is found in the cyclic di-GMP receptors XCC6012 from the plant pathogen Xanthomonas campestris pv. campestris (Xcc). XCC6012 forms a tetramer that adopts a novel 'house-like' construct, with a central pillar domain of the four vertical alpha3 helices, a roof-top domain made up of the eight inclined alpha2 and alpha4 helices, and four corner-stone domains making up the PilZ domain, referred to as tetrameric PilZ domain (tPliZ).
