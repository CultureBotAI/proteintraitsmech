identifier: Pfam:PF25082
label: GIPC1-3 GH2 domain
definition: >-
  The GIPC family includes PDZ domain-containing proteins, GIPC1 (also called GAIP C-terminus-interacting protein, RGS-GAIP-interacting protein, RGS19-interacting protein 1, RGS19IP1, synectin, tax interaction protein 2, or TIP-2), GIPC2, and GIPC3, which may act as scaffold proteins linking heterotrimeric G-proteins to seven-transmembrane-type WNT receptor or to receptor tyrosine kinases. They might play key roles in carcinogenesis and embryogenesis through modulation of growth factor signalling and cell adhesion. GIPCs proteins are composed of a GIPC homology 1 (GH1) domain, a central PDZ domain and a GH2 domain. This entry corresponds to the GH2 domain, which mediates the interaction with myosin VI and is involved in homodimerization in the autoinhibited state.
