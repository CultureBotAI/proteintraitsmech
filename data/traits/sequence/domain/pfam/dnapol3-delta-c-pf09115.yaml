identifier: Pfam:PF09115
label: DNA polymerase III, delta subunit, C terminal
definition: >-
  This entry represents a domain which is predominantly found in prokaryotic DNA polymerase III, assuming an α helical structure with a core of five α helices and an additional small helix. This domain is essential for the formation of the polymerase clamp loader.
