identifier: Pfam:PF00094
label: von Willebrand factor type D domain
definition: >-
  This domain is found in mouse von Willebrand factor D and EGF domain-containing protein (Vwde) and similar animal sequences. Vwde may play a role in initial ameloblast differentiation and is involved in the maturation of enamel mineralisation. This domain is predicted to have an all-α helical configuration and is often found associated with .
