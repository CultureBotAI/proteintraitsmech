identifier: Pfam:PF30825
label: IQCK dimerization/docking domain
definition: >-
  This entry represents a dimerization/docking (D/D) domain found in IQCK (IQ domain-containing protein K) and related proteins. This domain shows sequence similarity to the D/D domains of the regulatory subunit of cAMP-dependent protein kinase (PKA) and the DPY-30/SDC1 protein family . IQ motif-containing proteins may play roles in cell polarisation, migration and ciliary function. This entry is found in metazoans, with representation in both vertebrates and invertebrates. The specific function of this domain in IQCK remains to be determined. This entry also includes EF-hand calcium-binding domain-containing protein 5 which contains a highly similar D/D domain at the N-terminal.
