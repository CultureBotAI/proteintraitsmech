identifier: Pfam:PF06813
label: Nodulin-like
definition: >-
  This entry represents a conserved domain within plant nodulin-like proteins and a number of uncharacterised proteins. Including this domain is the Arabidopsis thaliana protein NFD4 (Nuclear Fusion Defective 4) ( ). NFD4 is required for karyogamy during female gametophyte development, when the two polar nuclei fuse to form the diploid central cell nucleus .
