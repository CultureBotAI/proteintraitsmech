identifier: Pfam:PF02758
label: PAAD/DAPIN/Pyrin domain
definition: >-
  The DAPIN (Domain in Apoptosis and INterferon response) domain is an 80-100- residue domain which is found in the N terminus of diverse vertebrate and vertebrate-specific viral proteins involved in apoptosis, cancer, inflammation, and immune response. The DAPIN domain can be found alone or in association with other domains like CARD, LRR, SPRY, Caspase or Zinc finger B-box. It has been proposed that the DAPIN domain might have an adaptor function, coupling apoptosis and immune disorders. It has been shown that the DAPIN domain is a protein-protein interaction domain capable of binding to other DAPIN domains. Secondary structure predictions have identified the DAPIN domain as mostly α-helical and it has been suggested that it could belong to the DEATH- domain-fold superfamily, which includes the CARD, the DEATH domain (DD) and the DEATH effector domain (DED). The DAPIN domain has also been called pyrin domain, pyrin N-terminal homology domain (PYD) or PAAD (after the protein families pyrin, AIM, ASC death-domain- like).
