identifier: Pfam:PF01064
label: Activin types I and II receptor domain
definition: >-
  This is a hydrophilic cysteine-rich ligand-binding domain found in both TGF-beta receptor types (type I and II). In both types, this domain posses a 9 amino acid cysteine box, with the the consensus CCX{4-5}CN. The type I receptors also possess 7 extracellular residues preceding the cysteine box. The Transforming growth factor-beta superfamily of ligands include: bone morphogenetic proteins (BMPs), growth and differentiation factors (GDFs), anti-mullerian hormone (AMH), activin, nodal and TGF-beta. Signalling begins with the binding of a TGF-beta superfamily ligand to a TGF-beta type II receptors. The type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. The receptors for most of the members of this growth factor family are related. They are receptor-type kinases of Ser/Thr type, which have a single transmembrane domain and a specific hydrophilic Cys-rich ligand-binding domain.
