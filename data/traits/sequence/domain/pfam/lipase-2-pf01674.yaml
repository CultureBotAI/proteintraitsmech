identifier: Pfam:PF01674
label: Lipase (class 2)
definition: >-
  This family represents lipase estA and extracellular esterase estB. Lipase estA (also known as lipase LipA) was initially identified in Bacillus subtilis as a lipase that was active toward p-nitrophenyl esters and triacylglycerides, displaying a marked preference for esters with C8 acyl groups. A second, secreted lipase (LipB) was then identified in Pseudomonas fluorescens. However, it is likely that this second enzyme functions as an esterase, rather than a lipase. It has therefore been renamed extracellular esterase estB.
