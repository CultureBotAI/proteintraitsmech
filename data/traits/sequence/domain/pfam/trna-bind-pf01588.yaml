identifier: Pfam:PF01588
label: Putative tRNA binding domain
definition: >-
  This domain is found in prokaryotic methionyl-tRNA synthetases, prokaryotic phenylalanyl tRNA synthetases, the yeast GU4 nucleic-binding protein (G4p1 or p42, ARC1), human tyrosyl-tRNA synthetase, endothelial-monocyte activating polypeptide II and export-related chaperon CsaA. G4p1 binds specifically to tRNA form a complex with methionyl-tRNA synthetases. In human tyrosyl-tRNA synthetase, this domain may direct tRNA to the active site of the enzyme. This domain may perform a common function in tRNA aminoacylation. In ARC1, this domain has been shown to have a catalytic activity.
