identifier: Pfam:PF23270
label: Glycerol-3-phosphate acyltransferase RAM2-like, HAD-like domain
definition: >-
  This domain is found at the N-terminal of Glycerol-3 -phosphate acyltransferase RAM2 from Medicago truncatula, GPAT1-8 from Arabidopsis and related plant proteins which esterify the acyl-group from acyl-ACP to the sn-2 position of glycerol-3-phosphate, a step in cutin biosynthesis. RAM2 is involved in the production of cutin monomers, which act as plant signals that promote colonisation by arbuscular mycorrhizal fungi. GPAT1 is involved in pollen development, by being required for tapetum differentiation and male fertility. In addition to the sporophytic effect, it also exerts a gametophytic effect on pollen performance. This domain is predicted to adopt an α-β structure similarly to this found in other haloacid dehalogenase (HAD) proteins.
