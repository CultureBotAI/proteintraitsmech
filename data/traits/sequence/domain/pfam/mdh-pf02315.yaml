identifier: Pfam:PF02315
label: Methanol dehydrogenase beta subunit
definition: >-
  Methanol dehydrogenase (MDH) ( ), found in Gram-negative bacteria, is a pyrroloquinoline quinone (PQQ)-containing enzyme which oxidises methanol to formaldehyde. It is located in the periplasmic space and passes electrons derived from the oxidation of methanol to the soluble cytochrome cL. The enzyme is a tetramer composed of two large alpha subunits and two smaller beta subunits. The alpha subunit binds the PQQ cofactor and contains the active site, while the function of the beta subunit is currently unknown. The alpha subunit forms an eight-bladed propeller structure, with several novel tryptophan-docking motifs linking the individual blades together. This entry represents the beta subunit of methanol dehydrogenase.
