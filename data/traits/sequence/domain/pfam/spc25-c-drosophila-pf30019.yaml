identifier: Pfam:PF30019
label: Kinetochore protein Spc25 C-terminal domain
definition: >-
  This entry represents the C-terminal domain in kinetochore protein Spc25 family. Members act as components of the essential kinetochore-associated Ndc80 complex, which is required for chromosome segregation and spindle checkpoint activity during meiosis and mitosis. Spc25 is required for kinetochore integrity and the organisation of stable microtubule binding sites in the outer plate of the kinetochore. The proteins are localised to the nucleus and kinetochore and contain a coiled-coil domain. The family is found in Drosophila species.
