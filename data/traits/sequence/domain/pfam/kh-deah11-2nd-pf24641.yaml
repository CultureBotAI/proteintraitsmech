identifier: Pfam:PF24641
label: DEAH11 eukaryotic type KH-domain
definition: >-
  This domain is found in the ATP-dependent RNA helicase DEAH11 and DEAH12 from Arabidopsis thaliana and related plant proteins. This domain shares detectable similarity to type I KH domains and is predicted to adopt an α/β structure with similar topology.
