identifier: Pfam:PF25164
label: Competence protein CoiA, N-terminal domain
definition: >-
  This domain is found N-terminal in the Competence protein CoiA from Bacillus subtilis, Druantia protein DruB from Escherichia coli, and related bacterial proteins. It contains three highly conserved cysteine and histidine residues that are probably involved in metal coordination. CoiA falls within a competence-specific operon in Streptococcus. It is required for optimal transformation. Competence is the ability of a cell to take up exogenous DNA from its environment, resulting in transformation. It is widespread among bacteria and is probably an important mechanism for the horizontal transfer of genes. DNA usually becomes available by the death and lysis of other cells. Competent bacteria use components of extracellular filaments called type 4 pili to create pores in their membranes and pull DNA through the pores into the cytoplasm. This process, including the development of competence and the expression of the uptake machinery, is regulated in response to cell-cell signalling and/or nutritional conditions. DruB is a component of antiviral defense system Druantia type I.
