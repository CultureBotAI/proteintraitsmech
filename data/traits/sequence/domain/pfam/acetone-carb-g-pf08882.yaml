identifier: Pfam:PF08882
label: Acetone carboxylase gamma subunit
definition: >-
  This entry represents the beta subunit of acetophenone carboxylase and the gamma subunit of acetone carboxylase. Acetophenone carboxylase catalyses the carboxylation of acetophenone to form 3-oxo-3-phenylpropanoate (benzoylacetate) in the anaerobic catabolism of ethylbenzene. Acetone carboxylase catalyses the carboxylation of acetone to form acetoacetate.
