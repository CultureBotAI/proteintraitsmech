identifier: Pfam:PF08294
label: TIM21
definition: >-
  Tim21 is an essential component of the TIM23 complex, which mediates the translocation of transit peptide-containing proteins across the mitochondrial inner membrane. Tim21 is required to keep the TOM and the TIM23 complexes in close contact. At some point, it is released from the TOM23 complex to allow protein translocation into the mitochondrial matrix.
