identifier: Pfam:PF27914
label: 5'-adenylylsulfate reductase 7, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of 5'-adenylylsulfate reductase-like 2-7 (APRL2-7) proteins found in plants. APRL proteins are membrane-associated proteins containing an N-terminal signal peptide, a central thioredoxin domain, and this C-terminal region which includes a transmembrane helix. The APRL family includes multiple paralogues that are typically 289-311 amino acids in length.
