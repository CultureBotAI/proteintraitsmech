identifier: Pfam:PF18066
label: Phage ABA sandwich domain
definition: >-
  This domain is found in a prophage protein BC1872 from B. cereus. The domain forms a three-layer β/α/β sandwich. Three α-helices, alpha1, alpha2, and alpha3, are sandwiched on one side by three-stranded antiparallel β-sheet (beta3, beta4, and beta5) and on the other by a β-hairpin (beta1 and beta2).
