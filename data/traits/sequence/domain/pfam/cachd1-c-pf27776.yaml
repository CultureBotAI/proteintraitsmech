identifier: Pfam:PF27776
label: CACHD1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of VWFA and cache domain-containing protein 1 (CACHD1). CACHD1 is a single-pass type I membrane protein that may regulate voltage-dependent calcium channels. The protein belongs to the calcium channel subunit alpha-2/delta family and is found in animals. CACHD1 contains an N-terminal signal peptide. The specific function of this C-terminal domain remains to be determined. This domain is followed by a large disordered region.
