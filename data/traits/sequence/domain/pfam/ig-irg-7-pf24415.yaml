identifier: Pfam:PF24415
label: Irg-7-like, Ig-like domain
definition: >-
  This domain is found in Irg-7 from Caenorhabditis elegans and similar animal sequences. This domain is predicted to adopt an immunoglobulin-like fold. Irg-7 is known as mediator of longevity in germlineless animals. It plays a role in the innate immunity, probably via the atf-7 pathway, and confer resistance to pathogenic bacteria.
