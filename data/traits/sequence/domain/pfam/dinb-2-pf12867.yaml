identifier: Pfam:PF12867
label: DinB superfamily
definition: >-
  This entry represents a DinB-like structural domain found in Hercynine oxygenase (egtB), putative metal-dependent hydrolase and related proteins. DinB from Bacillus subtilis and related Gram-positive bacteria is a DNA-damage-induced gene and the corresponding protein contains a four helix bundle. This fold is shared by diverse proteins. Hercynine oxygenase (EgtB) catalyses the oxidative sulfurisation of hercynine (Nα,Nα,Nα-trimethyl-L-histidine) to hercynyl-γ-L-glutamyl-L-cysteine sulfoxide, an intermediate step in the ergothioneine biosynthesis pathway. The enzyme is specific for its substrates: it cannot utilise cysteine, N-acetylcysteine or glutathione in place of γ-glutamylcysteine, and histidine is a poor sulfur acceptor compared to hercynine.
