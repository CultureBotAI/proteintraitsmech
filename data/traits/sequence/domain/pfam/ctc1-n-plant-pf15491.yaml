identifier: Pfam:PF15491
label: CST, telomere maintenance, complex subunit CTC1 N-terminal domain
definition: >-
  This entry represents the conserved telomere maintenance Component 1 (CTC1) protein from plants. In Arabidopsis thaliana, AtCTC1 localises to telomeres, interacts with AtSTN1 and plays an role in telomere maintenance. AtCTC1 also interacts with lagging-strand replication machinery. AtCTC1 is a component of the plant CST complex.
