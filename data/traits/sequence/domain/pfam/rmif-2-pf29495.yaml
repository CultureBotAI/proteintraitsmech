identifier: Pfam:PF29495
label: RecQ-mediated genome instability protein 2
definition: >-
  This entry represents RMIF-2, an essential component of the RMI complex involved in homologous recombination. RMIF-2 is part of the BTR double Holliday junction dissolution complex which processes recombination intermediates during meiotic double strand break repair in the germline. The protein positively regulates rad-51 accumulation at double strand breaks and stabilises BTR complex components at nuclear foci during meiotic recombination. RMI2 interacts directly with RMH-1 and is localised to the nucleus. The protein is expressed in the germline during pachytene in meiotic prophase I.
