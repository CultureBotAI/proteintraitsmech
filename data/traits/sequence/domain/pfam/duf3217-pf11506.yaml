identifier: Pfam:PF11506
label: Protein of unknown function (DUF3217)
definition: >-
  This family of proteins with unknown function appears to be restricted to Mycoplasma and Ruminococcus spp. The structure of Uncharacterized protein MG376 homologue from Mycoplasma pneumoniae shows an OB fold with six β-strands and three loops forming a β-barrel that is capped by one α-helix. Its specific function is still unknown.
