identifier: Pfam:PF28989
label: Uncharacterized protein YGL138C N-terminal domain
definition: >-
  This entry represents Uncharacterized protein YGL138C and related proteins found in fungi. The full-length protein YGL138C from Saccharomyces cerevisiae is 345 amino acids in length and has been localised to the prospore membrane based on high-throughput data. Its specific function remains to be determined.
