identifier: Pfam:PF20963
label: Acanthaporin
definition: >-
  This entry represents a domain found in acanthaporin, a pore-forming toxin from acanthamoebae, an opportunistic pathogen. This protein is cytotoxic for neuronal cells in humans and shows antimicrobial activity against diverse bacterial strains by permeabilising their membranes. It folds into a disulfide-bonded four-α-helix monomeric structure that dimerises at pH 8.0 due to the deprotonation of some histidine residues, which leads to a conformational change.
