identifier: Pfam:PF24978
label: Lrrd1 death domain
definition: >-
  This entry represents the C-terminal death domain (DD) found in LRRD1 protein and related proteins from vertebrates. LRRD1 was recently identified as a component of the radial spokes (RS3) in the mammalian motile cilia that along with Sperm-specific RS3 protein STKLD1, interact with EFCAB5 to further stabilise the structure.
