identifier: Pfam:PF03481
label: Threonylcarbamoyl-AMP synthase, C-terminal domain
definition: >-
  This domain can be found in the C terminus of threonylcarbamoyl-AMP synthases, including Sua5 from Saccharomyces cerevisiae and YwlC from Bacillus subtilis. Threonylcarbamoyl-AMP synthase is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t6A37) in tRNAs that read codons beginning with adenine. This domain adopts the Rossmann fold and may be involved in GTP and/or tRNA binding based on structural similarity with both GTP and tRNA binding proteins.
