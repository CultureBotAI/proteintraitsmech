identifier: Pfam:PF18258
label: Interleukin-4 inducing immunoglobulin-binding domain
definition: >-
  This domain is found in Interleukin-4 inducing protein alpha-1 (IPSE/alpha-1) present in Schistosoma mansoni, a parasite of humans. IPSE/alpha-1 triggers the release of IL-4 from basophils in the liver which is a major site of egg deposition during S. mansoni infection. This domain adopts a beta-gamma-crystallin fold that is stabilised by three disulfide bonds within the domain (23/26, 59/93, and 111/121). The domain is involved in immunoglobulin binding.
