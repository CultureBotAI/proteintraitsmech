identifier: Pfam:PF22664
label: Trichothecene 3-O-acetyltransferase-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of trichothecene 3-O-acetyltransferase from Gibberella zeae (Tri101, ) and similar fungal sequences. Some members of this entry consist of N- and C-terminal domains arranged in a doughnut-form. The active site lies in the doughnut-hole formed by the interface between these domains.
