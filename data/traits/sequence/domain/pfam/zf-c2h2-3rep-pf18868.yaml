identifier: Pfam:PF18868
label: Zinc finger C2H2-type, 3 repeats
definition: >-
  This entry includes three instances of the Zinc finger C2H2-type. They contain a short β hairpin and an α helix (β/β/α structure), where a single zinc atom is held in place by Cys(2)His(2) (C2H2) residues in a tetrahedral array. Proteins containing this repeats include SUVR5, a histone methyltransferase that functions together with its binding partner LDL1/SWP1 as one of the regulators of flower timing in Arabidopsis.
