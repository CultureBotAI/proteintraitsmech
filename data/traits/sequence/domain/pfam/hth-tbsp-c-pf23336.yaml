identifier: Pfam:PF23336
label: Transcriptional regulator TbsP-like, C-terminal HTH domain
definition: >-
  This domain is found at the C terminus of the putative transcriptional regulator TbsP from Haloferax volcanii (Halobacterium volcanii) ( , also known as HVO_2861) and similar sequences predominantly found in Halobacteria. TbsP is required for adhesion to abiotic surfaces (i.e., biofilm formation) and maintains wild-type cell morphology and motility. This domain is predicted to adopt a MarR-type helix-turn-helix (HTH) structure.
