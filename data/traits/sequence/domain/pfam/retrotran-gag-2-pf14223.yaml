identifier: Pfam:PF14223
label: gag-polypeptide of LTR copia-type
definition: >-
  This entry includes LTR-polyproteins, or retrotransposons of the copia-type. It can be found at the N-terminal of Copia from Drosophila melanogaster, RE1 and RE2 from Arabidopsis and related sequences from plants, fungi and arthropods. These are LTR-polyproteins, or retrotransposons of the copia-type. The function of these proteins is not yet known.
