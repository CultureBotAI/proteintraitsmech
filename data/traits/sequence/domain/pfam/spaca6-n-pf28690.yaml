identifier: Pfam:PF28690
label: SPACA6 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the SPACA6 (sperm acrosome membrane-associated protein 6). SPACA6 is a type I membrane protein localised to the acrosome membrane of sperm that is required for sperm-egg membrane fusion during fertilisation. The protein forms a complex with IZUMO1 and TMEM81 on the sperm surface. This N-terminal domain contains two CXXC motifs and forms multiple disulphide bonds. The extracellular region shows structural similarity to IZUMO1 but does not interact with the IZUMO1 receptor IZUMO1R/JUNO. The domain is found in vertebrates. The specific function of this domain remains to be determined.
