identifier: Pfam:PF23603
label: Telomere repeat-binding protein 1-like, ubiquitin-like domain
definition: >-
  This domain is found in Telomere repeat-binding protein 1-6 from Arabidopsis thaliana (TPR1-6) and similar plant proteins. This domain is predicted to adopt a ubiquitin-like fold. AtTRP1 binds specifically to the plant telomeric double-stranded DNA sequences 5'-GGTTTAG-3'. It interacts with the ethylene receptor ERS1 and modulates development in Arabidopsis. AtTRP4, also known as AtTBP1 (AT5G13820), is required for telomere length homeostasis and its Myb-extension domain stabilises plant telomeric DNA binding.
