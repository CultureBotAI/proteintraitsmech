identifier: Pfam:PF23339
label: PTHB1 C-terminal helix bundle
definition: >-
  This entry represents the C-terminal helix bundle (CtH) found in PTHB1 protein. PTHB1 (also known as Bardet-Biedl syndrome 9 protein, BBS9) forms a part of the BBSome complex, which is required for ciliogenesis. PTHB1 is the major binding subunit of the IFT38 C-terminal tail, which assists the BBSome in some of its roles.
