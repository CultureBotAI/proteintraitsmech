identifier: Pfam:PF25076
label: FHL2/3 N-terminal LIM domain
definition: >-
  This entry represents the N-terminal LIM domain of Four and a half LIM domains proteins 1/2/3/5 (FHL1/2/3/5) and related animal sequences. FHL3 is recruited by SOX15 to FOXK1 promoters where it acts as a transcriptional coactivator of FOXK1. FHL2 may function as a molecular transmitter linking various signalling pathways to transcriptional regulation. It inhibits the transcriptional activity of FOXO1 and its apoptotic function by enhancing the interaction of FOXO1 with SIRT1 and OXO1 deacetylation.
