identifier: Pfam:PF02580
label: D-Tyr-tRNA(Tyr) deacylase
definition: >-
  This family consists of D-aminoacyl-tRNA deacylase DTD, also known as D-Tyr-tRNA(Tyr) deacylase. It is an enzyme that cleaves misacetylated D-aminoacyl-tRNA molecules into free tRNAs and D-amino acids. Cell growth inhibition by several D-amino acids can be explained by an in vivo production of D-aminoacyl-tRNA molecules. The enzyme is found in bacteria and in eukaryotes but not in archaea. It has a β-barrel-like fold structure and forms homodimers in which two surface cavities serve as the active site for tRNA binding.
