identifier: Pfam:PF00857
label: Isochorismatase domain
definition: >-
  This entry represents a domain found in hydrolase enzymes that belong to the isochorismatase family, including Ureidoacrylate amidohydrolase RutB from Escherichia coli and Nicotinamidase from Saccharomyces cerevisiae. Isochorismatase (also known as 2,3 dihydro-2,3 dihydroxybenzoate synthase) catalyses the conversion of isochorismate, in the presence of water, to 2,3-dihydroxybenzoate and pyruvate. This domain shows a typical helix-sheet-helix sandwich structural architecture, with a central β-sheet made of six parallel strands, three α-helices on one side and two α-helices on the other.
