identifier: Pfam:PF24921
label: E3 ubiquitin-protein ligase XB3/XBAT31 RING finger
definition: >-
  This entry represents the RING finger domain found at the C-terminal end of E3 ubiquitin-protein ligase XB3 from rice and its plant homologues, including XBAT31/32/33 from Arabidopsis thaliana. XB3 is an E3 ubiquitin-protein ligase required for full accumulation of the LRR receptor kinase XA21 and XA21-mediated disease resistance. Binding to XA21 may stabilise the receptor kinase and maintain its protein level. XBAT31 regulates thermoresponsive hypocotyl growth through mediating degradation of the thermosensor ELF3.
