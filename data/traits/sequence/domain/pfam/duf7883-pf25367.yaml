identifier: Pfam:PF25367
label: Domain of unknown function (DUF7883)
definition: >-
  This entry represents a domain of unknown function identified in Trypanosoma. Based on structural predictions, this domain is hypothesised to adopt a winged helix-turn-helix (HTH) fold. Winged helix DNA-binding proteins share a characteristic winged helix-turn-helix DNA-binding motif, in which the "wings", or loops, are small β-sheets.
