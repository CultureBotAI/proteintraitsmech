identifier: Pfam:PF20424
label: PilZN3 domain
definition: >-
  This is a noncanonical PilZ domain found at the N-terminal of proteins from spirochaetales, such as B. burgdorferi BB0733 and Treponema denticola TDE0214 proteins. They have a PilZN3-PilZ domain architecture and affect the motility and virulence of these organisms. Secondary structure predictions suggest that this domain retains the C-terminal α-helix of PilZ and three additional α-helices.
