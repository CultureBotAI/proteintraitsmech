identifier: Pfam:PF17262
label: Cas6b C-terminal domain
definition: >-
  Clustered, regularly interspaced, short palindromic repeat (CRISPR) loci play a pivotal role in the prokaryotic host defence system against invading genetic materials. The CRISPR loci are transcribed to produce CRISPR RNAs (crRNAs), which form interference complexes with CRISPR-associated (Cas) proteins to target the invading nucleic acid for degradation. Four Cas proteins (Cas5, Cas6b, Cas7 and Cas8b) are proposed to form a Type I-B Cascade complex that mediates the antiviral defence.
