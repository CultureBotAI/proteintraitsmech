identifier: Pfam:PF04055
label: Radical SAM superfamily
definition: >-
  This domain at the C-terminal end of Slr0304 protein from Synechocystis sp. PCC 6803 ( ) and Slr3097 protein from Nostoc sp. PCC 7120 ( ), which were named in 2019 as ArsS, a radical SAM enzyme involved in arsenosugar biosynthesis. This domain has several conserved Cys residues, one of which is replaced by selenocysteine in at least five bacterial reference genomes. It is found in association with an N-terminal radical_SAM domain ( ). Members of this group are predominantly found in bacterial proteins.
