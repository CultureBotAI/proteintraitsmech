identifier: Pfam:PF31147
label: Ig-like domain in actinomycete serine proteases
definition: >-
  This entry represents an Ig-like domain of approximately 120 residues found in secreted subtilisin-like serine proteases (Peptidase_S8 family) in Actinomycetota, including Streptomyces, Micromonosporaceae, and Pseudonocardiaceae. The domain is located between the Peptidase_S8 catalytic domain ( ) and the PPC (pre-peptidase C-terminal) domain ( ). These proteases are exported via the twin-arginine translocation (Tat) pathway. The function of this Ig-like domain is unknown but it may be involved in protein-protein interactions or substrate binding.
