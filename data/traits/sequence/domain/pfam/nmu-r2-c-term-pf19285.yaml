identifier: Pfam:PF19285
label: Neuromedin-U receptor 2, C-terminal
definition: >-
  This entry represents the C-terminal domain of the Neuromedin-U receptor 2 (NMU-R2). These proteins are G-protein-coupled receptors (GPCR) for the neuromedin-U and neuromedin-S neuropeptides expressed in specific regions of the brain. It contains two potential casein kinase II phosphorylation sites at threonines residues and one protein kinase C phosphorylation site at a serine residue, which are important to regulate the receptor functionality. Its physiological roles are related to modulation of sensory function, neuroendocrine control, food intake as well as with circadian rhythm. However, peripheral expression of this receptor has been determined and includes kidney (medulla), lung and trachea. The use of selective agonists for this molecule are being studied as treatment for disorders such as obesity.
