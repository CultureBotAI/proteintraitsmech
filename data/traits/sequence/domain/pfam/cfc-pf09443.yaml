identifier: Pfam:PF09443
label: Cripto_Frl-1_Cryptic (CFC)
definition: >-
  This entry represents the CFC domain found in the membrane protein Cripto (or teratocarcinoma-derived growth factor) and Cryptic proteins. CFC is approximately 40 residues long, compacted by three internal disulphide bridges, and binds Alk4 via a hydrophobic patch. CFC is structurally homologous to the VWFC-like domain. Cryptic is involved in the correct establishment of the left-right axis. It may play a role in mesoderm and/or neural patterning during gastrulation. Cripto is a protein overexpressed in many tumours and structurally similar to the C-terminal extracellular portions of Jagged 1 and Jagged 2.
