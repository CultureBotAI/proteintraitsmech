identifier: Pfam:PF20640
label: Rrn6, helical bundle domain
definition: >-
  This entry represents the helical bundle domain (also referred to as the headlock domain) from RNA polymerase I-specific transcription initiation factor RRN6. This helical domain is found C-terminal to the β-propeller ( ), that wraps around Rrn7 and is part of module II of the core factor (CF). RNA polymerase I-specific transcription-initiation factor Rrn6 is a component of a multisubunit core transcription factor, essential for the initiation of rDNA transcription by Pol I. The DNA-bound core factor (CF) resembles a right hand holding the DNA molecule between the fingers and the palm, with the thumb pointing toward Pol I. The palm is composed of the N-terminal regions of Rrn11 and Rrn6, the thumb is composed of the C-terminal of Rrn11 while the fingers and knuckles are composed of Rrn7 and the C-terminal half of Rrn6, respectively.
