identifier: Pfam:PF19345
label: Mycobacterial methylenetetrahydrofolate reductase
definition: >-
  This family represents a group of methylenetetrahydrofolate reductases from actinomycetes, including MSMEG_6596 (MTHFR1, ) and MSMEG_6649 (MTHFR2, ) from Mycolicibacterium smegmatis. Both MTHFR1 and MTHFR2 found in Mycobacterium smegmatis are involved in de novo methionine biosynthesis and required for antifolate resistance in mycobacteria. Both of these MTHFRs are monomeric and lack flavin coenzymes. They adopt a TIM barrel structure.
