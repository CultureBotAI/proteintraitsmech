identifier: Pfam:PF01735
label: Lysophospholipase catalytic domain
definition: >-
  This family consists of lysophospholipase / phospholipase B and cytosolic phospholipase A2 which also has a C2 domain . Phospholipase B enzymes catalyse the release of fatty acids from lysophsopholipids and are capable in vitro of hydrolyzing all phospholipids extractable from yeast cells. Cytosolic phospholipase A2 associates with natural membranes in response to physiological increases in Ca 2+ and selectively hydrolyses arachidonyl phospholipids, the aligned region corresponds the carboxy-terminal Ca 2+ -independent catalytic domain of the protein as discussed in.
