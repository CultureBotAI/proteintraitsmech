identifier: Pfam:PF12835
label: Integrase
definition: >-
  Phage integrase proteins cleave DNA substrates by a series of staggered cuts, during which the protein becomes covalently linked to the DNA through a catalytic tyrosine residue at the carboxy end of the alignment. This entry represents the catalytic domain from a family of putative prophage DNA-binding integrases.
