identifier: Pfam:PF18175
label: CCDC81-like prokaryotic HU domain 2
definition: >-
  This entry represents the second of two HU domains found in bacterial proteins typically fused to a C-terminal transmembrane helix and an extracellular peptidoglycan-binding domain. The HU domains in many of these proteins are predicted to function in tethering the nucleoid to the cell envelope.
