identifier: Pfam:PF21861
label: Replication protein RepB, C-terminal
definition: >-
  This entry represents the C-terminal oligomerisation domain (OD) of plasmid replication proteins, such as RepB. These proteins are essential for replication of plasmids, the Rep proteins are topoisomerases that nick the positive stand at the plus origin of replication and also at the single-strand conversion sequence. They consist of an N-terminal origin binding domain (OBD, ) which is the DNA-binding/catalytic domain that belongs to the HUH endonuclease superfamily and this C-terminal helical domain, which is responsible for the hexameric state of the protein.
