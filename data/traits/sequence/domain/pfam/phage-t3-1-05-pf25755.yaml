identifier: Pfam:PF25755
label: Enterobacteria phage T3 gene 1.05 protein
definition: >-
  This entry represents an uncharacterised gene 1.05 protein found in Enterobacteria phage T3. The function of this small phage protein is currently unknown. Structure prediction suggests that this region forms a compact domain composed of 6 β-strands that form a small β-sandwich.
