identifier: Pfam:PF06566
label: Chondroitin sulphate attachment domain
definition: >-
  This entry represents the chondroitin sulphate attachment domain of Chondroitin sulfate proteoglycan 5 (CSPG5, also known as CALEB), which mediates dendritic tree and spine complexity. This domain contains several potential sites of chondroitin sulphate attachment, as well as potential sites of N-linked glycosylation.
