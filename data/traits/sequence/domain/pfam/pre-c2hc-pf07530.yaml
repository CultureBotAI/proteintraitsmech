identifier: Pfam:PF07530
label: Associated with zinc fingers
definition: >-
  This domain (PRE_C2HC) is present in proteins associated with nuclear functions and is found exclusively in the arthropods, including a number of Drosophila species, the silk moth and the gypsy moth. These proteins are possibly involved in RNA binding or single strand DNA binding.
