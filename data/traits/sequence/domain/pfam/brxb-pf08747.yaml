identifier: Pfam:PF08747
label: BREX protein BrxB
definition: >-
  This family includes BREX protein BrxB from Bacillus cereus, which is part of a type 1 BREX (bacteriophage exclusion) system, a system that provides immunity against bacteriophage, which allows phage adsorption but prevents phage DNA replication, without degradation of the phage DNA. The exact function of BrxB is not clear.
