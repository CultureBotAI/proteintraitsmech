identifier: Pfam:PF30033
label: Peroxisomal membrane protein PEX15 N-terminal domain
definition: >-
  This entry represents peroxisomal membrane protein PEX15. PEX15 functions as a peroxisomal docking factor that anchors PEX1 and PEX6 to peroxisome membranes and is required for formation of the PEX1-PEX6 AAA ATPase complex. The protein is localised to the peroxisome and endoplasmic reticulum membranes. The N-terminal cytoplasmic domain interacts with PEX6 and is required for peroxisome biogenesis. The family is found in fungi.
