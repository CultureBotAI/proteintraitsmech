identifier: Pfam:PF31164
label: HpcH/HpaI aldolase C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 45 residues found in HpcH/HpaI aldolase family proteins in Actinomycetes, including Mycobacteriaceae and Micrococcaceae. These proteins also contain the HpcH_HpaI domain ( ) and function as citrate lyase subunits, malyl-CoA lyases, or other CoA ester lyases. This C-terminal extension may be involved in protein oligomerization or substrate access.
