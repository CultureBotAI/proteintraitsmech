identifier: Pfam:PF30516
label: NblS/DspA histidine kinase PAS-like sensory domain
definition: >-
  This entry represents an PAS-like sensory domain of approximately 80 to 90 residues found in cyanobacterial and red algae two-component sensor histidine kinases. The domain is found in NblS/DspA/Hik33, a thylakoid membrane-localised sensor kinase involved in light stress and nutrient stress responses. In Synechocystis PCC 6803, mutations in dspA confer resistance to herbicides such as diuron and difunon, as well as calmodulin antagonists. NblS functions with the response regulator RpaB to coordinate phycobilisome degradation and other stress responses. The domain precedes HAMP ( ), PAS ( ), and histidine kinase ( , ) domains.
