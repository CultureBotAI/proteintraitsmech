definition: >-
  Isoamylase from Pseudomonas amyloderamosa hydrolyses alpha-1,6-glucosidic linkages of amylopectin and glycogen. It consists of three domains: the N-terminal ( ), the catalytic domain ( ) and the C-terminal all-β domain, presented in this entry ( , ).
