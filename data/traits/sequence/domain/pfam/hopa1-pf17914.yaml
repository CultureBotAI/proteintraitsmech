identifier: Pfam:PF17914
label: HopA1 effector protein family
definition: >-
  This family includes the HopA1 effector protein from Pseudomonas syringae. Structurally this protein has an α + β fold. The effector protein HopA1 was shown to affect the EDS1 complex by binding EDS1 directly and activating the immune response signaling pathway.
