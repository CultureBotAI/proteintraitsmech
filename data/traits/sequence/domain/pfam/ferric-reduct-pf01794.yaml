identifier: Pfam:PF01794
label: Ferric reductase like transmembrane component
definition: >-
  This domain represents a common region in the transmembrane proteins mammalian cytochrome B-245 heavy chain (gp91-phox), ferric reductase transmembrane component in yeast and respiratory burst oxidase from mouse-ear cress. These proteins may be a family of flavocytochromes capable of moving electrons across the plasma membrane. The Frp1 protein from Schizosaccharomyces pombe is a ferric reductase component and is required for cell surface ferric reductase activity. Mutants in Frp1 are deficient in ferric iron uptake. Cytochrome B-245 heavy chain is a FAD-dependent dehydrogenase it is also has electron transferase activity which reduces molecular oxygen to superoxide anion, a precursor in the production of microbicidal oxidants. Mutations in the sequence of cytochrome B-245 heavy chain (gp91-phox) lead to the X-linked chronic granulomatous disease. The bacteriocidal ability of phagocytic cells is reduced and is characterised by the absence of a functional plasma membrane associated NADPH oxidase. The chronic granulomatous disease gene codes for the beta chain of cytochrome B-245 and cytochrome B-245 is missing from patients with the disease. This domain is also found in bactirial homologues of Protein-methionine-sulfoxide reductase heme-binding subunit MsrQ.
