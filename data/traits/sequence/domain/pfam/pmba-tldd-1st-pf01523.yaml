identifier: Pfam:PF01523
label: PmbA/TldA metallopeptidase domain 1
definition: >-
  This entry represents the N-terminal domain of TldD and TldE. This domain is also found at the N-terminal in uncharacterised archaeal proteins. This entry includes a group of metalloproteases, such as TldD and TldE (also known as PmbA) from E. coli, which interact to form a heterodimeric metalloprotease. TldD and TldE were originally related to the biosynthesis of microcin B17 (MccB17), a peptide antibiotic produced by Escherichia coli strains carrying the pMccB17 plasmid that targets the DNA gyrase from sensitive bacteria. Later, they are shown to be metalloproteases involved in CcdA/CcdA41 degradation.
