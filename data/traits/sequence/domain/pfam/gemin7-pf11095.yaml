identifier: Pfam:PF11095
label: Gem-associated protein 7 (Gemin7)
definition: >-
  Gem-associated protein 7 (Gemin7) is a component of the survival of motor neuron complex, which functions in the assembly of spliceosomal small nuclear ribonucleoproteins. Gemin7 interacts with several Sm proteins of spliceosomal small nuclear ribonucleoproteins, especially SmE. Gem-associated protein 7 is found in the nucleoplasm, in nuclear "gems" (Gemini of Cajal bodies), and in the cytoplasm. Three transcript variants encoding the same protein have been found for this gene.
