identifier: Pfam:PF03417
label: Acyl-coenzyme A:6-aminopenicillanic acid acyl-transferase
definition: >-
  The peptidase C45 family includes the characterised protein acyl-coenzyme A:6-aminopenicillanic-acid-acyltransferases from fungi and TAN from Drosophila. The active site residue for members of this family and family T1 is C-terminal to the autolytic cleavage site. In Penicillium chrysogenum, A:6-aminopenicillanic-acid-acyltransferase serves as the last enzyme in penicillin biosynthetic pathway, which converts isopenicillin N (IPN) to penicillin G, using phenyl-acetyl-CoA or phenoxyacetyl-CoA as acyl donors. The active mature form of this enzyme is formed by autoproteolysis of the immature precursor, which leads to the exposure of a flexible pocket that was previously buried. This entry represents the hydrolase domain. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an arginine is the general base. Cysteine peptidases can be grouped into fourteen different clans, with members of each clan possessing a tertiary fold unique to the clan. Four clans of cysteine peptidases share structural similarities with serine and threonine peptidases and asparagine lyases. From sequence similarities, cysteine peptidases can be clustered into over 80 different families. Clans CF, CM, CN, CO, CP and PD contain only one family. Cysteine peptidases are often active at acidic pH and are therefore confined…
