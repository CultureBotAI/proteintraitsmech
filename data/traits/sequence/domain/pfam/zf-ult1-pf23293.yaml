identifier: Pfam:PF23293
label: ULTRAPETALA1 zinc finger domain
definition: >-
  This domain is found C-terminal in the family of ULTRAPETALA proteins ULT1/2 from Arabidopsis thaliana and related plant proteins. This domain contains several highly conserved cysteine and histidine residues that could be involved in metal coordination. In the core part, this domain shares similarity with CW-type zinc finger domains () but it has additional clusters of conserved residues indicating the presence of four putative metal-binding sites. ULT1/2 are putative transcription factors that act as regulators of cell accumulation in shoot and floral meristems. They also act as antirepressors that counteract EMBRYONIC FLOWER1 (EMF1) action through modulation of histone marks on target genes and thus regulating their transcriptional activities.
