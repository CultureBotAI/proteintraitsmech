identifier: Pfam:PF13955
label: Toxin Fst, type I toxin-antitoxin system
definition: >-
  Fst (faecalis plasmid stabilisation toxin), also known as RNA I, is a toxic peptide. Its N terminus forms a transmembrane α helix, its C terminus is disordered and is likely to be cytosolic. Its translation is inhibited by the antisense RNA, RNA II, which acts as an antitoxin.
