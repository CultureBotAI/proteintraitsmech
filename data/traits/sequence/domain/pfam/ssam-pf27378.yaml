identifier: Pfam:PF27378
label: SsaM
definition: >-
  This entry represents the SsaM protein. SsaM is a secretion system apparatus protein that functions as a component of the type III secretion apparatus in Salmonella pathogenicity island 2. SsaM expression is induced when grown in an acidic environment and is activated by the response regulator SsrB. This protein belongs to the type III secretory system chaperone clan, which comprises small acidic proteins involved in the translocation of pathogenic proteins into host cells. The proteins are found predominantly in Gammaproteobacteria, particularly Enterobacteriaceae.
