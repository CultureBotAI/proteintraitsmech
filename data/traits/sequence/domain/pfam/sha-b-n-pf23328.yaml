identifier: Pfam:PF23328
label: Shavenoid isoform B N-terminal domain
definition: >-
  This entry represents a small β-strand domain that contains six conserved cysteines that likely form three disulphide bridges. This domain is found in an extracellular context in a variety of proteins. This includes a small number of putative odorant receptors as well as proteins annotated as shavenoid proteins, including shavenoid isoform B from Drosophila , where it is found at the N terminus.
