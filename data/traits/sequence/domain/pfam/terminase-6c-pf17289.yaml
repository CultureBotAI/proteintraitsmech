identifier: Pfam:PF17289
label: Terminase RNaseH-like domain
definition: >-
  This entry represents the C-terminal domain found in the terminase large subunits. Terminase is a component of the molecular motor that translocates genomic DNA into empty capsids during DNA packaging. The large subunit heterodimerises with the small terminase protein, which is docked on the capsid portal protein. The latter forms a ring through which genomic DNA is translocated into the capsid. The terminase protein has endonuclease activity to cleave DNA after encapsidation. Proteins containing this domain include gp17 from bacteriophage T4 ( ).
