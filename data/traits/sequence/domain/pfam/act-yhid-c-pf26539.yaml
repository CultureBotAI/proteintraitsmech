identifier: Pfam:PF26539
label: YhiD C-terminal ACT domain
definition: >-
  This entry represents the ACT domain, a small molecule binding module with a characteristic β-α-β-β-α-β fold. Members of this clan typically form dimers or higher-order oligomers, with ligand binding often occurring at the domain interfaces. These domains function as regulatory modules that bind amino acids or other small molecules, enabling allosteric control of enzyme activity, transcription regulation, or metabolic pathways. This domain is found in proteins from various bacterial species, including Escherichia coli, where it is found at the C terminus of the putative magnesium transporter YHID ( ). According to AlphaFold 3 predictions there is no evidence that this domain dimerises unlike most other ACT domains.
