identifier: Pfam:PF01678
label: Diaminopimelate epimerase
definition: >-
  This entry represents diaminopimelate epimerase ( ), which catalyses the isomerisation of L,L-dimaminopimelate to meso-DAP in the biosynthetic pathway leading from aspartate to lysine. It is a member of the broader family of PLP-independent amino acid racemases. This enzyme is a monomeric protein of about 30kDa consisting of two domains which are homologus in structure though they share little sequence similarity. Each domain consists of mixed β-sheets which fold into a barrel around the central helix. The active site cleft is formed from both domains and contains two conserved cysteines thought to function as the acid and base in the catalytic reaction. Other PLP-independent racemases such as glutamate racemase have been shown to share a similar structure and mechanism of catalysis. Bacteria, plants and fungi metabolise aspartic acid to produce four amino acids -lysine, threonine, methionine and isoleucine -in a series of reactions known as the aspartate pathway. Additionally, several important metabolic intermediates are produced by these reactions, such as diaminopimelic acid, an essential component of bacterial cell wall biosynthesis, and dipicolinic acid, which is involved in sporulation in Gram-positive bacteria. Members of the animal kingdom do not posses this pathway and must therefore acquire these essential amino acids through their diet. Research into improving the metabolic flux through this pathway has the potential to increase the yield of the essential amino acids in important crops, thus improving their nutritional value. Additionally, since the enzymes are not present in animals, inhibitors of them are promising targets for the development of novel antibiotics and herbicides. For more information see. Two lysine biosynthesis pathways evolved separately…
