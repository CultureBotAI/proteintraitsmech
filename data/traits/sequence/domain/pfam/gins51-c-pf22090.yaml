identifier: Pfam:PF22090
label: Gins51, C-terminal domain
definition: >-
  This domain is found at the C-terminal of the DNA replication complex GINS family protein TK0536 from Thermococcus kodakarensis (Gins51, ). Gins51 is composed of a large α-helical domain at the N-terminal, and a small β-stranded domain at the C-terminal. This mobile C-terminal domain acts as a hook to bind the archaeal GINS-associated nuclease to form the 'CGM' unwindosome complex.
