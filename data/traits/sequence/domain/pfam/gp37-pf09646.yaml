identifier: Pfam:PF09646
label: Gp37 protein
definition: >-
  This protein consists of a unit of helices and β-sheets that crystallises into a beautiful asymmetrical dodecameric barrel-structure, of two six-membered rings one on top of the other. It is expressed in bacteria but is of viral origin, as it is found in phage BcepMu and is probably a pathogenesis factor. This entry also includes a putative cytoplasmic protein, STM4215, from Salmonella.
