identifier: Pfam:PF00232
label: Glycosyl hydrolase family 1
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 1 comprises enzymes with a number of known activities; beta-glucosidase ( ); beta-galactosidase ( ); 6-phospho-beta-galactosidase ( ); 6-phospho-beta-glucosidase ( ); lactase-phlorizin hydrolase ( ), ( ); beta-mannosidase ( ); myrosinase ( ).
