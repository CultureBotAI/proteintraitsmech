identifier: Pfam:PF26744
label: Dicer-like protein 1, PAZ domain
definition: >-
  This predicted PAZ domain is found in Dicer-like protein 1 from Aspergillus fumigatus (Dcl1) and similar fungal sequences. Dcl1 is a Dicer-like endonuclease involved in cleaving double -stranded RNA in the RNA interference (RNAi) pathway.
