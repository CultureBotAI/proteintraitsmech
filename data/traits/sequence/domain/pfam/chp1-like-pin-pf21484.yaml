identifier: Pfam:PF21484
label: Chromo domain-containing protein 1-like, PIN domain
definition: >-
  This domain is found at the C-terminal of Chromo domain- containing protein 1 from Schizosaccharomyces pombe (Chp1) and similar proteins predominantly found in Glomeromycetes and Schizosaccharomycetes. Chp1 is a component of the RNA-induced initiation of Transcriptional Gene Silencing (RITS) complex, a central player RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. This entry represents the PIN domain of Chp1, which shows an α/β fold.
