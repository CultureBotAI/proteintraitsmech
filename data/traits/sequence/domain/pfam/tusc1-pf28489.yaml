identifier: Pfam:PF28489
label: TUSC1
definition: >-
  This entry represents TUSC1 proteins from vertebrates. TUSC1 is a tumour suppressor candidate gene 1 protein that is widely expressed at low levels with higher expression in the testis. The protein contains predicted coiled-coil regions that may be involved in protein-protein interactions; it also contains disordered regions. TUSC1 was identified through analysis of homozygous deletions in human lung cancer and is down-regulated in some tumour cell lines. It has also been identified as a potential tumour suppressor in human cancers and could be a novel therapeutic target for glioblastoma.
