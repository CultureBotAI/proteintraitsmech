identifier: Pfam:PF26136
label: SCO6045-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of a group of uncharacterised bacterial proteins, including SCO6045 from Streptomyces coelicolor. This domain, which is predicted to adopt an all-α structure, is found associated with in some members of this group. This domain is also found covering the whole length of the protein in many uncharacterised proteins from actinomycetes.
