identifier: Pfam:PF26370
label: L-erythro-3,5-diaminohexanoate dehydrogenase N-terminal domain
definition: >-
  This entry represents the N-terminal domain of L-erythro-3,5-diaminohexanoate dehydrogenase (KDD) and similar bacterial proteins. The C-terminal domain belongs to . KDD is involved in the anaerobic fermentation of lysine, specifically catalysing the oxidative deamination of L-erythro-3,5-diaminohexanoate (3,5-DAH) to 3-keto-5-aminohexanoate (KAH). It can utilise either NAD or NADP as cofactors in this reaction. The proteins in this family function as homodimers, indicating that two identical subunits associate to perform their enzymatic activity.
