identifier: Pfam:PF27454
label: Protein-arginine kinase McsB C-terminal domain
definition: >-
  This entry represents the C-terminal helical domain of protein-arginine kinase McsB. The C-terminal domain contains the phosphoarginine-binding pocket and is involved in allosteric regulation, with the RDXXRA motif being important for binding phosphoarginine-containing polypeptides. This domain is found in Gram-positive bacteria. The specific function of this helical domain is allosteric activation of the kinase. Bacterial arginine kinases catalyse the transfer of phosphate from ATP to arginine. Protein arginine phosphorylation is involved in the regulation of many critical cellular processes, such as protein degradation, competence and stress responses. Bacterial protein arginine kinase McsB main targets comprise central factors of the stress response system, including the CtsR and HrcA heat shock repressors, as well as major components of the protein quality control system, such as the ClpCP protease and the GroEL chaperonine. McsB has been shown to phosphorylate and inhibit the global heat shock repressor CtsR. Furthermore, McsB is an adaptor for the ClpCP protease. McsB is activated during heat stress by autophosphorylation, allowing the controlled degradation of CtsR by ClpCP. It is also required for de-localisation of competence proteins.
