identifier: Pfam:PF29100
label: YDL157C
definition: >-
  This entry represents mitochondrial proteins related to YDL157C mainly from Saccharomycetes and Pichiomycetes. The prototype protein YDL157C is an uncharacterised mitochondrial protein from Saccharomyces cerevisiae. This protein forms a helical bundle structure and is conserved across fungal species. YDL157C shows similarity to S. pombe tam6 protein. The protein is localised to mitochondria and is present with 752 molecules per cell in log phase growth medium.
