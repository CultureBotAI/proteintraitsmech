identifier: Pfam:PF02821
label: Staphylokinase/Streptokinase family
definition: >-
  This entry represents staphylokinases. Staphylokinase (also known as SAK) from Staphylococcus aureus is a virulence factor due to its interaction with plasminogen and alpha-defensins in the hosts. The binding of staphylokinase to plasminogen results in the formation of active plasmin, a proteolytic enzyme facilitating bacterial penetration into the surrounding tissues. However, once the host tissues are infected, the interaction between staphylokinase and plasminogen decreases disease severity. The three-dimensional structure of streptokinase is believed to contain two independently folded domains, each with a ubiquitin-like fold.
