identifier: Pfam:PF08818
label: Domain of unknown function (DU1801)
definition: >-
  This α/β domain is found in the Intracellular iron chaperone frataxin from Bacillus subtilis (formerly known as YdhG) and the uncharacterised protein YdeI from Bacillus subtilis. Frataxin plays an essential role in iron intracellular trafficking to iron cofactor biogenesis systems including iron-sulfur cluster (Fe-S) or heme assembly. It promotes the biosynthesis of Fe-S clusters by delivering Fe to the complex composed of the cysteine desulfurase SufS and the zinc-dependent sulfurtransferase SufU. Frataxin also plays a critical role in coproporphyrin-dependent heme b biogenesis and thus provides an essential function for the bacterial global metabolism. YdeI is important for resistance to polymyxin B in broth and for bacterial survival in mice upon oral, but not intraperitoneal, inoculation, suggesting a role for YdeI in the gastrointestinal tract of mice.
