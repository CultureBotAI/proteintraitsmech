identifier: Pfam:PF25792
label: BREX ATP-binding protein BrxC alpha helical domain
definition: >-
  This entry represents the small α-helical domain of the BrxC protein from the BREX (bacteriophage exclusion) system. This domain is predicted to be the 6th of 8 domains in the full-length BrxC protein. This small α-helical domain may be involved in protein-protein interactions within the BREX complex or contribute to the structural stability of the BrxC protein. BrxC is a P-loop-containing, probable ATPase associated with type 1 BREX (bacteriophage exclusion) systems, which provide immunity against bacteriophage infections by methylating specific DNA sites to distinguish self from non-self. Although phage adsorption is permitted, BREX systems block phage DNA replication. BrxC, a probable ATP-binding protein, operates within a six-protein complex (BrxA-BrxB-BrxC-PglX-PglZ-BrxL) that confers resistance to a range of bacteriophages.
