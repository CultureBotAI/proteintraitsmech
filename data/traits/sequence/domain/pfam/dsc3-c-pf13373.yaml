identifier: Pfam:PF13373
label: DSC E3 ubiquitin ligase complex subunit 3, C-terminal domain
definition: >-
  This is the C-terminal domain of DSC E3 ubiquitin ligase complex subunit 3 (Dsc3), which contains two transmembrane helices and a characteristic GFDRL sequence motif. Dsc3 is a component of the DSC E3 ubiquitin ligase complex (a Golgi-specific protein ubiquitination system) that functions in protein homeostasis under non-stress conditions, playing a role in protein quality control through endosome and Golgi-associated degradation pathway (EGAD) which targets membrane proteins at Golgi and endosomes for degradation by cytosolic proteasomes. Dsc3 is also involved in endocytic protein trafficking. Yeast DSC E3 ubiquitin ligase complex is the homologue of Hrd1 E3 ligase complex from mammals, in which Dsc1, Dsc2 and Dsc3 corresponds to Hrd1, Der1, and Usa1, respectively. Dsc3 is a Herp-like protein that acts as a bridge between Dsc1 and Dsc2 for their interaction.
