identifier: Pfam:PF21048
label: Rad26-like, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Rad26 from Myceliophthora thermophila ( ), a functional subunit of the Rad3-Rad26 complex that is responsible for bringing the kinase to sites of DNA damage. This domain consists of two α-helices that are arranged perpendicular to each other with an extended loop region in between. This coiled-coil domain is well-conserved in Rad26 orthologues. It seems to play a role in the formation of dimers.
