identifier: Pfam:PF01036
label: Bacteriorhodopsin-like protein
definition: >-
  Bacterial rhodopsins are a family of bacterial opsins. They are retinal-binding proteins that provide light-dependent ion transport and sensory functions to a family of halophilic bacteria. They are integral membrane proteins believed to contain seven transmembrane (TM) domains, the last of which contains the attachment point for retinal binding (a conserved lysine). Fungal rhodopsins are membrane-embedded photoreceptors characterised by seven transmembrane helices and a retinal chromophore. They are widely distributed across fungal species, forming large multigene families. These proteins exhibit diverse functions, including light-driven proton pumping, green light sensing, and involvement in signalling pathways. Fungal rhodopsins are particularly prevalent in plant-associated and phytopathogenic fungi.
