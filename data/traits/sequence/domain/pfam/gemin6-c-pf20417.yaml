identifier: Pfam:PF20417
label: Gemin6 C-terminal domain
definition: >-
  This entry corresponds to a putative domain found at the C-terminal of several animal Gemin6 proteins. This domain appears to be distantly related to , suggesting it may have an RNA-binding function. The exact function of Gemin6 is unknown but it has been found to form part of the survival motor neuron (SMN) complex. The SMN complex plays a key role in the biogenesis of spliceosomal small nuclear ribonucleoproteins (snRNPs) and other ribonucleoprotein particles.
