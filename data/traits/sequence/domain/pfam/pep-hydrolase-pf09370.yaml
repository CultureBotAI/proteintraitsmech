identifier: Pfam:PF09370
label: Phosphoenolpyruvate hydrolase-like
definition: >-
  This domain is likely to have a TIM barrel fold, related to IGPS (indole-3-glycerol-phosphate synthase). Interestingly, this novel domain also exists as an N-terminal domain of a putative sigma 54 -dependent transcriptional activator. Because sigma 54 dependent activators typically have a three-domain structure: the variable N-terminal regulatory (activation) domain involved in signal recognition/receiving, the central AAA-type ATPase domain, and the DNA-binding domain, the domain described by this entry may be predicted to play a role in signal recognition/receiving and signal transduction. However this has not been experimentally validated.
