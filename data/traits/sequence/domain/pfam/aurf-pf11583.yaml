identifier: Pfam:PF11583
label: P-aminobenzoate N-oxygenase AurF
definition: >-
  AurF is a metalloenzyme which is involved in the biosynthesis of antibiotic aureothin by catalysing the formation of p-nitrobenzoic acid from p-aminobenzoic acid. AurF is a non-heme di-iron monooxygenase which creates nitroarenes via the sequential oxidation of aminoarenes. This entry also includes CmlI from Streptomyces venezuelae. CmlI catalyzes the six-electron oxidation of an aryl-amine precursor of chloramphenicol (NH2-CAM) to yield the aryl-nitro group of chloramphenicol (CAM).
