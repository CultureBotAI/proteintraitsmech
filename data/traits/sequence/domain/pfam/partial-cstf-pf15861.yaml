identifier: Pfam:PF15861
label: Partial cleavage stimulation factor domain
definition: >-
  This domain occurs in proteins from apicomplexan parasites. It is homologous to the amino-terminal part of the cleavage stimulation factor, which is thought to be involved with mRNA maturation in mammals. It usually occurs at the C-terminal and can be found associated with a RNA recognition domain represented by and in some proteins to a hinge domain represented by .
