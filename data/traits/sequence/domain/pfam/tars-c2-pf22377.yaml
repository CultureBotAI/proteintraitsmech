identifier: Pfam:PF22377
label: TarS C-terminal domain 2
definition: >-
  This entry represents the C-terminal domain 2 (C2) of TarS from Staphylococcus aureus. Beta-glycosyltransferase TarS is an enzyme responsible for the glycosylation of wall teichoic acid polymers of the S. aureus cell wall, a process that has been shown to be specifically responsible for methicillin resistance in MRSA. It contains a trimerisation domain composed of tandem carbohydrate binding motifs.The two C-terminally localised regions composed of a series of β-sheets participate in an extensive trimerisation interface and they assume an immunoglobulin-like fold. It is suggested that both carbohydrate binding domains may be involved in polyRboP binding, however unlike pullulanase, the CBMs of TarS are involved in the formation of an extensive trimerisation interface.
