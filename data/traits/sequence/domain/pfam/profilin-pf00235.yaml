identifier: Pfam:PF00235
label: Profilin
definition: >-
  This entry represents the profilin family, which are small eukaryotic proteins that have different functions. In plants, they are major allergens present in pollens. The majority of the Profilin family members binds to monomeric actin (G-actin) in a 1:1 ratio thus preventing the polymerisation of actin into filaments (F-actin). They can also, in certain circumstances, promote actin polymerisation. However, some profilin family members, such as Profilin 4 from mammals, does not bind to actin and may have functions distinct from regulating actin dynamics. It plays a role in the assembly of branched actin filament networks, by activating WASP via binding to WASP's proline rich domain. Profilin may link the cytoskeleton with major signalling pathways by interacting with components of the phosphatidylinositol cycle and Ras pathway. This entry also includes Asgard archaeal profilins (Thor profilin, Loki profilin-1 and Loki profilin-2), which bind to actin and regulate the structure of the cytoskeleton. This indicates that Asgard archaea have a functional eukaryotic-like actin machinery. Some profilins can also bind to polyphosphoinositides such as PIP2. Overall sequence similarity among profilin from organisms which belong to different phyla (ranging from fungi to mammals) is low, but the N-terminal region is relatively well conserved. The N-terminal region is thought to be involved in actin binding.
