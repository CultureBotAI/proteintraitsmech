identifier: Pfam:PF22401
label: Cell-shape determining Csd6 N-terminal dimerization domain
definition: >-
  This entry represents the dimerisation domain found at the N-terminal of Cds6 from H. pylori , a cell-shape-determining protein that plays key roles in the alteration of cross-linking or by trimming of peptidoglycan muropeptides. It is also involved in deglycosylation of the flagellar protein FlaA. Members of this group are specific to Campylobacterales.
