identifier: Pfam:PF20016
label: Thoeris protein ThsA, Macro domain
definition: >-
  Thoeris is a bacterial antiphage defense system, which consists of two genes, thsA and thsB, via NAD+ degradation. ThsA has robust NAD+ cleavage activity and a two-domain architecture containing an N-terminal NAD-binding domain (denoted as sirtuin-like or Macro) and C-terminal SLOG-like domain. In some instances, such as in B. amyloliquefaciens, ThsA has an N-terminal transmembrane domain. ThsB (also referred to as TIR1 and TIR2) is structurally similar to TIR domain proteins but without enzymatic activity. This entry represents the C-terminal Macro domain of ThsA from B. amyloliquefaciens, which adopts a Rossmann-like fold and binds NAD+.
