identifier: Pfam:PF28140
label: Arabinogalactan protein 40
definition: >-
  Arabinogalactan proteins (AGPs) are proteoglycans of the plant extracellular matrix that have been implicated in diverse developmental roles such as differentiation, cell-cell recognition, embryogenesis and programmed cell death. This entry includes AGP13 ,AGP21 ,AGP23 (At3g57690) and AGP40 (At3g20865) from Arabidopsis thaliana. AGP23/40 are expressed in pollen, while AGP23 is only expressed in flowers.
