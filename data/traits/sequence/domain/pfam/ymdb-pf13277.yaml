identifier: Pfam:PF13277
label: YmdB-like protein
definition: >-
  This family of putative phosphoesterases contains the characterised B. subtilis protein 2',3'-cyclic-nucleotide 2'-phosphodiesterase (previously known as YmdB). 2',3'-cyclic-nucleotide 2'-phosphodiesterase has been shown to be essential for biofilm formation and to be a global regulator of late adaptive responses. Another member of this family from Deinococcus radiodurans has been crystallized and is described as a novel phosphatase/phosphodiesterase.
