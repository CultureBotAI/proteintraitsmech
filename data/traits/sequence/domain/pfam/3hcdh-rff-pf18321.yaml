identifier: Pfam:PF18321
label: 3-hydroxybutyryl-CoA dehydrogenase reduced Rossmann-fold domain
definition: >-
  This domain is found in 3-hydroxybutyryl-CoA dehydrogenase present in E. coli. 3-hydroxybutyryl-CoA dehydrogenase catalyzes the second step in the biosynthesis of n-butanol from acetyl-CoA, in which acetoacetyl-CoA is reduced to 3-hydroxybutyryl-CoA. This domain is a reduced Rossmann-fold domain and, unlike the first Rossmann-fold domain, it is missing the catalytic residues and an NAD(H) binding cleft.
