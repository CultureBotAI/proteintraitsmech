identifier: Pfam:PF31089
label: Dermonecrotic toxin SPH
definition: >-
  This entry represents Dermonecrotic toxin SPH from the deer tick and similar proteins mainly found in animals. SPH cleaves the phosphodiester linkage between the phosphate and headgroup of certain phospholipids, forming an alcohol and a cyclic phosphate. This domain is predicted to show a TIM-barrel fold.
