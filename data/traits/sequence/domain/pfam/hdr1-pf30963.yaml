identifier: Pfam:PF30963
label: Heading date repressor 1
definition: >-
  HDR1 regulates flowering time via a photoperiod-dependent pathway. It suppresses flowering under long-day conditions (LDs) by upregulating Hd1 and downregulating Ehd1. It is phosphorylated by OsK4, another suppressor of rice flowering under LDs.
