identifier: Pfam:PF18216
label: N-formyltransferase dimerization C-terminal domain
definition: >-
  This is the C-terminal domain of N-formyltransferase from Francisella tularensis. N-formylated sugars are observed on O-antigens of pathogenic Gram-negative bacteria. This C-terminal domain is responsible for dimerisation. In particular, the β hairpin motif present in the domain helps create a subunit-subunit interface. The dimeric interface is characterised by a hydrophobic patch formed by Ile 195, Leu 197, Val 201, Met 203, Ile 207, Phe 223, Val 231, Val 233, Leu 235, and Leu 237 from both monomers.
