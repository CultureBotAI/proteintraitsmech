identifier: Pfam:PF00142
label: 4Fe-4S iron sulfur cluster binding proteins, NifH/frxC family
definition: >-
  This entry includes the bacterial nitrogenase iron protein NifH, chloroplast encoded chlL (or frxC), and archaeal Ni-sirohydrochlorin a,c-diamide reductive cyclase complex component CfbC. Nitrogenase ( ) is responsible for biological nitrogen fixation. Nitrogenase is an oligomeric complex which consists of two components: component 1 which contains the active site for the reduction of nitrogen to ammonia and component 2 (also called the iron protein). Component 2 is a homodimer of a protein (gene nifH) which binds a single 4Fe-4S iron sulfur cluster. In the nitrogen fixation process NifH is first reduced by a protein such as ferredoxin; the reduced protein then transfers electrons to component 1 with the concomitant consumption of ATP. There are a number of conserved regions in the sequence of these proteins: in the N-terminal section there is an ATP-binding site motif 'A' (P-loop) and in the central section there are two conserved cysteines which have been shown, in NifH, to be the ligands of the 4Fe-4S cluster. Protochlorophyllide reductase is involved in light-independent chlorophyll biosynthesis. The light-independent reaction uses Mg-ATP and reduced ferredoxin to reduce ring D of protochlorophyllide (Pchlide) to form chlorophyllide a (Chlide). This enzyme complex is composed of three subunits: ChlL, ChlN and ChlB. ChlL (also known as frxC) is present as a homodimer, and binds one 4Fe-4S cluster per dimer. The conserved domains, including the ATP-binding motif and the Fe-S binding motif found in the three subunits, are similar to those in nitrogenases.
