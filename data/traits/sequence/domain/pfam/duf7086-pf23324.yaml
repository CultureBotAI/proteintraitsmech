identifier: Pfam:PF23324
label: Domain of unknown function (DUF7086)
definition: >-
  This domain is found in a group of uncharacterised plant proteins. It is predicted to adopt a globular structure consisting of a rubredoxin-like zinc finger capped with an elaborated α-helical subdomain. This arrangement is similar to the zinc finger domain found in hypA .
