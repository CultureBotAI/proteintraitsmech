identifier: Pfam:PF21080
label: Virus-capping methyltransferase, connector domain
definition: >-
  This entry represents the connector domain (CD) from Mononegavirales single-stranded RNA viral RNA polymerase enzymes (L proteins). This domain flanks the methyltransferase domain (MT, ) and together with the C-terminal domain ( ), in conjunction with its phosphoprotein cofactor, likely facilitates the structural rearrangements that appear to coordinate the enzymatic activities during transcription and replication.
