identifier: Pfam:PF06821
label: Serine hydrolase
definition: >-
  This entry represents RBBP9 proteins. They contain a conserved serine hydrolase motif, GXSXG/A, where the serine is a putative nucleophile. They contain an α-β hydrolase fold. These proteins are implicated in the regulation of TGF-beta signalling, potentially acting as negative regulators by inhibiting the phosphorylation of SMAD2 and SMAD3. This action may contribute to the resistance against the growth-inhibitory effects of TGF-beta. They are also associated with the transformation process, where it can interact with RB1, leading to the displacement of E2F1 and thus affecting cell cycle progression. Additionally, the enzymatic activity of these proteins can be inhibited by emetine, a natural product from the ipecac root. Eukaryotic members of this family have a conserved LXCXE motif, which binds to retinoblastomas. This motif is absent from prokaryotic members of this family. This entry also includes Putative hydrolase YdeN.
