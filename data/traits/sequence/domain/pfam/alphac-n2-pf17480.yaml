identifier: Pfam:PF17480
label: AlphaC N-terminal domain 2
definition: >-
  The alpha C protein (ACP) is found in Streptococcus and acts as an invasin which plays a role in the internalisation and translocation of the organism across human epithelial surfaces. Group B Streptococcus is the leading cause of diseases including bacterial pneumonia, sepsis and meningitis. The N-terminal domain of ACP is associated with virulence and forms a β sandwich and a three helix bundle. This entry is the C-terminal domain of APC. The C-terminal domain (45 amino acids) contains an LPXTG peptidoglycan-anchoring motif characteristic of cell-wall anchored surface proteins.
