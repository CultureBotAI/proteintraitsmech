identifier: Pfam:PF09631
label: Sen15 protein
definition: >-
  The Sen15 subunit of the tRNA intron-splicing endonuclease is one of the two structural subunits of this heterotetrameric enzyme. Residues 36-157 of this subunit possess a novel homodimeric fold. Each monomer consists of three α-helices and a mixed antiparallel/parallel β-sheet. Two monomers of Sen15 fold with two monomers of Sen34, one of the two catalytic subunits, to form an alpha2-beta2 tetramer as part of the functional endonuclease assembly.
