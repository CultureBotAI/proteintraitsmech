identifier: Pfam:PF26600
label: Putative CHCC zinc finger
definition: >-
  This entry represents a domain found in multiple copies in uncharacterised eukaryotic proteins. In contains invariant cysteine and histidine residues that may be involved in metal coordination. It is predicted to adopt a structure reminiscent of the classical C2H2 zinc fingers and composed of β-hairpin and α-helix packed on it. The residues potentially involved in metal coordination are, however, located differently than those observed in the C2H2 zinc fingers. Three of the potential metal coordinating residues are located on one domain whereas the fourth residue is contributed by the neighbouring domain.
