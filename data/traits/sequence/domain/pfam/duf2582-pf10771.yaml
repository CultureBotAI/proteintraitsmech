identifier: Pfam:PF10771
label: Winged helix-turn-helix domain (DUF2582)
definition: >-
  This entry represents Uncharacterized protein MJ1608 and related uncharacterised proteins found in prokaryotes. The structure of two proteins ( and ) in this family were solved using NMR and shown to adopt a winged helix-turn-helix fold. Structural analysis shows that these proteins form an unusual dimeric conformation. This dimer was shown to be similar to that found in the FadR and TubR wHTH domains. It was suggested that these proteins are not very likely to bind to DNA.
