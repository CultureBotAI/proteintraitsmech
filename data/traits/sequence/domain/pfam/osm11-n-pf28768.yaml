identifier: Pfam:PF28768
label: OSM-11 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of OSM-11 and related Notch signaling modulators found in nematodes. OSM-11 functions as a probable secreted LIN-12/Notch ligand or co-ligand involved in mediating Notch signaling. The protein is involved in vulval development, acting redundantly with other Notch ligands such as DSL-1 and LAG-2. OSM-11 is also required for normal chemosensory responses and regulation of larval molting quiescence. OSM-11 localises to the apical cell membrane and is expressed in vulval precursor cells during larval development. The specific function of this N-terminal domain remains to be determined.
