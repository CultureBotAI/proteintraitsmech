identifier: Pfam:PF26785
label: Domain of unknown function (DUF8257)
definition: >-
  This domain is found in uncharacterised fungal proteins. It contains two pairs of highly conserved cysteine residues that are likely involved in metal coordination. This domain is predicted to fold into a structure which closely resembles domains members of the Zn(2)-Cys(6) binuclear cluster superfamily. Despite its conserved residues occupy equivalent spacial positions as the metal coordinating residues in Zn(2)-Cys(6) domains, this domain contains only four cysteines of six suggesting it can only coordinate one zinc atom.
