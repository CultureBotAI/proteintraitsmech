identifier: Pfam:PF01510
label: N-acetylmuramoyl-L-alanine amidase
definition: >-
  Proteins containing this domain include zinc amidases that have N-acetylmuramoyl-L-alanine amidase activity . This enzyme domain cleaves the amide bond between N-acetylmuramoyl and L-amino acids in bacterial cell walls (preferentially: D-lactyl-L-Ala). The bacteriophage endolysins PLY118 and PLY500 cleave between L-Ala and D-Glu residues of Listeria cell-wall peptidoglycan and are therefore peptidases (MEROPS subfamily M15C). The structure is known for the Bacteriophage T7 structure and shows that two of the conserved histidines are zinc binding.
