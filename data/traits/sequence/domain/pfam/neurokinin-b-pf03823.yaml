identifier: Pfam:PF03823
label: Neurokinin B
definition: >-
  Tachykinins are a group of biologically active peptides which excite neurons, evoke behavioral responses, are potent vasodilatators and contract (directly or indirectly) many smooth muscles. This family includes neurokinin B (also known as Tachykinin-3), as well as many other peptides. Like other tachykinins, neurokinins are synthesized as larger protein precursors that are enzymatically converted to their mature forms. Neurokinin B is a critical central regulator of human gonadal function.
