identifier: Pfam:PF21559
label: DNA-binding protein reb1, Myb-associated domain
definition: >-
  This domain is found in DNA-binding protein REB1 from Schizosaccharomyces pombe and similar proteins from yeast. REB1 mediates transcription termination and is also involved in replication termination and transcription activation. This protein, almost entirely α-helical, is organised into five domains: two Myb-associated domains (MybADs, this entry), each consisting of four α-helices, two Myb repeats (MybRs, ) and a final C-terminal domain.
