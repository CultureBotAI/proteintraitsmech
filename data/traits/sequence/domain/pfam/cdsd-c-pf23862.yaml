identifier: Pfam:PF23862
label: CdsD C-terminal
definition: >-
  This domain is found at the C-terminal of CdsD from Chlamydia trachomatis ( ) and similar sequences. CdsD is a structural contact-dependent secretion (Cds) protein that form part of the basal body of the type III secretion system (T3SS) injectisome of the bacteria. The periplasmic part of this protein contains at least 3 domains: PD1, PD2 ( ) and PD3 ( ), all of them sharing the same α-β-β-α-β topology, known as the BON fold. This domain may consist of seven antiparallel β-strands.
