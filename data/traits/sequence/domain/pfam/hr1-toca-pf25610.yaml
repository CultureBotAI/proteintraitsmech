identifier: Pfam:PF25610
label: TOCA family HR1 domain
definition: >-
  This entry represents the HR1 (homology region 1) domain found in TOCA proteins including TOCA1, CIP4, FBP1 and FBP17. This domain forms an antiparallel coiled-coil structure that mediates binding to the small GTPase Cdc42. Unlike other HR1 domains that bind to RhoA or Rac1 with high affinity, the TOCA family HR1 domains bind Cdc42 with relatively low (micromolar) affinity. The domain contains two α-helices connected by a loop region. The binding interface with Cdc42 includes both helices and the connecting loop. NMR studies suggest that the TOCA1 HR1 domain can be displaced from Cdc42 by the N-WASP GBD domain, suggesting an effector handover mechanism in which TOCA1 binding to Cdc42 positions N-WASP and Cdc42 for subsequent high-affinity interaction to initiate actin polymerisation. This entry also includes Nostrin proteins, which are members of the F-BAR domain protein family as TOCA proteins. TOCA proteins (TOCA-1, CIP4, and FBP17) comprise a subfamily of the F-BAR domain-containing proteins that function as critical molecular links between membrane deformation and actin cytoskeleton dynamics. These proteins possess an N-terminal F-BAR domain ( ) that binds phosphoinositides and induces membrane curvature, and a C-terminal SH3 domain ( ) that interacts with actin nucleation-promoting factors, particularly N-WASP and WAVE complex components. TOCA proteins are activated downstream of Cdc42 signalling and promote actin polymerisation by relieving the autoinhibition of N-WASP/WIP complexes. They participate in clathrin-mediated endocytosis, cell migration, and tissue morphogenesis by coordinating membrane invagination with localised actin assembly.
