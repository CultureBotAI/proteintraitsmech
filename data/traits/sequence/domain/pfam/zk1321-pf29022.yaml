identifier: Pfam:PF29022
label: ZK1321
definition: >-
  This entry represents a domain found in ZK1321.1 and related proteins in nematodes. ZK1321.1 is a membrane protein with a single transmembrane helix, expressed in pharyngeal muscle cells and other tissues in Caenorhabditis elegans. The domain is found in both membrane-associated and secreted proteins across nematode species. The function of this domain remains to be determined.
