identifier: Pfam:PF18164
label: GNAT-like C-terminal domain
definition: >-
  This is the C-terminal domain found in N-acyltransferase (NAT) proteins present in Actinoplanes teichomyceticus. In this organism, NAT proteins are responsible for N-acylation in the synthesis of the antibiotic teicoplanin. The C-terminal domain undergoes a substantial conformational change upon binding to Acyl-CoA. The C-terminal domain is considered Gcn5-related N-acetyltransferase like (GNAT-like) but differs from the canonical GNAT fold in that it lacks the first β-strand and has an additional four α-helices.
