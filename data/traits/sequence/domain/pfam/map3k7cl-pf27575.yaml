identifier: Pfam:PF27575
label: MAP3K7 C-terminal coiled coil
definition: >-
  This entry represents the C-terminal coiled coil region in Mitogen-activated protein kinase kinase kinase 7 (MAP3K7) and MAP3K7 C-terminal-like protein. The proteins are found in vertebrates and show ubiquitous tissue expression. MAP3K7 C-terminal-like proteins are small proteins of approximately 142 amino acids. The relationship to MAP3K7 suggests a potential role in kinase signalling pathways, though the specific function of these proteins remains to be determined. MAP3K7 is a component of a protein kinase signal transduction cascade, acting as a mediator of TGF-beta signal transduction. MAP3K7 stimulates NF-kappa-B (NFKB) activation and the p38 MAPK pathway through the phosphorylation and activation of several MAP kinase kinases. MAP3K7 binds both upstream activators and downstream substrates in multi-molecular complexes.
