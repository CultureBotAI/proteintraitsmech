identifier: Pfam:PF25506
label: MTC6 partial TIM-barrel domain
definition: >-
  This domain is found in the Maintenance of telomere capping protein 6 (MTC6) from Saccharomyces cerevisiae and related fungal proteins. MTC6 may be involved in telomere capping. The domain represented by this entry is predicted to fold into a partial TIM-barrel. It shares detectable similarity with the Phosphatidylinositol-specific phospholipase C.
