identifier: Pfam:PF30394
label: Phage replication protein O, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of approximately 90 residues found in bacteriophage replication protein O and related prophage proteins. In full-length proteins, this domain follows the Phage_rep_O domain ( ). In Escherichia coli K12, YfdO is a truncated prophage protein encoded by CPS-53 that consists mainly of this domain. Deletion of yfdO reduces bacterial viability under oxidative stress. The family is mainly found in lambdoid phages of the order Caudoviricetes and in prophage remnants within proteobacteria and firmicutes. The specific function of this domain remains to be determined.
