identifier: Pfam:PF16922
label: DNA replication complex GINS protein SLD5 C-terminus
definition: >-
  DNA replication complex GINS protein SLD5 is a component of the GINS tetrameric protein complex, which is involved in both initiation and elongation stages of eukaryotic chromosome replication. It is essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. It has been associated with NK cell deficiency and neutropenia. This entry represents the C-terminal domain of SLD5. This region is important in the assembly of the GINS complex.
