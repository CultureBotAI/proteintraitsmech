identifier: Pfam:PF27151
label: YagJ family
definition: >-
  This entry represents the YagJ family of proteins found in Escherichia coli. YagJ is encoded by the CP4-6 prophage and appears to be involved in radiation resistance, as disruption of the gene results in 3-fold increased sensitivity to X-radiation. The protein belongs to the COG1061 functional category. The specific molecular mechanism by which YagJ contributes to radiation survival remains unknown.
