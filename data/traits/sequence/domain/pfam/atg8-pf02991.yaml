identifier: Pfam:PF02991
label: Autophagy protein Atg8 ubiquitin like
definition: >-
  A number of autophagy-related proteins have been identified in yeast, including the key autophagic protein Atg8, which is a ubiquitin-like protein with a structure consisting of two amino-terminal α-helices and a ubiquitin-like core. Many other eukaryotes contain multiple Atg8 orthologues. Atg8 genes of multicellular animals can be divided into three subfamilies: microtubule-associated protein 1 light chain 3 (MAP1LC3 or LC3), gamma-aminobutyric acid receptor-associated protein (GABARAP) and Golgi-associated ATPase enhancer of 16kDa (GATE-16). Family members are involved in diverse intracellular trafficking and autophagy processes.
