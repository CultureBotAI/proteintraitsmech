identifier: Pfam:PF26435
label: Domain of unknown function (DUF8118)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins containing this domain are predominantly found in the class Halobacteria, which includes genera such as Halalkalicoccus, Haladaptatus, and Natrialbaceae. The domain is typically found in proteins ranging from approximately 60 to 200 amino acids in length. This domain contains conserved cysteine residues suggestive of zinc binding. Some proteins in this family are predicted to contain transmembrane helices, suggesting a possible membrane-associated role.
