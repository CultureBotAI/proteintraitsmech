identifier: Pfam:PF30886
label: Domain of unknown function (DUF8755)
definition: >-
  This entry represents a small N-terminal domain of approximately 40 residues found in bacterial signal transduction histidine kinases and diguanylate cyclases. The domain is composed of an α helix and beta hairpin. It is located N-terminal to PAS domains ( ) and ultimately HisKA ( ) and HATPase_c ( ) domains. This family is found in bacteria, predominantly Pseudomonadota and Bacteroidota. The function of this domain remains to be determined.
