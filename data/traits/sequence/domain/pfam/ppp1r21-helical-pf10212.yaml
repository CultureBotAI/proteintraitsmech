identifier: Pfam:PF10212
label: Protein phosphatase 1 regulatory subunit 21, six-helix bundle
definition: >-
  This entry represents a middle domain found between the N- and C-terminal coiled-coil regions of PPP1R21. According to structure predictions, it appears to form a six-helix bundle, which contains a conserved TTKRSYEDQ motif. Protein phosphatase 1 regulatory subunit 21 (PPP1R21) belong to a family of coiled-coil domain-containing proteins that are conserved from nematodes to humans. PPP1R21 is a regulator of protein phosphatase 1 (PP1) activity and may play a role in the endosomal sorting process or in endosome maturation pathway. These proteins also contain an N-terminal domain with a KLRAQ motif ( ). Protein phosphatase 1 regulatory subunit 21 is likely a regulator of protein phosphatase 1 (PP1) activity. It may play a role in the endosomal sorting process or in endosome maturation pathway
