identifier: Pfam:PF05608
label: RTE1-like
definition: >-
  This entry includes TMEM222 from animals and RTE1 (REVERSION-TO-ETHYLENE SENSITIVITY1) from Arabidopsis. RTE1 is positive regulator of the ETR1 ethylene receptor. This entry also includes Arabidopsis RTE1 homologue, RTH, which acts via RTE1 in regulating ethylene responses and signaling.
