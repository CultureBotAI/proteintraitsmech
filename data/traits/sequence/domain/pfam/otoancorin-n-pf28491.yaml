identifier: Pfam:PF28491
label: Otoancorin N-terminal domain
definition: >-
  This entry represents the N-terminal domain of otoancorin, a GPI-anchored protein found at the interface between the apical surface of inner ear sensory epithelia and their overlying acellular gels. Otoancorin may function as an adhesion molecule and is essential for normal hearing. The protein is localised to the tectorial and otoconial membranes of the inner ear. Mutations in otoancorin cause autosomal recessive deafness DFNB22. The protein belongs to the stereocilin family. The specific function of this domain remains to be determined.
