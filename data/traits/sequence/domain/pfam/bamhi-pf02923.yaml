identifier: Pfam:PF02923
label: Restriction endonuclease BamHI
definition: >-
  This entry represents BamHI restriction endonucleases, which recognises the DNA sequence GGATCC and cleaves after G-1. The enzyme binds as a dimer to the symmetrical GGATCC sequence but it recognises this sequence in an asymmetric manner, in which the C-terminal arm of one BamHI subunit goes into the DNA minor groove while the corresponding region of the other subunit follows the DNA sugar-phosphate backbone. The BamHI structure consists of a central mixed β -sheet with α-helices packed on both sides. This entry also represents the Type II restriction enzyme OkrAI that is isoschizomer of BamHI. OkrAI is a minimal version of BamHI, lacking the N- and C-terminal helices as well as the internal 3(10) helix of BamHI. Despite these structural differences, OkrAI recognises the DNA in a remarkably similar manner to BamHI. There are four classes of restriction endonucleases: types I, II, III and IV. All types of enzymes recognise specific short DNA sequences and carry out the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. They differ in their recognition sequence, subunit composition, cleavage position, and cofactor requirements, as summarised below: Type I enzymes ( ) cleave at sites remote from recognition site; require both ATP and S-adenosyl-L-methionine to function; multifunctional protein with both restriction and methylase ( ) activities. Type II enzymes ( ) cleave within or at short specific distances from recognition site; most require magnesium; single function (restriction) enzymes independent of methylase. Type III enzymes ( ) cleave at sites a short distance from recognition site; require ATP (but doesn't hydrolyse it); S-adenosyl-L-methionine stimulates reaction but is not required; exists as part of a comp…
