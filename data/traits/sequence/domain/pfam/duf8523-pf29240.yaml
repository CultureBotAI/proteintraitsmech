identifier: Pfam:PF29240
label: Domain of unknown function (DUF8523)
definition: >-
  This entry represents an immunoglobulin-like domain found in outer membrane proteins of spirochaetes, particularly Treponema species. The domain is approximately 90-100 residues long and adopts the characteristic Ig-like fold consisting of two β-sheets arranged in a sandwich configuration. These proteins are typically bipartite, containing this N-terminal periplasmic Ig-like domain and a C-terminal domain. The domain is found in proteins predicted to be outer membrane lipoproteins. The function of this domain remains to be determined.
