identifier: Pfam:PF29254
label: Archaeoglobi AF1636 family protein
definition: >-
  This entry represents the AF_1636 family of uncharacterised proteins found in the Archaeoglobaceae family. The protein is 92 amino acids long and is found in hyperthermophilic sulphate-reducing archaea. The function of this protein remains to be determined.
