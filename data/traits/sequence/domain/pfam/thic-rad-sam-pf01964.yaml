identifier: Pfam:PF01964
label: Radical SAM ThiC family
definition: >-
  This entry includes phosphomethylpyrimidine synthases, including thiC from prokaryotes and AtTHIC from Arabidopsis. thiC is found within the thiamin biosynthesis operon and is involved in thiamin biosynthesis. ThiC catalyzes the synthesis of the hydroxymethylpyrimidine phosphate (HMP-P) moiety of thiamine from aminoimidazole ribotide (AIR) in a radical S-adenosyl-L-methionine (SAM)-dependent reaction. AtTHIC is involved in pyrimidine synthesis in the thiamine biosynthesis pathway of Arabidopsis. Heterologous expression of AtTHIC could functionally complement the thiC knock-out mutant of E. coli. This entry also includes 5-hydroxybenzimidazole synthase BzaA and BzaB. They are part of the bzaABCDE genes that are necessary and sufficient for the anaerobic biosynthesis of DMB (5,6-dimethylbenzimidazole), the "lower ligand" of vitamin B12.
