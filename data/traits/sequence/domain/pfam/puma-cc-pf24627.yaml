identifier: Pfam:PF24627
label: PUMA coiled-coil
definition: >-
  This entry represents a coiled-coil region found in PUMA from Parascaris univalens, Major antigen from Onchocerca volvulus (OVT1) and similar sequences mainly found in animals and some plant species. PUMA may play a role in the organisation of the spindle apparatus and its interaction with the centromeres. OVT1 may be a myofibrillar protein.
