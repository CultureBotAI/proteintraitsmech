identifier: Pfam:PF29040
label: CTF50, LisH domain
definition: >-
  This entry represents a domain found at the N-terminal of Cleavage stimulation factor subunit 50 from Arabidopsis (according to AlphaFold structure prediction AF-Q8L4J2-2-F1) and related plant sequences. It may adopt a structure similar to LisH dimerisation domains. CTF50 is one of the multiple factors required for polyadenylation and 3'-end cleavage of pre=mRNAs.
