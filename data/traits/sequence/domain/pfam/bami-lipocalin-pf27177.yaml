identifier: Pfam:PF27177
label: BamI lipocalin-like domain
definition: >-
  This entry represents the lipocalin-like domain that is found in the BamI protein from Pseudomonas aeruginosa. BamI is a biofilm-associated metzincin protease inhibitor that inhibits the metalloendopeptidase Mep72. The protein forms a protein-protein complex with Mep72, which is encoded by the adjacent coregulated gene PA2783, and prevents premature protease activity until secretion. BamI shows structural similarity to CpaB, a type II secretion system chaperone from Acinetobacter that stabilises and inhibits the CpaA protease. BamI is a single-pass membrane protein that is poorly expressed in planktonic cells but upregulated in biofilms.
