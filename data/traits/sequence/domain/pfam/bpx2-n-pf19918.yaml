label: MoxR-vWA-beta-propeller ternary system bpX2, N-terminal domain
definition: >-
  This domain is known as bpX2. Most members of this entry belong to the phylum Bacteroidetes. This entry represents an uncharacterised domain found in the MoxR-vWA-β-propeller ternary system, a class of NTP-dependent biological conflict systems.
