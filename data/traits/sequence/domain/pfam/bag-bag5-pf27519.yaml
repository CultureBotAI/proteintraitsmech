identifier: Pfam:PF27519
label: BAG5-like, BAG domain
definition: >-
  This BAG domain is found in human BAG family molecular chaperone regulator 5 (BAG5) and related proteins from vertebrates. BAG5 is a co-chaperone for HSP/HSP70 proteins that functions as a nucleotide-exchange factor, promoting the release of ADP from HSP70, thereby activating HSP70-mediated protein refolding.
