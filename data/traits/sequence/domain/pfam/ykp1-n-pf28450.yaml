identifier: Pfam:PF28450
label: YKP1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YKP1, an uncharacterised protein encoded by the killer plasmid pGKL2 from Kluyveromyces lactis. The presence of plasmids pGKL1 and pGKL2 confers the killer phenotype to the host cell by promoting secretion of a toxin that inhibits growth of sensitive strains. This protein is found exclusively in fungi, specifically in Kluyveromyces species harbouring these linear plasmids. The function of this N-terminal domain remains to be determined.
