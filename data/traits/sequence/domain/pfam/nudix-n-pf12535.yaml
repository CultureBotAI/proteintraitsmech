identifier: Pfam:PF12535
label: UDP-X-like, N-terminal oligomerisation domain
definition: >-
  This entry represents an α-helical oligomerisation domain which is found at the N-terminal end of a number of phosphatases such as UDP-X diphosphatase from Streptococcus pneumoniae and CDP-Choline Pyrophosphatase from Bacillus cereus , and related bacterial proteins. This domain precedes the nudix domain and this arrangement is typical for this group of phosphatases. UDP-X diphosphatase catalyses the last step of the Mur pathway of peptidoglycan biosynthesis and can hydrolyse the Mur pathway substrates UDP-N-acetylmuramic acid and UDP-N-acetylmuramoyl-L-alanine. In addition to its Nudix catalytic activity, the enzyme has a 3'5' RNA exonuclease activity. CDP-Choline Pyrophosphatase catalyses the hydrolysis of CDP-choline to produce CMP and phosphocholine and in addition, the enzyme has a 3'-5' RNA exonuclease activity.
