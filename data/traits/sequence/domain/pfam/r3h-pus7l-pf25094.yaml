identifier: Pfam:PF25094
label: PUS7L R3H domain
definition: >-
  This R3H domain is found in human Pseudouridylate synthase PUS7L and related proteins from vertebrates. Human PUS7L catalyses pseudouridylation of RNAs, acting also as a regulator of protein synthesis in embryonic stem cells by mediating pseudouridylation of RNA fragments derived from tRNAs (tRFs). The pseudouridylated tRFs inhibit translation by targeting the translation initiation complex.
