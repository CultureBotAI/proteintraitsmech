identifier: Pfam:PF00299
label: Squash family serine protease inhibitor
definition: >-
  The squash inhibitors form one of a number of serine proteinase inhibitor families. They belong to MEROPS inhibitor family I7, clan IE. They are generally annotated as either trypsin or elastase inhibitors (MEROPS peptidase family S1, ). The proteins, found exclusively in the seeds of the cucurbitaceae, e.g. Citrullus lanatus (watermelon), Cucumis sativus (cucumber), Momordica charantia (balsam pear), are approximately 30 residues in length and contain 6 Cys residues, which form 3 disulphide bonds. The inhibitors function by being taken up by a serine protease (such as trypsin), which cleaves the peptide bond between Arg/Lys and Ile residues in the N-terminal portion of the protein. Structural studies have shown that the inhibitor has an ellipsoidal shape, and is largely composed of β-turns. The fold and Cys connectivity of the proteins resembles that of potato carboxypeptidase A inhibitor.
