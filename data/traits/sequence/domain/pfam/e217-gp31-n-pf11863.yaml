identifier: Pfam:PF11863
label: E217 tail sheath protein gp31-like, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the Pseudomonas bacteriophage E217 tail sheath protein gp31 and related proteins, including phage Pa193 gp32 and Shigella flexneri bacteriophage Sf14 gp39. It folds into an α/β structure that shares similarity with the members of the TssC1 N-terminal domain superfamily.
