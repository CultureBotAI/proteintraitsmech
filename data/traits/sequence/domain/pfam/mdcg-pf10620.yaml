identifier: Pfam:PF10620
label: Phosphoribosyl-dephospho-CoA transferase MdcG C-terminal domain
definition: >-
  This entry represents the C-terminal catalytic domain of MdcG, which is a phosphoribosyl-dephospho-CoA transferase that is involved in the biosynthesis of the prosthetic group of malonate decarboxylase. Malonate decarboxylase from Klebsiella pneumoniae contains an acyl carrier protein (MdcC) to which a 2'-(5-triphosphoribosyl)-3'-dephospho-CoA prosthetic group is attached via phosphodiester linkage. MdcG catalyses the following reaction: 2'-(5-triphosphoribosyl)-3'-dephospho-CoA apo-[acyl-carrier-protein] = holo-[acyl-carrier-protein] diphosphate.
