identifier: Pfam:PF27711
label: Sphingomyelinase D/Phospholipase D
definition: >-
  This family of enzymes includes sphingomyelinase D mainly from ascomycota and phospholipase D from actinobacteria and fungi, Phospholipase D displays sphingomyelinase and haemolytic activity. In Corynebacterium pseudotuberculosis and other pathogens, the enzyme acts as a virulence factor affecting bacterial dissemination and survival within the host.
