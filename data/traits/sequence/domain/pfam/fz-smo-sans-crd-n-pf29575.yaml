identifier: Pfam:PF29575
label: Frizzled/Smoothened-like sans CRD N-terminal domain
definition: >-
  This entry represents the N-terminal region of Frizzled/Smoothened-like sans CRD (FscC) proteins from Dictyostelium discoideum and related species. These proteins are members of the G-protein coupled receptor Fz/Smo family but lack the characteristic cysteine-rich domain (CRD) found in typical Frizzled receptors. The domain is approximately 30-40 residues in length and is located at the N-terminal end of the protein, preceding the seven transmembrane helical region. The proteins containing this domain are localised to the membrane and function as multi-pass membrane proteins. Its specific function remains to be determined.
