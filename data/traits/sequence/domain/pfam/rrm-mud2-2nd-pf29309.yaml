identifier: Pfam:PF29309
label: MUD2 second RRM-like domain
definition: >-
  This entry represents the second RNA recognition motif (RRM) domain found in the MUD2 splicing factor from yeast and related proteins. MUD2 is a splicing factor that contacts pre-mRNA directly and is a component of the pre-mRNA-U1 snRNP complex (commitment complex 2) that forms during early spliceosome assembly. The RRM domain is responsible for RNA binding activity, including poly-pyrimidine tract binding and pre-mRNA branch point binding. MUD2 forms commitment complex 2 through interactions with MSL5 and PRP40.
