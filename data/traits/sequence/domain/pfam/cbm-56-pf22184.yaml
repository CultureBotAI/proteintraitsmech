identifier: Pfam:PF22184
label: Carbohydrate binding module family 56
definition: >-
  Carbohydrate binding modules (CBMs) are independent domains existing in carbohydrate active enzymes. The majority of such domains exhibit carbohydrate binding activity. They target the enzyme to a particular carbohydrate, maintain its association with the substrate and by this proximity effect enhance the enzyme catalytic efficiency. The CBM family 56 (CBM56) domain is an ~95-amino acid module, which selectively binds insoluble beta-1,3-glucans, probably by binding domains in the polysaccharide with triple-helical quaternary structure. The CBM56 domain folds into a β-sandwich with a Fibronectin type III topology and is structurally similar to CBM39 domain. This module is likely to use a binding interface and mechanisms of recognition of the quaternary structure of beta-1,3-glucans similar to CBM39.
