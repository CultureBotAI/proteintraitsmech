identifier: Pfam:PF21517
label: Transposable element Tc3 transposase, HTH
definition: >-
  This entry represents the specific DNA-binding HTH domain found in Transposable element Tc3 transposase from Caenorhabditis elegans and similar sequences mainly from nematodes and arthropods. This protein binds specifically to the terminal nucleotides of the TC3 inverted repeat and acts by making double strand breaks at the ends of TC3 element. It has two DNA-binding domains at the N terminus, the first one represented in and the second one in this entry. They both bind to the major groove on a single DNA oligomer, separated by a linker that interacts closely with the minor groove.
