identifier: Pfam:PF21762
label: DNA polymerase III subunit epsilon-like, C-terminal domain
definition: >-
  This entry represents a domain found at the C-terminal end of fungal proteins, including Gfd2 and YDR514C from yeasts and QDE-2-interacting protein from the filamentous fungi Neurospora crassa ( ), which are related to DNA polymerase III subunit epsilon and similar proteins that belong to the DnaQ-like (or DEDDh) exonuclease superfamily. These proteins catalyse the excision of nucleoside monophosphates at the DNA or RNA termini in the 3'-5' direction. Most DEDDh exonucleases are the proofreading subunits (epsilon) or domains of bacterial DNA polymerase III, the main replicating enzyme in bacteria, which functions as the chromosomal replicase. This domain shows an α-β configuration.
