identifier: Pfam:PF29713
label: RS2/RL21/YNQ2 HHH domain
definition: >-
  This entry represent a HHH (helix-hairpin-helix) domain found in Small ribosomal subunit protein uS2, Large ribosomal subunit protein bL21 and YNQ2, from bacteria. YNQ2 is an uncharacterised protein from Paracoccus denitrificans that may be involved in the transfer of iron-sulfur clusters to the NADH dehydrogenase complex or in the assembly of the NADH dehydrogenase complex.
