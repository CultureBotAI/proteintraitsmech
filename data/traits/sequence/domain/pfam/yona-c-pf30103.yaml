identifier: Pfam:PF30103
label: YonA C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YonA, a 156 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. YonA is divided into two domains: an N-terminal region and this C-terminal α helical domain. The function of this domain remains to be determined.
