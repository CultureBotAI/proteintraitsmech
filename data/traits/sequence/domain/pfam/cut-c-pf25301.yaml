identifier: Pfam:PF25301
label: Cuticlin C-terminal domain
definition: >-
  This entry represents the C-terminal Ig-like domain of Cuticlin proteins from Caenorhabditis elegans. This model doesn't capture the C-terminal strand that, in some of the proteins, is separated by a large irregular insertion. Cuticlin is a component of the cuticles, which contributes to the formation of extracellular envelopes protecting the organism from the environment. It also plays a role in alae formation in dauer larvae.
