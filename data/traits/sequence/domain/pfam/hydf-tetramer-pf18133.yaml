identifier: Pfam:PF18133
label: Hydrogen maturase F tetramerization domain
definition: >-
  This entry represents the C-terminal domain of Hydrogen maturase F (HydF) from Thermotoga neapolitana. HydF is a GTPase that contains an FeS cluster-binding motif and is able to activate HydA production. This domain is known as domain III and is primarily responsible for homotetramer formation. Interactions between the two FeS cluster-binding domains are the interactions between the β2 strands, the initial part of the long loop that connects strand β2 to strand β3, and the loop that connects strand β1 to helix α3. There are three highly conserved cysteine residues (Cys-302, Cys-353, and Cys-356) that represent the FeS cluster-binding site which form a superficial pocket.
