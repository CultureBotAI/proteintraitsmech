identifier: Pfam:PF27334
label: Mycolysin N-terminal domain
definition: >-
  This entry represents the N-terminal domain of mycolysin proteins found in Streptomyces and related actinomycetes. The domain adopts an immunoglobulin-like fold structure. Mycolysin is a secreted zinc metalloprotease ( ) that preferentially cleaves bonds with hydrophobic residues. The protein undergoes extracellular auto processing and belongs to the peptidase M5 family. While the full-length protein has demonstrated metalloprotease activity, the specific function of this N-terminal domain remains to be determined.
