identifier: Pfam:PF03872
label: Anti sigma-E protein RseA, N-terminal domain
definition: >-
  Sigma-E is important for the induction of proteins involved in heat shock response. RseA binds sigma-E via its N-terminal domain, sequestering sigma-E and preventing transcription from heat-shock promoters. The C-terminal domain is located in the periplasm, and may interact with other protein that signal periplasmic stress.
