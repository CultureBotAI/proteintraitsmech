identifier: Pfam:PF01184
label: GPR1/FUN34/yaaH family
definition: >-
  This family of evolutionary related proteins includes Yarrowia lipolytica (Candida lipolytica) glyxoxylate pathway regulator GPR1, Saccharomyces cerevisiae Ady2, Fun34/Ato2 and Ato3; fission yeast Mug86 (also known as SpAC5D6.09c); Escherichia coli SatP (YaaH); and the Acetate transporter protein patA from Penicillium expansum. The uncharacterised protein AlcS from Aspergillus fumigatus and Emericella nidulans is also included in this entry. They contain six transmembrane helices that surrounds the central channel pore, involved in transport. Saccharomyces cerevisiae Ady2, also known as ATO1, is a transporter protein required for ammonia export and acetate uptake and resistance and is necessary for up-regulation and down-regulation of meiotic plaque (MP) component levels in a dependency on external acetate. Gpr1p affects sensitivity to acetic acid in the yeast Yarrowia lipolytica. Ato2 and Ato3 are required for ammonia export. AcpA may be an acetate transporter that is essential for acetate permease activity in the hyphal fungus Aspergillus nidulans. SatP is involved in the uptake of acetate and succinate. PatA is part of the gene cluster that mediates the biosynthesis of patulin, an acetate-derived tetraketide mycotoxin produced by several fungal species that shows antimicrobial properties against several bacteria.
