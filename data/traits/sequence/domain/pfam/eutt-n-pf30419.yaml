identifier: Pfam:PF30419
label: Corrinoid adenosyltransferase EutT N-terminal domain
definition: >-
  This entry represents the N-terminal domain of corrinoid adenosyltransferase EutT, found in bacteria. This enzyme catalyses the adenosylation of cob(I)alamin to adenosylcobalamin, which is required for ethanolamine utilisation.
