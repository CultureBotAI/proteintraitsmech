identifier: Pfam:PF27141
label: PglY fourth domain
definition: >-
  This entry represents the fourth domain of PglY, an ATPase component of the BREX (bacteriophage exclusion) type 2 system from Streptomyces coelicolor. PglY is part of a four-gene system (pglW-pglX-pglY-pglZ) that provides immunity against bacteriophages such as phiC31 and phiBT1. PglY exhibits ATPase activity and all four genes in the operon are necessary for bacteriophage resistance. The specific function of this domain remains to be determined.
