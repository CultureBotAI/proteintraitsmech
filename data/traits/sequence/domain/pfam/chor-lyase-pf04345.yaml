identifier: Pfam:PF04345
label: Chorismate lyase
definition: >-
  Chorismate--pyruvate lyase catalyses the first step in ubiquinone synthesis, the removal of pyruvate from chorismate, to yield 4-hydroxybenzoate in Escherichia coli and other Gram-negative bacteria. The yeast Saccharomyces cerevisiae can synthesize ubiquinone from either chorismate or tyrosine, however this enzyme is found only in bacteria. Its activity does not require metal cofactors.
