identifier: Pfam:PF09310
label: POU domain, class 2, associating factor 1
definition: >-
  Members of this family are transcriptional co-activators that specifically associate with either OCT1 or OCT2, through recognition of their POU domains. They are essential for the response of B-cells to antigens and required for the formation of germinal centres.
