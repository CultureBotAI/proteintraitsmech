identifier: Pfam:PF05622
label: HOOK protein coiled-coil region
definition: >-
  The Hook family consists of several proteins from different eukaryotic organisms, first identified in Drosophila melanogaster in which play a role in endocytic cargo sorting. In Drosophila and fungi there is a single Hook gene, whereas mammals have three Hook genes, Hook1, Hook2 and Hook3. Endogenous Hook3 binds to Golgi membranes while both Hook1 and Hook2 are localised to discrete but unidentified cellular structures. In mice the Hook1 gene is predominantly expressed in the testis. Hook1 function is necessary for the correct positioning of microtubule structures within the haploid germ cell. Disruption of Hook1 function in mice causes abnormal sperm head shape and fragile attachment of the flagellum to the sperm head. They are a widely expressed class of dynein-associated cargo adaptor proteins which include different domains. The N-terminal part of these proteins is sufficient to form a stable complex with dynein-dynactin and includes the most conserved region within the first 160 amino acids, termed the Hook domain. This domain is followed by three coiled-coil domains, important for dimerization and activation of dynein-dynactin complex motility, and then a C-terminal domain that binds a variety of proteins specific for each Hook isoform, involved in binding to specific organelles (organelle-binding domains). All mammalian Hook isoforms form a complex with Fused Toes and the Fused Toes- and Hook-interacting protein; fungal homologues of these proteins are important for dynein-mediated early endosome transport by linking Hook to the cargo. This entry represents the central coiled-coiled region and the divergent C-terminal domain from Hook proteins.
