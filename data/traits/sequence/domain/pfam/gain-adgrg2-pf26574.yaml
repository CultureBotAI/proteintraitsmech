identifier: Pfam:PF26574
label: ADGRG2-like, GAIN domain
definition: >-
  This presumed GAIN domain is found in human Adhesion G-protein coupled receptor G2/6 (ADGRG2/6) and similar proteins from vertebrates. This domain, which is predicted to adopt an α-β structure, is usually found associated with . ADGRG2 is an adhesion G-protein coupled receptor (aGPCR) for steroid hormones, such as dehydroepiandrosterone (DHEA; also named 3beta-hydroxyandrost-5-en-17-one) and androstenedione that plays an important regulatory role in male fertility. Upon ligand binding, it goes trough a conformation change that triggers signalling via guanine nucleotide-binding proteins (G proteins) and modulates the activity of downstream effectors, such as adenylate cyclase. It is known to play important roles for maintaining chloride/acid-base homeostasis through coupling to the cystic fibrosis transmembrane conductance regulator. ADGRG2 is a multidomain protein. ADGRG6 is an adhesion G-protein coupled receptor (aGPCR) for steroid hormones, such as progesterone and 17alpha-hydroxyprogesterone (17OHP) involved in myelination of the peripheral nervous system that acts as a regulator of body length and bone mass. Upon ligand binding, it goes trough a conformation change that triggers signalling via guanine nucleotide-binding proteins (G proteins) and modulates the activity of downstream effectors, such as adenylate cyclase.
