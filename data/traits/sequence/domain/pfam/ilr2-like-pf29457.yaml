identifier: Pfam:PF29457
label: IAA-leucine resistant protein
definition: >-
  This entry represents the IAA-leucine resistant (ILR2) protein family, also known as partitivirus capsid protein-like sequence (PCLS) proteins. The family includes ILR2 (At3g18485) from Arabidopsis thaliana and related viral capsid proteins. ILR2 regulates an ATP-dependent metal transporter and is involved in the metabolism of auxin conjugates such as indole-3-acetic acid-leucine (IAA-Leu) and IAA-phenylalanine. The protein is required for root development and is localised to the cytoplasm. Disruption of ILR2 results in resistance to auxin conjugates, defective lateral root formation, and altered metal transport. This protein family represents an example of horizontal gene transfer from double-stranded RNA viruses to eukaryotic nuclear genomes. The function involves auxin conjugate metabolism and metal ion transport regulation.
