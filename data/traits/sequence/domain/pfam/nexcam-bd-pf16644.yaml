identifier: Pfam:PF16644
label: Regulatory region of Na+/H+ exchanger NHE binds to calmodulin
definition: >-
  This entry represents a coiled-coil domain found as part of the regulatory, C-terminal region of the 12-14 TM sodium/proton exchangers (NHEs) of the solute carrier 9 (SLC9) family in all animal kingdoms. The C- lobe of CaM binds the first α-helix of the NHE, or CaM b binging region, and the N-lobe of CaM binds the second helix of CaM b binging region.
