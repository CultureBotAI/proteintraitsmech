identifier: Pfam:PF00726
label: Interleukin 10
definition: >-
  This entry represents the interleukin-10, interleukin-19, interleukin-20, interleukin-24 and interleukin-26 family. Interleukin-10 (IL-10) is a protein that inhibits the synthesis of a number of cytokines, including IFN-gamma, IL-2, IL-3, TNF and GM-CSF produced by activated macrophages and by helper T cells. Structurally, IL-10 is a protein of about 160 amino acids that contains four conserved cysteines involved in disulphide bonds. IL-10 is highly similar to the Epstein-Barr virus (strain GD1) (HHV-4) (Human herpesvirus 4) BCRF1 protein which inhibits the synthesis of gamma-interferon and to Equid herpesvirus 2 (Equine herpesvirus 2) protein E7. It is also similar, but to a lesser degree, with human protein mda-7, a protein which has antiproliferative properties in human melanoma cells. Mda-7 only contains two of the four cysteines of IL-10.
