identifier: Pfam:PF13547
label: GTA TIM-barrel-like domain
definition: >-
  This domain, which appears to have a TIM barrel fold, is found in the gene transfer agent protein. An unusual system of genetic exchange exists in the purple nonsulphur bacterium Rhodobacter capsulatus. DNA transmission is mediated by a small bacteriophage-like particle called the gene transfer agent (GTA) that transfers random 4.5-kb segments of the producing cell's genome to recipient cells, where allelic replacement occurs. The genes involved in this process appear to be found widely in bacteria.
