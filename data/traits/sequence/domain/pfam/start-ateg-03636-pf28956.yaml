identifier: Pfam:PF28956
label: ATEG_03636 START domain
definition: >-
  This entry represents a START domain found in ATEG_03636 and related proteins involved in azasperpyranone biosynthesis in fungi. The domain is approximately 190 amino acids in length and is found in proteins that participate in secondary metabolite biosynthesis pathways. ATEG_03636 is involved in the condensation of polyhydric phenol moieties with perasperpyranone precursors to yield azasperpyranone A. These azaphilone compounds exhibit anti-cancer activities and are synthesised by collaborative biosynthesis involving two gene clusters. The proteins contain N-terminal signal peptides and multiple N-glycosylation sites. The specific function of this START domain remains to be determined.
