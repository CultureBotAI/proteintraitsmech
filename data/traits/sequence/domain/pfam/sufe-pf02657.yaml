identifier: Pfam:PF02657
label: Fe-S metabolism associated domain
definition: >-
  This entry represents the core domain of SufE and related proteins. This domain of SufE shows strong structural similarity to IscU, and the sulfur-acceptor site in SufE coincides with the location of the cysteine residues mediating Fe-S cluster assembly in IscU. Thus, a conserved core structure is implicated in mediating the interactions of both SufE and IscU with the mutually homologous cysteine desulfurase enzymes present in their respective operons.
