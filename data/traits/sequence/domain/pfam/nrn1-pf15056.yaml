identifier: Pfam:PF15056
label: Neuritin protein family
definition: >-
  This entry represents the neuritin family of proteins, including neuritin-A and B from Xenopus laevis and neuritin-like protein from human and mouse. Neuritin has been shown to promote neurite outgrowth and arborisation in primary embryonic hippocampal and cortical cultures. Its expression is induced by neuronal activity and by the activity-regulated neurotrophins BDNF and NT-3.
