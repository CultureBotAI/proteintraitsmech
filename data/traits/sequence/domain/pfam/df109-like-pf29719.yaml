identifier: Pfam:PF29719
label: Defensin-like protein 109-like
definition: >-
  This entry represents a defensin-like domain found predominantly in the Brassicaceae, particularly in Arabidopsis, Brassica and Capsella species. The domain is characterised by a conserved pattern of four disulphide bonds and is found in small secreted proteins. These proteins belong to the DEFL group and are involved in antimicrobial defence responses, particularly against fungi. The mature protein is secreted following cleavage of an N-terminal signal peptide. This defensin-like domain forms part of a large group of over 300 related genes in Arabidopsis thaliana.
