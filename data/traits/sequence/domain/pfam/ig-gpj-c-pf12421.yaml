identifier: Pfam:PF12421
label: Tip attachment protein J, C-terminal receptor binding domain
definition: >-
  This entry represents the C-terminal receptor binding domain of Tip attachment protein J from Escherichia phage lambda (GpJ) and similar bacterial and viral proteins. This domain, which determines the host specificity of the phage, shows an immunoglobulin-like fold. It is often found in association with and . There are two completely conserved G residues that may be functionally important. Many of the proteins in this entry are annotated as fibronectin type III. This domain was previously known as DUF3672. The Tip attachment protein J (GpJ) from Escherichia phage lambda is a crucial tail fibre protein responsible for recognising and binding the host cell's LamB receptor, thereby initiating infection. Structurally, GpJ forms the central tail fibre at the phage tip and undergoes conformational changes upon receptor engagement, which are essential for triggering DNA injection into the host. It interacts with other tail proteins during assembly, serving as a scaffold for tail tube formation and coordinating with the tape measure protein to regulate genome delivery. Mutations in GpJ can alter host specificity and affect phage stability, while its exposed position makes it a target for neutralising antibodies.
