identifier: Pfam:PF24890
label: Allantoinase, composite domain
definition: >-
  This entry represents the N-terminal region of the composite domain of Allantoinase (ALN), a protein that catalyses the conversion of allantoin (5-ureidohydantoin) to allantoate by hydrolytic cleavage of the five-member hydantoin ring. The composite domain of metal-dependent hydrolases has a pseudo-barrel fold that is interrupted by the catalytic β/α domain.
