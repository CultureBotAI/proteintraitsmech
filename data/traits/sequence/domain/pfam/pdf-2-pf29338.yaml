identifier: Pfam:PF29338
label: Pigment dispersing factor homolog pdf-2
definition: >-
  This entry represents pigment dispersing factor homolog pdf-2 found in nematodes. The protein is 89 amino acids in length and functions as a probable ligand of calcitonin receptor-like protein pdfr-1, a G-protein coupled receptor. The protein is involved in locomotion and may play a role in circadian rhythms of locomotor activity. It also modulates egg-laying behaviour. The protein is expressed in various neurons including interneurons, chemosensory neurons, motor neurons and sensory neurons, as well as rectal gland cells.
