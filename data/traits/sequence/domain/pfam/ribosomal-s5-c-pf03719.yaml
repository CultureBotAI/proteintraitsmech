identifier: Pfam:PF03719
label: Ribosomal protein S5, C-terminal domain
definition: >-
  This entry represents the C-terminal of the ribosomal protein uS5, which is related to the 30S ribosomal protein S5P from Sulfolobus acidocaldarius ( ). Ribosomal protein uS5 is one of the proteins from the small ribosomal subunit. In Escherichia coli, uS5 is known to be important in the assembly and function of the 30S ribosomal subunit. Mutations in uS5 have been shown to increase translational error frequencies.
