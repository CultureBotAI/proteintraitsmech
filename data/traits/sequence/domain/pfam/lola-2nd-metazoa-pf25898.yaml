identifier: Pfam:PF25898
label: Metazoan 2nd LolA-like domain
definition: >-
  This entry represents a LolA-like domain that is found in the middle of a family of large metazoan proteins. These proteins are composed of two LolA-like domains followed by a third C-terminal domain. These proteins are membrane anchored and glycosylated.
