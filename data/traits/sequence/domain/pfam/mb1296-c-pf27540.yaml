identifier: Pfam:PF27540
label: Mb1296 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of uncharacterised proteins from actinomycetes, including Rv1265 from M. tuberculosis, MT1303 from M. tuberculosis CDC 1551, and Mb1296 from M. bovis. The Rv1265 protein from M. tuberculosis H37Rv has been detected by mass spectrometry, confirming its expression. Subcellular localisation studies suggest association with the peptidoglycan-based cell wall and plasma membrane. uncharacterised protein Mb1296 from Mycobacterium bovis and related bacterial proteins.
