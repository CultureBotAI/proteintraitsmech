identifier: Pfam:PF16135
label: Tify domain binding domain
definition: >-
  This entry contains a C-terminal presumed zinc binding domain from the NINJA and related proteins, which interacts with the Tify domain of JAZ1. This domain appears to be necessary and sufficient for JAZ protein interaction. Proteins included in this entry play a role in stress-related and growth-related signalling cascades.
