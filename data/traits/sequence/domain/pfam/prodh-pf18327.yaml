identifier: Pfam:PF18327
label: 'Proline utilization A proline dehydrogenase N-terminal domain '
definition: >-
  This is the N-terminal domain found in Proline utilization A (PutA) proteins. Proline utilization A (PutA) is a flavoprotein that has mutually exclusive roles as a transcriptional repressor of the put regulon and a membrane-associated enzyme that catalyzes the oxidation of proline to glutamate. The N-terminal region carries the flavoenzyme proline dehydrogenase (PRODH) domain which catalyzes the 2-electron oxidation of proline with the concomitant reduction of a flavin cofactor.
