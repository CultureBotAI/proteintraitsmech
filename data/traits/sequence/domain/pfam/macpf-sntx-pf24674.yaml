identifier: Pfam:PF24674
label: SNTX, MACPF/CDC-like domain
definition: >-
  This MACPF/CDC-like domain is found N-terminal in a number of toxins including Stonustoxin (SNTX), Neoverrucotoxin (NeoVTX), Verrucotoxin (VTX), Sp-CTx and related proteins. This domain is a pore-forming domain and is involved in the formation of large ring-shaped pores in rat erythrocyte membranes. The formation of MACPF/CDC-like pores is probably central to the toxin's hemolytic activity, and cell lysis could explain physiological effects, including edema, increased vascular permeability, and muscle damage.
