identifier: Pfam:PF18290
label: Nudix hydrolase domain
definition: >-
  This domain is found just before the N-terminal region of nucleoside diphosphate-linked moiety (Nudix) hydrolases ( ). Nudix hydrolases catalyze the hydrolysis of nucleoside diphosphates which are often toxic metabolic intermediates and signalling molecules.
