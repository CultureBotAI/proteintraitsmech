identifier: Pfam:PF27809
label: Ino eighty subunit 1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of IES1 (Ino eighty subunit 1) proteins found in fungi. IES1 proteins are components of the chromatin-remodelling INO80 complex, which includes subunits ARP4, ARP5, ARP8, RVB1, RVB2, TAF14, NHP10, IES3, IES4, IES6, ACT1, IES2, IES5 and INO80. Proteins in this entry are nuclear-localised and probably involved in transcription regulation. The specific function of this domain remains to be determined.
