identifier: Pfam:PF14413
label: Thg1 C terminal domain
definition: >-
  Thg1 was originally characterised as synthesising the guanine nucleotide at the -1 position of the histidinyl tRNA (HtRNA). Thg1 has also been shown to have polymerase activity, which has been proposed to be the ancestral activity of this enzyme.
