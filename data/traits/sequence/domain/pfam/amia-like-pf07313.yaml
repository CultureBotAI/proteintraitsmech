identifier: Pfam:PF07313
label: N-acetylmuramoyl-L-alanine amidase-like
definition: >-
  This entry represents a family of bacterial proteins, including N-acetylmuramoyl-L-alanine amidase (AmiA) from Bacteroides uniformis (BACUNI_02947, ). This highly specific enzyme hydrolyses GlcNAc-1,6-anhydro-MurNAc-peptide into disaccharide and stem peptide. It shows an α/β/α three-layered sandwich fold with a catalytic core that consists of a central five-stranded β-sheet and four α-helices. It is structurally related to NlpC/P60 γ-D-Glu-meso-diaminopimelic acid amidases.
