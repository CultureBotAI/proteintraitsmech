identifier: Pfam:PF28578
label: Plastid-specific ribosomal protein 5 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of large ribosomal subunit protein cL37 (PSRP5). The domain spans approximately 54 residues and is located after a disordered region in the protein sequence. While the full-length cL37 protein functions in plastid translation, the specific function of this C-terminal domain remains to be determined. PSRP5 is a component of the chloroplast large ribosomal subunit (50S) and exists in multiple forms (alpha, beta, gamma) due to different transit peptide cleavage sites. The chloroplast ribosome is responsible for translating chloroplast genome-encoded proteins, including components of the photosynthetic apparatus.
