identifier: Pfam:PF29530
label: Serine rich endogenous peptide
definition: >-
  This entry represents serine rich endogenous peptide precursors found in Brassicaceae species. These proteins are phytocytokines that are processed to release small peptides into the apoplast. The mature peptides are perceived by the MIK2 receptor kinase and trigger immune responses and regulate plant growth. SCOOP peptides modulate various physiological processes including root growth prevention, reactive oxygen species response regulation, and defence against pathogens and herbivores. The precursor proteins contain signal peptides and are proteolytically cleaved to release the active SCOOP peptides. These peptides interact with MIK2 via its extracellular leucine-rich repeat domain and trigger formation of receptor complexes with BAK1/SERK3 and SERK4 coreceptors.
