identifier: Pfam:PF22153
label: Elongation factor SelB, first winged-helix domain
definition: >-
  This domain is found in Elongation factor SelB from Aquifex aeolicus ( ) and similar prokaryotic proteins. SelB is a selenocysteine(Sec)-specific elongation factor that brings the selenocysteinyl-tRNA(Sec) to the ribosome. It consists of three EF-Tu-like domains (D1-3, where is the first one), followed by four winged-helix domains (WHD1-4). This entry represents the first winged-helix domain (WHD1).
