identifier: Pfam:PF29769
label: Protein YfdT C-terminal domain
definition: >-
  This entry represents the C-terminal domain of protein YfdT, found in Enterobacterales and bacteriophages. The protein is encoded within prophage regions and some proteins are annotated as excisionase. The function of this domain remains to be determined.
