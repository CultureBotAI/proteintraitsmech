identifier: Pfam:PF31084
label: Actinobacterial succinate dehydrogenase subunit SdhC
definition: >-
  This family represents the membrane anchor subunit (SdhC) of the type II succinate dehydrogenase complex (Sdh1) found in Actinobacteria including Mycobacterium and Streptomyces species. This subunit contains a membrane-embedded Rieske iron-sulfur cluster, a novel architecture distinct from canonical succinate dehydrogenase structures. The full Sdh1 complex is involved in the electron transport chain and tricarboxylic acid cycle.
