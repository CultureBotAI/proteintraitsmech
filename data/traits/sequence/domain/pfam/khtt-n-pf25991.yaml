identifier: Pfam:PF25991
label: K(+)/H(+) antiporter subunit KhtT, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of KhtT from Bacillus subtilis and similar proteins from prokaryotes. This domain adopts an unusual fold, comprised of a twisted five antiparallel β-sheet followed by an α-helix. KhtT is required for activity of the potassium/proton antiporter KhtU. It is involved in protection of the cell from methylglyoxal, a toxic by-product of glycolysis. KhtT(YhaT) modulates the activity of the potassium/proton antiporter YhaU. The transporter is composed of the integral membrane protein YhaU and the regulatory protein KhtT
