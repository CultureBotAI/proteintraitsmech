identifier: Pfam:PF18708
label: MapZ extracellular C-terminal domain 2
definition: >-
  In the pneumococcus cell division, MapZ (Midcell Anchored Protein Z) locates at the division site before FtsZ and guides septum positioning. MapZ forms ring structures at the cell equator and moves apart as the cell elongates, therefore behaving as a permanent beacon of division sites. MapZ then positions the FtsZ-ring through direct protein-protein interactions. Structural analysis indicate that it displays a bi-modular structure composed of two subdomains separated by a flexible serine-rich linker. The extracellular C-terminal domain carries a conserved patch of amino acids which plays a crucial function in binding peptidoglycan and positioning MapZ at the cell equator.
