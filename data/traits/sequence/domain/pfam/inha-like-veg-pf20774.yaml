identifier: Pfam:PF20774
label: Immune inhibitor A-like metallopeptidase, VEG domain
definition: >-
  Immune inhibitor A(InhA)-type metallopeptidases are potential virulence factors secreted by members of the Bacillus cereus group (BCG) and belong to the thuringilysin family within the metzincin clan of metallopeptidases, M6 in the MEROPS database. The structure of these proteins consists of four domains: a pro-peptide, a catalytic domain, a domain reminiscent of viral envelope glycoproteins (VEG), and a MAM domain grafted into the latter. This entry represents the VEG domain found at the C-terminal of InhA and PrtV peptidases (a slightly more distant thuringilysin family members). It consists of a central parallel β-sandwich comprised by an upper five-stranded mixed sheet and a lower four-stranded antiparallel sheet.
