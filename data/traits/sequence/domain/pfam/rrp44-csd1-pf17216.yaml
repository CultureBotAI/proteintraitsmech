identifier: Pfam:PF17216
label: Rrp44-like cold shock domain
definition: >-
  Rrp44 (also known as Dis3) constitutes the only active nuclease of the yeast exosome core. The structure of Rrp44 consists of CSD1, CSD2, RNB, and S1 domains. The two N-terminal cold shock domains (CSD1 and CSD2) and the C-terminal S1 domain all display characteristic OB folds. This entry represents CSD1.
