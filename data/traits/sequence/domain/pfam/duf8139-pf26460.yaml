identifier: Pfam:PF26460
label: Domain of unknown function (DUF8139)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in Halobacteria. The domain is found in proteins from various archaeal species, predominantly within the Halobacteriales order. Proteins containing this domain are typically around 70-90 amino acids in length. This domain adopts a five stranded β barrel fold.
