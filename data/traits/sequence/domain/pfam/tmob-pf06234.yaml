identifier: Pfam:PF06234
label: Toluene-4-monooxygenase system protein B (TmoB)
definition: >-
  This family includes several toluene-4-monooxygenase system ( ) protein B (TmoB) sequences. Pseudomonas mendocina KR1 metabolises toluene as a carbon source. The initial step of the pathway is hydroxylation of toluene to form p-cresol by a multicomponent toluene-4-monooxygenase (T4MO) system. Also included in the family is subunit gamma of the alkene monooxygenase multicomponent enzyme system ( ) from Xanthobacter autotrophicus which catalyzes the O 2 - and NADH-dependent epoxidation of short chain (C2 to C6) alkenes to their corresponding epoxides.
