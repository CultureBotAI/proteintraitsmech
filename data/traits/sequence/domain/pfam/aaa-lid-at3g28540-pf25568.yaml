identifier: Pfam:PF25568
label: At3g28540-like, AAA+ ATPase lid domain
definition: >-
  This domain is found at the C-terminal end of AAA-ATPase At3g28540 from Arabidopsis thaliana and similar plant proteins. This domain is predicted to have a helical bundle and is found associated with . The AAA ATPase BCS1 subfamily is a group of proteins that belong to the larger AAA ATPase family. These proteins are characterised by their ATPase activity, which is essential for various cellular processes, including protein unfolding, disassembly of protein complexes, and membrane fusion. The BCS1 subfamily is specifically involved in mitochondrial functions, as indicated by the presence of mitochondrial AAA-ATPases within the group. One member, the AAA-ATPase ASD, is known to play a role in regulating morphology and anatomy during seed maturation. Another member, Protein HYPER-SENSITIVITY-RELATED 4, has a unique function of binding to the Yariv phenylglycoside.
