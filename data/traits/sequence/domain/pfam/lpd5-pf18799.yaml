identifier: Pfam:PF18799
label: Large polyvalent protein-associated domain 5
definition: >-
  This domain is predicted to be an enzymatic α/β domain. It is often found N-terminal to a metallopeptidase domain in polyvalent proteins. The domain contains a conserved aspartate, lysine, and two arginine residues.
