identifier: Pfam:PF23773
label: Domain of unknown function (DUF7169)
definition: >-
  This family consists of a group of uncharacterised proteins, typically between 99 to 116 amino acids in length, found in bacteriophages that infect Microbacterium and Arthrobacter bacterial hosts. These proteins are encoded in the genomes of phages belonging to the Caudoviricetes class, primarily within the families Azeevirinae, Dismasvirus, Yangvirus, Manhattanvirus, Liebevirus, Zetavirus, and Armstrongvirus. An AlphaFold prediction shows these proteins are composed of two α helices. AlphaFold also predicts that these proteins likely form homodimers.
