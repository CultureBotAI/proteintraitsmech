identifier: Pfam:PF27198
label: FlaEY third domain
definition: >-
  This entry represents a β-sandwich domain found in FlaEY, a regulatory protein from Caulobacter vibrioides and related proteins. FlaEY is a transcriptional regulator (gene CC_1465) that functions in trans to modulate the level of transcription of flagellin genes and several genes encoding chemotaxis functions. The protein is temporally controlled and was originally thought to be two separate proteins (flaE and flaY). The specific function of this domain is unknown.
