identifier: Pfam:PF31168
label: RspA-like C-terminal domain
definition: >-
  This entry represents a domain of approximately 115 residues found in proteins in Streptomycetaceae. This domain is often found C-terminal to the NYN nuclease domain ( ), but also occurs independently. In Streptomyces griseus, the corresponding gene SGR_5442 (rspA) is part of the rspABCD operon involved in regulation of streptomycin production. The function of this domain remains to be determined.
