identifier: Pfam:PF01575
label: MaoC like domain
definition: >-
  The maoC gene is part of an operon with maoA which is involved in the synthesis of monoamine oxidase. The MaoC protein shares similarity with a region found in a wide variety of enzymes, such as peroxisomal hydratase-dehydrogenase-epimerase and fatty acid synthase beta subunit. A deletion mutant of the C-terminal 271 amino acids in peroxisomal hydratase-dehydrogenase-epimerase ( ), corresponding to the MaoC domain, abolished its 2-enoyl-CoA hydratase activity, suggesting that this region may be a hydratase enzyme. Several bacterial proteins that are composed solely of this domain have (R)-specific enoyl-CoA hydratase activity.
