label: Uteroglobin family
definition: >-
  Secretoglobins are relatively small, secreted, disulphide-bridged dimeric proteins with encoding genes sharing substantial sequence similarity. Members of this family include: Uteroglobin, a mammalian, steroid-inducible, secreted anti-inflammatory/immunomodulatory protein. Mammaglobin, expressed in ovarian cancer cells. Lipophilin B, which exists as a complex with mammary-specific mammaglobin A. Clara cell 17kDa protein, which inhibits phospholipase A2 and papain, and also binds to progesterone. Allergen Fel d 1 (Felis silvestris catus (Cat) allergen 1) chains 1 and 2, a tetrameric glycoprotein formed by two heterodimers that elicit IgE responses in people with allergy to cats. Secretoglobin proteins have a four-helical structure, and in the case of uteroglobin, form homodimers, whereas allergen Fel d 1 forms a tetramer of two heterodimers (chains 1 and 2). The conservation of this primary and quaternary structure indicates that the genome of the eutherian common ancestor of cats, rodents, and primates contained a similar gene pair. Uteroglobin (blastokinin or Clara cell protein CC10) is a mammalian steroid-inducible secreted protein originally isolated from the uterus of rabbits during early pregnancy. The mucosal epithelia of several organs that communicate with the external environment express uteroglobin. Its tissue-specific expression is regulated by steroid hormones, and is augmented in the uterus by non-steroidal prolactin. Uteroglobin may be a multi-functional protein with anti-inflammatory/immunomodulatory properties, acting to inhibit phospholipase A2 activity, and binding to (and possibly sequestering) several hydrophobic ligands such as progesterone, retinols, polychlorinated biphenyls, phospholipids and prostaglandins. In addition, uteroglobin has anti-che…
