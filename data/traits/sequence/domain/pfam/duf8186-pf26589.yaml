identifier: Pfam:PF26589
label: Domain of unknown function (DUF8186) N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in a family of uncharacterised proteins from archaea. The proteins are predominantly found in the Halobacteria class, which includes members of the Haloferacaceae, Haloarculaceae, and Natrialbaceae families. The proteins in this family are typically around 550-580 amino acids in length.
