identifier: Pfam:PF30147
label: Sporulation-specific protein 1
definition: >-
  This entry represents a conserved domain found in the central region of SSP1 (sporulation-specific protein 1) family, found in fungi. SSP1 is a meiosis-specific protein essential for proper completion of meiotic divisions and spore formation. The protein is involved in the pathway that organises the shaping and sizing of the prospore membrane during sporulation. SSP1 is required for the formation of ADY3 and DON1-containing protein coats at the leading edge of prospore membranes during meiosis II. The protein localises to precursors of the prospore membrane and to the leading edge, which covers the ring-shaped opening of prospore membranes. SSP1 interacts directly with ADY3 and is a component of a spindle pole body complex that includes ADY3, DON1, MPC54, SPO21, NUD1, and CNM67. The protein is expressed from 3 to 9 hours after induction of sporulation and is phosphorylated during meiosis.
