identifier: Pfam:PF30987
label: DD3-3 N-terminal domain
definition: >-
  This entry represents the N-terminal extracellular domain of DD3-3 proteins found mainly in amoebozoa and animals. This domain is found in type I membrane proteins that also contain a DD3_cupredoxin domain ( ). In Dictyostelium discoideum, the DD3-3 protein is expressed during early development following starvation. The specific function of this domain remains to be determined.
