identifier: Pfam:PF09642
label: YonK protein
definition: >-
  YonK protein is expressed by the bacterial prophage SPbetaC. It is a 63 residue protein that associates into a homo-octamer in the form of a β-stranded barrel with four outer helical features at points of the compass. Its function is unknown.
