identifier: Pfam:PF29895
label: Chorion protein E1
definition: >-
  This entry represents chorion protein E1, a structural component of the insect eggshell. Chorion protein E1 is one of two components of the prominent 'filler' that helps mould the shape of aeropyle crowns. This protein is found in Lepidoptera, particularly in moths and butterflies. The protein contributes to the architectural structure of the chorion, which protects the developing embryo and facilitates gas exchange through specialised structures called aeropyles. This protein contains an helical domain with disordered regions. It can be found also at the N-terminal in uncharacterised proteins.
