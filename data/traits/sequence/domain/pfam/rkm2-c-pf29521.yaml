identifier: Pfam:PF29521
label: Ribosomal lysine N-methyltransferase 2 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ribosomal lysine N-methyltransferase 2 proteins found in fungi. This domain is located downstream of the SET domain ( ). RKM2 proteins are S-adenosyl-L-methionine-dependent methyltransferases that trimethylate ribosomal proteins L12 and Rpl42ab at specific lysine residues. The specific function of this C-terminal domain remains to be determined.
