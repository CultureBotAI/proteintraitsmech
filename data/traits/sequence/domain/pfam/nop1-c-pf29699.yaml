identifier: Pfam:PF29699
label: Pseudocleavage protein nop-1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the pseudocleavage protein NOP-1 found in nematodes. NOP-1 is required for formation of the pseudocleavage furrow during the first cleavage of the embryo and mediates aster-induced furrowing during cytokinesis. The protein promotes cortical recruitment of ANI-1 and NMY-2 during pseudocleavage and cytokinesis and promotes accumulation of actin at furrowing regions. NOP-1 regulates establishment of embryonic cell polarity and localises to the nucleus, cytoplasm, cell cortex and cleavage furrow. The specific function of this C-terminal domain remains to be determined.
