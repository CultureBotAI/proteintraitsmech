identifier: Pfam:PF29385
label: F07F6.1-like protein C-terminal domain
definition: >-
  This entry represents the C-terminal domain of F07F6.1 and similar uncharacterised proteins from nematodes. The domain shows structural similarity to RNA-binding domains and may have nucleic acid binding properties.
