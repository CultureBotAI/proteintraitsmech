identifier: Pfam:PF20819
label: T4 RNA ligase 1, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of RNA ligase 1 (Rnl1) from Bacteriophage T4 ( ) and similar proteins from tailed bacteriophages. Rnl1 is involved in countering a host defense mechanism by repairing tRNA. The C-terminal domain shows an all α-helical fold and has a charge distribution and architecture for helix-nucleic acid groove interaction compatible with tRNA binding ( ). It confers specificity for the repair of tRNAs with breaks in the anticodon loop.
