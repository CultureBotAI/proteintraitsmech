identifier: Pfam:PF31128
label: Immunity protein 35-like domain
definition: >-
  This entry represents an N-terminal domain found in SUKH-4 family immunity proteins in Actinomycetota. This domain is located at the N terminus, upstream of the XOO_2897-deam domain ( ) and SUKH-4 immunity domain ( ). These proteins are part of a bacterial immunity system that protects against nucleic acid degrading toxins. The immunity proteins are typically found as part of toxin-immunity gene pairs, where they neutralise the toxin's activity and prevent self-destruction. This domain is related to . This domain is also found covering the whole length of the protein in many members.
