identifier: Pfam:PF26357
label: Domain of unknown function (DUF8092)
definition: >-
  This entry represents a domain of unknown function (DUF8092) found exclusively in members of the Mycobacterium tuberculosis complex. The domain is approximately 54 amino acids in length and is highly conserved across all known members. The function of this domain has not been experimentally determined. This entry includes Uncharacterized protein Mb0967, MT0968.2 and Rv0942.
