identifier: Pfam:PF28689
label: LasA, N-terminal domain
definition: >-
  This domain is found at the N-terminal of Protease LasA from Pseudomonas aeruginosa, which is involved in proteolysis and elastolysis (degradation of the host protein elastin). LasA has staphylolytic activity (degrades pentaglycine cross-links in cell wall peptidoglycan). Its degradation is likely to contribute to the pathogenicity of the organism. This domain, which is usually found associated with , is predicted to adopt a mostly α-helical structure.
