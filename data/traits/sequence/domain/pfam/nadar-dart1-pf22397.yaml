identifier: Pfam:PF22397
label: DarT1-associated NADAR antitoxin
definition: >-
  This entry, previously known as DUF6977, represents DarT1-associated NADAR antitoxin and related proteins. The DarT-NADAR system is a TA system catalysing the specific and reversible ADP-ribosylation of guanosine bases in which DarT1-associated NADARs reverse guanine ADP-ribosylation catalysed by DarT1. DarT1-associated NADAR antitoxin adopts an α/β globular structure characterised by an α-helical core that forms the active site flanked by two small β-sheet regions, comprising two and three strands. Its structural core is globally similar to the structure of E.coli protein YbiA, a member of the NADAR domain family ( ).
