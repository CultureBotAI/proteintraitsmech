identifier: Pfam:PF24656
label: CEP76 peptidase-like domain
definition: >-
  This entry represents a domain found in the middle of centrosomal protein of 76 kDa, a protein involved in regulation of centriole duplication to limit centriole duplication to once per cell cycle by preventing centriole reduplication. This domain is also found towards the C-terminal of C2D2A/B, and in dynein regulatory complex subunit 7 (DRC7). C2D2A is a component of the tectonic-like complex, a complex localised at the transition zone of primary cilia and acting as a barrier that prevents diffusion of transmembrane proteins between the cilia and plasma membranes. It is required for ciliogenesis and sonic hedgehog/SHH signalling. DRC7 is a component of the nexin-dynein regulatory complex (N-DRC) a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. In DRC7, this model covers the C-terminal part of the domain as it has an insertion not present in the other members of the entry. This domain is may adopt a fold related to peptidases.
