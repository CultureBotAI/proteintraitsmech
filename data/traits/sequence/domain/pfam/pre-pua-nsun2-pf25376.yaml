identifier: Pfam:PF25376
label: NSUN2 Pre-PUA domain
definition: >-
  This domain is found in RNA cytosine C(5)-methyltransferase NSUN2 from animals, multisite-specific tRNA:(cytosine-C(5))- methyltransferase (Trm4) from yeast and related eukaryotic proteins. This domain has detectable similarity to known pre-PUA domains and it is predicted to adopt similar structure. NSUN2 is an RNA cytosine C5-methyltransferase that methylates cytosine to 5-methylcytosine in various RNAs, such as tRNAs, mRNAs and some long non-coding RNAs. The yeast Trm4 is capable of methylating cytosine to m5C at several positions in different yeast tRNAs and pre-tRNAs containing intron.
