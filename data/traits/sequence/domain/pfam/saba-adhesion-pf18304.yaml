identifier: Pfam:PF18304
label: SabA N-terminal extracellular adhesion domain
definition: >-
  This is the N-terminal extracellular adhesion domain of Sialic acid binding adhesin (SabA) present in Helicobacter pylori. The N-terminal domain of SabA functions as a sugar-binding adhesion domain with conserved disulfide bonds. Notably, these amino acid residues are not only conserved among SabA orthologs but also between SabA and BabA.
