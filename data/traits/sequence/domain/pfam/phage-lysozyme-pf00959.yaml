identifier: Pfam:PF00959
label: Phage lysozyme
definition: >-
  Glycoside hydrolase family 24 comprises enzymes with only one known activity; lysozyme ( ). This entry includes Bacteriophage lambda lysozyme and Escherichia coli endolysin. Lysozyme helps to release mature phage particles from the cell wall by breaking down the peptidoglycan. The enzyme hydrolyses the 1,4-beta linkages between N-acetyl-D-glucosamine and N-acetylmuramic acid in peptidoglycan heteropolymers of prokaryotic cell walls. E. coli endolysin also functions in bacterial cell lysis and acts as a transglycosylase. The Bacteriophage T4 lysozyme structure contains two domains, the interface between which forms the active-site cleft. The N terminus of the two domains undergoes a 'hinge-bending' motion about an axis passing through the molecular waist. This mobility is thought to be important in allowing access of substrates to the enzyme active site. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
