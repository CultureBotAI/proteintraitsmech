identifier: Pfam:PF17866
label: AAA lid domain
definition: >-
  Many AAA+ proteins have a C-terminal α-helical bundle in addition to the AAA core. The functional roles of the helical bundle are varied and include the formation of a lid over the nucleotide binding site and mediation of subunit interactions in oligomeric protein complexes. This entry represents the α helical AAA+ lid domain that is found to the C terminus of AAA domains in the CfxQ/CbbX family.
