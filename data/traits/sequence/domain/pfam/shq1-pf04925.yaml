identifier: Pfam:PF04925
label: SHQ1 protein, Shq1 domain
definition: >-
  This entry represents a domain found C-terminal in the yeast SHQ1 protein ( ) and related proteins. SHQ1 is involved in the early biogenesis steps of box H/ACA snoRNP assembly. The human homologue is required for the quantitative accumulation of H/ACA ribonucleoproteins (RNPs), including telomerase, probably through the stabilization of DKC1, from the time of its synthesis until its association with NOP10, NHP2, and NAF1 at the nascent H/ACA RNA.
