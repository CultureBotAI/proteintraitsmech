identifier: Pfam:PF03731
label: Ku70/Ku80 N-terminal alpha/beta domain
definition: >-
  The Ku heterodimer (composed of Ku70 and Ku80 ) contributes to genomic integrity through its ability to bind DNA double-strand breaks and facilitate repair by the non-homologous end-joining pathway. This is the N-terminal α/β domain. This domain only makes a small contribution to the dimer interface. The domain comprises a six stranded β sheet of the Rossman fold.
