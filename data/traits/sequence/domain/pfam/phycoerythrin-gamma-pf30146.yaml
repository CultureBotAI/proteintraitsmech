identifier: Pfam:PF30146
label: R-phycoerythrin gamma chain
definition: >-
  This entry represents the gamma chain of R-phycoerythrin, found in red algae (Rhodophyta). R-phycoerythrin is a phycobiliprotein component of the phycobilisome complex, which functions as the major light- harvesting antenna complex in red algal photosynthesis. The gamma chain is critical for the incorporation of phycoerythrin into the phycobilisome complex and forms part of a heteromeric structure composed of one alpha, one beta, and two gamma chains. The protein is localised to the chloroplast thylakoid membrane and forms the periphery of the phycobilisome rod. The gamma chain contains four covalently linked bilin chromophores including phycourobilin and phycoerythrobilin which are essential for light absorption and energy transfer during photosynthesis. The protein is synthesised with a chloroplast transit peptide that directs its import into the plastid.
