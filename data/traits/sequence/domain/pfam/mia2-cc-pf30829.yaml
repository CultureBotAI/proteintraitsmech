identifier: Pfam:PF30829
label: MIA2/CTAGE5 coiled-coil domain
definition: >-
  This entry represents a coiled-coil domain found in melanoma inhibitory activity protein 2 (MIA2, also known as CTAGE5) and related CTAGE family members. The domain is located in the cytoplasmic region of MIA2. The coiled-coil domains of MIA2 mediate interaction with MIA3 (TANGO1), and the first coiled-coil domain specifically mediates interaction with PREB (SEC12). MIA2 is a single-pass membrane protein that localises to endoplasmic reticulum exit sites and is involved in the export of large cargo molecules including collagen and lipoproteins from the endoplasmic reticulum. The specific contribution of this coiled-coil domain to the overall function of MIA2 in cargo export remains to be fully characterised.
