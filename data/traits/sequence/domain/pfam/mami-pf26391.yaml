identifier: Pfam:PF26391
label: Magnetosome MamI protein family
definition: >-
  This protein family includes Magnetosome protein MamI, which is involved in the formation and nucleation of magnetosomes, specialised organelles in certain bacteria that allow them to orient along magnetic fields. Members of this family may play a role in the early stages of magnetosome nucleation and is potentially involved in binding magnetite, a key component of magnetosomes. While not essential for the formation of magnetosome membrane vesicles, MamI proteins are part of a group of genes that can induce magnetosome membrane biogenesis. In some organisms, MamI is essential for magnetosome formation, highlighting its importance in the biomineralisation process.
