identifier: Pfam:PF01653
label: NAD-dependent DNA ligase adenylation domain
definition: >-
  DNA ligase (polydeoxyribonucleotide synthase) is the enzyme that joins two DNA fragments by catalyzing the formation of an internucleotide ester bond between phosphate and deoxyribose. It is active during DNA replication, DNA repair and DNA recombination. There are two forms of DNA ligase: one requires ATP ( ), the other NAD ( ). This entry represents the N-terminal adenylation domain of NAD-dependent DNA ligases. These are proteins of about 75 to 85 Kd whose sequence is well conserved. They also show similarity to yicF, an Escherichia coli hypothetical protein of 63 Kd. Despite a complete lack of detectable sequence similarity, the fold of the central core of this adenyaltion domain shares homology with the equivalent region of ATP-dependent DNA ligases.
