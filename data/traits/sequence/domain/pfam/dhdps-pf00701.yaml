identifier: Pfam:PF00701
label: Dihydrodipicolinate synthetase family
definition: >-
  Dihydrodipicolinate synthase ( ) (DHDPS, DapA) catalyses, in higher plants, some fungi and bacteria (gene dapA), the first reaction specific to the biosynthesis of lysine and of diaminopimelate. DHDPS is responsible for the condensation of aspartate semialdehyde and pyruvate by a ping-pong mechanism in which pyruvate first binds to the enzyme by forming a Schiff-base with a lysine residue. Other proteins are structurally related to DHDPS and probably also act via a similar catalytic mechanism: Escherichia coli N-acetylneuraminate lyase (EC 4.1.3.3) (gene nanA), which catalyses the condensation of N-acetyl-D-mannosamine and pyruvate to form N-acetylneuraminate. Trans-o-hydroxybenzylidenepyruvate hydratase-aldolase. D-4-deoxy-5-oxoglucarate dehydratase. Rhizobium meliloti protein mosA, which is involved in the biosynthesis of the rhizopine 3-o-methyl-scyllo-inosamine. Thermoproteus tenax 2-dehydro-3-deoxy-D-gluconate/2-dehydro-3-deoxy-phosphogluconate aldolase (KdgA).
