identifier: Pfam:PF22254
label: Tfa2 E-tether
definition: >-
  The small TFIIE subunit Tfa2 (yeast Transcription initiation factor IIE subunit beta) contains two WH domains and two conserved α-helices called the E-tether (represented by this entry) that bind the E-linker. Consistent with the structure, the E-tether is essential for TFIIE function and subunit dimerisation. Members of this group are specific to fungi.
