identifier: Pfam:PF25016
label: Pikachurin, EGF-like domain
definition: >-
  This EFG-like domain is found in mouse Pikachurin, which is involved in both the retinal photoreceptor ribbon synapse formation and physiological functions of visual perception. The fold of this domain consists of a two stranded β-sheet followed by a loop and a short two-stranded sheet.
