identifier: Pfam:PF16974
label: High-affinity nitrate transporter accessory, Ig-like domain
definition: >-
  This group represents a high affinity nitrate transporter component from plants. It includes high-affinity nitrate transporter 3.1 (NRT3.1 or NAR2.1) from Arabidopsis, which acts as a dual component transporter with NTR2. The functional unit for high-affinity nitrate influx may be a tetramer consisting of two subunits each of NRT2.1 and NRT3.1. NRT3.1 may be involved in targeting NRT2 proteins to the plasma membrane. Both NRT2.1 and NRT3.1 are coordinately down-regulated by high external nitrate.
