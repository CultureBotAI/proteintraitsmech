identifier: Pfam:PF26575
label: HHO5-like, N-terminal domain
definition: >-
  This entry represents the N-terminal in a group of plant Myb family transcription factors from Arabidopsis thaliana, including HHO1-6, HRS1, and EFM. This domain is often found in association with , and predicted to adopt an all-α structure. Transcription Factor HHO5, which plays a role in regulating floral meristem homeostasis and organ number in the flower. HRS1 represses primary root development in response to phosphate deficiency, but only when nitrate is present. It is also required for the suppression of abscisic acid (ABA) signalling in the germinating embryo axis, thereby promoting timely seed germination. EFM acts as a flowering repressor by directly downregulating FT expression in a dosage-dependent manner within the leaf vasculature.
