identifier: Pfam:PF09757
label: Arb2-like domain
definition: >-
  This entry represents the C-terminal non-catalytic domain of Clr3 (Cryptic loci regulator 3, also known as histone deacetylase clr3) ( ) from S. pombe and its orthologue HDA1 from S. cerevisiae. Structure analysis reveals that this domain is related to Arb2 domain from S. pombe (not included in this entry), which has clear homology to α/β-hydrolases but it lacks the catalytic triad of these enzymes. Functional studies show that the Arb2-like domain of members in this entry is necessary for centromeric heterochromatin silencing suggesting a model where the Arb2 domain, through residues N562 and Y563, acts as an anchor that connects the HDAC activity of Clr3 to the SHREC complex. SHREC (Snf2/Hdac Repressive) complex in fission yeast drives transcriptional gene silencing in heterochromatin. Studies in HDA1 described that two Arb2-like domains form a compact homo-dimer via the arm elements, and assemble as an inverse 'V' shape and that the domain possesses histone binding ability.
