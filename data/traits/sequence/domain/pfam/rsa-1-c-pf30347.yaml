identifier: Pfam:PF30347
label: RSA-1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of RSA-1 (regulator of spindle assembly protein 1), a regulatory subunit of protein phosphatase 2A (PP2A). RSA-1 is found in nematodes such as Caenorhabditis elegans. The protein recruits the PP2A catalytic complex to centrosomes, regulating microtubule outgrowth and mitotic spindle assembly. RSA-1 interacts with the PP2A catalytic subunit LET-92, the scaffold subunit PAA-1, and centrosomal proteins RSA-2, SPD-5 and TPXL-1. RSA-1 localises to centrosomes.
