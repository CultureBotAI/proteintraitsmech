identifier: Pfam:PF28560
label: Probable transporter periplasmic core domain
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into a globular structure with a significant similarity to the periplasmic core domain of proteins members of the MacB ABC transporter superfamily. This domain contains the porter and sabre subdomains which are structurally similar to the corresponding domains in MacB.
