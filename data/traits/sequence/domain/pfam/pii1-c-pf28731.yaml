identifier: Pfam:PF28731
label: Protein involved in starch initiation 1 C-terminal domain
definition: >-
  This entry represents the C-terminal coiled coil domain of protein involved in starch initiation 1 (PII1), also known as myosin-resembling chloroplast protein (MRC). PII1 is required for the initiation of starch granule biosynthesis in leaf chloroplasts and determines starch granule number and size. The protein interacts with PTST2 and SS4, interactions that are essential for starch granule initiation. PII1 contains multiple coiled-coil regions and localises to distinct puncta within chloroplasts. While PII1 is involved in starch biosynthesis regulation, the specific function of this C-terminal domain remains to be determined.
