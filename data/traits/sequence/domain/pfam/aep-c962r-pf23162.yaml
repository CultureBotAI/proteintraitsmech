identifier: Pfam:PF23162
label: C962R protein N-terminal AEP domain
definition: >-
  This AEP domain is found N-terminal in the C962R protein from African swine fever virus and related proteins. C962R protein possesses both DNA polymerisation and DNA unwinding activities. This protein adopts a ring-shaped conformation and the N-terminal AEP domain is responsible for the DNA polymerisation activity. The C962R AEP domain utilises similar two-cation-assisted mechanism in catalysis as observed in distantly related bacterial and archaeal AEP domains. It adopts an α/β structure ( ).
