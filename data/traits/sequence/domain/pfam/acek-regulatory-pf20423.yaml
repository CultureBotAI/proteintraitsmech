identifier: Pfam:PF20423
label: Isocitrate dehydrogenase kinase/phosphatase (AceK), regulatory domain
definition: >-
  This is the N-terminal regulatory domain of bacterial isocitrate dehydrogenase kinase/phosphatase (AceK) proteins ( ). It has an α-helical fold, with two long, parallel α-helices that form a large hairpin structure followed by two short, parallel α-helices forming a small hairpin segment. This domain is linked to the C-terminal kinase domain by a short (27 residues) α-helix.
