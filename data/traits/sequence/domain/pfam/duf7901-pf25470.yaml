identifier: Pfam:PF25470
label: Domain of unknown function (DUF7901)
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to adopt a β-sandwich structure with significant topological similarity to known galactose-binding domains, in particular to lectin-like domain of the Cwp84, a surface layer associated protein of Clostridium difficile. It is likely that this domain is involved carbohydrate binding.
