identifier: Pfam:PF22017
label: LPP20 lipofamily protein, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of LPP20 lipofamily protein from Helicobacter pylori (HP1454) and similar sequences predominantly found in epsilonproteobacteria. HP1454 is a secreted protein composed of three distinct domains: the N-terminal ( ), the middle domain ( ) and this domain, which shows a β-sheet flanked by two α-helices.
