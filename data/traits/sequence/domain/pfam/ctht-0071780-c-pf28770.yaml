identifier: Pfam:PF28770
label: CTHT_0071780 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of uncharacterized protein CTHT_0071780 from Chaetomium thermophilum. This domain spans approximately 300 residues at the C-terminal end of the protein. The full-length protein localises to the nucleus and has been structurally characterised through cryo-electron microscopy studies. The protein was identified in the context of nuclear pore complex structure and assembly research in this thermophilic fungus. This domain is found primarily in fungi, particularly in the Sordariomycetes class. The specific function of this C-terminal domain remains to be determined.
