identifier: Pfam:PF13652
label: Putative quorum-sensing-regulated virulence factor
definition: >-
  This entry represents a family of short 14kDa proteins from Psuedomonas. The structure of a secreted protein has been solved and deposited as PDB:3npd. It comprises one structural domain with five β-strands and five α-helices. Various comparative structural prediction methods plus its genomic location point to the protein forming a functional dimer with its adjacent genomic partner, . Together these might be regulated by the other product from the PotABCD operon, namely the putrescine-binding periplasmic protein . which has been implicated in quorum-sensing. QSregVF is certainly up-regulated in quorum-sensing, and is predicted to be a virulence factor.
