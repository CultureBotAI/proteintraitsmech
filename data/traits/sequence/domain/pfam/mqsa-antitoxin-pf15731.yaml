identifier: Pfam:PF15731
label: Antitoxin component of bacterial toxin-antitoxin system, MqsA
definition: >-
  This is a family of prokaryotic proteins that are the antitoxin components of the toxin-antitoxin (TA) modules. Proteins in this entry include MqsA from Escherichia coli and HigA-2 from Vibrio cholerae serotype O1. MqsA acts as antidote to the mRNA interferase MqsR, while HigA-2 counteracts the effect of the HigB-2 toxin.
