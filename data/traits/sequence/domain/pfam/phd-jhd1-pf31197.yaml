identifier: Pfam:PF31197
label: JHD1, PHD-type zinc finger
definition: >-
  This entry represents the PHD-type zinc finger found at the N-terminal of JHD1 (JmjC domain- containing histone demethylation protein 1), predominantly found in Saccharomycetaceae. JHD1 is a histone demethylase that specifically demethylates lysine-36 of histone H3, playing a role in chromatin regulation and transcriptional elongation.
