identifier: Pfam:PF12176
label: Methanol-cobalamin methyltransferase B subunit
definition: >-
  This entry represents a family of methanol-cobalamin methyltransferase B subunit (MtaB) proteins found in archaea and some species for Firmicutes. Proteins in this family are approximately 460 amino acids in length. MtaB folds as a TIM barrel and contains a novel zinc-binding motif. Zinc(II) lies at the bottom of a funnel formed at the C-terminal β-barrel end and ligates to two cysteinyl sulphurs (Cys-220 and Cys-269) and one carboxylate oxygen (Glu-164). The function of this protein is to catalyse the cleavage of the C-O bond in methanol by an SN2 mechanism. It complexes with MtaA and MtaC to perform this function.
