identifier: Pfam:PF03973
label: Triabin
definition: >-
  This family contains saliva proteins from haematophagous insects that counteract vertebrate host haemostasis events such as coagulation, vasoconstriction and platelet aggregation. These include: Triabin, a serine-protease inhibitor with a calycin fold. It forms a non-covalent complex with thrombin at a molecular ratio of 1:1, and inhibits thrombin-induced platelet aggregation. Procalin is the major allergen of Triatoma protracta saliva. Triafestin 1-2 from Triatoma infestans, which suppresses activation of the host plasma kallikrein-kinin system, leading to inhibition of the intrinsic coagulation pathway. Dimiconin, which inhibits the intrinsic blood coagulation pathway by blocking the activation of host coagulation factor XII (F12) but not the enzymatic activity of activated F12. Triplatin, an inhibitor of platelet agregation and vasoconstriction through binding to distinct eicosanoids involved in inflammation that has a role in inhibiting host innate immunity. Pallidipin, likely to fuction by a mechanism similar to that of triplatin. Members of this family belong to MEROPS proteinase inhibitor family I59, clan IZ.
