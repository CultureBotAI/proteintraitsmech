identifier: Pfam:PF07669
label: Eco57I restriction-modification methylase
definition: >-
  This entry contains restriction modification methylases, including Type II methyltransferase M.TaqI from Thermus aquaticus. This protein is a gamma subtype methylase that recognises the double-stranded sequence 5'-TCGA-3', methylates A-4 on both strands and protects the DNA from cleavage by the TaqI endonuclease.
