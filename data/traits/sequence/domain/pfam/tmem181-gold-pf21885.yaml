identifier: Pfam:PF21885
label: TMEM181, GOLD domain
definition: >-
  This is the N-terminal domain of TMEM181, also known as a Golgi-dynamics (GOLD) domain. TMEM181 mediates action of cytolethal distending toxins (CDT), which are secreted by many pathogenic bacteria. It is homologous to GPR180, TMEM145, and WLS which, together with TMEM87A/B, GPR107 and GPR108, they have been grouped as GOLD domain seven-transmembrane helix (GOST) proteins as they share the same domain architecture.
