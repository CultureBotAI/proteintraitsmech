identifier: Pfam:PF01112
label: Asparaginase
definition: >-
  This protein family represents a group of Ntn-hydrolases from all cellular organisms that belong to the MEROPS peptidase family T2 (clan PB(T)). Members of this entry include glycosylasparaginases ( ), which are threonine peptidases, and L-asparaginases ( ). Glycosylasparaginases are characterised by a threonine nucleophile at the N terminus of the mature enzyme. They catalyse: N4-(beta-N-acetyl-D-glucosaminyl)-L-asparagine + H(2)O = N-acetyl-beta-glucosaminylamine + L-aspartate It cleaves the GlcNAc-Asn bond that links oligosaccharides to asparagine in N-linked glycoproteins. The enzyme is composed of two non-identical alpha/beta subunits joined by strong non-covalent forces, has one glycosylation site located in the alpha subunit and plays a major role in the degradation of glycoproteins. L-asparaginases catalyse the following reaction: L-asparagine + H 2 O = L-aspartate + NH 3
