identifier: Pfam:PF28841
label: Alpha-ionylideneethane synthase aba3
definition: >-
  This entry represents alpha-ionylideneethane synthases found predominantly in ascomycete fungi. These enzymes catalyse the first step of abscisic acid biosynthesis, converting farnesyl diphosphate to alpha- ionylideneethane via a three-step reaction mechanism involving beta- farnesene and allofarnesene intermediates. The proteins are part of gene clusters that mediate abscisic acid production, a phytohormone that impedes plant defence responses. Members include aba3 from Botrytis cinerea and abl3 from Leptosphaeria maculans. The enzymes belong to the sesquiterpene synthase group with lyase activity ( ).
