identifier: Pfam:PF27616
label: Domain of unknown function (DUF8351)
definition: >-
  This domain is found in uncharacterised proteins from Gram-negative bacteria. It is predicted to fold into α/β structure comprising a curved β-sheet and an α helix packed on it. It has a number of conserved negatively charged residues that are predicted to cluster on the protein domain surface.
