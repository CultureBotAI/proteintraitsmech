identifier: Pfam:PF03888
label: MucB/RseB N-terminal domain
definition: >-
  This entry represents the N-terminal domain of sigma-E factor regulatory protein RseB and sigma factor AlgU regulatory protein MucB. RseB negatively modulates the activity of sigma-E (RpoE) by stabilizing RseA under non-stress conditions. MucB is a negative regulator of the sigma factor AlgU. It plays a role in the differentiation of P.aeruginosa into the alginate-producing form.
