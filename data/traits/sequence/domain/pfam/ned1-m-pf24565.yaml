identifier: Pfam:PF24565
label: Nuclear elongation and deformation protein 1-like, middle domain
definition: >-
  This domain is centrally located in Nuclear elongation and deformation protein 1 from Schizosaccharomyces pombe (Ned1) and similar fungal proteins. Ned1 may have a role in the maintenance of the nuclear envelope structure and in minichromosome stability. This domain is also found in Phosphatidic acid phosphohydrolase 1 (PAH1) from Saccharomyces cerevisiae which is involved in plasmid maintenance, in respiration and in cell proliferation. PAH1 is a Mg2+-dependent phosphatidate (PA) phosphatase which catalyses the dephosphorylation of PA to yield diacylglycerol. This domain is predicted to adopt an α-β structure.
