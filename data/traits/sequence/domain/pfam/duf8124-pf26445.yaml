identifier: Pfam:PF26445
label: Domain of unknown function (DUF8124)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in Halobacteria. The domain is typically found in proteins ranging from approximately 88 to 133 amino acids in length. The reviewed protein D4GXW3 from Haloferax volcanii contains this domain. This domain is composed of a four stranded β sheet with α helices packed on one side.
