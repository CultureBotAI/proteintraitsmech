identifier: Pfam:PF02024
label: Leptin
definition: >-
  Leptin, a metabolic monitor of food intake and energy need, is expressed by the ob obesity gene. The protein may function as part of a signalling pathway from adipose tissue that acts to regulate the size of the body fat depot, the hormone effectively turning the brain's appetite message off when it senses that the body is satiated. Obese humans have high levels of the protein, suggesting a similarity to type II (adult onset) diabetes, in which sufferers over-produce insulin, but can't respond to it metabolically - they have become insulin resistant. Similarly, it is thought that obese individuals may be leptin resistant.
