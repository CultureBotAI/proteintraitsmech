identifier: Pfam:PF27888
label: Geminin coiled-coil domain-containing protein 1, C-terminal domain
definition: >-
  This entry represents the C-terminal β-sheet domain of human geminin coiled-coil domain-containing protein 1 (GEMC1, also known as GMNC), Multicilin (MCIDAS) and similar proteins from vertebrates. The specific function of this domain remains to be determined. GEMC1 is a regulator of DNA replication that promotes initiation of chromosomal DNA replication by mediating TOPBP1- and CDK2-dependent recruitment of CDC45L onto replication origins. The protein associates with chromatin during pre-replication complex formation and is highly phosphorylated by CDK2. MCIDAS is a transcription regulator specifically required for multiciliate cell differentiation that acts in a multiprotein complex containing E2F4 and E2F5 and binds and activates genes required for centriole biogenesis. It is required for the deuterosome-mediated acentriolar pathway and plays a role in mitotic cell cycle progression by promoting cell cycle exit.
