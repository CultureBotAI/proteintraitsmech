identifier: Pfam:PF20194
label: Family of unknown function (DUF6557)
definition: >-
  This entry represents a domain of unknown function in bacterial proteins. Proteins in this entry are typically between 140 and 200 amino acids in length. There is a quite conserved EMTFxxG motif. This domain can be found covering the whole of the proteins or at other positions.
