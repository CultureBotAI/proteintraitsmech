identifier: Pfam:PF17185
label: NlpE C-terminal OB domain
definition: >-
  This entry represents the C-terminal in NlpE protein. Lipoprotein NlpE is a multifunctional outer membrane lipoprotein implicated in copper homeostasis, potentially contributing to both copper efflux and the delivery of copper to copper-dependent enzymes. It is required for efficient adhesion of stationary-phase cells to hydrophobic surfaces, a key step in biofilm formation. NlpE also functions in envelope stress responses; its overproduction induces the periplasmic protease DegP through activation of the CpxA/CpxR two-component signaling system. This induction appears to depend on membrane anchoring of NlpE, and structural changes in or interactions involving its CXXC motif may trigger Cpx pathway activation.
