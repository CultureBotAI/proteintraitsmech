identifier: Pfam:PF22754
label: Plant bHLH transcription factor, ACT-like domain
definition: >-
  This entry represents an ACT-like domain found at the C-terminal of plant transcription factors, such as transcription factor GLABRA 3 from Arabidopsis and the bHLH transcription factor ( ) from maize, which is associated with bHLH domains. This domain association is unique to the kingdom Plantae. Phylogenetic analysis show that the association of ACT-like and bHLH domains occurred early in Plantae by recruitment of an ACT-like domain in a common ancestor with widely distributed ACT DOMAIN REPEAT (ACR) genes by an ancestral bHLH gene. The functional significance of this association relies on the homodimer formation of ACT-like domains that negatively affects DNA binding of the associated bHLH domains. For some bHLH transcription factors with the C-terminal ACT-like domain, such as Arabidopsis SPEECHLESS and MUTE, the ACT-like domain serves as heterodimerization selectivity interface.
