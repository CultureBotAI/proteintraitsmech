identifier: Pfam:PF12744
label: Autophagy protein Atg19, Atg8-binding
definition: >-
  Autophagy is generally known as a process involved in the degradation of bulk cytoplasmic components that are sequestered into double-membrane vesicles to form the autophagosome. The contents of the autophagosome are delivered to the degradative organelle, the lysosome/vacuole, for breakdown and eventual recycling of the resulting macromolecules. In contrast to autophagy, the cytoplasm to vacuole transport (Cvt) pathway is a highly selective process that involves the sequestration of at least two specific cargos that are resident vacuolar hydrolases: aminopeptidase I (Ape1) and alpha-mannosidase (Ams1). These proteins are sequestered within a double-membrane vesicle, termed a Cvt vesicle. The Cvt vesicle is fairly consistent in size, and is much smaller than the autophagosome, being 140-160 nm in diameter. The genes involved in autophagy in yeast are termed autophagy-related (Atg) genes. Autophagy and the Cvt pathway are topologically and mechanistically similar and share most of the Atg components. The precursor of Ape1 (prApe1) is sequestered within either Cvt vesicles or autophagosomes, depending on the nutrient conditions, and delivered to the vacuole. Atg19 is a peripheral membrane protein with differing binding sites for both Ape1 and Ams1. Atg19 plays a central role in cargo sorting and transport to the vacuole by linking Ams1 and prApe1 to Atg8 and Atg11. This entry represents the C-terminal region of Atg19 and homologue Atg34 (Yol083wp). The Atg8-binding region is thought to be in the very C-terminal residues.
