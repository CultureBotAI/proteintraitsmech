identifier: Pfam:PF18295
label: M17 aminopeptidase N-terminal domain 2
definition: >-
  This domain is found in the N-terminal region of NPEPL1 from mammals and Lap-1 from C. elegans. NPEPL1 and Lap-1 belong to the M17 aminopeptidase family, whose members are Zn-dependent exopeptidases that catalyse the removal of unsubstituted amino acid residues from the N terminus of peptides.
