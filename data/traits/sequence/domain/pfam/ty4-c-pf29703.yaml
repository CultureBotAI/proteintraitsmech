identifier: Pfam:PF29703
label: Transposon Ty4 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of transposon Ty4 proteins found in fungi. This domain contains a predicted coiled-coil region and is found in both the Gag polyprotein and Gag-Pol polyprotein produced by ribosomal frameshifting. The specific function of this domain remains to be determined. Ty4 retrotransposons belong to the copia elements and are mobile genetic entities that replicate via an RNA intermediate and reverse transcription. The capsid protein is the structural component of virus-like particles, forming the shell that encapsulates the retrotransposon dimeric RNA genome.
