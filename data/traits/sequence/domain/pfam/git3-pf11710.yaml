identifier: Pfam:PF11710
label: G protein-coupled glucose receptor regulating Gpa2
definition: >-
  This entry contains the conserved N-terminal uncharacterised region belonging to the G-protein coupled receptors Git3, GPR1, GPR2, and GPR3 that are involved in glucose sensing and signaling pathways. Git3, found in Schizosaccharomyces pombe, is one of six proteins required for glucose-triggered adenylate cyclase activation, and is a G protein-coupled receptor responsible for the activation of adenylate cyclase through Gpa2 - heterotrimeric G protein alpha subunit, part of the glucose-detection pathway. Git3 contains seven predicted transmembrane domains, a third cytoplasmic loop and a cytoplasmic tail. GPR1 is present in Saccharomyces cerevisiae (budding yeast) and Candida albicans. Git3 and GPR1 are part of the glucose/cAMP pathway and are considered functionally related. GPR1 interacts with glucose and sucrose as agonists, while mannose acts as an antagonist. It forms part of a GPCR system with Gpa2 and Rgs2 for glucose sensing. GPR2 and GPR3 from the Nematode-trapping fungus Arthrobotrys oligospora are G protein-coupled receptors that sense nematode ascaroside pheromones and signals via adenylate cyclase to positively regulate trap formation for nematode capture.
