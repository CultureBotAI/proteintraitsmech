identifier: Pfam:PF29351
label: Acidic skeletal organic matrix protein
definition: >-
  This entry represents acidic skeletal organic matrix proteins found in coral aragonitic skeletons. These proteins are secreted and form part of both the acid-insoluble and acid-soluble organic matrix components that are involved in coral calcification. The protein contains predicted disordered regions and a coiled-coil domain. Experimental protein sequencing has confirmed the presence of this protein in the skeletal matrix of Acropora millepora. The specific molecular function of this protein family in the calcification process remains to be determined.
