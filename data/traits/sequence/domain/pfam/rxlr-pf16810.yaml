identifier: Pfam:PF16810
label: RXLR phytopathogen effector protein, Avirulence activity
definition: >-
  This entry represents a domain covering the whole length in some RxLR effector proteins found in Peronosporaceae but can also be found covering the N-terminal region. RXLR proteins constitute a family of phytopathogen avirulence or effector proteins. They are defined by a secretion signal peptide followed by a conserved N-terminal domain with the sequence motif RXLR (Arg-Xaa-Leu-Arg) consensus sequence. The RXLR part is required for translocation inside plant cells, although it appears to be dispensable for the biochemical activity of the effectors when expressed directly inside host cells. The effector activity resides in the C-terminal part of the family, which activate effector-triggered immunity in plants that carry a corresponding resistance (R) protein. The C-terminal region exhibits a fold appears to be able to evolve to outwit the host as the latter tries to acquire new immunity.
