identifier: Pfam:PF07474
label: G2F domain
definition: >-
  Basement membranes are sheet-like extracellular matrices found at the basal surfaces of epithelia and condensed mesenchyma. By preventing cell mixing and providing a cell-adhesive substrate, they play crucial roles in tissue development and function. Basement membranes are composed of an evolutionarily ancient set of large glycoproteins, which includes members of the laminin family, collagen IV, perlecan and nidogen/entactin. Nidogen/entactin is an important basement membrane component, which promotes cell attachment, neutrophil chemotaxis, trophoblast outgrowth, and angiogenesis and interacts with many other basement membrane proteins, like collagen, perlecan, lamin, and has a potential role in the assembly and connection of networks. It consists of three globular regions, G1-G3. G1 and G2 are connected by a thread-like structure, whereas that between G2 and G3 is rod-like. The nidogen G2 region binds to collagen IV and perlecan. The nidogen G2 structure is composed of two domains, an N-terminal EGF-like domain and a much larger β-barrel domain of ~230 residues. The nidogen G2 β-barrel consists of an 11-stranded β-barrel of complex topology, the interior of which is traversed by the hydrophobic, predominantly α helical segment connecting strands C and D. The N-terminal half of the barrel comprises two β-meanders (strands A-C and D-F) linked by the buried α-helical segment. The polypeptide chain then crosses the bottom of the barrel and forms a five-stranded Greek key motif in the C-terminal half of the domain. Helix alpha3 caps the top of the barrel and forms the interface to the EGF-like domain. The nidogen G2 β-barrel domain has unexpected structural similarity to green fluorescent proteins of Cnidaria, suggesting that they derive from a common ancestor. A large sur…
