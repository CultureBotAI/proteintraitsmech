identifier: Pfam:PF23615
label: MIT1 Chromo domain
definition: >-
  This domain is found in the Chromatin remodeling factor mit1 (MIT1) from fission yeast and related proteins from fungi. MIT1 is required for proper positioning of the nucleosomes at heterochromatic loci and for transcriptional gene silencing function of the multienzyme effector complex SHREC. The domain represented by this entry is predicted to fold into a globular structure with significant similarity to Chromo domain ( ).
