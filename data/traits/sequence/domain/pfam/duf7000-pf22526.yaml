identifier: Pfam:PF22526
label: Domain of unknown function (DUF7000)
definition: >-
  This domain is found in uncharacterised archaeal proteins. It is predicted to adopt an α/β structure consisting of a cradle-like β-sheet with α-helices pocked on the convex side of it. It contains a highly conserved GYMDFTYF sequence motif that may be of functional importance.
