identifier: Pfam:PF23057
label: ZCCHC3, first RNA-binding domain
definition: >-
  This entry represents the first RNA-binding domain (RBD) found in the vertebrate Zinc finger CCHC domain-containing protein 3 (ZCCHC3). This domain is followed by the second RBD ( ). Zinc finger CCHC domain-containing protein 3 from humans (ZCCHC3) is a zinc-finger protein that acts as a co-sensor of cGAS in innate immune response to cytosolic dsDNA and DNA virus. It has been shown to bind DNA and RNA in the cytoplasm and acts by promoting recognition of viral nucleic acids by virus sensors, such as DDX58/RIG-I, IFIH1/MDA5 and CGAS. Members of this family are found in eukaryotes.
