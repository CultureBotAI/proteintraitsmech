label: Family of unknown function (DUF7173)
definition: >-
  This family contains a set of uncharacterised proteins found predominantly in viruses, particularly bacteriophages. The proteins are typically 130-150 amino acids in length. AlphaFold models of this family show some weak partial structural similarity to the Recombination-associated protein RdgC.
