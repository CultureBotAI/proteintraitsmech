identifier: Pfam:PF29616
label: Type VI secretion system Tli immunity protein
definition: >-
  This entry represents the Cytoplasmic protein STY0301 from Salmonella typhi ( ) and similar sequences mainly found in proteobacteria. Members of this highly divergent protein family average about 135 amino acids in length. Near-invariant residues or motifs include CP, GxP, LxP, CxY, and two additional Cys residues. These cysteines are predicted to form disulfide bonds. The function is unknown.
