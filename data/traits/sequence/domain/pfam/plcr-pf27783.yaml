identifier: Pfam:PF27783
label: Phospholipase C accessory protein PlcR
definition: >-
  The two phosphocholine-preferring phospholipase C enzymes ( ) in Pseudomonas aeruginosa, include the hemolytic protein PlcH, which can hydrolyse sphingomyelin as well as phosphatidylcholine. This entry represents PlcR, an accessory protein for PlcH with which it forms a heterodimer. PlcR is required for the secretion of PlcH and affects both its enzymatic and hemolytic activities. The P. aeruginosa protein, is encoded immediately downstream of PlcH, but the equivalent proteins from various Burkholderia species are not.
