identifier: Pfam:PF00913
label: Trypanosome variant surface glycoprotein (A-type)
definition: >-
  This entry represents the N-terminal of the variant surface glycoproteins from Trypanosome. Proteins containing this domain include a variety of surface proteins such as variant surface glycoprotein and protein PAG1. Variant surface glycoprotein (VSG) forms a dense coat on the surface of the trypanosome parasite Trypanosoma brucei. The parasite evades the host immune response through antigenic variation, sequentially expressing antigenically distinct VSGs from an estimated repertoire of 1000 VSG genes. This continuous switching of the surface coat enables the parasite to escape immune recognition and establish persistent infection.
