identifier: Pfam:PF05377
label: Flagella accessory protein C (FlaC)
definition: >-
  Members of this family are encoded by archaeal flagellar operons, and are therefore predicted to be involved in archaeal flagellar assembly, but their specific role is unknown. In several archaea, the flagellin genes are followed immediately by the genes encoding flagellar accessory proteins flaCDEFGHIJ. They may have a role in translocation, secretion, or assembly of the flagellum. FlaC has been shown to be membrane-associated. Archaeal flagella, found in all the main groupings of archaea, differ from eubacterial flagella in both structure and composition, although some archaeal flagellar proteins show similarity to the eubacterial proteins involved in the pilus biogenesis/type II and IV secretory pathways.
