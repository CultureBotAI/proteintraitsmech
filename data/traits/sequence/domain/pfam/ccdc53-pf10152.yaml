identifier: Pfam:PF10152
label: Subunit CCDC53 of WASH complex
definition: >-
  The WASH (WASP and Scar homologue) complex is present at the surface of endosomes and recruits and activates the Arp2/3 complex to induce mediated actin nucleation. The WASH complex plays a key role in the fission of tubules that serve as transport intermediates during endosome sorting. The WASH complex consists of several subunits: F-actin-capping protein subunit alpha (CAPZA1, CAPZA2 or CAPZA3), F-actin-capping protein subunit beta (CAPZB), WASH (WASH1, WASH2P, WASH3P, WASH4P, WASH5P or WASH6P), FAM21 (FAM21A, FAM21B or FAM21C), KIAA1033, KIAA0196 (strumpellin) and CCDC53. This entry represents the WASH complex subunit 3, also known as CCDC53.
