identifier: Pfam:PF26695
label: Domain of unknown function (DUF8234)
definition: >-
  This domain is found in uncharacterised proteins. It is predicted to fold into an α-helical structure which is usually found inserted into endonuclease domain (CL0530). It contains a highly conserved Gx(2)Rx(2)SxPDRxTN sequence motif which is predicted to face the endonuclease domain active site and is likely involved in substrate recognition/binding.
