identifier: Pfam:PF29524
label: YLL032C-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain in YLL032C-like proteins found in fungi, particularly in Saccharomycetaceae and related yeasts. These proteins contain a KH domain and are involved in RNA binding. The representative protein YLL032C is localised to the cytoplasm and exhibits mRNA binding activity. These proteins undergo phosphorylation and are involved in RNA metabolism. The specific function of these proteins remains to be determined.
