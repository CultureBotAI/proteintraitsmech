identifier: Pfam:PF01226
label: Formate/nitrite transporter
definition: >-
  Proteins in this entry belong to the Formate-Nitrite Transporter (FNT) family (TC 2.A.44), including the nitrite transport protein NirC and formate channel FocA. The prokaryotic proteins of the FNT family function in the transport of the structurally related compounds, formate and nitrite. Structures from NirC and FocA showed that they have a pentameric architecture with structural similarity to aquaporins and glyceroporins, comprising a right-handed bundle of 6 transmembrane (TM) α-helices. The homologous yeast protein may function as a short chain aliphatic carboxylate H+ symporter, transporting formate, acetate and propionate, and functioning primarily as an acetate uptake permease.
