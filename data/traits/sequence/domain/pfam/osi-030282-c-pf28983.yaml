identifier: Pfam:PF28983
label: OsI_030282 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of uncharacterized protein OsI_030282 and related proteins found primarily in Oryza sativa (rice) and other grass species. The full-length proteins are approximately 134 amino acids and contain an N-terminal signal peptide. These proteins have been detected in anther tissue through proteome analysis and are classified under Pollen_allergen/Os, showing similarity to Group V grass pollen allergen. While the full-length protein OsI_030282 is found in reproductive tissues, the specific function of this C-terminal domain remains to be determined. It contains an helical bundle.
