identifier: Pfam:PF29260
label: Uncharacterised archaeal protein MJ0607
definition: >-
  This entry represents an uncharacterised protein found in methanogenic archaea of the Methanococcales order. The protein is approximately 79 amino acids in length and is conserved within members of Methanococcaceae, Methanocaldococcaceae and Methanopyraceae families. The function of this protein remains to be determined. AlphaFold 3 predicts this protein to form a homodimeric arrangement.
