identifier: Pfam:PF16547
label: Proteasome-substrate-size regulator, N-terminal
definition: >-
  The ordered regions of the yeast BLM10 or PA200 (human homologue), full-length protein encode 32 HEAT repeat (HR)-like modules. This entry represents the N-terminal ordered region. Blm10 is a proteasome activator that binds the core proteasome and stimulates proteasome-mediated protein degradation by inducing gate opening. The structure of Blm10 has been revealed.
