identifier: Pfam:PF21556
label: Excretory-secretory protein 2
definition: >-
  This entry includes a group of proteins from nematodes, including Excretory-secretory protein 2 from Ancylostoma ceylanicum (AceES-2), a highly immunoreactive molecule secreted by adult worms at the site of intestinal attachment. AceES-2 folds into a five-stranded β-barrel flanked by short N- and C-terminal α-helices that lie parallel to each other on one side of the β-barrel, adopting a netrin-like (NTR) domain, similar to the C-terminal domain of netrins.
