identifier: Pfam:PF23734
label: Domain of unknown function (DUF7163)
definition: >-
  This domain is found N-terminal in a group of uncharacterised proteins from Trypanosomes. It has a very weak similarity to the vWA-like domain of the SSL1 subunit of general transcription and DNA repair factor IIH and it is predicted to adopt a structure with similarity to known vWA-like domains.
