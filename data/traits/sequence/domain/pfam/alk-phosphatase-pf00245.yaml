identifier: Pfam:PF00245
label: Alkaline phosphatase
definition: >-
  This entry represents alkaline phosphatases ( ) (ALP), which act as non-specific phosphomonoesterases to hydrolyse phosphate esters, optimally at high pH. The reaction mechanism involves the attack of a serine alkoxide on a phosphorus of the substrate to form a transient covalent enzyme-phosphate complex, followed by the hydrolysis of the serine phosphate. Alkaline phosphatases are found in all kingdoms of life, with the exception of some plants. Alkaline phosphatases are metalloenzymes that exist as a dimer, each monomer binding metal ions. The metal ions they carry can differ, although zinc and magnesium are the most common. For example, Escherichia coli alkaline phosphatase (encoded by phoA) requires the presence of two zinc ions bound at the M1 and M2 metal sites, and one magnesium ion bound at the M3 site. However, alkaline phosphatases from Thermotoga maritima and Bacillus subtilis require cobalt for maximal activity.
