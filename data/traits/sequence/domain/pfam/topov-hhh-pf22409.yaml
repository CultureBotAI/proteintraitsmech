identifier: Pfam:PF22409
label: Topoisomerase V, HHH domain
definition: >-
  This entry represents a helix-hairpin-helix (HHH) domain of topoisomerase V (Topo-V, ), the only member of a novel topoisomerase subtype. Topo-V is unique as it is a bifunctional enzyme carrying both topoisomerase and DNA repair lyase activities within the same protein. This protein contains a topoisomerase domain at the N-terminal, followed by twelve tandem helix-hairpin-helix (HhH)2 domains.
