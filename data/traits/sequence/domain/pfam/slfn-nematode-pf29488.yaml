identifier: Pfam:PF29488
label: Schlafen-like domain, nematodes
definition: >-
  This entry represents a Schlafen-like domain mainly found in nematodes, particularly Caenorhabditis elegans. The domain is present in components of the PUCH complex (precursor of 21U RNA 5'-end cleavage holoenzyme), which acts as an endoribonuclease processing the 5'-end of precursor Piwi-interacting RNAs. The PUCH complex consists of tofu-1, tofu-2 and either slfl-3 or slfl-4. In mammalian Schlafen proteins, two SLFN-folds form the nuclease domain, whilst in nematode proteins only one SLFN-like fold is identified, suggesting these proteins may interact via their SLFN-like folds to form a functional nuclease.
