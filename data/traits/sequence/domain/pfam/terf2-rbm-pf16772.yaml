identifier: Pfam:PF16772
label: Telomeric repeat-binding factor 2 Rap1-binding motif
definition: >-
  This domain, found in mammalian telomeric repeat-binding factor 2 (TERF2, also known as TRF2) and fission yeast Taz1, binds to the C terminus of repressor activator protein 1 (RAP1) (telomeric repeat-binding factor 2-interacting protein 1). Through this interaction, RAP1 is targeted to chromosome ends for telomere protection.
