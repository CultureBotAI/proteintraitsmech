identifier: Pfam:PF13485
label: Peptidase MA superfamily
definition: >-
  This entry represents a domain found in a group of putative bacterial peptidases belonging to the MA clan. Clan MA is one of two zinc-dependent metallopeptidases that contain the HEXXH motif. The two histidines are zinc ligands. The structures of this clan show the active site is between its two sub-domains.
