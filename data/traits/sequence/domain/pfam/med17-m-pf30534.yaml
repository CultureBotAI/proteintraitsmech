identifier: Pfam:PF30534
label: Mediator complex subunit 17 middle domain
definition: >-
  This entry represents a middle domain found in Mediator complex subunit 17 (MED17) proteins from metazoans. This domain associated to . MED17 is a component of the Mediator complex, a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. The Mediator complex functions as a bridge to convey information from gene-specific regulatory proteins to the basal RNA polymerase II transcription machinery. In Drosophila, MED17 is required for adult cell and segment identity specification. Mutations in MED17 are associated with microcephaly, postnatal progressive, with seizures and brain atrophy (MCPHSBA) in humans.
