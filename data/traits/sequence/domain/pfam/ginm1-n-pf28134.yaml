identifier: Pfam:PF28134
label: Glycoprotein integral membrane protein 1 N-terminal domain
definition: >-
  This entry represents the N-terminal extracellular domain of ghe uncharacterised glycoprotein integral membrane protein 1 (GINM1) and similar sequences mainly from vertebrates. GINM1 protein interacts with FATE1. This domain contains multiple N-linked glycosylation sites. GINM1 contains a signal peptide (residues 1-23) that is cleaved to produce the mature extracellular domain. The domain is heavily glycosylated with N-linked glycans at conserved asparagine residues. This entry also includes uncharacterised sequences from fungi.
