identifier: Pfam:PF17142
label: Outer membrane protein SusF, N-terminal domain
definition: >-
  This entry represents a domain found N-terminal in outer membrane protein SusF from Bacteroides thetaiotaomicron and similar sequences from bacteroidetes. This domain forms a β-barrel that is similar in overall-fold and topology to several immunoglobulin superfamily domains found in cell adhesion proteins. SusF is a multidomain protein and contains three starch specific carbohydrate binding modules (CBMs). Each of this CBMs differ in the way it binds starch. Each binding site has a unique starch preference that probably enable these proteins to interact with different regions of starch or its breakdown products. This CBMs are represented by and which are common to SusE as well. The SusF N-terminal is represented by .
