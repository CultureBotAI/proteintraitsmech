identifier: Pfam:PF20833
label: RNase E/G, Thioredoxin-like domain
definition: >-
  Both RNase E and its homologue RNase G are endoribonucleases that play central roles in RNA processing. RNase E shows two globular domains. This entry represents the smaller domain, which shows a thioredoxin-like fold.
