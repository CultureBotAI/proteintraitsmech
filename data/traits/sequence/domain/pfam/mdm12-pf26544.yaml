identifier: Pfam:PF26544
label: Mitochondrial distribution and morphology protein 12
definition: >-
  Mitochondrial distribution and morphology protein 12 (Mdm12) is a component of the ERMES/MDM complex, which includes MMM1, MDM10, MDM12, and MDM34, and functions as a molecular tether connecting the endoplasmic reticulum and mitochondria. Mdm12 is required for the interaction between the ER-resident membrane protein Mmm1 and the outer mitochondrial membrane β-barrel protein Mdm10. The Mdm12-Mmm1 subcomplex is involved in the biogenesis of all mitochondrial outer membrane β-barrel proteins, acting at a late step following the SAM (sorting and assembly machinery) complex. The Mdm10-Mdm12-Mmm1 subcomplex participates in the Tom40-specific pathway after the action of the Mdm12-Mmm1 complex. Mdm12 is essential for maintaining mitochondrial structure and mtDNA nucleoids. Its structure resembles the TULIP (Tubular lipid-binding protein) domain fold, characteristic of the Aha1/BPI domain-like superfamily of lipid-binding proteins.
