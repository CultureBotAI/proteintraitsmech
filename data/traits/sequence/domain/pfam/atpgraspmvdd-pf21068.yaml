identifier: Pfam:PF21068
label: MvdD pre-ATP grasp domain
definition: >-
  The pair of ATP-grasp proteins MvdD and MvdC (microviridin D and C), as well as an acetyltransferase, produce microviridin K, an example of a RiPP (ribosomally synthesised and posttranslationally modified peptide). Microviridins are peptidase inhibitors. This domain represents the pre-ATP grasp domain.
