identifier: Pfam:PF27322
label: Cap8 HORMA domain
definition: >-
  This entry represents CD-NTase-associated protein 8 (Cap8) proteins found in bacteria. Cap8 is a bacterial HORMA domain protein that functions as a component of the CBASS (cyclic oligonucleotide-based antiphage signaling system). CBASS provides immunity against bacteriophage by synthesising cyclic nucleotides that serve as second messenger signals. Cap8 interacts with Cap7 and CdnC to form complexes involved in antiviral defence. Members are found primarily in Pseudomonadota, particularly in Alphaproteobacteria and Betaproteobacteria.
