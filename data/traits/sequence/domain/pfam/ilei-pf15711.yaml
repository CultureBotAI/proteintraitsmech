identifier: Pfam:PF15711
label: Interleukin-like EMT inducer
definition: >-
  This entry represents the ILEI/PANDER domain found in FAM3 family members and related proteins. Both PANDER and ILEI share a similar β-β-α fold, strikingly different from the classical cytokines. FAM3C, also known as interleukin-like EMT inducer ILEI, is a secreted signaling protein involved in epithelial-mesenchymal transition and tumor progression. FAM3B, also known as PANDER (PANcreatic DERived factor), is a cytokine-like protein that induces apoptosis of insulin-secreting beta-cells and functions as a hormone by regulating glucose levels.
