identifier: Pfam:PF22557
label: Dual OB-containing domain
definition: >-
  This entry represents a region found in a group of prokaryotic proteins that contains two domain copies of the OB fold. There is nearly absolutely conserved cysteine, serine/threonine, arginine, and aspartate residues which are predicted to line a deep cleft formed at the interface of the two OB domains. The predicted spatial arrangement of the tandem OB domains closely parallels OB-dyads from single-stranded nucleic acid-end binding proteins, such as the telomere-binding domain alpha-subunit, with the nucleic acid being lodged in a cleft formed by the two OB domains. Drawing an analogy to the SRAP domain, it has been suggested that the DuOB domain could potentially form cross links to DNA at the abasic sites via its conserved cysteine. It is found on the genome adjacent to and , which could potentially also catalyse thiotransfer reactions required for forming or resolving the cysteine-DNA crosslinks, paralleling recent findings where HD phosphatases mediate the transfer of a phosphorylated substrate to a hydroxyl-group-containing residue.
