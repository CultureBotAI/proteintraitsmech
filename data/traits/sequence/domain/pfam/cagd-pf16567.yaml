identifier: Pfam:PF16567
label: Pathogenicity island component CagD
definition: >-
  CagD is a tightly conserved family of proteins found in the pathogenic strains of Helicobacter species. It is one of some 30 proteins, produced from the genomic insert termed the pathogenicity island, required for the type IV secretion system - T4SS - that delivers CagA oncoprotein toxin into the host cell. CagD is a covalent dimer in which each monomer folds as a single domain composed of five β-strands and three α-helices. CagD partially associates with the inner membrane, where it may be exposed to the periplasmic space; this may indicate that CagD is released into the supernatant during host cell infection in order then to bind to the host cell surface, or to be incorporated into the pilus structure.
