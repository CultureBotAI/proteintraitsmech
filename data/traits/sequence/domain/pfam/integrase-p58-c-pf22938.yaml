identifier: Pfam:PF22938
label: Integrase p58, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of a group of uncharacterised animal proteins that are similar to Integrase p58, the last chain cleaved from the Transposon Ty3-G Gag-Pol polyprotein from Saccharomyces cerevisiae. This domain, which is associated to , is also named SH3 domain.
