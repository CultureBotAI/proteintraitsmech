identifier: Pfam:PF13175
label: AAA ATPase domain
definition: >-
  This domain contains a P-loop motif that is characteristic of the AAA superfamily. Proteins containing this domain include the homologues of RecF, which may be involved in DNA metabolism, structural maintenance of chromosomes proteins (SMCs), including nuclease SbcCD subunit C and OLD nucleases. This domain is also found at the N-terminal of endonuclease GajA, a component of antiviral defence system Gabija type I taht confers resistance to phages phi105, phi29, rho14, SpBeta and SBSphiC. It is an endonuclease that nicks dsDNA within the sequence 5'-TNNNCGGGNNA-3' in the absence of nucleotides (NTP, dNTP and NDPs). This domain no detected ATPase activity in GajA.
