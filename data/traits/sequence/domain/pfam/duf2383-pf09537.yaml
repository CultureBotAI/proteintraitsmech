identifier: Pfam:PF09537
label: Domain of unknown function (DUF2383)
definition: >-
  This entry represents a domain found in uncharacterised proteins predominantly found in bacteria that includes DUF2383 domain-containing protein from Pseudomonas aeruginosa ( ). This protein shows a ferritin-like topology with a four-helix-bundle fold that lacks metal-ion-binding site typical of the ferritin family but has a potential metal-binding site. Its function is still unknown.
