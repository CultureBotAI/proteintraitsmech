identifier: Pfam:PF25735
label: Mycobacterium phage L5 gene 82 protein
definition: >-
  This entry represents a family of proteins related to Gene 82 protein (Gp82) from Mycobacterium phage L5. The function of this protein is currently unknown. It is found in mycobacteriophages, which are viruses that infect Mycobacterium species. Structure prediction suggests this protein may form a homodimer.
