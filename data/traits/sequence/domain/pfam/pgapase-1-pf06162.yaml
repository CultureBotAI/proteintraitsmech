identifier: Pfam:PF06162
label: Putative pyroglutamyl peptidase PgaPase_1
definition: >-
  This is a family of functionally diverse Caenorhabditis proteins. The family is homologous to the cysteine-peptidases, but lack of a strictly conserved Glu-Cys-His catalytic triad or pGlu binding site implies that it has other functions that could have resulted in a change in reaction-specificity or even of catalytic activity.
