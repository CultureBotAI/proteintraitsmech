identifier: Pfam:PF30116
label: High temperature lethal protein 1
definition: >-
  This entry represents the HTL1 family of proteins found in fungi. HTL1 is required for cell cycle progression through G2/M transition at elevated temperatures. The protein is a component of the RSC chromatin remodeling complex and interacts directly with RSC8. HTL1 forms part of a fungal-specific module within the RSC complex together with LDB7, NPL6, RSC3 and RSC30. This module plays roles in cellular functions including maintenance of cell wall integrity. The protein localises to the nucleus.
