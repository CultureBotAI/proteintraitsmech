identifier: Pfam:PF13337
label: Lon-like protease BrxL-like, ATPase domain
definition: >-
  This family includes Lon-like protease BrxL from Bacillus cereus and similar proteins. BrxL is part of a type 1 BREX system. BREX systems (bacteriophage exclusion) provide immunity against bacteriophage, a system that allows phage adsorption but prevents phage DNA replication, without degradation of the phage DNA. Methylation of bacterial DNA by PglX probably guides self/non-self discrimination. When the brxA-brxB-brxC-pglX and pglZ-brxL operons are transformed into a susceptible B.subtilis strain (BEST7003) they confer resistance to bacteriophages SPbeta, SP16, Zeta, phi3T and SP02 and partial protection to phages SP01 and SP82G (these include lytic and temperate phage). This entry also includes few uncharacterised viral proteins.
