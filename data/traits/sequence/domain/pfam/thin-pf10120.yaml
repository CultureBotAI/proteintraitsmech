identifier: Pfam:PF10120
label: Thiamine-phosphate synthase ThiN
definition: >-
  Thiamine-phosphate synthase ThiN condenses 4-methyl-5-(beta-hydroxyethyl)thiazole monophosphate (THZ-P) and 4-amino-5-hydroxymethyl pyrimidine pyrophosphate (HMP-PP) to form thiamine monophosphate (TMP). This enzyme is sometimes part of a bifunctional thiamine biosynthesis protein which also includes ThiD (a hydroxymethylpyrimidine/phosphomethylpyrimidine kinase). This domain is also present in the transcriptional repressor ThiR from Haloferax volcanii ( ), which is catalytically inactive as it lacks the conserved Met residue found in the extended α-helix near the active site His in ThiN. Moreover, it was shown that thiamine biosynthesis in archaea is regulated by ThiR and not by a riboswitch. This domain can also be found in Bifunctional thiamine biosynthesis protein ThiDN which catalyses the phosphorylation of hydroxymethylpyrimidine phosphate (HMP-P) to HMP-PP, and of HMP to HMP-P.
