identifier: Pfam:PF09312
label: SurA N-terminal domain
definition: >-
  The correct folding of outer membrane proteins (OMPs) in Gram-negative bacteria is facilitated by the survival protein SurA. This entry represents the helical domain found at the N-terminal of the chaperone SurA that, together with the C-terminal, forms a core domain which contains OMP binding sites. OMP binding induces conformational changes of SurA domains that protect OMPs from misfolding and aggregation. The C-terminal of the SurA protein folds back and forms part of this domain also but is not included in the current alignment.
