identifier: Pfam:PF30057
label: Gigasin-4 helical domain
definition: >-
  This entry represents Gigasin-4, a protein component of the organic matrix of calcified shell layers in the Pacific oyster Magallana gigas. This protein was identified through proteomic analysis of the calcifying shell matrix. The function of Gigasin-4 remains to be determined.
