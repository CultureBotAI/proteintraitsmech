identifier: Pfam:PF31146
label: Autophagy-related protein 38, MIT domain
definition: >-
  This entry represents the MIT domain found at the N-terminal of autophagy-related protein 38 (ATG38), from fungi. ATG38 is required for cytoplasm to vacuole transport and autophagy as part of the autophagy-specific VPS34 PI3-kinase complex I. This complex is essential to recruit the ATG8-phosphatidylinositol conjugate and the ATG12-ATG5 conjugate to the pre-autophagosomal structure. ATG38 forms a homodimer and is required for the integrity of the active PI3-kinase complex I by maintaining an association between VPS15-VPS34 and ATG14-VPS30 subcomplexes. This domain bridges the coiled-coil regions of ATG14 and VPS30 in the base of complex I.
