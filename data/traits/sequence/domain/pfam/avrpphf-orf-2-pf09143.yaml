identifier: Pfam:PF09143
label: AvrPphF-ORF-2
definition: >-
  Members of this family of plant pathogenic proteins adopt an elongated structure somewhat reminiscent of a mushroom that can be divided into 'stalk' and 'head' subdomains. The stalk subdomain is composed of the N-terminal helix (alpha1) and β strands beta3-beta4. An antiparallel β sheet (beta5, beta7-beta8) forms the base of the head subdomain that interacts with the stalk. A pair of twisted antiparallel β sheets (beta1 and beta6; beta2 and beta9/9') supported by alpha2 form the dome of the head. The head subdomain possesses weak structural similarity with the catalytic portion of a number of ADP-ribosylt ransferase toxins. Many Gram-negative pathogenic bacteria directly translocate effector proteins into eukaryotic host cells via a type III secretion system. Type III effector proteins are determinants of virulence on susceptible plant hosts; they are also the proteins that trigger specific disease resistance in resistant plant hosts. Evolution of type III effectors is dominated by competing forces: the likely requirement for conservation of virulence function, the avoidance of host defenses, and possible adaptation to new hosts.
