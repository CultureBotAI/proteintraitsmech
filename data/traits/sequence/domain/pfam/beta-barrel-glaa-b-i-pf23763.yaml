identifier: Pfam:PF23763
label: GLAA-B beta-barrel domain I
definition: >-
  This entry represents the first β-barrel domain found towards the N terminus of Alpha-1,3-galactosidase A-B (GLAA-B) from bacteria. These proteins share a domain architecture consisting of a core β-helix surrounded by two small β-barrel domains (domains I and II), which are involved in protein dimerisation. GLAA-B are α-galactosidases grouped in the GH110 subfamily by its narrow subtract specificity. These proteins remove branched alpha-1,3-linked galactose residues present in blood group B antigens.
