identifier: Pfam:PF03927
label: NapD protein
definition: >-
  Periplasmic nitrate reductase (NapABC enzyme) is responsible for nitrate dissimilation. This entry represents NapD, the twin-arginine signal-peptide-binding chaperone for NapA, functioning as an assembly protein for NapABC which is essential for its activity. It may have a role in the insertion of the NapA molybdenum cofactor. The periplasmic NapABC enzyme likely functions during growth in nitrate-limited environments.
