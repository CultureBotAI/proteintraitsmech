identifier: Pfam:PF16730
label: DnaG-primase C-terminal, helicase-binding domain
definition: >-
  This entry represents the C-terminal domain of the eubacterial primase DnaG, which is a single-stranded DNA (ssDNA)-dependent RNA polymerase responsible for the synthesis of oligonucleotide primers needed for DNA replication. This domain interacts with helicase at the replication fork.
