identifier: Pfam:PF23544
label: AtuA ferredoxin-like domain
definition: >-
  This domain, with a ferredoxin-like fold, is often found at the C-terminal of AtuA-like proteins, although it is sometimes found as a separate protein in the same operon as AtuA. The precise function of this domain is now known.
