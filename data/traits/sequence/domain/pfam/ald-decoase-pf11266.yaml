identifier: Pfam:PF11266
label: Long-chain fatty aldehyde decarbonylase
definition: >-
  This cyanobacterial family of fatty aldehyde decarbonylases acts on mainly C16 and C18 substrates to form hydrocarbons and carbon monoxide. Note that the corresponding EC number ( ) dating from 1989 refers to a nonorthologous Pisum sativum enzyme that acts on C18 and longer chains and attaches the overly narrow narrow name octadecanal decarbonylase.
