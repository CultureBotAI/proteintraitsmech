identifier: Pfam:PF26361
label: Mycoplasma immunoglobulin binding protein arm domain
definition: >-
  This entry represents the N-terminal arm domain of the Mycoplasma immunoglobulin binding (MIB) protein. This domain contributes to the hug of death mechanism by which MIB and MIP proteins capture and cleave antibodies. The MIB arm domain is made of a globular region and connects to the MIB M1 and M2 domains via a large N-terminal hairpin. While the full MIB protein binds to antibody light chains and displaces antibodies from their antigens, the specific role of the arm domain is to encircle the antibody and provide the conformational flexibility necessary to reach antibodies bound to surface antigens.
