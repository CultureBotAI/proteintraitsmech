label: Domain of unknown function (DUF1955)
definition: >-
  Members of this family are found in hypothetical proteins synthesised by the Archaeal organism Sulfolobus. Their exact function has not, as yet, been determined. These proteins fold into a right-handed superhelix assembled from ten, repeated in tandem, α-helices.
