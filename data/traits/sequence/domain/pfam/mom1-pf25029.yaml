identifier: Pfam:PF25029
label: MOM1-like domain
definition: >-
  This domain is found in Helicase protein MOM1 from Arabidopsis thaliana (MOM1) and similar plant proteins. MOM1 is involved in the regulation of transcriptional gene silencing (TGS) independently of changes in DNA methylation. This domain is predicted to have an all-α helical configuration.
