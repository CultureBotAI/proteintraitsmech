identifier: Pfam:PF08758
label: Cadherin prodomain like
definition: >-
  Cadherins are a group of proteins that mediate calcium dependent cell-cell adhesion. They are activated through cleavage of a prosequence in the late Golgi. The folded part of the prosequence (termed the prodomain) shows structural resemblance to cadherin adhesive domains, but lacks all the features known to be important for cadherin-cadherin interactions. This entry represents the caderin prodomain.
