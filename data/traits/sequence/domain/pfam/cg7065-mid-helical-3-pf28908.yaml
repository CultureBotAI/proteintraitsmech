identifier: Pfam:PF28908
label: CG7065 middle helical domain
definition: >-
  This entry represents a helical domain found in the middle region of CG7065. CG7065 is an uncharacterised protein of 1231 amino acids that has been identified as a phosphoprotein with multiple phosphorylation sites. The protein contains several predicted disordered regions and is annotated with mediator complex localisation and transcription coactivator activity in Gene Ontology. This helical domain is one of several domains within the CG7065 architecture which also contain a helical fold.
