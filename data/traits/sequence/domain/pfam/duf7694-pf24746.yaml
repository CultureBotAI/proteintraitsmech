identifier: Pfam:PF24746
label: Domain of unknown function (DUF7694)
definition: >-
  This entry represents a domain found in uncharacterised bacterial proteins. They are predicted to adopt a globular structure consisting of an antiparallel β-sheet and α-helix packed on it. Most members contain a highly conserved HhW sequence motif where h is hydrophobic residue.
