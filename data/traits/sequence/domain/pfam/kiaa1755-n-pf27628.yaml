identifier: Pfam:PF27628
label: KIAA1755 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of human Rho guanine nucleotide exchange factor 40 (ARHGEF40), Pleckstrin homology domain-containing family G member 4B (PLEKHG4B), the uncharacterised protein KIAA1755 and similar animal proteins. ARHGEF40 promotes actin stress fibre formation, force-induced stress fibre reinforcement and organisation of KRT8/KRT18 networks via activation of RHOA/ROCK signalling, which is mediated by N terminus KRT18 binding. PLEKHG4B specifically activates small GTPase CDC42 by exchanging bound GDP for free GTP. It plays a role in actin cytoskeletal remodelling in the late stage of cell-cell junction formation by regulating the contractility of actin filaments, which prompts the conversion from 'open' to 'closed' junctions. KIAA1755 is predicted to have guanyl-nucleotide exchange factor activity and to be involved in axon guidance based on sequence analysis. The protein localises to the cytoplasm, plasma membrane and is an extrinsic component of membrane. The specific function of this domain remains to be determined.
