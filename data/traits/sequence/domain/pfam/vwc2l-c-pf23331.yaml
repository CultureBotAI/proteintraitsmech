identifier: Pfam:PF23331
label: VWC2L, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of human von Willebrand factor C domain-containing protein 2-like (VWC2L), its paralogue von Willebrand factor C domain-containing protein 2 (Brorin), encoded by gene VWC2 and similar proteins predominantly found in vertebrates. VWC2L may play a role in neurogenesis, bone differentiation and matrix mineralisation. Brorin is a BMP antagonist, which may play a role in neural development. It also promotes cell adhesion. This domain is predicted to adopt an all-β configuration.
