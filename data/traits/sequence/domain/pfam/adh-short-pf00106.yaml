identifier: Pfam:PF00106
label: short chain dehydrogenase
definition: >-
  This entry represents Long-chain acyl-[acyl-carrier-protein] reductase from Synechococcus elongatus (ARR) and similar proteins from Cyanobacteria. ARR reduces a long-chain (mainly C16 or C18) fatty acyl ACP ester to its corresponding fatty aldehyde, releasing the acyl carrier protein (ACP). NADPH is the reductant for this reaction. Its structure shows the protein is composed of three domains, with the the mid-domain was designated as the dinucleotide recognition loop. This enzyme may be distantly related to the short-chain dehydrogenase or reductase (SDR) family ( ).
