identifier: Pfam:PF11328
label: Protein of unknown function (DUF3130
definition: >-
  Members of this protein family are similar in length and sequence (although remotely) to the WXG100 family of type VII secretion system (T7SS) targets. Phylogenetic profiling shows that members of this family are similarly restricted to species with T7SS, marking this family as a related set of T7SS effectors.
