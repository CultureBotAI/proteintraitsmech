identifier: Pfam:PF17387
label: Glycosyl hydrolase family 59 central domain
definition: >-
  This entry represents the central domain of the glycosyl hydrolase family 59 members. Glycoside hydrolase family 59 comprises enzymes with only one known activity; galactocerebrosidase ( ). Globoid cell leukodystrophy (Krabbe disease) is a severe, autosomal recessive disorder that results from deficiency of galactocerebrosidase (GALC) activity. GALC is responsible for the lysosomal catabolism of certain galactolipids, including galactosylceramide and psychosine.
