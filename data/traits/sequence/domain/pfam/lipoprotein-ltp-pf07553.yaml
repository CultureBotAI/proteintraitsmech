identifier: Pfam:PF07553
label: Host cell surface-exposed lipoprotein
definition: >-
  This entry represents a domain found as 1 to 5 copies in proteins from bacteria and virus, including Putative host cell surface-exposed lipoprotein from Streptococcus phage TP-J34 (Ltp, ), a superinfection exclusion protein. This domain shows a three-helix bundle belonging to the HTH superfamily.
