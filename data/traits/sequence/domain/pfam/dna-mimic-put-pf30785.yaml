identifier: Pfam:PF30785
label: Putative DNA-mimic protein
definition: >-
  This entry represents a domain of approximately 160 residues related to , it can also be found covering the whole structure of proteins. The clan membership suggests this domain may act as a DNA-mimic protein. According to STRING, the gene encoding this domain is often found in a genomic neighbourhood with a GntR/FCD transcriptional regulator. In some cases AlphaFold prediction suggests these proteins interact, e.g. (this family) and (ipTM = 0.85 pTM = 0.87). This domain is found almost exclusively in Actinomycetota, particularly Streptomycetaceae.
