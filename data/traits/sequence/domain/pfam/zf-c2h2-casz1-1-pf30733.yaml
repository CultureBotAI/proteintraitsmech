identifier: Pfam:PF30733
label: CASZ1-like, zinc finger 1
definition: >-
  This predicted C2H2-type zinc finger is found repeated nine times in human Zinc finger protein castor homolog 1 (CASZ1) and related metazoan sequences. CASZ1 is a transcriptional activator involved in vascular assembly and morphogenesis through direct transcriptional regulation of EGFL7. This entry represents the first C2H2-type zinc finger found in combination with which represents the other zinc fingers.
