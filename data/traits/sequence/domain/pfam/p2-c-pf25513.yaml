identifier: Pfam:PF25513
label: Viral coat protein P2 C-terminal domain
definition: >-
  This entry represents the C-terminal jelly roll domain of P2. P2 (30.2kDa) is the major outer-coat protein of the marine lipid-containing bacteriophage PM2. Each subunit of P2 is composed of two β-barrel jelly rolls, disposed normally to the surface of the capsid, which lend pseudo-6-fold symmetry to the molecules, facilitating their close packing within the capsid. There is a Ca2+ ion located between the two β barrels of P2 that helps PM2 molecular organisation.
