identifier: Pfam:PF28419
label: WetA C-terminal domain
definition: >-
  This entry represents the C-terminal helical region of WetA, a key transcriptional regulator involved in conidiation and spore maturation in filamentous fungi. WetA proteins contain an acidic N-terminal region, a serine/threonine/proline-rich middle domain, and a basic C-terminal region. This C-terminal region is essential for the protein's regulatory function in activating genes required for conidial wall formation and spore dormancy. WetA works together with brlA and abaA as part of a regulatory cascade controlling conidiophore development and conidium maturation. The protein is found across filamentous ascomycetes including Aspergillus, Penicillium, Fusarium and Beauveria species. Disruption of wetA results in defective spore walls, reduced stress tolerance, and impaired conidial maturation.
