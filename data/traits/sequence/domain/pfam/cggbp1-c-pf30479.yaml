identifier: Pfam:PF30479
label: CGGBP1 helical domain
definition: >-
  This entry represents the C-terminal helical domain found in CGG triplet repeat-binding protein 1 (CGGBP1). CGGBP1 binds to nonmethylated 5'-d(CGG)(n)-3' trinucleotide repeats in the FMR1 gene promoter and may play a role in regulating FMR1 expression. Binding is severely inhibited by cytosine-specific DNA methylation of the binding motif. CGGBP1 localises to the nucleus and is ubiquitously expressed, with high levels in the placenta, thymus, lymph nodes and brain.
