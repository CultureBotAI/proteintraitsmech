identifier: Pfam:PF03379
label: CcmB protein
definition: >-
  This entry represents cytochrome c-type biogenesis protein CcmB (HelB) from bacteria and plants. CcmB is the product of one of a cluster of ccm genes that are necessary for cytochrome c biosynthesis in bacteria and is required for the export of haem to the periplasm. Plant mitochondria have kept a cytochrome c biogenesis pathway inherited from their prokaryote ancestor and also have a CcmB homologue, but in plants the ccm genes are distributed between the nuclear and the mitochondrial genomes instead of being coded in a single operon.
