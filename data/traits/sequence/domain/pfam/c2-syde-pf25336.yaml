identifier: Pfam:PF25336
label: C2 domain of synapse defective Rho GAP protein
definition: >-
  This entry represents the C2 domain found in synapse-defective Rho GTPase-activating proteins (SYDE). This domain appears to be specific to vertebrates and is notably conserved between SYDE1 and SYDE2, though SYDE2 shows higher sequence conservation across species. The Rho GTPase-activating proteins function as activators for Rho-type GTPases, converting them to an inactive GDP-bound state. These proteins play a crucial role in cytoskeletal remodelling by regulating the activity of GTPases such as RHOA, CDC42, and RAC1. They are involved in various biological processes, including placental development, trophoblast cell migration, presynaptic development, and axon identity specification. Additionally, they influence synaptic functions by promoting the anchoring of synaptic components and recruiting proteins to active zones. Rho GTPase-activating proteins are also implicated in controlling movement, egg-laying, and the localisation of specific proteins within cells. The C2 domain is a Ca 2+ -dependent membrane-targeting module found in many cellular proteins involved in signal transduction or membrane trafficking. C2 domains are unique among membrane targeting domains in that they show wide range of lipid selectivity for the major components of cell membranes, including phosphatidylserine and phosphatidylcholine. This C2 domain is about 116 amino-acid residues and is located between the two copies of the C1 domain in Protein Kinase C and the protein kinase catalytic domain. Regions with significant homology to the C2-domain have been found in many proteins. The C2 domain is thought to be involved in calcium-dependent phospholipid binding and in membrane targetting processes such as subcellular localisation. The 3D structure of the C2 domain of synaptotagmin has been repo…
