identifier: Pfam:PF28959
label: Domain of unknown function (DUF8484)
definition: >-
  This entry represents the C-terminal domain found in RDD family proteins, which follows the RDD domain ( ). This family is found predominantly in Bacteroidota, particularly in the orders Flavobacteriales and Cytophagales. The domain is approximately 65-85 residues in length. The function of this domain remains to be determined.
