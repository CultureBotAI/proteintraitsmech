identifier: Pfam:PF30408
label: Phosphotransferase RcsD, periplasmic domain
definition: >-
  This entry represents the cytoplasmic domain of phosphotransferase RcsD (formerly YojN). RcsD is a membrane-anchored phosphotransfer intermediate in the RcsC-RcsD-RcsB phosphorelay system that controls transcription of genes involved in colanic acid capsule synthesis, biofilm formation and cell division. RcsD acquires a phosphoryl group from the sensor kinase RcsC and transfers it to the response regulator RcsB. This cytoplasmic domain precedes the cytoplasmic histidine kinase- like domain ( ), the RcsD_ABL domain ( ), and the C-terminal HPt domain ( ). The family is restricted to Enterobacterales.
