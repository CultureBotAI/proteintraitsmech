identifier: Pfam:PF22405
label: Sulfolobus turreted icosahedral virus 1-like, major capsid protein
definition: >-
  This entry represents a jelly-roll domain found at the C-terminal end of the major capsid protein from Sulfolobus turreted icosahedral virus 1. The structure of this domain is similar to major capsid protein structures of the eukaryotic Paramecium bursaria Chlorella virus, and the bacteriophage PRD1, and shows a common fold with the mammalian adenovirus.
