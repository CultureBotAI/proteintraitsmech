identifier: Pfam:PF28404
label: Uncharacterised secreted protein ARB_05178
definition: >-
  This entry represents the ARB_05178 family of uncharacterised secreted proteins found in dermatophytic fungi. The prototype protein from Arthroderma benhamiae is 210 amino acids in length and contains a predicted signal peptide for secretion. The protein has been identified by mass spectrometry in secreted fractions during extracellular proteolysis studies. It is predicted to be N-glycosylated and contains a region of predicted disorder. The family is found across various fungal species. The function of this protein family remains to be determined.
