identifier: Pfam:PF21979
label: Hfq related
definition: >-
  Hfq proteins participate in RNA folding and translational regulation through pairing of small RNAs and messenger RNAs. Hfq proteins share the distinctive Sm fold, and form ring-shaped structures similar to those of the Sm/Lsm proteins regulating mRNA turnover in eukaryotes. This entry represents Hfq-related proteins found mainly in Cyano- and Acidobacteria. Although these proteins share low sequence similarity with the bacterial Hfq proteins, they retain the common structural features and fold. These proteins bind very weakly to known Hfq target RNAs and have altered RNA-binding properties.
