identifier: Pfam:PF25357
label: STK11-interacting protein PH domain
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in Serine/threonine-protein kinase 11-interacting proteins (S11IP). The domain is found C-terminal to the LIP1 domain ( ). Some members of this group also contain LRR (leucine-rich repeat) domains. The S11IP protein is found in vertebrates and arthropods.
