identifier: Pfam:PF29367
label: IOC2 middle domain
definition: >-
  This entry represents the middle domain found in IOC2 (ISWI one complex protein 2) and related proteins. IOC2 functions as a component of the ISW1B chromatin remodelling complex in yeast, which catalyses ATP-dependent alterations in nucleosomal DNA structure. The ISW1B complex controls RNA polymerase II elongation and coordinates transcription termination with pre-mRNA processing. This domain is located between the IOC2_N domain ( ) and a PHD-type zinc finger domain. The specific function of this middle domain remains to be determined.
