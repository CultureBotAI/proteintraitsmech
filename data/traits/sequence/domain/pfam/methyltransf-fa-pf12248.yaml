identifier: Pfam:PF12248
label: Farnesoic acid 0-methyl transferase
definition: >-
  This domain, found in farnesoic acid O-methyl transferase, is approximately 110 amino acids in length. Farnesoic acid O-methyl transferase (FAMeT) is the enzyme that catalyses the formation of methyl farnesoate (MF) from farnesoic acid (FA) in the biosynthetic pathway of juvenile hormone (JH).
