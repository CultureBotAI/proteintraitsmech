identifier: Pfam:PF25662
label: Densovirus VP1 protein
definition: >-
  This entry represents the structural protein VP1 of the Acheta domesticus segmented densovirus (AdSDV), the first parvovirus discovered with a bipartite genome. This structural protein forms the viral capsid, which displays T=1 icosahedral symmetry. Unlike other parvoviruses, AdSDV packages its NS and VP cassettes on separate genome segments. VP1 is encoded by vpORF1 on the vp segment, and forms the eight-stranded jelly roll fold that is characteristic of parvoviral capsid proteins. The capsid formed by this protein shows a unique DNA-packaging mechanism involving the elongated C-terminal tail, which "pins" the ssDNA genome to the capsid interior at the twofold symmetry axis. AdSDV VP1 is phylogenetically related to the VP proteins of mosquito-infecting brevihamaparvoviruses, but unlike other members of the Hamaparvovirinae, it infects the common house cricket and causes paralysis followed by death.
