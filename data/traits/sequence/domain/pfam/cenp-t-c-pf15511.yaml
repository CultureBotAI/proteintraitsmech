identifier: Pfam:PF15511
label: Centromere kinetochore component CENP-T histone fold
definition: >-
  This domain is the C-terminal histone fold domain of CENP-T, which associates with chromatin. Proteins containing this domain also include Histone H4. Histone H4 is one of the five histones, along with H1/H5, H2A, H2B and H3. Two copies of each of the H2A, H2B, H3, and H4 histones ensemble to form the core of the nucleosome. The nucleosome forms octameric structure that wraps DNA in a left-handed manner. H3 is a highly conserved protein of 135 amino acid residues. Histones can undergo several different types of post-translational modifications that affect transcription, DNA repair, DNA replication and chromosomal stability. The sequence of histone H4 has remained almost invariant in more then 2 billion years of evolution.
