identifier: Pfam:PF26680
label: CbaC protein
definition: >-
  This entry represents a small family of Halobacterial proteins that are annotated as CbaC proteins. The origin of this annotation is uncertain. These proteins are composed of two transmembrane helices. STRING networks of members of this family show it is found associated with COX1 and COX2 proteins suggesting it may act as an accessory subunit to the cytochrome oxidase complex.
