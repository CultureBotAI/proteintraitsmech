identifier: Pfam:PF18206
label: Porphyranase beta-sandwich domain 1
definition: >-
  This domain is found in porphyranase protein present in Bacteroides plebeius. Porphyranase breaks down porphyran during digestion of red seaweed glycans. It is worth noting that red seaweed glycans contain sulfate esters that are absent in terrestrial plants. This domain follows the catalytic domain of the porphyranase protein and adopts a β-sandwich. This domain is also found in Beta-agarase which is involved in cleavage of agar at the (1->4) linkage, producing tetrameric saccharide molecules. It follows the (β/α)8 barrel catalytic domain and folds into a β-sandwich.
