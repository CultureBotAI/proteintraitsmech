label: Protein of unknown function (DUF2442)
definition: >-
  Several proteins in this family are annotated as being putative molybdopterin-guanine dinucleotide biosynthesis proteins, but this has not been confirmed. Members of this family also include proteins containing the N-terminal domain of the bacteria NE0471 protein. The function of these proteins is not known.
