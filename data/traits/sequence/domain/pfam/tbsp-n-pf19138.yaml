identifier: Pfam:PF19138
label: Transcriptional regulator TbsP-like, N-terminal
definition: >-
  This entry represents the N-terminal domain of the putative transcriptional regulator TbsP (TrmB suppressor, or "tablespoon") from Halobacterium volcanii (HVO_2861, ) and similar sequences predominantly found in Halobacteria. TbsP is required for adhesion to abiotic surfaces (i.e., biofilm formation) and maintains wild-type cell morphology and motility. It is predicted to have a C-terminal MarR-type helix-turn-helix (HTH) DNA- binding domain.
