identifier: Pfam:PF21382
label: Integrator IntS9, C-terminal domain
definition: >-
  This is the C-terminal domain of Integrator complex subunit 9 (IntS9) from animals. IntS9 interacts with the C-terminal of IntS11 (responsible for endonuclease activity of INT), a crucial interaction for the role of INT in snRNA 3'-end processing. IntS9 is a component of integrator complex (INT) which is involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing.
