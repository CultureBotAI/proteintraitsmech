identifier: Pfam:PF29229
label: BB0187 family
definition: >-
  This entry represents a family of small single domain proteins of approximately 80 residues found in Spirochaetota, including Treponema, Borrelia and Spirochaeta species. The family is named after the Borrelia burgdorferi BB0187 protein ( ). AlphaFold3 predicts that members may form domain-swapped homodimers. Each monomer forms a four-stranded highly curved β sheet that holds a C-terminal α helix, with these α helices swapped between monomers in the predicted homodimer structure. The function of this family remains to be determined.
