identifier: Pfam:PF27502
label: MadH C-terminal domain
definition: >-
  This entry represents the C-terminal domain of MadH proteins. The specific function of this domain remains to be determined. MadH is an ACP-SH acetate ligase that functions as part of the biotin-dependent malonate decarboxylase multienzyme complex. The protein catalyses the formation of acetyl-[ACP] from holo-[ACP] and acetate using ATP.
