identifier: Pfam:PF27618
label: GTF2H2 zinc ribbon domain
definition: >-
  This domain is found in General transcription factor IIH subunit 2 (GTF2H2) from Arabidopsis thaliana and related plant proteins. The domain represented by this entry contains four invariant cysteine residues and is predicted to adopt a fold typical for zinc β-ribbon domains. GTF2H2 is a component of the general transcription and DNA repair factor IIH (TFIIH) core complex, which is involved in general and transcription-coupled nucleotide excision repair (NER) of damaged DNA and, when complexed to CAK, in RNA transcription by RNA polymerase II. GTF2H2 can restore UV resistance.
