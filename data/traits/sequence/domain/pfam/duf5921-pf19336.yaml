identifier: Pfam:PF19336
label: Domain of unknown function (DUF5921)
definition: >-
  This entry represents a domain of unknown function of the Transcription Factor IIIC 90 kDa subunit (TFIIIC-delta/TFIIIC90, also known as general transcription factor 3C polypeptide 4) found in animals. It is located between the Transcription factor IIIC 90 kDa subunit N-terminal domain and the Putative zinc-finger of the Transcription factor IIIC. TFIIIC is a multisubunit complex that directly recognises promoter elements and recruits TFIIIB and RNA polymerase III, being absolutely required for RNA polymerase III transcription. TFIIIC90 has an intrinsic histone acetyltransferase activity with a substrate specificity for histone H3. This domain is likely to be involved in the interaction with other components of the TFIIIC complex.
