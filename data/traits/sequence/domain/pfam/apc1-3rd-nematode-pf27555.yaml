identifier: Pfam:PF27555
label: Anaphase-promoting complex subunit 1, third domain
definition: >-
  This entry represents the third domain of anaphase-promoting complex subunit 1 (APC1), also known as MAT-2 in C. elegans and related nematodes proteins. While the full-length protein functions as a structural scaffold within the APC/C complex, the specific function of this third domain remains to be determined. In C. elegans, APC1/MAT-2 is also involved in embryonic anterior-posterior axis formation and regulation of neurotransmitter receptors in postmitotic neurones. APC1 is the largest of the subunits of the anaphase-promoting complex or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. The APC/C complex mediates ubiquitination and degradation of target proteins and is essential for the metaphase to anaphase transition during both meiosis and mitosis. Infection of human fibroblasts with human cytomegalovirus (HCMV) leads to cell cycle dysregulation, which is associated with the inactivation of the anaphase-promoting complex.
