identifier: Pfam:PF30120
label: Subtilisin propeptide-like protein 9
definition: >-
  This entry represents subtilisin propeptide-like proteins found in Plasmodium species. These proteins act as specific inhibitors of the subtilisin-like protease SUB1. The proteins are secreted and localise to the parasitophorous vacuole lumen and cell membrane. Expression occurs during the parasite blood stage, specifically in schizonts. The C-terminal region is dispensable for parasite growth in host erythrocytes.
