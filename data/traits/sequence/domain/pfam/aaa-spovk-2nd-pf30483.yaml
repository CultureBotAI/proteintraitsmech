identifier: Pfam:PF30483
label: SpoVK-like AAA ATPase, second domain
definition: >-
  This entry represents the second domain of SpoVK-like AAA+ ATPases. It is located between the N-terminal domain and the AAA ATPase domain ( ). These proteins are widespread in bacteria, particularly in Cyanobacteriota where they have been implicated in stress responses, including responses to blue light, low inorganic carbon and acidic conditions. In Synechococcus elongatus, the protein encoded by Synpcc7942_0417 has been shown to affect circadian clock function and KaiC protein localisation. This domain is found in Cyanobacteriota, Pseudomonadota, Planctomycetota and Actinomycetota. The specific function of this domain remains to be determined.
