identifier: Pfam:PF03747
label: ADP-ribosylglycohydrolase
definition: >-
  This entry represents enzymes that perform ADP-ribosylations, including ADP-ribosylhydrolase ARH1/3 from animals, which preferentially hydrolyses the scissile alpha-O-linkage attached to the anomeric C1'' position of ADP-ribose and acts on different substrates, such as proteins ADP-ribosylated on serine and threonine, free poly(ADP-ribose) and O-acetyl-ADP-D-ribose. The family also includes ADP-ribosylarginine hydrolase Tri1 from Serratia proteamaculans. This protein neutralises Tre1-Sp both by occluding its active site via its N-terminal extension and by hydrolysing the ADP-ribosyl moiety from FtsZ. It functions as an immunity component of a contact-dependent interbacterial competition system (also called effector-immunity systems). ADP-ribosyl-[dinitrogen reductase] glycohydrolase is involved in the regulation of nitrogen fixation activity by the reversible ADP-ribosylation of one subunit of the homodimeric dinitrogenase reductase component of the nitrogenase enzyme complex in Rhodospirillum rubrum. Jellyfish Crystallin proteins are also included in this group, although these proteins appear to have lost the presumed active site residues.
