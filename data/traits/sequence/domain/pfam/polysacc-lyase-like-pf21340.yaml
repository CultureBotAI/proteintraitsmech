identifier: Pfam:PF21340
label: Cip1-like, core domain
definition: >-
  This entry represents a domain found in Cip1 from Hypocrea jecorina and similar fungal and bacterial sequences. Cip1 is a cellulose induced protein with a carbohydrate binding module ( ) connected via a linker region to a domain with yet unknown function (this entry). This domain shows a β-sandwich jelly-roll fold with two antiparallel β-sheets that consist on eight and seven strands and pack on top of one another. Structural analysis suggest it may function as a lyase. In some proteins, this domain is found associated with .
