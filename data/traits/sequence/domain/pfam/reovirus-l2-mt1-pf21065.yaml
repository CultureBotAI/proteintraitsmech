identifier: Pfam:PF21065
label: Reovirus core-spike protein lambda-2 (L2), methyltransferase-1
definition: >-
  Reovirus core-spike protein VP1/lambda-2 (VP1/L2) forms a pentamer that mediates enzymatic reactions in 5' capping of the viral plus-strand transcripts. It forms a hollow cylinder with projecting turrets. Each VP1/L2 monomer consists of eight domains with the most N-terminal domain at the base of the turret and the most C-terminal domain at the top. This entry represents the first methyltransferase (MT1) domain which adds a methyl group to the N7 of the guanosine added by the GTase.
