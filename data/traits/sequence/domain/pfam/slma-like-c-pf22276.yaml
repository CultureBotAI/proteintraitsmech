identifier: Pfam:PF22276
label: Tetracyclin repressor-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Nucleoid occlusion factor SlmA from Escherichia coli and similar transcriptional repressors from proteobacteria. SlmA is required for the nucleoid occlusion (NO) phenomenon, which prevents Z-ring formation and cell division over the nucleoid. It is organised into two domains, a small N-terminal and a C-terminal domain (this entry). This domain adopts an all-α globular structure. This region mediates dimerisation.
