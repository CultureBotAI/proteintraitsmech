identifier: Pfam:PF26728
label: FMNK-like N-terminal domain
definition: >-
  This entry represents a domain found at the N-terminal end of uncharacterised proteins from fungi. Most of these proteins contain Riboflavin kinase domain and are likely putative Flavin mononucleotide kinases (FMNK). Riboflavin is converted into catalytically active cofactors (FAD and FMN) by the actions of riboflavin kinase, which converts it into FMN, and FAD synthetase, which adenylates FMN to FAD. In fungi, it catalyses the phosphorylation of riboflavin (vitamin B2) to form the FMN coenzyme. This domain contains an Ig-like/E set fold.
