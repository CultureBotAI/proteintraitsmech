identifier: Pfam:PF01687
label: Riboflavin kinase
definition: >-
  This entry represents the riboflavin kinase domains from bacteria and eukaryotes. Riboflavin is converted into catalytically active cofactors (FAD and FMN) by the actions of riboflavin kinase ( ), which converts it into FMN, and FAD synthetase ( ), which adenylates FMN to FAD. Eukaryotes usually have two separate enzymes, while most prokaryotes have a single bifunctional protein that can carry out both catalyses, although exceptions occur in both cases. While eukaryotic monofunctional riboflavin kinase is orthologous to the bifunctional prokaryotic enzyme, the monofunctional FAD synthetase differs from its prokaryotic counterpart, and is instead related to the PAPS-reductase family. The bacterial FAD synthetase that is part of the bifunctional enzyme has remote similarity to nucleotidyl transferases and, hence, it may be involved in the adenylylation reaction of FAD synthetases.
