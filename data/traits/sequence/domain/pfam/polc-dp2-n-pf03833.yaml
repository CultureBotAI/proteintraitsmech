identifier: Pfam:PF03833
label: DNA polymerase II large subunit DP2, N-terminal
definition: >-
  This entry represents the N-terminal domain of the DNA polymerase II large subunit. This domain adopts an α/β structure. DP2 is the large subunit of a two-subunit novel archaebacterial replicative DNA polymerase first characterised for Pyrococcus furiosus. The structure of DP2 appears to be organised as a ~950 residue component separated from a ~300 residue component by a ~150 residue intein. The other subunit, DP1, has sequence similarity to the eukaryotic DNA polymerase delta small subunit.
