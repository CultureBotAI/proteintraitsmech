identifier: Pfam:PF18489
label: Alpha helical domain
definition: >-
  This is the N-terminal domain found in putative tRNA-binding proteins found in archaea. Structural analysis from Pyrococcus horikoshii indicate that it is a helical domain where many conserved residues are found in the first three helices and are mainly located on the inverse side of the putative tRNA-binding site. A structural homology search suggested that this fold prefers to bind proteins/peptides.
