identifier: Pfam:PF09247
label: TATA box-binding protein binding
definition: >-
  In eukaryotes, the general transcription factor TFIID helps to regulate transcription by RNA polymerase II from class II promoters. TFIID consists of TATA-box-binding proteins (TBP) and TBP-associated factors (TAFIIs), which together mediate both activation and inhibition of transcription. In Drosophila, the N-terminal region of TAFII-230 (the TFIID 230kDa subunit) binds directly to TBP, thereby inhibiting the binding of TBP to the TATA box. The N-terminal domain is comprised of three α helices and a β hairpin, which forms the core that occupies the DNA-binding surface of TBP.
