identifier: Pfam:PF23841
label: Phage tail termination protein
definition: >-
  This entry represents probable phage tail terminator proteins found in some bacteriophages that infect Actinobacteria. These proteins are likely located in the tail region and act as a terminator or cap the end of the tail. They are around 130-170 amino acids in length.
