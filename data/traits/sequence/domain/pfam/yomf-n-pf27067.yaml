identifier: Pfam:PF27067
label: SPbeta prophage YomF protein, N-terminal domain
definition: >-
  This entry represents the N-terminal domain in YomF. The function of this domain remains unknown. YomF is an uncharacterised protein encoded by the SPbeta prophage in Bacillus subtilis. This protein contains an N-terminal domain , middle domain and a C-terminal domain .
