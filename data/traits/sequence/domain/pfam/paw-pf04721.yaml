identifier: Pfam:PF04721
label: PNGase C-terminal domain, mannose-binding module PAW
definition: >-
  The PAW domain (present in PNGases and other worm proteins) is found as a single copy at the C terminus of metazoan peptide:N-glycanase (PNGase) and in multiple copies in hypothetical Caenorhabditis elegans proteins peptide:N-glycanases (PNGases). The C-terminal PAW domain of PNGase binds to the mannose moieties of N-linked oligosaccharide chains. The PAW domain is a slightly elongated molecule and displays a β-sandwich architecture, which is composed of two layers, containing nine and eight antiparallel β-strands, respectively, and three additional short helices. Some proteins known to contain a PAW domain are listed below: Animal peptide:N-glycanase (PNGase) , catalyses the deglycosylation of several misfolded N-linked glycoproteins by cleaving the bulky glycan chain before the proteins are degraded by the proteasome. Caenorhabditis elegans putative uncharacterised protein C17B7.5.
