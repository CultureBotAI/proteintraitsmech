identifier: Pfam:PF15327
label: Tankyrase binding protein C terminal domain
definition: >-
  This protein domain is found at the C-terminal end of the Tankyrase binding protein in eukaryotes. The precise function of this protein is still unknown. However, it is known that interacts with the enzyme tankyrase, a telomeric poly(ADP-ribose) polymerase, by binding to it. Tankyrin catalyses poly(ADP-ribose) chain formation onto proteins. More specifically, it binds to the ankyrin domain in tankyrase. The protein domain is approximately 170 amino acids in length and contains two conserved sequence motifs: FPG and LKA.
