identifier: Pfam:PF22513
label: Antitoxin FitA-like, ribbon-helix-helix
definition: >-
  This is the ribbon-helix-helix (RHH) motif found in antitoxin FitA from Neisseria gonorrhoeae and similar bacterial sequences, such as the putative antitoxin VapB12/VapB14 and VapB1 from Mycobacterium tuberculosis. FitA is the antitoxin component of a type II toxin-antitoxin (TA) system. It binds DNA through its ribbon-helix-helix motif.
