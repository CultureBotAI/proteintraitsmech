identifier: Pfam:PF30129
label: MCM22/CENP-K C-terminal domain
definition: >-
  This entry represents the C-terminal domain of MCM22/CENP-K, a component of the inner kinetochore constitutive centromere-associated network (CCAN). MCM22 is found in fungi. The protein is essential for chromosome transmission and forms part of the heterotrimeric CTF3 subcomplex along with CTF3 and MCM16. This subcomplex is a key component of the larger CCAN complex, which serves as a structural platform for outer kinetochore assembly and mediates chromosome segregation during meiosis and mitosis. MCM22 interacts directly with CTF19, CTF3, and MCM16 within the kinetochore complex. This domain interacts with another three kinetochore subunits: CNN1, MCM16 and CTF3.
