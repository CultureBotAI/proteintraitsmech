identifier: Pfam:PF04666
label: MGAT4 conserved region
definition: >-
  This entry represents the conserved region found in N-acetylglucosaminyltransferase IV (MGAT4, also known as GnT-IV) and related proteins. N-acetylglucosaminyltransferases (GnTs) take part in the formation of branches in the biosynthesis of complex-type sugar chains. In vertebrates, six GnTs, designated as GnT-I to -VI, which catalyse the transfer of GlcNAc to the core mannose residues of Asn-linked sugar chains, have been identified. GnT-IV ( ) catalyses the transfer of GlcNAc from UDP-GlcNAc to the GlcNAc1-2Man1-3 arm of core oligosaccharide [Gn2(22)core oligosaccharide] and forms GlcNAc1-4(GlcNAc1-2)Man1-3 structure on the core oligosaccharide (Gn3(2,4,2)core oligosaccharide). In some members, the conserved region occupies all but the very N-terminal, where there is a signal sequence on all members. For other members, the conserved region does not occupy the entire protein but is still to the N-terminal of the protein.
