identifier: Pfam:PF27075
label: Rv1486c-like protein, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of uncharacterised proteins found in mycobacteria. Members of this entry include Rv1486c from Mycobacterium tuberculosis, Mb1522c from M. bovis, ML1804 from M. leprae, and MAV321 from M. avium. The full-length proteins are approximately 288-298 amino acids and appear to have a two-domain architecture. The function of this N-terminal domain remains unknown.
