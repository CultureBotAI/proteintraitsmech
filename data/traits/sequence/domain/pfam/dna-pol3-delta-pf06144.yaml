identifier: Pfam:PF06144
label: DNA polymerase III, delta subunit
definition: >-
  This entry represents the N-terminal domain of the DNA polymerase III, delta subunit ( ), which is required for, along with delta' subunit, the assembly of the processivity factor beta(2) onto primed DNA in the DNA polymerase III holoenzyme-catalysed reaction. The delta subunit is also known as HolA.
