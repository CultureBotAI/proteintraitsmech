identifier: Pfam:PF31013
label: Basonuclin N-terminal domain
definition: >-
  This entry represents an N-terminal domain of approximately 108 residues found in basonuclin zinc finger proteins (BNC1, BNC2) in vertebrates. This domain is found N-terminal to the paired C2H2 zinc finger domains ( , ). Basonuclins are transcription factors expressed in keratinocytes and germ cells, involved in terminal differentiation of squamous epithelia and maintenance of spermatogenesis and oocyte maturation. BNC1 mutations cause premature ovarian failure, while BNC2 variants are linked to lower urinary tract obstruction.
