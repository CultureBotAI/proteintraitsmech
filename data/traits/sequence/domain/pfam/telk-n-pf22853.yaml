identifier: Pfam:PF22853
label: Protelomerase TelK-like N-terminal domain
definition: >-
  This entry represents the N-terminal domain of protelomerase TelK from Klebsiella phage phiKO2 and similar proteins from tailed bacteriophages and bacterial prophages. TelK is a hairpin telomere resolvase with DNA cleavage-rejoining activity that resolves the catenated circular dimer produced from the bidirectional replication of a chromosome. The core of the TelK monomer consists of an N-terminal domain and a catalytic domain connected by a long α-helical linker. However, there are two extensions of the protein: a C-terminal DNA binding domain named the stirrup ( ) and an N-terminal domain containing an insertion, called the muzzle domain ( ).
