identifier: Pfam:PF08567
label: TFIIH p62 subunit, N-terminal domain
definition: >-
  The N-terminal region of the TFIIH basal transcription factor complex p62 subunit (BTF2-p62) forms an interaction with the 3' endonuclease XPG, which is essential for activity. The 3' endonuclease XPG is a major component of the nucleotide excision repair machinery. The structure of the N-terminal region reveals that it adopts a pleckstrin homology (PH) fold.
