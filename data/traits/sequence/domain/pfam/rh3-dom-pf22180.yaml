identifier: Pfam:PF22180
label: RH3 domain
definition: >-
  This entry represents the RH3 domain found in ORF E73 from Sulfolobus virus and related proteins from tailed bacteriophages and bacterial prophages. This domain shows significant similarity to domains found in proteins involved in transcriptional regulation, but with an additional third helix.
