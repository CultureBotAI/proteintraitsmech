identifier: Pfam:PF07475
label: HPr Serine kinase C-terminal domain
definition: >-
  This entry represents the C-terminal kinase domain of Hpr Serine/threonine kinase (HprK/P). HprK/P is a bifunctional histidine-containing protein kinase/phosphatase, which controls the phosphorylation state of the phosphocarrier protein HPr and regulates the utilization of carbon sources by Gram-positive bacteria. It catalyzes both the ATP-dependent phosphorylation of Ser-46 of HPr and its dephosphorylation by phosphorolysis. This kinase is unusual in that it recognises the tertiary structure of its target and is a member of a novel family unrelated to any previously described protein phosphorylating enzymes. X-ray analysis of the full-length crystalline enzyme from Staphylococcus xylosus at a resolution of 1.95 A shows the enzyme to consist of two clearly separated domains that are assembled in a hexameric structure resembling a three-bladed propeller.
