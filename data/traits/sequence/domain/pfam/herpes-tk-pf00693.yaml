identifier: Pfam:PF00693
label: Thymidine kinase from herpesvirus
definition: >-
  The thymidine kinase from Herpesviridae catalyses the reaction: ATP + THYMIDINE = ADP + THYMIDINE 5'-PHOSPHATE. The enzyme is not subject to feedback inhibition by its product and the crystal structure of the enzyme from Human herpesvirus 1 (HHV-1) has been reported.
