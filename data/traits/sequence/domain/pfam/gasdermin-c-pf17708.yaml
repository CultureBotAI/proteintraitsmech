identifier: Pfam:PF17708
label: Gasdermin PUB domain
definition: >-
  This entry represents the PUB domain found in Gasdermin and GSDMB. GSDMB (GSDM) may play a role in achieving and maintaining the final differentiation state of epithelial cells. A deletion/insertion mutation in GSDMB (DFNA5) is associated with an autosomal dominant non-syndromic hearing impairment form. Certain gasdermins are cleaved by inflammatory and apoptotic caspases. Gasmedin E is cleaved by caspase-3 and the N-terminal fragment released forms pores in the cell membrane, switching from cell death by apoptosis to pyroptosis.
