identifier: Pfam:PF05166
label: YcgL domain
definition: >-
  YcgL represents a conserved class of small proteins widespread in gammaproteobacteria. The YcgL domain contains two α-helices and four β-strands in the sequential arrangement β1-β2-α1-β3-α2-β4 as a 3-layer (α/β/α) sandwich.
