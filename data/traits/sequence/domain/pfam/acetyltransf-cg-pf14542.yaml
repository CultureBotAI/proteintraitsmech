identifier: Pfam:PF14542
label: GCN5-related N-acetyl-transferase
definition: >-
  The N-acetyltransferases (NAT) ([ec:2.3.1.-]) are enzymes that use acetyl coenzyme A (CoA) to transfer an acetyl group to a substrate, a reaction implicated in various functions from bacterial antibiotic resistance to mammalian circadian rhythm and chromatin remodeling. The Gcn5-related N-acetyltransferases (GNAT) catalyse the transfer of the acetyl from the CoA donor to a primary amine of the acceptor. The GNAT proteins share a domain composed of four conserved sequence motifs A-D. This GNAT domain is named after yeast GCN5 (from General Control Nonrepressed) and related histone acetyltransferases (HATs) like Hat1 and PCAF. HATs acetylate lysine residues of amino terminal histone tails, resulting in transcription activation. Another category of GNAT, the aminoglycoside N-acetyltransferases, confer antibiotic resistance by catalysing the acetylation of amino groups in aminoglycoside antibiotics. GNAT proteins can also have anabolic and catabolic functions in both prokaryotes and eukaryotes. The acetyltransferase/GNAT domain forms a structurally conserved fold of 6 to 7 β strands (B) and 4 helices (H) in the topology B1-H1-H2-B2-B3-B4-H3-B5-H4-B6, followed by a C-terminal strand which may be from the same monomer or contributed by another. Motifs D (B2-B3), A (B4-H3) and B (B5-H4) are collectively called the HAT core, while the N-terminal motif C (B1-H1) is less conserved. The entry represents the NAGS-type GNAT domain.
