identifier: Pfam:PF21999
label: DNA polymerase-iota, thumb domain
definition: >-
  This entry represents the thumb domain found in DNA polymerase iota and related proteins such as members of the eukaryotic Y-family DNA polymerases, like DNA repair protein REV1, as well as bacterial Pol IV. This domain makes contacts with the minor groove of DNA. Y-family polymerases are characterised by their low-fidelity synthesis on undamaged DNA templates and by their ability to traverse replication-blocking lesions. By contrast, high-fidelity polymerases (such as DNA polymerase III) are sensitive to distortions in the DNA template. As a result, Y-family polymerases can extend primer strands across DNA strand lesions that would otherwise stall replicative polymerases. Y-family that include polymerase eta, kappa, iota and REV1. They exhibit different specificity and fidelity in the lesion bypass owing to the differences in their active site architectures. The Y-family polymerases share similar organisation consisting of an N-terminal catalytic core followed by a flexible intrinsically disordered region and a set of regulatory protein-protein interaction modules toward the C terminus. Architecturally, the catalytic core is reminiscent to the classical polymerases in which the palm domain harbours the residues crucial for catalysis, whereas the thumb and finger domains grasp the DNA and make contacts with the primer and the template, respectively. DNA polymerase IV is a poorly processive, error-prone DNA polymerase involved in untargeted mutagenesis. It copies undamaged DNA at stalled replication forks, which arise in vivo from mismatched or misaligned primer ends. These misaligned primers can be extended by polIV. It exhibits no 3'-5' exonuclease (proofreading) activity and may be involved in translesional synthesis.
