identifier: Pfam:PF28204
label: Dispersin
definition: >-
  This entry represents Dispersin from enteroaggregative Escherichia coli and related proteins. Dispersin is secreted to the bacterial cell surface. Dispersin-null mutants display a unique hyper-aggregating phenotype, accompanied by collapse of AAF pili onto the bacterial cell surface. Dispersin binds non-covalently to lipopolysaccharide on the surface of the bacterium and its role in fimbrial function is to overcome electrostatic attraction between aggregative adherence fimbriae and the bacterial surface. Dispersin folds into a β-sandwich structure composed of six β-strands capped with two α-helices ( ).
