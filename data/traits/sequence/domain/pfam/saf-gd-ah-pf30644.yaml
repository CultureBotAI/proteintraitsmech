identifier: Pfam:PF30644
label: Altronate/galactarate dehydratase SAF domain
definition: >-
  This entry represents the SAF domain found in altronate dehydratase UxaA and related proteins. UxaA converts D-altronate into 2-dehydro-3-deoxy-D-gluconate and is part of a bacterial pathway for the degradation of D-galacturonate. D-galactarate dehydratase eliminates water from D-galactarate to yield 5-dehydro-4-deoxy-D-glucarate, initializing the degradation of D-galactarate. The function of the SAF domain in these enzymes is not clear. It may participate in dimerization. This domain can also be found in galactarate dehydratase GarD, which catalyses the dehydration of galactarate to form 5-dehydro-4-deoxy-D-glucarate (5-KDG). The N-terminal SAF domain of GarD has been shown to form a β-clip fold.
