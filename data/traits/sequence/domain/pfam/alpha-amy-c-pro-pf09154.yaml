identifier: Pfam:PF09154
label: Alpha-amylase C-terminal
definition: >-
  This entry represents a C-terminal domain associated with prokaryotic alpha-amylases. It adopts a secondary structure consisting of an eight-stranded antiparallel β-sheet containing a Greek key motif. The function of this domain was studied in the Alpha-amylase from Geobacillus thermoleovorans ( ), showing this region plays an essential role raw starch binding.
