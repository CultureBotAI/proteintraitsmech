identifier: Pfam:PF19633
label: Protein SET DOMAIN GROUP 2 C-terminal
definition: >-
  This domain includes the POST_SET domain located at the C-terminal of SDG2, although there is no significant sequence homology with other Arabidopsis SDGs outside of the SET domain. Histone-lysine N-methyltransferase (ATXR3), also known as SET DOMAIN GROUP 2 (SDG2), is involved in the trimethylation of lysine 4 on histone H3 (H3K4me3), a critical post-translational modification that regulates chromatin structure and gene expression. It is essential for both sporophyte and gametophyte development,. Acting as a diurnal 'writer', it counteracts the nocturnal demethylase activity of JMJ14, thus orchestrating the circadian rhythm of histone modifications like H3K4me3 and modulating the rhythmic expression of target genes that follow a diurnal cycle. This process relies on the circadian clock oscillators CCA1 and LHY to maintain the proper timing of these modifications.
