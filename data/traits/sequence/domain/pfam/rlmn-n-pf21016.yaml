identifier: Pfam:PF21016
label: Ribosomal RNA large subunit methyltransferase N-terminal domain
definition: >-
  This entry represents the N-terminal domain from the dual-specificity RNA methyltransferase RlmN and similar sequences mainly found in bacteria. Dual-specificity RNA methyltransferase RlmN specifically methylates position 2 of adenine 2503 in 23S rRNA, which serves to optimize ribosomal fidelity, and position 2 of adenine 37 in tRNAs. Unmodified tRNA is not a suitable substrate for RlmN, which suggests that RlmN works in a late step during tRNA maturation.
