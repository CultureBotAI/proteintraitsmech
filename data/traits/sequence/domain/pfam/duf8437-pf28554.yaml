identifier: Pfam:PF28554
label: Domain of unknown function (DUF8437)
definition: >-
  This entry represents a domain found in uncharacterised bacterial proteins. It is predicted to fold into a small α/β structure composed of β-hairpin and array of helices packed on it. This domain is usually found associated with a pair of P-loop domains with the typical for helicases arrangement.
