identifier: Pfam:PF27543
label: FimL C-terminal domain
definition: >-
  This entry represents a helical domain in scaffold protein FimL. This domain can be found at the C-terminal or at the N-terminal in this protein. This domain contains a HPT fold. This entry also includes uncharacterised sequences from proteobacteria that are annotated as Chemotaxis protein CheA. FimL regulates multiple virulence functions, including type IV pilus (T4P)-mediated assembly and twitching motility, as well as cAMP-dependent virulence gene expression. It regulates intracellular cyclic AMP (cAMP) levels through the activation of adenylate cyclase CyaB. It also functions as a scaffold linking FimV and PilG at the pole, where type IV pilus (T4P), the Chp chemosensory system, and the CyaB adenylate cyclase interact.
