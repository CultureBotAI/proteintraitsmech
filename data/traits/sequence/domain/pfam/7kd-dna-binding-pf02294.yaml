identifier: Pfam:PF02294
label: 7kD DNA-binding domain
definition: >-
  This family includes DNA-binding protein 7a-e (DN7A-E) from hyperthermophilic archaebacterium. There are five 7kDa DNA-binding proteins, 7a-7e, found as monomers in the cell. These proteins may be involved in maintaining the integrity of the genome at high temperature. DNA-binding protein 7a (also known as Ssoa1) has RNA endonuclease activity with a narrow substrate specificity; the cleavage products are 3'-phosphooligonucleotides. Protein 7e shows the tightest DNA-binding ability. DN7d, also known as Sso7d, is a small chromatin protein that binds to DNA with high affinity in a non-cooperative manner without sequence preference. Sul7d compacts DNA by both DNA bending and bridging which allows DNA to be packaged into highly condensed structures.
