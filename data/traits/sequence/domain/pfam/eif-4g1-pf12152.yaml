identifier: Pfam:PF12152
label: Eukaryotic translation initiation factor 4G1
definition: >-
  The eukaryotic initiation factor 4G (eIF4G) is the core of a multicomponent switch controlling gene expression at the level of translation initiation. It interacts with the small ribosomal subunit interacting protein, eIF3, and the eIF4E/cap-mRNA complex in order to load the ribosome onto mRNA during cap-dependent translation. This entry represents the eIF4E-binding domain superfamily of eIF4G. Binding of this domain to its substrate triggers a coupled folding transition where it forms a right-handed helical ring that wraps around the N terminus of eIF4E.
