identifier: Pfam:PF10543
label: ORF6N domain
definition: >-
  This entry represents an N-terminal DNA-binding domain found in a wide range of proteins from bacterial and eukaryotic DNA viruses and their bacterial homologues, they include the poxvirus D6R/N1R and baculoviral Bro protein families. The KilA-N domain is considered to be homologous to the fungal DNA-binding APSES domain. Both the KilA-N and APSES domains share a common fold with the nucleic acid-binding modules of the LAGLIDADG nucleases and the amino-terminal domains of the tRNA endonuclease. This entry represents the amino-terminal domain of the Enterobacteria phage P22 antirepressor ( ). It is found associated with .
