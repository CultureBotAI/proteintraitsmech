identifier: Pfam:PF17969
label: L,D-transpeptidase C-terminal domain
definition: >-
  This is the C-terminal domain found in L,D-transpeptidases (Ldt) homologues from E.coli. Three of these enzymes (YbiS, ErfK, YcfS) have been shown to cross-link Braun's lipoprotein to the peptidoglycan (PG), while the other two (YnhG, YcbB) form direct meso-diaminopimelate (DAP-DAP, or 3-3) cross-links within the PG. Family members include erfK (ldtA), ybiS (ldtB), ycfS (ldtC), and ynhG (ldtE).
