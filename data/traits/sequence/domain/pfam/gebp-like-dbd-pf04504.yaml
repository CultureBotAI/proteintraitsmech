identifier: Pfam:PF04504
label: Glabrous-enhancer-binding protein-like family, DBD domain
definition: >-
  This entry represents the DNA binding domain (DBD) present in GLABROUS1 enhancer-binding protein (GeBP) and GeBP-like proteins, such as storekeeper and storekeeper-like (STKL) transcription factors. GeBP and GeBP-like proteins play a redundant role in cytokinin hormone pathway regulation. Storekeeper was identified as a B-box motif binding factor that regulates expression of patatin, a storage protein in potato. Storekeeper-like transcription factors STKL1 and STKL2 function as transcription factors in the glucose signalling pathway. The overall predicted structure of this DNA binding domain (DBD) reveals a bundle of four helices, with helices α1 to α3 making up a single myb-type helix-turn-helix (HTH) domain.
