identifier: Pfam:PF31254
label: Alphaherpesvirus DNA polymerase N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in the DNA polymerase catalytic subunit (UL30) from orthoherpesviridae. The domain is approximately 80 residues in length and is located upstream of the exonuclease domain ( ). The full-length DNA polymerase replicates viral genomic DNA and possesses intrinsic ribonuclease H activity that degrades RNA/DNA heteroduplexes in the 5' to 3' direction. However, the specific function of this domain remains to be determined.
