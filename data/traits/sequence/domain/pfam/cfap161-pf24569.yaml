identifier: Pfam:PF24569
label: Cilia- and flagella-associated protein 161-like domain
definition: >-
  This entry represents human Cilia- and flagella-associated protein 161 (CF161) and similar proteins mainly found in animals. CF161 consists of microtubule inner proteins (MIPs) that are integral components of the dynein-decorated doublet microtubules (DMTs) in the axoneme of cilia. These proteins are essential for the proper functioning of motile cilia, as they play a critical role in cilia beating. The coordinated beating of cilia is vital for various physiological processes, including fluid movement across epithelial surfaces, cell motility, and sensory reception.
