identifier: Pfam:PF26992
label: Domain of unknown function (DUF8318)
definition: >-
  This entry represents the domain of unknown function at the N-terminal domain in putative histidine kinases mostly found in bacteria. This domain (VBS) belongs to proteins with a conserved four or five- helix up-and-down bundle structure. This structure is typical of focal adhesion targeting (FAT) domains and is responsible for dimerisation. These proteins are also present in transcriptional regulators where the bundle structure is important for their dynamic conformational equilibrium to control target specificity. The conserved helical bundle architecture enables these proteins to function in protein-protein interactions and regulatory processes. This domain is usually find associated with .
