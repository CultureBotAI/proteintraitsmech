identifier: Pfam:PF29533
label: YLL032C fifth KH domain-containing protein
definition: >-
  This entry represents the fifth KH domain in YLL032C-like proteins found particularly in Saccharomycetaceae and related yeasts. These proteins are involved in RNA binding. The representative protein YLL032C is localised to the cytoplasm and exhibits mRNA binding activity. These proteins undergo phosphorylation and are involved in RNA metabolism. The specific function of these proteins remains to be determined.
