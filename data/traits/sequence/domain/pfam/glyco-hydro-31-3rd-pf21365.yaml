identifier: Pfam:PF21365
label: Glycosyl hydrolase family 31 C-terminal domain
definition: >-
  This entry represents the C-terminal β-sandwich domain of proteins that belong to the glycosyl hydrolase 31 family. Glycosyl hydrolases are key enzymes of carbohydrate metabolism. Family 31 comprises of enzymes that are, or similar to, alpha-galactosidases.
