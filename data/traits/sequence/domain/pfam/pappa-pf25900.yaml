identifier: Pfam:PF25900
label: Pappalysin-1, SD scarf domain, C-terminal
definition: >-
  This entry represents the C-terminal part of the SD scarf domain human Pappalysin-1 (PAPPA) and similar sequences from animals and some bacterial species. PAPPA is a metalloproteinase that specifically cleaves IGFBP-4 and IGFBP-5, resulting in release of bound IGF. This region shows two antiparallel β-sheets.
