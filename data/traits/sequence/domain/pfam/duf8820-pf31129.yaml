identifier: Pfam:PF31129
label: Domain of unknown function (DUF8820)
definition: >-
  This family represents a small domain of approximately 93 amino acids found predominantly in Actinobacteria including Streptomyces, Thermomonosporaceae, and Streptosporangiaceae. The domain is also found in some cyanobacteria. The domain is typically found as the sole domain in uncharacterised proteins and shows genomic context association with DUF6745 domain proteins.
