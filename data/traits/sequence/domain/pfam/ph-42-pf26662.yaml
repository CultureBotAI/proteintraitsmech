identifier: Pfam:PF26662
label: Dictyostelia PH domain-like
definition: >-
  This entry represents a PH domain found in a Phospholipase D C from Dictyostelium discoideum (PldC) and related proteins that also have a phospholipase D domain. PldC plays a role in cell growth, hydrolyses membrane phospholipids and is involved in the inhibition of actin-based motility and endocytosis. Its inhibition causes complete collapse of F-actin organisation.
