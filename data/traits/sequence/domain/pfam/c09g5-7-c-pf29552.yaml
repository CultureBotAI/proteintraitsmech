identifier: Pfam:PF29552
label: Uncharacterized protein C09G5.7 C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in uncharacterized protein C09G5.7 from Caenorhabditis elegans. C09G5.7 is expressed in adult organism and contains multiple disordered regions with compositional bias for basic, acidic, and polar residues. The complete protein shows similarity to other uncharacterised proteins and PHD-type domain-containing proteins across nematodes. The function of this domain remains to be determined.
