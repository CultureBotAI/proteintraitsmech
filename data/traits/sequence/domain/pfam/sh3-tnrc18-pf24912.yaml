identifier: Pfam:PF24912
label: TNRC18-like,(4.1.1) SH3
definition: >-
  This SH3 domain is found immediately N-terminal to the Tudor domain ( ) in human Trinucleotide repeat-containing gene 18 protein (TNRC18), BAH and coiled-coil domain-containing protein 1 (BAHCC1) and similar proteins mainly found in vertebrates and arthropods. TNRC18 is a chromatin regulator that recognises histone H3 lysine 9 to mediate the silencing of endogenous retroviruses class I. BAHCC1 is highly expressed in human acute leukemia and interacts with transcriptional co-repressors.
