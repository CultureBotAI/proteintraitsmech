identifier: Pfam:PF05209
label: Septum formation inhibitor MinC, N-terminal domain
definition: >-
  In Escherichia coli FtsZ ( ) assembles into a Z ring at midcell. Its assembly at polar sites is prevented by the min system. MinC , a component of this system, is an inhibitor of FtsZ assembly that is positioned within the cell by interaction with the MinDE proteins. MinC is an oligomer, probably a dimer. The C-terminal half of MinC is the most conserved and interacts with MinD. The N-terminal half is thought to interact with FtsZ. MinC rapidly oscillates between the poles of the cell to destabilise FtsZ filaments that have formed before they mature into polar Z rings.
