identifier: Pfam:PF18513
label: Prodomain subtilisin 2
definition: >-
  Subtilisin-like protease 2 (Sub2) is a multidomain protein that plays an important role in malaria infection. This domain is a conserved region of the inhibitory prodomain of Sub2 from Plasmodium falciparum, termed prosub2 which has structural similarity to bacterial and mammalian subtilisin-like prodomains.
