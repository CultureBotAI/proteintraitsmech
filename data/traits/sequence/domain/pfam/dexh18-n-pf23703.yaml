identifier: Pfam:PF23703
label: DExH-box ATP-dependent RNA helicase DExH18, N-terminal
definition: >-
  This domain is found at the N-terminal end of DExH-box ATP-dependent RNA helicase DExH18, mitochondrial (also known as SUV3L) from Arabidopsis thaliana, Oryza sativa and similar sequences from plants. DExH18 is a major helicase players in mitochondrial RNA metabolism. It plays a role in the RNA surveillance system in mitochondria; regulates the stability of mature mRNAs, the removal of aberrantly formed mRNAs and the rapid degradation of non coding processing intermediates. This domain is predicted to adopt an all α-helical configuration.
