identifier: Pfam:PF25321
label: PH domain-like
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in animal RAS GTPase-activating proteins, including mouse RAS/RAP GTPase-activating protein SynGAP, RAS protein activator-like 3 (Rasal3), and disabled homolog 2-interacting protein (DAB2IP). This domain likely plays a role in membrane targeting and regulation of RAS-family GTPases. SynGAP is a major constituent of the PSD essential for postsynaptic signalling, an inhibitory regulator of the Ras-cAMP pathway and a member of the NMDAR signalling complex in excitatory synapses. Rasal3 functions as a Ras GTPase-activating protein. It. plays an important role in the expansion and functions of natural killer T (NKT) cells in the liver by negatively regulating RAS activity and the down-stream ERK signalling pathway. Dab2ip functions as a scaffold protein implicated in the regulation of a large spectrum of both general and specialised signalling pathways. It is involved in several processes such as innate immune response, inflammation and cell growth inhibition, apoptosis, cell survival, angiogenesis, cell migration and maturation and also plays a role in cell cycle checkpoint control.
