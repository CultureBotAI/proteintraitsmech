identifier: Pfam:PF27238
label: Uncharacterized protein rrnAC1427, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the uncharacterized protein rrnAC1427 found in archaea. The full-length protein is 369 amino acids with a molecular weight of approximately 37.7 kDa. This domain shows structural similarity to the C-Ala domain found in alanyl-tRNA synthetases, which forms an ancient single-stranded nucleic acid binding motif. rrnAC1427 is found in Haloarcula marismortui and related halophilic archaeal species. The specific function of this domain remains to be determined.
