identifier: Pfam:PF24528
label: Adhesion G-protein coupled receptor F3-like, Ig-like domain
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in human Adhesion G-protein coupled receptor F3 (ADGRF3) and similar proteins from vertebrates. ADGRF3 is an orphan receptor. In homo sapiens, ADGRF3 is a receptor for soluble FNDC4 (sFNDC4), required for proper systemic glucose tolerance, specifically sensitising white adipose tissue to insulin. The adhesion GPCR (aGPCR) family plays critical physiological functions in the human immune system, central nervous system, cellular communication, reproduction, organ development, homeostasis, and other processes As the second largest group in the GPCR superfamily, aGPCRs are differentiated from other GPCRs by a large extracellular region (ECD) that contains a tandem adhesion domain, followed by the SEA domain , a conserved GPCR autoproteolysis-inducing (GAIN) domain (GAIN A and GAIN B ) juxtaposed to a canonical seven-transmembrane domain (7TM) ( ). Most aGPCRs are orphan receptors with few known ligand associations identified. The synthesised Stachel peptide is capable of activating aGPCRs, suggesting that the Stachel peptide plays a critical role in aGPCR activation.
