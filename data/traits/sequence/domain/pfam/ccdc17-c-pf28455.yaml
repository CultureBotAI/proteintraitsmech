identifier: Pfam:PF28455
label: CCDC17 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of CCDC17 (coiled-coil domain-containing protein 17) from animals. This domain follows the coiled-coil region and contains a disordered region with basic and acidic residues. The specific function of this C-terminal domain remains to be determined. CCDC17 contains multiple coiled-coil regions, with this middle domain representing the largest coiled-coil region in the protein. The full-length protein interacts with various cellular proteins including GOLGA2, keratins, and cytoskeletal components. CCDC17 shows tissue-enriched expression in fallopian tube.
