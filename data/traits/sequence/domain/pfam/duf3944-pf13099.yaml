identifier: Pfam:PF13099
label: Domain of unknown function (DUF3944)
definition: >-
  This entry represents the N-terminal domain of UPF0174 proteins, including YaaW, HP_1588, and jhp_1494. The YaaW gene overlaps with the mbiA open reading frame on the opposite strand, meaning that disruptions to either gene typically affect the other as well.
