identifier: Pfam:PF15238
label: Omega loop, TEAD interacting region 3
definition: >-
  This entry represents the third TEAD interacting region (omega loop) present in YAP/TAZ, FAM181, and PERCC1 families. This conserved region is remotely related to the omega loop found in the Vestigial family (VGLL2 and VGLL3).
