identifier: Pfam:PF29749
label: SPC25 C-terminal domain
definition: >-
  This entry represents the C-terminal globular domain of kinetochore protein SPC25 from Saccharomyces species. This domain is found downstream of the coiled-coil region in SPC25 family proteins. The domain forms part of the SPC24-SPC25 subcomplex within the essential NDC80 complex. SPC25 acts as a component of the NDC80 complex, which is involved in chromosome segregation and spindle checkpoint activity. The NDC80 complex has a rod-like structure with globular domains at either end, with the SPC24-SPC25 globular domains directed towards the centromere. The SPC25 protein localises to kinetochores and interacts with SPC24, NDC80 and NUF2. The specific function of this domain remains to be determined.
