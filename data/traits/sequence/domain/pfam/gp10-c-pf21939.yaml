identifier: Pfam:PF21939
label: Baseplate structural protein Gp10, C-terminal domain
definition: >-
  This entry represents the C-terminal domain (CTD) of baseplate structural protein Gp10 that assembles into trimeric structures. The core structure and assembly of Gp10 has structural similarity to that of the head domain of Gp11 and the receptor binding domain of Gp12. The monomeric CTD of Gp10 consists of an α-helix followed by a three-stranded, antiparallel β-sheet, which is almost perpendicular to the helix. The three symmetry related β-sheets interact with their first β-strands in the trimer, thus creating a flower-like arrangement with the α-helices being the flower stem and the three β-sheets being the petals. Interestingly, this domain is also identified in proteins found in Trichomonas.
