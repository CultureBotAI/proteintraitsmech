identifier: Pfam:PF22505
label: Ribonuclease J, beta-CASP domain
definition: >-
  This domain is found in Ribonuclease J from Thermus thermophilus (RNaseJ) and similar prokaryotic proteins. RNaseJ is an RNase that has endonuclease and possibly 5'-3' exonuclease activity. It is probably involved in maturation of rRNA and in some organisms also mRNA maturation and/or decay. This protein shows three globular domains: the beta-lactamase core (formed by two separate regions, and ), the beta-CASP (this entry) and the C-terminal domain ( ). This domain consists of a central five-stranded parallel β-sheet that is surrounded by five α-helices.
