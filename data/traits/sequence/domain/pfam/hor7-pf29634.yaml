identifier: Pfam:PF29634
label: Hyperosmolarity-responsive protein HOR7
definition: >-
  This entry represents the HOR7 protein. HOR7 is a hyperosmolarity-responsive protein involved in stress response. The family also includes DDR2, a multistress response protein. These are small proteins that respond to osmotic and other cellular stresses. The proteins are synthesised as precursors and are found in Saccharomyces cerevisiae and related fungi.
