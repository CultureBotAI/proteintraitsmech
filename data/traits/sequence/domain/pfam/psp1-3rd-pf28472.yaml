identifier: Pfam:PF28472
label: PSP1-like protein, third domain
definition: >-
  This entry represents the third domain of PSP1-like proteins, exemplified by YaaT from Bacillus subtilis. YaaT is essential for the phosphorelay during initiation of sporulation and may control the level of phosphorylated Spo0A through Spo0E activity. This domain spans approximately residues 176-218 in YaaT and is found between the central PSP1 domain ( ) and the C-terminal region. The protein localises throughout the cell periphery and division septum during vegetative growth, appearing as discrete foci during sporulation stages. This domain is conserved across bacterial PSP1-like proteins involved in sporulation and stress response pathways.
