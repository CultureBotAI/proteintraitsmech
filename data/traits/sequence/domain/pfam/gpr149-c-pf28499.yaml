identifier: Pfam:PF28499
label: G-protein coupled receptor 149 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of G-protein coupled receptor 149 (GPR149), an orphan receptor belonging to the G-protein coupled receptor 1 family. GPR149 is a seven-transmembrane domain protein localised to the cell membrane and acts as a probable neuropeptide receptor. The full-length protein contains an extracellular N-terminal region, seven transmembrane helices, and a large middle and C-terminal cytoplasmic domain. This C-terminal domain is predicted to contain an helical fold. The protein is expressed in brain and testis, and in the rat is induced during astrocyte differentiation. The specific function of this C-terminal domain remains to be determined.
