identifier: Pfam:PF08214
label: Histone acetyltransferase KAT11-type domain
definition: >-
  Rtt109, also known as KAT11, is fungal-specific histone acetyltransferase (HAT) that modifies histone H3 lysine 56 (H3K56) to promote genome stability and resistance to a variety of DNA-damaging agents. Rtt109 does not show sequence conservation with other known HATs and depends on association with either of two histone chaperones, Asf1 or Vps75, for HAT activity. Rtt109-type HAT domain consists of a core HAT subdomain, which binds the acetyl-CoA cofactor. A second subdomain, the activation subdomain, is tightly associated with the HAT subdomain. Autoacetylation of a lysine within the activation subdomain is required for stabilising the interaction between the two subdomains and is essential for catalysis. The Rtt109-type HAT domain contains eight β strands and nine α helices and displays mixed three-layered α/β architecture with eight β strands sandwiched by five α helices (α1-α5) from one side, and four α helices (α6-α9) from the other side.
