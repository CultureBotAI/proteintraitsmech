identifier: Pfam:PF03479
label: Plants and Prokaryotes Conserved (PCC) domain
definition: >-
  The Plants and Prokaryotes Conserved (PPC) domain contains a hydrophobic region in the C-terminal, and in the case of plants, is often found in several proteins with the AT-hook motif. Proteins with PPC domains are found in Bacteria, Archaea and the plant kingdom. The PPC domain has a single α-helix packed against an antiparallel β-sheet, which is formed by five β-strands. Three conserved histidine residues appear to form a zinc-binding site, and the domain has been observed to form homotrimers. The domain co-occurs with a thioredoxin-like domain in uncharacterised cyanobacterial proteins.
