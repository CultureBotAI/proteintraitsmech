identifier: Pfam:PF17304
label: Mitochondrial outer membrane protein OM14, C-terminal
definition: >-
  This entry includes Mitochondrial outer membrane protein OM14 from yeast and similar fungal sequences. OM14 is a mitochondrial membrane receptor for cytosolic ribosomes. It interacts with the nascent chain-associated complex (NAC) bound to ribosomes, contributing to co-translational mitochondrial import. This entry represents two transmembrane helices found at the C-terminal of OM14.
