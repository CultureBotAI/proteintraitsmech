identifier: Pfam:PF12897
label: Aspartate amino-transferase
definition: >-
  Aminotransferases (ATs) are pyridoxal phosphate (PLP)-dependent enzymes that catalyze the reversible transfer of nitrogen from an amino donor to a keto acid amino acceptor. ATs have been classified into five classes by evolutionary relationship. Aspartate aminotransferase (AspAT) belongs to class I ATs. AspAT catalyzes the reaction from L-glutamate and oxaloacetate to L-aspartate and alpha-ketoglutarate.
