identifier: Pfam:PF13089
label: Polyphosphate kinase N-terminal domain
definition: >-
  Polyphosphate kinase (PPK) catalyses the formation of polyphosphate from ATP, with polyphosphate chain lengths of up to a thousand or more orthophosphate molecules. This entry represents the PPK N-terminal domain, which consists of three α helices.
