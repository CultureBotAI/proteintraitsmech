identifier: Pfam:PF09092
label: Lyase, N terminal
definition: >-
  This entry represents a domain predominantly found in chondroitin ABC lyase I, adopting a jelly-roll fold topology consisting of a two-layered bent β-sheet sandwich with one short α-helix. The convex β sheet is composed of five antiparallel strands, whilst the concave β-sheet contains five antiparallel β-strands with a loop between two consecutive strands folding back onto the concave surface. This domain is required for binding of the protein to long glycosaminoglycan chains.
