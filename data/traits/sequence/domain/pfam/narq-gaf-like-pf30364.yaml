identifier: Pfam:PF30364
label: Nitrate/nitrite sensor histidine kinase, GAF-like domain
definition: >-
  This entry represents a GAF-like domain found in NarQ and NarX nitrate/nitrite sensor histidine kinases from Gammaproteobacteria. NarQ and NarX are functionally redundant sensors that detect nitrate and nitrite availability, transducing signals to the NarL and NarP response regulators to control anaerobic respiratory gene expression. This domain is located between the periplasmic sensor domain ( ) and the HAMP domain ( ), forming part of the cytoplasmic signalling module. The domain is termed GAF-like because it shares structural similarity with GAF domains but is not well recognised by standard domain annotation. Some NarQ homologues from Planctomycetes lack this domain entirely.
