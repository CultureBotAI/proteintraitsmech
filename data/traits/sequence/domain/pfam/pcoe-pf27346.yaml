identifier: Pfam:PF27346
label: Probable copper-binding protein PcoE
definition: >-
  This entry represents Silver-binding protein SilE and PcoE proteins found in Escherichia and related Enterobacteriaceae. The proteins are typically around 144 amino acids in length and are localised to the periplasm. PcoE is a copper-binding protein required for copper-inducible expression of copper resistance. The protein is activated by the two-component regulatory system CusS/CusR and shows similarity to SilE from Salmonella typhimurium. PcoE contains a C-terminal disordered region rich in polar and charged residues. Silver-binding protein SilE is a component of the Sil cation-efflux system that provides resistance to silver. SilE functions as a periplasmic molecular sponge for silver ions, capable of binding up to 38 Ag+ ions. It shares approximately 48% sequence identity with the periplasmic copper-binding protein PcoE, which is known to bind both silver and copper.
