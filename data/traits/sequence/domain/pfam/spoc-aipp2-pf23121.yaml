identifier: Pfam:PF23121
label: AIPP2, SPOC-like domain
definition: >-
  This entry represents the SPOC-like domain found at the C-terminal of PHD-containing proteins present in plants, including ASI1-immunoprecipitated protein 2 (AIPP2 or PHD3) and PHD finger-containing protein 1/6 from Arabidopsis thaliana. Together with AIPP3/BDT1, these proteins cooperate to form a BAH-PHD bivalent histone reader complex able to read histone H3 lysine 27 trimethylation (H3K27me3) and low-methylated H3K4 histone marks in order to regulate transcription, especially to prevent early flowering. This domain might be involved in protein interactions.
