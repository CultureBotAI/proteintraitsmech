identifier: Pfam:PF30371
label: Hydrogenase-4 component I, C-terminal domain
definition: >-
  This entry represents a small C-terminal helical domain found in hydrogenase-4 component I (HyfI) and the related formate hydrogenlyase subunit HycG. These proteins belong to the complex I 20 kDa subunit family and contain an N-terminal NADH:ubiquinone oxidoreductase domain ( ) followed by this C-terminal domain. HyfI is part of the putative proton-translocating formate hydrogenlyase system encoded by the hyf operon. The structure of the formate hydrogenlyase complex has been determined. This family is found predominantly in Gammaproteobacteria, with some members in Bacillati. The specific function of this C-terminal domain remains to be determined.
