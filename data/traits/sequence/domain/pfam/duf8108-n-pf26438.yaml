identifier: Pfam:PF26438
label: Domain of unknown function (DUF8108) N-terminal domain
definition: >-
  This entry represents the N-terminal domain from a family of uncharacterised proteins from halophilic archaea and some bacterial species. Proteins in this family are typically between 150 and 350 amino acids in length. They are predicted to be membrane-associated, as suggested by the presence of two transmembrane helices in the central domain .
