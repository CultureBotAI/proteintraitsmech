identifier: Pfam:PF22995
label: BIRD-IDD transcription factor, third C2HC zinc finger
definition: >-
  This C2HC zinc finger domain is found in the plant BIRD/INDETERMINATE DOMAIN (IDD) transcription factor family. Members of this BIRD/IDD family such as JACKDAW (JKD)/IDD10, BALDIBIS (BIB), MAGPIE (MGP)/IDD3 are required for asymmetric cell division of ground tissue and QC specification by direct protein-protein interaction with SHR and/or SCR to control ground tissue patterning during root growth. SHR-SCR functions as a transcription cofactor by binding to the zinc finger domains of these transcription factors. Members of the BIRD/IDD family contain 4 zinc finger domains, two classical C2H2 followed by two C2HC zinc finger domains. This entry represents the third C2HC zinc finger domain that is involved in interaction with SHR-SCR and in DNA binding.
