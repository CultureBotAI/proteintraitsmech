identifier: Pfam:PF29902
label: YibE/F family N-terminal domain
definition: >-
  This entry represents the N-terminal domain of YibE/F family proteins found in Bacillota bacteria including Bacilli and Clostridia. YibE/F proteins are multitransmembrane proteins with this N-terminal domain and a C-terminal YibE_F domain ( ). The specific function of this N-terminal domain remains to be determined.
