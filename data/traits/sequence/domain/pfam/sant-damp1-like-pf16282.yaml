identifier: Pfam:PF16282
label: SANT/Myb-like domain of DAMP1
definition: >-
  This domain, approximately 90 residues, is mainly found in DNA methyltransferase 1-associated protein 1 (DAMP1), which plays an important role in development and maintenance of genome integrity in various mammalian species. It mainly consists of tandem repeats of three α-helices that are arranged in a helix-turn-helix motif and shows a structural similarity with SANT domain and Myb DNA-binding domain, indicating it contains a putative DNA-binding site.
