identifier: Pfam:PF21133
label: CCA-adding enzyme, C-terminal domain
definition: >-
  Archaeal CCA-adding enzyme builds and repairs the 3'-end of tRNA. This is the C-terminal domain (tail) of CCA-adding enzyme, which serves as a ruler to ensure that only tRNAs and tRNA-like transcripts are substrates for the enzyme and also contributes to the discrimination between stable and unstable RNA substrates.
