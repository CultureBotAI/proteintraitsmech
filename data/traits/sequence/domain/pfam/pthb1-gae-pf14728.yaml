identifier: Pfam:PF14728
label: PTHB1 GAE domain
definition: >-
  This entry represents the gamma-adaptin ear (GAE) domain of PTHB1 protein. PTHB1 (also known as Bardet-Biedl syndrome 9 protein, BBS9) forms a part of the BBSome complex, which is required for ciliogenesis. PTHB1 is the major binding subunit of the IFT38 C-terminal tail, which assists the BBSome in some of its roles.
