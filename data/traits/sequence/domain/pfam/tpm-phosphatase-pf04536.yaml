identifier: Pfam:PF04536
label: TPM domain
definition: >-
  TPM domain is named after its founding proteins: TLP18.3, Psb32 and MOLO-1. In Arabidopsis, this domain is called the thylakoid acid phosphatase -TAP - domain and has a Rossmann-like fold. In plants, the family resides in the thylakoid lumen attached to the outer membrane of the chloroplast/plastid. It is active in the photosystem II. In C. elegans, the MOLO-1 protein is an auxiliary subunit that positively modulates the gating of levamisole-sensitive acetylcholine receptors.
