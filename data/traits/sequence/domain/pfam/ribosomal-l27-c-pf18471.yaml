identifier: Pfam:PF18471
label: Ribosomal L27 protein C-terminal domain
definition: >-
  This is the C-terminal domain of the large ribosomal subunit protein bL27m (also known as 54S ribosomal protein L2) found in yeast. bL27 C-terminal region interacts with an expansion segment of 21S rRNA to form part of the central protuberance.
