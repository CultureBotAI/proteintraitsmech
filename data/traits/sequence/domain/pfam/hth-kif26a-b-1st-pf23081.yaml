identifier: Pfam:PF23081
label: Kinesin-like protein KIF26A/B, tri-helical
definition: >-
  This domain is found in the kinesin-like protein KIF26A/B from Mus musculus and similar sequences mainly found in vertebrates. KIF26A plays a key role in enteric neurone development, while KIF26B is essential for embryonic kidney development. This domain is predicted to form an α-helical bundle. Kinesin is a microtubule-associated force-producing protein that play a role in organelle transport. The kinesin motor activity is directed toward the microtubule's plus end. Kinesin is an oligomeric complex composed of two heavy chains and two light chains. The maintenance of the quaternary structure does not require interchain disulphide bonds.
