identifier: Pfam:PF02291
label: Transcription initiation factor IID, 31kD subunit
definition: >-
  Human transcription initiation factor TFIID is composed of the TATA-binding polypeptide (TBP) and at least 13 TBP-associated factors (TAFs) that collectively or individually are involved in activator-dependent transcription. This entry represents the N terminus of the 31kDa subunit (42kDa in Drosophila) of transcription initiation factor IID (TAFII31), also known as transcription initiation factor TFIID subunit 9 (TAF9). It has been shown that TAF9 interacts directly with different transcription factors such as p53, herpes simplex virus activator vp16 and the basal transcription factor TFIIB. Binding to p53 is an essential requirement for p53 mediated transcription activation. TAF9 is a component other TBP-free TAF complexes containing the GCN5-type histone acetyltransferase. Several TAFs interact via histone-fold (HFD) motifs; HFD is the interaction motif involved in heterodimerization of the core histones and their assembly into nucleosome octamers. The minimal HFD contains three α-helices linked by two loops and is found in core histones, TAFS and many other transcription factors. TFIID has a histone octamer-like substructure. TFIID has a histone octamer-like substructure. TAF9 is a shared subunit of both, histone acetyltransferase complex (SAGA) and TFIID complexes. TAF9 domain interacts with TAF6 to form a novel histone-like heterodimer that is structurally related to the histone H3 and H4 oligomer.
