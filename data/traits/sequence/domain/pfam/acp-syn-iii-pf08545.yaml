identifier: Pfam:PF08545
label: 3-Oxoacyl-[acyl-carrier-protein (ACP)] synthase III
definition: >-
  This entry represents the N-terminal domain in beta-ketoacyl-[acyl-carrier-protein] synthase III (also known as 3-Oxoacyl-[acyl-carrier-protein (ACP)] synthase III), the enzyme responsible for initiating the chain of reactions of the fatty acid synthase in plants and bacteria. Beta-ketoacyl-[acyl-carrier-protein] synthase III (FabH; ) catalyses the initial condensation reaction of type II fatty acid biosynthesis, condensing acetyl-CoA with malonyl-ACP to form acetoacetyl-ACP. This enzyme is essential for bacterial fatty acid synthesis and plays a key role in governing the total rate of fatty acid production. The substrate specificity of FabH determines whether bacteria synthesise branched-chain or straight-chain fatty acids: while Escherichia coli FabH preferentially uses acetyl-CoA to produce straight-chain fatty acids, FabH homologues in Gram-positive bacteria such as Bacillus subtilis and Listeria can utilise iso- and anteiso-branched-chain acyl-CoA primers. The enzyme functions as a homodimer and possesses both acetoacetyl-ACP synthase and acetyl transacylase activities.
