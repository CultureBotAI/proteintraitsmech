identifier: Pfam:PF30193
label: ATG40 autophagy protein N-terminal domain
definition: >-
  This entry represents ATG40 autophagy and related proteins. This domain is found in autophagy-related proteins from fungi, particularly in the Saccharomycetaceae family. The proteins are precursors involved in autophagy processes. The function of this family remains to be determined.
