identifier: Pfam:PF13847
label: Methyltransferase domain
definition: >-
  This domain represents a methyltransferase domain in various proteins including: Release factor glutamine methyltransferase Arsenite methyltransferase Glutathione S-transferase Carboxy-S-adenosyl-L-methionine synthase Release factor glutamine methyltransferases methylate the class 1 translation termination release factors RF1/PrfA and RF2/PrfB on the glutamine residue of the universally conserved GGQ motif.
