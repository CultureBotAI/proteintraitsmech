identifier: Pfam:PF30487
label: Ropporin middle domain
definition: >-
  This entry represents the middle domain of ropporin family proteins, including ROPN1, ROPN1L and ROPN1B. The C-terminal region of ropporins contains the binding site for rhophilin (RHPN1). Ropporin proteins are components of axonemal radial spoke complexes and localise to the fibrous sheath of sperm flagella. They are important for male fertility, being involved in fibrous sheath integrity, sperm motility and PKA-dependent signalling during spermatozoa capacitation. The family is restricted to vertebrates and is expressed predominantly in testis.
