identifier: Pfam:PF18139
label: SLOG in TRPM
definition: >-
  This entry represents the SLOG-like domain found in several eukaryotic channels including diverse ciliate channels and the TRPM class of animal ion channels. The SLOG (SMF/DprA-LOG) domain adopts a three-layered α/β sandwich Rossmannoid fold. It is positioned near the N terminus of all TRPM channels and is predicted to play a regulatory role for the channel in potentially recognizing a universal nucleotide or nucleotide-derived ligand.
