identifier: Pfam:PF24533
label: Ada2b-like, C-terminal tri-helical domain
definition: >-
  This domain is found at the C-terminal of Transcriptional adapter 2B from Drosophila melanogaster (Ada2b) and similar animal proteins. Ada2b is required for the function of some acidic activation domains, which activate transcription from a distant site. This domain is predicted to show a tri-helical structure.
