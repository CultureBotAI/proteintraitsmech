identifier: Pfam:PF10779
label: Haemolysin XhlA
definition: >-
  Haemolysin XhlA from Bacillus subtilis is a cell-surface associated haemolysin that lyses the two most prevalent types of insect immune cells (granulocytes and plasmatocytes) as well as rabbit and horse erythrocytes. This entry also includes Holin-like protein 24.1 from Bacillus phage SPP1. Protein 24.1 may act like holin that it triggers the formation of micron-scale pores (holes) after reaching a critical concentration in the membrane.
