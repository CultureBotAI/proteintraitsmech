identifier: Pfam:PF26659
label: Dual oxidase PH domain
definition: >-
  This entry represents a PH-like domain found in dual oxidase animal proteins. This group of proteins is involved in generating hydrogen peroxide, which is crucial for the activity of thyroid peroxidase and lactoperoxidase, playing a significant role in thyroid hormone synthesis and antimicrobial defence at mucosal surfaces. Members of this family may possess their own peroxidase activity through an N-terminal peroxidase-like domain. In various organisms, these proteins contribute to innate immunity by limiting microbial proliferation and inducing reactive oxygen species production in response to infections. Additionally, some members are involved in cuticle biogenesis and stabilisation of the extracellular matrix in certain species. Dual oxidases typically form heterodimers or interact with other proteins to modulate their activity and function.
