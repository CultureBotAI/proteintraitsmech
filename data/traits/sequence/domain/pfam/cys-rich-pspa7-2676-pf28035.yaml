identifier: Pfam:PF28035
label: Cys-rich small protein PSPA7_2676-like
definition: >-
  Members of this family are small proteins, averaging 47 amino acids in length with four invariant Cys residues (two in a CxxC motif) and typically six overall. The richness in Cys residues, as in the motif CxCCxxC motif found in many members, suggests metal-binding activity.
