identifier: Pfam:PF31158
label: AICE RepA C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 100 residues found in ATP-binding replication proteins associated with AICEs (Actinomycete Integrative and Conjugative Elements) in Actinomycetes, particularly Streptomycetaceae. Some proteins also contain the Prim-Pol domain ( ). These proteins function in the replication of integrating plasmids and conjugative elements such as SLP1 in Streptomyces coelicolor.
