identifier: Pfam:PF14099
label: Polysaccharide lyase
definition: >-
  This family includes heparin lyase I ( ). Heparin lyase I depolymerises heparin by cleaving the glycosidic linkage next to an iduronic acid moiety. The structure of heparin lyase I consists of a β-jelly roll domain with a long, deep substrate-binding groove and an unusual thumb domain containing many basic residues extending from the main body of the enzyme. This family also includes glucuronan lyase, ( ). The structure glucuronan lyase is a β-jelly roll.
