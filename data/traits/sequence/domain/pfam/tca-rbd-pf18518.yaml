identifier: Pfam:PF18518
label: TcA receptor binding domain
definition: >-
  Tc toxin complexes are virulence factors of many bacteria such as the insect pathogen Photorhabdus luminescens. Tc toxins are composed of TcA, TcB and TcC subunits. TcA forms a large bell-shaped pentameric structure and enters the membrane like a syringe, forming a translocation channel through which the cytotoxic domain is probably transported into the cytoplasm. TcA has four receptor-binding domains. This domain is one of 4 receptor binding domains found in TcA. All four domains have an immunoglobulin (Ig)-like β-sandwich fold of two sheets with antiparallel β-strands. The domains are structurally reminiscent of the receptor-binding domains of the diphtheria and anthrax toxins.
