identifier: Pfam:PF29139
label: Domain of unknown function (DUF8505)
definition: >-
  This entry represents a helical domain found in association with a G domain (also known as MMR_HSR1 or GTP-binding domain), a conserved nucleotide-binding domain that typically binds GTP. This domain is found predominantly in fungal species across both Basidiomycota and Ascomycota phyla. The function of this domain is unknown. Structure predictions suggest it may adopt a HTH fold.
