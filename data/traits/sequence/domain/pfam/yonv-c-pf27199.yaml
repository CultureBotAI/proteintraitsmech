identifier: Pfam:PF27199
label: YonV C-terminal Rossmann-like domain
definition: >-
  This entry represents the C-terminal domain of YonV, an uncharacterised protein from Bacillus subtilis. YonV is a 410 amino acid protein (gene BSU20980) derived from the SPbeta prophage in Bacillus subtilis strain 168. This domain adopts a Rossmann-like fold, which is typically associated with nucleotide binding. The protein is found in bacterial species and is associated with prophage elements. The specific function of this domain remains to be determined.
