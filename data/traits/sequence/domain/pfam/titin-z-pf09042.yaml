identifier: Pfam:PF09042
label: Titin Z
definition: >-
  This entry represents the Z-repeat (approximately 45 amino acid sequences) found in the N terminus of titin. The Z-repeat recognises and binds to the C-terminal calmodulin-like domain of alpha-actinin-2 (Act-EF34). It adopts a helical structure, and binds in a groove formed by the two planes between the helix pairs of Act-EF34. This interaction is essential for sarcomere assembly.
