identifier: Pfam:PF25277
label: Domain of unknown function (DUF7871)
definition: >-
  This entry represents Copper metallothionein A from Aspergillus fumigatus (CmtA) and similar fungal proteins. CmtA is a copper-binding metallothionein that has a minor role in copper resistance and can bind mononuclear Fe2+, Zn2+, and Cu+. In addition, it binds and receives an iron-sulfur (Fe/S) cluster from the monothiol glutaredoxin GrxD and thus represents a unique class of fungal metallothioneins that functionally interact with iron-sulfur (Fe/S) cluster trafficking and storage proteins.
