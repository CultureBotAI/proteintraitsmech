identifier: Pfam:PF25888
label: DnaB N-terminal winged helix domain
definition: >-
  This entry represents the N-terminal winged helix domain (WHD) of Replicative helicase loading/DNA remodeling protein DnaB from Bacillus subtilis and similar sequences mainly found in firmicutes. DnaB is involved in both the initiation of replication at oriC and in replication restart of stalled replication forks as part of the primosome complex. The protein functions along with DnaD and DnaI to load the DnaC helicase onto DNA, with different mutations in the C-terminal region affecting this loading activity. Mutations in this protein can suppress defects in the primosome protein PriA, particularly in the C-terminal region between residues 327 and 404. DnaB is essential for chromosome replication initiation and membrane attachment.
