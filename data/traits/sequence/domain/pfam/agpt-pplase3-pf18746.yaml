identifier: Pfam:PF18746
label: Alpha-glutamyl/putrescinyl thymine pyrophosphorylase clade 3
definition: >-
  This entry represents an α helical domain related to the α-helical DNA glycosylases, predicted to catalyze the in situ synthesis of hypermodified bases such as alpha-glutamyl, putrescinyl thymine, 5-(2-aminoethoxy)methyluridine or 5-(2-aminoethyl)uridine. The enzyme is predicted to utilize a high-energy pyrophosphate DNA base intermediate which is subject to a nucleophilic attack by the modifying moiety. It is mainly found in bacterial mobile operons.
