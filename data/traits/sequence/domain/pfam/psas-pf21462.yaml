identifier: Pfam:PF21462
label: Ph 6 antigen
definition: >-
  This entry represents a family of proteins from Yersinia, including Fimbrial protein MyfA from Yersinia enterocolitica (also known as Myf antigen) and the ph 6 antigen from Yersinia pestis (PsaA, also known as adhesin or antigen 4). MyfA is a major pilus subunit that is expressed only in pathogenic serotypes. PsaA is part of fimbriae, necessary for full virulence. It mediates bacterial attachment to alveolar cells of the lung.
