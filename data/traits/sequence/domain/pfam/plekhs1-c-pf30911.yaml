identifier: Pfam:PF30911
label: PLEKHS1 C-terminal domain
definition: >-
  This entry represents a domain found near the C-terminal of PLEKHS1 (pleckstrin homology domain-containing family S member 1) proteins from animals. PLEKHS1 proteins contain an N-terminal PH domain ( ) followed by this domain and a disordered C-terminal region. The function of this domain remains to be determined.
