identifier: Pfam:PF02962
label: 5-carboxymethyl-2-hydroxymuconate isomerase
definition: >-
  5-carboxymethyl-2-hydroxymuconate isomerase transforms 5-carboxymethyl-2-hydroxy-muconic acid into 5-oxo-pent-3-ene-1,2,5-tricarboxylic acid during the third step of the homoprotocatechuate catabolic pathway. Homoprotocatechuate (HPC; 3,4-dihydroxyphenylacetate) is catabolized to Krebs cycle intermediates via extradiol (meta-) cleavage and the necessary enzymes are chromosomally encoded in a variety of bacteria. 5-carboxymethyl-2-hydroxymuconate isomerase is probably a dimer of two identical subunits. A comparison of the N-terminal half of the isomerase/decarboxylase sequence from the pathway (both encoded by the gene hpcE), with the second half showed significant similarity. This suggests that a duplication may have occurred to produce a bifunctional gene.
