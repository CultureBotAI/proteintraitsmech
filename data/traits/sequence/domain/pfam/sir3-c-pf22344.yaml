identifier: Pfam:PF22344
label: Regulatory protein SIR3, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Regulatory protein SIR3 from Saccharomyces cerevisiae and similar fungal proteins. SIR3 is essential for gene silencing. It is organised into a highly conserved N-terminal BAH domain ( ), a C-terminal AAA+ ATPase-like domain ( ), plus an extreme C-terminal domain (this entry). This domain form a winged helix-turn-helix (HTH) variant with a strong homodimerization function but without the ability to bind DNA.
