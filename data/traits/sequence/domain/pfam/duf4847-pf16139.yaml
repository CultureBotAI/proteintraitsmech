identifier: Pfam:PF16139
label: Domain of unknown function (DUF4847)
definition: >-
  Uncharacterised proteins in this family conserved in Bacteroidetes are similar to Shigella flexneri MxiM, a pilot protein for S. flexneri MxiD, an outer membrane (OM)-associated ring-forming secretin and component of the type-III secretion system. MxiM, also an OM protein, binds lipids and MxiD. This subgroup belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large β-barrel ligand-binding cavity.
