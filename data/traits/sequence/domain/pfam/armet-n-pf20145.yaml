identifier: Pfam:PF20145
label: ARMET, N-terminal
definition: >-
  This entry represents the N-terminal domain of ARMET. ARMET, also known as mesencephalic astrocyte-derived neurotrophic factor (MANF) or arginine-rich protein, is a small protein of approximately 170 residues which contains four di-sulphide bridges that are highly conserved from nematodes to humans. It is a soluble protein resident in the endoplasmic reticulum and induced by ER stress. It appears to be involved with dealing with mis-folded proteins in the ER, thus in quality control of ER stress. ARMET from Rattus norvegicus (Rat) selectively promotes the survival of dopaminergic neurons of the ventral mid-brain. It modulates GABAergic transmission to the dopaminergic neurons of the substantia nigra, and enhances spontaneous, as well as evoked, GABAergic inhibitory postsynaptic currents in dopaminergic neurons. Proteins containing this domain includes the related neurotrophic factor CDNF (cerebral dopamine neurotrophic factor).
