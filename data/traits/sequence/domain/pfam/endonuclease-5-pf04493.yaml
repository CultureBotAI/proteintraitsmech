identifier: Pfam:PF04493
label: Endonuclease V
definition: >-
  This entry includes Endonuclease V from bacteria and eukaryotes which cleaves the second phosphodiester bond 3' to a deaminated adenosine (inosine). In bacteria, it is specific for single-stranded DNA, for duplex DNA that contains uracil, or that is damaged. Despite being highly conserved, EndoV homologues change substrate preference from DNA in bacteria to RNA in eukaryotes. In eukaryotes, EndoV is an endoribonuclease that specifically cleaves inosine-containing RNAs: cleaves RNA. There are several isoforms that are active against both single-stranded and double-stranded RNAs. For instance, isoform 1 cleaves mRNAs and tRNAs containing inosine and it is also able to cleave structure-specific dsRNA substrates containing the specific sites 5'-IIUI-3' and 5'-UIUU-3', while isoforms 6 and 7 cleave tRNAs containing inosine. This endonuclease also appears in bifunctional enzymes, such as the bifunctional methyltransferase/endonuclease in Thermoplasma acidophilum.
