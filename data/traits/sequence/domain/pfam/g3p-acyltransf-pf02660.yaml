identifier: Pfam:PF02660
label: Glycerol-3-phosphate acyltransferase
definition: >-
  PlsY is a glycerol-3-phosphate acyltransferase (GPAT) ( ) that catalyses the transfer of an acyl group from acyl-ACP to glycerol-3-phosphate to form lysophosphatidic acid (LPA). During this process, PlsY utilises a novel acyl-donor, acyl-phosphate produced by PlsX. In some bacteria, the PlsX/Y system plays a major part at the initial stage of glycerolipid synthesis. However, in E. coli, the other GPAT, PlsB (described in ) is also involved in this process.
