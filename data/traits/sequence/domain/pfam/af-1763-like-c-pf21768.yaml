identifier: Pfam:PF21768
label: AF_1763-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal of a group of prokaryotic proteins, including the putative lipase AF_1763 from Archaeoglobus fulgidus. This protein contains a C-terminal lipid binding domain, which is formed by two layers of seven β-strands. This entry represents the second half of this domain.
