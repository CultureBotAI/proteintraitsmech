identifier: Pfam:PF07945
label: Janus-atracotoxin
definition: >-
  This family represents insect-selective, excitatory neurotoxins known as Janus atracotoxins or Lambda-hexatoxins, including the peptides secreted by the spider Hadronyche versuta (Blue mountains funnel-web spider) ( , , ). These toxins selectively inhibit invertebrate calcium-activated potassium (KCa, Slo-type) channels with high-affinity, probably acting as a pore blocker. Janus atracotoxin-Hv1c (J-ACTX-Hv1c, ) is organised into a disulphide-rich globular core (residues 3-19) and a β-hairpin (residues 20-34). There are 4 disulphide bridges, one of which is a vicinal disulphide bridge; this is known to be unimportant in the maintenance of structure but critical for insecticidal activity.
