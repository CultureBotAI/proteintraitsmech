identifier: Pfam:PF25152
label: CD59 glycoprotein
definition: >-
  This entry represents the human CD59 glycoprotein and related proteins. CD59 is a cell-surface glycoprotein that protects host cells from complement-mediated lysis. It binds to and prevents the normal functioning of the complement proteins C8 and C9 which form part of a membrane penetrating assembly called the membrane attack complex. CD59 folds into a compact domain with a central three-stranded antiparallel β-sheet and a two-stranded antiparallel β-sheet located on one side of it. This structure is stabilised by disulphide bonds and has a significant similarity to the snake venom neurotoxins and other members of the uPAR/Ly6/CD59/snake toxin-receptor superfamily. CD59 binds the pore-forming β-hairpins of C8 to form an intermolecular β-sheet that prevents membrane perforation. While bound to C8, CD59 deflects the cascading C9 β-hairpins, rerouting their trajectory into the membrane.
