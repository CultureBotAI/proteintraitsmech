identifier: Pfam:PF17898
label: Spore germination GerD central core domain
definition: >-
  This is the central core domain found in GerD, which plays a critical role in nutrient receptor-mediated spore germination in Bacillus species. The crystal structure of GerD reveals this domain as a trimeric superhelical rope fold. Alterations in GerD structure have profound effects on spores' nutrient germination.
