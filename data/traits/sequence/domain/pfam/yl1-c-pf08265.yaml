identifier: Pfam:PF08265
label: YL1 nuclear protein C-terminal domain
definition: >-
  This domain is found at the C terminus in proteins of the Vps72/YL1 family, in which it represents a proline-rich domain. These proteins are involved in chromatin remodelling. This domain is also found in proteins that do not belong to the Vps72/YL1 family.
