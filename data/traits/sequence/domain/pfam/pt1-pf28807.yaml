identifier: Pfam:PF28807
label: Toxin protein PT1
definition: >-
  This entry represents the toxin protein PT1 from E. marmotae ( ) and related proteins. PIM1 is the cognate immunity protein of the polymorphic toxin PT1 which acts as a DNase. PT1 and PIM1 form a complex in which PIM1 hinders the PT1 catalytic pocket. PT1 folds into an α-helical structure composed of three-stranded β-sheets and helices packed on one side of it. This domain is also found at the C-terminal of uncharacterised bacterial proteins.
