identifier: Pfam:PF29308
label: YEL043W helical domain
definition: >-
  This entry represents a helical domain found in the uncharacterised yeast protein YEL043W from Saccharomyces cerevisiae. YEL043W is a phosphoprotein with multiple phosphorylation sites identified at Thr-154, Ser-501, Ser-520, Ser-802, Ser-842 and Ser-895. The protein contains several disordered regions and is present at approximately 149 molecules per cell in log phase.
