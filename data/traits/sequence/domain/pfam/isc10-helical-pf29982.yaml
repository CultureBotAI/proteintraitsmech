identifier: Pfam:PF29982
label: ISC10 small helical domain
definition: >-
  This entry represents a small helical domain found in ISC10, a meiosis-specific protein that is indispensable for spore formation in Saccharomyces cerevisiae. ISC10 is expressed during meiosis, appearing approximately 7.5 hours after induction. The protein functions as a protein kinase inhibitor and has mitogen-activated protein kinase binding activity during ascospore formation. The specific function of this small helical domain remains to be determined. This domain is found in fungi.
