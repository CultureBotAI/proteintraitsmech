identifier: Pfam:PF06106
label: S. aureus uracil DNA glycosylase inhibitor
definition: >-
  Uracil-DNA glycosylase inhibitors are DNA mimic proteins that prevent the DNA binding sites of UDGs (Uracil DNA glycosylase) from interacting with their DNA substrate. SSP0047 or SAUGI (for Staphylococcus aureus uracil-DNA glycosylase inhibitor) ( ) acts as a uracil-DNA glycosylase inhibitor that breaks the uracil-removing activity of S. aureus uracil-DNA glycosylase (SAUDG, ). The SAUGI/SAUDG complex has been determined, and shows that SAUGI binds to the SAUDG DNA binding region via several strong interactions, by using a hydrophobic pocket to hold SAUDG's protruding residue (i.e. SAUDG Leu184, E. coli UDG Leu191 and B. subtilis UDG Phe191). By binding to SAUDG in this way, SAUGI thus prevents SAUDG from binding to its DNA substrate and performing DNA repair activity.
