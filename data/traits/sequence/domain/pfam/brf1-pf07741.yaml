identifier: Pfam:PF07741
label: Brf1-like TBP-binding domain
definition: >-
  In budding yeasts, Brf1 forms the TFIIIB complex with TATA-binding protein (TBP) and Bdp1. The TFIIIB complex can be recruited to the Pol III promoters and form an exceptionally kinetically stable TFIIIB-DNA complex, which then recruits the Pol III enzymatic complex and helps maintain it for multiple transcription cycles in a process called facilitated recycling. This entry represents the TATA binding protein (TBP) binding domain of Brf1 that covers both the Brf homology II and III regions.
