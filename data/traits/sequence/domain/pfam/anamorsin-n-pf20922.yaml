identifier: Pfam:PF20922
label: Anamorsin, N-terminal
definition: >-
  Anamorsin (also named CIAPIN1 for cytokine-induced anti-apoptosis inhibitor 1), is the human homologue of yeast Dre2, a conserved soluble eukaryotic Fe-S cluster protein, that functions in cytosolic Fe-S protein biogenesis. It is found in both the cytoplasm and in the mitochondrial intermembrane space (IMS). Anamorsin is found to be up-regulated in hepatocellular cancer. It is considered to be a downstream effector of the receptor tyrosine kinase-Ras signalling pathway, and is essential in mouse definitive haematopoiesis. In addition, it mediates the anti-apoptotic effects of various cytokines. This entry represents the N-terminal domain of metazoan-type anamorsin, which has a S-adenosylmethionine methyltransferase-like fold.
