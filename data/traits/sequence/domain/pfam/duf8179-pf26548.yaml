identifier: Pfam:PF26548
label: Putative peptidyl-prolyl cis-trans isomerase domain
definition: >-
  This entry represents the C-terminal domain from UPF0288 protein Maeo_0995, MTH_1865, Mbar_A0706, MJ1412, MM_0912, MA_3997, MK0796 and similar uncharacterised proteins in Methanobacteriota. The proteins are predominantly found in archaea, specifically within the Methanobacteriota phylum. This includes orders such as Methanobacteriales, Methanosarcinales, and Methanomicrobiales. The proteins in this family are approximately 500 amino acids in length. The function of these proteins is unknown, but their role is likely one essential to methanogenesis. This domain shows structural similarity to cyclophilin-type peptidyl-prolyl cis-trans isomerases. Domains 2 and 3 in these proteins also adopt the same fold.
