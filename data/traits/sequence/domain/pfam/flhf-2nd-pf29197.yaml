identifier: Pfam:PF29197
label: Flagellar biosynthesis protein FlhF, second domain
definition: >-
  This entry represents a small helical domain found in FlhF proteins from spirochaetes. The domain is approximately 50-55 residues in length and adopts a three-helical bundle structure. It is located between the N-terminal domain and the C-terminal GTPase domain ( ). FlhF proteins are involved in flagellar biosynthesis and regulate the number and configuration of flagella in bacteria. The specific function of this = domain remains to be determined.
