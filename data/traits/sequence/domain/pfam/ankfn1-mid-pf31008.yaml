identifier: Pfam:PF31008
label: Ankyrin repeat and fibronectin type-III domain protein middle region
definition: >-
  This entry represents a middle region of approximately 170 residues found in ANKFN1 (ankyrin repeat and fibronectin type-III domain-containing protein 1) and eukaryotic sequences. ANKFN1 contains N-terminal ankyrin repeats ( ) and a fn3 domain ( ). ANKFN1 plays a role in neuronal function and vestibular-related functions, and mutations cause neurological abnormalities including deficits in fear learning and circadian behavior.
