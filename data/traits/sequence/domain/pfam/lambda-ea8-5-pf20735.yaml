identifier: Pfam:PF20735
label: Bacteriophage lambda ea8.5-related domain
definition: >-
  This entry includes Protein ea8.5 from Bacteriophage lambda ( ) and similar sequences mostly from tailed bacteriophages and bacterial prophages. It ranges from around 45 to 90 residues in length and is associated with nucleic acid binding function, playing an essential role in the inhibition of the initiation of DNA synthesis in the phage host. NMR analysis shows it adopts a hybrid homeodomain/zinc-finger fold, which suggests a regulatory role.
