identifier: Pfam:PF27419
label: YkzB
definition: >-
  This entry represents YkzB proteins found in Bacilli, particularly in Bacillus and related genera. YkzB is a small protein of approximately 51 amino acids that contains a helical fold. The protein is found across 35 bacterial species, predominantly in the Bacillota phylum. The function of this protein remains to be determined.
