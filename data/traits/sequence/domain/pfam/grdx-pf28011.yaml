identifier: Pfam:PF28011
label: GrdX-like protein
definition: >-
  This entry represents a family of bacterial proteins, including GrdX. GrdX is a small protein, of unknown function, encoded in grd operons for selenocysteine-dependent glycine reductase systems. A small number of GrdX proteins appear to be encoded with a UGA-encoded selenocysteine residue appearing close to the N terminus, at sites that do not align with Cys residues in other members of the family. This arrangement suggests that the ability to complete translation of GrdX selenoproteins may have regulatory value, in addition to its molecular function.
