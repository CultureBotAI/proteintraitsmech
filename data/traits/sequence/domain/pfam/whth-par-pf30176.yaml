identifier: Pfam:PF30176
label: Par, wHTH
definition: >-
  This entry represents the wHTH domain of Par protein from multi-resistance plasmid pSK1 ( ). pSK1 Par binds a centromere consisting of seven repeat elements. It enhances the separation of plasmids from clusters, driving effective segregation upon cell division.
