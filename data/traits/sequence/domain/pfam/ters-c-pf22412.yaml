identifier: Pfam:PF22412
label: Phage G20C small terminase C-terminal domain
definition: >-
  This domain is found at the C-terminal of terminase small subunit (TerS) from Thermus phage G20c, which oligomerises into a nonamer that binds DNA, stimulates terminase large subunit ATPase activity, and inhibits TerL nuclease activity. TerS is organised into an N-terminal helix-turn-helix (HTH) motif ( ) followed by an oligomerisation domain consisting of two antiparallel helices (this entry) that pack against the oligomerisation domain helices of the neighbouring subunit, forming a helical barrel.
