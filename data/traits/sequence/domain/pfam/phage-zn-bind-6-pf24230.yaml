identifier: Pfam:PF24230
label: Phage zinc binding domain
definition: >-
  This entry represents a family of short uncharacterised proteins from various bacteriophages, primarily infecting Mycobacterium and Gordonia species. It contains highly conserved histidine and three cysteine residues in a CXH and CXXC motif that may form a zinc binding site. Its function is currently unknown. Structure prediction shows an unusual fold composed of two three stranded β-sheets that although adjacent are not hydrogen bonded together. There is an unusual side chain hydrogen bond between the threonine in the WXT motif in one sheet that bonds to the backbone of the other sheet. Overall the surface of the protein is highly negatively charged.
