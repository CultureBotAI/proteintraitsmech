identifier: Pfam:PF07736
label: Chorismate mutase type I
definition: >-
  Chorismate mutase (CM) ( ) catalyses the conversion of chorismate to prephenate in the shikimate pathway of tyrosine and phenylalanine biosynthesis in bacteria, fungi and plants. The three types of CM are AroH class, AroQ class, prokaryotic type and AroQ class, eukaryotic type. Structurally CMs can be divided into two main groups: type I (AroH class) and type II (AroQ class). Type I (AroH) CMs include CMs characterised by a trimeric pseudo α/β barrel structure. The two types of the AroQ structural class (the Escherichia coli CM dimer and the yeast CM monomer) can be structurally superimposed, and the topology of the four-helix bundle forming the active site is conserved. CMs can be monofunctional or bifunctional (generally fused to another shikimate pathway member). Despite the structural differences, all CMs perform the same basic reaction. This entry represents chorismate mutases of the AroH class predominantly from Terrabacteria.
