identifier: Pfam:PF29356
label: Mitochondrial association factor 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of mitochondrial association factor 1 (MAF1) form Toxoplasma gondii, Alba4 from Plasmodium falciparum and related sequences from Apicomplexa. The function of this domain remains to be determined. MAF1 is a parasitophorous vacuole membrane protein that mediates tethering of the parasitophorous vacuole to host mitochondria during infection. The protein interacts with host TOMM70 and SAMM50 to disrupt the host mitochondrial intermembrane space bridging complex, promoting formation of stress-induced mitochondrial outer membrane vesicles. The C-terminal region is necessary but not sufficient for host mitochondrial association. Alba4 possesses DNA- and RNA-binding activities. It binds to DNA fragments longer than 14 base pairs with relaxed sequence specificity. This domain can be found on its own or after an N-terminal domain as in Alba4.
