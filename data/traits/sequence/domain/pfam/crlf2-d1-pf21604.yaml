identifier: Pfam:PF21604
label: Cytokine receptor-like factor 2-like, D1 domain
definition: >-
  This entry represents the membrane-distal D1 domain from cytokine receptor-like factor 2-related sequences mainly found in fish. This domain is characterised by a ABED/C'CFG topology stabilized by a disulfide bridge similarly to that from mammals. This domain contains the three regions that grasp TSLP.
