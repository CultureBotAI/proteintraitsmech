identifier: Pfam:PF30891
label: SorCS receptor membrane-proximal stalk domain
definition: >-
  This entry represents a membrane-proximal stalk domain of approximately 105 residues found in SorCS (sortilin-related VPS10 domain-containing receptor) proteins. This domain is located after the PKD domain ( ). SorCS proteins (SorCS1, SorCS2, SorCS3) are type I transmembrane receptors that function as co-receptors for proneurotrophins together with NGFR. SorCS2 is involved in neurotrophin signalling and synaptic plasticity. This family is found in metazoans. The function of this domain remains to be determined.
