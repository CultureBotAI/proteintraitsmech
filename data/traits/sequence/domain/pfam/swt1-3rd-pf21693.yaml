identifier: Pfam:PF21693
label: Transcriptional protein SWT1, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of transcriptional protein SWT1 from Saccharomyces cerevisiae and similar fungal proteins. SWT1 is an RNA endonuclease involved in quality control of nuclear messenger ribonucleoprotein particles (mRNPs). It consists of three domains: N-terminal, middle ( ), and C-terminal domains. This domain shows three long antiparallel α-helices and three shorter ones . It shares characteristics with members of the HEPN domain ( ).
