identifier: Pfam:PF16090
label: Protein capicua homolog-like domain
definition: >-
  This entry represents a domain is found in protein capicua homolog (Cic) and similar animal proteins. Cic is a transcriptional repressor which plays a role in the development of the central nervous system (CNS). In concert with ATXN1 and ATXN1L, it is involved in brain development.
