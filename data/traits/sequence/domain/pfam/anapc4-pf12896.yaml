identifier: Pfam:PF12896
label: Anaphase-promoting complex, cyclosome, subunit 4
definition: >-
  Apc4 is one of the larger of the subunits of the anaphase-promoting complex (APC) or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. Results in Caenorhabditis elegans show that the primary essential role of the spindle assembly checkpoint is not in the chromosome segregation process itself but rather in delaying anaphase onset until all chromosomes are properly attached to the spindle. The APC is likely to be required for all metaphase-to-anaphase transitions in a multicellular organism. This entry represents the long domain downstream of the WD40 repeat/s that are present on the Apc4 subunits.
