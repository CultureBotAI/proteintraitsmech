identifier: Pfam:PF27265
label: YidX N-terminal domain
definition: >-
  This entry represents the structural domain of the YidX protein found in Escherichia coli and Shigella flexneri. The specific function of this domain remains to be determined. It adopts a β-barrel fold. YidX is predicted to be a single-pass membrane protein with a transmembrane helix at the N-terminal.
