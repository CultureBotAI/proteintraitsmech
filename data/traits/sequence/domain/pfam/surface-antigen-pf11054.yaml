identifier: Pfam:PF11054
label: Sporozoite surface antigen (SAG) protein domain
definition: >-
  This family of proteins is a Eukaryotic family of surface antigens. One of the better characterised members of the family is the sporulated oocyst TA4 antigen from Eimeria tenella. The TA4 gene encodes a single polypeptide of 25kDa which contains a 17 and a 8kDa polypeptide.
