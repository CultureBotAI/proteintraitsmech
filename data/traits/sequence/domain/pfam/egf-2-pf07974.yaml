identifier: Pfam:PF07974
label: EGF-like domain
definition: >-
  This entry contains EGF domains found in a variety of extracellular and membrane proteins, including integrin beta-1-3, tenascin, multiple epidermal growth factor-like domains (protein 10 and disintegrin), and metalloproteinase domain-containing protein 22/23, among others. In integrin beta subunits, this domain is referred to as the IGF-like domain 4. It has a characteristic β bulge at a conserved E/N residue (E472, E522, N559 and E599, respectively) to allow accommodation of disulphide; its cross-strand partner in strand C is an invariant Gly (G468, G518, G555, G595, respectively), which is found typically in other related domains such as class II EGF and some laminin-type epidermal EGF-like domains. A sequence of about thirty to forty amino acid residues long found in the sequence of epidermal growth factor (EGF) has been shown to be present, in a more or less conserved form, in a large number of other, mostly animal proteins. The list of proteins currently known to contain one or more copies of an EGF-like pattern is large and varied. The functional significance of EGF domains in what appear to be unrelated proteins is not yet clear. However, a common feature is that these repeats are found in the extracellular domain of membrane-bound proteins or in proteins known to be secreted (exception: prostaglandin G/H synthase). The EGF domain includes six cysteine residues, which have been shown (in EGF) to be involved in disulphide bonds. The main structure is a two-stranded β-sheet followed by a loop to a C-terminal short two-stranded sheet. Subdomains between the conserved cysteines vary in length.
