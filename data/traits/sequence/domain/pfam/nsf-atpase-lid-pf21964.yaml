identifier: Pfam:PF21964
label: NSF, AAA+ ATPase lid domain
definition: >-
  This entry represents the ATPase lid domain of the second AAA+ ATP-binding domain (also known as D2) of animal NSF proteins, which is found at the C terminus. NFS proteins are responsible for essential membrane fusion events. They play the role of a chaperone by activating the SNAP receptor proteins (SNAREs) so that they can participate in membrane fusion.
