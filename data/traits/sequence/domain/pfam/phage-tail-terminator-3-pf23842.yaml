identifier: Pfam:PF23842
label: Phage tail termination protein
definition: >-
  This entry represents the phage tail termination protein found in a variety of tailed phages that infect Enterobacter and prophages. These proteins form a hexameric ring that caps the tail tube at the neck of these bacteriophage.
