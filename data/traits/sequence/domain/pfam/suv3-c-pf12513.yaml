identifier: Pfam:PF12513
label: ATP-dependent RNA helicase SUV3 C-terminal domain
definition: >-
  This domain is found in ATP-dependent RNA helicase SUV3. It is found in bacterial and eukaryotic proteins, it is approximately 50 amino acids in length and it is usually found in association with . The yeast mitochondrial degradosome (mtEXO) is an NTP-dependent exoribonuclease involved in mitochondrial RNA metabolism. mtEXO is made up of two subunits: an RNase (DSS1) and an RNA helicase (SUV3). These co-purify with mitochondrial ribosomes.
