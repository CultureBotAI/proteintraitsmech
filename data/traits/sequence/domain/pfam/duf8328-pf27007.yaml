identifier: Pfam:PF27007
label: Domain of unknown function (DUF8328)
definition: >-
  This domain is found in uncharacterised bacterial proteins. It contains several highly conserved cysteine and histidine residues that may be involved in metal coordination. This domain is predicted to fold into a structure that resembles a double zinc ribbon domain with swapped knuckles.
