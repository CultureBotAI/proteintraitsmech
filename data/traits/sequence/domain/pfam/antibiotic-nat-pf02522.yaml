identifier: Pfam:PF02522
label: Aminoglycoside 3-N-acetyltransferase
definition: >-
  This family consists of bacterial aminoglycoside N(3)-acetyltransferases ( ) that catalyse the reaction: Acetyl-Co + a 2-deoxystreptamine antibiotic = CoA + N3'-acetyl-2-deoxystreptamine antibiotic . The enzyme can use a range of antibiotics with 2-deoxystreptamine rings as acceptor for its acetyltransferase activity, this inactivates and confers resistance to gentamicin, kanamycin, tobramycin, neomycin and apramycin amongst others. For the kanamycin group antibiotics acetylation occurred at the 3"-amino group in arbekacin and amikacin, and at the 3-amino group in dibekacin as in the case of kanamycin reflecting the effect of the (S)-4-amino-2-hydroxybutyryl side chain which is present in arbekacin and amikacin, but absent in dibekacin and kanamycin. This entry also includes CMP-5'-(N-hydroxy-3-aminopropyl)phosphonate acetyltransferase FrbF catalyzes acetyl transfer onto the hydroxamate of the FR-900098 precursors cytidine 5'-monophosphate-3-aminopropylphosphonate and cytidine 5'-monophosphate-N-hydroxy-3-aminopropylphosphonate.
