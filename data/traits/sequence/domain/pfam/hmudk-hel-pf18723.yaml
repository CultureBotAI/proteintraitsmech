identifier: Pfam:PF18723
label: 5-hmdU DNA kinase, helical domain
definition: >-
  This entry represents an α-helical domain found in 5-hmdU DNA kinase (HMUDK), a P-loop nucleotide kinase that phosphorylates 5-hydroxymethyluracil (5hmdU) into 5-phosphomethyl-2'-deoxyuridine (5-PmdU) on DNA as a step in the pathway leading to thymidine hypermodifications in the viral genome. HMUDK also transfers glutamate to 5-pyrophosphoryloxymethyldeoxyuridine (5-PPmdU) to produce 5-Nalpha-glyutamylthymidine (Nalpha-GluT). These modifications probably prevent degradation of viral genome by the host restriction-modification antiviral defense system. Members of this entry (formerly known as aGPT-Pplase1) are found in phages with hypermodified bases and eukaryotes such as fungi and stramenopiles.
