identifier: Pfam:PF27496
label: PM0294 middle domain
definition: >-
  This entry represents the middle domain of PM0294, an uncharacterised protein from Pasteurella multocida. PM0294 is 423 amino acids in length. This domain is found predominantly in Bacteroidota, particularly within Flavobacteriia and Sphingobacteriia. The function of this middle domain remains to be determined.
