identifier: Pfam:PF30392
label: ABC transporter permease YehY, N-terminal domain
definition: >-
  This entry represents the N-terminal transmembrane domain of approximately 155 residues found in ABC transporter permease proteins related to YehY. In Escherichia coli, YehY is part of the YehZYXW ABC transporter complex involved in low-affinity glycine betaine uptake. The complex consists of two ATP-binding proteins (YehX), two transmembrane proteins (YehW and YehY) and a solute-binding protein (YehZ). This N-terminal domain contains approximately six transmembrane helices and is followed by a BPD_transp_1 domain ( ). The family is found predominantly in Proteobacteria.
