identifier: Pfam:PF26005
label: Putative radical SAM target protein
definition: >-
  Members of this family of small proteins, approximately 100 amino acids in length, lack of homology to any known enzymes. Family members possess a distinctive C-terminal region motif, with the common modification target residue Cys flanked by sterically permissive Gly residues. They co-occur with a subfamily of radical SAM proteins in several species of Halobacteria and Bacillus. Since the radical SAM proteins belong to a branch in which most characterised members act on peptide substrates, it possible that this family is a radical SAM target.
