identifier: Pfam:PF07288
label: RNA polymerase epsilon subunit
definition: >-
  RNA polymerase in bacteria is a multisubunit protein complex that is essential for gene expression. This entry represents the epsilon subunit encoded by the rpoY gene. The structure of epsilon shows simple β-sheet with an α-helix running diagonally along the back of the structure forming a β-β-α-β fold.
