identifier: Pfam:PF30873
label: EDC3 N-terminal
definition: >-
  This domain represents the N-terminal domain of the Enhancer of mRNA-decapping protein 3 (EDC3) from S.pombe. EDC3 Stimulates decapping of both stable and unstable mRNA during mRNA decay, presumably by preventing the DCP1-DCP2 decapping complex from adopting an inactive conformation. This domain forms a complex with a short helical leucine-rich motif (HLM) from Dcp2. This domain is found in Schizosaccharomycetes.
