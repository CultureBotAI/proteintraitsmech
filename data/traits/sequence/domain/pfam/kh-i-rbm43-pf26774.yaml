label: RBM43, KH-domain type I
definition: >-
  This entry represents the type I KH domain in RNA-binding protein 43 (RBM43) mostly found in mammals. RBM43 is induced by inflammatory cytokines and suppresses mitochondrial biogenesis in a PGC1alpha-dependent manner. This domain is often found associated with .
