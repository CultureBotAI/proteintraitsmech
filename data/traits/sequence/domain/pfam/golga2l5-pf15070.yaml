identifier: Pfam:PF15070
label: Putative golgin subfamily A member 2-like protein 5
definition: >-
  This entry represents the conserved domain found in the Golgin subfamily A members. This domain is comprised of coiled-coil in GM130 (GOLGA2) and related proteins. Members of the Golgin subfamily A were identified as Golgi auto-antigens. They might be involved in maintaining cis-Golgi structure. One of the members of this family, member 2 or GM130, is a specific interacting partner of the small GTPase Rab1b and plays a key role in the disassembly and reassembly of the Golgi apparatus during mitosis. GM130 is also involved in vesicle tethering and fusion at the cis-cisternae to facilitate transit between transport vesicles and the stacked cisternae. It interacts with GRASPs proteins, which mediate the stacking of Golgi cisternae. Additionally, GM130 was localised to the spindle poles and regulates microtubule organisation. Structurally, GM130 is comprised of six coiled-coil regions in the middle, a Golgi-targeting domain at the C-terminal, and a p115-interacting motif at the N-terminal.
