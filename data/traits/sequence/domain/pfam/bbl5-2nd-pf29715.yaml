identifier: Pfam:PF29715
label: Bardet-Biedl syndrome 5 protein second PH-like domain
definition: >-
  This entry represents the second PH-like domain. BBS5 is part of the BBSome complex that may function as a coat complex required for sorting of specific membrane proteins to the primary cilia. Mutations in the BBS5 gene cause Bardet-Biedl syndrome 5.
