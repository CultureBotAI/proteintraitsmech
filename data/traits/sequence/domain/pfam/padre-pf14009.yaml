identifier: Pfam:PF14009
label: PADRE domain
definition: >-
  This entry represents the Pathogen and abiotic stress response, cadmium tolerance, disordered region-containing (PADRE) domain, which is specifically found in plants. PADRE typically occurs in small single-domain proteins with a bipartite architecture. PADRE contains conserved sequence motifs at the N-terminal, and its C-terminal includes an intrinsically disordered region with multiple phosphorylation sites. This domain is associated with plant defense upon diverse stress stimulus and has a role in disease resistance to fungi.
