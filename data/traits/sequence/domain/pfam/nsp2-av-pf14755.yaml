identifier: Pfam:PF14755
label: Nsp2, transmembrane domain
definition: >-
  This entry represents a domain found in NSP2 of the RNA-arteriviruses, such as porcine arterivirus PRRSV and equine arterivirus EAV, which is a tetraspanning transmembrane protein. This domain resides adjacent to the peptidase C33 catalytic domain of Nsp2.
