identifier: Pfam:PF30883
label: Domain of unknown function (DUF8752)
definition: >-
  This entry represents a C-terminal transmembrane domain of approximately 160 residues found in a subset of glycosyltransferase family 2 (GT2) proteins. The domain is predicted to contain four transmembrane helices and is located C-terminal to the catalytic GT2 domain ( ). This domain architecture is characteristic of multi-component transmembrane glycosylation systems involved in cell wall polymer modification. This family is found in bacteria, predominantly Bacteroidota, Cyanobacteriota, and Bacillota. The function of this domain remains to be determined.
