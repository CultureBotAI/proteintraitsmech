identifier: Pfam:PF27479
label: YjdH
definition: >-
  This entry represents the jelly roll fold domain found in YjdH, an uncharacterised protein from Bacillus subtilis. The protein is 131 amino acids in length and is predominantly found in Bacillati, particularly within the Bacillales order including Bacillaceae and Paenibacillaceae families. The function of this domain remains to be determined.
