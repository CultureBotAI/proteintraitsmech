identifier: Pfam:PF00485
label: Phosphoribulokinase / Uridine kinase family
definition: >-
  Phosphoribulokinase (PRK) catalyses the ATP-dependent phosphorylation of ribulose-5-phosphate to ribulose-1,5-phosphate, a key step in the pentose phosphate pathway where carbon dioxide is assimilated by autotrophic organisms. In general, plant enzymes are light-activated by the thioredoxin/ferredoxin system, while those from photosynthetic bacteria are regulated by a system that has an absolute requirement for NADH. Thioredoxin/ferredoxin regulation is mediated by the reversible oxidation/reduction of sulphydryl and disulphide groups.
