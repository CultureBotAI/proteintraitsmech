identifier: Pfam:PF07984
label: 'Nucleotidyltransferase '
definition: >-
  This entry includes terminal nucleotidyltransferase 5A/B/C/D (TENT5A/B/C/D). In general, they contain a NTase (nucleotidyltransferase) domain, some members possess additional C-terminal PAP/OAS1 substrate binding domain. They are active non-canonical poly(A) polymerases, which modify cytosolic and/or nuclear RNA 3' ends. They have different functions in many tissues at various stages of development. Human TENT5A is a SMAD signalling pathway related protein, where SMADs are intercellular effectors of transforming growth factor-beta (TGF-beta). The TENT5C gene is one of the most frequently mutated genes in multiple myeloma. TENT5C acts as an onco-suppressor in multiple myeloma. TENT5C also seems to enhance replication of some viruses, including yellow fever virus, in response to type I interferon.
