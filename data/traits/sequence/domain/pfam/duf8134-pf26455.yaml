identifier: Pfam:PF26455
label: Domain of unknown function (DUF8134)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins containing this domain are found predominantly in the class Halobacteria, which includes families such as Haloferacaceae, Haloarculaceae, and Natrialbaceae. The domain is typically around 100-110 amino acids in length.
