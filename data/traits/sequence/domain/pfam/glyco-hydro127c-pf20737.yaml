identifier: Pfam:PF20737
label: Glycoside hydrolase family 127 C-terminal domain
definition: >-
  This entry represents the second β-sandwich domain found in enzymes belonging to the glycosyl hydrolase 127 family, including Non-reducing end beta-L-arabinofuranosidase from Bifidobacterium longum ( also known as Beta-AFase). The β-sandwich domain is somewhat similar to the N-terminal domain of ErbB4 kinase and is involved in formation of a dimer, which is created by a crystallographic 2-fold axis. Beta-AFase, an unusual beta-L-arabinofuranosidase enzyme ( ), releases l-arabinose from the l-arabinofuranose (Araf)-beta1,2-Araf disaccharide and also transglycosylates 1-alkanols with retention of the anomeric configuration. Terminal beta-l-arabinofuranosyl residues have been found in arabinogalactan proteins from a number of different plant species. Beta-l-Arabinofuranosyl linkages with 1-4 arabinofuranosides are also found in the sugar chains of extensin and solanaceous lectins, hydroxyproline (Hyp)2-rich glycoproteins that are widely observed in plant cell wall fractions. The critical residue for catalytic activity is Glu-338, in a ET/SCAS sequence context.
