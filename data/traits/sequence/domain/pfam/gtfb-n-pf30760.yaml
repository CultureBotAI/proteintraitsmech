identifier: Pfam:PF30760
label: GtfB N-terminal domain
definition: >-
  GtfB is required for polymorphic O-glycosylation of serine-rich repeat proteins. GtfB, together with GtfA, forms a two-protein enzyme complex that is involved in glycosylation. GtfB stabilises the glycosylation activity of GtfA and forms a heterotetramer complex with GtfA. GtfB is a peripheral membrane protein localised to the cell membrane and is part of the accessory SecA2/SecY2 protein translocation system. This entry represents the N-terminal domain which may adopt a β/α/β/α/β fold.
