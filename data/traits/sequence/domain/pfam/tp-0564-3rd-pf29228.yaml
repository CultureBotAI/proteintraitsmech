identifier: Pfam:PF29228
label: TP_0564 family, third domain
definition: >-
  This entry represents the C-terminal Ig-like fold domain found in Treponema pallidum TP_0564 protein and related Treponema and Spirochaeta species. This domain is likely periplasmic and is preceded by an N-terminal aminopeptidase-like domain and an integral membrane domain. The function of this domain remains to be determined.
