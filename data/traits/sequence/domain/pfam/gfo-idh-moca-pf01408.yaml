identifier: Pfam:PF01408
label: Oxidoreductase family, NAD-binding Rossmann fold
definition: >-
  This entry represents the N-terminal domain of a group of enzymes that utilise NADP or NAD, known as the GFO/IDH/MOCA family (GFO: glucose--fructose oxidoreductase, IDH: inositol 2-dehydrogenase and MOCA which catalyses a dehydrogenase reaction involved in rhizopine catabolism) in UniProtKB/Swiss-Prot, which includes enzymes that catalyse different chemical reactions such as oxidation and reduction of carbohydrates, oxidation of trans-dihydrodiols, reduction of biliverdin and hydrolysation of glycosidic bonds. Other proteins belonging to this family include Gal80, a negative regulator for the expression of lactose and galactose metabolic genes, although it does not have enzymatic activity; and several hypothetical proteins from yeast, Escherichia coli and Bacillus subtilis. The Gfo/Idh/MocA protein family members have very low sequence identity but the 3D structures of the proteins are very similar, consisting of two main domains: an N-terminal dinucleotide-binding domain containing a typical Rossmann fold3 and a C-terminal α/β-domain participating in substrate binding and oligomerisation.
