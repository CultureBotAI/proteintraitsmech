identifier: Pfam:PF18240
label: Photosystem II Psb31 protein
definition: >-
  This domain can be found in Psb31, an extrinsic protein found in photosystem II (PSII) present in Chaetoceros neogracilis ( ). Photosystem II (PSII) is a multisubunit, membrane protein complex located in the thylakoid membranes of oxygenic photosynthetic organisms from cyanobacteria to higher plants. The four helices in the N-terminal domain are arranged in an up-down-up-down fold and are similar in structure to PsbQ protein in Spinach ( ), despite low sequence homology. The crystal structure of Psb31 ( ) from Porphyridium purpureum and Psb31 ( ) from Thalassiosira pseudonana has also been elucidated.
