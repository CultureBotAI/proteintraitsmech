identifier: Pfam:PF30194
label: Panoramix, conserved region
definition: >-
  This entry represents Panoramix (also known as silencio), found predominantly in flies. Panoramix is a nuclear protein required for piRNA-mediated cotranscriptional silencing of transposons. The full-length protein forms a complex with Piwi, NXF2 and NXT1 (known as the PICTS, Pandas, SFiNX or PPNP complex) that mediates transposon repression and heterochromatin formation.
