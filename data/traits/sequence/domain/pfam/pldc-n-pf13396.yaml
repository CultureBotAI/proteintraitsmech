label: Phospholipase_D-nuclease N-terminal
definition: >-
  This domain is often found at the very N terminus of proteins from the phospholipase D family, cardiolipin synthase subfamily. However, this domain is also found on its own in a large number of cases in proteins described as uncharacterised.
