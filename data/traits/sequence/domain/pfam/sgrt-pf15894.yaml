identifier: Pfam:PF15894
label: Inhibitor of glucose uptake transporter SgrT
definition: >-
  SgrT is a small regulatory polypeptide that inhibits glucose transport activity by a yet unknown mechanism. It is part of a posttranscriptional regulation system in E. coli which consists of a small regulatory RNA (SgrS) and SgrT. During accumulation of glucose-6-phosphate or fructose-6-phosphate, SgrS is involved in downregulation of ptsG mRNA stability, whereas SgrT inhibits glucose transport.
