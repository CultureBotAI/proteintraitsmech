identifier: Pfam:PF23665
label: CDCP1 CUB domain
definition: >-
  This domain is found in the human CUB domain-containing protein 1 (CDCP1) and related proteins. This entry represents the third and the sixth of the tandem of CUB domains. CDCP1 may be involved in cell adhesion and cell matrix association. It also plays a role in the regulation of anchorage versus migration or proliferation versus differentiation via its phosphorylation. CDCP1 contains a tandem of CUB domains.
