identifier: Pfam:PF30028
label: YIL055C C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in uncharacterised proteins from the YIL055C family. Members are found in Saccharomycetaceae yeasts and are phosphoproteins localised to the mitochondrion. The function of this domain remains to be determined.
