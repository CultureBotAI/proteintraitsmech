identifier: Pfam:PF30207
label: PIF8 N-terminal domain
definition: >-
  This entry represents a middle domain found in PIF8 and related ATP-dependent DNA helicase-like proteins. The domain is found in trypanosomatids and related kinetoplastid parasites. PIF8 proteins are required for the maintenance of mitochondrial kinetoplast genome stability and localise to the mitochondrion matrix. Despite being helicase-like, these proteins probably lack helicase activity as they are missing at least two of the seven conserved helicase motifs. The proteins belong to the helicase family, PIF1 subfamily, and are essential for cell viability.
