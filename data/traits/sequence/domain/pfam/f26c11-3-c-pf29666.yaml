identifier: Pfam:PF29666
label: F26C11.3 C-terminal domain
definition: >-
  This entry represents the C-terminal sushi domain from F26C11.3, an uncharacterised secreted protein from Caenorhabditis elegans. Sushi domains are also known as complement control protein modules or short consensus repeats and are characterised by conserved cysteine residues that form disulfide bonds. This domain contains two predicted disulfide bonds between Cys1241- Cys1291 and Cys1273-Cys1304.
