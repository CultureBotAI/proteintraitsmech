identifier: Pfam:PF11127
label: Inner membrane protein YgaP-like, transmembrane domain
definition: >-
  This family includes small proteins with an EYxxD-like motif (for which it is named) near its N terminus, a 20-residue highly hydrophobic stretch, and a short, positively charged region rich in Lys and Arg residues, for an average length in one clade of 36 residues. Strong upstream RBS motifs, ATG start codons, appropriate amino acid substitution patterns, and broad conservation in the Bacillales lineage all provide evidence for interpreting members as real proteins, despite the small size. Most members are encoded adjacent to . A founding member of this family is BH0635 from Bacillus halodurans C-125. Some members typically are encoded with the tail (3-prime) end of the coding region overlapping with the tail end of the purD gene.
