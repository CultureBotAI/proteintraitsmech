identifier: Pfam:PF23582
label: RGF3 winged helix domain
definition: >-
  This entry represents a winged helix domain found in Rho1 guanine nucleotide exchange factors RGF3 and TUS1 from fission and baker's yeast and related proteins. Both RGF3 and TUS1 stimulate the exchange of Rho1 GDP-bound form into GTP-bound form. RGF3 was found to regulate the beta-1,3-glucan biosynthesis and cell wall integrity during septation whereas TUS1 contributes to cell wall integrity-mediated modulation of RHO1 activity. This domain has a weak sequence similarity to known winged helix domains and it is predicted to adopt similar structure.
