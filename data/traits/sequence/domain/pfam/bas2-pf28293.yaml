identifier: Pfam:PF28293
label: Biotrophy-associated secreted protein 2
definition: >-
  This entry represents a conserved domain found in biotrophy-associated secreted protein 2 (BAS2) proteins. In some members, this domain appears three times. These are small secreted effector proteins of approximately 100 amino acids found in plant pathogenic fungi, particularly in the rice blast fungus Pyricularia oryzae. BAS2 is secreted into biotrophic interfacial complexes (BICs) and is involved in biotrophic colonisation of plant cells. The protein contains an N-terminal signal sequence and is up-regulated in invasive hyphae during plant infection. BAS2 functions as an effector protein that facilitates the establishment of biotrophic relationships between the fungal pathogen and its plant host.
