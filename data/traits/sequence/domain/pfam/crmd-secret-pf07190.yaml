identifier: Pfam:PF07190
label: Tumour necrosis factor receptor, SECRET domain
definition: >-
  This domain is found at the C-terminal end of Soluble TNF receptor II from Cowpox virus (CRMB1) and Cytokine response-modifying protein B from Variola virus (CrmB), and differently located in other sequences from poxvirus, including Protein OPG192 and Protein C8 from Vaccinia virus. CRMB1 and CrmB inhibit host immune defence by binding to host TNF and various chemokines in the extracellular space. They bind host CC chemokines (beta chemokines) and CXC chemokines (alpha chemokines). The function of OPG192 and C8 proteins is unknown.
