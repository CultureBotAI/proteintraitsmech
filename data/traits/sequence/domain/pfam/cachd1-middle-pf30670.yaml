identifier: Pfam:PF30670
label: CACHD1 middle domain
definition: >-
  This entry represents a Cache domain found centrally in proteins of the calcium channel subunit alpha-2/delta family mainly in vertebrates. This includes CACHD1 (VWFA and cache domain-containing protein 1) and CACNA2D (voltage-dependent calcium channel subunit alpha-2/delta) proteins. These are single-pass type I membrane proteins that regulate voltage-dependent calcium channels. CACHD1 contains a VWFA domain ( ) and two Cache domains, while CACNA2D proteins contain a VWFA domain and one Cache domain. Cache domains are extracellular sensory domains that typically bind small ligands. CACHD1 interacts with Wnt receptors and regulates neuronal asymmetry in zebrafish brain development. The specific ligand-binding properties of this domain remain to be determined.
