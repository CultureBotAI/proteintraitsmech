identifier: Pfam:PF03847
label: Transcription initiation factor TFIID subunit A
definition: >-
  TBP-associated factor 12 (TAF12) is one of several TAFs that bind TBP and are involved in forming the TFIID complex. TAF12 interacts with TAF4 and makes a novel histone-like heterodimer that binds DNA and has a core promoter function of a subset of genes. This entry represents a domain found in TAF12. TFIID is one of several General Transcription Factors (GTFs), which also include TFIIA, TFIIB, TFIIE, TFIIF and TFIIH, that are involved in the accurate initiation of transcription by RNA polymerase II in eukaryotes. TFIID plays an important role in the recognition of promoter DNA and assembly of the pre-initiation complex. Human transcription initiation factor TFIID is composed of the TATA-binding protein (TBP) and at least 13 TBP-associated factors (TAFs) that collectively or individually are involved in activator-dependent transcription.
