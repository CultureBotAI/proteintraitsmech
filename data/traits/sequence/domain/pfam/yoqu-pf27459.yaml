identifier: Pfam:PF27459
label: YoqU
definition: >-
  This entry represents YoqU proteins derived from SPbeta prophage and related bacteriophages. YoqU is a small protein of approximately 137 amino acids found in the SPbeta prophage of Bacillus subtilis and related systems. YoqU proteins are associated with prophage elements integrated into bacterial genomes. The function of this protein remains to be determined. In some members this entry covers the full length, while others may have an additional domain at the N-terminal.
