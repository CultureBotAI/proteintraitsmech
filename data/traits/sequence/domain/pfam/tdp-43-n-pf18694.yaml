identifier: Pfam:PF18694
label: TAR DNA-binding protein 43, N-terminal domain
definition: >-
  This domain can be found at the N-terminal region of transactive response DNA-binding protein 43kDa (TDP-43), an RNA transporting and processing protein whose aberrant aggregates are implicated in neurodegenerative disorders such as amyotrophic lateral sclerosis (ALS), Alzheimer's Disease, and frontotemporal dementia. TDP-43 N-terminal domain has been shown to play an important role in the aggregation of TDP-43 monomers and its loss of function affects the RNA metabolic levels. Secondary structure of the N-terminal domain consists of six β-strands and it resembles Axin 1. This domain mediates oligomerisation.
