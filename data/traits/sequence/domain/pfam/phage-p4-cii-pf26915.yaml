identifier: Pfam:PF26915
label: Bacteriophage P4 protein cII
definition: >-
  This entry represents a group of uncharacterised proteins, including Sce7726 from Sorangium cellulosum ( ). It belongs a gene pair found sporadically in genera as diverse as Enterococcus, Lactobacillus, Staphylococcus, Streptococcus, Acinetobacter, and Klebsiella, or in tailed bacteriophages from those lineages. The partner in each gene pair is a member of the Sce7725 family ( ).
