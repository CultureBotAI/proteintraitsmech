identifier: Pfam:PF18392
label: COP9 signalosome complex subunit 7a helix I domain
definition: >-
  This entry describes the C-terminal helix I domain found in COP9 signalosome complex (CSN) subunit 7. The composition of the human CSN has been described, in which the helix I domain from CSN7 is reported to contact CSN6 helices I and II.
