identifier: Pfam:PF09117
label: MiAMP1
definition: >-
  MiAMP1 is a highly basic protein from the nut kernel of Macadamia integrifolia (Macadamia nut), which inhibits the growth of several microbial plant pathogens in vitro while having no effect on mammalian or plant cells. It consists of eight β-strands which are arranged in two Greek key motifs. These Greek key motifs then associate to form a Greek key β-barrel.
