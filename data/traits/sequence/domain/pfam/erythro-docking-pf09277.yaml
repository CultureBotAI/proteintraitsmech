identifier: Pfam:PF09277
label: Erythronolide synthase, docking
definition: >-
  This domain is found at the C-terminal end of Erythronolide synthase EryA2 from Saccharopolyspora erythraea and similar sequences from actinomycetes. EryA2 is involved in the biosynthesis of antibiotic erythromycin via the biosynthesis of its aglycone precursor, 6-deoxyerythronolide B (6-dEB). Docking domains are found in prokaryotic erythronolide synthase. They adopt a structure consisting of a bundle of four α-helices, and mediate homodimerisation of the protein, stabilising the resulting complex. It is also found in Polyketide synthase GfsB which is the second protein in the synthesis of the 16-membered macrolide antibiotics FD-891 and FD-892, and in the Spectinabilin polyketide synthase system protein NorB, a component of a type I modular polyketide synthase (PKS) that generates the backbone of the antibiotic spectinabilin (also known as neoaureothin), a nitroaryl-substituted polyketide metabolite.
