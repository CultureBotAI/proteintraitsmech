identifier: Pfam:PF21354
label: Signal transducer and activator of transcription, linker domain
definition: >-
  This domain is found in signal transducer and activator of transcription proteins (STAT) from animals. These proteins are activated in response to extracellular signals such as cytokines, growth factors and hormonal factors and translocate to the nucleus, where they bind to specific promoter sequences in target genes. This entry represents the α-helical linker domain that connects the DNA binding domain ( ) and the SH2 domain ( ).
