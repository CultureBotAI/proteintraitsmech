identifier: Pfam:PF30788
label: Domain of unknown function (DUF8739)
definition: >-
  This entry represents a small domain of approximately 60 residues. The domain is typically found following AAA_16 domains ( ) in multidomain proteins that often also contain guanylate cyclase domains ( ). Proteins containing this domain include adenylate and guanylate cyclases. This family is found in bacteria (Actinomycetota, Myxococcota, Pseudomonadota) and eukaryotes. The function of this domain remains to be determined.
