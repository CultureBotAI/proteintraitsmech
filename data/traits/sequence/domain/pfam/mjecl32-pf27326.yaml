identifier: Pfam:PF27326
label: MJECL32 domain
definition: >-
  This entry represents the N-terminal in MJECL32 found in uncharacterised proteins in archaea and bacteria. This domain is found in diverse lineages including Methanocaldococcaceae, Haloferacaceae, and Halobacteriales in archaea, and Bacillaceae in bacteria. The function of this domain remains to be determined.
