identifier: Pfam:PF00348
label: Polyprenyl synthetase
definition: >-
  This entry includes a group of polyprenyl synthetase enzymes from all cellular organisms. It has been shown that these enzymes share some regions of sequence similarity. From 3D structure analysis, it was revealed that they also share structure and reaction mechanisms, using similar strategies for substrate binding and catalysis. This entry also includes Bifunctional sesterterpene synthases and Bifunctional terpene synthase FUP1 from Fusarium proliferatum, which is involved in mycotoxin fusaproliferin biosynthesis. A variety of isoprenoid compounds are synthesised by various organisms. For example in eukaryotes the isoprenoid biosynthetic pathway is responsible for the synthesis of a variety of end products including cholesterol, dolichol, ubiquinone or coenzyme Q. In bacteria this pathway leads to the synthesis of isopentenyl tRNA, isoprenoid quinones, and sugar carrier lipids. Among the enzymes that participate in that pathway, are a number of polyprenyl synthetase enzymes which catalyse a 1'4-condensation between 5 carbon isoprene units.
