identifier: Pfam:PF23199
label: Domain of unknown function (DUF7060)
definition: >-
  This entry represents a domain found at the C-terminal of a group of proteins from nematodes, members of the BPI/LBP/Plunc family of proteins which share homology with cholesterol ester transfer protein (CETP) and phospholipid transfer protein (PLTP). The exact function of these proteins is unknown, however, according to their structure predictions and homology to CEPT/PLTP, they may play a role in lipid binding.
