identifier: Pfam:PF18755
label: Restriction Enzyme Adenine Methylase Associated
definition: >-
  This entry represents an α+β fold domain associated with restriction enzymes across prokaryotes and fused to JAB deubiquitinases, and chromatin proteins in a wide range of eukaryotes. The domain is predicted to function as a modified-DNA reader domain.
