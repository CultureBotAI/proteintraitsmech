identifier: Pfam:PF07825
label: Excisionase-like protein
definition: >-
  The phage-encoded excisionase protein (Xis, ) is involved in excisive recombination by regulating the assembly of the excisive intasome and by inhibiting viral integration. It adopts an unusual winged-helix structure in which two α helices are packed against two extended strands. Also present in the structure is a two-stranded anti-parallel β-sheet, whose strands are connected by a four-residue wing. During interaction with DNA, helix alpha2 is thought to insert into the major groove, while the wing contacts the adjacent minor groove or phosphodiester backbone. The C-terminal region of Xis is involved in interaction with phage-encoded integrase (Int), and a putative C-terminal α helix may fold upon interaction with Int and/or DNA.
