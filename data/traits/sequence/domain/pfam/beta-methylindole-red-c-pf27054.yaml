identifier: Pfam:PF27054
label: Beta-methylindole-3-pyruvate reductase C-terminal domain
definition: >-
  This entry represents the C-terminal domain of beta-methylindole- 3-pyruvate reductase (Ind2) found in Streptomyces species and related actinobacteria. This domain forms part of an enzyme involved in indolmycin biosynthesis, an antibiotic that inhibits bacterial tryptophan-tRNA synthetases. The complete enzyme catalyses the NADH-dependent reduction of beta- methylindolepyruvate to yield indolmycenate and belongs to the LDH/MDH superfamily. This C-terminal domain likely contributes to substrate binding or catalytic function.
