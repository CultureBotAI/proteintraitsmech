identifier: Pfam:PF16867
label: Dimethlysulfonioproprionate lyase
definition: >-
  There are different ways in which different lineages of bacteria release dimethyl sulfide (DMS) during dimethlysulfonioproprionate (DMSP) catabolism, a phenotype termed Ddd+. Different gene products, including DddD, DddL, DddP and DddQ, have been found in various marine bacteria which can confer a Ddd+ phenotype to Escherichia coli. This family includes DddQ, DddL and DddY. They are dimethlysulfonioproprionate lyases that break down DMSP, releasing DMS.
