identifier: Pfam:PF21239
label: Ribosomal RNA large subunit methyltransferase M, N-terminal
definition: >-
  This entry represents the THUMP-like domain of Ribosomal RNA large subunit methyltransferase M (RlmM), adjacent the ferredoxin-like domain ( ), which together constitutes the N-terminal domain. RlmM specifically catalyses the 2'-O-methylation of nucleotide C2498 in the peptidyl transferase loop of 23S rRNA.
