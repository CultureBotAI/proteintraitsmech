identifier: Pfam:PF29989
label: RIM13 C-terminal
definition: >-
  This entry represents the C-terminal calpain-like domain of RIM13 calpain-like protease, found in fungi. The full-length RIM13 protein is required for proteolytic cleavage of the transcriptional repressor RIM101 in response to alkaline ambient pH, which is necessary for sporulation and invasive growth. RIM13 belongs to the peptidase C2 family and contains an N-terminal calpain catalytic domain with active site residues. The protein interacts with SNF7 which may recruit RIM13 to its substrate. Fungal RMI13 have various lengths so this domain may not be present in all orthologues.
