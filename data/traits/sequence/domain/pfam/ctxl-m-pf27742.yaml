identifier: Pfam:PF27742
label: Cephalotoxin-like middle helical domain
definition: >-
  This entry represents an helical domain found near the N-terminal of SE-cephalotoxin (CTX) and similar animal proteins. CTX is a secreted protein found in the coral Acropora millepora and is a component of the organic matrix of the aragonitic skeleton. The protein includes coiled-coil regions. This domain is composed entirely of α-helical secondary structure. The function of this domain remains to be determined. This entry also includes protein rapunzel, whose function is still not clear. Mutations of the rapunzel gene cause skeletal overgrowth in Zebrafish.
