identifier: Pfam:PF18202
label: T-Q ester bond containing domain
definition: >-
  This domain is found in Gram-positive bacterial surface proteins. It contains a very unusual ester bond between a conserved threonine residue on the N-terminal β-strand of the Ig-like fold and and a glutamine residue in the final strand of the domain.
