identifier: Pfam:PF30912
label: TIM14 C-terminal domain
definition: >-
  This entry represents the C-terminal DnaJ/J domain in TIM14 (mitochondrial import inner membrane translocase subunit 14) proteins. The domain is found in plants. TIM14 is a component of the PAM complex required for translocation of proteins into the mitochondrial matrix.
