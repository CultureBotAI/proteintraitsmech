identifier: Pfam:PF29803
label: Cytochrome b termination protein 1
definition: >-
  This entry represents cytochrome b termination protein 1, a mitochondrial protein essential for cytochrome b formation in Saccharomyces cerevisiae. The protein is involved in 5'-end processing of mitochondrial COB, 15S rRNA, and RPM1 transcripts. CBT1 may also have a role in 3'-end processing of the COB pre-mRNA and is required to stabilise the mature cytochrome b mRNA. The protein is essential for mitochondrial cytochrome b formation and cytochrome complex assembly.
