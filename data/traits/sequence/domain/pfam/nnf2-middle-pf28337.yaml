identifier: Pfam:PF28337
label: NNF2 middle helical domain
definition: >-
  This entry represents a helical region found towards the C-terminal of NNF2 proteins. NNF2 is an endoplasmic reticulum membrane protein found in fungi, particularly in Saccharomyces cerevisiae where it localises to the ER membrane as a multi-pass transmembrane protein. The protein contains multiple transmembrane helices and interacts with SMC1 and YEL043W proteins. The function of this helical region remains to be determined. This entry also includes Probable ubiquitination network signaling protein acrB.
