identifier: Pfam:PF29227
label: TP_0564 family, first domain
definition: >-
  This entry represents an N-terminal aminopeptidase-like domain of approximately 210 residues found in proteins from Spirochaetota, particularly Treponema and Spirochaeta species. The domain is named after the Treponema pallidum TP_0564 protein ( ). This domain is likely periplasmic and is followed by an integral membrane domain and a C-terminal Ig-like fold. The function of this domain remains to be determined.
