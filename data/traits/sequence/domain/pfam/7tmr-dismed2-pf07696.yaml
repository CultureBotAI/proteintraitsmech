identifier: Pfam:PF07696
label: 7TMR-DISM extracellular 2
definition: >-
  This entry represents one of two distinct types of extracellular domain found in the 7TM-DISM (7TM Receptors with Diverse Intracellular Signalling Modules) bacterial transmembrane proteins. It is possible that this domain adopts a jelly roll fold and acts as a receptor for carbohydrates and their derivatives. It can also recognise Ca(II) (Matilla et.al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043).
