identifier: Pfam:PF05754
label: Domain of unknown function (DUF834)
definition: >-
  This short presumed domain is found in a large number of hypothetical plant proteins. The domain is quite rich in conserved glycine residues. It occurs in some putative transposons but currently has no known function.
