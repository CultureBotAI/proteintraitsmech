identifier: Pfam:PF10258
label: Phosphorylated adapter RNA export protein, RNA-binding domain
definition: >-
  The phosphorylated adaptor for RNA export (PHAX) protein transports U3 snoRNA from the nucleus after transcription. This entry represents the highly conserved U3 snoRNA-binding domain of PHAX, which is characterised by having two pairs of adjacent glycines with the sequence motif GGx12GG. This domain adopts a novel helical fold and binds non-specific single-stranded RNA and comprises five α-helices linked by short loops containing 1 to 4 residues, apart from helices alpha3 and 4 that are linked by 13 residues. The fold is unique to this kind of RNA binding domains which show no structural homology with other RNA-binding domains.
