identifier: Pfam:PF12109
label: CXCR4 Chemokine receptor N terminal
definition: >-
  This entry represents the N-terminal region of the CXC type 4 chemokine receptor. CXCR4 and its ligand stromal cell-derived factor-1 (also known as CXCL12) are essential for proper fetal development. CXCR4 is also the major coreceptor for T-tropic strains of Human immunodeficiency virus 1, and SDF-1 inhibits HIV-1 infection. Additionally, SDF-1 and CXCR4 mediate cancer cell migration and metastasis. The N-terminal domain of most chemokine receptors is the ligand binding domain and so the N-terminal domain of CXCR4 is the binding site for SDF-1. The CXC chemokine receptors are a subfamily of chemokine receptors that specifically bind and respond to cytokines of the CXC chemokine family. There are currently seven known CXC chemokine receptors in mammals, CXCR1 through to CXCR7. Chemokines (chemotactic cytokines) are a family of chemoattractant molecules. They attract leukocytes to areas of inflammation and lesions, and play a key role in leukocyte activation. Originally defined as host defense proteins, chemokines are now known to play a much broader biological role. They have a wide range of effects in many different cell types beyond the immune system, including, for example, various cells of the central nervous system, and endothelial cells, where they may act as either angiogenic or angiostatic factors. The chemokine family is divided into four classes based on the number and spacing of their conserved cysteines: 2 Cys residues may be adjacent (the CC family); separated by an intervening residue (the CXC family); have only one of the first two Cys residues (C chemokines); or contain both cysteines, separated by three intervening residues (CX3C chemokines). Chemokines exert their effects by binding to rhodopsin-like G protein-coupled receptors on the surface of cells.…
