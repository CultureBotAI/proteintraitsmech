label: Domain of unknown function (DUF8645)
definition: >-
  This entry represents a C-terminal domain of approximately 90 residues found in putative transcriptional regulators from Cyanobacteriota. The proteins containing this domain are annotated as XRE family or HTH Cro/C1-type regulators. The function of this domain remains to be determined.
