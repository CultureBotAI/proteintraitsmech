identifier: Pfam:PF21036
label: Erythromycin biosynthesis protein CIII-like, N-terminal domain
definition: >-
  This entry represents the conserved N-terminal domain found in Erythromycin biosynthesis protein CIII (EryCIII) from Saccharopolyspora erythraea, also known as 3-alpha-mycarosylerythronolide B desosaminyl transferase ( ), and similar bacterial proteins. EryCIII is organised into two domains, both of them with a Rossmann-like α/β fold. This domain contains the acceptor binding site.
