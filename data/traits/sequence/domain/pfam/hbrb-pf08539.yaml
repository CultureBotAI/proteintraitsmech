identifier: Pfam:PF08539
label: HbrB-like
definition: >-
  This entry includes PRR5 (also known as PROTOR1) from animals, Bit61 and its paralogue-Bit2 from budding yeasts. They are part of the Target Of Rapamycin Complex 2 (TORC2) complex, which plays an essential role in signal transduction. The mammalian TORC2 consists of mTOR, MLST8, PRR5, RICTOR, MAPKAP1 and DEPTOR. The budding yeast TORC2 is composed of Avo1, Avo2, Tsc11, Lst8, Bit61, Slm, Slm2 and Tor2.
