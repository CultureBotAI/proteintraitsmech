identifier: Pfam:PF22660
label: Ribonucleotide synthetase preATP-grasp domain
definition: >-
  This domain precedes the ATP-grasp domain in a number of ribonucleotide synthetases, such as PurT, PurK and Pur6. PurT is involved in the de novo purine biosynthesis. PurK, N5-carboxyaminoimidazole ribonucleotide (N5_CAIR) synthetase, catalyses the conversion of 5-aminoimidazole ribonucleotide (AIR), ATP, and bicarbonate to N5-CAIR, ADP, and Pi.
