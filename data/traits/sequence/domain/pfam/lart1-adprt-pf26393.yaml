identifier: Pfam:PF26393
label: Lart1 ADP-ribosyltransferase family
definition: >-
  This entry represents NAD(+)--arginine ADP-ribosyltransferase Lart1 (Lart1_ADPRT), a ADP-ribosyltransferase that specifically targets NAD(+)-dependent glutamate dehydrogenase (GDH) enzymes in fungi and protists, which are common hosts of Legionella. These proteins function by modifying a conserved arginine residue within the NAD(+)-binding pocket of GDH, effectively inhibiting the oxidative deamination of glutamate. This action may interfere with the stress response mechanisms in amoebas. The family is known to act on GDH from organisms such as Dictyostelium discoideum and yeast, but it does not affect human or Legionella GDH homologues.
