identifier: Pfam:PF28930
label: CYLD SH3 domain
definition: >-
  This domain is found in the human Ubiquitin carboxyl-terminal hydrolase CYLD and related proteins. CYLD ia a deubiquitinase that specifically cleaves Lys-63 and linear Met-1-linked polyubiquitin chains and is involved in NF-kappa-B activation and TNF-alpha-induced necroptosis. This domain has similarity to SH3 domains.
