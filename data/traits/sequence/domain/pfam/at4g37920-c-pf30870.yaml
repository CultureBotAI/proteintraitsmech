identifier: Pfam:PF30870
label: At4g37920-like C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in uncharacterised plant proteins. In Arabidopsis thaliana, the protein At4g37920 localises to the chloroplast envelope and thylakoid membrane. This domain is found C-terminal to the DUF8246 domain ( ). The family is restricted to land plants (Embryophyta). The function of this domain remains to be determined. This domain can also be found in other positions in uncharacterised plant proteins.
