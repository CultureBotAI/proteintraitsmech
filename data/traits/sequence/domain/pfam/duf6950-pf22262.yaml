identifier: Pfam:PF22262
label: Domain of unknown function (DUF6950)
definition: >-
  This domain is found in a group of uncharacterised proteins, mainly from proteobacteria. It is related to NlpC/P60 domains and it is likely to adopt similar structure as well as to possess an endopeptidase activity. All members of this family contain a conserved cysteine residue that is predicted to occupy equivalent spatial position as in the NlpC/P60 domains.
