identifier: Pfam:PF30073
label: Small ribosomal subunit protein mS46 middle domain
definition: >-
  This entry represents the middle domain of the small ribosomal subunit protein mS46 (RSM28), found in fungal mitochondrial ribosomes. RSM28 is a component of the mitochondrial small ribosomal subunit (mt- SSU) which forms part of the mitoribosome, the dedicated translation machinery responsible for synthesis of mitochondrial genome-encoded proteins. The mature yeast 37S small subunit contains 15S ribosomal RNA and 34 different proteins. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. The specific function of this middle domain remains to be determined.
