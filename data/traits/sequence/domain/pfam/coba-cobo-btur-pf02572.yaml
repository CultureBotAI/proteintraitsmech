identifier: Pfam:PF02572
label: ATP:corrinoid adenosyltransferase BtuR/CobO/CobP
definition: >-
  ATP:cob(I)alamin (or ATP:corrinoid) adenosyltransferases ( ), catalyse the conversion of cobalamin (vitamin B12) into its coenzyme form, adenosylcobalamin (AdoCbl)or coenzyme B12. AdoCbl contains an adenosyl moiety liganded to the cobalt ion of cobalamin via a covalent Co-C bond. AdoCbl is required as a cofactor for the activity of certain enzymes. ATP:cob(I)alamin adenosyltransferases are classed into three groups: CobA-type, EutT-type and PduO-type. Each of the three enzyme types appears to be specialised for particular AdoCbl-dependent enzymes or for the de novo synthesis AdoCbl. PduO and EutT are distantly related, sharing short conserved motifs, while CobA is evolutionarily unrelated and is an example of convergent evolution. This entry represents the ATP:cob(I)alamin adenosyltransferases CobA (Salmonella typhimurium), CobO (Pseudomonas aeruginosa), and BtuR (Escherichia coli). There is a high degree of sequence identity between these proteins. CobA is a homodimer responsible for attaching the adenosyl moiety from ATP to the cobalt ion of the corrin ring, necessary for the conversion of cobalamin to adenosylcobalamin.
