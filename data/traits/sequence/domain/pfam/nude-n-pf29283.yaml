identifier: Pfam:PF29283
label: NudE-type Nudix hydrolase N-terminal domain
definition: >-
  This entry represents a small N-terminal domain of approximately 35 residues found in NudE-type ADP-ribose pyrophosphatases and related Nudix hydrolases from bacteria. The domain comprises a three-stranded β-sheet structure. NudE is active on adenosine(5')triphospho(5') adenosine (Ap3A), ADP-ribose, NADH, and adenosine(5')diphospho(5') adenosine (Ap2A). The protein functions as a homodimer and requires divalent metal cations, typically magnesium, for catalytic activity. This N-terminal domain precedes the conserved Nudix hydrolase catalytic domain ( ). The specific function of this N-terminal domain remains to be determined.
