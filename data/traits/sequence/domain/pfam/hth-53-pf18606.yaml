identifier: Pfam:PF18606
label: Zap  helix turn helix N-terminal domain
definition: >-
  Zinc-finger antiviral protein (ZAP) is a host factor that specifically inhibits the replication of certain viruses, such as HIV-1, by targeting viral mRNA for degradation. This domain is a helix turn helix domain found at the N-terminal region constituting the top cockpit layer of the protein.
