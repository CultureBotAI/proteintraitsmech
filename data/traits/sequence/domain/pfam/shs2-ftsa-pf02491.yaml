identifier: Pfam:PF02491
label: SHS2 domain inserted in FTSA
definition: >-
  FtsA is essential for bacterial cell division, and co-localises to the septal ring with FtsZ. The SHS2 domain, also known as subdomain 1C, is inserted into the RNAseH fold of FtsA, and is involved in protein-protein interaction.
