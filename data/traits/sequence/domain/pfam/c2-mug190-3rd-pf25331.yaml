identifier: Pfam:PF25331
label: Third C2 domain of meiotically up-regulated Mug190 protein
definition: >-
  This entry represents the third C2 domain found in the meiotically up-regulated protein Mug190 (MU190) from Schizosaccharomyces pombe ( ). C2 domains typically function as calcium-dependent membrane-targeting modules. This specific C2 domain is found as part of a multi-C2 domain protein that is expressed during meiosis, though its precise role in meiotic regulation remains to be determined. The domain appears to be specific to fungi, particularly found in ascomycetes.
