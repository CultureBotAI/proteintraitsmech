identifier: Pfam:PF30126
label: Uncharacterised protein YHR127W C-terminal domain
definition: >-
  This entry represents the C-terminal domain of YHR127W family proteins found mainly in Saccharomycetes. These proteins are involved in mitotic spindle elongation. The proteins localise to the nucleus and have nucleic acid binding activity. This domain contains a RNA recognition motif (RRM) fold.
