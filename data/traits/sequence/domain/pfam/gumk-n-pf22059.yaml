identifier: Pfam:PF22059
label: Glucuronosyltransferase GumK, N-terminal domain
definition: >-
  Beta-1,2-glucuronosyltransferase GumK is a membrane- associated protein that is involved in the biosynthesis of xanthan. The GumK enzyme is the founding member of the glycosyltransferase family 70 of carbohydrate-active enzymes, which is composed of bacterial glycosyltransferases involved in exopolysaccharide synthesis. This protein consists of two domains; the N-terminal one is represented in this entry.
