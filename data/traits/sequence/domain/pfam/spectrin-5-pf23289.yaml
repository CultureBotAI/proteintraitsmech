identifier: Pfam:PF23289
label: Guanine nucleotide exchange factor DBS-like, spectrin-like
definition: >-
  This spectrin-like domain is found in human Guanine nucleotide exchange factor DBS (MCF2L) and similar sequences mainly found in animals. MCF2L catalyses guanine nucleotide exchange on RHOA and CDC42, and thereby contributes to the regulation of RHOA and CDC42 signalling pathways.
