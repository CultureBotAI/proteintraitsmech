identifier: Pfam:PF05514
label: 'HR-like lesion-inducing '
definition: >-
  This is a family of plant proteins that are associated with the hypersensitive response (HR) pathway of defence against plant pathogens. This family belongs to the DoxD-like superfamily. Members of this family like other members of this superfamily are likely to form homodimers.
