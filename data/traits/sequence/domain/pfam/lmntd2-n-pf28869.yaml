identifier: Pfam:PF28869
label: LMNTD2 N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in lamin tail domain-containing protein 2 (LMNTD2) and related proteins. This domain is approximately 40 amino acids in length and is located at the N-terminal region, preceding the characteristic lamin tail domain. The domain is conserved across mammalian species and is found in proteins that contain coiled-coil regions and lamin tail domains. LMNTD2 proteins are involved in nuclear structure and may function as structural constituents of chromatin. The N-terminal domain may play a role in protein-protein interactions or subcellular localisation. The specific function of this N-terminal domain remains to be determined.
