identifier: Pfam:PF02870
label: 6-O-methylguanine DNA methyltransferase, ribonuclease-like domain
definition: >-
  The repair of DNA containing O6-alkylated guanine is carried out by DNA-[protein]-cysteine S-methyltransferase ( ) (also known as 6-O-methylguanine-DNA methyltransferase, O-6-methylguanine-DNA-alkyltransferase). The major mutagenic and carcinogenic effect of methylating agents in DNA is the formation of O6-alkylguanine. The alkyl group at the O-6 position is transferred to a cysteine residue in the enzyme. This is a suicide reaction since the enzyme is irreversibly inactivated and the methylated protein accumulates as a dead-end product. Most, but not all of the methyltransferases are also able to repair O-4-methylthymine. DNA-[protein]-cysteine S-methyltransferases are widely distributed and are found in various prokaryotic and eukaryotic sources. This group of proteins are characterised by having an N-terminal ribonuclease-like domain, represented by this entry, that is associated with 6-O-methylguanine DNA methyltransferase activity ( ).
