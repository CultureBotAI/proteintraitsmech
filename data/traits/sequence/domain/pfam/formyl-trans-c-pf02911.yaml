identifier: Pfam:PF02911
label: Formyl transferase, C-terminal domain
definition: >-
  Methionyl-tRNA formyltransferase ( ) transfers a formyl group onto the amino terminus of the acyl moiety of the methionyl aminoacyl-tRNA. The formyl group appears to play a dual role in the initiator identity of N-formylmethionyl-tRNA by promoting its recognition by IF2 and by impairing its binding to EFTU-GTP. This family also includes formyltetrahydrofolate dehydrogenases, which produce formate from formyl-tetrahydrofolate. These enzymes contain an N-terminal domain in common with other formyl transferase enzymes ( ). The C-terminal domain has an open β-barrel fold.
