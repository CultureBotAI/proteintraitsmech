identifier: Pfam:PF19647
label: 7(1) septoil knot domain
definition: >-
  This entry represents a small protein domain with a 7(1) septoil knot topology, one of the most complex protein knots known. The structured core consists of a β-barrel with six β-strands and two short α-helices. The domain contains a conserved SFPD tetrapeptide motif in the loops between β-strands, resulting in a pseudo fivefold symmetry with conserved phenylalanine side chains pointing outward. The domain is exceptionally stable against chemical denaturation and shows high mechanical resistance. The domain was first predicted by AlphaFold2 and experimentally confirmed by X-ray crystallography and solution NMR. This domain is found in proteins is mainly from Bacteroidetes and Proteobacteria.
