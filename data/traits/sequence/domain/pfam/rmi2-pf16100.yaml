identifier: Pfam:PF16100
label: RecQ-mediated genome instability protein 2
definition: >-
  RMI2 is an OB3, oligo-nucleotide-binding protein. It is an essential component of the RMI complex. The dissolvasome is a protein complex that consists of BLM, a RecQ helicase that is product of the gene mutated in Bloom syndrome, topoisomerase IIIalpha (Top3alpha) and the RMI (RecQ-mediated genome instability) subcomplex, comprised of RMI1 and RMI2. The dissolvasome acts on double Holliday junction intermediates in homologous recombination, creating non-crossover products in a process termed 'dissolution'.
