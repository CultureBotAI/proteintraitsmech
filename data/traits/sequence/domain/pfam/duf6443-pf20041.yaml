identifier: Pfam:PF20041
label: Domain of unknown function (DUF6443)
definition: >-
  This presumed domain is functionally uncharacterised. This domain is predominantly found in Bacteroidetes, and is about 100 amino acids in length. This domain contains a highly conserved YDxxGR motif which suggests that it is related to the RHS repeats, that appear to be involved in ligand binding. RHS repeats share structural similarity with the eukaryotic tyrosine-aspartate (YD) repeat.
