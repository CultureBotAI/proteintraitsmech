identifier: Pfam:PF21786
label: 6-fold beta flower protein
definition: >-
  This family of bacterial proteins have a repetitive structure composed of pairs of β-strands. In this family, the proteins usually have six copies of the β-hairpin repeat with a central α-helix in the barrel.
