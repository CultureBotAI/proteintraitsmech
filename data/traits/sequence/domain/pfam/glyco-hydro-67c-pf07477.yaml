identifier: Pfam:PF07477
label: Glycosyl hydrolase family 67 C-terminus
definition: >-
  Alpha-glucuronidases, components of an ensemble of enzymes central to the recycling of photosynthetic biomass, remove the alpha-1,2 linked 4-O-methyl glucuronic acid from xylans. This family represents the C-terminal region of alpha-glucuronidase, which is mainly α-helical. It wraps around the catalytic domain ( ), making additional interactions both with the N-terminal domain ( ) of its parent monomer and also forming the majority of the dimer-surface with the equivalent C-terminal domain of the other monomer of the dimer.
