identifier: Pfam:PF29437
label: C05C10.5-like C-terminal domain
definition: >-
  This entry represents a C-terminal β-sheet domain found in C05C10.5 and related proteins from nematodes. The domain is approximately 55 amino acids in length and is located at the C-terminal end of these proteins, typically spanning residues 157-212 in the prototype sequence. The full-length proteins containing this domain are uncharacterised, with a central disordered region preceding this structured C-terminal domain. The function of this domain remains to be determined.
