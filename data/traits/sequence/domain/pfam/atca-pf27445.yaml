identifier: Pfam:PF27445
label: Adaptation to cold protein A
definition: >-
  This entry represents adaptation to cold protein A (AtcA) found primarily in Shewanella and related marine bacteria. AtcA is a protein of approximately 179 amino acids that is part of the atcJABC operon involved in cold adaptation. The protein contains a C-terminal disordered region (residues 133-179) with acidic residue bias. AtcA is constitutively expressed with only a slight increase at low temperature, and gene deletion does not affect growth at low temperature. The protein is found across 30 bacterial species, predominantly in Gammaproteobacteria. The function of this protein remains to be determined.
