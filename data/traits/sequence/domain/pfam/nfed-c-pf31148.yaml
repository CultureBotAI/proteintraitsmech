identifier: Pfam:PF31148
label: NfeD C-terminal domain
definition: >-
  This entry represents the C-terminal soluble domain of approximately 58 residues found in NfeD family membrane proteins. The structure of this domain from Bacillus subtilis NfeD2 (YuaF) has been solved by NMR and adopts an OB-fold. In longer proteins, this domain follows the NfeD transmembrane region ( ). NfeD proteins play a role in the assembly of flotillin membrane rafts, colocalising with flotillin proteins in discrete membrane foci. The domain is found predominantly in Actinomycetota and Bacillota.
