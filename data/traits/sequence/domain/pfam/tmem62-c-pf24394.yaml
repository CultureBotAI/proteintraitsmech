identifier: Pfam:PF24394
label: TMEM62 C-terminal domain
definition: >-
  This domain is found C-terminal in the human Transmembrane protein 62 (TMEM62), the uncharacterised At3g03305 protein from Arabidopsis thaliana and related eukaryotic proteins. TMEM62 has been identified as a potential therapeutic target to enhance survival from high-grade serous carcinomas. The domain represented by this entry is likely transmembrane and composed of α-helices. It is frequently found associated with and . This domain is also found covering the whole length of the protein in the uncharacterised protein YKR040C from Saccharomyces cerevisiae.
