identifier: Pfam:PF27660
label: Style cell-cycle inhibitor 1-like helix hairpin domain
definition: >-
  This entry represents a helix hairpin domain found in style cell-cycle inhibitor 1 (SCI1) A and B proteins. The domain structure contains a helix hairpin fold and is found in both plants and fungi. The specific function of this helix hairpin domain remains to be determined. In plants, this domain is usually found at the C-terminal. In S.pombe, this domain is found at the N-terminal region. SCI1 proteins are small nuclear regulators involved in cell cycle control and auxin signalling pathways. In plants, these proteins regulate cell proliferation and differentiation during flower development, particularly in stigmas and styles. SCI1 proteins are tissue-specific inhibitors of cyclin-dependent kinases and represent the first members of the tissue-specific inhibitors of CDK (TIC) class.
