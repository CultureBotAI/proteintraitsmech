identifier: Pfam:PF27775
label: Methane monooxygenase component D
definition: >-
  Biological oxidation of methane to methanol by aerobic bacteria is catalysed by two different enzymes, the soluble methane monooxygenase (sMMO) and the membrane-bound or particulate methane monooxygenase (pMMO). This entry represents MmoD, a component and a regulator of the sMMO. sMMO is only expressed at very low copper:biomass ratios, while pMMO expression increases as this ratio increases. The copper switch that controlling the expression of these two MMOs is regulated by MmoD and methanobactin.
