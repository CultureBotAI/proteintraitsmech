identifier: Pfam:PF13244
label: MBH, subunit D
definition: >-
  Hydrogen gas-evolving membrane-bound hydrogenase (MBH) is a respiratory complex homologous to the quinone-reducing Complex I which share a common ancestor, the Mrp antiporter. Like Complex I, MBH has peripheral and membrane arms. MBH is made of 14 subunits (MbhA-N). MbhJ, K, L, N and M form the Membrane-anchored hydrogenase module. MbhJ, K, L, N are predicted to be exposed to the cytoplasm and form the peripheral arm. The remaining 10 subunits are predicted to be integral membrane proteins forming the membrane arm, made of 44 transmembrane helices (TMH) [2, 3]. MbhA, B, C and F form the Sodium translocation module. MbhD, E, G and H form the Proton translocation module. MbhI is the linker between the hydrogenase module and the proton-translocating membrane module. It anchors the discontinuous TMH7 of MbhH via its middle lateral helix and the C-terminal of TMH2, found in MbhE. MbhD and MbhE together are equivalent to Nqo10 of Complex I and the C-terminal of MrpA. MbhD has three TM helices.
