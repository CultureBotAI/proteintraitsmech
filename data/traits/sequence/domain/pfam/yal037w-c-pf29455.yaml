identifier: Pfam:PF29455
label: YAL037W C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in uncharacterised proteins from fungi. The domain adopts a helical structure and is found in YAL037W ( ) from Saccharomyces cerevisiae. Family members include YAL037W-like proteins from Saccharomyces species. The domain occurs at the C-terminal region of proteins that also contain an N-terminal YAL037W_N domain ( ). The function of this domain remains to be determined.
