identifier: Pfam:PF22280
label: VtrC lipocalin-like domain
definition: >-
  This entry represents a family of proteins specific to Vibrionaceae, including the Vibrio parahaemolyticus VtrC protein, which shows a lipocalin-like β-barrel configuration. VtrC, along with VtrA and VtrB, are required for activating the virulence type III secretion system 2 in response to bile salts. The VtrA/VtrC complex activates VtrB in the presence of bile salts. The crystal structure of the periplasmic domains of the VtrA/VtrC heterodimer reveals a β-barrel with a hydrophobic inner chamber.
