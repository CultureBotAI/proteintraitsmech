identifier: Pfam:PF08786
label: DcrB
definition: >-
  DcrB is a bacterial protein required for phages C1 and C6 adsorption. It may be involved in the opening or formation of diffusion channels in the outer membrane. It plays a role in cell envelope biogenesis, maintenance of cell envelope integrity and membrane homeostasis. DcbrB is essential for lipoprotein maturation under conditions where membrane fluidity may be altered. Structurally, it consist of an antiparallel β sheet with some α helical regions.
