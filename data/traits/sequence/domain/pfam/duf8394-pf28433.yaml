identifier: Pfam:PF28433
label: Domain of unknown function (DUF8394)
definition: >-
  This domain is found in uncharacterised proteins mainly from Actinomycetota lineage. It is predicted to adopt a complex α/β structure resembling the shape of 'stalk and head'. Structurally it is similar to the so-called choice-of-anchor G proteins, which are sortase and exosortase targets, and are likely to be found on the cell surface.
