identifier: Pfam:PF23722
label: DEX1 beta-sandwich
definition: >-
  Protein defective in exine formation DEX1 is a factor required for proper pollen wall formation in Arabidopsis thaliana and other plant sequences. This entry represents the β-sandwich domain found towards the C-terminal of DEX1 in plants. Mutations in DEX1 are associated with changes in the microspore membrane and primexine formation, which disrupt normal deposition of sporopollenin. DEX1 is suggested to be either a component of the primexine matrix or of the ER and participates in the assembly of primexine precursors. This protein has been identified as a Ca2+ binding protein involved in regulating rice tapetal cell degradation and pollen formation.
