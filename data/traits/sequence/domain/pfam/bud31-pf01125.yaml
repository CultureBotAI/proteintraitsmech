identifier: Pfam:PF01125
label: Pre-mRNA-splicing factor BUD31
definition: >-
  This family includes the pre-mRNA-splicing factor BUD31, also known as G10 protein, and its homologues. BUD31 is involved in the pre-mRNA splicing process and it is highly conserved in a wide range of eukaryotic species. Human BUD31 may play a role as regulator of androgen receptor (AR) transcriptional activity, probably, increasing the AR transcriptional activity.
