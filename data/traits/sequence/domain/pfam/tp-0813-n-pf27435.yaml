identifier: Pfam:PF27435
label: TP_0813 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of TP_0813 proteins found primarily in Treponema and related spirochaetes. This domain forms a helical bundle structure. The protein is found across the Spirochaetota phylum within the Spirochaetales order. TP_0813 proteins are particularly abundant in Treponema species. The function of this domain remains to be determined. This domain contains an all-helical fold.
