identifier: Pfam:PF14691
label: Dihydroprymidine dehydrogenase domain II, 4Fe-4S cluster
definition: >-
  Domain II of the enzyme dihydroprymidine dehydrogenase binds FAD. Dihydroprymidine dehydrogenase catalyses the first and rate-limiting step of pyrimidine degradation by converting pyrimidines to the corresponding 5,6- dihydro compounds. This domain carries two Fe4-S4 clusters.
