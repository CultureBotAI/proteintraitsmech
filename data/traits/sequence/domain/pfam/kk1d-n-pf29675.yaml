identifier: Pfam:PF29675
label: KK-1 biosynthesis cluster protein D N-terminal domain
definition: >-
  This entry represents the N-terminal region of KK-1 biosynthesis cluster protein D from fungal secondary metabolite gene clusters. The protein containing this domain is part of a gene cluster that mediates the biosynthesis of KK-1, a novel cyclic depsipeptide with antimicrobial activity against plant pathogens. The protein is essential for KK-1 production, as disruption abolishes compound biosynthesis. The specific function of this domain remains to be determined.
