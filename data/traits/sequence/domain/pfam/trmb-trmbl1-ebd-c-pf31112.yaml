identifier: Pfam:PF31112
label: TrmB/TrmBL1, EBD C-terminal subdomain
definition: >-
  This is the C-terminal subdomain of the sugar-binding domain (EBD) from HTH-type sugar sensing transcriptional regulator TrmB and TrmBL1, which adopts a β-barrel fold. This subdomain is not present in TrmBL2. TrmB is an alpha-glucoside sensing transcriptional repressor for a gene cluster encoding trehalose/maltose ABC transporter.
