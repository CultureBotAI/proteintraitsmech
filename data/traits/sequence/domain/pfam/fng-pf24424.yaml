identifier: Pfam:PF24424
label: FNG domain
definition: >-
  This entry shows a β-sandwich structure that has similarity to known carbohydrate binding domain families CBM61 and CBM70. This domain is found at the N-terminal of proteins that contain repeated domains, suggesting these proteins may act as carbohydrate binding adhesins. This domain contains a conserved FNG sequence after which the domain is named.
