identifier: Pfam:PF10869
label: 'Domain of unknown function (DUF2666) '
definition: >-
  This entry represents a domain found in archaeal proteins, including PF2050 from Pyrococcus furiosus ( ). PF2050, with an overall globular structure, contain this domain twice, each showing an antiparallel β-sheet and an α-helical bundle, and shows a positively charged basic cleft on one side. This protein interacts with circular and linear dsDNA.
