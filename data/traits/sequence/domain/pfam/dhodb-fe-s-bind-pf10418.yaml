identifier: Pfam:PF10418
label: Iron-sulfur cluster binding domain of dihydroorotate dehydrogenase B
definition: >-
  Lactococcus lactis is one of the few organisms with two dihydroorotate dehydrogenases (DHODs) A and B. The B enzyme is typical of DHODs in Gram-positive bacteria that use NAD+ as the second substrate. DHODB is a heterotetramer composed of a central homodimer of PyrDB subunits resembling the DHODA structure and two PyrK subunits along with three different cofactors: FMN, FAD, and a [2Fe-2S] cluster. The [2Fe-2S] iron-sulphur cluster binds to this C-terminal domain of the PyrK subunit, which is at the interface between the flavin and NAD binding domains and contains three β-strands. The four cysteine residues at the N-terminal part of this domain are the ones that bind, in pairs, to the iron-sulphur cluster. The conformation of the whole molecule means that the iron-sulphur cluster is localized in a well-ordered part of this domain close to the FAD binding site. The FAD and NAD binding domains are and respectively.
