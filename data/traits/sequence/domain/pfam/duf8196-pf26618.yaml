identifier: Pfam:PF26618
label: Domain of unknown function (DUF8196)
definition: >-
  This entry represents a bacterial family that belongs to the PD-(D/E)XK nuclease superfamily. Proteins in this family generally contain a long N-terminal α-helix that likely forms a trimeric coiled-coil structure according to AlphaFold prediction. The proteins are predominantly present in the Thermoprotei class of archaea and the Pseudomonadati class of bacteria.
