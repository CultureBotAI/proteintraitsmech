identifier: Pfam:PF13914
label: Phostensin PP1-binding and SH3-binding region
definition: >-
  Phostensin has been identified as a PP1 regulatory protein, binding PP1 at the KISF motif found in this domain. This domain also appears to carry an incomplete SH3-binding domain PxRxP further upstream. It is likely that phostensin targets PP1 to the F-actin cytoskeleton. Phostensin binds to actin and decreases the elongation and depolymerisation rates of actin filament pointed ends. This domain is also found in the taperin, which is a PP1 binding protein that is ancestrally related to phostensin. Taperin has a role in sound perception.
