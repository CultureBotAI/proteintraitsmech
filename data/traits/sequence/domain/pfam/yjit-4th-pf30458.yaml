identifier: Pfam:PF30458
label: Protein YjiT, fourth domain
definition: >-
  This entry represents the fourth domain of the uncharacterised protein YjiT. It follows the N-terminal domain ( ), the second domain ( ) and the third domain ( ). In the E. coli K12 YjiT protein, this domain is located near the C terminus due to truncation of the gene. Full-length orthologues contain up to ten structural domains. The family is found in gammaproteobacteria. The function of this protein and domain remains to be determined.
