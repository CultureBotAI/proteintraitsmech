identifier: Pfam:PF16449
label: Fimbrillin MatB
definition: >-
  This group represents the fimbrillin protein MatB. It is also known as EcpA, and is part of the ecpRABCDE operon, which encodes the E.coli common pilus (ECP), an adhesive structure produced by all E. coli pathogroups and plays a dual role in early-stage biofilm development and host cell recognition.
