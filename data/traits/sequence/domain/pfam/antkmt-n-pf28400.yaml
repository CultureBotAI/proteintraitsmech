identifier: Pfam:PF28400
label: ANTKMT N-terminal domain
definition: >-
  This entry represents the N-terminal region of adenine nucleotide translocase lysine N-methyltransferase (ANTKMT). This entry covers an N-terminal sequence (NTS) and a transmembrane region that is responsible for mitochondrial localisation. The specific function of this N-terminal domain is for mitochondrial targeting and membrane localisation. ANTKMT is a mitochondrial protein-lysine N-methyltransferase that trimethylates adenine nucleotide translocases ANT2/SLC25A5 and ANT3/SLC25A6, thereby regulating mitochondrial respiration. The enzyme contains a methyltransferase domain that uses S-adenosyl-L-methionine as a cofactor to perform lysine trimethylation. The proteins are localised to the mitochondrial membrane and are found in vertebrates.
