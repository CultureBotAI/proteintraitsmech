identifier: Pfam:PF26700
label: IPGAL1-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of INCREASED PETAL GROWTH ANISOTROPY 1-like protein 1 from Arabidopsis thaliana (IPGAL1) and similar plant sequences. IPGAL1 is a microtubule-associated protein probably involved in the regulation of microtubule organisation. This domain is predicted to form a five-helical bundle.
