identifier: Pfam:PF05045
label: Rhamnan synthesis protein F
definition: >-
  This domain is found in a group of proteins which are related to the Streptococcal rhamnose-glucose polysaccharide assembly protein (RgpF), including Virulence protein VirA and Uncharacterized protein WxcX. In some members, this entry represents the C-terminal domain. Rhamnan backbones are found in several O-polysaccharides found in phytopathogenic bacteria and are regarded as pathogenic factors.
