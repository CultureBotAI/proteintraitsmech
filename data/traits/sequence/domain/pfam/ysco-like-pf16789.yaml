identifier: Pfam:PF16789
label: YscO-like protein
definition: >-
  This family of proteins is similar to the type III secretion protein YscO. The family includes Chlamydia trachomatis CT670 which is found in a type III secretion gene cluster. CT670 interacts with CT671, a putative YscP homologue and CT670 and CT671 may form a chaperone-effector pair.
