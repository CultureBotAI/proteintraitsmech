identifier: Pfam:PF23165
label: 'F-box only protein 41 C2H2 zinc finger '
definition: >-
  This classical C2H2 zinc finger domain is found in F-box only protein 41 (FBX41) and related proteins. including ZN365. Members of the F-box protein family, such as FBX41, are characterised by an approximately 40-amino acid F-box motif. These proteins are substrate recognition component of the SCF complexes. They interact with SKP1 through the F box, and with ubiquitination targets through other protein interaction domains. ZN365 is involved in homologous recombination repair pathway and contributes to the genomic stability by preventing telomere dysfunction.
