identifier: Pfam:PF20856
label: SdbC, C-terminal domain
definition: >-
  This entry represents a domain found at the C-terminal of the SdbC protein from Legionella pneumophila and related proteins from Legionella species. SdbC protein is thought to be a virulence factor or effector of the pathogen. The structure of this domain suggests that this part of the protein forms a dimer of dimers ( ). This domain consists mainly of β-strands that pack with a neighbouring chain to form a β-barrel structure. Two of these barrels pack side by side to form a dimer that is hold by the C-terminal β-strands of each domain.
