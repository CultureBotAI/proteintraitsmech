identifier: Pfam:PF09008
label: Head binding
definition: >-
  The tailspike protein of Salmonella bacteriophage P22 is a viral adhesion protein that mediates attachment of the viral protein to host cell-surface lipopolysaccharide. The tailspike protein displays both receptor binding and destroying properties, inactivating the receptor by endoglycosidase activity. The N-terminal, head-binding domain mediates the non-covalent attachment of the six homotrimeric tailspike molecules to the DNA injection apparatus. The N-terminal domain of the P22 tailspike protein shows significant sequence similarity to the N-terminal domain of the Shigella phage Sf6 tailspike protein. This entry also includes the N-terminal of Amylovoran biosynthesis protein AmsF and other bacterial proteins. AmsF is involved in the biosynthesis of amylovoran, which functions as a virulence factor. It may be involved in the polymerisation or late modification of the repeating units.
