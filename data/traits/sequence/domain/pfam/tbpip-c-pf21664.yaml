identifier: Pfam:PF21664
label: TBP-interacting protein, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of archaeal TATA-binding protein (TBP)-interacting proteins (TBPIPs). This domain contains two Cys and two His which coordinates a zinc ion. It forms an unusual Cys2His2-type zinc finger, not functional as a DNA-binding module.
