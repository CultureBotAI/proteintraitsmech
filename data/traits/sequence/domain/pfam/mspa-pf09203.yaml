identifier: Pfam:PF09203
label: MspA
definition: >-
  MspA is a membrane porin produced by Mycobacteria, allowing hydrophilic nutrients to enter the bacterium. The protein forms a tightly interconnected octamer with eightfold rotation symmetry that resembles a goblet and contains a central channel. Each subunit fold contains a β-sandwich of Ig-like topology and a β-ribbon arm that forms an oligomeric transmembrane barrel. The Mycobacterium smegmatis genome encodes four paralogues, MspA, MspB, MspC and MspD, which are also represented by this entry.
