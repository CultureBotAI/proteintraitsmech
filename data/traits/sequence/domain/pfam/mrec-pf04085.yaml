identifier: Pfam:PF04085
label: Rod shape-determining protein MreC, barrel core
definition: >-
  This entry represents the periplasmic core of MreC and related proteins which is composed of two six-stranded β-barrels. MreC self-associates into polar filaments. The periplasmic part of MreC contains also a coiled-coil which is involved in the formation of dimer essential for its function. MreC (murein formation C) is involved in the rod shape determination in Escherichia coli, and more generally in cell shape determination of bacteria whether or not they are rod-shaped.
