label: Uncharacterised protein TP_0552
definition: >-
  This entry represents the uncharacterised protein TP_0552 from Treponema pallidum. The protein is 177 amino acids long and is found in Spirochaetales bacteria, including Treponema and Spirochaeta species. The function of this protein remains to be determined.
