identifier: Pfam:PF27577
label: Pre-rRNA-processing protein ESF2 C-terminal domain
definition: >-
  This entry represents a coiled-coil in pre-rRNA- processing protein ESF2 (18S rRNA factor 2) and similar eukaryotic proteins. This domain follows the central RRM domain and is involved in protein-protein interactions during ribosome biogenesis. ESF2 belongs to the ESF2/ABP1 family and is involved in small subunit processome assembly and 18S rRNA synthesis. The protein is required for early cleavages at sites A0, A1 and A2 in rRNA processing.
