identifier: Pfam:PF00185
label: Aspartate/ornithine carbamoyltransferase, Asp/Orn binding domain
definition: >-
  This family contains two related enzymes: Aspartate carbamoyltransferase ( ) (ATCase) catalyzes the conversion of aspartate and carbamoyl phosphate to carbamoylaspartate, the second step in the de novo biosynthesis of pyrimidine nucleotides. In prokaryotes ATCase consists of two subunits: a catalytic chain (gene pyrB) and a regulatory chain (gene pyrI), while in eukaryotes it is a domain in a multi- functional enzyme (called URA2 in yeast, rudimentary in Drosophila, and CAD in mammals) that also catalyzes other steps of the biosynthesis of pyrimidines. Ornithine carbamoyltransferase ( ) (OTCase) catalyzes the conversion of ornithine and carbamoyl phosphate to citrulline. In mammals this enzyme participates in the urea cycle and is located in the mitochondrial matrix. In prokaryotes and eukaryotic microorganisms it is involved in the biosynthesis of arginine. In some bacterial species it is also involved in the degradation of arginine (the arginine deaminase pathway). It has been shown that these two enzymes are evolutionary related. The predicted secondary structure of both enzymes are similar and there are some regions of sequence similarities. One of these regions includes three residues which have been shown, by crystallographic studies, to be implicated in binding the phosphoryl group of carbamoyl phosphate and is described by . The carboxyl-terminal, aspartate/ornithine-binding domain is connected to the amino-terminal domain by two α-helices, which comprise a hinge between domains.
