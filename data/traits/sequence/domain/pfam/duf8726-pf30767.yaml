identifier: Pfam:PF30767
label: Domain of unknown function (DUF8726)
definition: >-
  This entry represents a bacterial immunoglobulin-like (Big) domain of approximately 100 residues. The domain is found at the N terminus of multi-domain proteins that also contain the DUF7408 domain ( ). Structural similarity searches identify this as a member of the E-set Ig-like superfamily. This family is restricted to Bacillota, particularly Bacillales (including Paenibacillus and Bacillaceae) and Clostridia. The function of this domain remains to be determined.
