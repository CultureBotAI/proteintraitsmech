identifier: Pfam:PF27014
label: Domain of unknown function (DUF8334)
definition: >-
  This entry represents a domain of unknown function in uncharacterised proteins mostly found in Sar organisms. These proteins contain a SNARE-like fold. They are characterised by their tetrameric coiled-coil structures that facilitate membrane fusion processes. SNARE proteins are present in synaptic terminals, endoplasmic reticulum, and Golgi apparatus where the coiled-coil structure is important for membrane targeting and fusion specificity. The conserved coiled-coil architecture enables these proteins to function in vesicle trafficking and membrane fusion events.
