identifier: Pfam:PF08147
label: DBP10CT (NUC160) domain
definition: >-
  This group of DEAD-box RNA helicases includes Dbp10 from fungi, DDX54 (also known as DP97) from mammals and RH29 from plants. DDX54 interacts in a hormone-dependent manner with nuclear receptors. It plays an important role in central nervous system myelination. Dbp10 has a role in ribosome biogenesis. RH29 is essential for the functional maturation of both male and female gametophytes.
