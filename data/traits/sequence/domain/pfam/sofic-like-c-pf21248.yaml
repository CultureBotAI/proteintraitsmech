identifier: Pfam:PF21248
label: Protein adenylyltransferase SoFic-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal adenylyltransferase SoFic from Shewanella oneidensis and similar bacterial sequences. SoFic mediates the addition of adenosine 5'-monophosphate (AMP) to specific residues of target proteins. This is a winged-helix DNA-binding domain often found associated with ( ).
