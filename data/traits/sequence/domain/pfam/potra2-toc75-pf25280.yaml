identifier: Pfam:PF25280
label: Toc75-like, second POTRA domain
definition: >-
  This entry represents the second POTRA domain of Toc75 from Arabidopsis thaliana and similar plant proteins. The second POTRA domain contains a 40-residue insertion that folds into an elongated extra α-helix and loop, producing an overall β-α-α-β-β fold. Toc75 is an essential protein required for the import of protein precursors into chloroplasts. Toc75 has three POTRA domains, represented by and , which together adopt a bent L-shaped conformation.
