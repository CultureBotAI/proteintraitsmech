identifier: Pfam:PF06378
label: Sak Single Strand Annealing Protein
definition: >-
  This family represents the Sak Single Strand Annealing Protein (SSAP) from viruses and bacteria which belongs to Rad52-like superfamily. The Sak protein from phage 80alpha shares similarities with other SSAPs, such as Red-beta from phage lambda and RAD52 from eukaryotes. SSAPs like Sak play a crucial role in homologous recombination by promoting the annealing of complementary single-stranded DNA. Sak adopts a structure similar to other SSAPs and features a groove commonly observed in this protein group, which accommodates single-stranded DNA on the outer surface of the torus, known as the ssDNA binding groove or ssDBG. Mutations in Sak3 can reduce sensitivity to the antiviral abortive infection mechanism AbiK.
