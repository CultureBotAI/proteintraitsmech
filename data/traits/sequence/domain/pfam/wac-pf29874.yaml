identifier: Pfam:PF29874
label: Augmin complex subunit wac
definition: >-
  This entry represents the wac (wee Augmin component) subunit of the augmin complex found in Diptera. wac is a component of the eight-subunit augmin complex involved in centrosome-independent spindle microtubule generation. The protein contains a coiled coil domain and directly interacts with dgt2 via this region. wac is dispensable for somatic mitosis but is essential for chromosome alignment and segregation during female meiosis. It is required for microtubule assembly near spindle poles in oocytes and for acentrosomal microtubule nucleation during male meiosis. The protein localises to spindle poles and binds microtubules in vitro. wac mutations cause female sterility and defects in chromosome positioning during meiosis.
