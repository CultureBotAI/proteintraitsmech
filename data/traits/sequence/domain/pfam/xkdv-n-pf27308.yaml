identifier: Pfam:PF27308
label: XkdV N-terminal domain
definition: >-
  This entry represents the N-terminal domain of XkdV proteins found in bacteria and some viral sequences. XkdV proteins are associated with phage-like elements such as PBSX in Bacillus subtilis. The full-length XkdV protein is approximately 687 amino acids. The specific function of this domain remains to be determined. This entry also represents a middle domain in SPbeta prophage-derived uncharacteriesd protein YomR.
