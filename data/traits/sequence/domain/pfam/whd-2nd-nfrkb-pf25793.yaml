identifier: Pfam:PF25793
label: NFRKB second winged helix domain
definition: >-
  This domain is found in the human Nuclear factor related to kappa-B-binding protein (NFRKB) and related proteins from animals and plants. This domain has a significant similarity to known winged helix domains, and it is predicted to adopt a similar structure. NFRKB is a putative regulatory component of the chromatin remodelling INO80 complex which is involved in transcriptional regulation, DNA replication and probably DNA repair.
