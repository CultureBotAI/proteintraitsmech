identifier: Pfam:PF09223
label: ZinT (YodA) periplasmic lipocalin-like zinc-recruitment
definition: >-
  This domain is found in prokaryotic proteins that were first identified as part of the response of bacteria to a challenge with the toxic heavy metal cadmium. They are able to bind to cadmium and ensure its subsequent elimination. Previously known YodA, these proteins have been renamed as ZinT, and have been shown to bind zinc with high affinity. They may play a role in zinc homeostasis and growth under zinc limited conditions.
