identifier: Pfam:PF16079
label: Phage holin family Hol44, in holin superfamily V
definition: >-
  This is a family of small hydrophobic proteins with three transmembrane domains. These proteins are predicted holins produced by double-stranded DNA bacteriophages that use an endolysin-holin strategy to achieve lysis of their hosts. The endolysins are peptidoglycan-degrading enzymes that are usually accumulated in the cytosol until access to the cell wall substrate is provided by the holin membrane lesion.
