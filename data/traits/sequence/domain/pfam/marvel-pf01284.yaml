identifier: Pfam:PF01284
label: Membrane-associating domain
definition: >-
  This entry represents the ~130-residue MARVEL (MAL and related proteins for vesicle trafficking and membrane link) domain. The MARVEL domain is a module with a four transmembrane-helix architecture that has been identified in proteins of the myelin and lymphocyte (MAL), physins, gyrins and occludin families. All described MARVEL domain-containing proteins are consistent with the M-shaped topology: four transmembrane-helix region architecture with cytoplasmic N- and C-terminal regions. Their function could be related to cholesterol-rich membrane apposition events in a variety of cellular processes, such as biogenesis of vesicular transport carriers or tight junction regulation.
