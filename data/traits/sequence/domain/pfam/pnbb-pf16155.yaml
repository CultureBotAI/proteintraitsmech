identifier: Pfam:PF16155
label: 4-hydroxylaminobenzoate lyase
definition: >-
  This family, previously known as DUF4863, represents 4-hydroxylaminobenzoate lyase (PnbB) and related proteins mainly found in various proteobacteria, but also several fungal species. PnbB catalyses the conversion of 4-hydroxylaminobenzoate to 3,4-dihydroxybenzoate (protocatechuate) and ammonium. This enzyme is involved in the degradation of nitroaromatic compounds.
