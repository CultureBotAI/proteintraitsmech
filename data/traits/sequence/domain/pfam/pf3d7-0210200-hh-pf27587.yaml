identifier: Pfam:PF27587
label: PF3D7_0210200 helix hairpin domain
definition: >-
  This entry represents a helix hairpin domain found in Plasmodium falciparum protein PF3D7_0210200 and related proteins. The domain adopts a helix hairpin structure. The full-length protein is 2588 amino acids and contains predicted coiled-coil regions and multiple disordered regions. The protein is localised to the merozoite and a peptide fragment (residues 616-645) has been identified as a potential malaria vaccine candidate. The function of this domain remains to be determined.
