identifier: Pfam:PF16923
label: Glycosyl hydrolase family 63 N-terminal domain
definition: >-
  Glycoside hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. More than 100 different families of glycoside hydrolases have been defined based on sequence similarity. This entry represents the N-terminal β sandwich domain found in glycosyl hydrolase family 63 proteins. Glycosyl hydrolase family 63 is a family of eukaryotic enzymes that catalyse the specific cleavage of the non-reducing terminal glucose residue from Glc(3)Man(9)GlcNAc(2).
