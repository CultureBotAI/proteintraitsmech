identifier: Pfam:PF01521
label: Iron-sulphur cluster biosynthesis
definition: >-
  This entry represents a common domain in ATAP proteins and related FeS cluster biogenesis proteins. It displays two α-helices and seven β-strands. In SufA from Escherichia coli, the central core consists of two β-sheets, a three-stranded sheet (short A1 and A2-A3) and a four-stranded sheet (strands B1-B4). Several ATAP proteins displayed a similar fold ( , ). This domain is generally found as a single domain in IscA, ErpA, SufA and FeS cluster biogenesis-related proteins. In these proteins, it contains the cysteine conserved motif , which allows them to bind FeS clusters. It could also be found at the N-terminal in NfuA and related proteins or at the C-terminal. A-type assembly protein (ATAP) is a conserved and essential member of the ISC, SUF, and NIF systems and plays an indispensable role in the FeS cluster assembly and the transfer process. The ATAP family consists of several subfamilies: Prokaryotic ISC system: IscA Eukaryotic ISC system: ISCA1, ISCA2 SUF system: SufA NIF system: HesB (IscAnif) Additional proteins: ErpA, cpIscA ATAPs are characterised by a conserved motif, Cys-Xn-Cys-X-Cys, by which ATAPs can bind transiently to Fe-S clusters, presumably using the three Cys residues in this motif, and transfer the FeS cluster to apoproteins. ErpA may interact with ISC and SUF. It binds to Fe-S clusters and transfers them to apo-IspG, which is involved in quinone biosynthesis among many other cell components. It is essential for bacterial growth under aerobic conditions. cpIscA is a SufA-like ATAP that was transferred from cyanobacteria to plants through endosymbiosis events and now is only harboured by plant plastids. Iron-sulphur (FeS) clusters are important cofactors for numerous proteins involved in electron transfer, in redox and non-redox catalysis, in gene r…
