identifier: Pfam:PF01995
label: NrpR regulatory domains NRD1 and 2
definition: >-
  NrpR is an transcriptional repressor of nitrogen assimilation genes found primarily in Euryarchaeota. In the thermophilic archaeon Methanocaldococcus jannaschii it consists of a putative N-terminal winged helix-turn-helix (wHTH) domain used for DNA binding followed by two NrpR regulatory domains (NRD1 and NRD2) that sense and bind 2-oxoglutarate. In different organisms, NrpR proteins can vary on how many NrpR regulatory domains they contain and in their configuration. They can contain two NrpR domains, or one NrpR domain with or without the N-terminal HTH motif.
