identifier: Pfam:PF19725
label: DNA-directed RNA polymerase III subunit RPC5 C-terminal
definition: >-
  This entry represents the C-terminal domain of DNA-directed RNA polymerase III subunit RPC5 from metazoans. DNA-dependent RNA polymerase catalyses the transcription of DNA into RNA using the four ribonucleoside triphosphates as substrates. RNA polymerase III (Pol III) is a complex consisting of 17 subunits, which synthesizes small RNAs, such as 5S rRNA and tRNAs. Pol III is essential for efficient transcription from both the type 2 VAI and type 3 U6 RNA polymerase III promoters and plays a key role in sensing and limiting infection by intracellular bacteria and DNA viruses, being involved in innate immune response, as it induces type I interferon and NF-Kappa-B through the RIG-I pathway. DNA-directed RNA polymerase III subunit RPC5 is a specific peripheric component of RNA polymerase III complex. This subunit forms a subcomplex with RPC4 which is close to the active centre allowing the formation of the open promoter complex and facilitates termination and reinitiation. RPC5 mutations are associated with impaired type I INF and increased susceptibility to viral infections.
