identifier: Pfam:PF26216
label: GDPGP1-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of human GDP-D-glucose phosphorylase 1 (GDPGP1), an specific and highly efficient GDP-D-glucose phosphorylase regulating the levels of GDP-D-glucose in cells. The orthologues in A.thaliana are GDP-L-galactose phosphorylases catalysing the first reaction of the Smirnoff-Wheeler pathway, the major route to ascorbate biosynthesis in plants. This domain is predicted to show an α-β configuration. This domain is homologous to .
