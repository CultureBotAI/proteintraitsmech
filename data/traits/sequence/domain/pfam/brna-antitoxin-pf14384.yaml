identifier: Pfam:PF14384
label: BrnA antitoxin of type II toxin-antitoxin system
definition: >-
  BrnA is family of antitoxins that neutralises the toxin BrnT ( ). It consists of 3 α-helices and a C-terminal ribbon-helix-helix DNA binding domain. As in other toxin-antitoxin systems, BrnA negatively autoregulates the brnTA operon and has higher affinity for the DNA operator when complexed with BrnT. It dimerises with two molecules of its toxin BrnT.
