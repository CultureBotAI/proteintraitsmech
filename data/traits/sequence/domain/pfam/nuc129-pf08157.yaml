identifier: Pfam:PF08157
label: NUC129 domain
definition: >-
  This entry represents the C-terminal domain of human U3 small nucleolar RNA-associated protein NOL7 (also known as Nucleolar protein 7) and similar proteins from vertebrates. NOL7 is part of the small subunit (SSU) processome, first precursor of the small eukaryotic ribosomal subunit and has been reported to act as a tumour suppressor. It plays a role in early pre-rRNA accumulation and processing
