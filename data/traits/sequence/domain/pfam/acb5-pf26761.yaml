identifier: Pfam:PF26761
label: Acb5 phage protein
definition: >-
  This entry represents the Acb5 phage proteins that inhibit the bacterial anti-phage defense system called CBASS. These proteins degrade the CBASS-derived signaling molecules, thus disrupting the immune signaling cascade. They are predicted to fold into a simple structure composed of a curved five-stranded antiparallel α-sheet and an α-helix connecting strands 4 and 5.
