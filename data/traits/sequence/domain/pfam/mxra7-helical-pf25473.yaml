identifier: Pfam:PF25473
label: MXRA7 helical domain
definition: >-
  This domain is found in the human Matrix-remodeling-associated protein 7 (MXRA7) and related animal proteins. In human, MXRA7 gene is located on chromosome 17. The precise function of MXRA7 is unknown but it was found that MXRA7 altered the expression of genes involved in leukaemic cell differentiation and growth. MXRA7 inhibits the proliferation and affects the differentiation of THP-1 human monocytic cells possibly through NF-kB signalling pathways. The domain represented by this entry is predicted to adopt non-compact α-helical structure. It contains a stretch of highly conserved glutamate residues defined by the semi-conserved EExEEE sequence motif.
