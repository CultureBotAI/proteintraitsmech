identifier: Pfam:PF20511
label: Phosphomannose isomerase type I, catalytic domain
definition: >-
  This entry represents the catalytic domain of Phosphomannose isomerase type I enzymes (also known as Mannose-6-phosphate isomerases), which are involved in the synthesis of the GDP-mannose and dolichol-phosphate-mannose required for a number of critical mannosyl transfer reactions. This domain contains a zinc-binding site. It is composed of β-strands connected by long loops in a jelly roll conformation.
