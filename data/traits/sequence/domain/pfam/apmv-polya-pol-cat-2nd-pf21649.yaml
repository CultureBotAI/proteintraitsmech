identifier: Pfam:PF21649
label: APMV, Putative poly(A) polymerase, catalytic subunit, C-terminal
definition: >-
  This domain is found at the C-terminal end of Putative poly(A) polymerase catalytic subunit from Acanthamoeba polyphaga mimivirus (APMV) and similar sequences from mimiviruses. This entry comprises domains D3 and D4. D3 is very similar to the D2 domain (part of ) and shows the typical topology of a nucleotidyltransferase (NT) domain made of a mixed five-stranded β-sheet and two connecting helices. D4 is an extension that the entrance of the central tunnel at the interface of the dimer.
