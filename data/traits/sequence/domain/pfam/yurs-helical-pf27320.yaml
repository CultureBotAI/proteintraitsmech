identifier: Pfam:PF27320
label: YurS helical domain
definition: >-
  This entry represents the YurS helical domain found in bacteria. This domain adopts a helical structure and is named after the yurS gene from Bacillus subtilis. Members are found primarily in Bacillota, particularly in Bacillales including Bacillus species. The domain is approximately 91 amino acids in length. The function of this domain remains to be determined.
