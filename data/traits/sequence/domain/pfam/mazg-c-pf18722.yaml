identifier: Pfam:PF18722
label: MazG C-terminal domain
definition: >-
  This entry represents an α+β fold domain found C-terminal to the MazG pyrophosphatase domain. The domain has a conserved DxYRxHDxxH motif indicative of catalytic activity. Based on its broader context in DNA modification, it is proposed to function as a nucleotide kinase.
