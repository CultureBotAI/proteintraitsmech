identifier: Pfam:PF21591
label: RNA helicase Hera, dimerization domain
definition: >-
  This domain is found at the C-terminal region of Heat resistant RNA dependent ATPase from Thermus thermophilus (also known as Hera, ( ) the first DEAD box helicase that forms a stable dimer in the absence of ligands. This dimerization domain (DD) folds into a single turn of a left-handed super-helix.
