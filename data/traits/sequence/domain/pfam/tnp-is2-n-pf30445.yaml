identifier: Pfam:PF30445
label: IS2 transposase InsD, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of InsD transposases from IS2 insertion elements found in proteobacteria. It precedes the helix-turn-helix DNA-binding domain ( ) and the integrase catalytic domain ( ). IS2 is a bacterial insertion sequence element involved in DNA transposition. The specific function of this domain remains to be determined.
