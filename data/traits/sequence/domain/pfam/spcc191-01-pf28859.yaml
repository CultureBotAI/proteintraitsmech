identifier: Pfam:PF28859
label: Uncharacterised protein SPCC191.01 domain
definition: >-
  This entry represents a domain found in uncharacterised proteins from fungi. The domain is present in Schizosaccharomyces pombe protein SPCC191.01, which localises to both the cytoplasm and nucleus. This protein is 178 amino acids in length and contains regions of disorder and low complexity. The domain is also found in other fungal species but its specific function remains to be determined.
