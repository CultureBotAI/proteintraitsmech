identifier: Pfam:PF28487
label: WIP coiled-coil domain
definition: >-
  This entry represents a coiled-coil domain found towards the C-terminal of WPP domain-interacting proteins (WIP). The coiled-coil domains facilitate protein-protein interactions and homodimer or heterodimer formation between WIP family members. This entry represents the WPP domain-interacting protein (WIP) family which includes WIP1, 2 and 3 from Arabidopsis. These proteins are specific to plants and required for the localisation and anchorage of Ran GTPase-activating proteins (RanGAP) to the nuclear envelope (NE) mediated by WIT1 and WIT2 in undifferentiated cells of root tips. They are part of the SUN-WIP-WIT2-KAKU1 complex, in which they mediate the transfer of cytoplasmic forces to the nuclear envelope (NE), leading to nuclear shape changes.
