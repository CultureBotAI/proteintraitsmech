identifier: Pfam:PF29346
label: Glideosome-associated protein 45
definition: >-
  This entry represents Glideosome-associated protein 45 from Plasmodium falciparum (GAP45). GAP45 is a component of the glideosome complex, an inner membrane complex structure involved in parasite gliding motility and host cell invasion. During the asexual blood stage, it is required in schizonts to recruit MTIP and MyoA to the inner membrane complex where they assemble with GAP50 to form the glideosome complex.
