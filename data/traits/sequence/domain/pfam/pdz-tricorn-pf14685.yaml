identifier: Pfam:PF14685
label: Tricorn protease PDZ domain
definition: >-
  This entry represents the PDZ domain of tricorn protease. The tricorn protease is a protease that forms massive proteasome-like capsids with a hollow chamber. Typically, it consists of the β-propeller, PDZ and catalytic domains.
