identifier: Pfam:PF26064
label: VP3-like
definition: >-
  This entry represents a family of uncharacterised proteins found in DNA viruses that infect archaea and halobacteria, incuding Matrix protein Halorubrum pleomorphic virus 1 (VP3). Members contain four predicted transmembrane helices with a pair of β-hairpin structures inserted between the first and second α-helices and are predicted to be integral membrane proteins.
