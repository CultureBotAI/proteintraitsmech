identifier: Pfam:PF21761
label: NADPH-dependent reductive aminase-like, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of NADPH-dependent reductive aminase from Aspergillus oryzae (RedAm) and similar proteins predominantly found in fungi and bacteria. RedAm catalyses the reductive coupling of a broad set of carbonyl compounds with a variety of primary and secondary amines. This protein folds into an N-terminal Rossman domain ( ) and a C-terminal helical bundle (this entry) connected by a long inter-domain α-helix.
