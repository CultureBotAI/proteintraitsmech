identifier: Pfam:PF25265
label: USP32 N-terminal domain
definition: >-
  This domain is found at the N-terminal of USP32 and related eukaryotic proteins. The domain represented by this entry has detectable similarity to EF-hand domains, and it is predicted to adopt similar structure. It lacks the Ca2+ coordinating residues. Ubiquitin carboxyl-terminal hydrolase 32 (USP32) functions as a deubiquitinase that can remove conjugated ubiquitin from target proteins, such as RAB7A and LAMTOR1. It acts as a positive regulator of the mTORC1 signalling by mediating deubiquitination of LAMTOR1. In Caenorhabditis elegans, USP cyk-3 (USP32 orthologue) is involved in the formation of a functional microtubule organising centre provided by the male pronucleus.
