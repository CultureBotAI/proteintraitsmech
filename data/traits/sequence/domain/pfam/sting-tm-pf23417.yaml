identifier: Pfam:PF23417
label: STING transmembrane domain
definition: >-
  This entry represents the transmembrane domain (TM) of Transmembrane protein 173 which contains a cryptic pocket involved in inter-dimer interactions that mediate the formation of the high-order oligomer. Transmembrane protein 173, also known as stimulator of interferon genes protein (STING), is a transmembrane adaptor protein which is involved in innate immune signalling processes. It induces expression of type I interferons (IFN-alpha and IFN-beta) via the NF-kappa-B and IRF3, pathways in response to non-self cytosolic RNA and dsDNA. It consists of an N-terminal transmembrane (TM) and a C-terminal ligand-binding (LBD) domains.
