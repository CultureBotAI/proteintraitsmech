identifier: Pfam:PF01182
label: Glucosamine-6-phosphate isomerases/6-phosphogluconolactonase
definition: >-
  This domain is characteristic of the enzymes 6-phosphogluconolactonase ( ), Glucosamine-6-phosphate isomerase ( ), and Galactosamine-6-phosphate isomerase. 6-Phosphogluconolactonase is the enzyme responsible for the hydrolysis of 6-phosphogluconolactone to 6-phosphogluconate, the second step in the pentose phosphate pathway. Glucosamine-6-phosphate isomerase (or Glucosamine 6-phosphate deaminase) is the enzyme responsible for the conversion of D-glucosamine 6-phosphate into D-fructose 6-phosphate. It is the last specific step in the pathway for N-acetylglucosamine (GlcNAC) utilization in bacteria such as Escherichia coli (gene nagB) or in fungi such as Candida albicans (gene NAG1).
