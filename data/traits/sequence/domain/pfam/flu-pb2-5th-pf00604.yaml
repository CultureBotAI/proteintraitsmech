identifier: Pfam:PF00604
label: Influenza RNA polymerase PB2 CAP binding domain
definition: >-
  This entry represents the CAP binding domain of RNA-directed RNA polymerase subunit PB2 (also known as Polymerase basic protein 2) from Influenza A virus and similar proteins from influenzavirus (prthomyxoviridae). Influenza virus encodes a large, multidomain RNA-dependent RNA polymerase that can both transcribe and replicate the viral RNA genome. In influenza virus, the polymerase is composed of three polypeptides: PB1, PB2 and PA/P3. PB1 houses the polymerase active site, whereas PB2 and PA/P3 contain, respectively, cap-binding and endonuclease domains required for transcription initiation by cap-snatching.
