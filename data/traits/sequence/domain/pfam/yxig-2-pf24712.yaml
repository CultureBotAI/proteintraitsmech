identifier: Pfam:PF24712
label: YxiG-like protein
definition: >-
  This entry represents a family of uncharacterised proteins found in actinobacteria. Although this family does not contain the YxiG protein from B. subtilis it is clearly related to it from a structural point of view. These proteins like YxiG are also strongly predicted to form homodimers.
