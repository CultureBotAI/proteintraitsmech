identifier: Pfam:PF18061
label: CRISPR-Cas9 WED domain
definition: >-
  This domain, known as the wedge (WED) domain, can be found in Cas9 from Staphylococcus aureus. Cas9 cleaves double-stranded DNA targets with a protospacer adjacent motif (PAM) and complementarity to the guide RNA. The Cas9 WED domain has a fold comprising a twisted five-stranded β sheet flanked by four α helices, and is responsible for the recognition of the distorted repeat: anti-repeat duplex. WED domains are responsible for the recognition of single-guide RNA scaffolds.
