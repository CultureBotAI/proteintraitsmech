identifier: Pfam:PF15729
label: Cation channel sperm-associated targeting subunit tau
definition: >-
  This entry represents the C2 domain of CTSRT. Cation channel sperm-associated targeting subunit tau (CTSRT, also known as Amyotrophic lateral sclerosis 2 chromosomal region candidate gene 11 and C2 calcium-dependent domain-containing protein 6) has been identified in mice as an auxiliary component of the CatSper complex, which is involved in sperm cell hyperactivation. Sperm cell hyperactivation is required for sperm motility, essential late in the preparation of sperm for fertilization. This protein is key for CatSper flagellar targeting and trafficking into the quadrilinear nanodomains as it links the channel-carrying vesicles and motor proteins in elongating flagella.
