identifier: Pfam:PF10629
label: Ciliary microtubule inner protein 2B-like
definition: >-
  This entry represents a domain found in a group of eukaryotic proteins, including human Ciliary microtubule inner protein 2A-C-like (CMI2A-C-like). CMI2B/C are microtubule inner proteins (MIPs) that form part of the dynein-decorated doublet microtubules (DMTs) in cilia axoneme, which is required for motile cilia beating. This domain is a tubulin-binding domain. Some proteins in this group contain multiple copies of this domain.
