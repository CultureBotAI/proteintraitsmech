identifier: Pfam:PF12441
label: 'CopG antitoxin of type II toxin-antitoxin system '
definition: >-
  CopG antitoxin is a member of a type II toxin-antitoxin system family found mainly in bacteria. Most antitoxins encoded by the relBE and parDE loci belong to the MetJ/Arc/CopG family of dimeric proteins which bind DNA through N-terminal ribbon-helix-helix (RHH) motifs.
