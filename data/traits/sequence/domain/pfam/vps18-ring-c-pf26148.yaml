identifier: Pfam:PF26148
label: VPS18 RING C-terminal domain
definition: >-
  This entry represents the RING C-terminal domain in Vps18, Vacuolar membrane protein pep3 (Pep3) and similar animal proteins. This domain is a specialised type of Zn-finger of 40 to 60 residues that binds two atoms of zinc, and is probably involved in mediating protein-protein interactions. Vacuolar sorting protein 18 (Vps18) and Vacuolar membrane protein pep3 (Pep3) are involved in vesicle-mediated protein trafficking to lysosomal compartments, playing a crucial role in endocytic membrane transport and autophagic pathways. They act as a core component of the HOPS and CORVET endosomal tethering complexes, facilitating the conversion of Rab5 to Rab7 endosomes and mediating tethering and docking events during SNARE-mediated membrane fusion. The HOPS complex is recruited to Rab7 on the late endosomal membrane, regulating late endocytic, phagocytic, and autophagic traffic towards lysosomes. The CORVET complex functions as a Rab5 effector, mediating early endosome fusion. These proteins are essential for processes such as vacuolar biogenesis, lysosome biogenesis, and the degradation of apoptotic cells. They also play roles in embryogenesis, root development, and dendrite development in various organisms.
