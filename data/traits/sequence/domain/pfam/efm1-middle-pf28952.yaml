identifier: Pfam:PF28952
label: EFM1 middle domain
definition: >-
  This entry represents a domain found cental in the EFM1 family protein-lysine N-methyltransferases. The domain is located between the N-terminal SET domain and the C-terminal region of these enzymes. EFM1 proteins are S-adenosyl-L-methionine-dependent methyltransferases that monomethylate elongation factor 1-alpha at lysine-30. The domain is found in fungi and is conserved across the EFM1/RKM1 family. The specific function of this middle domain within the context of the methyltransferase activity remains to be determined.
