identifier: Pfam:PF30731
label: TP0183, N-terminal domain
definition: >-
  TP_0183 is a protein that is processed from a precursor containing an N-terminal signal peptide. Protein-protein interactions of TP0183 of Treponema pallidum with DnaA, with the DNA repair helicase TP0380, and with SbcD, a protein involved in replication restart after DNA repair, suggest a role for TP0183 in DNA metabolism. This entry represents the N-terminal domain.
