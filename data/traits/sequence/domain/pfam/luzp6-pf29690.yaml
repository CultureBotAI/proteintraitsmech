identifier: Pfam:PF29690
label: Leucine zipper protein 6
definition: >-
  This entry represents leucine zipper protein 6 (LUZP6). This protein is widely expressed, with the highest levels found in the brain, placenta, spleen, testis, and ovary. The protein is up-regulated in some tumour cells and can be induced by IFNA1. LUZP6 elicits IgG antibody response in polycythaemia vera patients and in patients with chronic myelogenous leukaemia and prostate cancer. This protein is produced by a bicistronic gene which also produces the MTPN protein from a non-overlapping reading frame. LUZP6 is encoded by a cryptic open reading frame located in the 3'-untranslated region of MTPN and is expressed following IRES-mediated alternative initiation of translation.
