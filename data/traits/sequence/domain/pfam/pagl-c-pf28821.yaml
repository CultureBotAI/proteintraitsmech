identifier: Pfam:PF28821
label: Acyloxyacyl hydrolase, C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 160 residues found in acyloxyacyl hydrolases from Bacteroidota. The domain is located C-terminal to the PagL domain and is structurally related to it. Acyloxyacyl hydrolases ( ) are lipid A 3-O-deacylases that remove acyl chains from lipid A, modifying lipopolysaccharide structure. These enzymes can affect bacterial interactions with the host immune system by altering the immunostimulatory properties of lipid A. The specific function of this C-terminal domain remains to be determined.
