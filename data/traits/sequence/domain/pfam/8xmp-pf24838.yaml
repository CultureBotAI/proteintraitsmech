identifier: Pfam:PF24838
label: Octameric membrane protein family (8xMP)
definition: >-
  This entry represents uncharacterised proteins found in bacteria. They are predicted as integral membrane proteins composed of three integral membrane α-helices. Structure prediction suggests that these proteins form an octameric complex ( ipTM = 0.81 pTM = 0.82). This complex contains a central pore. The predicted complex has a flat face on the predicted extracellular face that suggests it may form a complex with another as yet unidentified partner. The α-helices could project into the cytoplasm.
