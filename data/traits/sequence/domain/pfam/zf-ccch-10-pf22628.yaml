identifier: Pfam:PF22628
label: ZAP-like CCCH zinc finger
definition: >-
  This is the CCCH-type zinc finger domain found in muscleblind (MBL) from Drosophila and its homologues. MBL is required for terminal differentiation of photoreceptor cells and it is vital for embryonic development. Mammalian MBL-like proteins (MBL1-4) mediate pre-mRNA alternative splicing regulation. They act either as activator or repressor of splicing on specific pre-mRNA targets. They can inhibit cardiac troponin-T (TNNT2) pre-mRNA exon inclusion but induces insulin receptor (IR) pre-mRNA exon inclusion in muscle. MBL0like proteins antagonize the alternative splicing activity pattern of CELF proteins. These are RNA-binding proteins that bind to 5-'ACACCC-3' core sequence, termed zipcode, within the 3'UTR of ITGA3. They bind to CUG triplet repeat expansion in myotonic dystrophy muscle cells by sequestering the target RNAs. Together with RNA binding proteins RBPMS and RBFOX2, they activate vascular smooth muscle cells alternative splicing events.
