identifier: Pfam:PF12919
label: TcdA/TcdB catalytic glycosyltransferase domain
definition: >-
  Toxins A (TcdA) and B (TcdB) of Clostridium difficile belong to the family of clostridial glucosylating toxins. These toxins glucosylate small GTPases of Rho and Ras families, inhibiting the signalling and regulatory functions of these switch proteins. After receptor-binding, the toxins are endocytosed to reach acidic endosomal compartments from where the toxins are translocated into the cytosol. This entry represents the N-terminal glucosyltransferase domain from TcdA and TcdB. It is also found in other toxins. The GTD of TcdB has been shown to glycosylate the host's RhoA protein.
