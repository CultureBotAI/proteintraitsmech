identifier: Pfam:PF22576
label: Transcriptional cofactor Bfc
definition: >-
  This domain is found in sequences from insects, including the transcriptional cofactor Bfc from Drosophila melanogaster, which adopts a C2-like fold. Bfc is a transcriptional cofactor involved in efferocytosis. Together with Srp mediates expression of the phagocytic receptor crq/croquemort in response to apoptotic cells, and is up-regulated by crq/croquemort in a positive feedback mechanism. Bfc is also involved in macrophage engulfment and clearance of apoptotic cells during embryogenesis.
