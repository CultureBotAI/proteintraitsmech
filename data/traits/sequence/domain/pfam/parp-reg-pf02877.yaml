identifier: Pfam:PF02877
label: Poly(ADP-ribose) polymerase, regulatory domain
definition: >-
  Poly(ADP-ribose) polymerase catalyses the covalent attachment of ADP-ribose units from NAD+ to itself and to a limited number of other DNA binding proteins, which decreases their affinity for DNA. Poly(ADP-ribose) polymerase is a regulatory component induced by DNA damage. The regulatory domain of the polymerase is almost always associated with the C-terminal catalytic domain (see ). This domain consists of a duplication of two helix-loop-helix structural repeats.
