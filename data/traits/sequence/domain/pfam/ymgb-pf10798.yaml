identifier: Pfam:PF10798
label: Biofilm development protein YmgB/AriR
definition: >-
  AriR, also known as YmgB, is part of the three gene cluster ymgABC which has a role in biofilm development and stability. YmgB represses biofilm formation in rich medium containing glucose, decreases cellular motility and also protects the cell from acid, which indicates that YmgB has an important function in acid-resistance. YmgB binds as a dimer to genes which are important for biofilm formation via a ligand. Due to its important function in acid resistance it is also known as AriR (regulator of acid resistance influenced by indole). AriR may be a non-specific DNA-binding protein that binds genes and/or intergenic regions via a geometric recognition.
