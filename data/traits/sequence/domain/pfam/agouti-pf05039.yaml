identifier: Pfam:PF05039
label: Agouti protein
definition: >-
  The agouti protein regulates pigmentation in the mouse hair follicle producing a black hair with a subapical yellow band. A highly homologous protein agouti signal protein (ASIP) is present in humans and is expressed at highest levels in adipose tissue where it may play a role in energy homeostasis and possibly human pigmentation. This family also includes the Agouti-related protein (Agrp), involved in energy balance, body weight regulation and metabolism. It interacts with melanocortin receptors MC3R, MC4R and MC5R. This family also includes Toxin Tbo-IT2 from Oblong running crab spider, which contains an inhibitor cystine knot (ICK) fold with a spatial structure and very similar Cys distribution to agouti-signaling proteins (ASIP) and agouti-related proteins (AGRP).
