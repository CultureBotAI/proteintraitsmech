identifier: Pfam:PF30385
label: Testis-expressed protein 2 N-terminal domain
definition: >-
  This entry represents an N-terminal domain found in testis-expressed protein 2 (TEX2) in metazoans. TEX2 is an endoplasmic reticulum (ER) membrane protein that contains two transmembrane helices and a C-terminal SMP-LTD lipid-binding domain. During ER stress or when cellular ceramide levels increase, TEX2 induces contacts between the ER and medial-Golgi complex to facilitate non-vesicular transport of ceramides, preventing toxic ceramide accumulation. The protein is enriched at nucleus-vacuole junctions. The specific function of this N-terminal domain remains to be determined.
