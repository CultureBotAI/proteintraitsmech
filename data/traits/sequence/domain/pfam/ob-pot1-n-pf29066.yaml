identifier: Pfam:PF29066
label: Protection of telomeres protein 1, N-terminal OB domain
definition: >-
  This predicted oligonucleotide/oligosaccharide binding (OB) domain is found at the N-terminal end of Protection of telomeres protein 1 from Gallus gallus (POT1), a component of the telomerase ribonucleoprotein (RNP) complex that is essential for the replication of chromosome termini. It is a component of the double-stranded telomeric DNA-binding TRF1 complex that is involved in the regulation of telomere length by cis-inhibition of the telomerase. Members of this group are found in animals.
