identifier: Pfam:PF29028
label: Soluble lytic transglycosylase C-terminal LysM-like domain
definition: >-
  This entry represents a C-terminal LysM-like domain found in soluble lytic transglycosylase proteins. This domain follows the SLT catalytic domain ( ) and is approximately 50-65 residues in length. LysM-like domains typically bind peptidoglycan. The entry is found almost exclusively in Bacteroidota, particularly in Flavobacteriales, Bacteroidales and Cytophagales.
