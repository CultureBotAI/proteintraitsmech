identifier: Pfam:PF07177
label: Neuralized
definition: >-
  The neuralized homology repeat (NHR) domain is a module of ~160 amino acids, which has been identified as a tandem repeat in drosophila neuralized, a protein involved in development of the central and peripheral nervous system. Several other fly, worm, and mammalian neuralized-like proteins were found to contain between one and six NHR domains associated with other modules, such as RING, SOCS, or SPRY. It has been suggested that the NHR domain is required for the localization of neuralized to the plasma membrane. As it has been proposed that NHR domains do partly resemble SPRY domains, it is possible that NHR possess microtubule-binding functions, similar to those proposed for SPRY domains.
