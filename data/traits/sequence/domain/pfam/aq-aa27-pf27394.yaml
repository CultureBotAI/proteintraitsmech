identifier: Pfam:PF27394
label: Aq_aa27 P-loop NTPase domain
definition: >-
  This entry represents a domain found towards the C-terminal region in Uncharacterized protein aq_aa27 from Aquifex aeolicus. This domain contains a P-loop nucleoside triphosphate hydrolase fold ( ) and is found predominantly in Bacillota, with representatives in Bacilli and Clostridia classes, and it is also found in Halobacteria. The function of this domain remains to be determined. This domain is also found at different positions in predicted PLD phosphodiesterase domain-containing protein and other uncharacterised archaeal and bacterial proteins.
