identifier: Pfam:PF26537
label: Lid domain of Phi812 weld protein
definition: >-
  This entry represents the lid domain of the weld protein from bacteriophage phi812 and associated proteins. Phi812 is a bacteriophage that infects Staphylococcus aureus, including many methicillin-resistant strains (MRSA). The weld protein of phi812 can be divided into N-terminal lid and C-terminal clip ( ) domains, which are connected via a 14-residue-long linker. The lid domain interacts with an inner tripod and serves as a lid covering the peptidase site of the cleaver domain of the hub protein. Releasing the weld protein from the baseplate upon host cell binding exposes the active site of the cleaver domain of the hub protein and enables it to degrade the cell wall peptidoglycan. This domain folds into an α/β structure composed of a curved four-stranded antiparallel β-sheet packed on one side with α-helices.
