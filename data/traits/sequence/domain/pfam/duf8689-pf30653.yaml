identifier: Pfam:PF30653
label: Domain of unknown function (DUF8689)
definition: >-
  This entry represents a C-terminal domain of approximately 75 residues found in bacterial proteins. This domain is always located C-terminal to AAA+ ATPase domains. The family is found predominantly in Alphaproteobacteria, particularly in the orders Rhodobacterales, and in Planctomycetota. The function of this domain remains to be determined.
