identifier: Pfam:PF02543
label: Carbamoyltransferase N-terminus
definition: >-
  This domain is found in NodU from Rhizobium, CmcH from Nocardia lactamdurans and the bifunctional carbamoyltransferase TobZ from Streptoalloteichus tenebrarius. NodU a Rhizobium nodulation protein involved in the synthesis of nodulation factors has 6-O-carbamoyltransferase-like activity. CmcH is involved in cephamycin (antibiotic) biosynthesis and has 3-hydroxymethylcephem carbamoyltransferase activity ( ). TobZ functions as an ATP carbamoyltransferase and tobramycin carbamoyltransferase.
