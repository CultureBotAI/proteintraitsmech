identifier: Pfam:PF24710
label: Family of unknown function (DUF7671)
definition: >-
  This entry represents a family of uncharacterised bacterial proteins. The protein forms a single β-barrel domain which shows some structural similarity to the N-terminal domain of the PriA protein. However, structure prediction does not support this protein having a DNA-binding function like PriA.
