identifier: Pfam:PF18280
label: Nucleotidyltransferase, substrate binding domain
definition: >-
  This domain is located on the central part of a nucleotidyltransferase from Pseudomonas aeruginosa (Ant(4')-IIb) and in other bacterial proteins predominantly found in Actinobacteria. It shows a four-helical up-and-down bundle and is found associated with other nucleotidyltransferase domains.
