identifier: Pfam:PF14251
label: PterinBD-DUF4346
definition: >-
  This domain is found in Uncharacterized protein ycf91, MJ0107 and related proteins from bacteria, archaea and a few lower eukaryotic species. It contains two conserved sequence motifs: LDP and DHA. MJ0107 does not possess dihydropteroate synthase activity. In bacteria, this domain is found in predicted conflict systems that also encode genes for an active Thymidylate synthase and a pterin-dependent one-carbon carrier (MtrA domain). This system is predicted to deplete virally generated nucleotides and replace them with a nucleotide that restricts invasive DNA or protects host DNA.
