identifier: Pfam:PF22797
label: SlpA domain II
definition: >-
  This domain is found in S-layer protein (SlpA) from Lactobacillus acidophilus and similar sequences. This domain is involved in the self-assembly and dimerisation of the S-layer. It adopts an α/β structure consisting of a curved mixed β-sheet and two α-helices packed on it. It has a partial structural similarity to the cadherin ectodomains comprising the curved β-sheet and differs significantly in the central part that adopts an α-helical conformation instead of extended β.
