identifier: Pfam:PF23612
label: ZN142 C2H2 zinc finger
definition: >-
  This entry represents the 21st and 23rd C2H2 zinc finger in human ZNF142 and related proteins. In mice ZNF142 and related proteins, this domain can be found in a different position. Zinc finger protein 142 (ZNF142) plays a role in nervous system development. It is thought to be involved in transcriptional regulation. This proteins is predicted to contain multiple C2H2 zinc fingers which may be involved in DNA or RNA binding. C2H2-type (classical) zinc fingers (Znf) were the first class to be characterised. They contain a short β-hairpin and an α-helix (β/β/α structure), where a single zinc atom is held in place by Cys(2)His(2) (C2H2) residues in a tetrahedral array. C2H2 Znf's can be divided into three groups based on the number and pattern of fingers: triple-C2H2 (binds single ligand), multiple-adjacent-C2H2 (binds multiple ligands), and separated paired-C2H2. C2H2 Znf's are the most common DNA-binding motifs found in eukaryotic transcription factors, and have also been identified in prokaryotes. Transcription factors usually contain several Znf's (each with a conserved β/β/α structure) capable of making multiple contacts along the DNA, where the C2H2 Znf motifs recognise DNA sequences by binding to the major groove of DNA via a short α-helix in the Znf, the Znf spanning 3-4 bases of the DNA. C2H2 zinc fingers can also bind to RNA and protein targets.
