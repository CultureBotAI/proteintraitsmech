identifier: Pfam:PF30518
label: Cyanobacterial Mfd, Rossmann-like domain
definition: >-
  This entry represents an alpha/beta domain of approximately 100 residues found exclusively in cyanobacterial Mfd (transcription- repair-coupling factor) proteins. The domain is located between the UvrB_inter domain ( ) and the CarD_TRCF_RID domain ( ). Mfd couples transcription and DNA repair by recognising RNA polymerase stalled at DNA lesions, mediating ATP-dependent release of RNAP and its truncated transcript, and recruiting nucleotide excision repair machinery to the damaged site. This cyanobacteria-specific insertion domain adopts a Rossmann fold according to CATH classification. The specific function of this domain within cyanobacterial Mfd proteins remains to be determined.
