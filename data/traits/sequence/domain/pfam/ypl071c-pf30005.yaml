identifier: Pfam:PF30005
label: YPL071C
definition: >-
  This entry represents the YPL071C family of uncharacterised proteins found in yeasts. YPL071C is a small protein of 156 amino acids that is localised to both the cytoplasm and nucleus. The protein is predicted to undergo phosphorylation at serine-21. This entry represents a conserved region which contains small helices and disordered regions.
