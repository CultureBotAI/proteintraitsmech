identifier: Pfam:PF31251
label: Poxvirus A26L envelope protein, middle domain
definition: >-
  This entry represents the middle domain of the poxvirus envelope protein OPG153 (also known as A26L or p4c), found in Chordopoxvirinae including vaccinia virus, variola virus and monkeypox virus. The full-length OPG153 protein is a virion membrane protein that acts as an acid-sensitive membrane fusion suppressor. Low pH in host endosomes triggers conformational changes that allow de-repression of the viral fusion complex and membrane fusion. This middle domain is located between the N-terminal domain ( ) and the C-terminal fusion domain ( ). The specific function of this middle domain remains to be determined.
