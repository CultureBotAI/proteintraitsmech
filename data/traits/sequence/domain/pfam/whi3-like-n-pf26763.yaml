identifier: Pfam:PF26763
label: Whi3/4-like, N-terminal domain
definition: >-
  This entry represents an RRM domain found N-terminal in a group of proteins including yeast Scw1, Whi3, and Whi4. Scw1 is a cytoplasmic RNA-binding protein involved in septation and cell wall structure in fission yeast. It may act as an inhibitor of septum formation. Its RRM shares sequence similarity with those of Whi3 and Whi4 from budding yeast. Whi3 modulates cell size and regulates the cell cycle by binding CLN3 mRNA and localising it to cytoplasmic foci. It is also involved in cell fate determination. Whi4 is a partially redundant homologue of Whi3. Some related proteins contain two RRMs, with RRM1 similar to that of RBP-MS-like proteins.
