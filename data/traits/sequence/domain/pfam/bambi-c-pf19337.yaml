identifier: Pfam:PF19337
label: BMP and activin membrane-bound inhibitor homolog C-terminus
definition: >-
  This entry represents the C-terminal domain of BAMBI proteins. It contains the transmembrane domain and a short intracellular domain that, unlike all other known TGF-beta type I or type II receptors, does not encode a serine/threonine-kinase domain. However, it shares sequence homology with the E6 and catalytic loops of receptor serine/threonine kinases. This entry consists of several eukaryotic BMP and activin membrane-bound inhibitor (BAMBI) proteins. Members of the transforming growth factor-beta (TGF-beta) superfamily, including TGF-beta, bone morphogenetic proteins (BMPs), activins and nodals, are vital for regulating growth and differentiation. BAMBI is related to TGF-beta-family type I receptors but lacks an intracellular kinase domain. BAMBI is an essential regulator of cell proliferation and differentiation that represses TGF-beta and enhances Wnt/beta-catenin signalling in various cell types. Thus, it is involved in a high number of physiological and pathological processes. It stably associates with TGF-beta-family receptors and inhibits BMP and activin as well as TGF-beta signalling.
