identifier: Pfam:PF21640
label: LytM, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of the peptidase from the M23 family LytM found in Ruminococcus gnavus ( ) and similar proteins predominantly found in firmicutes. This protein is predicted to have glycyl-glycine endopeptidase activity. This domain adopts an α-helical structure.
