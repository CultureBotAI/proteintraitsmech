identifier: Pfam:PF02697
label: Putative antitoxin
definition: >-
  Proteins in this family represent the antitoxin component of a toxin-antitoxin (TA) module, which includes VapB2, VapB3, VapB18, AF_1481, M1627_0365 and similar antitoxins. TA loci are thought to be mobile cassettes that move frequently within and between chromosomes and may function as stress-response elements beneficial to free-living prokaryotes.
