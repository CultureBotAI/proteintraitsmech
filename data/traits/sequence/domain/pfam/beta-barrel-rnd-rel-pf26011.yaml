identifier: Pfam:PF26011
label: RND related, beta-barrel domain
definition: >-
  This domain is found in proteins from firmicutes that are related to RND (resistance-nodulation-division) efflux pump components. The domain represented in this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel. This model does not include this N-terminal strand. It is often found associated to and .
