label: Protein of unknown function (DUF3615)
definition: >-
  This domain is found in a group of uncharacterised plant proteins, and is typically between 86 and 97 amino acids in length. There is a conserved FAE sequence motif. There is a single completely conserved residue F that may be functionally important.
