identifier: Pfam:PF05138
label: Phenylacetic acid catabolic protein
definition: >-
  This family includes PaaA and PaaC proteins, which are part of a catabolic pathway of phenylacetic acid. E. coli PaaA and PaaC are components of 1,2-phenylacetyl-CoA epoxidase multicomponent enzyme system which catalyses the reduction of phenylacetyl-CoA (PA-CoA) to form 1,2-epoxyphenylacetyl-CoA. PaaA is the catalytic subunit involved in the incorporation of one atom of molecular oxygen into phenylacetyl-CoA, while PaaC may be essential for structural integrity of the alpha subunit.
