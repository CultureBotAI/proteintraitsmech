identifier: Pfam:PF30621
label: Domain of unknown function (DUF8675)
definition: >-
  This entry represents an N-terminal domain of approximately 140 residues found in cyanobacteria, including Prochlorococcus, Synechococcus and Cyanobium species. It is also found in Paulinella, a eukaryote with a cyanobacterial chromatophore. This domain is consistently found at the N terminus of proteins containing an Rce1-like domain ( ). The function of this domain remains to be determined.
