identifier: Pfam:PF30526
label: LysM11, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of LysM11 from Penicillium expansum (also known as PeLysM11) and related fungal proteins. PeLysM11 was shown to play a regulatory role in the fungal virulence. This domain may adopt an all-α fold.
