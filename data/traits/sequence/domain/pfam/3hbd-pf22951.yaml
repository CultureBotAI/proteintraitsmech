identifier: Pfam:PF22951
label: Three-helical bundle domain
definition: >-
  This domain is found in human YEATS domain-containing protein 2 (YEATS2) and related proteins from animals and fungi. YEATS2 is a chromatin reader component of the ATAC complex, a complex with histone acetyltransferase activity on histones H3 and H4. It specifically recognises and binds histone H3 crotonylated at 'Lys-27' (H3K27cr). The domain represented by this entry is predicted to adopt a globular structure consisting of a bundle of three α-helices. This domain contains two semi-conserved sequence motifs: YX(5)GKRR and WCRXHGYTP. The function of this domain is unknown.
