identifier: Pfam:PF00497
label: Bacterial extracellular solute-binding proteins, family 3
definition: >-
  Bacterial high affinity transport systems are involved in active transport of solutes across the cytoplasmic membrane. Most of the bacterial ABC (ATP-binding cassette) importers are composed of one or two transmembrane permease proteins, one or two nucleotide-binding proteins and a highly specific periplasmic solute-binding protein. In Gram-negative bacteria the solute-binding proteins are dissolved in the periplasm, while in archaea and Gram-positive bacteria, their solute-binding proteins are membrane-anchored lipoproteins. On the basis of sequence similarities, the vast majority of these solute-binding proteins can be grouped into eight families or clusters, which generally correlate with the nature of the solute bound. This entry represents a domain found in the solute-binding protein family 3 members from Gram-positive bacteria, Gram-negative bacteria and archaea. This domain can also be found in the N-terminal of the membrane-bound lytic murein transglycosylase F (MltF) protein. MltF is a murein-degrading enzyme that degrades murein glycan strands and insoluble, high-molecular weight murein sacculi, with the concomitant formation of a 1,6-anhydromuramoyl product. Familiy 3 members include: Histidine-binding protein (gene hisJ) of Escherichia coli and related bacteria. An homologous lipoprotein exists in Neisseria gonorrhoeae. Lysine/arginine/ornithine-binding proteins (LAO) (gene argT) of Escherichia coli and related bacteria are involved in the same transport system than hisJ. Both solute-binding proteins interact with a common membrane-bound receptor hisP of the binding protein dependent transport system HisQMP. Glutamine-binding proteins (gene glnH) of Escherichia coli and Bacillus stearothermophilus. Glutamate-binding protein (gene gluB) of Corynebacterium gl…
