identifier: Pfam:PF21374
label: WsaF, N-terminal domain
definition: >-
  This entry represents a domain found N-terminal in WsaF from Geobacillus stearothermophilus ( ) and related bacterial proteins. WsaF catalyses the formation of beta-1-2-linkage of rhamnose sugars in the carbohydrate polymer. It consists of two domains, the N-terminal which binds the acceptor (the growing rhamnan chain), and a C-terminal domain which binds the substrate (dTDP-beta-l-rhamnose) ( ).
