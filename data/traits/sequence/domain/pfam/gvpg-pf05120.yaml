identifier: Pfam:PF05120
label: Gas vesicle protein G
definition: >-
  Gas vesicles are intracellular, protein-coated, and hollow organelles found in cyanobacteria and halophilic archaea. They are permeable to ambient gases by diffusion and provide buoyancy, enabling cells to move upwards in water to access oxygen and/or light. This family represents Gas vesicle protein G from Streptomyces sp. and similar prokaryotic proteins involved in the formation of gas vesicles.
