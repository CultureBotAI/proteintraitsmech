label: Vitamin uptake-like sensor
definition: >-
  This is an integral membrane sensory domain related to the queuosine precursor transporter ( , found in YhhQ protein from E. coli). This domain, named Vitamin uptake-like sensor (VUPS), is found in a variety of bacteria in combination with PAS ( , ), GGDEF ( ), and EAL ( ) domains, and with histidine sensor kinases ( ).
