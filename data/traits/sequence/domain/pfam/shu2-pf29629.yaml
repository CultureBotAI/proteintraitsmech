identifier: Pfam:PF29629
label: Suppressor of hydroxyurea sensitivity protein 2
definition: >-
  This entry represents the SHU2 proteins found in fungi. SHU2 is a component of the Shu complex, which includes CSM2, PSY3, SHU1 and SHU2. The complex plays a role in RAD51/RAD54- dependent homologous recombination repair to repair MMS-induced lesions during S-phase. SHU2 is required for error-free repair of spontaneous and induced DNA lesions to protect the genome from mutation. The protein is localised to the nucleus and is found at sites of double-strand breaks. SHU2 promotes the formation of homologous recombination intermediates that are processed by Sgs1-Rmi1-Top3. The Shu complex couples error- free post-replication repair to homologous recombination.
