identifier: Pfam:PF22077
label: CRISPR-associated endonuclease C2c1 Nuc-II domain
definition: >-
  This entry represents the C-terminal second Nuc (Nuc-II) domain of C2c1 CRISPR-Cas endonuclease (also known as Cas12b). This domain folds into an open five-stranded β-barrel and an α-helix. Nuc-II is essential for cleavage activity. C2c1 is a class 2 type V-B effector protein that was shown to be active for target DNA cleavage in vivo and in vitro. In contrast to Cpf1, this enzyme cleavage activity requires both crRNA and tracrRNA. The structure of C2c1 consists of an α-helical recognition (REC) lobe, including Helical-I and Helical-II, and a NUC lobe, including OBD, RuvC, and two Nuc domains.
