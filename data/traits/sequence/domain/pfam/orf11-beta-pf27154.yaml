identifier: Pfam:PF27154
label: ORF11 beta-sandwich domain
definition: >-
  This entry represents a small β-sandwich domain found in an Uncharacterized 10.2 kDa protein in HgiCIIM 5'region (ORF11) from Herpetosiphon aurantiacus. The protein is located within the HgiBI restriction-modification system and may function as a silencing control element for regulation of the restriction system. The specific role of this β-sandwich domain in restriction system regulation is unknown.
