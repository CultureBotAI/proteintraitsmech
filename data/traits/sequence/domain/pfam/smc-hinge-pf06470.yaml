identifier: Pfam:PF06470
label: SMC proteins Flexible Hinge Domain
definition: >-
  This entry represents the hinge region of the SMC (Structural Maintenance of Chromosomes) family of proteins. The hinge region is responsible for formation of the DNA interacting dimer. It is also possible that its precise structure is an essential determinant of the specificity of the DNA-protein interaction. This region is also found in urease accessory protein 2 (URE2) which is a central component of cohesin, a complex required for chromosome cohesion during the cell cycle, and Is unrelated to urease function in C.neoformans.
