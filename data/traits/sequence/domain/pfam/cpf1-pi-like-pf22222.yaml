identifier: Pfam:PF22222
label: CRISPR-associated endonuclease Cpf1 PI domain
definition: >-
  This entry represents the PI (PAM-interacting) domain found in Cpf1, also known as CRISPR-associated endonuclease Cas12a. The CRISPR-Cpf1 system is a class 2 CRISPR-Cas system that mediates robust DNA interference. Cpf1 differ from Cas9 in many aspects, including the guide RNAs and substrate specificity. The Cpf1-crRNA complex cleaves a target double-stranded DNA containing a short T-rich PAM motif on the 5' end of the non-target strand. The PAM motif is recognised by the Cpf1 PI (PAM-interacting) domain. This domain folds into an array of four helices and along with the helix-loop-helix motif in the REC1 domain, it channels the PAM strand into a cavity leading to the nuclease site.
