identifier: Pfam:PF22573
label: Sperm-associated microtubule inner protein 5
definition: >-
  This entry represents a domain found in Sperm-associated microtubule inner protein 5 (SPMIP5 also known as C10orf82) and its homologues. SPMIP5 is a mammalian sperm-specific microtubule inner protein that probably plays a role in the stabilisation of the axonemal microtubules. This domain binds to tubulin.
