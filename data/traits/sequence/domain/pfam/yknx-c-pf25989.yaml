identifier: Pfam:PF25989
label: YknX, C-terminal permuted SH3-like domain
definition: >-
  This domain is found in the Putative efflux system component YknX from Bacillus subtilis and related bacterial proteins. YknX is a component of an unusual four-component transporter YknWXYZ, which is required for protection against the killing factor SdpC (sporulation-delaying protein). YknX interacts with YknYZ. The domain represented by this entry folds into an open β-barrel with a circularly permuted topology of SH3-like barrels.
