identifier: Pfam:PF31173
label: Domain of unknown function (DUF8832)
definition: >-
  This entry represents a domain of approximately 110 residues found in uncharacterised proteins in bacteria, predominantly in Actinomycetes (Streptomyces, Micromonospora) and some Bacilli. This domain adopts an immunoglobulin-like fold and is a member of clan CL0159. Many proteins contain two tandem copies of this domain. The function of this domain remains to be determined.
