identifier: Pfam:PF31193
label: LSM12, LSM domain, fungi/Trypanosomatids
definition: >-
  This entry represents the LSM domain of LSM12, found in Trypanosomatidae and fungal sequences. LSM12 is a PBP1-interacting protein involved in post-transcriptional regulation of gene expression. The protein forms complexes with MKT1 or MKT1L, PBP1 and XAC1.
