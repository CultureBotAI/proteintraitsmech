identifier: Pfam:PF18765
label: Polymerase beta, Nucleotidyltransferase
definition: >-
  This entry represents a domain that covers most of the protein length in Protein adenylyltransferase MntA from Shewanella oneidensis, and is located at the N-terminal end of Spectinomycin 9-adenylyltransferase from Campylobacter jejuni and Hailong protein B from Rhodobacteraceae bacterium (HalB). MntA is the antitoxin component of a type VII toxin-antitoxin (TA) system. Upon overexpression in situ or in E.coli neutralizes the effect of cognate toxin HepT mostly due to tri-AMPylation of toxin. Aad9 mediates bacterial resistance to spectinomycin, is probably a spectinomycin 9-adenylyltransferase. HalB is a component of antiviral defense system Hailong, composed of HalA and HalB. It is a constitutive NTPase that polymerises dATP into oligodeoxyadenylate (ODA) on its C-terminal residue. This domain shows a nucleotidyltransferase fold as found in polymorphic toxins (NTox45) and polyvalent proteins.
