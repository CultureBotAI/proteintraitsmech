identifier: Pfam:PF19864
label: Radical SAM proteins, N-terminal
definition: >-
  This presumed domain is found at the N terminus of radical SAM proteins from bacteria and archaea. Proteins containing this domain are thought to catalyse diverse reactions, including methylations, isomerization, ring formation, anaerobic oxidation and protein radical formation. The function of this domain is unknown.
