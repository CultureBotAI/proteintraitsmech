identifier: Pfam:PF02149
label: Kinase associated domain 1
definition: >-
  Members of the KIN2/PAR-1/MARK kinase subfamily are conserved from yeast to human and share the same domain organisation: an N-terminal kinase domain ( ) and a C-terminal kinase associated domain 1 (KA1). Some members of the KIN1/PAR-1/MARK family also contain an UBA domain ( ). Members of this kinase subfamily are involved in various biological processes such as cell polarity, cell cycle control, intracellular signalling, microtubule stability and protein stability. The function of the KA1 domain is not yet known but several studies strongly suggest that it is involved in protein localisation. In addition, it has been reported that this C-terminal region acts as an autoinhibitory domain for the N-terminal kinase domain. Some proteins known to contain a KA1 domain are listed below: Mammalian MAP/microtubule affinity-regulating kinases (MARK 1,2,3). They regulate polarity in neuronal cell models and appear to function redundantly in phosphorylating MT-associated proteins and in regulating MT stability. Mammalian maternal embryonic leucine zipper kinase (MELK). It phosphorylates ZNF622 and may contribute to its redirection to the nucleus. It may be involved in the inhibition of spliceosome assembly during mitosis. Caenorhabditis elegans and drosophila PAR-1 protein. It is required for establishing polarity in embryos where it is asymmetrically distributed. Fungal Kin1 and Kin2 protein kinases involved in regulation of exocytosis. They localise to the cytoplasmic face of the plasma membrane. The KA1 domain comprises about 50 amino acid residues and end in the highly conserved Glu-Leu-Lys-Leu motif, termed the ELKL motif which forms a concave surface surrounded by positively charged residues, being important for the KA1 domain function. This domain adopts a compact α+β str…
