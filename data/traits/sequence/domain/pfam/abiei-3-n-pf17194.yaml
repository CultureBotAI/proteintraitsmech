identifier: Pfam:PF17194
label: Transcriptional regulator, AbiEi antitoxin N-terminal domain
definition: >-
  AbiEi is the cognate antitoxin of the type IV toxin-antitoxin 'innate immunity' bacterial abortive infection (Abi) system that protects bacteria from the spread of a phage infection. The Abi system is activated upon infection with phage to abort the cell, thus preventing the spread of phage through viral replication. There are some 20 or more Abis, and they are predominantly plasmid-encoded lactococcal systems. TA (toxin-antitoxin) systems on plasmids function by killing cells that lose the plasmid upon division. AbiE phage resistance systems function as novel Type IV TAs and are widespread in bacteria and archaea. AbiEi, a member of a widespread family of putative transcriptional regulators, has an N-terminal winged-helix-turn-helix domain that is required for repression of abiE transcription and an uncharacterised bi-functional C-terminal domain, which is necessary for transcriptional repression and sufficient for toxin neutralisation. This entry represents the N-terminal domain.
