identifier: Pfam:PF28276
label: IgSF3-like, immunoglobulin-like domain
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in human Immunoglobulin superfamily member 3 (IgSF3), Immunoglobulin superfamily member 8 (IGSF8), Prostaglandin F2 receptor negative regulator (FPRP) and similar proteins. IGSF8 links tetraspanin-enriched microdomains to the actin cytoskeleton and plays several important roles in innate and adaptive immunity. FPRP inhibits the binding of prostaglandin F2-alpha (PGF2-alpha) to its specific FP receptor, by decreasing the receptor number rather than the affinity constant. Variations in IgSF3 have been associated with different human diseases such as osteopetrosis and chronic obstructive pulmonary diseases. Its specific function is unknown.
