identifier: Pfam:PF04750
label: FAR-17a/AIG1-like protein
definition: >-
  This family includes the androgen-dependent TFPI-regulating protein (ADTRP) and AIG1 protein which were first described as the homologues of hamster androgen-induced FAR-17a protein. AIG1 and ADTRP hydrolyzes bioactive fatty-acid esters of hydroxy-fatty acids (FAHFAs), but not other major classes of lipids, with preference for FAHFAs with branching distal from the carboxylate head group of the lipids. In vitro, ADTRP can regulate the expression and the cell-associated anticoagulant activity of the inhibitor TFPI in endothelial cells.
