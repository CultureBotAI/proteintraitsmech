identifier: Pfam:PF23943
label: PUS7L N-terminal domain
definition: >-
  This domain is found N-terminal in the human Pseudouridylate synthase PUS7L and related proteins from vertebrates, ascomycetes and plants. This domain is predicted to adopt a globular structure consisting of a three-stranded antiparallel β-sheet with two α-helices packed on one side of it. Human PUS7L catalyses pseudouridylation of RNAs, acting also as a regulator of protein synthesis in embryonic stem cells by mediating pseudouridylation of RNA fragments derived from tRNAs (tRFs). The pseudouridylated tRFs inhibit translation by targeting the translation initiation complex.
