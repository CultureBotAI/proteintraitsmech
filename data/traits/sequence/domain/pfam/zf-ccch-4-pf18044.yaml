identifier: Pfam:PF18044
label: CCCH-type zinc finger
definition: >-
  This short zinc binding domain has the pattern of three cysteines and one histidine to coordinate the zinc ion. This domain is found in a wide variety of Zinc finger CCCH containing proteins, such as E3 ligases and G patch containing proteins.
