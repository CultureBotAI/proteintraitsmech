identifier: Pfam:PF26233
label: 2,5-dihydroxypyridine 5,6-dioxygenase
definition: >-
  This entry represents NicX and related prokaryotic proteins. 2,5-dihydroxypyridine 5,6-dioxygenase (NicX) catalyses the dioxygenolytic ring cleavage of 2,5-dihydroxypyridine between carbons 5 and 6 generating N-formylmaleamate. It is a component of the Nic cluster, which is responsible for the aerobic nicotinate degradation pathway in Pseudomonas putida.
