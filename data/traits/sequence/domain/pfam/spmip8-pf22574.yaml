identifier: Pfam:PF22574
label: Sperm microtubule inner protein 8
definition: >-
  This family represents homologues of Sperm microtubule inner protein 8 (SPMIP8, also known as Testis, prostate and placenta-expressed protein TEPP). SPMIP8 is an axonemal microtubule inner protein (MIP) part of the doublet microtubules (DMTs) in flagellum axoneme. SPMIP8 is specifically expressed in testis, prostate, and placenta, and might have a role in reproductive biology.
