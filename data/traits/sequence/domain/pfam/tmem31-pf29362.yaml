identifier: Pfam:PF29362
label: TMEM31
definition: >-
  This entry represents human transmembrane protein 31 (TMEM31) and related proteins from vertebrates. TMEM31 is a multi-pass membrane protein with two predicted transmembrane helices located in the C-terminal region. The N-terminal region contains predicted disordered regions with low complexity and polar residue bias.
