identifier: Pfam:PF04336
label: Acyl carrier protein phosphodiesterase
definition: >-
  This entry contains the Escherichia coli gene yajB, now renamed acpH, which encodes an ACP hydrolase. AcpH converts holo-ACP to apo-ACP by hydrolytic cleavage of the phosphopantetheine prosthetic group from ACP. A mutant E. coli strain having a total deletion of the acpH grows normally, showing that phosphodiesterase activity is not essential for growth, although it is required for turnover of the ACP prosthetic group in vivo. AcpH is found only in Gram-negative organisms suggesting that it plays a role in some aspect of lipid metabolism that is unique to these organisms. The most obvious of which is biosynthesis of lipid A. Because AcpH is a hydrolase, it could possibly be an editing enzyme that intercepts acyl-ACPs that would give an inappropriate lipid A structure if used as acyl donors.
