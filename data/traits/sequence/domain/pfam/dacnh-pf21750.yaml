identifier: Pfam:PF21750
label: Probable sensor domain DACNH
definition: >-
  This entry represents a potential sensor domain found at the N-terminal of bacterial diadenylate cyclases which is typically followed by the DAC ( ) domain. This domain may consist of two α-helices and seven β-strands. In deltaproteobacteria, this domain is preceded by the DACND ( ) or DACNG domains ( ).
