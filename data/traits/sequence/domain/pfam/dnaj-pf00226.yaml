identifier: Pfam:PF00226
label: DnaJ domain
definition: >-
  This domain family is approximately 130 amino acids in length and contains a conserved YYLD sequence motif. The proteins have a C-terminal DNA-J domain and most of the sequences are annotated as DNA-J related proteins, other annotations include: DnaJ-class molecular chaperon and formate dehydrogenase; but there is currently no publications to support these annotations.
