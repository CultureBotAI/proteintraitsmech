identifier: Pfam:PF30205
label: C32D5.4 middle domain
definition: >-
  This entry represents a domain found in C32D5.4 and related uncharacterised proteins. The domain is found in eukaryotes, including Caenorhabditis elegans. In some proteins this domain is located in the middle region, while in others it can be found at the N-terminal. Proteins containing this domain may also contain other domains such as EFR3_ARM ( ). The function of this domain remains to be determined.
