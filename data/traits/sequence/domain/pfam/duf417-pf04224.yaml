identifier: Pfam:PF04224
label: Protein of unknown function, DUF417
definition: >-
  This family of uncharacterised proteins appears to be restricted to proteobacteria. It includes inner membrane protein RclC (YkgD) from Escherichia coli , which is a reactive chlorine-specific transcription factor. These proteins are related to the DoxX family . Members of this family form a confident homodimeric structure, for example UniProtKB:A0A4R5FQM0 iPTM=0.94.
