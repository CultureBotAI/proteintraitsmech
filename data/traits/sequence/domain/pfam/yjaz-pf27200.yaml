identifier: Pfam:PF27200
label: YjaZ family
definition: >-
  This entry represents YjaZ, a 179 amino acid protein from Escherichia coli (gene b3989). YjaZ expression increases about 5-fold as cells approach stationary phase under control of sigma factor S (rpoS). Disruption mutants grow normally at various temperatures but have slightly slower growth as they enter stationary phase. The protein was originally thought to be a heat shock protein (htrC), but further examination showed this was incorrect. YjaZ belongs to . The function of this protein family remains to be determined.
