identifier: Pfam:PF06762
label: Lipase maturation factor transmembrane domain
definition: >-
  This entry represents the N-terminal domain of a family transmembrane proteins that includes the lipase maturation factors 1 and 2 (LMF1/2). Lipoprotein lipase and hepatic lipase require LMF1 to fold into their active states. LMF1 acts as a chaperone required for maturation and transport of active lipoprotein lipase (LPL), through the secretory pathway.
