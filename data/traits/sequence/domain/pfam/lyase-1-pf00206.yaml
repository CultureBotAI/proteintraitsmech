identifier: Pfam:PF00206
label: Lyase
definition: >-
  This entry describes the N-terminal domain of argininosuccinate lyase, fumarate hydratase and related proteins which belong to the lyase class and use fumarate as a substrate. They share a short conserved sequence surrounding a methionine residue, which is likely important for their catalytic activity.
