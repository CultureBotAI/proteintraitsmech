identifier: Pfam:PF21345
label: PcRGLX-like protein central beta sandwich domain
definition: >-
  This entry includes Exo-rhamnogalacturonan lyase from Penicillium chrysogenum 31B (PcRGLX) and YetA from B. subtilis, which is functionally uncharacterised. Proteins in this family are typically between 863 and 928 amino acids in length. This entry represents the central β-sandwich domain. Members of this family share a 3 domain architecture.
