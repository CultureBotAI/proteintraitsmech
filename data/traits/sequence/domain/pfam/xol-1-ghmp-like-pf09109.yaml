identifier: Pfam:PF09109
label: Switch protein XOL-1, GHMP-like
definition: >-
  This domain, found in sex-determining protein Xol-1, adopts a secondary structure consisting of five α helices and seven antiparallel β sheets, in a β-α-β-α-α-α-β-β-α-β-β-β arrangement. The fold of this family is structurally similar to that found in the C-terminal domain of GHMP Kinase. The active site of the enzyme is found at the interface between this domain and the N-terminal domain.
