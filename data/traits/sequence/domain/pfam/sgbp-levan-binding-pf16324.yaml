identifier: Pfam:PF16324
label: SGBP, levan binding domain
definition: >-
  This entry represents the levan-binding domain in Surface glycan-binding protein BT_1761, which projects away from the cell, where it would facilitate the capture of levan chains from the environment. This protein is part of the fructo-oligosaccharides (FOSs) transport-competent system, and is thought to recruit levan at the cell surface.
