identifier: Pfam:PF01791
label: DeoC/LacD family aldolase
definition: >-
  This entry represents diverse aldolases, such as deoxyribose-phosphate aldolase, tagatose 1,6-diphosphate aldolase, fructose-bisphosphate aldolase class 1, 2-amino-3,7-dideoxy-D-threo-hept-6-ulosonate synthase, 2-amino-4,5-dihydroxy-6-one-heptanoic acid-7-phosphate synthase, phospho-2-dehydro-3-deoxyheptonate aldolase, and 6-deoxy-5-ketofructose 1-phosphate synthase, etc. Aldolases play important roles in essential metabolic pathways, such as gluconeogenesis and glycolysis. They are classified with respect to their catalytic mechanism into two classes: class I adolases are are characterised by formation of covalent Schiff base intermediates, while class II aldolases are metallodependent enzymes and use a divalent transition metal ion to polarize the substrate ketose. Fructose-1,6-bisphosphate (FBP) aldolase (EC 4.1.2.13) catalyzes the reversible aldol condensation of glyceraldehyde 3-phosphate (GAP) and dihydroxyacetone phosphate (DHAP) yielding FBP. Two distinct classes of FBP aldolases occur in nature,Class I FBP aldolases form a Schiff-base intermediate between the carbonyl substrate (FBP and DHAP), whereas Class II FBP aldolases depend on divalent metal ions to stabilise the carbanion intermediate. Tagatose 1,6-diphosphate aldolase is a class I aldolase. It catalyses the reversible cleavage of four diastereoisomers (fructose 1,6-bisphosphate (FBP), psicose 1,6-bisphosphate, sorbose 1,6-bisphosphate, and tagatose 1,6-bisphosphate) to dihydroxyacetone phosphate (DHAP) and d-glyceraldehyde 3-phosphate with high catalytic efficiency. This entry also includes Divergent deoxyribose-phosphate aldolase-like protein (DPA) that was shown to interact with actin depolymerizing factor (ADF) to enhance the actin filament dynamics. This protein is inactive on 2-deoxyribose 5-phos…
