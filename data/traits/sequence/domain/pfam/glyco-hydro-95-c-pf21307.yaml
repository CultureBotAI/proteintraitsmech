identifier: Pfam:PF21307
label: Glycoside hydrolase family 95, C-terminal domain
definition: >-
  This domain is found in Alpha-fucosidase (AFCA) from Bifidobacterium bifidum and in other members of the glycoside hydrolase family 95 from fungi, plants and bacteria. AFCA hydrolyses the glycosidic linkage of Fuc1-2Gal via an inverting mechanism. This entry represents the C-terminal β-sandwich domain that is next to the the catalytic region of this protein. The domain forms a two-layered jelly-roll fold. Its specific function remains unknown.
