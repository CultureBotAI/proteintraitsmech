identifier: Pfam:PF24300
label: Kiwellin-1
definition: >-
  Kiwellin was identified as a kiwi fruit allergenic protein. It can be processed into an N-terminal 4kDa peptide known as Kissper, which can form an anion-selective pore. KWL1 specifically blocks the catalytic activity of the chorismate mutase Cmu1. KWL1 binds in proximity to the Cmu1 active site and thus likely blocking the substrate access. It adopts a double psi β-barrel fold. This entry also includes Kiwellin-like proteins from rice and other plants.
