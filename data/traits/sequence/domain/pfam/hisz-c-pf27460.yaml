identifier: Pfam:PF27460
label: ATP phosphoribosyltransferase subunit HisZ C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ATP phosphoribosyltransferase regulatory subunit HisZ mainly found in gammaproteobacteria. HisZ is required for the first step of histidine biosynthesis and allows feedback regulation of ATP phosphoribosyltransferase activity by histidine. The protein functions as a heteromultimer with HisG subunits and belongs to the class-II aminoacyl-tRNA synthetase family. This function is generally fulfilled by the C-terminal part of HisG, which is missing in some bacteria. The enzyme is located in the cytoplasm.
