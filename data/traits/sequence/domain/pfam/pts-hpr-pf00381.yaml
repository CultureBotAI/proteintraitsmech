identifier: Pfam:PF00381
label: PTS HPr component phosphorylation site
definition: >-
  This entry represents a structural domain found in both the histidine-containing phosphocarrier protein HPr, as well as its structural homologues, which includes the catabolite repression protein Crh found in Bacillus subtilis. This domain has a α+β structure found in two layers with an overall architecture of an open faced β-sandwich in which a β-sheet is packed against three α-helices.
