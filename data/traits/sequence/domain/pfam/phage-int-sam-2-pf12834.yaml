identifier: Pfam:PF12834
label: Phage integrase, N-terminal
definition: >-
  Phage integrase proteins cleave DNA substrates by a series of staggered cuts, during which the protein becomes covalently linked to the DNA through a catalytic tyrosine residue at the carboxy end of the alignment. This entry represents the N-terminal predicted α-helical domain found in a family of putative prophage DNA-binding integrases.
