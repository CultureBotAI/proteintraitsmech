identifier: Pfam:PF27643
label: BZIP transcription factor 1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of bZIP transcription factor 1 (BZP1) found in Oomycota, primarily in Phytophthora species and related organisms. BZP1 is required for normal zoospore movement, formation of appressoria by germinated zoospore cysts, and plant infection in Phytophthora infestans. The protein interacts with protein kinase PKZ1 and is expressed in all stages of the life cycle. The C-terminal domain spans approximately 65 residues and likely contains regulatory elements. The specific function of this C-terminal domain remains to be determined.
