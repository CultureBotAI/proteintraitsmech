identifier: Pfam:PF29355
label: ISWI one complex protein 2 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of ISWI one complex protein 2 (IOC2). IOC2 is a component of the ISW1B chromatin remodelling complex which acts within coding regions to control RNA polymerase II elongation and coordinate elongation with termination and pre-mRNA processing. The ISW1B complex consists of ISW1, IOC2 and IOC4 proteins and catalyses ATP-dependent alterations in nucleosomal DNA structure. IOC2 is localised to the nucleus and contains several disordered regions. The specific function of this N-terminal domain remains to be determined.
