identifier: Pfam:PF26745
label: SPM domain
definition: >-
  This self-processing module (SPM) domain is found in repeat-in-toxin (RTX) proteins. This domain is involved in an unique, calcium-dependent posttranslational modification known as 'clip-and-link' activity. It involves a rearrangement of the polypeptide backbone through a highly specific Ca2+-dependent autocatalytic cleavage of an Asp-Pro peptide bond and a nonspecific covalent linkage of the released carboxyl of the Asp residue to amino groups of adjacent Lys residues. The cleavage of the Asp-Pro peptide bond is catalyzed by the Ca2+-dependent structural transition of the SPM domain. SPM domain adopt an unique fold which is stabilised by binding four calcium ions.
