identifier: Pfam:PF29050
label: WAR1 C-terminal domain
definition: >-
  This entry represents a domain found in the transcriptional regulator WAR1 and related zinc cluster transcription factors from ascomycetes, including HimD from Aspergillus japonicus. WAR1 is involved in weak acid resistance and stress response, while related proteins regulate secondary metabolite biosynthesis clusters and other cellular processes. The domain is located downstream of the characteristic Zn2Cys6 DNA-binding domain ( ). The specific function of this domain remains to be determined.
