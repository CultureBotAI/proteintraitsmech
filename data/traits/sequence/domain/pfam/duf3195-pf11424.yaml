identifier: Pfam:PF11424
label: Protein of unknown function (DUF3195) N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the highly thermostable protein PAE0736 from Pyrobaculum aerophilum ( ) and similar disulphide-rich uncharacterised proteins from thermophilic archaea. PAE0736, which shows three disulphide bonds, may play a role in the formation or maintenance of intracellular protein disulfide bonds in disulfide-rich organisms. This domain harbours two of these disulphide bonds. However, its specific function is still unknown.
