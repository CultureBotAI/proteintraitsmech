identifier: Pfam:PF00304
label: Gamma-thionin family
definition: >-
  Knottins are small proteins characterised by a cystine-knot. They constitute a large family of structurally related peptides with diverse biological functions, including inhibitors, anti-microbial peptides and toxins. The scorpion toxin-like domain is found in a subgroup of metazoan knottins mainly from the arthropoda, which include the antibacterial defensins and the scorpion alpha and beta-neurotoxins. The plant sequences include members of the gamma-thionin family, which are plant defensins that have no antifungal activity. Other members are insect alpha-amylase inhibitors, cysteine-rich antifungal proteins and proteins annotated as proteinase inhibitors; those that are characterised belong to MEROPS inhibitor family I18, clan I.
