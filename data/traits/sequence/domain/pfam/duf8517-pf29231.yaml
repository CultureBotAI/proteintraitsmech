identifier: Pfam:PF29231
label: Domain of unknown function (DUF8517)
definition: >-
  This entry represents an N-terminal domain of approximately 90-100 residues found in serine proteases from spirochaetes, predominantly Treponema species. The domain is located N-terminal to a trypsin-like serine protease domain ( , ) and is typically followed by one or two C-terminal PDZ domains. Members include the periplasmic serine protease TP0546 from Treponema pallidum. The function of this domain remains to be determined.
