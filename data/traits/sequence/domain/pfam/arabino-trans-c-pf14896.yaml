identifier: Pfam:PF14896
label: EmbC C-terminal domain
definition: >-
  Arabinosyltransferase is involved in arabinogalactan (AG) biosynthesis pathway in mycobacteria. AG is a component of the macromolecular assembly of the mycolyl-AG-peptidoglycan complex of the cell wall. This enzyme has important clinical applications as it is believed to be the target of the antimycobacterial drug Ethambutol. This domain represents the C-terminal extracellular domain that is likely to bind to carbohydrate.
