identifier: Pfam:PF20900
label: Pasteurella multocida toxin, C3 domain
definition: >-
  Dermonecrotic toxin (ToxA), also known as Pasteurella multocida toxin (PMT),inhibits osteoblastic differentiation in mammals and birds. Its N-terminal region binds to target cells, while its C-terminal region, with a Trojan horse-like shape, carries the intracellularly active moiety. The latter consists of three distinct domains: C1 ( ), C2 and C3. This entry represents the C-terminal catalytic domain C3, which has a Cys-His-Asp triad known to perform acyl-hydrolysis such as peptidase activity or an acyl-transfer reaction. This domain adopts a typical α/β protein fold with seven β-strands and eight helices. It is organised into two subdomains that form the the biologically active cleft space.
