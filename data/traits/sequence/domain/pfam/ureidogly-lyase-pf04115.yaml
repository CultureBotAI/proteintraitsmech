identifier: Pfam:PF04115
label: Ureidoglycolate lyase
definition: >-
  Ureidoglycolate lyase ( ) is involved in the degradation of ureidoglycolate, an intermediate of purine degradation. It breaks down (S)-ureidoglycolate to produce glyoxylate and urea. This family of ureidoglycolate lyases were initially annotated as ureidoglycolate hydrolases, but this has since been corrected.
