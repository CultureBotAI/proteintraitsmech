identifier: Pfam:PF25253
label: DUF7855 N-terminal dimerisation domain
definition: >-
  This entry represents the N-terminal domain found in DUF7855 family proteins from halobacteria. This domain is predicted to mediate dimerisation as well as DNA-binding. This domain belongs to the dimeric α/β barrel superfamily. There is a notable pocket in each subunit beneath the DNA-binding interface that might might to a small molecule to regulate DNA-binding.
