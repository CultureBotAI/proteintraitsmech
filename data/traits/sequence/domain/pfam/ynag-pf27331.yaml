identifier: Pfam:PF27331
label: YnaG
definition: >-
  This entry represents YnaG uncharacterised membrane proteins found in Bacillus and related Gram-positive bacteria. YnaG proteins are typically around 90 amino acids in length and contain three predicted transmembrane helices. The proteins are localised to the cell membrane and adopt a multi-pass membrane topology. YnaG is found in Bacillus subtilis chromosome at locus BSU17550. The function of this protein remains to be determined.
