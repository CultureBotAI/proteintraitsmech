identifier: Pfam:PF17131
label: Uncharacterized protein TP_0789
definition: >-
  This entry represents a domain found in the Uncharacterized protein TP_0789 from Treponema pallidum and related proteins. This domain is found either standalone or in combination with other domains. It folds into an open β-barrel which coils around an α-helix buried in the barrel interior. It is related to known domains of prokaryotic lipoproteins and lipoprotein localisation factors such as Outer-membrane lipoprotein carrier protein LolA and Outer membrane lipoprotein receptor LolB.
