identifier: Pfam:PF21043
label: Rv3651-like, C-terminal domain
definition: >-
  This domain is found in Triple sensor-domain protein Rv3651 from Mycobacterium tuberculosis and similar proteins from Actinobacteria. Rv3651 is composed of three domains. This entry represents the C-terminal domain, a PAS domain that shows a central antiparallel β-sheet consisting of five β-strands.
