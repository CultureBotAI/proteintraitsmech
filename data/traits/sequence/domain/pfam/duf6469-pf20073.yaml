identifier: Pfam:PF20073
label: Domain of unknown function (DUF6469)
definition: >-
  This presumed domain can be found in plant proteins. It is found in hypothetical UvrD-like helicases and related sequences, all containing a P-loop motif that is characteristic of the AAA superfamily. This domain is located towards to the N terminus, adjacent to the AAA domain. There are two conserved motifs, GD and RIW. There is also a highly conserved D residue.
