identifier: Pfam:PF02494
label: HYR domain
definition: >-
  The HYR (HYalin Repeat) domain is an extracellular domain of about 80-100 amino acids. It has been named after the hyalin protein, which is composed exclusively of repeats of this domain. The HYR domain is found in several eukaryotic proteins, either in multiple copies as in hyalin or in association with other domains like the CCP (sushi) domain, the Von Willebrand factor type A (VWA) domain, the EGF-like domain, the calcium-binding EGF-like domain, the pentraxin domain, the CUB domain, the LDL-receptor class A domain, the C-type lectin domain or the discoidin domain. As the HYR domains of hyalin have been shown to contain the ligand for the hyalin cell surface receptor, the HYR domain can also be expected to play a direct role in cellular adhesion in other proteins in which it is present. Secondary structure predictions of the HYR domain indicate an all-β fold including seven β-strands. The HYR domain shares clear sequence similarities limited to the C-terminal region with the Fn3 and PKD domains and is believed to belong to the immunoglobulin-like fold.
