identifier: Pfam:PF03310
label: Caulimovirus DNA-binding protein
definition: >-
  The gene III product of cauliflower mosaic virus (CaMV) is known as virion-associated protein or P3, which is tightly associated with the virus particles and has a regulatory function in the virus infection cycle. P3 decorate the virions; its N-terminal domain forms an antiparallel α-helical coiled-coil network at the surface and the C-terminal domain interacts with the C-terminal half of the viral coat protein. It is a DNA binding protein in which the DNA binding activity is located on its C-terminal part. A family of related proteins is expressed by other members of the Caulimoviridae.
