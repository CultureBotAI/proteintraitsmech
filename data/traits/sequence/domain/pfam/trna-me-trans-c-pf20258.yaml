identifier: Pfam:PF20258
label: Aminomethyltransferase beta-barrel domain
definition: >-
  This entry represents the aminomethyltransferase β-barrel domain found at the C-terminal end of tRNA-specific 2-thiouridylase MnmA and similar proteins from bacteria and eukaryotes. MnmA catalyses the 2-thiolation of uridine at the wobble position (U34) of tRNA, leading to the formation of s2U34.
