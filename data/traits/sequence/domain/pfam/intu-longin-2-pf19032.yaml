identifier: Pfam:PF19032
label: Intu longin-like domain 2
definition: >-
  Longin domains are evolutionarily conserved regions widely distributed among eukaryotes, involved in membrane dynamic regulation and exhibit similarities in primary sequence and secondary structure. Longin-like domains are found in FUZ and related proteins, such as the MON1 and HPS1 proteins. The MON1/CCZ1 complex (MC1) is the GDP/GTP exchange factor (GEF) for the Rab GTPase Ypt7/Rab7 during vesicular trafficking. The HPS1/HPS4 complex (BLOC-3) is a Rab32 and Rab38 GEF and is required for biogenesis of melanosomes and platelet dense granules. Inturned (INTU) and Fuzzy (FUZ) proteins interact as members of the ciliogenesis and planar polarity effector (CPLANE) complex that controls recruitment of intraflagellar transport machinery to the basal body of primary cilia. Structurally, these domains are composed of an α/β fold which contains five anti-parallel β-strands organised as a central β-sheet and around it, two α-helices. This entry represents the second Longin domain found in INTU and CCZ1 proteins.
