identifier: Pfam:PF27367
label: AF_2048 family N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the AF_2048 uncharacterised membrane proteins found exclusively in archaea. This domain is found in Methanosarcinaceae, particularly Methanosarcina, and Archaeoglobaceae including Archaeoglobus. The full-length proteins are approximately 307 amino acids and contain predicted transmembrane helices, indicating they are membrane-associated proteins. The function of this N-terminal domain remains to be determined.
