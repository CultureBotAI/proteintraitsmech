identifier: Pfam:PF15028
label: Pre-T-cell antigen receptor
definition: >-
  The pre-T-cell antigen receptor (pre-TCR), expressed by immature thymocytes, has a pivotal role in early T-cell development, including TCR beta-selection, survival and proliferation of CD4(-)CD8(-) double-negative thymocytes, and subsequent alpha/beta T-cell lineage differentiation. This protein contains an immunoglobulin domain.
