identifier: Pfam:PF30210
label: YKR005C N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in YKR005C and related uncharacterised proteins from fungi, particularly members of the Saccharomycetes. These proteins are predicted to be localised to membranes and have been associated with mitochondria. The proteins contain large extracellular regions followed by a transmembrane helix and short cytoplasmic tail. The function of this N-terminal domain remains to be determined.
