identifier: Pfam:PF25904
label: Tmrp11 THUMP N-terminal domain
definition: >-
  This entry describes the N-terminal THUMP domain in TRMT11 found in eukaryotes. The THUMP domain is primarily involved in recognising and binding RNA substrates, facilitating site-specific modifications. tRNA (guanine(10)-N(2))-methyltransferase (TRMT11) is a catalytic subunit of an S-adenosyl-L-methionine-dependent tRNA methyltransferase complex that mediates the methylation of the guanosine nucleotide at position 10 (m2G10) in tRNAs. These proteins are involved in the post-transcriptional modification of tRNA molecules. They catalyse the methylation of guanine at the N(2) position at the 10th nucleotide of tRNA. This modification is crucial for the proper folding, stability, and function of tRNA.
