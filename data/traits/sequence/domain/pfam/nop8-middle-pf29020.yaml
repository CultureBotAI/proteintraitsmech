identifier: Pfam:PF29020
label: NOP8 middle domain
definition: >-
  This entry represents a middle domain in NOP8 (nucleolar protein 8) and related proteins found in fungi. NOP8 is a 60S ribosome subunit biogenesis protein required for ribosomal subunit synthesis and involved in assembly reactions occurring within late pre-ribosomal particles. NOP8 localises to the nucleolus and forms an RNA-independent complex with DBP6, URB1, URB2 and RSA3, which is required during early maturation of nascent 60S ribosomal subunits. The protein also contains an N-terminal RRM domain. The specific function of this middle domain remains to be determined. This domain contains a β-sheet fold.
