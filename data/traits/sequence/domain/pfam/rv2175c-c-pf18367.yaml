identifier: Pfam:PF18367
label: Rv2175c C-terminal domain of unknown function
definition: >-
  This is the C-terminal domain of unknown function found in actinomycetes such as M. tuberculosis Rv2175c. Rv2175c has a DNA binding activity and possesses a winged helix-turn-helix fold, furthermore it is identified as a substrate of the PknL kinase.
