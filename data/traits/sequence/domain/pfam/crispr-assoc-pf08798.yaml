identifier: Pfam:PF08798
label: CRISPR associated protein
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents the Cse3 (CRISPR/Cas Subtype Ecoli protein 3, also known as CasE) family of Cas proteins. The Thermus thermophilus HB8 family member has been crystallised and found to have a structure consisting of two domains with opposing parallel β-sheets, known as a β-sheet platform. This structure is similar to those found in the sex-lethal protein and poly(A)-binding protein and is consistent with an RNA-binding function.
