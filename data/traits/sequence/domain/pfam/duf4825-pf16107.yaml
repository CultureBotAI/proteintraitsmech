identifier: Pfam:PF16107
label: Domain of unknown function (DUF4825)
definition: >-
  This domain forms the N-terminal, extracellular domain of some homologues of Staph BlaR1 proteases, where it replaces the penicillin-binding domain of BlaR1. It is also found in many uncharacterised proteins in a broad range of bacteria. Its association with BlaR1 homologues suggests it may be involved in substrate-, possibly antibiotic-binding, but this prediction has not been verified experimentally.
