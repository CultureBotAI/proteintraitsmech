identifier: Pfam:PF25877
label: SOWAH N-terminal winged helix-turn-helix domain
definition: >-
  This entry represents the N-terminal winged helix-turn-helix (wHTH) domain of SOWAHA-C (Sosondowah homolog) and similar animal proteins. SOWAH proteins typically contain this N-terminal wHTH domain followed by ankyrin repeats in the C-terminal region. The winged HTH domain suggests these proteins may function in DNA binding and transcriptional regulation. SOWAH proteins are known to be phosphorylated at multiple sites, suggesting a possible role in signalling pathways.
