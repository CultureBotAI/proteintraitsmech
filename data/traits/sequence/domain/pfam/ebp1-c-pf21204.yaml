identifier: Pfam:PF21204
label: Ell binding protein Ebp1, C-terminal
definition: >-
  This entry represents the conserved C-terminal domain of Ell binding protein 1 (Ebp1) from Schizosaccharomyces pombe ( ), which is distantly related to AFF family of proteins from metazoans. This domain is known as AFF4 C-terminal homology domain (CHD) or C-terminal signature sequence (CSS). The function of Ebp1 is not clear. It colocalises with Ell1 and Eaf1, being part of the SEC-like complex that regulates Pol II transcription. This domain is found in several species from actinomycetes, but not in S. cerevisiae.
