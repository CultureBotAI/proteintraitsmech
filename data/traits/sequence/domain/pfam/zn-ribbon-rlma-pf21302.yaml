identifier: Pfam:PF21302
label: RlmA, N-terminal
definition: >-
  This is the N-terminal zinc-binding domain of 23S rRNA (guanine(745)-N(1))-methyltransferase from Escherichia coli (RlmA) and similar proteins. This domain is involved in specific recognition and binding of its rRNA substrate. It adopts a has a novel Cys3His Zn-finger fold.
