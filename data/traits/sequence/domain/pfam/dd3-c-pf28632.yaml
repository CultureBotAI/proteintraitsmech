identifier: Pfam:PF28632
label: DD3-3 C-terminal transmembrane region
definition: >-
  This entry represents the short C-terminal transmembrane region of DD3-3 proteins found in Dictyostelium species. The domain is found in type I membrane proteins that may participate in O-glycosylation. The proteins are expressed during the growth phase and rapidly increase after starvation, reaching peak expression at 3 hours and continuing for 12 hours after starvation begins. This helix forms part of the cytoplasmic region of the transmembrane protein.
