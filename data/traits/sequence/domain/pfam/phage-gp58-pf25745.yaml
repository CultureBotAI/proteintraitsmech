identifier: Pfam:PF25745
label: Bacteriophage GP58 protein
definition: >-
  This entry represents a small, highly conserved family of bacteriophage proteins including Gp58 protein from Bacillus phage SP01. The function of this protein remains unknown. The family is characterised by a conserved CxxC motif (CNGCGK) followed by another conserved cysteine, suggesting a potential metal-binding role or zinc-finger-like structure. Members of this family are approximately 35 amino acids in length and are found in various Bacillus phages.
