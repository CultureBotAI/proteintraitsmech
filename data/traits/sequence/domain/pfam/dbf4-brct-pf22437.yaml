identifier: Pfam:PF22437
label: BRCT domain
definition: >-
  This entry represents the BRCT domain found in DBF4 from S.cerevisiae, its orthologues from S.pombe and similar sequences from fungi. DBF4 is a conserved eukaryotic protein that functions as the regulatory subunit of the Dbf4-dependent kinase (DDK) complex. DDK plays essential roles in DNA replication initiation and checkpoint activation. During the replication checkpoint, Saccharomyces cerevisiae Dbf4 is phosphorylated in a Rad53-dependent manner, and this, in turn, inhibits initiation of replication at late origins. This entry represents the minimal region of Dbf4 required for the interaction with the checkpoint kinase Rad53.
