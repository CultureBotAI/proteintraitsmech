identifier: Pfam:PF19789
label: Domain of unknown function (DUF6273)
definition: >-
  This domain is predominantly found in Firmicute bacterial proteins and is functionally uncharacterised. It is found in proteins that are likely to be surface exposed. This domain is frequently found in combination with other carbohydrate-binding domains implying that it may be involved in carbohydrate recognition/binding.
