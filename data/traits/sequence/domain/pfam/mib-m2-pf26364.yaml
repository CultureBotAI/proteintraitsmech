identifier: Pfam:PF26364
label: Mycoplasma immunoglobulin binding protein M2 domain
definition: >-
  This entry represents the M2 domain of Mycoplasma immunoglobulin binding (MIB) protein. The MIB_M2 domain shares structural features with the M2 domain of Protein M from Mycoplasma genitalium, although with less conservation. This domain primarily binds to the VL domain of antibody Fab fragments and also encircles the light chain between the CL and VL domains. MIB proteins are surface proteins found in the majority of mycoplasma species that, together with MIP (Mycoplasma immunoglobulin protease), capture antibodies and disrupt their antigen binding site. The M2 domain contains a distinctive long loop (residues 533 to 546) that is absent in Protein M.
