identifier: Pfam:PF03232
label: Ubiquinone biosynthesis protein COQ7
definition: >-
  Coq7 (also known as Clk-1 and CAT5) is a di-iron carboxylate protein occurring in both prokaryotes and eukaryotes that is essential for ubiquinone biosynthesis. It has been implicated in the ageing process as mutations in the Caenorhabditis elegans gene lead to increased lifespan. Coq7 is a membrane-bound protein that functions as a monooxygenase to hydroxylate demethoxyubiquinone (DMQ or 2-methoxy-5-methyl-6-polyprenyl-1,4-benzoquinone) in the penultimate step of ubiquinone biosynthesis. Biochemical studies indicate that NADH can serve directly as a reductant for catalytic activation of dioxygen and substrate oxidation by the enzyme, with no requirement for an additional reductase protein component. This direct reaction with NADH is so far unique amongst members of the di-iron carboxylate protein family.
