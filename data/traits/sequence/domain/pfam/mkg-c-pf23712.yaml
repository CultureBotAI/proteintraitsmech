identifier: Pfam:PF23712
label: Monkey King C-terminal KA1 domain
definition: >-
  This entry represents the C-terminal domain of a family of proteins largely found in insect species. This domain structurally resembles the KA1 domain . This domain is found in the Monkey King proteins. Monkey King is a Drosophilidae-specific protein that emerged from duplication and divergence of the ancestral TUTase6 gene.
