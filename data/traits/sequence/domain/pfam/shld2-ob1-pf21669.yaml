identifier: Pfam:PF21669
label: Shieldin complex subunit 2, first OB fold domain
definition: >-
  This entry represents the first OB fold domain found in the middle of Shieldin complex subunit 2 (SHLD2, formerly known as FAM35A). SHLD2 is a component of the shieldin complex, which plays an important role in repair of DNA double-stranded breaks (DSBs).
