identifier: Pfam:PF25481
label: Nucleoprotein TPR-like domain
definition: >-
  This domain is found in human Nucleoprotein TPR and its orthologue in fungi MLP1. This domain is predicted to adopt an α-helical configuration. TPR and MLP1/2 share several features; for example, they have coiled-coil regions and are associated with nuclear pores. TPR is thought to be a component of nuclear pore complex-attached intranuclear filaments, and is implicated in nuclear protein import. Moreover, its N-terminal region is involved in the activation of oncogenic kinases, possibly by mediating the dimerisation of kinase domains or by targeting these kinases to the nuclear pore complex. MLP1 acts as a docking platform for heterogeneous nuclear ribonucleoproteins that are required for mRNA export.
