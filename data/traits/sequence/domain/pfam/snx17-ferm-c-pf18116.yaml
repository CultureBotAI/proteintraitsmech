identifier: Pfam:PF18116
label: Sorting Nexin 17 FERM C-terminal domain
definition: >-
  This domain can be found at C terminus of sorting nexin 17 (SNX17) and sorting nexin 31 (SNX31). SNX17 localizes to early endosomes where it directly binds NPX(Y/F) motifs in the target receptors to mediate their rates of endocytic internalization, recycling, or degradation. The domain is known as terminal band 4.1/ezrin/radixin/moesin (FERM) domain. The FERM domain binds directly to the common motif, NPX(Y/F), in the cytoplasmic region of its target proteins.
