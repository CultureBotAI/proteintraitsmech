identifier: Pfam:PF30289
label: YomY prophage protein
definition: >-
  This entry represents YomY, an 84 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. The protein is found in SPbeta phage and related prophages across Bacillales. The function of this protein remains to be determined.
