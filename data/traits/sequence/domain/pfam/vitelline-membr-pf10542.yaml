identifier: Pfam:PF10542
label: Vitelline membrane cysteine-rich region
definition: >-
  In Drosophila melanogaster (Fruit fly) the vitelline membrane (VM) is the first layer of the eggshell produced by the follicular epithelium. It is composed of at least four different proteins. VM proteins are similarly organised with a central highly conserved 38-amino acid domain which is flanked by unrelated regions. Since the surrounding regions have diverged significantly, it is possible that the VM domain is of key importance in VM protein structure. The VM domain contains three highly conserved cysteines.
