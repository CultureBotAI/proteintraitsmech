identifier: Pfam:PF10440
label: Ubiquitin-binding WIYLD domain
definition: >-
  This entry represents the plant-specific WIYLD domain, named based on the pattern of the most conserved residues. This is a ubiquitin-binding domain that adopts a four-helix bundle structure, in contrast to the three-helix bundles of other ubiquitin binding domains. It is found in histone-lysine N-methyltransferase SUVR4 and related proteins SUVR1 and SUVR2. SUVR4 is an active histone methyltransferase with a preference for H3K9me1 and ubiquitin binding mediated by this domain facilitates the addition of two methyl groups to monomethylated lysine 9 of histone H3. SUVR2 has no histone methyltransferase activity and is involved in transcriptional gene silencing. SUVR2 forms a complex with SUVR1 and associates with the SNF2-related chromatin-remodeling proteins. No histone methyltransferase activity has been detected for SUVR1 neither.
