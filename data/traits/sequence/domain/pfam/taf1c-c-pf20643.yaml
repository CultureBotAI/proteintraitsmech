identifier: Pfam:PF20643
label: TAF1C, C-terminal domain
definition: >-
  This is the C-terminal domain of TAF1C (TATA box-binding protein-associated factor RNA polymerase I subunit C) from mammals, the orthologue of yeast Rrn6. TAF1C is a component of the transcription factor SL1/TIF-IB complex, which is involved in the assembly of the PIC (preinitiation complex) during RNA polymerase I-dependent transcription.
