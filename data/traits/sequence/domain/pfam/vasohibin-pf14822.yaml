identifier: Pfam:PF14822
label: Vasohibin
definition: >-
  This entry represents a family of tubulinyl-Tyr carboxypeptidases. These regulate microtubule function by removing a C-terminal tyrosine residue from alpha-tubulin. Tubulinyl-Tyr carboxypeptidase 1 is also known as vasohibin-1 (VASH1), and it act as an angiogenesis inhibitor. VASH1 is predominantly expressed in endothelial cells and it is induced by vascular endothelial growth factor (VEGF) or fibroblast growth factor 2 (FGF-2). Tubulinyl-Tyr carboxypeptidase 2 (VASH2) is thought to be expressed in cells other than endothelial cells. Angiogenesis, the formation of new vessels from existing ones, is a key event both under physiological and pathologic conditions. It is determined by the local balance between angiogenesis stimulators and inhibitors.
