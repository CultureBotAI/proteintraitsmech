identifier: Pfam:PF27139
label: Aq_1264 transmembrane helical domain
definition: >-
  This entry represents a transmembrane helical domain found in Aq_1264, an uncharacterised multi-pass membrane protein from the hyperthermophilic bacterium Aquifex aeolicus. The full-length protein contains eight predicted transmembrane helices and is predicted to localise to the cell membrane. This domain is often found duplicated within proteins.
