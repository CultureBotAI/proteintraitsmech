identifier: Pfam:PF25092
label: KIN17 C-terminal SH3 domain
definition: >-
  This entry represents the SH3 domain of KIN17, found at the very C-terminal end of these proteins. This domain contains the KOW motif, involved in RNA binding. The KOW domain of the KIN17 protein contributes to the RNA-binding properties of the whole protein. The KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. KIN17 has functions in DNA replication, DNA repair and cell cycle control.
