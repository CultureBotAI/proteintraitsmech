identifier: Pfam:PF31078
label: NIPBL cohesin loader C-terminal domain
definition: >-
  This entry represents a C-terminal SH3-like domain of approximately 95 residues found in NIPBL (nipped-B-like protein, also known as SCC2) in vertebrates. This domain is located C-terminal to the Nipped-B_C domain ( ). The full-length NIPBL protein forms a heterodimer with MAU2 (SCC4) that functions as the cohesin loader complex, loading the cohesin ring onto chromosomes. Mutations in NIPBL cause Cornelia de Lange syndrome. The specific function of this C-terminal SH3-like domain remains to be determined.
