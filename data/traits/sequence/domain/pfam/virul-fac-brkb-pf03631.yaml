identifier: Pfam:PF03631
label: Virulence factor BrkB
definition: >-
  Members of this family include the largely uncharacterised BrkB (Bordetella resist killing by serum B) from Bordetella pertussis. It is essential for resistance to complement-dependent killing by serum in Bordetella pertussis. Some members have an additional C-terminal domain. Paralogs from E. coli (yhjD) and Mycobactrium tuberculosis (Rv3335c) are part of a smaller, related subfamily that form their own cluster.
