identifier: Pfam:PF02406
label: 'MmoB/DmpM family '
definition: >-
  This entry represents a family of monooxygenase components that include Methane monooxygenase regulatory protein B (MmoB), and Phenol 2-monooxygenase, stimulatory component DmpM. When MmoB is present at low concentration it converts methane monooxygenase from an oxidase to a hydroxylase and stabilises intermediates required for the activation of dioxygen. DmpM lacks redox co-factors and is required for optimal turnover of Phenol hydroxylase. This protein catabolises phenol and some of its methylated derivatives in the first step of phenol biodegradation, and is required for growth on phenol. This family also includes Propane 2-monooxygenase, effector component (MimD) which has been shown to function as a coupling protein in the multicomponent propane 2-monooxygenase enzyme system in the degradation of propane as well as the conversion of phenol to hydroquinone. Toluene-4-monooxygenase system, effector component (TmoD) from Pseudomonas mendocina also belongs to this group. It catalyses the O2 and NADH-dependent hydroxylation of toluene to form p-cresol, and the Alkene monooxygenase system, effector subunit from Xanthobacter autotrophicus, which catalyses the O2 and NADH-dependent epoxidation of short chain (C2 to C6) alkenes to their corresponding epoxides.
