identifier: Pfam:PF22005
label: Parp14 WWE domain
definition: >-
  This entry represents the WWE domain of protein mono-ADP-ribosyltransferase PARP14 from mouse and similar proteins from vertebrates. PARP14 is an ADP-ribosyltransferase that mediates mono-ADP-ribosylation of glutamate residues on target proteins. It is related to inhibition of STAT1 phosphorylation, however it has been suggested that this may be the result of sumoylation of STAT1 'Lys-703'. WWE domains are characterised by the presence of a Trp-Trp-Glu region, which is important for the structure stabilisation of PARP14. WWE domains can bind to ADP-Ribose derivatives, including iso-ADP-ribose, a molecule specifically found in PAR and promote interactions with ubiquitinated proteins. The PARP14 WWE domain, however, is unable to bind to any ADP-ribose derivatives and whether it interacts with iso-ADP ribose or ubiquitinated targets is unknown.
