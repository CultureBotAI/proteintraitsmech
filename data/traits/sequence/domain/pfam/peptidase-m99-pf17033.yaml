identifier: Pfam:PF17033
label: Carboxypeptidase controlling helical cell shape catalytic
definition: >-
  This is the peptidase domain of a D,L-carboxypeptidase. The active site residues are Arg86, Glu222 and the metal ligands, in the peptidase domain, are Gln46, Glu49 and His128 in . The protein binds many zinc ions and a calcium ion and there are other metal binding sites. The catalytic activity is the release of m-Dpm from the peptide muramyl-Ala-gamma-D-Glu-m-Dpm; this is probably the precursor of the cell wall cross-linking peptide.
