identifier: Pfam:PF21056
label: Zinc finger SWIM domain-containing protein 1/3, RNaseH-like domain
definition: >-
  This is a domain found at the N-terminal of Zinc finger SWIM domain-containing protein 1 and in the central region of ZSWIM3, whose function is not yet clear. ZSWIM1 may play a role in the development or function of T helper cells. This domain may adopt an α/β conformation according to AlphaFold structure predictions, closely related to RNaseH-like domains.
