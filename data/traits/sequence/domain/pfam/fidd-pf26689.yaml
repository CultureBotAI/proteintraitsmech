identifier: Pfam:PF26689
label: Flavobacterium inter-domain disulphide bond domain
definition: >-
  This entry represents a stalk domain found in flavobacterium presumed fibrillar adhesins. The FIDD (Flavobacterium Inter-domain Disulphide bond Domain) domain contains two conserved cystine residues that form inter-domain disulphide bonds presumably stabilising the protein stalk.
