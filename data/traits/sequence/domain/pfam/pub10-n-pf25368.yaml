identifier: Pfam:PF25368
label: PUB10-like, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of U-box domain-containing protein 12-19 from Arabidopsis thaliana (PUB12-19) and similar plant E3 ubiquitin ligases. This domain is usually found associated with and and is predicted to show an all-α configuration. The U-box domain-containing proteins function as E3 ubiquitin ligases. These proteins play a crucial role in the ubiquitination process, which is essential for protein degradation, signal transduction, and various cellular processes. The U-box domain is a type of E3 ligase that facilitates the transfer of ubiquitin from an E2 ubiquitin-conjugating enzyme to specific substrate proteins, marking them for degradation by the proteasome. This activity is vital for maintaining protein homeostasis and regulating numerous cellular pathways.
