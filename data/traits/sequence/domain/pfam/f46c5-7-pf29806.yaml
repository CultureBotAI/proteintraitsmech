identifier: Pfam:PF29806
label: Uncharacterized protein F46C5.7
definition: >-
  This entry represents the F46C5.7, found in nematodes including Caenorhabditis elegans. This protein contains multi-pass membrane proteins with four predicted transmembrane helices. Members are predicted to localise to cellular membranes. Some members show similarity to MARVEL domain-containing proteins. The function of this protein remains to be determined.
