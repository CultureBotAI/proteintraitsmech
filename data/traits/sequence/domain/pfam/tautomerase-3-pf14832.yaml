identifier: Pfam:PF14832
label: Putative oxalocrotonate tautomerase enzyme
definition: >-
  Cis-3-chloroacrylic acid dehalogenase (cis-CaaD) represents the first characterised member of a new family in the tautomerase superfamily. It is not a 4-oxalocrotonate (4-OT) tautomerase, but it probably resulted from an independent duplication of a 4-OT-like sequence. cis-CaaD is part of a bacterial pathway for the degradation of the soil fumigant 1,3-dichloropropene.
