identifier: Pfam:PF27161
label: HI_0983 family
definition: >-
  This entry represents the conserved domain of HI_0983 family of uncharacterised proteins found in Haemophilus influenzae. The protein shows structural similarity to Mog1p and belongs to a protein family involved in various cellular processes. The protein is located near the dprA gene, which is required for chromosomal DNA transformation. However, the specific biological function of HI_0983 remains unknown.
