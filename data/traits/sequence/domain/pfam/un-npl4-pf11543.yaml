identifier: Pfam:PF11543
label: Nuclear pore localisation protein NPL4
definition: >-
  Npl4, along with Ufd1, forms the heterodimer adaptor complex UN, which is involved in the recruitment of p97, an AAA ATPase, for tasks involving the ubiquitin pathway. Npl4 has a N-terminal ubiquitin-like domain which has within its structure a β-grasp fold with a helical insert. This entry represents the ubiquitin-like domain.
