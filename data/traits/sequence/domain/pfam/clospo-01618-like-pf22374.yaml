identifier: Pfam:PF22374
label: Clospo_01618-like
definition: >-
  This domain is found in Lipoprotein from Clostridium sporogenes (Clospo_01618) and similar proteins from firmicutes. It shows a two-layered α/β configuration. It displays structural similarity to the N-terminal domain of YycH, which plays a role in signal transduction and is found immediately downstream of the essential histidine kinase YycG. YycG forms a two-component system together with its cognate response regulator YycF. YycH functions as a modulator of YycG activity, possibly by interacting with YchI. All three molecules (YchG, YchH, and YchI) have been characterised as membrane proteins, and they may be able to form homodimers.
