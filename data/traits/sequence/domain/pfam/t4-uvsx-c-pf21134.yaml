identifier: Pfam:PF21134
label: Bacteriophage T4, Recombination and repair protein, C-terminal domain
definition: >-
  This domain is mainly found in proteins from tailed bacteriophages, including Recombination and repair protein from Bacteriophage T4 (UVSX) ( ). This protein is organised into a larger N-terminal 'core' domain and a smaller C-terminal domain, represented in this entry, with mainly α-helical structure ( ).
