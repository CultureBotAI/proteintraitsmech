identifier: Pfam:PF30953
label: tRNA-specific adenosine deaminase TAD3 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of tRNA-specific adenosine deaminase TAD3 (AtTAD3), found in eukaryotes. TAD3 catalyses the deamination of adenosine-34 to inosine at the wobble position of the anticodon loop in several cytosolic tRNA species. TAD3 interacts with TAD2 and localises to the nucleus and cytoplasm. The C-terminal region of TAD3 contains the catalytic CMP/dCMP- type deaminase domain ( ). Disruption of TAD3 in Arabidopsis causes embryonic lethality. The specific function of this domain remains to be determined.
