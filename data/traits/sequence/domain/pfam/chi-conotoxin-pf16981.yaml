identifier: Pfam:PF16981
label: chi-Conotoxin or t superfamily
definition: >-
  Conotoxins are Cone snail venom bioactive peptides. The T-superfamily of conotoxins includes two types of peptides, the T-1-conotoxins group (tau-conotoxin) and the T-2-conotoxin group (chi-conotoxin). T-1-conotoxin Lt5d has been shown to inhibit voltage-gated sodium channels. Chi-conotoxins show a unique ability to highly selectively and non-competitively inhibit the noradrenaline transporter (NET/SLC6A2). They show an unusual cysteine-stabilised scaffold that presents a γ-turn in an optimised conformation for high affinity interactions with the noradrenaline transporter.
