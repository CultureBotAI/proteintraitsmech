identifier: Pfam:PF01888
label: CbiD
definition: >-
  CbiD is a SAM-dependent methyltransferase essential for cobalamin biosynthesis in both Salmonella typhimurium and Bacillus megaterium. A deletion mutant of CbiD suggests that this enzyme is involved in C-1 methylation and deacylation reactions required during the ring contraction process in the anaerobic pathway to cobalamin (similar role as CobF). The CbiD protein has a putative S-AdoMet binding site. CbiD has no counterpart in the aerobic pathway. Cobalamin (vitamin B12) is a structurally complex cofactor, consisting of a modified tetrapyrrole with a centrally chelated cobalt. Cobalamin is usually found in one of two biologically active forms: methylcobalamin and adocobalamin. Most prokaryotes, as well as animals, have cobalamin-dependent enzymes, whereas plants and fungi do not appear to use it. In bacteria and archaea, these include methionine synthase, ribonucleotide reductase, glutamate and methylmalonyl-CoA mutases, ethanolamine ammonia lyase, and diol dehydratase. In mammals, cobalamin is obtained through the diet, and is required for methionine synthase and methylmalonyl-CoA mutase.
