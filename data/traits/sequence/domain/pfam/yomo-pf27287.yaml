identifier: Pfam:PF27287
label: YomO
definition: >-
  This entry represents a domain covering the whole length of YomO found in SPbeta prophage- derived proteins in Bacillus species. YomO is a 166 amino acid protein encoded by the yomO gene (locus tag BSU21280) in Bacillus subtilis strain 168. The protein is derived from the SPbeta prophage. The function of this domain remains to be determined. This domain is also found in related viral proteins.
