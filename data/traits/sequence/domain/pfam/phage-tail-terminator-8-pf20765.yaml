identifier: Pfam:PF20765
label: Phage tail terminator protein
definition: >-
  These entry represents the homologues of Uncharacterized protein YqbJ from Bacillus subtilis ( ) found in bacteria and bacteriophages. Some members of this family may be phage tail terminator proteins which form a hexameric complex that joins the phage neck to the tail.
