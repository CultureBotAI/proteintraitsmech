identifier: Pfam:PF03932
label: CutC family
definition: >-
  CutC was originally thought to be involved in copper tolerance in Escherichia coli, as mutation in the corresponding gene lead to an increased copper sensitivity. However, this phenotype has been later reported to depend on the levels of the mRNA-interfering complementary RNA regulator MicL, which is transcribed from a promoter located within the coding sequence of the cutC gene in the enterobacteria. In the plant pathogen Xylella fastidiosa, this protein has been reported as specific for copper efflux. The structure of this protein in the bacteria Shigella flexneri showed a monomer structure that adopts a common TIM β/α barrel with 8 β-strands surrounded by 8 α-helices. The human homologue of this protein, which structure showed a potential copper-binding site, has an important role in intracellular copper homeostasis.
