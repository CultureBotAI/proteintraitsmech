identifier: Pfam:PF22198
label: Glucokinase regulatory protein, second SIS domain
definition: >-
  Glucokinase regulatory protein (GKRP) binds glucokinase (GK) mainly through hydrophobic interactions, functioning as an allosteric switch in blood glucose control by the liver. GKRP is trilobal in shape, consisting of two topologically identical sugar isomerase (SIS) domains capped by an α-helical lid domain ( ). This entry represents the second SIS domain from GKRP.
