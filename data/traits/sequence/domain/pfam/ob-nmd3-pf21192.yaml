identifier: Pfam:PF21192
label: NMD3 OB-fold domain
definition: >-
  A key step in ribosome biogenesis is the nuclear export of pre-ribosomal particles. 60S ribosomal export protein NMD3, a highly conserved protein in eukaryotes, is a specific adaptor required for the export of pre-60S particles. This entry represents the third domain in NMD3 which adopts an OB-fold. The OB of Nmd3 does not recognise 25S rRNA. Instead it interacts with two ribosomal proteins, eL42 and uL1.
