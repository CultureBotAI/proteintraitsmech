identifier: Pfam:PF18335
label: ATP-dependent RecD-like DNA helicase SH3 domain
definition: >-
  This is an SH3 (SRC homology domain 3) domain found in ATP-dependent RecD2 DNA helicase and related sequences ( ) that belong to the bacterial Superfamily 1B (SF1B). This superfamily of helicases translocate in a 5'-3' direction and are required for a range of cellular activities across all domains of life. Studies of RecD in E. coli revealed that the SH3 domain interacts with the ssDNA tail in a location different to that normally occupied by a peptide in canonical eukaryotic SH3 domains, thus retaining the potential to bind peptide at the same time as the ssDNA tail. RecD2 may favor replication restart by preventing RecA from binding to blocked replication forks, avoiding unnecessary recombination during replication restart. It acts as a negative modulator of the RecA-ssDNA filament, it may disassemble RecA threads, and can act as both a positive and negative regulator of strand exchange.
