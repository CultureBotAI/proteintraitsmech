identifier: Pfam:PF21969
label: Mannosylglycerate synthase, GT domain
definition: >-
  Mannosylglycerate synthase catalyses the formation of the stress protectant 2-O-alpha-D-mannosyl glycerate. It consists of a N-terminal GT-like domain and a C-terminal helical domain. This entry represents the N-terminal glycosyltransferase domain (GT) which, at the sequence level, is most similar to family-GT2 inverting GTs, however, MGS is a retaining GT.
