identifier: Pfam:PF01903
label: CbiX
definition: >-
  This entry represents sirohydrochlorin cobaltochelatase (also known as CbiX), which catalyses the insertion of Co2+ into sirohydrochlorin as part of the anaerobic pathway to cobalamin biosynthesis. The structure of CbiX from Archaeoglobus fulgidus consists of a central mixed β-sheet flanked by four α-helices, although it is about half the size of other Class II tetrapyrrole chelatases. The CbiX proteins found in archaea appear to be shorter than those found in eubacteria.
