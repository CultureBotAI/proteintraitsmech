identifier: Pfam:PF25350
label: Protein arginine methyltransferase N-terminal PH domain
definition: >-
  This entry represents the N-terminal PH domain found in Probable histone-arginine methyltransferase CARM1 from Oryza sativa, Arabidopsis thaliana and similar plant proteins. The domain is found N-terminal to the methyltransferase catalytic domain and the PRMT C-terminal domain . These enzymes are involved in histone arginine methylation, an important epigenetic modification.
