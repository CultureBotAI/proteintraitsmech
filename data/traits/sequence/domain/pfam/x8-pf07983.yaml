identifier: Pfam:PF07983
label: X8 domain
definition: >-
  The X8 domain contains 6 conserved cysteine residues that presumably form three disulphide bridges. The domain is found in an Olive pollen allergen as well as at the C terminus of family 17 glycosyl hydrolases. This domain may be involved in carbohydrate binding.
