identifier: Pfam:PF13869
label: Nucleotide hydrolase
definition: >-
  This entry represents cleavage and polyadenylation specificity factor subunit 5, also known as the cleavage and polyadenylation specificity factor 25kDa subunit. These proteins are a component of the cleavage factor Im (CFIm) complex involved in pre-mRNA 3' end processing. CFIm may also play a role in regulation of poly(A) site selection.
