identifier: Pfam:PF29339
label: Uncharacterised protein R07G3.7 middle domain
definition: >-
  This entry represents a small conserved domain found in uncharacterised proteins from nematodes. The proteins containing this domain are 366 amino acids long and undergo alternative splicing to produce multiple isoforms, as annotated in . The domain shows similarity to C2H2-tpe zinc finger domains based on sequence analysis. The function of this domain remains to be determined.
