identifier: Pfam:PF06405
label: Red chlorophyll catabolite reductase (RCC reductase)
definition: >-
  This family consists of several red chlorophyll catabolite reductase (RCC reductase) proteins. Red chlorophyll catabolite (RCC) reductase (RCCR) and pheophorbide (Pheide) a oxygenase (PaO) catalyse the key reaction of chlorophyll catabolism, porphyrin macrocycle cleavage of Pheide a to a primary fluorescent catabolite (pFCC). In rice, RCCR has been shown to play key role in senescence and is involved in wound responses.
