identifier: Pfam:PF21511
label: SidD, catalytic domain
definition: >-
  SidD from Legionella pneumophila is a virulence effector that plays a role in hijacking the host vesicular trafficking by recruiting the small guanosine triphosphatase (GTPase) Rab1 to the cytosolic face of the Legionella-containing vacuole (LCVs). This entry represents the catalytic domain.
