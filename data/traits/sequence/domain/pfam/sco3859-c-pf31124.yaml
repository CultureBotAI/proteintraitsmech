identifier: Pfam:PF31124
label: SCO3859 DNA-binding protein C-terminal domain
definition: >-
  This entry represents a C-terminal domain of approximately 60 residues found in DNA-binding proteins, typically associated with in Actinomycetes, particularly in the Streptomycetaceae and Pseudonocardiaceae families. This domain is composed of four α helices and is predicted to mediate homodimerisation (AlphaFold 3). In Streptomyces coelicolor, SCO3859 ( ) containing this domain binds to the promoters of cell division-related ssg genes and is multiphosphorylated during development.
