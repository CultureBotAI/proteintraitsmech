identifier: Pfam:PF14756
label: Peptidase_C33-associated domain
definition: >-
  The nsps or non-structural protein subunits of the arteriviral polyproteins such as porcine arterivirus PRRSV and equine arterivirus EAV are auto-cleaved into functional units. The function of this particular domain is not known. It is found downstream the peptidase C33 domain ( ).
