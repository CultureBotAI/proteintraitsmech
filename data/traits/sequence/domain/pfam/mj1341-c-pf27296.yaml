identifier: Pfam:PF27296
label: MJ1341 family C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein MJ1341 found in methanogenic archaea. This domain is found across various methanogenic lineages including Methanobrevibacter, Methanosphaera, Methanobacterium, and Methanococcaceae. The full-length proteins are approximately 312 amino acids and contain an N-terminal DegT/StrS aminotransferase domain with pyridoxal phosphate binding and predicted transaminase activity involved in polysaccharide biosynthetic processes. The specific function of this domain remains to be determined.
