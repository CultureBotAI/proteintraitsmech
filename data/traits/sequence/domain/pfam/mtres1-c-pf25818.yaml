identifier: Pfam:PF25818
label: Mitochondrial transcription rescue factor 1, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of MTRES1 and related proteins. This domain is predicted to fold as a β-sheet with two α-helices on one side. Mitochondrial transcription rescue factor 1 (MTRES1) is a mitochondrial RNA-binding protein involved in the regulation of mitochondrial transcription. It functions as a protective factor that maintains appropriate mitochondrial RNA levels under stress conditions, with its protective role dependent on its RNA-binding capacity. In addition, MTRES1 is part of a mitoribosome-associated quality control pathway that safeguards against aberrant translation by responding to elongation interruptions during protein synthesis,. Acting as a heterodimer with MTRF, it facilitates the ejection of unfinished nascent polypeptide chains and peptidyl tRNAs from stalled ribosomes. The recruitment of mitoribosome biogenesis factors to these quality control intermediates suggests that MTRES1 and MTRF may also participate in mitoribosome rescue mechanisms.
