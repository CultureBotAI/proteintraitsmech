identifier: Pfam:PF18565
label: Glycoside hydrolase family 2 C-terminal domain 5
definition: >-
  This domain is found in dimeric beta-D-galactosidase from Paracoccus sp. 32d, which contributes to stabilization of the functional dimer. It is suggested that the location of this domain 5, may be one of the factors responsible for the creation of a functional dimer and cold-adaptation of this enzyme.
