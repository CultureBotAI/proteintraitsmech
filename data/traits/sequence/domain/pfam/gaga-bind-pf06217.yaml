identifier: Pfam:PF06217
label: GAGA binding protein-like family
definition: >-
  This family includes GAGA-binding protein protein (gbp) from Soybean that binds to GAGA element dinucleotide repeat DNA. It seems likely that the region which defines this family mediates DNA binding. This putative domain contains several conserved cysteines and a histidine suggesting this may be a zinc-binding DNA interaction domain.
