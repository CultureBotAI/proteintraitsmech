identifier: Pfam:PF23481
label: TMEM132 second Ig-like domain
definition: >-
  This entry represents the second Ig-like domain found in TMEM132 family of proteins. The transmembrane protein 132 family (TMEM132) consists of TMEM132A, TMEM132B, TMEM132C, TMEM132D, TMEM132E. These are transmembrane proteins that regulate neuronal structure and function. In mammalian cells, they may regulate NAP1 in the WAVE regulatory complex (WRC) to finely modulate actin nucleation, cellular cytoskeletal and morphological changes. TMEM132 members have been associated with panic disorders, anxiety and major depressive disorders. TMEM132A may play a role in embryonic and postnatal development of the brain. It increased resistance to cell death induced by serum starvation in cultured cells. It regulates cAMP-induced GFAP gene expression via STAT3 phosphorylation. These proteins consist of six globular domains: N-terminal , 2nd , 3rd , 4th , 5th and 6th . The latter three are a tandem of Ig-like domains. represents the C-terminal region which includes a single transmembrane helix.
