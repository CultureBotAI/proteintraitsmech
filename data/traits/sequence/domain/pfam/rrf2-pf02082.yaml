identifier: Pfam:PF02082
label: Iron-dependent Transcriptional regulator
definition: >-
  This entry represents transcriptional regulators such as Desulfovibrio vulgaris Protein Rrf2, Escherichia coli IscR and Bacillus subtilis NsrR. Protein Rrf2 is a repressor of the hmc operon encoding a cytochrome redox complex for electron transport from hydrogen to sulphate. E. coli IscR regulates the transcription of several operons and genes involved in the biogenesis of Fe-S clusters and Fe-S-containing proteins. B. subtilis NsrR is a nitric oxide-responsive transcriptional regulator.
