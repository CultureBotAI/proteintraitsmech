identifier: Pfam:PF16159
label: FOXP coiled-coil domain
definition: >-
  This coiled-coil domain, approximately 60-70 residues in length, is mainly found in Forkhead box proteins from animals. It modulates the dimeric associations of FOXP transcription factors. Several mutations found in this domain have been linked to the IPEX syndrome (immunodysregulation polyendocrinopathy enteropathy X-linked syndrome).
