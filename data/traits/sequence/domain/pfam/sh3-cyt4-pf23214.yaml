identifier: Pfam:PF23214
label: Mitochondrial protein cyt-4 SH3 domain
definition: >-
  This entry represents a SH3 domain found in mitochondrial protein CYT4 from Neurospora crassa and related fungal sequences. CYT4 is a nuclear-encoded protein that plays a crucial role in RNA processing and splicing within mitochondria. CYT4 is required for mitochondrial RNA 5'- and 3'-end processing and splicing.
