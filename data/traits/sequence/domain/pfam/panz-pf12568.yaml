identifier: Pfam:PF12568
label: Acetyltransferase (GNAT) domain, PanZ
definition: >-
  This entry represents the GNAT domain found in PanZ. PanD is a l-aspartate alpha-decarboxylase involved in the biosynthesis of pantothenate, the precursor of coenzyme A (CoA). PanD is synthesised as pro-PanD, which undergoes auto-proteolytic cleavage to generate active PanD. PanM binds to and activates PanD by stabilising pro-PanD in an autocleavage-prone conformation. PanM acts as an acetyl-CoA sensor that can trigger the maturation of pro-PanD, but lacks acetyltransferase activity. The regulation of PanD by PanZ allows enterobacterial species to closely regulate production of beta-alanine and hence pantothenate in response to metabolic demand. Structure and function studies show that direct interaction of PanD with the PanZ Arg43-Leu46 loop promotes PanD to adopt a reactive conformation, which leads to activation.
