identifier: Pfam:PF04991
label: LicD/FKTN/FKRP, nucleotidyltransferase domain
definition: >-
  The LicD family of proteins show high sequence similarity and are involved in phosphorylcholine metabolism. There is evidence to show that LicD2 mutants have a reduced ability to take up choline, have decreased ability to adhere to host cells and are less virulent. These proteins are part of the nucleotidyltransferase superfamily. Ribitol-5-phosphate transferase FKTN (also known as Fukutin), which is a member of the LicD family, is a mammal protein which may be involved in the modification of glycan moieties of alpha-dystroglycan; defects in Fukutin are associated with congential muscular dystrophy. Ribitol 5-phosphate transferase FKRP (also known as Fukutin-related protein), responsible for the second step in the formation of the ribose 5-phosphate tandem repeat after FKTN activity, has N-terminal stem and C-terminal catalytic domains, and adopts a tetramer assembly. This entry represents the nucleotidyltransferase domain.
