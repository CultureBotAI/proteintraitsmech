identifier: Pfam:PF12189
label: Single-strand DNA-binding protein
definition: >-
  The VirE1 family of proteins is found in bacteria. Proteins in this family are approximately 60 amino acids in length and contain a conserved IELE sequence motif. VirE1 is an acidic chaperone protein which binds to VirE2, a ssDNA binding protein. These proteins are virulence factors of the plant pathogen Agrobacterium tumefaciens.
