identifier: Pfam:PF24050
label: Phage T4 Cef protein family
definition: >-
  This entry represents proteins that are related to the phage T4 Protein Cef (also known as MotC, ). This protein adopts a compact globular domain composed of 5 β-strands and one α-helix. The β-strands adopt the order 1-5-4-3-2 with the α-helix found between strands 1 and 2. This family shows structural similarity to . T4 Cef plays a role in the processing of a cluster of viral tRNAs.
