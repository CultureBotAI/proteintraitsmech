identifier: Pfam:PF18260
label: Nuclear polyadenylated RNA-binding 2 protein CCCH zinc finger 1
definition: >-
  This domain is found in nuclear polyadenylated RNA-binding 2 protein (Nab2p) present in Saccharomyces cerevisiae. Nab2p is a major family of Poly A-binding proteins whose interactions are thought to be crucial for the control of poly(A) tail length. This domain is the first of seven CCCH zinc fingers which are responsible for polyadenosine RNA binding. When combined with the next three zinc fingers (Zf1-4), these four zinc fingers together may bind RNA in the 3' to 5' direction.
