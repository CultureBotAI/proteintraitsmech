identifier: Pfam:PF29207
label: Domain of unknown function (DUF8509)
definition: >-
  This entry represents an N-terminal domain found in uncharacterised proteins from spirochaetes, predominantly from Treponema species. The domain is approximately 110 residues in length. This domain is found in combination with a C-terminal domain ( ) in proteins exclusive to spirochaetes. The function of this domain remains to be determined.
