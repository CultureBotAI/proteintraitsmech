identifier: Pfam:PF20913
label: Oxalate Biosynthetic Component A, N-terminal domain
definition: >-
  This domain is found at the N-terminal end of Oxalate Biosynthetic Component A from Burkholderia glumae (ObcA, ). ObcA shows a unique structural architecture, with the small N-domain (this entry) inserted into a loop between the first β-strand and the first α-helix of the C-domain barrel fold.
