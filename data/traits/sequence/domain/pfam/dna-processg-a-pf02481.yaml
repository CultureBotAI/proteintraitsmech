identifier: Pfam:PF02481
label: DNA recombination-mediator protein A
definition: >-
  This entry describes the SLOG domain in prokaryotic proteins. This domain adopts a three-layered α/β sandwich Rossmann fold with a characteristic substrate-binding loop rich in glycine and small residues in the standard location between strand-1 and helix-1. This domain is found in DNA processing protein A (DprA) from Streptococcus pneumoniae and Smf, the Bacillus subtilis orthologue, as well as putative DprA proteins in eukaryotes. DprA is a new member of the recombination-mediator protein family, dedicated to natural bacterial transformation. In Helicobacter pylori, DprA is required for natural chromosomal and plasmid transformation. It has now been shown that DprA binds cooperatively to single-stranded DNA (ssDNA) and interacts with RecA. In the process, DprA-RecA-ssDNA filaments are produced and these filaments catalyse the homology-dependent formation of joint molecules. While the Escherichia coli SSB protein limits access of RecA to ssDNA, DprA alleviates this barrier. DprA has a role not only in ensuring production of transformants via interaction with RecA, it is also involved in competence shut-off via interaction with ComE.
