identifier: Pfam:PF09017
label: Microbial transglutaminase
definition: >-
  Protein-glutamine gamma-glutamyltransferase (also known as microbial transglutaminase, MTG) catalyses an acyl transfer reaction by means of a Cys-Asp diad mechanism, in which the gamma-carboxyamide groups of peptide-bound glutamine residues act as the acyl donors. The MTG molecule forms a single, compact domain belonging to the α+β folding class, containing 11 α-helices and 8 β-strands. The α-helices and the β-strands are concentrated mainly at the amino and carboxyl ends of the polypeptide, respectively. These secondary structures are arranged so that a β-sheet is surrounded by α-helices, which are clustered into three regions.
