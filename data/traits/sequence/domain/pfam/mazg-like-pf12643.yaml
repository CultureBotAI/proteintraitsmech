identifier: Pfam:PF12643
label: MazG-like family
definition: >-
  RS21-C6 proteins (also known as dCTP pyrophosphatases 1, DCTPP1) are NTP pyrophosphatases that structurally belong to the group of all-α NTP pyrophosphatases. They show significant sequence similarity to the dimeric 2-deoxyuridine 5'-triphosphate nucleotidohydrolase (dUTP pyrophosphatase or dUTPase) and NTP-PPase MazG proteins. However, unlike typical tandem-domain MazG proteins, RS21-C6 contains a single MazG-like domain and functions as a tetramer (a dimer of dimers) with a typical four-helical bundle. Divalent ions, such as Mg2+, are required for its pyrophosphatase activity. Human dCTP pyrophosphatase 1 has been shown to be involved in nucleotide homoeostasis, contributing to detoxification of deoxycytidine triphosphate derivatives.
