identifier: Pfam:PF05617
label: Prolamin-like
definition: >-
  Proteins with this domain are found to be expressed in the plant embryo sac and are regulated by the Myb98 transcription factor. Computational analysis has revealed that they are homologous to the plant prolamin superfamily (Protease inhibitor-seed storage-LTP family, ). In contrast to the typical prolamin members that have eight conserved Cys residues forming four pairs of disulphide bonds, proteins with this domain only contain six conserved Cys residues that may form three pairs of disulphide bonds. They may have potential functions in lipid transfer or protection during plant embryo sac development and reproduction. This domain includes both previous DUF784 and DUF1278 domains.
