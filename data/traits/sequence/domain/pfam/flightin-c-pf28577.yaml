identifier: Pfam:PF28577
label: Flightin C-terminal domain
definition: >-
  This entry represents the C-terminal domain of flightin. While the complete protein functions as a structural constituent of muscle with elasticity properties, the specific function of this C-terminal domain remains to be determined. Flightin is a myofibrillar protein found exclusively in the indirect flight muscles of Drosophila melanogaster. Flightin is localised to the A band of sarcomeres and associates with myosin thick filaments. The full-length protein is involved in muscle contraction regulation, sarcomere organisation, and may modulate actin-myosin interactions.
