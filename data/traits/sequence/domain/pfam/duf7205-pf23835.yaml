identifier: Pfam:PF23835
label: Domain of unknown function (DUF7205)
definition: >-
  This entry represents a family of phage proteins that adopt a small β barrel-like fold. The family is mainly found in phages infecting members of the Enterobacteriaceae, such as Escherichia, Salmonella, Klebsiella, Cronobacter, Citrobacter, Erwinia, and Pectobacterium. The exact function of this protein within the phage tail is unknown. The family shows a highly conserved length of around 60-75 amino acids, with a few members having N- or C-terminal extensions.
