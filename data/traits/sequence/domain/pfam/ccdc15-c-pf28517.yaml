identifier: Pfam:PF28517
label: Coiled-coil domain-containing protein 15 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of coiled-coil domain-containing protein 15 (CCDC15) and similar sequences mainly found in vertebrates. While the full-length protein has established functions in centriole assembly and cilium biogenesis, the specific role of this C-terminal domain remains to be determined. CCDC15 protein plays an important role in primary cilium assembly, maintenance, and length regulation. CCDC15 localises to the inner scaffold structure in the central region of centrioles and interacts with centriole inner scaffold proteins including POC5, POC1B, CETN2 and FAM161A to promote proper centriole size and integrity. The protein is required for recruitment of the inner scaffold protein POC1B and the distal SFI1/CETN2 complex to centrioles. CCDC15 contains multiple coiled-coil regions throughout its length. This protein has established functions in centriole assembly and cilium biogenesis.
