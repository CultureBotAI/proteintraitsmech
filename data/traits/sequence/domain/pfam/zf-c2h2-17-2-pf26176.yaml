identifier: Pfam:PF26176
label: C2H2-domain containing protein second zinc finger domain
definition: >-
  This entry represents the second C2H2 zinc finger domain in putative C2H2 domain-containing proteins found in fungi. These proteins contain a disordered N-terminal region, followed by two domains ( and ) and an α-helical C-terminal domain. This entry also includes putative Rrn9 domain-containing protein. C2H2 zinc fingers contain a short β-hairpin and an α-helix (β/β/α structure), where a single zinc atom is held in place by Cys(2)His(2) (C2H2) residues in a tetrahedral array. C2H2 zinc fingers are the most common DNA-binding motifs found in eukaryotic transcription factors and have also been identified in prokaryotes.
