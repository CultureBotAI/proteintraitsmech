identifier: Pfam:PF02250
label: Viral chemokine binding protein
definition: >-
  This entry represents a family of proteins from poxviruses, including Protein OPG170 from Vaccinia virus (also known as A41) and Protein T1 from Rabbit fibroma virus. These secreted proteins interact with members of both the CC and CXC superfamilies of chemokines. It has been suggested that these secreted proteins modulate leukocyte influx into virus-infected tissues.
