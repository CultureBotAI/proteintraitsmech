identifier: Pfam:PF10715
label: T4-page Endoribonuclease RegB
definition: >-
  The RegB endoribonuclease encoded by Bacteriophage T4 is a unique sequence-specific nuclease that cleaves in the middle of GGAG or, in a few cases, GGAU tetranucleotides, preferentially those found in the Shine-Dalgarno regions of early phage mRNAs. T4 regB expression is regulated autogenously by attacking its own mRNA. The deduced primary structure of RegB proteins in many phages is almost identical to that of T4, while the sequences of RegB encoded by Enterobacteria phage RB69, Enterobacteria phage TuIa and Enterobacteria phage RB49 show substantial divergence from their T4 counterpart. In RB49 regB expression is regulated by both RegB and Escherichia coli endoribonuclease E. It's worth noting that this family does not fall into the Lysozyme-like family, but rather is a new member of the RelE/YoeB structural and functional family of ribonucleases specialising in mRNA inactivation within the ribosome.
