identifier: Pfam:PF27492
label: YorE
definition: >-
  This entry represents a domain covering the whole length of YorE, an uncharacterised protein from the SPbeta prophage of Bacillus subtilis. The protein is 123 amino acids in length and adopts a YaeB-like fold. YorE is found predominantly in bacteriophages, particularly Spbetavirus within Caudoviricetes, as well as in bacterial hosts including Bacillati. The function of this protein remains to be determined. This domain can also cover other positions in related bacterial proteins.
