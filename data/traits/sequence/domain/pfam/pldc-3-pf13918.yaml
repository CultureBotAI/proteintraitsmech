identifier: Pfam:PF13918
label: PLD3/4, PLD-like domain
definition: >-
  This domain is found in a subset of the phospholipase D family members, including 5'-3' exonuclease PLD3/4 from animals and viral phospholipases such as envelope phospholipase F13 (also known as OPG057) and homologues. Human PLD3 is a 5'->3' DNA exonuclease which digests single-stranded DNA and may regulate inflammatory cytokine responses via the degradation of nucleic acids. PLD3 was initially thought to have phospholipase D activity due to its HKD motifs. The second HKD motif contains Glu instead of the canonical Asp and, therefore, its catalytic phospholipase D activity is still controversial. PLD4, its closest homologue, does not posses phospholipase activity. Envelope phospholipase F13 from Vaccinia virus is the major envelope protein that plays a role in the biogenesis of the viral double membrane and in egress of virus from the host cell that produces the wrapped form of virus that is required for cell-to-cell spread. It has been shown to have broad-specificity lipase activity.
