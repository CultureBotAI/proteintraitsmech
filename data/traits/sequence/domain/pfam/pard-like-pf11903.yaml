identifier: Pfam:PF11903
label: ParD-like antitoxin of type II bacterial toxin-antitoxin system
definition: >-
  ParD-like antitoxin is a family of archaeal and bacterial proteins of a type II bacterial toxin-antitoxin system. Many of the cognate toxins for these molecules fall into family ParE-like_toxin, . Gene-pairs are expressed from the same operon, the toxin of the pair being expressed first, eg, for and .
