identifier: Pfam:PF28460
label: PGSIP7 C-terminal domain
definition: >-
  This entry represents the C-terminal in plant glycogenin-like starch initiation protein 7 (PGSIP7), a member of the glycosyltransferase family 8 (GT8). PGSIP7 is a multi-pass membrane protein with six predicted transmembrane helices. The protein belongs to the glycogenin subfamily and contains manganese binding sites. PGSIP7 is found in Arabidopsis thaliana and belongs to the PGSIP-C clade, which is distantly related to the GUX (glucuronoxylan glucuronosyltransferase) and GolS (galactinol synthase) clades within GT8. Unlike the GUX proteins which have a single N-terminal transmembrane domain, PGSIP7 has multiple transmembrane domains distributed along the protein length. The specific function of this protein remains to be determined.
