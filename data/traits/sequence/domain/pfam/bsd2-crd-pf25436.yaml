identifier: Pfam:PF25436
label: BSD2 cysteine rich domain
definition: >-
  This domain is found in the chloroplastic Protein BUNDLE SHEATH DEFECTIVE 2 (BSD2) from Arabidopsis thaliana and related proteins. This domain has a hairpin architecture arranged around two Zn atoms, each coordinated by four cysteines. Proteins with this domain contain a highly conserved CxxCxGxG sequence motif. Chloroplastic chaperone proteins play a critical role in the biogenesis, assembly, and maintenance of major photosynthetic complexes, including RuBisCo and photosystem I (PSI). These proteins stabilise intermediate assembly states of such complexes, ensuring proper formation and functionality once all required subunits are available. A key example is BSD2, a chloroplast chaperone essential for RuBisCo biogenesis and the translational regulation of its large subunit. BSD2 stabilises an end-state assembly intermediate composed of eight large subunits until the small subunits can be incorporated. Beyond their role in complex assembly, these chaperones are also involved in chloroplast development and differentiation, such as chromoplast formation for carotenoid accumulation and the preservation of photosystem II activity under stress conditions. Furthermore, they contribute to the regulation of carbon distribution, influencing plant development and enhancing stress responses by maintaining transcriptional activity within the chloroplast.
