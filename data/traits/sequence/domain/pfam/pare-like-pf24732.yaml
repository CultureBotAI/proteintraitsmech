identifier: Pfam:PF24732
label: ParE-like toxin domain
definition: >-
  This entry represents a ParE-like domain found in bacteria, bacteriophages and bacterial prophages. It is predominantly present in RelE/HigB/ParE toxins and some DNA-binding proteins such as transposases and endonucleases. The ParE-like domain is located at the C-terminal in proteins with an N-terminal zinc-binding domain IPR056099. Members of the family that lack the zinc finger appear to form confident homodimers based on structure prediction and are often associated with likely antitoxin proteins. ParE is the toxin of the ParDE toxin/antitoxin system. ParE toxin binds to DNA gyrase in the absence of the ParD protein
