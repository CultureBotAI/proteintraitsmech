identifier: Pfam:PF01643
label: Acyl-ACP thioesterase N-terminal domain
definition: >-
  This entry represents the N-terminal hotdog domain of various acyl-acyl carrier protein (ACP) thioesterases (TE) which terminate fatty acyl group extension via hydrolysing an acyl group on a fatty acid. These proteins usually contain of a pair of tandem HotDog domains. This entry represents the N-terminal one of the pair.
