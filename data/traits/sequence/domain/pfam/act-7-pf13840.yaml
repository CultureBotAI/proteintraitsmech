identifier: Pfam:PF13840
label: 'ACT domain '
definition: >-
  The ACT domain is a structural motif of 70-90 amino acids that functions in the control of metabolism, solute transport and signal transduction. They are thus found in a variety of different proteins in a variety of different arrangements. In mammalian phenylalanine hydroxylase the domain forms no contacts but promotes an allosteric effect despite the apparent lack of ligand binding. This ACT domain is found in CASTOR proteins and C-terminal in some aspartate kinases.
