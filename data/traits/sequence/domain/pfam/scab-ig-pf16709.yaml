identifier: Pfam:PF16709
label: Ig domain of plant-specific actin-binding protein
definition: >-
  This entry represents an Ig-like domain found in plant-specific actin-binding proteins or SCABs. SCAB proteins bind, bundle and stabilise actin filaments and regulate stomatal movement. The Ig-PH fusion domain is at the C terminus. This domain is an Ig β-sandwich fold consisting of two antiparallel β-sheets built from strands β1 and β2 and strands β3-β6, respectively.
