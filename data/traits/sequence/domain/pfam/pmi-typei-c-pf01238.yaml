identifier: Pfam:PF01238
label: Phosphomannose isomerase type I C-terminal
definition: >-
  This entry represents the C-terminal domain of Phosphomannose isomerase type I enzymes (also known as Mannose-6-phosphate isomerases), which are involved in the synthesis of the GDP-mannose and dolichol-phosphate-mannose required for a number of critical mannosyl transfer reactions. This domain contains antiparallel β-strands in an extended jelly roll topology with short loops connecting the strands.
