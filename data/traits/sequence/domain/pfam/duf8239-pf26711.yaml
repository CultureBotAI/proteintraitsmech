identifier: Pfam:PF26711
label: Domain of unknown function (DUF8239)
definition: >-
  This domain is found in uncharacterised proteins from Gram-negative bacteria. It is predicted to fold into a β-sandwich which has some similarity to known carbohydrate binding domains. It is frequently found in combination with PEP-CTERM sorting motif suggesting that it may be associated with the membrane.
