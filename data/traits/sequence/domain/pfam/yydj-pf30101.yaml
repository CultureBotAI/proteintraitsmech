identifier: Pfam:PF30101
label: Peptide export permease protein YydJ family
definition: >-
  This entry represents the YydJ peptide export permease family, found in firmicutes. The representative member YydJ from Bacillus subtilis strain 168 is a 240 amino acid protein localised to the cell membrane with six predicted transmembrane helices. YydJ is part of an ABC transporter complex YydIJ involved in export of the modified peptide YydF. The complex is composed of two ATP-binding proteins (YydI) and two transmembrane proteins (YydJ). Part of the yydFGHIJ operon.
