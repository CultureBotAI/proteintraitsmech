identifier: Pfam:PF29936
label: StrH C-terminal domain
definition: >-
  This entry represents the C-terminal domain of StrH (dTDP-dihydrostreptose--streptidine-6-phosphate dihydrostreptosyltransferase) from Actinomycetota. StrH is involved in streptomycin biosynthesis. The function of this domain remains to be determined.
