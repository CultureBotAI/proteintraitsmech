identifier: Pfam:PF14574
label: C-terminal domain of RACo the ASKHA domain
definition: >-
  This entry represents the C-terminal in Corrinoid activation enzyme RamQ and the middle domain in [Co(II) methylated amine-specific corrinoid protein] reductase (RamA). RamQ is involved in the degradation of the quaternary amines L-proline betaine and L-carnitine. RamA is required for the activation of corrinoid-dependent methylamine methyltransferase reactions during methanogenesis.
