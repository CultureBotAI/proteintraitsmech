identifier: Pfam:PF31014
label: SENP6/SENP7 PH-like domain
definition: >-
  This entry represents a PH-like domain of approximately 160 residues found in SENP6 and SENP7 (Sentrin-specific proteases) in animals. These proteins also contain the Peptidase_C48 domain ( ) and function as SUMO proteases that deconjugate SUMO2 and SUMO3 from target proteins. SENP6 is involved in chromosome alignment, spindle assembly, and regulation of PML nuclear bodies. The precise function of this domain remains to be determined.
