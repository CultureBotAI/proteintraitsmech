identifier: Pfam:PF30317
label: Uncharacterized protein HI_0559
definition: >-
  This entry represents the uncharacterized protein HI_0559 from Haemophilus and related sequences mainly from Pasteurellaceae species. The protein is predicted to be a multi-pass membrane protein localised to the cell membrane with three transmembrane helices. The function of this domain remains to be determined.
