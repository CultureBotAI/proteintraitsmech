identifier: Pfam:PF27463
label: Uncharacterised membrane protein Rv1490
definition: >-
  This entry represents a family of uncharacterised membrane proteins found in Mycobacterium tuberculosis complex organisms. These proteins are predicted to be multi-pass membrane proteins with nine transmembrane helices. The proteins are localised to the cell membrane. The function of this protein family remains to be determined.
