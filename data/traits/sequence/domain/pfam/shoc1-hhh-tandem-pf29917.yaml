identifier: Pfam:PF29917
label: SHOC1 helix-hairpin-helix tandem
definition: >-
  This domain is found in the human Protein shortage in chiasmata 1 ortholog (SHOC1) and related proteins mainly from chordate. This domain has significant similarity to SAM-like helix-hairpin-helix tandem domains. SHOC1 is an integral to the formation of crossover recombination intermediates during mammalian meiosis. SHOC1 preferentially binds branched DNA molecules but apparently lacks in vitro endonuclease activity. The core of SHOC1 resembles the DNA repair endonuclease XPF. This aligns with the SHOC1 ATPase activity, which is stimulated by the presence of single-stranded DNA.
