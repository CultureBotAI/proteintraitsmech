identifier: Pfam:PF03887
label: YfbU domain
definition: >-
  This is a family of functionally uncharacterised proteins with a length of about 160 residues. A member of this family, E. coli protein YfbU, has been structurally characterised and adopts an α-helical structure consisting of two subdomains. It forms a 24-subunit particle with an empty cavity. The N-terminal subdomains in this 24-mer pack around the 4-fold axis while the C-terminal domains interact at the 2-fold and 3-fold axes. In this family is associated with a helix-turn-helix domain. This suggests that this may be a ligand-binding family.
