identifier: Pfam:PF11638
label: DnaA N-terminal domain
definition: >-
  This entry represents the N-terminal domain of bacterial DnaA proteins, which play an important role in initiating and regulating chromosomal replication. DnaA is an ATP- and DNA-binding protein. It binds specifically to 9 bp nucleotide repeats known as dnaA boxes which are found in the chromosome origin of replication (oriC). The structure of this domain is known. Its exact function is uncertain, but it has been suggested that the domain may play a role in oligomerisation.
