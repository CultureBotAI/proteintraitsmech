identifier: Pfam:PF03819
label: MazG nucleotide pyrophosphohydrolase domain
definition: >-
  This domain is found in a group of prokaryotic proteins which includes Escherichia coli MazG, which hydrolyses all canonical nucleoside triphosphates but it also might have a 'housecleaning' function by hydrolysing noncanonical NTPs, whose incorporation into the nascent DNA leads to the increased mutagenesis and DNA damage. Phylogenetic distribution studies of this domain revealed that it commonly appears as two domains in tandem, although there are single-domain analogs. In E. coli there are two tandem globular domains, in which the NTPase activity was observed only at the C-terminal domain. MazG hydrolyses all canonical nucleoside and deoxyribonucleoside triphosphates as well as mutagenic dUTP and 8-oxo-dGTP, converting them to the corresponding nucleoside monophosphates and diphosphate. The enzyme is required to maintain mycobacterial capacity to respond to oxidative stress through degradation of oxidation-induced damaged nucleotides. MazG functions as a homotetramer and requires magnesium for activity. The protein is induced by oxidative stress and is involved in transcriptional activation of RelA. In Thermotoga maritima, it has both nucleoside triphosphate pyrophosphohydrolase and pyrophosphatase activities.
