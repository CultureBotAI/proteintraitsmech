identifier: Pfam:PF25026
label: Asd-4-like domain
definition: >-
  This entry represents a helical region found in GATA type zinc finger protein asd-4 from Neurospora crassa (Asd-4), transcriptional regulator GZF3 from Candida albicans and similar fungal proteins. Asd-4 is a transcriptional regulator that functions in sexual development. GZF3 is transcription factor involved in response to fluconazole, LiCl, and copper.
