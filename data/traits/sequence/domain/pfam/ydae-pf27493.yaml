identifier: Pfam:PF27493
label: YdaE
definition: >-
  Members of this family include YdaE from the Rac prophage region of Escherichia coli K-12, a homologue from the Gifsy-1 prophage region of Salmonella enterica LT2, and related proteins from other closely related species. The presence of four conserved Cys residues has led to annotations as a zinc-binding protein or metallothionein, but the actual function is unclear. Their predicted structure resembles treble clef (TC) zinc fingers topology.
