identifier: Pfam:PF09625
label: VP9 protein
definition: >-
  VP9 is a protein containing a ferredoxin fold. Two dimers come together to form one asymmetric unit which possesses a DNA recognition fold and specific metal binding sites possibly for zinc. It is postulated that being a non-structural protein VP9 is involved in the transcriptional regulation of the White spot syndrome virus (WSSV), from which it comes. WSSV is the major viral pathogen in shrimp aquaculture. VP9 is found N-terminal to the .
