identifier: Pfam:PF27304
label: UU051 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of UU051. The specific function of this N-terminal domain remains to be determined. UU051 proteins are found in Ureaplasma and related species from Mycoplasmoidales and Mycoplasmatales. The full-length UU051 protein is approximately 170 amino acids.
