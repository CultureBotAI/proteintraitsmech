identifier: Pfam:PF25878
label: pHBA AAEA subunit, alpha-helical hairpin domain
definition: >-
  This entry represents the α-helical hairpin domain found in p-hydroxybenzoic acid efflux pump subunit AaeA, which is a component of the p-hydroxybenzoic acid (pHBA) efflux pump in Escherichia coli. It forms an efflux pump with AaeB, which functions to export certain aromatic carboxylic acids from the cell. The AaeAB efflux system serves as a 'metabolic relief valve' to alleviate toxic effects of imbalanced metabolism by eliminating specific compounds when they accumulate to high levels in the cell. Members of this group are found in proteobacteria.
