identifier: Pfam:PF20203
label: Domain of unknown function (DUF6565)
definition: >-
  This domain is found in uncharacterised proteins, mainly from bacteroidetes and its function is unknown. It is approximately 60 amino acids in length. It contains a conserved motif DxxxW and a highly conserved tyrosine residue. It is related to apolipoproteins.
