identifier: Pfam:PF03367
label: ZPR1 zinc-finger domain
definition: >-
  This entry represents ZPR1-type zinc finger domains. ZPR1 is an experimentally proven zinc-binding protein that binds the tyrosine kinase domain of the epidermal growth factor receptor (EGFR); binding is inhibited by EGF stimulation and tyrosine phosphorylation, and activation by EGF is followed by some redistribution of ZPR1 to the nucleus. The function of ZPR1 from archaea and eukaryotes is not yet clear. However, Zpr1 from yeast acts as a protein folding chaperone for elongation factor 1-alpha. ZPR1 is present in both the cytoplasm and nucleoplasm and its subcellular distribution changes during proliferation. ZPR1 binds to the cytoplasmic tyrosine kinase domain of the epidermal growth factor receptor (EGFR) and is a component of downstream signaling of both EGFR and FGFR signaling. It has been associated with susceptibility to type 2 diabetes and is downregulated in patients with spinal muscular atrophy, a disease characterised by degeneration of the alpha-motor neurons in the spinal cord that can arise from mutations affecting the expression of Survival Motor Neurons (SMN). ZPR1 interacts with complexes formed by SMN, and may act as a modifier that affects the severity of SMA. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties…
