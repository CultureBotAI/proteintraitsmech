identifier: Pfam:PF17720
label: RNA ligase 1
definition: >-
  This entry represents RNA ligase 1 from animals (RLIG1), which functions as an RNA ligase in vitro. This protein catalyses ATP-dependent RNA ligation via a three-step mechanism, involving tandem auto- and RNA AMPylation. It exhibits selectivity for single-stranded RNA substrates and may not have nick-sealing activity on double-stranded DNA-RNA hybrids. RLIG1 May play a role in maintaining RNA integrity under stress conditions, for example in response to reactive oxygen species (ROS).
