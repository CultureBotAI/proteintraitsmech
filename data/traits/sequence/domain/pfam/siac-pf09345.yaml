identifier: Pfam:PF09345
label: SiaC family regulatory phosphoprotein
definition: >-
  This entry represents a domain in Uncharacterized protein PA14_02130 which is part of the SiaC family regulatory phosphoprotein. They undergo a regulatory phosphorylation at Thr-68. Also, it is part of motif NTSS, so may contain more than one phosphorylation site. Phosphorylation causes regulatory change to protein-protein interaction in a pathway that seems broadly distributed, involves a diguanylate cyclase. In the case of Pseudomonas aeruginosa affects aggregation and biofilm formation responses.
