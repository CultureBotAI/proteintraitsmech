identifier: Pfam:PF23260
label: SEMA5B-like, TSP-1 type 1
definition: >-
  This is a TSP-1 type 1 domain found in human Semaphorin-5A (Sema5A) and Semaphorin-5B (Sema5B), Semaphorin 5c from Drosophila melanogaster and similar sequences mainly found in animals. In mice, Sema5A has been identified as a protein that induces inhibitory responses during optic nerve development. It also has been identified as a candidate gene for causing idiopathic autism in humans. Plexin B3 functions as a binding partner and receptor for Sema5A. Sema5A is highly expressed in human pancreatic cancer cells and is associated with tumor growth, invasion and metastasis. Sema5A belongs to class 5 semaphorin family of proteins, which are transmembrane glycoproteins characterised by unique thrombospondin specific repeats in the extracellular region of the protein. Sema5B acts as an axonal guidance cue and regulates the development and maintenance of synapse size and number in hippocampal neurons.
