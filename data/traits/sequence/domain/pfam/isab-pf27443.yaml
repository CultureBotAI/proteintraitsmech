identifier: Pfam:PF27443
label: Immunodominant staphylococcal antigen B
definition: >-
  This entry represents IsaB (immunodominant staphylococcal antigen B, or immunodominant surface antigen B) from Staphylococcus aureus. IsaB is a virulence factor that impedes autophagy by host defence systems. It is unrelated to IsaA, an apparent soluble lytic transglycosylase. Additional members of this family are found in numerous species of Staphylococcus, Mammaliicoccus, Macrococcus, and Jeotgalicoccus.
