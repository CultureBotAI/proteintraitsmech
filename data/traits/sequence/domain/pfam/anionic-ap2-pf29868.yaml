identifier: Pfam:PF29868
label: Anionic antimicrobial peptide 2
definition: >-
  This entry represents an anionic antimicrobial peptide family found in Lepidoptera. These peptides are secreted into the hemolymph and are induced by bacterial infection. The peptides exhibit selective antibacterial activity against certain Gram-positive bacteria including M.luteus, L.monocytogenes, and S.lutea, whilst lacking activity against B.circulans, S.aureus, and tested Gram-negative bacteria. They also display antifungal activity against P.pastoris and P.stipitis but not against other tested fungal species. These peptides function as part of the innate immune response in insects.
