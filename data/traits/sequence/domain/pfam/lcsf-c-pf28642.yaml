identifier: Pfam:PF28642
label: LcsF C-terminal domain
definition: >-
  This entry represents the C-terminal domain of LcsF, a bZIP transcription factor that regulates leucinostatin biosynthesis in Purpureocillium lilacinum. This domain is located downstream of the N-terminal bZIP domain and contains multiple disordered regions. LcsF regulates expression of the leucinostatin biosynthesis gene cluster, with most cluster genes being up-regulated by this transcription factor. Leucinostatins are lipopeptide antibiotics with antimalarial, antiviral, antibacterial, antifungal and antitumour activities. The protein is found in fungal species and localised to the nucleus. While the full-length LcsF protein has established regulatory functions, the specific role of this C-terminal domain remains to be determined.
