identifier: Pfam:PF29132
label: F13C5.5 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of uncharacterised protein F13C5.5 and related proteins found in nematodes. The domain spans approximately 145 residues and corresponds to the extracellular region of these type I transmembrane proteins. The domain contains N-linked glycosylation sites and is predicted to be located in the extracellular space. F13C5.5 is expressed in pharyngeal muscle cells and other tissues in Caenorhabditis elegans. The function of this domain remains to be determined.
