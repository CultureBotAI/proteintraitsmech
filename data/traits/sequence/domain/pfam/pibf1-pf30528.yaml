identifier: Pfam:PF30528
label: Progesterone-induced blocking factor 1
definition: >-
  This entry represents progesterone-induced blocking factor 1 (PIBF1, also known as CEP90) proteins from vertebrates. PIBF1 is a multifunctional protein that localises to centriolar satellites and is involved in ciliogenesis and maintenance of mitotic spindle pole integrity. In its secreted form, PIBF1 acts as an immunomodulator mediating progesterone-induced suppression of immune responses. PIBF1 is also required for CEP63 centrosomal localisation and promotes centriole duplication. Mutations in PIBF1 are associated with Joubert syndrome 33 (JBTS33), a ciliopathy characterised by cerebellar vermian hypoplasia and the molar tooth sign.
