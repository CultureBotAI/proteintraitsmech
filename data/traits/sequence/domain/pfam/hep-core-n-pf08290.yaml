identifier: Pfam:PF08290
label: Hepatitis core protein, putative zinc finger
definition: >-
  This entry represent a short region found at the N terminus of some viral capsid (HBcAg) proteins from various Hepatitis B virus (HBV), which is a major human pathogen. The conservation of four Cys residues suggests that this region acts as a zinc binding domain. Hepatitis virus is composed of an outer envelope of host-derived lipid containing the surface proteins, and an inner protein capsid that contains genomic DNA. The capsid is composed of a single polypeptide, HBcAg, also known as the core antigen. The capsid has a 5-helical fold, where two long helices form a hairpin that dimerises into a 4-helical bundle; this fold is unusual for icosahedral viruses. The monomer fold is stabilised by a hydrophobic core that is highly conserved among human viral variants. The capsid is assembled from dimers via interactions involving a highly conserved arginine-rich region near the C terminus. This viral capsid acts as a core antigen, the major immunodominant region lying at the tips of the α-helical hairpins that form spikes on the capsid surface.
