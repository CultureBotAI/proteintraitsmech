identifier: Pfam:PF13274
label: Antitoxin SocA-like, Panacea domain
definition: >-
  This entry represents a domain found centrally in Antitoxin SocA from Caulobacter vibrioides. SocA is the antitoxin component of an atypical type II toxin-antitoxin (TA) system which neutralises the toxic activity of toxin SocB by acting as an adapter to promote its degradation by the protease ClpXP. The Panacea domain is also found in similar proteins from bacteria, archaea and tailed bacteriophages that form a complex with their cognate toxins in a way normally observed in Type II TA systems.
