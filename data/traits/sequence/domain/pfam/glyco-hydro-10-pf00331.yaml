identifier: Pfam:PF00331
label: Glycosyl hydrolase family 10
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 10 comprises enzymes with a number of known activities; xylanase ( ); endo-1,3-beta-xylanase ( ); cellobiohydrolase ( ). These enzymes were formerly known as cellulase family F. The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases ( ), cellobiohydrolases ( ) (exoglucanases), or xylanases ( ). Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family F or as the glycosyl hydrolases family 10. The overall structure of the GH10 domain corresponds to an eightfold α/β-barrel (TIM-barrel) with a typical deep groove in the centre, allowing an 'endo' type of action on the large polysaccharide backbone,.
