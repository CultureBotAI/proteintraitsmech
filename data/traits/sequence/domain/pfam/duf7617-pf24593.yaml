label: Domain of unknown function (DUF7617)
definition: >-
  This domain is found in multiple copies in a number of bacterial proteins mainly from Actinomycetes. It is closely related to domains represented by and . Similarly to them, this domain contains a conserved N-terminal lysine and a C-terminal asparagine with central aspartate/glutamate residues suggesting that some members may contain an isopeptide bond. This domain is sometimes found in combination with , or .
