identifier: Pfam:PF23742
label: C3G9 VBS-like domain
definition: >-
  This domain is found in the Scaffold protein spa2 from S. pombe (previously known as C3G9.05) and related fungal proteins. This protein acts as a scaffolding protein at sites of polarised growth, plays a role in the establishment of polarized growth and organises polarised exocytosis at growth sites. It is predicted to adopt a four-helical up-and-down bundle with significant similarity to VBS-like domains.
