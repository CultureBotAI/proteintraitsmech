identifier: Pfam:PF23144
label: Receptor-type tyrosine-protein phosphatase U Fn3 domain
definition: >-
  This entry represents the fourth divergent fibronectin type 3 domain found in a group of Receptor-type tyrosine-protein phosphatases (PTPR) including PTPR U, kappa, mu, T and related proteins. This domain is closest to the transmembrane α-helix. PTPRU, also known as pancreatic carcinoma phosphatase 2 (PCP-2), belongs to the type IIb subfamily of receptor protein tyrosine phosphatases (RPTPs). It regulates CTNNB1 function both in cell adhesion and signalling. It may function in cell proliferation and migration and play a role in the maintenance of epithelial integrity. May play a role in megakaryocytopoiesis. Protein tyrosine (pTyr) phosphorylation is a common post-translational modification which can create novel recognition motifs for protein interactions and cellular localisation, affect protein stability, and regulate enzyme activity. Consequently, maintaining an appropriate level of protein tyrosine phosphorylation is essential for many cellular functions. Tyrosine-specific protein phosphatases (PTPase; ) catalyse the removal of a phosphate group attached to a tyrosine residue, using a cysteinyl-phosphate enzyme intermediate. These enzymes are key regulatory components in signal transduction pathways (such as the MAP kinase pathway) and cell cycle control, and are important in the control of cell growth, proliferation, differentiation and transformation. The PTP superfamily can be divided into four subfamilies: (1) pTyr-specific phosphatases (2) dual specificity phosphatases (dTyr and dSer/dThr) (3) Cdc25 phosphatases (dTyr and/or dThr) (4) LMW (low molecular weight) phosphatases Based on their cellular localisation, PTPases are also classified as: Receptor-like, which are transmembrane receptors that contain PTPase domains Non-receptor (intracellular) PTPases All…
