identifier: Pfam:PF18461
label: Atypical caspase recruitment domain
definition: >-
  This entry represents the N-terminal effector domain found in NLRC5. It adopts a six α-helix bundle with a general death fold. It possesses a fold similar to the one of the death-fold domains; however, it displays significant differences in the number of core α-helices and their relative orientation. Hence, it is suggested that NLRC5 belongs to the caspase recruitment domain (CARD) subfamily as an atypical CARD.
