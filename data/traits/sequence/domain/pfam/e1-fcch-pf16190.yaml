identifier: Pfam:PF16190
label: Ubiquitin-activating enzyme E1 FCCH domain
definition: >-
  This domain is found in the ubiquitin-activating E1 (Ub-E1) family enzymes. It is one of the catalytic cysteine half-domains of Ub-E1. The catalytic cysteine half-domains contain the E1 active site cysteine, and are known as FCCH and SCCH, for 'first' and 'second' catalytic cysteine half-domain, respectively.
