identifier: Pfam:PF07688
label: KaiA C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Circadian clock protein KaiA. Cyanobacteria are the most primitive organisms known to exhibit circadian rhythms. KaiA, kaiB and kaiC constitute the circadian clock machinery in cyanobacteria, and kaiA activates kaiBC expression whereas kaiC represses it. Apparent homologues of kaiB and kaiC are found among non cyanobacteria eubacteria and the archaea. However kaiA appears confined within the cyanobacteria, which are the only prokaryotes with demonstrated circadian rhythms. There are at least two types of kaiA proteins: long and short. The long versions consist of ~300 aminoacyl residues. There is limited sequence conservation in the N-terminal 200 residues of these proteins but a high degree of conservation in the C-terminal 100 residues. They thus appear to contain two independently folded domains, the amino and carboxyl regions, connected by a canonical linker. The short versions are essentially independent C-terminal domains. The kaiA N-terminal domain consists of a central five-stranded (β1 to β5) parallel β-sheet flanked by two groups of α-helices (α1, α4 and α2, α3) packed on either side of the β-sheet and an additional α-helix (α5) lying near the amino terminus of the central β-strand. The structure of the N-terminal domain of kaiA is that of a pseudo-receiver domain, similar to those found in bacterial response regulators. Although the fold is that of a canonical receiver domain, the primary sequence is dissimilar, and it lacks the conserved aspartate residue necessary for phosphorylation. KaiA activation most likely involves direct protein-protein interactions of the N-terminal domain that result in functional modulation of the C-terminal effector domain. The C-terminal kaiA domain is responsible for dimer formati…
