identifier: Pfam:PF30636
label: Precorrin methyltransferase domain
definition: >-
  This entry represents the CbiT subunit of the aerobic and anaerobic enzymes. In the anaerobic proteins it comproses the entire length of the protein, while in the aerobic enzymes it is fused with CbiE to form the bifunctional CobL protein. The CbiT subunit of precorrin-6Y C5,15-methyltransferase ( ) is a bifunctional enzyme that catalyses two methylations (at C-5 and C-15) in precorrin-6Y, as well as the decarboxylation of the acetate side chain located in ring C, in order to generate precorrin-8X. In the anaerobic pathway, two enzymes are required to produce precorrin-8X: CbiE and CbiT, which can be fused as CbiET (sometimes called CobL). In the aerobic pathway, the enzyme is a fusion of CbiE and CbiT which is refered to as CobL. CbiT is thought to catalyse one of the methylation reactions, though this has not been completely proven. Cobalamin (vitamin B12) is a structurally complex cofactor, consisting of a modified tetrapyrrole with a centrally chelated cobalt. Cobalamin is usually found in one of two biologically active forms: methylcobalamin and adocobalamin. Most prokaryotes, as well as animals, have cobalamin-dependent enzymes, whereas plants and fungi do not appear to use it. In bacteria and archaea, these include methionine synthase, ribonucleotide reductase, glutamate and methylmalonyl-CoA mutases, ethanolamine ammonia lyase, and diol dehydratase. In mammals, cobalamin is obtained through the diet, and is required for methionine synthase and methylmalonyl-CoA mutase.
