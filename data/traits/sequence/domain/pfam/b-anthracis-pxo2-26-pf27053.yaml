identifier: Pfam:PF27053
label: Bacillus anthracis plasmid pXO2 protein 26
definition: >-
  This entry represents protein pXO2-26 found in Bacillus anthracis plasmid pXO2. This protein is an uncharacterised membrane protein of 130 amino acids that contains a predicted transmembrane helix. The protein is encoded on plasmid pXO2, one of the virulence plasmids of Bacillus anthracis. The C-terminal part of the protein adopts a three stranded β sheet with two helices packed on one side.
