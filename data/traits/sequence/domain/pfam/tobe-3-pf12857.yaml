identifier: Pfam:PF12857
label: TOBE-like domain
definition: >-
  The TOBE (transport-associated OB) domain always occurs as a dimer and it is found in ABC transporters immediately after the ATPase domain. This entry represents a TOBE-like domain, found in the C terminus of ATPase subunit CysA. CysA is part of the CysATWP ABC transporter complex, involved in sulphate/thiosulphate import.
