identifier: Pfam:PF22657
label: Another single-strand binding protein family
definition: >-
  PriB, also known as Primosomal replication protein N, is a component of the preprimosomal complex. The preprimosomal complex is composed of one monomer of PriC and DnaT, two monomers of PriA, two dimers of PriB and one hexamer of DnaB. Upon transient interaction with DnaG it forms the primosome. PriB binds single-stranded DNA at the primosome assembly site (PAS). Assembly of the primosome is initiated by interactions of PriA and PriB with ssDNA and the PAS.
