identifier: Pfam:PF17870
label: Insulin receptor trans-membrane segment
definition: >-
  This entry represents the trans-membrane domain (TMD) found in insulin receptor proteins. The TMD of the insulin receptor is within the beta-subunit and contains 23 amino acids. Mutations in the TMD were shown to have effects on receptor biosynthetic processing and kinase activation. Substitution of the entire TMD of the insulin receptor (IR) resulted in constitutive kinase activation in vitro, while replacing the TMD with that of glycophorin A inhibited insulin action. Structural studies show that TMD contains a helix and a kink when it is purified in dodecylphosphocholine (DPC) micelles. The residues 942-948 preceding the TMD have a propensity to be a short helix and may interact with membrane.
