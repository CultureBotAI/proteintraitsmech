label: Single-strand DNA deaminase toxin A, C-terminal
definition: >-
  This domain is found at the C-terminal end of Single-strand DNA deaminase toxin A from Pseudomonas syringae (SsdA, ) and similar uncharacterised bacterial and fungal sequences. SsdA shows a typical α-β deaminase configuration.
