identifier: Pfam:PF12199
label: Extracellular fibrinogen binding protein C terminal
definition: >-
  This entry represents the C-terminal region of bacterial extracellular fibrinogen binding proteins which is approximately 70 amino acids in length and contains a conserved VLK sequence motif. It also contains a helical motif involved in complement regulation. This motif binds to complement proteins and changes its conformation to a form which cannot activate downstream components of the complement cascade.
