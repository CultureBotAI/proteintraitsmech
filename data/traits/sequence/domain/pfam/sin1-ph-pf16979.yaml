identifier: Pfam:PF16979
label: SAPK-interacting protein 1 (Sin1), Pleckstrin-homology
definition: >-
  This entry represents a pleckstrin-homology domain found at the C terminus of Stress-activated map kinase interacting 1 (Sin1) and its Saccharomyces cerevisiae orthologue Avo1. It is conserved from yeast to humans. PH-domains are involved in intracellular signalling or as constituents of the cytoskeleton. Sin1 plays an essential role in signal transduction, and the PH domain is involved in lipid and membrane binding.
