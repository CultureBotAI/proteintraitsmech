identifier: Pfam:PF23320
label: Polycomb protein SUZ12-like, Zn domain
definition: >-
  This entry represents the C2H2-type zinc finger domain found in several Polycomb group (PcG) proteins mainly from metazoa and plants, including human Polycomb protein SUZ12. SUZ12 is a component of the PRC2 complex, which methylates 'Lys-9' and 'Lys-27' of histone H3, leading to transcriptional repression of the affected target gene. This domain mediates stable binding of the TR domain of Jarid2, another component of the PRC2 complex, and the C-terminal domain of EPOP (C17orf96, a scaffold protein that bridges with the elongin BC complex). The domain represented by this entry is often found associated with .
