identifier: Pfam:PF22528
label: Arginine methyltransferase oligomerization subdomain
definition: >-
  This entry represents a domain found C-terminal in Protein arginine N-methyltransferase 1 and twice in Protein arginine N-methyltransferase 7. This domain is also found in histone-arginine methyltransferases CARM1 and CARMER. CARM1 methylates (mono- and asymmetric dimethylation) the guanidino nitrogens of arginyl residues in several proteins involved in DNA packaging, transcription regulation, pre-mRNA splicing, and mRNA stability. This domain shows a β-barrel structure and is involved in oligomerization. Protein arginine methyltransferases (PRMTs) are enzymes that transfer methyl groups to the arginine residues of histones and other proteins. Arginine methylation is an important posttranslational modification process that plays functional roles in transcriptional control, splicing, DNA repair, and signaling.
