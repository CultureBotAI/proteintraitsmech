identifier: Pfam:PF26984
label: Bacteriophage N4 gene product 2
definition: >-
  This entry represents gene product 2 (Gp2) found in N4-like bacteriophages. Gp2 is an uncharacterised protein of 161 amino acids (18.0 kDa) found in bacteriophage N4. Structure prediction strongly suggests that this protein forms homodimers which includes a strand swapped between the monomer structure.
