identifier: Pfam:PF09145
label: Ubiquitin-associated
definition: >-
  Ubiquitin-associated (UBA) domains contain approximately 40 residues and bind ubiquitin non-covalently. They adopt a secondary structure consisting of three α-helices, and have been identified in various modular proteins involved in protein trafficking, clathrin assembly/disassembly, DNA repair, proteasomal degradation, and cell cycle regulation.
