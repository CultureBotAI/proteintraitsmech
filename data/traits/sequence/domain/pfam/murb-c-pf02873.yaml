identifier: Pfam:PF02873
label: UDP-N-acetylenolpyruvoylglucosamine reductase, C-terminal domain
definition: >-
  This entry represents a C-terminal conserved region of UDP-N-acetylenolpyruvoylglucosamine reductase , which is also called UDP-N-acetylmuramate dehydrogenase. The C-terminal domain is involved in substrate binding. It is a part of the pathway for the biosynthesis of the UDP-N-acetylmuramoyl-pentapeptide, which is a precursor of bacterial peptidoglycan.
