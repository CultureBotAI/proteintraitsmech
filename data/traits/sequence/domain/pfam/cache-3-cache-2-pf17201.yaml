identifier: Pfam:PF17201
label: Cache 3/Cache 2 fusion domain
definition: >-
  Cache is an extracellular domain that is predicted to have a role in small-molecule recognition in a wide range of proteins, including the animal dihydropyridine-sensitive voltage-gated Ca2 channel alpha-2delta subunit, and various bacterial chemotaxis receptors. The name Cache comes from CAlcium channels and CHEmotaxis receptors. This entry represents a type of Cache domain that likely originated as a fusion of sCache_3 and sCache_2 domains.
