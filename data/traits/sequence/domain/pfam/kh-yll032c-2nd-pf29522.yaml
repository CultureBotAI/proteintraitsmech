identifier: Pfam:PF29522
label: YLL032C second KH domain-containing protein
definition: >-
  This entry represents the second KH domain in YLL032C and similar proteins found particularly in Saccharomycetaceae and related yeasts. These proteins are involved in RNA binding. The representative protein YLL032C is localised to the cytoplasm and exhibits mRNA binding activity. These proteins undergo phosphorylation and are involved in RNA metabolism. The specific function of these proteins remains to be determined.
