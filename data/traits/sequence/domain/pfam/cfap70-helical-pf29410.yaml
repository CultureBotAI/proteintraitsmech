identifier: Pfam:PF29410
label: Cilia and flagella-associated protein 70 helical domain
definition: >-
  This entry represents a middle helical domain of cilia and flagella-associated protein 70 (CFAP70). CFAP70 is an axoneme-binding protein that plays a role in the regulation of ciliary motility and cilium length. The protein localises to the cilium axoneme and flagellum, with particular concentration at the base of the outer dynein arm. While the full-length CFAP70 protein is involved in ciliary motility regulation, the specific function of this domain remains to be determined.
