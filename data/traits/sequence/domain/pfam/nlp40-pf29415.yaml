identifier: Pfam:PF29415
label: NLP-40 neuropeptide precursor
definition: >-
  This entry represents the NLP-40 family of neuropeptide precursors found in nematodes. The prototype member from Caenorhabditis elegans is a 123-residue secreted protein that is processed to yield four bioactive peptides (P1-P4). Peptide P3 acts as a neuropeptide ligand for the G-protein coupled receptor AEX-2 and regulates rhythmic calcium influx in DVB GABAergic neurones during the defecation motor programme. The precursor is expressed in intestinal cells and secreted, with peptides subsequently endocytosed by coelomocytes.
