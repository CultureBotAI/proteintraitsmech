identifier: Pfam:PF09335
label: VTT domain
definition: >-
  This entry represents a domain found in Golgi apparatus membrane protein TVP38 from Saccharomyces cerevisiae, in human Vacuole membrane protein 1 (VMP1) and Transmembrane protein 41B (TMEM41B). TVP38 localises with the t-SNARE Tlg2 and is involved in vesicular trafficking and spindle migration. VMP1 and TMEM41B are phospholipid scramblases involved in lipid homeostasis and membrane dynamics processes. The VTT (VMP1, TMEM41, and TVP38) domain was previously called the SNARE-associated domain. As there is no evidence that this domain associates with SNARE proteins, it was renamed. This domain covers most of the protein length of some sequences of the DedA family, including Inner membrane protein YghB from Escherichia coli, which may be a membrane transporter required for proton motive force (PMF)-dependent drug efflux and may play a role in determining membrane lipid composition.
