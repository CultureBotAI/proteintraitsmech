identifier: Pfam:PF24150
label: SHIP1/2 first C2 domain
definition: >-
  This entry represents the first C2 domain of Phosphatidylinositol 3,4,5-trisphosphate 5-phosphatases 1/2 and similar proteins from vertebrates. The C2 domains of these proteins modulate the activity of the phosphatase domain. Human Phosphatidylinositol 3,4,5-trisphosphate 5-phosphatase 1 (SHIP) specifically hydrolyses the 5-phosphate of phosphatidylinositol-3,4,5-trisphosphate (PtdIns(3,4,5)P3) to produce PtdIns(3,4)P2, thereby negatively regulating the phosphoinositide 3-kinase pathways. It also functions as a negative regulator of B-cell antigen receptor signalling, myeloid cell proliferation/survival and chemotaxis, mast cell degranulation, immune cells homeostasis, integrin alpha-IIb/beta-3 signalling in platelets and JNK signalling in B-cells. This protein regulates proliferation of osteoclast precursors, macrophage programming, phagocytosis and activation and neutrophil migration and is required for endotoxin tolerance.
