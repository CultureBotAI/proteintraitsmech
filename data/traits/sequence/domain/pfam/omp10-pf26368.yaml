identifier: Pfam:PF26368
label: Outer membrane lipoprotein Omp10
definition: >-
  This entry represents the Outer membrane lipoprotein omp10 from Brucella abortus ( ) and similar sequences mainly found in alpha-proteobacterial. The deletion of Omp10 in Brucella significantly reduces survival in mice and results in growth defects in minimal medium. However, it does not show impairment in intracellular growth in vitro. However, the specific function of Omp10 is unknown.
