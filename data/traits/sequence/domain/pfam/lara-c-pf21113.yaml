identifier: Pfam:PF21113
label: Lactate racemase C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the nickel-dependent lactate racemase enzyme (LarA) and related proteins found in archaea and bacteria. LarA is part of a superfamily containing many different enzymes. These include malate racemases, phenyllactate racemase, one alpha-hydroxyglutarate racemase, D-gluconate 2-epimerase, a short-chain aliphatic alpha-hydroxyacid racemase.
