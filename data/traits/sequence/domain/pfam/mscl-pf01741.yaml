identifier: Pfam:PF01741
label: Large-conductance mechanosensitive channel, MscL
definition: >-
  Mechanosensitive ion channels (MscL) play a critical role in transducing physical stresses at the cell membrane into an electrochemical response. MscL is a protein which forms a channel organised as a homopentamer, with each subunit containing two transmembrane regions. Prokaryotes harbor a large-conductance mechanosensitive channel (gene mscL) that opens in response to stretch forces in the membrane lipid bilayer and participate in the regulation of osmotic pressure changes within the cell. MscL has a conserved domain architecture which comprises an amphipathic α-helix (S1) that lies along the cytoplasmic membrane, a highly conserved first transmembrane domain (TM1) that forms the pore constriction, a periplasmic loop, a second transmembrane domain (TM2) that faces the lipid membrane, and a linker that leads to a cytoplasmic α-helical bundle. This family also includes anditomin synthesis protein L (AndL), which is part of the gene cluster that mediates the biosynthesis of anditomin. Its role of in this pathway is not known.
