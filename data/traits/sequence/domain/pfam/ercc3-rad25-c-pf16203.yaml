identifier: Pfam:PF16203
label: ERCC3/RAD25/XPB C-terminal helicase
definition: >-
  This is the C-terminal helicase domain of ERCC3, RAD25 and XPB helicases. XPB, also known as Ssl2, Ercc3, RepB, Rad25 or haywire, is a core subunit of the eukaryotic basal transcription factor complex TFIIH, which plays a dual role in transcription and DNA repair. It is involved in nucleotide excision repair of DNA and in RNA transcription by RNA polymerase II. TFIIH is a multiprotein complex composed of a 7-subunit core, including XPB, p62, p52, p44, p34 and TTDA, associated with a 3-subunit CDK-activating kinase module consisting of MAT1, cyclin H and Cdk7. XPB functions by opening DNA either around the RNA transcription start site or at sites of DNA damage. It is also required for spliced leader RNA gene transcription by RNA polymerase II, where TFIIH plays an essential role in transcription initiation. Once the pre-initiation complex has been established, TFIIH is necessary for promoter opening and promoter escape, processes that depend on the ATPase activity of XPB.
