identifier: Pfam:PF01021
label: Ty transposon capsid protein
definition: >-
  Ty are yeast transposons. A 5.7kb transcript codes for p3 a fusion protein of TYA and TYB. The TYA protein is analogous to the gag protein of retroviruses. TYA a is cleaved to form 46kd protein which can form mature virion like particles. This entry corresponds to the capsid protein from Ty1 and Ty2 transposons and is referred to as the TYA domain in. Yeast retrotransposon Ty1 produces its proteins as precursors that are subsequently cleaved by an aspartic protease encoded by the element. Cleavage of the gag and gag-Pol polyprotein precursors is a critical step in proliferation of retroviruses and retroelements. These cleavage events are essential for transposition as they release the active reverse transcriptase and integrase and they modify the structure of the virus-like particles in a way that is analogous to the morphological changes that occur during retrovirus core maturation.
