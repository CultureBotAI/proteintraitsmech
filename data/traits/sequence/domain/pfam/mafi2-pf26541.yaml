identifier: Pfam:PF26541
label: MafI2 immunity protein
definition: >-
  This entry includes MafI2 immunity protein from Neisseria meningitidis ( ) and similar bacterial proteins. MafI2 is an immunity protein found in pathogenic Neisseria species, such as Neisseria meningitidis. It is part of the Maf polymorphic toxin system, which consists of toxin (MafB) and immunity (MafI) protein pairs encoded in specific genomic islands called maf genomic islands (MGIs). MafB2 is a ribonuclease (RNase) toxin that degrades RNA, leading to cell toxicity. MafI2 protects the host cell through neutralising MafB2 by binding directly to its C-terminal toxin domain (MafB2-CT), blocking access to the catalytic site and preventing RNA degradation. MafI2 forms a 1:1 complex with MafB2-CT, engaging in complementary charge interactions at the substrate binding surface. MafI2 adopts and α/β structure which consists of a four-stranded central mixed β-sheet and three α-helices. Its structure shares similarity and is probably distantly related to known MNT (minimal nucleotidyltransferase) domains, in particular, to members of . MafI2, however, has lost the typical for these domains GSx(10)DxD motif which is replaced by a set of positively charged residues.
