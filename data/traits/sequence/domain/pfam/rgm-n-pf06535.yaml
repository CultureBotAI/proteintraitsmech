identifier: Pfam:PF06535
label: Repulsive guidance molecule (RGM) N-terminal domain
definition: >-
  This entry represents the N-terminal domain of repulsive guidance molecule (RGM), mainly found in animals. RGM is a GPI-linked axon guidance molecule of the retinotectal system, and controls cell motility, adhesion, immune cell regulation and systemic iron metabolism. RGM is repulsive for a subset of axons, those from the temporal half of the retina. Temporal retinal axons invade the anterior optic tectum in a superficial layer, and encounter RGM expressed in a gradient with increasing concentration along the anterior-posterior axis. Temporal axons can receive posterior-dependent information by sensing gradients or concentrations of guidance cues. Thus, RGM will likely provide positional information for temporal axons invading the optic tectum in the stratum opticum.
