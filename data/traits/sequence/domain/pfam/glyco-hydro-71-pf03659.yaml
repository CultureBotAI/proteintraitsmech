identifier: Pfam:PF03659
label: Glycosyl hydrolase family 71
definition: >-
  This is a family of alpha-1,3-glucanases belonging to glycoside hydrolase family 71 ( ). Endo-1,3-alpha-glucanase Agn1 hydrolyses septum-edging material and acts in concert with endo-(1,3)-beta-glucanase Eng1 to achieve efficient cell separation in fission-yeast. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
