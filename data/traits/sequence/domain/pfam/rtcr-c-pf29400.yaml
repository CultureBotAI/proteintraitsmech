identifier: Pfam:PF29400
label: RtcR C-terminal DNA-binding domain
definition: >-
  This entry represents the C-terminal domain of RtcR-type transcriptional regulators found in bacteria. This domain contains a helix-turn-helix (HTH) DNA-binding motif. RtcR from Escherichia coli is a sigma-54 dependent transcriptional regulator of the rtcAB operon, which encodes RNA repair enzymes.
