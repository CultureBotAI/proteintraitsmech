identifier: Pfam:PF26453
label: Domain of unknown function (DUF8132)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins are predominantly found in the Halobacteria class, including genera such as Halogeometricum and Haloplanus. The proteins in this family are typically around 67 to 84 amino acids in length. These proteins are predicted to be integral membrane proteins with two transmembrane helices.
