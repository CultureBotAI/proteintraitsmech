identifier: Pfam:PF12810
label: ALK/LTK, Glycine-rich domain
definition: >-
  This entry represents the glycine-rich domain (GRD) from the Anaplastic lymphoma kinase (ALK), the closely related leukocyte tyrosine kinase (LTK) and similar proteins. ALK and LTK have been recently deorphanized receptor tyrosine kinases. They are involved in neural development, cancer and autoimmune diseases. ALK activity is associated with learning and memory, and controls energy expenditure. Inhibition of ALK can prevent diet-induced obesity. This is an extracellular domain that regulates receptor activity by binding to activating peptides. This domain consists of fourteen long polyglycine type II (pGII) helices tightly packed into a honeycomb-like lattice. This entry also includes sequences from Trichomonas vaginalis and some uncharacterised bacterial sequences.
