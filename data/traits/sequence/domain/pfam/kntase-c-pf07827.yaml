identifier: Pfam:PF07827
label: KNTase C-terminal domain
definition: >-
  Kanamycin nucleotidyltransferase (KNTase) is involved in conferring resistance to aminoglycoside antibiotics and catalyses the transfer of a nucleoside monophosphate group from a nucleotide to kanamycin. This enzyme is dimeric with each subunit being composed of two domains. The C-terminal domain contains five α helices, four of which are organised into an up-and-down α helical bundle. Residues found in this domain may contribute to this enzyme's active site.
