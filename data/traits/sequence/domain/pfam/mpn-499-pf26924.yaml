definition: >-
  This entry represents the MPN499 family protein, which is currently uncharacterised. The protein is found in Mycoplasma pneumoniae (strain ATCC 29342 / M129 / Subtype 1) and is encoded by the MPN_499 gene. The specific function of this protein family remains unknown.
