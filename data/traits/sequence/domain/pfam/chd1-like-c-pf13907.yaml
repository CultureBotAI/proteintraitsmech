identifier: Pfam:PF13907
label: Chromodomain-helicase-DNA-binding protein 1-like, C-terminal
definition: >-
  This entry represents a domain found at the C terminus of chromodomain-helicase-DNA-binding proteins, including Chromodomain-helicase-DNA-binding protein 1 from human (CHD1), an ATP-dependent chromatin-remodeling factor which acts as substrate recognition component of the transcription regulatory histone acetylation (HAT) complex SAGA. This protein functions to modulate the efficiency of pre-mRNA splicing in part through physical bridging of spliceosomal components to H3K4me3. This helical domain, which is also found in CHD1 helical C-terminal domain-containing protein 1 (also known as C17orf64) from mammals, consists of five α-helices organised in a variant helical bundle topology. Its surface is positively charged and can bind dsDNA and nucleosomes, but its specific function remains unknown.
