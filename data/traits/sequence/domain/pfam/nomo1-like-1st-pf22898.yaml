identifier: Pfam:PF22898
label: BOS complex subunit NOMO1-like, first beta sandwich domain
definition: >-
  This domain is found at the N-terminal end of human BOS complex subunit NOMO1 and similar sequences mainly from animals and plants. This domain is predicted to adopt a seven stranded β-sandwich fold. This domain is also found in Nicotinic receptor-associated protein 4 from Caenorhabditis elegans. NOMO family of proteins includes NOMO1, NOMO2, NOMO3. These proteins are components of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. They play an important role in the protein topogenesis and cells lacking these components show reduced multipass protein stability. NOMO proteins are multidomain proteins.
