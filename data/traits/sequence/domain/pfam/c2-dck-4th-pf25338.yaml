identifier: Pfam:PF25338
label: Fourth C2 domain of dock-like protein
definition: >-
  This entry represents the C2 domain found in the dock-like protein 1 (DCK1) from Saccharomyces cerevisiae and similar fungal proteins. C2 domains typically function as calcium-dependent membrane-targeting modules. The domain is found in proteins related to membrane trafficking. DCK1 forms a transient heterodimeric complex with LMO1, functioning as a guanine nucleotide exchange factor (GEF) for the small GTPase RHO5. Under oxidative stress, DCK1, LMO1, and RHO5 translocate to the mitochondria, where they promote cell death. This signalling module also regulates mitochondrial turnover through mitophagy during nitrogen starvation and contributes to cell wall integrity signalling.
