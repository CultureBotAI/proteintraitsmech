identifier: Pfam:PF18027
label: Cytosolic carboxypeptidase N-terminal domain
definition: >-
  This entry corresponds to the N-terminal domain of Burkholderia cenocepacia M14-type cytosolic carboxypeptidase. The N-terminal domain folds into a nine-stranded antiparallel β sandwich. This domain is specific to CCP proteins and is absent in other carboxypeptidases. It has been hypothesised that the N-terminal domain might contribute to folding, might have a regulatory function and/or might be involved in binding other proteins.
