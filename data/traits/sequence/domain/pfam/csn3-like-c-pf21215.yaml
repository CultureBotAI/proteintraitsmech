identifier: Pfam:PF21215
label: COP9 signalosome complex subunit 3-like, C-terminal helix
definition: >-
  This domain is found in COP9 signalosome complex subunit 3 from humans (CSN3) and similar proteins predominantly found in vertebrates. CSN3 is a component of the eight-subunit COP9 signalosome complex (CSN), which inactivate Cullin-RING E3 ubiquitin ligases (CRLs) by removing their covalently attached activator, NEDD8. This entry represents the C-terminal helical decoration of this protein.
