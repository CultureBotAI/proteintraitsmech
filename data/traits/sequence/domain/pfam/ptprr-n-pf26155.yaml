identifier: Pfam:PF26155
label: PTRR N-terminal domain
definition: >-
  This entry represents the N-terminal domain in Receptor-type tyrosine-protein phosphatase R (PTRRR) proteins. The N-terminal domain has hydrophobic regions that may help anchor receptor-type isoforms to membranes. It contains a β-sheet structure surrounded by α-helices. This domain is found next to the PTPase domain . PTPRR proteins are involved in the regulation of mitogen-activated protein kinases (MAPKs) such as MAPK1, MAPK3, and MAPK14. These proteins sequester MAPKs in the cytoplasm in an inactive form. The MAPKs bind to a dephosphorylated kinase interacting motif, and upon phosphorylation by the protein kinase A complex, the MAPKs are released for activation and translocation into the nucleus. This process is crucial for controlling MAPK signalling pathways, which are involved in various cellular processes including growth, proliferation, and differentiation. In mice, one isoform of this protein may also play a role in the patterning and cellular proliferation of skeletal elements during development.
