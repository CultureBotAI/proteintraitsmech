identifier: Pfam:PF03231
label: Tospovirus non-structural protein NS-S-like, N-terminal
definition: >-
  This entry represents the N-terminal domain of Nonstructural protein NS-S from the tospovirus Tomato spotted wilt virus and related sequences from related Bunyavirales. Bunyavirus has three genomic segments: small (S), middle-sized (M), and large (L). The S segment encodes the nucleocapsid and a non-structural protein. The M segment codes for two glycoproteins, G1 and G2, and another non-structural protein (NSm). The L segment codes for an RNA polymerase. NS-S, present in infected cells, but absent from purified virus particles, is not essential for virus replication, but contributes substantially to pathogenesis. It has been shown to inhibit the production of alpha/beta interferons, and to inhibit interferon regulatory factor-mediated cell death. It is a viral suppressor of host RNAi and viral inducer of host attractiveness to insect vectors. NSS acts as a suppressor of RNA-mediated gene silencing, also known as post-transcriptional gene silencing, a mechanism of plant viral defence that limits the accumulation of viral RNAs.
