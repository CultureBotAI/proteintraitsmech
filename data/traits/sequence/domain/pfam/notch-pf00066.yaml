identifier: Pfam:PF00066
label: LNR domain
definition: >-
  The Notch domain is also called the 'DSL' domain or the Lin-12/Notch repeat (LNR). The LNR region is present only in Notch related proteins C-terminal to EGF repeats. The lin-12/Notch proteins act as transmembrane receptors for intercellular signals that specify cell fates during animal development. In response to a ligand, proteolytic cleavages release the intracellular domain of Notch, which then gains access to the nucleus and acts as a transcriptional co-activator. The LNR region is supposed to negatively regulate the Lin-12/Notch proteins activity. It is a triplication of an around 35-40 amino acids module present on the extracellular part of the protein. Each module contains six cysteine residues engaged in three disulphide bonds and three conserved aspartate and asparagine residues. The biochemical characterisation of a recombinantly expressed LIN-12.1 module from the human Notch1 receptor indicate that the disulphide bonds are formed between the first and fifth, second and fourth, and third and sixth cysteines. The formation of this particular disulphide isomer is favored by the presence of Ca 2+ , which is also required to maintain the structural integrity of the rLIN-12.1 module. The conserved aspartate and asparagine residues are likely to be important for Ca 2+ binding, and thereby contribute to the native fold.
