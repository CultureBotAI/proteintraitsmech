identifier: Pfam:PF01180
label: Dihydroorotate dehydrogenase
definition: >-
  This entry represents a domain found in dihydroorotate and dihydropyrimidine dehydrogenases. Dihydroorotate dehydrogenases included in this entry catalyse the conversion of dihydroorotate to orotate using quinone, fumarate and NAD+ as electron acceptor. Dihydropyrimidine dehydrogenases catalyse the conversion of 5,6-dihydrouracil to uracil and are involved in pyrimidine base degradation. Dihydroorotate dehydrogenase ( ) (DHOdehase) catalyses the fourth step in the de novo biosynthesis of pyrimidine, the conversion of dihydroorotate into orotate. DHOdehase is a ubiquitous FAD flavoprotein. In bacteria (gene pyrD), DHOdease is located on the inner side of the cytosolic membrane. In some yeasts, such as in Saccharomyces cerevisiae (gene URA1, subfamily 2), it is a cytosolic protein while in other eukaryotes it is found in the mitochondria.
