identifier: Pfam:PF09213
label: M3
definition: >-
  This entry represents a group of viral chemokine binding proteins, which bind with CC-chemokine MCP-1, acting as cytokine decoy receptors. For example, the murine herpesvirus decoy receptor M3 acts as an immune system saboteur by altering host anti-viral inflammatory repsonses. M3 adopts a structure consisting of two different β-sandwich domains of partial topological similarity to immunoglobulin-like folds.
