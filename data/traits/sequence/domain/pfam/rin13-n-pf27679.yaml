identifier: Pfam:PF27679
label: RPM1 interacting protein 13 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of RIN13 proteins, which are resistance protein interactors involved in plant defence responses. RIN13 is nuclear localised and function as positive regulators of RPM1-mediated resistance to neurotrophic bacterial pathogens such as Pseudomonas syringae. These proteins interact with RPM1 through its NB-ARC domain and enhance resistance to pathogens carrying type III effector proteins AvrRpm1 or AvrB. RIN13 also interacts with ARF1 to promote leaf senescence and cell death, facilitating ARF1 translocation to the nucleus and activating ROS-related enzymes including POD, CAT and SOD. RIN13 proteins are essential for proper plant defence responses against bacterial pathogens. This domain is also found in a group of uncharacterised animal proteins, predominantly fish sequences.
