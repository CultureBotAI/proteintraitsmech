identifier: Pfam:PF02742
label: Iron dependent repressor, metal binding and dimerisation domain
definition: >-
  The diphtheria toxin repressor protein (DTXR) is a member of this group. In Corynebacterium diphtheriae where it has been studied in some detail this protein acts as an iron-binding repressor of diphtheria toxin gene expression and may serve as a global regulator of gene expression. DTXR comprises an N-terminal DNA-binding domain, an interface domain (which contains two metal-binding sites) and a third, very flexible C-terminal domain. The second domain is responsible for dimerization and metal binding. The N terminus may be involved in iron binding and may associate with the Tox operator. Binding of DTXR to Tox operator requires a divalent metal ion such as cobalt, ferric, manganese and nickel whereas zinc shows weak activation.
