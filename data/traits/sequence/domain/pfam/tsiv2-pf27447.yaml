identifier: Pfam:PF27447
label: TsiV2 immunity protein
definition: >-
  This entry represents TsiV2 immunity proteins found in Vibrionaceae. TsiV2 is a membrane protein of approximately 242 amino acids that functions as an immunity protein protecting against VasX toxin. The protein contains three transmembrane helical regions and helix hairpin structures. TsiV2 prevents early activation of toxin VasX and deletion mutants are susceptible to VasX-dependent killing. The protein is found across 30 bacterial species, predominantly in Gammaproteobacteria within the Vibrionales order. The protein is classified in the VasX toxin group.
