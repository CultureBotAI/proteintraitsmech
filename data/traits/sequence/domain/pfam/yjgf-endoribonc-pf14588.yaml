identifier: Pfam:PF14588
label: YjgF/chorismate_mutase-like, putative endoribonuclease
definition: >-
  This entry represents the β-α-β-α-β(2) domains common both to bacterial chorismate mutase and to members of the YjgF/Yer057p/UK114 family. These proteins form trimers with a three-fold symmetry with three closely-packed β-sheets. The conserved domain is similar in structure to chorismate mutase but there is no sequence similarity and no functional connection. This domain homotrimerizes forming a distinct intersubunit cavity that may serve as a small molecule binding site. Chorismate mutase (CM, ) is an enzyme of the aromatic amino acid biosynthetic pathway that catalyses the reaction at the branch point of the pathway leading to the three aromatic amino acids, phenylalanine, tryptophan and tyrosine (chorismic acid is the last common intermediate, and CM leads to the L-phenylalanine/L-tyrosine branch). It is part of the shikimate pathway, which is present only in bacteria, fungi and plants. The structure of chorismate mutase enzymes from Bacillus subtilis and Thermus thermophilus have been solved and were shown to have a catalytic homotrimer, with the active sites being located at the subunit interfaces, where residues from two subunits contribute to each site. The YjgF/YER057c/UK114 family is a large, highly conserved, and widely distributed family of proteins found in bacteria, archaea and eukaryotes. YjgF (renamed RidA) deaminates reactive enamine/imine intermediates of pyridoxal 5'-phosphate (PLP)-dependent enzyme reactions. The YjgF/YER057c/UK114 family of proteins is conserved in all domains of life suggesting that reactive enamine/imine metabolites are of concern to all organisms. This family includes: YjgF (RidA) the yeast growth inhibitor YER057c (protein HMF1) that appears to play a role in the regulation of metabolic pathways and cell differentiation the mamm…
