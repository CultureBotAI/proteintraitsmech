identifier: Pfam:PF09732
label: Cactus-binding C-terminus of cactin protein
definition: >-
  This entry represents the C-terminal β-sandwich domain of the splicing factor cactin, which is necessary for the association of cactin with the IkappaB protein cactus, as one of the intracellular members of the Rel complex. The Rel (NF-kappaB) pathway is conserved in invertebrates and vertebrates. In mammals, it controls the activities of the immune and inflammatory response genes as well as viral genes, and is critical for cell growth and survival. In Drosophila, the Rel pathway functions in the innate cellular and humoral immune response, in muscle development and in the establishment of dorsal-ventral polarity in the early embryo. Members of this entry play a role in pre-mRNA splicing by facilitating excision of a subset of introns. Most members of the family also have the conserved mid region of cactin ( ) further upstream.
