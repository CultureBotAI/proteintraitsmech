identifier: Pfam:PF27437
label: Y4oE
definition: >-
  This entry represents y4oE proteins from alphaproteobacteria. y4oE is a small protein of approximately 69 amino acids found on the symbiotic plasmid pNGR234a in Sinorhizobium fredii. y4oE proteins are associated with nitrogen-fixing symbionts and related bacteria. The function of this protein remains to be determined.
