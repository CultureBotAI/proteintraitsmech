identifier: Pfam:PF21465
label: Putative N-acetylmuramoyl-L-alanine amidase cwp6, N-terminal domain
definition: >-
  This domain is found in the putative N-acetylmuramoyl-L-alanine amidase Cwp6 from Clostridioides difficile ( ) and similar proteins from Clostridia. Cwp6, which is involved in cell wall remodelling, consists of five domains: an N-terminal domain, a trimer of CWB2 ( ) and a C-terminal domain ( ). This entry represents the N-terminal domain, which locates at the bottom of the molecule, folds into a seven-stranded β-barrel with one α-helix and with two additional short β-strands.
