identifier: Pfam:PF27699
label: Protein YopQ
definition: >-
  Salmonella, and related proteobacteria, secrete large amounts of proteins into the culture media. The major secreted proteins are either flagellar proteins or virulence factors, secreted through the flagellar or virulence export structures respectively. Both secretion systems penetrate the inner and outer membranes and their components bear substantial sequence similarity. Both the flagellar and needle like pilus look fairly similar to each other. This entry represents Protein YopQ from Yersinia enterocolitica, a protein secreted by the type III secretion system under low-calcium conditions. YopQ may function as a virulence determinant. Members of this protein family are specific to Yersinia.
