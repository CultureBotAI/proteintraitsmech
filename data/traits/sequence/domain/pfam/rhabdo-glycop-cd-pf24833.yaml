identifier: Pfam:PF24833
label: Rhabdovirus spike glycoprotein G central domain
definition: >-
  This entry represents the central domain (CD) which consists of domains I (β-sheet rich) and II (α-helical)). The glycoprotein G from rhabdoviruses, such as rabies virus (RABV), Mokola virus (MOKV) and European bat lyssavirus 1 (EBLV) attaches the virus to host cellular receptor, and induces endocytosis of the virion. It forms the glycoprotein spike which is made up of a trimer of G proteins. Each protomer of the trimer is composed of three domains: a membrane-distal pleckstrin homology domain (PH), a membrane-proximal fusion domain (FD) and a laterally positioned central domain (CD). Different families of ssRNA negative-strand viruses contain glycoproteins responsible for forming spikes on the surface of the virion. The glycoprotein spike is made up of a trimer of glycoproteins. These proteins are frequently abbreviated to G protein. Channel formed by glycoprotein spike is thought to function in a similar manner to Influenza virus M2 protein channel, thus allowing a signal to pass across the viral membrane to signal for viral uncoating.
