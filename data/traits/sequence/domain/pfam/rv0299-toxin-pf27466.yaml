identifier: Pfam:PF27466
label: Type II toxin-antitoxin system toxin Rv0299
definition: >-
  This entry represents the toxin component of a type II toxin-antitoxin system found predominantly in actinobacteria. The prototype protein Rv0299 from Mycobacterium tuberculosis inhibits colony formation when expressed in M. smegmatis. The toxic effect is neutralised by coexpression with the cognate antitoxin Rv0298. This domain adopts an endoribonuclease fold.
