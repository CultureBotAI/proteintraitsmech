identifier: Pfam:PF05036
label: SPOR domain
definition: >-
  This entry represents a domain of unknown function found in uncharcaterised proteins from Alphaproteobacteria, predominantly in Rhodobacterales (including Roseobacteraceae and Paracoccaceae). The domain is approximately 100 residues in length and is predicted to adopt an α/β structure containing a four stranded antiparallel β-sheet. STRING analysis shows these proteins are consistently associated with cell division and secretion system proteins, including DivIB ( ), RodZ ( ) and SPOR domain proteins ( ). The specific function of this domain remains to be determined.
