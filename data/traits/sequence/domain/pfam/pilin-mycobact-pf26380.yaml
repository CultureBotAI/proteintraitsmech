identifier: Pfam:PF26380
label: Mycobacterial Pilin Family
definition: >-
  The mycobacterial pilin family comprises structural subunits of pili, which are thin, flexible, coiled-coil, aggregative fibres. These pili play a crucial role in mediating adhesion to the extracellular matrix, facilitating direct interaction with the host epithelium during infection, particularly in the lungs or other tissues. The pilins have a strong affinity for laminin, although they do not significantly bind to fibronectin or type IV collagen. The structural assembly of these proteins forms homomers composed of subunits that create a large, cohesive structure, contributing to the pathogenicity of mycobacterial species by enabling adherence and colonisation of host tissues.
