identifier: Pfam:PF30255
label: Fimbrial protein FimE middle domain
definition: >-
  This entry represents a middle domain of approximately 103 amino acids found in the minor fimbrial component FimE from Porphyromonas gingivalis and Bacteroides species. FimE is part of a fimbrial operon (fimABCDE) involved in bacterial adhesion and biofilm formation. The full-length protein is approximately 550 amino acids. The specific function of this domain remains to be determined.
