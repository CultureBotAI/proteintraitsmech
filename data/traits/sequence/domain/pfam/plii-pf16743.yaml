identifier: Pfam:PF16743
label: Periplasmic lysozyme inhibitor of I-type lysozyme
definition: >-
  This entry includes the PliI protein from Aeromonas hydrophila (PliI-Ah). PliI is a dimeric periplasmic protein that enables bacteria to resist permeabilisation of the outer membrane by the bactericidal action of lysozyme. PliI achieves its inhibitory action via an insertion of a loop containing the conserved SGxY motif into the active centre of I-type lysozymes.
