identifier: Pfam:PF05883
label: Baculovirus U-box/Ring-like domain
definition: >-
  This family consists of several Baculovirus proteins of around 130 residues in length. The function of members of this family is unknown, but appear to be related to the U-box and ring finger domain by profile-profile comparison. In the Autographa californica multiple nucleopolyhedrovirus, ac53 (also known as orf53) is essential for production of infectious budded virus. Initially distributed in the cytoplasm and nucleus, ac53 accumulates near the nucleus-cytoplasm boundary. Deletion does not affect the levels of viral DNA replication but does affect nucleocapsid assembly.
