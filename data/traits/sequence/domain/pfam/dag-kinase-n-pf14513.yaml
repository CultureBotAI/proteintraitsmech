identifier: Pfam:PF14513
label: Diacylglycerol kinase N-terminus
definition: >-
  This domain is found at the N terminus of the EF-hand domain of the type I diacylglycerol kinases (DGKs). DGKs phosphorylate diacylglycerol (DAG) to produce phosphatidic acid (PA) and play an important role in signal transduction by modulating the balance between these signalling lipids. DGKs can be classified into five types. Proteins containing this domain are EF-hand domain containing type I DGKs, including DGK-alpha, beta and gamma.
