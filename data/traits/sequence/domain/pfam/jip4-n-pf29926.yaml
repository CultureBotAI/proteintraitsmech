identifier: Pfam:PF29926
label: JIP4 N-terminal domain
definition: >-
  This entry represents a domain found at the N-terminal of JIP4 (Jumonji- interacting protein 4) and related proteins from yeasts. The protein is extensively phosphorylated at multiple serine residues and is associated with spliceosomal complexes. These proteins are classified under eggNOG group ENOG502RISH in eukaryotes. The function of this domain remains to be determined. This domain contains a HUP-like fold.
