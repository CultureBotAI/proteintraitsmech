identifier: Pfam:PF28804
label: Immunity protein PIM7
definition: >-
  This entry represents the immunity protein PIM7 ( ) from Bacillus cereus and related proteins. PIM7 is the cognate immunity protein of the polymorphic toxin PT7 which acts as a DNase. PT7 and PIM7 form a complex in which PIM7 hinders the catalytic pocket. The PT binding site in the PIM7 is negatively charged, mimicking the negatively charged phosphate backbone of a DNA molecule. PIM7 folds into a β-barrel structure capped with an α-helix.
