identifier: Pfam:PF30432
label: Phosphoglycerol transferase I, middle domain
definition: >-
  This entry represents the third domain of phosphoglycerol transferase I (MdoB/OpgB). It is located between the catalytic sulfatase-like domain ( ) and the C-terminal DUF7024 domain ( ). OpgB transfers phosphoglycerol residues from phosphatidylglycerol to membrane-bound nascent glucan backbones during osmoregulated periplasmic glucan biosynthesis. The protein is a multi-pass membrane protein localised to the cell inner membrane. The entry is found in Enterobacterales. The specific function of this middle domain remains to be determined.
