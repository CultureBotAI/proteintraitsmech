identifier: Pfam:PF29837
label: Uncharacterized protein E02H4.4 N-terminal domain
definition: >-
  This entry represents an N-terminal CUB domain found in secreted proteins from nematodes and other organisms. The domain is present in proteins that are glycosylated and secreted to the extracellular region. The protein containing this domain is expressed in embryos and other tissues. The specific function of this N-terminal CUB domain remains to be determined.
