identifier: Pfam:PF28338
label: AclK C-terminal domain
definition: >-
  This entry represents the C-terminal helix hairpin found in AclK proteins. AclK is a gamma-glutamyl cyclotransferase involved in the biosynthesis of aspirochlorine, a halogenated mycotoxin with antifungal properties. The protein catalyses the conversion of alpha-(gamma-L- glutamyl)-L-amino acids to 5-oxo-L-proline and L-alpha-amino acids as part of the aspirochlorine biosynthetic pathway. AclK proteins are found in fungi, particularly in Aspergillus species and related taxa within the Pezizomycotina. The function of this C-terminal domain remains to be determined.
