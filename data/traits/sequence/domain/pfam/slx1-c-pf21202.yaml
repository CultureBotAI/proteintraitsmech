identifier: Pfam:PF21202
label: Structure-specific endonuclease subunit SLX1, C-terminal
definition: >-
  This is the RING zinc finger domain of structure-specific endonuclease subunit SLX1 found in eukaryotes. Slx1 is a catalytic subunit of the SLX1-SLX4 structure-specific endonuclease that resolves DNA secondary structures generated during DNA repair and recombination. It has endonuclease activity towards branched DNA substrates, introducing single-strand cuts in duplex DNA close to junctions with ss-DNA.
