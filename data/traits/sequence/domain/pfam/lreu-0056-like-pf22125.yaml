identifier: Pfam:PF22125
label: Hypotheical protein Lreu_0056
definition: >-
  This entry represents a domain found in a family of uncharacterised Lactobacillus proteins. The structure of a family member, a hypothetical protein Lreu_0056 from Lactobacillus reuteri ( ), adopts an α+β structure in order α(2)-β(5)-α(2) consisting of a five-stranded antiparallel β-sheet with helices packed on one side of the sheet ( ).
