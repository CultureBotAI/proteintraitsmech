identifier: Pfam:PF25302
label: NAD glycohydrolase translocation F5/8 type C domain
definition: >-
  This entry represents the N-terminal translocation domain of NAD+-glycohydrolase from Streptococcus pyogenes ( ) that is required for secretion through the SLO pore. The domain spans residues 38-190 and adopts a jelly roll fold with structural similarity to carbohydrate binding modules (CBMs). However, it is found in a much wider range of bacterial uncharacterised proteins where its function is not known.
