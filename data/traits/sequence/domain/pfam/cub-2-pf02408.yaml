identifier: Pfam:PF02408
label: CUB-like domain
definition: >-
  This domain is found in a family of hypothetical Caenorhabditis elegans proteins. The aligned region has no known function nor do any of the proteins which possess it. However, this domain is related to the CUB domain ( ). The aligned region is approximately 130 amino acids long and contains two conserved cysteine residues.
