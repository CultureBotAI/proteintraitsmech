identifier: Pfam:PF14515
label: Haem-oxygenase-associated N-terminal helices
definition: >-
  This domain represents a pair of α helices, which are found at the N-terminal of S-succinyl-2-(hydroxyimino)ethanethiol synthase (FlcE) in Pseudomonas aeruginosa. FlcE is an oxidoreductase enzyme that plays a key role in the biosynthesis of fluopsin C, a copper-containing antibiotic. It catalyses the second step of this biosynthetic pathway, performing the oxidative decarboxylation and N-hydroxylation of S-succinyl-L-cysteine to produce S-succinyl-2-(hydroxyimino)ethanethiol. Notably, FlcE is capable of carrying out this reaction without the need for an external reductant.
