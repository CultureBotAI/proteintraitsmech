identifier: Pfam:PF28966
label: F46C5.2
definition: >-
  This entry represents a conserved domain found in F46C5.2-like proteins. F46C5.2 is an uncharacterised membrane protein from Caenorhabditis elegans that contains a predicted signal peptide and a single transmembrane helix near the C-terminal. The protein is predicted to be a single-pass membrane protein. This domain is found in the central region of the protein between the signal peptide and the transmembrane region. The domain is conserved across nematodes and the function of this protein family remains to be determined.
