identifier: Pfam:PF18449
label: Pesticidal crystal protein Cry1Aa, domain IV
definition: >-
  This entry represents a domain found in the protoxin portion of insecticidal proteins (parasporins, or Cry proteins) such as Cry1Aa from Bacillus thuringiensis (Bt) and related proteins. These proteins contain a proteolytically labile protoxin segment (in the C-terminal region) and a three-domain toxic core at the N-terminal (domains I-III). This entry describes domain IV, one of the four protoxin domains (domains IV-VII). Domains IV and VI are α-helical bundles that resemble structural/interaction domains such as spectrin or bacterial fibrinogen-binding complement inhibitor. The structure of full length Cry1Aa was determined.
