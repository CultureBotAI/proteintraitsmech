identifier: Pfam:PF29514
label: E217 tail sheath protein gp31-like, C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in the Pseudomonas bacteriophage E217 tail sheath protein gp31 and related proteins, including phage Pa193 gp32 and Shigella flexneri bacteriophage Sf14 gp39. This domain adopts an α/β structure which has similarity to domains, members of the GpW/Gp25-like domain superfamily.
