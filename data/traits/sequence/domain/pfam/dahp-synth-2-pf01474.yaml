identifier: Pfam:PF01474
label: Class-II DAHP synthetase family
definition: >-
  Members of the 3-deoxy-D-arabino-heptulosonate 7-phosphate (DAHP) synthetase family ( ) catalyse the first step in aromatic amino acid biosynthesis from chorismate. Class I (see ) includes bacterial and yeast enzymes; class II includes higher plants and various microorganisms. They have minimal sequence identity and different regulatory and oligomeric properties, however, they have structural similarities that indicate a common ancestry for the class I and class II DAHPSs. The first step in the common pathway leading to the biosynthesis of aromatic compounds is the stereospecific condensation of phosphoenolpyruvate (PEP) and D-erythrose-4-phosphate (E4P) giving rise to 3-deoxy-D-arabino-heptulosonate-7-phosphate (DAHP). This reaction is catalyzed by DAHP synthase, a metal-activated enzyme, which in microorganisms is the target for negative-feedback regulation by pathway intermediates or by end products.
