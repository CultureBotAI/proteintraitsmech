identifier: Pfam:PF23160
label: Periplakin spectrin-like repeat
definition: >-
  This domain consists of spectrin-like repeats found at the N-terminal in human Periplakin and related vertebrate proteins including Envoplakin and Envoplakin-like proteins. Periplakin is a component of the cornified envelope of keratinocytes and, together with envoplakin, forms a network radiating from desmosomes that likely serves as a scaffold for cornified envelope assembly. These two proteins coimmunoprecipitate and are the most commonly targeted by pathogenic autoantibodies. In addition to its structural role, periplakin may also act as a localisation signal in PKB/AKT-mediated signalling pathways.
