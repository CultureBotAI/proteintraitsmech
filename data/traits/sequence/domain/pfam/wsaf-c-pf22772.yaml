identifier: Pfam:PF22772
label: WsaF, C-terminal domain
definition: >-
  This entry represents a domain found at the C-terminal of WsaF ( ) from Geobacillus stearothermophilus and related bacterial proteins. WsaF catalyses the formation of beta-1-2-linkage of rhamnose sugars in the carbohydrate polymer. It consists of two domains, the N-terminal which binds the acceptor (the growing rhamnan chain), and a C-terminal which binds the substrate (dTDP-beta-l-rhamnose). This entry also includes O-antigen biosynthesis protein from Myxococcus xanthus (RfbC).
