identifier: Pfam:PF27883
label: Proton pump-interactor C-terminal domain
definition: >-
  This entry represents the C-terminal transmembrane region of proton pump-interactor (PPI) proteins found in plant species. These proteins may regulate plasma membrane ATPase activity. PPI1 has been shown to promote AHA1 plasma membrane ATPase activity by binding to a site different from the 14-3-3 binding site.
