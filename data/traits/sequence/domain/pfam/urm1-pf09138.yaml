identifier: Pfam:PF09138
label: Urm1 (Ubiquitin related modifier)
definition: >-
  Ubiquitin related modifier 1 (Urm1) is a ubiquitin related protein that modifies proteins in the yeast ubiquitin-like urmylation pathway. Structural comparisons and phylogenetic analysis of the ubiquitin superfamily has indicated that Urm1 has the most conserved structural and sequence features of the common ancestor of the entire superfamily. Urm1 acts as a sulfur carrier required for 2-thiolation of mcm5S2U at tRNA wobble positions of cytosolic tRNA(Lys), tRNA(Glu) and tRNA(Gln).
