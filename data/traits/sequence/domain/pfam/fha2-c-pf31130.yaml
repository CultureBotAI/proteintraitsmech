identifier: Pfam:PF31130
label: FHA domain-containing protein FHA2 C-terminal winged HTH domain
definition: >-
  This entry represents a C-terminal winged helix-turn-helix domain found in FHA2 (forkhead- associated domain protein 2) in Viridiplantae. FHA2 contains an N-terminal FHA domain ( ). FHA2 plays a role in plant organ development, specifically regulating stamen development and plant fertility. Loss of FHA2 causes reduced fertility due to defects in stamen filament elongation and pollen development.
