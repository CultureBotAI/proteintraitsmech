identifier: Pfam:PF22347
label: Avirulence protein AvrPiz-t
definition: >-
  This entry represents avirulence protein AvrPiz-t from Magnaporthe oryzae. It is predicted to be secreted and it can suppress programmed cell death (PCD) induced by BAX in tobacco which suggests that it might contribute to the pathogenicity of M.oryzae. This domain adopts a six-stranded β-sandwich .
