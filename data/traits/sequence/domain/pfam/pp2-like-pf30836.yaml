identifier: Pfam:PF30836
label: Phloem protein 2-like
definition: >-
  This entry represents phloem protein 2-like (PP2-like) proteins and similar proteins found in plants. Members are predicted multi-pass membrane proteins with two transmembrane helices. The PP2 superfamily comprises phloem lectins that are among the most abundant proteins in phloem sap. These proteins are characterised by their carbohydrate-binding properties. The precise function of these proteins remains to be determined.
