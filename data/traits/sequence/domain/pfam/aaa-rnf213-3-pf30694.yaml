identifier: Pfam:PF30694
label: RNF213 AAA domain
definition: >-
  This entry represents the AAA domain of human RNF213 and related proteins. RNF213 contains six AAA domains; this entry represents one of them. RNF213 is a giant multifunctional E3 ligase containing more than 5000 amino acids and is the only known protein possessing both AAA+ ATPase and E3 ligase activities in the human proteome. RNF213 can catalyse the ubiquitination of lipopolysaccharide and is crucial for antibacterial immunity in mammals. Some bacteria, S. flexneri for example, have evolved different strategies to evade ubiquitination-mediated host immune defences during infection. It secretes IpaH family E3 effectors, which exploit the host's ubiquitination system to promote the ubiquitination and subsequent degradation of key host proteins essential for ubiquitination-mediated antibacterial responses. The complex of RNF213 and IpaH1.4 E3 effector has been determined.
