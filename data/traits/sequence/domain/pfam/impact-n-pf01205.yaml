identifier: Pfam:PF01205
label: Impact N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the Impact proteins. The Impact protein is a translational regulator that ensures constant high levels of translation under amino acid starvation. It acts by interacting with Gcn1/Gcn1L1, thereby preventing activation of Gcn2 protein kinases (EIF2AK1 to 4) and subsequent down-regulation of protein synthesis. It is evolutionary conserved from eukaryotes to archaea.
