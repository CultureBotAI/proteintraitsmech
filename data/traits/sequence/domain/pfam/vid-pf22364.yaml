identifier: Pfam:PF22364
label: VirG insertion domain (VID)
definition: >-
  Outer membrane autotransporter VirG/IcsA is a virulence factor from Shigella flexneri that acts as an adhesin and actin-polymerising factor during infection. It mediates polar adhesion to host cells and their invasion. The bile salt deoxycholate activates adhesion and invasion of host cells, possibly by altering IcsA's conformation. VirG/IcsA consists of three major domains: an atypical signal peptide at the N terminus, followed by the passenger domain (presented on the cell surface) and a β-domain that anchors the protein to the bacterial outer membrane. This entry represents the insertion domain (VID) that appears to be inserted into a continuous sequence of β-helical coils.
