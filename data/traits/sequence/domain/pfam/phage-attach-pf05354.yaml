identifier: Pfam:PF05354
label: Phage Head-Tail Attachment protein
definition: >-
  The phage head-tail attachment protein is required for the joining of phage heads and tails at the last step of morphogenesis. FII is incorporated into the base vertex of DNA-filled heads to facilitate head-tail joining and may determine the specificity of tail attachment. There are 5-6 copies of protein FII per mature phage.
