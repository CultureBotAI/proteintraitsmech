identifier: Pfam:PF28646
label: HrmA middle domain
definition: >-
  This entry represents the middle domain of the HrmB/C proteins from fungi. These proteins probably modulate the generation of the hypoxia-typic morphotype (called H-MORPH) with altered biofilm architecture that leads to increased host inflammation, rapid disease progression, and mortality in a murine model of invasive aspergillosis.
