identifier: Pfam:PF26392
label: Maintenance of carboxysome distribution protein B
definition: >-
  This entry describes the Maintenance of Carboxysome Distribution protein B (McdB), also called McsB, a protein found in cyanobacteria that works with McdA to mediate carboxysome spacing, size, ultrastructure, and inheritance. McdB acts as an adapter protein, binding directly to the putative Walker-box ParA-like protein McdA and stimulating its ATPase activity, which releases McdA from DNA. This interplay between McdA gradients on the nucleoid and McdB-bound carboxysomes ensures equal spacing of carboxysomes along the cell length, preventing aggregation. Incorrect positioning reduces CO2 fixation by RuBisCO and slows growth. McdB features a unique α-helical fold, an N-terminal disordered region (residues 1-79) required for interaction with the McdA:DNA complex, and a C-terminal coiled-coil region. It can undergo liquid-liquid phase separation and exists as homodimers or higher-order oligomers in solution.
