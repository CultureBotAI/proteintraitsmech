identifier: Pfam:PF02896
label: PEP-utilising enzyme, PEP-binding domain
definition: >-
  A number of enzymes that catalyze the transfer of a phosphoryl group from phosphoenolpyruvate (PEP) via a phospho-histidine intermediate have been shown to be structurally related. All these enzymes share the same catalytic mechanism: they bind PEP and transfer the phosphoryl group from it to a histidine residue. The sequence around that residue is highly conserved. This C-terminal domain has been shown to be the PEP-binding domain. It is often found associated with the pyruvate phosphate dikinase, AMP/ATP-binding domain ( ) at its N terminus and the PEP-utilizing enzyme mobile domain.
