identifier: Pfam:PF24509
label: TXNDC16 second thioredoxin-like domain
definition: >-
  This entry represents the second thioredoxin-like domain of TXNDC16. The function of this domain is unknown. It contains an α+β three layer fold. TXNDC genes are members of the thioredoxin superfamily and were shown to play a role in redox homeostasis, protein folding, electron transfer, and also acting as cellular adapters. However, the function of TXDNC16 is still not clear. They have been identified as a meningioma-associated antigen.
