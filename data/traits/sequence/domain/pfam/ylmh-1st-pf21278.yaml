identifier: Pfam:PF21278
label: YlmH, N-terminal
definition: >-
  This entry represents a domain found at the N-terminal of the B. subtilis Ribosome-associated protein quality control protein P2 (RqcP2, also known as YlmH), related bacterial proteins and uncharacterised plant sequences. RqcP2 is a component of the ribosome quality control system (RQC), a ribosome-associated complex that mediates the extraction of incompletely synthesized nascent chains from stalled ribosomes and their subsequent degradation. The function of this domain is unknown.
