identifier: Pfam:PF07973
label: Threonyl and Alanyl tRNA synthetase second additional domain
definition: >-
  The catalytically active form of threonyl/alanyl tRNA synthetase is a dimer. Within the tRNA synthetase class II dimer, the bound tRNA interacts with both monomers making specific interactions with the catalytic domain, the C-terminal domain, and this SAD domain (the second additional domain). The second additional domain is comprised of a pair of perpendicularly orientated antiparallel β sheets, of four and three strands, respectively, that surround a central α helix that forms the core of the domain.
