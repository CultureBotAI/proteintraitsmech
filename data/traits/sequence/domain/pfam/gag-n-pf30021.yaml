identifier: Pfam:PF30021
label: Retroviral Gag protein N-terminal domain
definition: >-
  This entry represents the N-terminal domain of retroviral Gag polyproteins found in transposable elements. Members are derived from copia-like transposable elements in insects and are localised to the virion. The full-length Gag polyprotein is involved in virus particle assembly and structural organisation, though the specific function of this N-terminal domain remains to be determined.
