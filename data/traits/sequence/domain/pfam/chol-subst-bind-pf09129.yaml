identifier: Pfam:PF09129
label: Cholesterol oxidase, substrate-binding
definition: >-
  The substrate-binding domain found in cholesterol oxidase is composed of an eight-stranded mixed β-pleated sheet and six α-helices. This domain is positioned over the isoalloxazine ring system of the FAD cofactor bound by the FAD-binding domain ( ) and forms the roof of the active site cavity, allowing for catalysis of oxidation and isomerisation of cholesterol to cholest-4-en-3-one.
