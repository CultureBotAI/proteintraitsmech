identifier: Pfam:PF27363
label: YuaX
definition: >-
  This entry represents uncharacterised protein YuaX from the F plasmid of Escherichia coli and related proteobacteria. The protein is 96 amino acids in length and is encoded by the yuaX gene (also known as yebA). The protein is found across diverse proteobacterial lineages including Gammaproteobacteria, Betaproteobacteria and Alphaproteobacteria. The function of this protein remains to be determined. This domain has an helical fold.
