identifier: Pfam:PF30536
label: Putative malate dehydrogenase 1B N-terminal domain
definition: >-
  This entry represents an N-terminal domain found in putative malate dehydrogenase 1B (MDH1B) proteins from metazoans. This domain is positioned N-terminal to the Ldh_1_C domain ( ). MDH1B proteins belong to the LDH/MDH superfamily and are predicted to possess malate dehydrogenase activity ([ec:1.1.1.-]). In humans, MDH1B is expressed in testis, fallopian tube and choroid plexus. The enzymatic activity of MDH1B has not been experimentally confirmed, hence its designation as a putative enzyme.
