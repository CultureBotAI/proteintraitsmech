identifier: Pfam:PF28802
label: Zu5-like domain
definition: >-
  This entry represents a Zu5-like domain found as the third domain in a four-domain architecture in Bacteroidota proteins. The domain is approximately 110-115 residues in length. These proteins also contain an N-terminal M23 family metallopeptidase domain. This domain shows similarity to the GAIN domain. The specific function of this domain remains to be determined.
