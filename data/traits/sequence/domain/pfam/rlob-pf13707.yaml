identifier: Pfam:PF13707
label: RloB-like protein
definition: >-
  This family includes the RloB protein that is found within a bacterial restriction modification operon. It also includes the AbiLii protein that is found as part of a plasmid encoded phage abortive infection mechanism. Deletion of part of the abiLii gene was sufficient to abolish phage resistance. Other proteins in this family are annotated as CRISPR Csm2 proteins.
