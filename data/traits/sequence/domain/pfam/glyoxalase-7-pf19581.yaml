identifier: Pfam:PF19581
label: Glyoxalase superfamily protein
definition: >-
  Bleomycin (Blm) is a glycopeptide antibiotic produced naturally by actinomycetes. It is a strong DNA-cutting agent and thus finds use as a potent anti-cancer drug. The DNA-cutting mechanism is complex, involving concomitant oxidation of FeII and reduction of oxygen. In addition to iron, Blm binds other transition metals: cobalt, nickel, copper and zinc. Actinomycetes have developed a defence mechanism against this lethal compound, producing a protein that confers resistance to Blm through drug sequestering. The crystal structure of the bleomycin resistance protein reveals 2 identically-folded halves, each having an α/β fold but showing no sequence similarity. Each half comprises a 4-stranded β-sheet and a short α-helix (3 turns). The sheets within each half lie roughly at right-angles and are related by an approximate 2-fold axis. The crystal packing shows compact dimers that have a hydrophobic interface and are involved in mutual chain exchange.
