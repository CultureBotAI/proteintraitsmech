identifier: Pfam:PF07400
label: Interleukin 11
definition: >-
  Interleukins (IL) are a group of cytokines that play an important role in the immune system. They modulate inflammation and immunity by regulating growth, mobility and differentiation of lymphoid and other cells. Interleukin-11 (IL-11) is a pleiotropic cytokine that stimulates megakaryocytopoiesis, resulting in increased production of platelets, as well as activating osteoclasts, inhibiting epithelial cell proliferation and apoptosis, and inhibiting macrophage mediator production. These functions may be particularly important in mediating the hematopoietic, osseous and mucosal protective effects of IL-11. The cytokine also possesses anti-inflammatory activity, and has been proposed as a therapeutic agent in the treatment of chronic inflammatory diseases, such as Crohn's disease and rheumatoid arthritis. This entry represents interleukin-11.
