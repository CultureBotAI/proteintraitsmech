identifier: Pfam:PF02641
label: Uncharacterized ACR, COG1993
definition: >-
  UPF0166 protein family includes TM_0021 from Thermotoga maritima ( ) and other proteins predominantly found in bacteria but also in some archaea. TM_0021 is a putative PII-like signaling protein thought to be involved in the regulation of the nitrogen status in this organism. The protein adopts a trimeric assembly. Each monomer folds into an α+β sandwich with a four-stranded antiparallel β-sheet packed against two antiparallel α-helices resembling a ferredoxin-like fold, with a short β-hairpin inserted before the first α-helix.
