identifier: Pfam:PF07999
label: Retrotransposon hot spot protein, P-loop domain
definition: >-
  Members of this entry are retrotransposon hot spot proteins (RHSs). They are associated with polymorphic subtelomeric regions in Trypanosoma. These proteins contain a P-loop (ATP/GTP-binding) motif, represented in this entry, at the C-terminal of the conserved box 1. This domain also includes the retrotransposon insertion site.
