identifier: Pfam:PF08273
label: Zinc-binding domain of primase-helicase
definition: >-
  This entry is represented by bacteriophage T7 DNA helicase/primase (also known as Gp4), an ATP-dependent DNA helicase and primase that is essential for viral DNA replication and recombination. Primase activity synthesizes short RNA primers at the sequence 5'-GTC-3' on the lagging strand that the polymerase elongates using dNTPs and providing the primase is still present. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. This entry represents a zinc binding domain found in the N-terminal region of the bacteriophage T7 Gp4 and P4 alpha protein. P4 is a multifunctional protein with origin recognition, helicase and primase activities.
