identifier: Pfam:PF09438
label: Domain of unknown function (DUF2017)
definition: >-
  This entry includes the oxidative stress regulator AosR from Mycobacterium, a transcription factor crucial for intra-mycobacterial redox homeostasis and protection against host-derived oxidative and nitrosative radicals. In response to oxidative stress, it interacts with the ECF sigma factor SigH and, in conjunction with SigH, binds to an auxiliary promoter upstream of mec-cysO-cysM, leading to the transcriptional activation of these genes encoding a non-canonical actinomycete-specific cysteine biosynthesis pathway. Increased production of cysteine protects mycobacteria cells from host phagocyte-derived oxidative and nitrosative stress, thus facilitating the mycobacterial growth in the host.
