identifier: Pfam:PF30157
label: Methylamine utilization protein MauJ, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Methylamine utilization protein MauJ from Paracoccus versutus and related bacterial sequences. The function is not yet known. This domain may fold into a six-stranded antiparallel β-sheet flanked by two α-helices.
