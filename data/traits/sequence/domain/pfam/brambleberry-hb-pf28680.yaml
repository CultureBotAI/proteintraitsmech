identifier: Pfam:PF28680
label: Brambleberry helical bundle domain
definition: >-
  This entry represents a small helical bundle domain found in the brambleberry protein and related nuclear membrane fusion factors. The brambleberry protein is required for nuclear membrane fusion during karyogamy in early development. The full-length protein localises to the nuclear membrane as a multi-pass transmembrane protein and is essential for proper nuclear envelope assembly. During karyomere fusion, brambleberry is detected in prominent puncta at karyomere-karyomere interfaces corresponding to putative fusion sites. The protein shows homology to yeast Kar5, another nuclear fusion factor. The specific function of this helical bundle domain within the membrane fusion machinery remains to be determined.
