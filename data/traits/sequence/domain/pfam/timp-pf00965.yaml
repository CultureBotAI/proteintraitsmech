identifier: Pfam:PF00965
label: Tissue inhibitor of metalloproteinase
definition: >-
  Tissue inhibitors of metalloproteinases (TIMPs,) and their target matrix metalloproteinases (MMPs, MEROPS peptidase family M10A) are important in connective tissue re-modelling in diseases of the cardiovascular system and in the physiological degradation of connective tissue, as well as in pathological states such as tumour invasion and arthritis. TIMPs belong to MEROPS proteinase inhibitor family I35, clan IT. TIMPs complex with extracellular matrix metalloproteinases (such as collagenases) and irreversibly inactivate them. Members of this family are common in extracellular regions of vertebrate species. TIMPs are proteins of about 200 amino acid residues, 12 of which are cysteines involved in disulphide bonds. The basic structure of such a type of inhibitor is shown in the following schematic representation: +-----------------------------+ +--------------+ | | | | CxCxCxxxxxxxxxxxxxxxxxCxxxxxxxxxCxxxxxxxCxCxCxCxCxxxxxCxxCxxx | | | | | | | | | +-----------------|-----------------+ +-+ +-----+ +---------------------+ 'C': conserved cysteine involved in a disulphide bond. The crystal structure of the human proMMP-2/TIMP-2 complex reveals an interaction between the hemopexin domain of proMMP-2 and the C-terminal domain of TIMP-2, leaving the catalytic site of MMP-2 and the inhibitory site of TIMP-2 distant and spatially isolated. The interfacial contact of these two proteins is characterised by two distinct binding regions composed of alternating hydrophobic and hydrophilic interactions. This unique structure provides information for how specificity for non-inhibitory MMP/TIMP complex formation is achieved.
