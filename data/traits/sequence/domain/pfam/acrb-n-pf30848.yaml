identifier: Pfam:PF30848
label: Ubiquitination network protein AcrB N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the AcrB (ubiquitination network signaling protein) found in filamentous fungi, primarily Ascomycota. This domain contains three transmembrane helices that anchor the protein to membranes. AcrB is a component of the regulatory network controlling carbon source utilisation through ubiquitination and deubiquitination, involving CreA, CreB, CreC and CreD. The full-length protein is required for normal growth on various carbon sources including fructose, cellobiose, raffinose and starch, and confers resistance to acriflavine. The specific function of this N-terminal transmembrane domain remains to be determined.
