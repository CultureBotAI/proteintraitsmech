identifier: Pfam:PF29935
label: StrH glycosyltransferase N-terminal domain
definition: >-
  This entry represents the N-terminal region of StrH, a dTDP-dihydrostreptose-streptidine-6-phosphate dihydrostreptosyltransferase involved in streptomycin biosynthesis. This region is approximately 120-150 amino acids and precedes the glyoxalase domain ( ). StrH catalyses glycosylation of streptidine-6-phosphate with dTDP-dihydrostreptose. The specific function of this region remains to be determined.
