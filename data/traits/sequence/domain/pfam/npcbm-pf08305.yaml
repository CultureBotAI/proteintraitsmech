identifier: Pfam:PF08305
label: NPCBM/NEW2 domain
definition: >-
  This entry represents a putative carbohydrate binding module (NPCBM) domain found at the N terminus of glycosyl hydrolase family 98 proteins. Proteins containing this domain include CpGH98 from C. perfringens. It specifically hydrolyses fucose-containing trisaccharides from the glycotopes of blood groups A and B and is implicated for the infectivity and virulence of this pathogen. CpGH98 has a central TIM barrel catalytic domain, in which putative catalytic residues may be tentatively identified, and an N-terminal novel putative carbohydrate binding module (NPCBM). NPCBM domains found in bacterial conflict systems are predicted to interact with invasive molecules and recruit downstream effectors.
