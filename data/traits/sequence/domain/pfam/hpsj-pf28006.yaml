identifier: Pfam:PF28006
label: HpsJ-like protein
definition: >-
  This entry represents HpsJ (hormogornium polysaccharide J) and related proteins. HpsJ is thought to be a part of a secretion system, unique to filamentous cyanobacteria, and involved in the biosynthesis or secretion of an extracellular polysaccharide, essential for motility.
