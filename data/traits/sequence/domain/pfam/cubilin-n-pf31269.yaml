identifier: Pfam:PF31269
label: Cubilin N-terminal trimerisation domain
definition: >-
  This entry represents the N-terminal trimerisation domain of cubilin, found in vertebrates. Cubilin is the ligand-binding component of the cubam receptor, which is essential for intestinal vitamin B12 uptake and kidney protein reabsorption. Three cubilin chains combine via this domain to form a pin-shaped structure approximately 80 residues in length. The domain comprises an intertwined β-helix that irreversibly interlocks the three chains, extended by a short β-hairpin at the N-terminal and a coiled-coil region at the C-terminal. A proline residue introduces a hinge in the coiled-coil region. This trimeric β-helix associates with the β-helix 1 domain of amnionless (AMN) via complementary hydrophobic faces, anchoring cubilin to the membrane. Loss-of-function mutations in cubilin or AMN cause Imerslund-Graesbeck syndrome, characterised by vitamin B12 deficiency and proteinuria.
