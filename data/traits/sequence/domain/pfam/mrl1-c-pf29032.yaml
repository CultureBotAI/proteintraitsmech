identifier: Pfam:PF29032
label: MRL1, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Pentatricopeptide repeat-containing protein MRL1 from Arabidopsis thaliana, a regulator of the large subunit (LS) of RuBisCO. It is involved either in the processing or in the stabilisation of the processed transcript, probably by acting as a barrier to the 5'>3' degradation. This domain is predicted to adopt an α-β configuration.
