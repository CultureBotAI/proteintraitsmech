identifier: Pfam:PF09270
label: Beta-trefoil DNA-binding domain
definition: >-
  This DNA-binding domain adopts a β-trefoil fold, that is, a capped β-barrel with internal pseudo threefold symmetry. In the DNA-binding protein LAG-1, it also is the site of mutually exclusive interactions with NotchIC (and the viral protein EBNA2) and corepressors (SMRT/N-Cor and CIR).
