identifier: Pfam:PF22931
label: SAM domain-like
definition: >-
  This entry represents the SAM (sterile alpha motif) domain of ACK/TNK-like subfamily of non-receptor tyrosine-protein kinases. It is usually located at the N terminus and is followed by the catalytic domain and a number of other domains. This is a putative protein-protein interaction domain.
