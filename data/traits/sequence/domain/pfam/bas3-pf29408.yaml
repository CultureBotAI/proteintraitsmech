identifier: Pfam:PF29408
label: Biotrophy-associated secreted protein 3RN
definition: >-
  This entry represents The C-terminal domain of the biotrophy-associated secreted protein 3 (BAS3). BAS3 is a secreted effector protein involved in biotrophic colonisation of plant cells by the rice blast fungus Pyricularia oryzae. The protein localises to the appressorial penetration site and outlines the primary hyphae during fungal invasion. Expression is highly up-regulated in invasive hyphae, suggesting a specific role in the biotrophic phase of infection. This entry is found in filamentous fungi, particularly in plant pathogens of the order Magnaporthales.
