identifier: Pfam:PF27720
label: Microtubule nucleation factor SSNA1
definition: >-
  Sjoegren syndrome nuclear autoantigen 1 (SSNA1/NA14) is a major specific target for autoantibodies in Sjögren's Syndrome, a highly prevalent autoimmune disease. SSNA1 is a microtubule-binding protein which stabilizes dynamic microtubules by slowing growth and shrinkage at both plus and minus ends and serves as a sensor of microtubule damage, protecting microtubules from the microtubule-severing enzyme SPAST. SSNA1 can assemble into large fibrils, a structure that is important for its interaction with spastin as well as for microtubule dynamics. It is also a binding partner for the G-protein coupled receptor TPRA40, which regulates early mouse embryogenesis.
