identifier: Pfam:PF22613
label: Transketolase-like TK C-terminal domain
definition: >-
  This entry represents a C-terminal domain found in transketolase and transketolase-like enzymes, such as pyruvate dehydrogenase E1 component from Escherichia coli (OPD1). The pyruvate dehydrogenase complex catalyses the overall conversion of pyruvate to acetyl-CoA and carbon dioxide. The E1 component is a thiamine diphosphate-dependent enzyme that catalyses the decarboxylation of pyruvate with formation of acetyl-dihydrolipoamide. The full-length E1 component forms homodimers and contains a N-terminal small hairpin domain, a transketolase domain ( ), a middle domain ( ), and a C-terminal domain ( ). In some bacteria such as Corynebacterium glutamicum, the E1 component is part of an unusual ODH/PDH supercomplex.
