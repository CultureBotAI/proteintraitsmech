identifier: Pfam:PF20512
label: Phosphomannose isomerase type I, helical insertion domain
definition: >-
  This entry represents the α-helical insertion domain of Phosphomannose isomerase type I enzymes (also known as Mannose-6-phosphate isomerases), which are involved in the synthesis of the GDP-mannose and dolichol-phosphate-mannose required for a number of critical mannosyl transfer reactions. The helices in this domain are packed closely, connected by short turns and loops. It packs against the catalytic domain, interrupting it.
