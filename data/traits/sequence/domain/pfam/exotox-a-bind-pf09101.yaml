identifier: Pfam:PF09101
label: Exotoxin A binding
definition: >-
  This domain is found in Pseudomonas aeruginosa exotoxin A, and is responsible for binding of the toxin to the alpha-2-macroglobulin receptor, with subsequent internalisation into endosomes. It adopts a thirteen-strand antiparallel β jelly roll topology, which belongs to the concanavalin A-like lectins/glucanases fold superfamily.
