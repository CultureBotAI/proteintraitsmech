identifier: Pfam:PF21751
label: Probable sensor domain DACNV
definition: >-
  This entry represents a potential sensor domain found at the N-terminal of bacterial diadenylate cyclases, which is typically followed by the DAC ( ) domain. DACNV consists of a compact core formed by seven β-strands and two or three α-helices, according to structure predictions. It is found in various phyla, including acidobacteria, actinobacteria, bacteroidetes, cyanobacteria and planctomycetes.
