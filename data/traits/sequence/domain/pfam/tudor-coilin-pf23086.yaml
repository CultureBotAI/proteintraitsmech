identifier: Pfam:PF23086
label: Coilin, C-terminal Tudor domain
definition: >-
  This entry represents the C-terminal domain of coilin which is an atypical Tudor domain that contains large unstructured loops. Coilin is a nuclear phosphoprotein that serves as an assembly centre in Cajal bodies (CBs) and has a role in small nuclear ribonucleoprotein (snRNP) biogenesis, involved in the modification and assembly of nucleoplasmic snRNPs. Coilin also acts to repress polymerase I activity in response to cisplatin-induced DNA damage, which could indicate a link between the DNA damage response and the inhibition of rRNA synthesis.
