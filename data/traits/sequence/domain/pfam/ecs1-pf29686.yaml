identifier: Pfam:PF29686
label: ECS1
definition: >-
  This entry represents a domain in ECS1 found in small secreted proteins from plants of the Brassicaceae. The domain is present in cell wall-associated proteins that are induced by bacterial pathogens such as Xanthomonas campestris. ECS1 proteins are expressed in leaves, flowers and stems but not in roots, and accumulate at higher levels in light than darkness. The proteins may be involved in plant defence responses to bacterial infection. The function of this domain remains to be determined.
