identifier: Pfam:PF21865
label: Talin 1-like, rod segment domain
definition: >-
  This domain is found repeated in human Talin-1 (TLN1) and similar proteins mainly from animals. Talin is an essential component in focal adhesions (FAs), intracellular protein assemblies that serve as tension-sensing anchoring points to link cells to the extracellular environment. This protein plays a key regulatory role in FA dynamics, similar to the activation and inactivation of integrins. It consists of a globular head, a long rod made of 62 helices forming 13 helical bundle (rod segment, RS) domains, and a dimerisation (DD) motif at the C terminus. This entry represents four of these domains, RS 5, 6, 9 and 11.
