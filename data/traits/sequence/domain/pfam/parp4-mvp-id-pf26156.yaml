identifier: Pfam:PF26156
label: PARP4 MVP-ID C-terminal domain
definition: >-
  This entry represents the major vault protein interaction domain (MVP-ID) at the C-terminal in PARP4 proteins. The MVP-ID domain facilitates PARP4 interaction with the Major Vault Protein (MVP) and localisation inside the vault ribonucleoprotein complex. It is predicted to contain a helical structure. Members of this group are predominantly found in vertebrates. PARP4, also known as vPARP, is the largest member of the poly-ADP-ribose polymerase (PARP) family and exhibits both poly- and mono-ADP-ribosylation activity. It catalyzes the transfer of ADP-ribose units to target proteins, influencing various cellular processes. PARP4 can PARylate major vault protein (MVP) and, to a lesser extent, itself. It is a core component of the vault ribonucleoprotein particle, one of the largest ribonucleoprotein complexes in eukaryotic cells, alongside MVP, vault RNAs (vRNAs), and TEP1. Its interaction with TEP1 suggests potential roles in cellular transport or signaling pathways.
