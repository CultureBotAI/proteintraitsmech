identifier: Pfam:PF21503
label: Centriolar protein SAS, helical domain
definition: >-
  This entry represents a domain found in Spindle assembly abnormal protein 6 from Caenorhabditis elegans (Sas-6) and related proteins from Caenorhabditis species. Sas-6 is essential for centriole formation. This domain is C-terminal to and adopts an α-helical conformation.
