identifier: Pfam:PF26922
label: Domain of unknown function (DUF8277)
definition: >-
  This entry represents a domain found in a variety of mycobacteriophage. Structure prediction suggests that these proteins form a confident homodimer. The domain is composed of a four stranded β-sheet with two helices packed on one side. The homo-oligomer interaction is mediated by the C-terminal β-strand. The function of this protein is not known.
