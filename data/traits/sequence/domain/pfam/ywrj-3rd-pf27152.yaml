label: YwrJ third domain
definition: >-
  This entry represents the third domain of YwrJ, an uncharacterised protein from Bacillus subtilis. This domain adopts a small β-barrel fold belonging to the SH3 superfamily. The specific function of this domain protein remains unknown.
