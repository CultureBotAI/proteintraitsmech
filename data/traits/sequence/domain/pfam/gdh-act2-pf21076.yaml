identifier: Pfam:PF21076
label: Glutamate dehydrogenase, ACT2 domain
definition: >-
  This entry represents the ACT2 domain of a bacterial family of NAD-specific glutamate dehydrogenases. The ACT domains of these proteins differ from the archetypal ACT fold in that strand strand β1 is located in the position usually occupied by strand β4 creating an ACT-like topology with a β1-4 antiparallel sheet. Glutamate dehydrogenases (GDHs) are a broadly distributed group of enzymes that catalyse the reversible oxidative deamination of glutamate to ketoglutarate and ammonia. The structure of GDH from Mycobacterium smegmatis revealed that it has a long N- and C-terminal segments flanking the catalytic core, comprising several domains. The flexible N-terminal domain comprises ACT-like and PAS-type domains which could act as metabolic sensors for allosteric regulation.
