identifier: Pfam:PF29439
label: Plant sulfated peptide tyrosine protein
definition: >-
  This entry represents the PSY (Plant Sulfated peptide tYrosine) family of secreted peptide hormones found in plants. These small proteins are approximately 71-75 amino acids in length and contain a signal peptide, propeptide regions, and a bioactive peptide of about 18 amino acids. The mature peptide contains a sulfotyrosine residue and hydroxylated proline residues with arabinose glycosylation, both modifications being essential for biological activity. PSY proteins promote cellular proliferation and expansion and are expressed in roots, stems, leaves, flowers and shoot apical meristems. PSY1 induces outward proton fluxes in roots and is induced by wounding. Another two tyrosine-sulfated proteins compose this family: PSY2 and PSY3. The family is found in eudicotyledons.
