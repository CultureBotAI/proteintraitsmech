identifier: Pfam:PF03713
label: Domain of unknown function (DUF305)
definition: >-
  This entry represents a domain found in CopM from Synechocystis sp. (also known as Slr6039) and similar uncharacterised bacterial proteins. CopM is a cyanobacterial metallochaperone that shows a simple four-helical fold. This domain is also found in Uncharacterized protein L153 from Acanthamoeba polyphaga mimivirus. It is short and found in one or two copies.
