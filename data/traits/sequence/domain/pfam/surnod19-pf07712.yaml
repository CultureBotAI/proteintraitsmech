identifier: Pfam:PF07712
label: Stress up-regulated Nod 19
definition: >-
  This family of plant proteins have been implicated in nodule development in the legume Medicago truncatula (Barrel medic). MtN-19 was shown by Northern blot to be induced during nodulation. The molecular function of these proteins is unknown.
