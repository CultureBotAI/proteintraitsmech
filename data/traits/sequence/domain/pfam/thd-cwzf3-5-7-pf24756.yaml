identifier: Pfam:PF24756
label: CWZF3-5-7 THD domain
definition: >-
  This domain is found at the C-terminal end of Cysteine-tryptophan domain-containing zinc finger proteins 3, 5 and 7 from Oryza sativa and related plant proteins. This domain has a significant similarity to the THD domain (TPRL with Handle Region Dimerisation Domain) of AFF4, which is a scaffold protein that recruits other components of Super elongation complex. The THD domain is composed of α-helices and is involved in dimerisation. The domain represented by this entry is predicted to adopt similar structure and similarly could be involved in dimer formation. Members of this entry contain a CW-type zinc finger domain ( ), which is implicated in the recognition of methylated histones, particularly histone H3 lysine 4 (H3K4me). These proteins are involved in chromatin modification and gene expression regulation. They can bind to specific methylated forms of histone H3, facilitating the recruitment of various effectors to mediate gene expression. Some members act as transcriptional activators, directly binding to DNA sequences to regulate target gene transcription, thereby influencing cellular processes such as the regulation of grain size in plants. They are also capable of promoting active chromatin states by increasing levels of specific histone modifications at target loci.
