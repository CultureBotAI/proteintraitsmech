identifier: Pfam:PF29282
label: Cache-like sensory domain, BaeS-type
definition: >-
  This entry represents the N-terminal sensory domain found in BaeS and related sensor histidine kinases from bacteria. This domain adopts a Cache-like fold and is located at the N terminus of these proteins. BaeS is the sensor component of the BaeS/BaeR two-component regulatory system which responds to envelope stress conditions including spheroplast formation, indole, and protein overexpression. The full-length BaeS protein activates its cognate response regulator BaeR through autophosphorylation, which in turn activates expression of genes including the mdtABCD multidrug efflux transporter operon and the periplasmic chaperone spy. The specific ligands or signals detected by this N-terminal sensory domain remain to be determined.
