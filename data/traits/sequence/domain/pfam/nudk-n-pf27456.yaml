identifier: Pfam:PF27456
label: GDP-mannose pyrophosphatase NudK N-terminal domain
definition: >-
  This entry represents the N-terminal domain of GDP-mannose pyrophosphatase NudK. This N-terminal domain is composed of a three-stranded β meander and is involved in domain swapping between the two monomers in the dimer. Residues from both chains contribute to the active site through this domain-swapping mechanism. The domain spans approximately residues 1-40 and is found in enterobacterales. The specific function of this domain is structural organisation of the active homodimer. NudK is a nucleoside diphosphate sugar hydrolase that hydrolyses GDP-mannose as its preferred substrate, yielding GMP and mannose-1-phosphate. The enzyme functions as a homodimer and belongs to the Nudix hydrolase family.
