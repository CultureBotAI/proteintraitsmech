identifier: Pfam:PF29919
label: Small integral membrane protein 39
definition: >-
  This entry represents small integral membrane protein 39 (SMIM39) found in vertebrates. SMIM39 is a single-pass membrane protein with a predicted transmembrane helix. The protein shows tissue-enhanced expression in adipose tissue. SMIM39 belongs to the small integral membrane protein group, which comprises small membrane proteins with diverse cellular functions. The function of SMIM39 remains to be determined.
