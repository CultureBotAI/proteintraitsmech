identifier: Pfam:PF31116
label: Acetoin catabolism protein X C-terminal domain
definition: >-
  This entry represents the C-terminal domain of approximately 140 residues found in bacterial acetoin catabolism protein X (AcoX). This domain is located C-terminal to the NAD kinase-like domain ( ). AcoX is essential for acetoin catabolism and is typically encoded within acetoin dehydrogenase gene clusters. The specific function of this domain remains to be determined.
