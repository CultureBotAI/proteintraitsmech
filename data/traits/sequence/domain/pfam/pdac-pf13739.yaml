identifier: Pfam:PF13739
label: Deacetylase PdaC
definition: >-
  This domain forms an α/β-two layer sandwich. It is found in Bacillus subtilis proteins anti-sigma-V factor RsiV, which downregulates SigV activity, and peptidoglycan-N-acetylmuramic acid deacetylase PdaC, which catalyses the deacetylation of N-acetylmuramic acid which makes the peptidoglycan resistant to lysozyme.
