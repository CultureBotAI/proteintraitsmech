identifier: Pfam:PF22232
label: TraI helicase-associated ssDNA bd, N-terminal
definition: >-
  This entry represents the N-terminal fragment of the helicase-associated ssDNA binding domain of the conjugative transfer relaxase/helicase TraI. This domain adopts a globular structure that closely resembles that of the RecD N-terminal domain despite little sequence similarity. It is part of a larger domain, referred to as vestigial helicase domain, that functions as a ssDNA binding domain. This region doesn't have helicase activity or measurable DNA binding affinity itself but it may play a role in either DNA unwinding or regulation of ssDNA transfer from host to recipient cell. Members of this group are mainly found in proteobacteria.
