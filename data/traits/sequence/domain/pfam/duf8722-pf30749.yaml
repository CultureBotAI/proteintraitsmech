identifier: Pfam:PF30749
label: Domain of unknown function (DUF8722)
definition: >-
  This entry represents a domain of unknown function found in uncharacterised membrane proteins from plants. The domain is restricted to eudicots, specifically to the rosid clade, and is found in families including Rosaceae (roses, apples), Salicaceae (willows, poplars), and Malvaceae. The proteins containing this domain are predicted to be membrane associated. The function of this domain remains to be determined. This domain contains an helical fold.
