identifier: Pfam:PF23569
label: SMAX1 nucleotide binding domain
definition: >-
  This domain is found in Protein SUPPRESSOR OF MAX2 1 from Arabidopsis thaliana (SMAX1), a number of SMAX1-like proteins, Protein DWARF 53 from Oryza sativa, and similar sequences found in plants and some bacterial species. SMAX1 is thought to be a component of a transcriptional corepressor complex that acts downstream of MAX2 to negatively regulate karrikins/strigolactone responses. SMAX1-like proteins are thought to be components of a transcriptional corepressor complex. D53 is a repressor of strigolactones (SL) signalling. This domain has significant sequence and structural similarity to other known AAA+ nucleotide binding domains.
