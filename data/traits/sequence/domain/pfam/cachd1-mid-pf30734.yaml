identifier: Pfam:PF30734
label: CACHD1 central domain
definition: >-
  This entry represents a middle domain found in proteins of the calcium channel subunit alpha-2/delta family in vertebrates. This includes CACHD1 (VWFA and cache domain-containing protein 1). These are single-pass type I membrane proteins that regulate voltage-dependent calcium channels. CACHD1 contains a VWFA domain ( ) and two Cache domains. Cache domains are extracellular sensory domains that typically bind small ligands. CACHD1 interacts with Wnt receptors and regulates neuronal asymmetry in zebrafish brain development. This domain contains a CACHE-like fold.
