identifier: Pfam:PF18376
label: Mevalonate 5-diphosphate decarboxylase C-terminal domain
definition: >-
  Mvd1, also known as mevalonate-5-diphosphate decarboxylase ( ), catalyzes the ATP dependent decarboxylation of mevalonate 5-diphosphate (MVAPP) to form isopentenyl 5-diphosphate. The reaction is required for production of polyisoprenoids and sterols from acetyl-CoA. This entry represents the C-terminal domain of Mvd1, which is a member of the GHMP kinase superfamily.
