identifier: Pfam:PF21900
label: Family of unknown function (DUF6920)
definition: >-
  This entry represents a set of uncharacterised proteins found in prokaryotes. They share remote similarity to LolA and LolB outer-membrane lipoproteins. Similar to LolA and LolB these proteins are predicted to have a hydrophobic cavity consisting of an unclosed β-barrel and an α-helical lid.
