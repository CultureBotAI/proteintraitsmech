identifier: Pfam:PF26224
label: Domain of unknown function (DUF8050)
definition: >-
  Members of this integral membrane protein family are found exclusively in halophilic archaea. In at least three species (Haloarcula marismortui, Haloquadratum walsbyi, and Haloferax volcanii), members are found in the gene neighbourhood of archaeosortase A, suggesting a role in protein sorting. Structure prediction show these proteins have four likely transmembrane helices, with a four stranded β meander inserted between helices one and two. The structure of this domain shows significant structural similarity to claudin proteins. This suggests that these proteins may be accessory components of an as yet unidentified membrane complex.
