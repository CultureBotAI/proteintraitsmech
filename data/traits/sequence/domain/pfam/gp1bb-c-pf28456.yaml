identifier: Pfam:PF28456
label: Platelet glycoprotein Ib beta chain C-terminal domain
definition: >-
  This entry represents the C-terminal region platelet glycoprotein Ib beta chain. This is a transmembrane helix located at the C-terminal end of the leucine-rich repeat region. Platelet glycoprotein Ib beta is a component of the GP1b-IX-V complex that participates in platelet adhesion by binding to von Willebrand factor. Mutations in this protein can lead to Bernard-Soulier syndrome, a bleeding disorder affecting platelet function.
