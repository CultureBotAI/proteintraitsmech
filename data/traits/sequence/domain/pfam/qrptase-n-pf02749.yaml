identifier: Pfam:PF02749
label: Quinolinate phosphoribosyl transferase, N-terminal domain
definition: >-
  Quinolinate phosphoribosyl transferase (QPRTase) or nicotinate-nucleotide pyrophosphorylase is involved in the de novo synthesis of NAD in both prokaryotes and eukaryotes. It catalyses the reaction of quinolinic acid with 5-phosphoribosyl-1-pyrophosphate (PRPP) in the presence of Mg 2+ to give rise to nicotinic acid mononucleotide (NaMN), pyrophosphate and carbon dioxide. Unlike , this domain also includes the molybdenum transport system protein ModD.
