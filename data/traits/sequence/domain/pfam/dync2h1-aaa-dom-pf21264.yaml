identifier: Pfam:PF21264
label: Cytoplasmic dynein 2 heavy chain 1, AAA+ ATPase domain
definition: >-
  This domain is found in Cytoplasmic dynein 2 heavy chain 1 from humans (DYNC2H1) and similar sequences mainly found in animals. Dynein-2 is essential for the dynamic remodelling of the ciliary proteome and is associated with human skeletal ciliopathies. DYNC2H1, one of its specific components, is the motor-domain- containing heavy chain. This protein consists of a compact N-terminal region, an elongated tail and a C-terminal AAA motor domain. There are two copies of this protein in the complex, each adopting a different configuration, which contributes to the asymmetry of Dynein-2. This entry covers one of the six motor's ring AAA domains (ATPases associated with various cellular activities).
