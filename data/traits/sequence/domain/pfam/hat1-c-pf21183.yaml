identifier: Pfam:PF21183
label: Histone acetyltransferase type B catalytic subunit, C-terminal
definition: >-
  This entry represernts the C-terminal domain of human HAT1 and similar proteins from animals. This domain is highly variable and not required for HAT activity. It consists of a bundle of helices and a short β-strand. Histone acetyltransferase type B catalytic subunit (HAT1) is the catalytic subunit of the histone acetylase B (HAT-B) complex (composed on HAT1 and HAT2 at least). It is involved in different biological processes including cell progression, glucose metabolism, histone production or DNA damage repair. HAT1 acetylates histone H4 at Lys-5 and Lys-12, and to a lesser extend, Lys-5 in histone H2A.
