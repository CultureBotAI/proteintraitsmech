identifier: Pfam:PF22947
label: Leucine--tRNA ligase, ubiquitin-like domain
definition: >-
  This domain is found in human Leucine--tRNA ligase (LARS1) and related metazoan proteins. LARS1 is aminoacyl-tRNA synthetase that catalyses the specific attachment of leucine to its cognate tRNA (tRNA(Leu)). It also mediates activation of leucine-dependent mechanistic target of rapamycin complex 1 (mTORC1). In the presence of leucine, LARS1 is translocated to the lysosome and facilitates the conversion of RagD-GTP to RagD-GDP form, resulting in mTORC1 activation. The domain represented by this entry is predicted to adopt ubiquitin-like fold with similarity to SPN domain of SHANK3. This domain is usually found in combination with domains that are typical for Leucyl-tRNA ligases.
