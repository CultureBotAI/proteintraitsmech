identifier: Pfam:PF00210
label: Ferritin-like domain
definition: >-
  This entry represents the main structural domain of ferritin. The domain is also found in other ferritin-like proteins such as members of the DNA protection during starvation (DPS) family and bacterioferritins. Ferritin is one of the major non-haem iron storage proteins in animals, plants, and microorganisms. It consists of a mineral core of hydrated ferric oxide, and a multi-subunit protein shell that encloses the former and assures its solubility in an aqueous environment. In animals, the protein is mainly cytoplasmic and there are generally two or more genes that encode closely related subunits - in mammals there are two subunits which are known as H(eavy) and L(ight). In plants ferritin is found in the chloroplast.
