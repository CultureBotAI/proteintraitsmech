identifier: Pfam:PF18303
label: SAVED-fused 2TM effector domain
definition: >-
  This is a predicted pore-forming effector domain directly fused to predicted SAVED sensor domain. Binding of a ligand via the SAVED sensor is predicted to activate the Saf-2TM and initiate a cell suicide response. It is a component of a class of conflict systems reliant on the production of second messenger nucleotide or nucleotide derivative.
