identifier: Pfam:PF20914
label: DNA polymerase III subunit alpha, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of DNA polymerase III subunit alpha and similar proteins from Proteobacteria and Actinobacteria. This protein, which is the replicative DNA polymerase, consists of six domains that form an irregular pyramid around a central cavity. The C-terminal domain lies on top of this structure.
