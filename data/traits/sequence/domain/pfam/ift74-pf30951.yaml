identifier: Pfam:PF30951
label: Intraflagellar transport protein 74
definition: >-
  Intraflagellar transport of ciliary precursors such as tubulin from the cytoplasm to the ciliary tip is required for ciliogenesis. Intraflagellar transport protein 74 (IFT74) is a component of the intraflagellar transport (IFT) complex B, which contains at least 20 different protein subunits. Together with IFT81, it forms a tubulin-binding module that specifically mediates transport of tubulin within the cilium. In humans, it was reported to be essential for flagellogenesis during spermatogenesis.
