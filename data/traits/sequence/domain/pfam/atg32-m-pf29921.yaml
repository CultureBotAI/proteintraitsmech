identifier: Pfam:PF29921
label: Autophagy-related protein 32 middle domain
definition: >-
  This entry represents a middle domain in autophagy-related protein 32 (ATG32) found in yeasts. ATG32 is a single-pass outer mitochondrial membrane protein that is required for the selective autophagy of mitochondria. ATG32 is localised to the mitochondrial outer membrane and interacts with ATG8 and ATG11. The protein is phosphorylated at serine residues which is critical for mitophagy and ATG11 interaction. ATG32 also promotes autophagy-dependent peroxisome degradation.
