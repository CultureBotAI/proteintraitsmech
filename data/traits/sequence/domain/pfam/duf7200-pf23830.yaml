identifier: Pfam:PF23830
label: Domain of unknown function (DUF7200)
definition: >-
  This entry represents an uncharacterised protein found in various phages that infect bacteria including Escherichia, Salmonella, Shigella, Klebsiella, Enterobacter, Citrobacter and Cronobacter. The protein ranges in length from around 66 to 98 amino acids. The protein forms a single compact domain composed of a four stranded β sheet and two α helices. The structure shows some weak structural similarity to the BRICHOS domain. No clear function is known for these proteins.
