identifier: Pfam:PF31263
label: Ste5, RING-type zinc finger
definition: >-
  This entry represents the RING-type zinc finger found in Ste5 from S.cerevisiae. STE5 is a component of the pheromone signal transduction pathway. It mediates pheromone signals acting between STE20 and STE11 and it is essential for pheromone-induced transcription of FUS1. It acts as a scaffold for each of the MAP kinases prior to signalling.
