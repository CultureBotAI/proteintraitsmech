identifier: Pfam:PF01549
label: ShK domain-like
definition: >-
  BgK, a 37-residue peptide toxin from the sea anemone Bunodosoma granulifera, and ShK, a 35-residue peptide toxin from the sea anemone Stichodactyla helianthus, are potent inhibitors of K channels. There is a large superfamily of proteins that contains domains (referred to as ShKT domains) resembling these two toxins. Many of these proteins are metallopeptidases, whereas others are prolyl-4-hydroxylases, tyrosinases, peroxidases, oxidoreductases, or proteins containing epidermal growth factor-like domains, thrombospondin-type repeats, or trypsin-like serine protease domains. The ShKT domain has also been called NC6 (nematode six-cysteine) domain, SXC (six-cysteine) domain and ICR (ion channel regulator). The ShKT domain is short (36 to 42 amino acids), with six conserved cysteines and a number of other conserved residues. The fold adopted by the ShKT domain contains two nearly perpendicular stretches of helices, with no additional canonical secondary structures. The globular architecture of the ShKT domain is stabilised by three disulfides, one of them linking the two helices. In venomous creatures, the ShKT domain may have been modified to give rise to potent ion channel blockers, whereas the incorporation of this domain into plant oxidoreductases and prolyl hydroxylases and into worm astacin-like metalloproteases and trypsin-like serine proteases produced enzymes with potential channel-modulatory activity. Some proteins known to contain a ShKT domain are listed below: Caribbean sea anemone ShK, a potassium channel toxin. Sea anemone BgK, a potassium channel toxin. Toxocara canis family of secreted mucins Tc-MUC-1 to -5, which are implicated in immune evasion. They combine two evolutionarily distinct modules, the mucin and ShkT domains. Some Caenorhabditis elegans asta…
