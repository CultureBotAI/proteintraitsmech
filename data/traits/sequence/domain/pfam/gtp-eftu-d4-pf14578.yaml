identifier: Pfam:PF14578
label: Elongation factor Tu domain 4
definition: >-
  Translation initiation factor IF-2 consists of several structural domains: an N-terminal G domain followed by an EF-Tu-type β barrel domain, followed by a novel α/β/α-sandwich connected via an α helix to a second EF-Tu-type β barrel domain. This entry represents the fourth domain.
