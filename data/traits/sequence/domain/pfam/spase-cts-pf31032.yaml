identifier: Pfam:PF31032
label: Signal peptidase C-terminal short helix
definition: >-
  This entry represents a C-terminal short (CTS) helix domain of approximately 25 residues found in signal peptidase catalytic subunits (SEC11A, SEC11C) in eukaryotes. This domain follows the Peptidase_S24 catalytic domain ( ). The CTS helix is essential for catalytic activity and may be accommodated as a transmembrane helix in the thinned membrane environment of the signal peptidase complex (SPC). The SPC cleaves N-terminal signal peptides from nascent proteins as they enter the ER lumen.
