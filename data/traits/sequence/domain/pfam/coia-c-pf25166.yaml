identifier: Pfam:PF25166
label: Competence protein CoiA, C-terminal domain
definition: >-
  This entry represents a domain found C-terminal in the Competence protein CoiA from Bacillus subtilis and related proteins predominantly found in Bacilli. This domain is predicted to fold in a mainly α-helical structure. CoiA falls within a competence-specific operon in Streptococcus. It is required for optimal transformation. Competence is the ability of a cell to take up exogenous DNA from its environment, resulting in transformation. It is widespread among bacteria and is probably an important mechanism for the horizontal transfer of genes. DNA usually becomes available by the death and lysis of other cells. Competent bacteria use components of extracellular filaments called type 4 pili to create pores in their membranes and pull DNA through the pores into the cytoplasm. This process, including the development of competence and the expression of the uptake machinery, is regulated in response to cell-cell signalling and/or nutritional conditions.
