identifier: Pfam:PF30179
label: Type IIS restriction enzyme MboII middle domain
definition: >-
  This entry represents the middle domain of type IIS restriction enzyme MboII (also called MboIIR), found in Helicobacter species and Campylobacter jejuni. Type IIS restriction enzymes recognise asymmetric DNA sequences and cleave at defined distances outside their recognition sites. MboIIR is encoded by HP1366 in Helicobacter pylori and is part of restriction-modification systems. This domain is found in nine proteins across Campylobacterota.
