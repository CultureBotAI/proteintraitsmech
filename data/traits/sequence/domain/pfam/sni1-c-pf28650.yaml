identifier: Pfam:PF28650
label: SNI1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the SNI1 protein family. SNI1 (Suppressor of NPR1, Inducible 1) is a negative regulator of systemic acquired resistance found in plants. SNI1 functions as a transcriptional repressor that prevents expression of pathogenesis-related genes and is a component of the SMC5-SMC6 complex involved in DNA repair. While the complete protein has well-characterised roles in plant immunity and DNA damage responses, the specific function of this domain remains to be determined.
