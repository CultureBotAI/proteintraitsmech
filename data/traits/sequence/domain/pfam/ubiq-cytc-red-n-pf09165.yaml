identifier: Pfam:PF09165
label: Ubiquinol-cytochrome c reductase 8 kDa, N-terminal
definition: >-
  This entry represents the N-terminal domain of human Cytochrome b-c1 complex subunit Rieske, mitochondrial, also known as Ubiquinol-cytochrome c reductase iron-sulphur subunit (UQCRFS1), and similar sequences mainly from chordates and arthropods. UQCRFS1 adopts a structure consisting of many antiparallel β-sheets, with few α-helices, in a non-globular arrangement. They are required for proper functioning of the respiratory chain.
