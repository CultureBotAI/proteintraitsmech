identifier: Pfam:PF02916
label: DNA polymerase processivity factor
definition: >-
  The DNA polymerase processivity factor is a replisome sliding clamp subunit, which is responsible for tethering the catalytic subunit of DNA polymerase to the DNA during high speed replication. The crystal structure of the Bacteriophage RB69 sliding clamp has been solved. It has shown that the peptide binds to the sliding clamp at the same position as that of a replication inhibitor peptide bound to PCNA. This suggests that the replication inhibitor protein p21CIP1 competes with eukaryotic polymerases for the same binding pocket on the clamp.
