identifier: Pfam:PF14730
label: Domain of unknown function (DUF4468) with TBP-like fold
definition: >-
  This entry represents a domain found in a large family of (predicted) secreted proteins with unknown functions from human gut and oral cavity. In these proteins, the domain is typically found towards the N terminus, with a FMN-binding domain at the C terminus. Experimentally determined 3D structure of this domain shows a variant of a TATA box binding-like fold, but with no detectable sequence similarity to other proteins with this fold.
