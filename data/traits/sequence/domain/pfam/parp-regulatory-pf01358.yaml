identifier: Pfam:PF01358
label: Poly A polymerase regulatory subunit
definition: >-
  This family contains viral proteins that are bifunctional, acting as both an mRNA (nucleoside-2'-O-)-methyltransferase and a poly(A) polymerase processivity factor. The family also includes a number of uncharacterised eukaryotic sequences.
