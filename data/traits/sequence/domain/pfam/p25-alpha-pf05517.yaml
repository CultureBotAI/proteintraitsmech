identifier: Pfam:PF05517
label: 'p25-alpha '
definition: >-
  This family includes Tubulin polymerization-promoting proteins, formerly known as 25kDa proteins (TPPP/p25) that are phosphorylated by a Ser/Thr-Pro kinase. Proteins in this family, including TPP and TPP3 from human, are regulators of microtubule dynamics. TPP plays a key role in myelination by promoting elongation of the myelin sheath and acts as a microtubule nucleation factor in oligodendrocytes; it specifically localizes to the postsynaptic Golgi apparatus region, and promotes microtubule nucleation. TPP3 is required for embryo implantation.
