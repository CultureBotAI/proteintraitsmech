identifier: Pfam:PF28844
label: BamM C-terminal
definition: >-
  This entry represents the C-terminal region of BamM subunit ( ) of the β-barrel-assembly machinery so-called BAM. BamM is a cell surface lipoprotein which forms an extensive extracellular structure together with BamH. BamH and BamM interact with each other to form a long canopy structure on the extracellular side of the OM that extends from the rear of BamA across the BamA barrel. The C-terminal domain of BamM contains no well-defined secondary structural elements but is structured in part by the presence of seven metal ions, assigned by their co-ordination chemistry as calcium ions. This region is enriched with highly conserved aspartate residues. It shares similarity with the Thrombospondin type 3 calcium binding repeats.
