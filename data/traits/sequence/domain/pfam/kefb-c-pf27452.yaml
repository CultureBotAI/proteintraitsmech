identifier: Pfam:PF27452
label: Potassium efflux system KefB C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the glutathione-regulated potassium-efflux system protein KefB and KefC and similar proteins mainly found in proteobacteria. KefB is the pore-forming subunit of a potassium efflux system that confers protection against electrophiles and catalyses potassium/proton antiport. The protein contains multiple transmembrane helices in the N-terminal region ( ) followed by a cytoplasmic RCK N-terminal domain ( ) and the C-terminal domain ( ). KefB interacts with the regulatory subunit KefG and belongs to the monovalent cation:proton antiporter 2 family. The kefC gene encodes a potassium-efflux system that is regulated by glutathione metabolites. Full activation of KefC also requires a soluble regulatory protein, KefF. KefC belongs to the monovalent cation:proton antiporter 2(CPA2) transporter family TC 2.A.37 (http://www.tcdb.org/search/result.php?tc=2.A.37).
