identifier: Pfam:PF21614
label: Domain of unknown function (DUF6854)
definition: >-
  This domain is usually found in tandem in a group of uncharacterised bacterial proteins. It consists of a four-stranded β-sheet and two α-helices. It is related to proteins members of the 'dimeric α+β barrel' superfamily .
