identifier: Pfam:PF30075
label: Putative defensin-like protein 39
definition: >-
  This entry represents defensin 38/39/40/41 found in plants. Defensins are characterised by multiple disulphide bonds that provide structural stability. These proteins are secreted and are involved in plant defence responses against fungi. The proteins contain antimicrobial and fungicidal activities. Some members are precursor proteins with signal peptides for secretion to the extracellular region.
