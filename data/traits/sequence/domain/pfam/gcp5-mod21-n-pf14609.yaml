identifier: Pfam:PF14609
label: 'Gamma-Tubulin ring complex non-core subunit mod21, N-terminal '
definition: >-
  This entry represents the N-terminal domain of Mod21 from fission yeast, which interacts with Mozart1 (Mzt1) which modules gamma-tubulin ring complex (gamma-TRC) assembly and targeting, allowing gamma-TRC to be to be recruited to different microtubule-organising centres. Mod21 is a non-core subunit of the larger gamma-tubulin ring complex that effects microtubule nucleation from both centrosomal and non-centrosomal sites. This subunit, unlike GCP2 and GCP3, is not essential for viability in the fission yeast, and may not be expressed in very high concentrations. Fission yeast can form a large gamma-Tubulin complex C similar to that found in higher eukaryotes, and this complex is important for maintaining normal levels of microtubule nucleation in vivo.
