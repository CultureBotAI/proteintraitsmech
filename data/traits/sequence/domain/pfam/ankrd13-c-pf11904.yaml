identifier: Pfam:PF11904
label: ANKRD13 C-terminal
definition: >-
  This entry represents the C-terminal domain of ankyrin repeat domain-containing protein 13 (ANKRD13). At least 4 subtypes are known to exist, termed A-D. ANKRD13C has been experimentally characterised and acts as a chaperone for biogenesis and folding of the DP receptor for prostaglandin D2. ANKRD13A/B/D are ubiquitin-binding proteins that specifically recognise and bind Lys-63-linked ubiquitin. They positively regulate the internalisation of ligand-activated EGFR by binding to the Ub moiety of ubiquitinated EGFR at the cell membrane. This domain belongs to the LolA/B superfamily of lipoprotein sorting proteins.
