identifier: Pfam:PF20863
label: IcmR, middle region
definition: >-
  IcmR plays a role in the Dot/Icm translocase from Legionella pneumophila. This Type IVb secretion system (T4bSS) is responsible for the delivery of protein effectors to the host cell cytoplasm. The middle region of IcmR (this entry) binds to the N-terminal domain of IcmQ, which is essential for IcmQ ( ) to function correctly. The interacting domains form helical hairpins within a four-helix bundle that is stabilised by hydrophobic packing.
