identifier: Pfam:PF24160
label: Root UVB sensitive protein, C-terminal
definition: >-
  This domain is found at the C terminus of a group of root UVB sensitive plant proteins and their eukaryotic RUS homologues. It is predicted to adopt an α/β configuration. This domain is found associated with . This entry includes root UVB sensitive proteins and their homologues. In Arabidopsis thaliana, proteins in this family are involved in UVB-sensing and in early seedling morphogenesis and development. In plants, these proteins play a role in auxin-transport, plant growth and development and appears to be expressed by all cells in the plant as well as in plastids. The family has been shown to play a role in vitamin B6 photo-protection and homoeostasis in plants. In line with various literature findings describing this family in plants, it was proposed that these proteins may be directly involved in the transport of one or more forms of the vitamin B6.
