identifier: Pfam:PF07244
label: Surface antigen variable number repeat
definition: >-
  In Gram-negative bacteria, β-barrel proteins are integrated into the outer membrane by the β-barrel assembly machinery, with key components of the machinery being the Omp85 family members BamA and TamA. The BamA periplasmic domain is composed of five globular subdomains in tandem called POTRA motifs. They are key to BAM complex formation and interaction with the substrate β-barrel proteins. TamA has three periplasmic POTRA domains. Outer mebrane proteins with a variable number of POTRA motifs are also found in mitochondria and chloroplasts.
