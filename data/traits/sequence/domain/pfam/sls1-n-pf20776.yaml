identifier: Pfam:PF20776
label: SLS1 protein N-terminal domain
definition: >-
  This entry represents the N-terminal helical domain found in the yeast SLS1 protein. SLS1 is a fungal protein found bound to the mitochondrial inner-membrane. It reacts physically with fungal Kar2p to promote translocation across the endoplasmic-reticulum membrane. This action seems to be mediated via the promotion of the Sec63p-mediated activation of Kar2p's ATPase activity. This indicates that the Sls1p protein is a GrpE-like protein in the endoplasmic reticulum. In S.cerevisiae, the SLS1 gene (ScSLS1) is not essential but is also involved in ERAD and folding.
