identifier: Pfam:PF23014
label: Tiam1 second PH domain-like
definition: >-
  This entry represents the second PH domain found in TIAM1/2 proteins from human and its orthologues from Drosophila, SIF1/2. The TIAM family proteins are guanine nucleotide exchange factors (GEFs) that modulate the activity of RHO-like GTPases, linking extracellular signals to cytoskeletal dynamics. They are involved in various cellular processes, including cell adhesion, migration, and neurite outgrowth. TIAM family members activate GTPases such as RAC1 and CDC42, which are critical for actin cytoskeleton reorganisation, lamellipodial formation, and growth cone advancement in neurons. These proteins contribute to synaptic differentiation and are implicated in the development of the cerebral cortex and eye. The TIAM family is characterised by the presence of multiple domains, including PH domains, which are essential for membrane localisation and enhancing catalytic activity, and a TSS domain necessary for Rac1 activity and induction of neurite-like structures.
