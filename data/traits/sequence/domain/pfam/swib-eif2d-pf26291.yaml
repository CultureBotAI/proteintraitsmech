identifier: Pfam:PF26291
label: eIF2D, SWIB domain
definition: >-
  This SWIB domain is found in the animal eukaryotic translation reinitiation factor 2D (elF2D), its yeast homologue Translation machinery-associated protein 64 (TMA64) and similar eukaryotic sequences. This domain is unique to elF2D and is not observed in other translation initiation factors. This domain along with the PUA domain of elF2D stabilises the initiator tRNA conformation. The SWIB domain laterally binds to the acceptor stem via a patch of positively charged amino acids.
