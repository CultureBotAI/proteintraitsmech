identifier: Pfam:PF30612
label: PTTG1IP, N-terminal domain
definition: >-
  This entry represents the N-terminal of PTTG1IP (pituitary tumour-transforming gene 1 protein-interacting protein). PTTG1IP is a single-pass type I membrane protein found in mammals. PTTG1IP interacts with PTTG1 and may facilitate PTTG1 nuclear translocation. The protein is ubiquitously expressed and undergoes phosphorylation at tyrosine residues. This domain adopts a PSI-like fold.
