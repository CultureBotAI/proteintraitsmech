identifier: Pfam:PF17680
label: FlgO protein
definition: >-
  This entry represents a domain found in the FlgO protein. Mutation of this protein in Vibrio cholerae has been shown to reduce motility. FlgO is an outer membrane protein that localises throughout the membrane and not at the flagellar pole. Although FlgO and FlgP do not specifically localize to the flagellum, they are required for flagellar stability. Proteins in this family mostly contain an N-terminal lipoprotein attachment motif.
