identifier: Pfam:PF25375
label: Lin-15B-like domain
definition: >-
  This domain is found in a group of proteins from Caenorhabditis, including Protein lin-15A/B from Caenorhabditis elegans, synthetic multivulva class A/B proteins respectively that are required to repress the induction of vulval development. Protein lin-56, which also belongs to this group of proteins, is required for translation, stability and/or localisation of lin-15S. This domain is predicted to have a mainly α configuration.
