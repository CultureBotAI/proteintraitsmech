identifier: Pfam:PF24082
label: SPEF2 C-terminal domain
definition: >-
  This domain is found in the axoneme central apparatus (CA) associated proteins such as Chlamydomonas Central pair complex 1 (CPC1, ) and its mammalian orthologues Sperm flagellar protein 2 (SPEF2). CPC1 is located at C1 microtubule. Most of the distal components of the C1b projection bind CPC1 and its correct recruitment and positioning is critical to the formation of the C1b projection, and ciliary motility in Chlamydomonas and humans. CPC1 serves as the rachis of the entire C1b arm. This domain is predicted to fold into two EF-hand pairs that seem to lack the Ca2+-coordinating residues.
