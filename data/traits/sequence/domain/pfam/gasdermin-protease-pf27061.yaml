identifier: Pfam:PF27061
label: Bacterial gasdermin-associated protease
definition: >-
  This entry represents the N-terminal in Probable protease Gilli_2517. This protein is part of a family of bacterial proteases that specifically cleave bacterial gasdermins (bGSDMs). These proteases are typically found adjacent to bacterial gasdermin genes and function as dedicated enzymes for gasdermin activation. The protease cleaves the bGSDM precursor protein, releasing the pore-forming N-terminal moiety which integrates into the membrane and triggers cell death. This proteases appear to be involved in bacterial antiviral defence mechanisms, likely functioning as part of a programmed cell death response to bacteriophage infection. The protease-gasdermin system represents an ancient mechanism of cell death that predates the evolution of eukaryotic pyroptosis. Unlike their eukaryotic counterparts, co-expression of bacterial gasdermins with their cognate proteases is not toxic when expressed in E. coli, suggesting a regulated activation mechanism.
