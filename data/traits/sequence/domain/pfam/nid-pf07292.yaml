identifier: Pfam:PF07292
label: Nmi/IFP 35 domain (NID)
definition: >-
  This entry represents a domain of approximately 90 residues that is tandemly repeated within interferon-induced 35kDa protein (IFP 35) and the homologous N-myc-interactor (Nmi). This domain mediates Nmi-Nmi protein interactions and subcellular localisation. This domain is predicted to contain a region that is swapped between tandem of RRM domains in IFP 35, Nmi and closely related proteins containing the tandem. This entry corresponds to the sequence repeat in these proteins that in the structural models is swapped between the two RRM-like domains.
