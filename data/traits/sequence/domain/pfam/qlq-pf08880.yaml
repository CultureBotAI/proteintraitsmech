identifier: Pfam:PF08880
label: QLQ
definition: >-
  The QLQ domain is characterised by the conserved Gln-Leu-Gln residues. Another feature of this domain is the absolute conservation of bulky aromatic/hydrophobic and acidic amino acid residues such as Phe, Trp, Tyr, Leu, Glu, or their equivalents in terms of chemical and radial properties. The Pro residue is also absolutely conserved. These amino acid residues are critical for the function of the QLQ domain, probably for protein-protein interaction. Some proteins known to conatin a QLQ domain are listed below: Plant GROWTH-REGULATING FACTOR (GRF) proteins, putative transcription factors. Eukaryotic SWI2/SNF2, transcriptional coactivators.
