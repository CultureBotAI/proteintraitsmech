identifier: Pfam:PF29076
label: ERG29 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of ERG29, an essential protein involved in ergosterol biosynthesis in fungi. ERG29 regulates the activity of the iron-containing C4-methylsterol oxidase ERG25, which is part of the C-4 demethylation complex in the late steps of ergosterol biosynthesis. The protein is localised to the endoplasmic reticulum membrane and plays a crucial role in maintaining mitochondrial and plasma membrane integrity. Disruption of ERG29 causes lethality under aerobic growth conditions and affects sterol metabolism, leading to impaired Fe-S cluster synthesis. While the full-length ERG29 protein is essential for ergosterol biosynthesis, the specific function of this C-terminal domain remains to be determined.
