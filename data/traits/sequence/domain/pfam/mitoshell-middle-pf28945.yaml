identifier: Pfam:PF28945
label: Mitoshell middle domain
definition: >-
  This entry represents a middle domain in mitoshell proteins involved in male meiotic processes in insects. Mitoshell proteins are required for male meiotic cytokinesis through involvement in regulation of mitochondrial aggregation and fusion, astral spindle assembly and contractile ring formation. The specific function of this domain remains to be determined.
