identifier: Pfam:PF04295
label: D-galactarate dehydratase/Altronate hydrolase, second domain
definition: >-
  This entry represents the middle domain of D-galactarate dehydratase (GarD, ) and altronate dehydratase ( ). When purified, both enzymes are catalytically inactive in the absence of added Fe 2+ , Mn 2+ , and beta-mercaptoethanol. Synergistic activation of altronate hydrolase activity is seen in the presence of both iron and manganese ions, suggesting that the enzyme may have two ion binding sites. Mn 2+ appears to be part of the enzyme active centre, but the function of the single bound Fe 2+ ion is unknown. The hydratase has no Fe-S core. In the crystal structure, GarD forms dimers, each monomer consisting of three domains: the N-terminal β-clip SAF domain connected by a long linker to the second domain which contains three parallel β-strands surrounded by three α-helices and that serves as a dimerisation interface between monomers, and a C-terminal α/β domain with a novel topology resembling a Rossmann fold, with an unusual helix crossover. This entry represents the second domain and it interacts with the C-terminal domain from the second chain to form a dimerisation surface. This domain is also found in (2R)-sulfolactate sulfo-lyase subunit beta (suyB) ( ) from Chromohalobacter salexigens.
