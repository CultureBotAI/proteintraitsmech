identifier: Pfam:PF19334
label: Domain of unknown function (DUF5920)
definition: >-
  This entry represents a domain of unknown function found in the Telomerase protein component 1 (TEP1) from in animals. It contains an homology region to the Telomerase associated protein from Tetrahymena p80. TEP1 is a component of the telomerase ribonucleoprotein complex and is thought to be responsible for catalysing the addition of new telomeres to chromosomes. TEP1 is also a component of the vault particle, a cytoplasmic ribonucleoprotein complex, in which it is required for vault RNA stability and its association with the vault particle. This domain is localised between the TROVE ( ) and DUF4062 ( ) domains.
