identifier: Pfam:PF07824
label: Type III secretion chaperone domain
definition: >-
  Type III secretion chaperones are involved in delivering virulence effector proteins from bacterial pathogens directly into eukaryotic cells. The chaperones may prevent aggregation and degradation of their substrates, may target the effector to the secretion apparatus, and may ensure a secretion-component unfolded conformation of their specific substrate. One member of this family, SigE ( ) forms homodimers in crystal. The monomers have a novel fold with an α-β(3)-α-β(2)-α topology.
