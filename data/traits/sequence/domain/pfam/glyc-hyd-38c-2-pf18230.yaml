identifier: Pfam:PF18230
label: Glycosyl hydrolases family 38 C-terminal sub-domain
definition: >-
  This is a subdomain found in the C-terminal region of golgi alpha-mannosidase II present in Drosophila melanogaster. These proteins are important in glycoprotein processing and are thought to cleave mannosidic bonds through a double displacement mechanism involving a reaction intermediate. This subdomain is found only proteins from insects, following the glycosyl hydrolase family 38 C-terminal domain ( ).
