identifier: Pfam:PF16461
label: Lambda phage tail tube protein, TTP
definition: >-
  This entry represents the N-terminal region of the phage-tail-tube protein from a group of tailed bacteriophages and prophages from proteobacteria. Tail tube proteins (TTPs) polymerise with the assistance of the Tail-tip complex, a tape measure protein and two chaperones. Infectivity of host is delivered through the tube.
