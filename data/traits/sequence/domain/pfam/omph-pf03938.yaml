identifier: Pfam:PF03938
label: Outer membrane protein (OmpH-like)
definition: >-
  The 17kDa protein Skp (also known as OmpH) of Escherichia coli is a homotrimeric periplasmic chaperone for newly synthesised outer-membrane proteins, the X-ray structure of which has been reported at resolutions of 2.35 A and 2.30 A. Three hairpin-shaped α-helical extensions reach out by approximately 60 A from a trimerisation domain, which is composed of three intersubunit β-sheets that wind around a central axis. The α-helical extensions approach each other at their distal turns, resulting in a fold that resembles a 'three-pronged grasping forcep'. The overall shape of Skp is reminiscent of the cytosolic chaperone prefoldin, although it is based on a radically different topology. The peculiar architecture, with apparent plasticity of the prongs and distinct electrostatic and hydrophobic surface properties, supports the recently proposed biochemical mechanism of this chaperone: formation of a Skp(3)-Omp complex protects the outer membrane protein from aggregation during passage through the bacterial periplasm. The ability of Skp to prevent the aggregation of model substrates in vitro is independent of ATP. Skp can interact directly with membrane lipids and lipopolysaccharide. These interactions are needed for efficient Skp-assisted folding of membrane proteins. The Haemophilus influenzae member of the family, OMP26, is an outer membrane protein that shows significant potential as a vaccine candidate. It is not clear if this protein has undergone adaptive changes in H. influenzae so as to locate to the outer membrane, or if Skp proteins are to some extent peripherally associated with the outer membrane in all species.
