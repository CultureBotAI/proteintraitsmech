identifier: Pfam:PF26170
label: RNA-editing substrate-binding complex 5 protein
definition: >-
  This domain is found in the RNA-editing substrate-binding complex 5 protein (RESC5) from Trypanosoma brucei, a component of RESC which, together with RECC, forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfils gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogeneous assembly of approximately 18 proteins that enclose gRNAs and mRNAs. The RESC5 protein is a key component of RESC and contributes to stabilising gRNAs and facilitating their interaction with mRNAs during editing. This process involves remodelling events that expose editing sites to RECC for uridine insertion, deletion, or ligation. RESC5 adopts a dimethylarginine dimethylaminohydrolase-like (DDAH) fold. While DDAH enzymes typically hydrolyse methylated arginine residues, RESC5 lacks key catalytic residues necessary for this activity and does not bind DDAH substrates or products.
