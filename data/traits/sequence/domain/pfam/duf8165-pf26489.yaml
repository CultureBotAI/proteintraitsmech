identifier: Pfam:PF26489
label: Domain of unknown function (DUF8165)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins are predominantly found in the Halobacteria class, including genera such as Halorubrum, Natronomonas, and Halogeometricum. The domain is approximately 110-118 amino acids in length.
