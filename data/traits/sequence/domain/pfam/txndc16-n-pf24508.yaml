identifier: Pfam:PF24508
label: TXNDC16 N-terminal
definition: >-
  This entry represents the N-terminal domain of TXNDC16. This domain adopts a thioredoxin-like fold. TXNDC genes are members of the thioredoxin superfamily and were shown to play a role in redox homeostasis, protein folding, electron transfer, and also acting as cellular adapters. However, the function of TXDNC16 is still not clear. They have been identified as a meningioma-associated antigen.
