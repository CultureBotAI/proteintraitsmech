identifier: Pfam:PF29019
label: NBA1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of NBA1 (NAP1 and bud neck-associated protein 1) and related proteins found in ascomycetes. NBA1 localises to the bud neck and cytoplasm, assembling at the inner surface of the cell membrane and localising to the septin cortex prior to bud emergence. The C-terminal region is necessary for normal cellular distribution and bud neck targeting. NBA1 interacts with NAP1 and copurifies with ribosomes. The specific function of this C-terminal domain remains to be determined.
