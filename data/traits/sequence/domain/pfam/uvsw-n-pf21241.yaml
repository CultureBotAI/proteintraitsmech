identifier: Pfam:PF21241
label: DNA helicase UvsW, N-terminal
definition: >-
  This entry represents the small N-terminal α/β domain of the DNA helicase UvsW from bacteriophage T4, which consists of five β-strands and two α-helices. This domain is structurally homologous to the DNA-binding domain of the T4 transcription factor MotA, thus, it likely binds the nucleic acid substrate. Members of this group of proteins are found in tailed bacteriophages and prophages from some bacterial species.
