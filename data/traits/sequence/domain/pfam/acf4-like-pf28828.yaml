identifier: Pfam:PF28828
label: ACF4-like domain
definition: >-
  This entry represents ACF4 (Assembly-complementing factor 4) and related proteins from fungi. The prototype ACF4 from Saccharomyces cerevisiae is predicted to be involved in actin cytoskeleton organisation and biogenesis. The protein contains extensive disordered regions and shows similarity to topoisomerase I damage affecting proteins. ACF4 interacts with several proteins including LSB3, RVS167, and YSC84, and is subject to multiple phosphorylation events.
