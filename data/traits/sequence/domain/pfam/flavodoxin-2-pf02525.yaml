identifier: Pfam:PF02525
label: Flavodoxin-like fold
definition: >-
  This entry represents a domain with a flavodoxin-like fold. Proteins with this domain include bacterial and eukaryotic NAD(P)H dehydrogenase (quinone) . These enzymes catalyse the NAD(P)H-dependent two-electron reductions of quinones and protect cells against damage by free radicals and reactive oxygen species. This enzyme uses a FAD cofactor. The equation for this reaction is NAD(P)H + acceptor = NAD(P)(+) + reduced acceptor. This enzyme is also involved in the bioactivation of prodrugs used in chemotherapy. This domain is also found in acyl carrier protein phosphodiesterase . This enzyme converts holo-ACP to apo-ACP by hydrolytic cleavage of the phosphopantetheine residue from ACP.
