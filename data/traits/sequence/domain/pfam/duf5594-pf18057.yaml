identifier: Pfam:PF18057
label: Domain of unknown function (DUF5594)
definition: >-
  This domain was first discovered in BPSL1050, a highly immunoreactive protein found in Burkholderia pseudomallei. The domain's structure consists of three helical regions which pack onto an antiparallel β sheet, formed by four strands. The β sheet is solvent exposed on one side and packs tightly against the three helices on the other side, generating a network of hydrophobic and aromatic interactions that contribute to tight packing of the protein. It is thought that the small loop L1, the main loop L2, and part of helix α3 extending until Leu120 are the three main immunogenic sequences.
