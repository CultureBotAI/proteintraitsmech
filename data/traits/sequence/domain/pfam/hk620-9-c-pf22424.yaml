identifier: Pfam:PF22424
label: HK620, Tail spike protein, C-terminal
definition: >-
  This domain is found at the C-terminal end of Tail spike protein from Enterobacteria phage HK620 (9) . This domain adopts a β-barrel configuration. This domain is also found at the C-terminal of uncharacterised bacterial proteins.
