identifier: Pfam:PF28683
label: PAC middle domain
definition: >-
  This entry represents a domain found in the central region of PAC (Protein PALE CRESS) and related proteins found in plants. PAC is a chloroplast-localised protein required for differentiation of chloroplasts from proplastids or etioplasts and is involved in chloroplast mRNA processing and maturation. The protein contains RNA binding activity and is essential for proper leaf development and chloroplast organisation. This domain is found in the central region of PAC proteins. The specific function of this domain remains to be determined.
