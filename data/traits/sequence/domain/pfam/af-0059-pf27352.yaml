label: AF_0059 family
definition: >-
  This entry represents the AF_0059 family of uncharacterised proteins found exclusively in archaea. The family is found predominantly in Archaeoglobaceae, particularly Archaeoglobus, with additional members in candidate division MSBL1. The proteins are approximately 134 amino acids in length. The function of this protein family remains to be determined.
