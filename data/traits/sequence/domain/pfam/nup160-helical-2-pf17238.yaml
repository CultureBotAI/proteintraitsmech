identifier: Pfam:PF17238
label: NUP160, helical domain
definition: >-
  This entry represents an helical domain found in the central region of NUP160 from Arabidopsis, also known as SAR1. NUP160 is required for nuclear mRNA export and for disease resistance and for proper expression of factors responsible for the repression of auxin signalling. Together with SAR3, it is essential for ensuring proper chromatin condensation and meiotic repair of double-strand breaks (DSBs). Moreover, NUP160 is required for anchoring HOS1 (HIGH EXPRESSION OF OSMOTICALLY RESPONSIVE GENES 1) to the nuclear pore complex (NPC), an integrator to mount adequate stress responses. NUP160 and HOS1 may act in concert to promote tolerance to low-energy stress via the SnRK1 kinase.
