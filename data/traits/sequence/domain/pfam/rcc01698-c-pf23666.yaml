identifier: Pfam:PF23666
label: Rcc01698-like, C-terminal
definition: >-
  This domain is found in proteins mainly from alphaproteobacteria, such as Rcc01698 ( ) from Rhodobacter capsulatus and in some phage species. Alphaproteobacteria produce phage-like particles called gene transfer agents (GTAs) that mediate lateral gene exchange. Rcc01698 ( ) has been designated as megatron/g15 in, and described as a multidomain protein that forms the core of the RcGTA baseplate, together with the hub (Rcc01696, g13) proteins, which is decorated with tail fibres. This entry represents the fibre-binding domain.
