identifier: Pfam:PF21198
label: Set1/Ash2 histone methyltransferase complex subunit ASH2-like, WH
definition: >-
  This domain is found in Set1/Ash2 histone methyltransferase complex subunit ASH2 from humans (ASH2L, named after 'Absent, small, homeotic disks-2-like') and similar animal proteins. ASH2L is a non-catalytic component of the Set1/Ash2 histone methyltransferase (HMT) complex. Aberrant expression and recurrent recurrent mutations in components of this complex have been related to different diseases. This entry represents the winged-helix (WH) domain, which is found N-terminal to the SPRY domain ( ) in ASH2L. It binds directly to DNA and shows a compact α/β structure consisting of three α-helices and a curved three-stranded β-sheet.
