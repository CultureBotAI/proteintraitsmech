identifier: Pfam:PF18192
label: DNTTIP1 dimerisation domain
definition: >-
  This is the N-terminal domain of DNTTIP1, a protein that forms part of a novel histone deacetylase complex present in Homo sapiens. Histone deacetylase complexes comprise DNTTIP1, histone deacetylase (HDAC) and the repressor protein MIDEAS. The acetylation of histone tails plays a critical role in determining the accessibility of chromatin to transcriptional regulators and RNA polymerase complexes. This N-terminal domain is responsible for dimerization of histone deacetylase 1(HDAC1). The N-terminal domain also interacts and mediates the assembly of the HDAC1- MIDEAS complex.
