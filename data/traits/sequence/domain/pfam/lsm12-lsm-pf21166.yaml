identifier: Pfam:PF21166
label: LSM12, LSM domain
definition: >-
  This is the LSM domain from the eukaryotic protein LSM12, which binds Nicotinic acid adenine dinucleotide phosphate (NAADP) and mediates association with the endolysosomaltwo-pore channel. LSM12 confers NAADP sensitivity to the TPCs by acting as TPC accessory protein necessary for NAADP-evoked Ca2 release. This proteins consist of an N-terminal LSM domain and an anticodon-binding domain (AD, ) at the C terminus.
