identifier: Pfam:PF08345
label: Flagellar M-ring protein C-terminal
definition: >-
  This is the RBM3/βcollar domain found in bacterial flagellar M-ring (FliF) proteins. The RBM3 domain has a canonical αββαβ topology. It is formed by two disparate stretches of sequence, with a long insertion between two of the predicted β-strands that corresponds to the β-collar.
