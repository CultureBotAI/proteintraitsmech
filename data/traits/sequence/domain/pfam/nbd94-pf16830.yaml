identifier: Pfam:PF16830
label: Nucleotide-Binding Domain 94 of RH
definition: >-
  This entry represents a domain found in Reticulocyte-binding protein 2b (RBP2b), one of the reticulocyte binding protein homologue family members or RH proteins expressed by the malaria parasite, and related sequences. RH proteins recognise erythrocytes and are important in virulence. This domain has been shown to exhibit selective binding to ATP and ADP. Binding of ATP or ADP induces nucleotide-dependent structural changes in the C-terminal hinge-region of NBD94 that directly impact on the ability of the RH to bind to the red blood cells.
