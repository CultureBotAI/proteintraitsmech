identifier: InterPro:IPR018148
label: Methylglyoxal synthase, active site
definition: >-
  Methylglyoxal synthase (MGS) catalyses the conversion of dihydroxyacetone phosphate (DHAP) to methylglyoxal and phosphate: Glycerone phosphate = methylglyoxal + phosphate The first part of the catalytic mechanism is believed to be similar to TIM (triosephosphate isomerase) in that both enzymes utilise DHAP to form an ene-diolate phosphate intermediate. In MGS, the second catalytic step is characterised by the elimination of phosphate and collapse of the enediolate to form methylglyoxal instead of reprotonation to form the isomer glyceraldehyde 3-phosphate, as in TIM. This is the first reaction in the methylglyoxal bypass of the Embden-Myerhoff glycolytic pathway and is believed to provide physiological benefits under non-ideal growth conditions in bacteria. MGS is a small protein of about 13 to 17kDa. An aspartate residue is involved in the catalytic mechanism. This entry represents a short conserved region that contains an aspartate residue involved in catalytic activty.
