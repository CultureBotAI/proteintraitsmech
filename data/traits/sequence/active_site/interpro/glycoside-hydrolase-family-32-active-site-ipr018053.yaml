identifier: InterPro:IPR018053
label: Glycoside hydrolase, family 32, active site
definition: >-
  It has been shown that the following glycosyl hydrolases can be classified into a single family on the basis of sequence similarities: Inulinase (or inulase) from the fungi Kluyveromyces marxianus (Yeast) (Candida kefyr). Beta-fructofuranosidase, commonly known as invertase in fungi and plants and as sucrase in bacteria (gene sacA or scrB). Raffinose invertase (gene rafD) from Escherichia coli raffinose plasmid pRSD2. Levanase (gene sacC) from Bacillus subtilis. One of the conserved regions in these enzymes is located in the N-terminal section and contains an aspartic acid residue which has been shown, in yeast invertase to be important for the catalytic mechanism.
