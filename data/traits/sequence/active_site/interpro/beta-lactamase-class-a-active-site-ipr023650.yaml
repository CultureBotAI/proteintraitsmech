identifier: InterPro:IPR023650
label: "Beta-lactamase, class-A active site"
definition: >-
  This entry represents a short region that contains the active site serine residue in the class A beta-lactamases that belong to MEROPS peptidase family S11 (D-Ala-D-Ala carboxypeptidase A family, clan SE). Beta-lactamase catalyses the opening and hydrolysis of the beta-lactam ring of beta-lactam antibiotics such as penicillins and cephalosporins. There are four groups, classed A, B, C and D according to sequence, substrate specificity, and kinetic behaviour. Class A (penicillinase-type) is the most common. The genes for class A beta-lactamases are widely distributed in bacteria, frequently located on transmissible plasmids in Gram-negative organisms, although an equivalent chromosomal gene has been found in a few species. Class A, C and D beta-lactamases are serine-utilising hydrolases, while class B enzymes utilise a catalytic zinc centre instead. The 3 classes of serine beta-lactamase are evolutionarily related and belong to a superfamily that also includes DD-peptidases and other penicillin-binding proteins. All these proteins contain an S-x-x-K motif, the Ser being the active site residue. Although clearly related, however, the sequences of the 3 classes of serine beta-lactamases vary considerably outside the active site. This entry represents the Group 2 beta-lactamases, which correspond to the penicillinases and cephalosporinases, which are inhibited by clavulanic acid. They corresponding to the molecular classes A and D reflecting the original TEM and SHV genes. However, because of the increasing number of TEM and SHV derived beta-lactamases, they have been divided into two subclasses, 2a and 2b: The 2a subgroup contains just penicillinases. The 2b subgroup contains broad spectrum beta-lactamases, meaning that they are capable of inactivating penicillins and cep…
