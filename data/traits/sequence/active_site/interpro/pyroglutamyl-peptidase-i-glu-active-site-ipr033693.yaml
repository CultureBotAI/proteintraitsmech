identifier: InterPro:IPR033693
label: "Pyroglutamyl peptidase I, Glu active site"
definition: >-
  Pyroglutamyl peptidase I ( ; MEROPS identifiers C15.001 (prokaryote) and C15.010 (chordate)) (also known as pyrrolidone-carboxylate peptidase, PYRase) is the enzyme that selectively removes pyroglutamate (pGlu) from the N terminus of proteins and peptides. PGP-I is widely found in bacteria, plants and animals. In bacteria and archebacteria PYRase (gene pcp) is a protein of 22-24kDa. It is a cysteine protease with a Cys-His-Glu catalytic triad. This entry represents the signature around the glutamate active site residue.
