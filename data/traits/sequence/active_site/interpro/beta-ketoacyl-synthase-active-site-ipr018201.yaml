identifier: InterPro:IPR018201
label: Beta-ketoacyl synthase, active site
definition: >-
  This entry represents the active site of beta-ketoacyl synthases from bacteria and eukaryotes. Fatty acid synthases (FASs) and polyketide synthases (PKSs) are closely related and have a common evolutionary history. FASs and PKSs share a similar enzymatic domain structure in which acyl transferase (AT), ketosynthase (KS) and an acyl carrier protein (ACP) form the core structure for condensation of acyl units, and are essential for both PKSs and FASs. Beta-ketoacyl-ACP synthase (EC 2.3.1.41) (KAS, also known as 3-oxoacyl synthase or ketoacyl synthase, KS) is the enzyme that catalyses the condensation of malonyl-ACP with the growing fatty acid chain. The condensation reaction is a two step process: the acyl component of an activated acyl primer is transferred to a cysteine residue of the enzyme and is then condensed with an activated malonyl donor with the concomitant release of carbon dioxide. KASs fall into five families separated by their characteristic primary structures, each having members with the same catalytic residues, mechanisms, and tertiary structures. KS3, a very large family, is composed of bacterial and eukaryotic 3-ketoacyl-ACP synthases I and II, often found in multidomain fatty acid and polyketide synthases.
