identifier: InterPro:IPR022398
label: "Peptidase S8, subtilisin, His-active site"
definition: >-
  This entry represents the conserved sequence around the His active site of Subtilisin-like proteases. Subtilases are an extensive family of serine proteases belonging to the MEROPS peptidase family S8 (subtilisin, clan SB). Members of this family have a catalytic triad in the order Asp, His and Ser in the sequence, which is a different order to that of families S1, S9 and S10. The catalytic activity is provided by a charge relay system similar to that of the trypsin family of serine proteases but which evolved by independent convergent evolution. The sequence around the residues involved in the catalytic triad (Asp, Ser and His) are completely different from that of the analogous residues in the trypsin serine proteases and can be used as signatures specific to that category of proteases. If a protein includes at least two of the three active site signatures, the probability of it being a serine protease from the subtilase family is 100%.
