identifier: InterPro:IPR008272
label: 4-hydroxybenzoyl-CoA thioesterase, active site
definition: >-
  4-hydroxybenzoyl-CoA thioesterase is an enzyme from Pseudomonas CBS-3, a soil-dwelling microbe that survives on 4-chlorobenzoate as its sole carbon source. This enzyme catalyses the last of the three steps in the pathway from 4-chlorobenzoate to hydroxybenzoate, the cleavage of the thioester bond of 4-hydroxybenzoyl-CoA to form hydroxybenzoate. 4-hydroxybenzoyl-CoA + H 2 O = 4-hydroxybenzoate + CoA 4-hydroxybenzoyl-CoA thioesterase is a protein of 141 amino-acid residues that assemble as an homotetramer. An aspartate in the N-terminal domain is thought to participate in the catalytic mechanism. This enzyme is evolutionary related to a number of uncharacterised proteins. This signature spans the sequence which contains the active site aspartate residue.
