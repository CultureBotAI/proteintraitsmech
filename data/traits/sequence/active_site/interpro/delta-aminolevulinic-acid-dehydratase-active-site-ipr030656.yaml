identifier: InterPro:IPR030656
label: "Delta-aminolevulinic acid dehydratase, active site"
definition: >-
  Delta-aminolevulinic acid dehydratase (ALAD) or porphobilinogen synthase catalyses the second step in the biosynthesis of heme, the condensation of two molecules of 5-aminolevulinate to form porphobilinogen. The enzyme is an oligomer composed of eight identical subunits. Each of the subunits binds an atom of zinc or of magnesium (in plants). A lysine has been implicated in the catalytic mechanism. The sequence of the region in the vicinity of the active site residue is conserved in ALAD from various prokaryotic and eukaryotic species.
