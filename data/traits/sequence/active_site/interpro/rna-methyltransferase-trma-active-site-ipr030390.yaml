identifier: InterPro:IPR030390
label: "RNA methyltransferase TrmA, active site"
definition: >-
  In Escherichia coli, the trmA protein is a tRNA (uracil-5-)-methyltransferase that catalyses the S-adenosylmethionine dependent methylation of U54 in all tRNAs. Orthologues of trmA are found in many eubacterial species. A number of uncharacterised homologues of trmA have been found: Escherichia coli hypothetical protein ygcA and HI0333, the corresponding Haemophilus influenzae protein. Haemophilus influenzae hypothetical protein HI0958. Chlamydia trachomatis protein HOM1. Fission yeast hypothetical protein SpAC4G8.07c. It is probable that ygcA/HI0333 and HI0958 are responsible for the methylation of U747 and U1939 in 23S rRNA. In trmA, a cysteine is known to participate in the catalytic mechanism by forming a covalent adduct to C6 of uracil. This entry represents a conserved region that includes the active site cysteine.
