identifier: InterPro:IPR018508
label: 3-dehydroquinate dehydratase, active site
definition: >-
  3-dehydroquinate dehydratase, or dehydroquinase, catalyzes the conversion of 3-dehydroquinate into 3-dehydroshikimate. It is the third step in the shikimate pathway for the biosynthesis of aromatic amino acids from chorismate. Two classes of dehydroquinases exist, known as types I and II. The best studied type I enzyme is from Escherichia coli (gene aroD) and related bacteria where it is a homodimeric protein. In fungi, dehydroquinase is part of a multifunctional enzyme which catalyzes five consecutive steps in the shikimate pathway. This conserved signature pattern contains the histidine that is involved in the catalytic mechanism.
