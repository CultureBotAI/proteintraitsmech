identifier: InterPro:IPR033131
label: "Pectinesterase, Asp active site"
definition: >-
  Pectinesterase (pectin methylesterase) catalyses the hydrolysis of pectin into pectate and methanol. In plants, it plays an important role in cell wall metabolism during fruit ripening, cell wall extension and during pollen germination. In plant bacterial pathogens such as Erwinia carotovora and in fungal pathogens such as Aspergillus niger, pectinesterase is involved in maceration and soft-rotting of plant tissue. Plant pectinesterases are regulated by pectinesterase inhibitors, which are ineffective against microbial enzymes.
