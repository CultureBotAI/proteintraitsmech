identifier: InterPro:IPR022470
label: 6-pyruvoyl tetrahydropterin synthase, cysteine active site
definition: >-
  6-pyruvoyl tetrahydropterin synthase (PTPS) catalyzes the second step in the biosynthesis of tetrahydrobiopterin (BH4); a complex rearrangement of 7,8-dihydroneopterin triphosphate into 6-pyruvoyl tetrahydropterin. PTPS is a small protein of about 145 residues and forms a homooligomeric complex of two trimers assembled in a head-to-head fashion. It binds a magnesium atom which is ligated by three histidine residues. Three residues are implicated in the catalytic mechanism: a cysteine, a histidine and a glutamate. This entry contains the active site cysteine and two of the three magnesium ligands.
