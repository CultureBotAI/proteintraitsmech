identifier: InterPro:IPR018129
label: "Phosphoenolpyruvate carboxylase, Lys active site"
definition: >-
  Phosphoenolpyruvate carboxylase (PEPcase) catalyzes the irreversible β-carboxylation of phosphoenolpyruvate by bicarbonate to yield oxaloacetate and phosphate. The enzyme is found in all plants and in a variety of microorganisms. A histidine and a lysine have been implicated in the catalytic mechanism of this enzyme; the regions around these active site residues are highly conserved in PEPcase from various plants, bacteria and cyanobacteria. This entry represents a conserved region containing the lysine active site.
