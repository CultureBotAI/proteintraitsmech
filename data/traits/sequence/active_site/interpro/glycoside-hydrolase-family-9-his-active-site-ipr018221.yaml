identifier: InterPro:IPR018221
label: "Glycoside hydrolase family 9, His active site"
definition: >-
  The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases, cellobiohydrolases (exoglucanases), or xylanases. Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family E or as the glycosyl hydrolases family 9.
