identifier: InterPro:IPR010853
label: DC-EC
definition: >-
  This repeat is found in the CagY proteins - part of the CAG pathogenicity island - and involved in delivery of the protein CagA into host cells. It forms part of a surface needle structure, and this repeat may form an α-helical rod structure. The repeat contains a conserved -DC- and -EC-, which are regularly spaced in the alignment.
