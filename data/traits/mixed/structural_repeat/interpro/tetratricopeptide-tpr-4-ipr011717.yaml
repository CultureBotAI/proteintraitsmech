label: "Tetratricopeptide TPR-4"
definition: >-
  This entry includes tetratricopeptide-like repeats not detected by the , and models. The tetratricopeptide repeat (TPR) motif is a protein-protein interaction module found in multiple copies in a number of functionally different proteins that facilitates specific interactions with a partner protein(s).
