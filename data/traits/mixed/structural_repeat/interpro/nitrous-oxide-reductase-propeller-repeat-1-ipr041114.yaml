identifier: InterPro:IPR041114
label: "Nitrous oxide reductase, propeller repeat 1"
definition: >-
  Nitrous oxide reductases usually contain a seven-bladed β-propeller domain with external short α-helices. This entry represents a single blade of the propeller, with imperfect α-helix, usually at the C terminus of the repeat region.
