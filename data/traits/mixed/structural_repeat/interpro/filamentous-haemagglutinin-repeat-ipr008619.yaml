identifier: InterPro:IPR008619
label: "Filamentous haemagglutinin repeat"
definition: >-
  This highly divergent repeat occurs in number of filamentous haemagglutinin (FHA) proteins implicated in cell aggregation. Filamentous haemagglutinin from Bordetella pertussis, the infectious agent in childhood whooping cough, expresses filamentous haemagglutinin as a surface-exposed and secreted protein that acts as a major virulence attachment factor, functioning as both a primary adhesin and an immunomodulator to bind the bacterial to cells of the respiratory epithelium. The FHA molecule has a globular head that consists of two domains: a shaft and a flexible tail. Its sequence contains two regions of tandem 19-residue repeats, where the repeat motif consists of short β-helical strands separated by β-turns.
