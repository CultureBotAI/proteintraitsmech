identifier: InterPro:IPR029317
label: "KRBA1 family repeat"
definition: >-
  KRBA1 is a short repeating motif found in mammalian proteins. It is characterised by a highly conserved sequence of residues, SSPLxxLxxCLK. The function of the repeat, which can be present in up to seven copies, is unknown as is the function of the full length proteins.
