identifier: InterPro:IPR006212
label: "Furin-like repeat"
definition: >-
  The furin-like cysteine rich region has been found in a variety of proteins from eukaryotes that are involved in the mechanism of signal transduction by receptor tyrosine kinases, which involves receptor aggregation. This entry includes Epidermal growth factor receptor, Receptor tyrosine-protein kinase erbB-2 and related proteins.
