identifier: InterPro:IPR027606
label: "Surface protein repeat Ser-Ala-175"
definition: >-
  This serine and alanine-rich surface protein repeat, about 175 amino acids long, occurs up to nine times in surface proteins of some Lacticaseibacillus strains. Members proteins have the N-terminal variant signal sequence described by and C-terminal LPXTG signals for surface attachment by sortase.
