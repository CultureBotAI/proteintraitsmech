identifier: InterPro:IPR011889
label: "Bacterial surface protein 26-residue repeat"
definition: >-
  This entry describes a tandem peptide repeat sequence of 25 or 26 residues, found in predicted surface proteins (often lipoproteins) mainly from Listeria monocytogenes, Listeria innocua, Enterococcus faecalis (Streptococcus faecalis), Lactobacillus plantarum, Mycoplasma spp., Helicobacter hepaticus, and other species. DNA sequences describing the protein repeats are described as having dyad symmetry, lead to the name PARCEL (Palindromic Amphipathic Repeat Coding ELement).
definition_source: InterPro
trait_axis: SEQUENCE_STRUCTURE
trait_category: MIXED_STRUCTURAL_REPEAT
term_kind: CLASS
