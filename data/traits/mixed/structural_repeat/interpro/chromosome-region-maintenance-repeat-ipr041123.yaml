identifier: InterPro:IPR041123
label: "Chromosome region maintenance repeat"
definition: >-
  Chromosome region maintenance 1 or exportin 1 mediates the nuclear transport of proteins bearing a leucin-rich nuclear export signal (NES). It contains helical repeats that are structurally similar to HEAT repeats, but share little sequence similarity with them. N-terminal, C-terminal and central repeats show slightly different structural arrangements, with N- and C- termini repeats interacting with each other. This entry represents the central repeats of CRM1.
