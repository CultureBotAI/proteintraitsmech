identifier: InterPro:IPR030930
label: "Adhesin of bacterial autotransporter system"
definition: >-
  Adhesin involved in diffuse adherence (AIDA-I) belongs to the group of monomeric autotransporters (AT) and is an important virulence factor that mediates auto-aggregation, biofilm formation, adhesion and invasion into host cells. The AIDA repeat is found on bacterial autotransporter proteins. As the repeat is short and occurs multiple times, it is likely to be the region of the transporter that acts as the stalk between the β-barrel inserted into the membrane and the N-terminal head domain. These repeats contain a 13-residue strand-loop-strand motif which has been been identified as glycosylation sites.
