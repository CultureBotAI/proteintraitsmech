identifier: InterPro:IPR027618
label: "Beta-propeller repeat, Msarc-type"
definition: >-
  This entry describes a repeat region found mostly in cell surface proteins of various methanogens. Methanosarcina barkeri, for example, has twenty such proteins, often with either seven or fourteen repeats. These repeats resemble the β-propeller repeats of the TolB periplasmic protein of Gram-negative bacteria, part of a complex associated with various functions including biopolymer transport (see ).
