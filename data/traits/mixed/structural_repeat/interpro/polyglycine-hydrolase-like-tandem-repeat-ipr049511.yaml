identifier: InterPro:IPR049511
label: "Polyglycine hydrolase-like, tandem repeat"
definition: >-
  Polyglycine hydrolase from Fusarium vanettenii is a serine-type endopeptidase that cleaves Gly-Gly bonds in the polyglycine linker of host plant class IV chitinases to disrupt their chitin-binding, and thereby plays a role in lowering the defence responses of the host to fungi. It is formed by two distinct domains that are connected by a linker. The N-terminal domain is comprised of five nearly identical structural repeats consisting of three antiparallel β-strands and an α-helix (this entry represents these structural repeats), while the C-terminal is represented by. In addition to fungal sequences, these structural repeats are also found in proteins from worms, rotifers and a wide variety of bacteria.
