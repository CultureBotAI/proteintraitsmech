identifier: InterPro:IPR005560
label: "Uncharacterized cysteine-rich protein YhjQ/Copper storage protein-like"
definition: >-
  This domain is found in a number of copper storage proteins. It contains a repeat of highly conserved cysteines. The cysteines mostly follow a C-X(2)-C-X(3)-C-X(2)-C-X(3) pattern, though they often appear at other positions in the repeat as well. These residues are involved in copper binding. This domain folds into a four helical up-and-down bundle.
