identifier: InterPro:IPR006624
label: "Beta-propeller repeat TECPR"
definition: >-
  Tectonins I and II are two dominant proteins in the nuclei and nuclear matrix from plasmodia of Physarum polycephalum (Slime mold) which encode 217 and 353 amino acids, respectively. Tectonin I is homologous to the C-terminal two-thirds of tectonin II. Both proteins contain six tandem repeats that are each 33-37 amino acids in length and define a new consensus sequence. Homologous repeats are found in L-6, a bacterial lipopolysaccharide-binding lectin from horseshoe crab hemocytes. The repetitive sequences of the tectonins and L-6 are reminiscent of the WD repeats of the beta-subunit of G proteins, suggesting that they form β-propeller domains. The tectonins may be lectins that function as part of a transmembrane signalling complex during phagocytosis. It has been demonstrated that tectonin β-propeller repeat-containing protein 1 (TECPR1) has a critical function during autophagosome maturation and autophagosome-lysosome fusion.
