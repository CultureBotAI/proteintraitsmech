identifier: InterPro:IPR048411
label: "Huntingtin, N-terminal, HEAT repeats 1"
definition: >-
  This entry represents the first region of HEAT repeats from Huntingtin (Htt), which is part of the N-terminal HEAT domain. It is separated from the rest of the domain ( ) by an unstructured region. Htt is expressed in many tissues with various expression levels and is involved in a number of cellular functions. However, its exact function is not yet clear. An abnormal polyglutamine (polyQ) expansion between 1-90aa at the very N-terminal causes Huntington's disease (HD), a progressive autosomal-dominant neurodegenerative disease characterised by an uncontrolled motor movement known as chorea, cognitive disorder and depression. Htt consists of multiple HEAT repeats organised in N-terminal, bridge and C-terminal domains, which function as a scaffold that mediated interactions with binding partners.
