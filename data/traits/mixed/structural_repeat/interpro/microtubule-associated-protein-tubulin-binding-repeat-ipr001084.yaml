identifier: InterPro:IPR001084
label: "Microtubule associated protein, tubulin-binding repeat"
definition: >-
  Microtubules consist of tubulins as well as a group of additional proteins collectively known as the Microtubule Associated Proteins (MAP). MAP's have been classified into two classes: high molecular weight MAP's and Tau protein. The Tau proteins promote microtubule assembly and stabilise microtubules. The C-terminal region of these proteins contains three or four tandem repeats of about thirty amino acid residues which is implicated in tubulin binding and which seem to have a stiffening effect on microtubules.
