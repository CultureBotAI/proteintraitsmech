identifier: InterPro:IPR027578
label: "Proline-rich tail region repeat"
definition: >-
  This entry describes a proline-rich tandem repeat of about 24 residues found in C-terminal regions of Gram-positive surface proteins with LPXTG sequences for processing and cell surface attachment by sortase.
