identifier: InterPro:IPR048518
label: "Ice-binding protein, beta roll"
definition: >-
  The grass Lolium perenne produces an ice-binding protein (LpIBP) that helps this perennial tolerate freezing by inhibiting the recrystallization of ice. Ice-binding proteins (IBPs) are also produced by freeze-avoiding organisms to halt the growth of ice and are better known as antifreeze proteins (AFPs). The ice-binding site (IBS) is formed by a flat β-sheet on one surface of the β-roll. This region folds as a left-handed β-helix. Each of the eight beta-helical coils is composed of two seven-residue tandem repeats with a consensus sequence XXNXVXG where X is a solvent-exposed residue, typically with a polar side chain.
