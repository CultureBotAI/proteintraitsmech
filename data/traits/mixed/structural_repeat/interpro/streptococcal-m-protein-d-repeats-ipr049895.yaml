identifier: InterPro:IPR049895
label: "Streptococcal M protein, D repeats"
definition: >-
  This entry represents the entire D repeats found in the streptococcal M protein family. M proteins belong to a family of fibrous streptococcal surface proteins that interact with the immune system of the host and represent major virulence factors due to their antiphagocytic activities. These antiphagocytic properties are explained by binding to a variety of different host proteins, with the most prominent one being fibrinogen. Another hypothesis relies on the M-protein-mediated formation of large bacterial aggregates, thereby inhibiting phagocytic engulfment. All M proteins share a common framework that includes a conserved signal peptide, a hypervariable amino terminus, a less variable central domain, and a highly conserved C terminus. A number of repeat sequences (A, B, C and D repeats) follow the hypervariable region. Sequence conservation increases from the A repeats to D repeats. The size and number of the A and B repeats varies between different M proteins. Most M proteins do not possess any A repeats. The C repeats are present in all M proteins, although the number of repeat sequences varies from two (M6) to four (M12). The amino acid identity in the C repeat region increases from C1 to C3. The conserved repetitive C units are responsible for several biological activities of M and M-like proteins. The C units are involved in the binding of human serum albumin (HSA) to the M protein. Furthermore, the binding of complement factor H and streptococcal adherence to keratinocytes in human skin are mediated by the C units. Region D is composed of four seven-residue "quasirepeats". The M molecules exist as stable dimers the molecules are almost entirely α-helical. A common periodicity in the placement of nonpolar or hydrophobic residues is responsible for maintaining th…
