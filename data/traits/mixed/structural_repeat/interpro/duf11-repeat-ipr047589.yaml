identifier: InterPro:IPR047589
label: "DUF11 repeat"
definition: >-
  This entry represents a conserved repeat of about 53 amino acids that is part of the DUF11 domain ( ). Examples containing this repeat include a 132-residue region found repeated in three of the five longest proteins of Bacillus anthracis, a 131-residue repeat in a cell wall-anchored protein of Enterococcus faecalis (Streptococcus faecalis), and a 120-residue repeat in Methanobacterium sp. A similar region is found in some Chlamydia trachomatis outer membrane proteins. In Methanothermobacter sp. CaT2, a DUF11-containing repeat hypothetical protein encoded by MTCT_1020, plays a key role as a membrane-bound adhesion protein in the aggregation of CaT2. DUF11-containing repeat domains are not involved in aggregation, but may be important for stabilizing the surface cell wall structures of CaT2.
