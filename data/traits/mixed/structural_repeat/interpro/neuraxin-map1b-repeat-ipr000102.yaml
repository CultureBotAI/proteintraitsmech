identifier: InterPro:IPR000102
label: "Neuraxin/MAP1B repeat"
definition: >-
  In microtubule-associated protein 1B (MAP1B) the basic region containing the KKEE and KKEVI motifs is responsible for the interaction between MAP1B and microtubules in vivo . This region bears no sequence relationship to the microtubule binding domains of kinesin, MAP2, or tau. Neuraxin is a putative structural protein of the rat central nervous system that is immunologically related to microtubule-associated protein 5 (MAP5). Neuraxin may be implicated in neuronal membrane-microtubule interactions. Both proteins contain a region that consists of 12 tandem repeats of a 17 residues motif.
