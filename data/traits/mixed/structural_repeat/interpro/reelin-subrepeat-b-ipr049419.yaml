identifier: InterPro:IPR049419
label: "Reelin, subrepeat B"
definition: >-
  Reelin is an extracellular matrix serine protease that plays a role in layering of neurons in the cerebral cortex and cerebellum. It regulates microtubule function in neurons and neuronal migration. It binds to the extracellular domains of lipoprotein receptors VLDLR and LRP8/APOER2 which induces tyrosine phosphorylation of DAB1 and modulation of TAU phosphorylation. Reelin contains 8 tandemly repeated units, each of which is composed of two highly similar subrepeats of 150-190 amino acids (subrepeats A and B) that flank a central EGF domain. This entry represents subrepeat B (also referred to R3B) which adopts a β-jelly roll fold similar to bacterial xylanase. They contain the signature Asp-box motif.
