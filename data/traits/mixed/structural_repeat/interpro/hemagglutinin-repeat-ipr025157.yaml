identifier: InterPro:IPR025157
label: "Hemagglutinin repeat"
definition: >-
  This hemagglutinin repeat is found in hemolysins and filamentous hemagglutinin. Bacterial hemolysins are exotoxins that attack blood cell membranes and cause cell rupture by mechanisms not clearly defined. Filamentous hemagglutinins have a role in host-cell binding and infection.
