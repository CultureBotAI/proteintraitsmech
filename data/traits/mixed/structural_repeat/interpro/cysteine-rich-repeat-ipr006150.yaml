identifier: InterPro:IPR006150
label: "Cysteine-rich repeat"
definition: >-
  This repeat, originally named as Worm-specific repeat type 1, is found in several Caenorhabditis elegans proteins, as well as some other eukaryotes. The region contains several conserved cysteines that probably form disulphide bridges and is often found associated with kunitz domains that may function as serine peptidase inhibitors; these belong to MEROPS peptidase inhibitor family I2.
