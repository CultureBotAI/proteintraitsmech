identifier: InterPro:IPR008164
label: "Repeat of unknown function XGLTT"
definition: >-
  This short repeat of unknown function is found in one or multiple copies in a group of uncharacterised eukaryotic and bacterial proteins. The repeat is five residues long and consists of XGLTT where X can be any amino acid.
