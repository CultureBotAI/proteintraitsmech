identifier: InterPro:IPR057941
label: "Transportin-3/Importin-13, second TPR domain"
definition: >-
  This entry represents the second TPR domain found in Transportin-3 (TNPO3) from animals, as well as orthologues MTR10 and uncharacterised protein YNR7 from yeast and MOS14 from plant. This entry also includes Importin-13 (IPO3) from animals. This domain is involved in the binding to the globular Ran protein in TNOP3. In IPO13, this domain is involved in the protein interaction with Ubc9 for nuclear import and with eIF1A for nuclear import. These proteins are involved in transport of target proteins into the nucleus. TNPO3 mediates the nuclear import of splicing factor serine/arginine (SR) proteins, such as RBM4, SFRS1 and SFRS2, by recognising phosphorylated SR domains.
