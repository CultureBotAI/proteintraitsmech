identifier: InterPro:IPR058093
label: "LA_2272-like repeat"
definition: >-
  This entry represents a 15-amino acid repeat. Numbers of repeats in proteins vary. Notable surface-exposed proteins with this repeat domain include lipoproteins LA_2272 (Q8F3X7) and LA_2273 (Q8F3X6) from Leptospira interrogans and VC2662 (Q9KNR9) from Vibrio cholerae.
