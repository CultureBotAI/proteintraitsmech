identifier: InterPro:IPR047354
label: "Scm-like with four MBT domains protein 2, third MBT repeat"
definition: >-
  This entry represents the third MBT repeat of SFMBT2, which does not contain a semi-aromatic cage and may not bind methylated lysine residues. Scm-like with four MBT domains protein 2 (SFMBT2) is a transcriptional repressor of the HOXB13 gene. It is required for trophoblast maintenance and placenta development. It also negatively regulates cell migration and invasion in prostate cancer cells. SFMBT2 has been identified as a novel regulator of SOX9 expression in human chondrocytes, in which decreased levels of SFMBT2 contribute to the catabolic phenotype of chondrocytes. SFMBT2 is negatively regulated in osteoarthritis cartilage. SFMBT2 contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognises methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine.
