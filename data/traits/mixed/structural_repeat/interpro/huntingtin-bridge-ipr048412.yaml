identifier: InterPro:IPR048412
label: "Huntingtin, bridge"
definition: >-
  Huntingtin (HTT) is expressed in many tissues, with various expression levels and is involved in a number of cellular functions. However, its exact function is not yet clear. An an abnormal polyglutamine (polyQ) expansion in this protein causes Huntington's disease (HD) a progressive autosomal-dominant neurodegenerative disease characterised by an uncontrolled motor movement known as chorea, cognitive disorder and depression. HTT consists of multiple HEAT repeats organised in N-terminal (formed by and ), bridge (represented in this entry) and C-terminal domains, which function as a scaffold that mediates interactions with binding partners. This domain connects the N- and C-HEAT domains.
