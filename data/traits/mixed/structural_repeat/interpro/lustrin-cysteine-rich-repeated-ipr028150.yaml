identifier: InterPro:IPR028150
label: "Lustrin, cysteine-rich repeated"
definition: >-
  This repeated is found in proteins from lower eukaryotes in lustrin, perlucin, pearl nacre, and other similar protein-types. Each repeat lies between Kunitz-BPTI repeats, in certain species, which are also cysteine-rich.
