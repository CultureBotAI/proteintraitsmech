identifier: InterPro:IPR061477
label: "Acidic double-disulfide repeat"
definition: >-
  The acidic double-disulphide repeat is an Asp-rich repeat with four nearly invariant Cys residues in a repeat length of about 35 amino acids. This repeat can be found in a variety of uncharacterised proteins from bacteria and eukaryotes. It can be found also repeated once or multiple times.
