identifier: InterPro:IPR013431
label: "Delta-60 repeat"
definition: >-
  This repeat often occurs in tandem, up to as many as 13 times, in proteins from Bdellovibrio bacteriovorus, Azotobacter vinelandii, Geobacter sulfurreducens, Pirellula sp. 1, Myxococcus xanthus, amongst others, many of which are Deltaproteobacteria. The length of the repeat ranges from about 57 to 61 amino acids -this entry represents a core region of approximately 54 amino acids.
