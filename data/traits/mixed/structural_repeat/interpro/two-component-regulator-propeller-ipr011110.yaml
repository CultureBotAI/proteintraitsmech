identifier: InterPro:IPR011110
label: "Two component regulator propeller"
definition: >-
  A large group of two component regulator proteins appear to have the same N-terminal structure of 14 tandem repeats. These repeats show homology to members of and indicating that they are likely to form a β-propeller. This family has been built with artificially high cut-offs in order to avoid overlaps with other β-propeller families. The fourteen repeats are likely to form two propellers; it is not clear if these structures are likely to recruit other proteins or interact with DNA.
