identifier: InterPro:IPR046865
label: "Flagellar Assembly Protein A, beta solenoid domain"
definition: >-
  This entry represents the C-terminal β-solenoid domain of FapA (flagellar assembly protein A, ) from Vibrio vulnificus and its homologues. The synthesis of flagella allows bacteria to respond to chemotaxis by facilitating motility. Studies examining the role of FapA show that the loss or delocalization of FapA results in a complete failure of the flagellar biosynthesis and motility in response to glucose mediated chemotaxis. The polar localization of FapA is required for flagellar synthesis, and dephosphorylated EIIAGlc (Glucose-permease IIA component) inhibited the polar localization of FapA through direct interaction [ . This entry shows similarity to , suggesting a similar functional role.
