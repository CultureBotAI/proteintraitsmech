identifier: InterPro:IPR026876
label: "Fn3 associated repeat"
definition: >-
  The entry represents a Fn3 (fibronectin type III) associated repeat. This repeat is found in several glycosyl hydrolase families of proteins such as a glycoside hydrolase that may be involved in ulvan degradation or endoglucanase, which is responsible for the endohydrolysis of (1->4)-beta-D-glucosidic linkages in cellulose, lichenin and cereal beta-D-glucans.
