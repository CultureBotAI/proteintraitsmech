identifier: InterPro:IPR011936
label: "Myxococcus cysteine-rich repeat"
definition: >-
  This entry represents a sequence region shared between several proteins of Myxococcus xanthus (strain DK 1622) and some eukaryotic proteins that include human pappalysin-1. The region of about 40 amino acids contains several conserved Cys residues presumed to form disulphide bonds. The region appears in up to 13 repeats in Myxococcus.
