identifier: InterPro:IPR013378
label: "Internalin B-like, B-repeat"
definition: >-
  This entry represents the B-repeat described in internalins of Listeria species. These are 70-residue repeats, found in one copy in internalin B, three in internalin A and two in internalin H. The B-repeat plays an important role in protein-protein interactions, as it probably binds a host cell receptor and thereby it may enhance signaling downstream of the host cell receptor tyrosine kinase Met. This entry also include 78-residue repeats which occur from 2 to 15 times in some proteins of Tannerella forsythensis ATCC 43037. In Fibrobacter succinogenes, these repeats are found between one and four copies, while a single copy is found in Geobacter sulfurreducens, and a few other bacteria.
