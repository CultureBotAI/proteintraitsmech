identifier: InterPro:IPR010176
label: "CxxxxCH...CXXCH motif, Geobacter sulfurreducens"
definition: >-
  This motif occurs from three to eight times in eight different proteins of Geobacter sulfurreducens and similar proteins mainly found in Thermodesulfobacteriota. The final CXXCH motif matches the cytochrome c family haem-binding site signature, suggesting that the sequence may be involved in haem-binding.
