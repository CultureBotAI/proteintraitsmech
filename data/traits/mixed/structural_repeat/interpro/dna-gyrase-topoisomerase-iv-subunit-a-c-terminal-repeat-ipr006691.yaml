identifier: InterPro:IPR006691
label: "DNA gyrase/topoisomerase IV, subunit A, C-terminal repeat"
definition: >-
  This repeat is found as 6 tandem copies at the C-termini of GyrA and ParC DNA gyrases. It is predicted to form 4 β strands and to probably form a β-propeller structure. This region has been shown to bind DNA non-specifically and may stabilise the DNA-topoisomerase complex.
