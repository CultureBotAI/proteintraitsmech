identifier: InterPro:IPR049536
label: "Properdin, thrombospondin type 1 repeat 0"
definition: >-
  This entry represents the N-terminal thrombospondin type I repeat (TSR-0) found in human Properdin (CFP) and similar proteins from vertebrates. Properdin is a glycoprotein constructed from a common pool of structure units or modules, which are homologous to the thrombospondin type 1 repeat, TSR. It is a positive regulator of the complement system that stabilises the alternative pathway C3-convertase C3bBb. Properdin also inhibits the factor H-mediated cleavage of C3b by factor I. In addition, this protein acts as a pattern recognition molecule capable of identifying and interacting with microbial surfaces, apoptotic cells, and necrotic cells. However this role of pattern recognition is controversial. Studies indicate that this domain is a TSR variants. It is suggested that the TSR-0 domain of properdin which possesses only the six Cys residues and no CWR-layered motif (which is usually found in other TSR domains) may constitute a truncated TSR domain.
