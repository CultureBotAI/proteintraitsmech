identifier: InterPro:IPR002499
label: "Major vault protein, N-terminal"
definition: >-
  Vaults are the largest ribonucleoprotein particles known, having a mass of approximately 13 MDa. They are multi-subunit structures that may act as scaffolds for proteins involved in signal transduction and may also play a role in nucleo-cytoplasmic transport. Vaults are present in most normal tissues, but are more highly expressed in epithelial cells with secretory and excretory functions, as well as in cells chronically exposed to xenobiotics, such as bronchial cells and cells lining the intestine. Overexpression of these proteins is linked with multidrug-resistance in cancer cells. The mammalian vault structure is highly regular and consists of approximately 96 molecules of the 100kDa major vault protein (MVP), 2 molecules of the 240kDa minor vault protein TEP1, 8 molecules of the 193kDa minor vault protein VPARP and at least 6 copies of a small untranslated RNA of 88-141 bases. The MVP molecules form the core of the complex, which is a barrel-like structure with an invaginated waist and two protruding caps. The complex can unfold into two symmetrical flower-like structures with 8 petals each supposedly consisting of 6 MVP molecules.
