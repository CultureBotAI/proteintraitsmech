identifier: proteintraitsmech:COILED_COIL
label: coiled coil
definition: >-
  Generic coiled-coil region: two or more alpha helices wound together like the
  strands of a rope, combining a heptad-repeat sequence signature with a
  supercoiled helical-bundle topology. Umbrella class for source-derived
  coiled-coil families (e.g. the Pfam MIXED_COILED_COIL entries). Canonicalized
  onto the SEQUENCE_STRUCTURE axis: coiled coils are meaningful in both sequence
  (heptad register) and structure (supercoil), so MIXED_COILED_COIL — not
  STRUCT_SECONDARY — is their canonical home.
definition_source: https://linkml.io/valuesets/elements/LocalStructuralFeature/
