identifier: Pfam:PF23460
label: ZMYND8 protein coiled-coil
definition: >-
  This entry represents a coiled-coil domain that is predicted to self associate to form a dimeric arrangement found in human and fly MYND-type zinc finger-containing chromatin reader ZMYND8 and similar animal proteins. The coiled coil is adjacent to a MYND zinc finger and is similar to that found in ZMYND11. The ZMYND8 family comprises chromatin readers that recognise specific histone modifications to regulate transcription. Members of this group of proteins play roles in neuronal development, transcriptional repression, DNA damage repair, and transcription elongation. They interact with histones through domains such as the bromo domain, MYND-type zinc finger domain, and PWWP domain. These interactions enable them to recognise dual histone signatures, recruit chromatin remodelling complexes, and influence gene expression relevant to cellular differentiation and cancer progression.
