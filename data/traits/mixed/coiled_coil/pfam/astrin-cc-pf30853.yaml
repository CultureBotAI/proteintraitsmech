identifier: Pfam:PF30853
label: Astrin Coiled-coil
definition: >-
  This entry represents a coiled-coil region found in the middle of astrin (SPAG5). This region interacts with KNSTRN. Sperm-associated antigen 5 (Spag5, also known as astrin) is an essential component of the mitotic spindle required for normal chromosome segregation and progression into anaphase. The protein forms homodimers with a globular head domain and a long stalk, and binds to microtubules in the mitotic spindle. The C-terminal region interacts with NUMA1, promoting recruitment of astrin to microtubules at spindle poles in a dynein-dynactin-dependent manner. It is part of the astrin (SPAG5)-kinastrin (SKAP) complex that promotes stable microtubule-kinetochore attachments. The protein localises to spindle poles during prophase, throughout the spindle in metaphase and anaphase, and to the midbody during cytokinesis. Targeting Astrin to the centrosome during the S and G2 phases requires another protein, Ninein. Postmitotically, astrin interacts with USH proteins and may function together in microtubule-based cytoplasmic trafficking of proteins that are essential for cilium formation, maintenance and/or function.
