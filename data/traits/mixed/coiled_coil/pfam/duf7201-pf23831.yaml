identifier: Pfam:PF23831
label: Coiled-coil region of unknown function (DUF7201)
definition: >-
  This entry includes a family of phage proteins found to be associated with membranes, based on transmembrane region predictions. They are typically around 110 amino acids in length with a C-terminal membrane helix. Many also contain predicted coiled-coil region spanning the rest of the protein. The specific function is unknown. However, it could play a role in membrane fusion.
