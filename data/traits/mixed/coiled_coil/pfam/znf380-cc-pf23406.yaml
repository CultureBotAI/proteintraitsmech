identifier: Pfam:PF23406
label: ZNF380 coiled-coil
definition: >-
  This entry represents a coiled-coil region found at the C-terminal end of ZNF830. Zinc finger protein 830 (ZNF830; also known as coiled-coil domain-containing protein 16 or CCDC16) contains a C2H2-type zinc finger and a coiled-coil region . It is a component of the XAB2 complex, which binds RNA, and a component of a pentameric intron-binding complex that is pre-assembled and then incorporated into the spliceosome.
