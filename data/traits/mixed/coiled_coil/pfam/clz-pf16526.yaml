identifier: Pfam:PF16526
label: 'C-terminal leucine zipper domain of cyclic nucleotide-gated channels '
definition: >-
  This entry represents the C-terminal leucine-zipper domain (also known as CLZ domain) of of cyclic nucleotide-gated channel proteins. This domain forms homotypic trimers in solution thus constraining the channel of the CNGs to contain three cyclic nucleotide-gated subunits, CNGA. The CLZ domains formed homotypic parallel 3-helix coiled-coil domains, consistent with their proposed role in regulating subunit assembly.
