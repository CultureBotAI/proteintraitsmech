identifier: Pfam:PF16326
label: ABC transporter C-terminal domain
definition: >-
  This domain is found at the C terminus of ATP-binding cassette (ABC) transporters such as Uup from Escherichia coli. Uup is a member of the REG subfamily of class II ABC ATPases. It comprises two nucleotide-binding domains (NBD), separated by a 75-residue linker, and a C-terminal domain (CTD). CTD has a coiled coil structure with an atypical 3(10)-helix in the α-hairpin region and is involved in DNA binding.
