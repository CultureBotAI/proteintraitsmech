identifier: Pfam:PF27172
label: YxeD coiled-coil domain
definition: >-
  This entry represents the YxeD family of coiled-coil proteins found in Bacillus subtilis. YxeD is an uncharacterised protein with a coiled-coil domain that spans the entire length of the protein. The protein is located in a genomic region between the iol and hut operons. Coiled-coil domains typically mediate protein-protein interactions through the formation of α-helical bundles. The specific biological function of this coiled-coil protein remains unknown.
