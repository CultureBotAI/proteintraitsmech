identifier: Pfam:PF26854
label: Phage ORF13 coiled-coil protein
definition: >-
  This entry represents ORF13 found in bacteriophages. The prototype is from Helicobacter pylori bacteriophage KHP30, a 186 amino acid protein with a molecular weight of 21.8 kDa. The protein contains two predicted coiled-coil domains and has been characterised by direct protein sequencing. The mature protein lacks the N-terminal methionine which is removed during processing. The specific function of this coiled-coil containing protein remains to be determined.
