identifier: Pfam:PF16312
label: Coiled-coil region of Oberon
definition: >-
  This entry represents the coiled-coil region of Oberon proteins from plants. Oberon is necessary for maintenance and/or establishment of both the shoot and root apical meristems in Arabidopsis. Most Oberon proteins carry a PHD finger domain and this coiled-coil domain. Oberon proteins mediate the TMO7 (the direct target of transcription factor Monopteros) expression through modification of, or binding to, chromatin at the TMO7 locus. TMO7 stands for the target of Monopteros 7 (or Auxin response factor 7).
