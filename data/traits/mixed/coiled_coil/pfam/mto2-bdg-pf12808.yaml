identifier: Pfam:PF12808
label: Micro-tubular organiser Mto1 C-term Mto2-binding region
definition: >-
  This domain is found at the C terminus of Gamma tubulin complex adapter mto1 from yeast, Anucleate primary sterigmata protein B from Emericella nidulans (ApsB) and similar fungal sequences. Mto1 is an spindle pole body (SPB) component that acts as the gamma-tubulin complex-binding protein of the SPB outer plaque. This entry represents the binding domain for attachment to Mto2p. The interaction of Mto2p with this region of Mto1 is critical for anchoring the cytokinetic actin ring to the medial region of the cell and for proper coordination of mitosis with cytokinesis. ApsB is involved in regulation of nuclear migration. It may be involved in regulating nuclear positioning.
