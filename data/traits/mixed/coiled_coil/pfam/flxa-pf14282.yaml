label: FlxA-like protein
definition: >-
  This family includes FlxA from E. coli ( ) and related sequences. The expression of FlxA is regulated by the FliA sigma factor, a transcription factor specific for class 3 flagellar operons. However FlxA is not required for flagellar function or formation.
