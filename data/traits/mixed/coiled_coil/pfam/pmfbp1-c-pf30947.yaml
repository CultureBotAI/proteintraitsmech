identifier: Pfam:PF30947
label: Polyamine-modulated factor 1-binding protein 1 C-terminal region
definition: >-
  This entry represents the C-terminal coiled-coil region of polyamine-modulated factor 1-binding protein 1 (PMFBP1, also known as STAP or ODF3), found in mammals. The specific function of this C-terminal region remains to be determined. The full-length PMFBP1 protein functions as a scaffold protein that attaches the sperm head-tail connecting piece to the nuclear envelope, maintaining sperm head and tail integrity. The protein localises to the sperm flagellum and is expressed in post-meiotic testicular germ cells. Mutations in PMFBP1 cause acephalic spermatozoa syndrome, an autosomal recessive male infertility disorder.
