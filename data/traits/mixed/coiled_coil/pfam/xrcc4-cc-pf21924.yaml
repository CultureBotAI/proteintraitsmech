identifier: Pfam:PF21924
label: XRCC4 coiled-coil
definition: >-
  This entry represents the dimeric coiled-coil region from the XRCC4 protein. The complex of two proteins, XRCC4 and DNA ligase IV, plays a fundamental role in DNA non-homologous end joining (NHEJ), a cellular function required for double-strand break repair and V(D)J recombination. The BRCT domains of DNA ligase IV bind to this region. DNA repair protein XRCC4 is a DNA non-homologous end joining (NHEJ) core factor, required for double-strand break repair and V(D)J recombination. It acts as a scaffold protein that regulates recruitment of other proteins to DNA double-strand breaks. XRCC4 plays a key role in the NHEJ ligation step of the broken DNA during DSB repair via direct interaction with DNA ligase IV (LIG4): the LIG4-XRCC4 subcomplex reseals the DNA breaks after the gap filling is completed.
