identifier: Pfam:PF30463
label: Tuftelin-like
definition: >-
  This entry represents a conserved coiled-coil region found in tuftelin (TUFT1) and its paralogues, myocardial zonula adherens protein (MYZAP), and coiled-coil domain-containing protein 68 (CCDC68). Tuftelin is a secreted protein involved in enamel mineralisation. MYZAP localises to adherens junctions in cardiomyocytes and is involved in serum response factor-dependent signalling. CCDC68 localises to centriole subdistal appendages and is required for microtubule anchoring. The specific function of this conserved domain remains to be determined.
