identifier: Pfam:PF27977
label: CEP70
definition: >-
  CEP70 localizes to the centrosome throughout the cell cycle and binds to the key centrosomal component, gamma-tubulin. It plays an important role in the regulation of microtubule dynamics, mitotic spindle formation, cell migration, and ciliogenesis. It has been shown to regulate cancer growth and metastasis.
