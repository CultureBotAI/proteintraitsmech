identifier: Pfam:PF15908
label: Hyaluronan mediated motility receptor C-terminal
definition: >-
  This domain corresponds to the C-terminal region of eukaryotic hyaluronan-mediated motility receptor protein (RHAMM), and may be involved in centrosome targeting. This domain is also found C-terminal in kinesin-like protein KIF15.
