identifier: Pfam:PF30688
label: Coiled-coil domain-containing protein 91
definition: >-
  Coiled-coil domain-containing protein 91 (also known as GGA-binding partner or accessory protein p56) colocalizes and interacts with GGA proteins, which are adaptors involved in clathrin-mediated transport between the trans-Golgi network and endosomal system. p56 cooperates with the GGAs and clathrin in the sorting of cathepsin D to lysosomes.
