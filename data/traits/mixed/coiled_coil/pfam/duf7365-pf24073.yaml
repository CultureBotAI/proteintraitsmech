identifier: Pfam:PF24073
label: Coiled-coil region of unknown function (DUF7365)
definition: >-
  This entry includes a family of uncharacterised phage proteins that have a predicted N-terminal transmembrane helix and a coiled-coil region. Structure prediction suggests that these proteins may adopt a trimeric coiled-coil structure. Many of these proteins are annotated as holins, however the origin of that annotation is unclear.
