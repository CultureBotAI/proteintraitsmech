identifier: Pfam:PF27603
label: AKAP9-like coiled-coil region
definition: >-
  This entry represents the C-terminal domain found in AKAP9 proteins from vertebrates. This domain is present in proteins such as AKAP9 from rabbit, an A-kinase anchor protein that functions as a scaffolding protein assembling kinases and phosphatases at the centrosome and Golgi apparatus. While the full-length AKAP9 protein is required for microtubule nucleation, Golgi integrity and centrosome function, the specific function of this C-terminal domain remains to be determined. It is also found in pericentrin. Mutations of AKAP9 cause long QT syndrome 11 (LQT11), which is a heart disorder characterised by a prolonged QT interval on the ECG and polymorphic ventricular arrhythmias. AKAP9 has also been implicated in breast cancer and sporadic papillary thyroid carcinomas. In mice, AKAP9 is essential for Spermatogenesis and sertoli cell maturation. Pericentrin is an integral component of the filamentous matrix of the centrosome involved in the initial establishment of organised microtubule arrays in both mitosis and meiosis.
