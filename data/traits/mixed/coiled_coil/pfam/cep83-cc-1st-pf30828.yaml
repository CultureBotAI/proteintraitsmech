identifier: Pfam:PF30828
label: CEP83 first coiled-coil
definition: >-
  This entry represents the coiled-coil domain found in centrosomal protein 83 (CEP83, also known as CCDC41). This domain spans the majority of the protein. CEP83 is a component of the distal appendage region of the centriole and is involved in the initiation of primary cilium assembly. The full-length protein interacts with CEP164 and IFT20, and may collaborate with IFT20 in trafficking ciliary membrane proteins from the Golgi complex to the cilium. Mutations in CEP83 cause nephronophthisis 18, an autosomal recessive disorder characterised by chronic tubulointerstitial nephritis.
