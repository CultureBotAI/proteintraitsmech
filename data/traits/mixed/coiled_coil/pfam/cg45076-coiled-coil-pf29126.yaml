identifier: Pfam:PF29126
label: CG45076 Coiled-coil
definition: >-
  This entry represents a coiled-coil found at the C-terminal end of the uncharacterised protein CG45076 and related proteins predominantly from arthropods. CG45076 undergoes alternative splicing and contains experimentally confirmed phosphorylation sites. The proteins containing this region show extensive disordered regions outside the conserved domain. The specific function of this region remains to be determined.
