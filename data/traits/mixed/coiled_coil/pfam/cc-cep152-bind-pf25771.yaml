identifier: Pfam:PF25771
label: CEP63/DEUP1, CEP152 binding coiled coil
definition: >-
  This coiled-coil domain is found in the human centrosomal protein 63 kDa (CEP63), its paralogue Deuterosome assembly protein 1 (Deup1) and homologues. In CEP63 this coiled-coil region interacts with the coiled-coil region of the centrosomal protein 152 kDa (CEP152). Both proteins cooperatively form a heterotetrameric α-helical bundle. This complex functions in conjunction with its neighbouring hydrophobic motifs and self-assemble into a higher-order cylindrical architecture capable of recruiting downstream components, including Plk4, a key regulator for centriole duplication. CEP63 and Deup1 are both involved in centriole amplification. While CEP63 mediates mother-centriole-dependent centriole duplication, Deup1 mediates de novo centriole amplification in multiciliated cells.
