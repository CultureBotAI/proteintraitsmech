identifier: Pfam:PF07046
label: Cytoplasmic repetitive antigen (CRA) like repeat
definition: >-
  This entry consists of several repeats of around 42 residues in length. These repeated sequences are found in multiple copies in Trypanosoma cruzi antigens, contains 23 copies of this repeat. Homologues are also found in Bacillus species, including ribosomal protein L5-like protein.
