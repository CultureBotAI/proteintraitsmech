identifier: Pfam:PF25775
label: STIL coiled coil region
definition: >-
  This coiled-coil region is found in the human SCL/TAL1 interrupting locus (STIL) protein and homologues. This region interacts with the Polo-like kinase 4 (PLK4) and binds to its Polo-box 3 (PB3) domain. It also uses a secondary interaction site in the PLK4 L1 region. This CC_STIL/PLK4 interaction mediates PLK4 activation as well as stabilization of centriolar PLK4 and plays a key role in centriole duplication. SIL (also called STIL/TAL1 interrupting locus) is an immediate-early gene that is essential for embryonic development and is implicated in T-cell leukemia-associated translocations. Sil protein is necessary for proper mitotic spindle organisation in zebrafish and human cells and localizes to the mitotic spindle poles only during metaphase. Mouse Sil was suggested to play a role as a positive regulator of the sonic hedgehog pathway, acting downstream of PTCH1. In human, cell cycle-dependent phosphorylation of Sil is required for its interaction with Pin1, a regulator of mitosis. Primary microcephaly (MCPH) is an autosomal-recessive congenital disorder characterised by smaller-than-normal brain size and mental retardation. Three different homozygous mutations in SIL were identified in patients from three of the five families linked to the MCPH7 locus; all are predicted to truncate the Sil protein.
