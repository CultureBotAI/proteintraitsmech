identifier: Pfam:PF06428
label: GDP/GTP exchange factor Sec2p
definition: >-
  In Saccharomyces cerevisiae, Sec2 is a GDP/GTP exchange factor for Rab GTPase Sec4, which is required for vesicular transport at the post-Golgi stage of yeast secretion. It catalyses the dissociation of GDP from Sec4, also potently promoting binding of GTP. Activation of Sec4 by Sec2 is needed for the directed transport of vesicles to sites of exocytosis. Sec2 binds the Rab GTPase YPT32, but does not have exchange activity on YPT32.
