identifier: Pfam:PF15796
label: KELK-motif containing domain of MRCK Ser/Thr protein kinase
definition: >-
  KELK is a domain of eukaryotic proteins found in serine/threonine-protein kinase MRCK-type proteins. The region is low-complexity, but it is not a predicted disordered-binding domain. The name comes from a highly conserved sequence motif within the domain. The function is not known.
