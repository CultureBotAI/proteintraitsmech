identifier: Pfam:PF27044
label: HAUS3, coiled-coil domain
definition: >-
  This entry represents a coiled coil region in animal HAUS3 proteins. HAUS3 is involved in critical cellular processes such as mitotic spindle assembly, centrosome integrity maintenance, and cytokinesis completion. As a component of the HAUS augmin-like complex, it plays a pivotal role in interacting with the gamma-tubulin ring complex, which is essential for spindle assembly during cell division. This interaction ensures proper chromosome segregation and cell division, contributing to the overall stability and function of the mitotic spindle apparatus.
