identifier: Pfam:PF30022
label: Kinetochore protein Spc25 N-terminal domain
definition: >-
  This entry represents the N-terminal region in Kinetochore protein Spc25 from drosophila proteins. Members act as components of the essential kinetochore-associated Ndc80 complex, which is required for chromosome segregation and spindle checkpoint activity during meiosis and mitosis. Spc25 is required for kinetochore integrity and the organisation of stable microtubule binding sites in the outer plate of the kinetochore. The proteins are localised to the nucleus and kinetochore. This domain contains a coiled-coil.
