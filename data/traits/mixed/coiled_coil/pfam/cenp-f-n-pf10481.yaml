identifier: Pfam:PF10481
label: Cenp-F N-terminal domain
definition: >-
  Mitosin or centromere-associated protein-F (Cenp-F) is a coiled-coil protein that dimerizes and localizes to diverse subcellular locations, including microtubule plus-ends, mitochondria, nuclear pores, and kinetochores. It localizes to kinetochores during mitosis and is then rapidly degraded after mitosis. It is required for kinetochore-microtubule interactions and spindle checkpoint function. Cenp-F contains two microtubule-binding domains, and physically associates with dynein motor regulators. Cenp-F has also been shown to couple mitochondria to dynamic microtubule tips. This entry represents the N-terminal region of Cenp-F.
