identifier: Pfam:PF10267
label: Predicted transmembrane and coiled-coil 2 protein
definition: >-
  This entry includes testis-specific TEX28 and transmembrane and coiled-coil domains protein 1/2/3 (TMCC1/2/3). TMCC1 is an ER protein. Overexpression of TMCC1 or its transmembrane domains has been shown to cause defects in ER morphology. The Drosophila TMCC2 is an an amyloid protein precursor-interacting and apolipoprotein E-binding protein. It is required for normal development of the brain.
