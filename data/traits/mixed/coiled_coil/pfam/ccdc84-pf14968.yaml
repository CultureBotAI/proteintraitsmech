identifier: Pfam:PF14968
label: Coiled coil protein 84
definition: >-
  This entry includes CCDC84 from animals and TITAN-like protein (TTL; At4g24900) from Arabidopsis. TTL is a key regulator for endosperm and embryo nuclear divisions. CCDC84 has been shown to constrain centriole number by modulating APC/CCdh1-mediated HsSAS-6 degradation.
