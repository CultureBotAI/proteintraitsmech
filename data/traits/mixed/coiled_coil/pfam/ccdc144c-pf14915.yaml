identifier: Pfam:PF14915
label: CCDC144C protein coiled-coil region
definition: >-
  This entry represents the coiled-coil domain found in the human protein CCDC144C ( ), the ankyrin repeat domain-containing protein 26-like 1, members of the POTE ankyrin domain family and related proteins. The function of CCDC144C remains unknown. The ankyrin repeat which features in CCDC144C is a common amino acid motif.
