identifier: Pfam:PF28175
label: Dot/Icm T4SS effector LegC2/C7
definition: >-
  This entry represents a group of proteins that form part of the Dot/Icm type IV secretion system (T4SS) from Legionellales, including YlfA/LegC7 ( ) and YlfB/LegC2 ( ), which were initially identified in a screen for proteins that cause growth inhibition in yeast and functionally mimic glutamine (Q)-SNARE proteins. Members of this family are probably membrane-associated effectors that enhance remodeling of the bacteria-containing vacuole by promoting association and possibly fusion of ER-derived membrane vesicles.
