identifier: Pfam:PF30816
label: CEP152 first coiled-coil region
definition: >-
  This entry represents the first coiled-coil region found in CEP152 (centrosomal protein of 152 kDa) family members. This domain is located between the N-terminal PLK4-binding region ( ) and the second coiled-coil region ( ). CEP152 is a scaffold protein essential for centrosome duplication, acting to recruit PLK4 and CPAP during centriole formation. Mutations in CEP152 cause primary microcephaly and Seckel syndrome. This domain is found in metazoan species. The specific function of this coiled-coil domain remains to be determined.
