identifier: Pfam:PF04849
label: HAP1 N-terminal conserved region
definition: >-
  This entry represents a N-terminal conserved region found in huntingtin-associated protein 1 (HAP1), trafficking Kinesin proteins TRAK1 and TRAK2 (vertebrate), Milton (Drosophila) and similar proteins from animals. HAP1 binds to huntingtin in a polyglutamine repeat-length-dependent manner. It is involved in intracellular trafficking. HAP1 is also linked to Alzheimer's disease. It regulates amyloid precursor protein subcellular trafficking to the non-amyloidogenic pathway and may negatively regulate Abeta production in neurons. TRAK1 binds to both kinesin-1 and dynein/dynactin, is prominently localized in axons, and is needed for normal axon outgrowth, whereas TRAK2 predominantly interacts with dynein/dynactin, is more abundantly present in dendrites, and is required for dendritic development.
