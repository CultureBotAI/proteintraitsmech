identifier: Pfam:PF30149
label: YGR130C C-terminal domain
definition: >-
  This entry represents a coiled-coil found at the C-terminal of YGR130C, an uncharacterised protein found in fungi. YGR130C is localised to the cytoplasm and eisosomes and is involved in the cellular response to glucose starvation. The protein plays a role in protein localisation to eisosome filaments and is subject to multiple post-translational modifications, including phosphorylation and pyrophosphorylation. The protein undergoes serine pyrophosphorylation by 5-diphosphoinositol pentakisphosphate through a magnesium-dependent, enzyme-independent transfer mechanism.
