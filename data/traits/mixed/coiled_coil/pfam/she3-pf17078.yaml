identifier: Pfam:PF17078
label: SWI5-dependent HO expression protein 3
definition: >-
  SWI5-dependent HO expression protein 3 (She3) is an adaptor protein that links Myo4, a nonessential type V myosin, to its cargo. Ash1 mRNA binds to the She2 protein and form a complex. The She2-mRNA complex then binds to the adaptor protein She3. She3 associates with Myo4, and the fully assembled complex moves along actin cables to the bud tip, where it inhibits mating type switching in daughter cells by repressing HO endonuclease expression. A similar mechanism involving the She proteins is thought to regulate the asymmetric distribution of IST2 mRNA. Myo4 and She3, but not She2, are required for the inheritance of cortical ER in S. cerevisiae.
