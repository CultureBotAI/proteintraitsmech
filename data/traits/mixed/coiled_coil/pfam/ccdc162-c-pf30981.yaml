identifier: Pfam:PF30981
label: CCDC162 C-terminal region
definition: >-
  This entry represents a C-terminal coiled-coil found in coiled-coil domain-containing protein 162 (CCDC162) in metazoans, predominantly vertebrates. The function of this domain remains to be determined. CCDC162 is a protein characterised by the presence of multiple coiled-coil regions, including predicted coiled-coil domains at the N-terminal region and in the middle portion of the protein. The protein undergoes extensive alternative splicing, producing at least four named isoforms with significant structural variation. Some isoforms show major deletions affecting large portions of the protein sequence. The protein has been identified by mass spectrometry and shows broad tissue expression patterns.
