identifier: Pfam:PF05384
label: Sensor protein DegS
definition: >-
  This is a group of Bacillus DegS proteins. The DegS-DegU two-component regulatory system of Bacillus subtilis controls various processes that characterise the transition from the exponential to the stationary growth phase, including the induction of extracellular degradative enzymes, expression of late competence genes and down-regulation of the sigma D regulon. The entry also contains one sequence from Thermoanaerobacter tengcongensis which is described as a sensory transduction histidine kinase.
