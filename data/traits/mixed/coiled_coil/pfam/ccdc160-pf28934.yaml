identifier: Pfam:PF28934
label: Coiled-coil domain-containing protein 160
definition: >-
  This entry represents CCDC160 (coiled-coil domain-containing protein 160) from animals. These proteins consist of an extended coiled-coil structure within the central and C-terminal region. CCDC160 is located on the X chromosome in humans. The protein shows tissue-enhanced expression in salivary glands and is broadly expressed across multiple tissues. The coiled-coil region is flanked by disordered regions at both the N-terminal and C-terminal ends of the protein. The function of this family remains to be determined.
