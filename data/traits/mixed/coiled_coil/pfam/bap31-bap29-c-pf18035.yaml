identifier: Pfam:PF18035
label: Bap31/Bap29 cytoplasmic coiled-coil domain
definition: >-
  Bap31 is a polytopic integral protein of the endoplasmic reticulum membrane and a substrate of caspase-8. Bap31 is cleaved within its cytosolic domain, generating pro-apoptotic p20 Bap31. This entry represents the cytoplasmic domain which forms a heterodimeric coiled-coil with Bap29. Bap29 and Bap31 are homologous to each other and this entry includes both proteins.
