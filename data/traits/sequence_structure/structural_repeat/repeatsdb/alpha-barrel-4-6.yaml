label: Alpha-barrel
definition: >-
  The alpha-barrel structures are composed exclusively by alpha-helices as the secondary structure elements, with each repeat composed of one alpha-helical hairpin. The overall structures have circular cross-sections. A structural tandem repeat with demonstrated 3D periodicity.
