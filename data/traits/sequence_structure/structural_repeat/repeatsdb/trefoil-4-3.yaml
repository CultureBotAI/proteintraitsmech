label: Trefoil
definition: >-
  The beta-trefoil structures are characterized by six beta-harpins, three of them form a triangular prism structure and the other three form a cap on this prism; One pair of these beta-harpins represents a repetitive unit in the structure, which may not be immediately apparent in the sequence. A structural tandem repeat with demonstrated 3D periodicity.
