identifier: RepeatsDB:3.3
label: Alpha-solenoid
definition: >-
  The alpha‐solenoid structures are characterized by solenoidal windings of the polypeptide chain having exclusively alpha-helices as the secondary structure elements. The repeating unit is an individual coil of the solenoid, which consists of 30-45 amino acids configured as 2, 3, or 4 alpha‐helices together with connecting turns. These structures have a variety of twisted- curved shapes. A structural tandem repeat with demonstrated 3D periodicity.
