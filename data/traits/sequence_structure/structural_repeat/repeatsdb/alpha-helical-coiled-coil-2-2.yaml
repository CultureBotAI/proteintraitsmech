identifier: RepeatsDB:2.2
label: "Alpha helical coiled coil"
definition: >-
  The -helical coiled coils are characterized by a heptad repeat (abcdefg)n in which hydrophobic residues are located at positions a and d and, in general, polar residues are located elsewhere. They form oligomers of 2, 3, 4, 5, 6 or 7 chains. Each chain folds into an a-helix that is wrapped around the axis of the coiled coil structure. A structural tandem repeat with demonstrated 3D periodicity.
