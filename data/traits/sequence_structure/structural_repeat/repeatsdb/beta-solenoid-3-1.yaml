identifier: RepeatsDB:3.1
label: Beta-solenoid
definition: >-
  The beta‐solenoid structures are characterized by solenoidal windings of the polypeptide chain having exclusively ‐strands as the secondary structure elements. A typical shape represents a rigid rod. The repeating unit is an individual coil of the solenoid which consists of 12–30 amino acids configured as 2, 3, or 4 b‐strands, together with connecting turns. Each coil in the solenoid has an axial rise of about 0.48 nm. A structural tandem repeat with demonstrated 3D periodicity.
