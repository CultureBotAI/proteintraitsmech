identifier: RepeatsDB:4.3.2
label: "Alpha/beta trefoil"
definition: >-
  The alpha/beta trefoil structures are formed by the same double-stranded beta-harpins as the beta-trefoils, with some peripheral alpha-helices, accessories to the structure. Instead of the triangular shape visible in the beta-trefoils, its beta-sheets are wrapped around a circular cross-section. A structural tandem repeat with demonstrated 3D periodicity.
