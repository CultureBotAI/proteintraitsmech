identifier: RepeatsDB:3.2
label: "Alpha/beta solenoid"
definition: >-
  The alpha/beta-solenoid structures are characterized by solenoidal windings of the polypeptide chain having both ‐strands and alpha-helices as the secondary structure elements. The repeating unit has size of 20–30 amino acids. One of the most known representatives are LRR proteins, having curved shapes. A structural tandem repeat with demonstrated 3D periodicity.
