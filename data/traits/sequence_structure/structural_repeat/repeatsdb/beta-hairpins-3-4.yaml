identifier: RepeatsDB:3.4
label: "Beta hairpins"
definition: >-
  A non-solenoidal repetitive structures consisting of tandem arrays of beta- hairpins. These type of proteins include a variety of elongated folds including: triple beta-spirals, trimeric cross-beta-prisms, single-layer antiparallel beta-structures (straight and curved), beta- hairpin stacks with coordinated zinc ions, spiral beta-hairpin staircases and beta- burrito structures. A structural tandem repeat with demonstrated 3D periodicity.
