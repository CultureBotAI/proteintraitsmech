identifier: RepeatsDB:4.4
label: Propeller
definition: >-
  The beta-propeller are formed by 4 to 8 repeats; composed by four-stranded antiparallel beta-sheets, arranged in the shape of a blade around a central axis. These are closed structures with interactions between the N- and C-terminal repeats. The alpha/beta-propeller structures are composed of 4 to 8 three/four-stranded antiparallel beta-sheets, mostly parallel to the central axis. Each one of the beta-sheets domains may contain or be followed by a short alpha-helix, peripheral to the structure, with no critical structural role. Like the beta-propeller, the structures are closed by hydrophobic interactions between the N- and C-terminal repeats. A structural tandem repeat with demonstrated 3D periodicity.
