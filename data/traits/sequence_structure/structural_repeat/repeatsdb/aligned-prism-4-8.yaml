identifier: RepeatsDB:4.8
label: "Aligned prism"
definition: >-
  A repetitive unit of about 45-55 residues has four-stranded antiparallel beta-structure. Three repeats form a prism with 3-fold symmetry. The beta-strands are aligned along the symmetry axis. A structural tandem repeat with demonstrated 3D periodicity.
