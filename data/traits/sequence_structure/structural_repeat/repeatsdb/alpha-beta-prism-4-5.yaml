identifier: RepeatsDB:4.5
label: "Alpha/beta prism"
definition: >-
  The alpha/beta prism structures have a triangular cross-section; Each side of the prism contains a repeat, composed by a pair of alpha-helices and a three- stranded antiparallel beta-sheet. The alpha-helices are located inside the structure and the beta-sheets are located mostly outside. A structural tandem repeat with demonstrated 3D periodicity.
