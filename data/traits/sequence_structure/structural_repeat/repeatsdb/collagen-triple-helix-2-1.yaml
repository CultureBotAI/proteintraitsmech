identifier: RepeatsDB:2.1
label: "Collagen triple-helix"
definition: >-
  Collagens are the most abundant human proteins, have a tripeptide repeat Gly-X-Y, where X and Y are any residues but are usually proline or hydroxyproline. The collagen chains have an extended polyproline II conformation and assemble into a triple helix. A structural tandem repeat with demonstrated 3D periodicity.
