identifier: RepeatsDB:4.7
label: "Alpha/beta barrel"
definition: >-
  This barrel is formed by units composed of a short alpha-helix followed by a beta-hairpin, followed by an alpha-helix and a beta-strand. The beta-hairpin from one unit and the beta-strand from the other unit form a beta-sheet that runs parallel to the barrel axis. A structural tandem repeat with demonstrated 3D periodicity.
