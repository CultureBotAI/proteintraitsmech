identifier: RepeatsDB:4.1
label: TIM-barrel
definition: >-
  TIM barrels are formed by eight units composed of an alpha-helix and a beta-strand, arranged in a circular structure; the eight beta-strands join together to form a beta-sheet that is the inner part of the barrel and the alpha-helices pack against each other on the outside. A structural tandem repeat with demonstrated 3D periodicity.
