identifier: RepeatsDB:4.2
label: "Beta-barrel / beta hairpins"
definition: >-
  These structures are formed by beta- hairpin repeats and have a so-called up-and-down beta-barrel fold. Each of the beta-strands are hydrogen-bonded to the strands immediately before and after it in the sequence and the first strand is hydrogen-bonded to the last one. A structural tandem repeat with demonstrated 3D periodicity.
