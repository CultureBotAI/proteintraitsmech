# ProteinTraitsMech — data source download manifest
#
# kghub-downloader format (as used by KG-Microbe): a YAML list of blocks, each
# with a required `url` and optional `local_name`. Extra keys (name, source,
# license, status, trait_categories, hierarchy, note) are metadata the
# downloader ignores but our tooling + the `data-sources` skill use. This file
# replaces the old data/sources.yaml registry — it is BOTH the download manifest
# and the source catalogue.
#
# tags: `status` (seeded | candidate | deferred | rejected) drives selective
# download; e.g. fetch only what is seeded, or a single source by its key.
#
# Validate with `just sources-check`. Keep in sync with scripts/seed_*.py, the
# README seeds table, and research/protein-trait-sources-round*.md.
---

