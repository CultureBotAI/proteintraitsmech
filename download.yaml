-
  url: https://www.bv-brc.org/api/subsystem_ref/?limit(25000)&http_accept=application/json
  name: SEED subsystems (via BV-BRC subsystem_ref)
  source: seed_subsystems
  license: US Government public domain (BV-BRC)
  status: seeded
  seeder: seed_seed_subsystems.py
  hierarchy: true (superclass → class → subclass spine)
  trait_categories: [FUNC_PATHWAY]
  note: >-
    920 curated prokaryotic functional modules (subsystems) → FUNC_PATHWAY, on a
    166-node superclass/class/subclass spine. Class-level only; per-genome
    .subsystem.tab instances excluded. DISTINCT EC numbers parsed from role names
    attached as mapped_xrefs (seed_role_ec) to the already-seeded EC hierarchy —
    functional roles NOT re-seeded (redundant with seed_ec.py). Curated by
    SEED/RAST; BV-BRC distributes as public domain (cite bv-brc.org/citation).
    Net-new vs Reactome FUNC_PATHWAY: prokaryotic modules Reactome lacks.
