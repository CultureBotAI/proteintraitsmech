id: https://w3id.org/proteintraitsmech
name: proteintraitsmech
title: ProteinTraitsMech - Protein Sequence & Structure Trait Schema
description: |
  LinkML schema for modeling protein *sequence*, *structure*, and
  *function* traits and their mechanisms. Each ProteinTraitRecord is a
  single trait along one of four axes:

    - SEQUENCE traits — motifs, signal peptides, propeptides, transit
      peptides, initiator methionine, mature chain / peptide products,
      non-standard residues, low-complexity / disordered regions,
      compositional biases, tandem repeats, conserved regions, epitopes,
      PTM sites (modified residues, glycosylation, lipidation, crosslinks).
    - STRUCTURE traits — CATH-style class / architecture / topology /
      homologous-superfamily / fold hierarchy, structural domains,
      secondary-structure arrangements, quaternary state, subunit
      interfaces, active / binding / allosteric / metal sites, disulfide
      bonds, cavities, dynamics, symmetry, structural stability features.
    - SEQUENCE_STRUCTURE traits — traits meaningful in both axes:
      transmembrane spans, coiled coils, structural tandem repeats.
    - FUNCTION traits — entry-level (non-localised) traits: enzymatic
      activity, binding capacity, cofactor requirement, subcellular
      localisation, environmental response, interaction partner.
      Complements (does not replace) the localised sequence/structure
      records: an FT BINDING record captures *where* ATP binds; a
      FUNC_BINDING_CAPACITY record captures *that* the protein binds ATP
      as a class-level assertion.

  Records anchor to authoritative resources — Pfam, InterPro, PROSITE,
  SMART, MEROPS, CATH, SCOP, PDB, GO, PR, UniProtKB, HAMAP — with
  evidence-backed causal mechanism graphs where curator-asserted.

  Curation model mirrors the sibling Mech repos (dismech, TraitMech,
  CultureMech, MediaIngredientMech): one YAML per trait, evidence-bearing
  audit trail, validation via `just validate-all`.

license: https://creativecommons.org/publicdomain/zero/1.0/

prefixes:
  linkml: https://w3id.org/linkml/
  proteintraitsmech: https://w3id.org/proteintraitsmech/
  biolink: https://w3id.org/biolink/vocab/
  valuesets: https://w3id.org/linkml/valuesets/
  # Protein-centric ontologies
  PR: http://purl.obolibrary.org/obo/PR_
  GO: http://purl.obolibrary.org/obo/GO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  CL: http://purl.obolibrary.org/obo/CL_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  RHEA: http://purl.obolibrary.org/obo/RHEA_
  SO: http://purl.obolibrary.org/obo/SO_
  UO: http://purl.obolibrary.org/obo/UO_
  IAO: http://purl.obolibrary.org/obo/IAO_
  RO: http://purl.obolibrary.org/obo/RO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  MOD: http://purl.obolibrary.org/obo/MOD_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HP: http://purl.obolibrary.org/obo/HP_
  # Protein databases (URL prefixes; not OBO)
  UniProtKB: https://www.uniprot.org/uniprotkb/
  Pfam: https://www.ebi.ac.uk/interpro/entry/pfam/
  InterPro: https://www.ebi.ac.uk/interpro/entry/InterPro/
  PROSITE: https://prosite.expasy.org/
  SMART: http://smart.embl-heidelberg.de/smart/do_annotation.pl?ACC=
  CATH: https://www.cathdb.info/version/latest/superfamily/
  SCOP: http://scop.mrc-lmb.cam.ac.uk/term/
  MEROPS: https://www.ebi.ac.uk/merops/cgi-bin/pepsum?id=
  TED: https://ted.cathdb.info/
  ECOD: http://prodata.swmed.edu/ecod/complete/domain?id=
  PDB: https://www.rcsb.org/structure/
  Unimod: https://www.unimod.org/modifications_view.php?editid1=
  RESID: https://proteininformationresource.org/cgi-bin/resid?id=
  DisProt: https://disprot.org/
  IDPO: https://disprot.org/browse?ontology=IDPO&term=
  MCSA: https://www.ebi.ac.uk/thornton-srv/m-csa/entry/
  AlphaFoldDB: https://alphafold.ebi.ac.uk/entry/
  HAMAP: https://hamap.expasy.org/signature/
  EC: https://enzyme.expasy.org/EC/
  KEGG: https://www.kegg.jp/entry/
  Reactome: https://reactome.org/content/detail/
  NCBIGene: https://www.ncbi.nlm.nih.gov/gene/
  HGNC: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  # Taxonomy
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  # Provenance
  PMID: http://www.ncbi.nlm.nih.gov/pubmed/
  DOI: https://doi.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#

default_prefix: proteintraitsmech
default_range: string

imports:
  - linkml:types

# ================================================================
# ROOT CLASS — one YAML file per ProteinTraitRecord
# ================================================================

classes:

  ProteinTraitRecord:
    class_uri: proteintraitsmech:ProteinTraitRecord
    description: >-
      A single protein *sequence* or *structure* trait with provenance
      and optional evidence-backed causal mechanism graphs. One YAML per
      record.
    attributes:
      identifier:
        description: >-
          Stable CURIE for this trait. Prefer an existing resource CURIE
          (InterPro: for families/domains, Pfam: for HMM families, PROSITE:
          for motifs, CATH: / SCOP: for folds, MEROPS: for peptidase
          clans, PR: for protein-form terms) when the trait corresponds
          1:1 to an existing entry. Curator-minted records use the
          `proteintraitsmech:` prefix.
        identifier: true
        required: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"

      label:
        description: Human-readable trait label.
        required: true
        range: string

      definition:
        description: >-
          Textual definition. For records anchored to an ontology term,
          seed from the term's IAO:0000115 annotation; curator can extend.
        range: string

      definition_source:
        description: >-
          IAO:0000119 — citation for the definition (PMID:..., DOI:...,
          or the source ontology CURIE).
        range: string

      synonyms:
        description: >-
          Alternate labels (oboInOwl:hasExactSynonym, hasNarrowSynonym,
          hasBroadSynonym, hasRelatedSynonym).
        multivalued: true
        inlined_as_list: true
        range: TraitSynonym

      parent_traits:
        description: >-
          rdfs:subClassOf parents — CURIEs of broader ontology classes
          or ProteinTraitRecords. Multivalued because protein traits
          typically span multiple axes (function + localization + family).
        multivalued: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"

      xrefs:
        description: >-
          oboInOwl:hasDbXref — equivalents asserted by the trait's **own
          source record** (PR / GO / EC / Pfam / InterPro / UniProtKB /
          Reactome / ChEBI). Use for *true*, source-direct equivalences;
          record broader/narrower relations as `parent_traits:` instead, and
          associations asserted by an *external mapping product* (ec2go,
          interpro2go, pfam2go, …) in `mapped_xrefs:` — not here.
        multivalued: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"

      mapped_xrefs:
        description: >-
          Cross-references asserted not by the trait's own source but by an
          external **mapping product** (e.g. ec2go, interpro2go, pfam2go,
          pfam2interpro, interpro2ec, rhea2ec). Kept separate from `xrefs`
          so the provenance and trust of a mapping-derived association is
          explicit and auditable. See `MappedXref`.
        multivalued: true
        inlined_as_list: true
        range: MappedXref

      chemical_participants:
        description: >-
          Chemical entities a FUNCTION trait acts on — reaction
          substrates/products, transported substrates, cofactors — each
          grounded in ChEBI and semantically typed by `role`. A substrate is
          an attribute of the activity, not an equivalence, so it lives here
          rather than in `xrefs`. Molecular formula / InChIKey / mass / CAS
          are NOT copied per-record; they resolve from the ChEBI id via the
          shared `docs/data/chebi.json` sidecar. See `ChemicalParticipant`.
        multivalued: true
        inlined_as_list: true
        range: ChemicalParticipant

      trait_relations:
        description: >-
          Typed trait↔trait / trait↔entity relationships, each carrying an
          explicit **Biolink Model predicate** (RO only where Biolink lacks a
          slot) — e.g. `biolink:member_of` (Pfam family → clan, COG → category),
          `biolink:part_of`, `biolink:has_participant`. Complements
          `parent_traits`, which stays the backward-compatible
          `biolink:subclass_of` path. Most edges are derived at docs-build time
          from source + parent namespace; this slot is for explicit curation.
        multivalued: true
        inlined_as_list: true
        range: TraitRelation

      sequence_pattern:
        description: >-
          Raw sequence pattern for SEQUENCE-axis traits — e.g. a PROSITE
          pattern string (`N-{P}-[ST]-{P}.`), a regex, or an ELM linear
          motif syntax. Optional; profiles (HMM/PSSM matrices) are usually
          too large to embed here and should be linked via `xrefs` to
          their source database instead. Use `residue_sequence` for the
          concrete amino-acid substring of a specific occurrence — this
          slot is reserved for symbolic patterns.
        range: string

      residue_sequence:
        description: >-
          Concrete amino-acid substring covered by this trait, taken
          verbatim from the source sequence — e.g. the residues of a
          UniProt FT MOTIF, SIGNAL, DOMAIN, transmembrane span, or PTM
          site. One-letter IUPAC codes only, no separators. Complements
          `sequence_pattern`: `sequence_pattern` is the symbolic
          motif/regex; `residue_sequence` is a single realised instance.
        range: string
        pattern: "^[ACDEFGHIKLMNPQRSTVWYUOBZJX*]+$"

      canonical_examples:
        description: >-
          Canonical exemplar proteins for this trait — the textbook /
          reference sequences a curator would point to as archetypal.
          Each example carries a UniProtKB accession, an organism, an
          optional role note, and an optional citation.
        multivalued: true
        inlined_as_list: true
        range: CanonicalExample

      replaces:
        description: >-
          dcterms:replaces — CURIEs of records that this trait supersedes.
          The replaced record is left in place with
          `mapping_status: DEPRECATED` so downstream references remain
          resolvable.
        multivalued: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
        slot_uri: dcterms:replaces

      trait_axis:
        description: >-
          Primary axis for this trait — SEQUENCE, STRUCTURE, or
          SEQUENCE_STRUCTURE (traits that meaningfully live in both,
          e.g. transmembrane spans, coiled coils).
        range: TraitAxisEnum
        required: true

      trait_category:
        description: >-
          Fine-grained bucket within the axis — used for filesystem
          organisation and reporting (data/traits/<axis>/<category>/).
        range: ProteinTraitCategoryEnum
        recommended: true

      term_kind:
        description: >-
          Whether this entry is an OWL Class (most trait terms) or a
          DatatypeProperty / ObjectProperty (value-bearing companions
          like "has kinetic Km").
        range: TermKindEnum

      domain:
        description: >-
          For DatatypeProperty / ObjectProperty entries — the typed subject
          (typically biolink:Protein or biolink:GeneOrGeneProduct).
        range: string

      range_:
        description: >-
          For DatatypeProperty / ObjectProperty entries — the value range
          (e.g. xsd:decimal, xsd:string, or a ProteinTraitRecord identifier).
        range: string
        slot_uri: proteintraitsmech:property_range

      priority:
        description: Editorial priority for the curation backlog.
        range: PriorityEnum

      created_by:
        description: IAO:0000117 — original term author.
        range: string

      contributors:
        description: Additional curators who have edited this record.
        multivalued: true
        range: string

      evidence:
        description: >-
          Optional citation list — populated when a curator backs the
          trait with literature support beyond the anchoring ontology's
          own provenance. Causal-edge evidence is required separately
          (see CausalEdge.evidence).
        multivalued: true
        inlined_as_list: true
        range: EvidenceItem

      mapping_status:
        description: >-
          Lifecycle flag. SEEDED rows came from a source ontology import;
          PROPOSED rows are literature-sourced candidates; REVIEWED rows
          have curator sign-off; DEPRECATED rows are retained for
          traceability but flagged as superseded.
        range: MappingStatusEnum

      curation_history:
        description: Append-only audit trail.
        multivalued: true
        inlined_as_list: true
        range: CurationEvent

      causal_graphs:
        description: >-
          Optional causal mechanism graphs for this trait. Nodes represent
          proteins, domains, PTMs, ligands, pathways, molecular functions,
          biological processes, phenotypes, or diseases. Edges must carry
          evidence.
        multivalued: true
        inlined_as_list: true
        range: CausalGraph

      license:
        description: >-
          Per-record license tag, when the record's *source* imposes
          terms tighter than the corpus default (CC0-1.0). Populated by
          seeders that ingest CC-BY / CC-BY-SA / CC-BY-NC-SA / DSL /
          share-alike sources so downstream consumers can filter or
          honour propagation obligations without inspecting the whole
          corpus. Absent value ⇒ CC0-1.0 default applies. Use a
          well-known SPDX identifier (`CC-BY-4.0`, `CC-BY-SA-4.0`,
          `CC-BY-NC-SA-4.0`) or a canonical URL.
        range: string

    rules:
      # Axis/category pairing — the category prefix pins the axis. UPPER
      # and OTHER are administrative and may appear on any axis; they are
      # excluded from these rules by construction (their names don't
      # match any of the four category-prefix patterns below).
      - title: seq_categories_require_sequence_axis
        description: >-
          Categories named `SEQ_*` are SEQUENCE-axis traits by
          definition; the axis and category must agree.
        preconditions:
          slot_conditions:
            trait_category:
              pattern: "^SEQ_"
        postconditions:
          slot_conditions:
            trait_axis:
              equals_string: SEQUENCE
      - title: struct_categories_require_structure_axis
        description: >-
          Categories named `STRUCT_*` are STRUCTURE-axis traits by
          definition.
        preconditions:
          slot_conditions:
            trait_category:
              pattern: "^STRUCT_"
        postconditions:
          slot_conditions:
            trait_axis:
              equals_string: STRUCTURE
      - title: mixed_categories_require_sequence_structure_axis
        description: >-
          Categories named `MIXED_*` are SEQUENCE_STRUCTURE-axis traits by
          definition.
        preconditions:
          slot_conditions:
            trait_category:
              pattern: "^MIXED_"
        postconditions:
          slot_conditions:
            trait_axis:
              equals_string: SEQUENCE_STRUCTURE
      - title: func_categories_require_function_axis
        description: >-
          Categories named `FUNC_*` are FUNCTION-axis traits by
          definition.
        preconditions:
          slot_conditions:
            trait_category:
              pattern: "^FUNC_"
        postconditions:
          slot_conditions:
            trait_axis:
              equals_string: FUNCTION
      - title: evo_categories_require_evolution_axis
        description: >-
          Categories named `EVO_*` are EVOLUTION-axis traits by
          definition.
        preconditions:
          slot_conditions:
            trait_category:
              pattern: "^EVO_"
        postconditions:
          slot_conditions:
            trait_axis:
              equals_string: EVOLUTION

  TraitSynonym:
    description: A synonym entry with its scope.
    attributes:
      synonym_text:
        required: true
        range: string
      synonym_type:
        range: SynonymTypeEnum
      source:
        description: Where the synonym came from (e.g. "UniProtKB", "PMID:...").
        range: string

  EvidenceItem:
    description: A literature or database citation supporting a claim.
    attributes:
      reference:
        description: PMID:..., DOI:..., a database CURIE, or an opaque URL.
        required: true
        range: string
      snippet:
        description: Verbatim quote from the source supporting the claim.
        range: string
      notes:
        range: string

  CanonicalExample:
    description: >-
      An exemplar protein for a trait — a reference sequence that
      exhibits it. Two kinds of examples coexist on a record:
      curator-picked archetypes (`source: CURATOR`) and API-fetched hits
      (`source: UNIPROTKB_API`) discovered by querying UniProtKB for
      proteins carrying the anchoring signature. Instance-level fields
      (`sequence_length`, `reviewed`, `annotation_score`,
      `family_classifications`) let downstream consumers rank / filter
      the API-fetched set without re-querying UniProt.
    attributes:
      protein_id:
        description: UniProtKB accession for the exemplar protein (e.g. UniProtKB:P00533).
        required: true
        range: string
        pattern: "^UniProtKB:[A-Z0-9]+([-][0-9]+)?$"
      protein_label:
        description: Recommended name of the exemplar protein.
        required: true
        range: string
      taxon_id:
        description: NCBITaxon CURIE for the source organism (e.g. NCBITaxon:9606).
        range: string
        pattern: "^NCBITaxon:[0-9]+$"
      taxon_label:
        description: Scientific name of the source organism.
        range: string
      sequence_length:
        description: Full-length residue count of the exemplar protein.
        range: integer
        minimum_value: 1
      reviewed:
        description: >-
          True if the UniProt entry is Swiss-Prot reviewed; false if it is
          a TrEMBL unreviewed entry.
        range: boolean
      annotation_score:
        description: >-
          UniProt annotation score (1–5, higher = more evidence). Useful
          for ranking API-fetched examples when picking a shortlist.
        range: integer
        minimum_value: 1
        maximum_value: 5
      family_classifications:
        description: >-
          Family / domain CURIEs cross-referenced on this specific example
          entry — Pfam, InterPro, PROSITE, SMART, CATH, HAMAP, etc.
          Snapshotted from the entry's DR lines at fetch time; gives
          downstream users a taxonomy-independent classification of what
          the example protein *is* without needing to re-query UniProt.
        multivalued: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
      note:
        description: >-
          Free-text note — curator picks explain why the protein is
          archetypal; API-fetched picks may record the UniProt query used.
        range: string
      reference:
        description: IAO:0000119-style citation (PMID:..., DOI:..., URL).
        range: string
      source:
        description: >-
          Provenance of this example. `CURATOR` = hand-picked archetype;
          `UNIPROTKB_API` = fetched by `scripts/fetch_uniprot_examples.py`
          from the UniProt REST search API.
        range: ExampleSourceEnum
      fetched_at:
        description: >-
          ISO-8601 UTC date the API-fetched example was retrieved. Empty
          for curator picks.
        range: string
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      sequence:
        description: >-
          Amino-acid sequence of the exemplar protein (one-letter IUPAC
          codes, no separators). Optional — populated by
          `scripts/fetch_uniprot_examples.py` when it uses UniProt's
          `format=txt` endpoint. Enables the docs browser to render the
          sequence with trait annotations overlaid.
        range: string
        pattern: "^[ACDEFGHIKLMNPQRSTVWYUOBZJX*]+$"
      features:
        description: >-
          UniProt FT-line annotations parsed from the exemplar protein's
          flat file. One entry per supported feature range; each carries
          the axis / category routing that would apply if the feature
          were promoted to its own ProteinTraitRecord. The docs browser
          uses this list to colour-code the residues shown in `sequence`.
        multivalued: true
        inlined_as_list: true
        range: SequenceFeatureAnnotation

  SequenceFeatureAnnotation:
    description: >-
      A single UniProt FT-line annotation on a CanonicalExample protein.
      Coordinates are 1-indexed, inclusive of both endpoints; a single-
      residue feature has `start == end`. `feature_type` is the raw
      UniProt FT keyword (SIGNAL, DOMAIN, ACT_SITE, …); `trait_axis` and
      `trait_category` mirror the routing used by seed_uniprot.py's
      FT_TYPE_MAP so downstream renderers can group by axis for
      colour-coding.
    attributes:
      start:
        description: 1-indexed start residue (inclusive).
        required: true
        range: integer
        minimum_value: 1
      end:
        description: 1-indexed end residue (inclusive).
        required: true
        range: integer
        minimum_value: 1
      feature_type:
        description: >-
          Raw UniProt FT keyword — `SIGNAL`, `DOMAIN`, `ACT_SITE`,
          `BINDING`, `TRANSMEM`, `MOD_RES`, etc.
        required: true
        range: string
      trait_axis:
        description: >-
          Mirror of the trait axis that would apply if this feature were
          seeded as a ProteinTraitRecord (SEQUENCE / STRUCTURE /
          SEQUENCE_STRUCTURE). Used by the docs browser to colour-code
          overlays.
        range: TraitAxisEnum
      trait_category:
        description: >-
          Mirror of the fine-grained trait category (SEQ_MOTIF /
          STRUCT_DOMAIN / MIXED_TRANSMEMBRANE / etc.).
        range: ProteinTraitCategoryEnum
      note:
        description: >-
          UniProt `/note=` text from the FT line — for `MOTIF` this is
          often the motif name ("DEAD box"); for `DOMAIN` the domain
          label; for `ACT_SITE` the mechanistic role.
        range: string

  CausalGraph:
    description: A directed causal mechanism graph associated with a trait.
    attributes:
      graph_id:
        description: Stable local graph identifier within the ProteinTraitRecord.
        identifier: true
        required: true
        range: string
      title:
        description: Human-readable graph title.
        range: string
      description:
        description: Short scope note for the graph.
        range: string
      nodes:
        description: Nodes participating in the causal graph.
        required: true
        multivalued: true
        inlined_as_list: true
        range: CausalNode
      edges:
        description: Evidence-backed directed causal or mechanistic edges.
        required: true
        multivalued: true
        inlined_as_list: true
        range: CausalEdge

  CausalNode:
    description: A node in a trait causal graph.
    attributes:
      node_id:
        description: Stable local node identifier used by graph edges.
        identifier: true
        required: true
        range: string
      label:
        description: Human-readable node label.
        required: true
        range: string
      node_type:
        description: Broad semantic category used for rendering and curation.
        required: true
        range: CausalNodeTypeEnum
      grounding:
        description: >-
          Preferred ontology or database CURIE for the node when available.
          Label-only draft nodes are permitted in v1.
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
      xrefs:
        description: Additional ontology/database CURIEs for this node.
        multivalued: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
      description:
        description: Optional node-specific scope note.
        range: string

  CausalEdge:
    description: An evidence-backed directed relationship in a trait causal graph.
    attributes:
      subject:
        description: Local node_id of the upstream/source node.
        required: true
        range: string
      predicate:
        description: Human-readable predicate label or relation CURIE.
        required: true
        range: string
      predicate_id:
        description: Optional ontology CURIE grounding the predicate (e.g. RO:0002211).
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
      object:
        description: Local node_id of the downstream/target node.
        required: true
        range: string
      description:
        description: Short explanation of the causal claim.
        range: string
      evidence:
        description: >-
          Edge-level literature or database support. Required — every
          curator-asserted mechanism edge must carry at least one citation.
        required: true
        multivalued: true
        inlined_as_list: true
        range: EvidenceItem

  MappedXref:
    description: >-
      A cross-reference asserted by an external **mapping product** rather
      than by the trait's own source record. Distinguished from a direct
      `xrefs` entry so that the provenance of a mapping-derived association
      (which curated mapping asserts it, and under what relation) is explicit
      and auditable.
    attributes:
      object:
        description: CURIE of the mapped ontology/database term (e.g. GO:0004672).
        required: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
      mapping_source:
        description: >-
          The mapping product that asserts this association — e.g. ec2go,
          interpro2go, pfam2go, pfam2interpro, interpro2ec, rhea2ec.
        required: true
        range: string
      predicate:
        description: >-
          Optional relation CURIE qualifying the association (e.g. RO / skos).
          Absent means an unspecified, mapping-defined relatedness.
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"

  ChemicalParticipant:
    description: >-
      A chemical entity a FUNCTION trait acts on, grounded in ChEBI and typed
      by its role (substrate, product, transported substrate, cofactor, …).
      Molecular formula / InChIKey / mass / CAS are resolved from `chebi` via
      the shared ChEBI sidecar, not stored here.
    attributes:
      chebi:
        description: ChEBI CURIE of the chemical entity (e.g. CHEBI:29033).
        required: true
        range: string
        pattern: "^CHEBI:[0-9]+$"
      role:
        description: Role of this entity relative to the trait's activity.
        required: true
        range: ChemicalRoleEnum
      name:
        description: >-
          Source-provided label for the entity (the ChEBI canonical name is
          resolved in the sidecar). Optional.
        range: string

  TraitRelation:
    description: >-
      A typed relationship from this trait to another trait or entity, carrying
      an explicit Biolink Model predicate (RO fallback allowed). Edge-typing is
      Biolink-first, mirroring KG-Microbe.
    attributes:
      predicate:
        description: >-
          Biolink predicate CURIE (e.g. biolink:member_of, biolink:part_of,
          biolink:has_participant, biolink:subclass_of); an RO CURIE only where
          Biolink has no suitable slot.
        required: true
        range: string
        pattern: "^(biolink|RO):[A-Za-z0-9_]+$"
      object:
        description: CURIE of the related trait / entity.
        required: true
        range: string
        pattern: "^[A-Za-z][A-Za-z0-9._-]*:[A-Za-z0-9._-]+$"
      relation_source:
        description: Where the relation comes from (source name, mapping, or "derived").
        range: string

  CurationEvent:
    description: A timestamped curator action on a ProteinTraitRecord.
    attributes:
      timestamp:
        range: datetime
        required: true
      curator:
        range: string
      action:
        range: string
      changes:
        range: string
      llm_assisted:
        range: boolean

# ================================================================
# ENUMS
# ================================================================

enums:

  TraitAxisEnum:
    description: Primary axis of a ProteinTraitRecord.
    permissible_values:
      SEQUENCE:
        description: Trait defined on the linear amino-acid sequence.
      STRUCTURE:
        description: Trait defined on the 3D structure (fold, contact, geometry).
      SEQUENCE_STRUCTURE:
        description: >-
          Trait meaningful in both axes — e.g. transmembrane spans (sequence
          hydrophobicity + membrane-embedded helix), coiled coils (heptad
          repeat + supercoiled helical bundle), disulfides (Cys pattern +
          spatial bond).
      FUNCTION:
        description: >-
          Entry-level *functional* trait — not localised to a specific
          residue range. Covers enzymatic activity, binding capacity,
          cofactor requirement, subcellular localisation, environmental
          response, and interaction partners. Grounded by GO (F/P/C),
          EC, Rhea, ChEBI, or UniProt SubCell where available. Complements
          the localised sequence/structure records rather than replacing
          them: an FT BINDING record captures *where* ATP binds; a
          FUNC_BINDING_CAPACITY record captures *that* the protein binds
          ATP as a class-level assertion.
      EVOLUTION:
        description: >-
          Comparative-genomics / phylogenomic trait describing a protein's
          conservation or distribution across taxa, rather than its own
          sequence, structure, or molecular function — e.g. conserved,
          clade-specific, variable, or a pangenome partition (core / soft-core
          / shell / cloud / persistent / singleton). Taxon scope, when
          relevant, is given by an NCBITaxon xref.

  ProteinTraitCategoryEnum:
    description: >-
      Fine-grained trait category — used for filesystem layout beneath
      `data/traits/<axis>/<category>/`. SEQ_* values sit under the
      SEQUENCE axis, STRUCT_* under STRUCTURE, MIXED_* under
      SEQUENCE_STRUCTURE.
    permissible_values:
      # ---- SEQUENCE ----
      SEQ_MOTIF:
        description: >-
          Short sequence motif — PROSITE pattern, ELM linear motif, active-site
          consensus, targeting signal, kinase-recognition sequence, etc.
      SEQ_SIGNAL_PEPTIDE:
        description: N-terminal secretion / targeting signal peptide (UniProt FT SIGNAL).
      SEQ_TRANSIT_PEPTIDE:
        description: >-
          Organelle-targeting transit peptide — mitochondrial, chloroplast,
          peroxisome, etc. (UniProt FT TRANSIT).
      SEQ_PROPEPTIDE:
        description: Propeptide or zymogen activation segment (UniProt FT PROPEP).
      SEQ_INITIATOR_METHIONINE:
        description: >-
          Initiator methionine that is post-translationally removed
          (UniProt FT INIT_MET).
      SEQ_MATURE_CHAIN:
        description: >-
          Mature polypeptide product — the chain remaining after signal /
          transit / propeptide removal, or a discrete released peptide
          (UniProt FT CHAIN and PEPTIDE).
      SEQ_NONSTANDARD_RESIDUE:
        description: >-
          Non-standard amino acid encoded at a specific position —
          selenocysteine, pyrrolysine, or curator-annotated modified
          residues (UniProt FT NON_STD).
      SEQ_CLEAVAGE_SITE:
        description: Endoproteolytic cleavage site (MEROPS-annotated or curator-defined).
      SEQ_TARGETING_SIGNAL:
        description: >-
          Short linear targeting / localization signal — nuclear
          localization/export (NLS/NES), peroxisomal (PTS1/PTS2), ER retention
          (KDEL), cell-wall sorting (LPXTG), etc. Grounded by ELM TRG classes.
      SEQ_LEADER_PEPTIDE:
        description: >-
          N-terminal leader peptide of a ribosomally synthesized precursor
          (RiPP / bacteriocin leader, lanthipeptide/lasso/sactipeptide leader)
          that is cleaved to release the mature peptide. Grounded by MIBiG /
          BAGEL4 / antiSMASH RiPP families.
      SEQ_LOW_COMPLEXITY:
        description: Low-complexity region or compositionally biased segment.
      SEQ_DISORDER:
        description: Intrinsically disordered region (predicted or experimentally validated).
      SEQ_REPEAT:
        description: Tandem sequence repeat (ankyrin, leucine-rich, WD40 sequence repeat, etc.).
      SEQ_COMPOSITION:
        description: Amino-acid composition trait (e.g. Cys-rich, His-tract, GC-tail).
      SEQ_CONSERVATION:
        description: Conserved sequence region or ultraconserved element.
      SEQ_EPITOPE:
        description: Linear B-cell or T-cell epitope.
      SEQ_PTM_SITE:
        description: >-
          Generic sequence-level PTM site — kept as an umbrella bucket for
          PTM records whose specific modification class is unknown or
          heterogeneous (e.g. PROSITE patterns that flag multiple PTM
          families at once). Prefer the specific SEQ_MODIFIED_RESIDUE /
          SEQ_GLYCOSYLATION_SITE / SEQ_LIPIDATION_SITE / SEQ_CROSSLINK_SITE
          categories when the modification class is known.
      SEQ_MODIFIED_RESIDUE:
        description: >-
          Post-translationally modified residue — phosphorylation,
          methylation, acetylation, hydroxylation, sulfation, etc.
          (UniProt FT MOD_RES).
      SEQ_GLYCOSYLATION_SITE:
        description: >-
          Glycosylation site — N-linked, O-linked, C-mannosylation, or
          GPI anchor attachment (UniProt FT CARBOHYD).
      SEQ_LIPIDATION_SITE:
        description: >-
          Lipidation site — myristoylation, palmitoylation, prenylation,
          GPI-lipid anchor, N-acylation (UniProt FT LIPID).
      SEQ_CROSSLINK_SITE:
        description: >-
          Inter- or intra-chain cross-link that isn't a disulfide —
          isopeptide bonds, ubiquitin / SUMO branch points, sortase
          crosslinks (UniProt FT CROSSLNK).
      SEQ_OTHER:

      # ---- STRUCTURE ----
      #
      # Hierarchy roughly follows CATH (Class → Architecture → Topology →
      # Homologous Superfamily → Domain) and SCOP (Class → Fold →
      # Superfamily → Family). STRUCT_FOLD covers SCOP's "fold" level and
      # is a synonym of the CATH topology grouping at that level.
      STRUCT_CLASS:
        description: >-
          Top-level structural class — CATH Class (mainly-α, mainly-β,
          α/β, few secondary structures) or SCOP class (all-α, all-β,
          α/β, α+β, multi-domain, membrane, small).
      STRUCT_ARCHITECTURE:
        description: >-
          Overall shape of the secondary-structure arrangement, ignoring
          connectivity — CATH Architecture level (bundle, sandwich,
          barrel, roll, etc.).
      STRUCT_TOPOLOGY:
        description: >-
          Fold topology / connectivity class (TIM barrel, Ig-like,
          jellyroll, greek key, etc.) — CATH Topology level.
      STRUCT_HOMOLOGOUS_SUPERFAMILY:
        description: >-
          Structural + evolutionary grouping below topology — CATH
          Homologous Superfamily / SCOP Superfamily; members share a
          common ancestor.
      STRUCT_FOLD:
        description: >-
          Overall fold cluster (SCOP fold; also emitted for TED novel or
          highly-symmetric fold representatives). Sibling of STRUCT_TOPOLOGY;
          use STRUCT_TOPOLOGY when the record is explicitly the CATH
          topology-level term.
      STRUCT_DOMAIN:
        description: Structural domain (CATH domain, SCOP domain, InterPro structural entry).
      STRUCT_SECONDARY:
        description: Secondary-structure element or arrangement (helix bundle, beta sheet topology).
      STRUCT_QUATERNARY:
        description: Oligomeric / quaternary state (homodimer, hexameric ring, filament).
      STRUCT_INTERFACE:
        description: Subunit or protein-protein interface with defined geometry.
      STRUCT_ACTIVE_SITE:
        description: Catalytic active site with 3D geometry.
      STRUCT_BINDING_SITE:
        description: Ligand, cofactor, metal, or nucleic-acid binding site.
      STRUCT_ALLOSTERIC_SITE:
        description: Allosteric or regulatory binding site.
      STRUCT_DISULFIDE:
        description: Disulfide bond or disulfide-bond pattern.
      STRUCT_METAL_SITE:
        description: Metal-coordinating site (Zn finger, Fe-S cluster, Ca site, etc.).
      STRUCT_CAVITY:
        description: Cavity, pocket, or channel.
      STRUCT_SYMMETRY:
        description: Internal or quaternary symmetry (Cn, Dn, icosahedral).
      STRUCT_DYNAMICS:
        description: Flexibility, hinge motion, order-disorder transition.
      STRUCT_STABILITY:
        description: Structural stability feature (thermal, mechanical, proteolytic).
      STRUCT_SURFACE:
        description: Surface property (electrostatic patch, hydrophobicity, glycosylation shield).
      STRUCT_OTHER:

      # ---- MIXED (SEQUENCE + STRUCTURE) ----
      MIXED_TRANSMEMBRANE:
        description: Transmembrane span — sequence hydrophobicity + membrane-embedded helix / strand.
      MIXED_COILED_COIL:
        description: Coiled-coil region — heptad-repeat sequence signature + supercoiled bundle.
      MIXED_STRUCTURAL_REPEAT:
        description: Structural tandem repeat with both sequence and 3D periodicity (Ig, LRR, ankyrin).
      MIXED_OTHER:

      # ---- FUNCTION ----
      FUNC_ENZYMATIC_ACTIVITY:
        description: >-
          Catalytic activity — a chemical reaction the protein performs.
          Grounded by EC, Rhea, GO MF "*activity", and participant ChEBIs.
      FUNC_BINDING_CAPACITY:
        description: >-
          Entry-level ability to bind a class of molecule (ATP-binding,
          RNA-binding, DNA-binding, etc.). Distinct from
          STRUCT_BINDING_SITE, which localises the binding to residues.
          Grounded by GO MF "* binding" or UniProt KW keywords.
      FUNC_COFACTOR_REQUIREMENT:
        description: >-
          Non-substrate small molecule (metal ion, prosthetic group,
          organic cofactor) required for activity. Grounded by ChEBI +
          UniProt `CC COFACTOR` block.
      FUNC_LOCALIZATION:
        description: >-
          Subcellular / cellular-component localisation — cytoplasm,
          plasma membrane, nucleus, extracellular, etc. Grounded by
          UniProt SubCell and GO CC.
      FUNC_ENVIRONMENTAL_RESPONSE:
        description: >-
          Response to (or requirement for) an environmental condition —
          temperature (cold, heat), pH, salinity, oxygen availability,
          osmotic pressure, UV, DNA damage, oxidative stress, starvation.
          Grounded by GO BP `response_to_*` or the UniProt `CC INDUCTION`
          block.
      FUNC_INTERACTION_PARTNER:
        description: >-
          A specific protein-, nucleic-acid-, or complex-partner the
          protein interacts with (entry-level, not necessarily
          structurally localised). Distinct from STRUCT_INTERFACE, which
          captures the interface geometry. Grounded by UniProt `CC SUBUNIT`
          and cross-refs to IntAct / BioGRID / STRING.
      FUNC_TRANSPORT:
        description: >-
          Membrane-transport / translocation capacity — the class of solute or
          substrate a protein moves across a membrane (channel, carrier, pump,
          group translocator). Grounded by TCDB, GO MF "* transmembrane
          transporter activity", and ChEBI substrate.
      FUNC_RESISTANCE:
        description: >-
          Antimicrobial-resistance function — the drug/class a protein confers
          resistance to and the mechanism (efflux, inactivating enzyme, target
          alteration/protection). Grounded by CARD/ARO, and drug ChEBIs.
      FUNC_PATHWAY:
        description: >-
          Membership in a metabolic or signalling pathway / module — an
          entry-level assertion that the protein participates in a named
          pathway. Grounded by KEGG (pathway / module / KO), MetaCyc,
          UniPathway, Reactome, or GO biological-process.
      FUNC_ORTHOLOG_GROUP:
        description: >-
          Membership in a cluster of orthologous genes / functional
          category — the protein belongs to a named orthologous group whose
          members share a conserved function across taxa. Grounded by COG
          (NCBI Clusters of Orthologous Genes) and its 26 functional
          categories, or eggNOG / KEGG Orthology.

      # ---- EVOLUTION ----
      # Coarse categories; the specific evolutionary states (conserved,
      # clade-specific, variable / core, soft-core, shell, cloud, persistent,
      # singleton) are individual records WITHIN these categories, not
      # categories themselves.
      EVO_CONSERVATION:
        description: >-
          Cross-taxon conservation state of a protein — conserved (orthologues
          retained across taxa, optionally scoped to a clade by an NCBITaxon
          xref), clade-specific / taxonomically restricted (TRG / orphan), or
          variable / hypervariable / fast-evolving.
      EVO_PANGENOME:
        description: >-
          Pangenome partition of a protein within a species/clade pangenome —
          core, soft-core, shell / accessory, cloud, persistent (PPanGGOLiN),
          or singleton / strain-specific.

      # ---- ADMINISTRATIVE ----
      UPPER:
        description: Upper-level classifier used to organise the hierarchy.
      OTHER:

  TermKindEnum:
    permissible_values:
      CLASS:
      DATATYPE_PROPERTY:
      OBJECT_PROPERTY:
      ANNOTATION_PROPERTY:

  SynonymTypeEnum:
    permissible_values:
      EXACT_SYNONYM:
      NARROW_SYNONYM:
      BROAD_SYNONYM:
      RELATED_SYNONYM:

  ChemicalRoleEnum:
    description: Role of a ChemicalParticipant relative to a trait's activity.
    permissible_values:
      SUBSTRATE:
        description: Consumed by the activity.
      PRODUCT:
        description: Produced by the activity.
      SUBSTRATE_OR_PRODUCT:
        description: >-
          A participant of a reaction whose direction is not fixed (e.g. a
          Rhea master reaction) — on one side or the other.
      COFACTOR:
        description: Required cofactor / prosthetic group / metal.
      TRANSPORTED:
        description: Substrate moved across a membrane (transport activity).
      INHIBITOR:
        description: Inhibits the activity.

  PriorityEnum:
    permissible_values:
      CRITICAL:
      HIGH:
      MEDIUM:
      LOW:

  MappingStatusEnum:
    permissible_values:
      SEEDED:
        description: Imported verbatim from a source ontology / database; not yet reviewed.
      PROPOSED:
        description: >-
          Candidate trait proposed from literature research; not yet
          curator-reviewed. Should carry >= 2 distinct literature citations.
      REVIEWED:
        description: Curator has signed off on label / definition / parents.
      DEPRECATED:
        description: Superseded by another ProteinTraitRecord.

  ExampleSourceEnum:
    description: >-
      Provenance of a CanonicalExample entry — how the example got onto
      this record.
    permissible_values:
      CURATOR:
        description: Curator-picked archetype (textbook exemplar).
      UNIPROTKB_API:
        description: >-
          Retrieved by querying the UniProtKB REST search API for entries
          carrying the trait's anchoring signature (PROSITE / Pfam /
          InterPro / HAMAP xref, or the accession encoded in the trait
          identifier).

  CausalNodeTypeEnum:
    description: Broad categories for nodes in protein-trait causal graphs.
    permissible_values:
      PROTEIN:
        description: A protein, gene product, isoform, or protein complex.
      DOMAIN:
        description: A protein domain or region (Pfam / InterPro / CATH / SCOP entry).
      MOTIF:
        description: A sequence or structural motif (e.g. PROSITE pattern, active-site loop).
      RESIDUE:
        description: A specific residue or residue set (active site, binding site, mutation locus).
      PTM:
        description: A post-translational modification (phosphorylation, glycosylation, etc.).
      LIGAND:
        description: A small-molecule ligand, cofactor, or substrate.
      NUCLEIC_ACID:
        description: A DNA or RNA molecule participating in the mechanism.
      CHEMICAL:
        description: A chemical entity (ChEBI) not otherwise classified as ligand or substrate.
      PATHWAY:
        description: A metabolic or signaling pathway.
      MOLECULAR_FUNCTION:
        description: A GO molecular function.
      BIOLOGICAL_PROCESS:
        description: A GO biological process.
      CELLULAR_LOCALIZATION:
        description: A GO cellular component or subcellular location.
      PHENOTYPE:
        description: A phenotypic outcome (HP or organism-specific phenotype term).
      DISEASE:
        description: A disease term (MONDO or equivalent).
      TRAIT:
        description: Another ProteinTraitRecord.
      STATE:
        description: A biochemical or conformational state (e.g. active, inactive, phosphorylated).
      QUALITY:
        description: A measurable attribute (PATO-style) modulating the trait mechanism.
      ENVIRONMENTAL_FACTOR:
        description: An environmental exposure or condition.
      EXPERIMENTAL_FACTOR:
        description: An assay, perturbation, or experimental condition.
      OTHER:
